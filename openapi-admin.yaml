openapi: 3.0.3
info:
  title: Rikako Admin API
  description: 問題集アプリの管理API
  version: 1.0.0

servers:
  - url: http://localhost:8081
    description: ローカル開発環境

paths:
  /:
    get:
      summary: ルート
      operationId: root
      tags:
        - System
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /health:
    get:
      summary: ヘルスチェック
      operationId: healthCheck
      tags:
        - System
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /questions:
    get:
      summary: 問題一覧取得
      operationId: getQuestions
      tags:
        - Questions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: 問題一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionsResponse'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: 問題作成
      operationId: createQuestion
      tags:
        - Questions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuestionRequest'
      responses:
        '201':
          description: 問題作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /questions/{questionId}:
    get:
      summary: 問題取得
      operationId: getQuestion
      tags:
        - Questions
      parameters:
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 問題詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        '404':
          description: 問題が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: 問題更新
      operationId: updateQuestion
      tags:
        - Questions
      parameters:
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateQuestionRequest'
      responses:
        '200':
          description: 問題更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 問題が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: 問題削除
      operationId: deleteQuestion
      tags:
        - Questions
      parameters:
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 削除成功
        '404':
          description: 問題が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /categories:
    get:
      summary: カテゴリ一覧取得
      operationId: getCategories
      tags:
        - Categories
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: カテゴリ一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoriesResponse'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: カテゴリ作成
      operationId: createCategory
      tags:
        - Categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: カテゴリ作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDetail'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /categories/{categoryId}:
    get:
      summary: カテゴリ取得
      operationId: getCategory
      tags:
        - Categories
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: カテゴリ詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDetail'
        '404':
          description: カテゴリが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: カテゴリ更新
      operationId: updateCategory
      tags:
        - Categories
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: カテゴリ更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDetail'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: カテゴリが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: カテゴリ削除
      operationId: deleteCategory
      tags:
        - Categories
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 削除成功
        '404':
          description: カテゴリが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workbooks:
    get:
      summary: 問題集一覧取得
      operationId: getWorkbooks
      tags:
        - Workbooks
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: 問題集一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkbooksResponse'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      summary: 問題集作成
      operationId: createWorkbook
      tags:
        - Workbooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkbookRequest'
      responses:
        '201':
          description: 問題集作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkbookDetail'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workbooks/{workbookId}:
    get:
      summary: 問題集取得
      operationId: getWorkbook
      tags:
        - Workbooks
      parameters:
        - name: workbookId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 問題集詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkbookDetail'
        '404':
          description: 問題集が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: 問題集更新
      operationId: updateWorkbook
      tags:
        - Workbooks
      parameters:
        - name: workbookId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkbookRequest'
      responses:
        '200':
          description: 問題集更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkbookDetail'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: 問題集が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      summary: 問題集削除
      operationId: deleteWorkbook
      tags:
        - Workbooks
      parameters:
        - name: workbookId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 削除成功
        '404':
          description: 問題集が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /publish:
    post:
      summary: コンテンツをS3にJSON書き出し
      operationId: postPublish
      tags:
        - Publish
      responses:
        '200':
          description: 書き出し成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishResponse'
        '500':
          description: 書き出しエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users:
    get:
      summary: ユーザー一覧取得
      operationId: getUsers
      tags:
        - Users
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: ユーザー一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersResponse'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /images/presigned-url:
    post:
      summary: 画像アップロード用Presigned URL発行
      operationId: createPresignedUrl
      tags:
        - Images
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePresignedUrlRequest'
      responses:
        '200':
          description: Presigned URL発行成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedUrlResponse'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: running

    Question:
      type: object
      required:
        - id
        - type
        - text
        - choices
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
          enum:
            - single_choice
        text:
          type: string
        choices:
          type: array
          items:
            $ref: '#/components/schemas/Choice'
        explanation:
          type: string
        images:
          type: array
          items:
            type: string
            format: uri

    Choice:
      type: object
      required:
        - text
        - isCorrect
      properties:
        text:
          type: string
        isCorrect:
          type: boolean

    QuestionsResponse:
      type: object
      required:
        - questions
        - total
      properties:
        questions:
          type: array
          items:
            $ref: '#/components/schemas/Question'
        total:
          type: integer

    Category:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        workbookCount:
          type: integer

    CategoriesResponse:
      type: object
      required:
        - categories
        - total
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        total:
          type: integer

    CategoryDetail:
      type: object
      required:
        - id
        - title
        - workbooks
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        workbooks:
          type: array
          items:
            $ref: '#/components/schemas/Workbook'

    CreateCategoryRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string

    UpdateCategoryRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string

    Workbook:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        questionCount:
          type: integer
        categoryId:
          type: integer
          format: int64

    WorkbooksResponse:
      type: object
      required:
        - workbooks
        - total
      properties:
        workbooks:
          type: array
          items:
            $ref: '#/components/schemas/Workbook'
        total:
          type: integer

    WorkbookDetail:
      type: object
      required:
        - id
        - title
        - questions
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        categoryId:
          type: integer
          format: int64
        questions:
          type: array
          items:
            $ref: '#/components/schemas/Question'

    CreateQuestionRequest:
      type: object
      required:
        - type
        - text
        - choices
      properties:
        type:
          type: string
          enum:
            - single_choice
        text:
          type: string
        choices:
          type: array
          items:
            $ref: '#/components/schemas/Choice'
          minItems: 2
        explanation:
          type: string
        imageIds:
          type: array
          items:
            type: integer
            format: int64

    UpdateQuestionRequest:
      type: object
      required:
        - type
        - text
        - choices
      properties:
        type:
          type: string
          enum:
            - single_choice
        text:
          type: string
        choices:
          type: array
          items:
            $ref: '#/components/schemas/Choice'
          minItems: 2
        explanation:
          type: string
        imageIds:
          type: array
          items:
            type: integer
            format: int64

    CreateWorkbookRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        categoryId:
          type: integer
          format: int64
        questionIds:
          type: array
          items:
            type: integer
            format: int64

    UpdateWorkbookRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        categoryId:
          type: integer
          format: int64
        questionIds:
          type: array
          items:
            type: integer
            format: int64

    CreatePresignedUrlRequest:
      type: object
      required:
        - filename
        - contentType
      properties:
        filename:
          type: string
        contentType:
          type: string
          enum:
            - image/png
            - image/jpeg

    PresignedUrlResponse:
      type: object
      required:
        - uploadUrl
        - imageId
        - cdnUrl
      properties:
        uploadUrl:
          type: string
        imageId:
          type: integer
          format: int64
        cdnUrl:
          type: string

    PublishResponse:
      type: object
      required:
        - message
        - publishedAt
      properties:
        message:
          type: string
        publishedAt:
          type: string
          format: date-time
        categoriesCount:
          type: integer
        workbooksCount:
          type: integer

    User:
      type: object
      required:
        - id
        - identityId
        - createdAt
      properties:
        id:
          type: integer
          format: int64
        identityId:
          type: string
        createdAt:
          type: string
          format: date-time

    UsersResponse:
      type: object
      required:
        - users
        - total
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
