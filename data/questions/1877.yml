# 化学基礎 問837
id: 1877
type: single_choice
text: |
  「酸素との結び付きや電子の放出に注目すること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水分子で電荷のかたよりを考える場面"
  - "塩酸と水酸化ナトリウム水溶液を混ぜる場面"
  - "マグネシウムが酸素と結び付く場面"
  - "水素や炭素が相手から酸素を奪う場面"
correct: 2
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「酸素との結び付きや電子の放出に注目すること」という見方と最も関係が深い場面は「マグネシウムが酸素と結び付く場面」です。したがって、正解は「マグネシウムが酸素と結び付く場面」です。
  
  「水分子で電荷のかたよりを考える場面」は、その場面で大切なのは「電荷のかたよりがあること」という見方です。
  「塩酸と水酸化ナトリウム水溶液を混ぜる場面」は、その場面で大切なのは「酸と塩基が打ち消し合うこと」という見方です。
  「マグネシウムが酸素と結び付く場面」が正しいです。この見方と最も関係が深い場面です。
  「水素や炭素が相手から酸素を奪う場面」は、その場面で大切なのは「相手を還元させ、自分は酸化されること」という見方です。
