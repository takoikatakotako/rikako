# 高校化学 問42
id: 2042
type: single_choice
text: |
  光合成についての説明として、最も適切なものはどれか。
choices:
  - "コロイド粒子が不規則に動いて見える現象である。"
  - "光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。"
  - "電場をかけたとき、荷電したコロイド粒子が移動する現象である。"
  - "水との親和性が低く、少しの電解質で凝析しやすいコロイドである。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  光合成は、光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。 したがって、正解は「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」です。
  
  「コロイド粒子が不規則に動いて見える現象である。」は、ブラウン運動の説明です。
  「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」が正しいです。光合成の説明です。
  「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」は、電気泳動の説明です。
  「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」は、疎水コロイドの説明です。
