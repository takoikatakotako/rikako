# 化学基礎 問752
id: 1792
type: single_choice
text: |
  「沸点の違いを利用すること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "溶けた物質のうち、電離してイオンになった割合である。"
  - "亜鉛と銅の反応を利用して電気を取り出す電池である。"
  - "沸点の違いを利用して液体を分ける方法である。"
  - "多数の小さな単位がつながってできた大きな分子からなる化合物である。"
correct: 2
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「沸点の違いを利用すること」という見方と最も関係が深い説明は「沸点の違いを利用して液体を分ける方法である。」です。したがって、正解は「沸点の違いを利用して液体を分ける方法である。」です。
  
  「溶けた物質のうち、電離してイオンになった割合である。」は、その説明で大切なのは「どのくらいイオンに分かれるかを表すこと」という見方です。
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」は、その説明で大切なのは「化学エネルギーを電気エネルギーに変えること」という見方です。
  「沸点の違いを利用して液体を分ける方法である。」が正しいです。この見方と最も関係が深い説明です。
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」は、その説明で大切なのは「小さな単位が多数つながっていること」という見方です。
