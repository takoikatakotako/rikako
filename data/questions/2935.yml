# 高校化学 問935
id: 2935
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "ペプチド結合 / 密閉容器で水面の高さが変わらなくなる場面"
  - "気液平衡 / ドライアイスやヨウ素の結晶を考える場面"
  - "反応熱 / 物質を燃やしたときに熱が出ることを考える場面"
  - "分子結晶 / アミノ酸がつながってペプチドになる場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「反応熱 / 物質を燃やしたときに熱が出ることを考える場面」です。したがって、正解は「反応熱 / 物質を燃やしたときに熱が出ることを考える場面」です。
  
  「ペプチド結合 / 密閉容器で水面の高さが変わらなくなる場面」は、用語と場面の対応が合っていません。
  「気液平衡 / ドライアイスやヨウ素の結晶を考える場面」は、用語と場面の対応が合っていません。
  「反応熱 / 物質を燃やしたときに熱が出ることを考える場面」が正しいです。用語と場面の対応が合っています。
  「分子結晶 / アミノ酸がつながってペプチドになる場面」は、用語と場面の対応が合っていません。
