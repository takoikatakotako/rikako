# 令和7年度 ITパスポート 公開問題 問21
id: 3
type: single_choice
text: |
  基本的な機能やサービスは無償で提供し、追加の機能やサービスを有償で提供することで利益を上げるビジネスモデルを表す用語として、最も適切なものはどれか。
choices:
  - "フリーウェア"
  - "フリーミアム"
  - "フリーライド"
  - "フリーランス"
correct: 1
explanation: |
  フリーミアムは、基本機能を無料で提供し、高度な機能や追加サービスを有料にして収益化するビジネスモデルです。したがって、正解は「フリーミアム」です。
  
  「フリーウェア」はフリーウェアは無料で使えるソフトウェアを指す語であり、収益モデル名ではありません。
  「フリーミアム」が正しいです。無償提供と有償追加機能を組み合わせるモデルがフリーミアムです。
  「フリーライド」はフリーライドは対価を払わず利益だけ得る行為を指します。
  「フリーランス」はフリーランスは特定組織に属さず働く個人の働き方を指します。
