# 化学基礎 問955
id: 1995
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "質量数 / 電子を共有して結び付くこと"
  - "純物質 / 成分が一種類で性質が一定であること"
  - "共有結合 / 反応する物質とできる物質の関係を式で示すこと"
  - "化学反応式 / 陽子数と中性子数の合計であること"
correct: 1
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「純物質 / 成分が一種類で性質が一定であること」です。したがって、正解は「純物質 / 成分が一種類で性質が一定であること」です。
  
  「質量数 / 電子を共有して結び付くこと」は、用語と要点の対応が合っていません。
  「純物質 / 成分が一種類で性質が一定であること」が正しいです。用語と要点の対応が合っています。
  「共有結合 / 反応する物質とできる物質の関係を式で示すこと」は、用語と要点の対応が合っていません。
  「化学反応式 / 陽子数と中性子数の合計であること」は、用語と要点の対応が合っていません。
