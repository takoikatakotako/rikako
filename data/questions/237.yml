# 令和7年度 ITパスポート 公開問題 問96
id: 237
type: single_choice
text: |
  OSS （Open Source Software）に関する次の記述のうち、適切なものだけを全て挙げたものはどれか。
  a 個人だけではなく、企業や団体が開発したソフトウェアもある。
  b 著作権が放棄されている。
  c 入手したソフトウェアは、自由に再配布してもよい。
choices:
  - "a,b"
  - "a,b,c"
  - "a,C"
  - "b,c"
correct: 2
explanation: |
  この問題の公開解答では「a,C」が正解とされています。
  
  「a,b」は公開解答では正解ではありません。
  「a,b,c」は公開解答では正解ではありません。
  「a,C」が公開解答で正解とされています。
  「b,c」は公開解答では正解ではありません。
