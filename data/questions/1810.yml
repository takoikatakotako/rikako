# 化学基礎 問770
id: 1810
type: single_choice
text: |
  「電子を失って正に帯電すること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "原子や原子団が電子を失って正の電荷をもつ粒子である。"
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
  - "もとの物質とは別の物質ができる変化である。"
  - "陽子数は同じで中性子数が異なる原子どうしである。"
correct: 0
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「電子を失って正に帯電すること」という見方と最も関係が深い説明は「原子や原子団が電子を失って正の電荷をもつ粒子である。」です。したがって、正解は「原子や原子団が電子を失って正の電荷をもつ粒子である。」です。
  
  「原子や原子団が電子を失って正の電荷をもつ粒子である。」が正しいです。この見方と最も関係が深い説明です。
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、その説明で大切なのは「溶解度の差を利用すること」という見方です。
  「もとの物質とは別の物質ができる変化である。」は、その説明で大切なのは「新しい物質ができること」という見方です。
  「陽子数は同じで中性子数が異なる原子どうしである。」は、その説明で大切なのは「陽子数が同じで中性子数が異なること」という見方です。
