# 高校化学 問265
id: 2265
type: single_choice
text: |
  「酸の電離のしやすさを表す定数である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "溶解"
  - "飽和溶液"
  - "酸解離定数"
  - "蒸気圧降下"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  酸の電離のしやすさを表す定数である。 に当てはまる語は酸解離定数です。したがって、正解は「酸解離定数」です。
  
  「溶解」は、「溶質の粒子が溶媒中に広がっていく現象である。」に当てはまる語です。
  「飽和溶液」は、「その温度でそれ以上溶質が溶けない状態の溶液である。」に当てはまる語です。
  「酸解離定数」が正しいです。「酸の電離のしやすさを表す定数である。」に当てはまる語です。
  「蒸気圧降下」は、「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」に当てはまる語です。
