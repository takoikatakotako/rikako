# 化学基礎 問664
id: 1704
type: single_choice
text: |
  「固体が液体にならずに気体になる状態変化である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "固体から直接気体になること"
  - "どのくらいイオンに分かれるかを表すこと"
  - "化学エネルギーを電気エネルギーに変えること"
  - "小さな単位が多数つながっていること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「固体が液体にならずに気体になる状態変化である。」を理解する上では、「固体から直接気体になること」という見方が大切です。したがって、正解は「固体から直接気体になること」です。
  
  「固体から直接気体になること」が正しいです。この説明と結び付きが強い見方です。
  「どのくらいイオンに分かれるかを表すこと」は、その見方は電離度に関係します。
  「化学エネルギーを電気エネルギーに変えること」は、その見方はダニエル電池に関係します。
  「小さな単位が多数つながっていること」は、その見方は高分子化合物に関係します。
