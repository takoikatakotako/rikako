# 化学基礎 問410
id: 1450
type: single_choice
text: |
  「もとの物質とは別の物質ができる変化である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "化学変化"
  - "物理変化"
  - "蒸発"
  - "昇華"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  もとの物質とは別の物質ができる変化である。 に当てはまる語は化学変化です。したがって、正解は「化学変化」です。
  
  「化学変化」が正しいです。「もとの物質とは別の物質ができる変化である。」に当てはまる語です。
  「物理変化」は、「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」に当てはまる語です。
  「蒸発」は、「液体が気体になる状態変化である。」に当てはまる語です。
  「昇華」は、「固体が液体にならずに気体になる状態変化である。」に当てはまる語です。
