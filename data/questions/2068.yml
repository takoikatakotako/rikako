# 高校化学 問68
id: 2068
type: single_choice
text: |
  アルカリ土類金属についての説明として、最も適切なものはどれか。
choices:
  - "周期表17族に属し、陰イオンになりやすい非金属元素の総称である。"
  - "酸とも塩基とも反応する酸化物である。"
  - "一方の原子が電子対を与えてできる共有結合である。"
  - "周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  アルカリ土類金属は、周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。 したがって、正解は「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」です。
  
  「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」は、ハロゲンの説明です。
  「酸とも塩基とも反応する酸化物である。」は、両性酸化物の説明です。
  「一方の原子が電子対を与えてできる共有結合である。」は、配位結合の説明です。
  「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」が正しいです。アルカリ土類金属の説明です。
