# 高校化学 問74
id: 2074
type: single_choice
text: |
  遷移元素についての説明として、最も適切なものはどれか。
choices:
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
  - "周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。"
  - "遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。"
  - "鉛とその化合物を用いた、充電して繰り返し使える電池である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  遷移元素は、周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。 したがって、正解は「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」です。
  
  「金属元素を炎に入れたときに特有の色を示す反応である。」は、炎色反応の説明です。
  「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」が正しいです。遷移元素の説明です。
  「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」は、銅の説明です。
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」は、鉛蓄電池の説明です。
