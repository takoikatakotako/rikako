# 化学基礎 問141
id: 1181
type: single_choice
text: |
  塩橋についての説明として、最も適切なものはどれか。
choices:
  - "電池で二つの水溶液の電気的なつり合いを保つために入れる部分である。"
  - "水に溶けたり融解したりすると電気を通す物質である。"
  - "水に溶けてもほとんど電気を通さない物質である。"
  - "放射線を出す同位体で、年代測定や医療などに利用される。"
correct: 0
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  塩橋は、電池で二つの水溶液の電気的なつり合いを保つために入れる部分である。したがって、正解は「電池で二つの水溶液の電気的なつり合いを保つために入れる部分である。」です。
  
  「電池で二つの水溶液の電気的なつり合いを保つために入れる部分である。」が正しいです。塩橋の説明です。
  「水に溶けたり融解したりすると電気を通す物質である。」は、電解質の説明です。
  「水に溶けてもほとんど電気を通さない物質である。」は、非電解質の説明です。
  「放射線を出す同位体で、年代測定や医療などに利用される。」は、放射性同位体の説明です。
