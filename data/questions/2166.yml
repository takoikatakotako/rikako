# 高校化学 問166
id: 2166
type: single_choice
text: |
  塩基解離定数と最も関係が深い場面として、適切なものはどれか。
choices:
  - "どの結合が切れやすいかを比べる場面"
  - "熱分解や一部の溶解で周囲が冷たくなる場面"
  - "どの塩基がより電離しやすいかを比べる場面"
  - "植物が光を受けてデンプンなどをつくる場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  どの塩基がより電離しやすいかを比べる場面は、塩基解離定数と結び付きが強い場面です。したがって、正解は「どの塩基がより電離しやすいかを比べる場面」です。
  
  「どの結合が切れやすいかを比べる場面」は、結合エネルギーと結び付きが強い場面です。
  「熱分解や一部の溶解で周囲が冷たくなる場面」は、吸熱反応と結び付きが強い場面です。
  「どの塩基がより電離しやすいかを比べる場面」が正しいです。これは塩基解離定数と結び付きが強い場面です。
  「植物が光を受けてデンプンなどをつくる場面」は、光合成と結び付きが強い場面です。
