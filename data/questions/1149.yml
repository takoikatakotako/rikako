# 化学基礎 問109
id: 1149
type: single_choice
text: |
  物理変化についての説明として、最も適切なものはどれか。
choices:
  - "新しい物質ができず、状態や形だけが変わる変化である。"
  - "新しい物質ができる変化である。"
  - "固体が液体になる状態変化である。"
  - "液体が気体になる状態変化である。"
correct: 0
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  物理変化は、新しい物質ができず、状態や形だけが変わる変化である。したがって、正解は「新しい物質ができず、状態や形だけが変わる変化である。」です。
  
  「新しい物質ができず、状態や形だけが変わる変化である。」が正しいです。物理変化の説明です。
  「新しい物質ができる変化である。」は、化学変化の説明です。
  「固体が液体になる状態変化である。」は、融解の説明です。
  「液体が気体になる状態変化である。」は、蒸発の説明です。
