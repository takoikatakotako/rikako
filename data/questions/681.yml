# 化学基礎 問14
id: 681
type: single_choice
text: |
  再結晶についての説明として、最も適切なものはどれか。
choices:
  - "溶け方の違いを利用して、固体をより純粋に取り出す方法である。"
  - "磁石を使って金属だけを取り出す方法である。"
  - "気体を強く冷やして液体に変える方法である。"
  - "物質を必ず燃やして調べる方法である。"
correct: 0
explanation: |
  この問題は、「再結晶がどんなときに使われる方法か」を答える問題です。
  
  再結晶は、温度による溶解度の差を利用して、固体をより純粋な形で取り出す方法です。したがって、正解は「溶け方の違いを利用して、固体をより純粋に取り出す方法である」です。
  
  「溶け方の違いを利用して、固体をより純粋に取り出す方法である」が正しいです。再結晶の基本的な考え方です。
  「磁石を使って金属だけを取り出す方法である」は、再結晶の説明ではありません。
  「気体を強く冷やして液体に変える方法である」は、再結晶の説明ではありません。
  「物質を必ず燃やして調べる方法である」は、再結晶の説明ではありません。
