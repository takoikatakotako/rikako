# 化学基礎 問605
id: 1645
type: single_choice
text: |
  「成分が一種類で性質が一定であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "陽イオン"
  - "無極性分子"
  - "純物質"
  - "pH"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「成分が一種類で性質が一定であること」という見方が大切なのは純物質です。したがって、正解は「純物質」です。
  
  「陽イオン」は、その語で大切なのは「電子を失って正に帯電すること」という見方です。
  「無極性分子」は、その語で大切なのは「電荷のかたよりがほとんどないこと」という見方です。
  「純物質」が正しいです。この見方が大切な語です。
  「pH」は、その語で大切なのは「酸性と塩基性の強さを数で見ること」という見方です。
