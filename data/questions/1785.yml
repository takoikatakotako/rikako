# 化学基礎 問745
id: 1785
type: single_choice
text: |
  「砂糖水が電流をほとんど通さない場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "水溶液でも電流をほとんど通さないこと"
  - "電気的な引力で結び付くこと"
  - "1Lあたりの物質量で表すこと"
  - "色の変化で液性を見分けること"
correct: 0
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「砂糖水が電流をほとんど通さない場面」では、「水溶液でも電流をほとんど通さないこと」という見方が大切です。したがって、正解は「水溶液でも電流をほとんど通さないこと」です。
  
  「水溶液でも電流をほとんど通さないこと」が正しいです。この具体例で大切になる見方です。
  「電気的な引力で結び付くこと」は、その見方は塩化ナトリウムが陽イオンと陰イオンの引力でできる場面よりもイオン結合と結び付きが強いです。
  「1Lあたりの物質量で表すこと」は、その見方は1Lの食塩水にどれだけ溶質が溶けているかを表す場面よりもモル濃度と結び付きが強いです。
  「色の変化で液性を見分けること」は、その見方はBTB溶液やフェノールフタレインで液性を調べる場面よりも指示薬と結び付きが強いです。
