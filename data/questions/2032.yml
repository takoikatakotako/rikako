# 化学基礎 問992
id: 2032
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "再結晶 / 新しい物質ができること"
  - "化学変化 / 陽子数が同じで中性子数が異なること"
  - "ダニエル電池 / 化学エネルギーを電気エネルギーに変えること"
  - "同位体 / 溶解度の差を利用すること"
correct: 2
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「ダニエル電池 / 化学エネルギーを電気エネルギーに変えること」です。したがって、正解は「ダニエル電池 / 化学エネルギーを電気エネルギーに変えること」です。
  
  「再結晶 / 新しい物質ができること」は、用語と要点の対応が合っていません。
  「化学変化 / 陽子数が同じで中性子数が異なること」は、用語と要点の対応が合っていません。
  「ダニエル電池 / 化学エネルギーを電気エネルギーに変えること」が正しいです。用語と要点の対応が合っています。
  「同位体 / 溶解度の差を利用すること」は、用語と要点の対応が合っていません。
