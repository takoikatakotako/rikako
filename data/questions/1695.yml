# 化学基礎 問655
id: 1695
type: single_choice
text: |
  「一種類の物質だけからできていて、性質が一定である物質である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電荷のかたよりがあること"
  - "酸と塩基が打ち消し合うこと"
  - "相手を還元させ、自分は酸化されること"
  - "成分が一種類で性質が一定であること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「一種類の物質だけからできていて、性質が一定である物質である。」を理解する上では、「成分が一種類で性質が一定であること」という見方が大切です。したがって、正解は「成分が一種類で性質が一定であること」です。
  
  「電荷のかたよりがあること」は、その見方は極性分子に関係します。
  「酸と塩基が打ち消し合うこと」は、その見方は中和に関係します。
  「相手を還元させ、自分は酸化されること」は、その見方は還元剤に関係します。
  「成分が一種類で性質が一定であること」が正しいです。この説明と結び付きが強い見方です。
