# 令和6年度 ITパスポート 公開問題 問4
id: 984
type: single_choice
text: |
  従来の金融情報システムは堅ろう性が高い一方、柔軟性に欠け、モバイル技術などの情報革新に追従したサービスの迅速な提供が難しかった。これを踏まえて、インターネット関連技術の取込みやそれらを活用するベンチャー企業と組むなどして、新たな価値や革新的なサービスを提供していく潮流を表す用語として、最も適切なものはどれか。
choices:
  - "オムニチャネル"
  - "フィンテック"
  - "ブロックチェーン"
  - "ワントゥワンマーケティング"
correct: 1
