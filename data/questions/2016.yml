# 化学基礎 問976
id: 2016
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "酸化 / 水溶液や融解状態で電流を通すこと"
  - "電解質 / 水に溶けない固体を液体から分けること"
  - "極性分子 / 電荷のかたよりがあること"
  - "ろ過 / 酸素との結び付きや電子の放出に注目すること"
correct: 2
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「極性分子 / 電荷のかたよりがあること」です。したがって、正解は「極性分子 / 電荷のかたよりがあること」です。
  
  「酸化 / 水溶液や融解状態で電流を通すこと」は、用語と要点の対応が合っていません。
  「電解質 / 水に溶けない固体を液体から分けること」は、用語と要点の対応が合っていません。
  「極性分子 / 電荷のかたよりがあること」が正しいです。用語と要点の対応が合っています。
  「ろ過 / 酸素との結び付きや電子の放出に注目すること」は、用語と要点の対応が合っていません。
