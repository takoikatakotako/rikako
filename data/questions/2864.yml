# 高校化学 問864
id: 2864
type: single_choice
text: |
  「水溶液中で一部だけ電離する塩基である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "混ざった気体の圧力を足し合わせて考えること"
  - "それ以上溶けない状態であること"
  - "電離が部分的に起こること"
  - "水となじみやすく安定しやすいこと"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「水溶液中で一部だけ電離する塩基である。」を理解する上では、「電離が部分的に起こること」という見方が大切です。したがって、正解は「電離が部分的に起こること」です。
  
  「混ざった気体の圧力を足し合わせて考えること」は、その見方は分圧の法則に関係します。
  「それ以上溶けない状態であること」は、その見方は飽和溶液に関係します。
  「電離が部分的に起こること」が正しいです。この説明と結び付きが強い見方です。
  「水となじみやすく安定しやすいこと」は、その見方は親水コロイドに関係します。
