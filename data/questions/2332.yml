# 高校化学 問332
id: 2332
type: single_choice
text: |
  「コロイド粒子が陽極や陰極へ移動する様子を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "浸透圧"
  - "チンダル現象"
  - "電気泳動"
  - "透析"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  コロイド粒子が陽極や陰極へ移動する様子を考える場面 と最も関係が深いのは電気泳動です。したがって、正解は「電気泳動」です。
  
  「浸透圧」は、「薄い溶液側から濃い溶液側へ水が移動する場面」と結び付きが強い語です。
  「チンダル現象」は、「薄暗い部屋でコロイドに光を当てると筋が見える場面」と結び付きが強い語です。
  「電気泳動」が正しいです。この具体例と最も関係が深い語です。
  「透析」は、「コロイド溶液から余分な電解質を取り除く場面」と結び付きが強い語です。
