# 高校化学 問341
id: 2341
type: single_choice
text: |
  「ケミカルライトが光る仕組みを考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "陰極"
  - "反応速度"
  - "触媒"
  - "化学発光"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  ケミカルライトが光る仕組みを考える場面 と最も関係が深いのは化学発光です。したがって、正解は「化学発光」です。
  
  「陰極」は、「金属イオンが電子を受け取って析出する電極を考える場面」と結び付きが強い語です。
  「反応速度」は、「同じ反応でも条件によって進み方が変わることを比べる場面」と結び付きが強い語です。
  「触媒」は、「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」と結び付きが強い語です。
  「化学発光」が正しいです。この具体例と最も関係が深い語です。
