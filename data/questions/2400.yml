# 高校化学 問400
id: 2400
type: single_choice
text: |
  「再生可能エネルギーや新素材の開発を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "ベンゼン"
  - "アニリン"
  - "化学が築く未来"
  - "アルカリ土類金属"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  再生可能エネルギーや新素材の開発を考える場面 と最も関係が深いのは化学が築く未来です。したがって、正解は「化学が築く未来」です。
  
  「ベンゼン」は、「芳香族化合物の基本構造を学ぶ場面」と結び付きが強い語です。
  「アニリン」は、「染料の原料になる芳香族アミンを考える場面」と結び付きが強い語です。
  「化学が築く未来」が正しいです。この具体例と最も関係が深い語です。
  「アルカリ土類金属」は、「マグネシウムやカルシウムの性質を比べる場面」と結び付きが強い語です。
