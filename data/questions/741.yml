# 高校化学 問31
id: 741
type: single_choice
text: |
  透析についての説明として、最も適切なものはどれか。
choices:
  - "正反応と逆反応の両方が起こり得る反応である。"
  - "化学平衡の状態を表す、平衡時の濃度や分圧の比である。"
  - "半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。"
  - "窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  透析は、半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。 したがって、正解は「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」です。
  
  「正反応と逆反応の両方が起こり得る反応である。」は、可逆反応の説明です。
  「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」は、平衡定数の説明です。
  「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」が正しいです。透析の説明です。
  「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」は、アンモニア合成の説明です。
