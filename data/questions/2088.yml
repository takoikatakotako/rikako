# 高校化学 問88
id: 2088
type: single_choice
text: |
  フェノールについての説明として、最も適切なものはどれか。
choices:
  - "周期表17族に属し、陰イオンになりやすい非金属元素の総称である。"
  - "酸とも塩基とも反応する酸化物である。"
  - "一方の原子が電子対を与えてできる共有結合である。"
  - "ベンゼン環にヒドロキシ基が直接結び付いた化合物である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  フェノールは、ベンゼン環にヒドロキシ基が直接結び付いた化合物である。 したがって、正解は「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」です。
  
  「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」は、ハロゲンの説明です。
  「酸とも塩基とも反応する酸化物である。」は、両性酸化物の説明です。
  「一方の原子が電子対を与えてできる共有結合である。」は、配位結合の説明です。
  「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」が正しいです。フェノールの説明です。
