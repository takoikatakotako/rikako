# 化学基礎 問297
id: 1337
type: single_choice
text: |
  指示薬の特徴として、最も適切なものはどれか。
choices:
  - "酸化を防ぐために用いる"
  - "酸性やアルカリ性で色が変わる"
  - "多数の小さな単位がつながってできる"
  - "日常生活や社会の技術と結び付く"
correct: 1
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  指示薬では、「酸性やアルカリ性で色が変わる」という点が大切です。したがって、正解は「酸性やアルカリ性で色が変わる」です。
  
  「酸化を防ぐために用いる」は、酸化防止剤に関係する特徴です。
  「酸性やアルカリ性で色が変わる」が正しいです。指示薬の特徴を表しています。
  「多数の小さな単位がつながってできる」は、高分子化合物に関係する特徴です。
  「日常生活や社会の技術と結び付く」は、化学が拓く世界に関係する特徴です。
