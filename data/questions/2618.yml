# 高校化学 問618
id: 2618
type: single_choice
text: |
  「金属が電気を通したりのびたりする理由を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "化学反応に伴って出入りする熱量である。"
  - "燃料と酸化剤を外部から供給しながら電気を取り出す電池である。"
  - "金属原子が規則正しく並び、自由電子が全体に広がった結晶である。"
  - "平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「金属が電気を通したりのびたりする理由を考える場面」を説明した文として適切なのは「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」です。したがって、正解は「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」です。
  
  「化学反応に伴って出入りする熱量である。」は、この説明は「物質を燃やしたときに熱が出ることを考える場面」と結び付きが強いです。
  「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」は、この説明は「水素を使って発電し、水を生じる仕組みを考える場面」と結び付きが強いです。
  「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」が正しいです。この具体例を説明した文です。
  「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」は、この説明は「圧力や濃度を変えると平衡が移る方向を考える場面」と結び付きが強いです。
