# 高校化学 問522
id: 2522
type: single_choice
text: |
  「その温度でそれ以上溶質が溶けない状態の溶液である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "食塩水の沸点が水より少し高くなることを考える場面"
  - "食塩を加えても底に残るようになった食塩水を考える場面"
  - "反応前後で熱の出入りを比較する場面"
  - "水溶液に電流を流して物質を分解する場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「その温度でそれ以上溶質が溶けない状態の溶液である。」と最も関係が深い場面は「食塩を加えても底に残るようになった食塩水を考える場面」です。したがって、正解は「食塩を加えても底に残るようになった食塩水を考える場面」です。
  
  「食塩水の沸点が水より少し高くなることを考える場面」は、「溶液の沸点が純粋な溶媒より高くなる現象である。」と結び付きが強い場面です。
  「食塩を加えても底に残るようになった食塩水を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「反応前後で熱の出入りを比較する場面」は、「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」と結び付きが強い場面です。
  「水溶液に電流を流して物質を分解する場面」は、「電気エネルギーを使って自発的でない化学変化を起こす操作である。」と結び付きが強い場面です。
