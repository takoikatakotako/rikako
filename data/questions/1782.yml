# 化学基礎 問742
id: 1782
type: single_choice
text: |
  「亜鉛板と銅板を使って豆電球を光らせる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "化学結合やイオンのできやすさに関係すること"
  - "化学エネルギーを電気エネルギーに変えること"
  - "電荷のかたよりがあること"
  - "酸と塩基が打ち消し合うこと"
correct: 1
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「亜鉛板と銅板を使って豆電球を光らせる場面」では、「化学エネルギーを電気エネルギーに変えること」という見方が大切です。したがって、正解は「化学エネルギーを電気エネルギーに変えること」です。
  
  「化学結合やイオンのできやすさに関係すること」は、その見方はナトリウムが電子を1個失いやすい理由を考える場面よりも最外殻電子と結び付きが強いです。
  「化学エネルギーを電気エネルギーに変えること」が正しいです。この具体例で大切になる見方です。
  「電荷のかたよりがあること」は、その見方は水分子で電荷のかたよりを考える場面よりも極性分子と結び付きが強いです。
  「酸と塩基が打ち消し合うこと」は、その見方は塩酸と水酸化ナトリウム水溶液を混ぜる場面よりも中和と結び付きが強いです。
