# 化学基礎 問230
id: 1270
type: single_choice
text: |
  「2H2 + O2 → 2H2O」に最も関係が深い語として、適切なものはどれか。
choices:
  - "酸"
  - "塩基"
  - "中和"
  - "化学反応式"
correct: 3
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「2H2 + O2 → 2H2O」に最も関係が深いのは化学反応式です。したがって、正解は「化学反応式」です。
  
  「酸」は、この例に最も関係が深い語ではありません。
  「塩基」は、この例に最も関係が深い語ではありません。
  「中和」は、この例に最も関係が深い語ではありません。
  「化学反応式」が正しいです。この例は化学反応式に関係しています。
