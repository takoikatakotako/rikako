# 高校化学 問580
id: 2580
type: single_choice
text: |
  「多重結合に原子や原子団が加わる反応である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "エタノールの性質や利用を考える場面"
  - "アミノ酸がつながってペプチドになる場面"
  - "密閉容器で水面の高さが変わらなくなる場面"
  - "エチレンに臭素が付加する場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「多重結合に原子や原子団が加わる反応である。」と最も関係が深い場面は「エチレンに臭素が付加する場面」です。したがって、正解は「エチレンに臭素が付加する場面」です。
  
  「エタノールの性質や利用を考える場面」は、「ヒドロキシ基をもつ有機化合物である。」と結び付きが強い場面です。
  「アミノ酸がつながってペプチドになる場面」は、「アミノ酸どうしが縮合してできる結合である。」と結び付きが強い場面です。
  「密閉容器で水面の高さが変わらなくなる場面」は、「蒸発する速さと凝縮する速さが等しくなった状態である。」と結び付きが強い場面です。
  「エチレンに臭素が付加する場面」が正しいです。この説明と結び付きが強い場面です。
