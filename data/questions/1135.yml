# 化学基礎 問95
id: 1135
type: single_choice
text: |
  安全な水道水を得るために利用される技術として、最も適切なものはどれか。
choices:
  - "ろ過や殺菌"
  - "金属を溶かすだけの操作"
  - "石を磁石で集めるだけの操作"
  - "色を付けるだけの操作"
correct: 0
explanation: |
  この問題は、「水道水の安全と化学技術の関係」を確認する問題です。
  
  水道水を安全にするためには、ろ過や殺菌などの技術が利用されます。これは化学基礎で学ぶ内容とつながっています。したがって、正解は「ろ過や殺菌」です。
  
  「ろ過や殺菌」が正しいです。安全な水道水を得るための代表的な技術です。
  「金属を溶かすだけの操作」は、適切ではありません。
  「石を磁石で集めるだけの操作」は、適切ではありません。
  「色を付けるだけの操作」は、適切ではありません。
