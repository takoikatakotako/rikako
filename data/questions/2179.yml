# 高校化学 問179
id: 2179
type: single_choice
text: |
  不飽和炭化水素と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムやカリウムの性質を比べる場面"
  - "フッ素や塩素、臭素の反応性を比べる場面"
  - "酸化アルミニウムが酸にも塩基にも溶ける場面"
  - "エチレンやアセチレンの反応性を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  エチレンやアセチレンの反応性を考える場面は、不飽和炭化水素と結び付きが強い場面です。したがって、正解は「エチレンやアセチレンの反応性を考える場面」です。
  
  「ナトリウムやカリウムの性質を比べる場面」は、アルカリ金属と結び付きが強い場面です。
  「フッ素や塩素、臭素の反応性を比べる場面」は、ハロゲンと結び付きが強い場面です。
  「酸化アルミニウムが酸にも塩基にも溶ける場面」は、両性酸化物と結び付きが強い場面です。
  「エチレンやアセチレンの反応性を考える場面」が正しいです。これは不飽和炭化水素と結び付きが強い場面です。
