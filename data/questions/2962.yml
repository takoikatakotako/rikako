# 高校化学 問962
id: 2962
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "溶解度 / コロイド粒子が陽極や陰極へ移動する様子を考える場面"
  - "塩の加水分解 / 酢酸ナトリウム水溶液が塩基性を示す理由を考える場面"
  - "電気泳動 / 懐中電灯や時計に入っている電池を考える場面"
  - "乾電池 / 温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「塩の加水分解 / 酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」です。したがって、正解は「塩の加水分解 / 酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」です。
  
  「溶解度 / コロイド粒子が陽極や陰極へ移動する様子を考える場面」は、用語と場面の対応が合っていません。
  「塩の加水分解 / 酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」が正しいです。用語と場面の対応が合っています。
  「電気泳動 / 懐中電灯や時計に入っている電池を考える場面」は、用語と場面の対応が合っていません。
  「乾電池 / 温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」は、用語と場面の対応が合っていません。
