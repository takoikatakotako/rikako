# 高校化学 問924
id: 2924
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "アルコール / アミノ酸がつながってペプチドになる場面"
  - "ペプチド結合 / 密閉容器で水面の高さが変わらなくなる場面"
  - "気液平衡 / エタノールの性質や利用を考える場面"
  - "蒸気圧降下 / 食塩水が純水より蒸発しにくくなることを考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「蒸気圧降下 / 食塩水が純水より蒸発しにくくなることを考える場面」です。したがって、正解は「蒸気圧降下 / 食塩水が純水より蒸発しにくくなることを考える場面」です。
  
  「アルコール / アミノ酸がつながってペプチドになる場面」は、用語と場面の対応が合っていません。
  「ペプチド結合 / 密閉容器で水面の高さが変わらなくなる場面」は、用語と場面の対応が合っていません。
  「気液平衡 / エタノールの性質や利用を考える場面」は、用語と場面の対応が合っていません。
  「蒸気圧降下 / 食塩水が純水より蒸発しにくくなることを考える場面」が正しいです。用語と場面の対応が合っています。
