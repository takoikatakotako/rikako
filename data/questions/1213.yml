# 化学基礎 問173
id: 1213
type: single_choice
text: |
  共有結合の例として、最も適切なものはどれか。
choices:
  - "銅 Cu の結合"
  - "二酸化炭素 CO2 の分子"
  - "水 H2O"
  - "水分子 H2O の結合"
correct: 3
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  水分子 H2O の結合は、共有結合の例です。したがって、正解は「水分子 H2O の結合」です。
  
  「銅 Cu の結合」は、金属結合の例として見る方が適切です。
  「二酸化炭素 CO2 の分子」は、分子の例として見る方が適切です。
  「水 H2O」は、極性分子の例として見る方が適切です。
  「水分子 H2O の結合」が正しいです。これは共有結合の例です。
