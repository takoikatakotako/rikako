# 化学基礎 問916
id: 1956
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "陰イオン / 6.0×10^23個の粒子をひとまとまりとして数える場面"
  - "モル / 同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面"
  - "電離度 / 塩素原子が電子を1個受け取って Cl- になる場面"
  - "質量数 / 炭素12で陽子数と中性子数の合計を見る場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「質量数 / 炭素12で陽子数と中性子数の合計を見る場面」です。したがって、正解は「質量数 / 炭素12で陽子数と中性子数の合計を見る場面」です。
  
  「陰イオン / 6.0×10^23個の粒子をひとまとまりとして数える場面」は、用語と場面の対応が合っていません。
  「モル / 同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」は、用語と場面の対応が合っていません。
  「電離度 / 塩素原子が電子を1個受け取って Cl- になる場面」は、用語と場面の対応が合っていません。
  「質量数 / 炭素12で陽子数と中性子数の合計を見る場面」が正しいです。用語と場面の対応が合っています。
