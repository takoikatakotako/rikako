# 化学基礎 問538
id: 1578
type: single_choice
text: |
  「物質が酸素を失う、または電子を受け取る変化である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "亜鉛が銅より先にイオンになりやすいことを見る場面"
  - "酸化銅から酸素が取れて銅になる場面"
  - "食品の変色や劣化を防ぐためにビタミンCを使う場面"
  - "酸素だけが入った容器を考える場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「物質が酸素を失う、または電子を受け取る変化である。」と最も関係が深い場面は「酸化銅から酸素が取れて銅になる場面」です。したがって、正解は「酸化銅から酸素が取れて銅になる場面」です。
  
  「亜鉛が銅より先にイオンになりやすいことを見る場面」は、「金属が電子を失ってイオンになりやすい性質の強さである。」と結び付きが強い場面です。
  「酸化銅から酸素が取れて銅になる場面」が正しいです。この説明と結び付きが強い場面です。
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」は、「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」と結び付きが強い場面です。
  「酸素だけが入った容器を考える場面」は、「一種類の物質だけからできていて、性質が一定である物質である。」と結び付きが強い場面です。
