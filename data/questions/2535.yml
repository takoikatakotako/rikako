# 高校化学 問535
id: 2535
type: single_choice
text: |
  「化学反応に伴って出入りする熱量である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "どの結合が切れやすいかを比べる場面"
  - "金属イオンが電子を受け取って析出する電極を考える場面"
  - "物質を燃やしたときに熱が出ることを考える場面"
  - "中性の水で H+ と OH- の関係を考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「化学反応に伴って出入りする熱量である。」と最も関係が深い場面は「物質を燃やしたときに熱が出ることを考える場面」です。したがって、正解は「物質を燃やしたときに熱が出ることを考える場面」です。
  
  「どの結合が切れやすいかを比べる場面」は、「気体分子中の結合1 molを切るのに必要なエネルギーである。」と結び付きが強い場面です。
  「金属イオンが電子を受け取って析出する電極を考える場面」は、「電気分解で還元が起こる電極である。」と結び付きが強い場面です。
  「物質を燃やしたときに熱が出ることを考える場面」が正しいです。この説明と結び付きが強い場面です。
  「中性の水で H+ と OH- の関係を考える場面」は、「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」と結び付きが強い場面です。
