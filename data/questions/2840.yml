# 高校化学 問840
id: 2840
type: single_choice
text: |
  「反応の結果として周囲から熱を吸収する反応である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "ベンゼン環をもつこと"
  - "必要な機能をねらって材料を設計すること"
  - "周囲から熱を受け取る反応であること"
  - "圧力一定で体積と絶対温度の関係を見ること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「反応の結果として周囲から熱を吸収する反応である。」を理解する上では、「周囲から熱を受け取る反応であること」という見方が大切です。したがって、正解は「周囲から熱を受け取る反応であること」です。
  
  「ベンゼン環をもつこと」は、その見方はベンゼンに関係します。
  「必要な機能をねらって材料を設計すること」は、その見方は機能性材料に関係します。
  「周囲から熱を受け取る反応であること」が正しいです。この説明と結び付きが強い見方です。
  「圧力一定で体積と絶対温度の関係を見ること」は、その見方はシャルルの法則に関係します。
