# 令和7年度 ITパスポート 公開問題 問82
id: 663
type: single_choice
text: |
  あるコンピュータのデータベースの内容を他のコンピュータのデータベースに複製して、両者の内容が一致するように同期させるDBMSの機能はどれか。
choices:
  - "アーカイブ"
  - "バックアップ"
  - "レプリケーション"
  - "ロールバック"
correct: 2
explanation: |
  この問題の公開解答では「レプリケーション」が正解とされています。
  
  「アーカイブ」は公開解答では正解ではありません。
  「バックアップ」は公開解答では正解ではありません。
  「レプリケーション」が公開解答で正解とされています。
  「ロールバック」は公開解答では正解ではありません。
