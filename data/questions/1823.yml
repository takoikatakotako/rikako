# 化学基礎 問783
id: 1823
type: single_choice
text: |
  「酸と塩基が打ち消し合うこと」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "原子核の中にある陽子数と中性子数の合計である。"
  - "酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。"
  - "原子どうしが電子を共有してできる結び付きである。"
  - "化学変化を、物質の種類と量の関係が分かるように表した式である。"
correct: 1
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「酸と塩基が打ち消し合うこと」という見方と最も関係が深い説明は「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」です。したがって、正解は「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」です。
  
  「原子核の中にある陽子数と中性子数の合計である。」は、その説明で大切なのは「陽子数と中性子数の合計であること」という見方です。
  「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」が正しいです。この見方と最も関係が深い説明です。
  「原子どうしが電子を共有してできる結び付きである。」は、その説明で大切なのは「電子を共有して結び付くこと」という見方です。
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」は、その説明で大切なのは「反応する物質とできる物質の関係を式で示すこと」という見方です。
