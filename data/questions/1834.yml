# 化学基礎 問794
id: 1834
type: single_choice
text: |
  「水溶液や融解状態で電流を通すこと」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "水に溶けたり融解したりすると電流を通す物質である。"
  - "分子の中で電荷のかたよりがほとんどない分子である。"
  - "水溶液の酸性や塩基性の強さを表す尺度である。"
  - "金属が電子を失ってイオンになりやすい性質の強さである。"
correct: 0
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「水溶液や融解状態で電流を通すこと」という見方と最も関係が深い説明は「水に溶けたり融解したりすると電流を通す物質である。」です。したがって、正解は「水に溶けたり融解したりすると電流を通す物質である。」です。
  
  「水に溶けたり融解したりすると電流を通す物質である。」が正しいです。この見方と最も関係が深い説明です。
  「分子の中で電荷のかたよりがほとんどない分子である。」は、その説明で大切なのは「電荷のかたよりがほとんどないこと」という見方です。
  「水溶液の酸性や塩基性の強さを表す尺度である。」は、その説明で大切なのは「酸性と塩基性の強さを数で見ること」という見方です。
  「金属が電子を失ってイオンになりやすい性質の強さである。」は、その説明で大切なのは「金属のイオンになりやすさを比べること」という見方です。
