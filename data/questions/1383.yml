# 化学基礎 問343
id: 1383
type: single_choice
text: |
  塩橋について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
  - "物質が酸素と結び付く、または電子を失う変化である。"
  - "相手を酸化させ、自身は還元される物質である。"
  - "二つの溶液の電気的なつり合いを保つための部分である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  塩橋は、二つの溶液の電気的なつり合いを保つための部分である。 したがって、正解は「二つの溶液の電気的なつり合いを保つための部分である。」です。
  
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」は、モル濃度の説明です。
  「物質が酸素と結び付く、または電子を失う変化である。」は、酸化の説明です。
  「相手を酸化させ、自身は還元される物質である。」は、酸化剤の説明です。
  「二つの溶液の電気的なつり合いを保つための部分である。」が正しいです。塩橋の説明です。
