# 高校化学 問640
id: 2640
type: single_choice
text: |
  「熱分解や一部の溶解で周囲が冷たくなる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "反応の結果として周囲から熱を吸収する反応である。"
  - "平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。"
  - "周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。"
  - "炭素どうしに二重結合や三重結合をもつ炭化水素である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「熱分解や一部の溶解で周囲が冷たくなる場面」を説明した文として適切なのは「反応の結果として周囲から熱を吸収する反応である。」です。したがって、正解は「反応の結果として周囲から熱を吸収する反応である。」です。
  
  「反応の結果として周囲から熱を吸収する反応である。」が正しいです。この具体例を説明した文です。
  「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」は、この説明は「圧力や濃度を変えると平衡が移る方向を考える場面」と結び付きが強いです。
  「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」は、この説明は「マグネシウムやカルシウムの性質を比べる場面」と結び付きが強いです。
  「炭素どうしに二重結合や三重結合をもつ炭化水素である。」は、この説明は「エチレンやアセチレンの反応性を考える場面」と結び付きが強いです。
