# 化学基礎 問692
id: 1732
type: single_choice
text: |
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "化学エネルギーを電気エネルギーに変えること"
  - "液体から固体への変化であること"
  - "電子を失って正に帯電すること"
  - "電荷のかたよりがほとんどないこと"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」を理解する上では、「化学エネルギーを電気エネルギーに変えること」という見方が大切です。したがって、正解は「化学エネルギーを電気エネルギーに変えること」です。
  
  「化学エネルギーを電気エネルギーに変えること」が正しいです。この説明と結び付きが強い見方です。
  「液体から固体への変化であること」は、その見方は凝固に関係します。
  「電子を失って正に帯電すること」は、その見方は陽イオンに関係します。
  「電荷のかたよりがほとんどないこと」は、その見方は無極性分子に関係します。
