# 高校化学 問902
id: 2902
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "緩衝液 / アンモニアを加えると深い青色のイオンができる場面"
  - "融点 / 氷が溶け始める温度を考える場面"
  - "錯イオン / エタノールの性質や利用を考える場面"
  - "アルコール / 血液や実験用の溶液で pH を保ちたい場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「融点 / 氷が溶け始める温度を考える場面」です。したがって、正解は「融点 / 氷が溶け始める温度を考える場面」です。
  
  「緩衝液 / アンモニアを加えると深い青色のイオンができる場面」は、用語と場面の対応が合っていません。
  「融点 / 氷が溶け始める温度を考える場面」が正しいです。用語と場面の対応が合っています。
  「錯イオン / エタノールの性質や利用を考える場面」は、用語と場面の対応が合っていません。
  「アルコール / 血液や実験用の溶液で pH を保ちたい場面」は、用語と場面の対応が合っていません。
