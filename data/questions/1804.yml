# 化学基礎 問764
id: 1804
type: single_choice
text: |
  「固体から直接気体になること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
  - "成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
  - "固体が液体にならずに気体になる状態変化である。"
  - "固体が液体に変わる状態変化である。"
correct: 2
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「固体から直接気体になること」という見方と最も関係が深い説明は「固体が液体にならずに気体になる状態変化である。」です。したがって、正解は「固体が液体にならずに気体になる状態変化である。」です。
  
  「金属元素を炎に入れたときに特有の色を示す反応である。」は、その説明で大切なのは「金属元素ごとに炎の色が異なること」という見方です。
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」は、その説明で大切なのは「移動しやすさの違いを利用すること」という見方です。
  「固体が液体にならずに気体になる状態変化である。」が正しいです。この見方と最も関係が深い説明です。
  「固体が液体に変わる状態変化である。」は、その説明で大切なのは「固体から液体への変化であること」という見方です。
