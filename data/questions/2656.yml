# 高校化学 問656
id: 2656
type: single_choice
text: |
  「平衡がどちらにかたよっているかを数値で見る場面」を説明した文として、最も適切なものはどれか。
choices:
  - "化学平衡の状態を表す、平衡時の濃度や分圧の比である。"
  - "一方の原子が電子対を与えてできる共有結合である。"
  - "分子の端にアルデヒド基をもつ有機化合物である。"
  - "代表的な単糖類で、生物のエネルギー源として重要な化合物である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「平衡がどちらにかたよっているかを数値で見る場面」を説明した文として適切なのは「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」です。したがって、正解は「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」です。
  
  「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」が正しいです。この具体例を説明した文です。
  「一方の原子が電子対を与えてできる共有結合である。」は、この説明は「アンモニアが金属イオンに電子対を与える場面」と結び付きが強いです。
  「分子の端にアルデヒド基をもつ有機化合物である。」は、この説明は「ホルムアルデヒドやアセトアルデヒドを考える場面」と結び付きが強いです。
  「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」は、この説明は「血糖や発酵の材料として使われる場面」と結び付きが強いです。
