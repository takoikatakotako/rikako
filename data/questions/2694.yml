# 高校化学 問694
id: 2694
type: single_choice
text: |
  「アミノ酸がつながってペプチドになる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "混合気体の全圧は各気体の分圧の和になるという法則である。"
  - "その温度でそれ以上溶質が溶けない状態の溶液である。"
  - "アミノ酸どうしが縮合してできる結合である。"
  - "水との親和性が高く、比較的安定なコロイドである。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「アミノ酸がつながってペプチドになる場面」を説明した文として適切なのは「アミノ酸どうしが縮合してできる結合である。」です。したがって、正解は「アミノ酸どうしが縮合してできる結合である。」です。
  
  「混合気体の全圧は各気体の分圧の和になるという法則である。」は、この説明は「酸素と窒素が混ざった気体の圧力を考える場面」と結び付きが強いです。
  「その温度でそれ以上溶質が溶けない状態の溶液である。」は、この説明は「食塩を加えても底に残るようになった食塩水を考える場面」と結び付きが強いです。
  「アミノ酸どうしが縮合してできる結合である。」が正しいです。この具体例を説明した文です。
  「水との親和性が高く、比較的安定なコロイドである。」は、この説明は「デンプンやゼラチンが水中で安定しやすい場面」と結び付きが強いです。
