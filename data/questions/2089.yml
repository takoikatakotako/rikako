# 高校化学 問89
id: 2089
type: single_choice
text: |
  アニリンについての説明として、最も適切なものはどれか。
choices:
  - "ベンゼン環にアミノ基が直接結び付いた化合物である。"
  - "周期表18族に属し、化学的に安定な気体元素の総称である。"
  - "中心となる金属イオンに配位子が結び付いたイオンである。"
  - "周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  アニリンは、ベンゼン環にアミノ基が直接結び付いた化合物である。 したがって、正解は「ベンゼン環にアミノ基が直接結び付いた化合物である。」です。
  
  「ベンゼン環にアミノ基が直接結び付いた化合物である。」が正しいです。アニリンの説明です。
  「周期表18族に属し、化学的に安定な気体元素の総称である。」は、貴ガスの説明です。
  「中心となる金属イオンに配位子が結び付いたイオンである。」は、錯イオンの説明です。
  「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」は、遷移元素の説明です。
