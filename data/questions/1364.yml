# 化学基礎 問324
id: 1364
type: single_choice
text: |
  金属結合について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "金属原子が自由電子を介して結び付く結合である。"
  - "陽イオンと陰イオンの静電気的な引力による結び付きである。"
  - "原子が結び付いてできた、物質の性質を示す小さな粒子である。"
  - "分子の中で電荷のかたよりがほとんどない分子である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  金属結合は、金属原子が自由電子を介して結び付く結合である。 したがって、正解は「金属原子が自由電子を介して結び付く結合である。」です。
  
  「金属原子が自由電子を介して結び付く結合である。」が正しいです。金属結合の説明です。
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」は、イオン結合の説明です。
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」は、分子の説明です。
  「分子の中で電荷のかたよりがほとんどない分子である。」は、無極性分子の説明です。
