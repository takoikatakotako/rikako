# 高校化学 問268
id: 2268
type: single_choice
text: |
  「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "電気分解"
  - "アルカリ土類金属"
  - "陰極"
  - "飽和炭化水素"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。 に当てはまる語はアルカリ土類金属です。したがって、正解は「アルカリ土類金属」です。
  
  「電気分解」は、「電気エネルギーを使って自発的でない化学変化を起こす操作である。」に当てはまる語です。
  「アルカリ土類金属」が正しいです。「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」に当てはまる語です。
  「陰極」は、「電気分解で還元が起こる電極である。」に当てはまる語です。
  「飽和炭化水素」は、「炭素どうしが単結合だけでつながった炭化水素である。」に当てはまる語です。
