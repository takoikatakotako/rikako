# 化学基礎 問5
id: 672
type: single_choice
text: |
  塩化ナトリウムのようなイオン結晶の性質として、最も適切なものはどれか。
choices:
  - "固体のままでも、電気をよく通す。"
  - "水に溶かしても、電気を通さない。"
  - "水溶液や融解した状態では、電気を通す。"
  - "非常に低い温度でしか存在できない。"
correct: 2
explanation: |
  この問題は、「イオン結晶がいつ電気を通すか」を考える問題です。
  
  イオン結晶では、固体のときはイオンが動けないので電気を通しにくいです。しかし、水に溶けたり融解したりすると、イオンが動けるようになるので電気を通します。したがって、正解は「水溶液や融解した状態では、電気を通す」です。
  
  「固体のままでも、電気をよく通す」は、イオンが動けないので適切ではありません。
  「水に溶かしても、電気を通さない」は、水溶液ではイオンが動けるので適切ではありません。
  「水溶液や融解した状態では、電気を通す」が正しいです。イオンが自由に動けるようになるためです。
  「非常に低い温度でしか存在できない」は、イオン結晶の性質の説明として適切ではありません。
