# 高校化学 問222
id: 2222
type: single_choice
text: |
  「その温度でそれ以上溶質が溶けない状態の溶液である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "アンモニア合成"
  - "水のイオン積"
  - "塩の加水分解"
  - "飽和溶液"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  その温度でそれ以上溶質が溶けない状態の溶液である。 に当てはまる語は飽和溶液です。したがって、正解は「飽和溶液」です。
  
  「アンモニア合成」は、「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」に当てはまる語です。
  「水のイオン積」は、「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」に当てはまる語です。
  「塩の加水分解」は、「塩のイオンが水と反応して溶液の性質を変える現象である。」に当てはまる語です。
  「飽和溶液」が正しいです。「その温度でそれ以上溶質が溶けない状態の溶液である。」に当てはまる語です。
