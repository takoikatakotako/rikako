# 化学基礎 問341
id: 1381
type: single_choice
text: |
  イオン化傾向について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "化学の知識が生活、産業、環境、医療などに役立つという見方である。"
  - "金属が電子を失ってイオンになりやすい性質の強さである。"
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
  - "物質が酸素と結び付く、または電子を失う変化である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  イオン化傾向は、金属が電子を失ってイオンになりやすい性質の強さである。 したがって、正解は「金属が電子を失ってイオンになりやすい性質の強さである。」です。
  
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」は、化学が拓く世界の説明です。
  「金属が電子を失ってイオンになりやすい性質の強さである。」が正しいです。イオン化傾向の説明です。
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」は、モル濃度の説明です。
  「物質が酸素と結び付く、または電子を失う変化である。」は、酸化の説明です。
