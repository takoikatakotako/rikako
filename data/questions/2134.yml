# 高校化学 問134
id: 2134
type: single_choice
text: |
  疎水コロイドと最も関係が深い場面として、適切なものはどれか。
choices:
  - "アンモニア水が強塩基ほど完全には電離しない場面"
  - "どの塩基がより電離しやすいかを比べる場面"
  - "金属や硫黄のコロイドが電解質で沈みやすい場面"
  - "温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  金属や硫黄のコロイドが電解質で沈みやすい場面は、疎水コロイドと結び付きが強い場面です。したがって、正解は「金属や硫黄のコロイドが電解質で沈みやすい場面」です。
  
  「アンモニア水が強塩基ほど完全には電離しない場面」は、弱塩基と結び付きが強い場面です。
  「どの塩基がより電離しやすいかを比べる場面」は、塩基解離定数と結び付きが強い場面です。
  「金属や硫黄のコロイドが電解質で沈みやすい場面」が正しいです。これは疎水コロイドと結び付きが強い場面です。
  「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」は、溶解度と結び付きが強い場面です。
