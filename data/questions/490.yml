# 令和7年度 ITパスポート 公開問題 問69
id: 490
type: single_choice
text: |
  バイオメトリクス認証の他人入率と本人拒否率に関する次の記述中のa,bに入
  れる字句の適切な組合せはどれか。
  バイオメトリクス認証の認証精度において、他人受入率を低く抑えようとすると
  が高くなり、本人拒否率を低く抑えようとすると
  が高くなる。
  a
  b
choices:
  - "安全性 / 可用性"
  - "安全性 / 利便性"
  - "利便性 / 安全性"
  - "利便性 / 可用性"
correct: 1
explanation: |
  この問題の公開解答では「安全性 / 利便性」が正解とされています。
  
  「安全性 / 可用性」は公開解答では正解ではありません。
  「安全性 / 利便性」が公開解答で正解とされています。
  「利便性 / 安全性」は公開解答では正解ではありません。
  「利便性 / 可用性」は公開解答では正解ではありません。
