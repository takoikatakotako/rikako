# 化学基礎 問495
id: 1535
type: single_choice
text: |
  非電解質を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水溶液でも電流をほとんど通さないこと"
  - "水素イオンに注目すること"
  - "酸と塩基が打ち消し合うこと"
  - "どのくらいイオンに分かれるかを表すこと"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  非電解質では、「水溶液でも電流をほとんど通さないこと」という見方が大切です。したがって、正解は「水溶液でも電流をほとんど通さないこと」です。
  
  「水溶液でも電流をほとんど通さないこと」が正しいです。非電解質の要点を表しています。
  「水素イオンに注目すること」は、酸に関係する見方です。
  「酸と塩基が打ち消し合うこと」は、中和に関係する見方です。
  「どのくらいイオンに分かれるかを表すこと」は、電離度に関係する見方です。
