# 化学基礎 問408
id: 1448
type: single_choice
text: |
  「二種類以上の元素が結び付いてできている純物質である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "単体"
  - "化学変化"
  - "化合物"
  - "蒸発"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  二種類以上の元素が結び付いてできている純物質である。 に当てはまる語は化合物です。したがって、正解は「化合物」です。
  
  「単体」は、「一種類の元素だけからできている物質である。」に当てはまる語です。
  「化学変化」は、「もとの物質とは別の物質ができる変化である。」に当てはまる語です。
  「化合物」が正しいです。「二種類以上の元素が結び付いてできている純物質である。」に当てはまる語です。
  「蒸発」は、「液体が気体になる状態変化である。」に当てはまる語です。
