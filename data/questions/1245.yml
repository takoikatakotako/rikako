# 化学基礎 問205
id: 1245
type: single_choice
text: |
  「酸素だけからなる気体」に最も関係が深い語として、適切なものはどれか。
choices:
  - "混合物"
  - "単体"
  - "純物質"
  - "化合物"
correct: 2
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「酸素だけからなる気体」に最も関係が深いのは純物質です。したがって、正解は「純物質」です。
  
  「混合物」は、この例に最も関係が深い語ではありません。
  「単体」は、この例に最も関係が深い語ではありません。
  「純物質」が正しいです。この例は純物質に関係しています。
  「化合物」は、この例に最も関係が深い語ではありません。
