# 高校化学 問679
id: 2679
type: single_choice
text: |
  「エチレンやアセチレンの反応性を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "グルコースが多数つながった植物の貯蔵多糖である。"
  - "液体1 molが気体になるときに吸収する熱量である。"
  - "金属原子が規則正しく並び、自由電子が全体に広がった結晶である。"
  - "炭素どうしに二重結合や三重結合をもつ炭化水素である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「エチレンやアセチレンの反応性を考える場面」を説明した文として適切なのは「炭素どうしに二重結合や三重結合をもつ炭化水素である。」です。したがって、正解は「炭素どうしに二重結合や三重結合をもつ炭化水素である。」です。
  
  「グルコースが多数つながった植物の貯蔵多糖である。」は、この説明は「米やいもに多く含まれる成分を考える場面」と結び付きが強いです。
  「液体1 molが気体になるときに吸収する熱量である。」は、この説明は「水を水蒸気に変えるのに必要な熱を考える場面」と結び付きが強いです。
  「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」は、この説明は「金属が電気を通したりのびたりする理由を考える場面」と結び付きが強いです。
  「炭素どうしに二重結合や三重結合をもつ炭化水素である。」が正しいです。この具体例を説明した文です。
