# 高校化学 問859
id: 2859
type: single_choice
text: |
  「電離する粒子と電離していない粒子が平衡になっている状態である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "状態変化に必要な熱に注目すること"
  - "電離と元に戻る変化がつり合うこと"
  - "共有結合が全体に広がること"
  - "小さな粒子が分散している状態であること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「電離する粒子と電離していない粒子が平衡になっている状態である。」を理解する上では、「電離と元に戻る変化がつり合うこと」という見方が大切です。したがって、正解は「電離と元に戻る変化がつり合うこと」です。
  
  「状態変化に必要な熱に注目すること」は、その見方は融解熱に関係します。
  「電離と元に戻る変化がつり合うこと」が正しいです。この説明と結び付きが強い見方です。
  「共有結合が全体に広がること」は、その見方は共有結合の結晶に関係します。
  「小さな粒子が分散している状態であること」は、その見方はコロイドに関係します。
