# 化学基礎 問558
id: 1598
type: single_choice
text: |
  「水や二酸化炭素のように複数の元素からできた物質を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "二種類以上の元素が結び付いてできている純物質である。"
  - "陽子数は同じで中性子数が異なる原子どうしである。"
  - "金属原子が自由電子を介して結び付く結合である。"
  - "水溶液中で水素イオンを生じる物質である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「水や二酸化炭素のように複数の元素からできた物質を考える場面」を説明した文として適切なのは「二種類以上の元素が結び付いてできている純物質である。」です。したがって、正解は「二種類以上の元素が結び付いてできている純物質である。」です。
  
  「二種類以上の元素が結び付いてできている純物質である。」が正しいです。この具体例を説明した文です。
  「陽子数は同じで中性子数が異なる原子どうしである。」は、この説明は「炭素12と炭素14を比べる場面」と結び付きが強いです。
  「金属原子が自由電子を介して結び付く結合である。」は、この説明は「金属中で自由電子が動けるため電気を通すことを考える場面」と結び付きが強いです。
  「水溶液中で水素イオンを生じる物質である。」は、この説明は「塩酸が水溶液中で水素イオンを生じる場面」と結び付きが強いです。
