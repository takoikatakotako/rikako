# 高校化学 問630
id: 2630
type: single_choice
text: |
  「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」を説明した文として、最も適切なものはどれか。
choices:
  - "電気エネルギーを使って自発的でない化学変化を起こす操作である。"
  - "窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。"
  - "コロイド粒子が不規則に動いて見える現象である。"
  - "周期表17族に属し、陰イオンになりやすい非金属元素の総称である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」を説明した文として適切なのは「コロイド粒子が不規則に動いて見える現象である。」です。したがって、正解は「コロイド粒子が不規則に動いて見える現象である。」です。
  
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」は、この説明は「水溶液に電流を流して物質を分解する場面」と結び付きが強いです。
  「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」は、この説明は「高圧や触媒を利用してアンモニアを得る場面」と結び付きが強いです。
  「コロイド粒子が不規則に動いて見える現象である。」が正しいです。この具体例を説明した文です。
  「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」は、この説明は「フッ素や塩素、臭素の反応性を比べる場面」と結び付きが強いです。
