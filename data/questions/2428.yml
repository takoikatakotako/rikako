# 高校化学 問428
id: 2428
type: single_choice
text: |
  コロイドを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水となじみにくく不安定になりやすいこと"
  - "固体と液体の境目の温度に注目すること"
  - "液体から出た蒸気が示す圧力に注目すること"
  - "小さな粒子が分散している状態であること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  コロイドでは、「小さな粒子が分散している状態であること」という見方が大切です。したがって、正解は「小さな粒子が分散している状態であること」です。
  
  「水となじみにくく不安定になりやすいこと」は、疎水コロイドに関係する見方です。
  「固体と液体の境目の温度に注目すること」は、融点に関係する見方です。
  「液体から出た蒸気が示す圧力に注目すること」は、蒸気圧に関係する見方です。
  「小さな粒子が分散している状態であること」が正しいです。コロイドの要点を表しています。
