# 化学基礎 問53
id: 1093
type: single_choice
text: |
  クロマトグラフィーで物質が分かれる理由として、最も適切なものはどれか。
choices:
  - "移動しやすさに違いがあるから。"
  - "全ての物質の質量が同じになるから。"
  - "粒子が必ず磁石に付くから。"
  - "全ての成分が蒸発するから。"
correct: 0
explanation: |
  この問題は、「クロマトグラフィーの分離のしくみ」を考える問題です。
  
  クロマトグラフィーでは、成分ごとに移動しやすさが違うため、進む速さに差が出て分かれます。したがって、正解は「移動しやすさに違いがあるから」です。
  
  「移動しやすさに違いがあるから」が正しいです。クロマトグラフィーの基本です。
  「全ての物質の質量が同じになるから」は、適切ではありません。
  「粒子が必ず磁石に付くから」は、適切ではありません。
  「全ての成分が蒸発するから」は、クロマトグラフィーの説明ではありません。
