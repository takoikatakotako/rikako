# 高校化学 問775
id: 2775
type: single_choice
text: |
  「金属元素ごとに炎の色が異なること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "炎色反応"
  - "融解熱"
  - "共有結合の結晶"
  - "コロイド"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「金属元素ごとに炎の色が異なること」という見方が大切なのは炎色反応です。したがって、正解は「炎色反応」です。
  
  「炎色反応」が正しいです。この見方が大切な語です。
  「融解熱」は、その語で大切なのは「状態変化に必要な熱に注目すること」という見方です。
  「共有結合の結晶」は、その語で大切なのは「共有結合が全体に広がること」という見方です。
  「コロイド」は、その語で大切なのは「小さな粒子が分散している状態であること」という見方です。
