# 高校化学 問485
id: 2485
type: single_choice
text: |
  カルボン酸を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "カルボキシ基をもち酸性を示すこと"
  - "アミノ基とカルボキシ基をあわせもつこと"
  - "単糖類でエネルギー源になりやすいこと"
  - "植物の体を支える多糖であること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  カルボン酸では、「カルボキシ基をもち酸性を示すこと」という見方が大切です。したがって、正解は「カルボキシ基をもち酸性を示すこと」です。
  
  「カルボキシ基をもち酸性を示すこと」が正しいです。カルボン酸の要点を表しています。
  「アミノ基とカルボキシ基をあわせもつこと」は、アミノ酸に関係する見方です。
  「単糖類でエネルギー源になりやすいこと」は、グルコースに関係する見方です。
  「植物の体を支える多糖であること」は、セルロースに関係する見方です。
