# 高校化学 問396
id: 2396
type: single_choice
text: |
  「米やいもに多く含まれる成分を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "アミノ酸"
  - "グルコース"
  - "デンプン"
  - "飽和炭化水素"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  米やいもに多く含まれる成分を考える場面 と最も関係が深いのはデンプンです。したがって、正解は「デンプン」です。
  
  「アミノ酸」は、「グリシンやアラニンの構造を考える場面」と結び付きが強い語です。
  「グルコース」は、「血糖や発酵の材料として使われる場面」と結び付きが強い語です。
  「デンプン」が正しいです。この具体例と最も関係が深い語です。
  「飽和炭化水素」は、「メタンやエタンの性質を考える場面」と結び付きが強い語です。
