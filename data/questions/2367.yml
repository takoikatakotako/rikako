# 高校化学 問367
id: 2367
type: single_choice
text: |
  「ナトリウムやカリウムの性質を比べる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "不飽和炭化水素"
  - "アルカリ金属"
  - "置換反応"
  - "アルコール"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  ナトリウムやカリウムの性質を比べる場面 と最も関係が深いのはアルカリ金属です。したがって、正解は「アルカリ金属」です。
  
  「不飽和炭化水素」は、「エチレンやアセチレンの反応性を考える場面」と結び付きが強い語です。
  「アルカリ金属」が正しいです。この具体例と最も関係が深い語です。
  「置換反応」は、「メタンの水素が塩素に置き換わる場面」と結び付きが強い語です。
  「アルコール」は、「エタノールの性質や利用を考える場面」と結び付きが強い語です。
