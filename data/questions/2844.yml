# 高校化学 問844
id: 2844
type: single_choice
text: |
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "ポリエステルの一種で再利用もしやすいこと"
  - "固体と液体の境目の温度に注目すること"
  - "充電して再び使えること"
  - "0 K を基準に温度を考えること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」を理解する上では、「充電して再び使えること」という見方が大切です。したがって、正解は「充電して再び使えること」です。
  
  「ポリエステルの一種で再利用もしやすいこと」は、その見方はPETに関係します。
  「固体と液体の境目の温度に注目すること」は、その見方は融点に関係します。
  「充電して再び使えること」が正しいです。この説明と結び付きが強い見方です。
  「0 K を基準に温度を考えること」は、その見方は絶対温度に関係します。
