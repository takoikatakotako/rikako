# 化学基礎 問666
id: 1706
type: single_choice
text: |
  「原子核の中にある陽子数と中性子数の合計である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸素との結び付きや電子の放出に注目すること"
  - "水溶液や融解状態で電流を通すこと"
  - "陽子数と中性子数の合計であること"
  - "水に溶けない固体を液体から分けること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「原子核の中にある陽子数と中性子数の合計である。」を理解する上では、「陽子数と中性子数の合計であること」という見方が大切です。したがって、正解は「陽子数と中性子数の合計であること」です。
  
  「酸素との結び付きや電子の放出に注目すること」は、その見方は酸化に関係します。
  「水溶液や融解状態で電流を通すこと」は、その見方は電解質に関係します。
  「陽子数と中性子数の合計であること」が正しいです。この説明と結び付きが強い見方です。
  「水に溶けない固体を液体から分けること」は、その見方はろ過に関係します。
