# 化学基礎 問596
id: 1636
type: single_choice
text: |
  「医療や年代測定に利用される炭素14を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "一種類の物質だけからできていて、性質が一定である物質である。"
  - "液体が気体になる状態変化である。"
  - "放射線を出しながら別の原子へ変わっていく同位体である。"
  - "原子のいちばん外側の電子殻にある電子である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「医療や年代測定に利用される炭素14を考える場面」を説明した文として適切なのは「放射線を出しながら別の原子へ変わっていく同位体である。」です。したがって、正解は「放射線を出しながら別の原子へ変わっていく同位体である。」です。
  
  「一種類の物質だけからできていて、性質が一定である物質である。」は、この説明は「酸素だけが入った容器を考える場面」と結び付きが強いです。
  「液体が気体になる状態変化である。」は、この説明は「ぬれた床の水がしだいに乾く場面」と結び付きが強いです。
  「放射線を出しながら別の原子へ変わっていく同位体である。」が正しいです。この具体例を説明した文です。
  「原子のいちばん外側の電子殻にある電子である。」は、この説明は「ナトリウムが電子を1個失いやすい理由を考える場面」と結び付きが強いです。
