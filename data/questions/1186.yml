# 化学基礎 問146
id: 1186
type: single_choice
text: |
  電離度についての説明として、最も適切なものはどれか。
choices:
  - "水溶液の酸性やアルカリ性によって色が変わる薬品である。"
  - "溶けた物質のうち、電離した割合を表す。"
  - "食品などが酸化するのを防ぐために用いられる物質である。"
  - "多数の小さな単位がつながってできた大きな分子からなる化合物である。"
correct: 1
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  電離度は、溶けた物質のうち、電離した割合を表す。したがって、正解は「溶けた物質のうち、電離した割合を表す。」です。
  
  「水溶液の酸性やアルカリ性によって色が変わる薬品である。」は、指示薬の説明です。
  「溶けた物質のうち、電離した割合を表す。」が正しいです。電離度の説明です。
  「食品などが酸化するのを防ぐために用いられる物質である。」は、酸化防止剤の説明です。
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」は、高分子化合物の説明です。
