# 化学基礎 問449
id: 1489
type: single_choice
text: |
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "ダニエル電池"
  - "酸"
  - "中和"
  - "高分子化合物"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  多数の小さな単位がつながってできた大きな分子からなる化合物である。 に当てはまる語は高分子化合物です。したがって、正解は「高分子化合物」です。
  
  「ダニエル電池」は、「亜鉛と銅の反応を利用して電気を取り出す電池である。」に当てはまる語です。
  「酸」は、「水溶液中で水素イオンを生じる物質である。」に当てはまる語です。
  「中和」は、「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」に当てはまる語です。
  「高分子化合物」が正しいです。「多数の小さな単位がつながってできた大きな分子からなる化合物である。」に当てはまる語です。
