# 化学基礎 問51
id: 1091
type: single_choice
text: |
  次のうち、均一な混合物として最も適切なものはどれか。
choices:
  - "食塩水"
  - "砂と鉄粉の混合物"
  - "泥水"
  - "牛乳と氷の混合物"
correct: 0
explanation: |
  この問題は、「見た目が一様な混合物はどれか」を考える問題です。
  
  食塩水は、食塩が水の中に一様に溶けているので、均一な混合物です。したがって、正解は「食塩水」です。
  
  「食塩水」が正しいです。全体が一様に見える混合物です。
  「砂と鉄粉の混合物」は、成分が見分けられるので均一ではありません。
  「泥水」は、粒が混ざっていて一様ではありません。
  「牛乳と氷の混合物」は、一様な混合物ではありません。
