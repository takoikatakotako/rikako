# 高校化学 問91
id: 2091
type: single_choice
text: |
  PETについての説明として、最も適切なものはどれか。
choices:
  - "六角形の環状構造をもつ代表的な芳香族炭化水素である。"
  - "ベンゼン環にアミノ基が直接結び付いた化合物である。"
  - "ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。"
  - "使い終わった資源や製品を回収し、再び利用する考え方である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  PETは、ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。 したがって、正解は「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」です。
  
  「六角形の環状構造をもつ代表的な芳香族炭化水素である。」は、ベンゼンの説明です。
  「ベンゼン環にアミノ基が直接結び付いた化合物である。」は、アニリンの説明です。
  「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」が正しいです。PETの説明です。
  「使い終わった資源や製品を回収し、再び利用する考え方である。」は、資源の再利用の説明です。
