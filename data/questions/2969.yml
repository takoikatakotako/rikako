# 高校化学 問969
id: 2969
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "ハロゲン / フッ素や塩素、臭素の反応性を比べる場面"
  - "コロイド / 燃焼や中和で容器が温かくなる場面"
  - "発熱反応 / 流した電流が大きいほど析出量が増える場面"
  - "ファラデーの法則 / 牛乳やゼラチン溶液のような見た目の系を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「ハロゲン / フッ素や塩素、臭素の反応性を比べる場面」です。したがって、正解は「ハロゲン / フッ素や塩素、臭素の反応性を比べる場面」です。
  
  「ハロゲン / フッ素や塩素、臭素の反応性を比べる場面」が正しいです。用語と場面の対応が合っています。
  「コロイド / 燃焼や中和で容器が温かくなる場面」は、用語と場面の対応が合っていません。
  「発熱反応 / 流した電流が大きいほど析出量が増える場面」は、用語と場面の対応が合っていません。
  「ファラデーの法則 / 牛乳やゼラチン溶液のような見た目の系を考える場面」は、用語と場面の対応が合っていません。
