# 化学基礎 問225
id: 1265
type: single_choice
text: |
  「二酸化炭素 CO2 の分子」に最も関係が深い語として、適切なものはどれか。
choices:
  - "極性分子"
  - "無極性分子"
  - "分子"
  - "モル"
correct: 2
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「二酸化炭素 CO2 の分子」に最も関係が深いのは分子です。したがって、正解は「分子」です。
  
  「極性分子」は、この例に最も関係が深い語ではありません。
  「無極性分子」は、この例に最も関係が深い語ではありません。
  「分子」が正しいです。この例は分子に関係しています。
  「モル」は、この例に最も関係が深い語ではありません。
