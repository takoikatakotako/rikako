# 化学基礎 問237
id: 1277
type: single_choice
text: |
  「過マンガン酸カリウム」に最も関係が深い語として、適切なものはどれか。
choices:
  - "還元剤"
  - "イオン化傾向"
  - "酸化剤"
  - "ダニエル電池"
correct: 2
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「過マンガン酸カリウム」に最も関係が深いのは酸化剤です。したがって、正解は「酸化剤」です。
  
  「還元剤」は、この例に最も関係が深い語ではありません。
  「イオン化傾向」は、この例に最も関係が深い語ではありません。
  「酸化剤」が正しいです。この例は酸化剤に関係しています。
  「ダニエル電池」は、この例に最も関係が深い語ではありません。
