# 化学基礎 問870
id: 1910
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "原子番号 / 陽イオンと陰イオンの静電気的な引力による結び付きである。"
  - "イオン結合 / 溶液1L中に溶けている溶質の物質量を表した濃度である。"
  - "陽イオン / 原子や原子団が電子を失って正の電荷をもつ粒子である。"
  - "モル濃度 / 原子核の中にある陽子の数を表す数である。"
correct: 2
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「陽イオン / 原子や原子団が電子を失って正の電荷をもつ粒子である。」です。したがって、正解は「陽イオン / 原子や原子団が電子を失って正の電荷をもつ粒子である。」です。
  
  「原子番号 / 陽イオンと陰イオンの静電気的な引力による結び付きである。」は、用語と説明の対応が合っていません。
  「イオン結合 / 溶液1L中に溶けている溶質の物質量を表した濃度である。」は、用語と説明の対応が合っていません。
  「陽イオン / 原子や原子団が電子を失って正の電荷をもつ粒子である。」が正しいです。用語と説明の対応が合っています。
  「モル濃度 / 原子核の中にある陽子の数を表す数である。」は、用語と説明の対応が合っていません。
