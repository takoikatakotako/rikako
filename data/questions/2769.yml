# 高校化学 問769
id: 2769
type: single_choice
text: |
  「非金属で酸化力が強いこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "化学が築く未来"
  - "分圧の法則"
  - "ハロゲン"
  - "飽和溶液"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「非金属で酸化力が強いこと」という見方が大切なのはハロゲンです。したがって、正解は「ハロゲン」です。
  
  「化学が築く未来」は、その語で大切なのは「化学が社会課題の解決に役立つこと」という見方です。
  「分圧の法則」は、その語で大切なのは「混ざった気体の圧力を足し合わせて考えること」という見方です。
  「ハロゲン」が正しいです。この見方が大切な語です。
  「飽和溶液」は、その語で大切なのは「それ以上溶けない状態であること」という見方です。
