# 令和7年度 ITパスポート 公開問題 問100
id: 376
type: single_choice
text: |
  個人の認証に用いる要素を、知識、所有物及びバイオメトリクスの三つに分類したとき、所有物を要素として用いた認証の例はどれか。
choices:
  - "SMSを用いた認証"
  - "虹彩の特徴を用いた認証"
  - "筆跡や筆圧、スピードなど、文字を書くときの特徴を用いた認証"
  - "本人が事前に設定した質問とそれに対する答えを用いた認証"
correct: 0
explanation: |
  この問題の公開解答では「SMSを用いた認証」が正解とされています。
  
  「SMSを用いた認証」が公開解答で正解とされています。
  「虹彩の特徴を用いた認証」は公開解答では正解ではありません。
  「筆跡や筆圧、スピードなど、文字を書くときの特徴を用いた認証」は公開解答では正解ではありません。
  「本人が事前に設定した質問とそれに対する答えを用いた認証」は公開解答では正解ではありません。
