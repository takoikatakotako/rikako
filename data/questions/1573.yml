# 化学基礎 問533
id: 1573
type: single_choice
text: |
  「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "塩酸と水酸化ナトリウム水溶液を混ぜる場面"
  - "BTB溶液やフェノールフタレインで液性を調べる場面"
  - "ダニエル電池で二つの水溶液をつなぐ場面"
  - "電池、医薬品、素材開発などに化学が生かされる場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」と最も関係が深い場面は「塩酸と水酸化ナトリウム水溶液を混ぜる場面」です。したがって、正解は「塩酸と水酸化ナトリウム水溶液を混ぜる場面」です。
  
  「塩酸と水酸化ナトリウム水溶液を混ぜる場面」が正しいです。この説明と結び付きが強い場面です。
  「BTB溶液やフェノールフタレインで液性を調べる場面」は、「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」と結び付きが強い場面です。
  「ダニエル電池で二つの水溶液をつなぐ場面」は、「二つの溶液の電気的なつり合いを保つための部分である。」と結び付きが強い場面です。
  「電池、医薬品、素材開発などに化学が生かされる場面」は、「化学の知識が生活、産業、環境、医療などに役立つという見方である。」と結び付きが強い場面です。
