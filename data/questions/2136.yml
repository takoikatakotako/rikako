# 高校化学 問136
id: 2136
type: single_choice
text: |
  エンタルピー変化と最も関係が深い場面として、適切なものはどれか。
choices:
  - "反応前後で熱の出入りを比較する場面"
  - "コロイド溶液から余分な電解質を取り除く場面"
  - "デンプンやゼラチンが水中で安定しやすい場面"
  - "物質を燃やしたときに熱が出ることを考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  反応前後で熱の出入りを比較する場面は、エンタルピー変化と結び付きが強い場面です。したがって、正解は「反応前後で熱の出入りを比較する場面」です。
  
  「反応前後で熱の出入りを比較する場面」が正しいです。これはエンタルピー変化と結び付きが強い場面です。
  「コロイド溶液から余分な電解質を取り除く場面」は、透析と結び付きが強い場面です。
  「デンプンやゼラチンが水中で安定しやすい場面」は、親水コロイドと結び付きが強い場面です。
  「物質を燃やしたときに熱が出ることを考える場面」は、反応熱と結び付きが強い場面です。
