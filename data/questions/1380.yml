# 化学基礎 問340
id: 1380
type: single_choice
text: |
  還元剤について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "相手を還元させ、自身は酸化される物質である。"
  - "多数の小さな単位がつながってできた大きな分子からなる化合物である。"
  - "粒子の数をまとめて表すための単位である。"
  - "化学変化を、物質の種類と量の関係が分かるように表した式である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  還元剤は、相手を還元させ、自身は酸化される物質である。 したがって、正解は「相手を還元させ、自身は酸化される物質である。」です。
  
  「相手を還元させ、自身は酸化される物質である。」が正しいです。還元剤の説明です。
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」は、高分子化合物の説明です。
  「粒子の数をまとめて表すための単位である。」は、モルの説明です。
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」は、化学反応式の説明です。
