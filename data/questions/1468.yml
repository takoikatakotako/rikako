# 化学基礎 問428
id: 1468
type: single_choice
text: |
  「粒子の数をまとめて表すための単位である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "還元"
  - "還元剤"
  - "モル"
  - "ダニエル電池"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  粒子の数をまとめて表すための単位である。 に当てはまる語はモルです。したがって、正解は「モル」です。
  
  「還元」は、「物質が酸素を失う、または電子を受け取る変化である。」に当てはまる語です。
  「還元剤」は、「相手を還元させ、自身は酸化される物質である。」に当てはまる語です。
  「モル」が正しいです。「粒子の数をまとめて表すための単位である。」に当てはまる語です。
  「ダニエル電池」は、「亜鉛と銅の反応を利用して電気を取り出す電池である。」に当てはまる語です。
