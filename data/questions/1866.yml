# 化学基礎 問826
id: 1866
type: single_choice
text: |
  「電荷のかたよりがあること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムの陽子数から元素を区別する場面"
  - "塩化ナトリウムが陽イオンと陰イオンの引力でできる場面"
  - "1Lの食塩水にどれだけ溶質が溶けているかを表す場面"
  - "水分子で電荷のかたよりを考える場面"
correct: 3
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「電荷のかたよりがあること」という見方と最も関係が深い場面は「水分子で電荷のかたよりを考える場面」です。したがって、正解は「水分子で電荷のかたよりを考える場面」です。
  
  「ナトリウムの陽子数から元素を区別する場面」は、その場面で大切なのは「陽子数を表す数であること」という見方です。
  「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」は、その場面で大切なのは「電気的な引力で結び付くこと」という見方です。
  「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」は、その場面で大切なのは「1Lあたりの物質量で表すこと」という見方です。
  「水分子で電荷のかたよりを考える場面」が正しいです。この見方と最も関係が深い場面です。
