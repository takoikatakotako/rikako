# 化学基礎 問257
id: 1297
type: single_choice
text: |
  単体の特徴として、最も適切なものはどれか。
choices:
  - "複数の元素が結び付いている"
  - "一種類の元素だけからなる"
  - "新しい物質はできない"
  - "新しい物質ができる"
correct: 1
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  単体では、「一種類の元素だけからなる」という点が大切です。したがって、正解は「一種類の元素だけからなる」です。
  
  「複数の元素が結び付いている」は、化合物に関係する特徴です。
  「一種類の元素だけからなる」が正しいです。単体の特徴を表しています。
  「新しい物質はできない」は、物理変化に関係する特徴です。
  「新しい物質ができる」は、化学変化に関係する特徴です。
