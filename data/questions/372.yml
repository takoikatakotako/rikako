# 令和7年度 ITパスポート 公開問題 問74
id: 372
type: single_choice
text: |
  デジタルフォレンジックスの説明として、適切なものはどれか。
choices:
  - "コンピュータに関する犯罪や法的紛争が生じた際に、コンピュータから削除された電子メールを復元するなどして、証拠を収集し保全することぜい"
  - "システムを実際に攻撃して脆弱性の有無を調べること"
  - "通経路を暗号化するなどして、公衆回線をあたかも専用回線であるかのように利用すること"
  - "電子メールやファイルなどのハッシュデータを本人の秘密鍵で暗号化すること"
correct: 0
explanation: |
  この問題の公開解答では「コンピュータに関する犯罪や法的紛争が生じた際に、コンピュータから削除された電子メールを復元するなどして、証拠を収集し保全することぜい」が正解とされています。
  
  「コンピュータに関する犯罪や法的紛争が生じた際に、コンピュータから削除された電子メールを復元するなどして、証拠を収集し保全することぜい」が公開解答で正解とされています。
  「システムを実際に攻撃して脆弱性の有無を調べること」は公開解答では正解ではありません。
  「通経路を暗号化するなどして、公衆回線をあたかも専用回線であるかのように利用すること」は公開解答では正解ではありません。
  「電子メールやファイルなどのハッシュデータを本人の秘密鍵で暗号化すること」は公開解答では正解ではありません。
