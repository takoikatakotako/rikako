# 高校化学 問253
id: 2253
type: single_choice
text: |
  「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "電気分解"
  - "陰極"
  - "触媒"
  - "反応熱"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。 に当てはまる語は触媒です。したがって、正解は「触媒」です。
  
  「電気分解」は、「電気エネルギーを使って自発的でない化学変化を起こす操作である。」に当てはまる語です。
  「陰極」は、「電気分解で還元が起こる電極である。」に当てはまる語です。
  「触媒」が正しいです。「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」に当てはまる語です。
  「反応熱」は、「化学反応に伴って出入りする熱量である。」に当てはまる語です。
