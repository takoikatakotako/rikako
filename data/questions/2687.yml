# 高校化学 問687
id: 2687
type: single_choice
text: |
  「芳香族化合物の基本構造を学ぶ場面」を説明した文として、最も適切なものはどれか。
choices:
  - "気液平衡にあるとき、気体が示す圧力である。"
  - "陽イオンと陰イオンが規則正しく並んでできた結晶である。"
  - "溶液の凝固点が純粋な溶媒より低くなる現象である。"
  - "六角形の環状構造をもつ代表的な芳香族炭化水素である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「芳香族化合物の基本構造を学ぶ場面」を説明した文として適切なのは「六角形の環状構造をもつ代表的な芳香族炭化水素である。」です。したがって、正解は「六角形の環状構造をもつ代表的な芳香族炭化水素である。」です。
  
  「気液平衡にあるとき、気体が示す圧力である。」は、この説明は「ふたをした容器の中で液体の上にたまる蒸気を考える場面」と結び付きが強いです。
  「陽イオンと陰イオンが規則正しく並んでできた結晶である。」は、この説明は「塩化ナトリウムの結晶のつくりを考える場面」と結び付きが強いです。
  「溶液の凝固点が純粋な溶媒より低くなる現象である。」は、この説明は「凍結防止剤をまいた道路の水が凍りにくくなる場面」と結び付きが強いです。
  「六角形の環状構造をもつ代表的な芳香族炭化水素である。」が正しいです。この具体例を説明した文です。
