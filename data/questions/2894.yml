# 高校化学 問894
id: 2894
type: single_choice
text: |
  「アミノ酸どうしが縮合してできる結合である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "アミノ酸どうしをつなぐ結合であること"
  - "化学反応のエネルギーが光として出ること"
  - "反応を始めるための壁に注目すること"
  - "電離が部分的に起こること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「アミノ酸どうしが縮合してできる結合である。」を理解する上では、「アミノ酸どうしをつなぐ結合であること」という見方が大切です。したがって、正解は「アミノ酸どうしをつなぐ結合であること」です。
  
  「アミノ酸どうしをつなぐ結合であること」が正しいです。この説明と結び付きが強い見方です。
  「化学反応のエネルギーが光として出ること」は、その見方は化学発光に関係します。
  「反応を始めるための壁に注目すること」は、その見方は活性化エネルギーに関係します。
  「電離が部分的に起こること」は、その見方は弱酸に関係します。
