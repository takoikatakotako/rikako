# 化学基礎 問584
id: 1624
type: single_choice
text: |
  「レモン水とせっけん水の酸性・塩基性を比べる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "二つの溶液の電気的なつり合いを保つための部分である。"
  - "化学の知識が生活、産業、環境、医療などに役立つという見方である。"
  - "水溶液の酸性や塩基性の強さを表す尺度である。"
  - "一種類の元素だけからできている物質である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「レモン水とせっけん水の酸性・塩基性を比べる場面」を説明した文として適切なのは「水溶液の酸性や塩基性の強さを表す尺度である。」です。したがって、正解は「水溶液の酸性や塩基性の強さを表す尺度である。」です。
  
  「二つの溶液の電気的なつり合いを保つための部分である。」は、この説明は「ダニエル電池で二つの水溶液をつなぐ場面」と結び付きが強いです。
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」は、この説明は「電池、医薬品、素材開発などに化学が生かされる場面」と結び付きが強いです。
  「水溶液の酸性や塩基性の強さを表す尺度である。」が正しいです。この具体例を説明した文です。
  「一種類の元素だけからできている物質である。」は、この説明は「鉄や酸素のように一種類の元素だけからできた物質を考える場面」と結び付きが強いです。
