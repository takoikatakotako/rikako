# 化学基礎 問718
id: 1758
type: single_choice
text: |
  「周期表で似た性質の元素が縦に並ぶことを見る場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "水溶液でも電流をほとんど通さないこと"
  - "性質が周期的にくり返されること"
  - "沸点の違いを利用すること"
  - "物質の種類が変わらないこと"
correct: 1
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「周期表で似た性質の元素が縦に並ぶことを見る場面」では、「性質が周期的にくり返されること」という見方が大切です。したがって、正解は「性質が周期的にくり返されること」です。
  
  「水溶液でも電流をほとんど通さないこと」は、その見方は砂糖水が電流をほとんど通さない場面よりも非電解質と結び付きが強いです。
  「性質が周期的にくり返されること」が正しいです。この具体例で大切になる見方です。
  「沸点の違いを利用すること」は、その見方は水とエタノールの混合物を沸点の差で分ける場面よりも蒸留と結び付きが強いです。
  「物質の種類が変わらないこと」は、その見方は氷が溶けて水になる場面よりも物理変化と結び付きが強いです。
