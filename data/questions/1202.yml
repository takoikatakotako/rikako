# 化学基礎 問162
id: 1202
type: single_choice
text: |
  蒸発の例として、最も適切なものはどれか。
choices:
  - "水たまりが乾く変化"
  - "水が氷になる変化"
  - "ドライアイスが気体になる変化"
  - "炭素の原子番号が 6 であること"
correct: 0
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  水たまりが乾く変化は、蒸発の例です。したがって、正解は「水たまりが乾く変化」です。
  
  「水たまりが乾く変化」が正しいです。これは蒸発の例です。
  「水が氷になる変化」は、凝固の例として見る方が適切です。
  「ドライアイスが気体になる変化」は、昇華の例として見る方が適切です。
  「炭素の原子番号が 6 であること」は、原子番号の例として見る方が適切です。
