# 高校化学 問57
id: 2057
type: single_choice
text: |
  ルシャトリエの原理についての説明として、最も適切なものはどれか。
choices:
  - "平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。"
  - "塩のイオンが水と反応して溶液の性質を変える現象である。"
  - "水溶液中で一部だけ電離する塩基である。"
  - "塩基の電離のしやすさを表す定数である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  ルシャトリエの原理は、平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。 したがって、正解は「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」です。
  
  「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」が正しいです。ルシャトリエの原理の説明です。
  「塩のイオンが水と反応して溶液の性質を変える現象である。」は、塩の加水分解の説明です。
  「水溶液中で一部だけ電離する塩基である。」は、弱塩基の説明です。
  「塩基の電離のしやすさを表す定数である。」は、塩基解離定数の説明です。
