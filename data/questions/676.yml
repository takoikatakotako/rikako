# 化学基礎 問9
id: 676
type: single_choice
text: |
  pH が 3 の水溶液についての説明として、最も適切なものはどれか。
choices:
  - "中性である。"
  - "アルカリ性である。"
  - "酸性である。"
  - "酸性でもアルカリ性でもない。"
correct: 2
explanation: |
  この問題は、「pH の値から水溶液の性質を判断できるか」を確認する問題です。
  
  pH が 7 より小さい水溶液は酸性です。pH が 3 は 7 よりかなり小さいので、酸性の水溶液だと分かります。したがって、正解は「酸性である」です。
  
  「中性である」は、pH 7 のときに当てはまります。
  「アルカリ性である」は、pH が 7 より大きいときに当てはまります。
  「酸性である」が正しいです。pH 3 は酸性を示します。
  「酸性でもアルカリ性でもない」は、適切ではありません。
