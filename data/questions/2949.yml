# 高校化学 問949
id: 2949
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "陰極 / 金属イオンが電子を受け取って析出する電極を考える場面"
  - "ボイルの法則 / ガラスのように一定の融点を示しにくい固体を考える場面"
  - "アモルファス / 顕微鏡でコロイド粒子が細かく動く様子を観察する場面"
  - "ブラウン運動 / 注射器の口をふさいで押すと体積が減って圧力が上がる場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「陰極 / 金属イオンが電子を受け取って析出する電極を考える場面」です。したがって、正解は「陰極 / 金属イオンが電子を受け取って析出する電極を考える場面」です。
  
  「陰極 / 金属イオンが電子を受け取って析出する電極を考える場面」が正しいです。用語と場面の対応が合っています。
  「ボイルの法則 / ガラスのように一定の融点を示しにくい固体を考える場面」は、用語と場面の対応が合っていません。
  「アモルファス / 顕微鏡でコロイド粒子が細かく動く様子を観察する場面」は、用語と場面の対応が合っていません。
  「ブラウン運動 / 注射器の口をふさいで押すと体積が減って圧力が上がる場面」は、用語と場面の対応が合っていません。
