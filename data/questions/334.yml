# 令和7年度 ITパスポート 公開問題 問68
id: 334
type: single_choice
text: |
  CSIRT として行う活動の例として、最も適切なものはどれか。
choices:
  - "OSやアプリケーションソフトウェアのセキュリティパッチを定期的に適用する。"
  - "地震や洪水などの自然災害を想定し、情報資産を守るために全社的な事業継続計画を策定する。"
  - "セキュリティ事故の発生時に影響範囲を調査して、被害拡大を防止するための対策実施を支援する。"
  - "保守業者がサーバ室で作業した日に、作業員の入退出が適切に記録されていたことを監査する。"
correct: 2
explanation: |
  この問題の公開解答では「セキュリティ事故の発生時に影響範囲を調査して、被害拡大を防止するための対策実施を支援する」が正解とされています。
  
  「OSやアプリケーションソフトウェアのセキュリティパッチを定期的に適用する」は公開解答では正解ではありません。
  「地震や洪水などの自然災害を想定し、情報資産を守るために全社的な事業継続計画を策定する」は公開解答では正解ではありません。
  「セキュリティ事故の発生時に影響範囲を調査して、被害拡大を防止するための対策実施を支援する」が公開解答で正解とされています。
  「保守業者がサーバ室で作業した日に、作業員の入退出が適切に記録されていたことを監査する」は公開解答では正解ではありません。
