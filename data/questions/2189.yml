# 高校化学 問189
id: 2189
type: single_choice
text: |
  アニリンと最も関係が深い場面として、適切なものはどれか。
choices:
  - "電線や青色の銅イオン水溶液を考える場面"
  - "染料の原料になる芳香族アミンを考える場面"
  - "金属やプラスチックを回収して再資源化する場面"
  - "メタンやエタンの性質を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  染料の原料になる芳香族アミンを考える場面は、アニリンと結び付きが強い場面です。したがって、正解は「染料の原料になる芳香族アミンを考える場面」です。
  
  「電線や青色の銅イオン水溶液を考える場面」は、銅と結び付きが強い場面です。
  「染料の原料になる芳香族アミンを考える場面」が正しいです。これはアニリンと結び付きが強い場面です。
  「金属やプラスチックを回収して再資源化する場面」は、資源の再利用と結び付きが強い場面です。
  「メタンやエタンの性質を考える場面」は、飽和炭化水素と結び付きが強い場面です。
