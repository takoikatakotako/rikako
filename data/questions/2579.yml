# 高校化学 問579
id: 2579
type: single_choice
text: |
  「炭素どうしに二重結合や三重結合をもつ炭化水素である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ブタンとイソブタンを比べる場面"
  - "グリシンやアラニンの構造を考える場面"
  - "エチレンやアセチレンの反応性を考える場面"
  - "ふたをした容器の中で液体の上にたまる蒸気を考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「炭素どうしに二重結合や三重結合をもつ炭化水素である。」と最も関係が深い場面は「エチレンやアセチレンの反応性を考える場面」です。したがって、正解は「エチレンやアセチレンの反応性を考える場面」です。
  
  「ブタンとイソブタンを比べる場面」は、「分子式は同じでも構造が異なる化合物どうしである。」と結び付きが強い場面です。
  「グリシンやアラニンの構造を考える場面」は、「アミノ基とカルボキシ基をあわせもつ化合物である。」と結び付きが強い場面です。
  「エチレンやアセチレンの反応性を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「ふたをした容器の中で液体の上にたまる蒸気を考える場面」は、「気液平衡にあるとき、気体が示す圧力である。」と結び付きが強い場面です。
