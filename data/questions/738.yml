# 高校化学 問28
id: 738
type: single_choice
text: |
  コロイドについての説明として、最も適切なものはどれか。
choices:
  - "単位時間あたりに進む反応の程度を表す量である。"
  - "反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。"
  - "正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。"
  - "溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  コロイドは、溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。 したがって、正解は「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」です。
  
  「単位時間あたりに進む反応の程度を表す量である。」は、反応速度の説明です。
  「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」は、触媒の説明です。
  「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」は、化学平衡の説明です。
  「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」が正しいです。コロイドの説明です。
