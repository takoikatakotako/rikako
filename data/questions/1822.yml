# 化学基礎 問782
id: 1822
type: single_choice
text: |
  「水酸化物イオンや水素イオンの受け取りに注目すること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。"
  - "原子核の中にある陽子の数を表す数である。"
  - "陽イオンと陰イオンの静電気的な引力による結び付きである。"
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
correct: 0
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「水酸化物イオンや水素イオンの受け取りに注目すること」という見方と最も関係が深い説明は「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」です。したがって、正解は「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」です。
  
  「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」が正しいです。この見方と最も関係が深い説明です。
  「原子核の中にある陽子の数を表す数である。」は、その説明で大切なのは「陽子数を表す数であること」という見方です。
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」は、その説明で大切なのは「電気的な引力で結び付くこと」という見方です。
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」は、その説明で大切なのは「1Lあたりの物質量で表すこと」という見方です。
