# 化学基礎 問846
id: 1886
type: single_choice
text: |
  「放射線を出す同位体であること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面"
  - "亜鉛板と銅板を使って豆電球を光らせる場面"
  - "ポリエチレンやタンパク質のような長い分子を考える場面"
  - "医療や年代測定に利用される炭素14を考える場面"
correct: 3
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「放射線を出す同位体であること」という見方と最も関係が深い場面は「医療や年代測定に利用される炭素14を考える場面」です。したがって、正解は「医療や年代測定に利用される炭素14を考える場面」です。
  
  「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」は、その場面で大切なのは「どのくらいイオンに分かれるかを表すこと」という見方です。
  「亜鉛板と銅板を使って豆電球を光らせる場面」は、その場面で大切なのは「化学エネルギーを電気エネルギーに変えること」という見方です。
  「ポリエチレンやタンパク質のような長い分子を考える場面」は、その場面で大切なのは「小さな単位が多数つながっていること」という見方です。
  「医療や年代測定に利用される炭素14を考える場面」が正しいです。この見方と最も関係が深い場面です。
