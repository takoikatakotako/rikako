# 高校化学 問1000
id: 3000
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "電離平衡 / ネオンやアルゴンが反応しにくい理由を考える場面"
  - "貴ガス / メタンの水素が塩素に置き換わる場面"
  - "置換反応 / 弱酸が一部だけ電離している水溶液を考える場面"
  - "化学が築く未来 / 再生可能エネルギーや新素材の開発を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「化学が築く未来 / 再生可能エネルギーや新素材の開発を考える場面」です。したがって、正解は「化学が築く未来 / 再生可能エネルギーや新素材の開発を考える場面」です。
  
  「電離平衡 / ネオンやアルゴンが反応しにくい理由を考える場面」は、用語と場面の対応が合っていません。
  「貴ガス / メタンの水素が塩素に置き換わる場面」は、用語と場面の対応が合っていません。
  「置換反応 / 弱酸が一部だけ電離している水溶液を考える場面」は、用語と場面の対応が合っていません。
  「化学が築く未来 / 再生可能エネルギーや新素材の開発を考える場面」が正しいです。用語と場面の対応が合っています。
