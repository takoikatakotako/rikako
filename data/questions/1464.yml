# 化学基礎 問424
id: 1464
type: single_choice
text: |
  「金属原子が自由電子を介して結び付く結合である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "酸"
  - "中和"
  - "金属結合"
  - "電離度"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  金属原子が自由電子を介して結び付く結合である。 に当てはまる語は金属結合です。したがって、正解は「金属結合」です。
  
  「酸」は、「水溶液中で水素イオンを生じる物質である。」に当てはまる語です。
  「中和」は、「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」に当てはまる語です。
  「金属結合」が正しいです。「金属原子が自由電子を介して結び付く結合である。」に当てはまる語です。
  「電離度」は、「溶けた物質のうち、電離してイオンになった割合である。」に当てはまる語です。
