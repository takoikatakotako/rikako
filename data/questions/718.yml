# 高校化学 問8
id: 718
type: single_choice
text: |
  ボイルの法則についての説明として、最も適切なものはどれか。
choices:
  - "液体の蒸気圧が外圧に等しくなる温度である。"
  - "蒸発する速さと凝縮する速さが等しくなった状態である。"
  - "液体1 molが気体になるときに吸収する熱量である。"
  - "一定温度で一定量の気体の圧力は体積に反比例するという法則である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  ボイルの法則は、一定温度で一定量の気体の圧力は体積に反比例するという法則である。 したがって、正解は「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」です。
  
  「液体の蒸気圧が外圧に等しくなる温度である。」は、沸点の説明です。
  「蒸発する速さと凝縮する速さが等しくなった状態である。」は、気液平衡の説明です。
  「液体1 molが気体になるときに吸収する熱量である。」は、蒸発熱の説明です。
  「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」が正しいです。ボイルの法則の説明です。
