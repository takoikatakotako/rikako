# 令和7年度 ITパスポート 公開問題 問26
id: 787
type: single_choice
text: |
  4月1日から5月31日までに、取引①から取引⑤があった。各取引の受注、売上計上、
  現金回収の状況が表のとおりであるとき、この取引先に対する5月31日時点の売掛金
  は何万円か。ここで、4月1日時点で売掛金残高はないものとする。
