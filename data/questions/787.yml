choices:
  - "1,000"
  - "1,400"
  - "2,300"
  - "2,700"
correct: 2
explanation: |
  売掛金は、売上計上済みだが未回収の金額です。5月31日時点では、取引③の1,300万円と取引④の1,000万円が売上計上済みで未回収、取引⑤は受注だけで売上未計上なので含めません。したがって合計は2,300万円でウが正しいです。
  
  「1,000」は取引④の未回収分を落としている。
  「1,400」は一部の未回収売上しか含めておらず不足している。
  「2,300」が正しいです。取引③の1,300万円と取引④の1,000万円で合計2,300万円です。
  「2,700」は取引⑤の受注分まで含めており、売上未計上分を誤って加算している。
