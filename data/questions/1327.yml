# 化学基礎 問287
id: 1327
type: single_choice
text: |
  酸化剤の特徴として、最も適切なものはどれか。
choices:
  - "相手に電子を与える"
  - "金属がイオンになりやすい程度"
  - "化学エネルギーを電気エネルギーに変える"
  - "相手から電子を受け取る"
correct: 3
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  酸化剤では、「相手から電子を受け取る」という点が大切です。したがって、正解は「相手から電子を受け取る」です。
  
  「相手に電子を与える」は、還元剤に関係する特徴です。
  「金属がイオンになりやすい程度」は、イオン化傾向に関係する特徴です。
  「化学エネルギーを電気エネルギーに変える」は、ダニエル電池に関係する特徴です。
  「相手から電子を受け取る」が正しいです。酸化剤の特徴を表しています。
