# 高校化学 問447
id: 2447
type: single_choice
text: |
  電気分解を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "非金属で酸化力が強いこと"
  - "酸とも塩基とも反応すること"
  - "電気を使って反応を進めること"
  - "電子対の与え手と受け手に注目すること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  電気分解では、「電気を使って反応を進めること」という見方が大切です。したがって、正解は「電気を使って反応を進めること」です。
  
  「非金属で酸化力が強いこと」は、ハロゲンに関係する見方です。
  「酸とも塩基とも反応すること」は、両性酸化物に関係する見方です。
  「電気を使って反応を進めること」が正しいです。電気分解の要点を表しています。
  「電子対の与え手と受け手に注目すること」は、配位結合に関係する見方です。
