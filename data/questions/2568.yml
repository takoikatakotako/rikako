# 高校化学 問568
id: 2568
type: single_choice
text: |
  「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸化アルミニウムが酸にも塩基にも溶ける場面"
  - "ブタンとイソブタンを比べる場面"
  - "グリシンやアラニンの構造を考える場面"
  - "マグネシウムやカルシウムの性質を比べる場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」と最も関係が深い場面は「マグネシウムやカルシウムの性質を比べる場面」です。したがって、正解は「マグネシウムやカルシウムの性質を比べる場面」です。
  
  「酸化アルミニウムが酸にも塩基にも溶ける場面」は、「酸とも塩基とも反応する酸化物である。」と結び付きが強い場面です。
  「ブタンとイソブタンを比べる場面」は、「分子式は同じでも構造が異なる化合物どうしである。」と結び付きが強い場面です。
  「グリシンやアラニンの構造を考える場面」は、「アミノ基とカルボキシ基をあわせもつ化合物である。」と結び付きが強い場面です。
  「マグネシウムやカルシウムの性質を比べる場面」が正しいです。この説明と結び付きが強い場面です。
