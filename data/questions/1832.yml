# 化学基礎 問792
id: 1832
type: single_choice
text: |
  「化学エネルギーを電気エネルギーに変えること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "原子が結び付いてできた、物質の性質を示す小さな粒子である。"
  - "水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。"
  - "亜鉛と銅の反応を利用して電気を取り出す電池である。"
  - "相手を酸化させ、自身は還元される物質である。"
correct: 2
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「化学エネルギーを電気エネルギーに変えること」という見方と最も関係が深い説明は「亜鉛と銅の反応を利用して電気を取り出す電池である。」です。したがって、正解は「亜鉛と銅の反応を利用して電気を取り出す電池である。」です。
  
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」は、その説明で大切なのは「物質の性質を示す小さな粒子として考えること」という見方です。
  「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」は、その説明で大切なのは「水酸化物イオンや水素イオンの受け取りに注目すること」という見方です。
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」が正しいです。この見方と最も関係が深い説明です。
  「相手を酸化させ、自身は還元される物質である。」は、その説明で大切なのは「相手を酸化させ、自分は還元されること」という見方です。
