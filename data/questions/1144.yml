# 化学基礎 問104
id: 1144
type: single_choice
text: |
  クロマトグラフィーについての説明として、最も適切なものはどれか。
choices:
  - "一種類の成分だけからなる物質である。"
  - "複数の成分が混ざってできている物質である。"
  - "一種類の元素だけからなる純物質である。"
  - "成分ごとの移動しやすさの違いを利用して分ける方法である。"
correct: 3
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  クロマトグラフィーは、成分ごとの移動しやすさの違いを利用して分ける方法である。したがって、正解は「成分ごとの移動しやすさの違いを利用して分ける方法である。」です。
  
  「一種類の成分だけからなる物質である。」は、純物質の説明です。
  「複数の成分が混ざってできている物質である。」は、混合物の説明です。
  「一種類の元素だけからなる純物質である。」は、単体の説明です。
  「成分ごとの移動しやすさの違いを利用して分ける方法である。」が正しいです。クロマトグラフィーの説明です。
