# 化学基礎 問306
id: 1346
type: single_choice
text: |
  混合物について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "固体が液体に変わる状態変化である。"
  - "液体が固体に変わる状態変化である。"
  - "二種類以上の物質が混ざってできている物質である。"
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  混合物は、二種類以上の物質が混ざってできている物質である。 したがって、正解は「二種類以上の物質が混ざってできている物質である。」です。
  
  「固体が液体に変わる状態変化である。」は、融解の説明です。
  「液体が固体に変わる状態変化である。」は、凝固の説明です。
  「二種類以上の物質が混ざってできている物質である。」が正しいです。混合物の説明です。
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、ろ過の説明です。
