# 化学基礎 問890
id: 1930
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "電離度 / 亜鉛と銅の反応を利用して電気を取り出す電池である。"
  - "ダニエル電池 / 多数の小さな単位がつながってできた大きな分子からなる化合物である。"
  - "還元剤 / 相手を還元させ、自身は酸化される物質である。"
  - "高分子化合物 / 溶けた物質のうち、電離してイオンになった割合である。"
correct: 2
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「還元剤 / 相手を還元させ、自身は酸化される物質である。」です。したがって、正解は「還元剤 / 相手を還元させ、自身は酸化される物質である。」です。
  
  「電離度 / 亜鉛と銅の反応を利用して電気を取り出す電池である。」は、用語と説明の対応が合っていません。
  「ダニエル電池 / 多数の小さな単位がつながってできた大きな分子からなる化合物である。」は、用語と説明の対応が合っていません。
  「還元剤 / 相手を還元させ、自身は酸化される物質である。」が正しいです。用語と説明の対応が合っています。
  「高分子化合物 / 溶けた物質のうち、電離してイオンになった割合である。」は、用語と説明の対応が合っていません。
