# 高校化学 問875
id: 2875
type: single_choice
text: |
  「金属元素を炎に入れたときに特有の色を示す反応である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "それ以上溶けない状態であること"
  - "金属元素ごとに炎の色が異なること"
  - "水となじみやすく安定しやすいこと"
  - "充電して再び使えること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「金属元素を炎に入れたときに特有の色を示す反応である。」を理解する上では、「金属元素ごとに炎の色が異なること」という見方が大切です。したがって、正解は「金属元素ごとに炎の色が異なること」です。
  
  「それ以上溶けない状態であること」は、その見方は飽和溶液に関係します。
  「金属元素ごとに炎の色が異なること」が正しいです。この説明と結び付きが強い見方です。
  「水となじみやすく安定しやすいこと」は、その見方は親水コロイドに関係します。
  「充電して再び使えること」は、その見方は鉛蓄電池に関係します。
