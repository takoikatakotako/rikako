# 化学基礎 問264
id: 1304
type: single_choice
text: |
  昇華の特徴として、最も適切なものはどれか。
choices:
  - "固体が直接気体になる"
  - "陽子の数を表す"
  - "陽子数と中性子数の合計"
  - "陽子数は同じで中性子数が異なる"
correct: 0
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  昇華では、「固体が直接気体になる」という点が大切です。したがって、正解は「固体が直接気体になる」です。
  
  「固体が直接気体になる」が正しいです。昇華の特徴を表しています。
  「陽子の数を表す」は、原子番号に関係する特徴です。
  「陽子数と中性子数の合計」は、質量数に関係する特徴です。
  「陽子数は同じで中性子数が異なる」は、同位体に関係する特徴です。
