# 化学基礎 問24
id: 691
type: single_choice
text: |
  周期表で同じ族にある元素に共通しやすいものとして、最も適切なものはどれか。
choices:
  - "最外殻電子の数"
  - "中性子の数"
  - "質量数"
  - "原子の色"
correct: 0
explanation: |
  この問題は、「周期表の族が何をそろえているか」を考える問題です。
  
  同じ族にある元素は、最外殻電子の数が同じです。そのため、化学的な性質も似やすくなります。したがって、正解は「最外殻電子の数」です。
  
  「最外殻電子の数」が正しいです。同じ族の元素に共通しやすい特徴です。
  「中性子の数」は、族でそろうわけではありません。
  「質量数」は、族でそろうわけではありません。
  「原子の色」は、族でそろう特徴ではありません。
