# 高校化学 問107
id: 2107
type: single_choice
text: |
  蒸発熱と最も関係が深い場面として、適切なものはどれか。
choices:
  - "塩化ナトリウムの結晶のつくりを考える場面"
  - "ダイヤモンドや二酸化ケイ素の硬さを考える場面"
  - "ガラスのように一定の融点を示しにくい固体を考える場面"
  - "水を水蒸気に変えるのに必要な熱を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  水を水蒸気に変えるのに必要な熱を考える場面は、蒸発熱と結び付きが強い場面です。したがって、正解は「水を水蒸気に変えるのに必要な熱を考える場面」です。
  
  「塩化ナトリウムの結晶のつくりを考える場面」は、イオン結晶と結び付きが強い場面です。
  「ダイヤモンドや二酸化ケイ素の硬さを考える場面」は、共有結合の結晶と結び付きが強い場面です。
  「ガラスのように一定の融点を示しにくい固体を考える場面」は、アモルファスと結び付きが強い場面です。
  「水を水蒸気に変えるのに必要な熱を考える場面」が正しいです。これは蒸発熱と結び付きが強い場面です。
