# 高校化学 問651
id: 2651
type: single_choice
text: |
  「同じ反応でも条件によって進み方が変わることを比べる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。"
  - "炭素どうしに二重結合や三重結合をもつ炭化水素である。"
  - "アミド結合をもつ合成繊維の代表的な高分子化合物である。"
  - "単位時間あたりに進む反応の程度を表す量である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「同じ反応でも条件によって進み方が変わることを比べる場面」を説明した文として適切なのは「単位時間あたりに進む反応の程度を表す量である。」です。したがって、正解は「単位時間あたりに進む反応の程度を表す量である。」です。
  
  「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」は、この説明は「マグネシウムやカルシウムの性質を比べる場面」と結び付きが強いです。
  「炭素どうしに二重結合や三重結合をもつ炭化水素である。」は、この説明は「エチレンやアセチレンの反応性を考える場面」と結び付きが強いです。
  「アミド結合をもつ合成繊維の代表的な高分子化合物である。」は、この説明は「衣類やロープに使われる合成繊維を考える場面」と結び付きが強いです。
  「単位時間あたりに進む反応の程度を表す量である。」が正しいです。この具体例を説明した文です。
