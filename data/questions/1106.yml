# 化学基礎 問66
id: 1106
type: single_choice
text: |
  酸化マグネシウムの化学式として、最も適切なものはどれか。
choices:
  - "MgO"
  - "Mg₂O"
  - "MgO₂"
  - "Mg₂O₂"
correct: 0
explanation: |
  この問題は、「イオンの電荷のつり合いから化学式を考える問題」です。
  
  マグネシウムイオンは Mg²⁺、酸化物イオンは O²⁻ です。1 個ずつで電荷がつり合うので、酸化マグネシウムは MgO です。したがって、正解は「MgO」です。
  
  「MgO」が正しいです。Mg²⁺ と O²⁻ が 1:1 でつり合います。
  「Mg₂O」は、最も簡単な比ではありません。
  「MgO₂」は、電荷のつり合いから適切ではありません。
  「Mg₂O₂」は、最も簡単な比で表していません。
