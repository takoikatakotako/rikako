# 化学基礎 問66
id: 1106
type: single_choice
text: |
  酸化マグネシウムの化学式として、最も適切なものはどれか。
choices:
  - "MgO"
  - "Mg2O"
  - "MgO2"
  - "Mg2O2"
correct: 0
explanation: |
  この問題は、「イオンの電荷のつり合いから化学式を考える問題」です。
  
  マグネシウムイオンは Mg2+、酸化物イオンは O2- です。1 個ずつで電荷がつり合うので、酸化マグネシウムは MgO です。したがって、正解は「MgO」です。
  
  「MgO」が正しいです。Mg2+ と O2- が 1:1 でつり合います。
  「Mg2O」は、最も簡単な比ではありません。
  「MgO2」は、電荷のつり合いから適切ではありません。
  「Mg2O2」は、最も簡単な比で表していません。
