# 高校化学 問994
id: 2994
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "触媒 / アンモニア水が強塩基ほど完全には電離しない場面"
  - "ペプチド結合 / アミノ酸がつながってペプチドになる場面"
  - "弱塩基 / ナトリウムで黄色、銅で青緑色を確かめる場面"
  - "炎色反応 / 二酸化マンガンを加えると過酸化水素水の分解が速くなる場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「ペプチド結合 / アミノ酸がつながってペプチドになる場面」です。したがって、正解は「ペプチド結合 / アミノ酸がつながってペプチドになる場面」です。
  
  「触媒 / アンモニア水が強塩基ほど完全には電離しない場面」は、用語と場面の対応が合っていません。
  「ペプチド結合 / アミノ酸がつながってペプチドになる場面」が正しいです。用語と場面の対応が合っています。
  「弱塩基 / ナトリウムで黄色、銅で青緑色を確かめる場面」は、用語と場面の対応が合っていません。
  「炎色反応 / 二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」は、用語と場面の対応が合っていません。
