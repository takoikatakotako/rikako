# 高校化学 問556
id: 2556
type: single_choice
text: |
  「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "弱酸が一部だけ電離している水溶液を考える場面"
  - "ネオンやアルゴンが反応しにくい理由を考える場面"
  - "メタンの水素が塩素に置き換わる場面"
  - "平衡がどちらにかたよっているかを数値で見る場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」と最も関係が深い場面は「平衡がどちらにかたよっているかを数値で見る場面」です。したがって、正解は「平衡がどちらにかたよっているかを数値で見る場面」です。
  
  「弱酸が一部だけ電離している水溶液を考える場面」は、「電離する粒子と電離していない粒子が平衡になっている状態である。」と結び付きが強い場面です。
  「ネオンやアルゴンが反応しにくい理由を考える場面」は、「周期表18族に属し、化学的に安定な気体元素の総称である。」と結び付きが強い場面です。
  「メタンの水素が塩素に置き換わる場面」は、「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」と結び付きが強い場面です。
  「平衡がどちらにかたよっているかを数値で見る場面」が正しいです。この説明と結び付きが強い場面です。
