# 化学基礎 問198
id: 1238
type: single_choice
text: |
  酸化防止剤の例として、最も適切なものはどれか。
choices:
  - "アスコルビン酸"
  - "ポリエチレン"
  - "水道水の殺菌や洗浄の技術"
  - "砂と水の混合物から砂を取り除く操作"
correct: 0
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  アスコルビン酸は、酸化防止剤の例です。したがって、正解は「アスコルビン酸」です。
  
  「アスコルビン酸」が正しいです。これは酸化防止剤の例です。
  「ポリエチレン」は、高分子化合物の例として見る方が適切です。
  「水道水の殺菌や洗浄の技術」は、化学が拓く世界の例として見る方が適切です。
  「砂と水の混合物から砂を取り除く操作」は、ろ過の例として見る方が適切です。
