# 高校化学 問434
id: 2434
type: single_choice
text: |
  疎水コロイドを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "状態変化に必要な熱に注目すること"
  - "水となじみにくく不安定になりやすいこと"
  - "温度一定で圧力と体積の関係を見ること"
  - "圧力、体積、物質量、温度をまとめて扱うこと"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  疎水コロイドでは、「水となじみにくく不安定になりやすいこと」という見方が大切です。したがって、正解は「水となじみにくく不安定になりやすいこと」です。
  
  「状態変化に必要な熱に注目すること」は、融解熱に関係する見方です。
  「水となじみにくく不安定になりやすいこと」が正しいです。疎水コロイドの要点を表しています。
  「温度一定で圧力と体積の関係を見ること」は、ボイルの法則に関係する見方です。
  「圧力、体積、物質量、温度をまとめて扱うこと」は、理想気体の状態方程式に関係する見方です。
