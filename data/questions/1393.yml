# 化学基礎 問353
id: 1393
type: single_choice
text: |
  再結晶と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面"
  - "氷を温めて水にする場面"
  - "水を冷やして氷にする場面"
  - "砂と水の混合物から砂を取り除く場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面は、再結晶と結び付きが強い場面です。したがって、正解は「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」です。
  
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」が正しいです。これは再結晶と結び付きが強い場面です。
  「氷を温めて水にする場面」は、融解と結び付きが強い場面です。
  「水を冷やして氷にする場面」は、凝固と結び付きが強い場面です。
  「砂と水の混合物から砂を取り除く場面」は、ろ過と結び付きが強い場面です。
