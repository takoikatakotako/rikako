# 高校化学 問892
id: 2892
type: single_choice
text: |
  「多数のアミノ酸がつながってできた天然高分子化合物である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "周囲へ熱を出す反応であること"
  - "電気量と生成物の量の比例に注目すること"
  - "アミノ酸が多数つながった高分子であること"
  - "pH の変化をおさえること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「多数のアミノ酸がつながってできた天然高分子化合物である。」を理解する上では、「アミノ酸が多数つながった高分子であること」という見方が大切です。したがって、正解は「アミノ酸が多数つながった高分子であること」です。
  
  「周囲へ熱を出す反応であること」は、その見方は発熱反応に関係します。
  「電気量と生成物の量の比例に注目すること」は、その見方はファラデーの法則に関係します。
  「アミノ酸が多数つながった高分子であること」が正しいです。この説明と結び付きが強い見方です。
  「pH の変化をおさえること」は、その見方は緩衝液に関係します。
