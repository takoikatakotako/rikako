# 化学基礎 問844
id: 1884
type: single_choice
text: |
  「水溶液や融解状態で電流を通すこと」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "塩酸と水酸化ナトリウム水溶液を混ぜる場面"
  - "食塩水や塩酸が電流を通す場面"
  - "水素や炭素が相手から酸素を奪う場面"
  - "ナトリウムで黄色、銅で青緑色を観察する場面"
correct: 1
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「水溶液や融解状態で電流を通すこと」という見方と最も関係が深い場面は「食塩水や塩酸が電流を通す場面」です。したがって、正解は「食塩水や塩酸が電流を通す場面」です。
  
  「塩酸と水酸化ナトリウム水溶液を混ぜる場面」は、その場面で大切なのは「酸と塩基が打ち消し合うこと」という見方です。
  「食塩水や塩酸が電流を通す場面」が正しいです。この見方と最も関係が深い場面です。
  「水素や炭素が相手から酸素を奪う場面」は、その場面で大切なのは「相手を還元させ、自分は酸化されること」という見方です。
  「ナトリウムで黄色、銅で青緑色を観察する場面」は、その場面で大切なのは「金属元素ごとに炎の色が異なること」という見方です。
