# 高校化学 問927
id: 2927
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "エステル / 紙や木材の主成分を考える場面"
  - "セルロース / 注射器の口をふさいで押すと体積が減って圧力が上がる場面"
  - "浸透圧 / 薄い溶液側から濃い溶液側へ水が移動する場面"
  - "ボイルの法則 / 果物の香りに関係する化合物を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「浸透圧 / 薄い溶液側から濃い溶液側へ水が移動する場面」です。したがって、正解は「浸透圧 / 薄い溶液側から濃い溶液側へ水が移動する場面」です。
  
  「エステル / 紙や木材の主成分を考える場面」は、用語と場面の対応が合っていません。
  「セルロース / 注射器の口をふさいで押すと体積が減って圧力が上がる場面」は、用語と場面の対応が合っていません。
  「浸透圧 / 薄い溶液側から濃い溶液側へ水が移動する場面」が正しいです。用語と場面の対応が合っています。
  「ボイルの法則 / 果物の香りに関係する化合物を考える場面」は、用語と場面の対応が合っていません。
