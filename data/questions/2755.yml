# 高校化学 問755
id: 2755
type: single_choice
text: |
  「反応が止まるのではなく速さがつり合うこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "化学平衡"
  - "エステル"
  - "セルロース"
  - "ボイルの法則"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「反応が止まるのではなく速さがつり合うこと」という見方が大切なのは化学平衡です。したがって、正解は「化学平衡」です。
  
  「化学平衡」が正しいです。この見方が大切な語です。
  「エステル」は、その語で大切なのは「カルボン酸とアルコールの組合せでできること」という見方です。
  「セルロース」は、その語で大切なのは「植物の体を支える多糖であること」という見方です。
  「ボイルの法則」は、その語で大切なのは「温度一定で圧力と体積の関係を見ること」という見方です。
