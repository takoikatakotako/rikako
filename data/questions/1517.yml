# 化学基礎 問477
id: 1517
type: single_choice
text: |
  無極性分子を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電子を共有して結び付くこと"
  - "物質の性質を示す小さな粒子として考えること"
  - "電荷のかたよりがほとんどないこと"
  - "陽子数を表す数であること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  無極性分子では、「電荷のかたよりがほとんどないこと」という見方が大切です。したがって、正解は「電荷のかたよりがほとんどないこと」です。
  
  「電子を共有して結び付くこと」は、共有結合に関係する見方です。
  「物質の性質を示す小さな粒子として考えること」は、分子に関係する見方です。
  「電荷のかたよりがほとんどないこと」が正しいです。無極性分子の要点を表しています。
  「陽子数を表す数であること」は、原子番号に関係する見方です。
