# 化学基礎 問218
id: 1258
type: single_choice
text: |
  「ナトリウムとカリウムが似た性質を示すこと」に最も関係が深い語として、適切なものはどれか。
choices:
  - "最外殻電子"
  - "陽イオン"
  - "陰イオン"
  - "周期律"
correct: 3
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「ナトリウムとカリウムが似た性質を示すこと」に最も関係が深いのは周期律です。したがって、正解は「周期律」です。
  
  「最外殻電子」は、この例に最も関係が深い語ではありません。
  「陽イオン」は、この例に最も関係が深い語ではありません。
  「陰イオン」は、この例に最も関係が深い語ではありません。
  「周期律」が正しいです。この例は周期律に関係しています。
