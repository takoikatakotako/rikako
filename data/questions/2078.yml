# 高校化学 問78
id: 2078
type: single_choice
text: |
  飽和炭化水素についての説明として、最も適切なものはどれか。
choices:
  - "アミド結合をもつ合成繊維の代表的な高分子化合物である。"
  - "炭素どうしが単結合だけでつながった炭化水素である。"
  - "多数のアミノ酸がつながってできた天然高分子化合物である。"
  - "アミノ酸どうしが縮合してできる結合である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  飽和炭化水素は、炭素どうしが単結合だけでつながった炭化水素である。 したがって、正解は「炭素どうしが単結合だけでつながった炭化水素である。」です。
  
  「アミド結合をもつ合成繊維の代表的な高分子化合物である。」は、ナイロンの説明です。
  「炭素どうしが単結合だけでつながった炭化水素である。」が正しいです。飽和炭化水素の説明です。
  「多数のアミノ酸がつながってできた天然高分子化合物である。」は、タンパク質の説明です。
  「アミノ酸どうしが縮合してできる結合である。」は、ペプチド結合の説明です。
