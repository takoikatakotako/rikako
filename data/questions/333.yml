# 令和7年度 ITパスポート 公開問題 問12
id: 333
type: single_choice
text: |
  商標法におけるサービスマークを説明したものはどれか。
choices:
  - "企業が、企業そのものを他社と区別するために表示する商標である。"
  - "製造業者、販売業者が提供する商品を、他社の商品と区別するために表示する商標である。"
  - "大規模小売業者が開発したプライベートブランドの商品を、他社の商品と区別するために表示する商標である。"
  - "輸送業者、金融業者などが提供する役務を、他社の役務と区別するために表示する商標である。"
correct: 3
explanation: |
  サービスマークは、輸送業や金融業などが提供する役務を他社の役務と区別するために用いる商標です。したがって、正解は「輸送業者、金融業者などが提供する役務を、他社の役務と区別するために表示する商標である」です。
  
  「企業が、企業そのものを他社と区別するために表示する商標である」は企業そのものを示す表示の説明であり、サービスマークではありません。
  「製造業者、販売業者が提供する商品を、他社の商品と区別するために表示する商標である」は商品の識別に用いる商標の説明です。
  「大規模小売業者が開発したプライベートブランドの商品を、他社の商品と区別するために表示する商標である」はプライベートブランド商品の商標に関する説明です。
  「輸送業者、金融業者などが提供する役務を、他社の役務と区別するために表示する商標である」が正しいです。役務を識別するための商標がサービスマークです。
