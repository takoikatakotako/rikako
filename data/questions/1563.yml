# 化学基礎 問523
id: 1563
type: single_choice
text: |
  「原子どうしが電子を共有してできる結び付きである。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水分子で電荷のかたよりを考える場面"
  - "塩酸と水酸化ナトリウム水溶液を混ぜる場面"
  - "水素原子どうしが電子を共有して H2 になる場面"
  - "水素や炭素が相手から酸素を奪う場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「原子どうしが電子を共有してできる結び付きである。」と最も関係が深い場面は「水素原子どうしが電子を共有して H2 になる場面」です。したがって、正解は「水素原子どうしが電子を共有して H2 になる場面」です。
  
  「水分子で電荷のかたよりを考える場面」は、「分子の中で電荷のかたよりがある分子である。」と結び付きが強い場面です。
  「塩酸と水酸化ナトリウム水溶液を混ぜる場面」は、「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」と結び付きが強い場面です。
  「水素原子どうしが電子を共有して H2 になる場面」が正しいです。この説明と結び付きが強い場面です。
  「水素や炭素が相手から酸素を奪う場面」は、「相手を還元させ、自身は酸化される物質である。」と結び付きが強い場面です。
