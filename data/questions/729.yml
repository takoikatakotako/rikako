# 高校化学 問19
id: 729
type: single_choice
text: |
  アモルファスについての説明として、最も適切なものはどれか。
choices:
  - "溶質の粒子が溶媒中に広がっていく現象である。"
  - "その温度でそれ以上溶質が溶けない状態の溶液である。"
  - "結晶のような規則正しい配列をもたない固体である。"
  - "不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  アモルファスは、結晶のような規則正しい配列をもたない固体である。 したがって、正解は「結晶のような規則正しい配列をもたない固体である。」です。
  
  「溶質の粒子が溶媒中に広がっていく現象である。」は、溶解の説明です。
  「その温度でそれ以上溶質が溶けない状態の溶液である。」は、飽和溶液の説明です。
  「結晶のような規則正しい配列をもたない固体である。」が正しいです。アモルファスの説明です。
  「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」は、蒸気圧降下の説明です。
