# 令和7年度 ITパスポート 公開問題 問72
id: 613
type: single_choice
text: |
  見る人に意図が伝わりやすいデザインにするための四つの原則に関する次の記述中
  のa,bに入れる字句の適切な組合せはどれか。
  ［四つの原則〕
  近接
  ：互いに関連する要素は近づけてグループにする。
  ：要素を意図したルールに基づき配置する。
  反復
  ：要素ごとにデザインルールを繰り返す。
  b
  ：要素ごとの大小や強弱などの違いを明確にする。
  a
  b
choices:
  - "整列 / 価値"
  - "整列 / 対比"
  - "操作 / 価値"
  - "操作 / 対比"
correct: 1
explanation: |
  この問題の公開解答では「整列 / 対比」が正解とされています。
  
  「整列 / 価値」は公開解答では正解ではありません。
  「整列 / 対比」が公開解答で正解とされています。
  「操作 / 価値」は公開解答では正解ではありません。
  「操作 / 対比」は公開解答では正解ではありません。
