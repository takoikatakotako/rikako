# 化学基礎 問416
id: 1456
type: single_choice
text: |
  「原子核の中にある陽子数と中性子数の合計である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "共有結合"
  - "分子"
  - "質量数"
  - "無極性分子"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  原子核の中にある陽子数と中性子数の合計である。 に当てはまる語は質量数です。したがって、正解は「質量数」です。
  
  「共有結合」は、「原子どうしが電子を共有してできる結び付きである。」に当てはまる語です。
  「分子」は、「原子が結び付いてできた、物質の性質を示す小さな粒子である。」に当てはまる語です。
  「質量数」が正しいです。「原子核の中にある陽子数と中性子数の合計である。」に当てはまる語です。
  「無極性分子」は、「分子の中で電荷のかたよりがほとんどない分子である。」に当てはまる語です。
