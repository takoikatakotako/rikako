# 化学基礎 問134
id: 1174
type: single_choice
text: |
  pHについての説明として、最も適切なものはどれか。
choices:
  - "電子を失う変化、または酸素を受け取る変化である。"
  - "水溶液の酸性やアルカリ性の強さの目安を表す値である。"
  - "電子を受け取る変化、または酸素を失う変化である。"
  - "相手を酸化し、自分は還元される物質である。"
correct: 1
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  pHは、水溶液の酸性やアルカリ性の強さの目安を表す値である。したがって、正解は「水溶液の酸性やアルカリ性の強さの目安を表す値である。」です。
  
  「電子を失う変化、または酸素を受け取る変化である。」は、酸化の説明です。
  「水溶液の酸性やアルカリ性の強さの目安を表す値である。」が正しいです。pHの説明です。
  「電子を受け取る変化、または酸素を失う変化である。」は、還元の説明です。
  「相手を酸化し、自分は還元される物質である。」は、酸化剤の説明です。
