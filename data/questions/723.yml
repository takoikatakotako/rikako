# 高校化学 問13
id: 723
type: single_choice
text: |
  絶対温度についての説明として、最も適切なものはどれか。
choices:
  - "絶対零度を基準にした温度で、単位は K で表す。"
  - "結晶の中で粒子が規則正しく並んだ構造である。"
  - "分子どうしが分子間力で集まってできた結晶である。"
  - "金属原子が規則正しく並び、自由電子が全体に広がった結晶である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  絶対温度は、絶対零度を基準にした温度で、単位は K で表す。 したがって、正解は「絶対零度を基準にした温度で、単位は K で表す。」です。
  
  「絶対零度を基準にした温度で、単位は K で表す。」が正しいです。絶対温度の説明です。
  「結晶の中で粒子が規則正しく並んだ構造である。」は、結晶格子の説明です。
  「分子どうしが分子間力で集まってできた結晶である。」は、分子結晶の説明です。
  「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」は、金属結晶の説明です。
