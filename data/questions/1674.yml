# 化学基礎 問634
id: 1674
type: single_choice
text: |
  「酸性と塩基性の強さを数で見ること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "高分子化合物"
  - "混合物"
  - "凝固"
  - "pH"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「酸性と塩基性の強さを数で見ること」という見方が大切なのはpHです。したがって、正解は「pH」です。
  
  「高分子化合物」は、その語で大切なのは「小さな単位が多数つながっていること」という見方です。
  「混合物」は、その語で大切なのは「成分が二種類以上まざっていること」という見方です。
  「凝固」は、その語で大切なのは「液体から固体への変化であること」という見方です。
  「pH」が正しいです。この見方が大切な語です。
