# 高校化学 問988
id: 2988
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "電気分解 / 高圧や触媒を利用してアンモニアを得る場面"
  - "アンモニア合成 / フッ素や塩素、臭素の反応性を比べる場面"
  - "ハロゲン / 水溶液に電流を流して物質を分解する場面"
  - "フェノール / フェノール類の酸性や消毒作用を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「フェノール / フェノール類の酸性や消毒作用を考える場面」です。したがって、正解は「フェノール / フェノール類の酸性や消毒作用を考える場面」です。
  
  「電気分解 / 高圧や触媒を利用してアンモニアを得る場面」は、用語と場面の対応が合っていません。
  「アンモニア合成 / フッ素や塩素、臭素の反応性を比べる場面」は、用語と場面の対応が合っていません。
  「ハロゲン / 水溶液に電流を流して物質を分解する場面」は、用語と場面の対応が合っていません。
  「フェノール / フェノール類の酸性や消毒作用を考える場面」が正しいです。用語と場面の対応が合っています。
