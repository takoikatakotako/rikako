# 化学基礎 問102
id: 1142
type: single_choice
text: |
  蒸留についての説明として、最も適切なものはどれか。
choices:
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
  - "沸点の違いを利用して液体を分ける方法である。"
  - "成分ごとの移動しやすさの違いを利用して分ける方法である。"
  - "一種類の成分だけからなる物質である。"
correct: 1
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  蒸留は、沸点の違いを利用して液体を分ける方法である。したがって、正解は「沸点の違いを利用して液体を分ける方法である。」です。
  
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、再結晶の説明です。
  「沸点の違いを利用して液体を分ける方法である。」が正しいです。蒸留の説明です。
  「成分ごとの移動しやすさの違いを利用して分ける方法である。」は、クロマトグラフィーの説明です。
  「一種類の成分だけからなる物質である。」は、純物質の説明です。
