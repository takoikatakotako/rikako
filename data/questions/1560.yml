# 化学基礎 問520
id: 1560
type: single_choice
text: |
  「原子や原子団が電子を失って正の電荷をもつ粒子である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水素原子どうしが電子を共有して H2 になる場面"
  - "水素と酸素から水ができる反応を式で表す場面"
  - "マグネシウムが酸素と結び付く場面"
  - "ナトリウム原子が電子を1個失って Na+ になる場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「原子や原子団が電子を失って正の電荷をもつ粒子である。」と最も関係が深い場面は「ナトリウム原子が電子を1個失って Na+ になる場面」です。したがって、正解は「ナトリウム原子が電子を1個失って Na+ になる場面」です。
  
  「水素原子どうしが電子を共有して H2 になる場面」は、「原子どうしが電子を共有してできる結び付きである。」と結び付きが強い場面です。
  「水素と酸素から水ができる反応を式で表す場面」は、「化学変化を、物質の種類と量の関係が分かるように表した式である。」と結び付きが強い場面です。
  「マグネシウムが酸素と結び付く場面」は、「物質が酸素と結び付く、または電子を失う変化である。」と結び付きが強い場面です。
  「ナトリウム原子が電子を1個失って Na+ になる場面」が正しいです。この説明と結び付きが強い場面です。
