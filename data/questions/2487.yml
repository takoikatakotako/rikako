# 高校化学 問487
id: 2487
type: single_choice
text: |
  ベンゼンを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "単糖類でエネルギー源になりやすいこと"
  - "植物の体を支える多糖であること"
  - "ベンゼン環をもつこと"
  - "2 価の陽イオンになりやすいこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  ベンゼンでは、「ベンゼン環をもつこと」という見方が大切です。したがって、正解は「ベンゼン環をもつこと」です。
  
  「単糖類でエネルギー源になりやすいこと」は、グルコースに関係する見方です。
  「植物の体を支える多糖であること」は、セルロースに関係する見方です。
  「ベンゼン環をもつこと」が正しいです。ベンゼンの要点を表しています。
  「2 価の陽イオンになりやすいこと」は、アルカリ土類金属に関係する見方です。
