# 化学基礎 問80
id: 1120
type: single_choice
text: |
  同じ体積で同じ濃度の塩酸と水酸化ナトリウム水溶液を混ぜたときに起こる変化として、最も適切なものはどれか。
choices:
  - "中和が進みやすい。"
  - "必ず金属ができる。"
  - "電子が全く動かない。"
  - "必ず凍る。"
correct: 0
explanation: |
  この問題は、「酸と塩基をちょうど同じくらい混ぜたときの基本」を考える問題です。
  
  同じ体積で同じ濃度の塩酸と水酸化ナトリウム水溶液を混ぜると、酸と塩基がちょうど反応しやすく、中和が進みます。したがって、正解は「中和が進みやすい」です。
  
  「中和が進みやすい」が正しいです。
  「必ず金属ができる」は、適切ではありません。
  「電子が全く動かない」は、この問題の中心ではありません。
  「必ず凍る」は、適切ではありません。
