# 高校化学 問493
id: 2493
type: single_choice
text: |
  アミノ酸を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "アミノ基とカルボキシ基をあわせもつこと"
  - "もとの一部が別のものに置き換わること"
  - "ヒドロキシ基をもつこと"
  - "カルボキシ基をもち酸性を示すこと"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  アミノ酸では、「アミノ基とカルボキシ基をあわせもつこと」という見方が大切です。したがって、正解は「アミノ基とカルボキシ基をあわせもつこと」です。
  
  「アミノ基とカルボキシ基をあわせもつこと」が正しいです。アミノ酸の要点を表しています。
  「もとの一部が別のものに置き換わること」は、置換反応に関係する見方です。
  「ヒドロキシ基をもつこと」は、アルコールに関係する見方です。
  「カルボキシ基をもち酸性を示すこと」は、カルボン酸に関係する見方です。
