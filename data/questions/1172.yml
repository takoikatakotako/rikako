# 化学基礎 問132
id: 1172
type: single_choice
text: |
  塩基についての説明として、最も適切なものはどれか。
choices:
  - "酸と塩基が反応して塩と水を生じる反応である。"
  - "水溶液の酸性やアルカリ性の強さの目安を表す値である。"
  - "電子を失う変化、または酸素を受け取る変化である。"
  - "水溶液中で水酸化物イオンを生じるか、水素イオンを受け取る物質である。"
correct: 3
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  塩基は、水溶液中で水酸化物イオンを生じるか、水素イオンを受け取る物質である。したがって、正解は「水溶液中で水酸化物イオンを生じるか、水素イオンを受け取る物質である。」です。
  
  「酸と塩基が反応して塩と水を生じる反応である。」は、中和の説明です。
  「水溶液の酸性やアルカリ性の強さの目安を表す値である。」は、pHの説明です。
  「電子を失う変化、または酸素を受け取る変化である。」は、酸化の説明です。
  「水溶液中で水酸化物イオンを生じるか、水素イオンを受け取る物質である。」が正しいです。塩基の説明です。
