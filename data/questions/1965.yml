# 化学基礎 問925
id: 1965
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "分子 / 水分子や酸素分子を粒として考える場面"
  - "化学反応式 / マグネシウムが酸素と結び付く場面"
  - "酸化 / 食塩水や塩酸が電流を通す場面"
  - "電解質 / 水素と酸素から水ができる反応を式で表す場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「分子 / 水分子や酸素分子を粒として考える場面」です。したがって、正解は「分子 / 水分子や酸素分子を粒として考える場面」です。
  
  「分子 / 水分子や酸素分子を粒として考える場面」が正しいです。用語と場面の対応が合っています。
  「化学反応式 / マグネシウムが酸素と結び付く場面」は、用語と場面の対応が合っていません。
  「酸化 / 食塩水や塩酸が電流を通す場面」は、用語と場面の対応が合っていません。
  「電解質 / 水素と酸素から水ができる反応を式で表す場面」は、用語と場面の対応が合っていません。
