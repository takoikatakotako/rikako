# 高校化学 問251
id: 2251
type: single_choice
text: |
  「単位時間あたりに進む反応の程度を表す量である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "反応速度"
  - "リチウムイオン電池"
  - "電気分解"
  - "陰極"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  単位時間あたりに進む反応の程度を表す量である。 に当てはまる語は反応速度です。したがって、正解は「反応速度」です。
  
  「反応速度」が正しいです。「単位時間あたりに進む反応の程度を表す量である。」に当てはまる語です。
  「リチウムイオン電池」は、「リチウムイオンの移動を利用する充電式電池である。」に当てはまる語です。
  「電気分解」は、「電気エネルギーを使って自発的でない化学変化を起こす操作である。」に当てはまる語です。
  「陰極」は、「電気分解で還元が起こる電極である。」に当てはまる語です。
