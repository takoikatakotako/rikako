# 化学基礎 問601
id: 1641
type: single_choice
text: |
  「水に溶けない固体を液体から分けること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "質量数"
  - "共有結合"
  - "ろ過"
  - "化学反応式"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「水に溶けない固体を液体から分けること」という見方が大切なのはろ過です。したがって、正解は「ろ過」です。
  
  「質量数」は、その語で大切なのは「陽子数と中性子数の合計であること」という見方です。
  「共有結合」は、その語で大切なのは「電子を共有して結び付くこと」という見方です。
  「ろ過」が正しいです。この見方が大切な語です。
  「化学反応式」は、その語で大切なのは「反応する物質とできる物質の関係を式で示すこと」という見方です。
