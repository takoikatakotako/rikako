# 高校化学 問895
id: 2895
type: single_choice
text: |
  「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "光エネルギーを化学エネルギーに変えること"
  - "単糖類でエネルギー源になりやすいこと"
  - "反応を速めても自分は使い切られないこと"
  - "電離が部分的に起こること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」を理解する上では、「単糖類でエネルギー源になりやすいこと」という見方が大切です。したがって、正解は「単糖類でエネルギー源になりやすいこと」です。
  
  「光エネルギーを化学エネルギーに変えること」は、その見方は光合成に関係します。
  「単糖類でエネルギー源になりやすいこと」が正しいです。この説明と結び付きが強い見方です。
  「反応を速めても自分は使い切られないこと」は、その見方は触媒に関係します。
  「電離が部分的に起こること」は、その見方は弱塩基に関係します。
