# 化学基礎 問864
id: 1904
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "昇華 / 固体が液体にならずに気体になる状態変化である。"
  - "物理変化 / 原子核の中にある陽子数と中性子数の合計である。"
  - "質量数 / 原子どうしが電子を共有してできる結び付きである。"
  - "共有結合 / 物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
correct: 0
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「昇華 / 固体が液体にならずに気体になる状態変化である。」です。したがって、正解は「昇華 / 固体が液体にならずに気体になる状態変化である。」です。
  
  「昇華 / 固体が液体にならずに気体になる状態変化である。」が正しいです。用語と説明の対応が合っています。
  「物理変化 / 原子核の中にある陽子数と中性子数の合計である。」は、用語と説明の対応が合っていません。
  「質量数 / 原子どうしが電子を共有してできる結び付きである。」は、用語と説明の対応が合っていません。
  「共有結合 / 物質そのものの種類は変わらず、状態や形だけが変わる変化である。」は、用語と説明の対応が合っていません。
