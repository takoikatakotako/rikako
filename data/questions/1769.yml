# 化学基礎 問729
id: 1769
type: single_choice
text: |
  「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "1Lあたりの物質量で表すこと"
  - "成分が二種類以上まざっていること"
  - "液体から固体への変化であること"
  - "電子を失って正に帯電すること"
correct: 0
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」では、「1Lあたりの物質量で表すこと」という見方が大切です。したがって、正解は「1Lあたりの物質量で表すこと」です。
  
  「1Lあたりの物質量で表すこと」が正しいです。この具体例で大切になる見方です。
  「成分が二種類以上まざっていること」は、その見方は空気や食塩水のように複数の物質が混ざったものを考える場面よりも混合物と結び付きが強いです。
  「液体から固体への変化であること」は、その見方は水を冷やして氷にする場面よりも凝固と結び付きが強いです。
  「電子を失って正に帯電すること」は、その見方はナトリウム原子が電子を1個失って Na+ になる場面よりも陽イオンと結び付きが強いです。
