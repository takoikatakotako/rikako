# 化学基礎 問714
id: 1754
type: single_choice
text: |
  「ドライアイスがそのまま気体になる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "金属のイオンになりやすさを比べること"
  - "固体から直接気体になること"
  - "酸化による変質を防ぐこと"
  - "成分が一種類で性質が一定であること"
correct: 1
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「ドライアイスがそのまま気体になる場面」では、「固体から直接気体になること」という見方が大切です。したがって、正解は「固体から直接気体になること」です。
  
  「金属のイオンになりやすさを比べること」は、その見方は亜鉛が銅より先にイオンになりやすいことを見る場面よりもイオン化傾向と結び付きが強いです。
  「固体から直接気体になること」が正しいです。この具体例で大切になる見方です。
  「酸化による変質を防ぐこと」は、その見方は食品の変色や劣化を防ぐためにビタミンCを使う場面よりも酸化防止剤と結び付きが強いです。
  「成分が一種類で性質が一定であること」は、その見方は酸素だけが入った容器を考える場面よりも純物質と結び付きが強いです。
