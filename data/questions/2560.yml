# 高校化学 問560
id: 2560
type: single_choice
text: |
  「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酢酸が塩酸ほど強く電離しない場面"
  - "鉄や銅、クロムの化合物の色の違いを考える場面"
  - "酢酸の性質やにおいを考える場面"
  - "中性の水で H+ と OH- の関係を考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」と最も関係が深い場面は「中性の水で H+ と OH- の関係を考える場面」です。したがって、正解は「中性の水で H+ と OH- の関係を考える場面」です。
  
  「酢酸が塩酸ほど強く電離しない場面」は、「水溶液中で一部だけ電離する酸である。」と結び付きが強い場面です。
  「鉄や銅、クロムの化合物の色の違いを考える場面」は、「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」と結び付きが強い場面です。
  「酢酸の性質やにおいを考える場面」は、「カルボキシ基をもち、酸性を示す有機化合物である。」と結び付きが強い場面です。
  「中性の水で H+ と OH- の関係を考える場面」が正しいです。この説明と結び付きが強い場面です。
