# 高校化学 問593
id: 2593
type: single_choice
text: |
  「アミノ基とカルボキシ基をあわせもつ化合物である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "グリシンやアラニンの構造を考える場面"
  - "米やいもに多く含まれる成分を考える場面"
  - "水を水蒸気に変えるのに必要な熱を考える場面"
  - "金属が電気を通したりのびたりする理由を考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「アミノ基とカルボキシ基をあわせもつ化合物である。」と最も関係が深い場面は「グリシンやアラニンの構造を考える場面」です。したがって、正解は「グリシンやアラニンの構造を考える場面」です。
  
  「グリシンやアラニンの構造を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「米やいもに多く含まれる成分を考える場面」は、「グルコースが多数つながった植物の貯蔵多糖である。」と結び付きが強い場面です。
  「水を水蒸気に変えるのに必要な熱を考える場面」は、「液体1 molが気体になるときに吸収する熱量である。」と結び付きが強い場面です。
  「金属が電気を通したりのびたりする理由を考える場面」は、「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」と結び付きが強い場面です。
