# 化学基礎 問133
id: 1173
type: single_choice
text: |
  中和についての説明として、最も適切なものはどれか。
choices:
  - "酸と塩基が反応して塩と水を生じる反応である。"
  - "水溶液の酸性やアルカリ性の強さの目安を表す値である。"
  - "電子を失う変化、または酸素を受け取る変化である。"
  - "電子を受け取る変化、または酸素を失う変化である。"
correct: 0
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  中和は、酸と塩基が反応して塩と水を生じる反応である。したがって、正解は「酸と塩基が反応して塩と水を生じる反応である。」です。
  
  「酸と塩基が反応して塩と水を生じる反応である。」が正しいです。中和の説明です。
  「水溶液の酸性やアルカリ性の強さの目安を表す値である。」は、pHの説明です。
  「電子を失う変化、または酸素を受け取る変化である。」は、酸化の説明です。
  「電子を受け取る変化、または酸素を失う変化である。」は、還元の説明です。
