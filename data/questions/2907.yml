# 高校化学 問907
id: 2907
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "塩基解離定数 / 電線や青色の銅イオン水溶液を考える場面"
  - "銅 / フェノール類の酸性や消毒作用を考える場面"
  - "蒸発熱 / 水を水蒸気に変えるのに必要な熱を考える場面"
  - "フェノール / どの塩基がより電離しやすいかを比べる場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「蒸発熱 / 水を水蒸気に変えるのに必要な熱を考える場面」です。したがって、正解は「蒸発熱 / 水を水蒸気に変えるのに必要な熱を考える場面」です。
  
  「塩基解離定数 / 電線や青色の銅イオン水溶液を考える場面」は、用語と場面の対応が合っていません。
  「銅 / フェノール類の酸性や消毒作用を考える場面」は、用語と場面の対応が合っていません。
  「蒸発熱 / 水を水蒸気に変えるのに必要な熱を考える場面」が正しいです。用語と場面の対応が合っています。
  「フェノール / どの塩基がより電離しやすいかを比べる場面」は、用語と場面の対応が合っていません。
