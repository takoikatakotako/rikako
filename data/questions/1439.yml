# 化学基礎 問399
id: 1439
type: single_choice
text: |
  高分子化合物と最も関係が深い場面として、適切なものはどれか。
choices:
  - "電池、医薬品、素材開発などに化学が生かされる場面"
  - "酸化銅から酸素が取れて銅になる場面"
  - "ポリエチレンやタンパク質のような長い分子を考える場面"
  - "水素や炭素が相手から酸素を奪う場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  ポリエチレンやタンパク質のような長い分子を考える場面は、高分子化合物と結び付きが強い場面です。したがって、正解は「ポリエチレンやタンパク質のような長い分子を考える場面」です。
  
  「電池、医薬品、素材開発などに化学が生かされる場面」は、化学が拓く世界と結び付きが強い場面です。
  「酸化銅から酸素が取れて銅になる場面」は、還元と結び付きが強い場面です。
  「ポリエチレンやタンパク質のような長い分子を考える場面」が正しいです。これは高分子化合物と結び付きが強い場面です。
  「水素や炭素が相手から酸素を奪う場面」は、還元剤と結び付きが強い場面です。
