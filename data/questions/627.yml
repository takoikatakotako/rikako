# 令和7年度 ITパスポート 公開問題 問40
id: 627
type: single_choice
text: |
  変更管理委員会が設置されているプロジェクトで変更要求が発生した場合の記述として、最も適切なものはどれか。
choices:
  - "変更管理委員会では、プロジェクトに関わるステークホルダ以外の第三者によって変更要求が審議される。"
  - "変更管理委員会は、コストの増加や期日の延期を理由に変更要求を却下してよい。"
  - "変更管理委員会は、スコープに変更が発生しない範囲で変更要求を受け付けなければならない。"
  - "変更要求は、全てプロジェクトマネージャが承認した後に変更管理委員会で審議される。"
correct: 1
explanation: |
  変更管理委員会は、変更要求の影響を評価し、必要に応じて承認・却下を判断します。コスト増加や期日延期の影響が許容できない場合に変更要求を却下することもあるので、「変更管理委員会は、コストの増加や期日の延期を理由に変更要求を却下してよい」が正しいです。
  
  「変更管理委員会では、プロジェクトに関わるステークホルダ以外の第三者によって変更要求が審議される」は変更管理委員会は必ずしも第三者だけで構成されるわけではありません。
  「変更管理委員会は、コストの増加や期日の延期を理由に変更要求を却下してよい」が正しいです。影響評価の結果として、コストや納期を理由に却下することがあります。
  「変更管理委員会は、スコープに変更が発生しない範囲で変更要求を受け付けなければならない」は変更要求はスコープ変更を含み得るため、この条件は誤りです。
  「変更要求は、全てプロジェクトマネージャが承認した後に変更管理委員会で審議される」は全てを事前にプロジェクトマネージャが承認する必要はありません。
