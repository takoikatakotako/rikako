# 化学基礎 問163
id: 1203
type: single_choice
text: |
  凝固の例として、最も適切なものはどれか。
choices:
  - "ドライアイスが気体になる変化"
  - "水が氷になる変化"
  - "炭素の原子番号が 6 であること"
  - "炭素 12 の 12"
correct: 1
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  水が氷になる変化は、凝固の例です。したがって、正解は「水が氷になる変化」です。
  
  「ドライアイスが気体になる変化」は、昇華の例として見る方が適切です。
  「水が氷になる変化」が正しいです。これは凝固の例です。
  「炭素の原子番号が 6 であること」は、原子番号の例として見る方が適切です。
  「炭素 12 の 12」は、質量数の例として見る方が適切です。
