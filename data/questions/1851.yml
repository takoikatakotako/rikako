# 化学基礎 問811
id: 1851
type: single_choice
text: |
  「固体から液体への変化であること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "氷を温めて水にする場面"
  - "電池、医薬品、素材開発などに化学が生かされる場面"
  - "鉄や酸素のように一種類の元素だけからできた物質を考える場面"
  - "ドライアイスがそのまま気体になる場面"
correct: 0
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「固体から液体への変化であること」という見方と最も関係が深い場面は「氷を温めて水にする場面」です。したがって、正解は「氷を温めて水にする場面」です。
  
  「氷を温めて水にする場面」が正しいです。この見方と最も関係が深い場面です。
  「電池、医薬品、素材開発などに化学が生かされる場面」は、その場面で大切なのは「化学が社会や生活に広く役立つこと」という見方です。
  「鉄や酸素のように一種類の元素だけからできた物質を考える場面」は、その場面で大切なのは「一種類の元素だけからできること」という見方です。
  「ドライアイスがそのまま気体になる場面」は、その場面で大切なのは「固体から直接気体になること」という見方です。
