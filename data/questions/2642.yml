# 高校化学 問642
id: 2642
type: single_choice
text: |
  「植物が光を受けてデンプンなどをつくる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "電離する粒子と電離していない粒子が平衡になっている状態である。"
  - "周期表18族に属し、化学的に安定な気体元素の総称である。"
  - "光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。"
  - "分子中の原子や原子団が別の原子や原子団に置き換わる反応である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「植物が光を受けてデンプンなどをつくる場面」を説明した文として適切なのは「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」です。したがって、正解は「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」です。
  
  「電離する粒子と電離していない粒子が平衡になっている状態である。」は、この説明は「弱酸が一部だけ電離している水溶液を考える場面」と結び付きが強いです。
  「周期表18族に属し、化学的に安定な気体元素の総称である。」は、この説明は「ネオンやアルゴンが反応しにくい理由を考える場面」と結び付きが強いです。
  「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」が正しいです。この具体例を説明した文です。
  「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」は、この説明は「メタンの水素が塩素に置き換わる場面」と結び付きが強いです。
