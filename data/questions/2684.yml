# 高校化学 問684
id: 2684
type: single_choice
text: |
  「ホルムアルデヒドやアセトアルデヒドを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "分子の端にアルデヒド基をもつ有機化合物である。"
  - "分子どうしの間にはたらく比較的弱い引力である。"
  - "分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。"
  - "溶ける速さと析出する速さが等しくなっている平衡である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「ホルムアルデヒドやアセトアルデヒドを考える場面」を説明した文として適切なのは「分子の端にアルデヒド基をもつ有機化合物である。」です。したがって、正解は「分子の端にアルデヒド基をもつ有機化合物である。」です。
  
  「分子の端にアルデヒド基をもつ有機化合物である。」が正しいです。この具体例を説明した文です。
  「分子どうしの間にはたらく比較的弱い引力である。」は、この説明は「水やエタノールの沸点の違いを考える場面」と結び付きが強いです。
  「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」は、この説明は「高圧や低温で気体のふるまいが理想気体からずれる場面」と結び付きが強いです。
  「溶ける速さと析出する速さが等しくなっている平衡である。」は、この説明は「飽和溶液で見かけ上変化が止まっている場面」と結び付きが強いです。
