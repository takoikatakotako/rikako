# 高校化学 問67
id: 2067
type: single_choice
text: |
  アルカリ金属についての説明として、最も適切なものはどれか。
choices:
  - "周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。"
  - "周期表18族に属し、化学的に安定な気体元素の総称である。"
  - "周期表1族に属し、水と反応しやすい金属元素の総称である。"
  - "中心となる金属イオンに配位子が結び付いたイオンである。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  アルカリ金属は、周期表1族に属し、水と反応しやすい金属元素の総称である。 したがって、正解は「周期表1族に属し、水と反応しやすい金属元素の総称である。」です。
  
  「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」は、アルカリ土類金属の説明です。
  「周期表18族に属し、化学的に安定な気体元素の総称である。」は、貴ガスの説明です。
  「周期表1族に属し、水と反応しやすい金属元素の総称である。」が正しいです。アルカリ金属の説明です。
  「中心となる金属イオンに配位子が結び付いたイオンである。」は、錯イオンの説明です。
