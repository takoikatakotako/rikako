# 高校化学 問999
id: 2999
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "アンモニア合成 / フッ素や塩素、臭素の反応性を比べる場面"
  - "ハロゲン / エチレンに臭素が付加する場面"
  - "資源の再利用 / 金属やプラスチックを回収して再資源化する場面"
  - "付加反応 / 高圧や触媒を利用してアンモニアを得る場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「資源の再利用 / 金属やプラスチックを回収して再資源化する場面」です。したがって、正解は「資源の再利用 / 金属やプラスチックを回収して再資源化する場面」です。
  
  「アンモニア合成 / フッ素や塩素、臭素の反応性を比べる場面」は、用語と場面の対応が合っていません。
  「ハロゲン / エチレンに臭素が付加する場面」は、用語と場面の対応が合っていません。
  「資源の再利用 / 金属やプラスチックを回収して再資源化する場面」が正しいです。用語と場面の対応が合っています。
  「付加反応 / 高圧や触媒を利用してアンモニアを得る場面」は、用語と場面の対応が合っていません。
