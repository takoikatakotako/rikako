# 化学基礎 問789
id: 1829
type: single_choice
text: |
  「相手を酸化させ、自分は還元されること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "陽イオンと陰イオンの静電気的な引力による結び付きである。"
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
  - "溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。"
  - "相手を酸化させ、自身は還元される物質である。"
correct: 3
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「相手を酸化させ、自分は還元されること」という見方と最も関係が深い説明は「相手を酸化させ、自身は還元される物質である。」です。したがって、正解は「相手を酸化させ、自身は還元される物質である。」です。
  
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」は、その説明で大切なのは「電気的な引力で結び付くこと」という見方です。
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」は、その説明で大切なのは「1Lあたりの物質量で表すこと」という見方です。
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」は、その説明で大切なのは「色の変化で液性を見分けること」という見方です。
  「相手を酸化させ、自身は還元される物質である。」が正しいです。この見方と最も関係が深い説明です。
