# 化学基礎 問813
id: 1853
type: single_choice
text: |
  「液体から固体への変化であること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水とエタノールの混合物を沸点の差で分ける場面"
  - "氷が溶けて水になる場面"
  - "水を冷やして氷にする場面"
  - "炭素12で陽子数と中性子数の合計を見る場面"
correct: 2
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「液体から固体への変化であること」という見方と最も関係が深い場面は「水を冷やして氷にする場面」です。したがって、正解は「水を冷やして氷にする場面」です。
  
  「水とエタノールの混合物を沸点の差で分ける場面」は、その場面で大切なのは「沸点の違いを利用すること」という見方です。
  「氷が溶けて水になる場面」は、その場面で大切なのは「物質の種類が変わらないこと」という見方です。
  「水を冷やして氷にする場面」が正しいです。この見方と最も関係が深い場面です。
  「炭素12で陽子数と中性子数の合計を見る場面」は、その場面で大切なのは「陽子数と中性子数の合計であること」という見方です。
