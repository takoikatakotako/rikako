# 化学基礎 問640
id: 1680
type: single_choice
text: |
  「相手を還元させ、自分は酸化されること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "純物質"
  - "還元剤"
  - "蒸発"
  - "最外殻電子"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「相手を還元させ、自分は酸化されること」という見方が大切なのは還元剤です。したがって、正解は「還元剤」です。
  
  「純物質」は、その語で大切なのは「成分が一種類で性質が一定であること」という見方です。
  「還元剤」が正しいです。この見方が大切な語です。
  「蒸発」は、その語で大切なのは「液体から気体への変化であること」という見方です。
  「最外殻電子」は、その語で大切なのは「化学結合やイオンのできやすさに関係すること」という見方です。
