# 化学基礎 問178
id: 1218
type: single_choice
text: |
  モルの例として、最も適切なものはどれか。
choices:
  - "1 mol の水分子"
  - "1 mol/L の食塩水"
  - "2H2 + O2 → 2H2O"
  - "塩酸"
correct: 0
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  1 mol の水分子は、モルの例です。したがって、正解は「1 mol の水分子」です。
  
  「1 mol の水分子」が正しいです。これはモルの例です。
  「1 mol/L の食塩水」は、モル濃度の例として見る方が適切です。
  「2H2 + O2 → 2H2O」は、化学反応式の例として見る方が適切です。
  「塩酸」は、酸の例として見る方が適切です。
