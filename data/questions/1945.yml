# 化学基礎 問905
id: 1945
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "純物質 / 酸素だけが入った容器を考える場面"
  - "化学変化 / 炭素12と炭素14を比べる場面"
  - "同位体 / 金属中で自由電子が動けるため電気を通すことを考える場面"
  - "金属結合 / 鉄がさびて別の物質になる場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「純物質 / 酸素だけが入った容器を考える場面」です。したがって、正解は「純物質 / 酸素だけが入った容器を考える場面」です。
  
  「純物質 / 酸素だけが入った容器を考える場面」が正しいです。用語と場面の対応が合っています。
  「化学変化 / 炭素12と炭素14を比べる場面」は、用語と場面の対応が合っていません。
  「同位体 / 金属中で自由電子が動けるため電気を通すことを考える場面」は、用語と場面の対応が合っていません。
  「金属結合 / 鉄がさびて別の物質になる場面」は、用語と場面の対応が合っていません。
