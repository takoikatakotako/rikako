# 高校化学 問967
id: 2967
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "凝固点降下 / 複数の反応式を組み合わせて全体の反応熱を求める場面"
  - "ヘスの法則 / 電気分解で気体が発生する電極側を考える場面"
  - "アルカリ金属 / ナトリウムやカリウムの性質を比べる場面"
  - "陽極 / 凍結防止剤をまいた道路の水が凍りにくくなる場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「アルカリ金属 / ナトリウムやカリウムの性質を比べる場面」です。したがって、正解は「アルカリ金属 / ナトリウムやカリウムの性質を比べる場面」です。
  
  「凝固点降下 / 複数の反応式を組み合わせて全体の反応熱を求める場面」は、用語と場面の対応が合っていません。
  「ヘスの法則 / 電気分解で気体が発生する電極側を考える場面」は、用語と場面の対応が合っていません。
  「アルカリ金属 / ナトリウムやカリウムの性質を比べる場面」が正しいです。用語と場面の対応が合っています。
  「陽極 / 凍結防止剤をまいた道路の水が凍りにくくなる場面」は、用語と場面の対応が合っていません。
