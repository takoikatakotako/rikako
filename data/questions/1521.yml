# 化学基礎 問481
id: 1521
type: single_choice
text: |
  酸を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸素との結び付きや電子の放出に注目すること"
  - "相手を酸化させ、自分は還元されること"
  - "水素イオンに注目すること"
  - "金属のイオンになりやすさを比べること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  酸では、「水素イオンに注目すること」という見方が大切です。したがって、正解は「水素イオンに注目すること」です。
  
  「酸素との結び付きや電子の放出に注目すること」は、酸化に関係する見方です。
  「相手を酸化させ、自分は還元されること」は、酸化剤に関係する見方です。
  「水素イオンに注目すること」が正しいです。酸の要点を表しています。
  「金属のイオンになりやすさを比べること」は、イオン化傾向に関係する見方です。
