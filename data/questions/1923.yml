# 化学基礎 問883
id: 1923
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "モル / 溶けた物質のうち、電離してイオンになった割合である。"
  - "電離度 / 亜鉛と銅の反応を利用して電気を取り出す電池である。"
  - "ダニエル電池 / 粒子の数をまとめて表すための単位である。"
  - "中和 / 酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。"
correct: 3
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「中和 / 酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」です。したがって、正解は「中和 / 酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」です。
  
  「モル / 溶けた物質のうち、電離してイオンになった割合である。」は、用語と説明の対応が合っていません。
  「電離度 / 亜鉛と銅の反応を利用して電気を取り出す電池である。」は、用語と説明の対応が合っていません。
  「ダニエル電池 / 粒子の数をまとめて表すための単位である。」は、用語と説明の対応が合っていません。
  「中和 / 酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」が正しいです。用語と説明の対応が合っています。
