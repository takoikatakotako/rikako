# 高校化学 問104
id: 2104
type: single_choice
text: |
  蒸気圧と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ふたをした容器の中で液体の上にたまる蒸気を考える場面"
  - "高圧や低温で気体のふるまいが理想気体からずれる場面"
  - "食塩や金属の規則正しい並び方を考える場面"
  - "ドライアイスやヨウ素の結晶を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  ふたをした容器の中で液体の上にたまる蒸気を考える場面は、蒸気圧と結び付きが強い場面です。したがって、正解は「ふたをした容器の中で液体の上にたまる蒸気を考える場面」です。
  
  「ふたをした容器の中で液体の上にたまる蒸気を考える場面」が正しいです。これは蒸気圧と結び付きが強い場面です。
  「高圧や低温で気体のふるまいが理想気体からずれる場面」は、実在気体と結び付きが強い場面です。
  「食塩や金属の規則正しい並び方を考える場面」は、結晶格子と結び付きが強い場面です。
  「ドライアイスやヨウ素の結晶を考える場面」は、分子結晶と結び付きが強い場面です。
