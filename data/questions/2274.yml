# 高校化学 問274
id: 2274
type: single_choice
text: |
  「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "付加反応"
  - "異性体"
  - "アルデヒド"
  - "遷移元素"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。 に当てはまる語は遷移元素です。したがって、正解は「遷移元素」です。
  
  「付加反応」は、「多重結合に原子や原子団が加わる反応である。」に当てはまる語です。
  「異性体」は、「分子式は同じでも構造が異なる化合物どうしである。」に当てはまる語です。
  「アルデヒド」は、「分子の端にアルデヒド基をもつ有機化合物である。」に当てはまる語です。
  「遷移元素」が正しいです。「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」に当てはまる語です。
