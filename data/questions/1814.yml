# 化学基礎 問774
id: 1814
type: single_choice
text: |
  「自由電子が結合を支えること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "金属原子が自由電子を介して結び付く結合である。"
  - "一種類の元素だけからできている物質である。"
  - "固体が液体にならずに気体になる状態変化である。"
  - "原子や原子団が電子を受け取って負の電荷をもつ粒子である。"
correct: 0
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「自由電子が結合を支えること」という見方と最も関係が深い説明は「金属原子が自由電子を介して結び付く結合である。」です。したがって、正解は「金属原子が自由電子を介して結び付く結合である。」です。
  
  「金属原子が自由電子を介して結び付く結合である。」が正しいです。この見方と最も関係が深い説明です。
  「一種類の元素だけからできている物質である。」は、その説明で大切なのは「一種類の元素だけからできること」という見方です。
  「固体が液体にならずに気体になる状態変化である。」は、その説明で大切なのは「固体から直接気体になること」という見方です。
  「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」は、その説明で大切なのは「電子を受け取って負に帯電すること」という見方です。
