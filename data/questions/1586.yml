# 化学基礎 問546
id: 1586
type: single_choice
text: |
  「放射線を出しながら別の原子へ変わっていく同位体である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ポリエチレンやタンパク質のような長い分子を考える場面"
  - "医療や年代測定に利用される炭素14を考える場面"
  - "空気や食塩水のように複数の物質が混ざったものを考える場面"
  - "水を冷やして氷にする場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「放射線を出しながら別の原子へ変わっていく同位体である。」と最も関係が深い場面は「医療や年代測定に利用される炭素14を考える場面」です。したがって、正解は「医療や年代測定に利用される炭素14を考える場面」です。
  
  「ポリエチレンやタンパク質のような長い分子を考える場面」は、「多数の小さな単位がつながってできた大きな分子からなる化合物である。」と結び付きが強い場面です。
  「医療や年代測定に利用される炭素14を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「空気や食塩水のように複数の物質が混ざったものを考える場面」は、「二種類以上の物質が混ざってできている物質である。」と結び付きが強い場面です。
  「水を冷やして氷にする場面」は、「液体が固体に変わる状態変化である。」と結び付きが強い場面です。
