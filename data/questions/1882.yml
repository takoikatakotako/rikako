# 化学基礎 問842
id: 1882
type: single_choice
text: |
  「化学エネルギーを電気エネルギーに変えること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "塩酸が水溶液中で水素イオンを生じる場面"
  - "酸化銅から酸素が取れて銅になる場面"
  - "砂糖水が電流をほとんど通さない場面"
  - "亜鉛板と銅板を使って豆電球を光らせる場面"
correct: 3
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「化学エネルギーを電気エネルギーに変えること」という見方と最も関係が深い場面は「亜鉛板と銅板を使って豆電球を光らせる場面」です。したがって、正解は「亜鉛板と銅板を使って豆電球を光らせる場面」です。
  
  「塩酸が水溶液中で水素イオンを生じる場面」は、その場面で大切なのは「水素イオンに注目すること」という見方です。
  「酸化銅から酸素が取れて銅になる場面」は、その場面で大切なのは「酸素の喪失や電子の受け取りに注目すること」という見方です。
  「砂糖水が電流をほとんど通さない場面」は、その場面で大切なのは「水溶液でも電流をほとんど通さないこと」という見方です。
  「亜鉛板と銅板を使って豆電球を光らせる場面」が正しいです。この見方と最も関係が深い場面です。
