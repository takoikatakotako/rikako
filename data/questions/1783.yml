# 化学基礎 問743
id: 1783
type: single_choice
text: |
  「ダニエル電池で二つの水溶液をつなぐ場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "電子を失って正に帯電すること"
  - "電荷のかたよりがほとんどないこと"
  - "電池の中で電気的なつり合いを保つこと"
  - "酸性と塩基性の強さを数で見ること"
correct: 2
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「ダニエル電池で二つの水溶液をつなぐ場面」では、「電池の中で電気的なつり合いを保つこと」という見方が大切です。したがって、正解は「電池の中で電気的なつり合いを保つこと」です。
  
  「電子を失って正に帯電すること」は、その見方はナトリウム原子が電子を1個失って Na+ になる場面よりも陽イオンと結び付きが強いです。
  「電荷のかたよりがほとんどないこと」は、その見方は酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面よりも無極性分子と結び付きが強いです。
  「電池の中で電気的なつり合いを保つこと」が正しいです。この具体例で大切になる見方です。
  「酸性と塩基性の強さを数で見ること」は、その見方はレモン水とせっけん水の酸性・塩基性を比べる場面よりもpHと結び付きが強いです。
