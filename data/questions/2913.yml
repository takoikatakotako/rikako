# 高校化学 問913
id: 2913
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "絶対温度 / 気体の法則で温度をセルシウス温度ではなく K で扱う場面"
  - "錯イオン / エタノールの性質や利用を考える場面"
  - "アルコール / アミノ酸がつながってペプチドになる場面"
  - "ペプチド結合 / アンモニアを加えると深い青色のイオンができる場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「絶対温度 / 気体の法則で温度をセルシウス温度ではなく K で扱う場面」です。したがって、正解は「絶対温度 / 気体の法則で温度をセルシウス温度ではなく K で扱う場面」です。
  
  「絶対温度 / 気体の法則で温度をセルシウス温度ではなく K で扱う場面」が正しいです。用語と場面の対応が合っています。
  「錯イオン / エタノールの性質や利用を考える場面」は、用語と場面の対応が合っていません。
  「アルコール / アミノ酸がつながってペプチドになる場面」は、用語と場面の対応が合っていません。
  「ペプチド結合 / アンモニアを加えると深い青色のイオンができる場面」は、用語と場面の対応が合っていません。
