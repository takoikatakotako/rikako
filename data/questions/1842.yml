# 化学基礎 問802
id: 1842
type: single_choice
text: |
  「沸点の違いを利用すること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "亜鉛が銅より先にイオンになりやすいことを見る場面"
  - "食品の変色や劣化を防ぐためにビタミンCを使う場面"
  - "酸素だけが入った容器を考える場面"
  - "水とエタノールの混合物を沸点の差で分ける場面"
correct: 3
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「沸点の違いを利用すること」という見方と最も関係が深い場面は「水とエタノールの混合物を沸点の差で分ける場面」です。したがって、正解は「水とエタノールの混合物を沸点の差で分ける場面」です。
  
  「亜鉛が銅より先にイオンになりやすいことを見る場面」は、その場面で大切なのは「金属のイオンになりやすさを比べること」という見方です。
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」は、その場面で大切なのは「酸化による変質を防ぐこと」という見方です。
  「酸素だけが入った容器を考える場面」は、その場面で大切なのは「成分が一種類で性質が一定であること」という見方です。
  「水とエタノールの混合物を沸点の差で分ける場面」が正しいです。この見方と最も関係が深い場面です。
