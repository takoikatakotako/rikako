# 化学基礎 問795
id: 1835
type: single_choice
text: |
  「水溶液でも電流をほとんど通さないこと」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "粒子の数をまとめて表すための単位である。"
  - "水に溶けても電流をほとんど通さない物質である。"
  - "溶けた物質のうち、電離してイオンになった割合である。"
  - "亜鉛と銅の反応を利用して電気を取り出す電池である。"
correct: 1
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「水溶液でも電流をほとんど通さないこと」という見方と最も関係が深い説明は「水に溶けても電流をほとんど通さない物質である。」です。したがって、正解は「水に溶けても電流をほとんど通さない物質である。」です。
  
  「粒子の数をまとめて表すための単位である。」は、その説明で大切なのは「粒子の数をまとめて扱う単位であること」という見方です。
  「水に溶けても電流をほとんど通さない物質である。」が正しいです。この見方と最も関係が深い説明です。
  「溶けた物質のうち、電離してイオンになった割合である。」は、その説明で大切なのは「どのくらいイオンに分かれるかを表すこと」という見方です。
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」は、その説明で大切なのは「化学エネルギーを電気エネルギーに変えること」という見方です。
