# 高校化学 問187
id: 2187
type: single_choice
text: |
  ベンゼンと最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムで黄色、銅で青緑色を確かめる場面"
  - "電線や青色の銅イオン水溶液を考える場面"
  - "金属やプラスチックを回収して再資源化する場面"
  - "芳香族化合物の基本構造を学ぶ場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  芳香族化合物の基本構造を学ぶ場面は、ベンゼンと結び付きが強い場面です。したがって、正解は「芳香族化合物の基本構造を学ぶ場面」です。
  
  「ナトリウムで黄色、銅で青緑色を確かめる場面」は、炎色反応と結び付きが強い場面です。
  「電線や青色の銅イオン水溶液を考える場面」は、銅と結び付きが強い場面です。
  「金属やプラスチックを回収して再資源化する場面」は、資源の再利用と結び付きが強い場面です。
  「芳香族化合物の基本構造を学ぶ場面」が正しいです。これはベンゼンと結び付きが強い場面です。
