# 化学基礎 問893
id: 1933
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "還元 / 水に溶けても電流をほとんど通さない物質である。"
  - "塩橋 / 二つの溶液の電気的なつり合いを保つための部分である。"
  - "非電解質 / 沸点の違いを利用して液体を分ける方法である。"
  - "蒸留 / 物質が酸素を失う、または電子を受け取る変化である。"
correct: 1
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「塩橋 / 二つの溶液の電気的なつり合いを保つための部分である。」です。したがって、正解は「塩橋 / 二つの溶液の電気的なつり合いを保つための部分である。」です。
  
  「還元 / 水に溶けても電流をほとんど通さない物質である。」は、用語と説明の対応が合っていません。
  「塩橋 / 二つの溶液の電気的なつり合いを保つための部分である。」が正しいです。用語と説明の対応が合っています。
  「非電解質 / 沸点の違いを利用して液体を分ける方法である。」は、用語と説明の対応が合っていません。
  「蒸留 / 物質が酸素を失う、または電子を受け取る変化である。」は、用語と説明の対応が合っていません。
