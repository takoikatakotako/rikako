# 高校化学 問671
id: 2671
type: single_choice
text: |
  「酸化アルミニウムが酸にも塩基にも溶ける場面」を説明した文として、最も適切なものはどれか。
choices:
  - "ベンゼン環にヒドロキシ基が直接結び付いた化合物である。"
  - "使い終わった資源や製品を回収し、再び利用する考え方である。"
  - "気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。"
  - "酸とも塩基とも反応する酸化物である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「酸化アルミニウムが酸にも塩基にも溶ける場面」を説明した文として適切なのは「酸とも塩基とも反応する酸化物である。」です。したがって、正解は「酸とも塩基とも反応する酸化物である。」です。
  
  「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」は、この説明は「フェノール類の酸性や消毒作用を考える場面」と結び付きが強いです。
  「使い終わった資源や製品を回収し、再び利用する考え方である。」は、この説明は「金属やプラスチックを回収して再資源化する場面」と結び付きが強いです。
  「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」は、この説明は「気体の量と温度から体積や圧力を見積もる場面」と結び付きが強いです。
  「酸とも塩基とも反応する酸化物である。」が正しいです。この具体例を説明した文です。
