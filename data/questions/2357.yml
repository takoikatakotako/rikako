# 高校化学 問357
id: 2357
type: single_choice
text: |
  「圧力や濃度を変えると平衡が移る方向を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "化学発光"
  - "溶解"
  - "飽和溶液"
  - "ルシャトリエの原理"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  圧力や濃度を変えると平衡が移る方向を考える場面 と最も関係が深いのはルシャトリエの原理です。したがって、正解は「ルシャトリエの原理」です。
  
  「化学発光」は、「ケミカルライトが光る仕組みを考える場面」と結び付きが強い語です。
  「溶解」は、「食塩が水に溶けて見えなくなる場面」と結び付きが強い語です。
  「飽和溶液」は、「食塩を加えても底に残るようになった食塩水を考える場面」と結び付きが強い語です。
  「ルシャトリエの原理」が正しいです。この具体例と最も関係が深い語です。
