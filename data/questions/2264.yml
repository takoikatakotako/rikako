# 高校化学 問264
id: 2264
type: single_choice
text: |
  「水溶液中で一部だけ電離する塩基である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "光合成"
  - "弱塩基"
  - "溶解度"
  - "溶解平衡"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  水溶液中で一部だけ電離する塩基である。 に当てはまる語は弱塩基です。したがって、正解は「弱塩基」です。
  
  「光合成」は、「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」に当てはまる語です。
  「弱塩基」が正しいです。「水溶液中で一部だけ電離する塩基である。」に当てはまる語です。
  「溶解度」は、「一定量の溶媒に溶けることのできる溶質の最大量である。」に当てはまる語です。
  「溶解平衡」は、「溶ける速さと析出する速さが等しくなっている平衡である。」に当てはまる語です。
