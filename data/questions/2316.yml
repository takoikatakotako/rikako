# 高校化学 問316
id: 2316
type: single_choice
text: |
  「ドライアイスやヨウ素の結晶を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "イオン結晶"
  - "金属結晶"
  - "分子結晶"
  - "分子間力"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  ドライアイスやヨウ素の結晶を考える場面 と最も関係が深いのは分子結晶です。したがって、正解は「分子結晶」です。
  
  「イオン結晶」は、「塩化ナトリウムの結晶のつくりを考える場面」と結び付きが強い語です。
  「金属結晶」は、「金属が電気を通したりのびたりする理由を考える場面」と結び付きが強い語です。
  「分子結晶」が正しいです。この具体例と最も関係が深い語です。
  「分子間力」は、「水やエタノールの沸点の違いを考える場面」と結び付きが強い語です。
