# 高校化学 問256
id: 2256
type: single_choice
text: |
  「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "ファラデーの法則"
  - "平衡定数"
  - "エンタルピー変化"
  - "結合エネルギー"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  化学平衡の状態を表す、平衡時の濃度や分圧の比である。 に当てはまる語は平衡定数です。したがって、正解は「平衡定数」です。
  
  「ファラデーの法則」は、「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」に当てはまる語です。
  「平衡定数」が正しいです。「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」に当てはまる語です。
  「エンタルピー変化」は、「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」に当てはまる語です。
  「結合エネルギー」は、「気体分子中の結合1 molを切るのに必要なエネルギーである。」に当てはまる語です。
