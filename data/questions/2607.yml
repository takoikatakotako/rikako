# 高校化学 問607
id: 2607
type: single_choice
text: |
  「水を水蒸気に変えるのに必要な熱を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。"
  - "化学反応に伴って出入りする熱量である。"
  - "燃料と酸化剤を外部から供給しながら電気を取り出す電池である。"
  - "液体1 molが気体になるときに吸収する熱量である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「水を水蒸気に変えるのに必要な熱を考える場面」を説明した文として適切なのは「液体1 molが気体になるときに吸収する熱量である。」です。したがって、正解は「液体1 molが気体になるときに吸収する熱量である。」です。
  
  「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」は、この説明は「食塩水が純水より蒸発しにくくなることを考える場面」と結び付きが強いです。
  「化学反応に伴って出入りする熱量である。」は、この説明は「物質を燃やしたときに熱が出ることを考える場面」と結び付きが強いです。
  「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」は、この説明は「水素を使って発電し、水を生じる仕組みを考える場面」と結び付きが強いです。
  「液体1 molが気体になるときに吸収する熱量である。」が正しいです。この具体例を説明した文です。
