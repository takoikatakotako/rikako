# 化学基礎 問769
id: 1809
type: single_choice
text: |
  「化学結合やイオンのできやすさに関係すること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "沸点の違いを利用して液体を分ける方法である。"
  - "物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
  - "原子核の中にある陽子数と中性子数の合計である。"
  - "原子のいちばん外側の電子殻にある電子である。"
correct: 3
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「化学結合やイオンのできやすさに関係すること」という見方と最も関係が深い説明は「原子のいちばん外側の電子殻にある電子である。」です。したがって、正解は「原子のいちばん外側の電子殻にある電子である。」です。
  
  「沸点の違いを利用して液体を分ける方法である。」は、その説明で大切なのは「沸点の違いを利用すること」という見方です。
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」は、その説明で大切なのは「物質の種類が変わらないこと」という見方です。
  「原子核の中にある陽子数と中性子数の合計である。」は、その説明で大切なのは「陽子数と中性子数の合計であること」という見方です。
  「原子のいちばん外側の電子殻にある電子である。」が正しいです。この見方と最も関係が深い説明です。
