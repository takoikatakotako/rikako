# 化学基礎 問980
id: 2020
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "イオン化傾向 / 酸化による変質を防ぐこと"
  - "酸化防止剤 / 成分が一種類で性質が一定であること"
  - "化学反応式 / 反応する物質とできる物質の関係を式で示すこと"
  - "純物質 / 金属のイオンになりやすさを比べること"
correct: 2
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「化学反応式 / 反応する物質とできる物質の関係を式で示すこと」です。したがって、正解は「化学反応式 / 反応する物質とできる物質の関係を式で示すこと」です。
  
  「イオン化傾向 / 酸化による変質を防ぐこと」は、用語と要点の対応が合っていません。
  「酸化防止剤 / 成分が一種類で性質が一定であること」は、用語と要点の対応が合っていません。
  「化学反応式 / 反応する物質とできる物質の関係を式で示すこと」が正しいです。用語と要点の対応が合っています。
  「純物質 / 金属のイオンになりやすさを比べること」は、用語と要点の対応が合っていません。
