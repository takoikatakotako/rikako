# 化学基礎 問809
id: 1849
type: single_choice
text: |
  「物質の種類が変わらないこと」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "食品の変色や劣化を防ぐためにビタミンCを使う場面"
  - "酸素だけが入った容器を考える場面"
  - "氷が溶けて水になる場面"
  - "ぬれた床の水がしだいに乾く場面"
correct: 2
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「物質の種類が変わらないこと」という見方と最も関係が深い場面は「氷が溶けて水になる場面」です。したがって、正解は「氷が溶けて水になる場面」です。
  
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」は、その場面で大切なのは「酸化による変質を防ぐこと」という見方です。
  「酸素だけが入った容器を考える場面」は、その場面で大切なのは「成分が一種類で性質が一定であること」という見方です。
  「氷が溶けて水になる場面」が正しいです。この見方と最も関係が深い場面です。
  「ぬれた床の水がしだいに乾く場面」は、その場面で大切なのは「液体から気体への変化であること」という見方です。
