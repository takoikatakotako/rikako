# 高校化学 問322
id: 2322
type: single_choice
text: |
  「食塩を加えても底に残るようになった食塩水を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "飽和溶液"
  - "弱塩基"
  - "塩基解離定数"
  - "溶解度"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  食塩を加えても底に残るようになった食塩水を考える場面 と最も関係が深いのは飽和溶液です。したがって、正解は「飽和溶液」です。
  
  「飽和溶液」が正しいです。この具体例と最も関係が深い語です。
  「弱塩基」は、「アンモニア水が強塩基ほど完全には電離しない場面」と結び付きが強い語です。
  「塩基解離定数」は、「どの塩基がより電離しやすいかを比べる場面」と結び付きが強い語です。
  「溶解度」は、「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」と結び付きが強い語です。
