# 高校化学 問543
id: 2543
type: single_choice
text: |
  「一度使い切ることを前提にした一次電池の代表例である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水素を使って発電し、水を生じる仕組みを考える場面"
  - "圧力や濃度を変えると平衡が移る方向を考える場面"
  - "懐中電灯や時計に入っている電池を考える場面"
  - "マグネシウムやカルシウムの性質を比べる場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「一度使い切ることを前提にした一次電池の代表例である。」と最も関係が深い場面は「懐中電灯や時計に入っている電池を考える場面」です。したがって、正解は「懐中電灯や時計に入っている電池を考える場面」です。
  
  「水素を使って発電し、水を生じる仕組みを考える場面」は、「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」と結び付きが強い場面です。
  「圧力や濃度を変えると平衡が移る方向を考える場面」は、「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」と結び付きが強い場面です。
  「懐中電灯や時計に入っている電池を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「マグネシウムやカルシウムの性質を比べる場面」は、「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」と結び付きが強い場面です。
