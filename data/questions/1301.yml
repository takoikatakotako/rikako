# 化学基礎 問261
id: 1301
type: single_choice
text: |
  融解の特徴として、最も適切なものはどれか。
choices:
  - "液体が気体になる"
  - "固体が液体になる"
  - "液体が固体になる"
  - "固体が直接気体になる"
correct: 1
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  融解では、「固体が液体になる」という点が大切です。したがって、正解は「固体が液体になる」です。
  
  「液体が気体になる」は、蒸発に関係する特徴です。
  「固体が液体になる」が正しいです。融解の特徴を表しています。
  「液体が固体になる」は、凝固に関係する特徴です。
  「固体が直接気体になる」は、昇華に関係する特徴です。
