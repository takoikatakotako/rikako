# 化学基礎 問679
id: 1719
type: single_choice
text: |
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "化学が社会や生活に広く役立つこと"
  - "一種類の元素だけからできること"
  - "固体から直接気体になること"
  - "1Lあたりの物質量で表すこと"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」を理解する上では、「1Lあたりの物質量で表すこと」という見方が大切です。したがって、正解は「1Lあたりの物質量で表すこと」です。
  
  「化学が社会や生活に広く役立つこと」は、その見方は化学が拓く世界に関係します。
  「一種類の元素だけからできること」は、その見方は単体に関係します。
  「固体から直接気体になること」は、その見方は昇華に関係します。
  「1Lあたりの物質量で表すこと」が正しいです。この説明と結び付きが強い見方です。
