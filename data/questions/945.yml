# 令和7年度 ITパスポート 公開問題 問32
id: 945
type: single_choice
text: |
  公共交通機関での移動履歴、Web サイトでの商品検索履歴、SNSやブログで発信したデータなど、個人の活動を記録する技術、又は記録そのものを表す用語として、最も適切なものはどれか。
choices:
  - "アクティビティ"
  - "トランザクション"
  - "ライフログ"
  - "レコードキーピング"
correct: 2
explanation: |
  ライフログは、移動履歴、購買履歴、Web閲覧履歴、SNS投稿など、個人の行動や活動をデジタルデータとして記録したものを指します。したがって、正解は「ライフログ」です。
  
  「アクティビティ」はアクティビティは活動一般を指す語であり、設問の用語としては特定しない。
  「トランザクション」はトランザクションは処理単位や取引記録を意味し、個人活動全般の記録ではありません。
  「ライフログ」が正しいです。個人の行動履歴を記録したデータをライフログという。
  「レコードキーピング」はレコードキーピングは記録管理の概念であり、設問の語ではありません。
