# 化学基礎 問407
id: 1447
type: single_choice
text: |
  「一種類の元素だけからできている物質である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "混合物"
  - "単体"
  - "物理変化"
  - "融解"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  一種類の元素だけからできている物質である。 に当てはまる語は単体です。したがって、正解は「単体」です。
  
  「混合物」は、「二種類以上の物質が混ざってできている物質である。」に当てはまる語です。
  「単体」が正しいです。「一種類の元素だけからできている物質である。」に当てはまる語です。
  「物理変化」は、「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」に当てはまる語です。
  「融解」は、「固体が液体に変わる状態変化である。」に当てはまる語です。
