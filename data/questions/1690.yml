# 化学基礎 問650
id: 1690
type: single_choice
text: |
  「化学が社会や生活に広く役立つこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "原子番号"
  - "イオン結合"
  - "モル濃度"
  - "化学が拓く世界"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「化学が社会や生活に広く役立つこと」という見方が大切なのは化学が拓く世界です。したがって、正解は「化学が拓く世界」です。
  
  「原子番号」は、その語で大切なのは「陽子数を表す数であること」という見方です。
  「イオン結合」は、その語で大切なのは「電気的な引力で結び付くこと」という見方です。
  「モル濃度」は、その語で大切なのは「1Lあたりの物質量で表すこと」という見方です。
  「化学が拓く世界」が正しいです。この見方が大切な語です。
