# 高校化学 問503
id: 2503
type: single_choice
text: |
  「液体の蒸気圧が外圧に等しくなる温度である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "氷を水に変えるのに必要な熱を考える場面"
  - "ダイヤモンドや二酸化ケイ素の硬さを考える場面"
  - "水が沸騰し始める温度を考える場面"
  - "牛乳やゼラチン溶液のような見た目の系を考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「液体の蒸気圧が外圧に等しくなる温度である。」と最も関係が深い場面は「水が沸騰し始める温度を考える場面」です。したがって、正解は「水が沸騰し始める温度を考える場面」です。
  
  「氷を水に変えるのに必要な熱を考える場面」は、「固体1 molが融解するときに吸収する熱量である。」と結び付きが強い場面です。
  「ダイヤモンドや二酸化ケイ素の硬さを考える場面」は、「原子が共有結合で三次元的に結び付いた結晶である。」と結び付きが強い場面です。
  「水が沸騰し始める温度を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「牛乳やゼラチン溶液のような見た目の系を考える場面」は、「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」と結び付きが強い場面です。
