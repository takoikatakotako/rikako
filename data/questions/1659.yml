# 化学基礎 問619
id: 1659
type: single_choice
text: |
  「化学結合やイオンのできやすさに関係すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "最外殻電子"
  - "pH"
  - "イオン化傾向"
  - "酸化防止剤"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「化学結合やイオンのできやすさに関係すること」という見方が大切なのは最外殻電子です。したがって、正解は「最外殻電子」です。
  
  「最外殻電子」が正しいです。この見方が大切な語です。
  「pH」は、その語で大切なのは「酸性と塩基性の強さを数で見ること」という見方です。
  「イオン化傾向」は、その語で大切なのは「金属のイオンになりやすさを比べること」という見方です。
  「酸化防止剤」は、その語で大切なのは「酸化による変質を防ぐこと」という見方です。
