# 高校化学 問735
id: 2735
type: single_choice
text: |
  「反応に伴う熱の出入りを見ること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "反応熱"
  - "塩基解離定数"
  - "銅"
  - "フェノール"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「反応に伴う熱の出入りを見ること」という見方が大切なのは反応熱です。したがって、正解は「反応熱」です。
  
  「反応熱」が正しいです。この見方が大切な語です。
  「塩基解離定数」は、その語で大切なのは「塩基の強さを電離のしやすさで見ること」という見方です。
  「銅」は、その語で大切なのは「電気伝導性が高く、特徴的な色のイオンをつくること」という見方です。
  「フェノール」は、その語で大切なのは「ベンゼン環にヒドロキシ基が直接つくこと」という見方です。
