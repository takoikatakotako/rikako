# 化学基礎 問446
id: 1486
type: single_choice
text: |
  「放射線を出しながら別の原子へ変わっていく同位体である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "放射性同位体"
  - "酸化剤"
  - "イオン化傾向"
  - "塩橋"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  放射線を出しながら別の原子へ変わっていく同位体である。 に当てはまる語は放射性同位体です。したがって、正解は「放射性同位体」です。
  
  「放射性同位体」が正しいです。「放射線を出しながら別の原子へ変わっていく同位体である。」に当てはまる語です。
  「酸化剤」は、「相手を酸化させ、自身は還元される物質である。」に当てはまる語です。
  「イオン化傾向」は、「金属が電子を失ってイオンになりやすい性質の強さである。」に当てはまる語です。
  「塩橋」は、「二つの溶液の電気的なつり合いを保つための部分である。」に当てはまる語です。
