# 化学基礎 問317
id: 1357
type: single_choice
text: |
  同位体について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
  - "陽子数は同じで中性子数が異なる原子どうしである。"
  - "粒子の数をまとめて表すための単位である。"
  - "化学変化を、物質の種類と量の関係が分かるように表した式である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  同位体は、陽子数は同じで中性子数が異なる原子どうしである。 したがって、正解は「陽子数は同じで中性子数が異なる原子どうしである。」です。
  
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」は、物理変化の説明です。
  「陽子数は同じで中性子数が異なる原子どうしである。」が正しいです。同位体の説明です。
  「粒子の数をまとめて表すための単位である。」は、モルの説明です。
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」は、化学反応式の説明です。
