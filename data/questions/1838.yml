# 化学基礎 問798
id: 1838
type: single_choice
text: |
  「酸化による変質を防ぐこと」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "食品や物質が酸化して変質するのを防ぐために用いられる物質である。"
  - "水溶液中で水素イオンを生じる物質である。"
  - "物質が酸素を失う、または電子を受け取る変化である。"
  - "水に溶けても電流をほとんど通さない物質である。"
correct: 0
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「酸化による変質を防ぐこと」という見方と最も関係が深い説明は「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」です。したがって、正解は「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」です。
  
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」が正しいです。この見方と最も関係が深い説明です。
  「水溶液中で水素イオンを生じる物質である。」は、その説明で大切なのは「水素イオンに注目すること」という見方です。
  「物質が酸素を失う、または電子を受け取る変化である。」は、その説明で大切なのは「酸素の喪失や電子の受け取りに注目すること」という見方です。
  「水に溶けても電流をほとんど通さない物質である。」は、その説明で大切なのは「水溶液でも電流をほとんど通さないこと」という見方です。
