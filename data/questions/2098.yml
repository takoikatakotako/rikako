# 高校化学 問98
id: 2098
type: single_choice
text: |
  機能性材料についての説明として、最も適切なものはどれか。
choices:
  - "遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。"
  - "目的に応じた特別な性質をもたせてつくられた材料である。"
  - "使い終わった資源や製品を回収し、再び利用する考え方である。"
  - "アミド結合をもつ合成繊維の代表的な高分子化合物である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  機能性材料は、目的に応じた特別な性質をもたせてつくられた材料である。 したがって、正解は「目的に応じた特別な性質をもたせてつくられた材料である。」です。
  
  「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」は、鉄の説明です。
  「目的に応じた特別な性質をもたせてつくられた材料である。」が正しいです。機能性材料の説明です。
  「使い終わった資源や製品を回収し、再び利用する考え方である。」は、資源の再利用の説明です。
  「アミド結合をもつ合成繊維の代表的な高分子化合物である。」は、ナイロンの説明です。
