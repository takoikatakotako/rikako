# 高校化学 問120
id: 2120
type: single_choice
text: |
  溶解と最も関係が深い場面として、適切なものはどれか。
choices:
  - "食塩が水に溶けて見えなくなる場面"
  - "気体の法則で温度をセルシウス温度ではなく K で扱う場面"
  - "加熱すると反応が進みやすくなる理由を考える場面"
  - "生成物から再び反応物が生じる場面を考えるとき"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  食塩が水に溶けて見えなくなる場面は、溶解と結び付きが強い場面です。したがって、正解は「食塩が水に溶けて見えなくなる場面」です。
  
  「食塩が水に溶けて見えなくなる場面」が正しいです。これは溶解と結び付きが強い場面です。
  「気体の法則で温度をセルシウス温度ではなく K で扱う場面」は、絶対温度と結び付きが強い場面です。
  「加熱すると反応が進みやすくなる理由を考える場面」は、活性化エネルギーと結び付きが強い場面です。
  「生成物から再び反応物が生じる場面を考えるとき」は、可逆反応と結び付きが強い場面です。
