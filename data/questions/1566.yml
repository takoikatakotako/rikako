# 化学基礎 問526
id: 1566
type: single_choice
text: |
  「分子の中で電荷のかたよりがある分子である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "1Lの食塩水にどれだけ溶質が溶けているかを表す場面"
  - "水分子で電荷のかたよりを考える場面"
  - "BTB溶液やフェノールフタレインで液性を調べる場面"
  - "ダニエル電池で二つの水溶液をつなぐ場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「分子の中で電荷のかたよりがある分子である。」と最も関係が深い場面は「水分子で電荷のかたよりを考える場面」です。したがって、正解は「水分子で電荷のかたよりを考える場面」です。
  
  「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」は、「溶液1L中に溶けている溶質の物質量を表した濃度である。」と結び付きが強い場面です。
  「水分子で電荷のかたよりを考える場面」が正しいです。この説明と結び付きが強い場面です。
  「BTB溶液やフェノールフタレインで液性を調べる場面」は、「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」と結び付きが強い場面です。
  「ダニエル電池で二つの水溶液をつなぐ場面」は、「二つの溶液の電気的なつり合いを保つための部分である。」と結び付きが強い場面です。
