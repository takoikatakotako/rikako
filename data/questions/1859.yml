# 化学基礎 問819
id: 1859
type: single_choice
text: |
  「化学結合やイオンのできやすさに関係すること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
  - "水や二酸化炭素のように複数の元素からできた物質を考える場面"
  - "ナトリウムの陽子数から元素を区別する場面"
  - "塩化ナトリウムが陽イオンと陰イオンの引力でできる場面"
correct: 0
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「化学結合やイオンのできやすさに関係すること」という見方と最も関係が深い場面は「ナトリウムが電子を1個失いやすい理由を考える場面」です。したがって、正解は「ナトリウムが電子を1個失いやすい理由を考える場面」です。
  
  「ナトリウムが電子を1個失いやすい理由を考える場面」が正しいです。この見方と最も関係が深い場面です。
  「水や二酸化炭素のように複数の元素からできた物質を考える場面」は、その場面で大切なのは「複数の元素が結び付いてできること」という見方です。
  「ナトリウムの陽子数から元素を区別する場面」は、その場面で大切なのは「陽子数を表す数であること」という見方です。
  「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」は、その場面で大切なのは「電気的な引力で結び付くこと」という見方です。
