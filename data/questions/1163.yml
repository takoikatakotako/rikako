# 化学基礎 問123
id: 1163
type: single_choice
text: |
  共有結合についての説明として、最も適切なものはどれか。
choices:
  - "自由電子を介して金属原子どうしが結び付く結合である。"
  - "原子が結び付いてできた、一つのまとまりとして振る舞う粒子である。"
  - "原子どうしが電子を共有してできる結合である。"
  - "分子全体として電荷の偏りがある分子である。"
correct: 2
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  共有結合は、原子どうしが電子を共有してできる結合である。したがって、正解は「原子どうしが電子を共有してできる結合である。」です。
  
  「自由電子を介して金属原子どうしが結び付く結合である。」は、金属結合の説明です。
  「原子が結び付いてできた、一つのまとまりとして振る舞う粒子である。」は、分子の説明です。
  「原子どうしが電子を共有してできる結合である。」が正しいです。共有結合の説明です。
  「分子全体として電荷の偏りがある分子である。」は、極性分子の説明です。
