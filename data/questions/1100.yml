# 化学基礎 問60
id: 1100
type: single_choice
text: |
  水 H2O についての説明として、最も適切なものはどれか。
choices:
  - "水素原子と酸素原子からできた化合物である。"
  - "一種類の元素だけからできた単体である。"
  - "金属結合だけでできた物質である。"
  - "中性子だけでできた物質である。"
correct: 0
explanation: |
  この問題は、「水がどんな物質か」を基本から確認する問題です。
  
  水は、水素原子と酸素原子が結び付いてできた化合物です。したがって、正解は「水素原子と酸素原子からできた化合物である」です。
  
  「水素原子と酸素原子からできた化合物である」が正しいです。
  「一種類の元素だけからできた単体である」は、適切ではありません。
  「金属結合だけでできた物質である」は、適切ではありません。
  「中性子だけでできた物質である」は、適切ではありません。
