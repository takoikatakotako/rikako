# 化学基礎 問430
id: 1470
type: single_choice
text: |
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "化学反応式"
  - "還元剤"
  - "ダニエル電池"
  - "モル"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  化学変化を、物質の種類と量の関係が分かるように表した式である。 に当てはまる語は化学反応式です。したがって、正解は「化学反応式」です。
  
  「化学反応式」が正しいです。「化学変化を、物質の種類と量の関係が分かるように表した式である。」に当てはまる語です。
  「還元剤」は、「相手を還元させ、自身は酸化される物質である。」に当てはまる語です。
  「ダニエル電池」は、「亜鉛と銅の反応を利用して電気を取り出す電池である。」に当てはまる語です。
  「モル」は、「粒子の数をまとめて表すための単位である。」に当てはまる語です。
