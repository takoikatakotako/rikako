# 化学基礎 問728
id: 1768
type: single_choice
text: |
  「6.0×10^23個の粒子をひとまとまりとして数える場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "成分が一種類で性質が一定であること"
  - "液体から気体への変化であること"
  - "化学結合やイオンのできやすさに関係すること"
  - "粒子の数をまとめて扱う単位であること"
correct: 3
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「6.0×10^23個の粒子をひとまとまりとして数える場面」では、「粒子の数をまとめて扱う単位であること」という見方が大切です。したがって、正解は「粒子の数をまとめて扱う単位であること」です。
  
  「成分が一種類で性質が一定であること」は、その見方は酸素だけが入った容器を考える場面よりも純物質と結び付きが強いです。
  「液体から気体への変化であること」は、その見方はぬれた床の水がしだいに乾く場面よりも蒸発と結び付きが強いです。
  「化学結合やイオンのできやすさに関係すること」は、その見方はナトリウムが電子を1個失いやすい理由を考える場面よりも最外殻電子と結び付きが強いです。
  「粒子の数をまとめて扱う単位であること」が正しいです。この具体例で大切になる見方です。
