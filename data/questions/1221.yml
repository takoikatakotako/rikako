# 化学基礎 問181
id: 1221
type: single_choice
text: |
  酸の例として、最も適切なものはどれか。
choices:
  - "水酸化ナトリウム"
  - "塩酸と水酸化ナトリウムの反応"
  - "pH 3 の水溶液"
  - "塩酸"
correct: 3
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  塩酸は、酸の例です。したがって、正解は「塩酸」です。
  
  「水酸化ナトリウム」は、塩基の例として見る方が適切です。
  「塩酸と水酸化ナトリウムの反応」は、中和の例として見る方が適切です。
  「pH 3 の水溶液」は、pHの例として見る方が適切です。
  「塩酸」が正しいです。これは酸の例です。
