# 化学基礎 問699
id: 1739
type: single_choice
text: |
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電子を失って正に帯電すること"
  - "電荷のかたよりがほとんどないこと"
  - "酸性と塩基性の強さを数で見ること"
  - "小さな単位が多数つながっていること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」を理解する上では、「小さな単位が多数つながっていること」という見方が大切です。したがって、正解は「小さな単位が多数つながっていること」です。
  
  「電子を失って正に帯電すること」は、その見方は陽イオンに関係します。
  「電荷のかたよりがほとんどないこと」は、その見方は無極性分子に関係します。
  「酸性と塩基性の強さを数で見ること」は、その見方はpHに関係します。
  「小さな単位が多数つながっていること」が正しいです。この説明と結び付きが強い見方です。
