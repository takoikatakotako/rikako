# 高校化学 問11
id: 721
type: single_choice
text: |
  分圧の法則についての説明として、最も適切なものはどれか。
choices:
  - "固体1 molが融解するときに吸収する熱量である。"
  - "結晶の中で粒子が規則正しく並んだ構造である。"
  - "混合気体の全圧は各気体の分圧の和になるという法則である。"
  - "分子どうしが分子間力で集まってできた結晶である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  分圧の法則は、混合気体の全圧は各気体の分圧の和になるという法則である。 したがって、正解は「混合気体の全圧は各気体の分圧の和になるという法則である。」です。
  
  「固体1 molが融解するときに吸収する熱量である。」は、融解熱の説明です。
  「結晶の中で粒子が規則正しく並んだ構造である。」は、結晶格子の説明です。
  「混合気体の全圧は各気体の分圧の和になるという法則である。」が正しいです。分圧の法則の説明です。
  「分子どうしが分子間力で集まってできた結晶である。」は、分子結晶の説明です。
