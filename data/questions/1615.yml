# 化学基礎 問575
id: 1615
type: single_choice
text: |
  「水分子や酸素分子を粒として考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "水溶液の酸性や塩基性の強さを表す尺度である。"
  - "原子が結び付いてできた、物質の性質を示す小さな粒子である。"
  - "金属が電子を失ってイオンになりやすい性質の強さである。"
  - "食品や物質が酸化して変質するのを防ぐために用いられる物質である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「水分子や酸素分子を粒として考える場面」を説明した文として適切なのは「原子が結び付いてできた、物質の性質を示す小さな粒子である。」です。したがって、正解は「原子が結び付いてできた、物質の性質を示す小さな粒子である。」です。
  
  「水溶液の酸性や塩基性の強さを表す尺度である。」は、この説明は「レモン水とせっけん水の酸性・塩基性を比べる場面」と結び付きが強いです。
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」が正しいです。この具体例を説明した文です。
  「金属が電子を失ってイオンになりやすい性質の強さである。」は、この説明は「亜鉛が銅より先にイオンになりやすいことを見る場面」と結び付きが強いです。
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」は、この説明は「食品の変色や劣化を防ぐためにビタミンCを使う場面」と結び付きが強いです。
