# 化学基礎 問234
id: 1274
type: single_choice
text: |
  「pH 3 の水溶液」に最も関係が深い語として、適切なものはどれか。
choices:
  - "酸化"
  - "還元"
  - "酸化剤"
  - "pH"
correct: 3
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「pH 3 の水溶液」に最も関係が深いのはpHです。したがって、正解は「pH」です。
  
  「酸化」は、この例に最も関係が深い語ではありません。
  「還元」は、この例に最も関係が深い語ではありません。
  「酸化剤」は、この例に最も関係が深い語ではありません。
  「pH」が正しいです。この例はpHに関係しています。
