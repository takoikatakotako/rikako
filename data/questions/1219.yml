# 化学基礎 問179
id: 1219
type: single_choice
text: |
  モル濃度の例として、最も適切なものはどれか。
choices:
  - "2H2 + O2 → 2H2O"
  - "1 mol/L の食塩水"
  - "塩酸"
  - "水酸化ナトリウム"
correct: 1
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  1 mol/L の食塩水は、モル濃度の例です。したがって、正解は「1 mol/L の食塩水」です。
  
  「2H2 + O2 → 2H2O」は、化学反応式の例として見る方が適切です。
  「1 mol/L の食塩水」が正しいです。これはモル濃度の例です。
  「塩酸」は、酸の例として見る方が適切です。
  「水酸化ナトリウム」は、塩基の例として見る方が適切です。
