# 高校化学 問339
id: 2339
type: single_choice
text: |
  「燃焼や中和で容器が温かくなる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "電気分解"
  - "発熱反応"
  - "陰極"
  - "反応速度"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  燃焼や中和で容器が温かくなる場面 と最も関係が深いのは発熱反応です。したがって、正解は「発熱反応」です。
  
  「電気分解」は、「水溶液に電流を流して物質を分解する場面」と結び付きが強い語です。
  「発熱反応」が正しいです。この具体例と最も関係が深い語です。
  「陰極」は、「金属イオンが電子を受け取って析出する電極を考える場面」と結び付きが強い語です。
  「反応速度」は、「同じ反応でも条件によって進み方が変わることを比べる場面」と結び付きが強い語です。
