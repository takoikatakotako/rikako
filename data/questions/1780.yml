# 化学基礎 問740
id: 1780
type: single_choice
text: |
  「水素や炭素が相手から酸素を奪う場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "陽子数が同じで中性子数が異なること"
  - "自由電子が結合を支えること"
  - "水素イオンに注目すること"
  - "相手を還元させ、自分は酸化されること"
correct: 3
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「水素や炭素が相手から酸素を奪う場面」では、「相手を還元させ、自分は酸化されること」という見方が大切です。したがって、正解は「相手を還元させ、自分は酸化されること」です。
  
  「陽子数が同じで中性子数が異なること」は、その見方は炭素12と炭素14を比べる場面よりも同位体と結び付きが強いです。
  「自由電子が結合を支えること」は、その見方は金属中で自由電子が動けるため電気を通すことを考える場面よりも金属結合と結び付きが強いです。
  「水素イオンに注目すること」は、その見方は塩酸が水溶液中で水素イオンを生じる場面よりも酸と結び付きが強いです。
  「相手を還元させ、自分は酸化されること」が正しいです。この具体例で大切になる見方です。
