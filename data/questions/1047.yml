# 令和6年度 ITパスポート 公開問題 問67
id: 1047
type: single_choice
text: |
  図に示す2台のWebサーバと1台のデータベースサーバから成るWebシステムがある。Webサーバの稼働率はともに0.8とし、データベースサーバの稼働率は0.9とする。このシステムの小数第3位を四捨五入した稼働率は幾らか。ここで、2台のWebサーバのうち少なくとも1台が稼働しており、かつ、データベースサーバが稼働していれば、システムとしては稼働しているとみなす。また、それぞれのサーバはランダムに故障が起こるものとする。
choices:
  - "0.04"
  - "0.58"
  - "0.86"
  - "0.96"
correct: 2
images:
