# 化学基礎 問548
id: 1588
type: single_choice
text: |
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "砂と水の混合物から砂を取り除く場面"
  - "水や二酸化炭素のように複数の元素からできた物質を考える場面"
  - "ナトリウムの陽子数から元素を区別する場面"
  - "食品の変色や劣化を防ぐためにビタミンCを使う場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」と最も関係が深い場面は「食品の変色や劣化を防ぐためにビタミンCを使う場面」です。したがって、正解は「食品の変色や劣化を防ぐためにビタミンCを使う場面」です。
  
  「砂と水の混合物から砂を取り除く場面」は、「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」と結び付きが強い場面です。
  「水や二酸化炭素のように複数の元素からできた物質を考える場面」は、「二種類以上の元素が結び付いてできている純物質である。」と結び付きが強い場面です。
  「ナトリウムの陽子数から元素を区別する場面」は、「原子核の中にある陽子の数を表す数である。」と結び付きが強い場面です。
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」が正しいです。この説明と結び付きが強い場面です。
