# 高校化学 問958
id: 2958
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "共有結合の結晶 / 牛乳やゼラチン溶液のような見た目の系を考える場面"
  - "アンモニア合成 / 高圧や触媒を利用してアンモニアを得る場面"
  - "コロイド / 燃焼や中和で容器が温かくなる場面"
  - "発熱反応 / ダイヤモンドや二酸化ケイ素の硬さを考える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「アンモニア合成 / 高圧や触媒を利用してアンモニアを得る場面」です。したがって、正解は「アンモニア合成 / 高圧や触媒を利用してアンモニアを得る場面」です。
  
  「共有結合の結晶 / 牛乳やゼラチン溶液のような見た目の系を考える場面」は、用語と場面の対応が合っていません。
  「アンモニア合成 / 高圧や触媒を利用してアンモニアを得る場面」が正しいです。用語と場面の対応が合っています。
  「コロイド / 燃焼や中和で容器が温かくなる場面」は、用語と場面の対応が合っていません。
  「発熱反応 / ダイヤモンドや二酸化ケイ素の硬さを考える場面」は、用語と場面の対応が合っていません。
