# 化学基礎 問223
id: 1263
type: single_choice
text: |
  「水分子 H2O の結合」に最も関係が深い語として、適切なものはどれか。
choices:
  - "共有結合"
  - "金属結合"
  - "分子"
  - "極性分子"
correct: 0
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「水分子 H2O の結合」に最も関係が深いのは共有結合です。したがって、正解は「共有結合」です。
  
  「共有結合」が正しいです。この例は共有結合に関係しています。
  「金属結合」は、この例に最も関係が深い語ではありません。
  「分子」は、この例に最も関係が深い語ではありません。
  「極性分子」は、この例に最も関係が深い語ではありません。
