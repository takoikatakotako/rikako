# 化学基礎 問398
id: 1438
type: single_choice
text: |
  酸化防止剤と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ポリエチレンやタンパク質のような長い分子を考える場面"
  - "食品の変色や劣化を防ぐためにビタミンCを使う場面"
  - "マグネシウムが酸素と結び付く場面"
  - "酸素や過酸化水素が相手を酸化させる場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  食品の変色や劣化を防ぐためにビタミンCを使う場面は、酸化防止剤と結び付きが強い場面です。したがって、正解は「食品の変色や劣化を防ぐためにビタミンCを使う場面」です。
  
  「ポリエチレンやタンパク質のような長い分子を考える場面」は、高分子化合物と結び付きが強い場面です。
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」が正しいです。これは酸化防止剤と結び付きが強い場面です。
  「マグネシウムが酸素と結び付く場面」は、酸化と結び付きが強い場面です。
  「酸素や過酸化水素が相手を酸化させる場面」は、酸化剤と結び付きが強い場面です。
