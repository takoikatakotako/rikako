# 化学基礎 問20
id: 687
type: single_choice
text: |
  原子番号が表しているものとして、最も適切なものはどれか。
choices:
  - "陽子の数"
  - "中性子の数"
  - "電子と中性子の合計"
  - "原子の重さそのもの"
correct: 0
explanation: |
  この問題は、「原子番号の意味」を確認する問題です。
  
  原子番号は、その原子がもつ陽子の数を表します。元素の種類を決める大事な数です。したがって、正解は「陽子の数」です。
  
  「陽子の数」が正しいです。原子番号は元素の種類を決めます。
  「中性子の数」は、原子番号ではありません。
  「電子と中性子の合計」は、原子番号の意味ではありません。
  「原子の重さそのもの」は、原子番号の意味ではありません。
