# 高校化学 問254
id: 2254
type: single_choice
text: |
  「正反応と逆反応の両方が起こり得る反応である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "陽極"
  - "ファラデーの法則"
  - "エンタルピー変化"
  - "可逆反応"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  正反応と逆反応の両方が起こり得る反応である。 に当てはまる語は可逆反応です。したがって、正解は「可逆反応」です。
  
  「陽極」は、「電気分解で酸化が起こる電極である。」に当てはまる語です。
  「ファラデーの法則」は、「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」に当てはまる語です。
  「エンタルピー変化」は、「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」に当てはまる語です。
  「可逆反応」が正しいです。「正反応と逆反応の両方が起こり得る反応である。」に当てはまる語です。
