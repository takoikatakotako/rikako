# 高校化学 問930
id: 2930
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "アニリン / 再生可能エネルギーや新素材の開発を考える場面"
  - "ブラウン運動 / 顕微鏡でコロイド粒子が細かく動く様子を観察する場面"
  - "化学が築く未来 / 酸素と窒素が混ざった気体の圧力を考える場面"
  - "分圧の法則 / 染料の原料になる芳香族アミンを考える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「ブラウン運動 / 顕微鏡でコロイド粒子が細かく動く様子を観察する場面」です。したがって、正解は「ブラウン運動 / 顕微鏡でコロイド粒子が細かく動く様子を観察する場面」です。
  
  「アニリン / 再生可能エネルギーや新素材の開発を考える場面」は、用語と場面の対応が合っていません。
  「ブラウン運動 / 顕微鏡でコロイド粒子が細かく動く様子を観察する場面」が正しいです。用語と場面の対応が合っています。
  「化学が築く未来 / 酸素と窒素が混ざった気体の圧力を考える場面」は、用語と場面の対応が合っていません。
  「分圧の法則 / 染料の原料になる芳香族アミンを考える場面」は、用語と場面の対応が合っていません。
