# 高校化学 問393
id: 2393
type: single_choice
text: |
  「グリシンやアラニンの構造を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "ナイロン"
  - "タンパク質"
  - "グルコース"
  - "アミノ酸"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  グリシンやアラニンの構造を考える場面 と最も関係が深いのはアミノ酸です。したがって、正解は「アミノ酸」です。
  
  「ナイロン」は、「衣類やロープに使われる合成繊維を考える場面」と結び付きが強い語です。
  「タンパク質」は、「酵素や筋肉の主成分を考える場面」と結び付きが強い語です。
  「グルコース」は、「血糖や発酵の材料として使われる場面」と結び付きが強い語です。
  「アミノ酸」が正しいです。この具体例と最も関係が深い語です。
