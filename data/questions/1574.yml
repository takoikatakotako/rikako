# 化学基礎 問534
id: 1574
type: single_choice
text: |
  「水溶液の酸性や塩基性の強さを表す尺度である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "マグネシウムが酸素と結び付く場面"
  - "レモン水とせっけん水の酸性・塩基性を比べる場面"
  - "食塩水や塩酸が電流を通す場面"
  - "砂と水の混合物から砂を取り除く場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「水溶液の酸性や塩基性の強さを表す尺度である。」と最も関係が深い場面は「レモン水とせっけん水の酸性・塩基性を比べる場面」です。したがって、正解は「レモン水とせっけん水の酸性・塩基性を比べる場面」です。
  
  「マグネシウムが酸素と結び付く場面」は、「物質が酸素と結び付く、または電子を失う変化である。」と結び付きが強い場面です。
  「レモン水とせっけん水の酸性・塩基性を比べる場面」が正しいです。この説明と結び付きが強い場面です。
  「食塩水や塩酸が電流を通す場面」は、「水に溶けたり融解したりすると電流を通す物質である。」と結び付きが強い場面です。
  「砂と水の混合物から砂を取り除く場面」は、「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」と結び付きが強い場面です。
