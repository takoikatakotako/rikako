# 化学基礎 問686
id: 1726
type: single_choice
text: |
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "一種類の元素だけからできること"
  - "固体から直接気体になること"
  - "色の変化で液性を見分けること"
  - "電子を受け取って負に帯電すること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」を理解する上では、「色の変化で液性を見分けること」という見方が大切です。したがって、正解は「色の変化で液性を見分けること」です。
  
  「一種類の元素だけからできること」は、その見方は単体に関係します。
  「固体から直接気体になること」は、その見方は昇華に関係します。
  「色の変化で液性を見分けること」が正しいです。この説明と結び付きが強い見方です。
  「電子を受け取って負に帯電すること」は、その見方は陰イオンに関係します。
