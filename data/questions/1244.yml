# 化学基礎 問204
id: 1244
type: single_choice
text: |
  「インクに含まれる色素を分ける操作」に最も関係が深い語として、適切なものはどれか。
choices:
  - "純物質"
  - "クロマトグラフィー"
  - "混合物"
  - "単体"
correct: 1
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「インクに含まれる色素を分ける操作」に最も関係が深いのはクロマトグラフィーです。したがって、正解は「クロマトグラフィー」です。
  
  「純物質」は、この例に最も関係が深い語ではありません。
  「クロマトグラフィー」が正しいです。この例はクロマトグラフィーに関係しています。
  「混合物」は、この例に最も関係が深い語ではありません。
  「単体」は、この例に最も関係が深い語ではありません。
