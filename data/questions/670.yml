# 化学基礎 問3
id: 670
type: single_choice
text: |
  同位体についての説明として、最も適切なものはどれか。
choices:
  - "陽子の数は同じで、中性子の数が異なる原子である。"
  - "中性子の数は同じで、陽子の数が異なる原子である。"
  - "電子の数だけが異なる分子である。"
  - "どちらも同じ数の陽子と中性子をもつが、色だけが異なる原子である。"
correct: 0
explanation: |
  この問題は、「同位体の定義」を答える問題です。
  
  同位体は、同じ元素の原子なので陽子の数は同じです。一方で、中性子の数が異なるため、質量数が変わります。したがって、正解は「陽子の数は同じで、中性子の数が異なる原子である」です。
  
  「陽子の数は同じで、中性子の数が異なる原子である」が正しいです。同位体は同じ元素の原子どうしです。
  「中性子の数は同じで、陽子の数が異なる原子である」は、元素そのものが変わってしまうので適切ではありません。
  「電子の数だけが異なる分子である」は、同位体の説明ではありません。
  「どちらも同じ数の陽子と中性子をもつが、色だけが異なる原子である」は、同位体の説明ではありません。
