# 高校化学 問754
id: 2754
type: single_choice
text: |
  「正反応と逆反応の両方を見ること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "カルボン酸"
  - "デンプン"
  - "蒸発熱"
  - "可逆反応"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「正反応と逆反応の両方を見ること」という見方が大切なのは可逆反応です。したがって、正解は「可逆反応」です。
  
  「カルボン酸」は、その語で大切なのは「カルボキシ基をもち酸性を示すこと」という見方です。
  「デンプン」は、その語で大切なのは「植物がエネルギーをたくわえる多糖であること」という見方です。
  「蒸発熱」は、その語で大切なのは「液体を気体に変えるための熱に注目すること」という見方です。
  「可逆反応」が正しいです。この見方が大切な語です。
