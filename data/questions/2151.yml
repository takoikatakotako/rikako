# 高校化学 問151
id: 2151
type: single_choice
text: |
  反応速度と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酢酸が塩酸ほど強く電離しない場面"
  - "どの酸がより電離しやすいかを比べる場面"
  - "懐中電灯や時計に入っている電池を考える場面"
  - "同じ反応でも条件によって進み方が変わることを比べる場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  同じ反応でも条件によって進み方が変わることを比べる場面は、反応速度と結び付きが強い場面です。したがって、正解は「同じ反応でも条件によって進み方が変わることを比べる場面」です。
  
  「酢酸が塩酸ほど強く電離しない場面」は、弱酸と結び付きが強い場面です。
  「どの酸がより電離しやすいかを比べる場面」は、酸解離定数と結び付きが強い場面です。
  「懐中電灯や時計に入っている電池を考える場面」は、乾電池と結び付きが強い場面です。
  「同じ反応でも条件によって進み方が変わることを比べる場面」が正しいです。これは反応速度と結び付きが強い場面です。
