# 高校化学 問633
id: 2633
type: single_choice
text: |
  「デンプンやゼラチンが水中で安定しやすい場面」を説明した文として、最も適切なものはどれか。
choices:
  - "電気分解で生じる物質の量は流れた電気量に比例するという法則である。"
  - "水との親和性が高く、比較的安定なコロイドである。"
  - "少量の酸や塩基を加えても pH が変わりにくい溶液である。"
  - "中心となる金属イオンに配位子が結び付いたイオンである。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「デンプンやゼラチンが水中で安定しやすい場面」を説明した文として適切なのは「水との親和性が高く、比較的安定なコロイドである。」です。したがって、正解は「水との親和性が高く、比較的安定なコロイドである。」です。
  
  「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」は、この説明は「流した電流が大きいほど析出量が増える場面」と結び付きが強いです。
  「水との親和性が高く、比較的安定なコロイドである。」が正しいです。この具体例を説明した文です。
  「少量の酸や塩基を加えても pH が変わりにくい溶液である。」は、この説明は「血液や実験用の溶液で pH を保ちたい場面」と結び付きが強いです。
  「中心となる金属イオンに配位子が結び付いたイオンである。」は、この説明は「アンモニアを加えると深い青色のイオンができる場面」と結び付きが強いです。
