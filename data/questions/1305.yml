# 化学基礎 問265
id: 1305
type: single_choice
text: |
  原子番号の特徴として、最も適切なものはどれか。
choices:
  - "陽子数と中性子数の合計"
  - "陽子の数を表す"
  - "陽子数は同じで中性子数が異なる"
  - "元素の性質に規則性がある"
correct: 1
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  原子番号では、「陽子の数を表す」という点が大切です。したがって、正解は「陽子の数を表す」です。
  
  「陽子数と中性子数の合計」は、質量数に関係する特徴です。
  「陽子の数を表す」が正しいです。原子番号の特徴を表しています。
  「陽子数は同じで中性子数が異なる」は、同位体に関係する特徴です。
  「元素の性質に規則性がある」は、周期律に関係する特徴です。
