# 高校化学 問92
id: 2092
type: single_choice
text: |
  タンパク質についての説明として、最も適切なものはどれか。
choices:
  - "ベンゼン環にヒドロキシ基が直接結び付いた化合物である。"
  - "目的に応じた特別な性質をもたせてつくられた材料である。"
  - "化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。"
  - "多数のアミノ酸がつながってできた天然高分子化合物である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  タンパク質は、多数のアミノ酸がつながってできた天然高分子化合物である。 したがって、正解は「多数のアミノ酸がつながってできた天然高分子化合物である。」です。
  
  「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」は、フェノールの説明です。
  「目的に応じた特別な性質をもたせてつくられた材料である。」は、機能性材料の説明です。
  「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」は、化学が築く未来の説明です。
  「多数のアミノ酸がつながってできた天然高分子化合物である。」が正しいです。タンパク質の説明です。
