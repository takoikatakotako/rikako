# 高校化学 問177
id: 2177
type: single_choice
text: |
  銅と最も関係が深い場面として、適切なものはどれか。
choices:
  - "流した電流が大きいほど析出量が増える場面"
  - "電線や青色の銅イオン水溶液を考える場面"
  - "エチレンやアセチレンの反応性を考える場面"
  - "メタンの水素が塩素に置き換わる場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  電線や青色の銅イオン水溶液を考える場面は、銅と結び付きが強い場面です。したがって、正解は「電線や青色の銅イオン水溶液を考える場面」です。
  
  「流した電流が大きいほど析出量が増える場面」は、ファラデーの法則と結び付きが強い場面です。
  「電線や青色の銅イオン水溶液を考える場面」が正しいです。これは銅と結び付きが強い場面です。
  「エチレンやアセチレンの反応性を考える場面」は、不飽和炭化水素と結び付きが強い場面です。
  「メタンの水素が塩素に置き換わる場面」は、置換反応と結び付きが強い場面です。
