# 高校化学 問848
id: 2848
type: single_choice
text: |
  「電気分解で酸化が起こる電極である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "単糖類でエネルギー源になりやすいこと"
  - "状態変化に必要な熱に注目すること"
  - "酸化が起こる側の電極であること"
  - "共有結合が全体に広がること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「電気分解で酸化が起こる電極である。」を理解する上では、「酸化が起こる側の電極であること」という見方が大切です。したがって、正解は「酸化が起こる側の電極であること」です。
  
  「単糖類でエネルギー源になりやすいこと」は、その見方はグルコースに関係します。
  「状態変化に必要な熱に注目すること」は、その見方は融解熱に関係します。
  「酸化が起こる側の電極であること」が正しいです。この説明と結び付きが強い見方です。
  「共有結合が全体に広がること」は、その見方は共有結合の結晶に関係します。
