# 化学基礎 問145
id: 1185
type: single_choice
text: |
  炎色反応についての説明として、最も適切なものはどれか。
choices:
  - "金属元素を含む物質を炎に入れたときに特有の色を示す反応である。"
  - "溶けた物質のうち、電離した割合を表す。"
  - "水溶液の酸性やアルカリ性によって色が変わる薬品である。"
  - "食品などが酸化するのを防ぐために用いられる物質である。"
correct: 0
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  炎色反応は、金属元素を含む物質を炎に入れたときに特有の色を示す反応である。したがって、正解は「金属元素を含む物質を炎に入れたときに特有の色を示す反応である。」です。
  
  「金属元素を含む物質を炎に入れたときに特有の色を示す反応である。」が正しいです。炎色反応の説明です。
  「溶けた物質のうち、電離した割合を表す。」は、電離度の説明です。
  「水溶液の酸性やアルカリ性によって色が変わる薬品である。」は、指示薬の説明です。
  「食品などが酸化するのを防ぐために用いられる物質である。」は、酸化防止剤の説明です。
