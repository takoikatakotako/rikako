# 高校化学 問885
id: 2885
type: single_choice
text: |
  「カルボキシ基をもち、酸性を示す有機化合物である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "コロイド粒子の電荷に注目すること"
  - "使い切りの電池であること"
  - "正反応と逆反応の両方を見ること"
  - "カルボキシ基をもち酸性を示すこと"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「カルボキシ基をもち、酸性を示す有機化合物である。」を理解する上では、「カルボキシ基をもち酸性を示すこと」という見方が大切です。したがって、正解は「カルボキシ基をもち酸性を示すこと」です。
  
  「コロイド粒子の電荷に注目すること」は、その見方は電気泳動に関係します。
  「使い切りの電池であること」は、その見方は乾電池に関係します。
  「正反応と逆反応の両方を見ること」は、その見方は可逆反応に関係します。
  「カルボキシ基をもち酸性を示すこと」が正しいです。この説明と結び付きが強い見方です。
