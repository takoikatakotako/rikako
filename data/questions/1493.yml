# 化学基礎 問453
id: 1493
type: single_choice
text: |
  再結晶を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "新しい物質ができること"
  - "液体から気体への変化であること"
  - "溶解度の差を利用すること"
  - "固体から直接気体になること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  再結晶では、「溶解度の差を利用すること」という見方が大切です。したがって、正解は「溶解度の差を利用すること」です。
  
  「新しい物質ができること」は、化学変化に関係する見方です。
  「液体から気体への変化であること」は、蒸発に関係する見方です。
  「溶解度の差を利用すること」が正しいです。再結晶の要点を表しています。
  「固体から直接気体になること」は、昇華に関係する見方です。
