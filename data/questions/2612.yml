# 高校化学 問612
id: 2612
type: single_choice
text: |
  「高圧や低温で気体のふるまいが理想気体からずれる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。"
  - "コロイド粒子が光を散乱するため、光の道筋が見える現象である。"
  - "反応の結果として周囲から熱を吸収する反応である。"
  - "単位時間あたりに進む反応の程度を表す量である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「高圧や低温で気体のふるまいが理想気体からずれる場面」を説明した文として適切なのは「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」です。したがって、正解は「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」です。
  
  「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」が正しいです。この具体例を説明した文です。
  「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」は、この説明は「薄暗い部屋でコロイドに光を当てると筋が見える場面」と結び付きが強いです。
  「反応の結果として周囲から熱を吸収する反応である。」は、この説明は「熱分解や一部の溶解で周囲が冷たくなる場面」と結び付きが強いです。
  「単位時間あたりに進む反応の程度を表す量である。」は、この説明は「同じ反応でも条件によって進み方が変わることを比べる場面」と結び付きが強いです。
