# 化学基礎 問381
id: 1421
type: single_choice
text: |
  酸と最も関係が深い場面として、適切なものはどれか。
choices:
  - "塩酸が水溶液中で水素イオンを生じる場面"
  - "食塩水や塩酸が電流を通す場面"
  - "医療や年代測定に利用される炭素14を考える場面"
  - "食品の変色や劣化を防ぐためにビタミンCを使う場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  塩酸が水溶液中で水素イオンを生じる場面は、酸と結び付きが強い場面です。したがって、正解は「塩酸が水溶液中で水素イオンを生じる場面」です。
  
  「塩酸が水溶液中で水素イオンを生じる場面」が正しいです。これは酸と結び付きが強い場面です。
  「食塩水や塩酸が電流を通す場面」は、電解質と結び付きが強い場面です。
  「医療や年代測定に利用される炭素14を考える場面」は、放射性同位体と結び付きが強い場面です。
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」は、酸化防止剤と結び付きが強い場面です。
