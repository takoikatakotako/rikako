# 高校化学 問961
id: 2961
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "緩衝液 / 血液や実験用の溶液で pH を保ちたい場面"
  - "溶解 / コロイド溶液から余分な電解質を取り除く場面"
  - "透析 / 植物が光を受けてデンプンなどをつくる場面"
  - "光合成 / 食塩が水に溶けて見えなくなる場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「緩衝液 / 血液や実験用の溶液で pH を保ちたい場面」です。したがって、正解は「緩衝液 / 血液や実験用の溶液で pH を保ちたい場面」です。
  
  「緩衝液 / 血液や実験用の溶液で pH を保ちたい場面」が正しいです。用語と場面の対応が合っています。
  「溶解 / コロイド溶液から余分な電解質を取り除く場面」は、用語と場面の対応が合っていません。
  「透析 / 植物が光を受けてデンプンなどをつくる場面」は、用語と場面の対応が合っていません。
  「光合成 / 食塩が水に溶けて見えなくなる場面」は、用語と場面の対応が合っていません。
