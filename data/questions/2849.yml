# 高校化学 問849
id: 2849
type: single_choice
text: |
  「電気分解で還元が起こる電極である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "植物がエネルギーをたくわえる多糖であること"
  - "液体を気体に変えるための熱に注目すること"
  - "自由電子が性質に関係すること"
  - "還元が起こる側の電極であること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「電気分解で還元が起こる電極である。」を理解する上では、「還元が起こる側の電極であること」という見方が大切です。したがって、正解は「還元が起こる側の電極であること」です。
  
  「植物がエネルギーをたくわえる多糖であること」は、その見方はデンプンに関係します。
  「液体を気体に変えるための熱に注目すること」は、その見方は蒸発熱に関係します。
  「自由電子が性質に関係すること」は、その見方は金属結晶に関係します。
  「還元が起こる側の電極であること」が正しいです。この説明と結び付きが強い見方です。
