# 化学基礎 問766
id: 1806
type: single_choice
text: |
  「陽子数と中性子数の合計であること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "原子核の中にある陽子数と中性子数の合計である。"
  - "多数の小さな単位がつながってできた大きな分子からなる化合物である。"
  - "二種類以上の物質が混ざってできている物質である。"
  - "液体が固体に変わる状態変化である。"
correct: 0
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「陽子数と中性子数の合計であること」という見方と最も関係が深い説明は「原子核の中にある陽子数と中性子数の合計である。」です。したがって、正解は「原子核の中にある陽子数と中性子数の合計である。」です。
  
  「原子核の中にある陽子数と中性子数の合計である。」が正しいです。この見方と最も関係が深い説明です。
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」は、その説明で大切なのは「小さな単位が多数つながっていること」という見方です。
  「二種類以上の物質が混ざってできている物質である。」は、その説明で大切なのは「成分が二種類以上まざっていること」という見方です。
  「液体が固体に変わる状態変化である。」は、その説明で大切なのは「液体から固体への変化であること」という見方です。
