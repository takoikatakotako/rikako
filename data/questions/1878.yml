# 化学基礎 問838
id: 1878
type: single_choice
text: |
  「酸素の喪失や電子の受け取りに注目すること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面"
  - "レモン水とせっけん水の酸性・塩基性を比べる場面"
  - "亜鉛が銅より先にイオンになりやすいことを見る場面"
  - "酸化銅から酸素が取れて銅になる場面"
correct: 3
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「酸素の喪失や電子の受け取りに注目すること」という見方と最も関係が深い場面は「酸化銅から酸素が取れて銅になる場面」です。したがって、正解は「酸化銅から酸素が取れて銅になる場面」です。
  
  「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」は、その場面で大切なのは「電荷のかたよりがほとんどないこと」という見方です。
  「レモン水とせっけん水の酸性・塩基性を比べる場面」は、その場面で大切なのは「酸性と塩基性の強さを数で見ること」という見方です。
  「亜鉛が銅より先にイオンになりやすいことを見る場面」は、その場面で大切なのは「金属のイオンになりやすさを比べること」という見方です。
  「酸化銅から酸素が取れて銅になる場面」が正しいです。この見方と最も関係が深い場面です。
