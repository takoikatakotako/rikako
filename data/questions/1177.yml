# 化学基礎 問137
id: 1177
type: single_choice
text: |
  酸化剤についての説明として、最も適切なものはどれか。
choices:
  - "相手を酸化し、自分は還元される物質である。"
  - "相手を還元し、自分は酸化される物質である。"
  - "金属が電子を失って陽イオンになりやすい性質の強さを表す。"
  - "亜鉛と銅を用いて化学エネルギーを電気エネルギーに変える電池である。"
correct: 0
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  酸化剤は、相手を酸化し、自分は還元される物質である。したがって、正解は「相手を酸化し、自分は還元される物質である。」です。
  
  「相手を酸化し、自分は還元される物質である。」が正しいです。酸化剤の説明です。
  「相手を還元し、自分は酸化される物質である。」は、還元剤の説明です。
  「金属が電子を失って陽イオンになりやすい性質の強さを表す。」は、イオン化傾向の説明です。
  「亜鉛と銅を用いて化学エネルギーを電気エネルギーに変える電池である。」は、ダニエル電池の説明です。
