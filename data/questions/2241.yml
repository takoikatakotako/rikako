# 高校化学 問241
id: 2241
type: single_choice
text: |
  「化学反応によって光が放出される現象である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "乾電池"
  - "リチウムイオン電池"
  - "化学発光"
  - "電気分解"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  化学反応によって光が放出される現象である。 に当てはまる語は化学発光です。したがって、正解は「化学発光」です。
  
  「乾電池」は、「一度使い切ることを前提にした一次電池の代表例である。」に当てはまる語です。
  「リチウムイオン電池」は、「リチウムイオンの移動を利用する充電式電池である。」に当てはまる語です。
  「化学発光」が正しいです。「化学反応によって光が放出される現象である。」に当てはまる語です。
  「電気分解」は、「電気エネルギーを使って自発的でない化学変化を起こす操作である。」に当てはまる語です。
