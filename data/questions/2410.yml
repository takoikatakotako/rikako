# 高校化学 問410
id: 2410
type: single_choice
text: |
  理想気体の状態方程式を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "分子の集まり方や沸点に関係すること"
  - "圧力、体積、物質量、温度をまとめて扱うこと"
  - "蒸気圧と外圧のつり合いに注目すること"
  - "蒸発と凝縮がつり合うこと"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  理想気体の状態方程式では、「圧力、体積、物質量、温度をまとめて扱うこと」という見方が大切です。したがって、正解は「圧力、体積、物質量、温度をまとめて扱うこと」です。
  
  「分子の集まり方や沸点に関係すること」は、分子間力に関係する見方です。
  「圧力、体積、物質量、温度をまとめて扱うこと」が正しいです。理想気体の状態方程式の要点を表しています。
  「蒸気圧と外圧のつり合いに注目すること」は、沸点に関係する見方です。
  「蒸発と凝縮がつり合うこと」は、気液平衡に関係する見方です。
