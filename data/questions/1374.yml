# 化学基礎 問334
id: 1374
type: single_choice
text: |
  pHについて学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "二つの溶液の電気的なつり合いを保つための部分である。"
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
  - "水溶液の酸性や塩基性の強さを表す尺度である。"
  - "水に溶けたり融解したりすると電流を通す物質である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  pHは、水溶液の酸性や塩基性の強さを表す尺度である。 したがって、正解は「水溶液の酸性や塩基性の強さを表す尺度である。」です。
  
  「二つの溶液の電気的なつり合いを保つための部分である。」は、塩橋の説明です。
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」は、モル濃度の説明です。
  「水溶液の酸性や塩基性の強さを表す尺度である。」が正しいです。pHの説明です。
  「水に溶けたり融解したりすると電流を通す物質である。」は、電解質の説明です。
