# 高校化学 問516
id: 2516
type: single_choice
text: |
  「分子どうしが分子間力で集まってできた結晶である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ガラスのように一定の融点を示しにくい固体を考える場面"
  - "顕微鏡でコロイド粒子が細かく動く様子を観察する場面"
  - "ケミカルライトが光る仕組みを考える場面"
  - "ドライアイスやヨウ素の結晶を考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「分子どうしが分子間力で集まってできた結晶である。」と最も関係が深い場面は「ドライアイスやヨウ素の結晶を考える場面」です。したがって、正解は「ドライアイスやヨウ素の結晶を考える場面」です。
  
  「ガラスのように一定の融点を示しにくい固体を考える場面」は、「結晶のような規則正しい配列をもたない固体である。」と結び付きが強い場面です。
  「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」は、「コロイド粒子が不規則に動いて見える現象である。」と結び付きが強い場面です。
  「ケミカルライトが光る仕組みを考える場面」は、「化学反応によって光が放出される現象である。」と結び付きが強い場面です。
  「ドライアイスやヨウ素の結晶を考える場面」が正しいです。この説明と結び付きが強い場面です。
