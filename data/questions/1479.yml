# 化学基礎 問439
id: 1479
type: single_choice
text: |
  「相手を酸化させ、自身は還元される物質である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "塩基"
  - "酸化剤"
  - "pH"
  - "指示薬"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  相手を酸化させ、自身は還元される物質である。 に当てはまる語は酸化剤です。したがって、正解は「酸化剤」です。
  
  「塩基」は、「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」に当てはまる語です。
  「酸化剤」が正しいです。「相手を酸化させ、自身は還元される物質である。」に当てはまる語です。
  「pH」は、「水溶液の酸性や塩基性の強さを表す尺度である。」に当てはまる語です。
  「指示薬」は、「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」に当てはまる語です。
