  〔プログラム〕
  OcalcMod3 （）
  整数型： totalValue, i
  totalValue ← 0
  for （iを1から7まで 1ずつ増やす）
  if （i＝3の余りが0と等しい）
  totalValue ← totalValue + i
  endif
