# 化学基礎 問400
id: 1440
type: single_choice
text: |
  化学が拓く世界と最も関係が深い場面として、適切なものはどれか。
choices:
  - "マグネシウムが酸素と結び付く場面"
  - "酸素や過酸化水素が相手を酸化させる場面"
  - "亜鉛が銅より先にイオンになりやすいことを見る場面"
  - "電池、医薬品、素材開発などに化学が生かされる場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  電池、医薬品、素材開発などに化学が生かされる場面は、化学が拓く世界と結び付きが強い場面です。したがって、正解は「電池、医薬品、素材開発などに化学が生かされる場面」です。
  
  「マグネシウムが酸素と結び付く場面」は、酸化と結び付きが強い場面です。
  「酸素や過酸化水素が相手を酸化させる場面」は、酸化剤と結び付きが強い場面です。
  「亜鉛が銅より先にイオンになりやすいことを見る場面」は、イオン化傾向と結び付きが強い場面です。
  「電池、医薬品、素材開発などに化学が生かされる場面」が正しいです。これは化学が拓く世界と結び付きが強い場面です。
