# 高校化学 問631
id: 2631
type: single_choice
text: |
  「コロイド溶液から余分な電解質を取り除く場面」を説明した文として、最も適切なものはどれか。
choices:
  - "電気分解で酸化が起こる電極である。"
  - "電離する粒子と電離していない粒子が平衡になっている状態である。"
  - "周期表18族に属し、化学的に安定な気体元素の総称である。"
  - "半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「コロイド溶液から余分な電解質を取り除く場面」を説明した文として適切なのは「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」です。したがって、正解は「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」です。
  
  「電気分解で酸化が起こる電極である。」は、この説明は「電気分解で気体が発生する電極側を考える場面」と結び付きが強いです。
  「電離する粒子と電離していない粒子が平衡になっている状態である。」は、この説明は「弱酸が一部だけ電離している水溶液を考える場面」と結び付きが強いです。
  「周期表18族に属し、化学的に安定な気体元素の総称である。」は、この説明は「ネオンやアルゴンが反応しにくい理由を考える場面」と結び付きが強いです。
  「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」が正しいです。この具体例を説明した文です。
