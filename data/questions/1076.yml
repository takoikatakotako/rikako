# 令和6年度 ITパスポート 公開問題 問96
id: 1076
type: single_choice
text: |
  Aさんは次のように宛先を指定して電子メールを送信した。この電子メールの受信者に関する記述のうち、適切なものだけを全て挙げたものはどれか。
  
  〔宛先〕
  To: Bさんのメールアドレス
  Cc: Cさんのメールアドレス
  Bcc: Dさんのメールアドレス、Eさんのメールアドレス
  
  (1) CさんはDさんのメールアドレスを知ることができる。
  (2) DさんはCさんのメールアドレスを知ることができる。
  (3) EさんはDさんのメールアドレスを知ることができる。
choices:
  - "(1)"
  - "(1), (3)"
  - "(2)"
  - "(2), (3)"
correct: 2
