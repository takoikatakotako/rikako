# 高校化学 問370
id: 2370
type: single_choice
text: |
  「ネオンやアルゴンが反応しにくい理由を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "貴ガス"
  - "異性体"
  - "アルデヒド"
  - "エステル"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  ネオンやアルゴンが反応しにくい理由を考える場面 と最も関係が深いのは貴ガスです。したがって、正解は「貴ガス」です。
  
  「貴ガス」が正しいです。この具体例と最も関係が深い語です。
  「異性体」は、「ブタンとイソブタンを比べる場面」と結び付きが強い語です。
  「アルデヒド」は、「ホルムアルデヒドやアセトアルデヒドを考える場面」と結び付きが強い語です。
  「エステル」は、「果物の香りに関係する化合物を考える場面」と結び付きが強い語です。
