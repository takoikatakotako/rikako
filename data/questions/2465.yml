# 高校化学 問465
id: 2465
type: single_choice
text: |
  酸解離定数を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸の強さを電離のしやすさで見ること"
  - "反応を始めるための壁に注目すること"
  - "正反応と逆反応の両方を見ること"
  - "平衡の位置を数で表すこと"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  酸解離定数では、「酸の強さを電離のしやすさで見ること」という見方が大切です。したがって、正解は「酸の強さを電離のしやすさで見ること」です。
  
  「酸の強さを電離のしやすさで見ること」が正しいです。酸解離定数の要点を表しています。
  「反応を始めるための壁に注目すること」は、活性化エネルギーに関係する見方です。
  「正反応と逆反応の両方を見ること」は、可逆反応に関係する見方です。
  「平衡の位置を数で表すこと」は、平衡定数に関係する見方です。
