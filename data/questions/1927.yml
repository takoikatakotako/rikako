# 化学基礎 問887
id: 1927
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "塩基 / 相手を酸化させ、自身は還元される物質である。"
  - "酸化剤 / 放射線を出しながら別の原子へ変わっていく同位体である。"
  - "放射性同位体 / 水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。"
  - "酸化 / 物質が酸素と結び付く、または電子を失う変化である。"
correct: 3
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「酸化 / 物質が酸素と結び付く、または電子を失う変化である。」です。したがって、正解は「酸化 / 物質が酸素と結び付く、または電子を失う変化である。」です。
  
  「塩基 / 相手を酸化させ、自身は還元される物質である。」は、用語と説明の対応が合っていません。
  「酸化剤 / 放射線を出しながら別の原子へ変わっていく同位体である。」は、用語と説明の対応が合っていません。
  「放射性同位体 / 水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」は、用語と説明の対応が合っていません。
  「酸化 / 物質が酸素と結び付く、または電子を失う変化である。」が正しいです。用語と説明の対応が合っています。
