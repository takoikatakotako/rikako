# 高校化学 問446
id: 2446
type: single_choice
text: |
  燃料電池を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "2 価の陽イオンになりやすいこと"
  - "反応物を補給しながら発電すること"
  - "最外殻が安定していて反応しにくいこと"
  - "金属イオンと配位子の組合せに注目すること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  燃料電池では、「反応物を補給しながら発電すること」という見方が大切です。したがって、正解は「反応物を補給しながら発電すること」です。
  
  「2 価の陽イオンになりやすいこと」は、アルカリ土類金属に関係する見方です。
  「反応物を補給しながら発電すること」が正しいです。燃料電池の要点を表しています。
  「最外殻が安定していて反応しにくいこと」は、貴ガスに関係する見方です。
  「金属イオンと配位子の組合せに注目すること」は、錯イオンに関係する見方です。
