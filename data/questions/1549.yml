# 化学基礎 問509
id: 1549
type: single_choice
text: |
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "氷が溶けて水になる場面"
  - "ぬれた床の水がしだいに乾く場面"
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
  - "水分子で電荷のかたよりを考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」と最も関係が深い場面は「氷が溶けて水になる場面」です。したがって、正解は「氷が溶けて水になる場面」です。
  
  「氷が溶けて水になる場面」が正しいです。この説明と結び付きが強い場面です。
  「ぬれた床の水がしだいに乾く場面」は、「液体が気体になる状態変化である。」と結び付きが強い場面です。
  「ナトリウムが電子を1個失いやすい理由を考える場面」は、「原子のいちばん外側の電子殻にある電子である。」と結び付きが強い場面です。
  「水分子で電荷のかたよりを考える場面」は、「分子の中で電荷のかたよりがある分子である。」と結び付きが強い場面です。
