# 化学基礎 問701
id: 1741
type: single_choice
text: |
  「砂と水の混合物から砂を取り除く場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "水に溶けない固体を液体から分けること"
  - "粒子の数をまとめて扱う単位であること"
  - "どのくらいイオンに分かれるかを表すこと"
  - "化学エネルギーを電気エネルギーに変えること"
correct: 0
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「砂と水の混合物から砂を取り除く場面」では、「水に溶けない固体を液体から分けること」という見方が大切です。したがって、正解は「水に溶けない固体を液体から分けること」です。
  
  「水に溶けない固体を液体から分けること」が正しいです。この具体例で大切になる見方です。
  「粒子の数をまとめて扱う単位であること」は、その見方は6.0×10^23個の粒子をひとまとまりとして数える場面よりもモルと結び付きが強いです。
  「どのくらいイオンに分かれるかを表すこと」は、その見方は同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面よりも電離度と結び付きが強いです。
  「化学エネルギーを電気エネルギーに変えること」は、その見方は亜鉛板と銅板を使って豆電球を光らせる場面よりもダニエル電池と結び付きが強いです。
