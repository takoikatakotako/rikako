# 高校化学 問379
id: 2379
type: single_choice
text: |
  「エチレンやアセチレンの反応性を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "資源の再利用"
  - "不飽和炭化水素"
  - "飽和炭化水素"
  - "置換反応"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  エチレンやアセチレンの反応性を考える場面 と最も関係が深いのは不飽和炭化水素です。したがって、正解は「不飽和炭化水素」です。
  
  「資源の再利用」は、「金属やプラスチックを回収して再資源化する場面」と結び付きが強い語です。
  「不飽和炭化水素」が正しいです。この具体例と最も関係が深い語です。
  「飽和炭化水素」は、「メタンやエタンの性質を考える場面」と結び付きが強い語です。
  「置換反応」は、「メタンの水素が塩素に置き換わる場面」と結び付きが強い語です。
