# 令和7年度 ITパスポート 公開問題 問29
id: 820
type: single_choice
text: |
  企業経営の中核となる考え方を、ミッション、ビジョン、バリューの三つに分けて示す場合、ビジョンとして示すものとして、最も適切なものはどれか。
choices:
  - "企業の存在意義や使命"
  - "企業の存在意義や使命をふまえた、ある時点でのありたい姿"
  - "戦略を実現するために重要となる業績管理指標"
  - "戦略を実現するために重要となる成功要因"
correct: 1
explanation: |
  ミッションは、企業の存在意義や使命のことです。ビジョンは、そのミッションを踏まえて、将来どうありたいかを示す将来像です。したがって、正解は「企業の存在意義や使命をふまえた、ある時点でのありたい姿」です。
  
  「企業の存在意義や使命」はミッションの説明です。
  「企業の存在意義や使命をふまえた、ある時点でのありたい姿」が正しいです。ビジョンは、使命を踏まえた将来のありたい姿を示します。
  「戦略を実現するために重要となる業績管理指標」はKPIの説明です。
  「戦略を実現するために重要となる成功要因」はCSFの説明です。
