# 化学基礎 問820
id: 1860
type: single_choice
text: |
  「電子を失って正に帯電すること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "氷が溶けて水になる場面"
  - "ナトリウム原子が電子を1個失って Na+ になる場面"
  - "炭素12で陽子数と中性子数の合計を見る場面"
  - "水素原子どうしが電子を共有して H2 になる場面"
correct: 1
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「電子を失って正に帯電すること」という見方と最も関係が深い場面は「ナトリウム原子が電子を1個失って Na+ になる場面」です。したがって、正解は「ナトリウム原子が電子を1個失って Na+ になる場面」です。
  
  「氷が溶けて水になる場面」は、その場面で大切なのは「物質の種類が変わらないこと」という見方です。
  「ナトリウム原子が電子を1個失って Na+ になる場面」が正しいです。この見方と最も関係が深い場面です。
  「炭素12で陽子数と中性子数の合計を見る場面」は、その場面で大切なのは「陽子数と中性子数の合計であること」という見方です。
  「水素原子どうしが電子を共有して H2 になる場面」は、その場面で大切なのは「電子を共有して結び付くこと」という見方です。
