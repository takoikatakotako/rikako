# 高校化学 問734
id: 2734
type: single_choice
text: |
  「水となじみにくく不安定になりやすいこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "酸解離定数"
  - "鉄"
  - "ベンゼン"
  - "疎水コロイド"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「水となじみにくく不安定になりやすいこと」という見方が大切なのは疎水コロイドです。したがって、正解は「疎水コロイド」です。
  
  「酸解離定数」は、その語で大切なのは「酸の強さを電離のしやすさで見ること」という見方です。
  「鉄」は、その語で大切なのは「実用性が高く、酸化数が変わりやすいこと」という見方です。
  「ベンゼン」は、その語で大切なのは「ベンゼン環をもつこと」という見方です。
  「疎水コロイド」が正しいです。この見方が大切な語です。
