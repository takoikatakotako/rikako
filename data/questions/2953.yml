# 高校化学 問953
id: 2953
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "触媒 / 二酸化マンガンを加えると過酸化水素水の分解が速くなる場面"
  - "実在気体 / 飽和溶液で見かけ上変化が止まっている場面"
  - "溶解平衡 / 金属や硫黄のコロイドが電解質で沈みやすい場面"
  - "疎水コロイド / 高圧や低温で気体のふるまいが理想気体からずれる場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「触媒 / 二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」です。したがって、正解は「触媒 / 二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」です。
  
  「触媒 / 二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」が正しいです。用語と場面の対応が合っています。
  「実在気体 / 飽和溶液で見かけ上変化が止まっている場面」は、用語と場面の対応が合っていません。
  「溶解平衡 / 金属や硫黄のコロイドが電解質で沈みやすい場面」は、用語と場面の対応が合っていません。
  「疎水コロイド / 高圧や低温で気体のふるまいが理想気体からずれる場面」は、用語と場面の対応が合っていません。
