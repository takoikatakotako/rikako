# 令和7年度 ITパスポート 公開問題 問2
id: 634
type: single_choice
text: |
  従来の情報セキュリティマネジメントシステム規格を基礎に追加で制定されたもので、クラウドサービスに対応した情報セキュリティ管理体制を構築するためのガイドライン規格として、最も適切なものはどれか。
choices:
  - "ISO 14001"
  - "JIS 0 15001"
  - "ISO/IEC 27017"
  - "ISO 9001"
correct: 2
explanation: |
  この問題は、「クラウドサービス向けの情報セキュリティ規格はどれか」を選ぶ問題です。
  
  ISO/IEC 27017 は、ISMSをもとにして、クラウドサービス向けの情報セキュリティ管理策をまとめたガイドライン規格です。したがって、正解は「ISO/IEC 27017」です。
  
  「ISO 14001」はISO 14001 は環境マネジメントシステムの規格です。
  「JIS 0 15001」はJIS Q 15001 は個人情報保護マネジメントシステムに関する規格です。
  「ISO/IEC 27017」が正しいです。クラウドサービス向けの情報セキュリティ管理の規格です。
  「ISO 9001」はISO 9001 は品質マネジメントシステムの規格です。
