# 化学基礎 問34
id: 701
type: single_choice
text: |
  1 mol についての説明として、最も適切なものはどれか。
choices:
  - "どんな物質でも同じ数の粒子を表す単位である。"
  - "どんな物質でも同じ質量を表す単位である。"
  - "液体だけに使う単位である。"
  - "気体だけに使う単位である。"
correct: 0
explanation: |
  この問題は、「モルが何をそろえる単位か」を確認する問題です。
  
  1 mol は、どんな物質でも同じ数の粒子を表します。質量をそろえる単位ではなく、粒子の数をそろえる単位です。したがって、正解は「どんな物質でも同じ数の粒子を表す単位である」です。
  
  「どんな物質でも同じ数の粒子を表す単位である」が正しいです。モルの基本です。
  「どんな物質でも同じ質量を表す単位である」は、適切ではありません。
  「液体だけに使う単位である」は、適切ではありません。
  「気体だけに使う単位である」は、適切ではありません。
