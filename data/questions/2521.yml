# 高校化学 問521
id: 2521
type: single_choice
text: |
  「一定量の溶媒に溶けることのできる溶質の最大量である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面"
  - "食塩水が純水より蒸発しにくくなることを考える場面"
  - "物質を燃やしたときに熱が出ることを考える場面"
  - "水素を使って発電し、水を生じる仕組みを考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「一定量の溶媒に溶けることのできる溶質の最大量である。」と最も関係が深い場面は「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」です。したがって、正解は「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」です。
  
  「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」が正しいです。この説明と結び付きが強い場面です。
  「食塩水が純水より蒸発しにくくなることを考える場面」は、「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」と結び付きが強い場面です。
  「物質を燃やしたときに熱が出ることを考える場面」は、「化学反応に伴って出入りする熱量である。」と結び付きが強い場面です。
  「水素を使って発電し、水を生じる仕組みを考える場面」は、「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」と結び付きが強い場面です。
