# 化学基礎 問667
id: 1707
type: single_choice
text: |
  「陽子数は同じで中性子数が異なる原子どうしである。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸素の喪失や電子の受け取りに注目すること"
  - "水溶液でも電流をほとんど通さないこと"
  - "沸点の違いを利用すること"
  - "陽子数が同じで中性子数が異なること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「陽子数は同じで中性子数が異なる原子どうしである。」を理解する上では、「陽子数が同じで中性子数が異なること」という見方が大切です。したがって、正解は「陽子数が同じで中性子数が異なること」です。
  
  「酸素の喪失や電子の受け取りに注目すること」は、その見方は還元に関係します。
  「水溶液でも電流をほとんど通さないこと」は、その見方は非電解質に関係します。
  「沸点の違いを利用すること」は、その見方は蒸留に関係します。
  「陽子数が同じで中性子数が異なること」が正しいです。この説明と結び付きが強い見方です。
