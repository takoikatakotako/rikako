# 高校化学 問63
id: 2063
type: single_choice
text: |
  弱酸についての説明として、最も適切なものはどれか。
choices:
  - "鉛とその化合物を用いた、充電して繰り返し使える電池である。"
  - "燃料と酸化剤を外部から供給しながら電気を取り出す電池である。"
  - "水溶液中で一部だけ電離する酸である。"
  - "電気分解で酸化が起こる電極である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  弱酸は、水溶液中で一部だけ電離する酸である。 したがって、正解は「水溶液中で一部だけ電離する酸である。」です。
  
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」は、鉛蓄電池の説明です。
  「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」は、燃料電池の説明です。
  「水溶液中で一部だけ電離する酸である。」が正しいです。弱酸の説明です。
  「電気分解で酸化が起こる電極である。」は、陽極の説明です。
