# 高校化学 問708
id: 2708
type: single_choice
text: |
  「温度一定で圧力と体積の関係を見ること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "発熱反応"
  - "ボイルの法則"
  - "ファラデーの法則"
  - "緩衝液"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「温度一定で圧力と体積の関係を見ること」という見方が大切なのはボイルの法則です。したがって、正解は「ボイルの法則」です。
  
  「発熱反応」は、その語で大切なのは「周囲へ熱を出す反応であること」という見方です。
  「ボイルの法則」が正しいです。この見方が大切な語です。
  「ファラデーの法則」は、その語で大切なのは「電気量と生成物の量の比例に注目すること」という見方です。
  「緩衝液」は、その語で大切なのは「pH の変化をおさえること」という見方です。
