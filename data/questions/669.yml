# 化学基礎 問2
id: 669
type: single_choice
text: |
  物質の粒子の熱運動についての説明として、最も適切なものはどれか。
choices:
  - "温度が上がると、粒子の運動は小さくなる。"
  - "温度が下がると、粒子の運動は速くなる。"
  - "温度が上がると、粒子の運動は活発になる。"
  - "粒子は、固体では全く動かない。"
correct: 2
explanation: |
  この問題は、「温度と粒子の動きの関係」を確認する問題です。
  
  温度が上がるほど、粒子の熱運動は活発になります。逆に、温度が下がると粒子の運動は小さくなります。したがって、正解は「温度が上がると、粒子の運動は活発になる」です。
  
  「温度が上がると、粒子の運動は小さくなる」は、温度と粒子の運動の関係が逆です。
  「温度が下がると、粒子の運動は速くなる」は、温度と粒子の運動の関係が逆です。
  「温度が上がると、粒子の運動は活発になる」が正しいです。粒子の熱運動は温度と関係しています。
  「粒子は、固体では全く動かない」は、固体でも粒子はその場で振動しています。
