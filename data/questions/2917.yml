# 高校化学 問917
id: 2917
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "共有結合の結晶 / ダイヤモンドや二酸化ケイ素の硬さを考える場面"
  - "鉄 / 芳香族化合物の基本構造を学ぶ場面"
  - "ベンゼン / 導電性高分子や高性能電池材料を考える場面"
  - "機能性材料 / さびや鉄鋼の利用を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「共有結合の結晶 / ダイヤモンドや二酸化ケイ素の硬さを考える場面」です。したがって、正解は「共有結合の結晶 / ダイヤモンドや二酸化ケイ素の硬さを考える場面」です。
  
  「共有結合の結晶 / ダイヤモンドや二酸化ケイ素の硬さを考える場面」が正しいです。用語と場面の対応が合っています。
