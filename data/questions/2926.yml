# 高校化学 問926
id: 2926
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "カルボン酸 / 米やいもに多く含まれる成分を考える場面"
  - "凝固点降下 / 凍結防止剤をまいた道路の水が凍りにくくなる場面"
  - "デンプン / 水を水蒸気に変えるのに必要な熱を考える場面"
  - "蒸発熱 / 酢酸の性質やにおいを考える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「凝固点降下 / 凍結防止剤をまいた道路の水が凍りにくくなる場面」です。したがって、正解は「凝固点降下 / 凍結防止剤をまいた道路の水が凍りにくくなる場面」です。
  
  「カルボン酸 / 米やいもに多く含まれる成分を考える場面」は、用語と場面の対応が合っていません。
  「凝固点降下 / 凍結防止剤をまいた道路の水が凍りにくくなる場面」が正しいです。用語と場面の対応が合っています。
  「デンプン / 水を水蒸気に変えるのに必要な熱を考える場面」は、用語と場面の対応が合っていません。
  「蒸発熱 / 酢酸の性質やにおいを考える場面」は、用語と場面の対応が合っていません。
