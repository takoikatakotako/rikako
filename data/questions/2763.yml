# 高校化学 問763
id: 2763
type: single_choice
text: |
  「電離が部分的に起こること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "弱酸"
  - "ペプチド結合"
  - "気液平衡"
  - "分子結晶"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「電離が部分的に起こること」という見方が大切なのは弱酸です。したがって、正解は「弱酸」です。
  
  「弱酸」が正しいです。この見方が大切な語です。
  「ペプチド結合」は、その語で大切なのは「アミノ酸どうしをつなぐ結合であること」という見方です。
  「気液平衡」は、その語で大切なのは「蒸発と凝縮がつり合うこと」という見方です。
  「分子結晶」は、その語で大切なのは「分子間力で集まった結晶であること」という見方です。
