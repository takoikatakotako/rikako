# 高校化学 問173
id: 2173
type: single_choice
text: |
  配位結合と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水素を使って発電し、水を生じる仕組みを考える場面"
  - "アンモニアが金属イオンに電子対を与える場面"
  - "電気分解で気体が発生する電極側を考える場面"
  - "流した電流が大きいほど析出量が増える場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  アンモニアが金属イオンに電子対を与える場面は、配位結合と結び付きが強い場面です。したがって、正解は「アンモニアが金属イオンに電子対を与える場面」です。
  
  「水素を使って発電し、水を生じる仕組みを考える場面」は、燃料電池と結び付きが強い場面です。
  「アンモニアが金属イオンに電子対を与える場面」が正しいです。これは配位結合と結び付きが強い場面です。
  「電気分解で気体が発生する電極側を考える場面」は、陽極と結び付きが強い場面です。
  「流した電流が大きいほど析出量が増える場面」は、ファラデーの法則と結び付きが強い場面です。
