# 化学基礎 問814
id: 1854
type: single_choice
text: |
  「固体から直接気体になること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面"
  - "鉄がさびて別の物質になる場面"
  - "炭素12と炭素14を比べる場面"
  - "ドライアイスがそのまま気体になる場面"
correct: 3
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「固体から直接気体になること」という見方と最も関係が深い場面は「ドライアイスがそのまま気体になる場面」です。したがって、正解は「ドライアイスがそのまま気体になる場面」です。
  
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」は、その場面で大切なのは「溶解度の差を利用すること」という見方です。
  「鉄がさびて別の物質になる場面」は、その場面で大切なのは「新しい物質ができること」という見方です。
  「炭素12と炭素14を比べる場面」は、その場面で大切なのは「陽子数が同じで中性子数が異なること」という見方です。
  「ドライアイスがそのまま気体になる場面」が正しいです。この見方と最も関係が深い場面です。
