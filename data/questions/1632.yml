# 化学基礎 問592
id: 1632
type: single_choice
text: |
  「亜鉛板と銅板を使って豆電球を光らせる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "二種類以上の元素が結び付いてできている純物質である。"
  - "亜鉛と銅の反応を利用して電気を取り出す電池である。"
  - "原子核の中にある陽子の数を表す数である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「亜鉛板と銅板を使って豆電球を光らせる場面」を説明した文として適切なのは「亜鉛と銅の反応を利用して電気を取り出す電池である。」です。したがって、正解は「亜鉛と銅の反応を利用して電気を取り出す電池である。」です。
  
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、この説明は「砂と水の混合物から砂を取り除く場面」と結び付きが強いです。
  「二種類以上の元素が結び付いてできている純物質である。」は、この説明は「水や二酸化炭素のように複数の元素からできた物質を考える場面」と結び付きが強いです。
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」が正しいです。この具体例を説明した文です。
  「原子核の中にある陽子の数を表す数である。」は、この説明は「ナトリウムの陽子数から元素を区別する場面」と結び付きが強いです。
