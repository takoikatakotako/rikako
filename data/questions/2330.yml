# 高校化学 問330
id: 2330
type: single_choice
text: |
  「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "ブラウン運動"
  - "沸点上昇"
  - "浸透圧"
  - "チンダル現象"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  顕微鏡でコロイド粒子が細かく動く様子を観察する場面 と最も関係が深いのはブラウン運動です。したがって、正解は「ブラウン運動」です。
  
  「ブラウン運動」が正しいです。この具体例と最も関係が深い語です。
  「沸点上昇」は、「食塩水の沸点が水より少し高くなることを考える場面」と結び付きが強い語です。
  「浸透圧」は、「薄い溶液側から濃い溶液側へ水が移動する場面」と結び付きが強い語です。
  「チンダル現象」は、「薄暗い部屋でコロイドに光を当てると筋が見える場面」と結び付きが強い語です。
