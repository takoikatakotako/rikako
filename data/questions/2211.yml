# 高校化学 問211
id: 2211
type: single_choice
text: |
  「混合気体の全圧は各気体の分圧の和になるという法則である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "分圧の法則"
  - "沸点上昇"
  - "浸透圧"
  - "チンダル現象"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  混合気体の全圧は各気体の分圧の和になるという法則である。 に当てはまる語は分圧の法則です。したがって、正解は「分圧の法則」です。
  
  「分圧の法則」が正しいです。「混合気体の全圧は各気体の分圧の和になるという法則である。」に当てはまる語です。
  「沸点上昇」は、「溶液の沸点が純粋な溶媒より高くなる現象である。」に当てはまる語です。
  「浸透圧」は、「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」に当てはまる語です。
  「チンダル現象」は、「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」に当てはまる語です。
