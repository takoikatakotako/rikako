# 化学基礎 問476
id: 1516
type: single_choice
text: |
  極性分子を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電気的な引力で結び付くこと"
  - "電荷のかたよりがあること"
  - "自由電子が結合を支えること"
  - "電荷のかたよりがほとんどないこと"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  極性分子では、「電荷のかたよりがあること」という見方が大切です。したがって、正解は「電荷のかたよりがあること」です。
  
  「電気的な引力で結び付くこと」は、イオン結合に関係する見方です。
  「電荷のかたよりがあること」が正しいです。極性分子の要点を表しています。
  「自由電子が結合を支えること」は、金属結合に関係する見方です。
  「電荷のかたよりがほとんどないこと」は、無極性分子に関係する見方です。
