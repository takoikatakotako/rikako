# 高校化学 問812
id: 2812
type: single_choice
text: |
  「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電離と元に戻る変化がつり合うこと"
  - "最外殻が安定していて反応しにくいこと"
  - "分子の体積と分子間力の影響に注目すること"
  - "もとの一部が別のものに置き換わること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」を理解する上では、「分子の体積と分子間力の影響に注目すること」という見方が大切です。したがって、正解は「分子の体積と分子間力の影響に注目すること」です。
  
  「電離と元に戻る変化がつり合うこと」は、その見方は電離平衡に関係します。
  「最外殻が安定していて反応しにくいこと」は、その見方は貴ガスに関係します。
  「分子の体積と分子間力の影響に注目すること」が正しいです。この説明と結び付きが強い見方です。
  「もとの一部が別のものに置き換わること」は、その見方は置換反応に関係します。
