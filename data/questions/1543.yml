# 化学基礎 問503
id: 1543
type: single_choice
text: |
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "空気や食塩水のように複数の物質が混ざったものを考える場面"
  - "水を冷やして氷にする場面"
  - "ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面"
  - "ナトリウム原子が電子を1個失って Na+ になる場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」と最も関係が深い場面は「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」です。したがって、正解は「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」です。
  
  「空気や食塩水のように複数の物質が混ざったものを考える場面」は、「二種類以上の物質が混ざってできている物質である。」と結び付きが強い場面です。
  「水を冷やして氷にする場面」は、「液体が固体に変わる状態変化である。」と結び付きが強い場面です。
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」が正しいです。この説明と結び付きが強い場面です。
  「ナトリウム原子が電子を1個失って Na+ になる場面」は、「原子や原子団が電子を失って正の電荷をもつ粒子である。」と結び付きが強い場面です。
