# 化学基礎 問417
id: 1457
type: single_choice
text: |
  「陽子数は同じで中性子数が異なる原子どうしである。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "金属結合"
  - "極性分子"
  - "純物質"
  - "同位体"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  陽子数は同じで中性子数が異なる原子どうしである。 に当てはまる語は同位体です。したがって、正解は「同位体」です。
  
  「金属結合」は、「金属原子が自由電子を介して結び付く結合である。」に当てはまる語です。
  「極性分子」は、「分子の中で電荷のかたよりがある分子である。」に当てはまる語です。
  「純物質」は、「一種類の物質だけからできていて、性質が一定である物質である。」に当てはまる語です。
  「同位体」が正しいです。「陽子数は同じで中性子数が異なる原子どうしである。」に当てはまる語です。
