# 化学基礎 問985
id: 2025
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "放射性同位体 / 溶解度の差を利用すること"
  - "再結晶 / 新しい物質ができること"
  - "化学変化 / 放射線を出す同位体であること"
  - "電離度 / どのくらいイオンに分かれるかを表すこと"
correct: 3
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「電離度 / どのくらいイオンに分かれるかを表すこと」です。したがって、正解は「電離度 / どのくらいイオンに分かれるかを表すこと」です。
  
  「放射性同位体 / 溶解度の差を利用すること」は、用語と要点の対応が合っていません。
  「再結晶 / 新しい物質ができること」は、用語と要点の対応が合っていません。
  「化学変化 / 放射線を出す同位体であること」は、用語と要点の対応が合っていません。
  「電離度 / どのくらいイオンに分かれるかを表すこと」が正しいです。用語と要点の対応が合っています。
