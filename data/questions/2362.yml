# 高校化学 問362
id: 2362
type: single_choice
text: |
  「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "塩の加水分解"
  - "溶解平衡"
  - "沸点上昇"
  - "浸透圧"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  酢酸ナトリウム水溶液が塩基性を示す理由を考える場面 と最も関係が深いのは塩の加水分解です。したがって、正解は「塩の加水分解」です。
  
  「塩の加水分解」が正しいです。この具体例と最も関係が深い語です。
  「溶解平衡」は、「飽和溶液で見かけ上変化が止まっている場面」と結び付きが強い語です。
  「沸点上昇」は、「食塩水の沸点が水より少し高くなることを考える場面」と結び付きが強い語です。
  「浸透圧」は、「薄い溶液側から濃い溶液側へ水が移動する場面」と結び付きが強い語です。
