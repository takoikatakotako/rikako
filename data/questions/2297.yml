# 高校化学 問297
id: 2297
type: single_choice
text: |
  「グルコースがつながった植物の細胞壁をつくる多糖である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "親水コロイド"
  - "ナイロン"
  - "セルロース"
  - "タンパク質"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  グルコースがつながった植物の細胞壁をつくる多糖である。 に当てはまる語はセルロースです。したがって、正解は「セルロース」です。
  
  「親水コロイド」は、「水との親和性が高く、比較的安定なコロイドである。」に当てはまる語です。
  「ナイロン」は、「アミド結合をもつ合成繊維の代表的な高分子化合物である。」に当てはまる語です。
  「セルロース」が正しいです。「グルコースがつながった植物の細胞壁をつくる多糖である。」に当てはまる語です。
  「タンパク質」は、「多数のアミノ酸がつながってできた天然高分子化合物である。」に当てはまる語です。
