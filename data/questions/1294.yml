# 化学基礎 問254
id: 1294
type: single_choice
text: |
  クロマトグラフィーの特徴として、最も適切なものはどれか。
choices:
  - "一種類の成分だけからなる"
  - "複数の成分が混ざっている"
  - "移動しやすさの違いを利用する"
  - "一種類の元素だけからなる"
correct: 2
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  クロマトグラフィーでは、「移動しやすさの違いを利用する」という点が大切です。したがって、正解は「移動しやすさの違いを利用する」です。
  
  「一種類の成分だけからなる」は、純物質に関係する特徴です。
  「複数の成分が混ざっている」は、混合物に関係する特徴です。
  「移動しやすさの違いを利用する」が正しいです。クロマトグラフィーの特徴を表しています。
  「一種類の元素だけからなる」は、単体に関係する特徴です。
