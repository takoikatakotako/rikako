# 化学基礎 問441
id: 1481
type: single_choice
text: |
  「金属が電子を失ってイオンになりやすい性質の強さである。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "pH"
  - "指示薬"
  - "非電解質"
  - "イオン化傾向"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  金属が電子を失ってイオンになりやすい性質の強さである。 に当てはまる語はイオン化傾向です。したがって、正解は「イオン化傾向」です。
  
  「pH」は、「水溶液の酸性や塩基性の強さを表す尺度である。」に当てはまる語です。
  「指示薬」は、「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」に当てはまる語です。
  「非電解質」は、「水に溶けても電流をほとんど通さない物質である。」に当てはまる語です。
  「イオン化傾向」が正しいです。「金属が電子を失ってイオンになりやすい性質の強さである。」に当てはまる語です。
