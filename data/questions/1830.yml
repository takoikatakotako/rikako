# 化学基礎 問790
id: 1830
type: single_choice
text: |
  「相手を還元させ、自分は酸化されること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "相手を還元させ、自身は酸化される物質である。"
  - "原子どうしが電子を共有してできる結び付きである。"
  - "化学変化を、物質の種類と量の関係が分かるように表した式である。"
  - "物質が酸素と結び付く、または電子を失う変化である。"
correct: 0
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「相手を還元させ、自分は酸化されること」という見方と最も関係が深い説明は「相手を還元させ、自身は酸化される物質である。」です。したがって、正解は「相手を還元させ、自身は酸化される物質である。」です。
  
  「相手を還元させ、自身は酸化される物質である。」が正しいです。この見方と最も関係が深い説明です。
  「原子どうしが電子を共有してできる結び付きである。」は、その説明で大切なのは「電子を共有して結び付くこと」という見方です。
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」は、その説明で大切なのは「反応する物質とできる物質の関係を式で示すこと」という見方です。
  「物質が酸素と結び付く、または電子を失う変化である。」は、その説明で大切なのは「酸素との結び付きや電子の放出に注目すること」という見方です。
