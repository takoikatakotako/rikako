# 高校化学 問26
id: 736
type: single_choice
text: |
  凝固点降下についての説明として、最も適切なものはどれか。
choices:
  - "分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。"
  - "溶液の凝固点が純粋な溶媒より低くなる現象である。"
  - "単位時間あたりに進む反応の程度を表す量である。"
  - "反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  凝固点降下は、溶液の凝固点が純粋な溶媒より低くなる現象である。 したがって、正解は「溶液の凝固点が純粋な溶媒より低くなる現象である。」です。
  
  「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」は、実在気体の説明です。
  「溶液の凝固点が純粋な溶媒より低くなる現象である。」が正しいです。凝固点降下の説明です。
  「単位時間あたりに進む反応の程度を表す量である。」は、反応速度の説明です。
  「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」は、触媒の説明です。
