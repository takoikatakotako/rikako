# 化学基礎 問380
id: 1420
type: single_choice
text: |
  化学反応式と最も関係が深い場面として、適切なものはどれか。
choices:
  - "レモン水とせっけん水の酸性・塩基性を比べる場面"
  - "BTB溶液やフェノールフタレインで液性を調べる場面"
  - "酸化銅から酸素が取れて銅になる場面"
  - "水素と酸素から水ができる反応を式で表す場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  水素と酸素から水ができる反応を式で表す場面は、化学反応式と結び付きが強い場面です。したがって、正解は「水素と酸素から水ができる反応を式で表す場面」です。
  
  「レモン水とせっけん水の酸性・塩基性を比べる場面」は、pHと結び付きが強い場面です。
  「BTB溶液やフェノールフタレインで液性を調べる場面」は、指示薬と結び付きが強い場面です。
  「酸化銅から酸素が取れて銅になる場面」は、還元と結び付きが強い場面です。
  「水素と酸素から水ができる反応を式で表す場面」が正しいです。これは化学反応式と結び付きが強い場面です。
