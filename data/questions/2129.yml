# 高校化学 問129
id: 2129
type: single_choice
text: |
  チンダル現象と最も関係が深い場面として、適切なものはどれか。
choices:
  - "弱酸が一部だけ電離している水溶液を考える場面"
  - "薄暗い部屋でコロイドに光を当てると筋が見える場面"
  - "血液や実験用の溶液で pH を保ちたい場面"
  - "酢酸が塩酸ほど強く電離しない場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  薄暗い部屋でコロイドに光を当てると筋が見える場面は、チンダル現象と結び付きが強い場面です。したがって、正解は「薄暗い部屋でコロイドに光を当てると筋が見える場面」です。
  
  「弱酸が一部だけ電離している水溶液を考える場面」は、電離平衡と結び付きが強い場面です。
  「薄暗い部屋でコロイドに光を当てると筋が見える場面」が正しいです。これはチンダル現象と結び付きが強い場面です。
  「血液や実験用の溶液で pH を保ちたい場面」は、緩衝液と結び付きが強い場面です。
  「酢酸が塩酸ほど強く電離しない場面」は、弱酸と結び付きが強い場面です。
