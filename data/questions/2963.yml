# 高校化学 問963
id: 2963
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "飽和溶液 / デンプンやゼラチンが水中で安定しやすい場面"
  - "親水コロイド / 自動車のバッテリーを考える場面"
  - "弱酸 / 酢酸が塩酸ほど強く電離しない場面"
  - "鉛蓄電池 / 食塩を加えても底に残るようになった食塩水を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「弱酸 / 酢酸が塩酸ほど強く電離しない場面」です。したがって、正解は「弱酸 / 酢酸が塩酸ほど強く電離しない場面」です。
  
  「飽和溶液 / デンプンやゼラチンが水中で安定しやすい場面」は、用語と場面の対応が合っていません。
  「親水コロイド / 自動車のバッテリーを考える場面」は、用語と場面の対応が合っていません。
  「弱酸 / 酢酸が塩酸ほど強く電離しない場面」が正しいです。用語と場面の対応が合っています。
  「鉛蓄電池 / 食塩を加えても底に残るようになった食塩水を考える場面」は、用語と場面の対応が合っていません。
