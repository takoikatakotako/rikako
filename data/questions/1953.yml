# 化学基礎 問913
id: 1953
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "凝固 / 水を冷やして氷にする場面"
  - "周期律 / 水分子や酸素分子を粒として考える場面"
  - "分子 / 水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
  - "塩基 / 周期表で似た性質の元素が縦に並ぶことを見る場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「凝固 / 水を冷やして氷にする場面」です。したがって、正解は「凝固 / 水を冷やして氷にする場面」です。
  
  「凝固 / 水を冷やして氷にする場面」が正しいです。用語と場面の対応が合っています。
  「周期律 / 水分子や酸素分子を粒として考える場面」は、用語と場面の対応が合っていません。
  「分子 / 水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」は、用語と場面の対応が合っていません。
  「塩基 / 周期表で似た性質の元素が縦に並ぶことを見る場面」は、用語と場面の対応が合っていません。
