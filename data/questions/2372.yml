# 高校化学 問372
id: 2372
type: single_choice
text: |
  「アンモニアを加えると深い青色のイオンができる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "アルデヒド"
  - "エステル"
  - "錯イオン"
  - "フェノール"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  アンモニアを加えると深い青色のイオンができる場面 と最も関係が深いのは錯イオンです。したがって、正解は「錯イオン」です。
  
  「アルデヒド」は、「ホルムアルデヒドやアセトアルデヒドを考える場面」と結び付きが強い語です。
  「エステル」は、「果物の香りに関係する化合物を考える場面」と結び付きが強い語です。
  「錯イオン」が正しいです。この具体例と最も関係が深い語です。
  「フェノール」は、「フェノール類の酸性や消毒作用を考える場面」と結び付きが強い語です。
