# 高校化学 問823
id: 2823
type: single_choice
text: |
  「溶ける速さと析出する速さが等しくなっている平衡である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "最外殻が安定していて反応しにくいこと"
  - "溶解と析出がつり合うこと"
  - "もとの一部が別のものに置き換わること"
  - "アミノ酸が多数つながった高分子であること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「溶ける速さと析出する速さが等しくなっている平衡である。」を理解する上では、「溶解と析出がつり合うこと」という見方が大切です。したがって、正解は「溶解と析出がつり合うこと」です。
  
  「最外殻が安定していて反応しにくいこと」は、その見方は貴ガスに関係します。
  「溶解と析出がつり合うこと」が正しいです。この説明と結び付きが強い見方です。
  「もとの一部が別のものに置き換わること」は、その見方は置換反応に関係します。
  「アミノ酸が多数つながった高分子であること」は、その見方はタンパク質に関係します。
