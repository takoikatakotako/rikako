# 化学基礎 問282
id: 1322
type: single_choice
text: |
  塩基の特徴として、最も適切なものはどれか。
choices:
  - "酸と塩基が反応して塩と水ができる"
  - "酸性やアルカリ性の強さの目安"
  - "水酸化物イオンを生じるか水素イオンを受け取る"
  - "電子を失う"
correct: 2
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  塩基では、「水酸化物イオンを生じるか水素イオンを受け取る」という点が大切です。したがって、正解は「水酸化物イオンを生じるか水素イオンを受け取る」です。
  
  「酸と塩基が反応して塩と水ができる」は、中和に関係する特徴です。
  「酸性やアルカリ性の強さの目安」は、pHに関係する特徴です。
  「水酸化物イオンを生じるか水素イオンを受け取る」が正しいです。塩基の特徴を表しています。
  「電子を失う」は、酸化に関係する特徴です。
