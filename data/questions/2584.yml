# 高校化学 問584
id: 2584
type: single_choice
text: |
  「分子の端にアルデヒド基をもつ有機化合物である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "芳香族化合物の基本構造を学ぶ場面"
  - "導電性高分子や高性能電池材料を考える場面"
  - "温めた風船がふくらみやすくなる場面"
  - "ホルムアルデヒドやアセトアルデヒドを考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「分子の端にアルデヒド基をもつ有機化合物である。」と最も関係が深い場面は「ホルムアルデヒドやアセトアルデヒドを考える場面」です。したがって、正解は「ホルムアルデヒドやアセトアルデヒドを考える場面」です。
  
  「芳香族化合物の基本構造を学ぶ場面」は、「六角形の環状構造をもつ代表的な芳香族炭化水素である。」と結び付きが強い場面です。
  「導電性高分子や高性能電池材料を考える場面」は、「目的に応じた特別な性質をもたせてつくられた材料である。」と結び付きが強い場面です。
  「温めた風船がふくらみやすくなる場面」は、「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」と結び付きが強い場面です。
  「ホルムアルデヒドやアセトアルデヒドを考える場面」が正しいです。この説明と結び付きが強い場面です。
