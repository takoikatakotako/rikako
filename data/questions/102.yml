# 令和7年度 ITパスポート 公開問題 問44
id: 102
type: single_choice
text: |
  システム開発の早い段階で、目に見える形で利用者の要求が確認できるように確認用のソフトウェアを作成するソフトウェア開発モデルとして、最も適切なものはどれか。
choices:
  - "アジャイル"
  - "ウォーターフォール"
  - "スパイラル"
  - "プロトタイピング / －20"
correct: 3
explanation: |
  この問題の公開解答では「プロトタイピング / －20」が正解とされています。
  
  「アジャイル」は公開解答では正解ではありません。
  「ウォーターフォール」は公開解答では正解ではありません。
  「スパイラル」は公開解答では正解ではありません。
  「プロトタイピング / －20」が公開解答で正解とされています。
