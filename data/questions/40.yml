# 令和7年度 ITパスポート 公開問題 問37
id: 40
type: single_choice
text: |
  IT サービスマネジメントに関して、次の記述中のa、bに入れる字句の適切な組合
  せはどれか。
  a
  はサービス提供者と顧客との間で合意されたサービス品質に関する合意
  書である。
  a
  の遵守状況を確認し、ITサービスの品質を維持・改善させる
  ための活動が
  b
  である。
  a
  b
choices:
  - "NDA / SCM"
  - "NDA / SLM"
  - "SLA / SCM"
  - "SLA / SLM"
correct: 3
explanation: |
  サービス品質に関する合意書は SLA であり、その遵守状況を確認しながら品質の維持・改善を行う活動は SLM です。したがって、正解は「SLA / SLM」です。
  
  「NDA / SCM」はNDA は秘密保持契約、SCM はサプライチェーン管理であり不適切です。
  「NDA / SLM」はa が NDA なので誤りです。
  「SLA / SCM」はb が SCM なので誤りです。
  「SLA / SLM」が正しいです。a=SLA、b=SLM の組合せです。
