# 化学基礎 問823
id: 1863
type: single_choice
text: |
  「電子を共有して結び付くこと」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水素原子どうしが電子を共有して H2 になる場面"
  - "ぬれた床の水がしだいに乾く場面"
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
  - "水分子で電荷のかたよりを考える場面"
correct: 0
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「電子を共有して結び付くこと」という見方と最も関係が深い場面は「水素原子どうしが電子を共有して H2 になる場面」です。したがって、正解は「水素原子どうしが電子を共有して H2 になる場面」です。
  
  「水素原子どうしが電子を共有して H2 になる場面」が正しいです。この見方と最も関係が深い場面です。
  「ぬれた床の水がしだいに乾く場面」は、その場面で大切なのは「液体から気体への変化であること」という見方です。
  「ナトリウムが電子を1個失いやすい理由を考える場面」は、その場面で大切なのは「化学結合やイオンのできやすさに関係すること」という見方です。
  「水分子で電荷のかたよりを考える場面」は、その場面で大切なのは「電荷のかたよりがあること」という見方です。
