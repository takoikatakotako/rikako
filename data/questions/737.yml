# 高校化学 問27
id: 737
type: single_choice
text: |
  浸透圧についての説明として、最も適切なものはどれか。
choices:
  - "絶対零度を基準にした温度で、単位は K で表す。"
  - "反応が進むために必要な最小限のエネルギーである。"
  - "半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。"
  - "正反応と逆反応の両方が起こり得る反応である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  浸透圧は、半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。 したがって、正解は「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」です。
  
  「絶対零度を基準にした温度で、単位は K で表す。」は、絶対温度の説明です。
  「反応が進むために必要な最小限のエネルギーである。」は、活性化エネルギーの説明です。
  「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」が正しいです。浸透圧の説明です。
  「正反応と逆反応の両方が起こり得る反応である。」は、可逆反応の説明です。
