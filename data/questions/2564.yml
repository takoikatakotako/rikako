# 高校化学 問564
id: 2564
type: single_choice
text: |
  「水溶液中で一部だけ電離する塩基である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムやカリウムの性質を比べる場面"
  - "メタンやエタンの性質を考える場面"
  - "染料の原料になる芳香族アミンを考える場面"
  - "アンモニア水が強塩基ほど完全には電離しない場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「水溶液中で一部だけ電離する塩基である。」と最も関係が深い場面は「アンモニア水が強塩基ほど完全には電離しない場面」です。したがって、正解は「アンモニア水が強塩基ほど完全には電離しない場面」です。
  
  「ナトリウムやカリウムの性質を比べる場面」は、「周期表1族に属し、水と反応しやすい金属元素の総称である。」と結び付きが強い場面です。
  「メタンやエタンの性質を考える場面」は、「炭素どうしが単結合だけでつながった炭化水素である。」と結び付きが強い場面です。
  「染料の原料になる芳香族アミンを考える場面」は、「ベンゼン環にアミノ基が直接結び付いた化合物である。」と結び付きが強い場面です。
  「アンモニア水が強塩基ほど完全には電離しない場面」が正しいです。この説明と結び付きが強い場面です。
