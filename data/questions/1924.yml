# 化学基礎 問884
id: 1924
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "pH / 水溶液の酸性や塩基性の強さを表す尺度である。"
  - "モル濃度 / 溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。"
  - "指示薬 / 二つの溶液の電気的なつり合いを保つための部分である。"
  - "塩橋 / 溶液1L中に溶けている溶質の物質量を表した濃度である。"
correct: 0
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「pH / 水溶液の酸性や塩基性の強さを表す尺度である。」です。したがって、正解は「pH / 水溶液の酸性や塩基性の強さを表す尺度である。」です。
  
  「pH / 水溶液の酸性や塩基性の強さを表す尺度である。」が正しいです。用語と説明の対応が合っています。
  「モル濃度 / 溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」は、用語と説明の対応が合っていません。
  「指示薬 / 二つの溶液の電気的なつり合いを保つための部分である。」は、用語と説明の対応が合っていません。
  「塩橋 / 溶液1L中に溶けている溶質の物質量を表した濃度である。」は、用語と説明の対応が合っていません。
