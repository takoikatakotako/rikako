# 化学基礎 問953
id: 1993
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "昇華 / 電子を受け取って負に帯電すること"
  - "陰イオン / 粒子の数をまとめて扱う単位であること"
  - "モル / 固体から直接気体になること"
  - "再結晶 / 溶解度の差を利用すること"
correct: 3
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「再結晶 / 溶解度の差を利用すること」です。したがって、正解は「再結晶 / 溶解度の差を利用すること」です。
  
  「昇華 / 電子を受け取って負に帯電すること」は、用語と要点の対応が合っていません。
  「陰イオン / 粒子の数をまとめて扱う単位であること」は、用語と要点の対応が合っていません。
  「モル / 固体から直接気体になること」は、用語と要点の対応が合っていません。
  「再結晶 / 溶解度の差を利用すること」が正しいです。用語と要点の対応が合っています。
