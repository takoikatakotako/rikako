# 化学基礎 問84
id: 1124
type: single_choice
text: |
  酸素を受け取る変化として、最も適切なものはどれか。
choices:
  - "酸化"
  - "還元"
  - "中和"
  - "蒸留"
correct: 0
explanation: |
  この問題は、「酸化の古い定義」を確認する問題です。
  
  酸素を受け取る変化は、酸化と考えられます。電子の授受で考える方法ともつながっています。したがって、正解は「酸化」です。
  
  「酸化」が正しいです。酸素を受け取る変化と考えられます。
  「還元」は、酸素を失う変化と関係します。
  「中和」は、酸と塩基の反応です。
  「蒸留」は、分離の方法です。
