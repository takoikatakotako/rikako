# 高校化学 問93
id: 2093
type: single_choice
text: |
  アミノ酸についての説明として、最も適切なものはどれか。
choices:
  - "アミノ基とカルボキシ基をあわせもつ化合物である。"
  - "ベンゼン環にアミノ基が直接結び付いた化合物である。"
  - "使い終わった資源や製品を回収し、再び利用する考え方である。"
  - "溶質の粒子が溶媒中に広がっていく現象である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  アミノ酸は、アミノ基とカルボキシ基をあわせもつ化合物である。 したがって、正解は「アミノ基とカルボキシ基をあわせもつ化合物である。」です。
  
  「アミノ基とカルボキシ基をあわせもつ化合物である。」が正しいです。アミノ酸の説明です。
  「ベンゼン環にアミノ基が直接結び付いた化合物である。」は、アニリンの説明です。
  「使い終わった資源や製品を回収し、再び利用する考え方である。」は、資源の再利用の説明です。
  「溶質の粒子が溶媒中に広がっていく現象である。」は、溶解の説明です。
