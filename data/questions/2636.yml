# 高校化学 問636
id: 2636
type: single_choice
text: |
  「反応前後で熱の出入りを比較する場面」を説明した文として、最も適切なものはどれか。
choices:
  - "一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。"
  - "反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。"
  - "水溶液中で一部だけ電離する塩基である。"
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「反応前後で熱の出入りを比較する場面」を説明した文として適切なのは「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」です。したがって、正解は「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」です。
  
  「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」が正しいです。この具体例を説明した文です。
  「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」は、この説明は「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」と結び付きが強いです。
  「水溶液中で一部だけ電離する塩基である。」は、この説明は「アンモニア水が強塩基ほど完全には電離しない場面」と結び付きが強いです。
  「金属元素を炎に入れたときに特有の色を示す反応である。」は、この説明は「ナトリウムで黄色、銅で青緑色を確かめる場面」と結び付きが強いです。
