# 化学基礎 問757
id: 1797
type: single_choice
text: |
  「一種類の元素だけからできること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "相手を還元させ、自身は酸化される物質である。"
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
  - "成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
  - "一種類の元素だけからできている物質である。"
correct: 3
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「一種類の元素だけからできること」という見方と最も関係が深い説明は「一種類の元素だけからできている物質である。」です。したがって、正解は「一種類の元素だけからできている物質である。」です。
  
  「相手を還元させ、自身は酸化される物質である。」は、その説明で大切なのは「相手を還元させ、自分は酸化されること」という見方です。
  「金属元素を炎に入れたときに特有の色を示す反応である。」は、その説明で大切なのは「金属元素ごとに炎の色が異なること」という見方です。
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」は、その説明で大切なのは「移動しやすさの違いを利用すること」という見方です。
  「一種類の元素だけからできている物質である。」が正しいです。この見方と最も関係が深い説明です。
