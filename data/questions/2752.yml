# 高校化学 問752
id: 2752
type: single_choice
text: |
  「反応を始めるための壁に注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "アルコール"
  - "活性化エネルギー"
  - "ペプチド結合"
  - "気液平衡"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「反応を始めるための壁に注目すること」という見方が大切なのは活性化エネルギーです。したがって、正解は「活性化エネルギー」です。
  
  「アルコール」は、その語で大切なのは「ヒドロキシ基をもつこと」という見方です。
  「活性化エネルギー」が正しいです。この見方が大切な語です。
  「ペプチド結合」は、その語で大切なのは「アミノ酸どうしをつなぐ結合であること」という見方です。
  「気液平衡」は、その語で大切なのは「蒸発と凝縮がつり合うこと」という見方です。
