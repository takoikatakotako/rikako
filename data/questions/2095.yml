# 高校化学 問95
id: 2095
type: single_choice
text: |
  グルコースについての説明として、最も適切なものはどれか。
choices:
  - "使い終わった資源や製品を回収し、再び利用する考え方である。"
  - "溶質の粒子が溶媒中に広がっていく現象である。"
  - "代表的な単糖類で、生物のエネルギー源として重要な化合物である。"
  - "その温度でそれ以上溶質が溶けない状態の溶液である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  グルコースは、代表的な単糖類で、生物のエネルギー源として重要な化合物である。 したがって、正解は「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」です。
  
  「使い終わった資源や製品を回収し、再び利用する考え方である。」は、資源の再利用の説明です。
  「溶質の粒子が溶媒中に広がっていく現象である。」は、溶解の説明です。
  「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」が正しいです。グルコースの説明です。
  「その温度でそれ以上溶質が溶けない状態の溶液である。」は、飽和溶液の説明です。
