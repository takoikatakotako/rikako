# 高校化学 問602
id: 2602
type: single_choice
text: |
  「氷が溶け始める温度を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "結晶のような規則正しい配列をもたない固体である。"
  - "コロイド粒子が不規則に動いて見える現象である。"
  - "固体と液体が平衡で共存するときの温度である。"
  - "化学反応によって光が放出される現象である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「氷が溶け始める温度を考える場面」を説明した文として適切なのは「固体と液体が平衡で共存するときの温度である。」です。したがって、正解は「固体と液体が平衡で共存するときの温度である。」です。
  
  「結晶のような規則正しい配列をもたない固体である。」は、この説明は「ガラスのように一定の融点を示しにくい固体を考える場面」と結び付きが強いです。
  「コロイド粒子が不規則に動いて見える現象である。」は、この説明は「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」と結び付きが強いです。
  「固体と液体が平衡で共存するときの温度である。」が正しいです。この具体例を説明した文です。
  「化学反応によって光が放出される現象である。」は、この説明は「ケミカルライトが光る仕組みを考える場面」と結び付きが強いです。
