# 高校化学 問851
id: 2851
type: single_choice
text: |
  「単位時間あたりに進む反応の程度を表す量である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "必要な機能をねらって材料を設計すること"
  - "時間あたりにどれだけ変化するかを見ること"
  - "圧力一定で体積と絶対温度の関係を見ること"
  - "溶質の粒子が溶媒中に広がること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「単位時間あたりに進む反応の程度を表す量である。」を理解する上では、「時間あたりにどれだけ変化するかを見ること」という見方が大切です。したがって、正解は「時間あたりにどれだけ変化するかを見ること」です。
  
  「必要な機能をねらって材料を設計すること」は、その見方は機能性材料に関係します。
  「時間あたりにどれだけ変化するかを見ること」が正しいです。この説明と結び付きが強い見方です。
  「圧力一定で体積と絶対温度の関係を見ること」は、その見方はシャルルの法則に関係します。
  「溶質の粒子が溶媒中に広がること」は、その見方は溶解に関係します。
