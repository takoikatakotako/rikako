# 化学基礎 問957
id: 1997
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "周期律 / 物質の性質を示す小さな粒子として考えること"
  - "分子 / 水酸化物イオンや水素イオンの受け取りに注目すること"
  - "塩基 / 性質が周期的にくり返されること"
  - "単体 / 一種類の元素だけからできること"
correct: 3
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「単体 / 一種類の元素だけからできること」です。したがって、正解は「単体 / 一種類の元素だけからできること」です。
  
  「周期律 / 物質の性質を示す小さな粒子として考えること」は、用語と要点の対応が合っていません。
  「分子 / 水酸化物イオンや水素イオンの受け取りに注目すること」は、用語と要点の対応が合っていません。
  「塩基 / 性質が周期的にくり返されること」は、用語と要点の対応が合っていません。
  「単体 / 一種類の元素だけからできること」が正しいです。用語と要点の対応が合っています。
