# 高校化学 問629
id: 2629
type: single_choice
text: |
  「薄暗い部屋でコロイドに光を当てると筋が見える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "燃料と酸化剤を外部から供給しながら電気を取り出す電池である。"
  - "コロイド粒子が光を散乱するため、光の道筋が見える現象である。"
  - "平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。"
  - "周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「薄暗い部屋でコロイドに光を当てると筋が見える場面」を説明した文として適切なのは「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」です。したがって、正解は「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」です。
  
  「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」は、この説明は「水素を使って発電し、水を生じる仕組みを考える場面」と結び付きが強いです。
  「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」が正しいです。この具体例を説明した文です。
  「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」は、この説明は「圧力や濃度を変えると平衡が移る方向を考える場面」と結び付きが強いです。
  「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」は、この説明は「マグネシウムやカルシウムの性質を比べる場面」と結び付きが強いです。
