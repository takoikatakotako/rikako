# 化学基礎 問776
id: 1816
type: single_choice
text: |
  「電荷のかたよりがあること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
  - "原子核の中にある陽子数と中性子数の合計である。"
  - "分子の中で電荷のかたよりがある分子である。"
  - "原子どうしが電子を共有してできる結び付きである。"
correct: 2
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「電荷のかたよりがあること」という見方と最も関係が深い説明は「分子の中で電荷のかたよりがある分子である。」です。したがって、正解は「分子の中で電荷のかたよりがある分子である。」です。
  
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」は、その説明で大切なのは「物質の種類が変わらないこと」という見方です。
  「原子核の中にある陽子数と中性子数の合計である。」は、その説明で大切なのは「陽子数と中性子数の合計であること」という見方です。
  「分子の中で電荷のかたよりがある分子である。」が正しいです。この見方と最も関係が深い説明です。
  「原子どうしが電子を共有してできる結び付きである。」は、その説明で大切なのは「電子を共有して結び付くこと」という見方です。
