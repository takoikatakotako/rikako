# 化学基礎 問255
id: 1295
type: single_choice
text: |
  純物質の特徴として、最も適切なものはどれか。
choices:
  - "複数の成分が混ざっている"
  - "一種類の元素だけからなる"
  - "複数の元素が結び付いている"
  - "一種類の成分だけからなる"
correct: 3
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  純物質では、「一種類の成分だけからなる」という点が大切です。したがって、正解は「一種類の成分だけからなる」です。
  
  「複数の成分が混ざっている」は、混合物に関係する特徴です。
  「一種類の元素だけからなる」は、単体に関係する特徴です。
  「複数の元素が結び付いている」は、化合物に関係する特徴です。
  「一種類の成分だけからなる」が正しいです。純物質の特徴を表しています。
