# 高校化学 問861
id: 2861
type: single_choice
text: |
  「少量の酸や塩基を加えても pH が変わりにくい溶液である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "温度一定で圧力と体積の関係を見ること"
  - "粒子配列が不規則であること"
  - "粒子が周囲の分子にぶつかって動くこと"
  - "pH の変化をおさえること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「少量の酸や塩基を加えても pH が変わりにくい溶液である。」を理解する上では、「pH の変化をおさえること」という見方が大切です。したがって、正解は「pH の変化をおさえること」です。
  
  「温度一定で圧力と体積の関係を見ること」は、その見方はボイルの法則に関係します。
  「粒子配列が不規則であること」は、その見方はアモルファスに関係します。
  「粒子が周囲の分子にぶつかって動くこと」は、その見方はブラウン運動に関係します。
  「pH の変化をおさえること」が正しいです。この説明と結び付きが強い見方です。
