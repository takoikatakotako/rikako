# 化学基礎 問800
id: 1840
type: single_choice
text: |
  「化学が社会や生活に広く役立つこと」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。"
  - "相手を還元させ、自身は酸化される物質である。"
  - "化学の知識が生活、産業、環境、医療などに役立つという見方である。"
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
correct: 2
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「化学が社会や生活に広く役立つこと」という見方と最も関係が深い説明は「化学の知識が生活、産業、環境、医療などに役立つという見方である。」です。したがって、正解は「化学の知識が生活、産業、環境、医療などに役立つという見方である。」です。
  
  「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」は、その説明で大切なのは「酸と塩基が打ち消し合うこと」という見方です。
  「相手を還元させ、自身は酸化される物質である。」は、その説明で大切なのは「相手を還元させ、自分は酸化されること」という見方です。
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」が正しいです。この見方と最も関係が深い説明です。
  「金属元素を炎に入れたときに特有の色を示す反応である。」は、その説明で大切なのは「金属元素ごとに炎の色が異なること」という見方です。
