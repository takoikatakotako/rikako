# 化学基礎 問227
id: 1267
type: single_choice
text: |
  「二酸化炭素 CO2」に最も関係が深い語として、適切なものはどれか。
choices:
  - "無極性分子"
  - "モル"
  - "モル濃度"
  - "化学反応式"
correct: 0
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「二酸化炭素 CO2」に最も関係が深いのは無極性分子です。したがって、正解は「無極性分子」です。
  
  「無極性分子」が正しいです。この例は無極性分子に関係しています。
  「モル」は、この例に最も関係が深い語ではありません。
  「モル濃度」は、この例に最も関係が深い語ではありません。
  「化学反応式」は、この例に最も関係が深い語ではありません。
