# 高校化学 問802
id: 2802
type: single_choice
text: |
  「固体と液体が平衡で共存するときの温度である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "固体と液体の境目の温度に注目すること"
  - "還元が起こる側の電極であること"
  - "H+ と OH- の積が一定であること"
  - "酸とも塩基とも反応すること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「固体と液体が平衡で共存するときの温度である。」を理解する上では、「固体と液体の境目の温度に注目すること」という見方が大切です。したがって、正解は「固体と液体の境目の温度に注目すること」です。
  
  「固体と液体の境目の温度に注目すること」が正しいです。この説明と結び付きが強い見方です。
  「還元が起こる側の電極であること」は、その見方は陰極に関係します。
  「H+ と OH- の積が一定であること」は、その見方は水のイオン積に関係します。
  「酸とも塩基とも反応すること」は、その見方は両性酸化物に関係します。
