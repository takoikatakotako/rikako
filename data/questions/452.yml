# 令和7年度 ITパスポート 公開問題 問28
id: 452
type: single_choice
text: |
  生成 AIに関する記述として、最も適切なものはどれか。
choices:
  - "一切の学習を必要とせずに、新しいコンテンツを生成する。"
  - "過去のデータから項目間の相関などを学習したモデルを用いて、現在のデータから将来の値を予測して出力する。"
  - "作成したシナリオに基づいて動作するソフトウェアロボットによって、業務を自動化する。"
  - "自然言語で指示された内容に従って、事前に学習したデータを基に、新しいコンテンツを生成する。"
correct: 3
explanation: |
  生成AIは、学習済みモデルを使って、自然言語などの指示に応じた新しい文章、画像、音声などを生成する技術です。したがって、正解は「自然言語で指示された内容に従って、事前に学習したデータを基に、新しいコンテンツを生成する」です。
  
  「一切の学習を必要とせずに、新しいコンテンツを生成する」は生成AIも事前学習を必要とするため誤りです。
  「過去のデータから項目間の相関などを学習したモデルを用いて、現在のデータから将来の値を予測して出力する」は予測モデルによる将来値推定の説明であり、生成AIの定義ではありません。
  「作成したシナリオに基づいて動作するソフトウェアロボットによって、業務を自動化する」はRPAの説明です。
  「自然言語で指示された内容に従って、事前に学習したデータを基に、新しいコンテンツを生成する」が正しいです。学習済みデータを基に、新しいコンテンツを生成するのが生成AIです。
