# 高校化学 問888
id: 2888
type: single_choice
text: |
  「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "反応に伴う熱の出入りを見ること"
  - "反応物を補給しながら発電すること"
  - "ベンゼン環にヒドロキシ基が直接つくこと"
  - "加えた変化を打ち消す向きに平衡が動くこと"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」を理解する上では、「ベンゼン環にヒドロキシ基が直接つくこと」という見方が大切です。したがって、正解は「ベンゼン環にヒドロキシ基が直接つくこと」です。
  
  「反応に伴う熱の出入りを見ること」は、その見方は反応熱に関係します。
  「反応物を補給しながら発電すること」は、その見方は燃料電池に関係します。
  「ベンゼン環にヒドロキシ基が直接つくこと」が正しいです。この説明と結び付きが強い見方です。
  「加えた変化を打ち消す向きに平衡が動くこと」は、その見方はルシャトリエの原理に関係します。
