# 高校化学 問739
id: 2739
type: single_choice
text: |
  「周囲へ熱を出す反応であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "発熱反応"
  - "貴ガス"
  - "置換反応"
  - "タンパク質"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「周囲へ熱を出す反応であること」という見方が大切なのは発熱反応です。したがって、正解は「発熱反応」です。
  
  「発熱反応」が正しいです。この見方が大切な語です。
  「貴ガス」は、その語で大切なのは「最外殻が安定していて反応しにくいこと」という見方です。
  「置換反応」は、その語で大切なのは「もとの一部が別のものに置き換わること」という見方です。
  「タンパク質」は、その語で大切なのは「アミノ酸が多数つながった高分子であること」という見方です。
