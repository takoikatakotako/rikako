# 化学基礎 問171
id: 1211
type: single_choice
text: |
  陰イオンの例として、最も適切なものはどれか。
choices:
  - "塩化ナトリウム NaCl"
  - "Cl-"
  - "水分子 H2O の結合"
  - "銅 Cu の結合"
correct: 1
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  Cl-は、陰イオンの例です。したがって、正解は「Cl-」です。
  
  「塩化ナトリウム NaCl」は、イオン結合の例として見る方が適切です。
  「Cl-」が正しいです。これは陰イオンの例です。
  「水分子 H2O の結合」は、共有結合の例として見る方が適切です。
  「銅 Cu の結合」は、金属結合の例として見る方が適切です。
