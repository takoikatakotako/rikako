# 化学基礎 問184
id: 1224
type: single_choice
text: |
  pHの例として、最も適切なものはどれか。
choices:
  - "マグネシウムが燃える反応"
  - "酸化銅から銅ができる反応"
  - "pH 3 の水溶液"
  - "過マンガン酸カリウム"
correct: 2
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  pH 3 の水溶液は、pHの例です。したがって、正解は「pH 3 の水溶液」です。
  
  「マグネシウムが燃える反応」は、酸化の例として見る方が適切です。
  「酸化銅から銅ができる反応」は、還元の例として見る方が適切です。
  「pH 3 の水溶液」が正しいです。これはpHの例です。
  「過マンガン酸カリウム」は、酸化剤の例として見る方が適切です。
