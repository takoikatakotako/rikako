# 高校化学 問690
id: 2690
type: single_choice
text: |
  「衣類やロープに使われる合成繊維を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "液体1 molが気体になるときに吸収する熱量である。"
  - "金属原子が規則正しく並び、自由電子が全体に広がった結晶である。"
  - "アミド結合をもつ合成繊維の代表的な高分子化合物である。"
  - "コロイド粒子が光を散乱するため、光の道筋が見える現象である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「衣類やロープに使われる合成繊維を考える場面」を説明した文として適切なのは「アミド結合をもつ合成繊維の代表的な高分子化合物である。」です。したがって、正解は「アミド結合をもつ合成繊維の代表的な高分子化合物である。」です。
  
  「液体1 molが気体になるときに吸収する熱量である。」は、この説明は「水を水蒸気に変えるのに必要な熱を考える場面」と結び付きが強いです。
  「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」は、この説明は「金属が電気を通したりのびたりする理由を考える場面」と結び付きが強いです。
  「アミド結合をもつ合成繊維の代表的な高分子化合物である。」が正しいです。この具体例を説明した文です。
  「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」は、この説明は「薄暗い部屋でコロイドに光を当てると筋が見える場面」と結び付きが強いです。
