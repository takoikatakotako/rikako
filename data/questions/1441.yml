# 化学基礎 問401
id: 1441
type: single_choice
text: |
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "蒸留"
  - "クロマトグラフィー"
  - "混合物"
  - "ろ過"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。 に当てはまる語はろ過です。したがって、正解は「ろ過」です。
  
  「蒸留」は、「沸点の違いを利用して液体を分ける方法である。」に当てはまる語です。
  「クロマトグラフィー」は、「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」に当てはまる語です。
  「混合物」は、「二種類以上の物質が混ざってできている物質である。」に当てはまる語です。
  「ろ過」が正しいです。「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」に当てはまる語です。
