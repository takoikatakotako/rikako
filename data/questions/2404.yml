# 高校化学 問404
id: 2404
type: single_choice
text: |
  蒸気圧を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水となじみにくく不安定になりやすいこと"
  - "固体と液体の境目の温度に注目すること"
  - "蒸発と凝縮がつり合うこと"
  - "液体から出た蒸気が示す圧力に注目すること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  蒸気圧では、「液体から出た蒸気が示す圧力に注目すること」という見方が大切です。したがって、正解は「液体から出た蒸気が示す圧力に注目すること」です。
  
  「水となじみにくく不安定になりやすいこと」は、疎水コロイドに関係する見方です。
  「固体と液体の境目の温度に注目すること」は、融点に関係する見方です。
  「蒸発と凝縮がつり合うこと」は、気液平衡に関係する見方です。
  「液体から出た蒸気が示す圧力に注目すること」が正しいです。蒸気圧の要点を表しています。
