# 高校化学 問16
id: 726
type: single_choice
text: |
  分子結晶についての説明として、最も適切なものはどれか。
choices:
  - "混合気体の全圧は各気体の分圧の和になるという法則である。"
  - "絶対零度を基準にした温度で、単位は K で表す。"
  - "一定量の溶媒に溶けることのできる溶質の最大量である。"
  - "分子どうしが分子間力で集まってできた結晶である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  分子結晶は、分子どうしが分子間力で集まってできた結晶である。 したがって、正解は「分子どうしが分子間力で集まってできた結晶である。」です。
  
  「混合気体の全圧は各気体の分圧の和になるという法則である。」は、分圧の法則の説明です。
  「絶対零度を基準にした温度で、単位は K で表す。」は、絶対温度の説明です。
  「一定量の溶媒に溶けることのできる溶質の最大量である。」は、溶解度の説明です。
  「分子どうしが分子間力で集まってできた結晶である。」が正しいです。分子結晶の説明です。
