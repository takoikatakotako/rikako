# 化学基礎 問475
id: 1515
type: single_choice
text: |
  分子を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "物質の性質を示す小さな粒子として考えること"
  - "電子を受け取って負に帯電すること"
  - "電子を共有して結び付くこと"
  - "電荷のかたよりがあること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  分子では、「物質の性質を示す小さな粒子として考えること」という見方が大切です。したがって、正解は「物質の性質を示す小さな粒子として考えること」です。
  
  「物質の性質を示す小さな粒子として考えること」が正しいです。分子の要点を表しています。
  「電子を受け取って負に帯電すること」は、陰イオンに関係する見方です。
  「電子を共有して結び付くこと」は、共有結合に関係する見方です。
  「電荷のかたよりがあること」は、極性分子に関係する見方です。
