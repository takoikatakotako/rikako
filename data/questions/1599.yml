# 化学基礎 問559
id: 1599
type: single_choice
text: |
  「氷が溶けて水になる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "元素を原子番号の順に並べると性質が周期的に変化するというきまりである。"
  - "物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
  - "原子が結び付いてできた、物質の性質を示す小さな粒子である。"
  - "水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「氷が溶けて水になる場面」を説明した文として適切なのは「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」です。したがって、正解は「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」です。
  
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」は、この説明は「周期表で似た性質の元素が縦に並ぶことを見る場面」と結び付きが強いです。
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」が正しいです。この具体例を説明した文です。
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」は、この説明は「水分子や酸素分子を粒として考える場面」と結び付きが強いです。
  「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」は、この説明は「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」と結び付きが強いです。
