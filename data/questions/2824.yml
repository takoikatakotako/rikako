# 高校化学 問824
id: 2824
type: single_choice
text: |
  「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸とも塩基とも反応すること"
  - "同じ分子式でも構造が違うこと"
  - "溶質があると溶媒の蒸気圧が下がること"
  - "アミノ基とカルボキシ基をあわせもつこと"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」を理解する上では、「溶質があると溶媒の蒸気圧が下がること」という見方が大切です。したがって、正解は「溶質があると溶媒の蒸気圧が下がること」です。
  
  「酸とも塩基とも反応すること」は、その見方は両性酸化物に関係します。
  「同じ分子式でも構造が違うこと」は、その見方は異性体に関係します。
  「溶質があると溶媒の蒸気圧が下がること」が正しいです。この説明と結び付きが強い見方です。
  「アミノ基とカルボキシ基をあわせもつこと」は、その見方はアミノ酸に関係します。
