# 化学基礎 問78
id: 1118
type: single_choice
text: |
  中和についての説明として、最も適切なものはどれか。
choices:
  - "酸と塩基が反応して、塩と水を生じる反応である。"
  - "金属どうしがくっつく反応である。"
  - "必ず気体だけができる反応である。"
  - "水が全く関係しない反応である。"
correct: 0
explanation: |
  この問題は、「中和とはどんな反応か」を確認する問題です。
  
  中和は、酸と塩基が反応して、塩と水を生じる反応です。したがって、正解は「酸と塩基が反応して、塩と水を生じる反応である」です。
  
  「酸と塩基が反応して、塩と水を生じる反応である」が正しいです。
  「金属どうしがくっつく反応である」は、適切ではありません。
  「必ず気体だけができる反応である」は、適切ではありません。
  「水が全く関係しない反応である」は、適切ではありません。
