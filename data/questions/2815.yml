# 高校化学 問815
id: 2815
type: single_choice
text: |
  「陽イオンと陰イオンが規則正しく並んでできた結晶である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "塩のイオンが水と反応すること"
  - "陽イオンと陰イオンの引力でできること"
  - "電子対の与え手と受け手に注目すること"
  - "分子の端にカルボニル構造をもつこと"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「陽イオンと陰イオンが規則正しく並んでできた結晶である。」を理解する上では、「陽イオンと陰イオンの引力でできること」という見方が大切です。したがって、正解は「陽イオンと陰イオンの引力でできること」です。
  
  「塩のイオンが水と反応すること」は、その見方は塩の加水分解に関係します。
  「陽イオンと陰イオンの引力でできること」が正しいです。この説明と結び付きが強い見方です。
  「電子対の与え手と受け手に注目すること」は、その見方は配位結合に関係します。
  「分子の端にカルボニル構造をもつこと」は、その見方はアルデヒドに関係します。
