# 高校化学 問678
id: 2678
type: single_choice
text: |
  「メタンやエタンの性質を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "代表的な単糖類で、生物のエネルギー源として重要な化合物である。"
  - "固体1 molが融解するときに吸収する熱量である。"
  - "炭素どうしが単結合だけでつながった炭化水素である。"
  - "原子が共有結合で三次元的に結び付いた結晶である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「メタンやエタンの性質を考える場面」を説明した文として適切なのは「炭素どうしが単結合だけでつながった炭化水素である。」です。したがって、正解は「炭素どうしが単結合だけでつながった炭化水素である。」です。
  
  「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」は、この説明は「血糖や発酵の材料として使われる場面」と結び付きが強いです。
  「固体1 molが融解するときに吸収する熱量である。」は、この説明は「氷を水に変えるのに必要な熱を考える場面」と結び付きが強いです。
  「炭素どうしが単結合だけでつながった炭化水素である。」が正しいです。この具体例を説明した文です。
  「原子が共有結合で三次元的に結び付いた結晶である。」は、この説明は「ダイヤモンドや二酸化ケイ素の硬さを考える場面」と結び付きが強いです。
