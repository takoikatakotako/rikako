# 化学基礎 問409
id: 1449
type: single_choice
text: |
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "化合物"
  - "融解"
  - "凝固"
  - "物理変化"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  物質そのものの種類は変わらず、状態や形だけが変わる変化である。 に当てはまる語は物理変化です。したがって、正解は「物理変化」です。
  
  「化合物」は、「二種類以上の元素が結び付いてできている純物質である。」に当てはまる語です。
  「融解」は、「固体が液体に変わる状態変化である。」に当てはまる語です。
  「凝固」は、「液体が固体に変わる状態変化である。」に当てはまる語です。
  「物理変化」が正しいです。「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」に当てはまる語です。
