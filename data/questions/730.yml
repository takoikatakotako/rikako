# 高校化学 問20
id: 730
type: single_choice
text: |
  溶解についての説明として、最も適切なものはどれか。
choices:
  - "固体1 molが融解するときに吸収する熱量である。"
  - "一定温度で一定量の気体の圧力は体積に反比例するという法則である。"
  - "気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。"
  - "溶質の粒子が溶媒中に広がっていく現象である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  溶解は、溶質の粒子が溶媒中に広がっていく現象である。 したがって、正解は「溶質の粒子が溶媒中に広がっていく現象である。」です。
  
  「固体1 molが融解するときに吸収する熱量である。」は、融解熱の説明です。
  「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」は、ボイルの法則の説明です。
  「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」は、理想気体の状態方程式の説明です。
  「溶質の粒子が溶媒中に広がっていく現象である。」が正しいです。溶解の説明です。
