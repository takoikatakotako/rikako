# 高校化学 問873
id: 2873
type: single_choice
text: |
  「一方の原子が電子対を与えてできる共有結合である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "溶質の粒子が溶媒中に広がること"
  - "半透膜を通る粒子の大きさの違いを利用すること"
  - "光エネルギーを化学エネルギーに変えること"
  - "電子対の与え手と受け手に注目すること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「一方の原子が電子対を与えてできる共有結合である。」を理解する上では、「電子対の与え手と受け手に注目すること」という見方が大切です。したがって、正解は「電子対の与え手と受け手に注目すること」です。
  
  「溶質の粒子が溶媒中に広がること」は、その見方は溶解に関係します。
  「半透膜を通る粒子の大きさの違いを利用すること」は、その見方は透析に関係します。
  「光エネルギーを化学エネルギーに変えること」は、その見方は光合成に関係します。
  「電子対の与え手と受け手に注目すること」が正しいです。この説明と結び付きが強い見方です。
