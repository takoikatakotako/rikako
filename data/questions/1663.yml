# 化学基礎 問623
id: 1663
type: single_choice
text: |
  「電子を共有して結び付くこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "共有結合"
  - "還元"
  - "非電解質"
  - "蒸留"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「電子を共有して結び付くこと」という見方が大切なのは共有結合です。したがって、正解は「共有結合」です。
  
  「共有結合」が正しいです。この見方が大切な語です。
  「還元」は、その語で大切なのは「酸素の喪失や電子の受け取りに注目すること」という見方です。
  「非電解質」は、その語で大切なのは「水溶液でも電流をほとんど通さないこと」という見方です。
  「蒸留」は、その語で大切なのは「沸点の違いを利用すること」という見方です。
