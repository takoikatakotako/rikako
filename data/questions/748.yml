# 高校化学 問38
id: 748
type: single_choice
text: |
  結合エネルギーについての説明として、最も適切なものはどれか。
choices:
  - "溶液の凝固点が純粋な溶媒より低くなる現象である。"
  - "気体分子中の結合1 molを切るのに必要なエネルギーである。"
  - "溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。"
  - "コロイド粒子が不規則に動いて見える現象である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  結合エネルギーは、気体分子中の結合1 molを切るのに必要なエネルギーである。 したがって、正解は「気体分子中の結合1 molを切るのに必要なエネルギーである。」です。
  
  「溶液の凝固点が純粋な溶媒より低くなる現象である。」は、凝固点降下の説明です。
  「気体分子中の結合1 molを切るのに必要なエネルギーである。」が正しいです。結合エネルギーの説明です。
  「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」は、コロイドの説明です。
  「コロイド粒子が不規則に動いて見える現象である。」は、ブラウン運動の説明です。
