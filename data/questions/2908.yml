# 高校化学 問908
id: 2908
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "アルカリ金属 / メタンやエタンの性質を考える場面"
  - "飽和炭化水素 / 染料の原料になる芳香族アミンを考える場面"
  - "アニリン / ナトリウムやカリウムの性質を比べる場面"
  - "ボイルの法則 / 注射器の口をふさいで押すと体積が減って圧力が上がる場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「ボイルの法則 / 注射器の口をふさいで押すと体積が減って圧力が上がる場面」です。したがって、正解は「ボイルの法則 / 注射器の口をふさいで押すと体積が減って圧力が上がる場面」です。
  
  「アルカリ金属 / メタンやエタンの性質を考える場面」は、用語と場面の対応が合っていません。
  「飽和炭化水素 / 染料の原料になる芳香族アミンを考える場面」は、用語と場面の対応が合っていません。
  「アニリン / ナトリウムやカリウムの性質を比べる場面」は、用語と場面の対応が合っていません。
  「ボイルの法則 / 注射器の口をふさいで押すと体積が減って圧力が上がる場面」が正しいです。用語と場面の対応が合っています。
