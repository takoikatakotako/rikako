# 高校化学 問217
id: 2217
type: single_choice
text: |
  「原子が共有結合で三次元的に結び付いた結晶である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "透析"
  - "親水コロイド"
  - "共有結合の結晶"
  - "結晶格子"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  原子が共有結合で三次元的に結び付いた結晶である。 に当てはまる語は共有結合の結晶です。したがって、正解は「共有結合の結晶」です。
  
  「透析」は、「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」に当てはまる語です。
  「親水コロイド」は、「水との親和性が高く、比較的安定なコロイドである。」に当てはまる語です。
  「共有結合の結晶」が正しいです。「原子が共有結合で三次元的に結び付いた結晶である。」に当てはまる語です。
  「結晶格子」は、「結晶の中で粒子が規則正しく並んだ構造である。」に当てはまる語です。
