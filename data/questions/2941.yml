# 高校化学 問941
id: 2941
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "化学発光 / ケミカルライトが光る仕組みを考える場面"
  - "化学が築く未来 / 酸素と窒素が混ざった気体の圧力を考える場面"
  - "分圧の法則 / 食塩を加えても底に残るようになった食塩水を考える場面"
  - "飽和溶液 / 再生可能エネルギーや新素材の開発を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「化学発光 / ケミカルライトが光る仕組みを考える場面」です。したがって、正解は「化学発光 / ケミカルライトが光る仕組みを考える場面」です。
  
  「化学発光 / ケミカルライトが光る仕組みを考える場面」が正しいです。用語と場面の対応が合っています。
  「化学が築く未来 / 酸素と窒素が混ざった気体の圧力を考える場面」は、用語と場面の対応が合っていません。
  「分圧の法則 / 食塩を加えても底に残るようになった食塩水を考える場面」は、用語と場面の対応が合っていません。
  「飽和溶液 / 再生可能エネルギーや新素材の開発を考える場面」は、用語と場面の対応が合っていません。
