# 化学基礎 問68
id: 1108
type: single_choice
text: |
  ダイヤモンドについての説明として、最も適切なものはどれか。
choices:
  - "共有結合が空間的に広がった結晶である。"
  - "金属結合だけでできた物質である。"
  - "イオン結合だけでできた物質である。"
  - "水に溶ける分子である。"
correct: 0
explanation: |
  この問題は、「共有結合の結晶の代表例」を確認する問題です。
  
  ダイヤモンドは、炭素原子どうしが共有結合で立体的につながった結晶です。したがって、正解は「共有結合が空間的に広がった結晶である」です。
  
  「共有結合が空間的に広がった結晶である」が正しいです。
  「金属結合だけでできた物質である」は、適切ではありません。
  「イオン結合だけでできた物質である」は、適切ではありません。
  「水に溶ける分子である」は、適切ではありません。
