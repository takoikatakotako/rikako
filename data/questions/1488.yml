# 化学基礎 問448
id: 1488
type: single_choice
text: |
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "イオン化傾向"
  - "塩橋"
  - "酸化防止剤"
  - "塩基"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  食品や物質が酸化して変質するのを防ぐために用いられる物質である。 に当てはまる語は酸化防止剤です。したがって、正解は「酸化防止剤」です。
  
  「イオン化傾向」は、「金属が電子を失ってイオンになりやすい性質の強さである。」に当てはまる語です。
  「塩橋」は、「二つの溶液の電気的なつり合いを保つための部分である。」に当てはまる語です。
  「酸化防止剤」が正しいです。「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」に当てはまる語です。
  「塩基」は、「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」に当てはまる語です。
