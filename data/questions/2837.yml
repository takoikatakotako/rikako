# 高校化学 問837
id: 2837
type: single_choice
text: |
  「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "分子の端にカルボニル構造をもつこと"
  - "単糖類でエネルギー源になりやすいこと"
  - "状態変化に必要な熱に注目すること"
  - "反応経路ではなく始状態と終状態で決まること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」を理解する上では、「反応経路ではなく始状態と終状態で決まること」という見方が大切です。したがって、正解は「反応経路ではなく始状態と終状態で決まること」です。
  
  「分子の端にカルボニル構造をもつこと」は、その見方はアルデヒドに関係します。
  「単糖類でエネルギー源になりやすいこと」は、その見方はグルコースに関係します。
  「状態変化に必要な熱に注目すること」は、その見方は融解熱に関係します。
  「反応経路ではなく始状態と終状態で決まること」が正しいです。この説明と結び付きが強い見方です。
