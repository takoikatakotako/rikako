# 高校化学 問939
id: 2939
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "機能性材料 / 温めた風船がふくらみやすくなる場面"
  - "シャルルの法則 / 食塩が水に溶けて見えなくなる場面"
  - "発熱反応 / 燃焼や中和で容器が温かくなる場面"
  - "溶解 / 導電性高分子や高性能電池材料を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「発熱反応 / 燃焼や中和で容器が温かくなる場面」です。したがって、正解は「発熱反応 / 燃焼や中和で容器が温かくなる場面」です。
  
  「機能性材料 / 温めた風船がふくらみやすくなる場面」は、用語と場面の対応が合っていません。
  「シャルルの法則 / 食塩が水に溶けて見えなくなる場面」は、用語と場面の対応が合っていません。
  「発熱反応 / 燃焼や中和で容器が温かくなる場面」が正しいです。用語と場面の対応が合っています。
  「溶解 / 導電性高分子や高性能電池材料を考える場面」は、用語と場面の対応が合っていません。
