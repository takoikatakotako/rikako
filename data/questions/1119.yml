# 化学基礎 問79
id: 1119
type: single_choice
text: |
  同じ温度で pH が 2 の水溶液と pH が 5 の水溶液を比べたとき、最も適切なものはどれか。
choices:
  - "pH が 2 の方が酸性が強い。"
  - "pH が 5 の方が酸性が強い。"
  - "どちらも必ず中性である。"
  - "pH では比較できない。"
correct: 0
explanation: |
  この問題は、「pH の大小と酸性の強さの関係」を考える問題です。
  
  pH は小さいほど酸性が強くなります。したがって、pH が 2 の水溶液の方が pH が 5 の水溶液より酸性が強いです。正解は「pH が 2 の方が酸性が強い」です。
  
  「pH が 2 の方が酸性が強い」が正しいです。pH が小さいほど酸性が強いです。
  「pH が 5 の方が酸性が強い」は、適切ではありません。
  「どちらも必ず中性である」は、適切ではありません。
  「pH では比較できない」は、適切ではありません。
