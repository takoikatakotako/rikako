# 高校化学 問71
id: 2071
type: single_choice
text: |
  両性酸化物についての説明として、最も適切なものはどれか。
choices:
  - "中心となる金属イオンに配位子が結び付いたイオンである。"
  - "周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。"
  - "酸とも塩基とも反応する酸化物である。"
  - "遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  両性酸化物は、酸とも塩基とも反応する酸化物である。 したがって、正解は「酸とも塩基とも反応する酸化物である。」です。
  
  「中心となる金属イオンに配位子が結び付いたイオンである。」は、錯イオンの説明です。
  「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」は、遷移元素の説明です。
  「酸とも塩基とも反応する酸化物である。」が正しいです。両性酸化物の説明です。
  「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」は、鉄の説明です。
