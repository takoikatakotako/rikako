# 高校化学 問415
id: 2415
type: single_choice
text: |
  イオン結晶を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "状態変化に必要な熱に注目すること"
  - "温度一定で圧力と体積の関係を見ること"
  - "陽イオンと陰イオンの引力でできること"
  - "圧力、体積、物質量、温度をまとめて扱うこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  イオン結晶では、「陽イオンと陰イオンの引力でできること」という見方が大切です。したがって、正解は「陽イオンと陰イオンの引力でできること」です。
  
  「状態変化に必要な熱に注目すること」は、融解熱に関係する見方です。
  「温度一定で圧力と体積の関係を見ること」は、ボイルの法則に関係する見方です。
  「陽イオンと陰イオンの引力でできること」が正しいです。イオン結晶の要点を表しています。
  「圧力、体積、物質量、温度をまとめて扱うこと」は、理想気体の状態方程式に関係する見方です。
