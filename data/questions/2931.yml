# 高校化学 問931
id: 2931
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "ナイロン / 水やエタノールの沸点の違いを考える場面"
  - "分子間力 / 高圧や低温で気体のふるまいが理想気体からずれる場面"
  - "透析 / コロイド溶液から余分な電解質を取り除く場面"
  - "実在気体 / 衣類やロープに使われる合成繊維を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「透析 / コロイド溶液から余分な電解質を取り除く場面」です。したがって、正解は「透析 / コロイド溶液から余分な電解質を取り除く場面」です。
  
  「ナイロン / 水やエタノールの沸点の違いを考える場面」は、用語と場面の対応が合っていません。
  「分子間力 / 高圧や低温で気体のふるまいが理想気体からずれる場面」は、用語と場面の対応が合っていません。
  「透析 / コロイド溶液から余分な電解質を取り除く場面」が正しいです。用語と場面の対応が合っています。
  「実在気体 / 衣類やロープに使われる合成繊維を考える場面」は、用語と場面の対応が合っていません。
