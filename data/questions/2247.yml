# 高校化学 問247
id: 2247
type: single_choice
text: |
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "電気分解"
  - "触媒"
  - "化学平衡"
  - "ルシャトリエの原理"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  電気エネルギーを使って自発的でない化学変化を起こす操作である。 に当てはまる語は電気分解です。したがって、正解は「電気分解」です。
  
  「電気分解」が正しいです。「電気エネルギーを使って自発的でない化学変化を起こす操作である。」に当てはまる語です。
  「触媒」は、「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」に当てはまる語です。
  「化学平衡」は、「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」に当てはまる語です。
  「ルシャトリエの原理」は、「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」に当てはまる語です。
