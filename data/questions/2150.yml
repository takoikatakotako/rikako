# 高校化学 問150
id: 2150
type: single_choice
text: |
  ファラデーの法則と最も関係が深い場面として、適切なものはどれか。
choices:
  - "植物が光を受けてデンプンなどをつくる場面"
  - "加熱すると反応が進みやすくなる理由を考える場面"
  - "流した電流が大きいほど析出量が増える場面"
  - "生成物から再び反応物が生じる場面を考えるとき"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  流した電流が大きいほど析出量が増える場面は、ファラデーの法則と結び付きが強い場面です。したがって、正解は「流した電流が大きいほど析出量が増える場面」です。
  
  「植物が光を受けてデンプンなどをつくる場面」は、光合成と結び付きが強い場面です。
  「加熱すると反応が進みやすくなる理由を考える場面」は、活性化エネルギーと結び付きが強い場面です。
  「流した電流が大きいほど析出量が増える場面」が正しいです。これはファラデーの法則と結び付きが強い場面です。
  「生成物から再び反応物が生じる場面を考えるとき」は、可逆反応と結び付きが強い場面です。
