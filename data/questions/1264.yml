# 化学基礎 問224
id: 1264
type: single_choice
text: |
  「銅 Cu の結合」に最も関係が深い語として、適切なものはどれか。
choices:
  - "分子"
  - "金属結合"
  - "極性分子"
  - "無極性分子"
correct: 1
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「銅 Cu の結合」に最も関係が深いのは金属結合です。したがって、正解は「金属結合」です。
  
  「分子」は、この例に最も関係が深い語ではありません。
  「金属結合」が正しいです。この例は金属結合に関係しています。
  「極性分子」は、この例に最も関係が深い語ではありません。
  「無極性分子」は、この例に最も関係が深い語ではありません。
