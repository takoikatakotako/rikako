# 高校化学 問572
id: 2572
type: single_choice
text: |
  「中心となる金属イオンに配位子が結び付いたイオンである。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムで黄色、銅で青緑色を確かめる場面"
  - "果物の香りに関係する化合物を考える場面"
  - "紙や木材の主成分を考える場面"
  - "アンモニアを加えると深い青色のイオンができる場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「中心となる金属イオンに配位子が結び付いたイオンである。」と最も関係が深い場面は「アンモニアを加えると深い青色のイオンができる場面」です。したがって、正解は「アンモニアを加えると深い青色のイオンができる場面」です。
  
  「ナトリウムで黄色、銅で青緑色を確かめる場面」は、「金属元素を炎に入れたときに特有の色を示す反応である。」と結び付きが強い場面です。
  「果物の香りに関係する化合物を考える場面」は、「カルボン酸とアルコールからできる有機化合物である。」と結び付きが強い場面です。
  「紙や木材の主成分を考える場面」は、「グルコースがつながった植物の細胞壁をつくる多糖である。」と結び付きが強い場面です。
  「アンモニアを加えると深い青色のイオンができる場面」が正しいです。この説明と結び付きが強い場面です。
