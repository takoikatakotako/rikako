# 化学基礎 問648
id: 1688
type: single_choice
text: |
  「酸化による変質を防ぐこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "凝固"
  - "酸化防止剤"
  - "陽イオン"
  - "無極性分子"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「酸化による変質を防ぐこと」という見方が大切なのは酸化防止剤です。したがって、正解は「酸化防止剤」です。
  
  「凝固」は、その語で大切なのは「液体から固体への変化であること」という見方です。
  「酸化防止剤」が正しいです。この見方が大切な語です。
  「陽イオン」は、その語で大切なのは「電子を失って正に帯電すること」という見方です。
  「無極性分子」は、その語で大切なのは「電荷のかたよりがほとんどないこと」という見方です。
