# 高校化学 問826
id: 2826
type: single_choice
text: |
  「溶液の凝固点が純粋な溶媒より低くなる現象である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "溶質があると凝固点が下がること"
  - "電子対の与え手と受け手に注目すること"
  - "分子の端にカルボニル構造をもつこと"
  - "単糖類でエネルギー源になりやすいこと"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「溶液の凝固点が純粋な溶媒より低くなる現象である。」を理解する上では、「溶質があると凝固点が下がること」という見方が大切です。したがって、正解は「溶質があると凝固点が下がること」です。
  
  「溶質があると凝固点が下がること」が正しいです。この説明と結び付きが強い見方です。
  「電子対の与え手と受け手に注目すること」は、その見方は配位結合に関係します。
  「分子の端にカルボニル構造をもつこと」は、その見方はアルデヒドに関係します。
  「単糖類でエネルギー源になりやすいこと」は、その見方はグルコースに関係します。
