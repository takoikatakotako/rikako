# 化学基礎 問938
id: 1978
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "塩橋 / 電池、医薬品、素材開発などに化学が生かされる場面"
  - "還元 / 酸化銅から酸素が取れて銅になる場面"
  - "化学が拓く世界 / 鉄や酸素のように一種類の元素だけからできた物質を考える場面"
  - "単体 / ダニエル電池で二つの水溶液をつなぐ場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「還元 / 酸化銅から酸素が取れて銅になる場面」です。したがって、正解は「還元 / 酸化銅から酸素が取れて銅になる場面」です。
  
  「塩橋 / 電池、医薬品、素材開発などに化学が生かされる場面」は、用語と場面の対応が合っていません。
  「還元 / 酸化銅から酸素が取れて銅になる場面」が正しいです。用語と場面の対応が合っています。
  「化学が拓く世界 / 鉄や酸素のように一種類の元素だけからできた物質を考える場面」は、用語と場面の対応が合っていません。
  「単体 / ダニエル電池で二つの水溶液をつなぐ場面」は、用語と場面の対応が合っていません。
