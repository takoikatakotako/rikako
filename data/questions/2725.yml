# 高校化学 問725
id: 2725
type: single_choice
text: |
  「蒸気圧降下の結果として沸点が上がること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "平衡定数"
  - "アルカリ金属"
  - "沸点上昇"
  - "飽和炭化水素"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「蒸気圧降下の結果として沸点が上がること」という見方が大切なのは沸点上昇です。したがって、正解は「沸点上昇」です。
  
  「平衡定数」は、その語で大切なのは「平衡の位置を数で表すこと」という見方です。
  「アルカリ金属」は、その語で大切なのは「反応性が高く 1 価の陽イオンになりやすいこと」という見方です。
  「沸点上昇」が正しいです。この見方が大切な語です。
  「飽和炭化水素」は、その語で大切なのは「炭素間が単結合だけであること」という見方です。
