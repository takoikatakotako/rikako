# 化学基礎 問22
id: 689
type: single_choice
text: |
  同位体どうしで化学的な性質がよく似ている主な理由として、最も適切なものはどれか。
choices:
  - "陽子の数が同じで、電子配置も同じだから。"
  - "中性子の数が同じだから。"
  - "質量数が同じだから。"
  - "色が同じだから。"
correct: 0
explanation: |
  この問題は、「同位体で化学的な性質が似る理由」を考える問題です。
  
  化学的な性質は、主に電子配置で決まります。同位体は陽子の数が同じなので、電子配置も同じになり、化学的な性質がよく似ます。したがって、正解は「陽子の数が同じで、電子配置も同じだから」です。
  
  「陽子の数が同じで、電子配置も同じだから」が正しいです。化学的な性質が似る主な理由です。
  「中性子の数が同じだから」は、同位体の説明として適切ではありません。
  「質量数が同じだから」は、同位体どうしでは一般に成り立ちません。
  「色が同じだから」は、化学的な性質の理由ではありません。
