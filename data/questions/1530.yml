# 化学基礎 問490
id: 1530
type: single_choice
text: |
  還元剤を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "放射線を出す同位体であること"
  - "酸化による変質を防ぐこと"
  - "化学が社会や生活に広く役立つこと"
  - "相手を還元させ、自分は酸化されること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  還元剤では、「相手を還元させ、自分は酸化されること」という見方が大切です。したがって、正解は「相手を還元させ、自分は酸化されること」です。
  
  「放射線を出す同位体であること」は、放射性同位体に関係する見方です。
  「酸化による変質を防ぐこと」は、酸化防止剤に関係する見方です。
  「化学が社会や生活に広く役立つこと」は、化学が拓く世界に関係する見方です。
  「相手を還元させ、自分は酸化されること」が正しいです。還元剤の要点を表しています。
