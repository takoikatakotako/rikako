# 化学基礎 問52
id: 1092
type: single_choice
text: |
  ろ過では分けにくい組合せとして、最も適切なものはどれか。
choices:
  - "砂と水"
  - "食塩と水"
  - "木くずと水"
  - "活性炭と水"
correct: 1
explanation: |
  この問題は、「ろ過で分けられるのは溶けていない固体かどうか」を考える問題です。
  
  ろ過は、水に溶けていない固体を分ける方法です。食塩は水に溶けてしまうので、ろ過だけでは分けにくいです。したがって、正解は「食塩と水」です。
  
  「砂と水」は、ろ過で分けられます。
  「食塩と水」が正しいです。食塩は水に溶けているので、ろ過だけでは分けにくいです。
  「木くずと水」は、ろ過で分けられます。
  「活性炭と水」は、ろ過で分けられます。
