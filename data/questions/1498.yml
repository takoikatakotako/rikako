# 化学基礎 問458
id: 1498
type: single_choice
text: |
  化合物を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "固体から直接気体になること"
  - "沸点の違いを利用すること"
  - "移動しやすさの違いを利用すること"
  - "複数の元素が結び付いてできること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  化合物では、「複数の元素が結び付いてできること」という見方が大切です。したがって、正解は「複数の元素が結び付いてできること」です。
  
  「固体から直接気体になること」は、昇華に関係する見方です。
  「沸点の違いを利用すること」は、蒸留に関係する見方です。
  「移動しやすさの違いを利用すること」は、クロマトグラフィーに関係する見方です。
  「複数の元素が結び付いてできること」が正しいです。化合物の要点を表しています。
