# 高校化学 問756
id: 2756
type: single_choice
text: |
  「平衡の位置を数で表すこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "ベンゼン"
  - "平衡定数"
  - "機能性材料"
  - "シャルルの法則"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「平衡の位置を数で表すこと」という見方が大切なのは平衡定数です。したがって、正解は「平衡定数」です。
  
  「ベンゼン」は、その語で大切なのは「ベンゼン環をもつこと」という見方です。
  「平衡定数」が正しいです。この見方が大切な語です。
  「機能性材料」は、その語で大切なのは「必要な機能をねらって材料を設計すること」という見方です。
  「シャルルの法則」は、その語で大切なのは「圧力一定で体積と絶対温度の関係を見ること」という見方です。
