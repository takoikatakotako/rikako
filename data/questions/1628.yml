# 化学基礎 問588
id: 1628
type: single_choice
text: |
  「酸化銅から酸素が取れて銅になる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
  - "成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
  - "物質が酸素を失う、または電子を受け取る変化である。"
  - "固体が液体に変わる状態変化である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「酸化銅から酸素が取れて銅になる場面」を説明した文として適切なのは「物質が酸素を失う、または電子を受け取る変化である。」です。したがって、正解は「物質が酸素を失う、または電子を受け取る変化である。」です。
  
  「金属元素を炎に入れたときに特有の色を示す反応である。」は、この説明は「ナトリウムで黄色、銅で青緑色を観察する場面」と結び付きが強いです。
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」は、この説明は「インクの色素をろ紙の上で分ける場面」と結び付きが強いです。
  「物質が酸素を失う、または電子を受け取る変化である。」が正しいです。この具体例を説明した文です。
  「固体が液体に変わる状態変化である。」は、この説明は「氷を温めて水にする場面」と結び付きが強いです。
