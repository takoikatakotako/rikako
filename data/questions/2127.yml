# 高校化学 問127
id: 2127
type: single_choice
text: |
  浸透圧と最も関係が深い場面として、適切なものはどれか。
choices:
  - "圧力や濃度を変えると平衡が移る方向を考える場面"
  - "弱酸が一部だけ電離している水溶液を考える場面"
  - "血液や実験用の溶液で pH を保ちたい場面"
  - "薄い溶液側から濃い溶液側へ水が移動する場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  薄い溶液側から濃い溶液側へ水が移動する場面は、浸透圧と結び付きが強い場面です。したがって、正解は「薄い溶液側から濃い溶液側へ水が移動する場面」です。
  
  「圧力や濃度を変えると平衡が移る方向を考える場面」は、ルシャトリエの原理と結び付きが強い場面です。
  「弱酸が一部だけ電離している水溶液を考える場面」は、電離平衡と結び付きが強い場面です。
  「血液や実験用の溶液で pH を保ちたい場面」は、緩衝液と結び付きが強い場面です。
  「薄い溶液側から濃い溶液側へ水が移動する場面」が正しいです。これは浸透圧と結び付きが強い場面です。
