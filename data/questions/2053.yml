# 高校化学 問53
id: 2053
type: single_choice
text: |
  触媒についての説明として、最も適切なものはどれか。
choices:
  - "反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。"
  - "窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。"
  - "水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。"
  - "塩のイオンが水と反応して溶液の性質を変える現象である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  触媒は、反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。 したがって、正解は「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」です。
  
  「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」が正しいです。触媒の説明です。
  「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」は、アンモニア合成の説明です。
  「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」は、水のイオン積の説明です。
  「塩のイオンが水と反応して溶液の性質を変える現象である。」は、塩の加水分解の説明です。
