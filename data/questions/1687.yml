# 化学基礎 問647
id: 1687
type: single_choice
text: |
  「金属元素ごとに炎の色が異なること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "炎色反応"
  - "蒸発"
  - "最外殻電子"
  - "極性分子"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「金属元素ごとに炎の色が異なること」という見方が大切なのは炎色反応です。したがって、正解は「炎色反応」です。
  
  「炎色反応」が正しいです。この見方が大切な語です。
  「蒸発」は、その語で大切なのは「液体から気体への変化であること」という見方です。
  「最外殻電子」は、その語で大切なのは「化学結合やイオンのできやすさに関係すること」という見方です。
  「極性分子」は、その語で大切なのは「電荷のかたよりがあること」という見方です。
