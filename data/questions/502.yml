# 令和7年度 ITパスポート 公開問題 問50
id: 502
type: single_choice
text: |
  チャットボットの説明として、最も適切なものはどれか。
choices:
  - "質問に対して、ソフトウェアがリアルタイムで自動応答する仕組み"
  - "センサーを搭載した機器や制装置が直接インターネットにつながり、お互いに情報をやり取りする仕組み"
  - "人間に代わって荷物を運ぶなどの作業を行う機械的な仕組み"
  - "ルール化された定型的な操作を人間の代わりにソフトウェアが自動で行う仕組み"
correct: 0
explanation: |
  この問題の公開解答では「質問に対して、ソフトウェアがリアルタイムで自動応答する仕組み」が正解とされています。
  
  「質問に対して、ソフトウェアがリアルタイムで自動応答する仕組み」が公開解答で正解とされています。
  「センサーを搭載した機器や制装置が直接インターネットにつながり、お互いに情報をやり取りする仕組み」は公開解答では正解ではありません。
  「人間に代わって荷物を運ぶなどの作業を行う機械的な仕組み」は公開解答では正解ではありません。
  「ルール化された定型的な操作を人間の代わりにソフトウェアが自動で行う仕組み」は公開解答では正解ではありません。
