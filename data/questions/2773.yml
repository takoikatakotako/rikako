# 高校化学 問773
id: 2773
type: single_choice
text: |
  「電子対の与え手と受け手に注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "蒸気圧"
  - "イオン結晶"
  - "配位結合"
  - "凝固点降下"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「電子対の与え手と受け手に注目すること」という見方が大切なのは配位結合です。したがって、正解は「配位結合」です。
  
  「蒸気圧」は、その語で大切なのは「液体から出た蒸気が示す圧力に注目すること」という見方です。
  「イオン結晶」は、その語で大切なのは「陽イオンと陰イオンの引力でできること」という見方です。
  「配位結合」が正しいです。この見方が大切な語です。
  「凝固点降下」は、その語で大切なのは「溶質があると凝固点が下がること」という見方です。
