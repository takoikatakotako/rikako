# 化学基礎 問318
id: 1358
type: single_choice
text: |
  周期律について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "もとの物質とは別の物質ができる変化である。"
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
  - "元素を原子番号の順に並べると性質が周期的に変化するというきまりである。"
  - "原子核の中にある陽子の数を表す数である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  周期律は、元素を原子番号の順に並べると性質が周期的に変化するというきまりである。 したがって、正解は「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」です。
  
  「もとの物質とは別の物質ができる変化である。」は、化学変化の説明です。
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」は、モル濃度の説明です。
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」が正しいです。周期律の説明です。
  「原子核の中にある陽子の数を表す数である。」は、原子番号の説明です。
