# 化学基礎 問128
id: 1168
type: single_choice
text: |
  モルについての説明として、最も適切なものはどれか。
choices:
  - "1 L の溶液に含まれる溶質の物質量で表す濃度である。"
  - "化学反応に関わる物質とその量的関係を記号で表したものである。"
  - "水溶液中で水素イオンを生じる物質である。"
  - "粒子の数をそろえて表すための単位である。"
correct: 3
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  モルは、粒子の数をそろえて表すための単位である。したがって、正解は「粒子の数をそろえて表すための単位である。」です。
  
  「1 L の溶液に含まれる溶質の物質量で表す濃度である。」は、モル濃度の説明です。
  「化学反応に関わる物質とその量的関係を記号で表したものである。」は、化学反応式の説明です。
  「水溶液中で水素イオンを生じる物質である。」は、酸の説明です。
  「粒子の数をそろえて表すための単位である。」が正しいです。モルの説明です。
