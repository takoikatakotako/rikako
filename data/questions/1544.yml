# 化学基礎 問504
id: 1544
type: single_choice
text: |
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "鉄や酸素のように一種類の元素だけからできた物質を考える場面"
  - "ドライアイスがそのまま気体になる場面"
  - "塩素原子が電子を1個受け取って Cl- になる場面"
  - "インクの色素をろ紙の上で分ける場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」と最も関係が深い場面は「インクの色素をろ紙の上で分ける場面」です。したがって、正解は「インクの色素をろ紙の上で分ける場面」です。
  
  「鉄や酸素のように一種類の元素だけからできた物質を考える場面」は、「一種類の元素だけからできている物質である。」と結び付きが強い場面です。
  「ドライアイスがそのまま気体になる場面」は、「固体が液体にならずに気体になる状態変化である。」と結び付きが強い場面です。
  「塩素原子が電子を1個受け取って Cl- になる場面」は、「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」と結び付きが強い場面です。
  「インクの色素をろ紙の上で分ける場面」が正しいです。この説明と結び付きが強い場面です。
