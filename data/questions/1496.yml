# 化学基礎 問456
id: 1496
type: single_choice
text: |
  混合物を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "液体から気体への変化であること"
  - "成分が二種類以上まざっていること"
  - "固体から直接気体になること"
  - "沸点の違いを利用すること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  混合物では、「成分が二種類以上まざっていること」という見方が大切です。したがって、正解は「成分が二種類以上まざっていること」です。
  
  「液体から気体への変化であること」は、蒸発に関係する見方です。
  「成分が二種類以上まざっていること」が正しいです。混合物の要点を表しています。
  「固体から直接気体になること」は、昇華に関係する見方です。
  「沸点の違いを利用すること」は、蒸留に関係する見方です。
