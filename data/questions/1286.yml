# 化学基礎 問246
id: 1286
type: single_choice
text: |
  「強酸は電離度が大きいこと」に最も関係が深い語として、適切なものはどれか。
choices:
  - "指示薬"
  - "酸化防止剤"
  - "高分子化合物"
  - "電離度"
correct: 3
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「強酸は電離度が大きいこと」に最も関係が深いのは電離度です。したがって、正解は「電離度」です。
  
  「指示薬」は、この例に最も関係が深い語ではありません。
  「酸化防止剤」は、この例に最も関係が深い語ではありません。
  「高分子化合物」は、この例に最も関係が深い語ではありません。
  「電離度」が正しいです。この例は電離度に関係しています。
