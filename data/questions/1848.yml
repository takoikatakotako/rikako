# 化学基礎 問808
id: 1848
type: single_choice
text: |
  「複数の元素が結び付いてできること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムで黄色、銅で青緑色を観察する場面"
  - "水や二酸化炭素のように複数の元素からできた物質を考える場面"
  - "インクの色素をろ紙の上で分ける場面"
  - "氷を温めて水にする場面"
correct: 1
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「複数の元素が結び付いてできること」という見方と最も関係が深い場面は「水や二酸化炭素のように複数の元素からできた物質を考える場面」です。したがって、正解は「水や二酸化炭素のように複数の元素からできた物質を考える場面」です。
  
  「ナトリウムで黄色、銅で青緑色を観察する場面」は、その場面で大切なのは「金属元素ごとに炎の色が異なること」という見方です。
  「水や二酸化炭素のように複数の元素からできた物質を考える場面」が正しいです。この見方と最も関係が深い場面です。
  「インクの色素をろ紙の上で分ける場面」は、その場面で大切なのは「移動しやすさの違いを利用すること」という見方です。
  「氷を温めて水にする場面」は、その場面で大切なのは「固体から液体への変化であること」という見方です。
