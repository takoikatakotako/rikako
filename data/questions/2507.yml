# 高校化学 問507
id: 2507
type: single_choice
text: |
  「液体1 molが気体になるときに吸収する熱量である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "気体の量と温度から体積や圧力を見積もる場面"
  - "温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面"
  - "水を水蒸気に変えるのに必要な熱を考える場面"
  - "コロイド粒子が陽極や陰極へ移動する様子を考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「液体1 molが気体になるときに吸収する熱量である。」と最も関係が深い場面は「水を水蒸気に変えるのに必要な熱を考える場面」です。したがって、正解は「水を水蒸気に変えるのに必要な熱を考える場面」です。
  
  「気体の量と温度から体積や圧力を見積もる場面」は、「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」と結び付きが強い場面です。
  「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」は、「一定量の溶媒に溶けることのできる溶質の最大量である。」と結び付きが強い場面です。
  「水を水蒸気に変えるのに必要な熱を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「コロイド粒子が陽極や陰極へ移動する様子を考える場面」は、「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」と結び付きが強い場面です。
