# 化学基礎 問717
id: 1757
type: single_choice
text: |
  「炭素12と炭素14を比べる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "陽子数が同じで中性子数が異なること"
  - "水溶液や融解状態で電流を通すこと"
  - "水に溶けない固体を液体から分けること"
  - "複数の元素が結び付いてできること"
correct: 0
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「炭素12と炭素14を比べる場面」では、「陽子数が同じで中性子数が異なること」という見方が大切です。したがって、正解は「陽子数が同じで中性子数が異なること」です。
  
  「陽子数が同じで中性子数が異なること」が正しいです。この具体例で大切になる見方です。
  「水溶液や融解状態で電流を通すこと」は、その見方は食塩水や塩酸が電流を通す場面よりも電解質と結び付きが強いです。
  「水に溶けない固体を液体から分けること」は、その見方は砂と水の混合物から砂を取り除く場面よりもろ過と結び付きが強いです。
  「複数の元素が結び付いてできること」は、その見方は水や二酸化炭素のように複数の元素からできた物質を考える場面よりも化合物と結び付きが強いです。
