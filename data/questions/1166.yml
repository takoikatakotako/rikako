# 化学基礎 問126
id: 1166
type: single_choice
text: |
  極性分子についての説明として、最も適切なものはどれか。
choices:
  - "分子全体として電荷の偏りが打ち消し合っている分子である。"
  - "分子全体として電荷の偏りがある分子である。"
  - "粒子の数をそろえて表すための単位である。"
  - "1 L の溶液に含まれる溶質の物質量で表す濃度である。"
correct: 1
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  極性分子は、分子全体として電荷の偏りがある分子である。したがって、正解は「分子全体として電荷の偏りがある分子である。」です。
  
  「分子全体として電荷の偏りが打ち消し合っている分子である。」は、無極性分子の説明です。
  「分子全体として電荷の偏りがある分子である。」が正しいです。極性分子の説明です。
  「粒子の数をそろえて表すための単位である。」は、モルの説明です。
  「1 L の溶液に含まれる溶質の物質量で表す濃度である。」は、モル濃度の説明です。
