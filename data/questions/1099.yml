# 化学基礎 問59
id: 1099
type: single_choice
text: |
  次のうち、単体として最も適切なものはどれか。
choices:
  - "塩化ナトリウム"
  - "水"
  - "窒素"
  - "二酸化炭素"
correct: 2
explanation: |
  この問題は、「一種類の元素だけからできた物質はどれか」を考える問題です。
  
  窒素は一種類の元素だけからできた単体です。塩化ナトリウム、水、二酸化炭素は、複数の元素からなる化合物です。したがって、正解は「窒素」です。
  
  「塩化ナトリウム」は、ナトリウムと塩素からなる化合物です。
  「水」は、水素と酸素からなる化合物です。
  「窒素」が正しいです。一種類の元素だけからなる単体です。
  「二酸化炭素」は、炭素と酸素からなる化合物です。
