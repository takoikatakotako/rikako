# 高校化学 問472
id: 2472
type: single_choice
text: |
  錯イオンを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "2 価の陽イオンになりやすいこと"
  - "最外殻が安定していて反応しにくいこと"
  - "電子対の与え手と受け手に注目すること"
  - "金属イオンと配位子の組合せに注目すること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  錯イオンでは、「金属イオンと配位子の組合せに注目すること」という見方が大切です。したがって、正解は「金属イオンと配位子の組合せに注目すること」です。
  
  「2 価の陽イオンになりやすいこと」は、アルカリ土類金属に関係する見方です。
  「最外殻が安定していて反応しにくいこと」は、貴ガスに関係する見方です。
  「電子対の与え手と受け手に注目すること」は、配位結合に関係する見方です。
  「金属イオンと配位子の組合せに注目すること」が正しいです。錯イオンの要点を表しています。
