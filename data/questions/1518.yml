# 化学基礎 問478
id: 1518
type: single_choice
text: |
  モルを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "1Lあたりの物質量で表すこと"
  - "電子を失って正に帯電すること"
  - "電気的な引力で結び付くこと"
  - "粒子の数をまとめて扱う単位であること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  モルでは、「粒子の数をまとめて扱う単位であること」という見方が大切です。したがって、正解は「粒子の数をまとめて扱う単位であること」です。
  
  「1Lあたりの物質量で表すこと」は、モル濃度に関係する見方です。
  「電子を失って正に帯電すること」は、陽イオンに関係する見方です。
  「電気的な引力で結び付くこと」は、イオン結合に関係する見方です。
  「粒子の数をまとめて扱う単位であること」が正しいです。モルの要点を表しています。
