# 高校化学 問944
id: 2944
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "沸点 / 食塩や金属の規則正しい並び方を考える場面"
  - "結晶格子 / 食塩水の沸点が水より少し高くなることを考える場面"
  - "沸点上昇 / 水が沸騰し始める温度を考える場面"
  - "鉛蓄電池 / 自動車のバッテリーを考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「鉛蓄電池 / 自動車のバッテリーを考える場面」です。したがって、正解は「鉛蓄電池 / 自動車のバッテリーを考える場面」です。
  
  「沸点 / 食塩や金属の規則正しい並び方を考える場面」は、用語と場面の対応が合っていません。
  「結晶格子 / 食塩水の沸点が水より少し高くなることを考える場面」は、用語と場面の対応が合っていません。
  「沸点上昇 / 水が沸騰し始める温度を考える場面」は、用語と場面の対応が合っていません。
  「鉛蓄電池 / 自動車のバッテリーを考える場面」が正しいです。用語と場面の対応が合っています。
