# 化学基礎 問371
id: 1411
type: single_choice
text: |
  陰イオンと最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面"
  - "炭素12で陽子数と中性子数の合計を見る場面"
  - "塩素原子が電子を1個受け取って Cl- になる場面"
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  塩素原子が電子を1個受け取って Cl- になる場面は、陰イオンと結び付きが強い場面です。したがって、正解は「塩素原子が電子を1個受け取って Cl- になる場面」です。
  
  「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」は、無極性分子と結び付きが強い場面です。
  「炭素12で陽子数と中性子数の合計を見る場面」は、質量数と結び付きが強い場面です。
  「塩素原子が電子を1個受け取って Cl- になる場面」が正しいです。これは陰イオンと結び付きが強い場面です。
  「周期表で似た性質の元素が縦に並ぶことを見る場面」は、周期律と結び付きが強い場面です。
