# 化学基礎 問359
id: 1399
type: single_choice
text: |
  物理変化と最も関係が深い場面として、適切なものはどれか。
choices:
  - "炭素12と炭素14を比べる場面"
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
  - "氷が溶けて水になる場面"
  - "空気や食塩水のように複数の物質が混ざったものを考える場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  氷が溶けて水になる場面は、物理変化と結び付きが強い場面です。したがって、正解は「氷が溶けて水になる場面」です。
  
  「炭素12と炭素14を比べる場面」は、同位体と結び付きが強い場面です。
  「ナトリウムが電子を1個失いやすい理由を考える場面」は、最外殻電子と結び付きが強い場面です。
  「氷が溶けて水になる場面」が正しいです。これは物理変化と結び付きが強い場面です。
  「空気や食塩水のように複数の物質が混ざったものを考える場面」は、混合物と結び付きが強い場面です。
