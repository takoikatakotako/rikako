# 化学基礎 問169
id: 1209
type: single_choice
text: |
  最外殻電子の例として、最も適切なものはどれか。
choices:
  - "Na+"
  - "Cl-"
  - "塩化ナトリウム NaCl"
  - "ナトリウムでは最外殻電子が 1 個であること"
correct: 3
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  ナトリウムでは最外殻電子が 1 個であることは、最外殻電子の例です。したがって、正解は「ナトリウムでは最外殻電子が 1 個であること」です。
  
  「Na+」は、陽イオンの例として見る方が適切です。
  「Cl-」は、陰イオンの例として見る方が適切です。
  「塩化ナトリウム NaCl」は、イオン結合の例として見る方が適切です。
  「ナトリウムでは最外殻電子が 1 個であること」が正しいです。これは最外殻電子の例です。
