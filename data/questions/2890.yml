# 高校化学 問890
id: 2890
type: single_choice
text: |
  「アミド結合をもつ合成繊維の代表的な高分子化合物である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "丈夫な合成繊維であること"
  - "反応経路ではなく始状態と終状態で決まること"
  - "酸化が起こる側の電極であること"
  - "電離と元に戻る変化がつり合うこと"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「アミド結合をもつ合成繊維の代表的な高分子化合物である。」を理解する上では、「丈夫な合成繊維であること」という見方が大切です。したがって、正解は「丈夫な合成繊維であること」です。
  
  「丈夫な合成繊維であること」が正しいです。この説明と結び付きが強い見方です。
  「反応経路ではなく始状態と終状態で決まること」は、その見方はヘスの法則に関係します。
  「酸化が起こる側の電極であること」は、その見方は陽極に関係します。
  「電離と元に戻る変化がつり合うこと」は、その見方は電離平衡に関係します。
