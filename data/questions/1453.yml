# 化学基礎 問413
id: 1453
type: single_choice
text: |
  「液体が固体に変わる状態変化である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "物理変化"
  - "原子番号"
  - "同位体"
  - "凝固"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  液体が固体に変わる状態変化である。 に当てはまる語は凝固です。したがって、正解は「凝固」です。
  
  「物理変化」は、「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」に当てはまる語です。
  「原子番号」は、「原子核の中にある陽子の数を表す数である。」に当てはまる語です。
  「同位体」は、「陽子数は同じで中性子数が異なる原子どうしである。」に当てはまる語です。
  「凝固」が正しいです。「液体が固体に変わる状態変化である。」に当てはまる語です。
