# 高校化学 問398
id: 2398
type: single_choice
text: |
  「導電性高分子や高性能電池材料を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "機能性材料"
  - "カルボン酸"
  - "ベンゼン"
  - "アニリン"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  導電性高分子や高性能電池材料を考える場面 と最も関係が深いのは機能性材料です。したがって、正解は「機能性材料」です。
  
  「機能性材料」が正しいです。この具体例と最も関係が深い語です。
  「カルボン酸」は、「酢酸の性質やにおいを考える場面」と結び付きが強い語です。
  「ベンゼン」は、「芳香族化合物の基本構造を学ぶ場面」と結び付きが強い語です。
  「アニリン」は、「染料の原料になる芳香族アミンを考える場面」と結び付きが強い語です。
