# 化学基礎 問232
id: 1272
type: single_choice
text: |
  「水酸化ナトリウム」に最も関係が深い語として、適切なものはどれか。
choices:
  - "中和"
  - "塩基"
  - "pH"
  - "酸化"
correct: 1
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「水酸化ナトリウム」に最も関係が深いのは塩基です。したがって、正解は「塩基」です。
  
  「中和」は、この例に最も関係が深い語ではありません。
  「塩基」が正しいです。この例は塩基に関係しています。
  「pH」は、この例に最も関係が深い語ではありません。
  「酸化」は、この例に最も関係が深い語ではありません。
