# 高校化学 問867
id: 2867
type: single_choice
text: |
  「周期表1族に属し、水と反応しやすい金属元素の総称である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "粒子の規則正しい配列に注目すること"
  - "反応性が高く 1 価の陽イオンになりやすいこと"
  - "蒸気圧降下の結果として沸点が上がること"
  - "一定圧力での熱の出入りに注目すること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「周期表1族に属し、水と反応しやすい金属元素の総称である。」を理解する上では、「反応性が高く 1 価の陽イオンになりやすいこと」という見方が大切です。したがって、正解は「反応性が高く 1 価の陽イオンになりやすいこと」です。
  
  「粒子の規則正しい配列に注目すること」は、その見方は結晶格子に関係します。
  「反応性が高く 1 価の陽イオンになりやすいこと」が正しいです。この説明と結び付きが強い見方です。
  「蒸気圧降下の結果として沸点が上がること」は、その見方は沸点上昇に関係します。
  「一定圧力での熱の出入りに注目すること」は、その見方はエンタルピー変化に関係します。
