# 化学基礎 問749
id: 1789
type: single_choice
text: |
  「ポリエチレンやタンパク質のような長い分子を考える場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "小さな単位が多数つながっていること"
  - "電荷のかたよりがあること"
  - "酸と塩基が打ち消し合うこと"
  - "相手を還元させ、自分は酸化されること"
correct: 0
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「ポリエチレンやタンパク質のような長い分子を考える場面」では、「小さな単位が多数つながっていること」という見方が大切です。したがって、正解は「小さな単位が多数つながっていること」です。
  
  「小さな単位が多数つながっていること」が正しいです。この具体例で大切になる見方です。
  「電荷のかたよりがあること」は、その見方は水分子で電荷のかたよりを考える場面よりも極性分子と結び付きが強いです。
  「酸と塩基が打ち消し合うこと」は、その見方は塩酸と水酸化ナトリウム水溶液を混ぜる場面よりも中和と結び付きが強いです。
  「相手を還元させ、自分は酸化されること」は、その見方は水素や炭素が相手から酸素を奪う場面よりも還元剤と結び付きが強いです。
