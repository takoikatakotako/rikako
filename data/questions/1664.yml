# 化学基礎 問624
id: 1664
type: single_choice
text: |
  「自由電子が結合を支えること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "酸化剤"
  - "金属結合"
  - "放射性同位体"
  - "再結晶"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「自由電子が結合を支えること」という見方が大切なのは金属結合です。したがって、正解は「金属結合」です。
  
  「酸化剤」は、その語で大切なのは「相手を酸化させ、自分は還元されること」という見方です。
  「金属結合」が正しいです。この見方が大切な語です。
  「放射性同位体」は、その語で大切なのは「放射線を出す同位体であること」という見方です。
  「再結晶」は、その語で大切なのは「溶解度の差を利用すること」という見方です。
