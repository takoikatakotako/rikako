# 高校化学 問224
id: 2224
type: single_choice
text: |
  「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "水のイオン積"
  - "蒸気圧降下"
  - "塩の加水分解"
  - "弱塩基"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。 に当てはまる語は蒸気圧降下です。したがって、正解は「蒸気圧降下」です。
  
  「水のイオン積」は、「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」に当てはまる語です。
  「蒸気圧降下」が正しいです。「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」に当てはまる語です。
  「塩の加水分解」は、「塩のイオンが水と反応して溶液の性質を変える現象である。」に当てはまる語です。
  「弱塩基」は、「水溶液中で一部だけ電離する塩基である。」に当てはまる語です。
