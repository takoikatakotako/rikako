# 化学基礎 問484
id: 1524
type: single_choice
text: |
  pHを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "相手を還元させ、自分は酸化されること"
  - "酸性と塩基性の強さを数で見ること"
  - "化学エネルギーを電気エネルギーに変えること"
  - "粒子の数をまとめて扱う単位であること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  pHでは、「酸性と塩基性の強さを数で見ること」という見方が大切です。したがって、正解は「酸性と塩基性の強さを数で見ること」です。
  
  「相手を還元させ、自分は酸化されること」は、還元剤に関係する見方です。
  「酸性と塩基性の強さを数で見ること」が正しいです。pHの要点を表しています。
  「化学エネルギーを電気エネルギーに変えること」は、ダニエル電池に関係する見方です。
  「粒子の数をまとめて扱う単位であること」は、モルに関係する見方です。
