# 高校化学 問356
id: 2356
type: single_choice
text: |
  「平衡がどちらにかたよっているかを数値で見る場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "吸熱反応"
  - "光合成"
  - "平衡定数"
  - "溶解度"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  平衡がどちらにかたよっているかを数値で見る場面 と最も関係が深いのは平衡定数です。したがって、正解は「平衡定数」です。
  
  「吸熱反応」は、「熱分解や一部の溶解で周囲が冷たくなる場面」と結び付きが強い語です。
  「光合成」は、「植物が光を受けてデンプンなどをつくる場面」と結び付きが強い語です。
  「平衡定数」が正しいです。この具体例と最も関係が深い語です。
  「溶解度」は、「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」と結び付きが強い語です。
