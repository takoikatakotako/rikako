# 化学基礎 問754
id: 1794
type: single_choice
text: |
  「移動しやすさの違いを利用すること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
  - "物質が酸素と結び付く、または電子を失う変化である。"
  - "水に溶けたり融解したりすると電流を通す物質である。"
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
correct: 0
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「移動しやすさの違いを利用すること」という見方と最も関係が深い説明は「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」です。したがって、正解は「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」です。
  
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」が正しいです。この見方と最も関係が深い説明です。
  「物質が酸素と結び付く、または電子を失う変化である。」は、その説明で大切なのは「酸素との結び付きや電子の放出に注目すること」という見方です。
  「水に溶けたり融解したりすると電流を通す物質である。」は、その説明で大切なのは「水溶液や融解状態で電流を通すこと」という見方です。
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、その説明で大切なのは「水に溶けない固体を液体から分けること」という見方です。
