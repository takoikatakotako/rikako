# 高校化学 問987
id: 2987
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "燃料電池 / 圧力や濃度を変えると平衡が移る方向を考える場面"
  - "ルシャトリエの原理 / マグネシウムやカルシウムの性質を比べる場面"
  - "ベンゼン / 芳香族化合物の基本構造を学ぶ場面"
  - "アルカリ土類金属 / 水素を使って発電し、水を生じる仕組みを考える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「ベンゼン / 芳香族化合物の基本構造を学ぶ場面」です。したがって、正解は「ベンゼン / 芳香族化合物の基本構造を学ぶ場面」です。
  
  「燃料電池 / 圧力や濃度を変えると平衡が移る方向を考える場面」は、用語と場面の対応が合っていません。
  「ルシャトリエの原理 / マグネシウムやカルシウムの性質を比べる場面」は、用語と場面の対応が合っていません。
  「ベンゼン / 芳香族化合物の基本構造を学ぶ場面」が正しいです。用語と場面の対応が合っています。
  「アルカリ土類金属 / 水素を使って発電し、水を生じる仕組みを考える場面」は、用語と場面の対応が合っていません。
