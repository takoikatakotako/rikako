# 令和7年度 ITパスポート 公開問題 問3
id: 615
type: single_choice
text: |
  政府は、官民データ活用推進基本法に定められた"官民データ活用推進基本計画"を策定し、官民データの公開や活用の促進に取り組んでいる。次の組織体のうち、官民データを所有しているものだけを全て挙げたものはどれか。
  
  a: 県庁
  b: 大学
  c: 電力事業者
  d: 独立行政法人
choices:
  - "a, b, c"
  - "a, b, c, d"
  - "a, b, d"
  - "a, c, d"
correct: 1
explanation: |
  この問題は、「官民データ」に何が含まれるかを確認する問題です。
  
  官民データという名前ですが、行政機関だけのデータではありません。独立行政法人、大学、民間事業者などが保有しているデータも含まれます。
  
  したがって、a の県庁、b の大学、c の電力事業者、d の独立行政法人の全てが該当します。正解は「a, b, c, d」です。
  
  「a, b, c」はd が抜けています。
  「a, b, c, d」が正しいです。a, b, c, d の全てが含まれます。
  「a, b, d」はc が抜けています。
  「a, c, d」はb が抜けています。
