# 化学基礎 問256
id: 1296
type: single_choice
text: |
  混合物の特徴として、最も適切なものはどれか。
choices:
  - "複数の成分が混ざっている"
  - "一種類の元素だけからなる"
  - "複数の元素が結び付いている"
  - "新しい物質はできない"
correct: 0
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  混合物では、「複数の成分が混ざっている」という点が大切です。したがって、正解は「複数の成分が混ざっている」です。
  
  「複数の成分が混ざっている」が正しいです。混合物の特徴を表しています。
  「一種類の元素だけからなる」は、単体に関係する特徴です。
  「複数の元素が結び付いている」は、化合物に関係する特徴です。
  「新しい物質はできない」は、物理変化に関係する特徴です。
