# 高校化学 問429
id: 2429
type: single_choice
text: |
  チンダル現象を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "コロイドが光を散乱すること"
  - "分子の集まり方や沸点に関係すること"
  - "蒸気圧と外圧のつり合いに注目すること"
  - "蒸発と凝縮がつり合うこと"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  チンダル現象では、「コロイドが光を散乱すること」という見方が大切です。したがって、正解は「コロイドが光を散乱すること」です。
  
  「コロイドが光を散乱すること」が正しいです。チンダル現象の要点を表しています。
  「分子の集まり方や沸点に関係すること」は、分子間力に関係する見方です。
  「蒸気圧と外圧のつり合いに注目すること」は、沸点に関係する見方です。
  「蒸発と凝縮がつり合うこと」は、気液平衡に関係する見方です。
