# 化学基礎 問235
id: 1275
type: single_choice
text: |
  「マグネシウムが燃える反応」に最も関係が深い語として、適切なものはどれか。
choices:
  - "酸化"
  - "還元"
  - "酸化剤"
  - "還元剤"
correct: 0
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「マグネシウムが燃える反応」に最も関係が深いのは酸化です。したがって、正解は「酸化」です。
  
  「酸化」が正しいです。この例は酸化に関係しています。
  「還元」は、この例に最も関係が深い語ではありません。
  「酸化剤」は、この例に最も関係が深い語ではありません。
  「還元剤」は、この例に最も関係が深い語ではありません。
