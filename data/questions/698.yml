# 化学基礎 問31
id: 698
type: single_choice
text: |
  アンモニア NH3 が水素イオン H+ を受け取ったときにできるイオンとして、最も適切なものはどれか。
choices:
  - "NH2-"
  - "NH3-"
  - "NH4+"
  - "NH5+"
correct: 2
explanation: |
  この問題は、「アンモニアが水素イオンを受け取るとどうなるか」を考える問題です。
  
  アンモニアは、水素イオンを受け取るとアンモニウムイオン NH4+ になります。これは配位結合の代表例としても知られています。したがって、正解は「NH4+」です。
  
  「NH2-」は、この変化でできるイオンではありません。
  「NH3-」は、この変化でできるイオンではありません。
  「NH4+」が正しいです。アンモニアが水素イオンを受け取ってできます。
  「NH5+」は、適切ではありません。
