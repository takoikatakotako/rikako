# 化学基礎 問31
id: 698
type: single_choice
text: |
  アンモニア NH₃ が水素イオン H⁺ を受け取ったときにできるイオンとして、最も適切なものはどれか。
choices:
  - "NH₂⁻"
  - "NH₃⁻"
  - "NH₄⁺"
  - "NH₅⁺"
correct: 2
explanation: |
  この問題は、「アンモニアが水素イオンを受け取るとどうなるか」を考える問題です。
  
  アンモニアは、水素イオンを受け取るとアンモニウムイオン NH₄⁺ になります。これは配位結合の代表例としても知られています。したがって、正解は「NH₄⁺」です。
  
  「NH₂⁻」は、この変化でできるイオンではありません。
  「NH₃⁻」は、この変化でできるイオンではありません。
  「NH₄⁺」が正しいです。アンモニアが水素イオンを受け取ってできます。
  「NH₅⁺」は、適切ではありません。
