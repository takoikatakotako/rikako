# 高校化学 問575
id: 2575
type: single_choice
text: |
  「金属元素を炎に入れたときに特有の色を示す反応である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "メタンやエタンの性質を考える場面"
  - "染料の原料になる芳香族アミンを考える場面"
  - "ナトリウムで黄色、銅で青緑色を確かめる場面"
  - "再生可能エネルギーや新素材の開発を考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「金属元素を炎に入れたときに特有の色を示す反応である。」と最も関係が深い場面は「ナトリウムで黄色、銅で青緑色を確かめる場面」です。したがって、正解は「ナトリウムで黄色、銅で青緑色を確かめる場面」です。
  
  「メタンやエタンの性質を考える場面」は、「炭素どうしが単結合だけでつながった炭化水素である。」と結び付きが強い場面です。
  「染料の原料になる芳香族アミンを考える場面」は、「ベンゼン環にアミノ基が直接結び付いた化合物である。」と結び付きが強い場面です。
  「ナトリウムで黄色、銅で青緑色を確かめる場面」が正しいです。この説明と結び付きが強い場面です。
  「再生可能エネルギーや新素材の開発を考える場面」は、「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」と結び付きが強い場面です。
