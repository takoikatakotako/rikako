# 化学基礎 問231
id: 1271
type: single_choice
text: |
  「塩酸」に最も関係が深い語として、適切なものはどれか。
choices:
  - "酸"
  - "塩基"
  - "中和"
  - "pH"
correct: 0
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「塩酸」に最も関係が深いのは酸です。したがって、正解は「酸」です。
  
  「酸」が正しいです。この例は酸に関係しています。
  「塩基」は、この例に最も関係が深い語ではありません。
  「中和」は、この例に最も関係が深い語ではありません。
  「pH」は、この例に最も関係が深い語ではありません。
