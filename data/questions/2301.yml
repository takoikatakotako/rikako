# 高校化学 問301
id: 2301
type: single_choice
text: |
  「水やエタノールの沸点の違いを考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "溶解度"
  - "溶解平衡"
  - "沸点上昇"
  - "分子間力"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  水やエタノールの沸点の違いを考える場面 と最も関係が深いのは分子間力です。したがって、正解は「分子間力」です。
  
  「溶解度」は、「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」と結び付きが強い語です。
  「溶解平衡」は、「飽和溶液で見かけ上変化が止まっている場面」と結び付きが強い語です。
  「沸点上昇」は、「食塩水の沸点が水より少し高くなることを考える場面」と結び付きが強い語です。
  「分子間力」が正しいです。この具体例と最も関係が深い語です。
