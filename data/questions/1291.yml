# 化学基礎 問251
id: 1291
type: single_choice
text: |
  ろ過の特徴として、最も適切なものはどれか。
choices:
  - "沸点の違いを利用する"
  - "溶解度の差を利用する"
  - "移動しやすさの違いを利用する"
  - "水に溶けない固体を液体から分ける"
correct: 3
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  ろ過では、「水に溶けない固体を液体から分ける」という点が大切です。したがって、正解は「水に溶けない固体を液体から分ける」です。
  
  「沸点の違いを利用する」は、蒸留に関係する特徴です。
  「溶解度の差を利用する」は、再結晶に関係する特徴です。
  「移動しやすさの違いを利用する」は、クロマトグラフィーに関係する特徴です。
  「水に溶けない固体を液体から分ける」が正しいです。ろ過の特徴を表しています。
