# 化学基礎 問999
id: 2039
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "化学変化 / 陽子数が同じで中性子数が異なること"
  - "高分子化合物 / 小さな単位が多数つながっていること"
  - "同位体 / 自由電子が結合を支えること"
  - "金属結合 / 新しい物質ができること"
correct: 1
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「高分子化合物 / 小さな単位が多数つながっていること」です。したがって、正解は「高分子化合物 / 小さな単位が多数つながっていること」です。
  
  「化学変化 / 陽子数が同じで中性子数が異なること」は、用語と要点の対応が合っていません。
  「高分子化合物 / 小さな単位が多数つながっていること」が正しいです。用語と要点の対応が合っています。
  「同位体 / 自由電子が結合を支えること」は、用語と要点の対応が合っていません。
  「金属結合 / 新しい物質ができること」は、用語と要点の対応が合っていません。
