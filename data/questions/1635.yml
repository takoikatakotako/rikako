# 化学基礎 問595
id: 1635
type: single_choice
text: |
  「砂糖水が電流をほとんど通さない場面」を説明した文として、最も適切なものはどれか。
choices:
  - "成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
  - "水に溶けても電流をほとんど通さない物質である。"
  - "固体が液体に変わる状態変化である。"
  - "元素を原子番号の順に並べると性質が周期的に変化するというきまりである。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「砂糖水が電流をほとんど通さない場面」を説明した文として適切なのは「水に溶けても電流をほとんど通さない物質である。」です。したがって、正解は「水に溶けても電流をほとんど通さない物質である。」です。
  
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」は、この説明は「インクの色素をろ紙の上で分ける場面」と結び付きが強いです。
  「水に溶けても電流をほとんど通さない物質である。」が正しいです。この具体例を説明した文です。
  「固体が液体に変わる状態変化である。」は、この説明は「氷を温めて水にする場面」と結び付きが強いです。
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」は、この説明は「周期表で似た性質の元素が縦に並ぶことを見る場面」と結び付きが強いです。
