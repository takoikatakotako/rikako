# 化学基礎 問966
id: 2006
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "質量数 / 陽子数と中性子数の合計であること"
  - "無極性分子 / 酸性と塩基性の強さを数で見ること"
  - "pH / 金属のイオンになりやすさを比べること"
  - "イオン化傾向 / 電荷のかたよりがほとんどないこと"
correct: 0
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「質量数 / 陽子数と中性子数の合計であること」です。したがって、正解は「質量数 / 陽子数と中性子数の合計であること」です。
  
  「質量数 / 陽子数と中性子数の合計であること」が正しいです。用語と要点の対応が合っています。
  「無極性分子 / 酸性と塩基性の強さを数で見ること」は、用語と要点の対応が合っていません。
  「pH / 金属のイオンになりやすさを比べること」は、用語と要点の対応が合っていません。
  「イオン化傾向 / 電荷のかたよりがほとんどないこと」は、用語と要点の対応が合っていません。
