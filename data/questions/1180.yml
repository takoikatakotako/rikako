# 化学基礎 問140
id: 1180
type: single_choice
text: |
  ダニエル電池についての説明として、最も適切なものはどれか。
choices:
  - "電池で二つの水溶液の電気的なつり合いを保つために入れる部分である。"
  - "水に溶けたり融解したりすると電気を通す物質である。"
  - "水に溶けてもほとんど電気を通さない物質である。"
  - "亜鉛と銅を用いて化学エネルギーを電気エネルギーに変える電池である。"
correct: 3
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  ダニエル電池は、亜鉛と銅を用いて化学エネルギーを電気エネルギーに変える電池である。したがって、正解は「亜鉛と銅を用いて化学エネルギーを電気エネルギーに変える電池である。」です。
  
  「電池で二つの水溶液の電気的なつり合いを保つために入れる部分である。」は、塩橋の説明です。
  「水に溶けたり融解したりすると電気を通す物質である。」は、電解質の説明です。
  「水に溶けてもほとんど電気を通さない物質である。」は、非電解質の説明です。
  「亜鉛と銅を用いて化学エネルギーを電気エネルギーに変える電池である。」が正しいです。ダニエル電池の説明です。
