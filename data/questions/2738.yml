# 高校化学 問738
id: 2738
type: single_choice
text: |
  「結合を切るのに必要なエネルギーに注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "ハロゲン"
  - "付加反応"
  - "PET"
  - "結合エネルギー"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「結合を切るのに必要なエネルギーに注目すること」という見方が大切なのは結合エネルギーです。したがって、正解は「結合エネルギー」です。
  
  「ハロゲン」は、その語で大切なのは「非金属で酸化力が強いこと」という見方です。
  「付加反応」は、その語で大切なのは「二重結合や三重結合に何かが加わること」という見方です。
  「PET」は、その語で大切なのは「ポリエステルの一種で再利用もしやすいこと」という見方です。
  「結合エネルギー」が正しいです。この見方が大切な語です。
