# 化学基礎 問304
id: 1344
type: single_choice
text: |
  クロマトグラフィーについて学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
  - "一種類の物質だけからできていて、性質が一定である物質である。"
  - "一種類の元素だけからできている物質である。"
  - "物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  クロマトグラフィーは、成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。 したがって、正解は「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」です。
  
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」が正しいです。クロマトグラフィーの説明です。
  「一種類の物質だけからできていて、性質が一定である物質である。」は、純物質の説明です。
  「一種類の元素だけからできている物質である。」は、単体の説明です。
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」は、物理変化の説明です。
