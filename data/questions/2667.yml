# 高校化学 問667
id: 2667
type: single_choice
text: |
  「ナトリウムやカリウムの性質を比べる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "分子の端にアルデヒド基をもつ有機化合物である。"
  - "代表的な単糖類で、生物のエネルギー源として重要な化合物である。"
  - "固体1 molが融解するときに吸収する熱量である。"
  - "周期表1族に属し、水と反応しやすい金属元素の総称である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「ナトリウムやカリウムの性質を比べる場面」を説明した文として適切なのは「周期表1族に属し、水と反応しやすい金属元素の総称である。」です。したがって、正解は「周期表1族に属し、水と反応しやすい金属元素の総称である。」です。
  
  「分子の端にアルデヒド基をもつ有機化合物である。」は、この説明は「ホルムアルデヒドやアセトアルデヒドを考える場面」と結び付きが強いです。
  「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」は、この説明は「血糖や発酵の材料として使われる場面」と結び付きが強いです。
  「固体1 molが融解するときに吸収する熱量である。」は、この説明は「氷を水に変えるのに必要な熱を考える場面」と結び付きが強いです。
  「周期表1族に属し、水と反応しやすい金属元素の総称である。」が正しいです。この具体例を説明した文です。
