# 化学基礎 問209
id: 1249
type: single_choice
text: |
  「氷が溶けて水になる変化」に最も関係が深い語として、適切なものはどれか。
choices:
  - "化学変化"
  - "融解"
  - "物理変化"
  - "蒸発"
correct: 2
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「氷が溶けて水になる変化」に最も関係が深いのは物理変化です。したがって、正解は「物理変化」です。
  
  「化学変化」は、この例に最も関係が深い語ではありません。
  「融解」は、この例に最も関係が深い語ではありません。
  「物理変化」が正しいです。この例は物理変化に関係しています。
  「蒸発」は、この例に最も関係が深い語ではありません。
