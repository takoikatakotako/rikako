# 化学基礎 問860
id: 1900
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "化学変化 / もとの物質とは別の物質ができる変化である。"
  - "純物質 / 液体が気体になる状態変化である。"
  - "蒸発 / 原子のいちばん外側の電子殻にある電子である。"
  - "最外殻電子 / 一種類の物質だけからできていて、性質が一定である物質である。"
correct: 0
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「化学変化 / もとの物質とは別の物質ができる変化である。」です。したがって、正解は「化学変化 / もとの物質とは別の物質ができる変化である。」です。
  
  「化学変化 / もとの物質とは別の物質ができる変化である。」が正しいです。用語と説明の対応が合っています。
  「純物質 / 液体が気体になる状態変化である。」は、用語と説明の対応が合っていません。
  「蒸発 / 原子のいちばん外側の電子殻にある電子である。」は、用語と説明の対応が合っていません。
  「最外殻電子 / 一種類の物質だけからできていて、性質が一定である物質である。」は、用語と説明の対応が合っていません。
