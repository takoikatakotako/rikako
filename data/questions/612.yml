# 令和7年度 ITパスポート 公開問題 問60
id: 612
type: single_choice
text: |
  TCP/IP ネットワークで用いられるプロトコルであるFTP の役割として、適切なものはどれか。
choices:
  - "正確な現在時刻を取得する。"
  - "電子メールを転送する。"
  - "ネットワーク接続に必要なIPアドレスなどの情報を自動的に割り当てる。"
  - "ファイルをPC間で転送する。"
correct: 3
explanation: |
  この問題の公開解答では「ファイルをPC間で転送する」が正解とされています。
  
  「正確な現在時刻を取得する」は公開解答では正解ではありません。
  「電子メールを転送する」は公開解答では正解ではありません。
  「ネットワーク接続に必要なIPアドレスなどの情報を自動的に割り当てる」は公開解答では正解ではありません。
  「ファイルをPC間で転送する」が公開解答で正解とされています。
