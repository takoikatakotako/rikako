# 化学基礎 問110
id: 1150
type: single_choice
text: |
  化学変化についての説明として、最も適切なものはどれか。
choices:
  - "固体が液体になる状態変化である。"
  - "新しい物質ができる変化である。"
  - "液体が気体になる状態変化である。"
  - "液体が固体になる状態変化である。"
correct: 1
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  化学変化は、新しい物質ができる変化である。したがって、正解は「新しい物質ができる変化である。」です。
  
  「固体が液体になる状態変化である。」は、融解の説明です。
  「新しい物質ができる変化である。」が正しいです。化学変化の説明です。
  「液体が気体になる状態変化である。」は、蒸発の説明です。
  「液体が固体になる状態変化である。」は、凝固の説明です。
