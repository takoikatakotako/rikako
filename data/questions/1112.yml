# 化学基礎 問72
id: 1112
type: single_choice
text: |
  無極性分子として最も適切なものはどれか。
choices:
  - "水"
  - "アンモニア"
  - "二酸化炭素"
  - "塩酸"
correct: 2
explanation: |
  この問題は、「分子全体で偏りが打ち消し合うものはどれか」を考える問題です。
  
  二酸化炭素は、分子の形が対称なので、分子全体では電荷の偏りが打ち消し合い、無極性分子になります。したがって、正解は「二酸化炭素」です。
  
  「水」は、極性分子です。
  「アンモニア」は、極性分子です。
  「二酸化炭素」が正しいです。無極性分子として扱われます。
  「塩酸」は、水溶液としては強い酸ですが、ここでの無極性分子の例としては適切ではありません。
