# 高校化学 問65
id: 2065
type: single_choice
text: |
  酸解離定数についての説明として、最も適切なものはどれか。
choices:
  - "酸の電離のしやすさを表す定数である。"
  - "燃料と酸化剤を外部から供給しながら電気を取り出す電池である。"
  - "電気分解で酸化が起こる電極である。"
  - "電気分解で生じる物質の量は流れた電気量に比例するという法則である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  酸解離定数は、酸の電離のしやすさを表す定数である。 したがって、正解は「酸の電離のしやすさを表す定数である。」です。
  
  「酸の電離のしやすさを表す定数である。」が正しいです。酸解離定数の説明です。
  「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」は、燃料電池の説明です。
  「電気分解で酸化が起こる電極である。」は、陽極の説明です。
  「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」は、ファラデーの法則の説明です。
