# 高校化学 問500
id: 2500
type: single_choice
text: |
  化学が築く未来を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "多様な酸化数や色、触媒作用に注目すること"
  - "実用性が高く、酸化数が変わりやすいこと"
  - "必要な機能をねらって材料を設計すること"
  - "化学が社会課題の解決に役立つこと"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  化学が築く未来では、「化学が社会課題の解決に役立つこと」という見方が大切です。したがって、正解は「化学が社会課題の解決に役立つこと」です。
  
  「多様な酸化数や色、触媒作用に注目すること」は、遷移元素に関係する見方です。
  「実用性が高く、酸化数が変わりやすいこと」は、鉄に関係する見方です。
  「必要な機能をねらって材料を設計すること」は、機能性材料に関係する見方です。
  「化学が社会課題の解決に役立つこと」が正しいです。化学が築く未来の要点を表しています。
