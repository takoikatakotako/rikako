# 高校化学 問402
id: 2402
type: single_choice
text: |
  融点を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "コロイド粒子の電荷に注目すること"
  - "固体と液体の境目の温度に注目すること"
  - "水となじみにくく不安定になりやすいこと"
  - "蒸気圧と外圧のつり合いに注目すること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  融点では、「固体と液体の境目の温度に注目すること」という見方が大切です。したがって、正解は「固体と液体の境目の温度に注目すること」です。
  
  「コロイド粒子の電荷に注目すること」は、電気泳動に関係する見方です。
  「固体と液体の境目の温度に注目すること」が正しいです。融点の要点を表しています。
  「水となじみにくく不安定になりやすいこと」は、疎水コロイドに関係する見方です。
  「蒸気圧と外圧のつり合いに注目すること」は、沸点に関係する見方です。
