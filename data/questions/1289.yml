# 化学基礎 問249
id: 1289
type: single_choice
text: |
  「ポリエチレン」に最も関係が深い語として、適切なものはどれか。
choices:
  - "化学が拓く世界"
  - "ろ過"
  - "高分子化合物"
  - "蒸留"
correct: 2
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「ポリエチレン」に最も関係が深いのは高分子化合物です。したがって、正解は「高分子化合物」です。
  
  「化学が拓く世界」は、この例に最も関係が深い語ではありません。
  「ろ過」は、この例に最も関係が深い語ではありません。
  「高分子化合物」が正しいです。この例は高分子化合物に関係しています。
  「蒸留」は、この例に最も関係が深い語ではありません。
