# 高校化学 問276
id: 2276
type: single_choice
text: |
  「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "異性体"
  - "鉄"
  - "アルデヒド"
  - "エステル"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。 に当てはまる語は鉄です。したがって、正解は「鉄」です。
  
  「異性体」は、「分子式は同じでも構造が異なる化合物どうしである。」に当てはまる語です。
  「鉄」が正しいです。「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」に当てはまる語です。
  「アルデヒド」は、「分子の端にアルデヒド基をもつ有機化合物である。」に当てはまる語です。
  「エステル」は、「カルボン酸とアルコールからできる有機化合物である。」に当てはまる語です。
