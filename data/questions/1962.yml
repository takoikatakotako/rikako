# 化学基礎 問922
id: 1962
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "無極性分子 / レモン水とせっけん水の酸性・塩基性を比べる場面"
  - "イオン結合 / 塩化ナトリウムが陽イオンと陰イオンの引力でできる場面"
  - "pH / 亜鉛が銅より先にイオンになりやすいことを見る場面"
  - "イオン化傾向 / 酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「イオン結合 / 塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」です。したがって、正解は「イオン結合 / 塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」です。
  
  「無極性分子 / レモン水とせっけん水の酸性・塩基性を比べる場面」は、用語と場面の対応が合っていません。
  「イオン結合 / 塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」が正しいです。用語と場面の対応が合っています。
  「pH / 亜鉛が銅より先にイオンになりやすいことを見る場面」は、用語と場面の対応が合っていません。
  「イオン化傾向 / 酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」は、用語と場面の対応が合っていません。
