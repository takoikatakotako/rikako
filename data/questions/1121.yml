# 化学基礎 問81
id: 1121
type: single_choice
text: |
  弱酸についての説明として、最も適切なものはどれか。
choices:
  - "水に溶けても電離しにくい酸である。"
  - "必ず濃度が低い酸である。"
  - "必ず無色の酸である。"
  - "水に全く溶けない酸である。"
correct: 0
explanation: |
  この問題は、「弱酸の意味」を確認する問題です。
  
  弱酸は、水に溶けても電離しにくい酸です。濃い、薄いとは別の考え方です。したがって、正解は「水に溶けても電離しにくい酸である」です。
  
  「水に溶けても電離しにくい酸である」が正しいです。
  「必ず濃度が低い酸である」は、適切ではありません。
  「必ず無色の酸である」は、適切ではありません。
  「水に全く溶けない酸である」は、適切ではありません。
