# 化学基礎 問633
id: 1673
type: single_choice
text: |
  「酸と塩基が打ち消し合うこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "酸化防止剤"
  - "純物質"
  - "中和"
  - "蒸発"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「酸と塩基が打ち消し合うこと」という見方が大切なのは中和です。したがって、正解は「中和」です。
  
  「酸化防止剤」は、その語で大切なのは「酸化による変質を防ぐこと」という見方です。
  「純物質」は、その語で大切なのは「成分が一種類で性質が一定であること」という見方です。
  「中和」が正しいです。この見方が大切な語です。
  「蒸発」は、その語で大切なのは「液体から気体への変化であること」という見方です。
