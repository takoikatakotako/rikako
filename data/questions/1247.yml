# 化学基礎 問207
id: 1247
type: single_choice
text: |
  「酸素 O2」に最も関係が深い語として、適切なものはどれか。
choices:
  - "単体"
  - "化合物"
  - "物理変化"
  - "化学変化"
correct: 0
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「酸素 O2」に最も関係が深いのは単体です。したがって、正解は「単体」です。
  
  「単体」が正しいです。この例は単体に関係しています。
  「化合物」は、この例に最も関係が深い語ではありません。
  「物理変化」は、この例に最も関係が深い語ではありません。
  「化学変化」は、この例に最も関係が深い語ではありません。
