# 化学基礎 問393
id: 1433
type: single_choice
text: |
  塩橋と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ダニエル電池で二つの水溶液をつなぐ場面"
  - "亜鉛板と銅板を使って豆電球を光らせる場面"
  - "水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
  - "レモン水とせっけん水の酸性・塩基性を比べる場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  ダニエル電池で二つの水溶液をつなぐ場面は、塩橋と結び付きが強い場面です。したがって、正解は「ダニエル電池で二つの水溶液をつなぐ場面」です。
  
  「ダニエル電池で二つの水溶液をつなぐ場面」が正しいです。これは塩橋と結び付きが強い場面です。
  「亜鉛板と銅板を使って豆電球を光らせる場面」は、ダニエル電池と結び付きが強い場面です。
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」は、塩基と結び付きが強い場面です。
  「レモン水とせっけん水の酸性・塩基性を比べる場面」は、pHと結び付きが強い場面です。
