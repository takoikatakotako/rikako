# 化学基礎 問578
id: 1618
type: single_choice
text: |
  「6.0×10^23個の粒子をひとまとまりとして数える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "粒子の数をまとめて表すための単位である。"
  - "物質が酸素と結び付く、または電子を失う変化である。"
  - "水に溶けたり融解したりすると電流を通す物質である。"
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「6.0×10^23個の粒子をひとまとまりとして数える場面」を説明した文として適切なのは「粒子の数をまとめて表すための単位である。」です。したがって、正解は「粒子の数をまとめて表すための単位である。」です。
  
  「粒子の数をまとめて表すための単位である。」が正しいです。この具体例を説明した文です。
  「物質が酸素と結び付く、または電子を失う変化である。」は、この説明は「マグネシウムが酸素と結び付く場面」と結び付きが強いです。
  「水に溶けたり融解したりすると電流を通す物質である。」は、この説明は「食塩水や塩酸が電流を通す場面」と結び付きが強いです。
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、この説明は「砂と水の混合物から砂を取り除く場面」と結び付きが強いです。
