# 化学基礎 問741
id: 1781
type: single_choice
text: |
  「亜鉛が銅より先にイオンになりやすいことを見る場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "金属のイオンになりやすさを比べること"
  - "性質が周期的にくり返されること"
  - "物質の性質を示す小さな粒子として考えること"
  - "水酸化物イオンや水素イオンの受け取りに注目すること"
correct: 0
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「亜鉛が銅より先にイオンになりやすいことを見る場面」では、「金属のイオンになりやすさを比べること」という見方が大切です。したがって、正解は「金属のイオンになりやすさを比べること」です。
  
  「金属のイオンになりやすさを比べること」が正しいです。この具体例で大切になる見方です。
  「性質が周期的にくり返されること」は、その見方は周期表で似た性質の元素が縦に並ぶことを見る場面よりも周期律と結び付きが強いです。
  「物質の性質を示す小さな粒子として考えること」は、その見方は水分子や酸素分子を粒として考える場面よりも分子と結び付きが強いです。
  「水酸化物イオンや水素イオンの受け取りに注目すること」は、その見方は水酸化ナトリウム水溶液が水酸化物イオンを生じる場面よりも塩基と結び付きが強いです。
