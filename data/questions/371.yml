# 令和7年度 ITパスポート 公開問題 問58
id: 371
type: single_choice
text: |
  DNSの説明として、適切なものはどれか。
choices:
  - "IPネットワークに接続しようとするコンピュータに、IPアドレスなどを自動的に割り当てるプロトコルである。"
  - "ブラウザと Web サーバ間の通信を暗号化して、セキュリティを高めるために利用されるプロトコルである。"
  - "ホスト名やドメイン名と、IPアドレスを対応付ける仕組みである。"
  - "ホスト名やドメイン名と、MACアドレスを対応付ける仕組みである。"
correct: 2
explanation: |
  この問題の公開解答では「ホスト名やドメイン名と、IPアドレスを対応付ける仕組みである」が正解とされています。
  
  「IPネットワークに接続しようとするコンピュータに、IPアドレスなどを自動的に割り当てるプロトコルである」は公開解答では正解ではありません。
  「ブラウザと Web サーバ間の通信を暗号化して、セキュリティを高めるために利用されるプロトコルである」は公開解答では正解ではありません。
  「ホスト名やドメイン名と、IPアドレスを対応付ける仕組みである」が公開解答で正解とされています。
  「ホスト名やドメイン名と、MACアドレスを対応付ける仕組みである」は公開解答では正解ではありません。
