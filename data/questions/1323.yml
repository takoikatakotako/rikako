# 化学基礎 問283
id: 1323
type: single_choice
text: |
  中和の特徴として、最も適切なものはどれか。
choices:
  - "酸性やアルカリ性の強さの目安"
  - "電子を失う"
  - "電子を受け取る"
  - "酸と塩基が反応して塩と水ができる"
correct: 3
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  中和では、「酸と塩基が反応して塩と水ができる」という点が大切です。したがって、正解は「酸と塩基が反応して塩と水ができる」です。
  
  「酸性やアルカリ性の強さの目安」は、pHに関係する特徴です。
  「電子を失う」は、酸化に関係する特徴です。
  「電子を受け取る」は、還元に関係する特徴です。
  「酸と塩基が反応して塩と水ができる」が正しいです。中和の特徴を表しています。
