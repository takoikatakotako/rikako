# 化学基礎 問807
id: 1847
type: single_choice
text: |
  「一種類の元素だけからできること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "鉄や酸素のように一種類の元素だけからできた物質を考える場面"
  - "医療や年代測定に利用される炭素14を考える場面"
  - "ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面"
  - "鉄がさびて別の物質になる場面"
correct: 0
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「一種類の元素だけからできること」という見方と最も関係が深い場面は「鉄や酸素のように一種類の元素だけからできた物質を考える場面」です。したがって、正解は「鉄や酸素のように一種類の元素だけからできた物質を考える場面」です。
  
  「鉄や酸素のように一種類の元素だけからできた物質を考える場面」が正しいです。この見方と最も関係が深い場面です。
  「医療や年代測定に利用される炭素14を考える場面」は、その場面で大切なのは「放射線を出す同位体であること」という見方です。
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」は、その場面で大切なのは「溶解度の差を利用すること」という見方です。
  「鉄がさびて別の物質になる場面」は、その場面で大切なのは「新しい物質ができること」という見方です。
