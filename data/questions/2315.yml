# 高校化学 問315
id: 2315
type: single_choice
text: |
  「塩化ナトリウムの結晶のつくりを考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "結晶格子"
  - "イオン結晶"
  - "共有結合の結晶"
  - "アモルファス"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  塩化ナトリウムの結晶のつくりを考える場面 と最も関係が深いのはイオン結晶です。したがって、正解は「イオン結晶」です。
  
  「結晶格子」は、「食塩や金属の規則正しい並び方を考える場面」と結び付きが強い語です。
  「イオン結晶」が正しいです。この具体例と最も関係が深い語です。
  「共有結合の結晶」は、「ダイヤモンドや二酸化ケイ素の硬さを考える場面」と結び付きが強い語です。
  「アモルファス」は、「ガラスのように一定の融点を示しにくい固体を考える場面」と結び付きが強い語です。
