# 高校化学 問358
id: 2358
type: single_choice
text: |
  「高圧や触媒を利用してアンモニアを得る場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "アンモニア合成"
  - "光合成"
  - "溶解度"
  - "溶解平衡"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  高圧や触媒を利用してアンモニアを得る場面 と最も関係が深いのはアンモニア合成です。したがって、正解は「アンモニア合成」です。
  
  「アンモニア合成」が正しいです。この具体例と最も関係が深い語です。
  「光合成」は、「植物が光を受けてデンプンなどをつくる場面」と結び付きが強い語です。
  「溶解度」は、「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」と結び付きが強い語です。
  「溶解平衡」は、「飽和溶液で見かけ上変化が止まっている場面」と結び付きが強い語です。
