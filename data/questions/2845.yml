# 高校化学 問845
id: 2845
type: single_choice
text: |
  「リチウムイオンの移動を利用する充電式電池である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "アミノ酸が多数つながった高分子であること"
  - "蒸気圧と外圧のつり合いに注目すること"
  - "粒子の規則正しい配列に注目すること"
  - "軽くて繰り返し使いやすい電池であること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「リチウムイオンの移動を利用する充電式電池である。」を理解する上では、「軽くて繰り返し使いやすい電池であること」という見方が大切です。したがって、正解は「軽くて繰り返し使いやすい電池であること」です。
  
  「アミノ酸が多数つながった高分子であること」は、その見方はタンパク質に関係します。
  「蒸気圧と外圧のつり合いに注目すること」は、その見方は沸点に関係します。
  「粒子の規則正しい配列に注目すること」は、その見方は結晶格子に関係します。
  「軽くて繰り返し使いやすい電池であること」が正しいです。この説明と結び付きが強い見方です。
