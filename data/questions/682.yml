# 化学基礎 問15
id: 682
type: single_choice
text: |
  次のうち、化学変化として最も適切なものはどれか。
choices:
  - "氷が溶けて水になる。"
  - "砂糖が水に溶ける。"
  - "鉄がさびる。"
  - "ガラスが割れる。"
correct: 2
explanation: |
  この問題は、「新しい物質ができる変化はどれか」を見分ける問題です。
  
  鉄がさびる変化では、もとの鉄とは別の物質ができます。これは化学変化です。一方、氷が溶けることや砂糖が溶けることやガラスが割れることは、新しい物質ができていないので化学変化ではありません。したがって、正解は「鉄がさびる」です。
  
  「氷が溶けて水になる」は、状態が変わっただけなので物理変化です。
  「砂糖が水に溶ける」は、新しい物質ができていないので物理変化です。
  「鉄がさびる」が正しいです。新しい物質ができる化学変化です。
  「ガラスが割れる」は、形が変わっただけなので物理変化です。
