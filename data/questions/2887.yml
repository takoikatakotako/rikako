# 高校化学 問887
id: 2887
type: single_choice
text: |
  「六角形の環状構造をもつ代表的な芳香族炭化水素である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水となじみにくく不安定になりやすいこと"
  - "ベンゼン環をもつこと"
  - "軽くて繰り返し使いやすい電池であること"
  - "平衡の位置を数で表すこと"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「六角形の環状構造をもつ代表的な芳香族炭化水素である。」を理解する上では、「ベンゼン環をもつこと」という見方が大切です。したがって、正解は「ベンゼン環をもつこと」です。
  
  「水となじみにくく不安定になりやすいこと」は、その見方は疎水コロイドに関係します。
  「ベンゼン環をもつこと」が正しいです。この説明と結び付きが強い見方です。
  「軽くて繰り返し使いやすい電池であること」は、その見方はリチウムイオン電池に関係します。
  「平衡の位置を数で表すこと」は、その見方は平衡定数に関係します。
