# 化学基礎 問888
id: 1928
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "還元 / 物質が酸素を失う、または電子を受け取る変化である。"
  - "中和 / 相手を還元させ、自身は酸化される物質である。"
  - "還元剤 / 金属元素を炎に入れたときに特有の色を示す反応である。"
  - "炎色反応 / 酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。"
correct: 0
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「還元 / 物質が酸素を失う、または電子を受け取る変化である。」です。したがって、正解は「還元 / 物質が酸素を失う、または電子を受け取る変化である。」です。
  
  「還元 / 物質が酸素を失う、または電子を受け取る変化である。」が正しいです。用語と説明の対応が合っています。
  「中和 / 相手を還元させ、自身は酸化される物質である。」は、用語と説明の対応が合っていません。
  「還元剤 / 金属元素を炎に入れたときに特有の色を示す反応である。」は、用語と説明の対応が合っていません。
  「炎色反応 / 酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」は、用語と説明の対応が合っていません。
