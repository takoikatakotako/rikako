# 高校化学 問392
id: 2392
type: single_choice
text: |
  「酵素や筋肉の主成分を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "疎水コロイド"
  - "PET"
  - "タンパク質"
  - "ペプチド結合"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  酵素や筋肉の主成分を考える場面 と最も関係が深いのはタンパク質です。したがって、正解は「タンパク質」です。
  
  「疎水コロイド」は、「金属や硫黄のコロイドが電解質で沈みやすい場面」と結び付きが強い語です。
  「PET」は、「飲料ボトルや衣料用繊維を考える場面」と結び付きが強い語です。
  「タンパク質」が正しいです。この具体例と最も関係が深い語です。
  「ペプチド結合」は、「アミノ酸がつながってペプチドになる場面」と結び付きが強い語です。
