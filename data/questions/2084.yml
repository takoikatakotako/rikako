# 高校化学 問84
id: 2084
type: single_choice
text: |
  アルデヒドについての説明として、最も適切なものはどれか。
choices:
  - "グルコースが多数つながった植物の貯蔵多糖である。"
  - "周期表1族に属し、水と反応しやすい金属元素の総称である。"
  - "周期表17族に属し、陰イオンになりやすい非金属元素の総称である。"
  - "分子の端にアルデヒド基をもつ有機化合物である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  アルデヒドは、分子の端にアルデヒド基をもつ有機化合物である。 したがって、正解は「分子の端にアルデヒド基をもつ有機化合物である。」です。
  
  「グルコースが多数つながった植物の貯蔵多糖である。」は、デンプンの説明です。
  「周期表1族に属し、水と反応しやすい金属元素の総称である。」は、アルカリ金属の説明です。
  「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」は、ハロゲンの説明です。
  「分子の端にアルデヒド基をもつ有機化合物である。」が正しいです。アルデヒドの説明です。
