# 高校化学 問325
id: 2325
type: single_choice
text: |
  「食塩水の沸点が水より少し高くなることを考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "溶解"
  - "飽和溶液"
  - "蒸気圧降下"
  - "沸点上昇"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  食塩水の沸点が水より少し高くなることを考える場面 と最も関係が深いのは沸点上昇です。したがって、正解は「沸点上昇」です。
  
  「溶解」は、「食塩が水に溶けて見えなくなる場面」と結び付きが強い語です。
  「飽和溶液」は、「食塩を加えても底に残るようになった食塩水を考える場面」と結び付きが強い語です。
  「蒸気圧降下」は、「食塩水が純水より蒸発しにくくなることを考える場面」と結び付きが強い語です。
  「沸点上昇」が正しいです。この具体例と最も関係が深い語です。
