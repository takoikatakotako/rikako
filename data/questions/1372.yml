# 化学基礎 問332
id: 1372
type: single_choice
text: |
  塩基について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。"
  - "金属が電子を失ってイオンになりやすい性質の強さである。"
  - "二つの溶液の電気的なつり合いを保つための部分である。"
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  塩基は、水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。 したがって、正解は「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」です。
  
  「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」が正しいです。塩基の説明です。
  「金属が電子を失ってイオンになりやすい性質の強さである。」は、イオン化傾向の説明です。
  「二つの溶液の電気的なつり合いを保つための部分である。」は、塩橋の説明です。
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」は、モル濃度の説明です。
