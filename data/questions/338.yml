# 令和7年度 ITパスポート 公開問題 問23
id: 338
type: single_choice
text: |
  コーポレートガバナンスの強化に有効な施策だけを全て挙げたものはどれか。
  a 株式公開買付けによる企業の買収
  b 執行役員制度の導入による経営と執行の分離
  c 独立性の高い社外取締役の選任
choices:
  - "a,b"
  - "a,b,c"
  - "b,c"
  - "c"
correct: 2
explanation: |
  コーポレートガバナンスの強化には、経営の監督機能を高める施策が有効です。執行役員制度による経営と執行の分離と、独立性の高い社外取締役の選任が該当するので、「b,c」が正しいです。
  
  「a,b」はa の企業買収はガバナンス強化施策そのものではありませんため誤りです。
  「a,b,c」はa が含まれているので誤りです。
  「b,c」が正しいです。b と c は経営監督の強化につながる施策です。
  「c」はc だけでは不十分で、b も有効です。
