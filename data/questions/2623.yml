# 高校化学 問623
id: 2623
type: single_choice
text: |
  「飽和溶液で見かけ上変化が止まっている場面」を説明した文として、最も適切なものはどれか。
choices:
  - "反応の結果として周囲から熱を吸収する反応である。"
  - "単位時間あたりに進む反応の程度を表す量である。"
  - "塩のイオンが水と反応して溶液の性質を変える現象である。"
  - "溶ける速さと析出する速さが等しくなっている平衡である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「飽和溶液で見かけ上変化が止まっている場面」を説明した文として適切なのは「溶ける速さと析出する速さが等しくなっている平衡である。」です。したがって、正解は「溶ける速さと析出する速さが等しくなっている平衡である。」です。
  
  「反応の結果として周囲から熱を吸収する反応である。」は、この説明は「熱分解や一部の溶解で周囲が冷たくなる場面」と結び付きが強いです。
  「単位時間あたりに進む反応の程度を表す量である。」は、この説明は「同じ反応でも条件によって進み方が変わることを比べる場面」と結び付きが強いです。
  「塩のイオンが水と反応して溶液の性質を変える現象である。」は、この説明は「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」と結び付きが強いです。
  「溶ける速さと析出する速さが等しくなっている平衡である。」が正しいです。この具体例を説明した文です。
