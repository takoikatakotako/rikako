# 化学基礎 問759
id: 1799
type: single_choice
text: |
  「物質の種類が変わらないこと」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "亜鉛と銅の反応を利用して電気を取り出す電池である。"
  - "物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
  - "多数の小さな単位がつながってできた大きな分子からなる化合物である。"
  - "二種類以上の物質が混ざってできている物質である。"
correct: 1
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「物質の種類が変わらないこと」という見方と最も関係が深い説明は「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」です。したがって、正解は「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」です。
  
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」は、その説明で大切なのは「化学エネルギーを電気エネルギーに変えること」という見方です。
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」が正しいです。この見方と最も関係が深い説明です。
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」は、その説明で大切なのは「小さな単位が多数つながっていること」という見方です。
  「二種類以上の物質が混ざってできている物質である。」は、その説明で大切なのは「成分が二種類以上まざっていること」という見方です。
