# 高校化学 問75
id: 2075
type: single_choice
text: |
  炎色反応についての説明として、最も適切なものはどれか。
choices:
  - "遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。"
  - "一度使い切ることを前提にした一次電池の代表例である。"
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
  - "リチウムイオンの移動を利用する充電式電池である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  炎色反応は、金属元素を炎に入れたときに特有の色を示す反応である。 したがって、正解は「金属元素を炎に入れたときに特有の色を示す反応である。」です。
  
  「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」は、鉄の説明です。
  「一度使い切ることを前提にした一次電池の代表例である。」は、乾電池の説明です。
  「金属元素を炎に入れたときに特有の色を示す反応である。」が正しいです。炎色反応の説明です。
  「リチウムイオンの移動を利用する充電式電池である。」は、リチウムイオン電池の説明です。
