# 高校化学 問893
id: 2893
type: single_choice
text: |
  「アミノ基とカルボキシ基をあわせもつ化合物である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "周囲から熱を受け取る反応であること"
  - "時間あたりにどれだけ変化するかを見ること"
  - "塩のイオンが水と反応すること"
  - "アミノ基とカルボキシ基をあわせもつこと"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「アミノ基とカルボキシ基をあわせもつ化合物である。」を理解する上では、「アミノ基とカルボキシ基をあわせもつこと」という見方が大切です。したがって、正解は「アミノ基とカルボキシ基をあわせもつこと」です。
  
  「周囲から熱を受け取る反応であること」は、その見方は吸熱反応に関係します。
  「時間あたりにどれだけ変化するかを見ること」は、その見方は反応速度に関係します。
  「塩のイオンが水と反応すること」は、その見方は塩の加水分解に関係します。
  「アミノ基とカルボキシ基をあわせもつこと」が正しいです。この説明と結び付きが強い見方です。
