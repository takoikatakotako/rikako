# 高校化学 問225
id: 2225
type: single_choice
text: |
  「溶液の沸点が純粋な溶媒より高くなる現象である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "緩衝液"
  - "弱酸"
  - "沸点上昇"
  - "酸解離定数"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  溶液の沸点が純粋な溶媒より高くなる現象である。 に当てはまる語は沸点上昇です。したがって、正解は「沸点上昇」です。
  
  「緩衝液」は、「少量の酸や塩基を加えても pH が変わりにくい溶液である。」に当てはまる語です。
  「弱酸」は、「水溶液中で一部だけ電離する酸である。」に当てはまる語です。
  「沸点上昇」が正しいです。「溶液の沸点が純粋な溶媒より高くなる現象である。」に当てはまる語です。
  「酸解離定数」は、「酸の電離のしやすさを表す定数である。」に当てはまる語です。
