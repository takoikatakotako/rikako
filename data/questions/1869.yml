# 化学基礎 問829
id: 1869
type: single_choice
text: |
  「1Lあたりの物質量で表すこと」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
  - "水分子や酸素分子を粒として考える場面"
  - "1Lの食塩水にどれだけ溶質が溶けているかを表す場面"
  - "水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
correct: 2
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「1Lあたりの物質量で表すこと」という見方と最も関係が深い場面は「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」です。したがって、正解は「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」です。
  
  「周期表で似た性質の元素が縦に並ぶことを見る場面」は、その場面で大切なのは「性質が周期的にくり返されること」という見方です。
  「水分子や酸素分子を粒として考える場面」は、その場面で大切なのは「物質の性質を示す小さな粒子として考えること」という見方です。
  「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」が正しいです。この見方と最も関係が深い場面です。
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」は、その場面で大切なのは「水酸化物イオンや水素イオンの受け取りに注目すること」という見方です。
