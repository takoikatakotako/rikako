# 令和7年度 ITパスポート 公開問題 問97
id: 378
type: single_choice
text: |
  情報セキュリティにおいて、可用性が損なわれた事象だけを全て挙げたものはどれか。
  a 関連取引先との電子決済システムがDoS攻撃を受け、処理ができなくなった。
  b 顧客情報管理システムの顧客情報が誤った内容のまま運用されていた。
  c社内のサーバに不正侵入されて、社外の情報が漏えいした。
choices:
  - "a"
  - "a,b"
  - "b,c"
  - "C"
correct: 0
explanation: |
  この問題の公開解答では「a」が正解とされています。
  
  「a」が公開解答で正解とされています。
  「a,b」は公開解答では正解ではありません。
  「b,c」は公開解答では正解ではありません。
  「C」は公開解答では正解ではありません。
