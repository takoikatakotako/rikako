# 高校化学 問60
id: 2060
type: single_choice
text: |
  水のイオン積についての説明として、最も適切なものはどれか。
choices:
  - "酸の電離のしやすさを表す定数である。"
  - "一度使い切ることを前提にした一次電池の代表例である。"
  - "リチウムイオンの移動を利用する充電式電池である。"
  - "水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  水のイオン積は、水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。 したがって、正解は「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」です。
  
  「酸の電離のしやすさを表す定数である。」は、酸解離定数の説明です。
  「一度使い切ることを前提にした一次電池の代表例である。」は、乾電池の説明です。
  「リチウムイオンの移動を利用する充電式電池である。」は、リチウムイオン電池の説明です。
  「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」が正しいです。水のイオン積の説明です。
