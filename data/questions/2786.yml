# 高校化学 問786
id: 2786
type: single_choice
text: |
  「カルボン酸とアルコールの組合せでできること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "共有結合の結晶"
  - "コロイド"
  - "発熱反応"
  - "エステル"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「カルボン酸とアルコールの組合せでできること」という見方が大切なのはエステルです。したがって、正解は「エステル」です。
  
  「共有結合の結晶」は、その語で大切なのは「共有結合が全体に広がること」という見方です。
  「コロイド」は、その語で大切なのは「小さな粒子が分散している状態であること」という見方です。
  「発熱反応」は、その語で大切なのは「周囲へ熱を出す反応であること」という見方です。
  「エステル」が正しいです。この見方が大切な語です。
