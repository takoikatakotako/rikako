# 令和7年度 ITパスポート 公開問題 問83
id: 17
type: single_choice
text: |
  ISMSの運用にPDCA モデルを採用している組織において、サーバ監視に関する次の作業を実施する。各作業とPDCA モデルの各フェーズの組合せとして、適切なものはどれか。
  
  〔作業〕
  （1） サーバ監視の具体的な目的及び手順を定める。
  （2） サーバ監視の作業内容を第三者が客観的に評価する。
  （3） 定められている手順に従ってサーバを監視する。
  （4） 発見された問題点の是正処置として、サーバの監視方法を変更する。
  
  P
  D
  C
  A
choices:
  - "（1） / （2） / （3） / （4）"
  - "（1） / （2） / （4） / （3）"
  - "（1） / （3） / （2） / （4）"
  - "（1） / （3） / （4） / （2）"
correct: 2
explanation: |
  この問題の公開解答では「（1） / （3） / （2） / （4）」が正解とされています。
  
  「（1） / （2） / （3） / （4）」は公開解答では正解ではありません。
  「（1） / （2） / （4） / （3）」は公開解答では正解ではありません。
  「（1） / （3） / （2） / （4）」が公開解答で正解とされています。
  「（1） / （3） / （4） / （2）」は公開解答では正解ではありません。
