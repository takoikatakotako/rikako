# 化学基礎 問402
id: 1442
type: single_choice
text: |
  「沸点の違いを利用して液体を分ける方法である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "蒸留"
  - "再結晶"
  - "純物質"
  - "単体"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  沸点の違いを利用して液体を分ける方法である。 に当てはまる語は蒸留です。したがって、正解は「蒸留」です。
  
  「蒸留」が正しいです。「沸点の違いを利用して液体を分ける方法である。」に当てはまる語です。
  「再結晶」は、「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」に当てはまる語です。
  「純物質」は、「一種類の物質だけからできていて、性質が一定である物質である。」に当てはまる語です。
  「単体」は、「一種類の元素だけからできている物質である。」に当てはまる語です。
