# 化学基礎 問642
id: 1682
type: single_choice
text: |
  「化学エネルギーを電気エネルギーに変えること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "単体"
  - "昇華"
  - "陰イオン"
  - "ダニエル電池"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「化学エネルギーを電気エネルギーに変えること」という見方が大切なのはダニエル電池です。したがって、正解は「ダニエル電池」です。
  
  「単体」は、その語で大切なのは「一種類の元素だけからできること」という見方です。
  「昇華」は、その語で大切なのは「固体から直接気体になること」という見方です。
  「陰イオン」は、その語で大切なのは「電子を受け取って負に帯電すること」という見方です。
  「ダニエル電池」が正しいです。この見方が大切な語です。
