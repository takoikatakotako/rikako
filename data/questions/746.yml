# 高校化学 問36
id: 746
type: single_choice
text: |
  エンタルピー変化についての説明として、最も適切なものはどれか。
choices:
  - "不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。"
  - "溶液の凝固点が純粋な溶媒より低くなる現象である。"
  - "溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。"
  - "一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  エンタルピー変化は、一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。 したがって、正解は「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」です。
  
  「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」は、蒸気圧降下の説明です。
  「溶液の凝固点が純粋な溶媒より低くなる現象である。」は、凝固点降下の説明です。
  「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」は、コロイドの説明です。
  「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」が正しいです。エンタルピー変化の説明です。
