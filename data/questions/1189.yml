# 化学基礎 問149
id: 1189
type: single_choice
text: |
  高分子化合物についての説明として、最も適切なものはどれか。
choices:
  - "多数の小さな単位がつながってできた大きな分子からなる化合物である。"
  - "化学で学んだ内容が、日常生活や社会を支える技術と結び付いていることを考える内容である。"
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "沸点の違いを利用して液体を分ける方法である。"
correct: 0
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  高分子化合物は、多数の小さな単位がつながってできた大きな分子からなる化合物である。したがって、正解は「多数の小さな単位がつながってできた大きな分子からなる化合物である。」です。
  
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」が正しいです。高分子化合物の説明です。
  「化学で学んだ内容が、日常生活や社会を支える技術と結び付いていることを考える内容である。」は、化学が拓く世界の説明です。
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、ろ過の説明です。
  「沸点の違いを利用して液体を分ける方法である。」は、蒸留の説明です。
