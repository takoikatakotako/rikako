# 化学基礎 問1
id: 668
type: single_choice
text: |
  食塩と砂が混ざった混合物から、食塩だけを取り出したい。最も適切な方法はどれか。
choices:
  - "磁石を近付けて、食塩だけを集める。"
  - "水に溶かしてろ過し、その後に水を蒸発させる。"
  - "そのまま加熱して、砂だけを気体にする。"
  - "冷やして、砂だけを液体にする。"
correct: 1
explanation: |
  この問題は、「混合物の中で、どちらが水に溶けるか」を考える問題です。
  
  食塩は水に溶けますが、砂は水に溶けません。そこで、まず水に溶かしてからろ過すると、砂を取り除けます。その後、水を蒸発させれば食塩を取り出せます。したがって、正解は「水に溶かしてろ過し、その後に水を蒸発させる」です。
  
  「磁石を近付けて、食塩だけを集める」は、食塩が磁石に引き付けられないので適切ではありません。
  「水に溶かしてろ過し、その後に水を蒸発させる」が正しいです。食塩は水に溶け、砂は水に溶けないことを利用します。
  「そのまま加熱して、砂だけを気体にする」は、砂をそのように簡単に気体にすることはできません。
  「冷やして、砂だけを液体にする」は、砂だけをそのように液体にすることはできません。
