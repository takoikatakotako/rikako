# 化学基礎 問816
id: 1856
type: single_choice
text: |
  「陽子数と中性子数の合計であること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸素だけが入った容器を考える場面"
  - "炭素12で陽子数と中性子数の合計を見る場面"
  - "ぬれた床の水がしだいに乾く場面"
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
correct: 1
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「陽子数と中性子数の合計であること」という見方と最も関係が深い場面は「炭素12で陽子数と中性子数の合計を見る場面」です。したがって、正解は「炭素12で陽子数と中性子数の合計を見る場面」です。
  
  「酸素だけが入った容器を考える場面」は、その場面で大切なのは「成分が一種類で性質が一定であること」という見方です。
  「炭素12で陽子数と中性子数の合計を見る場面」が正しいです。この見方と最も関係が深い場面です。
  「ぬれた床の水がしだいに乾く場面」は、その場面で大切なのは「液体から気体への変化であること」という見方です。
  「ナトリウムが電子を1個失いやすい理由を考える場面」は、その場面で大切なのは「化学結合やイオンのできやすさに関係すること」という見方です。
