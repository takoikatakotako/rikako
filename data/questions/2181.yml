# 高校化学 問181
id: 2181
type: single_choice
text: |
  置換反応と最も関係が深い場面として、適切なものはどれか。
choices:
  - "フッ素や塩素、臭素の反応性を比べる場面"
  - "メタンの水素が塩素に置き換わる場面"
  - "酸化アルミニウムが酸にも塩基にも溶ける場面"
  - "アンモニアが金属イオンに電子対を与える場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  メタンの水素が塩素に置き換わる場面は、置換反応と結び付きが強い場面です。したがって、正解は「メタンの水素が塩素に置き換わる場面」です。
  
  「フッ素や塩素、臭素の反応性を比べる場面」は、ハロゲンと結び付きが強い場面です。
  「メタンの水素が塩素に置き換わる場面」が正しいです。これは置換反応と結び付きが強い場面です。
  「酸化アルミニウムが酸にも塩基にも溶ける場面」は、両性酸化物と結び付きが強い場面です。
  「アンモニアが金属イオンに電子対を与える場面」は、配位結合と結び付きが強い場面です。
