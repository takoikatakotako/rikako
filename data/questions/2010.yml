# 化学基礎 問970
id: 2010
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "陽イオン / 電子を失って正に帯電すること"
  - "酸 / 酸素の喪失や電子の受け取りに注目すること"
  - "還元 / 水溶液でも電流をほとんど通さないこと"
  - "非電解質 / 水素イオンに注目すること"
correct: 0
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「陽イオン / 電子を失って正に帯電すること」です。したがって、正解は「陽イオン / 電子を失って正に帯電すること」です。
  
  「陽イオン / 電子を失って正に帯電すること」が正しいです。用語と要点の対応が合っています。
  「酸 / 酸素の喪失や電子の受け取りに注目すること」は、用語と要点の対応が合っていません。
  「還元 / 水溶液でも電流をほとんど通さないこと」は、用語と要点の対応が合っていません。
  「非電解質 / 水素イオンに注目すること」は、用語と要点の対応が合っていません。
