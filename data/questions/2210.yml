# 高校化学 問210
id: 2210
type: single_choice
text: |
  「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "蒸気圧降下"
  - "凝固点降下"
  - "コロイド"
  - "理想気体の状態方程式"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。 に当てはまる語は理想気体の状態方程式です。したがって、正解は「理想気体の状態方程式」です。
  
  「蒸気圧降下」は、「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」に当てはまる語です。
  「凝固点降下」は、「溶液の凝固点が純粋な溶媒より低くなる現象である。」に当てはまる語です。
  「コロイド」は、「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」に当てはまる語です。
  「理想気体の状態方程式」が正しいです。「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」に当てはまる語です。
