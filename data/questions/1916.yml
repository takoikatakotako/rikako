# 化学基礎 問876
id: 1916
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "極性分子 / 分子の中で電荷のかたよりがある分子である。"
  - "陰イオン / 粒子の数をまとめて表すための単位である。"
  - "モル / 溶けた物質のうち、電離してイオンになった割合である。"
  - "電離度 / 原子や原子団が電子を受け取って負の電荷をもつ粒子である。"
correct: 0
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「極性分子 / 分子の中で電荷のかたよりがある分子である。」です。したがって、正解は「極性分子 / 分子の中で電荷のかたよりがある分子である。」です。
  
  「極性分子 / 分子の中で電荷のかたよりがある分子である。」が正しいです。用語と説明の対応が合っています。
  「陰イオン / 粒子の数をまとめて表すための単位である。」は、用語と説明の対応が合っていません。
  「モル / 溶けた物質のうち、電離してイオンになった割合である。」は、用語と説明の対応が合っていません。
  「電離度 / 原子や原子団が電子を受け取って負の電荷をもつ粒子である。」は、用語と説明の対応が合っていません。
