# 高校化学 問139
id: 2139
type: single_choice
text: |
  発熱反応と最も関係が深い場面として、適切なものはどれか。
choices:
  - "金属や硫黄のコロイドが電解質で沈みやすい場面"
  - "反応前後で熱の出入りを比較する場面"
  - "どの結合が切れやすいかを比べる場面"
  - "燃焼や中和で容器が温かくなる場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  燃焼や中和で容器が温かくなる場面は、発熱反応と結び付きが強い場面です。したがって、正解は「燃焼や中和で容器が温かくなる場面」です。
  
  「金属や硫黄のコロイドが電解質で沈みやすい場面」は、疎水コロイドと結び付きが強い場面です。
  「反応前後で熱の出入りを比較する場面」は、エンタルピー変化と結び付きが強い場面です。
  「どの結合が切れやすいかを比べる場面」は、結合エネルギーと結び付きが強い場面です。
  「燃焼や中和で容器が温かくなる場面」が正しいです。これは発熱反応と結び付きが強い場面です。
