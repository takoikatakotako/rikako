# 化学基礎 問909
id: 1949
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "物理変化 / 氷が溶けて水になる場面"
  - "昇華 / 塩素原子が電子を1個受け取って Cl- になる場面"
  - "陰イオン / 6.0×10^23個の粒子をひとまとまりとして数える場面"
  - "モル / ドライアイスがそのまま気体になる場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「物理変化 / 氷が溶けて水になる場面」です。したがって、正解は「物理変化 / 氷が溶けて水になる場面」です。
  
  「物理変化 / 氷が溶けて水になる場面」が正しいです。用語と場面の対応が合っています。
  「昇華 / 塩素原子が電子を1個受け取って Cl- になる場面」は、用語と場面の対応が合っていません。
  「陰イオン / 6.0×10^23個の粒子をひとまとまりとして数える場面」は、用語と場面の対応が合っていません。
  「モル / ドライアイスがそのまま気体になる場面」は、用語と場面の対応が合っていません。
