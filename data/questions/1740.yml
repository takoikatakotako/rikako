# 化学基礎 問700
id: 1740
type: single_choice
text: |
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "化学が社会や生活に広く役立つこと"
  - "電子を受け取って負に帯電すること"
  - "粒子の数をまとめて扱う単位であること"
  - "どのくらいイオンに分かれるかを表すこと"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」を理解する上では、「化学が社会や生活に広く役立つこと」という見方が大切です。したがって、正解は「化学が社会や生活に広く役立つこと」です。
  
  「化学が社会や生活に広く役立つこと」が正しいです。この説明と結び付きが強い見方です。
  「電子を受け取って負に帯電すること」は、その見方は陰イオンに関係します。
  「粒子の数をまとめて扱う単位であること」は、その見方はモルに関係します。
  「どのくらいイオンに分かれるかを表すこと」は、その見方は電離度に関係します。
