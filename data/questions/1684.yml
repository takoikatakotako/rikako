# 化学基礎 問644
id: 1684
type: single_choice
text: |
  「水溶液や融解状態で電流を通すこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "物理変化"
  - "電解質"
  - "質量数"
  - "共有結合"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「水溶液や融解状態で電流を通すこと」という見方が大切なのは電解質です。したがって、正解は「電解質」です。
  
  「物理変化」は、その語で大切なのは「物質の種類が変わらないこと」という見方です。
  「電解質」が正しいです。この見方が大切な語です。
  「質量数」は、その語で大切なのは「陽子数と中性子数の合計であること」という見方です。
  「共有結合」は、その語で大切なのは「電子を共有して結び付くこと」という見方です。
