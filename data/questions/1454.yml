# 化学基礎 問414
id: 1454
type: single_choice
text: |
  「固体が液体にならずに気体になる状態変化である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "昇華"
  - "化学変化"
  - "質量数"
  - "周期律"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  固体が液体にならずに気体になる状態変化である。 に当てはまる語は昇華です。したがって、正解は「昇華」です。
  
  「昇華」が正しいです。「固体が液体にならずに気体になる状態変化である。」に当てはまる語です。
  「化学変化」は、「もとの物質とは別の物質ができる変化である。」に当てはまる語です。
  「質量数」は、「原子核の中にある陽子数と中性子数の合計である。」に当てはまる語です。
  「周期律」は、「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」に当てはまる語です。
