# 高校化学 問872
id: 2872
type: single_choice
text: |
  「中心となる金属イオンに配位子が結び付いたイオンである。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "粒子配列が不規則であること"
  - "粒子が周囲の分子にぶつかって動くこと"
  - "金属イオンと配位子の組合せに注目すること"
  - "化学反応のエネルギーが光として出ること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「中心となる金属イオンに配位子が結び付いたイオンである。」を理解する上では、「金属イオンと配位子の組合せに注目すること」という見方が大切です。したがって、正解は「金属イオンと配位子の組合せに注目すること」です。
  
  「粒子配列が不規則であること」は、その見方はアモルファスに関係します。
  「粒子が周囲の分子にぶつかって動くこと」は、その見方はブラウン運動に関係します。
  「金属イオンと配位子の組合せに注目すること」が正しいです。この説明と結び付きが強い見方です。
  「化学反応のエネルギーが光として出ること」は、その見方は化学発光に関係します。
