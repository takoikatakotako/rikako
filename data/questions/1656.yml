# 化学基礎 問616
id: 1656
type: single_choice
text: |
  「陽子数と中性子数の合計であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "酸"
  - "質量数"
  - "還元"
  - "非電解質"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「陽子数と中性子数の合計であること」という見方が大切なのは質量数です。したがって、正解は「質量数」です。
  
  「酸」は、その語で大切なのは「水素イオンに注目すること」という見方です。
  「質量数」が正しいです。この見方が大切な語です。
  「還元」は、その語で大切なのは「酸素の喪失や電子の受け取りに注目すること」という見方です。
  「非電解質」は、その語で大切なのは「水溶液でも電流をほとんど通さないこと」という見方です。
