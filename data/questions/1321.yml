# 化学基礎 問281
id: 1321
type: single_choice
text: |
  酸の特徴として、最も適切なものはどれか。
choices:
  - "水酸化物イオンを生じるか水素イオンを受け取る"
  - "水素イオンを生じる"
  - "酸と塩基が反応して塩と水ができる"
  - "酸性やアルカリ性の強さの目安"
correct: 1
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  酸では、「水素イオンを生じる」という点が大切です。したがって、正解は「水素イオンを生じる」です。
  
  「水酸化物イオンを生じるか水素イオンを受け取る」は、塩基に関係する特徴です。
  「水素イオンを生じる」が正しいです。酸の特徴を表しています。
  「酸と塩基が反応して塩と水ができる」は、中和に関係する特徴です。
  「酸性やアルカリ性の強さの目安」は、pHに関係する特徴です。
