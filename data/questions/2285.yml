# 高校化学 問285
id: 2285
type: single_choice
text: |
  「カルボキシ基をもち、酸性を示す有機化合物である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "資源の再利用"
  - "飽和炭化水素"
  - "カルボン酸"
  - "付加反応"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  カルボキシ基をもち、酸性を示す有機化合物である。 に当てはまる語はカルボン酸です。したがって、正解は「カルボン酸」です。
  
  「資源の再利用」は、「使い終わった資源や製品を回収し、再び利用する考え方である。」に当てはまる語です。
  「飽和炭化水素」は、「炭素どうしが単結合だけでつながった炭化水素である。」に当てはまる語です。
  「カルボン酸」が正しいです。「カルボキシ基をもち、酸性を示す有機化合物である。」に当てはまる語です。
  「付加反応」は、「多重結合に原子や原子団が加わる反応である。」に当てはまる語です。
