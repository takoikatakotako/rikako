# 化学基礎 問139
id: 1179
type: single_choice
text: |
  イオン化傾向についての説明として、最も適切なものはどれか。
choices:
  - "亜鉛と銅を用いて化学エネルギーを電気エネルギーに変える電池である。"
  - "電池で二つの水溶液の電気的なつり合いを保つために入れる部分である。"
  - "金属が電子を失って陽イオンになりやすい性質の強さを表す。"
  - "水に溶けたり融解したりすると電気を通す物質である。"
correct: 2
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  イオン化傾向は、金属が電子を失って陽イオンになりやすい性質の強さを表す。したがって、正解は「金属が電子を失って陽イオンになりやすい性質の強さを表す。」です。
  
  「亜鉛と銅を用いて化学エネルギーを電気エネルギーに変える電池である。」は、ダニエル電池の説明です。
  「電池で二つの水溶液の電気的なつり合いを保つために入れる部分である。」は、塩橋の説明です。
  「金属が電子を失って陽イオンになりやすい性質の強さを表す。」が正しいです。イオン化傾向の説明です。
  「水に溶けたり融解したりすると電気を通す物質である。」は、電解質の説明です。
