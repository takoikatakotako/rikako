# 高校化学 問833
id: 2833
type: single_choice
text: |
  「水との親和性が高く、比較的安定なコロイドである。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "二重結合や三重結合に何かが加わること"
  - "ポリエステルの一種で再利用もしやすいこと"
  - "固体と液体の境目の温度に注目すること"
  - "水となじみやすく安定しやすいこと"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「水との親和性が高く、比較的安定なコロイドである。」を理解する上では、「水となじみやすく安定しやすいこと」という見方が大切です。したがって、正解は「水となじみやすく安定しやすいこと」です。
  
  「二重結合や三重結合に何かが加わること」は、その見方は付加反応に関係します。
  「ポリエステルの一種で再利用もしやすいこと」は、その見方はPETに関係します。
  「固体と液体の境目の温度に注目すること」は、その見方は融点に関係します。
  「水となじみやすく安定しやすいこと」が正しいです。この説明と結び付きが強い見方です。
