# 高校化学 問785
id: 2785
type: single_choice
text: |
  「カルボキシ基をもち酸性を示すこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "分子結晶"
  - "浸透圧"
  - "カルボン酸"
  - "結合エネルギー"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「カルボキシ基をもち酸性を示すこと」という見方が大切なのはカルボン酸です。したがって、正解は「カルボン酸」です。
  
  「分子結晶」は、その語で大切なのは「分子間力で集まった結晶であること」という見方です。
  「浸透圧」は、その語で大切なのは「半透膜を通る溶媒の移動に注目すること」という見方です。
  「カルボン酸」が正しいです。この見方が大切な語です。
  「結合エネルギー」は、その語で大切なのは「結合を切るのに必要なエネルギーに注目すること」という見方です。
