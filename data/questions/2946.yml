# 高校化学 問946
id: 2946
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "気液平衡 / ドライアイスやヨウ素の結晶を考える場面"
  - "燃料電池 / 水素を使って発電し、水を生じる仕組みを考える場面"
  - "分子結晶 / 薄い溶液側から濃い溶液側へ水が移動する場面"
  - "浸透圧 / 密閉容器で水面の高さが変わらなくなる場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「燃料電池 / 水素を使って発電し、水を生じる仕組みを考える場面」です。したがって、正解は「燃料電池 / 水素を使って発電し、水を生じる仕組みを考える場面」です。
  
  「気液平衡 / ドライアイスやヨウ素の結晶を考える場面」は、用語と場面の対応が合っていません。
  「燃料電池 / 水素を使って発電し、水を生じる仕組みを考える場面」が正しいです。用語と場面の対応が合っています。
  「分子結晶 / 薄い溶液側から濃い溶液側へ水が移動する場面」は、用語と場面の対応が合っていません。
  「浸透圧 / 密閉容器で水面の高さが変わらなくなる場面」は、用語と場面の対応が合っていません。
