# 高校化学 問811
id: 2811
type: single_choice
text: |
  「混合気体の全圧は各気体の分圧の和になるという法則である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "条件を工夫して平衡を生成物側へ寄せること"
  - "混ざった気体の圧力を足し合わせて考えること"
  - "非金属で酸化力が強いこと"
  - "二重結合や三重結合に何かが加わること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「混合気体の全圧は各気体の分圧の和になるという法則である。」を理解する上では、「混ざった気体の圧力を足し合わせて考えること」という見方が大切です。したがって、正解は「混ざった気体の圧力を足し合わせて考えること」です。
  
  「条件を工夫して平衡を生成物側へ寄せること」は、その見方はアンモニア合成に関係します。
  「混ざった気体の圧力を足し合わせて考えること」が正しいです。この説明と結び付きが強い見方です。
  「非金属で酸化力が強いこと」は、その見方はハロゲンに関係します。
  「二重結合や三重結合に何かが加わること」は、その見方は付加反応に関係します。
