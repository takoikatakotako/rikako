# 高校化学 問411
id: 2411
type: single_choice
text: |
  分圧の法則を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "固体と液体の境目の温度に注目すること"
  - "液体から出た蒸気が示す圧力に注目すること"
  - "混ざった気体の圧力を足し合わせて考えること"
  - "状態変化に必要な熱に注目すること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  分圧の法則では、「混ざった気体の圧力を足し合わせて考えること」という見方が大切です。したがって、正解は「混ざった気体の圧力を足し合わせて考えること」です。
  
  「固体と液体の境目の温度に注目すること」は、融点に関係する見方です。
  「液体から出た蒸気が示す圧力に注目すること」は、蒸気圧に関係する見方です。
  「混ざった気体の圧力を足し合わせて考えること」が正しいです。分圧の法則の要点を表しています。
  「状態変化に必要な熱に注目すること」は、融解熱に関係する見方です。
