# 化学基礎 問657
id: 1697
type: single_choice
text: |
  「一種類の元素だけからできている物質である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "粒子の数をまとめて扱う単位であること"
  - "一種類の元素だけからできること"
  - "どのくらいイオンに分かれるかを表すこと"
  - "化学エネルギーを電気エネルギーに変えること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「一種類の元素だけからできている物質である。」を理解する上では、「一種類の元素だけからできること」という見方が大切です。したがって、正解は「一種類の元素だけからできること」です。
  
  「粒子の数をまとめて扱う単位であること」は、その見方はモルに関係します。
  「一種類の元素だけからできること」が正しいです。この説明と結び付きが強い見方です。
  「どのくらいイオンに分かれるかを表すこと」は、その見方は電離度に関係します。
  「化学エネルギーを電気エネルギーに変えること」は、その見方はダニエル電池に関係します。
