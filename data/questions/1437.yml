# 化学基礎 問397
id: 1437
type: single_choice
text: |
  炎色反応と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムで黄色、銅で青緑色を観察する場面"
  - "食品の変色や劣化を防ぐためにビタミンCを使う場面"
  - "電池、医薬品、素材開発などに化学が生かされる場面"
  - "酸化銅から酸素が取れて銅になる場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  ナトリウムで黄色、銅で青緑色を観察する場面は、炎色反応と結び付きが強い場面です。したがって、正解は「ナトリウムで黄色、銅で青緑色を観察する場面」です。
  
  「ナトリウムで黄色、銅で青緑色を観察する場面」が正しいです。これは炎色反応と結び付きが強い場面です。
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」は、酸化防止剤と結び付きが強い場面です。
  「電池、医薬品、素材開発などに化学が生かされる場面」は、化学が拓く世界と結び付きが強い場面です。
  「酸化銅から酸素が取れて銅になる場面」は、還元と結び付きが強い場面です。
