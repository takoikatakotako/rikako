# 化学基礎 問983
id: 2023
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "電解質 / 水に溶けない固体を液体から分けること"
  - "中和 / 酸と塩基が打ち消し合うこと"
  - "ろ過 / 複数の元素が結び付いてできること"
  - "化合物 / 水溶液や融解状態で電流を通すこと"
correct: 1
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「中和 / 酸と塩基が打ち消し合うこと」です。したがって、正解は「中和 / 酸と塩基が打ち消し合うこと」です。
  
  「電解質 / 水に溶けない固体を液体から分けること」は、用語と要点の対応が合っていません。
  「中和 / 酸と塩基が打ち消し合うこと」が正しいです。用語と要点の対応が合っています。
  「ろ過 / 複数の元素が結び付いてできること」は、用語と要点の対応が合っていません。
  「化合物 / 水溶液や融解状態で電流を通すこと」は、用語と要点の対応が合っていません。
