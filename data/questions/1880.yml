# 化学基礎 問840
id: 1880
type: single_choice
text: |
  「相手を還元させ、自分は酸化されること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "1Lの食塩水にどれだけ溶質が溶けているかを表す場面"
  - "水素や炭素が相手から酸素を奪う場面"
  - "BTB溶液やフェノールフタレインで液性を調べる場面"
  - "ダニエル電池で二つの水溶液をつなぐ場面"
correct: 1
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「相手を還元させ、自分は酸化されること」という見方と最も関係が深い場面は「水素や炭素が相手から酸素を奪う場面」です。したがって、正解は「水素や炭素が相手から酸素を奪う場面」です。
  
  「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」は、その場面で大切なのは「1Lあたりの物質量で表すこと」という見方です。
  「水素や炭素が相手から酸素を奪う場面」が正しいです。この見方と最も関係が深い場面です。
  「BTB溶液やフェノールフタレインで液性を調べる場面」は、その場面で大切なのは「色の変化で液性を見分けること」という見方です。
  「ダニエル電池で二つの水溶液をつなぐ場面」は、その場面で大切なのは「電池の中で電気的なつり合いを保つこと」という見方です。
