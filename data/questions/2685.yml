# 高校化学 問685
id: 2685
type: single_choice
text: |
  「酢酸の性質やにおいを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "固体と液体が平衡で共存するときの温度である。"
  - "カルボキシ基をもち、酸性を示す有機化合物である。"
  - "絶対零度を基準にした温度で、単位は K で表す。"
  - "不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「酢酸の性質やにおいを考える場面」を説明した文として適切なのは「カルボキシ基をもち、酸性を示す有機化合物である。」です。したがって、正解は「カルボキシ基をもち、酸性を示す有機化合物である。」です。
  
  「固体と液体が平衡で共存するときの温度である。」は、この説明は「氷が溶け始める温度を考える場面」と結び付きが強いです。
  「カルボキシ基をもち、酸性を示す有機化合物である。」が正しいです。この具体例を説明した文です。
  「絶対零度を基準にした温度で、単位は K で表す。」は、この説明は「気体の法則で温度をセルシウス温度ではなく K で扱う場面」と結び付きが強いです。
  「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」は、この説明は「食塩水が純水より蒸発しにくくなることを考える場面」と結び付きが強いです。
