# 化学基礎 問315
id: 1355
type: single_choice
text: |
  原子番号について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "一種類の元素だけからできている物質である。"
  - "物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
  - "粒子の数をまとめて表すための単位である。"
  - "原子核の中にある陽子の数を表す数である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  原子番号は、原子核の中にある陽子の数を表す数である。 したがって、正解は「原子核の中にある陽子の数を表す数である。」です。
  
  「一種類の元素だけからできている物質である。」は、単体の説明です。
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」は、物理変化の説明です。
  「粒子の数をまとめて表すための単位である。」は、モルの説明です。
  「原子核の中にある陽子の数を表す数である。」が正しいです。原子番号の説明です。
