# 令和6年度 ITパスポート 公開問題 問47
id: 1027
type: single_choice
text: |
  ソフトウェアの開発におけるDevOpsに関する記述として、最も適切なものはどれか。
choices:
  - "開発側が重要な機能のプロトタイプを作成し、顧客とともにその性能を実測して妥当性を評価する。"
  - "開発側では、開発の各工程でその工程の完了を判定した上で次工程に進み、結合テストで利用者が参加して操作性の確認を実施した後に運用側に引き渡す。"
  - "開発側と運用側が密接に連携し、自動化ツールなどを活用して新しい機能の導入や更新などを迅速に進める。"
  - "システム開発において、機能の拡張を図るために、固定された短期間のサイクルを繰り返しながらプログラムを順次追加する。"
correct: 1
