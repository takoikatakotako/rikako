# 化学基礎 問834
id: 1874
type: single_choice
text: |
  「酸性と塩基性の強さを数で見ること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水素原子どうしが電子を共有して H2 になる場面"
  - "水素と酸素から水ができる反応を式で表す場面"
  - "マグネシウムが酸素と結び付く場面"
  - "レモン水とせっけん水の酸性・塩基性を比べる場面"
correct: 3
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「酸性と塩基性の強さを数で見ること」という見方と最も関係が深い場面は「レモン水とせっけん水の酸性・塩基性を比べる場面」です。したがって、正解は「レモン水とせっけん水の酸性・塩基性を比べる場面」です。
  
  「水素原子どうしが電子を共有して H2 になる場面」は、その場面で大切なのは「電子を共有して結び付くこと」という見方です。
  「水素と酸素から水ができる反応を式で表す場面」は、その場面で大切なのは「反応する物質とできる物質の関係を式で示すこと」という見方です。
  「マグネシウムが酸素と結び付く場面」は、その場面で大切なのは「酸素との結び付きや電子の放出に注目すること」という見方です。
  「レモン水とせっけん水の酸性・塩基性を比べる場面」が正しいです。この見方と最も関係が深い場面です。
