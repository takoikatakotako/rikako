# 高校化学 問711
id: 2711
type: single_choice
text: |
  「混ざった気体の圧力を足し合わせて考えること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "分圧の法則"
  - "光合成"
  - "触媒"
  - "弱塩基"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「混ざった気体の圧力を足し合わせて考えること」という見方が大切なのは分圧の法則です。したがって、正解は「分圧の法則」です。
  
  「分圧の法則」が正しいです。この見方が大切な語です。
  「光合成」は、その語で大切なのは「光エネルギーを化学エネルギーに変えること」という見方です。
  「触媒」は、その語で大切なのは「反応を速めても自分は使い切られないこと」という見方です。
  「弱塩基」は、その語で大切なのは「電離が部分的に起こること」という見方です。
