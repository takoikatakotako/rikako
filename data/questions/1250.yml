# 化学基礎 問210
id: 1250
type: single_choice
text: |
  「鉄がさびる変化」に最も関係が深い語として、適切なものはどれか。
choices:
  - "融解"
  - "蒸発"
  - "凝固"
  - "化学変化"
correct: 3
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「鉄がさびる変化」に最も関係が深いのは化学変化です。したがって、正解は「化学変化」です。
  
  「融解」は、この例に最も関係が深い語ではありません。
  「蒸発」は、この例に最も関係が深い語ではありません。
  「凝固」は、この例に最も関係が深い語ではありません。
  「化学変化」が正しいです。この例は化学変化に関係しています。
