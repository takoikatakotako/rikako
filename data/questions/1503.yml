# 化学基礎 問463
id: 1503
type: single_choice
text: |
  凝固を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "液体から固体への変化であること"
  - "化学結合やイオンのできやすさに関係すること"
  - "沸点の違いを利用すること"
  - "移動しやすさの違いを利用すること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  凝固では、「液体から固体への変化であること」という見方が大切です。したがって、正解は「液体から固体への変化であること」です。
  
  「液体から固体への変化であること」が正しいです。凝固の要点を表しています。
  「化学結合やイオンのできやすさに関係すること」は、最外殻電子に関係する見方です。
  「沸点の違いを利用すること」は、蒸留に関係する見方です。
  「移動しやすさの違いを利用すること」は、クロマトグラフィーに関係する見方です。
