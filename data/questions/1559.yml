# 化学基礎 問519
id: 1559
type: single_choice
text: |
  「原子のいちばん外側の電子殻にある電子である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "塩化ナトリウムが陽イオンと陰イオンの引力でできる場面"
  - "1Lの食塩水にどれだけ溶質が溶けているかを表す場面"
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
  - "BTB溶液やフェノールフタレインで液性を調べる場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「原子のいちばん外側の電子殻にある電子である。」と最も関係が深い場面は「ナトリウムが電子を1個失いやすい理由を考える場面」です。したがって、正解は「ナトリウムが電子を1個失いやすい理由を考える場面」です。
  
  「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」は、「陽イオンと陰イオンの静電気的な引力による結び付きである。」と結び付きが強い場面です。
  「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」は、「溶液1L中に溶けている溶質の物質量を表した濃度である。」と結び付きが強い場面です。
  「ナトリウムが電子を1個失いやすい理由を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「BTB溶液やフェノールフタレインで液性を調べる場面」は、「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」と結び付きが強い場面です。
