# 化学基礎 問875
id: 1915
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "陽イオン / 分子の中で電荷のかたよりがほとんどない分子である。"
  - "無極性分子 / 水溶液の酸性や塩基性の強さを表す尺度である。"
  - "pH / 原子や原子団が電子を失って正の電荷をもつ粒子である。"
  - "分子 / 原子が結び付いてできた、物質の性質を示す小さな粒子である。"
correct: 3
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「分子 / 原子が結び付いてできた、物質の性質を示す小さな粒子である。」です。したがって、正解は「分子 / 原子が結び付いてできた、物質の性質を示す小さな粒子である。」です。
  
  「陽イオン / 分子の中で電荷のかたよりがほとんどない分子である。」は、用語と説明の対応が合っていません。
  「無極性分子 / 水溶液の酸性や塩基性の強さを表す尺度である。」は、用語と説明の対応が合っていません。
  「pH / 原子や原子団が電子を失って正の電荷をもつ粒子である。」は、用語と説明の対応が合っていません。
  「分子 / 原子が結び付いてできた、物質の性質を示す小さな粒子である。」が正しいです。用語と説明の対応が合っています。
