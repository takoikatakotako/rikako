# 化学基礎 問557
id: 1597
type: single_choice
text: |
  「鉄や酸素のように一種類の元素だけからできた物質を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "原子核の中にある陽子数と中性子数の合計である。"
  - "原子どうしが電子を共有してできる結び付きである。"
  - "化学変化を、物質の種類と量の関係が分かるように表した式である。"
  - "一種類の元素だけからできている物質である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「鉄や酸素のように一種類の元素だけからできた物質を考える場面」を説明した文として適切なのは「一種類の元素だけからできている物質である。」です。したがって、正解は「一種類の元素だけからできている物質である。」です。
  
  「原子核の中にある陽子数と中性子数の合計である。」は、この説明は「炭素12で陽子数と中性子数の合計を見る場面」と結び付きが強いです。
  「原子どうしが電子を共有してできる結び付きである。」は、この説明は「水素原子どうしが電子を共有して H2 になる場面」と結び付きが強いです。
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」は、この説明は「水素と酸素から水ができる反応を式で表す場面」と結び付きが強いです。
  「一種類の元素だけからできている物質である。」が正しいです。この具体例を説明した文です。
