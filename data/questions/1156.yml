# 化学基礎 問116
id: 1156
type: single_choice
text: |
  質量数についての説明として、最も適切なものはどれか。
choices:
  - "陽子の数が同じで、中性子の数が異なる原子どうしである。"
  - "元素の性質が周期表の並びに応じて規則的に変化することをいう。"
  - "原子のいちばん外側の電子殻にある電子で、化学的な性質に強く関わる。"
  - "原子核にある陽子の数と中性子の数の合計を表す。"
correct: 3
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  質量数は、原子核にある陽子の数と中性子の数の合計を表す。したがって、正解は「原子核にある陽子の数と中性子の数の合計を表す。」です。
  
  「陽子の数が同じで、中性子の数が異なる原子どうしである。」は、同位体の説明です。
  「元素の性質が周期表の並びに応じて規則的に変化することをいう。」は、周期律の説明です。
  「原子のいちばん外側の電子殻にある電子で、化学的な性質に強く関わる。」は、最外殻電子の説明です。
  「原子核にある陽子の数と中性子の数の合計を表す。」が正しいです。質量数の説明です。
