# 化学基礎 問589
id: 1629
type: single_choice
text: |
  「酸素や過酸化水素が相手を酸化させる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "食品や物質が酸化して変質するのを防ぐために用いられる物質である。"
  - "一種類の物質だけからできていて、性質が一定である物質である。"
  - "液体が気体になる状態変化である。"
  - "相手を酸化させ、自身は還元される物質である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「酸素や過酸化水素が相手を酸化させる場面」を説明した文として適切なのは「相手を酸化させ、自身は還元される物質である。」です。したがって、正解は「相手を酸化させ、自身は還元される物質である。」です。
  
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」は、この説明は「食品の変色や劣化を防ぐためにビタミンCを使う場面」と結び付きが強いです。
  「一種類の物質だけからできていて、性質が一定である物質である。」は、この説明は「酸素だけが入った容器を考える場面」と結び付きが強いです。
  「液体が気体になる状態変化である。」は、この説明は「ぬれた床の水がしだいに乾く場面」と結び付きが強いです。
  「相手を酸化させ、自身は還元される物質である。」が正しいです。この具体例を説明した文です。
