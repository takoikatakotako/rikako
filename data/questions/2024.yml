# 化学基礎 問984
id: 2024
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "非電解質 / 沸点の違いを利用すること"
  - "蒸留 / 物質の種類が変わらないこと"
  - "pH / 酸性と塩基性の強さを数で見ること"
  - "物理変化 / 水溶液でも電流をほとんど通さないこと"
correct: 2
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「pH / 酸性と塩基性の強さを数で見ること」です。したがって、正解は「pH / 酸性と塩基性の強さを数で見ること」です。
  
  「非電解質 / 沸点の違いを利用すること」は、用語と要点の対応が合っていません。
  「蒸留 / 物質の種類が変わらないこと」は、用語と要点の対応が合っていません。
  「pH / 酸性と塩基性の強さを数で見ること」が正しいです。用語と要点の対応が合っています。
  「物理変化 / 水溶液でも電流をほとんど通さないこと」は、用語と要点の対応が合っていません。
