# 化学基礎 問143
id: 1183
type: single_choice
text: |
  非電解質についての説明として、最も適切なものはどれか。
choices:
  - "放射線を出す同位体で、年代測定や医療などに利用される。"
  - "金属元素を含む物質を炎に入れたときに特有の色を示す反応である。"
  - "水に溶けてもほとんど電気を通さない物質である。"
  - "溶けた物質のうち、電離した割合を表す。"
correct: 2
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  非電解質は、水に溶けてもほとんど電気を通さない物質である。したがって、正解は「水に溶けてもほとんど電気を通さない物質である。」です。
  
  「放射線を出す同位体で、年代測定や医療などに利用される。」は、放射性同位体の説明です。
  「金属元素を含む物質を炎に入れたときに特有の色を示す反応である。」は、炎色反応の説明です。
  「水に溶けてもほとんど電気を通さない物質である。」が正しいです。非電解質の説明です。
  「溶けた物質のうち、電離した割合を表す。」は、電離度の説明です。
