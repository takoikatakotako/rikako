# 化学基礎 問671
id: 1711
type: single_choice
text: |
  「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "化学エネルギーを電気エネルギーに変えること"
  - "小さな単位が多数つながっていること"
  - "成分が二種類以上まざっていること"
  - "電子を受け取って負に帯電すること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」を理解する上では、「電子を受け取って負に帯電すること」という見方が大切です。したがって、正解は「電子を受け取って負に帯電すること」です。
  
  「化学エネルギーを電気エネルギーに変えること」は、その見方はダニエル電池に関係します。
  「小さな単位が多数つながっていること」は、その見方は高分子化合物に関係します。
  「成分が二種類以上まざっていること」は、その見方は混合物に関係します。
  「電子を受け取って負に帯電すること」が正しいです。この説明と結び付きが強い見方です。
