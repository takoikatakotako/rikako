# 高校化学 問435
id: 2435
type: single_choice
text: |
  反応熱を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "反応を速めても自分は使い切られないこと"
  - "反応が止まるのではなく速さがつり合うこと"
  - "反応に伴う熱の出入りを見ること"
  - "加えた変化を打ち消す向きに平衡が動くこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  反応熱では、「反応に伴う熱の出入りを見ること」という見方が大切です。したがって、正解は「反応に伴う熱の出入りを見ること」です。
  
  「反応を速めても自分は使い切られないこと」は、触媒に関係する見方です。
  「反応が止まるのではなく速さがつり合うこと」は、化学平衡に関係する見方です。
  「反応に伴う熱の出入りを見ること」が正しいです。反応熱の要点を表しています。
  「加えた変化を打ち消す向きに平衡が動くこと」は、ルシャトリエの原理に関係する見方です。
