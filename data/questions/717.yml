# 高校化学 問7
id: 717
type: single_choice
text: |
  蒸発熱についての説明として、最も適切なものはどれか。
choices:
  - "一定温度で一定量の気体の圧力は体積に反比例するという法則である。"
  - "気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。"
  - "液体1 molが気体になるときに吸収する熱量である。"
  - "分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  蒸発熱は、液体1 molが気体になるときに吸収する熱量である。 したがって、正解は「液体1 molが気体になるときに吸収する熱量である。」です。
  
  「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」は、ボイルの法則の説明です。
  「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」は、理想気体の状態方程式の説明です。
  「液体1 molが気体になるときに吸収する熱量である。」が正しいです。蒸発熱の説明です。
  「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」は、実在気体の説明です。
