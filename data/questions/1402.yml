# 化学基礎 問362
id: 1402
type: single_choice
text: |
  蒸発と最も関係が深い場面として、適切なものはどれか。
choices:
  - "氷を温めて水にする場面"
  - "ぬれた床の水がしだいに乾く場面"
  - "ドライアイスがそのまま気体になる場面"
  - "空気や食塩水のように複数の物質が混ざったものを考える場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  ぬれた床の水がしだいに乾く場面は、蒸発と結び付きが強い場面です。したがって、正解は「ぬれた床の水がしだいに乾く場面」です。
  
  「氷を温めて水にする場面」は、融解と結び付きが強い場面です。
  「ぬれた床の水がしだいに乾く場面」が正しいです。これは蒸発と結び付きが強い場面です。
  「ドライアイスがそのまま気体になる場面」は、昇華と結び付きが強い場面です。
  「空気や食塩水のように複数の物質が混ざったものを考える場面」は、混合物と結び付きが強い場面です。
