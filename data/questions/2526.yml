# 高校化学 問526
id: 2526
type: single_choice
text: |
  「溶液の凝固点が純粋な溶媒より低くなる現象である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "薄暗い部屋でコロイドに光を当てると筋が見える場面"
  - "凍結防止剤をまいた道路の水が凍りにくくなる場面"
  - "熱分解や一部の溶解で周囲が冷たくなる場面"
  - "同じ反応でも条件によって進み方が変わることを比べる場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「溶液の凝固点が純粋な溶媒より低くなる現象である。」と最も関係が深い場面は「凍結防止剤をまいた道路の水が凍りにくくなる場面」です。したがって、正解は「凍結防止剤をまいた道路の水が凍りにくくなる場面」です。
  
  「薄暗い部屋でコロイドに光を当てると筋が見える場面」は、「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」と結び付きが強い場面です。
  「凍結防止剤をまいた道路の水が凍りにくくなる場面」が正しいです。この説明と結び付きが強い場面です。
  「熱分解や一部の溶解で周囲が冷たくなる場面」は、「反応の結果として周囲から熱を吸収する反応である。」と結び付きが強い場面です。
  「同じ反応でも条件によって進み方が変わることを比べる場面」は、「単位時間あたりに進む反応の程度を表す量である。」と結び付きが強い場面です。
