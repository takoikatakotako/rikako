# 高校化学 問585
id: 2585
type: single_choice
text: |
  「カルボキシ基をもち、酸性を示す有機化合物である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酢酸の性質やにおいを考える場面"
  - "フェノール類の酸性や消毒作用を考える場面"
  - "金属やプラスチックを回収して再資源化する場面"
  - "気体の量と温度から体積や圧力を見積もる場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「カルボキシ基をもち、酸性を示す有機化合物である。」と最も関係が深い場面は「酢酸の性質やにおいを考える場面」です。したがって、正解は「酢酸の性質やにおいを考える場面」です。
  
  「酢酸の性質やにおいを考える場面」が正しいです。この説明と結び付きが強い場面です。
  「フェノール類の酸性や消毒作用を考える場面」は、「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」と結び付きが強い場面です。
  「金属やプラスチックを回収して再資源化する場面」は、「使い終わった資源や製品を回収し、再び利用する考え方である。」と結び付きが強い場面です。
  「気体の量と温度から体積や圧力を見積もる場面」は、「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」と結び付きが強い場面です。
