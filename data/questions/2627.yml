# 高校化学 問627
id: 2627
type: single_choice
text: |
  「薄い溶液側から濃い溶液側へ水が移動する場面」を説明した文として、最も適切なものはどれか。
choices:
  - "鉛とその化合物を用いた、充電して繰り返し使える電池である。"
  - "正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。"
  - "塩基の電離のしやすさを表す定数である。"
  - "半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「薄い溶液側から濃い溶液側へ水が移動する場面」を説明した文として適切なのは「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」です。したがって、正解は「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」です。
  
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」は、この説明は「自動車のバッテリーを考える場面」と結び付きが強いです。
  「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」は、この説明は「密閉容器で反応物と生成物の量が一定になる場面」と結び付きが強いです。
  「塩基の電離のしやすさを表す定数である。」は、この説明は「どの塩基がより電離しやすいかを比べる場面」と結び付きが強いです。
  「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」が正しいです。この具体例を説明した文です。
