# 化学基礎 問299
id: 1339
type: single_choice
text: |
  高分子化合物の特徴として、最も適切なものはどれか。
choices:
  - "日常生活や社会の技術と結び付く"
  - "水に溶けない固体を液体から分ける"
  - "沸点の違いを利用する"
  - "多数の小さな単位がつながってできる"
correct: 3
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  高分子化合物では、「多数の小さな単位がつながってできる」という点が大切です。したがって、正解は「多数の小さな単位がつながってできる」です。
  
  「日常生活や社会の技術と結び付く」は、化学が拓く世界に関係する特徴です。
  「水に溶けない固体を液体から分ける」は、ろ過に関係する特徴です。
  「沸点の違いを利用する」は、蒸留に関係する特徴です。
  「多数の小さな単位がつながってできる」が正しいです。高分子化合物の特徴を表しています。
