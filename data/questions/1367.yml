# 化学基礎 問327
id: 1367
type: single_choice
text: |
  無極性分子について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "原子が結び付いてできた、物質の性質を示す小さな粒子である。"
  - "原子核の中にある陽子の数を表す数である。"
  - "陽子数は同じで中性子数が異なる原子どうしである。"
  - "分子の中で電荷のかたよりがほとんどない分子である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  無極性分子は、分子の中で電荷のかたよりがほとんどない分子である。 したがって、正解は「分子の中で電荷のかたよりがほとんどない分子である。」です。
  
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」は、分子の説明です。
  「原子核の中にある陽子の数を表す数である。」は、原子番号の説明です。
  「陽子数は同じで中性子数が異なる原子どうしである。」は、同位体の説明です。
  「分子の中で電荷のかたよりがほとんどない分子である。」が正しいです。無極性分子の説明です。
