# 高校化学 問56
id: 2056
type: single_choice
text: |
  平衡定数についての説明として、最も適切なものはどれか。
choices:
  - "少量の酸や塩基を加えても pH が変わりにくい溶液である。"
  - "水溶液中で一部だけ電離する酸である。"
  - "酸の電離のしやすさを表す定数である。"
  - "化学平衡の状態を表す、平衡時の濃度や分圧の比である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  平衡定数は、化学平衡の状態を表す、平衡時の濃度や分圧の比である。 したがって、正解は「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」です。
  
  「少量の酸や塩基を加えても pH が変わりにくい溶液である。」は、緩衝液の説明です。
  「水溶液中で一部だけ電離する酸である。」は、弱酸の説明です。
  「酸の電離のしやすさを表す定数である。」は、酸解離定数の説明です。
  「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」が正しいです。平衡定数の説明です。
