# 化学基礎 問443
id: 1483
type: single_choice
text: |
  「二つの溶液の電気的なつり合いを保つための部分である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "指示薬"
  - "塩橋"
  - "非電解質"
  - "炎色反応"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  二つの溶液の電気的なつり合いを保つための部分である。 に当てはまる語は塩橋です。したがって、正解は「塩橋」です。
  
  「指示薬」は、「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」に当てはまる語です。
  「塩橋」が正しいです。「二つの溶液の電気的なつり合いを保つための部分である。」に当てはまる語です。
  「非電解質」は、「水に溶けても電流をほとんど通さない物質である。」に当てはまる語です。
  「炎色反応」は、「金属元素を炎に入れたときに特有の色を示す反応である。」に当てはまる語です。
