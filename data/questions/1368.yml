# 化学基礎 問328
id: 1368
type: single_choice
text: |
  モルについて学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "粒子の数をまとめて表すための単位である。"
  - "陽イオンと陰イオンの静電気的な引力による結び付きである。"
  - "金属原子が自由電子を介して結び付く結合である。"
  - "分子の中で電荷のかたよりがある分子である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  モルは、粒子の数をまとめて表すための単位である。 したがって、正解は「粒子の数をまとめて表すための単位である。」です。
  
  「粒子の数をまとめて表すための単位である。」が正しいです。モルの説明です。
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」は、イオン結合の説明です。
  「金属原子が自由電子を介して結び付く結合である。」は、金属結合の説明です。
  「分子の中で電荷のかたよりがある分子である。」は、極性分子の説明です。
