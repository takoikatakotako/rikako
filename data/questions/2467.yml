# 高校化学 問467
id: 2467
type: single_choice
text: |
  アルカリ金属を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "ベンゼン環にアミノ基が直接つくこと"
  - "資源を循環させて無駄を減らすこと"
  - "反応性が高く 1 価の陽イオンになりやすいこと"
  - "2 価の陽イオンになりやすいこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  アルカリ金属では、「反応性が高く 1 価の陽イオンになりやすいこと」という見方が大切です。したがって、正解は「反応性が高く 1 価の陽イオンになりやすいこと」です。
  
  「ベンゼン環にアミノ基が直接つくこと」は、アニリンに関係する見方です。
  「資源を循環させて無駄を減らすこと」は、資源の再利用に関係する見方です。
  「反応性が高く 1 価の陽イオンになりやすいこと」が正しいです。アルカリ金属の要点を表しています。
  「2 価の陽イオンになりやすいこと」は、アルカリ土類金属に関係する見方です。
