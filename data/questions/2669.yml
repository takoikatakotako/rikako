# 高校化学 問669
id: 2669
type: single_choice
text: |
  「フッ素や塩素、臭素の反応性を比べる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "カルボン酸とアルコールからできる有機化合物である。"
  - "周期表17族に属し、陰イオンになりやすい非金属元素の総称である。"
  - "グルコースがつながった植物の細胞壁をつくる多糖である。"
  - "一定温度で一定量の気体の圧力は体積に反比例するという法則である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「フッ素や塩素、臭素の反応性を比べる場面」を説明した文として適切なのは「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」です。したがって、正解は「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」です。
  
  「カルボン酸とアルコールからできる有機化合物である。」は、この説明は「果物の香りに関係する化合物を考える場面」と結び付きが強いです。
  「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」が正しいです。この具体例を説明した文です。
  「グルコースがつながった植物の細胞壁をつくる多糖である。」は、この説明は「紙や木材の主成分を考える場面」と結び付きが強いです。
  「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」は、この説明は「注射器の口をふさいで押すと体積が減って圧力が上がる場面」と結び付きが強いです。
