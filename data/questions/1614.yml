# 化学基礎 問574
id: 1614
type: single_choice
text: |
  「金属中で自由電子が動けるため電気を通すことを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "金属原子が自由電子を介して結び付く結合である。"
  - "酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。"
  - "相手を還元させ、自身は酸化される物質である。"
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「金属中で自由電子が動けるため電気を通すことを考える場面」を説明した文として適切なのは「金属原子が自由電子を介して結び付く結合である。」です。したがって、正解は「金属原子が自由電子を介して結び付く結合である。」です。
  
  「金属原子が自由電子を介して結び付く結合である。」が正しいです。この具体例を説明した文です。
  「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」は、この説明は「塩酸と水酸化ナトリウム水溶液を混ぜる場面」と結び付きが強いです。
  「相手を還元させ、自身は酸化される物質である。」は、この説明は「水素や炭素が相手から酸素を奪う場面」と結び付きが強いです。
  「金属元素を炎に入れたときに特有の色を示す反応である。」は、この説明は「ナトリウムで黄色、銅で青緑色を観察する場面」と結び付きが強いです。
