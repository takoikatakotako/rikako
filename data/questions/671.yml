# 化学基礎 問4
id: 671
type: single_choice
text: |
  ナトリウム Na とカリウム K が似た性質を示しやすい理由として、最も適切なものはどれか。
choices:
  - "原子の大きさが全く同じだから。"
  - "最外殻電子の数が同じだから。"
  - "中性子の数が同じだから。"
  - "どちらも分子として存在するから。"
correct: 1
explanation: |
  この問題は、「周期表と元素の性質の関係」を考える問題です。
  
  ナトリウムとカリウムは同じ族にある元素です。同じ族の元素は、最外殻電子の数が同じなので、似た性質を示しやすくなります。したがって、正解は「最外殻電子の数が同じだから」です。
  
  「原子の大きさが全く同じだから」は、適切ではありません。実際には原子の大きさは同じではありません。
  「最外殻電子の数が同じだから」が正しいです。同じ族の元素は、最外殻電子の数がそろっています。
  「中性子の数が同じだから」は、元素の化学的な性質を決める中心的な理由ではありません。
  「どちらも分子として存在するから」は、金属元素の説明として適切ではありません。
