# 高校化学 問103
id: 2103
type: single_choice
text: |
  沸点と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸素と窒素が混ざった気体の圧力を考える場面"
  - "気体の法則で温度をセルシウス温度ではなく K で扱う場面"
  - "塩化ナトリウムの結晶のつくりを考える場面"
  - "水が沸騰し始める温度を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  水が沸騰し始める温度を考える場面は、沸点と結び付きが強い場面です。したがって、正解は「水が沸騰し始める温度を考える場面」です。
  
  「酸素と窒素が混ざった気体の圧力を考える場面」は、分圧の法則と結び付きが強い場面です。
  「気体の法則で温度をセルシウス温度ではなく K で扱う場面」は、絶対温度と結び付きが強い場面です。
  「塩化ナトリウムの結晶のつくりを考える場面」は、イオン結晶と結び付きが強い場面です。
  「水が沸騰し始める温度を考える場面」が正しいです。これは沸点と結び付きが強い場面です。
