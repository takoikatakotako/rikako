# 化学基礎 問403
id: 1443
type: single_choice
text: |
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "クロマトグラフィー"
  - "再結晶"
  - "混合物"
  - "化合物"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  温度による溶解度の差を利用して固体をより純粋に取り出す方法である。 に当てはまる語は再結晶です。したがって、正解は「再結晶」です。
  
  「クロマトグラフィー」は、「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」に当てはまる語です。
  「再結晶」が正しいです。「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」に当てはまる語です。
  「混合物」は、「二種類以上の物質が混ざってできている物質である。」に当てはまる語です。
  「化合物」は、「二種類以上の元素が結び付いてできている純物質である。」に当てはまる語です。
