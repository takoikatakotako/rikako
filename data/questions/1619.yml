# 化学基礎 問579
id: 1619
type: single_choice
text: |
  「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」を説明した文として、最も適切なものはどれか。
choices:
  - "物質が酸素を失う、または電子を受け取る変化である。"
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
  - "水に溶けても電流をほとんど通さない物質である。"
  - "沸点の違いを利用して液体を分ける方法である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」を説明した文として適切なのは「溶液1L中に溶けている溶質の物質量を表した濃度である。」です。したがって、正解は「溶液1L中に溶けている溶質の物質量を表した濃度である。」です。
  
  「物質が酸素を失う、または電子を受け取る変化である。」は、この説明は「酸化銅から酸素が取れて銅になる場面」と結び付きが強いです。
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」が正しいです。この具体例を説明した文です。
  「水に溶けても電流をほとんど通さない物質である。」は、この説明は「砂糖水が電流をほとんど通さない場面」と結び付きが強いです。
  「沸点の違いを利用して液体を分ける方法である。」は、この説明は「水とエタノールの混合物を沸点の差で分ける場面」と結び付きが強いです。
