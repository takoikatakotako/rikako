# 高校化学 問299
id: 2299
type: single_choice
text: |
  「使い終わった資源や製品を回収し、再び利用する考え方である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "資源の再利用"
  - "付加反応"
  - "異性体"
  - "アルデヒド"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  使い終わった資源や製品を回収し、再び利用する考え方である。 に当てはまる語は資源の再利用です。したがって、正解は「資源の再利用」です。
  
  「資源の再利用」が正しいです。「使い終わった資源や製品を回収し、再び利用する考え方である。」に当てはまる語です。
  「付加反応」は、「多重結合に原子や原子団が加わる反応である。」に当てはまる語です。
  「異性体」は、「分子式は同じでも構造が異なる化合物どうしである。」に当てはまる語です。
  「アルデヒド」は、「分子の端にアルデヒド基をもつ有機化合物である。」に当てはまる語です。
