# 化学基礎 問482
id: 1522
type: single_choice
text: |
  塩基を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸素の喪失や電子の受け取りに注目すること"
  - "相手を還元させ、自分は酸化されること"
  - "化学エネルギーを電気エネルギーに変えること"
  - "水酸化物イオンや水素イオンの受け取りに注目すること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  塩基では、「水酸化物イオンや水素イオンの受け取りに注目すること」という見方が大切です。したがって、正解は「水酸化物イオンや水素イオンの受け取りに注目すること」です。
  
  「酸素の喪失や電子の受け取りに注目すること」は、還元に関係する見方です。
  「相手を還元させ、自分は酸化されること」は、還元剤に関係する見方です。
  「化学エネルギーを電気エネルギーに変えること」は、ダニエル電池に関係する見方です。
  「水酸化物イオンや水素イオンの受け取りに注目すること」が正しいです。塩基の要点を表しています。
