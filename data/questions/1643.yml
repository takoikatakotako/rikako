# 化学基礎 問603
id: 1643
type: single_choice
text: |
  「溶解度の差を利用すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "再結晶"
  - "周期律"
  - "分子"
  - "塩基"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「溶解度の差を利用すること」という見方が大切なのは再結晶です。したがって、正解は「再結晶」です。
  
  「再結晶」が正しいです。この見方が大切な語です。
  「周期律」は、その語で大切なのは「性質が周期的にくり返されること」という見方です。
  「分子」は、その語で大切なのは「物質の性質を示す小さな粒子として考えること」という見方です。
  「塩基」は、その語で大切なのは「水酸化物イオンや水素イオンの受け取りに注目すること」という見方です。
