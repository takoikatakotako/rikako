# 高校化学 問606
id: 2606
type: single_choice
text: |
  「氷を水に変えるのに必要な熱を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "溶ける速さと析出する速さが等しくなっている平衡である。"
  - "水との親和性が低く、少しの電解質で凝析しやすいコロイドである。"
  - "固体1 molが融解するときに吸収する熱量である。"
  - "リチウムイオンの移動を利用する充電式電池である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「氷を水に変えるのに必要な熱を考える場面」を説明した文として適切なのは「固体1 molが融解するときに吸収する熱量である。」です。したがって、正解は「固体1 molが融解するときに吸収する熱量である。」です。
  
  「溶ける速さと析出する速さが等しくなっている平衡である。」は、この説明は「飽和溶液で見かけ上変化が止まっている場面」と結び付きが強いです。
  「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」は、この説明は「金属や硫黄のコロイドが電解質で沈みやすい場面」と結び付きが強いです。
  「固体1 molが融解するときに吸収する熱量である。」が正しいです。この具体例を説明した文です。
  「リチウムイオンの移動を利用する充電式電池である。」は、この説明は「スマートフォンやノートパソコンの電池を考える場面」と結び付きが強いです。
