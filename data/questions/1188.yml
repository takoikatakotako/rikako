# 化学基礎 問148
id: 1188
type: single_choice
text: |
  酸化防止剤についての説明として、最も適切なものはどれか。
choices:
  - "多数の小さな単位がつながってできた大きな分子からなる化合物である。"
  - "化学で学んだ内容が、日常生活や社会を支える技術と結び付いていることを考える内容である。"
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "食品などが酸化するのを防ぐために用いられる物質である。"
correct: 3
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  酸化防止剤は、食品などが酸化するのを防ぐために用いられる物質である。したがって、正解は「食品などが酸化するのを防ぐために用いられる物質である。」です。
  
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」は、高分子化合物の説明です。
  「化学で学んだ内容が、日常生活や社会を支える技術と結び付いていることを考える内容である。」は、化学が拓く世界の説明です。
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、ろ過の説明です。
  「食品などが酸化するのを防ぐために用いられる物質である。」が正しいです。酸化防止剤の説明です。
