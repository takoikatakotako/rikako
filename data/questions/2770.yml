# 高校化学 問770
id: 2770
type: single_choice
text: |
  「最外殻が安定していて反応しにくいこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "分子間力"
  - "実在気体"
  - "溶解平衡"
  - "貴ガス"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「最外殻が安定していて反応しにくいこと」という見方が大切なのは貴ガスです。したがって、正解は「貴ガス」です。
  
  「分子間力」は、その語で大切なのは「分子の集まり方や沸点に関係すること」という見方です。
  「実在気体」は、その語で大切なのは「分子の体積と分子間力の影響に注目すること」という見方です。
  「溶解平衡」は、その語で大切なのは「溶解と析出がつり合うこと」という見方です。
  「貴ガス」が正しいです。この見方が大切な語です。
