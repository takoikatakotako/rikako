# 化学基礎 問734
id: 1774
type: single_choice
text: |
  「レモン水とせっけん水の酸性・塩基性を比べる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "固体から液体への変化であること"
  - "酸性と塩基性の強さを数で見ること"
  - "性質が周期的にくり返されること"
  - "物質の性質を示す小さな粒子として考えること"
correct: 1
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「レモン水とせっけん水の酸性・塩基性を比べる場面」では、「酸性と塩基性の強さを数で見ること」という見方が大切です。したがって、正解は「酸性と塩基性の強さを数で見ること」です。
  
  「固体から液体への変化であること」は、その見方は氷を温めて水にする場面よりも融解と結び付きが強いです。
  「酸性と塩基性の強さを数で見ること」が正しいです。この具体例で大切になる見方です。
  「性質が周期的にくり返されること」は、その見方は周期表で似た性質の元素が縦に並ぶことを見る場面よりも周期律と結び付きが強いです。
  「物質の性質を示す小さな粒子として考えること」は、その見方は水分子や酸素分子を粒として考える場面よりも分子と結び付きが強いです。
