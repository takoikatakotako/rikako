# 高校化学 問243
id: 2243
type: single_choice
text: |
  「一度使い切ることを前提にした一次電池の代表例である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "乾電池"
  - "化学発光"
  - "反応速度"
  - "触媒"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  一度使い切ることを前提にした一次電池の代表例である。 に当てはまる語は乾電池です。したがって、正解は「乾電池」です。
  
  「乾電池」が正しいです。「一度使い切ることを前提にした一次電池の代表例である。」に当てはまる語です。
  「化学発光」は、「化学反応によって光が放出される現象である。」に当てはまる語です。
  「反応速度」は、「単位時間あたりに進む反応の程度を表す量である。」に当てはまる語です。
  「触媒」は、「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」に当てはまる語です。
