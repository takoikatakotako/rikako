# 高校化学 問294
id: 2294
type: single_choice
text: |
  「アミノ酸どうしが縮合してできる結合である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "ブラウン運動"
  - "電気泳動"
  - "疎水コロイド"
  - "ペプチド結合"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  アミノ酸どうしが縮合してできる結合である。 に当てはまる語はペプチド結合です。したがって、正解は「ペプチド結合」です。
  
  「ブラウン運動」は、「コロイド粒子が不規則に動いて見える現象である。」に当てはまる語です。
  「電気泳動」は、「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」に当てはまる語です。
  「疎水コロイド」は、「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」に当てはまる語です。
  「ペプチド結合」が正しいです。「アミノ酸どうしが縮合してできる結合である。」に当てはまる語です。
