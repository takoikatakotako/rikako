# 高校化学 問719
id: 2719
type: single_choice
text: |
  「粒子配列が不規則であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "アモルファス"
  - "ファラデーの法則"
  - "緩衝液"
  - "錯イオン"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「粒子配列が不規則であること」という見方が大切なのはアモルファスです。したがって、正解は「アモルファス」です。
  
  「アモルファス」が正しいです。この見方が大切な語です。
  「ファラデーの法則」は、その語で大切なのは「電気量と生成物の量の比例に注目すること」という見方です。
  「緩衝液」は、その語で大切なのは「pH の変化をおさえること」という見方です。
  「錯イオン」は、その語で大切なのは「金属イオンと配位子の組合せに注目すること」という見方です。
