# 令和7年度 ITパスポート 公開問題 問67
id: 370
type: single_choice
text: |
  3次元画像処理の高速化や、動画をなめらかにするなどの機能をもつ、描画処理のためのハードウェアはどれか。
choices:
  - "CGI"
  - "GPU"
  - "GUI"
  - "UPS"
correct: 1
explanation: |
  この問題の公開解答では「GPU」が正解とされています。
  
  「CGI」は公開解答では正解ではありません。
  「GPU」が公開解答で正解とされています。
  「GUI」は公開解答では正解ではありません。
  「UPS」は公開解答では正解ではありません。
