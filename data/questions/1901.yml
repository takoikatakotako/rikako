# 化学基礎 問861
id: 1901
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "混合物 / 液体が固体に変わる状態変化である。"
  - "融解 / 固体が液体に変わる状態変化である。"
  - "凝固 / 原子や原子団が電子を失って正の電荷をもつ粒子である。"
  - "陽イオン / 二種類以上の物質が混ざってできている物質である。"
correct: 1
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「融解 / 固体が液体に変わる状態変化である。」です。したがって、正解は「融解 / 固体が液体に変わる状態変化である。」です。
  
  「混合物 / 液体が固体に変わる状態変化である。」は、用語と説明の対応が合っていません。
  「融解 / 固体が液体に変わる状態変化である。」が正しいです。用語と説明の対応が合っています。
  「凝固 / 原子や原子団が電子を失って正の電荷をもつ粒子である。」は、用語と説明の対応が合っていません。
  「陽イオン / 二種類以上の物質が混ざってできている物質である。」は、用語と説明の対応が合っていません。
