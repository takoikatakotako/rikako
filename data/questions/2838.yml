# 高校化学 問838
id: 2838
type: single_choice
text: |
  「気体分子中の結合1 molを切るのに必要なエネルギーである。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "結合を切るのに必要なエネルギーに注目すること"
  - "カルボキシ基をもち酸性を示すこと"
  - "植物がエネルギーをたくわえる多糖であること"
  - "液体を気体に変えるための熱に注目すること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「気体分子中の結合1 molを切るのに必要なエネルギーである。」を理解する上では、「結合を切るのに必要なエネルギーに注目すること」という見方が大切です。したがって、正解は「結合を切るのに必要なエネルギーに注目すること」です。
  
  「結合を切るのに必要なエネルギーに注目すること」が正しいです。この説明と結び付きが強い見方です。
  「カルボキシ基をもち酸性を示すこと」は、その見方はカルボン酸に関係します。
  「植物がエネルギーをたくわえる多糖であること」は、その見方はデンプンに関係します。
  「液体を気体に変えるための熱に注目すること」は、その見方は蒸発熱に関係します。
