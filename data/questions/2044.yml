# 高校化学 問44
id: 2044
type: single_choice
text: |
  鉛蓄電池についての説明として、最も適切なものはどれか。
choices:
  - "リチウムイオンの移動を利用する充電式電池である。"
  - "電気エネルギーを使って自発的でない化学変化を起こす操作である。"
  - "電気分解で還元が起こる電極である。"
  - "鉛とその化合物を用いた、充電して繰り返し使える電池である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  鉛蓄電池は、鉛とその化合物を用いた、充電して繰り返し使える電池である。 したがって、正解は「鉛とその化合物を用いた、充電して繰り返し使える電池である。」です。
  
  「リチウムイオンの移動を利用する充電式電池である。」は、リチウムイオン電池の説明です。
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」は、電気分解の説明です。
  「電気分解で還元が起こる電極である。」は、陰極の説明です。
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」が正しいです。鉛蓄電池の説明です。
