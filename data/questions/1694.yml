# 化学基礎 問654
id: 1694
type: single_choice
text: |
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "物質の性質を示す小さな粒子として考えること"
  - "水酸化物イオンや水素イオンの受け取りに注目すること"
  - "移動しやすさの違いを利用すること"
  - "相手を酸化させ、自分は還元されること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」を理解する上では、「移動しやすさの違いを利用すること」という見方が大切です。したがって、正解は「移動しやすさの違いを利用すること」です。
  
  「物質の性質を示す小さな粒子として考えること」は、その見方は分子に関係します。
  「水酸化物イオンや水素イオンの受け取りに注目すること」は、その見方は塩基に関係します。
  「移動しやすさの違いを利用すること」が正しいです。この説明と結び付きが強い見方です。
  「相手を酸化させ、自分は還元されること」は、その見方は酸化剤に関係します。
