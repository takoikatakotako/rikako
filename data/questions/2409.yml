# 高校化学 問409
id: 2409
type: single_choice
text: |
  シャルルの法則を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "圧力一定で体積と絶対温度の関係を見ること"
  - "0 K を基準に温度を考えること"
  - "固体と液体の境目の温度に注目すること"
  - "液体から出た蒸気が示す圧力に注目すること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  シャルルの法則では、「圧力一定で体積と絶対温度の関係を見ること」という見方が大切です。したがって、正解は「圧力一定で体積と絶対温度の関係を見ること」です。
  
  「圧力一定で体積と絶対温度の関係を見ること」が正しいです。シャルルの法則の要点を表しています。
  「0 K を基準に温度を考えること」は、絶対温度に関係する見方です。
  「固体と液体の境目の温度に注目すること」は、融点に関係する見方です。
  「液体から出た蒸気が示す圧力に注目すること」は、蒸気圧に関係する見方です。
