# 高校化学 問721
id: 2721
type: single_choice
text: |
  「どこまで溶けるかの限度に注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "活性化エネルギー"
  - "弱酸"
  - "溶解度"
  - "遷移元素"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「どこまで溶けるかの限度に注目すること」という見方が大切なのは溶解度です。したがって、正解は「溶解度」です。
  
  「活性化エネルギー」は、その語で大切なのは「反応を始めるための壁に注目すること」という見方です。
  「弱酸」は、その語で大切なのは「電離が部分的に起こること」という見方です。
  「溶解度」が正しいです。この見方が大切な語です。
  「遷移元素」は、その語で大切なのは「多様な酸化数や色、触媒作用に注目すること」という見方です。
