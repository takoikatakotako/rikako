# 化学基礎 問786
id: 1826
type: single_choice
text: |
  「色の変化で液性を見分けること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。"
  - "原子のいちばん外側の電子殻にある電子である。"
  - "分子の中で電荷のかたよりがある分子である。"
  - "酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。"
correct: 0
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「色の変化で液性を見分けること」という見方と最も関係が深い説明は「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」です。したがって、正解は「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」です。
  
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」が正しいです。この見方と最も関係が深い説明です。
  「原子のいちばん外側の電子殻にある電子である。」は、その説明で大切なのは「化学結合やイオンのできやすさに関係すること」という見方です。
  「分子の中で電荷のかたよりがある分子である。」は、その説明で大切なのは「電荷のかたよりがあること」という見方です。
  「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」は、その説明で大切なのは「酸と塩基が打ち消し合うこと」という見方です。
