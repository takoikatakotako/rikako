# 化学基礎 問396
id: 1436
type: single_choice
text: |
  放射性同位体と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムで黄色、銅で青緑色を観察する場面"
  - "ポリエチレンやタンパク質のような長い分子を考える場面"
  - "マグネシウムが酸素と結び付く場面"
  - "医療や年代測定に利用される炭素14を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  医療や年代測定に利用される炭素14を考える場面は、放射性同位体と結び付きが強い場面です。したがって、正解は「医療や年代測定に利用される炭素14を考える場面」です。
  
  「ナトリウムで黄色、銅で青緑色を観察する場面」は、炎色反応と結び付きが強い場面です。
  「ポリエチレンやタンパク質のような長い分子を考える場面」は、高分子化合物と結び付きが強い場面です。
  「マグネシウムが酸素と結び付く場面」は、酸化と結び付きが強い場面です。
  「医療や年代測定に利用される炭素14を考える場面」が正しいです。これは放射性同位体と結び付きが強い場面です。
