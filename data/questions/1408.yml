# 化学基礎 問368
id: 1408
type: single_choice
text: |
  周期律と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
  - "塩素原子が電子を1個受け取って Cl- になる場面"
  - "水素原子どうしが電子を共有して H2 になる場面"
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  周期表で似た性質の元素が縦に並ぶことを見る場面は、周期律と結び付きが強い場面です。したがって、正解は「周期表で似た性質の元素が縦に並ぶことを見る場面」です。
  
  「ナトリウムが電子を1個失いやすい理由を考える場面」は、最外殻電子と結び付きが強い場面です。
  「塩素原子が電子を1個受け取って Cl- になる場面」は、陰イオンと結び付きが強い場面です。
  「水素原子どうしが電子を共有して H2 になる場面」は、共有結合と結び付きが強い場面です。
  「周期表で似た性質の元素が縦に並ぶことを見る場面」が正しいです。これは周期律と結び付きが強い場面です。
