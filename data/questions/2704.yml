# 高校化学 問704
id: 2704
type: single_choice
text: |
  「液体から出た蒸気が示す圧力に注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "反応熱"
  - "蒸気圧"
  - "燃料電池"
  - "ルシャトリエの原理"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「液体から出た蒸気が示す圧力に注目すること」という見方が大切なのは蒸気圧です。したがって、正解は「蒸気圧」です。
  
  「反応熱」は、その語で大切なのは「反応に伴う熱の出入りを見ること」という見方です。
  「蒸気圧」が正しいです。この見方が大切な語です。
  「燃料電池」は、その語で大切なのは「反応物を補給しながら発電すること」という見方です。
  「ルシャトリエの原理」は、その語で大切なのは「加えた変化を打ち消す向きに平衡が動くこと」という見方です。
