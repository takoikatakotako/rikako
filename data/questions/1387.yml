# 化学基礎 問347
id: 1387
type: single_choice
text: |
  炎色反応について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "一種類の元素だけからできている物質である。"
  - "物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
  - "水に溶けたり融解したりすると電流を通す物質である。"
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  炎色反応は、金属元素を炎に入れたときに特有の色を示す反応である。 したがって、正解は「金属元素を炎に入れたときに特有の色を示す反応である。」です。
  
  「一種類の元素だけからできている物質である。」は、単体の説明です。
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」は、物理変化の説明です。
  「水に溶けたり融解したりすると電流を通す物質である。」は、電解質の説明です。
  「金属元素を炎に入れたときに特有の色を示す反応である。」が正しいです。炎色反応の説明です。
