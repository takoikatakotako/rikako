# 高校化学 問663
id: 2663
type: single_choice
text: |
  「酢酸が塩酸ほど強く電離しない場面」を説明した文として、最も適切なものはどれか。
choices:
  - "多重結合に原子や原子団が加わる反応である。"
  - "ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。"
  - "固体と液体が平衡で共存するときの温度である。"
  - "水溶液中で一部だけ電離する酸である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「酢酸が塩酸ほど強く電離しない場面」を説明した文として適切なのは「水溶液中で一部だけ電離する酸である。」です。したがって、正解は「水溶液中で一部だけ電離する酸である。」です。
  
  「多重結合に原子や原子団が加わる反応である。」は、この説明は「エチレンに臭素が付加する場面」と結び付きが強いです。
  「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」は、この説明は「飲料ボトルや衣料用繊維を考える場面」と結び付きが強いです。
  「固体と液体が平衡で共存するときの温度である。」は、この説明は「氷が溶け始める温度を考える場面」と結び付きが強いです。
  「水溶液中で一部だけ電離する酸である。」が正しいです。この具体例を説明した文です。
