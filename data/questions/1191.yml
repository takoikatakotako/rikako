# 化学基礎 問151
id: 1191
type: single_choice
text: |
  ろ過の例として、最も適切なものはどれか。
choices:
  - "水とエタノールの混合物を分ける操作"
  - "砂と水の混合物から砂を取り除く操作"
  - "ミョウバンを熱い水に溶かして冷やし、結晶を取り出す操作"
  - "インクに含まれる色素を分ける操作"
correct: 1
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  砂と水の混合物から砂を取り除く操作は、ろ過の例です。したがって、正解は「砂と水の混合物から砂を取り除く操作」です。
  
  「水とエタノールの混合物を分ける操作」は、蒸留の例として見る方が適切です。
  「砂と水の混合物から砂を取り除く操作」が正しいです。これはろ過の例です。
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す操作」は、再結晶の例として見る方が適切です。
  「インクに含まれる色素を分ける操作」は、クロマトグラフィーの例として見る方が適切です。
