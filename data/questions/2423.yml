# 高校化学 問423
id: 2423
type: single_choice
text: |
  溶解平衡を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "コロイドが光を散乱すること"
  - "半透膜を通る粒子の大きさの違いを利用すること"
  - "溶解と析出がつり合うこと"
  - "水となじみやすく安定しやすいこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  溶解平衡では、「溶解と析出がつり合うこと」という見方が大切です。したがって、正解は「溶解と析出がつり合うこと」です。
  
  「コロイドが光を散乱すること」は、チンダル現象に関係する見方です。
  「半透膜を通る粒子の大きさの違いを利用すること」は、透析に関係する見方です。
  「溶解と析出がつり合うこと」が正しいです。溶解平衡の要点を表しています。
  「水となじみやすく安定しやすいこと」は、親水コロイドに関係する見方です。
