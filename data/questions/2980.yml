# 高校化学 問980
id: 2980
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "発熱反応 / 流した電流が大きいほど析出量が増える場面"
  - "ファラデーの法則 / 血液や実験用の溶液で pH を保ちたい場面"
  - "緩衝液 / 燃焼や中和で容器が温かくなる場面"
  - "付加反応 / エチレンに臭素が付加する場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「付加反応 / エチレンに臭素が付加する場面」です。したがって、正解は「付加反応 / エチレンに臭素が付加する場面」です。
  
  「発熱反応 / 流した電流が大きいほど析出量が増える場面」は、用語と場面の対応が合っていません。
  「ファラデーの法則 / 血液や実験用の溶液で pH を保ちたい場面」は、用語と場面の対応が合っていません。
  「緩衝液 / 燃焼や中和で容器が温かくなる場面」は、用語と場面の対応が合っていません。
  「付加反応 / エチレンに臭素が付加する場面」が正しいです。用語と場面の対応が合っています。
