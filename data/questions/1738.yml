# 化学基礎 問698
id: 1738
type: single_choice
text: |
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "化学結合やイオンのできやすさに関係すること"
  - "電荷のかたよりがあること"
  - "酸化による変質を防ぐこと"
  - "酸と塩基が打ち消し合うこと"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」を理解する上では、「酸化による変質を防ぐこと」という見方が大切です。したがって、正解は「酸化による変質を防ぐこと」です。
  
  「化学結合やイオンのできやすさに関係すること」は、その見方は最外殻電子に関係します。
  「電荷のかたよりがあること」は、その見方は極性分子に関係します。
  「酸化による変質を防ぐこと」が正しいです。この説明と結び付きが強い見方です。
  「酸と塩基が打ち消し合うこと」は、その見方は中和に関係します。
