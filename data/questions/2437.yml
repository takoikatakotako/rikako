# 高校化学 問437
id: 2437
type: single_choice
text: |
  ヘスの法則を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "反応経路ではなく始状態と終状態で決まること"
  - "反応が止まるのではなく速さがつり合うこと"
  - "加えた変化を打ち消す向きに平衡が動くこと"
  - "電離と元に戻る変化がつり合うこと"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  ヘスの法則では、「反応経路ではなく始状態と終状態で決まること」という見方が大切です。したがって、正解は「反応経路ではなく始状態と終状態で決まること」です。
  
  「反応経路ではなく始状態と終状態で決まること」が正しいです。ヘスの法則の要点を表しています。
  「反応が止まるのではなく速さがつり合うこと」は、化学平衡に関係する見方です。
  「加えた変化を打ち消す向きに平衡が動くこと」は、ルシャトリエの原理に関係する見方です。
  「電離と元に戻る変化がつり合うこと」は、電離平衡に関係する見方です。
