# 化学基礎 問541
id: 1581
type: single_choice
text: |
  「金属が電子を失ってイオンになりやすい性質の強さである。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "亜鉛が銅より先にイオンになりやすいことを見る場面"
  - "食塩水や塩酸が電流を通す場面"
  - "砂と水の混合物から砂を取り除く場面"
  - "水や二酸化炭素のように複数の元素からできた物質を考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「金属が電子を失ってイオンになりやすい性質の強さである。」と最も関係が深い場面は「亜鉛が銅より先にイオンになりやすいことを見る場面」です。したがって、正解は「亜鉛が銅より先にイオンになりやすいことを見る場面」です。
  
  「亜鉛が銅より先にイオンになりやすいことを見る場面」が正しいです。この説明と結び付きが強い場面です。
  「食塩水や塩酸が電流を通す場面」は、「水に溶けたり融解したりすると電流を通す物質である。」と結び付きが強い場面です。
  「砂と水の混合物から砂を取り除く場面」は、「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」と結び付きが強い場面です。
  「水や二酸化炭素のように複数の元素からできた物質を考える場面」は、「二種類以上の元素が結び付いてできている純物質である。」と結び付きが強い場面です。
