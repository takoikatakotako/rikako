# 化学基礎 問221
id: 1261
type: single_choice
text: |
  「Cl-」に最も関係が深い語として、適切なものはどれか。
choices:
  - "イオン結合"
  - "共有結合"
  - "陰イオン"
  - "金属結合"
correct: 2
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「Cl-」に最も関係が深いのは陰イオンです。したがって、正解は「陰イオン」です。
  
  「イオン結合」は、この例に最も関係が深い語ではありません。
  「共有結合」は、この例に最も関係が深い語ではありません。
  「陰イオン」が正しいです。この例は陰イオンに関係しています。
  「金属結合」は、この例に最も関係が深い語ではありません。
