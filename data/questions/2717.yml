# 高校化学 問717
id: 2717
type: single_choice
text: |
  「共有結合が全体に広がること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "陽極"
  - "電離平衡"
  - "共有結合の結晶"
  - "貴ガス"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「共有結合が全体に広がること」という見方が大切なのは共有結合の結晶です。したがって、正解は「共有結合の結晶」です。
  
  「陽極」は、その語で大切なのは「酸化が起こる側の電極であること」という見方です。
  「電離平衡」は、その語で大切なのは「電離と元に戻る変化がつり合うこと」という見方です。
  「共有結合の結晶」が正しいです。この見方が大切な語です。
  「貴ガス」は、その語で大切なのは「最外殻が安定していて反応しにくいこと」という見方です。
