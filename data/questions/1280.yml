# 化学基礎 問240
id: 1280
type: single_choice
text: |
  「Zn 板と Cu 板を使う電池」に最も関係が深い語として、適切なものはどれか。
choices:
  - "塩橋"
  - "ダニエル電池"
  - "電解質"
  - "非電解質"
correct: 1
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「Zn 板と Cu 板を使う電池」に最も関係が深いのはダニエル電池です。したがって、正解は「ダニエル電池」です。
  
  「塩橋」は、この例に最も関係が深い語ではありません。
  「ダニエル電池」が正しいです。この例はダニエル電池に関係しています。
  「電解質」は、この例に最も関係が深い語ではありません。
  「非電解質」は、この例に最も関係が深い語ではありません。
