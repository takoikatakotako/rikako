# 化学基礎 問733
id: 1773
type: single_choice
text: |
  「塩酸と水酸化ナトリウム水溶液を混ぜる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "酸と塩基が打ち消し合うこと"
  - "新しい物質ができること"
  - "陽子数が同じで中性子数が異なること"
  - "自由電子が結合を支えること"
correct: 0
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「塩酸と水酸化ナトリウム水溶液を混ぜる場面」では、「酸と塩基が打ち消し合うこと」という見方が大切です。したがって、正解は「酸と塩基が打ち消し合うこと」です。
  
  「酸と塩基が打ち消し合うこと」が正しいです。この具体例で大切になる見方です。
  「新しい物質ができること」は、その見方は鉄がさびて別の物質になる場面よりも化学変化と結び付きが強いです。
  「陽子数が同じで中性子数が異なること」は、その見方は炭素12と炭素14を比べる場面よりも同位体と結び付きが強いです。
  「自由電子が結合を支えること」は、その見方は金属中で自由電子が動けるため電気を通すことを考える場面よりも金属結合と結び付きが強いです。
