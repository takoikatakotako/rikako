# 高校化学 問395
id: 2395
type: single_choice
text: |
  「血糖や発酵の材料として使われる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "タンパク質"
  - "グルコース"
  - "ペプチド結合"
  - "セルロース"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  血糖や発酵の材料として使われる場面 と最も関係が深いのはグルコースです。したがって、正解は「グルコース」です。
  
  「タンパク質」は、「酵素や筋肉の主成分を考える場面」と結び付きが強い語です。
  「グルコース」が正しいです。この具体例と最も関係が深い語です。
  「ペプチド結合」は、「アミノ酸がつながってペプチドになる場面」と結び付きが強い語です。
  「セルロース」は、「紙や木材の主成分を考える場面」と結び付きが強い語です。
