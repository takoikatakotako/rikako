# 化学基礎 問387
id: 1427
type: single_choice
text: |
  酸化と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水素と酸素から水ができる反応を式で表す場面"
  - "酸素や過酸化水素が相手を酸化させる場面"
  - "マグネシウムが酸素と結び付く場面"
  - "亜鉛が銅より先にイオンになりやすいことを見る場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  マグネシウムが酸素と結び付く場面は、酸化と結び付きが強い場面です。したがって、正解は「マグネシウムが酸素と結び付く場面」です。
  
  「水素と酸素から水ができる反応を式で表す場面」は、化学反応式と結び付きが強い場面です。
  「酸素や過酸化水素が相手を酸化させる場面」は、酸化剤と結び付きが強い場面です。
  「マグネシウムが酸素と結び付く場面」が正しいです。これは酸化と結び付きが強い場面です。
  「亜鉛が銅より先にイオンになりやすいことを見る場面」は、イオン化傾向と結び付きが強い場面です。
