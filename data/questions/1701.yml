# 化学基礎 問661
id: 1701
type: single_choice
text: |
  「固体が液体に変わる状態変化である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水酸化物イオンや水素イオンの受け取りに注目すること"
  - "固体から液体への変化であること"
  - "相手を酸化させ、自分は還元されること"
  - "放射線を出す同位体であること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「固体が液体に変わる状態変化である。」を理解する上では、「固体から液体への変化であること」という見方が大切です。したがって、正解は「固体から液体への変化であること」です。
  
  「水酸化物イオンや水素イオンの受け取りに注目すること」は、その見方は塩基に関係します。
  「固体から液体への変化であること」が正しいです。この説明と結び付きが強い見方です。
  「相手を酸化させ、自分は還元されること」は、その見方は酸化剤に関係します。
  「放射線を出す同位体であること」は、その見方は放射性同位体に関係します。
