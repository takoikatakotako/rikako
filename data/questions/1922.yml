# 化学基礎 問882
id: 1922
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "無極性分子 / 水溶液の酸性や塩基性の強さを表す尺度である。"
  - "pH / 金属が電子を失ってイオンになりやすい性質の強さである。"
  - "塩基 / 水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。"
  - "イオン化傾向 / 分子の中で電荷のかたよりがほとんどない分子である。"
correct: 2
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「塩基 / 水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」です。したがって、正解は「塩基 / 水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」です。
  
  「無極性分子 / 水溶液の酸性や塩基性の強さを表す尺度である。」は、用語と説明の対応が合っていません。
  「pH / 金属が電子を失ってイオンになりやすい性質の強さである。」は、用語と説明の対応が合っていません。
  「塩基 / 水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」が正しいです。用語と説明の対応が合っています。
  「イオン化傾向 / 分子の中で電荷のかたよりがほとんどない分子である。」は、用語と説明の対応が合っていません。
