# 高校化学 問563
id: 2563
type: single_choice
text: |
  「水溶液中で一部だけ電離する酸である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "どの塩基がより電離しやすいかを比べる場面"
  - "電線や青色の銅イオン水溶液を考える場面"
  - "酢酸が塩酸ほど強く電離しない場面"
  - "フェノール類の酸性や消毒作用を考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「水溶液中で一部だけ電離する酸である。」と最も関係が深い場面は「酢酸が塩酸ほど強く電離しない場面」です。したがって、正解は「酢酸が塩酸ほど強く電離しない場面」です。
  
  「どの塩基がより電離しやすいかを比べる場面」は、「塩基の電離のしやすさを表す定数である。」と結び付きが強い場面です。
  「電線や青色の銅イオン水溶液を考える場面」は、「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」と結び付きが強い場面です。
  「酢酸が塩酸ほど強く電離しない場面」が正しいです。この説明と結び付きが強い場面です。
  「フェノール類の酸性や消毒作用を考える場面」は、「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」と結び付きが強い場面です。
