# 化学基礎 問374
id: 1414
type: single_choice
text: |
  金属結合と最も関係が深い場面として、適切なものはどれか。
choices:
  - "炭素12と炭素14を比べる場面"
  - "金属中で自由電子が動けるため電気を通すことを考える場面"
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
  - "1Lの食塩水にどれだけ溶質が溶けているかを表す場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  金属中で自由電子が動けるため電気を通すことを考える場面は、金属結合と結び付きが強い場面です。したがって、正解は「金属中で自由電子が動けるため電気を通すことを考える場面」です。
  
  「炭素12と炭素14を比べる場面」は、同位体と結び付きが強い場面です。
  「金属中で自由電子が動けるため電気を通すことを考える場面」が正しいです。これは金属結合と結び付きが強い場面です。
  「ナトリウムが電子を1個失いやすい理由を考える場面」は、最外殻電子と結び付きが強い場面です。
  「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」は、モル濃度と結び付きが強い場面です。
