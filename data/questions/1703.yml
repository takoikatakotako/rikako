# 化学基礎 問663
id: 1703
type: single_choice
text: |
  「液体が固体に変わる状態変化である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸性と塩基性の強さを数で見ること"
  - "金属のイオンになりやすさを比べること"
  - "酸化による変質を防ぐこと"
  - "液体から固体への変化であること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「液体が固体に変わる状態変化である。」を理解する上では、「液体から固体への変化であること」という見方が大切です。したがって、正解は「液体から固体への変化であること」です。
  
  「酸性と塩基性の強さを数で見ること」は、その見方はpHに関係します。
  「金属のイオンになりやすさを比べること」は、その見方はイオン化傾向に関係します。
  「酸化による変質を防ぐこと」は、その見方は酸化防止剤に関係します。
  「液体から固体への変化であること」が正しいです。この説明と結び付きが強い見方です。
