# 化学基礎 問308
id: 1348
type: single_choice
text: |
  化合物について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "二種類以上の元素が結び付いてできている純物質である。"
  - "液体が固体に変わる状態変化である。"
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  化合物は、二種類以上の元素が結び付いてできている純物質である。 したがって、正解は「二種類以上の元素が結び付いてできている純物質である。」です。
  
  「二種類以上の元素が結び付いてできている純物質である。」が正しいです。化合物の説明です。
  「液体が固体に変わる状態変化である。」は、凝固の説明です。
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、ろ過の説明です。
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、再結晶の説明です。
