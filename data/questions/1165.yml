# 化学基礎 問125
id: 1165
type: single_choice
text: |
  分子についての説明として、最も適切なものはどれか。
choices:
  - "原子が結び付いてできた、一つのまとまりとして振る舞う粒子である。"
  - "分子全体として電荷の偏りがある分子である。"
  - "分子全体として電荷の偏りが打ち消し合っている分子である。"
  - "粒子の数をそろえて表すための単位である。"
correct: 0
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  分子は、原子が結び付いてできた、一つのまとまりとして振る舞う粒子である。したがって、正解は「原子が結び付いてできた、一つのまとまりとして振る舞う粒子である。」です。
  
  「原子が結び付いてできた、一つのまとまりとして振る舞う粒子である。」が正しいです。分子の説明です。
  「分子全体として電荷の偏りがある分子である。」は、極性分子の説明です。
  「分子全体として電荷の偏りが打ち消し合っている分子である。」は、無極性分子の説明です。
  「粒子の数をそろえて表すための単位である。」は、モルの説明です。
