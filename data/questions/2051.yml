# 高校化学 問51
id: 2051
type: single_choice
text: |
  反応速度についての説明として、最も適切なものはどれか。
choices:
  - "化学平衡の状態を表す、平衡時の濃度や分圧の比である。"
  - "窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。"
  - "単位時間あたりに進む反応の程度を表す量である。"
  - "水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  反応速度は、単位時間あたりに進む反応の程度を表す量である。 したがって、正解は「単位時間あたりに進む反応の程度を表す量である。」です。
  
  「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」は、平衡定数の説明です。
  「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」は、アンモニア合成の説明です。
  「単位時間あたりに進む反応の程度を表す量である。」が正しいです。反応速度の説明です。
  「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」は、水のイオン積の説明です。
