# 化学基礎 問891
id: 1931
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "指示薬 / 二つの溶液の電気的なつり合いを保つための部分である。"
  - "塩橋 / 化学の知識が生活、産業、環境、医療などに役立つという見方である。"
  - "化学が拓く世界 / 溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。"
  - "イオン化傾向 / 金属が電子を失ってイオンになりやすい性質の強さである。"
correct: 3
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「イオン化傾向 / 金属が電子を失ってイオンになりやすい性質の強さである。」です。したがって、正解は「イオン化傾向 / 金属が電子を失ってイオンになりやすい性質の強さである。」です。
  
  「指示薬 / 二つの溶液の電気的なつり合いを保つための部分である。」は、用語と説明の対応が合っていません。
  「塩橋 / 化学の知識が生活、産業、環境、医療などに役立つという見方である。」は、用語と説明の対応が合っていません。
  「化学が拓く世界 / 溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」は、用語と説明の対応が合っていません。
  「イオン化傾向 / 金属が電子を失ってイオンになりやすい性質の強さである。」が正しいです。用語と説明の対応が合っています。
