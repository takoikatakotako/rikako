# 化学基礎 問48
id: 1088
type: single_choice
text: |
  ダニエル電池の外部回路で、電子が流れる向きとして最も適切なものはどれか。
choices:
  - "銅板から亜鉛板へ流れる。"
  - "亜鉛板から銅板へ流れる。"
  - "水溶液の中だけを流れ、外部回路には流れない。"
  - "電子はどこにも流れない。"
correct: 1
explanation: |
  この問題は、「電池の中で電子がどちらからどちらへ流れるか」を考える問題です。
  
  ダニエル電池では、亜鉛が電子を放出し、その電子が外部回路を通って銅板側へ流れます。したがって、正解は「亜鉛板から銅板へ流れる」です。
  
  「銅板から亜鉛板へ流れる」は、向きが逆です。
  「亜鉛板から銅板へ流れる」が正しいです。亜鉛が電子を放出します。
  「水溶液の中だけを流れ、外部回路には流れない」は、適切ではありません。
  「電子はどこにも流れない」は、電池のはたらきと合っていません。
