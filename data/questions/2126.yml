# 高校化学 問126
id: 2126
type: single_choice
text: |
  凝固点降下と最も関係が深い場面として、適切なものはどれか。
choices:
  - "平衡がどちらにかたよっているかを数値で見る場面"
  - "高圧や触媒を利用してアンモニアを得る場面"
  - "凍結防止剤をまいた道路の水が凍りにくくなる場面"
  - "中性の水で H+ と OH- の関係を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  凍結防止剤をまいた道路の水が凍りにくくなる場面は、凝固点降下と結び付きが強い場面です。したがって、正解は「凍結防止剤をまいた道路の水が凍りにくくなる場面」です。
  
  「平衡がどちらにかたよっているかを数値で見る場面」は、平衡定数と結び付きが強い場面です。
  「高圧や触媒を利用してアンモニアを得る場面」は、アンモニア合成と結び付きが強い場面です。
  「凍結防止剤をまいた道路の水が凍りにくくなる場面」が正しいです。これは凝固点降下と結び付きが強い場面です。
  「中性の水で H+ と OH- の関係を考える場面」は、水のイオン積と結び付きが強い場面です。
