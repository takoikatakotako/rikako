# 高校化学 問702
id: 2702
type: single_choice
text: |
  「固体と液体の境目の温度に注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "親水コロイド"
  - "鉛蓄電池"
  - "化学平衡"
  - "融点"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「固体と液体の境目の温度に注目すること」という見方が大切なのは融点です。したがって、正解は「融点」です。
  
  「親水コロイド」は、その語で大切なのは「水となじみやすく安定しやすいこと」という見方です。
  「鉛蓄電池」は、その語で大切なのは「充電して再び使えること」という見方です。
  「化学平衡」は、その語で大切なのは「反応が止まるのではなく速さがつり合うこと」という見方です。
  「融点」が正しいです。この見方が大切な語です。
