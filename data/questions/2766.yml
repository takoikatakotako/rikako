# 高校化学 問766
id: 2766
type: single_choice
text: |
  「塩基の強さを電離のしやすさで見ること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "セルロース"
  - "ボイルの法則"
  - "アモルファス"
  - "塩基解離定数"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「塩基の強さを電離のしやすさで見ること」という見方が大切なのは塩基解離定数です。したがって、正解は「塩基解離定数」です。
  
  「セルロース」は、その語で大切なのは「植物の体を支える多糖であること」という見方です。
  「ボイルの法則」は、その語で大切なのは「温度一定で圧力と体積の関係を見ること」という見方です。
  「アモルファス」は、その語で大切なのは「粒子配列が不規則であること」という見方です。
  「塩基解離定数」が正しいです。この見方が大切な語です。
