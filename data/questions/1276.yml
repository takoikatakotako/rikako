# 化学基礎 問236
id: 1276
type: single_choice
text: |
  「酸化銅から銅ができる反応」に最も関係が深い語として、適切なものはどれか。
choices:
  - "酸化剤"
  - "還元"
  - "還元剤"
  - "イオン化傾向"
correct: 1
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「酸化銅から銅ができる反応」に最も関係が深いのは還元です。したがって、正解は「還元」です。
  
  「酸化剤」は、この例に最も関係が深い語ではありません。
  「還元」が正しいです。この例は還元に関係しています。
  「還元剤」は、この例に最も関係が深い語ではありません。
  「イオン化傾向」は、この例に最も関係が深い語ではありません。
