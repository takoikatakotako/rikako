# 化学基礎 問682
id: 1722
type: single_choice
text: |
  「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "溶解度の差を利用すること"
  - "新しい物質ができること"
  - "水酸化物イオンや水素イオンの受け取りに注目すること"
  - "陽子数が同じで中性子数が異なること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」を理解する上では、「水酸化物イオンや水素イオンの受け取りに注目すること」という見方が大切です。したがって、正解は「水酸化物イオンや水素イオンの受け取りに注目すること」です。
  
  「溶解度の差を利用すること」は、その見方は再結晶に関係します。
  「新しい物質ができること」は、その見方は化学変化に関係します。
  「水酸化物イオンや水素イオンの受け取りに注目すること」が正しいです。この説明と結び付きが強い見方です。
  「陽子数が同じで中性子数が異なること」は、その見方は同位体に関係します。
