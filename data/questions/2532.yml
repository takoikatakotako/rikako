# 高校化学 問532
id: 2532
type: single_choice
text: |
  「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "物質を燃やしたときに熱が出ることを考える場面"
  - "水素を使って発電し、水を生じる仕組みを考える場面"
  - "圧力や濃度を変えると平衡が移る方向を考える場面"
  - "コロイド粒子が陽極や陰極へ移動する様子を考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」と最も関係が深い場面は「コロイド粒子が陽極や陰極へ移動する様子を考える場面」です。したがって、正解は「コロイド粒子が陽極や陰極へ移動する様子を考える場面」です。
  
  「物質を燃やしたときに熱が出ることを考える場面」は、「化学反応に伴って出入りする熱量である。」と結び付きが強い場面です。
  「水素を使って発電し、水を生じる仕組みを考える場面」は、「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」と結び付きが強い場面です。
  「圧力や濃度を変えると平衡が移る方向を考える場面」は、「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」と結び付きが強い場面です。
  「コロイド粒子が陽極や陰極へ移動する様子を考える場面」が正しいです。この説明と結び付きが強い場面です。
