# 高校化学 問993
id: 2993
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "アミノ酸 / グリシンやアラニンの構造を考える場面"
  - "活性化エネルギー / 酢酸が塩酸ほど強く電離しない場面"
  - "弱酸 / 鉄や銅、クロムの化合物の色の違いを考える場面"
  - "遷移元素 / 加熱すると反応が進みやすくなる理由を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「アミノ酸 / グリシンやアラニンの構造を考える場面」です。したがって、正解は「アミノ酸 / グリシンやアラニンの構造を考える場面」です。
  
  「アミノ酸 / グリシンやアラニンの構造を考える場面」が正しいです。用語と場面の対応が合っています。
  「活性化エネルギー / 酢酸が塩酸ほど強く電離しない場面」は、用語と場面の対応が合っていません。
  「弱酸 / 鉄や銅、クロムの化合物の色の違いを考える場面」は、用語と場面の対応が合っていません。
  「遷移元素 / 加熱すると反応が進みやすくなる理由を考える場面」は、用語と場面の対応が合っていません。
