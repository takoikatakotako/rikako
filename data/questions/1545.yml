# 化学基礎 問505
id: 1545
type: single_choice
text: |
  「一種類の物質だけからできていて、性質が一定である物質である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸素だけが入った容器を考える場面"
  - "水や二酸化炭素のように複数の元素からできた物質を考える場面"
  - "ナトリウムの陽子数から元素を区別する場面"
  - "塩化ナトリウムが陽イオンと陰イオンの引力でできる場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「一種類の物質だけからできていて、性質が一定である物質である。」と最も関係が深い場面は「酸素だけが入った容器を考える場面」です。したがって、正解は「酸素だけが入った容器を考える場面」です。
  
  「酸素だけが入った容器を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「水や二酸化炭素のように複数の元素からできた物質を考える場面」は、「二種類以上の元素が結び付いてできている純物質である。」と結び付きが強い場面です。
  「ナトリウムの陽子数から元素を区別する場面」は、「原子核の中にある陽子の数を表す数である。」と結び付きが強い場面です。
  「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」は、「陽イオンと陰イオンの静電気的な引力による結び付きである。」と結び付きが強い場面です。
