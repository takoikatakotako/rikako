# 高校化学 問798
id: 2798
type: single_choice
text: |
  「必要な機能をねらって材料を設計すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "チンダル現象"
  - "吸熱反応"
  - "反応速度"
  - "機能性材料"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「必要な機能をねらって材料を設計すること」という見方が大切なのは機能性材料です。したがって、正解は「機能性材料」です。
  
  「チンダル現象」は、その語で大切なのは「コロイドが光を散乱すること」という見方です。
  「吸熱反応」は、その語で大切なのは「周囲から熱を受け取る反応であること」という見方です。
  「反応速度」は、その語で大切なのは「時間あたりにどれだけ変化するかを見ること」という見方です。
  「機能性材料」が正しいです。この見方が大切な語です。
