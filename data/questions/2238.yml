# 高校化学 問238
id: 2238
type: single_choice
text: |
  「気体分子中の結合1 molを切るのに必要なエネルギーである。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "吸熱反応"
  - "光合成"
  - "鉛蓄電池"
  - "結合エネルギー"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  気体分子中の結合1 molを切るのに必要なエネルギーである。 に当てはまる語は結合エネルギーです。したがって、正解は「結合エネルギー」です。
  
  「吸熱反応」は、「反応の結果として周囲から熱を吸収する反応である。」に当てはまる語です。
  「光合成」は、「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」に当てはまる語です。
  「鉛蓄電池」は、「鉛とその化合物を用いた、充電して繰り返し使える電池である。」に当てはまる語です。
  「結合エネルギー」が正しいです。「気体分子中の結合1 molを切るのに必要なエネルギーである。」に当てはまる語です。
