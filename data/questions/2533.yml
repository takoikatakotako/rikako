# 高校化学 問533
id: 2533
type: single_choice
text: |
  「水との親和性が高く、比較的安定なコロイドである。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "デンプンやゼラチンが水中で安定しやすい場面"
  - "反応前後で熱の出入りを比較する場面"
  - "水溶液に電流を流して物質を分解する場面"
  - "高圧や触媒を利用してアンモニアを得る場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「水との親和性が高く、比較的安定なコロイドである。」と最も関係が深い場面は「デンプンやゼラチンが水中で安定しやすい場面」です。したがって、正解は「デンプンやゼラチンが水中で安定しやすい場面」です。
  
  「デンプンやゼラチンが水中で安定しやすい場面」が正しいです。この説明と結び付きが強い場面です。
  「反応前後で熱の出入りを比較する場面」は、「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」と結び付きが強い場面です。
  「水溶液に電流を流して物質を分解する場面」は、「電気エネルギーを使って自発的でない化学変化を起こす操作である。」と結び付きが強い場面です。
  「高圧や触媒を利用してアンモニアを得る場面」は、「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」と結び付きが強い場面です。
