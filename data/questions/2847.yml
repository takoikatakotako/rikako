# 高校化学 問847
id: 2847
type: single_choice
text: |
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "アミノ酸どうしをつなぐ結合であること"
  - "電気を使って反応を進めること"
  - "蒸発と凝縮がつり合うこと"
  - "分子間力で集まった結晶であること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」を理解する上では、「電気を使って反応を進めること」という見方が大切です。したがって、正解は「電気を使って反応を進めること」です。
  
  「アミノ酸どうしをつなぐ結合であること」は、その見方はペプチド結合に関係します。
  「電気を使って反応を進めること」が正しいです。この説明と結び付きが強い見方です。
  「蒸発と凝縮がつり合うこと」は、その見方は気液平衡に関係します。
  「分子間力で集まった結晶であること」は、その見方は分子結晶に関係します。
