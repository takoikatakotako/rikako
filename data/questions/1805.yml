# 化学基礎 問765
id: 1805
type: single_choice
text: |
  「陽子数を表す数であること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "食品や物質が酸化して変質するのを防ぐために用いられる物質である。"
  - "一種類の物質だけからできていて、性質が一定である物質である。"
  - "液体が気体になる状態変化である。"
  - "原子核の中にある陽子の数を表す数である。"
correct: 3
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「陽子数を表す数であること」という見方と最も関係が深い説明は「原子核の中にある陽子の数を表す数である。」です。したがって、正解は「原子核の中にある陽子の数を表す数である。」です。
  
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」は、その説明で大切なのは「酸化による変質を防ぐこと」という見方です。
  「一種類の物質だけからできていて、性質が一定である物質である。」は、その説明で大切なのは「成分が一種類で性質が一定であること」という見方です。
  「液体が気体になる状態変化である。」は、その説明で大切なのは「液体から気体への変化であること」という見方です。
  「原子核の中にある陽子の数を表す数である。」が正しいです。この見方と最も関係が深い説明です。
