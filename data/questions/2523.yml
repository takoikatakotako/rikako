# 高校化学 問523
id: 2523
type: single_choice
text: |
  「溶ける速さと析出する速さが等しくなっている平衡である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "凍結防止剤をまいた道路の水が凍りにくくなる場面"
  - "複数の反応式を組み合わせて全体の反応熱を求める場面"
  - "飽和溶液で見かけ上変化が止まっている場面"
  - "電気分解で気体が発生する電極側を考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「溶ける速さと析出する速さが等しくなっている平衡である。」と最も関係が深い場面は「飽和溶液で見かけ上変化が止まっている場面」です。したがって、正解は「飽和溶液で見かけ上変化が止まっている場面」です。
  
  「凍結防止剤をまいた道路の水が凍りにくくなる場面」は、「溶液の凝固点が純粋な溶媒より低くなる現象である。」と結び付きが強い場面です。
  「複数の反応式を組み合わせて全体の反応熱を求める場面」は、「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」と結び付きが強い場面です。
  「飽和溶液で見かけ上変化が止まっている場面」が正しいです。この説明と結び付きが強い場面です。
  「電気分解で気体が発生する電極側を考える場面」は、「電気分解で酸化が起こる電極である。」と結び付きが強い場面です。
