# 化学基礎 問755
id: 1795
type: single_choice
text: |
  「成分が一種類で性質が一定であること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "物質が酸素を失う、または電子を受け取る変化である。"
  - "一種類の物質だけからできていて、性質が一定である物質である。"
  - "水に溶けても電流をほとんど通さない物質である。"
  - "沸点の違いを利用して液体を分ける方法である。"
correct: 1
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「成分が一種類で性質が一定であること」という見方と最も関係が深い説明は「一種類の物質だけからできていて、性質が一定である物質である。」です。したがって、正解は「一種類の物質だけからできていて、性質が一定である物質である。」です。
  
  「物質が酸素を失う、または電子を受け取る変化である。」は、その説明で大切なのは「酸素の喪失や電子の受け取りに注目すること」という見方です。
  「一種類の物質だけからできていて、性質が一定である物質である。」が正しいです。この見方と最も関係が深い説明です。
  「水に溶けても電流をほとんど通さない物質である。」は、その説明で大切なのは「水溶液でも電流をほとんど通さないこと」という見方です。
  「沸点の違いを利用して液体を分ける方法である。」は、その説明で大切なのは「沸点の違いを利用すること」という見方です。
