# 高校化学 問122
id: 2122
type: single_choice
text: |
  飽和溶液と最も関係が深い場面として、適切なものはどれか。
choices:
  - "加熱すると反応が進みやすくなる理由を考える場面"
  - "生成物から再び反応物が生じる場面を考えるとき"
  - "食塩を加えても底に残るようになった食塩水を考える場面"
  - "平衡がどちらにかたよっているかを数値で見る場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  食塩を加えても底に残るようになった食塩水を考える場面は、飽和溶液と結び付きが強い場面です。したがって、正解は「食塩を加えても底に残るようになった食塩水を考える場面」です。
  
  「加熱すると反応が進みやすくなる理由を考える場面」は、活性化エネルギーと結び付きが強い場面です。
  「生成物から再び反応物が生じる場面を考えるとき」は、可逆反応と結び付きが強い場面です。
  「食塩を加えても底に残るようになった食塩水を考える場面」が正しいです。これは飽和溶液と結び付きが強い場面です。
  「平衡がどちらにかたよっているかを数値で見る場面」は、平衡定数と結び付きが強い場面です。
