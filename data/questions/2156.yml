# 高校化学 問156
id: 2156
type: single_choice
text: |
  平衡定数と最も関係が深い場面として、適切なものはどれか。
choices:
  - "平衡がどちらにかたよっているかを数値で見る場面"
  - "自動車のバッテリーを考える場面"
  - "水素を使って発電し、水を生じる仕組みを考える場面"
  - "電気分解で気体が発生する電極側を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  平衡がどちらにかたよっているかを数値で見る場面は、平衡定数と結び付きが強い場面です。したがって、正解は「平衡がどちらにかたよっているかを数値で見る場面」です。
  
  「平衡がどちらにかたよっているかを数値で見る場面」が正しいです。これは平衡定数と結び付きが強い場面です。
  「自動車のバッテリーを考える場面」は、鉛蓄電池と結び付きが強い場面です。
  「水素を使って発電し、水を生じる仕組みを考える場面」は、燃料電池と結び付きが強い場面です。
  「電気分解で気体が発生する電極側を考える場面」は、陽極と結び付きが強い場面です。
