# 化学基礎 問99
id: 1139
type: single_choice
text: |
  グルコースについての説明として、最も適切なものはどれか。
choices:
  - "代表的な単糖類である。"
  - "代表的な金属である。"
  - "必ずイオン結晶である。"
  - "気体だけで存在する。"
correct: 0
explanation: |
  この問題は、「糖類の基本分類」を確認する問題です。
  
  グルコースは、代表的な単糖類です。したがって、正解は「代表的な単糖類である」です。
  
  「代表的な単糖類である」が正しいです。
  「代表的な金属である」は、適切ではありません。
  「必ずイオン結晶である」は、適切ではありません。
  「気体だけで存在する」は、適切ではありません。
