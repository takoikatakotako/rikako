# 化学基礎 問119
id: 1159
type: single_choice
text: |
  最外殻電子についての説明として、最も適切なものはどれか。
choices:
  - "電子を失って正の電荷をもつ粒子である。"
  - "電子を受け取って負の電荷をもつ粒子である。"
  - "原子のいちばん外側の電子殻にある電子で、化学的な性質に強く関わる。"
  - "陽イオンと陰イオンの間の静電気的な引力による結合である。"
correct: 2
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  最外殻電子は、原子のいちばん外側の電子殻にある電子で、化学的な性質に強く関わる。したがって、正解は「原子のいちばん外側の電子殻にある電子で、化学的な性質に強く関わる。」です。
  
  「電子を失って正の電荷をもつ粒子である。」は、陽イオンの説明です。
  「電子を受け取って負の電荷をもつ粒子である。」は、陰イオンの説明です。
  「原子のいちばん外側の電子殻にある電子で、化学的な性質に強く関わる。」が正しいです。最外殻電子の説明です。
  「陽イオンと陰イオンの間の静電気的な引力による結合である。」は、イオン結合の説明です。
