# 化学基礎 問29
id: 696
type: single_choice
text: |
  共有結合についての説明として、最も適切なものはどれか。
choices:
  - "電子を互いに共有してできる結合である。"
  - "陽子を互いに交換してできる結合である。"
  - "中性子だけでできる結合である。"
  - "原子核どうしが直接くっつく結合である。"
correct: 0
explanation: |
  この問題は、「共有結合の基本的な考え方」を確認する問題です。
  
  共有結合は、原子どうしが電子を共有してできる結合です。分子をつくるときの基本になる結合です。したがって、正解は「電子を互いに共有してできる結合である」です。
  
  「電子を互いに共有してできる結合である」が正しいです。共有結合の基本です。
  「陽子を互いに交換してできる結合である」は、適切ではありません。
  「中性子だけでできる結合である」は、適切ではありません。
  「原子核どうしが直接くっつく結合である」は、適切ではありません。
