# 高校化学 問343
id: 2343
type: single_choice
text: |
  「懐中電灯や時計に入っている電池を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "化学平衡"
  - "乾電池"
  - "ルシャトリエの原理"
  - "電離平衡"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  懐中電灯や時計に入っている電池を考える場面 と最も関係が深いのは乾電池です。したがって、正解は「乾電池」です。
  
  「化学平衡」は、「密閉容器で反応物と生成物の量が一定になる場面」と結び付きが強い語です。
  「乾電池」が正しいです。この具体例と最も関係が深い語です。
  「ルシャトリエの原理」は、「圧力や濃度を変えると平衡が移る方向を考える場面」と結び付きが強い語です。
  「電離平衡」は、「弱酸が一部だけ電離している水溶液を考える場面」と結び付きが強い語です。
