# 高校化学 問72
id: 2072
type: single_choice
text: |
  錯イオンについての説明として、最も適切なものはどれか。
choices:
  - "一方の原子が電子対を与えてできる共有結合である。"
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
  - "遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。"
  - "中心となる金属イオンに配位子が結び付いたイオンである。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  錯イオンは、中心となる金属イオンに配位子が結び付いたイオンである。 したがって、正解は「中心となる金属イオンに配位子が結び付いたイオンである。」です。
  
  「一方の原子が電子対を与えてできる共有結合である。」は、配位結合の説明です。
  「金属元素を炎に入れたときに特有の色を示す反応である。」は、炎色反応の説明です。
  「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」は、銅の説明です。
  「中心となる金属イオンに配位子が結び付いたイオンである。」が正しいです。錯イオンの説明です。
