# 高校化学 問835
id: 2835
type: single_choice
text: |
  「化学反応に伴って出入りする熱量である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "同じ分子式でも構造が違うこと"
  - "反応に伴う熱の出入りを見ること"
  - "アミノ基とカルボキシ基をあわせもつこと"
  - "液体から出た蒸気が示す圧力に注目すること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「化学反応に伴って出入りする熱量である。」を理解する上では、「反応に伴う熱の出入りを見ること」という見方が大切です。したがって、正解は「反応に伴う熱の出入りを見ること」です。
  
  「同じ分子式でも構造が違うこと」は、その見方は異性体に関係します。
  「反応に伴う熱の出入りを見ること」が正しいです。この説明と結び付きが強い見方です。
  「アミノ基とカルボキシ基をあわせもつこと」は、その見方はアミノ酸に関係します。
  「液体から出た蒸気が示す圧力に注目すること」は、その見方は蒸気圧に関係します。
