# 化学基礎 問702
id: 1742
type: single_choice
text: |
  「水とエタノールの混合物を沸点の差で分ける場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "1Lあたりの物質量で表すこと"
  - "沸点の違いを利用すること"
  - "色の変化で液性を見分けること"
  - "電池の中で電気的なつり合いを保つこと"
correct: 1
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「水とエタノールの混合物を沸点の差で分ける場面」では、「沸点の違いを利用すること」という見方が大切です。したがって、正解は「沸点の違いを利用すること」です。
  
  「1Lあたりの物質量で表すこと」は、その見方は1Lの食塩水にどれだけ溶質が溶けているかを表す場面よりもモル濃度と結び付きが強いです。
  「沸点の違いを利用すること」が正しいです。この具体例で大切になる見方です。
  「色の変化で液性を見分けること」は、その見方はBTB溶液やフェノールフタレインで液性を調べる場面よりも指示薬と結び付きが強いです。
  「電池の中で電気的なつり合いを保つこと」は、その見方はダニエル電池で二つの水溶液をつなぐ場面よりも塩橋と結び付きが強いです。
