# 化学基礎 問719
id: 1759
type: single_choice
text: |
  「ナトリウムが電子を1個失いやすい理由を考える場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "放射線を出す同位体であること"
  - "溶解度の差を利用すること"
  - "化学結合やイオンのできやすさに関係すること"
  - "新しい物質ができること"
correct: 2
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「ナトリウムが電子を1個失いやすい理由を考える場面」では、「化学結合やイオンのできやすさに関係すること」という見方が大切です。したがって、正解は「化学結合やイオンのできやすさに関係すること」です。
  
  「放射線を出す同位体であること」は、その見方は医療や年代測定に利用される炭素14を考える場面よりも放射性同位体と結び付きが強いです。
  「溶解度の差を利用すること」は、その見方はミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面よりも再結晶と結び付きが強いです。
  「化学結合やイオンのできやすさに関係すること」が正しいです。この具体例で大切になる見方です。
  「新しい物質ができること」は、その見方は鉄がさびて別の物質になる場面よりも化学変化と結び付きが強いです。
