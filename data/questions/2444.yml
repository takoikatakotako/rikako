# 高校化学 問444
id: 2444
type: single_choice
text: |
  鉛蓄電池を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "塩基の強さを電離のしやすさで見ること"
  - "2 価の陽イオンになりやすいこと"
  - "最外殻が安定していて反応しにくいこと"
  - "充電して再び使えること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  鉛蓄電池では、「充電して再び使えること」という見方が大切です。したがって、正解は「充電して再び使えること」です。
  
  「塩基の強さを電離のしやすさで見ること」は、塩基解離定数に関係する見方です。
  「2 価の陽イオンになりやすいこと」は、アルカリ土類金属に関係する見方です。
  「最外殻が安定していて反応しにくいこと」は、貴ガスに関係する見方です。
  「充電して再び使えること」が正しいです。鉛蓄電池の要点を表しています。
