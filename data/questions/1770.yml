# 化学基礎 問730
id: 1770
type: single_choice
text: |
  「水素と酸素から水ができる反応を式で表す場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "一種類の元素だけからできること"
  - "反応する物質とできる物質の関係を式で示すこと"
  - "固体から直接気体になること"
  - "電子を受け取って負に帯電すること"
correct: 1
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「水素と酸素から水ができる反応を式で表す場面」では、「反応する物質とできる物質の関係を式で示すこと」という見方が大切です。したがって、正解は「反応する物質とできる物質の関係を式で示すこと」です。
  
  「一種類の元素だけからできること」は、その見方は鉄や酸素のように一種類の元素だけからできた物質を考える場面よりも単体と結び付きが強いです。
  「反応する物質とできる物質の関係を式で示すこと」が正しいです。この具体例で大切になる見方です。
  「固体から直接気体になること」は、その見方はドライアイスがそのまま気体になる場面よりも昇華と結び付きが強いです。
  「電子を受け取って負に帯電すること」は、その見方は塩素原子が電子を1個受け取って Cl- になる場面よりも陰イオンと結び付きが強いです。
