# 化学基礎 問993
id: 2033
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "クロマトグラフィー / 固体から液体への変化であること"
  - "融解 / 性質が周期的にくり返されること"
  - "周期律 / 移動しやすさの違いを利用すること"
  - "塩橋 / 電池の中で電気的なつり合いを保つこと"
correct: 3
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「塩橋 / 電池の中で電気的なつり合いを保つこと」です。したがって、正解は「塩橋 / 電池の中で電気的なつり合いを保つこと」です。
  
  「クロマトグラフィー / 固体から液体への変化であること」は、用語と要点の対応が合っていません。
  「融解 / 性質が周期的にくり返されること」は、用語と要点の対応が合っていません。
  「周期律 / 移動しやすさの違いを利用すること」は、用語と要点の対応が合っていません。
  「塩橋 / 電池の中で電気的なつり合いを保つこと」が正しいです。用語と要点の対応が合っています。
