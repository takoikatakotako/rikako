# 化学基礎 問440
id: 1480
type: single_choice
text: |
  「相手を還元させ、自身は酸化される物質である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "中和"
  - "電離度"
  - "還元剤"
  - "電解質"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  相手を還元させ、自身は酸化される物質である。 に当てはまる語は還元剤です。したがって、正解は「還元剤」です。
  
  「中和」は、「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」に当てはまる語です。
  「電離度」は、「溶けた物質のうち、電離してイオンになった割合である。」に当てはまる語です。
  「還元剤」が正しいです。「相手を還元させ、自身は酸化される物質である。」に当てはまる語です。
  「電解質」は、「水に溶けたり融解したりすると電流を通す物質である。」に当てはまる語です。
