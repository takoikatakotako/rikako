# 高校化学 問41
id: 2041
type: single_choice
text: |
  化学発光についての説明として、最も適切なものはどれか。
choices:
  - "化学反応によって光が放出される現象である。"
  - "コロイド粒子が光を散乱するため、光の道筋が見える現象である。"
  - "半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。"
  - "水との親和性が高く、比較的安定なコロイドである。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  化学発光は、化学反応によって光が放出される現象である。 したがって、正解は「化学反応によって光が放出される現象である。」です。
  
  「化学反応によって光が放出される現象である。」が正しいです。化学発光の説明です。
  「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」は、チンダル現象の説明です。
  「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」は、透析の説明です。
  「水との親和性が高く、比較的安定なコロイドである。」は、親水コロイドの説明です。
