# 化学基礎 問676
id: 1716
type: single_choice
text: |
  「分子の中で電荷のかたよりがある分子である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電荷のかたよりがあること"
  - "金属元素ごとに炎の色が異なること"
  - "移動しやすさの違いを利用すること"
  - "固体から液体への変化であること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「分子の中で電荷のかたよりがある分子である。」を理解する上では、「電荷のかたよりがあること」という見方が大切です。したがって、正解は「電荷のかたよりがあること」です。
  
  「電荷のかたよりがあること」が正しいです。この説明と結び付きが強い見方です。
  「金属元素ごとに炎の色が異なること」は、その見方は炎色反応に関係します。
  「移動しやすさの違いを利用すること」は、その見方はクロマトグラフィーに関係します。
  「固体から液体への変化であること」は、その見方は融解に関係します。
