# 令和7年度 ITパスポート 公開問題 問94
id: 846
type: single_choice
text: |
  稼働率0.9の装置で並列システムを構成したい。このシステムの稼働率を0.999とするためには、最低何台の装置で並列システムを構成する必要があるか。ここで、並列システムを構成したときに、少なくとも1台の装置が稼働していればシステムは正常に稼働しているものとする。
choices:
  - "2"
  - "3"
  - "4"
  - "5"
correct: 1
explanation: |
  この問題の公開解答では「3」が正解とされています。
  
  「2」は公開解答では正解ではありません。
  「3」が公開解答で正解とされています。
  「4」は公開解答では正解ではありません。
  「5」は公開解答では正解ではありません。
