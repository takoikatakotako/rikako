# 化学基礎 問165
id: 1205
type: single_choice
text: |
  原子番号の例として、最も適切なものはどれか。
choices:
  - "炭素 12 の 12"
  - "炭素 12 と炭素 14"
  - "ナトリウムとカリウムが似た性質を示すこと"
  - "炭素の原子番号が 6 であること"
correct: 3
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  炭素の原子番号が 6 であることは、原子番号の例です。したがって、正解は「炭素の原子番号が 6 であること」です。
  
  「炭素 12 の 12」は、質量数の例として見る方が適切です。
  「炭素 12 と炭素 14」は、同位体の例として見る方が適切です。
  「ナトリウムとカリウムが似た性質を示すこと」は、周期律の例として見る方が適切です。
  「炭素の原子番号が 6 であること」が正しいです。これは原子番号の例です。
