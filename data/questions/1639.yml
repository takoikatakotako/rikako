# 化学基礎 問599
id: 1639
type: single_choice
text: |
  「ポリエチレンやタンパク質のような長い分子を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "二種類以上の元素が結び付いてできている純物質である。"
  - "多数の小さな単位がつながってできた大きな分子からなる化合物である。"
  - "原子核の中にある陽子の数を表す数である。"
  - "陽イオンと陰イオンの静電気的な引力による結び付きである。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「ポリエチレンやタンパク質のような長い分子を考える場面」を説明した文として適切なのは「多数の小さな単位がつながってできた大きな分子からなる化合物である。」です。したがって、正解は「多数の小さな単位がつながってできた大きな分子からなる化合物である。」です。
  
  「二種類以上の元素が結び付いてできている純物質である。」は、この説明は「水や二酸化炭素のように複数の元素からできた物質を考える場面」と結び付きが強いです。
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」が正しいです。この具体例を説明した文です。
  「原子核の中にある陽子の数を表す数である。」は、この説明は「ナトリウムの陽子数から元素を区別する場面」と結び付きが強いです。
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」は、この説明は「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」と結び付きが強いです。
