# 化学基礎 問158
id: 1198
type: single_choice
text: |
  化合物の例として、最も適切なものはどれか。
choices:
  - "水 H2O"
  - "氷が溶けて水になる変化"
  - "鉄がさびる変化"
  - "氷が水になる変化"
correct: 0
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  水 H2Oは、化合物の例です。したがって、正解は「水 H2O」です。
  
  「水 H2O」が正しいです。これは化合物の例です。
  「氷が溶けて水になる変化」は、物理変化の例として見る方が適切です。
  「鉄がさびる変化」は、化学変化の例として見る方が適切です。
  「氷が水になる変化」は、融解の例として見る方が適切です。
