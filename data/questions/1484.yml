# 化学基礎 問444
id: 1484
type: single_choice
text: |
  「水に溶けたり融解したりすると電流を通す物質である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "酸化"
  - "酸化剤"
  - "電解質"
  - "イオン化傾向"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  水に溶けたり融解したりすると電流を通す物質である。 に当てはまる語は電解質です。したがって、正解は「電解質」です。
  
  「酸化」は、「物質が酸素と結び付く、または電子を失う変化である。」に当てはまる語です。
  「酸化剤」は、「相手を酸化させ、自身は還元される物質である。」に当てはまる語です。
  「電解質」が正しいです。「水に溶けたり融解したりすると電流を通す物質である。」に当てはまる語です。
  「イオン化傾向」は、「金属が電子を失ってイオンになりやすい性質の強さである。」に当てはまる語です。
