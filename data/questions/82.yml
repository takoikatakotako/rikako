# 令和7年度 ITパスポート 公開問題 問1
id: 82
type: single_choice
text: |
  A社がB社に作業の一部を請負契約で委託している。作業形態a～cのうち、いわゆる装請負とみなされる状態だけを全て挙げたものはどれか。
  
  a: B社の従業員が、A社内において、A社の責任者の指揮命令の下で、請負契約で取り決めた作業を行っている。
  b: B社の従業員が、A社内において、B社の責任者の指揮命令の下で、請負契約で取り決めた作業を行っている。
  c: B社の従業員が、B社内において、A社の責任者の指揮命令の下で、請負契約で取り決めた作業を行っている。
choices:
  - "a"
  - "a, b"
  - "a, c"
  - "b, c"
correct: 2
explanation: |
  この問題は、「だれが指揮命令しているか」がポイントです。
  
  請負では、仕事を請け負ったB社が、自分の責任で従業員に指示を出す必要があります。A社がB社の従業員に直接指示を出していると、偽装請負とみなされるおそれがあります。
  
  したがって、A社の責任者が直接指揮命令している a と c が該当するので、正解は「a, c」です。
  
  a: A社内で作業していても、A社が直接指示しているので偽装請負に当たります。
  b: A社内で作業していても、B社の責任者が指示しているので偽装請負には当たりません。
  c: B社内で作業していても、A社が直接指示しているので偽装請負に当たります。
