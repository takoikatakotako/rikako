# 高校化学 問587
id: 2587
type: single_choice
text: |
  「六角形の環状構造をもつ代表的な芳香族炭化水素である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "衣類やロープに使われる合成繊維を考える場面"
  - "水やエタノールの沸点の違いを考える場面"
  - "芳香族化合物の基本構造を学ぶ場面"
  - "高圧や低温で気体のふるまいが理想気体からずれる場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「六角形の環状構造をもつ代表的な芳香族炭化水素である。」と最も関係が深い場面は「芳香族化合物の基本構造を学ぶ場面」です。したがって、正解は「芳香族化合物の基本構造を学ぶ場面」です。
  
  「衣類やロープに使われる合成繊維を考える場面」は、「アミド結合をもつ合成繊維の代表的な高分子化合物である。」と結び付きが強い場面です。
  「水やエタノールの沸点の違いを考える場面」は、「分子どうしの間にはたらく比較的弱い引力である。」と結び付きが強い場面です。
  「芳香族化合物の基本構造を学ぶ場面」が正しいです。この説明と結び付きが強い場面です。
  「高圧や低温で気体のふるまいが理想気体からずれる場面」は、「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」と結び付きが強い場面です。
