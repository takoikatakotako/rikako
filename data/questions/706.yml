# 化学基礎 問39
id: 706
type: single_choice
text: |
  酸性の水溶液についての説明として、最も適切なものはどれか。
choices:
  - "水素イオン濃度が水酸化物イオン濃度より大きい。"
  - "水素イオン濃度が常に 0 である。"
  - "水酸化物イオンだけが存在する。"
  - "必ず金属を含む。"
correct: 0
explanation: |
  この問題は、「酸性のときにイオンの割合がどうなるか」を考える問題です。
  
  酸性の水溶液では、水素イオン濃度が水酸化物イオン濃度より大きくなっています。したがって、正解は「水素イオン濃度が水酸化物イオン濃度より大きい」です。
  
  「水素イオン濃度が水酸化物イオン濃度より大きい」が正しいです。酸性の基本です。
  「水素イオン濃度が常に 0 である」は、適切ではありません。
  「水酸化物イオンだけが存在する」は、適切ではありません。
  「必ず金属を含む」は、酸性の条件ではありません。
