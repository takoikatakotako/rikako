# 高校化学 問578
id: 2578
type: single_choice
text: |
  「炭素どうしが単結合だけでつながった炭化水素である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "メタンの水素が塩素に置き換わる場面"
  - "メタンやエタンの性質を考える場面"
  - "酵素や筋肉の主成分を考える場面"
  - "水が沸騰し始める温度を考える場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「炭素どうしが単結合だけでつながった炭化水素である。」と最も関係が深い場面は「メタンやエタンの性質を考える場面」です。したがって、正解は「メタンやエタンの性質を考える場面」です。
  
  「メタンの水素が塩素に置き換わる場面」は、「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」と結び付きが強い場面です。
  「メタンやエタンの性質を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「酵素や筋肉の主成分を考える場面」は、「多数のアミノ酸がつながってできた天然高分子化合物である。」と結び付きが強い場面です。
  「水が沸騰し始める温度を考える場面」は、「液体の蒸気圧が外圧に等しくなる温度である。」と結び付きが強い場面です。
