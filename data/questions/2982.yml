# 高校化学 問982
id: 2982
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "化学発光 / 加熱すると反応が進みやすくなる理由を考える場面"
  - "異性体 / ブタンとイソブタンを比べる場面"
  - "活性化エネルギー / 酢酸が塩酸ほど強く電離しない場面"
  - "弱酸 / ケミカルライトが光る仕組みを考える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「異性体 / ブタンとイソブタンを比べる場面」です。したがって、正解は「異性体 / ブタンとイソブタンを比べる場面」です。
  
  「化学発光 / 加熱すると反応が進みやすくなる理由を考える場面」は、用語と場面の対応が合っていません。
  「異性体 / ブタンとイソブタンを比べる場面」が正しいです。用語と場面の対応が合っています。
  「活性化エネルギー / 酢酸が塩酸ほど強く電離しない場面」は、用語と場面の対応が合っていません。
  「弱酸 / ケミカルライトが光る仕組みを考える場面」は、用語と場面の対応が合っていません。
