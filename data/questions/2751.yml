# 高校化学 問751
id: 2751
type: single_choice
text: |
  「時間あたりにどれだけ変化するかを見ること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "反応速度"
  - "異性体"
  - "アミノ酸"
  - "蒸気圧"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「時間あたりにどれだけ変化するかを見ること」という見方が大切なのは反応速度です。したがって、正解は「反応速度」です。
  
  「反応速度」が正しいです。この見方が大切な語です。
  「異性体」は、その語で大切なのは「同じ分子式でも構造が違うこと」という見方です。
  「アミノ酸」は、その語で大切なのは「アミノ基とカルボキシ基をあわせもつこと」という見方です。
  「蒸気圧」は、その語で大切なのは「液体から出た蒸気が示す圧力に注目すること」という見方です。
