# 化学基礎 問859
id: 1899
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "クロマトグラフィー / 固体が液体に変わる状態変化である。"
  - "融解 / 元素を原子番号の順に並べると性質が周期的に変化するというきまりである。"
  - "周期律 / 成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
  - "物理変化 / 物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
correct: 3
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「物理変化 / 物質そのものの種類は変わらず、状態や形だけが変わる変化である。」です。したがって、正解は「物理変化 / 物質そのものの種類は変わらず、状態や形だけが変わる変化である。」です。
  
  「クロマトグラフィー / 固体が液体に変わる状態変化である。」は、用語と説明の対応が合っていません。
  「融解 / 元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」は、用語と説明の対応が合っていません。
  「周期律 / 成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」は、用語と説明の対応が合っていません。
  「物理変化 / 物質そのものの種類は変わらず、状態や形だけが変わる変化である。」が正しいです。用語と説明の対応が合っています。
