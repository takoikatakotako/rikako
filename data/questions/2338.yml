# 高校化学 問338
id: 2338
type: single_choice
text: |
  「どの結合が切れやすいかを比べる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "結合エネルギー"
  - "燃料電池"
  - "陽極"
  - "ファラデーの法則"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  どの結合が切れやすいかを比べる場面 と最も関係が深いのは結合エネルギーです。したがって、正解は「結合エネルギー」です。
  
  「結合エネルギー」が正しいです。この具体例と最も関係が深い語です。
  「燃料電池」は、「水素を使って発電し、水を生じる仕組みを考える場面」と結び付きが強い語です。
  「陽極」は、「電気分解で気体が発生する電極側を考える場面」と結び付きが強い語です。
  「ファラデーの法則」は、「流した電流が大きいほど析出量が増える場面」と結び付きが強い語です。
