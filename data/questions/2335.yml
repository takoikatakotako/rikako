# 高校化学 問335
id: 2335
type: single_choice
text: |
  「物質を燃やしたときに熱が出ることを考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "乾電池"
  - "反応熱"
  - "リチウムイオン電池"
  - "電気分解"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  物質を燃やしたときに熱が出ることを考える場面 と最も関係が深いのは反応熱です。したがって、正解は「反応熱」です。
  
  「乾電池」は、「懐中電灯や時計に入っている電池を考える場面」と結び付きが強い語です。
  「反応熱」が正しいです。この具体例と最も関係が深い語です。
  「リチウムイオン電池」は、「スマートフォンやノートパソコンの電池を考える場面」と結び付きが強い語です。
  「電気分解」は、「水溶液に電流を流して物質を分解する場面」と結び付きが強い語です。
