# 化学基礎 問707
id: 1747
type: single_choice
text: |
  「鉄や酸素のように一種類の元素だけからできた物質を考える場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "酸性と塩基性の強さを数で見ること"
  - "金属のイオンになりやすさを比べること"
  - "一種類の元素だけからできること"
  - "酸化による変質を防ぐこと"
correct: 2
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「鉄や酸素のように一種類の元素だけからできた物質を考える場面」では、「一種類の元素だけからできること」という見方が大切です。したがって、正解は「一種類の元素だけからできること」です。
  
  「酸性と塩基性の強さを数で見ること」は、その見方はレモン水とせっけん水の酸性・塩基性を比べる場面よりもpHと結び付きが強いです。
  「金属のイオンになりやすさを比べること」は、その見方は亜鉛が銅より先にイオンになりやすいことを見る場面よりもイオン化傾向と結び付きが強いです。
  「一種類の元素だけからできること」が正しいです。この具体例で大切になる見方です。
  「酸化による変質を防ぐこと」は、その見方は食品の変色や劣化を防ぐためにビタミンCを使う場面よりも酸化防止剤と結び付きが強いです。
