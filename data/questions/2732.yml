# 高校化学 問732
id: 2732
type: single_choice
text: |
  「コロイド粒子の電荷に注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "弱酸"
  - "電気泳動"
  - "遷移元素"
  - "カルボン酸"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「コロイド粒子の電荷に注目すること」という見方が大切なのは電気泳動です。したがって、正解は「電気泳動」です。
  
  「弱酸」は、その語で大切なのは「電離が部分的に起こること」という見方です。
  「電気泳動」が正しいです。この見方が大切な語です。
  「遷移元素」は、その語で大切なのは「多様な酸化数や色、触媒作用に注目すること」という見方です。
  「カルボン酸」は、その語で大切なのは「カルボキシ基をもち酸性を示すこと」という見方です。
