# 化学基礎 問990
id: 2030
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "還元剤 / 相手を還元させ、自分は酸化されること"
  - "ろ過 / 複数の元素が結び付いてできること"
  - "化合物 / 陽子数を表す数であること"
  - "原子番号 / 水に溶けない固体を液体から分けること"
correct: 0
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「還元剤 / 相手を還元させ、自分は酸化されること」です。したがって、正解は「還元剤 / 相手を還元させ、自分は酸化されること」です。
  
  「還元剤 / 相手を還元させ、自分は酸化されること」が正しいです。用語と要点の対応が合っています。
  「ろ過 / 複数の元素が結び付いてできること」は、用語と要点の対応が合っていません。
  「化合物 / 陽子数を表す数であること」は、用語と要点の対応が合っていません。
  「原子番号 / 水に溶けない固体を液体から分けること」は、用語と要点の対応が合っていません。
