# 高校化学 問878
id: 2878
type: single_choice
text: |
  「炭素どうしが単結合だけでつながった炭化水素である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "炭素間が単結合だけであること"
  - "蒸気圧降下の結果として沸点が上がること"
  - "一定圧力での熱の出入りに注目すること"
  - "電気を使って反応を進めること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「炭素どうしが単結合だけでつながった炭化水素である。」を理解する上では、「炭素間が単結合だけであること」という見方が大切です。したがって、正解は「炭素間が単結合だけであること」です。
  
  「炭素間が単結合だけであること」が正しいです。この説明と結び付きが強い見方です。
  「蒸気圧降下の結果として沸点が上がること」は、その見方は沸点上昇に関係します。
  「一定圧力での熱の出入りに注目すること」は、その見方はエンタルピー変化に関係します。
  「電気を使って反応を進めること」は、その見方は電気分解に関係します。
