# 高校化学 問741
id: 2741
type: single_choice
text: |
  「化学反応のエネルギーが光として出ること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "錯イオン"
  - "アルコール"
  - "化学発光"
  - "ペプチド結合"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「化学反応のエネルギーが光として出ること」という見方が大切なのは化学発光です。したがって、正解は「化学発光」です。
  
  「錯イオン」は、その語で大切なのは「金属イオンと配位子の組合せに注目すること」という見方です。
  「アルコール」は、その語で大切なのは「ヒドロキシ基をもつこと」という見方です。
  「化学発光」が正しいです。この見方が大切な語です。
  「ペプチド結合」は、その語で大切なのは「アミノ酸どうしをつなぐ結合であること」という見方です。
