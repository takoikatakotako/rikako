# 高校化学 問781
id: 2781
type: single_choice
text: |
  「もとの一部が別のものに置き換わること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "実在気体"
  - "溶解平衡"
  - "置換反応"
  - "疎水コロイド"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「もとの一部が別のものに置き換わること」という見方が大切なのは置換反応です。したがって、正解は「置換反応」です。
  
  「実在気体」は、その語で大切なのは「分子の体積と分子間力の影響に注目すること」という見方です。
  「溶解平衡」は、その語で大切なのは「溶解と析出がつり合うこと」という見方です。
  「置換反応」が正しいです。この見方が大切な語です。
  「疎水コロイド」は、その語で大切なのは「水となじみにくく不安定になりやすいこと」という見方です。
