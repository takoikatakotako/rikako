# 高校化学 問950
id: 2950
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "シャルルの法則 / 食塩が水に溶けて見えなくなる場面"
  - "ファラデーの法則 / 流した電流が大きいほど析出量が増える場面"
  - "溶解 / コロイド溶液から余分な電解質を取り除く場面"
  - "透析 / 温めた風船がふくらみやすくなる場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「ファラデーの法則 / 流した電流が大きいほど析出量が増える場面」です。したがって、正解は「ファラデーの法則 / 流した電流が大きいほど析出量が増える場面」です。
  
  「シャルルの法則 / 食塩が水に溶けて見えなくなる場面」は、用語と場面の対応が合っていません。
  「ファラデーの法則 / 流した電流が大きいほど析出量が増える場面」が正しいです。用語と場面の対応が合っています。
  「溶解 / コロイド溶液から余分な電解質を取り除く場面」は、用語と場面の対応が合っていません。
  「透析 / 温めた風船がふくらみやすくなる場面」は、用語と場面の対応が合っていません。
