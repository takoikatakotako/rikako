# 高校化学 問132
id: 2132
type: single_choice
text: |
  電気泳動と最も関係が深い場面として、適切なものはどれか。
choices:
  - "コロイド粒子が陽極や陰極へ移動する様子を考える場面"
  - "酢酸ナトリウム水溶液が塩基性を示す理由を考える場面"
  - "アンモニア水が強塩基ほど完全には電離しない場面"
  - "どの塩基がより電離しやすいかを比べる場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  コロイド粒子が陽極や陰極へ移動する様子を考える場面は、電気泳動と結び付きが強い場面です。したがって、正解は「コロイド粒子が陽極や陰極へ移動する様子を考える場面」です。
  
  「コロイド粒子が陽極や陰極へ移動する様子を考える場面」が正しいです。これは電気泳動と結び付きが強い場面です。
  「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」は、塩の加水分解と結び付きが強い場面です。
  「アンモニア水が強塩基ほど完全には電離しない場面」は、弱塩基と結び付きが強い場面です。
  「どの塩基がより電離しやすいかを比べる場面」は、塩基解離定数と結び付きが強い場面です。
