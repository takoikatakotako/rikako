# 高校化学 問305
id: 2305
type: single_choice
text: |
  「密閉容器で水面の高さが変わらなくなる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "沸点上昇"
  - "浸透圧"
  - "チンダル現象"
  - "気液平衡"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  密閉容器で水面の高さが変わらなくなる場面 と最も関係が深いのは気液平衡です。したがって、正解は「気液平衡」です。
  
  「沸点上昇」は、「食塩水の沸点が水より少し高くなることを考える場面」と結び付きが強い語です。
  「浸透圧」は、「薄い溶液側から濃い溶液側へ水が移動する場面」と結び付きが強い語です。
  「チンダル現象」は、「薄暗い部屋でコロイドに光を当てると筋が見える場面」と結び付きが強い語です。
  「気液平衡」が正しいです。この具体例と最も関係が深い語です。
