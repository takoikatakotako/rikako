# 高校化学 問498
id: 2498
type: single_choice
text: |
  機能性材料を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "金属イオンと配位子の組合せに注目すること"
  - "必要な機能をねらって材料を設計すること"
  - "多様な酸化数や色、触媒作用に注目すること"
  - "実用性が高く、酸化数が変わりやすいこと"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  機能性材料では、「必要な機能をねらって材料を設計すること」という見方が大切です。したがって、正解は「必要な機能をねらって材料を設計すること」です。
  
  「金属イオンと配位子の組合せに注目すること」は、錯イオンに関係する見方です。
  「必要な機能をねらって材料を設計すること」が正しいです。機能性材料の要点を表しています。
  「多様な酸化数や色、触媒作用に注目すること」は、遷移元素に関係する見方です。
  「実用性が高く、酸化数が変わりやすいこと」は、鉄に関係する見方です。
