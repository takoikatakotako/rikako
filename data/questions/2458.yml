# 高校化学 問458
id: 2458
type: single_choice
text: |
  アンモニア合成を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "コロイドが光を散乱すること"
  - "条件を工夫して平衡を生成物側へ寄せること"
  - "半透膜を通る粒子の大きさの違いを利用すること"
  - "水となじみやすく安定しやすいこと"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  アンモニア合成では、「条件を工夫して平衡を生成物側へ寄せること」という見方が大切です。したがって、正解は「条件を工夫して平衡を生成物側へ寄せること」です。
  
  「コロイドが光を散乱すること」は、チンダル現象に関係する見方です。
  「条件を工夫して平衡を生成物側へ寄せること」が正しいです。アンモニア合成の要点を表しています。
  「半透膜を通る粒子の大きさの違いを利用すること」は、透析に関係する見方です。
  「水となじみやすく安定しやすいこと」は、親水コロイドに関係する見方です。
