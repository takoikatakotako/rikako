# 化学基礎 問85
id: 1125
type: single_choice
text: |
  酸化銅 CuO から銅 Cu ができる変化として、最も適切なものはどれか。
choices:
  - "還元"
  - "酸化"
  - "融解"
  - "蒸発"
correct: 0
explanation: |
  この問題は、「酸素を失う変化の名前」を考える問題です。
  
  酸化銅 CuO が銅 Cu になるときは、酸素を失っています。このような変化は還元です。したがって、正解は「還元」です。
  
  「還元」が正しいです。酸素を失う変化です。
  「酸化」は、酸素を受け取る側の変化です。
  「融解」は、状態変化です。
  「蒸発」は、状態変化です。
