# 高校化学 問799
id: 2799
type: single_choice
text: |
  「資源を循環させて無駄を減らすこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "資源の再利用"
  - "ブラウン運動"
  - "化学発光"
  - "活性化エネルギー"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「資源を循環させて無駄を減らすこと」という見方が大切なのは資源の再利用です。したがって、正解は「資源の再利用」です。
  
  「資源の再利用」が正しいです。この見方が大切な語です。
  「ブラウン運動」は、その語で大切なのは「粒子が周囲の分子にぶつかって動くこと」という見方です。
  「化学発光」は、その語で大切なのは「化学反応のエネルギーが光として出ること」という見方です。
  「活性化エネルギー」は、その語で大切なのは「反応を始めるための壁に注目すること」という見方です。
