# 化学基礎 問779
id: 1819
type: single_choice
text: |
  「1Lあたりの物質量で表すこと」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "液体が気体になる状態変化である。"
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
  - "原子のいちばん外側の電子殻にある電子である。"
  - "分子の中で電荷のかたよりがある分子である。"
correct: 1
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「1Lあたりの物質量で表すこと」という見方と最も関係が深い説明は「溶液1L中に溶けている溶質の物質量を表した濃度である。」です。したがって、正解は「溶液1L中に溶けている溶質の物質量を表した濃度である。」です。
  
  「液体が気体になる状態変化である。」は、その説明で大切なのは「液体から気体への変化であること」という見方です。
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」が正しいです。この見方と最も関係が深い説明です。
  「原子のいちばん外側の電子殻にある電子である。」は、その説明で大切なのは「化学結合やイオンのできやすさに関係すること」という見方です。
  「分子の中で電荷のかたよりがある分子である。」は、その説明で大切なのは「電荷のかたよりがあること」という見方です。
