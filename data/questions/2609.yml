# 高校化学 問609
id: 2609
type: single_choice
text: |
  「温めた風船がふくらみやすくなる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "溶液の凝固点が純粋な溶媒より低くなる現象である。"
  - "一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。"
  - "反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。"
  - "電気分解で酸化が起こる電極である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「温めた風船がふくらみやすくなる場面」を説明した文として適切なのは「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」です。したがって、正解は「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」です。
  
  「溶液の凝固点が純粋な溶媒より低くなる現象である。」は、この説明は「凍結防止剤をまいた道路の水が凍りにくくなる場面」と結び付きが強いです。
  「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」が正しいです。この具体例を説明した文です。
  「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」は、この説明は「複数の反応式を組み合わせて全体の反応熱を求める場面」と結び付きが強いです。
  「電気分解で酸化が起こる電極である。」は、この説明は「電気分解で気体が発生する電極側を考える場面」と結び付きが強いです。
