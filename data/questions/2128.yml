# 高校化学 問128
id: 2128
type: single_choice
text: |
  コロイドと最も関係が深い場面として、適切なものはどれか。
choices:
  - "牛乳やゼラチン溶液のような見た目の系を考える場面"
  - "高圧や触媒を利用してアンモニアを得る場面"
  - "中性の水で H+ と OH- の関係を考える場面"
  - "酢酸ナトリウム水溶液が塩基性を示す理由を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  牛乳やゼラチン溶液のような見た目の系を考える場面は、コロイドと結び付きが強い場面です。したがって、正解は「牛乳やゼラチン溶液のような見た目の系を考える場面」です。
  
  「牛乳やゼラチン溶液のような見た目の系を考える場面」が正しいです。これはコロイドと結び付きが強い場面です。
  「高圧や触媒を利用してアンモニアを得る場面」は、アンモニア合成と結び付きが強い場面です。
  「中性の水で H+ と OH- の関係を考える場面」は、水のイオン積と結び付きが強い場面です。
  「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」は、塩の加水分解と結び付きが強い場面です。
