# 高校化学 問768
id: 2768
type: single_choice
text: |
  「2 価の陽イオンになりやすいこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "資源の再利用"
  - "アルカリ土類金属"
  - "理想気体の状態方程式"
  - "溶解度"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「2 価の陽イオンになりやすいこと」という見方が大切なのはアルカリ土類金属です。したがって、正解は「アルカリ土類金属」です。
  
  「資源の再利用」は、その語で大切なのは「資源を循環させて無駄を減らすこと」という見方です。
  「アルカリ土類金属」が正しいです。この見方が大切な語です。
  「理想気体の状態方程式」は、その語で大切なのは「圧力、体積、物質量、温度をまとめて扱うこと」という見方です。
  「溶解度」は、その語で大切なのは「どこまで溶けるかの限度に注目すること」という見方です。
