# 化学基礎 問951
id: 1991
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "蒸発 / 化学結合やイオンのできやすさに関係すること"
  - "ろ過 / 水に溶けない固体を液体から分けること"
  - "最外殻電子 / 電荷のかたよりがあること"
  - "極性分子 / 液体から気体への変化であること"
correct: 1
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「ろ過 / 水に溶けない固体を液体から分けること」です。したがって、正解は「ろ過 / 水に溶けない固体を液体から分けること」です。
  
  「蒸発 / 化学結合やイオンのできやすさに関係すること」は、用語と要点の対応が合っていません。
  「ろ過 / 水に溶けない固体を液体から分けること」が正しいです。用語と要点の対応が合っています。
  「最外殻電子 / 電荷のかたよりがあること」は、用語と要点の対応が合っていません。
  「極性分子 / 液体から気体への変化であること」は、用語と要点の対応が合っていません。
