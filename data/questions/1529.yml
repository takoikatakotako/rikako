# 化学基礎 問489
id: 1529
type: single_choice
text: |
  酸化剤を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水溶液でも電流をほとんど通さないこと"
  - "金属元素ごとに炎の色が異なること"
  - "相手を酸化させ、自分は還元されること"
  - "小さな単位が多数つながっていること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  酸化剤では、「相手を酸化させ、自分は還元されること」という見方が大切です。したがって、正解は「相手を酸化させ、自分は還元されること」です。
  
  「水溶液でも電流をほとんど通さないこと」は、非電解質に関係する見方です。
  「金属元素ごとに炎の色が異なること」は、炎色反応に関係する見方です。
  「相手を酸化させ、自分は還元されること」が正しいです。酸化剤の要点を表しています。
  「小さな単位が多数つながっていること」は、高分子化合物に関係する見方です。
