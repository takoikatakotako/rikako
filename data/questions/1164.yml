# 化学基礎 問124
id: 1164
type: single_choice
text: |
  金属結合についての説明として、最も適切なものはどれか。
choices:
  - "原子が結び付いてできた、一つのまとまりとして振る舞う粒子である。"
  - "分子全体として電荷の偏りがある分子である。"
  - "分子全体として電荷の偏りが打ち消し合っている分子である。"
  - "自由電子を介して金属原子どうしが結び付く結合である。"
correct: 3
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  金属結合は、自由電子を介して金属原子どうしが結び付く結合である。したがって、正解は「自由電子を介して金属原子どうしが結び付く結合である。」です。
  
  「原子が結び付いてできた、一つのまとまりとして振る舞う粒子である。」は、分子の説明です。
  「分子全体として電荷の偏りがある分子である。」は、極性分子の説明です。
  「分子全体として電荷の偏りが打ち消し合っている分子である。」は、無極性分子の説明です。
  「自由電子を介して金属原子どうしが結び付く結合である。」が正しいです。金属結合の説明です。
