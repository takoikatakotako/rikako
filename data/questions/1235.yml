# 化学基礎 問195
id: 1235
type: single_choice
text: |
  炎色反応の例として、最も適切なものはどれか。
choices:
  - "強酸は電離度が大きいこと"
  - "ナトリウムが黄色を示すこと"
  - "BTB 溶液"
  - "アスコルビン酸"
correct: 1
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  ナトリウムが黄色を示すことは、炎色反応の例です。したがって、正解は「ナトリウムが黄色を示すこと」です。
  
  「強酸は電離度が大きいこと」は、電離度の例として見る方が適切です。
  「ナトリウムが黄色を示すこと」が正しいです。これは炎色反応の例です。
  「BTB 溶液」は、指示薬の例として見る方が適切です。
  「アスコルビン酸」は、酸化防止剤の例として見る方が適切です。
