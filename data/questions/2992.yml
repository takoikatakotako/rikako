# 高校化学 問992
id: 2992
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "反応速度 / 酢酸ナトリウム水溶液が塩基性を示す理由を考える場面"
  - "塩の加水分解 / アンモニアが金属イオンに電子対を与える場面"
  - "配位結合 / 同じ反応でも条件によって進み方が変わることを比べる場面"
  - "タンパク質 / 酵素や筋肉の主成分を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「タンパク質 / 酵素や筋肉の主成分を考える場面」です。したがって、正解は「タンパク質 / 酵素や筋肉の主成分を考える場面」です。
  
  「反応速度 / 酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」は、用語と場面の対応が合っていません。
  「塩の加水分解 / アンモニアが金属イオンに電子対を与える場面」は、用語と場面の対応が合っていません。
  「配位結合 / 同じ反応でも条件によって進み方が変わることを比べる場面」は、用語と場面の対応が合っていません。
  「タンパク質 / 酵素や筋肉の主成分を考える場面」が正しいです。用語と場面の対応が合っています。
