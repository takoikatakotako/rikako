# 化学基礎 問561
id: 1601
type: single_choice
text: |
  「氷を温めて水にする場面」を説明した文として、最も適切なものはどれか。
choices:
  - "原子や原子団が電子を失って正の電荷をもつ粒子である。"
  - "分子の中で電荷のかたよりがほとんどない分子である。"
  - "水溶液の酸性や塩基性の強さを表す尺度である。"
  - "固体が液体に変わる状態変化である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「氷を温めて水にする場面」を説明した文として適切なのは「固体が液体に変わる状態変化である。」です。したがって、正解は「固体が液体に変わる状態変化である。」です。
  
  「原子や原子団が電子を失って正の電荷をもつ粒子である。」は、この説明は「ナトリウム原子が電子を1個失って Na+ になる場面」と結び付きが強いです。
  「分子の中で電荷のかたよりがほとんどない分子である。」は、この説明は「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」と結び付きが強いです。
  「水溶液の酸性や塩基性の強さを表す尺度である。」は、この説明は「レモン水とせっけん水の酸性・塩基性を比べる場面」と結び付きが強いです。
  「固体が液体に変わる状態変化である。」が正しいです。この具体例を説明した文です。
