# 化学基礎 問442
id: 1482
type: single_choice
text: |
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "ダニエル電池"
  - "電離度"
  - "電解質"
  - "放射性同位体"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  亜鉛と銅の反応を利用して電気を取り出す電池である。 に当てはまる語はダニエル電池です。したがって、正解は「ダニエル電池」です。
  
  「ダニエル電池」が正しいです。「亜鉛と銅の反応を利用して電気を取り出す電池である。」に当てはまる語です。
  「電離度」は、「溶けた物質のうち、電離してイオンになった割合である。」に当てはまる語です。
  「電解質」は、「水に溶けたり融解したりすると電流を通す物質である。」に当てはまる語です。
  「放射性同位体」は、「放射線を出しながら別の原子へ変わっていく同位体である。」に当てはまる語です。
