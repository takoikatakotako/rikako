# 化学基礎 問845
id: 1885
type: single_choice
text: |
  「水溶液でも電流をほとんど通さないこと」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "レモン水とせっけん水の酸性・塩基性を比べる場面"
  - "亜鉛が銅より先にイオンになりやすいことを見る場面"
  - "砂糖水が電流をほとんど通さない場面"
  - "食品の変色や劣化を防ぐためにビタミンCを使う場面"
correct: 2
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「水溶液でも電流をほとんど通さないこと」という見方と最も関係が深い場面は「砂糖水が電流をほとんど通さない場面」です。したがって、正解は「砂糖水が電流をほとんど通さない場面」です。
  
  「レモン水とせっけん水の酸性・塩基性を比べる場面」は、その場面で大切なのは「酸性と塩基性の強さを数で見ること」という見方です。
  「亜鉛が銅より先にイオンになりやすいことを見る場面」は、その場面で大切なのは「金属のイオンになりやすさを比べること」という見方です。
  「砂糖水が電流をほとんど通さない場面」が正しいです。この見方と最も関係が深い場面です。
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」は、その場面で大切なのは「酸化による変質を防ぐこと」という見方です。
