# 高校化学 問534
id: 2534
type: single_choice
text: |
  「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "複数の反応式を組み合わせて全体の反応熱を求める場面"
  - "金属や硫黄のコロイドが電解質で沈みやすい場面"
  - "電気分解で気体が発生する電極側を考える場面"
  - "弱酸が一部だけ電離している水溶液を考える場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」と最も関係が深い場面は「金属や硫黄のコロイドが電解質で沈みやすい場面」です。したがって、正解は「金属や硫黄のコロイドが電解質で沈みやすい場面」です。
  
  「複数の反応式を組み合わせて全体の反応熱を求める場面」は、「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」と結び付きが強い場面です。
  「金属や硫黄のコロイドが電解質で沈みやすい場面」が正しいです。この説明と結び付きが強い場面です。
  「電気分解で気体が発生する電極側を考える場面」は、「電気分解で酸化が起こる電極である。」と結び付きが強い場面です。
  「弱酸が一部だけ電離している水溶液を考える場面」は、「電離する粒子と電離していない粒子が平衡になっている状態である。」と結び付きが強い場面です。
