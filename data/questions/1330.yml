# 化学基礎 問290
id: 1330
type: single_choice
text: |
  ダニエル電池の特徴として、最も適切なものはどれか。
choices:
  - "水溶液の電気的なつり合いを保つ"
  - "水溶液や融解状態で電気を通す"
  - "化学エネルギーを電気エネルギーに変える"
  - "水に溶けても電気を通しにくい"
correct: 2
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  ダニエル電池では、「化学エネルギーを電気エネルギーに変える」という点が大切です。したがって、正解は「化学エネルギーを電気エネルギーに変える」です。
  
  「水溶液の電気的なつり合いを保つ」は、塩橋に関係する特徴です。
  「水溶液や融解状態で電気を通す」は、電解質に関係する特徴です。
  「化学エネルギーを電気エネルギーに変える」が正しいです。ダニエル電池の特徴を表しています。
  「水に溶けても電気を通しにくい」は、非電解質に関係する特徴です。
