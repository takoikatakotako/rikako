# 化学基礎 問910
id: 1950
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "原子番号 / 塩化ナトリウムが陽イオンと陰イオンの引力でできる場面"
  - "化学変化 / 鉄がさびて別の物質になる場面"
  - "イオン結合 / 1Lの食塩水にどれだけ溶質が溶けているかを表す場面"
  - "モル濃度 / ナトリウムの陽子数から元素を区別する場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「化学変化 / 鉄がさびて別の物質になる場面」です。したがって、正解は「化学変化 / 鉄がさびて別の物質になる場面」です。
  
  「原子番号 / 塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」は、用語と場面の対応が合っていません。
  「化学変化 / 鉄がさびて別の物質になる場面」が正しいです。用語と場面の対応が合っています。
  「イオン結合 / 1Lの食塩水にどれだけ溶質が溶けているかを表す場面」は、用語と場面の対応が合っていません。
  「モル濃度 / ナトリウムの陽子数から元素を区別する場面」は、用語と場面の対応が合っていません。
