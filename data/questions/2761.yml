# 高校化学 問761
id: 2761
type: single_choice
text: |
  「pH の変化をおさえること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "タンパク質"
  - "沸点"
  - "緩衝液"
  - "結晶格子"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「pH の変化をおさえること」という見方が大切なのは緩衝液です。したがって、正解は「緩衝液」です。
  
  「タンパク質」は、その語で大切なのは「アミノ酸が多数つながった高分子であること」という見方です。
  「沸点」は、その語で大切なのは「蒸気圧と外圧のつり合いに注目すること」という見方です。
  「緩衝液」が正しいです。この見方が大切な語です。
  「結晶格子」は、その語で大切なのは「粒子の規則正しい配列に注目すること」という見方です。
