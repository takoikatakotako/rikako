# 令和7年度 ITパスポート 公開問題 問64
id: 116
type: single_choice
text: |
  Webサイトなどで RSSの表記を見かけることがある。このRSSの説明として、適切なものはどれか。
choices:
  - "Webページの統一的なデザインやレイアウトを定義するための規格"
  - "Webページの見出しやリンク、要約などを記述するフォーマット"
  - "ネットワーク上にブックマークを登録することによって、利用価値の高いWebサイト情報を他の利用者と共有するサービス"
  - "ブラウザとWeb サーバ間で、データを暗号化して安全に送受するためのプロトコル"
correct: 1
explanation: |
  この問題の公開解答では「Webページの見出しやリンク、要約などを記述するフォーマット」が正解とされています。
  
  「Webページの統一的なデザインやレイアウトを定義するための規格」は公開解答では正解ではありません。
  「Webページの見出しやリンク、要約などを記述するフォーマット」が公開解答で正解とされています。
  「ネットワーク上にブックマークを登録することによって、利用価値の高いWebサイト情報を他の利用者と共有するサービス」は公開解答では正解ではありません。
  「ブラウザとWeb サーバ間で、データを暗号化して安全に送受するためのプロトコル」は公開解答では正解ではありません。
