# 高校化学 問25
id: 735
type: single_choice
text: |
  沸点上昇についての説明として、最も適切なものはどれか。
choices:
  - "溶液の沸点が純粋な溶媒より高くなる現象である。"
  - "混合気体の全圧は各気体の分圧の和になるという法則である。"
  - "絶対零度を基準にした温度で、単位は K で表す。"
  - "反応が進むために必要な最小限のエネルギーである。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  沸点上昇は、溶液の沸点が純粋な溶媒より高くなる現象である。 したがって、正解は「溶液の沸点が純粋な溶媒より高くなる現象である。」です。
  
  「溶液の沸点が純粋な溶媒より高くなる現象である。」が正しいです。沸点上昇の説明です。
  「混合気体の全圧は各気体の分圧の和になるという法則である。」は、分圧の法則の説明です。
  「絶対零度を基準にした温度で、単位は K で表す。」は、絶対温度の説明です。
  「反応が進むために必要な最小限のエネルギーである。」は、活性化エネルギーの説明です。
