# 高校化学 問200
id: 2200
type: single_choice
text: |
  化学が築く未来と最も関係が深い場面として、適切なものはどれか。
choices:
  - "再生可能エネルギーや新素材の開発を考える場面"
  - "血糖や発酵の材料として使われる場面"
  - "紙や木材の主成分を考える場面"
  - "エチレンやアセチレンの反応性を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  再生可能エネルギーや新素材の開発を考える場面は、化学が築く未来と結び付きが強い場面です。したがって、正解は「再生可能エネルギーや新素材の開発を考える場面」です。
  
  「再生可能エネルギーや新素材の開発を考える場面」が正しいです。これは化学が築く未来と結び付きが強い場面です。
  「血糖や発酵の材料として使われる場面」は、グルコースと結び付きが強い場面です。
  「紙や木材の主成分を考える場面」は、セルロースと結び付きが強い場面です。
  「エチレンやアセチレンの反応性を考える場面」は、不飽和炭化水素と結び付きが強い場面です。
