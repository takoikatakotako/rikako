# 化学基礎 問726
id: 1766
type: single_choice
text: |
  「水分子で電荷のかたよりを考える場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "溶解度の差を利用すること"
  - "電荷のかたよりがあること"
  - "新しい物質ができること"
  - "陽子数が同じで中性子数が異なること"
correct: 1
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「水分子で電荷のかたよりを考える場面」では、「電荷のかたよりがあること」という見方が大切です。したがって、正解は「電荷のかたよりがあること」です。
  
  「溶解度の差を利用すること」は、その見方はミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面よりも再結晶と結び付きが強いです。
  「電荷のかたよりがあること」が正しいです。この具体例で大切になる見方です。
  「新しい物質ができること」は、その見方は鉄がさびて別の物質になる場面よりも化学変化と結び付きが強いです。
  「陽子数が同じで中性子数が異なること」は、その見方は炭素12と炭素14を比べる場面よりも同位体と結び付きが強いです。
