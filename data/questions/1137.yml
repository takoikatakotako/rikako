# 化学基礎 問97
id: 1137
type: single_choice
text: |
  プラスチックについての説明として、最も適切なものはどれか。
choices:
  - "高分子化合物の一種である。"
  - "必ず金属である。"
  - "全て水にすぐ溶ける。"
  - "単体だけでできている。"
correct: 0
explanation: |
  この問題は、「プラスチックがどんな物質か」を確認する問題です。
  
  プラスチックは、高分子化合物の一種です。化学基礎でも、高分子化合物の構造に触れます。したがって、正解は「高分子化合物の一種である」です。
  
  「高分子化合物の一種である」が正しいです。
  「必ず金属である」は、適切ではありません。
  「全て水にすぐ溶ける」は、適切ではありません。
  「単体だけでできている」は、適切ではありません。
