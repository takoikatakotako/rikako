# 高校化学 問796
id: 2796
type: single_choice
text: |
  「植物がエネルギーをたくわえる多糖であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "浸透圧"
  - "デンプン"
  - "結合エネルギー"
  - "陰極"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「植物がエネルギーをたくわえる多糖であること」という見方が大切なのはデンプンです。したがって、正解は「デンプン」です。
  
  「浸透圧」は、その語で大切なのは「半透膜を通る溶媒の移動に注目すること」という見方です。
  「デンプン」が正しいです。この見方が大切な語です。
  「結合エネルギー」は、その語で大切なのは「結合を切るのに必要なエネルギーに注目すること」という見方です。
  「陰極」は、その語で大切なのは「還元が起こる側の電極であること」という見方です。
