# 高校化学 問668
id: 2668
type: single_choice
text: |
  「マグネシウムやカルシウムの性質を比べる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。"
  - "カルボキシ基をもち、酸性を示す有機化合物である。"
  - "グルコースが多数つながった植物の貯蔵多糖である。"
  - "液体1 molが気体になるときに吸収する熱量である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「マグネシウムやカルシウムの性質を比べる場面」を説明した文として適切なのは「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」です。したがって、正解は「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」です。
  
  「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」が正しいです。この具体例を説明した文です。
  「カルボキシ基をもち、酸性を示す有機化合物である。」は、この説明は「酢酸の性質やにおいを考える場面」と結び付きが強いです。
  「グルコースが多数つながった植物の貯蔵多糖である。」は、この説明は「米やいもに多く含まれる成分を考える場面」と結び付きが強いです。
  「液体1 molが気体になるときに吸収する熱量である。」は、この説明は「水を水蒸気に変えるのに必要な熱を考える場面」と結び付きが強いです。
