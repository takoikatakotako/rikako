# 化学基礎 問293
id: 1333
type: single_choice
text: |
  非電解質の特徴として、最も適切なものはどれか。
choices:
  - "年代測定や医療に利用される"
  - "水に溶けても電気を通しにくい"
  - "金属元素の確認に使う"
  - "電離した割合を表す"
correct: 1
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  非電解質では、「水に溶けても電気を通しにくい」という点が大切です。したがって、正解は「水に溶けても電気を通しにくい」です。
  
  「年代測定や医療に利用される」は、放射性同位体に関係する特徴です。
  「水に溶けても電気を通しにくい」が正しいです。非電解質の特徴を表しています。
  「金属元素の確認に使う」は、炎色反応に関係する特徴です。
  「電離した割合を表す」は、電離度に関係する特徴です。
