# 高校化学 問227
id: 2227
type: single_choice
text: |
  「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "浸透圧"
  - "弱酸"
  - "酸解離定数"
  - "溶解"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。 に当てはまる語は浸透圧です。したがって、正解は「浸透圧」です。
  
  「浸透圧」が正しいです。「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」に当てはまる語です。
  「弱酸」は、「水溶液中で一部だけ電離する酸である。」に当てはまる語です。
  「酸解離定数」は、「酸の電離のしやすさを表す定数である。」に当てはまる語です。
  「溶解」は、「溶質の粒子が溶媒中に広がっていく現象である。」に当てはまる語です。
