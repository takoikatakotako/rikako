# 高校化学 問597
id: 2597
type: single_choice
text: |
  「グルコースがつながった植物の細胞壁をつくる多糖である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "紙や木材の主成分を考える場面"
  - "再生可能エネルギーや新素材の開発を考える場面"
  - "酸素と窒素が混ざった気体の圧力を考える場面"
  - "食塩を加えても底に残るようになった食塩水を考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「グルコースがつながった植物の細胞壁をつくる多糖である。」と最も関係が深い場面は「紙や木材の主成分を考える場面」です。したがって、正解は「紙や木材の主成分を考える場面」です。
  
  「紙や木材の主成分を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「再生可能エネルギーや新素材の開発を考える場面」は、「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」と結び付きが強い場面です。
  「酸素と窒素が混ざった気体の圧力を考える場面」は、「混合気体の全圧は各気体の分圧の和になるという法則である。」と結び付きが強い場面です。
  「食塩を加えても底に残るようになった食塩水を考える場面」は、「その温度でそれ以上溶質が溶けない状態の溶液である。」と結び付きが強い場面です。
