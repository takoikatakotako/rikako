# 化学基礎 問464
id: 1504
type: single_choice
text: |
  昇華を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水に溶けない固体を液体から分けること"
  - "固体から直接気体になること"
  - "溶解度の差を利用すること"
  - "固体から液体への変化であること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  昇華では、「固体から直接気体になること」という見方が大切です。したがって、正解は「固体から直接気体になること」です。
  
  「水に溶けない固体を液体から分けること」は、ろ過に関係する見方です。
  「固体から直接気体になること」が正しいです。昇華の要点を表しています。
  「溶解度の差を利用すること」は、再結晶に関係する見方です。
  「固体から液体への変化であること」は、融解に関係する見方です。
