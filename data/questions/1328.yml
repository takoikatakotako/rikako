# 化学基礎 問288
id: 1328
type: single_choice
text: |
  還元剤の特徴として、最も適切なものはどれか。
choices:
  - "相手に電子を与える"
  - "金属がイオンになりやすい程度"
  - "化学エネルギーを電気エネルギーに変える"
  - "水溶液の電気的なつり合いを保つ"
correct: 0
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  還元剤では、「相手に電子を与える」という点が大切です。したがって、正解は「相手に電子を与える」です。
  
  「相手に電子を与える」が正しいです。還元剤の特徴を表しています。
  「金属がイオンになりやすい程度」は、イオン化傾向に関係する特徴です。
  「化学エネルギーを電気エネルギーに変える」は、ダニエル電池に関係する特徴です。
  「水溶液の電気的なつり合いを保つ」は、塩橋に関係する特徴です。
