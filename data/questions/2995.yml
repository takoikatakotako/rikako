# 高校化学 問995
id: 2995
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "可逆反応 / どの酸がより電離しやすいかを比べる場面"
  - "酸解離定数 / さびや鉄鋼の利用を考える場面"
  - "グルコース / 血糖や発酵の材料として使われる場面"
  - "鉄 / 生成物から再び反応物が生じる場面を考えるとき"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「グルコース / 血糖や発酵の材料として使われる場面」です。したがって、正解は「グルコース / 血糖や発酵の材料として使われる場面」です。
  
  「可逆反応 / どの酸がより電離しやすいかを比べる場面」は、用語と場面の対応が合っていません。
  「酸解離定数 / さびや鉄鋼の利用を考える場面」は、用語と場面の対応が合っていません。
  「グルコース / 血糖や発酵の材料として使われる場面」が正しいです。用語と場面の対応が合っています。
  「鉄 / 生成物から再び反応物が生じる場面を考えるとき」は、用語と場面の対応が合っていません。
