# 化学基礎 問394
id: 1434
type: single_choice
text: |
  電解質と最も関係が深い場面として、適切なものはどれか。
choices:
  - "砂糖水が電流をほとんど通さない場面"
  - "食塩水や塩酸が電流を通す場面"
  - "ナトリウムで黄色、銅で青緑色を観察する場面"
  - "ポリエチレンやタンパク質のような長い分子を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  食塩水や塩酸が電流を通す場面は、電解質と結び付きが強い場面です。したがって、正解は「食塩水や塩酸が電流を通す場面」です。
  
  「砂糖水が電流をほとんど通さない場面」は、非電解質と結び付きが強い場面です。
  「食塩水や塩酸が電流を通す場面」が正しいです。これは電解質と結び付きが強い場面です。
  「ナトリウムで黄色、銅で青緑色を観察する場面」は、炎色反応と結び付きが強い場面です。
  「ポリエチレンやタンパク質のような長い分子を考える場面」は、高分子化合物と結び付きが強い場面です。
