# 高校化学 問466
id: 2466
type: single_choice
text: |
  塩基解離定数を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "反応を速めても自分は使い切られないこと"
  - "塩基の強さを電離のしやすさで見ること"
  - "反応が止まるのではなく速さがつり合うこと"
  - "加えた変化を打ち消す向きに平衡が動くこと"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  塩基解離定数では、「塩基の強さを電離のしやすさで見ること」という見方が大切です。したがって、正解は「塩基の強さを電離のしやすさで見ること」です。
  
  「反応を速めても自分は使い切られないこと」は、触媒に関係する見方です。
  「塩基の強さを電離のしやすさで見ること」が正しいです。塩基解離定数の要点を表しています。
  「反応が止まるのではなく速さがつり合うこと」は、化学平衡に関係する見方です。
  「加えた変化を打ち消す向きに平衡が動くこと」は、ルシャトリエの原理に関係する見方です。
