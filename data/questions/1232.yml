# 化学基礎 問192
id: 1232
type: single_choice
text: |
  電解質の例として、最も適切なものはどれか。
choices:
  - "砂糖水"
  - "炭素 14 による年代測定"
  - "食塩水"
  - "ナトリウムが黄色を示すこと"
correct: 2
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  食塩水は、電解質の例です。したがって、正解は「食塩水」です。
  
  「砂糖水」は、非電解質の例として見る方が適切です。
  「炭素 14 による年代測定」は、放射性同位体の例として見る方が適切です。
  「食塩水」が正しいです。これは電解質の例です。
  「ナトリウムが黄色を示すこと」は、炎色反応の例として見る方が適切です。
