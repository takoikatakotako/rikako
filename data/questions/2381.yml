# 高校化学 問381
id: 2381
type: single_choice
text: |
  「メタンの水素が塩素に置き換わる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "飽和炭化水素"
  - "付加反応"
  - "アルコール"
  - "置換反応"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  メタンの水素が塩素に置き換わる場面 と最も関係が深いのは置換反応です。したがって、正解は「置換反応」です。
  
  「飽和炭化水素」は、「メタンやエタンの性質を考える場面」と結び付きが強い語です。
  「付加反応」は、「エチレンに臭素が付加する場面」と結び付きが強い語です。
  「アルコール」は、「エタノールの性質や利用を考える場面」と結び付きが強い語です。
  「置換反応」が正しいです。この具体例と最も関係が深い語です。
