# 令和7年度 ITパスポート 公開問題 問46
id: 48
type: single_choice
text: |
  開発が完了したソフトウェアを本番環境にインストールする手順を明確にし、それを実施する工程として、適切なものはどれか。
choices:
  - "ソフトウェア統合"
  - "ソフトウェア導入"
  - "妥性確認"
  - "利用者教育"
correct: 1
explanation: |
  この問題の公開解答では「ソフトウェア導入」が正解とされています。
  
  「ソフトウェア統合」は公開解答では正解ではありません。
  「ソフトウェア導入」が公開解答で正解とされています。
  「妥性確認」は公開解答では正解ではありません。
  「利用者教育」は公開解答では正解ではありません。
