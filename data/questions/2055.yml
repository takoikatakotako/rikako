# 高校化学 問55
id: 2055
type: single_choice
text: |
  化学平衡についての説明として、最も適切なものはどれか。
choices:
  - "水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。"
  - "塩のイオンが水と反応して溶液の性質を変える現象である。"
  - "正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。"
  - "水溶液中で一部だけ電離する塩基である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  化学平衡は、正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。 したがって、正解は「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」です。
  
  「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」は、水のイオン積の説明です。
  「塩のイオンが水と反応して溶液の性質を変える現象である。」は、塩の加水分解の説明です。
  「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」が正しいです。化学平衡の説明です。
  「水溶液中で一部だけ電離する塩基である。」は、弱塩基の説明です。
