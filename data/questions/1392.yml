# 化学基礎 問352
id: 1392
type: single_choice
text: |
  蒸留と最も関係が深い場面として、適切なものはどれか。
choices:
  - "鉄がさびて別の物質になる場面"
  - "ぬれた床の水がしだいに乾く場面"
  - "ドライアイスがそのまま気体になる場面"
  - "水とエタノールの混合物を沸点の差で分ける場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  水とエタノールの混合物を沸点の差で分ける場面は、蒸留と結び付きが強い場面です。したがって、正解は「水とエタノールの混合物を沸点の差で分ける場面」です。
  
  「鉄がさびて別の物質になる場面」は、化学変化と結び付きが強い場面です。
  「ぬれた床の水がしだいに乾く場面」は、蒸発と結び付きが強い場面です。
  「ドライアイスがそのまま気体になる場面」は、昇華と結び付きが強い場面です。
  「水とエタノールの混合物を沸点の差で分ける場面」が正しいです。これは蒸留と結び付きが強い場面です。
