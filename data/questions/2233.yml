# 高校化学 問233
id: 2233
type: single_choice
text: |
  「水との親和性が高く、比較的安定なコロイドである。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "飽和溶液"
  - "蒸気圧降下"
  - "親水コロイド"
  - "凝固点降下"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  水との親和性が高く、比較的安定なコロイドである。 に当てはまる語は親水コロイドです。したがって、正解は「親水コロイド」です。
  
  「飽和溶液」は、「その温度でそれ以上溶質が溶けない状態の溶液である。」に当てはまる語です。
  「蒸気圧降下」は、「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」に当てはまる語です。
  「親水コロイド」が正しいです。「水との親和性が高く、比較的安定なコロイドである。」に当てはまる語です。
  「凝固点降下」は、「溶液の凝固点が純粋な溶媒より低くなる現象である。」に当てはまる語です。
