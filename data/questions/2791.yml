# 高校化学 問791
id: 2791
type: single_choice
text: |
  「ポリエステルの一種で再利用もしやすいこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "PET"
  - "飽和溶液"
  - "親水コロイド"
  - "鉛蓄電池"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「ポリエステルの一種で再利用もしやすいこと」という見方が大切なのはPETです。したがって、正解は「PET」です。
  
  「PET」が正しいです。この見方が大切な語です。
  「飽和溶液」は、その語で大切なのは「それ以上溶けない状態であること」という見方です。
  「親水コロイド」は、その語で大切なのは「水となじみやすく安定しやすいこと」という見方です。
  「鉛蓄電池」は、その語で大切なのは「充電して再び使えること」という見方です。
