# 高校化学 問184
id: 2184
type: single_choice
text: |
  アルデヒドと最も関係が深い場面として、適切なものはどれか。
choices:
  - "ホルムアルデヒドやアセトアルデヒドを考える場面"
  - "アンモニアを加えると深い青色のイオンができる場面"
  - "鉄や銅、クロムの化合物の色の違いを考える場面"
  - "さびや鉄鋼の利用を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  ホルムアルデヒドやアセトアルデヒドを考える場面は、アルデヒドと結び付きが強い場面です。したがって、正解は「ホルムアルデヒドやアセトアルデヒドを考える場面」です。
  
  「ホルムアルデヒドやアセトアルデヒドを考える場面」が正しいです。これはアルデヒドと結び付きが強い場面です。
  「アンモニアを加えると深い青色のイオンができる場面」は、錯イオンと結び付きが強い場面です。
  「鉄や銅、クロムの化合物の色の違いを考える場面」は、遷移元素と結び付きが強い場面です。
  「さびや鉄鋼の利用を考える場面」は、鉄と結び付きが強い場面です。
