# 高校化学 問723
id: 2723
type: single_choice
text: |
  「溶解と析出がつり合うこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "溶解平衡"
  - "可逆反応"
  - "酸解離定数"
  - "鉄"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「溶解と析出がつり合うこと」という見方が大切なのは溶解平衡です。したがって、正解は「溶解平衡」です。
  
  「溶解平衡」が正しいです。この見方が大切な語です。
  「可逆反応」は、その語で大切なのは「正反応と逆反応の両方を見ること」という見方です。
  「酸解離定数」は、その語で大切なのは「酸の強さを電離のしやすさで見ること」という見方です。
  「鉄」は、その語で大切なのは「実用性が高く、酸化数が変わりやすいこと」という見方です。
