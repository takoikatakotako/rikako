# 令和7年度 ITパスポート 公開問題 問15
id: 101
type: single_choice
text: |
  事業運営における意思決定の迅速化、組織の独立採算の推進を目的とし、一つの企業の中に事業領域ごとに独立した組織を設置する組織形態はどれか。
choices:
  - "カンパニー制組織"
  - "機能別組織"
  - "プロジェクト組織"
  - "マトリックス組織"
correct: 0
explanation: |
  カンパニー制組織は、事業領域ごとに独立性の高い組織を置き、意思決定の迅速化や独立採算の推進を図る組織形態です。したがって、正解は「カンパニー制組織」です。
  
  「カンパニー制組織」が正しいです。事業部門ごとの独立性を高めて経営する組織形態です。
  「機能別組織」は機能別組織は営業、開発、製造など機能ごとに部門を分ける形です。
  「プロジェクト組織」はプロジェクト組織は特定目的のために期間限定で編成されることが多い。
  「マトリックス組織」はマトリックス組織は機能軸と事業軸などを掛け合わせた組織形態です。
