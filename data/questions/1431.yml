# 化学基礎 問391
id: 1431
type: single_choice
text: |
  イオン化傾向と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水素や炭素が相手から酸素を奪う場面"
  - "ダニエル電池で二つの水溶液をつなぐ場面"
  - "亜鉛が銅より先にイオンになりやすいことを見る場面"
  - "水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  亜鉛が銅より先にイオンになりやすいことを見る場面は、イオン化傾向と結び付きが強い場面です。したがって、正解は「亜鉛が銅より先にイオンになりやすいことを見る場面」です。
  
  「水素や炭素が相手から酸素を奪う場面」は、還元剤と結び付きが強い場面です。
  「ダニエル電池で二つの水溶液をつなぐ場面」は、塩橋と結び付きが強い場面です。
  「亜鉛が銅より先にイオンになりやすいことを見る場面」が正しいです。これはイオン化傾向と結び付きが強い場面です。
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」は、塩基と結び付きが強い場面です。
