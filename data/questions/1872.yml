# 化学基礎 問832
id: 1872
type: single_choice
text: |
  「水酸化物イオンや水素イオンの受け取りに注目すること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "塩素原子が電子を1個受け取って Cl- になる場面"
  - "水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
  - "6.0×10^23個の粒子をひとまとまりとして数える場面"
  - "同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面"
correct: 1
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「水酸化物イオンや水素イオンの受け取りに注目すること」という見方と最も関係が深い場面は「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」です。したがって、正解は「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」です。
  
  「塩素原子が電子を1個受け取って Cl- になる場面」は、その場面で大切なのは「電子を受け取って負に帯電すること」という見方です。
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」が正しいです。この見方と最も関係が深い場面です。
  「6.0×10^23個の粒子をひとまとまりとして数える場面」は、その場面で大切なのは「粒子の数をまとめて扱う単位であること」という見方です。
  「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」は、その場面で大切なのは「どのくらいイオンに分かれるかを表すこと」という見方です。
