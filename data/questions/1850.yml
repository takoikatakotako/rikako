# 化学基礎 問810
id: 1850
type: single_choice
text: |
  「新しい物質ができること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ポリエチレンやタンパク質のような長い分子を考える場面"
  - "空気や食塩水のように複数の物質が混ざったものを考える場面"
  - "水を冷やして氷にする場面"
  - "鉄がさびて別の物質になる場面"
correct: 3
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「新しい物質ができること」という見方と最も関係が深い場面は「鉄がさびて別の物質になる場面」です。したがって、正解は「鉄がさびて別の物質になる場面」です。
  
  「ポリエチレンやタンパク質のような長い分子を考える場面」は、その場面で大切なのは「小さな単位が多数つながっていること」という見方です。
  「空気や食塩水のように複数の物質が混ざったものを考える場面」は、その場面で大切なのは「成分が二種類以上まざっていること」という見方です。
  「水を冷やして氷にする場面」は、その場面で大切なのは「液体から固体への変化であること」という見方です。
  「鉄がさびて別の物質になる場面」が正しいです。この見方と最も関係が深い場面です。
