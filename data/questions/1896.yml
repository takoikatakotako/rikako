# 化学基礎 問856
id: 1896
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "混合物 / 二種類以上の物質が混ざってできている物質である。"
  - "ろ過 / 二種類以上の元素が結び付いてできている純物質である。"
  - "化合物 / 原子核の中にある陽子の数を表す数である。"
  - "原子番号 / 液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
correct: 0
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「混合物 / 二種類以上の物質が混ざってできている物質である。」です。したがって、正解は「混合物 / 二種類以上の物質が混ざってできている物質である。」です。
  
  「混合物 / 二種類以上の物質が混ざってできている物質である。」が正しいです。用語と説明の対応が合っています。
  「ろ過 / 二種類以上の元素が結び付いてできている純物質である。」は、用語と説明の対応が合っていません。
  「化合物 / 原子核の中にある陽子の数を表す数である。」は、用語と説明の対応が合っていません。
  「原子番号 / 液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、用語と説明の対応が合っていません。
