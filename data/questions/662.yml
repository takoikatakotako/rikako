# 令和7年度 ITパスポート 公開問題 問19
id: 662
type: single_choice
text: |
  仮想環境を用いた技術である AR 又はVR の活用事例のうち、VRの活用事例として、最も適切なものはどれか。
choices:
  - "顔を覆うように頭部にゴーグルを装着し、そのゴーグル内に投影された仮想空間に広がる火災や地震の映像を見ながら避難方法をイメージすることによって、防災訓練が行える。"
  - "家具をオンラインで購入するときに、スマートフォンのカメラを通して画面に映っている現実の自分の部屋に、購入したい家具をリアルタイムに重ねて試し置きできる。"
  - "史跡などにスマートフォンを向けることによって、昔あった建物の画像や説明情報が現実の風景と重なって画面に表示される。"
  - "図鑑にスマートフォンをかざすことによって、図鑑の絵や写真に重なって生物の動画が見られる。"
correct: 0
explanation: |
  VR は、利用者が仮想空間の中に入り込んだような体験をする技術です。ゴーグルを装着して仮想空間で防災訓練を行うアが VR の事例に当たります。
  
  「顔を覆うように頭部にゴーグルを装着し、そのゴーグル内に投影された仮想空間に広がる火災や地震の映像を見ながら避難方法をイメージすることによって、防災訓練が行える」が正しいです。仮想空間に没入して体験するのはVRの活用例です。
  「家具をオンラインで購入するときに、スマートフォンのカメラを通して画面に映っている現実の自分の部屋に、購入したい家具をリアルタイムに重ねて試し置きできる」は現実の部屋に家具を重ねて表示するので AR の事例です。
  「史跡などにスマートフォンを向けることによって、昔あった建物の画像や説明情報が現実の風景と重なって画面に表示される」は現実の風景に情報を重ねるので AR の事例です。
  「図鑑にスマートフォンをかざすことによって、図鑑の絵や写真に重なって生物の動画が見られる」は図鑑上に動画を重ねて表示するので AR の事例です。
