# 高校化学 問473
id: 2473
type: single_choice
text: |
  配位結合を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電子対の与え手と受け手に注目すること"
  - "非金属で酸化力が強いこと"
  - "酸とも塩基とも反応すること"
  - "多様な酸化数や色、触媒作用に注目すること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  配位結合では、「電子対の与え手と受け手に注目すること」という見方が大切です。したがって、正解は「電子対の与え手と受け手に注目すること」です。
  
  「電子対の与え手と受け手に注目すること」が正しいです。配位結合の要点を表しています。
  「非金属で酸化力が強いこと」は、ハロゲンに関係する見方です。
  「酸とも塩基とも反応すること」は、両性酸化物に関係する見方です。
  「多様な酸化数や色、触媒作用に注目すること」は、遷移元素に関係する見方です。
