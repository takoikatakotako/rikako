# 化学基礎 問57
id: 1097
type: single_choice
text: |
  氷が溶けて水になっても変わらないものとして、最も適切なものはどれか。
choices:
  - "水分子そのもの"
  - "元素の種類が全て別のものになること"
  - "粒子の数が必ず 0 になること"
  - "水素原子が酸素原子に変わること"
correct: 0
explanation: |
  この問題は、「状態変化では何が変わり、何が変わらないか」を考える問題です。
  
  氷が水になっても、H2O という水分子そのものは変わりません。変わるのは粒子の並び方や動き方です。したがって、正解は「水分子そのもの」です。
  
  「水分子そのもの」が正しいです。状態変化では分子自体は変わりません。
  「元素の種類が全て別のものになること」は、状態変化の説明ではありません。
  「粒子の数が必ず 0 になること」は、適切ではありません。
  「水素原子が酸素原子に変わること」は、適切ではありません。
