# 高校化学 問292
id: 2292
type: single_choice
text: |
  「多数のアミノ酸がつながってできた天然高分子化合物である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "コロイド"
  - "タンパク質"
  - "ブラウン運動"
  - "電気泳動"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  多数のアミノ酸がつながってできた天然高分子化合物である。 に当てはまる語はタンパク質です。したがって、正解は「タンパク質」です。
  
  「コロイド」は、「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」に当てはまる語です。
  「タンパク質」が正しいです。「多数のアミノ酸がつながってできた天然高分子化合物である。」に当てはまる語です。
  「ブラウン運動」は、「コロイド粒子が不規則に動いて見える現象である。」に当てはまる語です。
  「電気泳動」は、「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」に当てはまる語です。
