# 高校化学 問619
id: 2619
type: single_choice
text: |
  「ガラスのように一定の融点を示しにくい固体を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。"
  - "電気エネルギーを使って自発的でない化学変化を起こす操作である。"
  - "窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。"
  - "結晶のような規則正しい配列をもたない固体である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「ガラスのように一定の融点を示しにくい固体を考える場面」を説明した文として適切なのは「結晶のような規則正しい配列をもたない固体である。」です。したがって、正解は「結晶のような規則正しい配列をもたない固体である。」です。
  
  「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」は、この説明は「反応前後で熱の出入りを比較する場面」と結び付きが強いです。
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」は、この説明は「水溶液に電流を流して物質を分解する場面」と結び付きが強いです。
  「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」は、この説明は「高圧や触媒を利用してアンモニアを得る場面」と結び付きが強いです。
  「結晶のような規則正しい配列をもたない固体である。」が正しいです。この具体例を説明した文です。
