# 高校化学 問996
id: 2996
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "化学平衡 / どの塩基がより電離しやすいかを比べる場面"
  - "塩基解離定数 / 電線や青色の銅イオン水溶液を考える場面"
  - "銅 / 密閉容器で反応物と生成物の量が一定になる場面"
  - "デンプン / 米やいもに多く含まれる成分を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「デンプン / 米やいもに多く含まれる成分を考える場面」です。したがって、正解は「デンプン / 米やいもに多く含まれる成分を考える場面」です。
  
  「化学平衡 / どの塩基がより電離しやすいかを比べる場面」は、用語と場面の対応が合っていません。
  「塩基解離定数 / 電線や青色の銅イオン水溶液を考える場面」は、用語と場面の対応が合っていません。
  「銅 / 密閉容器で反応物と生成物の量が一定になる場面」は、用語と場面の対応が合っていません。
  「デンプン / 米やいもに多く含まれる成分を考える場面」が正しいです。用語と場面の対応が合っています。
