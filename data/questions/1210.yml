# 化学基礎 問170
id: 1210
type: single_choice
text: |
  陽イオンの例として、最も適切なものはどれか。
choices:
  - "Na+"
  - "Cl-"
  - "塩化ナトリウム NaCl"
  - "水分子 H2O の結合"
correct: 0
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  Na+は、陽イオンの例です。したがって、正解は「Na+」です。
  
  「Na+」が正しいです。これは陽イオンの例です。
  「Cl-」は、陰イオンの例として見る方が適切です。
  「塩化ナトリウム NaCl」は、イオン結合の例として見る方が適切です。
  「水分子 H2O の結合」は、共有結合の例として見る方が適切です。
