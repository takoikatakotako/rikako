# 化学基礎 問452
id: 1492
type: single_choice
text: |
  蒸留を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "物質の種類が変わらないこと"
  - "沸点の違いを利用すること"
  - "固体から液体への変化であること"
  - "液体から固体への変化であること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  蒸留では、「沸点の違いを利用すること」という見方が大切です。したがって、正解は「沸点の違いを利用すること」です。
  
  「物質の種類が変わらないこと」は、物理変化に関係する見方です。
  「沸点の違いを利用すること」が正しいです。蒸留の要点を表しています。
  「固体から液体への変化であること」は、融解に関係する見方です。
  「液体から固体への変化であること」は、凝固に関係する見方です。
