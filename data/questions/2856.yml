# 高校化学 問856
id: 2856
type: single_choice
text: |
  「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "蒸気圧と外圧のつり合いに注目すること"
  - "粒子の規則正しい配列に注目すること"
  - "平衡の位置を数で表すこと"
  - "蒸気圧降下の結果として沸点が上がること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」を理解する上では、「平衡の位置を数で表すこと」という見方が大切です。したがって、正解は「平衡の位置を数で表すこと」です。
  
  「蒸気圧と外圧のつり合いに注目すること」は、その見方は沸点に関係します。
  「粒子の規則正しい配列に注目すること」は、その見方は結晶格子に関係します。
  「平衡の位置を数で表すこと」が正しいです。この説明と結び付きが強い見方です。
  「蒸気圧降下の結果として沸点が上がること」は、その見方は沸点上昇に関係します。
