# 高校化学 問489
id: 2489
type: single_choice
text: |
  アニリンを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "ベンゼン環にアミノ基が直接つくこと"
  - "植物の体を支える多糖であること"
  - "2 価の陽イオンになりやすいこと"
  - "最外殻が安定していて反応しにくいこと"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  アニリンでは、「ベンゼン環にアミノ基が直接つくこと」という見方が大切です。したがって、正解は「ベンゼン環にアミノ基が直接つくこと」です。
  
  「ベンゼン環にアミノ基が直接つくこと」が正しいです。アニリンの要点を表しています。
  「植物の体を支える多糖であること」は、セルロースに関係する見方です。
  「2 価の陽イオンになりやすいこと」は、アルカリ土類金属に関係する見方です。
  「最外殻が安定していて反応しにくいこと」は、貴ガスに関係する見方です。
