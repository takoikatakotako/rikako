# 化学基礎 問581
id: 1621
type: single_choice
text: |
  「塩酸が水溶液中で水素イオンを生じる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "相手を還元させ、自身は酸化される物質である。"
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
  - "成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
  - "水溶液中で水素イオンを生じる物質である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「塩酸が水溶液中で水素イオンを生じる場面」を説明した文として適切なのは「水溶液中で水素イオンを生じる物質である。」です。したがって、正解は「水溶液中で水素イオンを生じる物質である。」です。
  
  「相手を還元させ、自身は酸化される物質である。」は、この説明は「水素や炭素が相手から酸素を奪う場面」と結び付きが強いです。
  「金属元素を炎に入れたときに特有の色を示す反応である。」は、この説明は「ナトリウムで黄色、銅で青緑色を観察する場面」と結び付きが強いです。
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」は、この説明は「インクの色素をろ紙の上で分ける場面」と結び付きが強いです。
  「水溶液中で水素イオンを生じる物質である。」が正しいです。この具体例を説明した文です。
