# 化学基礎 問183
id: 1223
type: single_choice
text: |
  中和の例として、最も適切なものはどれか。
choices:
  - "pH 3 の水溶液"
  - "塩酸と水酸化ナトリウムの反応"
  - "マグネシウムが燃える反応"
  - "酸化銅から銅ができる反応"
correct: 1
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  塩酸と水酸化ナトリウムの反応は、中和の例です。したがって、正解は「塩酸と水酸化ナトリウムの反応」です。
  
  「pH 3 の水溶液」は、pHの例として見る方が適切です。
  「塩酸と水酸化ナトリウムの反応」が正しいです。これは中和の例です。
  「マグネシウムが燃える反応」は、酸化の例として見る方が適切です。
  「酸化銅から銅ができる反応」は、還元の例として見る方が適切です。
