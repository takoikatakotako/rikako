# 高校化学 問740
id: 2740
type: single_choice
text: |
  「周囲から熱を受け取る反応であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "両性酸化物"
  - "吸熱反応"
  - "異性体"
  - "アミノ酸"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「周囲から熱を受け取る反応であること」という見方が大切なのは吸熱反応です。したがって、正解は「吸熱反応」です。
  
  「両性酸化物」は、その語で大切なのは「酸とも塩基とも反応すること」という見方です。
  「吸熱反応」が正しいです。この見方が大切な語です。
  「異性体」は、その語で大切なのは「同じ分子式でも構造が違うこと」という見方です。
  「アミノ酸」は、その語で大切なのは「アミノ基とカルボキシ基をあわせもつこと」という見方です。
