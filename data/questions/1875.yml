# 化学基礎 問835
id: 1875
type: single_choice
text: |
  「どのくらいイオンに分かれるかを表すこと」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面"
  - "金属中で自由電子が動けるため電気を通すことを考える場面"
  - "塩酸が水溶液中で水素イオンを生じる場面"
  - "酸化銅から酸素が取れて銅になる場面"
correct: 0
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「どのくらいイオンに分かれるかを表すこと」という見方と最も関係が深い場面は「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」です。したがって、正解は「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」です。
  
  「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」が正しいです。この見方と最も関係が深い場面です。
  「金属中で自由電子が動けるため電気を通すことを考える場面」は、その場面で大切なのは「自由電子が結合を支えること」という見方です。
  「塩酸が水溶液中で水素イオンを生じる場面」は、その場面で大切なのは「水素イオンに注目すること」という見方です。
  「酸化銅から酸素が取れて銅になる場面」は、その場面で大切なのは「酸素の喪失や電子の受け取りに注目すること」という見方です。
