# 化学基礎 問470
id: 1510
type: single_choice
text: |
  陽イオンを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸と塩基が打ち消し合うこと"
  - "どのくらいイオンに分かれるかを表すこと"
  - "電子を受け取って負に帯電すること"
  - "電子を失って正に帯電すること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  陽イオンでは、「電子を失って正に帯電すること」という見方が大切です。したがって、正解は「電子を失って正に帯電すること」です。
  
  「酸と塩基が打ち消し合うこと」は、中和に関係する見方です。
  「どのくらいイオンに分かれるかを表すこと」は、電離度に関係する見方です。
  「電子を受け取って負に帯電すること」は、陰イオンに関係する見方です。
  「電子を失って正に帯電すること」が正しいです。陽イオンの要点を表しています。
