# 高校化学 問279
id: 2279
type: single_choice
text: |
  「炭素どうしに二重結合や三重結合をもつ炭化水素である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "不飽和炭化水素"
  - "配位結合"
  - "炎色反応"
  - "銅"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  炭素どうしに二重結合や三重結合をもつ炭化水素である。 に当てはまる語は不飽和炭化水素です。したがって、正解は「不飽和炭化水素」です。
  
  「不飽和炭化水素」が正しいです。「炭素どうしに二重結合や三重結合をもつ炭化水素である。」に当てはまる語です。
  「配位結合」は、「一方の原子が電子対を与えてできる共有結合である。」に当てはまる語です。
  「炎色反応」は、「金属元素を炎に入れたときに特有の色を示す反応である。」に当てはまる語です。
  「銅」は、「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」に当てはまる語です。
