# 化学基礎 問259
id: 1299
type: single_choice
text: |
  物理変化の特徴として、最も適切なものはどれか。
choices:
  - "新しい物質ができる"
  - "固体が液体になる"
  - "液体が気体になる"
  - "新しい物質はできない"
correct: 3
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  物理変化では、「新しい物質はできない」という点が大切です。したがって、正解は「新しい物質はできない」です。
  
  「新しい物質ができる」は、化学変化に関係する特徴です。
  「固体が液体になる」は、融解に関係する特徴です。
  「液体が気体になる」は、蒸発に関係する特徴です。
  「新しい物質はできない」が正しいです。物理変化の特徴を表しています。
