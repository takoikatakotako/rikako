# 化学基礎 問467
id: 1507
type: single_choice
text: |
  同位体を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "陽子数が同じで中性子数が異なること"
  - "一種類の元素だけからできること"
  - "物質の種類が変わらないこと"
  - "粒子の数をまとめて扱う単位であること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  同位体では、「陽子数が同じで中性子数が異なること」という見方が大切です。したがって、正解は「陽子数が同じで中性子数が異なること」です。
  
  「陽子数が同じで中性子数が異なること」が正しいです。同位体の要点を表しています。
  「一種類の元素だけからできること」は、単体に関係する見方です。
  「物質の種類が変わらないこと」は、物理変化に関係する見方です。
  「粒子の数をまとめて扱う単位であること」は、モルに関係する見方です。
