# 化学基礎 問796
id: 1836
type: single_choice
text: |
  「放射線を出す同位体であること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
  - "溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。"
  - "放射線を出しながら別の原子へ変わっていく同位体である。"
  - "二つの溶液の電気的なつり合いを保つための部分である。"
correct: 2
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「放射線を出す同位体であること」という見方と最も関係が深い説明は「放射線を出しながら別の原子へ変わっていく同位体である。」です。したがって、正解は「放射線を出しながら別の原子へ変わっていく同位体である。」です。
  
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」は、その説明で大切なのは「1Lあたりの物質量で表すこと」という見方です。
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」は、その説明で大切なのは「色の変化で液性を見分けること」という見方です。
  「放射線を出しながら別の原子へ変わっていく同位体である。」が正しいです。この見方と最も関係が深い説明です。
  「二つの溶液の電気的なつり合いを保つための部分である。」は、その説明で大切なのは「電池の中で電気的なつり合いを保つこと」という見方です。
