# 高校化学 問257
id: 2257
type: single_choice
text: |
  「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "反応熱"
  - "ヘスの法則"
  - "ルシャトリエの原理"
  - "発熱反応"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。 に当てはまる語はルシャトリエの原理です。したがって、正解は「ルシャトリエの原理」です。
  
  「反応熱」は、「化学反応に伴って出入りする熱量である。」に当てはまる語です。
  「ヘスの法則」は、「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」に当てはまる語です。
  「ルシャトリエの原理」が正しいです。「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」に当てはまる語です。
  「発熱反応」は、「反応の結果として周囲へ熱を放出する反応である。」に当てはまる語です。
