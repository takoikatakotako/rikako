# 高校化学 問968
id: 2968
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "浸透圧 / どの結合が切れやすいかを比べる場面"
  - "結合エネルギー / 金属イオンが電子を受け取って析出する電極を考える場面"
  - "陰極 / 薄い溶液側から濃い溶液側へ水が移動する場面"
  - "アルカリ土類金属 / マグネシウムやカルシウムの性質を比べる場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「アルカリ土類金属 / マグネシウムやカルシウムの性質を比べる場面」です。したがって、正解は「アルカリ土類金属 / マグネシウムやカルシウムの性質を比べる場面」です。
  
  「浸透圧 / どの結合が切れやすいかを比べる場面」は、用語と場面の対応が合っていません。
  「結合エネルギー / 金属イオンが電子を受け取って析出する電極を考える場面」は、用語と場面の対応が合っていません。
  「陰極 / 薄い溶液側から濃い溶液側へ水が移動する場面」は、用語と場面の対応が合っていません。
  「アルカリ土類金属 / マグネシウムやカルシウムの性質を比べる場面」が正しいです。用語と場面の対応が合っています。
