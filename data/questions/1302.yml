# 化学基礎 問262
id: 1302
type: single_choice
text: |
  蒸発の特徴として、最も適切なものはどれか。
choices:
  - "液体が固体になる"
  - "固体が直接気体になる"
  - "液体が気体になる"
  - "陽子の数を表す"
correct: 2
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  蒸発では、「液体が気体になる」という点が大切です。したがって、正解は「液体が気体になる」です。
  
  「液体が固体になる」は、凝固に関係する特徴です。
  「固体が直接気体になる」は、昇華に関係する特徴です。
  「液体が気体になる」が正しいです。蒸発の特徴を表しています。
  「陽子の数を表す」は、原子番号に関係する特徴です。
