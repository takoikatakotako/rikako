# 化学基礎 問735
id: 1775
type: single_choice
text: |
  「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "液体から気体への変化であること"
  - "化学結合やイオンのできやすさに関係すること"
  - "どのくらいイオンに分かれるかを表すこと"
  - "電荷のかたよりがあること"
correct: 2
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」では、「どのくらいイオンに分かれるかを表すこと」という見方が大切です。したがって、正解は「どのくらいイオンに分かれるかを表すこと」です。
  
  「液体から気体への変化であること」は、その見方はぬれた床の水がしだいに乾く場面よりも蒸発と結び付きが強いです。
  「化学結合やイオンのできやすさに関係すること」は、その見方はナトリウムが電子を1個失いやすい理由を考える場面よりも最外殻電子と結び付きが強いです。
  「どのくらいイオンに分かれるかを表すこと」が正しいです。この具体例で大切になる見方です。
  「電荷のかたよりがあること」は、その見方は水分子で電荷のかたよりを考える場面よりも極性分子と結び付きが強いです。
