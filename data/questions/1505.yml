# 化学基礎 問465
id: 1505
type: single_choice
text: |
  原子番号を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "成分が一種類で性質が一定であること"
  - "一種類の元素だけからできること"
  - "陽子数を表す数であること"
  - "物質の種類が変わらないこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  原子番号では、「陽子数を表す数であること」という見方が大切です。したがって、正解は「陽子数を表す数であること」です。
  
  「成分が一種類で性質が一定であること」は、純物質に関係する見方です。
  「一種類の元素だけからできること」は、単体に関係する見方です。
  「陽子数を表す数であること」が正しいです。原子番号の要点を表しています。
  「物質の種類が変わらないこと」は、物理変化に関係する見方です。
