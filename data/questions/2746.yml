# 高校化学 問746
id: 2746
type: single_choice
text: |
  「反応物を補給しながら発電すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "銅"
  - "フェノール"
  - "資源の再利用"
  - "燃料電池"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「反応物を補給しながら発電すること」という見方が大切なのは燃料電池です。したがって、正解は「燃料電池」です。
  
  「銅」は、その語で大切なのは「電気伝導性が高く、特徴的な色のイオンをつくること」という見方です。
  「フェノール」は、その語で大切なのは「ベンゼン環にヒドロキシ基が直接つくこと」という見方です。
  「資源の再利用」は、その語で大切なのは「資源を循環させて無駄を減らすこと」という見方です。
  「燃料電池」が正しいです。この見方が大切な語です。
