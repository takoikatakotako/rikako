# 化学基礎 問851
id: 1891
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "放射性同位体 / 温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
  - "再結晶 / もとの物質とは別の物質ができる変化である。"
  - "化学変化 / 放射線を出しながら別の原子へ変わっていく同位体である。"
  - "ろ過 / 液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
correct: 3
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「ろ過 / 液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」です。したがって、正解は「ろ過 / 液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」です。
  
  「放射性同位体 / 温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、用語と説明の対応が合っていません。
  「再結晶 / もとの物質とは別の物質ができる変化である。」は、用語と説明の対応が合っていません。
  「化学変化 / 放射線を出しながら別の原子へ変わっていく同位体である。」は、用語と説明の対応が合っていません。
  「ろ過 / 液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」が正しいです。用語と説明の対応が合っています。
