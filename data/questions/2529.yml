# 高校化学 問529
id: 2529
type: single_choice
text: |
  「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "薄暗い部屋でコロイドに光を当てると筋が見える場面"
  - "コロイド粒子が陽極や陰極へ移動する様子を考える場面"
  - "懐中電灯や時計に入っている電池を考える場面"
  - "生成物から再び反応物が生じる場面を考えるとき"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」と最も関係が深い場面は「薄暗い部屋でコロイドに光を当てると筋が見える場面」です。したがって、正解は「薄暗い部屋でコロイドに光を当てると筋が見える場面」です。
  
  「薄暗い部屋でコロイドに光を当てると筋が見える場面」が正しいです。この説明と結び付きが強い場面です。
  「コロイド粒子が陽極や陰極へ移動する様子を考える場面」は、「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」と結び付きが強い場面です。
  「懐中電灯や時計に入っている電池を考える場面」は、「一度使い切ることを前提にした一次電池の代表例である。」と結び付きが強い場面です。
  「生成物から再び反応物が生じる場面を考えるとき」は、「正反応と逆反応の両方が起こり得る反応である。」と結び付きが強い場面です。
