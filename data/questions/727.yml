# 高校化学 問17
id: 727
type: single_choice
text: |
  共有結合の結晶についての説明として、最も適切なものはどれか。
choices:
  - "原子が共有結合で三次元的に結び付いた結晶である。"
  - "分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。"
  - "溶質の粒子が溶媒中に広がっていく現象である。"
  - "その温度でそれ以上溶質が溶けない状態の溶液である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  共有結合の結晶は、原子が共有結合で三次元的に結び付いた結晶である。 したがって、正解は「原子が共有結合で三次元的に結び付いた結晶である。」です。
  
  「原子が共有結合で三次元的に結び付いた結晶である。」が正しいです。共有結合の結晶の説明です。
  「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」は、実在気体の説明です。
  「溶質の粒子が溶媒中に広がっていく現象である。」は、溶解の説明です。
  「その温度でそれ以上溶質が溶けない状態の溶液である。」は、飽和溶液の説明です。
