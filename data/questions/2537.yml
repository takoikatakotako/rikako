# 高校化学 問537
id: 2537
type: single_choice
text: |
  「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "複数の反応式を組み合わせて全体の反応熱を求める場面"
  - "熱分解や一部の溶解で周囲が冷たくなる場面"
  - "同じ反応でも条件によって進み方が変わることを比べる場面"
  - "酢酸ナトリウム水溶液が塩基性を示す理由を考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」と最も関係が深い場面は「複数の反応式を組み合わせて全体の反応熱を求める場面」です。したがって、正解は「複数の反応式を組み合わせて全体の反応熱を求める場面」です。
  
  「複数の反応式を組み合わせて全体の反応熱を求める場面」が正しいです。この説明と結び付きが強い場面です。
  「熱分解や一部の溶解で周囲が冷たくなる場面」は、「反応の結果として周囲から熱を吸収する反応である。」と結び付きが強い場面です。
  「同じ反応でも条件によって進み方が変わることを比べる場面」は、「単位時間あたりに進む反応の程度を表す量である。」と結び付きが強い場面です。
  「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」は、「塩のイオンが水と反応して溶液の性質を変える現象である。」と結び付きが強い場面です。
