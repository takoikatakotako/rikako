# 高校化学 問772
id: 2772
type: single_choice
text: |
  「金属イオンと配位子の組合せに注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "沸点"
  - "錯イオン"
  - "結晶格子"
  - "沸点上昇"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「金属イオンと配位子の組合せに注目すること」という見方が大切なのは錯イオンです。したがって、正解は「錯イオン」です。
  
  「沸点」は、その語で大切なのは「蒸気圧と外圧のつり合いに注目すること」という見方です。
  「錯イオン」が正しいです。この見方が大切な語です。
  「結晶格子」は、その語で大切なのは「粒子の規則正しい配列に注目すること」という見方です。
  「沸点上昇」は、その語で大切なのは「蒸気圧降下の結果として沸点が上がること」という見方です。
