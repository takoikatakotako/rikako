# 化学基礎 問425
id: 1465
type: single_choice
text: |
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "塩基"
  - "pH"
  - "指示薬"
  - "分子"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  原子が結び付いてできた、物質の性質を示す小さな粒子である。 に当てはまる語は分子です。したがって、正解は「分子」です。
  
  「塩基」は、「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」に当てはまる語です。
  「pH」は、「水溶液の酸性や塩基性の強さを表す尺度である。」に当てはまる語です。
  「指示薬」は、「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」に当てはまる語です。
  「分子」が正しいです。「原子が結び付いてできた、物質の性質を示す小さな粒子である。」に当てはまる語です。
