# 高校化学 問240
id: 2240
type: single_choice
text: |
  「反応の結果として周囲から熱を吸収する反応である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "光合成"
  - "吸熱反応"
  - "鉛蓄電池"
  - "燃料電池"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  反応の結果として周囲から熱を吸収する反応である。 に当てはまる語は吸熱反応です。したがって、正解は「吸熱反応」です。
  
  「光合成」は、「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」に当てはまる語です。
  「吸熱反応」が正しいです。「反応の結果として周囲から熱を吸収する反応である。」に当てはまる語です。
  「鉛蓄電池」は、「鉛とその化合物を用いた、充電して繰り返し使える電池である。」に当てはまる語です。
  「燃料電池」は、「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」に当てはまる語です。
