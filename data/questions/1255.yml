# 化学基礎 問215
id: 1255
type: single_choice
text: |
  「炭素の原子番号が 6 であること」に最も関係が深い語として、適切なものはどれか。
choices:
  - "原子番号"
  - "質量数"
  - "同位体"
  - "周期律"
correct: 0
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「炭素の原子番号が 6 であること」に最も関係が深いのは原子番号です。したがって、正解は「原子番号」です。
  
  「原子番号」が正しいです。この例は原子番号に関係しています。
  「質量数」は、この例に最も関係が深い語ではありません。
  「同位体」は、この例に最も関係が深い語ではありません。
  「周期律」は、この例に最も関係が深い語ではありません。
