# 化学基礎 問389
id: 1429
type: single_choice
text: |
  酸化剤と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸素や過酸化水素が相手を酸化させる場面"
  - "酸化銅から酸素が取れて銅になる場面"
  - "亜鉛が銅より先にイオンになりやすいことを見る場面"
  - "ダニエル電池で二つの水溶液をつなぐ場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  酸素や過酸化水素が相手を酸化させる場面は、酸化剤と結び付きが強い場面です。したがって、正解は「酸素や過酸化水素が相手を酸化させる場面」です。
  
  「酸素や過酸化水素が相手を酸化させる場面」が正しいです。これは酸化剤と結び付きが強い場面です。
  「酸化銅から酸素が取れて銅になる場面」は、還元と結び付きが強い場面です。
  「亜鉛が銅より先にイオンになりやすいことを見る場面」は、イオン化傾向と結び付きが強い場面です。
  「ダニエル電池で二つの水溶液をつなぐ場面」は、塩橋と結び付きが強い場面です。
