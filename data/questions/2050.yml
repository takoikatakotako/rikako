# 高校化学 問50
id: 2050
type: single_choice
text: |
  ファラデーの法則についての説明として、最も適切なものはどれか。
choices:
  - "化学反応に伴って出入りする熱量である。"
  - "電気分解で生じる物質の量は流れた電気量に比例するという法則である。"
  - "反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。"
  - "反応の結果として周囲へ熱を放出する反応である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  ファラデーの法則は、電気分解で生じる物質の量は流れた電気量に比例するという法則である。 したがって、正解は「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」です。
  
  「化学反応に伴って出入りする熱量である。」は、反応熱の説明です。
  「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」が正しいです。ファラデーの法則の説明です。
  「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」は、ヘスの法則の説明です。
  「反応の結果として周囲へ熱を放出する反応である。」は、発熱反応の説明です。
