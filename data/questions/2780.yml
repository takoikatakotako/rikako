# 高校化学 問780
id: 2780
type: single_choice
text: |
  「二重結合や三重結合に何かが加わること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "分圧の法則"
  - "付加反応"
  - "飽和溶液"
  - "親水コロイド"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「二重結合や三重結合に何かが加わること」という見方が大切なのは付加反応です。したがって、正解は「付加反応」です。
  
  「分圧の法則」は、その語で大切なのは「混ざった気体の圧力を足し合わせて考えること」という見方です。
  「付加反応」が正しいです。この見方が大切な語です。
  「飽和溶液」は、その語で大切なのは「それ以上溶けない状態であること」という見方です。
  「親水コロイド」は、その語で大切なのは「水となじみやすく安定しやすいこと」という見方です。
