# 高校化学 問407
id: 2407
type: single_choice
text: |
  蒸発熱を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "蒸気圧と外圧のつり合いに注目すること"
  - "蒸発と凝縮がつり合うこと"
  - "液体を気体に変えるための熱に注目すること"
  - "温度一定で圧力と体積の関係を見ること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  蒸発熱では、「液体を気体に変えるための熱に注目すること」という見方が大切です。したがって、正解は「液体を気体に変えるための熱に注目すること」です。
  
  「蒸気圧と外圧のつり合いに注目すること」は、沸点に関係する見方です。
  「蒸発と凝縮がつり合うこと」は、気液平衡に関係する見方です。
  「液体を気体に変えるための熱に注目すること」が正しいです。蒸発熱の要点を表しています。
  「温度一定で圧力と体積の関係を見ること」は、ボイルの法則に関係する見方です。
