# 化学基礎 問773
id: 1813
type: single_choice
text: |
  「電子を共有して結び付くこと」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "二種類以上の物質が混ざってできている物質である。"
  - "液体が固体に変わる状態変化である。"
  - "原子や原子団が電子を失って正の電荷をもつ粒子である。"
  - "原子どうしが電子を共有してできる結び付きである。"
correct: 3
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「電子を共有して結び付くこと」という見方と最も関係が深い説明は「原子どうしが電子を共有してできる結び付きである。」です。したがって、正解は「原子どうしが電子を共有してできる結び付きである。」です。
  
  「二種類以上の物質が混ざってできている物質である。」は、その説明で大切なのは「成分が二種類以上まざっていること」という見方です。
  「液体が固体に変わる状態変化である。」は、その説明で大切なのは「液体から固体への変化であること」という見方です。
  「原子や原子団が電子を失って正の電荷をもつ粒子である。」は、その説明で大切なのは「電子を失って正に帯電すること」という見方です。
  「原子どうしが電子を共有してできる結び付きである。」が正しいです。この見方と最も関係が深い説明です。
