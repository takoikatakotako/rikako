# 高校化学 問160
id: 2160
type: single_choice
text: |
  水のイオン積と最も関係が深い場面として、適切なものはどれか。
choices:
  - "中性の水で H+ と OH- の関係を考える場面"
  - "電気分解で気体が発生する電極側を考える場面"
  - "流した電流が大きいほど析出量が増える場面"
  - "反応前後で熱の出入りを比較する場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  中性の水で H+ と OH- の関係を考える場面は、水のイオン積と結び付きが強い場面です。したがって、正解は「中性の水で H+ と OH- の関係を考える場面」です。
  
  「中性の水で H+ と OH- の関係を考える場面」が正しいです。これは水のイオン積と結び付きが強い場面です。
  「電気分解で気体が発生する電極側を考える場面」は、陽極と結び付きが強い場面です。
  「流した電流が大きいほど析出量が増える場面」は、ファラデーの法則と結び付きが強い場面です。
  「反応前後で熱の出入りを比較する場面」は、エンタルピー変化と結び付きが強い場面です。
