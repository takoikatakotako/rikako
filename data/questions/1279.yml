# 化学基礎 問239
id: 1279
type: single_choice
text: |
  「亜鉛が銅よりイオンになりやすいこと」に最も関係が深い語として、適切なものはどれか。
choices:
  - "イオン化傾向"
  - "ダニエル電池"
  - "塩橋"
  - "電解質"
correct: 0
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「亜鉛が銅よりイオンになりやすいこと」に最も関係が深いのはイオン化傾向です。したがって、正解は「イオン化傾向」です。
  
  「イオン化傾向」が正しいです。この例はイオン化傾向に関係しています。
  「ダニエル電池」は、この例に最も関係が深い語ではありません。
  「塩橋」は、この例に最も関係が深い語ではありません。
  「電解質」は、この例に最も関係が深い語ではありません。
