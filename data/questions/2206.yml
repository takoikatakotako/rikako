# 高校化学 問206
id: 2206
type: single_choice
text: |
  「固体1 molが融解するときに吸収する熱量である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "溶解"
  - "飽和溶液"
  - "蒸気圧降下"
  - "融解熱"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  固体1 molが融解するときに吸収する熱量である。 に当てはまる語は融解熱です。したがって、正解は「融解熱」です。
  
  「溶解」は、「溶質の粒子が溶媒中に広がっていく現象である。」に当てはまる語です。
  「飽和溶液」は、「その温度でそれ以上溶質が溶けない状態の溶液である。」に当てはまる語です。
  「蒸気圧降下」は、「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」に当てはまる語です。
  「融解熱」が正しいです。「固体1 molが融解するときに吸収する熱量である。」に当てはまる語です。
