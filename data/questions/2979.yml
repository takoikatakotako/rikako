# 高校化学 問979
id: 2979
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "結合エネルギー / 金属イオンが電子を受け取って析出する電極を考える場面"
  - "陰極 / 中性の水で H+ と OH- の関係を考える場面"
  - "不飽和炭化水素 / エチレンやアセチレンの反応性を考える場面"
  - "水のイオン積 / どの結合が切れやすいかを比べる場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「不飽和炭化水素 / エチレンやアセチレンの反応性を考える場面」です。したがって、正解は「不飽和炭化水素 / エチレンやアセチレンの反応性を考える場面」です。
  
  「結合エネルギー / 金属イオンが電子を受け取って析出する電極を考える場面」は、用語と場面の対応が合っていません。
  「陰極 / 中性の水で H+ と OH- の関係を考える場面」は、用語と場面の対応が合っていません。
  「不飽和炭化水素 / エチレンやアセチレンの反応性を考える場面」が正しいです。用語と場面の対応が合っています。
  「水のイオン積 / どの結合が切れやすいかを比べる場面」は、用語と場面の対応が合っていません。
