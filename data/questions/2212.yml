# 高校化学 問212
id: 2212
type: single_choice
text: |
  「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "凝固点降下"
  - "実在気体"
  - "コロイド"
  - "ブラウン運動"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。 に当てはまる語は実在気体です。したがって、正解は「実在気体」です。
  
  「凝固点降下」は、「溶液の凝固点が純粋な溶媒より低くなる現象である。」に当てはまる語です。
  「実在気体」が正しいです。「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」に当てはまる語です。
  「コロイド」は、「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」に当てはまる語です。
  「ブラウン運動」は、「コロイド粒子が不規則に動いて見える現象である。」に当てはまる語です。
