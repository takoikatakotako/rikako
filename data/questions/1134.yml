# 化学基礎 問94
id: 1134
type: single_choice
text: |
  食品の酸化を防ぐための工夫として、化学と関わりが深いものはどれか。
choices:
  - "酸化防止剤を利用する。"
  - "全ての食品を必ず燃やす。"
  - "水を全て取り除けば化学は不要になる。"
  - "食べ物の色だけを変える。"
correct: 0
explanation: |
  この問題は、「食品保存と化学のつながり」を考える問題です。
  
  食品の酸化を防ぐために、酸化防止剤を利用することがあります。これは化学の知識が日常生活に生かされている例です。したがって、正解は「酸化防止剤を利用する」です。
  
  「酸化防止剤を利用する」が正しいです。食品保存に化学が生かされています。
  「全ての食品を必ず燃やす」は、適切ではありません。
  「水を全て取り除けば化学は不要になる」は、適切ではありません。
  「食べ物の色だけを変える」は、酸化防止の説明ではありません。
