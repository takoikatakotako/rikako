# 高校化学 問854
id: 2854
type: single_choice
text: |
  「正反応と逆反応の両方が起こり得る反応である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "正反応と逆反応の両方を見ること"
  - "分子の集まり方や沸点に関係すること"
  - "分子の体積と分子間力の影響に注目すること"
  - "溶解と析出がつり合うこと"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「正反応と逆反応の両方が起こり得る反応である。」を理解する上では、「正反応と逆反応の両方を見ること」という見方が大切です。したがって、正解は「正反応と逆反応の両方を見ること」です。
  
  「正反応と逆反応の両方を見ること」が正しいです。この説明と結び付きが強い見方です。
  「分子の集まり方や沸点に関係すること」は、その見方は分子間力に関係します。
  「分子の体積と分子間力の影響に注目すること」は、その見方は実在気体に関係します。
  「溶解と析出がつり合うこと」は、その見方は溶解平衡に関係します。
