# 高校化学 問391
id: 2391
type: single_choice
text: |
  「飲料ボトルや衣料用繊維を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "親水コロイド"
  - "PET"
  - "ナイロン"
  - "アミノ酸"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  飲料ボトルや衣料用繊維を考える場面 と最も関係が深いのはPETです。したがって、正解は「PET」です。
  
  「親水コロイド」は、「デンプンやゼラチンが水中で安定しやすい場面」と結び付きが強い語です。
  「PET」が正しいです。この具体例と最も関係が深い語です。
  「ナイロン」は、「衣類やロープに使われる合成繊維を考える場面」と結び付きが強い語です。
  「アミノ酸」は、「グリシンやアラニンの構造を考える場面」と結び付きが強い語です。
