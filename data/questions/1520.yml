# 化学基礎 問480
id: 1520
type: single_choice
text: |
  化学反応式を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電子を失って正に帯電すること"
  - "反応する物質とできる物質の関係を式で示すこと"
  - "電気的な引力で結び付くこと"
  - "自由電子が結合を支えること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  化学反応式では、「反応する物質とできる物質の関係を式で示すこと」という見方が大切です。したがって、正解は「反応する物質とできる物質の関係を式で示すこと」です。
  
  「電子を失って正に帯電すること」は、陽イオンに関係する見方です。
  「反応する物質とできる物質の関係を式で示すこと」が正しいです。化学反応式の要点を表しています。
  「電気的な引力で結び付くこと」は、イオン結合に関係する見方です。
  「自由電子が結合を支えること」は、金属結合に関係する見方です。
