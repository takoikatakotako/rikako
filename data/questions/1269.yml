# 化学基礎 問229
id: 1269
type: single_choice
text: |
  「1 mol/L の食塩水」に最も関係が深い語として、適切なものはどれか。
choices:
  - "化学反応式"
  - "酸"
  - "モル濃度"
  - "塩基"
correct: 2
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「1 mol/L の食塩水」に最も関係が深いのはモル濃度です。したがって、正解は「モル濃度」です。
  
  「化学反応式」は、この例に最も関係が深い語ではありません。
  「酸」は、この例に最も関係が深い語ではありません。
  「モル濃度」が正しいです。この例はモル濃度に関係しています。
  「塩基」は、この例に最も関係が深い語ではありません。
