# 高校化学 問598
id: 2598
type: single_choice
text: |
  「目的に応じた特別な性質をもたせてつくられた材料である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水やエタノールの沸点の違いを考える場面"
  - "導電性高分子や高性能電池材料を考える場面"
  - "高圧や低温で気体のふるまいが理想気体からずれる場面"
  - "飽和溶液で見かけ上変化が止まっている場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「目的に応じた特別な性質をもたせてつくられた材料である。」と最も関係が深い場面は「導電性高分子や高性能電池材料を考える場面」です。したがって、正解は「導電性高分子や高性能電池材料を考える場面」です。
  
  「水やエタノールの沸点の違いを考える場面」は、「分子どうしの間にはたらく比較的弱い引力である。」と結び付きが強い場面です。
  「導電性高分子や高性能電池材料を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「高圧や低温で気体のふるまいが理想気体からずれる場面」は、「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」と結び付きが強い場面です。
  「飽和溶液で見かけ上変化が止まっている場面」は、「溶ける速さと析出する速さが等しくなっている平衡である。」と結び付きが強い場面です。
