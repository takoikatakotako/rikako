# 化学基礎 問507
id: 1547
type: single_choice
text: |
  「一種類の元素だけからできている物質である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "鉄がさびて別の物質になる場面"
  - "炭素12と炭素14を比べる場面"
  - "鉄や酸素のように一種類の元素だけからできた物質を考える場面"
  - "金属中で自由電子が動けるため電気を通すことを考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「一種類の元素だけからできている物質である。」と最も関係が深い場面は「鉄や酸素のように一種類の元素だけからできた物質を考える場面」です。したがって、正解は「鉄や酸素のように一種類の元素だけからできた物質を考える場面」です。
  
  「鉄がさびて別の物質になる場面」は、「もとの物質とは別の物質ができる変化である。」と結び付きが強い場面です。
  「炭素12と炭素14を比べる場面」は、「陽子数は同じで中性子数が異なる原子どうしである。」と結び付きが強い場面です。
  「鉄や酸素のように一種類の元素だけからできた物質を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「金属中で自由電子が動けるため電気を通すことを考える場面」は、「金属原子が自由電子を介して結び付く結合である。」と結び付きが強い場面です。
