# 化学基礎 問886
id: 1926
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "酸 / 物質が酸素を失う、または電子を受け取る変化である。"
  - "還元 / 水に溶けても電流をほとんど通さない物質である。"
  - "指示薬 / 溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。"
  - "非電解質 / 水溶液中で水素イオンを生じる物質である。"
correct: 2
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「指示薬 / 溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」です。したがって、正解は「指示薬 / 溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」です。
  
  「酸 / 物質が酸素を失う、または電子を受け取る変化である。」は、用語と説明の対応が合っていません。
  「還元 / 水に溶けても電流をほとんど通さない物質である。」は、用語と説明の対応が合っていません。
  「指示薬 / 溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」が正しいです。用語と説明の対応が合っています。
  「非電解質 / 水溶液中で水素イオンを生じる物質である。」は、用語と説明の対応が合っていません。
