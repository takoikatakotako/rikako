# 高校化学 問456
id: 2456
type: single_choice
text: |
  平衡定数を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "半透膜を通る溶媒の移動に注目すること"
  - "コロイドが光を散乱すること"
  - "半透膜を通る粒子の大きさの違いを利用すること"
  - "平衡の位置を数で表すこと"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  平衡定数では、「平衡の位置を数で表すこと」という見方が大切です。したがって、正解は「平衡の位置を数で表すこと」です。
  
  「半透膜を通る溶媒の移動に注目すること」は、浸透圧に関係する見方です。
  「コロイドが光を散乱すること」は、チンダル現象に関係する見方です。
  「半透膜を通る粒子の大きさの違いを利用すること」は、透析に関係する見方です。
  「平衡の位置を数で表すこと」が正しいです。平衡定数の要点を表しています。
