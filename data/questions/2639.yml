# 高校化学 問639
id: 2639
type: single_choice
text: |
  「燃焼や中和で容器が温かくなる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "化学平衡の状態を表す、平衡時の濃度や分圧の比である。"
  - "周期表1族に属し、水と反応しやすい金属元素の総称である。"
  - "炭素どうしが単結合だけでつながった炭化水素である。"
  - "反応の結果として周囲へ熱を放出する反応である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「燃焼や中和で容器が温かくなる場面」を説明した文として適切なのは「反応の結果として周囲へ熱を放出する反応である。」です。したがって、正解は「反応の結果として周囲へ熱を放出する反応である。」です。
  
  「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」は、この説明は「平衡がどちらにかたよっているかを数値で見る場面」と結び付きが強いです。
  「周期表1族に属し、水と反応しやすい金属元素の総称である。」は、この説明は「ナトリウムやカリウムの性質を比べる場面」と結び付きが強いです。
  「炭素どうしが単結合だけでつながった炭化水素である。」は、この説明は「メタンやエタンの性質を考える場面」と結び付きが強いです。
  「反応の結果として周囲へ熱を放出する反応である。」が正しいです。この具体例を説明した文です。
