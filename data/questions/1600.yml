# 化学基礎 問560
id: 1600
type: single_choice
text: |
  「鉄がさびて別の物質になる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "原子のいちばん外側の電子殻にある電子である。"
  - "分子の中で電荷のかたよりがある分子である。"
  - "もとの物質とは別の物質ができる変化である。"
  - "酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「鉄がさびて別の物質になる場面」を説明した文として適切なのは「もとの物質とは別の物質ができる変化である。」です。したがって、正解は「もとの物質とは別の物質ができる変化である。」です。
  
  「原子のいちばん外側の電子殻にある電子である。」は、この説明は「ナトリウムが電子を1個失いやすい理由を考える場面」と結び付きが強いです。
  「分子の中で電荷のかたよりがある分子である。」は、この説明は「水分子で電荷のかたよりを考える場面」と結び付きが強いです。
  「もとの物質とは別の物質ができる変化である。」が正しいです。この具体例を説明した文です。
  「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」は、この説明は「塩酸と水酸化ナトリウム水溶液を混ぜる場面」と結び付きが強いです。
