# 化学基礎 問331
id: 1371
type: single_choice
text: |
  酸について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "相手を還元させ、自身は酸化される物質である。"
  - "亜鉛と銅の反応を利用して電気を取り出す電池である。"
  - "粒子の数をまとめて表すための単位である。"
  - "水溶液中で水素イオンを生じる物質である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  酸は、水溶液中で水素イオンを生じる物質である。 したがって、正解は「水溶液中で水素イオンを生じる物質である。」です。
  
  「相手を還元させ、自身は酸化される物質である。」は、還元剤の説明です。
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」は、ダニエル電池の説明です。
  「粒子の数をまとめて表すための単位である。」は、モルの説明です。
  「水溶液中で水素イオンを生じる物質である。」が正しいです。酸の説明です。
