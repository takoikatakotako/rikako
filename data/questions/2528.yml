# 高校化学 問528
id: 2528
type: single_choice
text: |
  「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "コロイド溶液から余分な電解質を取り除く場面"
  - "植物が光を受けてデンプンなどをつくる場面"
  - "二酸化マンガンを加えると過酸化水素水の分解が速くなる場面"
  - "牛乳やゼラチン溶液のような見た目の系を考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」と最も関係が深い場面は「牛乳やゼラチン溶液のような見た目の系を考える場面」です。したがって、正解は「牛乳やゼラチン溶液のような見た目の系を考える場面」です。
  
  「コロイド溶液から余分な電解質を取り除く場面」は、「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」と結び付きが強い場面です。
  「植物が光を受けてデンプンなどをつくる場面」は、「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」と結び付きが強い場面です。
  「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」は、「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」と結び付きが強い場面です。
  「牛乳やゼラチン溶液のような見た目の系を考える場面」が正しいです。この説明と結び付きが強い場面です。
