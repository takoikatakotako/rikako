# 高校化学 問932
id: 2932
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "PET / 氷が溶け始める温度を考える場面"
  - "融点 / 気体の法則で温度をセルシウス温度ではなく K で扱う場面"
  - "絶対温度 / 飲料ボトルや衣料用繊維を考える場面"
  - "電気泳動 / コロイド粒子が陽極や陰極へ移動する様子を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「電気泳動 / コロイド粒子が陽極や陰極へ移動する様子を考える場面」です。したがって、正解は「電気泳動 / コロイド粒子が陽極や陰極へ移動する様子を考える場面」です。
  
  「PET / 氷が溶け始める温度を考える場面」は、用語と場面の対応が合っていません。
  「融点 / 気体の法則で温度をセルシウス温度ではなく K で扱う場面」は、用語と場面の対応が合っていません。
  「絶対温度 / 飲料ボトルや衣料用繊維を考える場面」は、用語と場面の対応が合っていません。
  「電気泳動 / コロイド粒子が陽極や陰極へ移動する様子を考える場面」が正しいです。用語と場面の対応が合っています。
