# 高校化学 問275
id: 2275
type: single_choice
text: |
  「金属元素を炎に入れたときに特有の色を示す反応である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "炎色反応"
  - "置換反応"
  - "アルコール"
  - "カルボン酸"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  金属元素を炎に入れたときに特有の色を示す反応である。 に当てはまる語は炎色反応です。したがって、正解は「炎色反応」です。
  
  「炎色反応」が正しいです。「金属元素を炎に入れたときに特有の色を示す反応である。」に当てはまる語です。
  「置換反応」は、「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」に当てはまる語です。
  「アルコール」は、「ヒドロキシ基をもつ有機化合物である。」に当てはまる語です。
  「カルボン酸」は、「カルボキシ基をもち、酸性を示す有機化合物である。」に当てはまる語です。
