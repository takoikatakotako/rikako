# 高校化学 問54
id: 2054
type: single_choice
text: |
  可逆反応についての説明として、最も適切なものはどれか。
choices:
  - "電離する粒子と電離していない粒子が平衡になっている状態である。"
  - "正反応と逆反応の両方が起こり得る反応である。"
  - "少量の酸や塩基を加えても pH が変わりにくい溶液である。"
  - "水溶液中で一部だけ電離する酸である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  可逆反応は、正反応と逆反応の両方が起こり得る反応である。 したがって、正解は「正反応と逆反応の両方が起こり得る反応である。」です。
  
  「電離する粒子と電離していない粒子が平衡になっている状態である。」は、電離平衡の説明です。
  「正反応と逆反応の両方が起こり得る反応である。」が正しいです。可逆反応の説明です。
  「少量の酸や塩基を加えても pH が変わりにくい溶液である。」は、緩衝液の説明です。
  「水溶液中で一部だけ電離する酸である。」は、弱酸の説明です。
