# 高校化学 問653
id: 2653
type: single_choice
text: |
  「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "周期表18族に属し、化学的に安定な気体元素の総称である。"
  - "反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。"
  - "分子中の原子や原子団が別の原子や原子団に置き換わる反応である。"
  - "多数のアミノ酸がつながってできた天然高分子化合物である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」を説明した文として適切なのは「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」です。したがって、正解は「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」です。
  
  「周期表18族に属し、化学的に安定な気体元素の総称である。」は、この説明は「ネオンやアルゴンが反応しにくい理由を考える場面」と結び付きが強いです。
  「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」が正しいです。この具体例を説明した文です。
  「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」は、この説明は「メタンの水素が塩素に置き換わる場面」と結び付きが強いです。
  「多数のアミノ酸がつながってできた天然高分子化合物である。」は、この説明は「酵素や筋肉の主成分を考える場面」と結び付きが強いです。
