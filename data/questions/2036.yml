# 化学基礎 問996
id: 2036
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "単体 / 固体から直接気体になること"
  - "昇華 / 電子を受け取って負に帯電すること"
  - "放射性同位体 / 放射線を出す同位体であること"
  - "陰イオン / 一種類の元素だけからできること"
correct: 2
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「放射性同位体 / 放射線を出す同位体であること」です。したがって、正解は「放射性同位体 / 放射線を出す同位体であること」です。
  
  「単体 / 固体から直接気体になること」は、用語と要点の対応が合っていません。
  「昇華 / 電子を受け取って負に帯電すること」は、用語と要点の対応が合っていません。
  「放射性同位体 / 放射線を出す同位体であること」が正しいです。用語と要点の対応が合っています。
  「陰イオン / 一種類の元素だけからできること」は、用語と要点の対応が合っていません。
