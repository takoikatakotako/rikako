# 化学基礎 問547
id: 1587
type: single_choice
text: |
  「金属元素を炎に入れたときに特有の色を示す反応である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "電池、医薬品、素材開発などに化学が生かされる場面"
  - "鉄や酸素のように一種類の元素だけからできた物質を考える場面"
  - "ナトリウムで黄色、銅で青緑色を観察する場面"
  - "ドライアイスがそのまま気体になる場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「金属元素を炎に入れたときに特有の色を示す反応である。」と最も関係が深い場面は「ナトリウムで黄色、銅で青緑色を観察する場面」です。したがって、正解は「ナトリウムで黄色、銅で青緑色を観察する場面」です。
  
  「電池、医薬品、素材開発などに化学が生かされる場面」は、「化学の知識が生活、産業、環境、医療などに役立つという見方である。」と結び付きが強い場面です。
  「鉄や酸素のように一種類の元素だけからできた物質を考える場面」は、「一種類の元素だけからできている物質である。」と結び付きが強い場面です。
  「ナトリウムで黄色、銅で青緑色を観察する場面」が正しいです。この説明と結び付きが強い場面です。
  「ドライアイスがそのまま気体になる場面」は、「固体が液体にならずに気体になる状態変化である。」と結び付きが強い場面です。
