# 令和7年度 ITパスポート 公開問題 問80
id: 828
type: single_choice
text: |
  AIにおいて、広範囲かつ大量のデータで訓練されたものであり、ファインチューニングなどによって文章生成 AIのような様々な用途に適応できる特徴をもつものを何というか。
choices:
  - "アノテーション"
  - "エキスパートシステム"
  - "基盤モデル"
  - "畳み込みニューラルネットワーク"
correct: 2
explanation: |
  この問題の公開解答では「基盤モデル」が正解とされています。
  
  「アノテーション」は公開解答では正解ではありません。
  「エキスパートシステム」は公開解答では正解ではありません。
  「基盤モデル」が公開解答で正解とされています。
  「畳み込みニューラルネットワーク」は公開解答では正解ではありません。
