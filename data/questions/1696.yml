# 化学基礎 問656
id: 1696
type: single_choice
text: |
  「二種類以上の物質が混ざってできている物質である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "成分が二種類以上まざっていること"
  - "電荷のかたよりがほとんどないこと"
  - "酸性と塩基性の強さを数で見ること"
  - "金属のイオンになりやすさを比べること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「二種類以上の物質が混ざってできている物質である。」を理解する上では、「成分が二種類以上まざっていること」という見方が大切です。したがって、正解は「成分が二種類以上まざっていること」です。
  
  「成分が二種類以上まざっていること」が正しいです。この説明と結び付きが強い見方です。
  「電荷のかたよりがほとんどないこと」は、その見方は無極性分子に関係します。
  「酸性と塩基性の強さを数で見ること」は、その見方はpHに関係します。
  「金属のイオンになりやすさを比べること」は、その見方はイオン化傾向に関係します。
