# 高校化学 問689
id: 2689
type: single_choice
text: |
  「染料の原料になる芳香族アミンを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "固体1 molが融解するときに吸収する熱量である。"
  - "ベンゼン環にアミノ基が直接結び付いた化合物である。"
  - "原子が共有結合で三次元的に結び付いた結晶である。"
  - "溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「染料の原料になる芳香族アミンを考える場面」を説明した文として適切なのは「ベンゼン環にアミノ基が直接結び付いた化合物である。」です。したがって、正解は「ベンゼン環にアミノ基が直接結び付いた化合物である。」です。
  
  「固体1 molが融解するときに吸収する熱量である。」は、この説明は「氷を水に変えるのに必要な熱を考える場面」と結び付きが強いです。
  「ベンゼン環にアミノ基が直接結び付いた化合物である。」が正しいです。この具体例を説明した文です。
  「原子が共有結合で三次元的に結び付いた結晶である。」は、この説明は「ダイヤモンドや二酸化ケイ素の硬さを考える場面」と結び付きが強いです。
  「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」は、この説明は「牛乳やゼラチン溶液のような見た目の系を考える場面」と結び付きが強いです。
