# 化学基礎 問822
id: 1862
type: single_choice
text: |
  「電気的な引力で結び付くこと」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "氷を温めて水にする場面"
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
  - "水分子や酸素分子を粒として考える場面"
  - "塩化ナトリウムが陽イオンと陰イオンの引力でできる場面"
correct: 3
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「電気的な引力で結び付くこと」という見方と最も関係が深い場面は「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」です。したがって、正解は「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」です。
  
  「氷を温めて水にする場面」は、その場面で大切なのは「固体から液体への変化であること」という見方です。
  「周期表で似た性質の元素が縦に並ぶことを見る場面」は、その場面で大切なのは「性質が周期的にくり返されること」という見方です。
  「水分子や酸素分子を粒として考える場面」は、その場面で大切なのは「物質の性質を示す小さな粒子として考えること」という見方です。
  「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」が正しいです。この見方と最も関係が深い場面です。
