# 高校化学 問991
id: 2991
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "ファラデーの法則 / 血液や実験用の溶液で pH を保ちたい場面"
  - "緩衝液 / アンモニアを加えると深い青色のイオンができる場面"
  - "PET / 飲料ボトルや衣料用繊維を考える場面"
  - "錯イオン / 流した電流が大きいほど析出量が増える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「PET / 飲料ボトルや衣料用繊維を考える場面」です。したがって、正解は「PET / 飲料ボトルや衣料用繊維を考える場面」です。
  
  「ファラデーの法則 / 血液や実験用の溶液で pH を保ちたい場面」は、用語と場面の対応が合っていません。
  「緩衝液 / アンモニアを加えると深い青色のイオンができる場面」は、用語と場面の対応が合っていません。
  「PET / 飲料ボトルや衣料用繊維を考える場面」が正しいです。用語と場面の対応が合っています。
  「錯イオン / 流した電流が大きいほど析出量が増える場面」は、用語と場面の対応が合っていません。
