# 高校化学 問846
id: 2846
type: single_choice
text: |
  「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "反応物を補給しながら発電すること"
  - "アミノ基とカルボキシ基をあわせもつこと"
  - "液体から出た蒸気が示す圧力に注目すること"
  - "陽イオンと陰イオンの引力でできること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」を理解する上では、「反応物を補給しながら発電すること」という見方が大切です。したがって、正解は「反応物を補給しながら発電すること」です。
  
  「反応物を補給しながら発電すること」が正しいです。この説明と結び付きが強い見方です。
  「アミノ基とカルボキシ基をあわせもつこと」は、その見方はアミノ酸に関係します。
  「液体から出た蒸気が示す圧力に注目すること」は、その見方は蒸気圧に関係します。
  「陽イオンと陰イオンの引力でできること」は、その見方はイオン結晶に関係します。
