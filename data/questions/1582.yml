# 化学基礎 問542
id: 1582
type: single_choice
text: |
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "砂糖水が電流をほとんど通さない場面"
  - "亜鉛板と銅板を使って豆電球を光らせる場面"
  - "水とエタノールの混合物を沸点の差で分ける場面"
  - "氷が溶けて水になる場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」と最も関係が深い場面は「亜鉛板と銅板を使って豆電球を光らせる場面」です。したがって、正解は「亜鉛板と銅板を使って豆電球を光らせる場面」です。
  
  「砂糖水が電流をほとんど通さない場面」は、「水に溶けても電流をほとんど通さない物質である。」と結び付きが強い場面です。
  「亜鉛板と銅板を使って豆電球を光らせる場面」が正しいです。この説明と結び付きが強い場面です。
  「水とエタノールの混合物を沸点の差で分ける場面」は、「沸点の違いを利用して液体を分ける方法である。」と結び付きが強い場面です。
  「氷が溶けて水になる場面」は、「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」と結び付きが強い場面です。
