# 令和7年度 ITパスポート 公開問題 問92
id: 774
type: single_choice
text: |
  従業員が使用するPCがランサムウェアに感染した場合の損害を軽減する対策例として、適切なものはどれか。
choices:
  - "PC が接続するファイルサーバの エDDのバックアップデータを定期的に取得し、ネットワークから切り離して保管する。"
  - "PCに多要素認証の仕組みを導入する。"
  - "PCのエDDを暗号化する。"
  - "PCへのログイン時に、パスワードを複数回間違えたら、当該IDをロックする。"
correct: 0
explanation: |
  この問題の公開解答では「PC が接続するファイルサーバの エDDのバックアップデータを定期的に取得し、ネットワークから切り離して保管する」が正解とされています。
  
  「PC が接続するファイルサーバの エDDのバックアップデータを定期的に取得し、ネットワークから切り離して保管する」が公開解答で正解とされています。
  「PCに多要素認証の仕組みを導入する」は公開解答では正解ではありません。
  「PCのエDDを暗号化する」は公開解答では正解ではありません。
  「PCへのログイン時に、パスワードを複数回間違えたら、当該IDをロックする」は公開解答では正解ではありません。
