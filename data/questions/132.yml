# 令和7年度 ITパスポート 公開問題 問36
id: 132
type: single_choice
text: |
  合意したサービス提供時間帯のうち、実際に顧客がITサービスを利用できた時間の割合で表されるものはどれか。
choices:
  - "可用性"
  - "機能性"
  - "効率性"
  - "使用性"
correct: 0
explanation: |
  可用性は、必要なときにサービスやシステムを利用できる度合いを示します。合意した提供時間帯のうち実際に利用できた時間の割合は可用性で表される。
  
  「可用性」が正しいです。サービス提供時間中に利用可能だった割合は可用性です。
  「機能性」は機能性は必要な機能が備わっている度合いです。
  「効率性」は効率性は資源の使い方の効率に関する特性です。
  「使用性」は使用性は使いやすさに関する特性です。
