# 高校化学 問899
id: 2899
type: single_choice
text: |
  「使い終わった資源や製品を回収し、再び利用する考え方である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "反応物を補給しながら発電すること"
  - "資源を循環させて無駄を減らすこと"
  - "加えた変化を打ち消す向きに平衡が動くこと"
  - "2 価の陽イオンになりやすいこと"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「使い終わった資源や製品を回収し、再び利用する考え方である。」を理解する上では、「資源を循環させて無駄を減らすこと」という見方が大切です。したがって、正解は「資源を循環させて無駄を減らすこと」です。
  
  「反応物を補給しながら発電すること」は、その見方は燃料電池に関係します。
  「資源を循環させて無駄を減らすこと」が正しいです。この説明と結び付きが強い見方です。
  「加えた変化を打ち消す向きに平衡が動くこと」は、その見方はルシャトリエの原理に関係します。
  「2 価の陽イオンになりやすいこと」は、その見方はアルカリ土類金属に関係します。
