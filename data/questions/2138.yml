# 高校化学 問138
id: 2138
type: single_choice
text: |
  結合エネルギーと最も関係が深い場面として、適切なものはどれか。
choices:
  - "デンプンやゼラチンが水中で安定しやすい場面"
  - "物質を燃やしたときに熱が出ることを考える場面"
  - "どの結合が切れやすいかを比べる場面"
  - "複数の反応式を組み合わせて全体の反応熱を求める場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  どの結合が切れやすいかを比べる場面は、結合エネルギーと結び付きが強い場面です。したがって、正解は「どの結合が切れやすいかを比べる場面」です。
  
  「デンプンやゼラチンが水中で安定しやすい場面」は、親水コロイドと結び付きが強い場面です。
  「物質を燃やしたときに熱が出ることを考える場面」は、反応熱と結び付きが強い場面です。
  「どの結合が切れやすいかを比べる場面」が正しいです。これは結合エネルギーと結び付きが強い場面です。
  「複数の反応式を組み合わせて全体の反応熱を求める場面」は、ヘスの法則と結び付きが強い場面です。
