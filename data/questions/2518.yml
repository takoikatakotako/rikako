# 高校化学 問518
id: 2518
type: single_choice
text: |
  「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面"
  - "金属が電気を通したりのびたりする理由を考える場面"
  - "コロイド粒子が陽極や陰極へ移動する様子を考える場面"
  - "懐中電灯や時計に入っている電池を考える場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」と最も関係が深い場面は「金属が電気を通したりのびたりする理由を考える場面」です。したがって、正解は「金属が電気を通したりのびたりする理由を考える場面」です。
  
  「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」は、「一定量の溶媒に溶けることのできる溶質の最大量である。」と結び付きが強い場面です。
  「金属が電気を通したりのびたりする理由を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「コロイド粒子が陽極や陰極へ移動する様子を考える場面」は、「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」と結び付きが強い場面です。
  「懐中電灯や時計に入っている電池を考える場面」は、「一度使い切ることを前提にした一次電池の代表例である。」と結び付きが強い場面です。
