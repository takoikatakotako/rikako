# 化学基礎 問365
id: 1405
type: single_choice
text: |
  原子番号と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムの陽子数から元素を区別する場面"
  - "炭素12で陽子数と中性子数の合計を見る場面"
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
  - "ナトリウム原子が電子を1個失って Na+ になる場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  ナトリウムの陽子数から元素を区別する場面は、原子番号と結び付きが強い場面です。したがって、正解は「ナトリウムの陽子数から元素を区別する場面」です。
  
  「ナトリウムの陽子数から元素を区別する場面」が正しいです。これは原子番号と結び付きが強い場面です。
  「炭素12で陽子数と中性子数の合計を見る場面」は、質量数と結び付きが強い場面です。
  「周期表で似た性質の元素が縦に並ぶことを見る場面」は、周期律と結び付きが強い場面です。
  「ナトリウム原子が電子を1個失って Na+ になる場面」は、陽イオンと結び付きが強い場面です。
