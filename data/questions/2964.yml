# 高校化学 問964
id: 2964
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "溶解平衡 / 金属や硫黄のコロイドが電解質で沈みやすい場面"
  - "疎水コロイド / スマートフォンやノートパソコンの電池を考える場面"
  - "リチウムイオン電池 / 飽和溶液で見かけ上変化が止まっている場面"
  - "弱塩基 / アンモニア水が強塩基ほど完全には電離しない場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「弱塩基 / アンモニア水が強塩基ほど完全には電離しない場面」です。したがって、正解は「弱塩基 / アンモニア水が強塩基ほど完全には電離しない場面」です。
  
  「溶解平衡 / 金属や硫黄のコロイドが電解質で沈みやすい場面」は、用語と場面の対応が合っていません。
  「疎水コロイド / スマートフォンやノートパソコンの電池を考える場面」は、用語と場面の対応が合っていません。
  「リチウムイオン電池 / 飽和溶液で見かけ上変化が止まっている場面」は、用語と場面の対応が合っていません。
  「弱塩基 / アンモニア水が強塩基ほど完全には電離しない場面」が正しいです。用語と場面の対応が合っています。
