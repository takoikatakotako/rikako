# 化学基礎 問435
id: 1475
type: single_choice
text: |
  「溶けた物質のうち、電離してイオンになった割合である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "pH"
  - "電離度"
  - "酸化"
  - "酸化剤"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  溶けた物質のうち、電離してイオンになった割合である。 に当てはまる語は電離度です。したがって、正解は「電離度」です。
  
  「pH」は、「水溶液の酸性や塩基性の強さを表す尺度である。」に当てはまる語です。
  「電離度」が正しいです。「溶けた物質のうち、電離してイオンになった割合である。」に当てはまる語です。
  「酸化」は、「物質が酸素と結び付く、または電子を失う変化である。」に当てはまる語です。
  「酸化剤」は、「相手を酸化させ、自身は還元される物質である。」に当てはまる語です。
