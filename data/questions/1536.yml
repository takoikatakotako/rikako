# 化学基礎 問496
id: 1536
type: single_choice
text: |
  放射性同位体を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水酸化物イオンや水素イオンの受け取りに注目すること"
  - "放射線を出す同位体であること"
  - "酸性と塩基性の強さを数で見ること"
  - "色の変化で液性を見分けること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  放射性同位体では、「放射線を出す同位体であること」という見方が大切です。したがって、正解は「放射線を出す同位体であること」です。
  
  「水酸化物イオンや水素イオンの受け取りに注目すること」は、塩基に関係する見方です。
  「放射線を出す同位体であること」が正しいです。放射性同位体の要点を表しています。
  「酸性と塩基性の強さを数で見ること」は、pHに関係する見方です。
  「色の変化で液性を見分けること」は、指示薬に関係する見方です。
