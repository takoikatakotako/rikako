# 化学基礎 問622
id: 1662
type: single_choice
text: |
  「電気的な引力で結び付くこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "酸化"
  - "電解質"
  - "ろ過"
  - "イオン結合"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「電気的な引力で結び付くこと」という見方が大切なのはイオン結合です。したがって、正解は「イオン結合」です。
  
  「酸化」は、その語で大切なのは「酸素との結び付きや電子の放出に注目すること」という見方です。
  「電解質」は、その語で大切なのは「水溶液や融解状態で電流を通すこと」という見方です。
  「ろ過」は、その語で大切なのは「水に溶けない固体を液体から分けること」という見方です。
  「イオン結合」が正しいです。この見方が大切な語です。
