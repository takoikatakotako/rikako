# 高校化学 問776
id: 2776
type: single_choice
text: |
  「実用性が高く、酸化数が変わりやすいこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "蒸発熱"
  - "鉄"
  - "金属結晶"
  - "チンダル現象"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「実用性が高く、酸化数が変わりやすいこと」という見方が大切なのは鉄です。したがって、正解は「鉄」です。
  
  「蒸発熱」は、その語で大切なのは「液体を気体に変えるための熱に注目すること」という見方です。
  「鉄」が正しいです。この見方が大切な語です。
  「金属結晶」は、その語で大切なのは「自由電子が性質に関係すること」という見方です。
  「チンダル現象」は、その語で大切なのは「コロイドが光を散乱すること」という見方です。
