# 化学基礎 問65
id: 1105
type: single_choice
text: |
  アルミニウムイオンの式として、最も適切なものはどれか。
choices:
  - "Al⁺"
  - "Al²⁺"
  - "Al³⁺"
  - "Al³⁻"
correct: 2
explanation: |
  この問題は、「代表的な金属イオンの電荷」を確認する問題です。
  
  アルミニウムは、電子を3個失って Al³⁺ になりやすい金属です。したがって、正解は「Al³⁺」です。
  
  「Al⁺」は、一般的なアルミニウムイオンの式ではありません。
  「Al²⁺」は、一般的なアルミニウムイオンの式ではありません。
  「Al³⁺」が正しいです。
  「Al³⁻」は、陰イオンになっており適切ではありません。
