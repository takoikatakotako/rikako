# 化学基礎 問65
id: 1105
type: single_choice
text: |
  アルミニウムイオンの式として、最も適切なものはどれか。
choices:
  - "Al+"
  - "Al2+"
  - "Al3+"
  - "Al3-"
correct: 2
explanation: |
  この問題は、「代表的な金属イオンの電荷」を確認する問題です。
  
  アルミニウムは、電子を3個失って Al3+ になりやすい金属です。したがって、正解は「Al3+」です。
  
  「Al+」は、一般的なアルミニウムイオンの式ではありません。
  「Al2+」は、一般的なアルミニウムイオンの式ではありません。
  「Al3+」が正しいです。
  「Al3-」は、陰イオンになっており適切ではありません。
