# 高校化学 問707
id: 2707
type: single_choice
text: |
  「液体を気体に変えるための熱に注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "蒸発熱"
  - "結合エネルギー"
  - "陰極"
  - "水のイオン積"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「液体を気体に変えるための熱に注目すること」という見方が大切なのは蒸発熱です。したがって、正解は「蒸発熱」です。
  
  「蒸発熱」が正しいです。この見方が大切な語です。
  「結合エネルギー」は、その語で大切なのは「結合を切るのに必要なエネルギーに注目すること」という見方です。
  「陰極」は、その語で大切なのは「還元が起こる側の電極であること」という見方です。
  「水のイオン積」は、その語で大切なのは「H+ と OH- の積が一定であること」という見方です。
