# 高校化学 問144
id: 2144
type: single_choice
text: |
  鉛蓄電池と最も関係が深い場面として、適切なものはどれか。
choices:
  - "自動車のバッテリーを考える場面"
  - "反応前後で熱の出入りを比較する場面"
  - "どの結合が切れやすいかを比べる場面"
  - "熱分解や一部の溶解で周囲が冷たくなる場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  自動車のバッテリーを考える場面は、鉛蓄電池と結び付きが強い場面です。したがって、正解は「自動車のバッテリーを考える場面」です。
  
  「自動車のバッテリーを考える場面」が正しいです。これは鉛蓄電池と結び付きが強い場面です。
  「反応前後で熱の出入りを比較する場面」は、エンタルピー変化と結び付きが強い場面です。
  「どの結合が切れやすいかを比べる場面」は、結合エネルギーと結び付きが強い場面です。
  「熱分解や一部の溶解で周囲が冷たくなる場面」は、吸熱反応と結び付きが強い場面です。
