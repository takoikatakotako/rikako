# 化学基礎 問907
id: 1947
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "蒸発 / ナトリウムが電子を1個失いやすい理由を考える場面"
  - "最外殻電子 / 水分子で電荷のかたよりを考える場面"
  - "単体 / 鉄や酸素のように一種類の元素だけからできた物質を考える場面"
  - "極性分子 / ぬれた床の水がしだいに乾く場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「単体 / 鉄や酸素のように一種類の元素だけからできた物質を考える場面」です。したがって、正解は「単体 / 鉄や酸素のように一種類の元素だけからできた物質を考える場面」です。
  
  「蒸発 / ナトリウムが電子を1個失いやすい理由を考える場面」は、用語と場面の対応が合っていません。
  「最外殻電子 / 水分子で電荷のかたよりを考える場面」は、用語と場面の対応が合っていません。
  「単体 / 鉄や酸素のように一種類の元素だけからできた物質を考える場面」が正しいです。用語と場面の対応が合っています。
  「極性分子 / ぬれた床の水がしだいに乾く場面」は、用語と場面の対応が合っていません。
