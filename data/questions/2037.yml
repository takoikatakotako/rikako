# 化学基礎 問997
id: 2037
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "化合物 / 陽子数を表す数であること"
  - "原子番号 / 電気的な引力で結び付くこと"
  - "イオン結合 / 複数の元素が結び付いてできること"
  - "炎色反応 / 金属元素ごとに炎の色が異なること"
correct: 3
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「炎色反応 / 金属元素ごとに炎の色が異なること」です。したがって、正解は「炎色反応 / 金属元素ごとに炎の色が異なること」です。
  
  「化合物 / 陽子数を表す数であること」は、用語と要点の対応が合っていません。
  「原子番号 / 電気的な引力で結び付くこと」は、用語と要点の対応が合っていません。
  「イオン結合 / 複数の元素が結び付いてできること」は、用語と要点の対応が合っていません。
  「炎色反応 / 金属元素ごとに炎の色が異なること」が正しいです。用語と要点の対応が合っています。
