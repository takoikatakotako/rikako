# 化学基礎 問76
id: 1116
type: single_choice
text: |
  同じ量の溶質を、より少ない体積の水に溶かしたときのモル濃度として、最も適切なものはどれか。
choices:
  - "小さくなる。"
  - "大きくなる。"
  - "必ず 0 になる。"
  - "必ず同じになる。"
correct: 1
explanation: |
  この問題は、「モル濃度が体積とどう関係するか」を考える問題です。
  
  モル濃度は、1 L あたりの溶質の物質量です。同じ量の溶質をより少ない体積に溶かせば、1 L あたりの量は大きくなるので、モル濃度は大きくなります。したがって、正解は「大きくなる」です。
  
  「小さくなる」は、適切ではありません。
  「大きくなる」が正しいです。体積が小さいほど濃くなります。
  「必ず 0 になる」は、適切ではありません。
  「必ず同じになる」は、体積が変わるので適切ではありません。
