# 高校化学 問94
id: 2094
type: single_choice
text: |
  ペプチド結合についての説明として、最も適切なものはどれか。
choices:
  - "目的に応じた特別な性質をもたせてつくられた材料である。"
  - "アミノ酸どうしが縮合してできる結合である。"
  - "化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。"
  - "一定量の溶媒に溶けることのできる溶質の最大量である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  ペプチド結合は、アミノ酸どうしが縮合してできる結合である。 したがって、正解は「アミノ酸どうしが縮合してできる結合である。」です。
  
  「目的に応じた特別な性質をもたせてつくられた材料である。」は、機能性材料の説明です。
  「アミノ酸どうしが縮合してできる結合である。」が正しいです。ペプチド結合の説明です。
  「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」は、化学が築く未来の説明です。
  「一定量の溶媒に溶けることのできる溶質の最大量である。」は、溶解度の説明です。
