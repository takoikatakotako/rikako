# 化学基礎 問105
id: 1145
type: single_choice
text: |
  純物質についての説明として、最も適切なものはどれか。
choices:
  - "一種類の成分だけからなる物質である。"
  - "複数の成分が混ざってできている物質である。"
  - "一種類の元素だけからなる純物質である。"
  - "二種類以上の元素が結び付いてできた純物質である。"
correct: 0
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  純物質は、一種類の成分だけからなる物質である。したがって、正解は「一種類の成分だけからなる物質である。」です。
  
  「一種類の成分だけからなる物質である。」が正しいです。純物質の説明です。
  「複数の成分が混ざってできている物質である。」は、混合物の説明です。
  「一種類の元素だけからなる純物質である。」は、単体の説明です。
  「二種類以上の元素が結び付いてできた純物質である。」は、化合物の説明です。
