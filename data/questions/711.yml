# 高校化学 問1
id: 711
type: single_choice
text: |
  分子間力についての説明として、最も適切なものはどれか。
choices:
  - "分子どうしの間にはたらく比較的弱い引力である。"
  - "固体と液体が平衡で共存するときの温度である。"
  - "気液平衡にあるとき、気体が示す圧力である。"
  - "固体1 molが融解するときに吸収する熱量である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  分子間力は、分子どうしの間にはたらく比較的弱い引力である。 したがって、正解は「分子どうしの間にはたらく比較的弱い引力である。」です。
  
  「分子どうしの間にはたらく比較的弱い引力である。」が正しいです。分子間力の説明です。
  「固体と液体が平衡で共存するときの温度である。」は、融点の説明です。
  「気液平衡にあるとき、気体が示す圧力である。」は、蒸気圧の説明です。
  「固体1 molが融解するときに吸収する熱量である。」は、融解熱の説明です。
