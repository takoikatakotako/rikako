# 化学基礎 問161
id: 1201
type: single_choice
text: |
  融解の例として、最も適切なものはどれか。
choices:
  - "水たまりが乾く変化"
  - "水が氷になる変化"
  - "ドライアイスが気体になる変化"
  - "氷が水になる変化"
correct: 3
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  氷が水になる変化は、融解の例です。したがって、正解は「氷が水になる変化」です。
  
  「水たまりが乾く変化」は、蒸発の例として見る方が適切です。
  「水が氷になる変化」は、凝固の例として見る方が適切です。
  「ドライアイスが気体になる変化」は、昇華の例として見る方が適切です。
  「氷が水になる変化」が正しいです。これは融解の例です。
