# 高校化学 問720
id: 2720
type: single_choice
text: |
  「溶質の粒子が溶媒中に広がること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "反応速度"
  - "溶解"
  - "塩の加水分解"
  - "配位結合"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「溶質の粒子が溶媒中に広がること」という見方が大切なのは溶解です。したがって、正解は「溶解」です。
  
  「反応速度」は、その語で大切なのは「時間あたりにどれだけ変化するかを見ること」という見方です。
  「溶解」が正しいです。この見方が大切な語です。
  「塩の加水分解」は、その語で大切なのは「塩のイオンが水と反応すること」という見方です。
  「配位結合」は、その語で大切なのは「電子対の与え手と受け手に注目すること」という見方です。
