# 令和7年度 ITパスポート 公開問題 問20
id: 109
type: single_choice
text: |
  ソフトウェアライフサイクルを企画プロセス、要件定義プロセス、開発プロセス、保守プロセスに分けたとき、企画プロセスのシステム化構想の立案時にベンダー企業から収集する情報として、最も適切なものはどれか。
choices:
  - "システム化計画に基づいた開発コストの見積り"
  - "システム化する業務の分野に関する情報技術動向"
  - "システム構築を進めるに当たっての発注元企業の役割"
  - "ベンダー企業の技術者が保有している技術資格"
correct: 1
explanation: |
  システム化構想の立案段階では、どのような技術や解決策があり得るかを把握するため、対象業務分野の情報技術動向を収集するのが重要です。したがって、正解は「システム化する業務の分野に関する情報技術動向」です。
  
  「システム化計画に基づいた開発コストの見積り」は開発コストの見積りは、より具体化した後の段階で収集する情報です。
  「システム化する業務の分野に関する情報技術動向」が正しいです。構想段階では業務分野の技術動向を把握することが重要です。
  「システム構築を進めるに当たっての発注元企業の役割」は発注元企業の役割整理は内部検討事項であり、ベンダーから集める情報としては優先度が低い。
  「ベンダー企業の技術者が保有している技術資格」は技術資格の有無だけでは、構想立案に必要な技術動向の把握には直結しない。
