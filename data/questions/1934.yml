# 化学基礎 問894
id: 1934
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "酸化剤 / 放射線を出しながら別の原子へ変わっていく同位体である。"
  - "放射性同位体 / 温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
  - "電解質 / 水に溶けたり融解したりすると電流を通す物質である。"
  - "再結晶 / 相手を酸化させ、自身は還元される物質である。"
correct: 2
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「電解質 / 水に溶けたり融解したりすると電流を通す物質である。」です。したがって、正解は「電解質 / 水に溶けたり融解したりすると電流を通す物質である。」です。
  
  「酸化剤 / 放射線を出しながら別の原子へ変わっていく同位体である。」は、用語と説明の対応が合っていません。
  「放射性同位体 / 温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、用語と説明の対応が合っていません。
  「電解質 / 水に溶けたり融解したりすると電流を通す物質である。」が正しいです。用語と説明の対応が合っています。
  「再結晶 / 相手を酸化させ、自身は還元される物質である。」は、用語と説明の対応が合っていません。
