# 化学基礎 問129
id: 1169
type: single_choice
text: |
  モル濃度についての説明として、最も適切なものはどれか。
choices:
  - "1 L の溶液に含まれる溶質の物質量で表す濃度である。"
  - "化学反応に関わる物質とその量的関係を記号で表したものである。"
  - "水溶液中で水素イオンを生じる物質である。"
  - "水溶液中で水酸化物イオンを生じるか、水素イオンを受け取る物質である。"
correct: 0
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  モル濃度は、1 L の溶液に含まれる溶質の物質量で表す濃度である。したがって、正解は「1 L の溶液に含まれる溶質の物質量で表す濃度である。」です。
  
  「1 L の溶液に含まれる溶質の物質量で表す濃度である。」が正しいです。モル濃度の説明です。
  「化学反応に関わる物質とその量的関係を記号で表したものである。」は、化学反応式の説明です。
  「水溶液中で水素イオンを生じる物質である。」は、酸の説明です。
  「水溶液中で水酸化物イオンを生じるか、水素イオンを受け取る物質である。」は、塩基の説明です。
