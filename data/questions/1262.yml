# 化学基礎 問222
id: 1262
type: single_choice
text: |
  「塩化ナトリウム NaCl」に最も関係が深い語として、適切なものはどれか。
choices:
  - "共有結合"
  - "金属結合"
  - "分子"
  - "イオン結合"
correct: 3
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「塩化ナトリウム NaCl」に最も関係が深いのはイオン結合です。したがって、正解は「イオン結合」です。
  
  「共有結合」は、この例に最も関係が深い語ではありません。
  「金属結合」は、この例に最も関係が深い語ではありません。
  「分子」は、この例に最も関係が深い語ではありません。
  「イオン結合」が正しいです。この例はイオン結合に関係しています。
