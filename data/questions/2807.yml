# 高校化学 問807
id: 2807
type: single_choice
text: |
  「液体1 molが気体になるときに吸収する熱量である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "正反応と逆反応の両方を見ること"
  - "液体を気体に変えるための熱に注目すること"
  - "酸の強さを電離のしやすさで見ること"
  - "実用性が高く、酸化数が変わりやすいこと"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「液体1 molが気体になるときに吸収する熱量である。」を理解する上では、「液体を気体に変えるための熱に注目すること」という見方が大切です。したがって、正解は「液体を気体に変えるための熱に注目すること」です。
  
  「正反応と逆反応の両方を見ること」は、その見方は可逆反応に関係します。
  「液体を気体に変えるための熱に注目すること」が正しいです。この説明と結び付きが強い見方です。
  「酸の強さを電離のしやすさで見ること」は、その見方は酸解離定数に関係します。
  「実用性が高く、酸化数が変わりやすいこと」は、その見方は鉄に関係します。
