# 高校化学 問884
id: 2884
type: single_choice
text: |
  「分子の端にアルデヒド基をもつ有機化合物である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "半透膜を通る粒子の大きさの違いを利用すること"
  - "光エネルギーを化学エネルギーに変えること"
  - "分子の端にカルボニル構造をもつこと"
  - "反応を速めても自分は使い切られないこと"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「分子の端にアルデヒド基をもつ有機化合物である。」を理解する上では、「分子の端にカルボニル構造をもつこと」という見方が大切です。したがって、正解は「分子の端にカルボニル構造をもつこと」です。
  
  「半透膜を通る粒子の大きさの違いを利用すること」は、その見方は透析に関係します。
  「光エネルギーを化学エネルギーに変えること」は、その見方は光合成に関係します。
  「分子の端にカルボニル構造をもつこと」が正しいです。この説明と結び付きが強い見方です。
  「反応を速めても自分は使い切られないこと」は、その見方は触媒に関係します。
