# 高校化学 問922
id: 2922
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "置換反応 / 酵素や筋肉の主成分を考える場面"
  - "飽和溶液 / 食塩を加えても底に残るようになった食塩水を考える場面"
  - "タンパク質 / 水が沸騰し始める温度を考える場面"
  - "沸点 / メタンの水素が塩素に置き換わる場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「飽和溶液 / 食塩を加えても底に残るようになった食塩水を考える場面」です。したがって、正解は「飽和溶液 / 食塩を加えても底に残るようになった食塩水を考える場面」です。
  
  「置換反応 / 酵素や筋肉の主成分を考える場面」は、用語と場面の対応が合っていません。
  「飽和溶液 / 食塩を加えても底に残るようになった食塩水を考える場面」が正しいです。用語と場面の対応が合っています。
  「タンパク質 / 水が沸騰し始める温度を考える場面」は、用語と場面の対応が合っていません。
  「沸点 / メタンの水素が塩素に置き換わる場面」は、用語と場面の対応が合っていません。
