# 高校化学 問588
id: 2588
type: single_choice
text: |
  「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "飲料ボトルや衣料用繊維を考える場面"
  - "氷が溶け始める温度を考える場面"
  - "気体の法則で温度をセルシウス温度ではなく K で扱う場面"
  - "フェノール類の酸性や消毒作用を考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」と最も関係が深い場面は「フェノール類の酸性や消毒作用を考える場面」です。したがって、正解は「フェノール類の酸性や消毒作用を考える場面」です。
  
  「飲料ボトルや衣料用繊維を考える場面」は、「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」と結び付きが強い場面です。
  「氷が溶け始める温度を考える場面」は、「固体と液体が平衡で共存するときの温度である。」と結び付きが強い場面です。
  「気体の法則で温度をセルシウス温度ではなく K で扱う場面」は、「絶対零度を基準にした温度で、単位は K で表す。」と結び付きが強い場面です。
  「フェノール類の酸性や消毒作用を考える場面」が正しいです。この説明と結び付きが強い場面です。
