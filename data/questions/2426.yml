# 高校化学 問426
id: 2426
type: single_choice
text: |
  凝固点降下を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "コロイド粒子の電荷に注目すること"
  - "溶質があると凝固点が下がること"
  - "水となじみにくく不安定になりやすいこと"
  - "固体と液体の境目の温度に注目すること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  凝固点降下では、「溶質があると凝固点が下がること」という見方が大切です。したがって、正解は「溶質があると凝固点が下がること」です。
  
  「コロイド粒子の電荷に注目すること」は、電気泳動に関係する見方です。
  「溶質があると凝固点が下がること」が正しいです。凝固点降下の要点を表しています。
  「水となじみにくく不安定になりやすいこと」は、疎水コロイドに関係する見方です。
  「固体と液体の境目の温度に注目すること」は、融点に関係する見方です。
