# 化学基礎 問824
id: 1864
type: single_choice
text: |
  「自由電子が結合を支えること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水を冷やして氷にする場面"
  - "金属中で自由電子が動けるため電気を通すことを考える場面"
  - "ナトリウム原子が電子を1個失って Na+ になる場面"
  - "酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面"
correct: 1
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「自由電子が結合を支えること」という見方と最も関係が深い場面は「金属中で自由電子が動けるため電気を通すことを考える場面」です。したがって、正解は「金属中で自由電子が動けるため電気を通すことを考える場面」です。
  
  「水を冷やして氷にする場面」は、その場面で大切なのは「液体から固体への変化であること」という見方です。
  「金属中で自由電子が動けるため電気を通すことを考える場面」が正しいです。この見方と最も関係が深い場面です。
  「ナトリウム原子が電子を1個失って Na+ になる場面」は、その場面で大切なのは「電子を失って正に帯電すること」という見方です。
  「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」は、その場面で大切なのは「電荷のかたよりがほとんどないこと」という見方です。
