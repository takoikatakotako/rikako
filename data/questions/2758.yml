# 高校化学 問758
id: 2758
type: single_choice
text: |
  「条件を工夫して平衡を生成物側へ寄せること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "アニリン"
  - "化学が築く未来"
  - "分圧の法則"
  - "アンモニア合成"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「条件を工夫して平衡を生成物側へ寄せること」という見方が大切なのはアンモニア合成です。したがって、正解は「アンモニア合成」です。
  
  「アニリン」は、その語で大切なのは「ベンゼン環にアミノ基が直接つくこと」という見方です。
  「化学が築く未来」は、その語で大切なのは「化学が社会課題の解決に役立つこと」という見方です。
  「分圧の法則」は、その語で大切なのは「混ざった気体の圧力を足し合わせて考えること」という見方です。
  「アンモニア合成」が正しいです。この見方が大切な語です。
