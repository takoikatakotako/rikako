# 高校化学 問697
id: 2697
type: single_choice
text: |
  「紙や木材の主成分を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "結晶の中で粒子が規則正しく並んだ構造である。"
  - "グルコースがつながった植物の細胞壁をつくる多糖である。"
  - "溶液の沸点が純粋な溶媒より高くなる現象である。"
  - "一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「紙や木材の主成分を考える場面」を説明した文として適切なのは「グルコースがつながった植物の細胞壁をつくる多糖である。」です。したがって、正解は「グルコースがつながった植物の細胞壁をつくる多糖である。」です。
  
  「結晶の中で粒子が規則正しく並んだ構造である。」は、この説明は「食塩や金属の規則正しい並び方を考える場面」と結び付きが強いです。
  「グルコースがつながった植物の細胞壁をつくる多糖である。」が正しいです。この具体例を説明した文です。
  「溶液の沸点が純粋な溶媒より高くなる現象である。」は、この説明は「食塩水の沸点が水より少し高くなることを考える場面」と結び付きが強いです。
  「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」は、この説明は「反応前後で熱の出入りを比較する場面」と結び付きが強いです。
