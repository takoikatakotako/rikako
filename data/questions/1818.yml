# 化学基礎 問778
id: 1818
type: single_choice
text: |
  「粒子の数をまとめて扱う単位であること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "粒子の数をまとめて表すための単位である。"
  - "固体が液体に変わる状態変化である。"
  - "元素を原子番号の順に並べると性質が周期的に変化するというきまりである。"
  - "原子が結び付いてできた、物質の性質を示す小さな粒子である。"
correct: 0
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「粒子の数をまとめて扱う単位であること」という見方と最も関係が深い説明は「粒子の数をまとめて表すための単位である。」です。したがって、正解は「粒子の数をまとめて表すための単位である。」です。
  
  「粒子の数をまとめて表すための単位である。」が正しいです。この見方と最も関係が深い説明です。
  「固体が液体に変わる状態変化である。」は、その説明で大切なのは「固体から液体への変化であること」という見方です。
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」は、その説明で大切なのは「性質が周期的にくり返されること」という見方です。
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」は、その説明で大切なのは「物質の性質を示す小さな粒子として考えること」という見方です。
