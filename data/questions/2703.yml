# 高校化学 問703
id: 2703
type: single_choice
text: |
  「蒸気圧と外圧のつり合いに注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "沸点"
  - "疎水コロイド"
  - "リチウムイオン電池"
  - "平衡定数"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「蒸気圧と外圧のつり合いに注目すること」という見方が大切なのは沸点です。したがって、正解は「沸点」です。
  
  「沸点」が正しいです。この見方が大切な語です。
  「疎水コロイド」は、その語で大切なのは「水となじみにくく不安定になりやすいこと」という見方です。
  「リチウムイオン電池」は、その語で大切なのは「軽くて繰り返し使いやすい電池であること」という見方です。
  「平衡定数」は、その語で大切なのは「平衡の位置を数で表すこと」という見方です。
