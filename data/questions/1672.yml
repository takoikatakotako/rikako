# 化学基礎 問632
id: 1672
type: single_choice
text: |
  「水酸化物イオンや水素イオンの受け取りに注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "炎色反応"
  - "塩基"
  - "クロマトグラフィー"
  - "融解"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「水酸化物イオンや水素イオンの受け取りに注目すること」という見方が大切なのは塩基です。したがって、正解は「塩基」です。
  
  「炎色反応」は、その語で大切なのは「金属元素ごとに炎の色が異なること」という見方です。
  「塩基」が正しいです。この見方が大切な語です。
  「クロマトグラフィー」は、その語で大切なのは「移動しやすさの違いを利用すること」という見方です。
  「融解」は、その語で大切なのは「固体から液体への変化であること」という見方です。
