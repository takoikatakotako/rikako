# 化学基礎 問186
id: 1226
type: single_choice
text: |
  還元の例として、最も適切なものはどれか。
choices:
  - "酸化銅から銅ができる反応"
  - "過マンガン酸カリウム"
  - "亜鉛"
  - "亜鉛が銅よりイオンになりやすいこと"
correct: 0
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  酸化銅から銅ができる反応は、還元の例です。したがって、正解は「酸化銅から銅ができる反応」です。
  
  「酸化銅から銅ができる反応」が正しいです。これは還元の例です。
  「過マンガン酸カリウム」は、酸化剤の例として見る方が適切です。
  「亜鉛」は、還元剤の例として見る方が適切です。
  「亜鉛が銅よりイオンになりやすいこと」は、イオン化傾向の例として見る方が適切です。
