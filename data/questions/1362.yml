# 化学基礎 問322
id: 1362
type: single_choice
text: |
  イオン結合について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "原子や原子団が電子を失って正の電荷をもつ粒子である。"
  - "原子どうしが電子を共有してできる結び付きである。"
  - "陽イオンと陰イオンの静電気的な引力による結び付きである。"
  - "原子が結び付いてできた、物質の性質を示す小さな粒子である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  イオン結合は、陽イオンと陰イオンの静電気的な引力による結び付きである。 したがって、正解は「陽イオンと陰イオンの静電気的な引力による結び付きである。」です。
  
  「原子や原子団が電子を失って正の電荷をもつ粒子である。」は、陽イオンの説明です。
  「原子どうしが電子を共有してできる結び付きである。」は、共有結合の説明です。
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」が正しいです。イオン結合の説明です。
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」は、分子の説明です。
