# 化学基礎 問101
id: 1141
type: single_choice
text: |
  ろ過についての説明として、最も適切なものはどれか。
choices:
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "沸点の違いを利用して液体を分ける方法である。"
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
  - "成分ごとの移動しやすさの違いを利用して分ける方法である。"
correct: 0
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  ろ過は、液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。したがって、正解は「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」です。
  
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」が正しいです。ろ過の説明です。
  「沸点の違いを利用して液体を分ける方法である。」は、蒸留の説明です。
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、再結晶の説明です。
  「成分ごとの移動しやすさの違いを利用して分ける方法である。」は、クロマトグラフィーの説明です。
