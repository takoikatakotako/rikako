# 化学基礎 問615
id: 1655
type: single_choice
text: |
  「陽子数を表す数であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "原子番号"
  - "化学反応式"
  - "酸化"
  - "電解質"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「陽子数を表す数であること」という見方が大切なのは原子番号です。したがって、正解は「原子番号」です。
  
  「原子番号」が正しいです。この見方が大切な語です。
  「化学反応式」は、その語で大切なのは「反応する物質とできる物質の関係を式で示すこと」という見方です。
  「酸化」は、その語で大切なのは「酸素との結び付きや電子の放出に注目すること」という見方です。
  「電解質」は、その語で大切なのは「水溶液や融解状態で電流を通すこと」という見方です。
