# 令和7年度 ITパスポート 公開問題 問90
id: 821
type: single_choice
text: |
  無線LANのセキュリティ対策に関する記述として、適切なものはどれか。
choices:
  - "APIは、複数のアクセスポイントをグループ化して管理するIDである。"
  - "1SSエは、アクセスポイントをステルス化することで無線LAN ネットワークを隠蔽する機能である。"
  - "VPNは、アクセスポイントに登録したMACアドレスをもつ機器以外からの接続を拒否する機能である。"
  - "WPA2は、WEPよりも高い頼性をもつ、無線通の暗号化技術である。"
correct: 3
explanation: |
  この問題の公開解答では「WPA2は、WEPよりも高い頼性をもつ、無線通の暗号化技術である」が正解とされています。
  
  「APIは、複数のアクセスポイントをグループ化して管理するIDである」は公開解答では正解ではありません。
  「1SSエは、アクセスポイントをステルス化することで無線LAN ネットワークを隠蔽する機能である」は公開解答では正解ではありません。
  「VPNは、アクセスポイントに登録したMACアドレスをもつ機器以外からの接続を拒否する機能である」は公開解答では正解ではありません。
  「WPA2は、WEPよりも高い頼性をもつ、無線通の暗号化技術である」が公開解答で正解とされています。
