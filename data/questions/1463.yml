# 化学基礎 問423
id: 1463
type: single_choice
text: |
  「原子どうしが電子を共有してできる結び付きである。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "化学反応式"
  - "共有結合"
  - "塩基"
  - "pH"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  原子どうしが電子を共有してできる結び付きである。 に当てはまる語は共有結合です。したがって、正解は「共有結合」です。
  
  「化学反応式」は、「化学変化を、物質の種類と量の関係が分かるように表した式である。」に当てはまる語です。
  「共有結合」が正しいです。「原子どうしが電子を共有してできる結び付きである。」に当てはまる語です。
  「塩基」は、「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」に当てはまる語です。
  「pH」は、「水溶液の酸性や塩基性の強さを表す尺度である。」に当てはまる語です。
