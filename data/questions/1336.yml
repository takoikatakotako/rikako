# 化学基礎 問296
id: 1336
type: single_choice
text: |
  電離度の特徴として、最も適切なものはどれか。
choices:
  - "電離した割合を表す"
  - "酸性やアルカリ性で色が変わる"
  - "酸化を防ぐために用いる"
  - "多数の小さな単位がつながってできる"
correct: 0
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  電離度では、「電離した割合を表す」という点が大切です。したがって、正解は「電離した割合を表す」です。
  
  「電離した割合を表す」が正しいです。電離度の特徴を表しています。
  「酸性やアルカリ性で色が変わる」は、指示薬に関係する特徴です。
  「酸化を防ぐために用いる」は、酸化防止剤に関係する特徴です。
  「多数の小さな単位がつながってできる」は、高分子化合物に関係する特徴です。
