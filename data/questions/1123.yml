# 化学基礎 問83
id: 1123
type: single_choice
text: |
  化合物中の酸素の酸化数として、普通よく用いられる値として最も適切なものはどれか。
choices:
  - "+2"
  - "+1"
  - "-1"
  - "-2"
correct: 3
explanation: |
  この問題は、「酸化数の基本ルール」を確認する問題です。
  
  酸素の酸化数は、普通多くの化合物で -2 として扱います。したがって、正解は「-2」です。
  
  「+2」は、普通の化合物中の酸素の値として適切ではありません。
  「+1」は、適切ではありません。
  「-1」は、普通の基本ルールとしては適切ではありません。
  「-2」が正しいです。酸化数の基本ルールです。
