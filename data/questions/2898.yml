# 高校化学 問898
id: 2898
type: single_choice
text: |
  「目的に応じた特別な性質をもたせてつくられた材料である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "必要な機能をねらって材料を設計すること"
  - "軽くて繰り返し使いやすい電池であること"
  - "平衡の位置を数で表すこと"
  - "反応性が高く 1 価の陽イオンになりやすいこと"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「目的に応じた特別な性質をもたせてつくられた材料である。」を理解する上では、「必要な機能をねらって材料を設計すること」という見方が大切です。したがって、正解は「必要な機能をねらって材料を設計すること」です。
  
  「必要な機能をねらって材料を設計すること」が正しいです。この説明と結び付きが強い見方です。
  「軽くて繰り返し使いやすい電池であること」は、その見方はリチウムイオン電池に関係します。
  「平衡の位置を数で表すこと」は、その見方は平衡定数に関係します。
  「反応性が高く 1 価の陽イオンになりやすいこと」は、その見方はアルカリ金属に関係します。
