# 令和7年度 ITパスポート 公開問題 問84
id: 420
type: single_choice
text: |
  ISMSにおける情報セキュリティ方針に関する記述として、適切なものはどれか。
choices:
  - "機密事項が記載されているので、伝達する範囲を社内に限定する必要がある。"
  - "情報セキュリティ対策は一度実施したら終わりではないので、ISMSを継続的に改善するコミットメントを含める必要がある。"
  - "部門の特性に応じて最適化するので、ISMSを適用する組織全体ではなく、部門ごとに定める必要がある。"
  - "ボトムアップを前提としているので、各職場の管理者によって承認される必要がある。"
correct: 1
explanation: |
  この問題の公開解答では「情報セキュリティ対策は一度実施したら終わりではないので、ISMSを継続的に改善するコミットメントを含める必要がある」が正解とされています。
  
  「機密事項が記載されているので、伝達する範囲を社内に限定する必要がある」は公開解答では正解ではありません。
  「情報セキュリティ対策は一度実施したら終わりではないので、ISMSを継続的に改善するコミットメントを含める必要がある」が公開解答で正解とされています。
  「部門の特性に応じて最適化するので、ISMSを適用する組織全体ではなく、部門ごとに定める必要がある」は公開解答では正解ではありません。
  「ボトムアップを前提としているので、各職場の管理者によって承認される必要がある」は公開解答では正解ではありません。
