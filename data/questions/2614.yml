# 高校化学 問614
id: 2614
type: single_choice
text: |
  「食塩や金属の規則正しい並び方を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。"
  - "光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。"
  - "結晶の中で粒子が規則正しく並んだ構造である。"
  - "反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「食塩や金属の規則正しい並び方を考える場面」を説明した文として適切なのは「結晶の中で粒子が規則正しく並んだ構造である。」です。したがって、正解は「結晶の中で粒子が規則正しく並んだ構造である。」です。
  
  「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」は、この説明は「コロイド溶液から余分な電解質を取り除く場面」と結び付きが強いです。
  「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」は、この説明は「植物が光を受けてデンプンなどをつくる場面」と結び付きが強いです。
  「結晶の中で粒子が規則正しく並んだ構造である。」が正しいです。この具体例を説明した文です。
  「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」は、この説明は「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」と結び付きが強いです。
