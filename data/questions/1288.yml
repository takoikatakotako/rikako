# 化学基礎 問248
id: 1288
type: single_choice
text: |
  「アスコルビン酸」に最も関係が深い語として、適切なものはどれか。
choices:
  - "高分子化合物"
  - "酸化防止剤"
  - "化学が拓く世界"
  - "ろ過"
correct: 1
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「アスコルビン酸」に最も関係が深いのは酸化防止剤です。したがって、正解は「酸化防止剤」です。
  
  「高分子化合物」は、この例に最も関係が深い語ではありません。
  「酸化防止剤」が正しいです。この例は酸化防止剤に関係しています。
  「化学が拓く世界」は、この例に最も関係が深い語ではありません。
  「ろ過」は、この例に最も関係が深い語ではありません。
