# 高校化学 問420
id: 2420
type: single_choice
text: |
  溶解を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "溶質があると凝固点が下がること"
  - "小さな粒子が分散している状態であること"
  - "粒子が周囲の分子にぶつかって動くこと"
  - "溶質の粒子が溶媒中に広がること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  溶解では、「溶質の粒子が溶媒中に広がること」という見方が大切です。したがって、正解は「溶質の粒子が溶媒中に広がること」です。
  
  「溶質があると凝固点が下がること」は、凝固点降下に関係する見方です。
  「小さな粒子が分散している状態であること」は、コロイドに関係する見方です。
  「粒子が周囲の分子にぶつかって動くこと」は、ブラウン運動に関係する見方です。
  「溶質の粒子が溶媒中に広がること」が正しいです。溶解の要点を表しています。
