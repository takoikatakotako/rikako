# 化学基礎 問830
id: 1870
type: single_choice
text: |
  「反応する物質とできる物質の関係を式で示すこと」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
  - "水分子で電荷のかたよりを考える場面"
  - "塩酸と水酸化ナトリウム水溶液を混ぜる場面"
  - "水素と酸素から水ができる反応を式で表す場面"
correct: 3
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「反応する物質とできる物質の関係を式で示すこと」という見方と最も関係が深い場面は「水素と酸素から水ができる反応を式で表す場面」です。したがって、正解は「水素と酸素から水ができる反応を式で表す場面」です。
  
  「ナトリウムが電子を1個失いやすい理由を考える場面」は、その場面で大切なのは「化学結合やイオンのできやすさに関係すること」という見方です。
  「水分子で電荷のかたよりを考える場面」は、その場面で大切なのは「電荷のかたよりがあること」という見方です。
  「塩酸と水酸化ナトリウム水溶液を混ぜる場面」は、その場面で大切なのは「酸と塩基が打ち消し合うこと」という見方です。
  「水素と酸素から水ができる反応を式で表す場面」が正しいです。この見方と最も関係が深い場面です。
