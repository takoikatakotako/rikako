# 高校化学 問205
id: 2205
type: single_choice
text: |
  「蒸発する速さと凝縮する速さが等しくなった状態である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "アモルファス"
  - "溶解度"
  - "気液平衡"
  - "溶解平衡"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  蒸発する速さと凝縮する速さが等しくなった状態である。 に当てはまる語は気液平衡です。したがって、正解は「気液平衡」です。
  
  「アモルファス」は、「結晶のような規則正しい配列をもたない固体である。」に当てはまる語です。
  「溶解度」は、「一定量の溶媒に溶けることのできる溶質の最大量である。」に当てはまる語です。
  「気液平衡」が正しいです。「蒸発する速さと凝縮する速さが等しくなった状態である。」に当てはまる語です。
  「溶解平衡」は、「溶ける速さと析出する速さが等しくなっている平衡である。」に当てはまる語です。
