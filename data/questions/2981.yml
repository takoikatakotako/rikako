# 高校化学 問981
id: 2981
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "置換反応 / メタンの水素が塩素に置き換わる場面"
  - "吸熱反応 / 同じ反応でも条件によって進み方が変わることを比べる場面"
  - "反応速度 / 酢酸ナトリウム水溶液が塩基性を示す理由を考える場面"
  - "塩の加水分解 / 熱分解や一部の溶解で周囲が冷たくなる場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「置換反応 / メタンの水素が塩素に置き換わる場面」です。したがって、正解は「置換反応 / メタンの水素が塩素に置き換わる場面」です。
  
  「置換反応 / メタンの水素が塩素に置き換わる場面」が正しいです。用語と場面の対応が合っています。
  「吸熱反応 / 同じ反応でも条件によって進み方が変わることを比べる場面」は、用語と場面の対応が合っていません。
  「反応速度 / 酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」は、用語と場面の対応が合っていません。
  「塩の加水分解 / 熱分解や一部の溶解で周囲が冷たくなる場面」は、用語と場面の対応が合っていません。
