# 化学基礎 問843
id: 1883
type: single_choice
text: |
  「電池の中で電気的なつり合いを保つこと」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ダニエル電池で二つの水溶液をつなぐ場面"
  - "水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
  - "酸素や過酸化水素が相手を酸化させる場面"
  - "医療や年代測定に利用される炭素14を考える場面"
correct: 0
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「電池の中で電気的なつり合いを保つこと」という見方と最も関係が深い場面は「ダニエル電池で二つの水溶液をつなぐ場面」です。したがって、正解は「ダニエル電池で二つの水溶液をつなぐ場面」です。
  
  「ダニエル電池で二つの水溶液をつなぐ場面」が正しいです。この見方と最も関係が深い場面です。
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」は、その場面で大切なのは「水酸化物イオンや水素イオンの受け取りに注目すること」という見方です。
  「酸素や過酸化水素が相手を酸化させる場面」は、その場面で大切なのは「相手を酸化させ、自分は還元されること」という見方です。
  「医療や年代測定に利用される炭素14を考える場面」は、その場面で大切なのは「放射線を出す同位体であること」という見方です。
