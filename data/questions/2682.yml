# 高校化学 問682
id: 2682
type: single_choice
text: |
  「ブタンとイソブタンを比べる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "使い終わった資源や製品を回収し、再び利用する考え方である。"
  - "気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。"
  - "分子式は同じでも構造が異なる化合物どうしである。"
  - "一定量の溶媒に溶けることのできる溶質の最大量である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「ブタンとイソブタンを比べる場面」を説明した文として適切なのは「分子式は同じでも構造が異なる化合物どうしである。」です。したがって、正解は「分子式は同じでも構造が異なる化合物どうしである。」です。
  
  「使い終わった資源や製品を回収し、再び利用する考え方である。」は、この説明は「金属やプラスチックを回収して再資源化する場面」と結び付きが強いです。
  「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」は、この説明は「気体の量と温度から体積や圧力を見積もる場面」と結び付きが強いです。
  「分子式は同じでも構造が異なる化合物どうしである。」が正しいです。この具体例を説明した文です。
  「一定量の溶媒に溶けることのできる溶質の最大量である。」は、この説明は「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」と結び付きが強いです。
