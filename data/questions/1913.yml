# 化学基礎 問873
id: 1913
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "周期律 / 原子が結び付いてできた、物質の性質を示す小さな粒子である。"
  - "共有結合 / 原子どうしが電子を共有してできる結び付きである。"
  - "分子 / 水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。"
  - "塩基 / 元素を原子番号の順に並べると性質が周期的に変化するというきまりである。"
correct: 1
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「共有結合 / 原子どうしが電子を共有してできる結び付きである。」です。したがって、正解は「共有結合 / 原子どうしが電子を共有してできる結び付きである。」です。
  
  「周期律 / 原子が結び付いてできた、物質の性質を示す小さな粒子である。」は、用語と説明の対応が合っていません。
  「共有結合 / 原子どうしが電子を共有してできる結び付きである。」が正しいです。用語と説明の対応が合っています。
  「分子 / 水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」は、用語と説明の対応が合っていません。
  「塩基 / 元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」は、用語と説明の対応が合っていません。
