# 化学基礎 問924
id: 1964
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "モル濃度 / BTB溶液やフェノールフタレインで液性を調べる場面"
  - "指示薬 / ダニエル電池で二つの水溶液をつなぐ場面"
  - "塩橋 / 1Lの食塩水にどれだけ溶質が溶けているかを表す場面"
  - "金属結合 / 金属中で自由電子が動けるため電気を通すことを考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「金属結合 / 金属中で自由電子が動けるため電気を通すことを考える場面」です。したがって、正解は「金属結合 / 金属中で自由電子が動けるため電気を通すことを考える場面」です。
  
  「モル濃度 / BTB溶液やフェノールフタレインで液性を調べる場面」は、用語と場面の対応が合っていません。
  「指示薬 / ダニエル電池で二つの水溶液をつなぐ場面」は、用語と場面の対応が合っていません。
  「塩橋 / 1Lの食塩水にどれだけ溶質が溶けているかを表す場面」は、用語と場面の対応が合っていません。
  「金属結合 / 金属中で自由電子が動けるため電気を通すことを考える場面」が正しいです。用語と場面の対応が合っています。
