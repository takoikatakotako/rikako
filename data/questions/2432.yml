# 高校化学 問432
id: 2432
type: single_choice
text: |
  電気泳動を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "液体から出た蒸気が示す圧力に注目すること"
  - "状態変化に必要な熱に注目すること"
  - "温度一定で圧力と体積の関係を見ること"
  - "コロイド粒子の電荷に注目すること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  電気泳動では、「コロイド粒子の電荷に注目すること」という見方が大切です。したがって、正解は「コロイド粒子の電荷に注目すること」です。
  
  「液体から出た蒸気が示す圧力に注目すること」は、蒸気圧に関係する見方です。
  「状態変化に必要な熱に注目すること」は、融解熱に関係する見方です。
  「温度一定で圧力と体積の関係を見ること」は、ボイルの法則に関係する見方です。
  「コロイド粒子の電荷に注目すること」が正しいです。電気泳動の要点を表しています。
