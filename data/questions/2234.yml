# 高校化学 問234
id: 2234
type: single_choice
text: |
  「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "溶解平衡"
  - "沸点上昇"
  - "浸透圧"
  - "疎水コロイド"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  水との親和性が低く、少しの電解質で凝析しやすいコロイドである。 に当てはまる語は疎水コロイドです。したがって、正解は「疎水コロイド」です。
  
  「溶解平衡」は、「溶ける速さと析出する速さが等しくなっている平衡である。」に当てはまる語です。
  「沸点上昇」は、「溶液の沸点が純粋な溶媒より高くなる現象である。」に当てはまる語です。
  「浸透圧」は、「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」に当てはまる語です。
  「疎水コロイド」が正しいです。「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」に当てはまる語です。
