# 化学基礎 問995
id: 2035
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "混合物 / 液体から固体への変化であること"
  - "非電解質 / 水溶液でも電流をほとんど通さないこと"
  - "凝固 / 電子を失って正に帯電すること"
  - "陽イオン / 成分が二種類以上まざっていること"
correct: 1
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「非電解質 / 水溶液でも電流をほとんど通さないこと」です。したがって、正解は「非電解質 / 水溶液でも電流をほとんど通さないこと」です。
  
  「混合物 / 液体から固体への変化であること」は、用語と要点の対応が合っていません。
  「非電解質 / 水溶液でも電流をほとんど通さないこと」が正しいです。用語と要点の対応が合っています。
  「凝固 / 電子を失って正に帯電すること」は、用語と要点の対応が合っていません。
  「陽イオン / 成分が二種類以上まざっていること」は、用語と要点の対応が合っていません。
