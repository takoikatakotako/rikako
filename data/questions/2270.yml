# 高校化学 問270
id: 2270
type: single_choice
text: |
  「周期表18族に属し、化学的に安定な気体元素の総称である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "陰極"
  - "飽和炭化水素"
  - "付加反応"
  - "貴ガス"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  周期表18族に属し、化学的に安定な気体元素の総称である。 に当てはまる語は貴ガスです。したがって、正解は「貴ガス」です。
  
  「陰極」は、「電気分解で還元が起こる電極である。」に当てはまる語です。
  「飽和炭化水素」は、「炭素どうしが単結合だけでつながった炭化水素である。」に当てはまる語です。
  「付加反応」は、「多重結合に原子や原子団が加わる反応である。」に当てはまる語です。
  「貴ガス」が正しいです。「周期表18族に属し、化学的に安定な気体元素の総称である。」に当てはまる語です。
