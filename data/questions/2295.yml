# 高校化学 問295
id: 2295
type: single_choice
text: |
  「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "グルコース"
  - "透析"
  - "親水コロイド"
  - "ナイロン"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  代表的な単糖類で、生物のエネルギー源として重要な化合物である。 に当てはまる語はグルコースです。したがって、正解は「グルコース」です。
  
  「グルコース」が正しいです。「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」に当てはまる語です。
  「透析」は、「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」に当てはまる語です。
  「親水コロイド」は、「水との親和性が高く、比較的安定なコロイドである。」に当てはまる語です。
  「ナイロン」は、「アミド結合をもつ合成繊維の代表的な高分子化合物である。」に当てはまる語です。
