# 化学基礎 問697
id: 1737
type: single_choice
text: |
  「金属元素を炎に入れたときに特有の色を示す反応である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "性質が周期的にくり返されること"
  - "金属元素ごとに炎の色が異なること"
  - "物質の性質を示す小さな粒子として考えること"
  - "水酸化物イオンや水素イオンの受け取りに注目すること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「金属元素を炎に入れたときに特有の色を示す反応である。」を理解する上では、「金属元素ごとに炎の色が異なること」という見方が大切です。したがって、正解は「金属元素ごとに炎の色が異なること」です。
  
  「性質が周期的にくり返されること」は、その見方は周期律に関係します。
  「金属元素ごとに炎の色が異なること」が正しいです。この説明と結び付きが強い見方です。
  「物質の性質を示す小さな粒子として考えること」は、その見方は分子に関係します。
  「水酸化物イオンや水素イオンの受け取りに注目すること」は、その見方は塩基に関係します。
