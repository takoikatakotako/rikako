# 化学基礎 問488
id: 1528
type: single_choice
text: |
  還元を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水溶液や融解状態で電流を通すこと"
  - "酸素の喪失や電子の受け取りに注目すること"
  - "放射線を出す同位体であること"
  - "酸化による変質を防ぐこと"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  還元では、「酸素の喪失や電子の受け取りに注目すること」という見方が大切です。したがって、正解は「酸素の喪失や電子の受け取りに注目すること」です。
  
  「水溶液や融解状態で電流を通すこと」は、電解質に関係する見方です。
  「酸素の喪失や電子の受け取りに注目すること」が正しいです。還元の要点を表しています。
  「放射線を出す同位体であること」は、放射性同位体に関係する見方です。
  「酸化による変質を防ぐこと」は、酸化防止剤に関係する見方です。
