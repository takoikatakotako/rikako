# 化学基礎 問804
id: 1844
type: single_choice
text: |
  「移動しやすさの違いを利用すること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ダニエル電池で二つの水溶液をつなぐ場面"
  - "インクの色素をろ紙の上で分ける場面"
  - "電池、医薬品、素材開発などに化学が生かされる場面"
  - "鉄や酸素のように一種類の元素だけからできた物質を考える場面"
correct: 1
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「移動しやすさの違いを利用すること」という見方と最も関係が深い場面は「インクの色素をろ紙の上で分ける場面」です。したがって、正解は「インクの色素をろ紙の上で分ける場面」です。
  
  「ダニエル電池で二つの水溶液をつなぐ場面」は、その場面で大切なのは「電池の中で電気的なつり合いを保つこと」という見方です。
  「インクの色素をろ紙の上で分ける場面」が正しいです。この見方と最も関係が深い場面です。
  「電池、医薬品、素材開発などに化学が生かされる場面」は、その場面で大切なのは「化学が社会や生活に広く役立つこと」という見方です。
  「鉄や酸素のように一種類の元素だけからできた物質を考える場面」は、その場面で大切なのは「一種類の元素だけからできること」という見方です。
