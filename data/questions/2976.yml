# 高校化学 問976
id: 2976
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "反応熱 / 水素を使って発電し、水を生じる仕組みを考える場面"
  - "燃料電池 / 圧力や濃度を変えると平衡が移る方向を考える場面"
  - "ルシャトリエの原理 / 物質を燃やしたときに熱が出ることを考える場面"
  - "鉄 / さびや鉄鋼の利用を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「鉄 / さびや鉄鋼の利用を考える場面」です。したがって、正解は「鉄 / さびや鉄鋼の利用を考える場面」です。
  
  「反応熱 / 水素を使って発電し、水を生じる仕組みを考える場面」は、用語と場面の対応が合っていません。
  「燃料電池 / 圧力や濃度を変えると平衡が移る方向を考える場面」は、用語と場面の対応が合っていません。
  「ルシャトリエの原理 / 物質を燃やしたときに熱が出ることを考える場面」は、用語と場面の対応が合っていません。
  「鉄 / さびや鉄鋼の利用を考える場面」が正しいです。用語と場面の対応が合っています。
