# 高校化学 問513
id: 2513
type: single_choice
text: |
  「絶対零度を基準にした温度で、単位は K で表す。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "気体の法則で温度をセルシウス温度ではなく K で扱う場面"
  - "ドライアイスやヨウ素の結晶を考える場面"
  - "薄い溶液側から濃い溶液側へ水が移動する場面"
  - "どの結合が切れやすいかを比べる場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「絶対零度を基準にした温度で、単位は K で表す。」と最も関係が深い場面は「気体の法則で温度をセルシウス温度ではなく K で扱う場面」です。したがって、正解は「気体の法則で温度をセルシウス温度ではなく K で扱う場面」です。
  
  「気体の法則で温度をセルシウス温度ではなく K で扱う場面」が正しいです。この説明と結び付きが強い場面です。
  「ドライアイスやヨウ素の結晶を考える場面」は、「分子どうしが分子間力で集まってできた結晶である。」と結び付きが強い場面です。
  「薄い溶液側から濃い溶液側へ水が移動する場面」は、「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」と結び付きが強い場面です。
  「どの結合が切れやすいかを比べる場面」は、「気体分子中の結合1 molを切るのに必要なエネルギーである。」と結び付きが強い場面です。
