# 高校化学 問729
id: 2729
type: single_choice
text: |
  「コロイドが光を散乱すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "水のイオン積"
  - "両性酸化物"
  - "チンダル現象"
  - "異性体"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「コロイドが光を散乱すること」という見方が大切なのはチンダル現象です。したがって、正解は「チンダル現象」です。
  
  「水のイオン積」は、その語で大切なのは「H+ と OH- の積が一定であること」という見方です。
  「両性酸化物」は、その語で大切なのは「酸とも塩基とも反応すること」という見方です。
  「チンダル現象」が正しいです。この見方が大切な語です。
  「異性体」は、その語で大切なのは「同じ分子式でも構造が違うこと」という見方です。
