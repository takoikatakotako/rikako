# 高校化学 問896
id: 2896
type: single_choice
text: |
  「グルコースが多数つながった植物の貯蔵多糖である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "使い切りの電池であること"
  - "正反応と逆反応の両方を見ること"
  - "植物がエネルギーをたくわえる多糖であること"
  - "酸の強さを電離のしやすさで見ること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「グルコースが多数つながった植物の貯蔵多糖である。」を理解する上では、「植物がエネルギーをたくわえる多糖であること」という見方が大切です。したがって、正解は「植物がエネルギーをたくわえる多糖であること」です。
  
  「使い切りの電池であること」は、その見方は乾電池に関係します。
  「正反応と逆反応の両方を見ること」は、その見方は可逆反応に関係します。
  「植物がエネルギーをたくわえる多糖であること」が正しいです。この説明と結び付きが強い見方です。
  「酸の強さを電離のしやすさで見ること」は、その見方は酸解離定数に関係します。
