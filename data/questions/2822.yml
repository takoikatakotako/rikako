# 高校化学 問822
id: 2822
type: single_choice
text: |
  「その温度でそれ以上溶質が溶けない状態の溶液である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "それ以上溶けない状態であること"
  - "非金属で酸化力が強いこと"
  - "二重結合や三重結合に何かが加わること"
  - "ポリエステルの一種で再利用もしやすいこと"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「その温度でそれ以上溶質が溶けない状態の溶液である。」を理解する上では、「それ以上溶けない状態であること」という見方が大切です。したがって、正解は「それ以上溶けない状態であること」です。
  
  「それ以上溶けない状態であること」が正しいです。この説明と結び付きが強い見方です。
  「非金属で酸化力が強いこと」は、その見方はハロゲンに関係します。
  「二重結合や三重結合に何かが加わること」は、その見方は付加反応に関係します。
  「ポリエステルの一種で再利用もしやすいこと」は、その見方はPETに関係します。
