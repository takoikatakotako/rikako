# 化学基礎 問314
id: 1354
type: single_choice
text: |
  昇華について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "原子のいちばん外側の電子殻にある電子である。"
  - "沸点の違いを利用して液体を分ける方法である。"
  - "固体が液体にならずに気体になる状態変化である。"
  - "成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  昇華は、固体が液体にならずに気体になる状態変化である。 したがって、正解は「固体が液体にならずに気体になる状態変化である。」です。
  
  「原子のいちばん外側の電子殻にある電子である。」は、最外殻電子の説明です。
  「沸点の違いを利用して液体を分ける方法である。」は、蒸留の説明です。
  「固体が液体にならずに気体になる状態変化である。」が正しいです。昇華の説明です。
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」は、クロマトグラフィーの説明です。
