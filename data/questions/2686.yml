# 高校化学 問686
id: 2686
type: single_choice
text: |
  「果物の香りに関係する化合物を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "液体の蒸気圧が外圧に等しくなる温度である。"
  - "結晶の中で粒子が規則正しく並んだ構造である。"
  - "カルボン酸とアルコールからできる有機化合物である。"
  - "溶液の沸点が純粋な溶媒より高くなる現象である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「果物の香りに関係する化合物を考える場面」を説明した文として適切なのは「カルボン酸とアルコールからできる有機化合物である。」です。したがって、正解は「カルボン酸とアルコールからできる有機化合物である。」です。
  
  「液体の蒸気圧が外圧に等しくなる温度である。」は、この説明は「水が沸騰し始める温度を考える場面」と結び付きが強いです。
  「結晶の中で粒子が規則正しく並んだ構造である。」は、この説明は「食塩や金属の規則正しい並び方を考える場面」と結び付きが強いです。
  「カルボン酸とアルコールからできる有機化合物である。」が正しいです。この具体例を説明した文です。
  「溶液の沸点が純粋な溶媒より高くなる現象である。」は、この説明は「食塩水の沸点が水より少し高くなることを考える場面」と結び付きが強いです。
