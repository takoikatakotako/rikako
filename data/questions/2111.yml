# 高校化学 問111
id: 2111
type: single_choice
text: |
  分圧の法則と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ガラスのように一定の融点を示しにくい固体を考える場面"
  - "温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面"
  - "飽和溶液で見かけ上変化が止まっている場面"
  - "酸素と窒素が混ざった気体の圧力を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  酸素と窒素が混ざった気体の圧力を考える場面は、分圧の法則と結び付きが強い場面です。したがって、正解は「酸素と窒素が混ざった気体の圧力を考える場面」です。
  
  「ガラスのように一定の融点を示しにくい固体を考える場面」は、アモルファスと結び付きが強い場面です。
  「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」は、溶解度と結び付きが強い場面です。
  「飽和溶液で見かけ上変化が止まっている場面」は、溶解平衡と結び付きが強い場面です。
  「酸素と窒素が混ざった気体の圧力を考える場面」が正しいです。これは分圧の法則と結び付きが強い場面です。
