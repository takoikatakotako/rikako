# 化学基礎 問485
id: 1525
type: single_choice
text: |
  電離度を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "金属のイオンになりやすさを比べること"
  - "電池の中で電気的なつり合いを保つこと"
  - "どのくらいイオンに分かれるかを表すこと"
  - "1Lあたりの物質量で表すこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  電離度では、「どのくらいイオンに分かれるかを表すこと」という見方が大切です。したがって、正解は「どのくらいイオンに分かれるかを表すこと」です。
  
  「金属のイオンになりやすさを比べること」は、イオン化傾向に関係する見方です。
  「電池の中で電気的なつり合いを保つこと」は、塩橋に関係する見方です。
  「どのくらいイオンに分かれるかを表すこと」が正しいです。電離度の要点を表しています。
  「1Lあたりの物質量で表すこと」は、モル濃度に関係する見方です。
