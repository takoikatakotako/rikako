# 高校化学 問891
id: 2891
type: single_choice
text: |
  「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "結合を切るのに必要なエネルギーに注目すること"
  - "ポリエステルの一種で再利用もしやすいこと"
  - "還元が起こる側の電極であること"
  - "H+ と OH- の積が一定であること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」を理解する上では、「ポリエステルの一種で再利用もしやすいこと」という見方が大切です。したがって、正解は「ポリエステルの一種で再利用もしやすいこと」です。
  
  「結合を切るのに必要なエネルギーに注目すること」は、その見方は結合エネルギーに関係します。
  「ポリエステルの一種で再利用もしやすいこと」が正しいです。この説明と結び付きが強い見方です。
  「還元が起こる側の電極であること」は、その見方は陰極に関係します。
  「H+ と OH- の積が一定であること」は、その見方は水のイオン積に関係します。
