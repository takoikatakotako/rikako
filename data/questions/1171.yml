# 化学基礎 問131
id: 1171
type: single_choice
text: |
  酸についての説明として、最も適切なものはどれか。
choices:
  - "水溶液中で水酸化物イオンを生じるか、水素イオンを受け取る物質である。"
  - "酸と塩基が反応して塩と水を生じる反応である。"
  - "水溶液中で水素イオンを生じる物質である。"
  - "水溶液の酸性やアルカリ性の強さの目安を表す値である。"
correct: 2
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  酸は、水溶液中で水素イオンを生じる物質である。したがって、正解は「水溶液中で水素イオンを生じる物質である。」です。
  
  「水溶液中で水酸化物イオンを生じるか、水素イオンを受け取る物質である。」は、塩基の説明です。
  「酸と塩基が反応して塩と水を生じる反応である。」は、中和の説明です。
  「水溶液中で水素イオンを生じる物質である。」が正しいです。酸の説明です。
  「水溶液の酸性やアルカリ性の強さの目安を表す値である。」は、pHの説明です。
