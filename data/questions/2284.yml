# 高校化学 問284
id: 2284
type: single_choice
text: |
  「分子の端にアルデヒド基をもつ有機化合物である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "機能性材料"
  - "アルデヒド"
  - "化学が築く未来"
  - "不飽和炭化水素"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  分子の端にアルデヒド基をもつ有機化合物である。 に当てはまる語はアルデヒドです。したがって、正解は「アルデヒド」です。
  
  「機能性材料」は、「目的に応じた特別な性質をもたせてつくられた材料である。」に当てはまる語です。
  「アルデヒド」が正しいです。「分子の端にアルデヒド基をもつ有機化合物である。」に当てはまる語です。
  「化学が築く未来」は、「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」に当てはまる語です。
  「不飽和炭化水素」は、「炭素どうしに二重結合や三重結合をもつ炭化水素である。」に当てはまる語です。
