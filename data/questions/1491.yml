# 化学基礎 問451
id: 1491
type: single_choice
text: |
  ろ過を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水に溶けない固体を液体から分けること"
  - "複数の元素が結び付いてできること"
  - "新しい物質ができること"
  - "液体から気体への変化であること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  ろ過では、「水に溶けない固体を液体から分けること」という見方が大切です。したがって、正解は「水に溶けない固体を液体から分けること」です。
  
  「水に溶けない固体を液体から分けること」が正しいです。ろ過の要点を表しています。
  「複数の元素が結び付いてできること」は、化合物に関係する見方です。
  「新しい物質ができること」は、化学変化に関係する見方です。
  「液体から気体への変化であること」は、蒸発に関係する見方です。
