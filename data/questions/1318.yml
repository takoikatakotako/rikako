# 化学基礎 問278
id: 1318
type: single_choice
text: |
  モルの特徴として、最も適切なものはどれか。
choices:
  - "1 L あたりの溶質の物質量"
  - "物質と量的関係を表す"
  - "粒子数をそろえる単位"
  - "水素イオンを生じる"
correct: 2
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  モルでは、「粒子数をそろえる単位」という点が大切です。したがって、正解は「粒子数をそろえる単位」です。
  
  「1 L あたりの溶質の物質量」は、モル濃度に関係する特徴です。
  「物質と量的関係を表す」は、化学反応式に関係する特徴です。
  「粒子数をそろえる単位」が正しいです。モルの特徴を表しています。
  「水素イオンを生じる」は、酸に関係する特徴です。
