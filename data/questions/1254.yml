# 化学基礎 問214
id: 1254
type: single_choice
text: |
  「ドライアイスが気体になる変化」に最も関係が深い語として、適切なものはどれか。
choices:
  - "原子番号"
  - "質量数"
  - "同位体"
  - "昇華"
correct: 3
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「ドライアイスが気体になる変化」に最も関係が深いのは昇華です。したがって、正解は「昇華」です。
  
  「原子番号」は、この例に最も関係が深い語ではありません。
  「質量数」は、この例に最も関係が深い語ではありません。
  「同位体」は、この例に最も関係が深い語ではありません。
  「昇華」が正しいです。この例は昇華に関係しています。
