# 化学基礎 問62
id: 1102
type: single_choice
text: |
  陰イオンについての説明として、最も適切なものはどれか。
choices:
  - "電子を受け取って負の電荷をもつ粒子である。"
  - "電子を失って正の電荷をもつ粒子である。"
  - "陽子を失った原子核である。"
  - "中性子だけからできた粒子である。"
correct: 0
explanation: |
  この問題は、「陰イオンがどうできるか」を確認する問題です。
  
  陰イオンは、電子を受け取って負の電荷をもつようになった粒子です。したがって、正解は「電子を受け取って負の電荷をもつ粒子である」です。
  
  「電子を受け取って負の電荷をもつ粒子である」が正しいです。
  「電子を失って正の電荷をもつ粒子である」は、陽イオンの説明です。
  「陽子を失った原子核である」は、適切ではありません。
  「中性子だけからできた粒子である」は、適切ではありません。
