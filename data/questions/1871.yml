# 化学基礎 問831
id: 1871
type: single_choice
text: |
  「水素イオンに注目すること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "塩酸が水溶液中で水素イオンを生じる場面"
  - "ナトリウム原子が電子を1個失って Na+ になる場面"
  - "酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面"
  - "レモン水とせっけん水の酸性・塩基性を比べる場面"
correct: 0
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「水素イオンに注目すること」という見方と最も関係が深い場面は「塩酸が水溶液中で水素イオンを生じる場面」です。したがって、正解は「塩酸が水溶液中で水素イオンを生じる場面」です。
  
  「塩酸が水溶液中で水素イオンを生じる場面」が正しいです。この見方と最も関係が深い場面です。
  「ナトリウム原子が電子を1個失って Na+ になる場面」は、その場面で大切なのは「電子を失って正に帯電すること」という見方です。
  「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」は、その場面で大切なのは「電荷のかたよりがほとんどないこと」という見方です。
  「レモン水とせっけん水の酸性・塩基性を比べる場面」は、その場面で大切なのは「酸性と塩基性の強さを数で見ること」という見方です。
