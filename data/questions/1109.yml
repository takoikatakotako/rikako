# 化学基礎 問69
id: 1109
type: single_choice
text: |
  メタン CH4 についての説明として、最も適切なものはどれか。
choices:
  - "分子からなる物質である。"
  - "イオン結晶である。"
  - "金属である。"
  - "単体である。"
correct: 0
explanation: |
  この問題は、「メタンがどんな物質か」を確認する問題です。
  
  メタン CH4 は、炭素原子と水素原子が共有結合してできた分子からなる物質です。したがって、正解は「分子からなる物質である」です。
  
  「分子からなる物質である」が正しいです。
  「イオン結晶である」は、適切ではありません。
  「金属である」は、適切ではありません。
  「単体である」は、複数元素からなるので適切ではありません。
