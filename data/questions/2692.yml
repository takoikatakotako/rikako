# 高校化学 問692
id: 2692
type: single_choice
text: |
  「酵素や筋肉の主成分を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "多数のアミノ酸がつながってできた天然高分子化合物である。"
  - "一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。"
  - "溶質の粒子が溶媒中に広がっていく現象である。"
  - "半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「酵素や筋肉の主成分を考える場面」を説明した文として適切なのは「多数のアミノ酸がつながってできた天然高分子化合物である。」です。したがって、正解は「多数のアミノ酸がつながってできた天然高分子化合物である。」です。
  
  「多数のアミノ酸がつながってできた天然高分子化合物である。」が正しいです。この具体例を説明した文です。
  「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」は、この説明は「温めた風船がふくらみやすくなる場面」と結び付きが強いです。
  「溶質の粒子が溶媒中に広がっていく現象である。」は、この説明は「食塩が水に溶けて見えなくなる場面」と結び付きが強いです。
  「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」は、この説明は「コロイド溶液から余分な電解質を取り除く場面」と結び付きが強いです。
