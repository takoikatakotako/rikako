# 化学基礎 問756
id: 1796
type: single_choice
text: |
  「成分が二種類以上まざっていること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "相手を酸化させ、自身は還元される物質である。"
  - "放射線を出しながら別の原子へ変わっていく同位体である。"
  - "二種類以上の物質が混ざってできている物質である。"
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
correct: 2
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「成分が二種類以上まざっていること」という見方と最も関係が深い説明は「二種類以上の物質が混ざってできている物質である。」です。したがって、正解は「二種類以上の物質が混ざってできている物質である。」です。
  
  「相手を酸化させ、自身は還元される物質である。」は、その説明で大切なのは「相手を酸化させ、自分は還元されること」という見方です。
  「放射線を出しながら別の原子へ変わっていく同位体である。」は、その説明で大切なのは「放射線を出す同位体であること」という見方です。
  「二種類以上の物質が混ざってできている物質である。」が正しいです。この見方と最も関係が深い説明です。
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、その説明で大切なのは「溶解度の差を利用すること」という見方です。
