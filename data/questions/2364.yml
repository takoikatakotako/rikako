# 高校化学 問364
id: 2364
type: single_choice
text: |
  「アンモニア水が強塩基ほど完全には電離しない場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "沸点上昇"
  - "浸透圧"
  - "弱塩基"
  - "チンダル現象"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  アンモニア水が強塩基ほど完全には電離しない場面 と最も関係が深いのは弱塩基です。したがって、正解は「弱塩基」です。
  
  「沸点上昇」は、「食塩水の沸点が水より少し高くなることを考える場面」と結び付きが強い語です。
  「浸透圧」は、「薄い溶液側から濃い溶液側へ水が移動する場面」と結び付きが強い語です。
  「弱塩基」が正しいです。この具体例と最も関係が深い語です。
  「チンダル現象」は、「薄暗い部屋でコロイドに光を当てると筋が見える場面」と結び付きが強い語です。
