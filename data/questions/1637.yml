# 化学基礎 問597
id: 1637
type: single_choice
text: |
  「ナトリウムで黄色、銅で青緑色を観察する場面」を説明した文として、最も適切なものはどれか。
choices:
  - "二種類以上の物質が混ざってできている物質である。"
  - "液体が固体に変わる状態変化である。"
  - "原子や原子団が電子を失って正の電荷をもつ粒子である。"
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「ナトリウムで黄色、銅で青緑色を観察する場面」を説明した文として適切なのは「金属元素を炎に入れたときに特有の色を示す反応である。」です。したがって、正解は「金属元素を炎に入れたときに特有の色を示す反応である。」です。
  
  「二種類以上の物質が混ざってできている物質である。」は、この説明は「空気や食塩水のように複数の物質が混ざったものを考える場面」と結び付きが強いです。
  「液体が固体に変わる状態変化である。」は、この説明は「水を冷やして氷にする場面」と結び付きが強いです。
  「原子や原子団が電子を失って正の電荷をもつ粒子である。」は、この説明は「ナトリウム原子が電子を1個失って Na+ になる場面」と結び付きが強いです。
  「金属元素を炎に入れたときに特有の色を示す反応である。」が正しいです。この具体例を説明した文です。
