# 化学基礎 問550
id: 1590
type: single_choice
text: |
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面"
  - "電池、医薬品、素材開発などに化学が生かされる場面"
  - "鉄がさびて別の物質になる場面"
  - "炭素12と炭素14を比べる場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」と最も関係が深い場面は「電池、医薬品、素材開発などに化学が生かされる場面」です。したがって、正解は「電池、医薬品、素材開発などに化学が生かされる場面」です。
  
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」は、「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」と結び付きが強い場面です。
  「電池、医薬品、素材開発などに化学が生かされる場面」が正しいです。この説明と結び付きが強い場面です。
  「鉄がさびて別の物質になる場面」は、「もとの物質とは別の物質ができる変化である。」と結び付きが強い場面です。
  「炭素12と炭素14を比べる場面」は、「陽子数は同じで中性子数が異なる原子どうしである。」と結び付きが強い場面です。
