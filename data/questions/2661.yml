# 高校化学 問661
id: 2661
type: single_choice
text: |
  「血液や実験用の溶液で pH を保ちたい場面」を説明した文として、最も適切なものはどれか。
choices:
  - "炭素どうしが単結合だけでつながった炭化水素である。"
  - "少量の酸や塩基を加えても pH が変わりにくい溶液である。"
  - "ベンゼン環にアミノ基が直接結び付いた化合物である。"
  - "化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「血液や実験用の溶液で pH を保ちたい場面」を説明した文として適切なのは「少量の酸や塩基を加えても pH が変わりにくい溶液である。」です。したがって、正解は「少量の酸や塩基を加えても pH が変わりにくい溶液である。」です。
  
  「炭素どうしが単結合だけでつながった炭化水素である。」は、この説明は「メタンやエタンの性質を考える場面」と結び付きが強いです。
  「少量の酸や塩基を加えても pH が変わりにくい溶液である。」が正しいです。この具体例を説明した文です。
  「ベンゼン環にアミノ基が直接結び付いた化合物である。」は、この説明は「染料の原料になる芳香族アミンを考える場面」と結び付きが強いです。
  「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」は、この説明は「再生可能エネルギーや新素材の開発を考える場面」と結び付きが強いです。
