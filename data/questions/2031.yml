# 化学基礎 問991
id: 2031
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "蒸留 / 物質の種類が変わらないこと"
  - "イオン化傾向 / 金属のイオンになりやすさを比べること"
  - "物理変化 / 陽子数と中性子数の合計であること"
  - "質量数 / 沸点の違いを利用すること"
correct: 1
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「イオン化傾向 / 金属のイオンになりやすさを比べること」です。したがって、正解は「イオン化傾向 / 金属のイオンになりやすさを比べること」です。
  
  「蒸留 / 物質の種類が変わらないこと」は、用語と要点の対応が合っていません。
  「イオン化傾向 / 金属のイオンになりやすさを比べること」が正しいです。用語と要点の対応が合っています。
  「物理変化 / 陽子数と中性子数の合計であること」は、用語と要点の対応が合っていません。
  「質量数 / 沸点の違いを利用すること」は、用語と要点の対応が合っていません。
