# 化学基礎 問713
id: 1753
type: single_choice
text: |
  「水を冷やして氷にする場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "液体から固体への変化であること"
  - "相手を還元させ、自分は酸化されること"
  - "金属元素ごとに炎の色が異なること"
  - "移動しやすさの違いを利用すること"
correct: 0
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「水を冷やして氷にする場面」では、「液体から固体への変化であること」という見方が大切です。したがって、正解は「液体から固体への変化であること」です。
  
  「液体から固体への変化であること」が正しいです。この具体例で大切になる見方です。
  「相手を還元させ、自分は酸化されること」は、その見方は水素や炭素が相手から酸素を奪う場面よりも還元剤と結び付きが強いです。
  「金属元素ごとに炎の色が異なること」は、その見方はナトリウムで黄色、銅で青緑色を観察する場面よりも炎色反応と結び付きが強いです。
  「移動しやすさの違いを利用すること」は、その見方はインクの色素をろ紙の上で分ける場面よりもクロマトグラフィーと結び付きが強いです。
