# 高校化学 問282
id: 2282
type: single_choice
text: |
  「分子式は同じでも構造が異なる化合物どうしである。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "鉄"
  - "機能性材料"
  - "化学が築く未来"
  - "異性体"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  分子式は同じでも構造が異なる化合物どうしである。 に当てはまる語は異性体です。したがって、正解は「異性体」です。
  
  「鉄」は、「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」に当てはまる語です。
  「機能性材料」は、「目的に応じた特別な性質をもたせてつくられた材料である。」に当てはまる語です。
  「化学が築く未来」は、「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」に当てはまる語です。
  「異性体」が正しいです。「分子式は同じでも構造が異なる化合物どうしである。」に当てはまる語です。
