# 化学基礎 問604
id: 1644
type: single_choice
text: |
  「移動しやすさの違いを利用すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "最外殻電子"
  - "クロマトグラフィー"
  - "極性分子"
  - "中和"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「移動しやすさの違いを利用すること」という見方が大切なのはクロマトグラフィーです。したがって、正解は「クロマトグラフィー」です。
  
  「最外殻電子」は、その語で大切なのは「化学結合やイオンのできやすさに関係すること」という見方です。
  「クロマトグラフィー」が正しいです。この見方が大切な語です。
  「極性分子」は、その語で大切なのは「電荷のかたよりがあること」という見方です。
  「中和」は、その語で大切なのは「酸と塩基が打ち消し合うこと」という見方です。
