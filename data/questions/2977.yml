# 高校化学 問977
id: 2977
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "銅 / 電線や青色の銅イオン水溶液を考える場面"
  - "エンタルピー変化 / 水溶液に電流を流して物質を分解する場面"
  - "電気分解 / 高圧や触媒を利用してアンモニアを得る場面"
  - "アンモニア合成 / 反応前後で熱の出入りを比較する場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「銅 / 電線や青色の銅イオン水溶液を考える場面」です。したがって、正解は「銅 / 電線や青色の銅イオン水溶液を考える場面」です。
  
  「銅 / 電線や青色の銅イオン水溶液を考える場面」が正しいです。用語と場面の対応が合っています。
  「エンタルピー変化 / 水溶液に電流を流して物質を分解する場面」は、用語と場面の対応が合っていません。
  「電気分解 / 高圧や触媒を利用してアンモニアを得る場面」は、用語と場面の対応が合っていません。
  「アンモニア合成 / 反応前後で熱の出入りを比較する場面」は、用語と場面の対応が合っていません。
