# 化学基礎 問670
id: 1710
type: single_choice
text: |
  「原子や原子団が電子を失って正の電荷をもつ粒子である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "金属のイオンになりやすさを比べること"
  - "酸化による変質を防ぐこと"
  - "電子を失って正に帯電すること"
  - "成分が一種類で性質が一定であること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「原子や原子団が電子を失って正の電荷をもつ粒子である。」を理解する上では、「電子を失って正に帯電すること」という見方が大切です。したがって、正解は「電子を失って正に帯電すること」です。
  
  「金属のイオンになりやすさを比べること」は、その見方はイオン化傾向に関係します。
  「酸化による変質を防ぐこと」は、その見方は酸化防止剤に関係します。
  「電子を失って正に帯電すること」が正しいです。この説明と結び付きが強い見方です。
  「成分が一種類で性質が一定であること」は、その見方は純物質に関係します。
