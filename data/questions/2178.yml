# 高校化学 問178
id: 2178
type: single_choice
text: |
  飽和炭化水素と最も関係が深い場面として、適切なものはどれか。
choices:
  - "紙や木材の主成分を考える場面"
  - "マグネシウムやカルシウムの性質を比べる場面"
  - "メタンやエタンの性質を考える場面"
  - "ネオンやアルゴンが反応しにくい理由を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  メタンやエタンの性質を考える場面は、飽和炭化水素と結び付きが強い場面です。したがって、正解は「メタンやエタンの性質を考える場面」です。
  
  「紙や木材の主成分を考える場面」は、セルロースと結び付きが強い場面です。
  「マグネシウムやカルシウムの性質を比べる場面」は、アルカリ土類金属と結び付きが強い場面です。
  「メタンやエタンの性質を考える場面」が正しいです。これは飽和炭化水素と結び付きが強い場面です。
  「ネオンやアルゴンが反応しにくい理由を考える場面」は、貴ガスと結び付きが強い場面です。
