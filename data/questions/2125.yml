# 高校化学 問125
id: 2125
type: single_choice
text: |
  沸点上昇と最も関係が深い場面として、適切なものはどれか。
choices:
  - "密閉容器で反応物と生成物の量が一定になる場面"
  - "食塩水の沸点が水より少し高くなることを考える場面"
  - "圧力や濃度を変えると平衡が移る方向を考える場面"
  - "弱酸が一部だけ電離している水溶液を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  食塩水の沸点が水より少し高くなることを考える場面は、沸点上昇と結び付きが強い場面です。したがって、正解は「食塩水の沸点が水より少し高くなることを考える場面」です。
  
  「密閉容器で反応物と生成物の量が一定になる場面」は、化学平衡と結び付きが強い場面です。
  「食塩水の沸点が水より少し高くなることを考える場面」が正しいです。これは沸点上昇と結び付きが強い場面です。
  「圧力や濃度を変えると平衡が移る方向を考える場面」は、ルシャトリエの原理と結び付きが強い場面です。
  「弱酸が一部だけ電離している水溶液を考える場面」は、電離平衡と結び付きが強い場面です。
