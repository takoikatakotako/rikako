# 化学基礎 問930
id: 1970
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "電離度 / 亜鉛板と銅板を使って豆電球を光らせる場面"
  - "化学反応式 / 水素と酸素から水ができる反応を式で表す場面"
  - "ダニエル電池 / ポリエチレンやタンパク質のような長い分子を考える場面"
  - "高分子化合物 / 同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「化学反応式 / 水素と酸素から水ができる反応を式で表す場面」です。したがって、正解は「化学反応式 / 水素と酸素から水ができる反応を式で表す場面」です。
  
  「電離度 / 亜鉛板と銅板を使って豆電球を光らせる場面」は、用語と場面の対応が合っていません。
  「化学反応式 / 水素と酸素から水ができる反応を式で表す場面」が正しいです。用語と場面の対応が合っています。
  「ダニエル電池 / ポリエチレンやタンパク質のような長い分子を考える場面」は、用語と場面の対応が合っていません。
  「高分子化合物 / 同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」は、用語と場面の対応が合っていません。
