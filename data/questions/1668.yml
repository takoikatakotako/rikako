# 化学基礎 問628
id: 1668
type: single_choice
text: |
  「粒子の数をまとめて扱う単位であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "塩橋"
  - "モル"
  - "化学が拓く世界"
  - "単体"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「粒子の数をまとめて扱う単位であること」という見方が大切なのはモルです。したがって、正解は「モル」です。
  
  「塩橋」は、その語で大切なのは「電池の中で電気的なつり合いを保つこと」という見方です。
  「モル」が正しいです。この見方が大切な語です。
  「化学が拓く世界」は、その語で大切なのは「化学が社会や生活に広く役立つこと」という見方です。
  「単体」は、その語で大切なのは「一種類の元素だけからできること」という見方です。
