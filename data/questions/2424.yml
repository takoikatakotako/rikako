# 高校化学 問424
id: 2424
type: single_choice
text: |
  蒸気圧降下を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "粒子が周囲の分子にぶつかって動くこと"
  - "コロイド粒子の電荷に注目すること"
  - "水となじみにくく不安定になりやすいこと"
  - "溶質があると溶媒の蒸気圧が下がること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  蒸気圧降下では、「溶質があると溶媒の蒸気圧が下がること」という見方が大切です。したがって、正解は「溶質があると溶媒の蒸気圧が下がること」です。
  
  「粒子が周囲の分子にぶつかって動くこと」は、ブラウン運動に関係する見方です。
  「コロイド粒子の電荷に注目すること」は、電気泳動に関係する見方です。
  「水となじみにくく不安定になりやすいこと」は、疎水コロイドに関係する見方です。
  「溶質があると溶媒の蒸気圧が下がること」が正しいです。蒸気圧降下の要点を表しています。
