# 高校化学 問235
id: 2235
type: single_choice
text: |
  「化学反応に伴って出入りする熱量である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "反応熱"
  - "ヘスの法則"
  - "発熱反応"
  - "化学発光"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  化学反応に伴って出入りする熱量である。 に当てはまる語は反応熱です。したがって、正解は「反応熱」です。
  
  「反応熱」が正しいです。「化学反応に伴って出入りする熱量である。」に当てはまる語です。
  「ヘスの法則」は、「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」に当てはまる語です。
  「発熱反応」は、「反応の結果として周囲へ熱を放出する反応である。」に当てはまる語です。
  「化学発光」は、「化学反応によって光が放出される現象である。」に当てはまる語です。
