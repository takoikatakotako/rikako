# 化学基礎 問194
id: 1234
type: single_choice
text: |
  放射性同位体の例として、最も適切なものはどれか。
choices:
  - "炭素 14 による年代測定"
  - "ナトリウムが黄色を示すこと"
  - "強酸は電離度が大きいこと"
  - "BTB 溶液"
correct: 0
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  炭素 14 による年代測定は、放射性同位体の例です。したがって、正解は「炭素 14 による年代測定」です。
  
  「炭素 14 による年代測定」が正しいです。これは放射性同位体の例です。
  「ナトリウムが黄色を示すこと」は、炎色反応の例として見る方が適切です。
  「強酸は電離度が大きいこと」は、電離度の例として見る方が適切です。
  「BTB 溶液」は、指示薬の例として見る方が適切です。
