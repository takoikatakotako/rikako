# 高校化学 問141
id: 2141
type: single_choice
text: |
  化学発光と最も関係が深い場面として、適切なものはどれか。
choices:
  - "反応前後で熱の出入りを比較する場面"
  - "ケミカルライトが光る仕組みを考える場面"
  - "どの結合が切れやすいかを比べる場面"
  - "熱分解や一部の溶解で周囲が冷たくなる場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  ケミカルライトが光る仕組みを考える場面は、化学発光と結び付きが強い場面です。したがって、正解は「ケミカルライトが光る仕組みを考える場面」です。
  
  「反応前後で熱の出入りを比較する場面」は、エンタルピー変化と結び付きが強い場面です。
  「ケミカルライトが光る仕組みを考える場面」が正しいです。これは化学発光と結び付きが強い場面です。
  「どの結合が切れやすいかを比べる場面」は、結合エネルギーと結び付きが強い場面です。
  「熱分解や一部の溶解で周囲が冷たくなる場面」は、吸熱反応と結び付きが強い場面です。
