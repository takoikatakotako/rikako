# 高校化学 問453
id: 2453
type: single_choice
text: |
  触媒を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "反応を速めても自分は使い切られないこと"
  - "溶質があると溶媒の蒸気圧が下がること"
  - "溶質があると凝固点が下がること"
  - "小さな粒子が分散している状態であること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  触媒では、「反応を速めても自分は使い切られないこと」という見方が大切です。したがって、正解は「反応を速めても自分は使い切られないこと」です。
  
  「反応を速めても自分は使い切られないこと」が正しいです。触媒の要点を表しています。
  「溶質があると溶媒の蒸気圧が下がること」は、蒸気圧降下に関係する見方です。
  「溶質があると凝固点が下がること」は、凝固点降下に関係する見方です。
  「小さな粒子が分散している状態であること」は、コロイドに関係する見方です。
