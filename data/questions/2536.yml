# 高校化学 問536
id: 2536
type: single_choice
text: |
  「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "燃焼や中和で容器が温かくなる場面"
  - "流した電流が大きいほど析出量が増える場面"
  - "血液や実験用の溶液で pH を保ちたい場面"
  - "反応前後で熱の出入りを比較する場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」と最も関係が深い場面は「反応前後で熱の出入りを比較する場面」です。したがって、正解は「反応前後で熱の出入りを比較する場面」です。
  
  「燃焼や中和で容器が温かくなる場面」は、「反応の結果として周囲へ熱を放出する反応である。」と結び付きが強い場面です。
  「流した電流が大きいほど析出量が増える場面」は、「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」と結び付きが強い場面です。
  「血液や実験用の溶液で pH を保ちたい場面」は、「少量の酸や塩基を加えても pH が変わりにくい溶液である。」と結び付きが強い場面です。
  「反応前後で熱の出入りを比較する場面」が正しいです。この説明と結び付きが強い場面です。
