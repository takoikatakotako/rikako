# 高校化学 問449
id: 2449
type: single_choice
text: |
  陰極を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "還元が起こる側の電極であること"
  - "酸とも塩基とも反応すること"
  - "電子対の与え手と受け手に注目すること"
  - "金属元素ごとに炎の色が異なること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  陰極では、「還元が起こる側の電極であること」という見方が大切です。したがって、正解は「還元が起こる側の電極であること」です。
  
  「還元が起こる側の電極であること」が正しいです。陰極の要点を表しています。
  「酸とも塩基とも反応すること」は、両性酸化物に関係する見方です。
  「電子対の与え手と受け手に注目すること」は、配位結合に関係する見方です。
  「金属元素ごとに炎の色が異なること」は、炎色反応に関係する見方です。
