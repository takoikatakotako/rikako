# 化学基礎 問971
id: 2011
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "塩基 / 相手を酸化させ、自分は還元されること"
  - "陰イオン / 電子を受け取って負に帯電すること"
  - "酸化剤 / 放射線を出す同位体であること"
  - "放射性同位体 / 水酸化物イオンや水素イオンの受け取りに注目すること"
correct: 1
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「陰イオン / 電子を受け取って負に帯電すること」です。したがって、正解は「陰イオン / 電子を受け取って負に帯電すること」です。
  
  「塩基 / 相手を酸化させ、自分は還元されること」は、用語と要点の対応が合っていません。
  「陰イオン / 電子を受け取って負に帯電すること」が正しいです。用語と要点の対応が合っています。
  「酸化剤 / 放射線を出す同位体であること」は、用語と要点の対応が合っていません。
  「放射性同位体 / 水酸化物イオンや水素イオンの受け取りに注目すること」は、用語と要点の対応が合っていません。
