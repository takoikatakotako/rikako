# 高校化学 問817
id: 2817
type: single_choice
text: |
  「原子が共有結合で三次元的に結び付いた結晶である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電離が部分的に起こること"
  - "金属元素ごとに炎の色が異なること"
  - "カルボン酸とアルコールの組合せでできること"
  - "共有結合が全体に広がること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「原子が共有結合で三次元的に結び付いた結晶である。」を理解する上では、「共有結合が全体に広がること」という見方が大切です。したがって、正解は「共有結合が全体に広がること」です。
  
  「電離が部分的に起こること」は、その見方は弱塩基に関係します。
  「金属元素ごとに炎の色が異なること」は、その見方は炎色反応に関係します。
  「カルボン酸とアルコールの組合せでできること」は、その見方はエステルに関係します。
  「共有結合が全体に広がること」が正しいです。この説明と結び付きが強い見方です。
