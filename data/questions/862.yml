# 令和7年度 ITパスポート 公開問題 問7
id: 862
type: single_choice
text: |
  新しい概念やアイディアの実証を目的とした、開発の前段階における検証を表す用語はどれか。
choices:
  - "CRM"
  - "PoC"
  - "RAS"
  - "SLA"
correct: 1
explanation: |
  この問題は、「新しいアイディアを試しに確かめること」を表す用語を選ぶ問題です。
  
  PoC は Proof of Concept の略で、「その考え方や仕組みが本当に実現できるか」を事前に確かめるための検証を指します。したがって、正解は「PoC」です。
  
  「CRM」はCRM は顧客との関係を管理する考え方です。
  「PoC」が正しいです。PoC は開発前に実現可能性を確かめることです。
  「RAS」はRAS は信頼性、可用性、保守性を表す言葉です。
  「SLA」はSLA はサービス水準合意のことです。
