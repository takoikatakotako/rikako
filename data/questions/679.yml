# 化学基礎 問12
id: 679
type: single_choice
text: |
  ペーパークロマトグラフィーが特に役立つものとして、最も適切なものはどれか。
choices:
  - "インクに含まれる色素を分けること"
  - "鉄くぎを曲げること"
  - "水を沸騰させること"
  - "金属を磁石で集めること"
correct: 0
explanation: |
  この問題は、「クロマトグラフィーで何を分けるのが得意か」を考える問題です。
  
  ペーパークロマトグラフィーは、混ざっている色素などを移動のしやすさの違いで分ける方法です。インクの色素を分けるときによく使われます。したがって、正解は「インクに含まれる色素を分けること」です。
  
  「インクに含まれる色素を分けること」が正しいです。クロマトグラフィーの代表的な使い方です。
  「鉄くぎを曲げること」は、クロマトグラフィーとは関係ありません。
  「水を沸騰させること」は、加熱による状態変化であり、分離の方法ではありません。
  「金属を磁石で集めること」は、磁石の性質を使う方法であり、クロマトグラフィーではありません。
