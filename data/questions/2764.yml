# 高校化学 問764
id: 2764
type: single_choice
text: |
  「電離が部分的に起こること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "グルコース"
  - "弱塩基"
  - "融解熱"
  - "共有結合の結晶"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「電離が部分的に起こること」という見方が大切なのは弱塩基です。したがって、正解は「弱塩基」です。
  
  「グルコース」は、その語で大切なのは「単糖類でエネルギー源になりやすいこと」という見方です。
  「弱塩基」が正しいです。この見方が大切な語です。
  「融解熱」は、その語で大切なのは「状態変化に必要な熱に注目すること」という見方です。
  「共有結合の結晶」は、その語で大切なのは「共有結合が全体に広がること」という見方です。
