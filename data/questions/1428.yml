# 化学基礎 問388
id: 1428
type: single_choice
text: |
  還元と最も関係が深い場面として、適切なものはどれか。
choices:
  - "マグネシウムが酸素と結び付く場面"
  - "水素や炭素が相手から酸素を奪う場面"
  - "亜鉛板と銅板を使って豆電球を光らせる場面"
  - "酸化銅から酸素が取れて銅になる場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  酸化銅から酸素が取れて銅になる場面は、還元と結び付きが強い場面です。したがって、正解は「酸化銅から酸素が取れて銅になる場面」です。
  
  「マグネシウムが酸素と結び付く場面」は、酸化と結び付きが強い場面です。
  「水素や炭素が相手から酸素を奪う場面」は、還元剤と結び付きが強い場面です。
  「亜鉛板と銅板を使って豆電球を光らせる場面」は、ダニエル電池と結び付きが強い場面です。
  「酸化銅から酸素が取れて銅になる場面」が正しいです。これは還元と結び付きが強い場面です。
