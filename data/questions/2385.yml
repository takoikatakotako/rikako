# 高校化学 問385
id: 2385
type: single_choice
text: |
  「酢酸の性質やにおいを考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "異性体"
  - "アルデヒド"
  - "ベンゼン"
  - "カルボン酸"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  酢酸の性質やにおいを考える場面 と最も関係が深いのはカルボン酸です。したがって、正解は「カルボン酸」です。
  
  「異性体」は、「ブタンとイソブタンを比べる場面」と結び付きが強い語です。
  「アルデヒド」は、「ホルムアルデヒドやアセトアルデヒドを考える場面」と結び付きが強い語です。
  「ベンゼン」は、「芳香族化合物の基本構造を学ぶ場面」と結び付きが強い語です。
  「カルボン酸」が正しいです。この具体例と最も関係が深い語です。
