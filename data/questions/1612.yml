# 化学基礎 問572
id: 1612
type: single_choice
text: |
  「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "水溶液中で水素イオンを生じる物質である。"
  - "物質が酸素を失う、または電子を受け取る変化である。"
  - "陽イオンと陰イオンの静電気的な引力による結び付きである。"
  - "水に溶けても電流をほとんど通さない物質である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」を説明した文として適切なのは「陽イオンと陰イオンの静電気的な引力による結び付きである。」です。したがって、正解は「陽イオンと陰イオンの静電気的な引力による結び付きである。」です。
  
  「水溶液中で水素イオンを生じる物質である。」は、この説明は「塩酸が水溶液中で水素イオンを生じる場面」と結び付きが強いです。
  「物質が酸素を失う、または電子を受け取る変化である。」は、この説明は「酸化銅から酸素が取れて銅になる場面」と結び付きが強いです。
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」が正しいです。この具体例を説明した文です。
  「水に溶けても電流をほとんど通さない物質である。」は、この説明は「砂糖水が電流をほとんど通さない場面」と結び付きが強いです。
