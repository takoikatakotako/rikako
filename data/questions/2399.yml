# 高校化学 問399
id: 2399
type: single_choice
text: |
  「金属やプラスチックを回収して再資源化する場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "エステル"
  - "資源の再利用"
  - "フェノール"
  - "アルカリ金属"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  金属やプラスチックを回収して再資源化する場面 と最も関係が深いのは資源の再利用です。したがって、正解は「資源の再利用」です。
  
  「エステル」は、「果物の香りに関係する化合物を考える場面」と結び付きが強い語です。
  「資源の再利用」が正しいです。この具体例と最も関係が深い語です。
  「フェノール」は、「フェノール類の酸性や消毒作用を考える場面」と結び付きが強い語です。
  「アルカリ金属」は、「ナトリウムやカリウムの性質を比べる場面」と結び付きが強い語です。
