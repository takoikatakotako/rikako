# 高校化学 問308
id: 2308
type: single_choice
text: |
  「注射器の口をふさいで押すと体積が減って圧力が上がる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "コロイド"
  - "ブラウン運動"
  - "ボイルの法則"
  - "電気泳動"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  注射器の口をふさいで押すと体積が減って圧力が上がる場面 と最も関係が深いのはボイルの法則です。したがって、正解は「ボイルの法則」です。
  
  「コロイド」は、「牛乳やゼラチン溶液のような見た目の系を考える場面」と結び付きが強い語です。
  「ブラウン運動」は、「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」と結び付きが強い語です。
  「ボイルの法則」が正しいです。この具体例と最も関係が深い語です。
  「電気泳動」は、「コロイド粒子が陽極や陰極へ移動する様子を考える場面」と結び付きが強い語です。
