# 高校化学 問208
id: 2208
type: single_choice
text: |
  「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "飽和溶液"
  - "ボイルの法則"
  - "蒸気圧降下"
  - "凝固点降下"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  一定温度で一定量の気体の圧力は体積に反比例するという法則である。 に当てはまる語はボイルの法則です。したがって、正解は「ボイルの法則」です。
  
  「飽和溶液」は、「その温度でそれ以上溶質が溶けない状態の溶液である。」に当てはまる語です。
  「ボイルの法則」が正しいです。「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」に当てはまる語です。
  「蒸気圧降下」は、「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」に当てはまる語です。
  「凝固点降下」は、「溶液の凝固点が純粋な溶媒より低くなる現象である。」に当てはまる語です。
