# 高校化学 問882
id: 2882
type: single_choice
text: |
  「分子式は同じでも構造が異なる化合物どうしである。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "同じ分子式でも構造が違うこと"
  - "コロイドが光を散乱すること"
  - "周囲から熱を受け取る反応であること"
  - "時間あたりにどれだけ変化するかを見ること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「分子式は同じでも構造が異なる化合物どうしである。」を理解する上では、「同じ分子式でも構造が違うこと」という見方が大切です。したがって、正解は「同じ分子式でも構造が違うこと」です。
  
  「同じ分子式でも構造が違うこと」が正しいです。この説明と結び付きが強い見方です。
  「コロイドが光を散乱すること」は、その見方はチンダル現象に関係します。
  「周囲から熱を受け取る反応であること」は、その見方は吸熱反応に関係します。
  「時間あたりにどれだけ変化するかを見ること」は、その見方は反応速度に関係します。
