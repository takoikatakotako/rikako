# 高校化学 問430
id: 2430
type: single_choice
text: |
  ブラウン運動を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "固体と液体の境目の温度に注目すること"
  - "粒子が周囲の分子にぶつかって動くこと"
  - "液体から出た蒸気が示す圧力に注目すること"
  - "状態変化に必要な熱に注目すること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  ブラウン運動では、「粒子が周囲の分子にぶつかって動くこと」という見方が大切です。したがって、正解は「粒子が周囲の分子にぶつかって動くこと」です。
  
  「固体と液体の境目の温度に注目すること」は、融点に関係する見方です。
  「粒子が周囲の分子にぶつかって動くこと」が正しいです。ブラウン運動の要点を表しています。
  「液体から出た蒸気が示す圧力に注目すること」は、蒸気圧に関係する見方です。
  「状態変化に必要な熱に注目すること」は、融解熱に関係する見方です。
