# 化学基礎 問683
id: 1723
type: single_choice
text: |
  「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "移動しやすさの違いを利用すること"
  - "固体から液体への変化であること"
  - "性質が周期的にくり返されること"
  - "酸と塩基が打ち消し合うこと"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」を理解する上では、「酸と塩基が打ち消し合うこと」という見方が大切です。したがって、正解は「酸と塩基が打ち消し合うこと」です。
  
  「移動しやすさの違いを利用すること」は、その見方はクロマトグラフィーに関係します。
  「固体から液体への変化であること」は、その見方は融解に関係します。
  「性質が周期的にくり返されること」は、その見方は周期律に関係します。
  「酸と塩基が打ち消し合うこと」が正しいです。この説明と結び付きが強い見方です。
