# 高校化学 問83
id: 2083
type: single_choice
text: |
  アルコールについての説明として、最も適切なものはどれか。
choices:
  - "代表的な単糖類で、生物のエネルギー源として重要な化合物である。"
  - "グルコースがつながった植物の細胞壁をつくる多糖である。"
  - "ヒドロキシ基をもつ有機化合物である。"
  - "周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  アルコールは、ヒドロキシ基をもつ有機化合物である。 したがって、正解は「ヒドロキシ基をもつ有機化合物である。」です。
  
  「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」は、グルコースの説明です。
  「グルコースがつながった植物の細胞壁をつくる多糖である。」は、セルロースの説明です。
  「ヒドロキシ基をもつ有機化合物である。」が正しいです。アルコールの説明です。
  「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」は、アルカリ土類金属の説明です。
