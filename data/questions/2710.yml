# 高校化学 問710
id: 2710
type: single_choice
text: |
  「圧力、体積、物質量、温度をまとめて扱うこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "化学発光"
  - "活性化エネルギー"
  - "弱酸"
  - "理想気体の状態方程式"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「圧力、体積、物質量、温度をまとめて扱うこと」という見方が大切なのは理想気体の状態方程式です。したがって、正解は「理想気体の状態方程式」です。
  
  「化学発光」は、その語で大切なのは「化学反応のエネルギーが光として出ること」という見方です。
  「活性化エネルギー」は、その語で大切なのは「反応を始めるための壁に注目すること」という見方です。
  「弱酸」は、その語で大切なのは「電離が部分的に起こること」という見方です。
  「理想気体の状態方程式」が正しいです。この見方が大切な語です。
