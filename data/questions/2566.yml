# 高校化学 問566
id: 2566
type: single_choice
text: |
  「塩基の電離のしやすさを表す定数である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "フッ素や塩素、臭素の反応性を比べる場面"
  - "どの塩基がより電離しやすいかを比べる場面"
  - "エチレンに臭素が付加する場面"
  - "飲料ボトルや衣料用繊維を考える場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「塩基の電離のしやすさを表す定数である。」と最も関係が深い場面は「どの塩基がより電離しやすいかを比べる場面」です。したがって、正解は「どの塩基がより電離しやすいかを比べる場面」です。
  
  「フッ素や塩素、臭素の反応性を比べる場面」は、「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」と結び付きが強い場面です。
  「どの塩基がより電離しやすいかを比べる場面」が正しいです。この説明と結び付きが強い場面です。
  「エチレンに臭素が付加する場面」は、「多重結合に原子や原子団が加わる反応である。」と結び付きが強い場面です。
  「飲料ボトルや衣料用繊維を考える場面」は、「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」と結び付きが強い場面です。
