# 高校化学 問374
id: 2374
type: single_choice
text: |
  「鉄や銅、クロムの化合物の色の違いを考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "遷移元素"
  - "エステル"
  - "フェノール"
  - "機能性材料"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  鉄や銅、クロムの化合物の色の違いを考える場面 と最も関係が深いのは遷移元素です。したがって、正解は「遷移元素」です。
  
  「遷移元素」が正しいです。この具体例と最も関係が深い語です。
  「エステル」は、「果物の香りに関係する化合物を考える場面」と結び付きが強い語です。
  「フェノール」は、「フェノール類の酸性や消毒作用を考える場面」と結び付きが強い語です。
  「機能性材料」は、「導電性高分子や高性能電池材料を考える場面」と結び付きが強い語です。
