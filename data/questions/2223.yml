# 高校化学 問223
id: 2223
type: single_choice
text: |
  「溶ける速さと析出する速さが等しくなっている平衡である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "溶解平衡"
  - "電離平衡"
  - "緩衝液"
  - "弱酸"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  溶ける速さと析出する速さが等しくなっている平衡である。 に当てはまる語は溶解平衡です。したがって、正解は「溶解平衡」です。
  
  「溶解平衡」が正しいです。「溶ける速さと析出する速さが等しくなっている平衡である。」に当てはまる語です。
  「電離平衡」は、「電離する粒子と電離していない粒子が平衡になっている状態である。」に当てはまる語です。
  「緩衝液」は、「少量の酸や塩基を加えても pH が変わりにくい溶液である。」に当てはまる語です。
  「弱酸」は、「水溶液中で一部だけ電離する酸である。」に当てはまる語です。
