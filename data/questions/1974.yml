# 化学基礎 問934
id: 1974
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "酸化剤 / 医療や年代測定に利用される炭素14を考える場面"
  - "pH / レモン水とせっけん水の酸性・塩基性を比べる場面"
  - "放射性同位体 / ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面"
  - "再結晶 / 酸素や過酸化水素が相手を酸化させる場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「pH / レモン水とせっけん水の酸性・塩基性を比べる場面」です。したがって、正解は「pH / レモン水とせっけん水の酸性・塩基性を比べる場面」です。
  
  「酸化剤 / 医療や年代測定に利用される炭素14を考える場面」は、用語と場面の対応が合っていません。
  「pH / レモン水とせっけん水の酸性・塩基性を比べる場面」が正しいです。用語と場面の対応が合っています。
  「放射性同位体 / ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」は、用語と場面の対応が合っていません。
  「再結晶 / 酸素や過酸化水素が相手を酸化させる場面」は、用語と場面の対応が合っていません。
