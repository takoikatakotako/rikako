# 化学基礎 問691
id: 1731
type: single_choice
text: |
  「金属が電子を失ってイオンになりやすい性質の強さである。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "液体から気体への変化であること"
  - "化学結合やイオンのできやすさに関係すること"
  - "電荷のかたよりがあること"
  - "金属のイオンになりやすさを比べること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「金属が電子を失ってイオンになりやすい性質の強さである。」を理解する上では、「金属のイオンになりやすさを比べること」という見方が大切です。したがって、正解は「金属のイオンになりやすさを比べること」です。
  
  「液体から気体への変化であること」は、その見方は蒸発に関係します。
  「化学結合やイオンのできやすさに関係すること」は、その見方は最外殻電子に関係します。
  「電荷のかたよりがあること」は、その見方は極性分子に関係します。
  「金属のイオンになりやすさを比べること」が正しいです。この説明と結び付きが強い見方です。
