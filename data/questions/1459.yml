# 化学基礎 問419
id: 1459
type: single_choice
text: |
  「原子のいちばん外側の電子殻にある電子である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "極性分子"
  - "最外殻電子"
  - "純物質"
  - "単体"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  原子のいちばん外側の電子殻にある電子である。 に当てはまる語は最外殻電子です。したがって、正解は「最外殻電子」です。
  
  「極性分子」は、「分子の中で電荷のかたよりがある分子である。」に当てはまる語です。
  「最外殻電子」が正しいです。「原子のいちばん外側の電子殻にある電子である。」に当てはまる語です。
  「純物質」は、「一種類の物質だけからできていて、性質が一定である物質である。」に当てはまる語です。
  「単体」は、「一種類の元素だけからできている物質である。」に当てはまる語です。
