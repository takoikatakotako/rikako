# 化学基礎 問346
id: 1386
type: single_choice
text: |
  放射性同位体について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "二種類以上の物質が混ざってできている物質である。"
  - "二種類以上の元素が結び付いてできている純物質である。"
  - "放射線を出しながら別の原子へ変わっていく同位体である。"
  - "もとの物質とは別の物質ができる変化である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  放射性同位体は、放射線を出しながら別の原子へ変わっていく同位体である。 したがって、正解は「放射線を出しながら別の原子へ変わっていく同位体である。」です。
  
  「二種類以上の物質が混ざってできている物質である。」は、混合物の説明です。
  「二種類以上の元素が結び付いてできている純物質である。」は、化合物の説明です。
  「放射線を出しながら別の原子へ変わっていく同位体である。」が正しいです。放射性同位体の説明です。
  「もとの物質とは別の物質ができる変化である。」は、化学変化の説明です。
