# 高校化学 問557
id: 2557
type: single_choice
text: |
  「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "圧力や濃度を変えると平衡が移る方向を考える場面"
  - "中性の水で H+ と OH- の関係を考える場面"
  - "酸化アルミニウムが酸にも塩基にも溶ける場面"
  - "ブタンとイソブタンを比べる場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」と最も関係が深い場面は「圧力や濃度を変えると平衡が移る方向を考える場面」です。したがって、正解は「圧力や濃度を変えると平衡が移る方向を考える場面」です。
  
  「圧力や濃度を変えると平衡が移る方向を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「中性の水で H+ と OH- の関係を考える場面」は、「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」と結び付きが強い場面です。
  「酸化アルミニウムが酸にも塩基にも溶ける場面」は、「酸とも塩基とも反応する酸化物である。」と結び付きが強い場面です。
  「ブタンとイソブタンを比べる場面」は、「分子式は同じでも構造が異なる化合物どうしである。」と結び付きが強い場面です。
