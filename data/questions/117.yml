# 令和7年度 ITパスポート 公開問題 問6
id: 117
type: single_choice
text: |
  特定電子メール法は、電子メールによる一方的な広告宣伝メールの送信を規制する法律である。企業担当者が行った次の電子メールの送信事例のうち、特定電子メール法の規制対象となり得るものはどれか。
choices:
  - "広告宣伝メールの受信を拒否する旨の意思表示がないことを確認したのち、公表されている企業のメールアドレス宛てに広告宣伝メールを送信した。"
  - "受信者から拒否通知があった場合には、それ以降の送信を禁止すればよいと考え、広告宣伝メールを送信した。"
  - "内容は事務連絡と料金請求なので問題ないと考え、受信者本人の同意なく、メールを送信した。"
  - "長年の取引関係にある企業担当者に対して、これまで納入してきた製品の新バージョンが完成したので、その製品に関する広告宣伝メールを送信した。"
correct: 1
explanation: |
  この問題は、「広告宣伝メールを送るときに、事前の同意が必要か」を考える問題です。
  
  特定電子メール法では、原則として、相手の事前の同意がない広告宣伝メールの送信は禁止されています。つまり、「嫌だと言われるまでは送ってよい」という考え方は認められていません。
  
  したがって、「受信者から拒否通知があった場合には、それ以降の送信を禁止すればよいと考え、広告宣伝メールを送信した」が規制対象となり得るので、正解は「受信者から拒否通知があった場合には、それ以降の送信を禁止すればよいと考え、広告宣伝メールを送信した」です。
  
  「広告宣伝メールの受信を拒否する旨の意思表示がないことを確認したのち、公表されている企業のメールアドレス宛てに広告宣伝メールを送信した」は公表されているアドレスへの送信など、例外が認められる場合があります。
  「受信者から拒否通知があった場合には、それ以降の送信を禁止すればよいと考え、広告宣伝メールを送信した」が正しいです。事前同意なしで送ってはいけないので、この考え方は誤りです。
  「内容は事務連絡と料金請求なので問題ないと考え、受信者本人の同意なく、メールを送信した」は事務連絡や料金請求が主な目的なら、広告宣伝メールとは扱いが異なります。
  「長年の取引関係にある企業担当者に対して、これまで納入してきた製品の新バージョンが完成したので、その製品に関する広告宣伝メールを送信した」は既存の取引に関連する案内は、例外として扱われる場合があります。
