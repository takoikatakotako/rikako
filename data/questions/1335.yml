# 化学基礎 問295
id: 1335
type: single_choice
text: |
  炎色反応の特徴として、最も適切なものはどれか。
choices:
  - "電離した割合を表す"
  - "酸性やアルカリ性で色が変わる"
  - "酸化を防ぐために用いる"
  - "金属元素の確認に使う"
correct: 3
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  炎色反応では、「金属元素の確認に使う」という点が大切です。したがって、正解は「金属元素の確認に使う」です。
  
  「電離した割合を表す」は、電離度に関係する特徴です。
  「酸性やアルカリ性で色が変わる」は、指示薬に関係する特徴です。
  「酸化を防ぐために用いる」は、酸化防止剤に関係する特徴です。
  「金属元素の確認に使う」が正しいです。炎色反応の特徴を表しています。
