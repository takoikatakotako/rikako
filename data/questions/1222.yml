# 化学基礎 問182
id: 1222
type: single_choice
text: |
  塩基の例として、最も適切なものはどれか。
choices:
  - "水酸化ナトリウム"
  - "塩酸と水酸化ナトリウムの反応"
  - "pH 3 の水溶液"
  - "マグネシウムが燃える反応"
correct: 0
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  水酸化ナトリウムは、塩基の例です。したがって、正解は「水酸化ナトリウム」です。
  
  「水酸化ナトリウム」が正しいです。これは塩基の例です。
  「塩酸と水酸化ナトリウムの反応」は、中和の例として見る方が適切です。
  「pH 3 の水溶液」は、pHの例として見る方が適切です。
  「マグネシウムが燃える反応」は、酸化の例として見る方が適切です。
