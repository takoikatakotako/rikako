# 高校化学 問983
id: 2983
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "光合成 / 二酸化マンガンを加えると過酸化水素水の分解が速くなる場面"
  - "触媒 / アンモニア水が強塩基ほど完全には電離しない場面"
  - "アルコール / エタノールの性質や利用を考える場面"
  - "弱塩基 / 植物が光を受けてデンプンなどをつくる場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「アルコール / エタノールの性質や利用を考える場面」です。したがって、正解は「アルコール / エタノールの性質や利用を考える場面」です。
  
  「光合成 / 二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」は、用語と場面の対応が合っていません。
  「触媒 / アンモニア水が強塩基ほど完全には電離しない場面」は、用語と場面の対応が合っていません。
  「アルコール / エタノールの性質や利用を考える場面」が正しいです。用語と場面の対応が合っています。
  「弱塩基 / 植物が光を受けてデンプンなどをつくる場面」は、用語と場面の対応が合っていません。
