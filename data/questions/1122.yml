# 化学基礎 問82
id: 1122
type: single_choice
text: |
  フェノールフタレイン溶液を加えたとき、赤色を示しやすい水溶液として最も適切なものはどれか。
choices:
  - "酸性の水溶液"
  - "中性の水溶液"
  - "アルカリ性の水溶液"
  - "純粋な酸素"
correct: 2
explanation: |
  この問題は、「指示薬のはたらき」を確認する問題です。
  
  フェノールフタレイン溶液は、アルカリ性の水溶液で赤色を示します。したがって、正解は「アルカリ性の水溶液」です。
  
  「酸性の水溶液」は、フェノールフタレインでは赤色になりません。
  「中性の水溶液」も、赤色になりません。
  「アルカリ性の水溶液」が正しいです。
  「純粋な酸素」は、水溶液ではありません。
