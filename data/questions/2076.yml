# 高校化学 問76
id: 2076
type: single_choice
text: |
  鉄についての説明として、最も適切なものはどれか。
choices:
  - "遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。"
  - "鉛とその化合物を用いた、充電して繰り返し使える電池である。"
  - "燃料と酸化剤を外部から供給しながら電気を取り出す電池である。"
  - "遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  鉄は、遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。 したがって、正解は「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」です。
  
  「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」は、銅の説明です。
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」は、鉛蓄電池の説明です。
  「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」は、燃料電池の説明です。
  「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」が正しいです。鉄の説明です。
