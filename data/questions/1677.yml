# 化学基礎 問637
id: 1677
type: single_choice
text: |
  「酸素との結び付きや電子の放出に注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "蒸留"
  - "物理変化"
  - "酸化"
  - "質量数"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「酸素との結び付きや電子の放出に注目すること」という見方が大切なのは酸化です。したがって、正解は「酸化」です。
  
  「蒸留」は、その語で大切なのは「沸点の違いを利用すること」という見方です。
  「物理変化」は、その語で大切なのは「物質の種類が変わらないこと」という見方です。
  「酸化」が正しいです。この見方が大切な語です。
  「質量数」は、その語で大切なのは「陽子数と中性子数の合計であること」という見方です。
