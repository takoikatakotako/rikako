# 化学基礎 問562
id: 1602
type: single_choice
text: |
  「ぬれた床の水がしだいに乾く場面」を説明した文として、最も適切なものはどれか。
choices:
  - "液体が気体になる状態変化である。"
  - "原子や原子団が電子を受け取って負の電荷をもつ粒子である。"
  - "粒子の数をまとめて表すための単位である。"
  - "溶けた物質のうち、電離してイオンになった割合である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「ぬれた床の水がしだいに乾く場面」を説明した文として適切なのは「液体が気体になる状態変化である。」です。したがって、正解は「液体が気体になる状態変化である。」です。
  
  「液体が気体になる状態変化である。」が正しいです。この具体例を説明した文です。
  「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」は、この説明は「塩素原子が電子を1個受け取って Cl- になる場面」と結び付きが強いです。
  「粒子の数をまとめて表すための単位である。」は、この説明は「6.0×10^23個の粒子をひとまとまりとして数える場面」と結び付きが強いです。
  「溶けた物質のうち、電離してイオンになった割合である。」は、この説明は「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」と結び付きが強いです。
