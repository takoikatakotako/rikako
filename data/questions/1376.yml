# 化学基礎 問336
id: 1376
type: single_choice
text: |
  指示薬について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。"
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
  - "水に溶けたり融解したりすると電流を通す物質である。"
  - "放射線を出しながら別の原子へ変わっていく同位体である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  指示薬は、溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。 したがって、正解は「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」です。
  
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」が正しいです。指示薬の説明です。
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」は、モル濃度の説明です。
  「水に溶けたり融解したりすると電流を通す物質である。」は、電解質の説明です。
  「放射線を出しながら別の原子へ変わっていく同位体である。」は、放射性同位体の説明です。
