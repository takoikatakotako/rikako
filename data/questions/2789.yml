# 高校化学 問789
id: 2789
type: single_choice
text: |
  「ベンゼン環にアミノ基が直接つくこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "溶解"
  - "透析"
  - "アニリン"
  - "光合成"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「ベンゼン環にアミノ基が直接つくこと」という見方が大切なのはアニリンです。したがって、正解は「アニリン」です。
  
  「溶解」は、その語で大切なのは「溶質の粒子が溶媒中に広がること」という見方です。
  「透析」は、その語で大切なのは「半透膜を通る粒子の大きさの違いを利用すること」という見方です。
  「アニリン」が正しいです。この見方が大切な語です。
  「光合成」は、その語で大切なのは「光エネルギーを化学エネルギーに変えること」という見方です。
