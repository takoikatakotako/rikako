# 化学基礎 問28
id: 695
type: single_choice
text: |
  分子からなる物質として、最も適切なものはどれか。
choices:
  - "二酸化炭素"
  - "塩化ナトリウム"
  - "鉄"
  - "銅"
correct: 0
explanation: |
  この問題は、「分子からなる物質を見分ける問題」です。
  
  二酸化炭素は、分子からなる物質です。一方、塩化ナトリウムはイオン結晶で、鉄と銅は金属です。したがって、正解は「二酸化炭素」です。
  
  「二酸化炭素」が正しいです。分子からなる代表的な物質です。
  「塩化ナトリウム」は、分子ではなくイオン結晶です。
  「鉄」は、分子からなる物質ではなく金属です。
  「銅」は、分子からなる物質ではなく金属です。
