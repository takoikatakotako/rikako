# 高校化学 問771
id: 2771
type: single_choice
text: |
  「酸とも塩基とも反応すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "両性酸化物"
  - "融点"
  - "絶対温度"
  - "蒸気圧降下"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「酸とも塩基とも反応すること」という見方が大切なのは両性酸化物です。したがって、正解は「両性酸化物」です。
  
  「両性酸化物」が正しいです。この見方が大切な語です。
  「融点」は、その語で大切なのは「固体と液体の境目の温度に注目すること」という見方です。
  「絶対温度」は、その語で大切なのは「0 K を基準に温度を考えること」という見方です。
  「蒸気圧降下」は、その語で大切なのは「溶質があると溶媒の蒸気圧が下がること」という見方です。
