# 高校化学 問405
id: 2405
type: single_choice
text: |
  気液平衡を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "蒸発と凝縮がつり合うこと"
  - "分子の集まり方や沸点に関係すること"
  - "蒸気圧と外圧のつり合いに注目すること"
  - "状態変化に必要な熱に注目すること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  気液平衡では、「蒸発と凝縮がつり合うこと」という見方が大切です。したがって、正解は「蒸発と凝縮がつり合うこと」です。
  
  「蒸発と凝縮がつり合うこと」が正しいです。気液平衡の要点を表しています。
  「分子の集まり方や沸点に関係すること」は、分子間力に関係する見方です。
  「蒸気圧と外圧のつり合いに注目すること」は、沸点に関係する見方です。
  「状態変化に必要な熱に注目すること」は、融解熱に関係する見方です。
