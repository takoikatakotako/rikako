# 高校化学 問48
id: 2048
type: single_choice
text: |
  陽極についての説明として、最も適切なものはどれか。
choices:
  - "電気分解で還元が起こる電極である。"
  - "化学反応に伴って出入りする熱量である。"
  - "反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。"
  - "電気分解で酸化が起こる電極である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  陽極は、電気分解で酸化が起こる電極である。 したがって、正解は「電気分解で酸化が起こる電極である。」です。
  
  「電気分解で還元が起こる電極である。」は、陰極の説明です。
  「化学反応に伴って出入りする熱量である。」は、反応熱の説明です。
  「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」は、ヘスの法則の説明です。
  「電気分解で酸化が起こる電極である。」が正しいです。陽極の説明です。
