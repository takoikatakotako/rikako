# 高校化学 問842
id: 2842
type: single_choice
text: |
  「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "光エネルギーを化学エネルギーに変えること"
  - "ベンゼン環にアミノ基が直接つくこと"
  - "化学が社会課題の解決に役立つこと"
  - "混ざった気体の圧力を足し合わせて考えること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」を理解する上では、「光エネルギーを化学エネルギーに変えること」という見方が大切です。したがって、正解は「光エネルギーを化学エネルギーに変えること」です。
  
  「光エネルギーを化学エネルギーに変えること」が正しいです。この説明と結び付きが強い見方です。
  「ベンゼン環にアミノ基が直接つくこと」は、その見方はアニリンに関係します。
  「化学が社会課題の解決に役立つこと」は、その見方は化学が築く未来に関係します。
  「混ざった気体の圧力を足し合わせて考えること」は、その見方は分圧の法則に関係します。
