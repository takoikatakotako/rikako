# 高校化学 問921
id: 2921
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "溶解度 / 温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面"
  - "付加反応 / 飲料ボトルや衣料用繊維を考える場面"
  - "PET / 氷が溶け始める温度を考える場面"
  - "融点 / エチレンに臭素が付加する場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「溶解度 / 温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」です。したがって、正解は「溶解度 / 温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」です。
  
  「溶解度 / 温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」が正しいです。用語と場面の対応が合っています。
  「付加反応 / 飲料ボトルや衣料用繊維を考える場面」は、用語と場面の対応が合っていません。
  「PET / 氷が溶け始める温度を考える場面」は、用語と場面の対応が合っていません。
  「融点 / エチレンに臭素が付加する場面」は、用語と場面の対応が合っていません。
