# 化学基礎 問553
id: 1593
type: single_choice
text: |
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」を説明した文として、最も適切なものはどれか。
choices:
  - "液体が気体になる状態変化である。"
  - "原子のいちばん外側の電子殻にある電子である。"
  - "分子の中で電荷のかたよりがある分子である。"
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」を説明した文として適切なのは「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」です。したがって、正解は「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」です。
  
  「液体が気体になる状態変化である。」は、この説明は「ぬれた床の水がしだいに乾く場面」と結び付きが強いです。
  「原子のいちばん外側の電子殻にある電子である。」は、この説明は「ナトリウムが電子を1個失いやすい理由を考える場面」と結び付きが強いです。
  「分子の中で電荷のかたよりがある分子である。」は、この説明は「水分子で電荷のかたよりを考える場面」と結び付きが強いです。
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」が正しいです。この具体例を説明した文です。
