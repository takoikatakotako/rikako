# 高校化学 問904
id: 2904
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "弱酸 / 鉄や銅、クロムの化合物の色の違いを考える場面"
  - "遷移元素 / 酢酸の性質やにおいを考える場面"
  - "カルボン酸 / 酢酸が塩酸ほど強く電離しない場面"
  - "蒸気圧 / ふたをした容器の中で液体の上にたまる蒸気を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「蒸気圧 / ふたをした容器の中で液体の上にたまる蒸気を考える場面」です。したがって、正解は「蒸気圧 / ふたをした容器の中で液体の上にたまる蒸気を考える場面」です。
  
  「弱酸 / 鉄や銅、クロムの化合物の色の違いを考える場面」は、用語と場面の対応が合っていません。
  「遷移元素 / 酢酸の性質やにおいを考える場面」は、用語と場面の対応が合っていません。
  「カルボン酸 / 酢酸が塩酸ほど強く電離しない場面」は、用語と場面の対応が合っていません。
  「蒸気圧 / ふたをした容器の中で液体の上にたまる蒸気を考える場面」が正しいです。用語と場面の対応が合っています。
