# 高校化学 問912
id: 2912
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "両性酸化物 / ブタンとイソブタンを比べる場面"
  - "異性体 / グリシンやアラニンの構造を考える場面"
  - "アミノ酸 / 酸化アルミニウムが酸にも塩基にも溶ける場面"
  - "実在気体 / 高圧や低温で気体のふるまいが理想気体からずれる場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「実在気体 / 高圧や低温で気体のふるまいが理想気体からずれる場面」です。したがって、正解は「実在気体 / 高圧や低温で気体のふるまいが理想気体からずれる場面」です。
  
  「両性酸化物 / ブタンとイソブタンを比べる場面」は、用語と場面の対応が合っていません。
  「異性体 / グリシンやアラニンの構造を考える場面」は、用語と場面の対応が合っていません。
  「アミノ酸 / 酸化アルミニウムが酸にも塩基にも溶ける場面」は、用語と場面の対応が合っていません。
  「実在気体 / 高圧や低温で気体のふるまいが理想気体からずれる場面」が正しいです。用語と場面の対応が合っています。
