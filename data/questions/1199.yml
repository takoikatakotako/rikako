# 化学基礎 問159
id: 1199
type: single_choice
text: |
  物理変化の例として、最も適切なものはどれか。
choices:
  - "鉄がさびる変化"
  - "氷が溶けて水になる変化"
  - "氷が水になる変化"
  - "水たまりが乾く変化"
correct: 1
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  氷が溶けて水になる変化は、物理変化の例です。したがって、正解は「氷が溶けて水になる変化」です。
  
  「鉄がさびる変化」は、化学変化の例として見る方が適切です。
  「氷が溶けて水になる変化」が正しいです。これは物理変化の例です。
  「氷が水になる変化」は、融解の例として見る方が適切です。
  「水たまりが乾く変化」は、蒸発の例として見る方が適切です。
