# 高校化学 問876
id: 2876
type: single_choice
text: |
  「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "溶解と析出がつり合うこと"
  - "水となじみにくく不安定になりやすいこと"
  - "実用性が高く、酸化数が変わりやすいこと"
  - "軽くて繰り返し使いやすい電池であること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」を理解する上では、「実用性が高く、酸化数が変わりやすいこと」という見方が大切です。したがって、正解は「実用性が高く、酸化数が変わりやすいこと」です。
  
  「溶解と析出がつり合うこと」は、その見方は溶解平衡に関係します。
  「水となじみにくく不安定になりやすいこと」は、その見方は疎水コロイドに関係します。
  「実用性が高く、酸化数が変わりやすいこと」が正しいです。この説明と結び付きが強い見方です。
  「軽くて繰り返し使いやすい電池であること」は、その見方はリチウムイオン電池に関係します。
