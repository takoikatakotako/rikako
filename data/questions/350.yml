# 令和7年度 ITパスポート 公開問題 問89
id: 350
type: single_choice
text: |
  Aさんは、Bさんから次の4種類のメッセージを受け取った。Aさんが、受け取ったメッセージを復号して読むことができるものだけを全て挙げたものはどれか。
  
  a: AさんとBさんとの共通鍵で暗号化したメッセージ
  b: Aさんの公開鍵で暗号化したメッセージ
  c: Bさんの公開鍵で暗号化したメッセージ
  d: Bさんの秘密鍵で暗号化したメッセージ
choices:
  - "a, b, d"
  - "a, c, d"
  - "b, d"
  - "c, d"
correct: 0
explanation: |
  この問題の公開解答では「a, b, d」が正解とされています。
  
  「a, b, d」が公開解答で正解とされています。
  「a, c, d」は公開解答では正解ではありません。
  「b, d」は公開解答では正解ではありません。
  「c, d」は公開解答では正解ではありません。
