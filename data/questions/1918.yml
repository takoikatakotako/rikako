# 化学基礎 問878
id: 1918
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "共有結合 / 化学変化を、物質の種類と量の関係が分かるように表した式である。"
  - "化学反応式 / 物質が酸素と結び付く、または電子を失う変化である。"
  - "モル / 粒子の数をまとめて表すための単位である。"
  - "酸化 / 原子どうしが電子を共有してできる結び付きである。"
correct: 2
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「モル / 粒子の数をまとめて表すための単位である。」です。したがって、正解は「モル / 粒子の数をまとめて表すための単位である。」です。
  
  「共有結合 / 化学変化を、物質の種類と量の関係が分かるように表した式である。」は、用語と説明の対応が合っていません。
  「化学反応式 / 物質が酸素と結び付く、または電子を失う変化である。」は、用語と説明の対応が合っていません。
  「モル / 粒子の数をまとめて表すための単位である。」が正しいです。用語と説明の対応が合っています。
  「酸化 / 原子どうしが電子を共有してできる結び付きである。」は、用語と説明の対応が合っていません。
