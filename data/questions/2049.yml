# 高校化学 問49
id: 2049
type: single_choice
text: |
  陰極についての説明として、最も適切なものはどれか。
choices:
  - "電気分解で還元が起こる電極である。"
  - "電気分解で生じる物質の量は流れた電気量に比例するという法則である。"
  - "一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。"
  - "気体分子中の結合1 molを切るのに必要なエネルギーである。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  陰極は、電気分解で還元が起こる電極である。 したがって、正解は「電気分解で還元が起こる電極である。」です。
  
  「電気分解で還元が起こる電極である。」が正しいです。陰極の説明です。
  「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」は、ファラデーの法則の説明です。
  「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」は、エンタルピー変化の説明です。
  「気体分子中の結合1 molを切るのに必要なエネルギーである。」は、結合エネルギーの説明です。
