# 高校化学 問81
id: 2081
type: single_choice
text: |
  置換反応についての説明として、最も適切なものはどれか。
choices:
  - "分子中の原子や原子団が別の原子や原子団に置き換わる反応である。"
  - "アミノ基とカルボキシ基をあわせもつ化合物である。"
  - "代表的な単糖類で、生物のエネルギー源として重要な化合物である。"
  - "グルコースがつながった植物の細胞壁をつくる多糖である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  置換反応は、分子中の原子や原子団が別の原子や原子団に置き換わる反応である。 したがって、正解は「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」です。
  
  「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」が正しいです。置換反応の説明です。
  「アミノ基とカルボキシ基をあわせもつ化合物である。」は、アミノ酸の説明です。
  「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」は、グルコースの説明です。
  「グルコースがつながった植物の細胞壁をつくる多糖である。」は、セルロースの説明です。
