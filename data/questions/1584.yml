# 化学基礎 問544
id: 1584
type: single_choice
text: |
  「水に溶けたり融解したりすると電流を通す物質である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムで黄色、銅で青緑色を観察する場面"
  - "インクの色素をろ紙の上で分ける場面"
  - "氷を温めて水にする場面"
  - "食塩水や塩酸が電流を通す場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「水に溶けたり融解したりすると電流を通す物質である。」と最も関係が深い場面は「食塩水や塩酸が電流を通す場面」です。したがって、正解は「食塩水や塩酸が電流を通す場面」です。
  
  「ナトリウムで黄色、銅で青緑色を観察する場面」は、「金属元素を炎に入れたときに特有の色を示す反応である。」と結び付きが強い場面です。
  「インクの色素をろ紙の上で分ける場面」は、「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」と結び付きが強い場面です。
  「氷を温めて水にする場面」は、「固体が液体に変わる状態変化である。」と結び付きが強い場面です。
  「食塩水や塩酸が電流を通す場面」が正しいです。この説明と結び付きが強い場面です。
