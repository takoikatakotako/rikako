# 化学基礎 問309
id: 1349
type: single_choice
text: |
  物理変化について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "固体が液体にならずに気体になる状態変化である。"
  - "物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
  - "沸点の違いを利用して液体を分ける方法である。"
  - "成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  物理変化は、物質そのものの種類は変わらず、状態や形だけが変わる変化である。 したがって、正解は「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」です。
  
  「固体が液体にならずに気体になる状態変化である。」は、昇華の説明です。
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」が正しいです。物理変化の説明です。
  「沸点の違いを利用して液体を分ける方法である。」は、蒸留の説明です。
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」は、クロマトグラフィーの説明です。
