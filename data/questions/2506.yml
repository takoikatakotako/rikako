# 高校化学 問506
id: 2506
type: single_choice
text: |
  「固体1 molが融解するときに吸収する熱量である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "温めた風船がふくらみやすくなる場面"
  - "氷を水に変えるのに必要な熱を考える場面"
  - "食塩が水に溶けて見えなくなる場面"
  - "コロイド溶液から余分な電解質を取り除く場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「固体1 molが融解するときに吸収する熱量である。」と最も関係が深い場面は「氷を水に変えるのに必要な熱を考える場面」です。したがって、正解は「氷を水に変えるのに必要な熱を考える場面」です。
  
  「温めた風船がふくらみやすくなる場面」は、「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」と結び付きが強い場面です。
  「氷を水に変えるのに必要な熱を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「食塩が水に溶けて見えなくなる場面」は、「溶質の粒子が溶媒中に広がっていく現象である。」と結び付きが強い場面です。
  「コロイド溶液から余分な電解質を取り除く場面」は、「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」と結び付きが強い場面です。
