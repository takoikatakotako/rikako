# 高校化学 問790
id: 2790
type: single_choice
text: |
  「丈夫な合成繊維であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "溶解度"
  - "電気泳動"
  - "乾電池"
  - "ナイロン"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「丈夫な合成繊維であること」という見方が大切なのはナイロンです。したがって、正解は「ナイロン」です。
  
  「溶解度」は、その語で大切なのは「どこまで溶けるかの限度に注目すること」という見方です。
  「電気泳動」は、その語で大切なのは「コロイド粒子の電荷に注目すること」という見方です。
  「乾電池」は、その語で大切なのは「使い切りの電池であること」という見方です。
  「ナイロン」が正しいです。この見方が大切な語です。
