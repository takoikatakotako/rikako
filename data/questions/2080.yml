# 高校化学 問80
id: 2080
type: single_choice
text: |
  付加反応についての説明として、最も適切なものはどれか。
choices:
  - "多数のアミノ酸がつながってできた天然高分子化合物である。"
  - "アミノ酸どうしが縮合してできる結合である。"
  - "グルコースが多数つながった植物の貯蔵多糖である。"
  - "多重結合に原子や原子団が加わる反応である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  付加反応は、多重結合に原子や原子団が加わる反応である。 したがって、正解は「多重結合に原子や原子団が加わる反応である。」です。
  
  「多数のアミノ酸がつながってできた天然高分子化合物である。」は、タンパク質の説明です。
  「アミノ酸どうしが縮合してできる結合である。」は、ペプチド結合の説明です。
  「グルコースが多数つながった植物の貯蔵多糖である。」は、デンプンの説明です。
  「多重結合に原子や原子団が加わる反応である。」が正しいです。付加反応の説明です。
