# 高校化学 問482
id: 2482
type: single_choice
text: |
  異性体を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "丈夫な合成繊維であること"
  - "同じ分子式でも構造が違うこと"
  - "アミノ酸が多数つながった高分子であること"
  - "アミノ酸どうしをつなぐ結合であること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  異性体では、「同じ分子式でも構造が違うこと」という見方が大切です。したがって、正解は「同じ分子式でも構造が違うこと」です。
  
  「丈夫な合成繊維であること」は、ナイロンに関係する見方です。
  「同じ分子式でも構造が違うこと」が正しいです。異性体の要点を表しています。
  「アミノ酸が多数つながった高分子であること」は、タンパク質に関係する見方です。
  「アミノ酸どうしをつなぐ結合であること」は、ペプチド結合に関係する見方です。
