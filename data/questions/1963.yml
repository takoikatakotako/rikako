# 化学基礎 問923
id: 1963
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "モル / 同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面"
  - "電離度 / 亜鉛板と銅板を使って豆電球を光らせる場面"
  - "共有結合 / 水素原子どうしが電子を共有して H2 になる場面"
  - "ダニエル電池 / 6.0×10^23個の粒子をひとまとまりとして数える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「共有結合 / 水素原子どうしが電子を共有して H2 になる場面」です。したがって、正解は「共有結合 / 水素原子どうしが電子を共有して H2 になる場面」です。
  
  「モル / 同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」は、用語と場面の対応が合っていません。
  「電離度 / 亜鉛板と銅板を使って豆電球を光らせる場面」は、用語と場面の対応が合っていません。
  「共有結合 / 水素原子どうしが電子を共有して H2 になる場面」が正しいです。用語と場面の対応が合っています。
  「ダニエル電池 / 6.0×10^23個の粒子をひとまとまりとして数える場面」は、用語と場面の対応が合っていません。
