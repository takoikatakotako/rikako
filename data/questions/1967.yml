# 化学基礎 問927
id: 1967
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "塩基 / 酸素や過酸化水素が相手を酸化させる場面"
  - "酸化剤 / 医療や年代測定に利用される炭素14を考える場面"
  - "無極性分子 / 酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面"
  - "放射性同位体 / 水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「無極性分子 / 酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」です。したがって、正解は「無極性分子 / 酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」です。
  
  「塩基 / 酸素や過酸化水素が相手を酸化させる場面」は、用語と場面の対応が合っていません。
  「酸化剤 / 医療や年代測定に利用される炭素14を考える場面」は、用語と場面の対応が合っていません。
  「無極性分子 / 酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」が正しいです。用語と場面の対応が合っています。
  「放射性同位体 / 水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」は、用語と場面の対応が合っていません。
