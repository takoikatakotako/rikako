# 高校化学 問162
id: 2162
type: single_choice
text: |
  塩の加水分解と最も関係が深い場面として、適切なものはどれか。
choices:
  - "流した電流が大きいほど析出量が増える場面"
  - "反応前後で熱の出入りを比較する場面"
  - "酢酸ナトリウム水溶液が塩基性を示す理由を考える場面"
  - "どの結合が切れやすいかを比べる場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  酢酸ナトリウム水溶液が塩基性を示す理由を考える場面は、塩の加水分解と結び付きが強い場面です。したがって、正解は「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」です。
  
  「流した電流が大きいほど析出量が増える場面」は、ファラデーの法則と結び付きが強い場面です。
  「反応前後で熱の出入りを比較する場面」は、エンタルピー変化と結び付きが強い場面です。
  「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」が正しいです。これは塩の加水分解と結び付きが強い場面です。
  「どの結合が切れやすいかを比べる場面」は、結合エネルギーと結び付きが強い場面です。
