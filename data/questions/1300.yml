# 化学基礎 問260
id: 1300
type: single_choice
text: |
  化学変化の特徴として、最も適切なものはどれか。
choices:
  - "新しい物質ができる"
  - "固体が液体になる"
  - "液体が気体になる"
  - "液体が固体になる"
correct: 0
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  化学変化では、「新しい物質ができる」という点が大切です。したがって、正解は「新しい物質ができる」です。
  
  「新しい物質ができる」が正しいです。化学変化の特徴を表しています。
  「固体が液体になる」は、融解に関係する特徴です。
  「液体が気体になる」は、蒸発に関係する特徴です。
  「液体が固体になる」は、凝固に関係する特徴です。
