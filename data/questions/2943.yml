# 高校化学 問943
id: 2943
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "融点 / 気体の法則で温度をセルシウス温度ではなく K で扱う場面"
  - "絶対温度 / 食塩水が純水より蒸発しにくくなることを考える場面"
  - "乾電池 / 懐中電灯や時計に入っている電池を考える場面"
  - "蒸気圧降下 / 氷が溶け始める温度を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「乾電池 / 懐中電灯や時計に入っている電池を考える場面」です。したがって、正解は「乾電池 / 懐中電灯や時計に入っている電池を考える場面」です。
  
  「融点 / 気体の法則で温度をセルシウス温度ではなく K で扱う場面」は、用語と場面の対応が合っていません。
  「絶対温度 / 食塩水が純水より蒸発しにくくなることを考える場面」は、用語と場面の対応が合っていません。
  「乾電池 / 懐中電灯や時計に入っている電池を考える場面」が正しいです。用語と場面の対応が合っています。
  「蒸気圧降下 / 氷が溶け始める温度を考える場面」は、用語と場面の対応が合っていません。
