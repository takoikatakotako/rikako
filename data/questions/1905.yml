# 化学基礎 問865
id: 1905
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "化学変化 / 陽子数は同じで中性子数が異なる原子どうしである。"
  - "原子番号 / 原子核の中にある陽子の数を表す数である。"
  - "同位体 / 金属原子が自由電子を介して結び付く結合である。"
  - "金属結合 / もとの物質とは別の物質ができる変化である。"
correct: 1
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「原子番号 / 原子核の中にある陽子の数を表す数である。」です。したがって、正解は「原子番号 / 原子核の中にある陽子の数を表す数である。」です。
  
  「化学変化 / 陽子数は同じで中性子数が異なる原子どうしである。」は、用語と説明の対応が合っていません。
  「原子番号 / 原子核の中にある陽子の数を表す数である。」が正しいです。用語と説明の対応が合っています。
  「同位体 / 金属原子が自由電子を介して結び付く結合である。」は、用語と説明の対応が合っていません。
  「金属結合 / もとの物質とは別の物質ができる変化である。」は、用語と説明の対応が合っていません。
