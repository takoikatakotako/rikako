# 化学基礎 問420
id: 1460
type: single_choice
text: |
  「原子や原子団が電子を失って正の電荷をもつ粒子である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "最外殻電子"
  - "モル濃度"
  - "陽イオン"
  - "酸"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  原子や原子団が電子を失って正の電荷をもつ粒子である。 に当てはまる語は陽イオンです。したがって、正解は「陽イオン」です。
  
  「最外殻電子」は、「原子のいちばん外側の電子殻にある電子である。」に当てはまる語です。
  「モル濃度」は、「溶液1L中に溶けている溶質の物質量を表した濃度である。」に当てはまる語です。
  「陽イオン」が正しいです。「原子や原子団が電子を失って正の電荷をもつ粒子である。」に当てはまる語です。
  「酸」は、「水溶液中で水素イオンを生じる物質である。」に当てはまる語です。
