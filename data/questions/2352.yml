# 高校化学 問352
id: 2352
type: single_choice
text: |
  「加熱すると反応が進みやすくなる理由を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "エンタルピー変化"
  - "結合エネルギー"
  - "活性化エネルギー"
  - "吸熱反応"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  加熱すると反応が進みやすくなる理由を考える場面 と最も関係が深いのは活性化エネルギーです。したがって、正解は「活性化エネルギー」です。
  
  「エンタルピー変化」は、「反応前後で熱の出入りを比較する場面」と結び付きが強い語です。
  「結合エネルギー」は、「どの結合が切れやすいかを比べる場面」と結び付きが強い語です。
  「活性化エネルギー」が正しいです。この具体例と最も関係が深い語です。
  「吸熱反応」は、「熱分解や一部の溶解で周囲が冷たくなる場面」と結び付きが強い語です。
