# 高校化学 問286
id: 2286
type: single_choice
text: |
  「カルボン酸とアルコールからできる有機化合物である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "化学が築く未来"
  - "不飽和炭化水素"
  - "置換反応"
  - "エステル"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  カルボン酸とアルコールからできる有機化合物である。 に当てはまる語はエステルです。したがって、正解は「エステル」です。
  
  「化学が築く未来」は、「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」に当てはまる語です。
  「不飽和炭化水素」は、「炭素どうしに二重結合や三重結合をもつ炭化水素である。」に当てはまる語です。
  「置換反応」は、「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」に当てはまる語です。
  「エステル」が正しいです。「カルボン酸とアルコールからできる有機化合物である。」に当てはまる語です。
