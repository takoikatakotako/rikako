# 化学基礎 問850
id: 1890
type: single_choice
text: |
  「化学が社会や生活に広く役立つこと」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸素や過酸化水素が相手を酸化させる場面"
  - "医療や年代測定に利用される炭素14を考える場面"
  - "ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面"
  - "電池、医薬品、素材開発などに化学が生かされる場面"
correct: 3
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「化学が社会や生活に広く役立つこと」という見方と最も関係が深い場面は「電池、医薬品、素材開発などに化学が生かされる場面」です。したがって、正解は「電池、医薬品、素材開発などに化学が生かされる場面」です。
  
  「酸素や過酸化水素が相手を酸化させる場面」は、その場面で大切なのは「相手を酸化させ、自分は還元されること」という見方です。
  「医療や年代測定に利用される炭素14を考える場面」は、その場面で大切なのは「放射線を出す同位体であること」という見方です。
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」は、その場面で大切なのは「溶解度の差を利用すること」という見方です。
  「電池、医薬品、素材開発などに化学が生かされる場面」が正しいです。この見方と最も関係が深い場面です。
