# 高校化学 問106
id: 2106
type: single_choice
text: |
  融解熱と最も関係が深い場面として、適切なものはどれか。
choices:
  - "食塩や金属の規則正しい並び方を考える場面"
  - "ドライアイスやヨウ素の結晶を考える場面"
  - "氷を水に変えるのに必要な熱を考える場面"
  - "金属が電気を通したりのびたりする理由を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  氷を水に変えるのに必要な熱を考える場面は、融解熱と結び付きが強い場面です。したがって、正解は「氷を水に変えるのに必要な熱を考える場面」です。
  
  「食塩や金属の規則正しい並び方を考える場面」は、結晶格子と結び付きが強い場面です。
  「ドライアイスやヨウ素の結晶を考える場面」は、分子結晶と結び付きが強い場面です。
  「氷を水に変えるのに必要な熱を考える場面」が正しいです。これは融解熱と結び付きが強い場面です。
  「金属が電気を通したりのびたりする理由を考える場面」は、金属結晶と結び付きが強い場面です。
