# 高校化学 問230
id: 2230
type: single_choice
text: |
  「コロイド粒子が不規則に動いて見える現象である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "塩基解離定数"
  - "溶解度"
  - "溶解平衡"
  - "ブラウン運動"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  コロイド粒子が不規則に動いて見える現象である。 に当てはまる語はブラウン運動です。したがって、正解は「ブラウン運動」です。
  
  「塩基解離定数」は、「塩基の電離のしやすさを表す定数である。」に当てはまる語です。
  「溶解度」は、「一定量の溶媒に溶けることのできる溶質の最大量である。」に当てはまる語です。
  「溶解平衡」は、「溶ける速さと析出する速さが等しくなっている平衡である。」に当てはまる語です。
  「ブラウン運動」が正しいです。「コロイド粒子が不規則に動いて見える現象である。」に当てはまる語です。
