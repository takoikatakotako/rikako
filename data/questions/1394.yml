# 化学基礎 問354
id: 1394
type: single_choice
text: |
  クロマトグラフィーと最も関係が深い場面として、適切なものはどれか。
choices:
  - "ぬれた床の水がしだいに乾く場面"
  - "インクの色素をろ紙の上で分ける場面"
  - "ドライアイスがそのまま気体になる場面"
  - "水とエタノールの混合物を沸点の差で分ける場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  インクの色素をろ紙の上で分ける場面は、クロマトグラフィーと結び付きが強い場面です。したがって、正解は「インクの色素をろ紙の上で分ける場面」です。
  
  「ぬれた床の水がしだいに乾く場面」は、蒸発と結び付きが強い場面です。
  「インクの色素をろ紙の上で分ける場面」が正しいです。これはクロマトグラフィーと結び付きが強い場面です。
  「ドライアイスがそのまま気体になる場面」は、昇華と結び付きが強い場面です。
  「水とエタノールの混合物を沸点の差で分ける場面」は、蒸留と結び付きが強い場面です。
