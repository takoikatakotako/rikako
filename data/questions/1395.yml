# 化学基礎 問355
id: 1395
type: single_choice
text: |
  純物質と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面"
  - "ナトリウムの陽子数から元素を区別する場面"
  - "酸素だけが入った容器を考える場面"
  - "炭素12と炭素14を比べる場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  酸素だけが入った容器を考える場面は、純物質と結び付きが強い場面です。したがって、正解は「酸素だけが入った容器を考える場面」です。
  
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」は、再結晶と結び付きが強い場面です。
  「ナトリウムの陽子数から元素を区別する場面」は、原子番号と結び付きが強い場面です。
  「酸素だけが入った容器を考える場面」が正しいです。これは純物質と結び付きが強い場面です。
  「炭素12と炭素14を比べる場面」は、同位体と結び付きが強い場面です。
