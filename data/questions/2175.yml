# 高校化学 問175
id: 2175
type: single_choice
text: |
  炎色反応と最も関係が深い場面として、適切なものはどれか。
choices:
  - "電気分解で気体が発生する電極側を考える場面"
  - "流した電流が大きいほど析出量が増える場面"
  - "エチレンやアセチレンの反応性を考える場面"
  - "ナトリウムで黄色、銅で青緑色を確かめる場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  ナトリウムで黄色、銅で青緑色を確かめる場面は、炎色反応と結び付きが強い場面です。したがって、正解は「ナトリウムで黄色、銅で青緑色を確かめる場面」です。
  
  「電気分解で気体が発生する電極側を考える場面」は、陽極と結び付きが強い場面です。
  「流した電流が大きいほど析出量が増える場面」は、ファラデーの法則と結び付きが強い場面です。
  「エチレンやアセチレンの反応性を考える場面」は、不飽和炭化水素と結び付きが強い場面です。
  「ナトリウムで黄色、銅で青緑色を確かめる場面」が正しいです。これは炎色反応と結び付きが強い場面です。
