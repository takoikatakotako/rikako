# 化学基礎 問932
id: 1972
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "酸化 / 食塩水や塩酸が電流を通す場面"
  - "電解質 / 砂と水の混合物から砂を取り除く場面"
  - "ろ過 / マグネシウムが酸素と結び付く場面"
  - "塩基 / 水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「塩基 / 水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」です。したがって、正解は「塩基 / 水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」です。
  
  「酸化 / 食塩水や塩酸が電流を通す場面」は、用語と場面の対応が合っていません。
  「電解質 / 砂と水の混合物から砂を取り除く場面」は、用語と場面の対応が合っていません。
  「ろ過 / マグネシウムが酸素と結び付く場面」は、用語と場面の対応が合っていません。
  「塩基 / 水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」が正しいです。用語と場面の対応が合っています。
