# 高校化学 問613
id: 2613
type: single_choice
text: |
  「気体の法則で温度をセルシウス温度ではなく K で扱う場面」を説明した文として、最も適切なものはどれか。
choices:
  - "コロイド粒子が不規則に動いて見える現象である。"
  - "絶対零度を基準にした温度で、単位は K で表す。"
  - "化学反応によって光が放出される現象である。"
  - "反応が進むために必要な最小限のエネルギーである。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「気体の法則で温度をセルシウス温度ではなく K で扱う場面」を説明した文として適切なのは「絶対零度を基準にした温度で、単位は K で表す。」です。したがって、正解は「絶対零度を基準にした温度で、単位は K で表す。」です。
  
  「コロイド粒子が不規則に動いて見える現象である。」は、この説明は「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」と結び付きが強いです。
  「絶対零度を基準にした温度で、単位は K で表す。」が正しいです。この具体例を説明した文です。
  「化学反応によって光が放出される現象である。」は、この説明は「ケミカルライトが光る仕組みを考える場面」と結び付きが強いです。
  「反応が進むために必要な最小限のエネルギーである。」は、この説明は「加熱すると反応が進みやすくなる理由を考える場面」と結び付きが強いです。
