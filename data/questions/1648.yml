# 化学基礎 問608
id: 1648
type: single_choice
text: |
  「複数の元素が結び付いてできること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "共有結合"
  - "化合物"
  - "化学反応式"
  - "酸化"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「複数の元素が結び付いてできること」という見方が大切なのは化合物です。したがって、正解は「化合物」です。
  
  「共有結合」は、その語で大切なのは「電子を共有して結び付くこと」という見方です。
  「化合物」が正しいです。この見方が大切な語です。
  「化学反応式」は、その語で大切なのは「反応する物質とできる物質の関係を式で示すこと」という見方です。
  「酸化」は、その語で大切なのは「酸素との結び付きや電子の放出に注目すること」という見方です。
