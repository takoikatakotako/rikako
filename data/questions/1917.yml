# 化学基礎 問877
id: 1917
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "イオン結合 / 溶液1L中に溶けている溶質の物質量を表した濃度である。"
  - "無極性分子 / 分子の中で電荷のかたよりがほとんどない分子である。"
  - "モル濃度 / 溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。"
  - "指示薬 / 陽イオンと陰イオンの静電気的な引力による結び付きである。"
correct: 1
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「無極性分子 / 分子の中で電荷のかたよりがほとんどない分子である。」です。したがって、正解は「無極性分子 / 分子の中で電荷のかたよりがほとんどない分子である。」です。
  
  「イオン結合 / 溶液1L中に溶けている溶質の物質量を表した濃度である。」は、用語と説明の対応が合っていません。
  「無極性分子 / 分子の中で電荷のかたよりがほとんどない分子である。」が正しいです。用語と説明の対応が合っています。
  「モル濃度 / 溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」は、用語と説明の対応が合っていません。
  「指示薬 / 陽イオンと陰イオンの静電気的な引力による結び付きである。」は、用語と説明の対応が合っていません。
