# 化学基礎 問320
id: 1360
type: single_choice
text: |
  陽イオンについて学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "原子や原子団が電子を失って正の電荷をもつ粒子である。"
  - "溶けた物質のうち、電離してイオンになった割合である。"
  - "原子や原子団が電子を受け取って負の電荷をもつ粒子である。"
  - "原子どうしが電子を共有してできる結び付きである。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  陽イオンは、原子や原子団が電子を失って正の電荷をもつ粒子である。 したがって、正解は「原子や原子団が電子を失って正の電荷をもつ粒子である。」です。
  
  「原子や原子団が電子を失って正の電荷をもつ粒子である。」が正しいです。陽イオンの説明です。
  「溶けた物質のうち、電離してイオンになった割合である。」は、電離度の説明です。
  「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」は、陰イオンの説明です。
  「原子どうしが電子を共有してできる結び付きである。」は、共有結合の説明です。
