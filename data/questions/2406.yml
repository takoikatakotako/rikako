# 高校化学 問406
id: 2406
type: single_choice
text: |
  融解熱を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "固体と液体の境目の温度に注目すること"
  - "状態変化に必要な熱に注目すること"
  - "液体から出た蒸気が示す圧力に注目すること"
  - "液体を気体に変えるための熱に注目すること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  融解熱では、「状態変化に必要な熱に注目すること」という見方が大切です。したがって、正解は「状態変化に必要な熱に注目すること」です。
  
  「固体と液体の境目の温度に注目すること」は、融点に関係する見方です。
  「状態変化に必要な熱に注目すること」が正しいです。融解熱の要点を表しています。
  「液体から出た蒸気が示す圧力に注目すること」は、蒸気圧に関係する見方です。
  「液体を気体に変えるための熱に注目すること」は、蒸発熱に関係する見方です。
