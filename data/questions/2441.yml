# 高校化学 問441
id: 2441
type: single_choice
text: |
  化学発光を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "化学反応のエネルギーが光として出ること"
  - "電離と元に戻る変化がつり合うこと"
  - "pH の変化をおさえること"
  - "電離が部分的に起こること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  化学発光では、「化学反応のエネルギーが光として出ること」という見方が大切です。したがって、正解は「化学反応のエネルギーが光として出ること」です。
  
  「化学反応のエネルギーが光として出ること」が正しいです。化学発光の要点を表しています。
  「電離と元に戻る変化がつり合うこと」は、電離平衡に関係する見方です。
  「pH の変化をおさえること」は、緩衝液に関係する見方です。
  「電離が部分的に起こること」は、弱酸に関係する見方です。
