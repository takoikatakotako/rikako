# 化学基礎 問153
id: 1193
type: single_choice
text: |
  再結晶の例として、最も適切なものはどれか。
choices:
  - "インクに含まれる色素を分ける操作"
  - "酸素だけからなる気体"
  - "食塩が水に溶けた食塩水"
  - "ミョウバンを熱い水に溶かして冷やし、結晶を取り出す操作"
correct: 3
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  ミョウバンを熱い水に溶かして冷やし、結晶を取り出す操作は、再結晶の例です。したがって、正解は「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す操作」です。
  
  「インクに含まれる色素を分ける操作」は、クロマトグラフィーの例として見る方が適切です。
  「酸素だけからなる気体」は、純物質の例として見る方が適切です。
  「食塩が水に溶けた食塩水」は、混合物の例として見る方が適切です。
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す操作」が正しいです。これは再結晶の例です。
