# 高校化学 問369
id: 2369
type: single_choice
text: |
  「フッ素や塩素、臭素の反応性を比べる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "置換反応"
  - "アルコール"
  - "カルボン酸"
  - "ハロゲン"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  フッ素や塩素、臭素の反応性を比べる場面 と最も関係が深いのはハロゲンです。したがって、正解は「ハロゲン」です。
  
  「置換反応」は、「メタンの水素が塩素に置き換わる場面」と結び付きが強い語です。
  「アルコール」は、「エタノールの性質や利用を考える場面」と結び付きが強い語です。
  「カルボン酸」は、「酢酸の性質やにおいを考える場面」と結び付きが強い語です。
  「ハロゲン」が正しいです。この具体例と最も関係が深い語です。
