# 化学基礎 問962
id: 2002
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "蒸発 / 液体から気体への変化であること"
  - "共有結合 / 反応する物質とできる物質の関係を式で示すこと"
  - "化学反応式 / 酸素との結び付きや電子の放出に注目すること"
  - "酸化 / 電子を共有して結び付くこと"
correct: 0
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「蒸発 / 液体から気体への変化であること」です。したがって、正解は「蒸発 / 液体から気体への変化であること」です。
  
  「蒸発 / 液体から気体への変化であること」が正しいです。用語と要点の対応が合っています。
  「共有結合 / 反応する物質とできる物質の関係を式で示すこと」は、用語と要点の対応が合っていません。
  「化学反応式 / 酸素との結び付きや電子の放出に注目すること」は、用語と要点の対応が合っていません。
  「酸化 / 電子を共有して結び付くこと」は、用語と要点の対応が合っていません。
