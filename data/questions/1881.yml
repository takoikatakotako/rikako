# 化学基礎 問841
id: 1881
type: single_choice
text: |
  「金属のイオンになりやすさを比べること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水素と酸素から水ができる反応を式で表す場面"
  - "マグネシウムが酸素と結び付く場面"
  - "亜鉛が銅より先にイオンになりやすいことを見る場面"
  - "食塩水や塩酸が電流を通す場面"
correct: 2
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「金属のイオンになりやすさを比べること」という見方と最も関係が深い場面は「亜鉛が銅より先にイオンになりやすいことを見る場面」です。したがって、正解は「亜鉛が銅より先にイオンになりやすいことを見る場面」です。
  
  「水素と酸素から水ができる反応を式で表す場面」は、その場面で大切なのは「反応する物質とできる物質の関係を式で示すこと」という見方です。
  「マグネシウムが酸素と結び付く場面」は、その場面で大切なのは「酸素との結び付きや電子の放出に注目すること」という見方です。
  「亜鉛が銅より先にイオンになりやすいことを見る場面」が正しいです。この見方と最も関係が深い場面です。
  「食塩水や塩酸が電流を通す場面」は、その場面で大切なのは「水溶液や融解状態で電流を通すこと」という見方です。
