# 高校化学 問604
id: 2604
type: single_choice
text: |
  「ふたをした容器の中で液体の上にたまる蒸気を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "気液平衡にあるとき、気体が示す圧力である。"
  - "一定量の溶媒に溶けることのできる溶質の最大量である。"
  - "電場をかけたとき、荷電したコロイド粒子が移動する現象である。"
  - "一度使い切ることを前提にした一次電池の代表例である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「ふたをした容器の中で液体の上にたまる蒸気を考える場面」を説明した文として適切なのは「気液平衡にあるとき、気体が示す圧力である。」です。したがって、正解は「気液平衡にあるとき、気体が示す圧力である。」です。
  
  「気液平衡にあるとき、気体が示す圧力である。」が正しいです。この具体例を説明した文です。
  「一定量の溶媒に溶けることのできる溶質の最大量である。」は、この説明は「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」と結び付きが強いです。
  「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」は、この説明は「コロイド粒子が陽極や陰極へ移動する様子を考える場面」と結び付きが強いです。
  「一度使い切ることを前提にした一次電池の代表例である。」は、この説明は「懐中電灯や時計に入っている電池を考える場面」と結び付きが強いです。
