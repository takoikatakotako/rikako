# 高校化学 問62
id: 2062
type: single_choice
text: |
  塩の加水分解についての説明として、最も適切なものはどれか。
choices:
  - "一度使い切ることを前提にした一次電池の代表例である。"
  - "塩のイオンが水と反応して溶液の性質を変える現象である。"
  - "リチウムイオンの移動を利用する充電式電池である。"
  - "電気エネルギーを使って自発的でない化学変化を起こす操作である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  塩の加水分解は、塩のイオンが水と反応して溶液の性質を変える現象である。 したがって、正解は「塩のイオンが水と反応して溶液の性質を変える現象である。」です。
  
  「一度使い切ることを前提にした一次電池の代表例である。」は、乾電池の説明です。
  「塩のイオンが水と反応して溶液の性質を変える現象である。」が正しいです。塩の加水分解の説明です。
  「リチウムイオンの移動を利用する充電式電池である。」は、リチウムイオン電池の説明です。
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」は、電気分解の説明です。
