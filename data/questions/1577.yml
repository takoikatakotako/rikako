# 化学基礎 問537
id: 1577
type: single_choice
text: |
  「物質が酸素と結び付く、または電子を失う変化である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "マグネシウムが酸素と結び付く場面"
  - "水素や炭素が相手から酸素を奪う場面"
  - "ナトリウムで黄色、銅で青緑色を観察する場面"
  - "インクの色素をろ紙の上で分ける場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「物質が酸素と結び付く、または電子を失う変化である。」と最も関係が深い場面は「マグネシウムが酸素と結び付く場面」です。したがって、正解は「マグネシウムが酸素と結び付く場面」です。
  
  「マグネシウムが酸素と結び付く場面」が正しいです。この説明と結び付きが強い場面です。
  「水素や炭素が相手から酸素を奪う場面」は、「相手を還元させ、自身は酸化される物質である。」と結び付きが強い場面です。
  「ナトリウムで黄色、銅で青緑色を観察する場面」は、「金属元素を炎に入れたときに特有の色を示す反応である。」と結び付きが強い場面です。
  「インクの色素をろ紙の上で分ける場面」は、「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」と結び付きが強い場面です。
