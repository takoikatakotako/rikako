# 化学基礎 問275
id: 1315
type: single_choice
text: |
  分子の特徴として、最も適切なものはどれか。
choices:
  - "分子全体に電荷の偏りがある"
  - "分子全体の電荷の偏りが打ち消し合う"
  - "粒子数をそろえる単位"
  - "原子が結び付いた一つのまとまり"
correct: 3
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  分子では、「原子が結び付いた一つのまとまり」という点が大切です。したがって、正解は「原子が結び付いた一つのまとまり」です。
  
  「分子全体に電荷の偏りがある」は、極性分子に関係する特徴です。
  「分子全体の電荷の偏りが打ち消し合う」は、無極性分子に関係する特徴です。
  「粒子数をそろえる単位」は、モルに関係する特徴です。
  「原子が結び付いた一つのまとまり」が正しいです。分子の特徴を表しています。
