# 化学基礎 問367
id: 1407
type: single_choice
text: |
  同位体と最も関係が深い場面として、適切なものはどれか。
choices:
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
  - "ナトリウム原子が電子を1個失って Na+ になる場面"
  - "炭素12と炭素14を比べる場面"
  - "塩化ナトリウムが陽イオンと陰イオンの引力でできる場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  炭素12と炭素14を比べる場面は、同位体と結び付きが強い場面です。したがって、正解は「炭素12と炭素14を比べる場面」です。
  
  「周期表で似た性質の元素が縦に並ぶことを見る場面」は、周期律と結び付きが強い場面です。
  「ナトリウム原子が電子を1個失って Na+ になる場面」は、陽イオンと結び付きが強い場面です。
  「炭素12と炭素14を比べる場面」が正しいです。これは同位体と結び付きが強い場面です。
  「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」は、イオン結合と結び付きが強い場面です。
