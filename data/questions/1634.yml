# 化学基礎 問594
id: 1634
type: single_choice
text: |
  「食塩水や塩酸が電流を通す場面」を説明した文として、最も適切なものはどれか。
choices:
  - "水に溶けたり融解したりすると電流を通す物質である。"
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
  - "もとの物質とは別の物質ができる変化である。"
  - "陽子数は同じで中性子数が異なる原子どうしである。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「食塩水や塩酸が電流を通す場面」を説明した文として適切なのは「水に溶けたり融解したりすると電流を通す物質である。」です。したがって、正解は「水に溶けたり融解したりすると電流を通す物質である。」です。
  
  「水に溶けたり融解したりすると電流を通す物質である。」が正しいです。この具体例を説明した文です。
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、この説明は「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」と結び付きが強いです。
  「もとの物質とは別の物質ができる変化である。」は、この説明は「鉄がさびて別の物質になる場面」と結び付きが強いです。
  「陽子数は同じで中性子数が異なる原子どうしである。」は、この説明は「炭素12と炭素14を比べる場面」と結び付きが強いです。
