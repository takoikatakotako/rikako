# 高校化学 問124
id: 2124
type: single_choice
text: |
  蒸気圧降下と最も関係が深い場面として、適切なものはどれか。
choices:
  - "食塩水が純水より蒸発しにくくなることを考える場面"
  - "生成物から再び反応物が生じる場面を考えるとき"
  - "平衡がどちらにかたよっているかを数値で見る場面"
  - "高圧や触媒を利用してアンモニアを得る場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  食塩水が純水より蒸発しにくくなることを考える場面は、蒸気圧降下と結び付きが強い場面です。したがって、正解は「食塩水が純水より蒸発しにくくなることを考える場面」です。
  
  「食塩水が純水より蒸発しにくくなることを考える場面」が正しいです。これは蒸気圧降下と結び付きが強い場面です。
  「生成物から再び反応物が生じる場面を考えるとき」は、可逆反応と結び付きが強い場面です。
  「平衡がどちらにかたよっているかを数値で見る場面」は、平衡定数と結び付きが強い場面です。
  「高圧や触媒を利用してアンモニアを得る場面」は、アンモニア合成と結び付きが強い場面です。
