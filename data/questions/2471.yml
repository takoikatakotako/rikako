# 高校化学 問471
id: 2471
type: single_choice
text: |
  両性酸化物を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "反応性が高く 1 価の陽イオンになりやすいこと"
  - "非金属で酸化力が強いこと"
  - "酸とも塩基とも反応すること"
  - "金属イオンと配位子の組合せに注目すること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  両性酸化物では、「酸とも塩基とも反応すること」という見方が大切です。したがって、正解は「酸とも塩基とも反応すること」です。
  
  「反応性が高く 1 価の陽イオンになりやすいこと」は、アルカリ金属に関係する見方です。
  「非金属で酸化力が強いこと」は、ハロゲンに関係する見方です。
  「酸とも塩基とも反応すること」が正しいです。両性酸化物の要点を表しています。
  「金属イオンと配位子の組合せに注目すること」は、錯イオンに関係する見方です。
