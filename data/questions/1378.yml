# 化学基礎 問338
id: 1378
type: single_choice
text: |
  還元について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
  - "多数の小さな単位がつながってできた大きな分子からなる化合物である。"
  - "物質が酸素を失う、または電子を受け取る変化である。"
  - "粒子の数をまとめて表すための単位である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  還元は、物質が酸素を失う、または電子を受け取る変化である。 したがって、正解は「物質が酸素を失う、または電子を受け取る変化である。」です。
  
  「金属元素を炎に入れたときに特有の色を示す反応である。」は、炎色反応の説明です。
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」は、高分子化合物の説明です。
  「物質が酸素を失う、または電子を受け取る変化である。」が正しいです。還元の説明です。
  「粒子の数をまとめて表すための単位である。」は、モルの説明です。
