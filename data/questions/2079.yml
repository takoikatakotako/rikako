# 高校化学 問79
id: 2079
type: single_choice
text: |
  不飽和炭化水素についての説明として、最も適切なものはどれか。
choices:
  - "ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。"
  - "アミノ基とカルボキシ基をあわせもつ化合物である。"
  - "炭素どうしに二重結合や三重結合をもつ炭化水素である。"
  - "代表的な単糖類で、生物のエネルギー源として重要な化合物である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  不飽和炭化水素は、炭素どうしに二重結合や三重結合をもつ炭化水素である。 したがって、正解は「炭素どうしに二重結合や三重結合をもつ炭化水素である。」です。
  
  「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」は、PETの説明です。
  「アミノ基とカルボキシ基をあわせもつ化合物である。」は、アミノ酸の説明です。
  「炭素どうしに二重結合や三重結合をもつ炭化水素である。」が正しいです。不飽和炭化水素の説明です。
  「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」は、グルコースの説明です。
