# 高校化学 問634
id: 2634
type: single_choice
text: |
  「金属や硫黄のコロイドが電解質で沈みやすい場面」を説明した文として、最も適切なものはどれか。
choices:
  - "単位時間あたりに進む反応の程度を表す量である。"
  - "塩のイオンが水と反応して溶液の性質を変える現象である。"
  - "水との親和性が低く、少しの電解質で凝析しやすいコロイドである。"
  - "一方の原子が電子対を与えてできる共有結合である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「金属や硫黄のコロイドが電解質で沈みやすい場面」を説明した文として適切なのは「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」です。したがって、正解は「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」です。
  
  「単位時間あたりに進む反応の程度を表す量である。」は、この説明は「同じ反応でも条件によって進み方が変わることを比べる場面」と結び付きが強いです。
  「塩のイオンが水と反応して溶液の性質を変える現象である。」は、この説明は「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」と結び付きが強いです。
  「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」が正しいです。この具体例を説明した文です。
  「一方の原子が電子対を与えてできる共有結合である。」は、この説明は「アンモニアが金属イオンに電子対を与える場面」と結び付きが強いです。
