# 化学基礎 問812
id: 1852
type: single_choice
text: |
  「液体から気体への変化であること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "砂と水の混合物から砂を取り除く場面"
  - "ぬれた床の水がしだいに乾く場面"
  - "水や二酸化炭素のように複数の元素からできた物質を考える場面"
  - "ナトリウムの陽子数から元素を区別する場面"
correct: 1
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「液体から気体への変化であること」という見方と最も関係が深い場面は「ぬれた床の水がしだいに乾く場面」です。したがって、正解は「ぬれた床の水がしだいに乾く場面」です。
  
  「砂と水の混合物から砂を取り除く場面」は、その場面で大切なのは「水に溶けない固体を液体から分けること」という見方です。
  「ぬれた床の水がしだいに乾く場面」が正しいです。この見方と最も関係が深い場面です。
  「水や二酸化炭素のように複数の元素からできた物質を考える場面」は、その場面で大切なのは「複数の元素が結び付いてできること」という見方です。
  「ナトリウムの陽子数から元素を区別する場面」は、その場面で大切なのは「陽子数を表す数であること」という見方です。
