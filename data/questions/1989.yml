choices:
  - "高分子化合物 / ポリエチレンやタンパク質のような長い分子を考える場面"
  - "クロマトグラフィー / 氷を温めて水にする場面"
  - "融解 / 周期表で似た性質の元素が縦に並ぶことを見る場面"
  - "周期律 / インクの色素をろ紙の上で分ける場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「高分子化合物 / ポリエチレンやタンパク質のような長い分子を考える場面」です。したがって、正解は「高分子化合物 / ポリエチレンやタンパク質のような長い分子を考える場面」です。
  
  「高分子化合物 / ポリエチレンやタンパク質のような長い分子を考える場面」が正しいです。用語と場面の対応が合っています。
