# 高校化学 問951
id: 2951
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "理想気体の状態方程式 / 温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面"
  - "溶解度 / コロイド粒子が陽極や陰極へ移動する様子を考える場面"
  - "反応速度 / 同じ反応でも条件によって進み方が変わることを比べる場面"
  - "電気泳動 / 気体の量と温度から体積や圧力を見積もる場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「反応速度 / 同じ反応でも条件によって進み方が変わることを比べる場面」です。したがって、正解は「反応速度 / 同じ反応でも条件によって進み方が変わることを比べる場面」です。
  
  「理想気体の状態方程式 / 温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」は、用語と場面の対応が合っていません。
  「溶解度 / コロイド粒子が陽極や陰極へ移動する様子を考える場面」は、用語と場面の対応が合っていません。
  「反応速度 / 同じ反応でも条件によって進み方が変わることを比べる場面」が正しいです。用語と場面の対応が合っています。
  「電気泳動 / 気体の量と温度から体積や圧力を見積もる場面」は、用語と場面の対応が合っていません。
