# 化学基礎 問18
id: 685
type: single_choice
text: |
  同じ物質を加熱したときに起こる変化として、最も適切なものはどれか。
choices:
  - "粒子の運動が小さくなる。"
  - "粒子の運動が活発になる。"
  - "粒子が全て消える。"
  - "粒子の数が必ず半分になる。"
correct: 1
explanation: |
  この問題は、「加熱すると粒子の運動がどう変わるか」を確認する問題です。
  
  物質を加熱すると、粒子の熱運動は活発になります。これは温度が上がると粒子のもつエネルギーが大きくなるためです。したがって、正解は「粒子の運動が活発になる」です。
  
  「粒子の運動が小さくなる」は、加熱したときの変化として逆です。
  「粒子の運動が活発になる」が正しいです。加熱すると熱運動が大きくなります。
  「粒子が全て消える」は、適切ではありません。
  「粒子の数が必ず半分になる」は、適切ではありません。
