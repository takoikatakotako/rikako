# 高校化学 問914
id: 2914
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "配位結合 / ホルムアルデヒドやアセトアルデヒドを考える場面"
  - "結晶格子 / 食塩や金属の規則正しい並び方を考える場面"
  - "アルデヒド / 血糖や発酵の材料として使われる場面"
  - "グルコース / アンモニアが金属イオンに電子対を与える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「結晶格子 / 食塩や金属の規則正しい並び方を考える場面」です。したがって、正解は「結晶格子 / 食塩や金属の規則正しい並び方を考える場面」です。
  
  「配位結合 / ホルムアルデヒドやアセトアルデヒドを考える場面」は、用語と場面の対応が合っていません。
  「結晶格子 / 食塩や金属の規則正しい並び方を考える場面」が正しいです。用語と場面の対応が合っています。
  「アルデヒド / 血糖や発酵の材料として使われる場面」は、用語と場面の対応が合っていません。
  「グルコース / アンモニアが金属イオンに電子対を与える場面」は、用語と場面の対応が合っていません。
