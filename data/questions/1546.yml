# 化学基礎 問506
id: 1546
type: single_choice
text: |
  「二種類以上の物質が混ざってできている物質である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "氷が溶けて水になる場面"
  - "空気や食塩水のように複数の物質が混ざったものを考える場面"
  - "炭素12で陽子数と中性子数の合計を見る場面"
  - "水素原子どうしが電子を共有して H2 になる場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「二種類以上の物質が混ざってできている物質である。」と最も関係が深い場面は「空気や食塩水のように複数の物質が混ざったものを考える場面」です。したがって、正解は「空気や食塩水のように複数の物質が混ざったものを考える場面」です。
  
  「氷が溶けて水になる場面」は、「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」と結び付きが強い場面です。
  「空気や食塩水のように複数の物質が混ざったものを考える場面」が正しいです。この説明と結び付きが強い場面です。
  「炭素12で陽子数と中性子数の合計を見る場面」は、「原子核の中にある陽子数と中性子数の合計である。」と結び付きが強い場面です。
  「水素原子どうしが電子を共有して H2 になる場面」は、「原子どうしが電子を共有してできる結び付きである。」と結び付きが強い場面です。
