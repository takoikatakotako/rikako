# 高校化学 問800
id: 2800
type: single_choice
text: |
  「化学が社会課題の解決に役立つこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "透析"
  - "化学が築く未来"
  - "光合成"
  - "触媒"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「化学が社会課題の解決に役立つこと」という見方が大切なのは化学が築く未来です。したがって、正解は「化学が築く未来」です。
  
  「透析」は、その語で大切なのは「半透膜を通る粒子の大きさの違いを利用すること」という見方です。
  「化学が築く未来」が正しいです。この見方が大切な語です。
  「光合成」は、その語で大切なのは「光エネルギーを化学エネルギーに変えること」という見方です。
  「触媒」は、その語で大切なのは「反応を速めても自分は使い切られないこと」という見方です。
