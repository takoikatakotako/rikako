# 化学基礎 問415
id: 1455
type: single_choice
text: |
  「原子核の中にある陽子の数を表す数である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "イオン結合"
  - "原子番号"
  - "金属結合"
  - "極性分子"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  原子核の中にある陽子の数を表す数である。 に当てはまる語は原子番号です。したがって、正解は「原子番号」です。
  
  「イオン結合」は、「陽イオンと陰イオンの静電気的な引力による結び付きである。」に当てはまる語です。
  「原子番号」が正しいです。「原子核の中にある陽子の数を表す数である。」に当てはまる語です。
  「金属結合」は、「金属原子が自由電子を介して結び付く結合である。」に当てはまる語です。
  「極性分子」は、「分子の中で電荷のかたよりがある分子である。」に当てはまる語です。
