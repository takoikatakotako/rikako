# 高校化学 問401
id: 2401
type: single_choice
text: |
  分子間力を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "分子の集まり方や沸点に関係すること"
  - "半透膜を通る粒子の大きさの違いを利用すること"
  - "水となじみやすく安定しやすいこと"
  - "固体と液体の境目の温度に注目すること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  分子間力では、「分子の集まり方や沸点に関係すること」という見方が大切です。したがって、正解は「分子の集まり方や沸点に関係すること」です。
  
  「分子の集まり方や沸点に関係すること」が正しいです。分子間力の要点を表しています。
  「半透膜を通る粒子の大きさの違いを利用すること」は、透析に関係する見方です。
  「水となじみやすく安定しやすいこと」は、親水コロイドに関係する見方です。
  「固体と液体の境目の温度に注目すること」は、融点に関係する見方です。
