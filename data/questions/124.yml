# 令和7年度 ITパスポート 公開問題 問57
id: 124
type: single_choice
text: |
  エTTPプロキシサーバの機能に関する記述として、適切なものはどれか。
choices:
  - "IPアドレス割当て要求をPCから受け付けて、割り当てるグローバルIPアドレスを返す。"
  - "PCから、インターネット上のWeb サーバへの接続要求を中継役として受けて、PCに代わって当該のWebサーバに接続し、送受データを中継する。"
  - "Web サーバのURLに対応するIPアドレスを求める要求をPCから受け付けて、そのIPアドレスを返す。"
  - "Web サーバのコンテンツが検索結果の上位に表示されるように、その・Web サーバが管理するコンテンツを書き換える。一"
correct: 1
explanation: |
  この問題の公開解答では「PCから、インターネット上のWeb サーバへの接続要求を中継役として受けて、PCに代わって当該のWebサーバに接続し、送受データを中継する」が正解とされています。
  
  「IPアドレス割当て要求をPCから受け付けて、割り当てるグローバルIPアドレスを返す」は公開解答では正解ではありません。
  「PCから、インターネット上のWeb サーバへの接続要求を中継役として受けて、PCに代わって当該のWebサーバに接続し、送受データを中継する」が公開解答で正解とされています。
  「Web サーバのURLに対応するIPアドレスを求める要求をPCから受け付けて、そのIPアドレスを返す」は公開解答では正解ではありません。
  「Web サーバのコンテンツが検索結果の上位に表示されるように、その・Web サーバが管理するコンテンツを書き換える。一」は公開解答では正解ではありません。
