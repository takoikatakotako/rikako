# 高校化学 問384
id: 2384
type: single_choice
text: |
  「ホルムアルデヒドやアセトアルデヒドを考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "置換反応"
  - "アルコール"
  - "アルデヒド"
  - "エステル"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  ホルムアルデヒドやアセトアルデヒドを考える場面 と最も関係が深いのはアルデヒドです。したがって、正解は「アルデヒド」です。
  
  「置換反応」は、「メタンの水素が塩素に置き換わる場面」と結び付きが強い語です。
  「アルコール」は、「エタノールの性質や利用を考える場面」と結び付きが強い語です。
  「アルデヒド」が正しいです。この具体例と最も関係が深い語です。
  「エステル」は、「果物の香りに関係する化合物を考える場面」と結び付きが強い語です。
