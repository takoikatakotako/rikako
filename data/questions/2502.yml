# 高校化学 問502
id: 2502
type: single_choice
text: |
  「固体と液体が平衡で共存するときの温度である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "密閉容器で水面の高さが変わらなくなる場面"
  - "氷が溶け始める温度を考える場面"
  - "ドライアイスやヨウ素の結晶を考える場面"
  - "薄い溶液側から濃い溶液側へ水が移動する場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「固体と液体が平衡で共存するときの温度である。」と最も関係が深い場面は「氷が溶け始める温度を考える場面」です。したがって、正解は「氷が溶け始める温度を考える場面」です。
  
  「密閉容器で水面の高さが変わらなくなる場面」は、「蒸発する速さと凝縮する速さが等しくなった状態である。」と結び付きが強い場面です。
  「氷が溶け始める温度を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「ドライアイスやヨウ素の結晶を考える場面」は、「分子どうしが分子間力で集まってできた結晶である。」と結び付きが強い場面です。
  「薄い溶液側から濃い溶液側へ水が移動する場面」は、「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」と結び付きが強い場面です。
