# 化学基礎 問358
id: 1398
type: single_choice
text: |
  化合物と最も関係が深い場面として、適切なものはどれか。
choices:
  - "炭素12で陽子数と中性子数の合計を見る場面"
  - "水や二酸化炭素のように複数の元素からできた物質を考える場面"
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
  - "酸素だけが入った容器を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  水や二酸化炭素のように複数の元素からできた物質を考える場面は、化合物と結び付きが強い場面です。したがって、正解は「水や二酸化炭素のように複数の元素からできた物質を考える場面」です。
  
  「炭素12で陽子数と中性子数の合計を見る場面」は、質量数と結び付きが強い場面です。
  「水や二酸化炭素のように複数の元素からできた物質を考える場面」が正しいです。これは化合物と結び付きが強い場面です。
  「周期表で似た性質の元素が縦に並ぶことを見る場面」は、周期律と結び付きが強い場面です。
  「酸素だけが入った容器を考える場面」は、純物質と結び付きが強い場面です。
