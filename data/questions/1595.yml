# 化学基礎 問555
id: 1595
type: single_choice
text: |
  「酸素だけが入った容器を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "固体が液体にならずに気体になる状態変化である。"
  - "一種類の物質だけからできていて、性質が一定である物質である。"
  - "原子や原子団が電子を受け取って負の電荷をもつ粒子である。"
  - "粒子の数をまとめて表すための単位である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「酸素だけが入った容器を考える場面」を説明した文として適切なのは「一種類の物質だけからできていて、性質が一定である物質である。」です。したがって、正解は「一種類の物質だけからできていて、性質が一定である物質である。」です。
  
  「固体が液体にならずに気体になる状態変化である。」は、この説明は「ドライアイスがそのまま気体になる場面」と結び付きが強いです。
  「一種類の物質だけからできていて、性質が一定である物質である。」が正しいです。この具体例を説明した文です。
  「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」は、この説明は「塩素原子が電子を1個受け取って Cl- になる場面」と結び付きが強いです。
  「粒子の数をまとめて表すための単位である。」は、この説明は「6.0×10^23個の粒子をひとまとまりとして数える場面」と結び付きが強いです。
