# 化学基礎 問571
id: 1611
type: single_choice
text: |
  「塩素原子が電子を1個受け取って Cl- になる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "化学変化を、物質の種類と量の関係が分かるように表した式である。"
  - "原子や原子団が電子を受け取って負の電荷をもつ粒子である。"
  - "物質が酸素と結び付く、または電子を失う変化である。"
  - "水に溶けたり融解したりすると電流を通す物質である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「塩素原子が電子を1個受け取って Cl- になる場面」を説明した文として適切なのは「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」です。したがって、正解は「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」です。
  
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」は、この説明は「水素と酸素から水ができる反応を式で表す場面」と結び付きが強いです。
  「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」が正しいです。この具体例を説明した文です。
  「物質が酸素と結び付く、または電子を失う変化である。」は、この説明は「マグネシウムが酸素と結び付く場面」と結び付きが強いです。
  「水に溶けたり融解したりすると電流を通す物質である。」は、この説明は「食塩水や塩酸が電流を通す場面」と結び付きが強いです。
