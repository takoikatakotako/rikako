# 化学基礎 問270
id: 1310
type: single_choice
text: |
  陽イオンの特徴として、最も適切なものはどれか。
choices:
  - "電子を受け取って負になる"
  - "陽イオンと陰イオンの引力による結合"
  - "電子を失って正になる"
  - "電子を共有してできる結合"
correct: 2
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  陽イオンでは、「電子を失って正になる」という点が大切です。したがって、正解は「電子を失って正になる」です。
  
  「電子を受け取って負になる」は、陰イオンに関係する特徴です。
  「陽イオンと陰イオンの引力による結合」は、イオン結合に関係する特徴です。
  「電子を失って正になる」が正しいです。陽イオンの特徴を表しています。
  「電子を共有してできる結合」は、共有結合に関係する特徴です。
