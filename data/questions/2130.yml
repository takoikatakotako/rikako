# 高校化学 問130
id: 2130
type: single_choice
text: |
  ブラウン運動と最も関係が深い場面として、適切なものはどれか。
choices:
  - "中性の水で H+ と OH- の関係を考える場面"
  - "酢酸ナトリウム水溶液が塩基性を示す理由を考える場面"
  - "顕微鏡でコロイド粒子が細かく動く様子を観察する場面"
  - "アンモニア水が強塩基ほど完全には電離しない場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  顕微鏡でコロイド粒子が細かく動く様子を観察する場面は、ブラウン運動と結び付きが強い場面です。したがって、正解は「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」です。
  
  「中性の水で H+ と OH- の関係を考える場面」は、水のイオン積と結び付きが強い場面です。
  「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」は、塩の加水分解と結び付きが強い場面です。
  「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」が正しいです。これはブラウン運動と結び付きが強い場面です。
  「アンモニア水が強塩基ほど完全には電離しない場面」は、弱塩基と結び付きが強い場面です。
