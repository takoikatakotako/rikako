# 令和7年度 ITパスポート 公開問題 問13
id: 179
type: single_choice
text: |
  新しいITソリューションの活用の是非を判断するために、そのITソリューションの提供者に、活用事例や技術情報などの提供を依頼する文書として、最も適切なものはどれか。
choices:
  - "EDI"
  - "KPI"
  - "RFI"
  - "RFP"
correct: 2
explanation: |
  RFI は Request for Information の略で、システム化の検討段階でベンダーに情報提供を依頼する文書です。活用事例や技術情報の収集に用いるのでウが正しいです。
  
  「EDI」はEDI は企業間で商取引データを電子的にやり取りする仕組みです。
  「KPI」はKPI は業績評価指標であり、文書名ではありません。
  「RFI」が正しいです。RFI は情報提供依頼書であり、事例や技術情報の収集に使います。
  「RFP」はRFP は提案依頼書であり、候補を絞った後に具体的提案を求める文書です。
