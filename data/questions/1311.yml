# 化学基礎 問271
id: 1311
type: single_choice
text: |
  陰イオンの特徴として、最も適切なものはどれか。
choices:
  - "陽イオンと陰イオンの引力による結合"
  - "電子を共有してできる結合"
  - "自由電子を介した結合"
  - "電子を受け取って負になる"
correct: 3
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  陰イオンでは、「電子を受け取って負になる」という点が大切です。したがって、正解は「電子を受け取って負になる」です。
  
  「陽イオンと陰イオンの引力による結合」は、イオン結合に関係する特徴です。
  「電子を共有してできる結合」は、共有結合に関係する特徴です。
  「自由電子を介した結合」は、金属結合に関係する特徴です。
  「電子を受け取って負になる」が正しいです。陰イオンの特徴を表しています。
