# 高校化学 問413
id: 2413
type: single_choice
text: |
  絶対温度を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "0 K を基準に温度を考えること"
  - "液体から出た蒸気が示す圧力に注目すること"
  - "状態変化に必要な熱に注目すること"
  - "粒子の規則正しい配列に注目すること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  絶対温度では、「0 K を基準に温度を考えること」という見方が大切です。したがって、正解は「0 K を基準に温度を考えること」です。
  
  「0 K を基準に温度を考えること」が正しいです。絶対温度の要点を表しています。
  「液体から出た蒸気が示す圧力に注目すること」は、蒸気圧に関係する見方です。
  「状態変化に必要な熱に注目すること」は、融解熱に関係する見方です。
  「粒子の規則正しい配列に注目すること」は、結晶格子に関係する見方です。
