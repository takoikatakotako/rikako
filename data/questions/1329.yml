# 化学基礎 問289
id: 1329
type: single_choice
text: |
  イオン化傾向の特徴として、最も適切なものはどれか。
choices:
  - "化学エネルギーを電気エネルギーに変える"
  - "金属がイオンになりやすい程度"
  - "水溶液の電気的なつり合いを保つ"
  - "水溶液や融解状態で電気を通す"
correct: 1
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  イオン化傾向では、「金属がイオンになりやすい程度」という点が大切です。したがって、正解は「金属がイオンになりやすい程度」です。
  
  「化学エネルギーを電気エネルギーに変える」は、ダニエル電池に関係する特徴です。
  「金属がイオンになりやすい程度」が正しいです。イオン化傾向の特徴を表しています。
  「水溶液の電気的なつり合いを保つ」は、塩橋に関係する特徴です。
  「水溶液や融解状態で電気を通す」は、電解質に関係する特徴です。
