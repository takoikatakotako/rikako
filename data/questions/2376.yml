# 高校化学 問376
id: 2376
type: single_choice
text: |
  「さびや鉄鋼の利用を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "フェノール"
  - "機能性材料"
  - "鉄"
  - "化学が築く未来"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  さびや鉄鋼の利用を考える場面 と最も関係が深いのは鉄です。したがって、正解は「鉄」です。
  
  「フェノール」は、「フェノール類の酸性や消毒作用を考える場面」と結び付きが強い語です。
  「機能性材料」は、「導電性高分子や高性能電池材料を考える場面」と結び付きが強い語です。
  「鉄」が正しいです。この具体例と最も関係が深い語です。
  「化学が築く未来」は、「再生可能エネルギーや新素材の開発を考える場面」と結び付きが強い語です。
