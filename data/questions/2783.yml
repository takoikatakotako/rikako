# 高校化学 問783
id: 2783
type: single_choice
text: |
  「ヒドロキシ基をもつこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "アルコール"
  - "結晶格子"
  - "沸点上昇"
  - "エンタルピー変化"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「ヒドロキシ基をもつこと」という見方が大切なのはアルコールです。したがって、正解は「アルコール」です。
  
  「アルコール」が正しいです。この見方が大切な語です。
  「結晶格子」は、その語で大切なのは「粒子の規則正しい配列に注目すること」という見方です。
  「沸点上昇」は、その語で大切なのは「蒸気圧降下の結果として沸点が上がること」という見方です。
  「エンタルピー変化」は、その語で大切なのは「一定圧力での熱の出入りに注目すること」という見方です。
