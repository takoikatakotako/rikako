# 化学基礎 問609
id: 1649
type: single_choice
text: |
  「物質の種類が変わらないこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "金属結合"
  - "酸"
  - "物理変化"
  - "還元"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「物質の種類が変わらないこと」という見方が大切なのは物理変化です。したがって、正解は「物理変化」です。
  
  「金属結合」は、その語で大切なのは「自由電子が結合を支えること」という見方です。
  「酸」は、その語で大切なのは「水素イオンに注目すること」という見方です。
  「物理変化」が正しいです。この見方が大切な語です。
  「還元」は、その語で大切なのは「酸素の喪失や電子の受け取りに注目すること」という見方です。
