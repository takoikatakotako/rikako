# 化学基礎 問197
id: 1237
type: single_choice
text: |
  指示薬の例として、最も適切なものはどれか。
choices:
  - "アスコルビン酸"
  - "ポリエチレン"
  - "水道水の殺菌や洗浄の技術"
  - "BTB 溶液"
correct: 3
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  BTB 溶液は、指示薬の例です。したがって、正解は「BTB 溶液」です。
  
  「アスコルビン酸」は、酸化防止剤の例として見る方が適切です。
  「ポリエチレン」は、高分子化合物の例として見る方が適切です。
  「水道水の殺菌や洗浄の技術」は、化学が拓く世界の例として見る方が適切です。
  「BTB 溶液」が正しいです。これは指示薬の例です。
