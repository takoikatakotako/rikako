# 令和7年度 ITパスポート 公開問題 問77
id: 792
type: single_choice
text: |
  ネットワークやホストを監視することによって、不正アクセスや不審な通信を発見し、報告する仕組みはどれか。
choices:
  - "DMZ"
  - "IDS"
  - "アンチパスバック"
  - "ボット"
correct: 1
explanation: |
  この問題の公開解答では「IDS」が正解とされています。
  
  「DMZ」は公開解答では正解ではありません。
  「IDS」が公開解答で正解とされています。
  「アンチパスバック」は公開解答では正解ではありません。
  「ボット」は公開解答では正解ではありません。
