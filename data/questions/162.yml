# 令和7年度 ITパスポート 公開問題 問4
id: 162
type: single_choice
text: |
  投資の優先度などの経営の戦略を策定するために、経済価値、希少性、模倣困難性及び組織の四つの要素で評価することによって、自社のもつ資源を分析する手法として、最も適切なものはどれか。
choices:
  - "4P"
  - "PPM"
  - "SWOT分析"
  - "VRIO分析"
correct: 3
explanation: |
  この問題は、「価値・希少性・模倣困難性・組織」の4つで自社の資源を評価する手法を選ぶ問題です。
  
  この4つの視点で分析する手法は VRIO分析です。したがって、正解は「VRIO分析」です。
  
  「4P」は4P は製品、価格、流通、販売促進の観点で考えるマーケティングの手法です。
  「PPM」はPPM は市場成長率と市場占有率で事業を分析する手法です。
  「SWOT分析」はSWOT分析は強み、弱み、機会、脅威を整理する手法です。
  「VRIO分析」が正しいです。VRIO分析は4つの視点で資源や能力を評価します。
