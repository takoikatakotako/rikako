# 高校化学 問541
id: 2541
type: single_choice
text: |
  「化学反応によって光が放出される現象である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ケミカルライトが光る仕組みを考える場面"
  - "自動車のバッテリーを考える場面"
  - "密閉容器で反応物と生成物の量が一定になる場面"
  - "どの塩基がより電離しやすいかを比べる場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「化学反応によって光が放出される現象である。」と最も関係が深い場面は「ケミカルライトが光る仕組みを考える場面」です。したがって、正解は「ケミカルライトが光る仕組みを考える場面」です。
  
  「ケミカルライトが光る仕組みを考える場面」が正しいです。この説明と結び付きが強い場面です。
  「自動車のバッテリーを考える場面」は、「鉛とその化合物を用いた、充電して繰り返し使える電池である。」と結び付きが強い場面です。
  「密閉容器で反応物と生成物の量が一定になる場面」は、「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」と結び付きが強い場面です。
  「どの塩基がより電離しやすいかを比べる場面」は、「塩基の電離のしやすさを表す定数である。」と結び付きが強い場面です。
