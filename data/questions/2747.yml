# 高校化学 問747
id: 2747
type: single_choice
text: |
  「電気を使って反応を進めること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "電気分解"
  - "飽和炭化水素"
  - "アニリン"
  - "化学が築く未来"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「電気を使って反応を進めること」という見方が大切なのは電気分解です。したがって、正解は「電気分解」です。
  
  「電気分解」が正しいです。この見方が大切な語です。
  「飽和炭化水素」は、その語で大切なのは「炭素間が単結合だけであること」という見方です。
  「アニリン」は、その語で大切なのは「ベンゼン環にアミノ基が直接つくこと」という見方です。
  「化学が築く未来」は、その語で大切なのは「化学が社会課題の解決に役立つこと」という見方です。
