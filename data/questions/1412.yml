# 化学基礎 問372
id: 1412
type: single_choice
text: |
  イオン結合と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムの陽子数から元素を区別する場面"
  - "炭素12と炭素14を比べる場面"
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
  - "塩化ナトリウムが陽イオンと陰イオンの引力でできる場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  塩化ナトリウムが陽イオンと陰イオンの引力でできる場面は、イオン結合と結び付きが強い場面です。したがって、正解は「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」です。
  
  「ナトリウムの陽子数から元素を区別する場面」は、原子番号と結び付きが強い場面です。
  「炭素12と炭素14を比べる場面」は、同位体と結び付きが強い場面です。
  「ナトリウムが電子を1個失いやすい理由を考える場面」は、最外殻電子と結び付きが強い場面です。
  「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」が正しいです。これはイオン結合と結び付きが強い場面です。
