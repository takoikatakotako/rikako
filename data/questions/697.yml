# 化学基礎 問30
id: 697
type: single_choice
text: |
  金属がたたくと広がったり引き伸ばしたりできる理由として、最も適切なものはどれか。
choices:
  - "金属の中で原子の並びがずれても、結合が保たれやすいから。"
  - "金属の中の原子が全てばらばらになるから。"
  - "金属の中には電子が全くないから。"
  - "金属は必ず液体だから。"
correct: 0
explanation: |
  この問題は、「金属の展性や延性の理由」を考える問題です。
  
  金属では、原子の並びが少しずれても、自由電子を介した結合が保たれやすいです。そのため、たたくと広がったり引き伸ばしたりできます。したがって、正解は「金属の中で原子の並びがずれても、結合が保たれやすいから」です。
  
  「金属の中で原子の並びがずれても、結合が保たれやすいから」が正しいです。展性や延性の理由です。
  「金属の中の原子が全てばらばらになるから」は、適切ではありません。
  「金属の中には電子が全くないから」は、自由電子の考え方と逆です。
  「金属は必ず液体だから」は、適切ではありません。
