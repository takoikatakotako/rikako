# 高校化学 問185
id: 2185
type: single_choice
text: |
  カルボン酸と最も関係が深い場面として、適切なものはどれか。
choices:
  - "アンモニアが金属イオンに電子対を与える場面"
  - "酢酸の性質やにおいを考える場面"
  - "ナトリウムで黄色、銅で青緑色を確かめる場面"
  - "電線や青色の銅イオン水溶液を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  酢酸の性質やにおいを考える場面は、カルボン酸と結び付きが強い場面です。したがって、正解は「酢酸の性質やにおいを考える場面」です。
  
  「アンモニアが金属イオンに電子対を与える場面」は、配位結合と結び付きが強い場面です。
  「酢酸の性質やにおいを考える場面」が正しいです。これはカルボン酸と結び付きが強い場面です。
  「ナトリウムで黄色、銅で青緑色を確かめる場面」は、炎色反応と結び付きが強い場面です。
  「電線や青色の銅イオン水溶液を考える場面」は、銅と結び付きが強い場面です。
