# 高校化学 問448
id: 2448
type: single_choice
text: |
  陽極を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "最外殻が安定していて反応しにくいこと"
  - "金属イオンと配位子の組合せに注目すること"
  - "多様な酸化数や色、触媒作用に注目すること"
  - "酸化が起こる側の電極であること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  陽極では、「酸化が起こる側の電極であること」という見方が大切です。したがって、正解は「酸化が起こる側の電極であること」です。
  
  「最外殻が安定していて反応しにくいこと」は、貴ガスに関係する見方です。
  「金属イオンと配位子の組合せに注目すること」は、錯イオンに関係する見方です。
  「多様な酸化数や色、触媒作用に注目すること」は、遷移元素に関係する見方です。
  「酸化が起こる側の電極であること」が正しいです。陽極の要点を表しています。
