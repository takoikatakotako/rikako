# 高校化学 問706
id: 2706
type: single_choice
text: |
  「状態変化に必要な熱に注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "ヘスの法則"
  - "陽極"
  - "電離平衡"
  - "融解熱"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「状態変化に必要な熱に注目すること」という見方が大切なのは融解熱です。したがって、正解は「融解熱」です。
  
  「ヘスの法則」は、その語で大切なのは「反応経路ではなく始状態と終状態で決まること」という見方です。
  「陽極」は、その語で大切なのは「酸化が起こる側の電極であること」という見方です。
  「電離平衡」は、その語で大切なのは「電離と元に戻る変化がつり合うこと」という見方です。
  「融解熱」が正しいです。この見方が大切な語です。
