# 高校化学 問246
id: 2246
type: single_choice
text: |
  「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "活性化エネルギー"
  - "可逆反応"
  - "平衡定数"
  - "燃料電池"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  燃料と酸化剤を外部から供給しながら電気を取り出す電池である。 に当てはまる語は燃料電池です。したがって、正解は「燃料電池」です。
  
  「活性化エネルギー」は、「反応が進むために必要な最小限のエネルギーである。」に当てはまる語です。
  「可逆反応」は、「正反応と逆反応の両方が起こり得る反応である。」に当てはまる語です。
  「平衡定数」は、「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」に当てはまる語です。
  「燃料電池」が正しいです。「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」に当てはまる語です。
