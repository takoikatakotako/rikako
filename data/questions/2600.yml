# 高校化学 問600
id: 2600
type: single_choice
text: |
  「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水が沸騰し始める温度を考える場面"
  - "食塩や金属の規則正しい並び方を考える場面"
  - "食塩水の沸点が水より少し高くなることを考える場面"
  - "再生可能エネルギーや新素材の開発を考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」と最も関係が深い場面は「再生可能エネルギーや新素材の開発を考える場面」です。したがって、正解は「再生可能エネルギーや新素材の開発を考える場面」です。
  
  「水が沸騰し始める温度を考える場面」は、「液体の蒸気圧が外圧に等しくなる温度である。」と結び付きが強い場面です。
  「食塩や金属の規則正しい並び方を考える場面」は、「結晶の中で粒子が規則正しく並んだ構造である。」と結び付きが強い場面です。
  「食塩水の沸点が水より少し高くなることを考える場面」は、「溶液の沸点が純粋な溶媒より高くなる現象である。」と結び付きが強い場面です。
  「再生可能エネルギーや新素材の開発を考える場面」が正しいです。この説明と結び付きが強い場面です。
