# 化学基礎 問600
id: 1640
type: single_choice
text: |
  「電池、医薬品、素材開発などに化学が生かされる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
  - "原子核の中にある陽子数と中性子数の合計である。"
  - "化学の知識が生活、産業、環境、医療などに役立つという見方である。"
  - "原子どうしが電子を共有してできる結び付きである。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「電池、医薬品、素材開発などに化学が生かされる場面」を説明した文として適切なのは「化学の知識が生活、産業、環境、医療などに役立つという見方である。」です。したがって、正解は「化学の知識が生活、産業、環境、医療などに役立つという見方である。」です。
  
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」は、この説明は「氷が溶けて水になる場面」と結び付きが強いです。
  「原子核の中にある陽子数と中性子数の合計である。」は、この説明は「炭素12で陽子数と中性子数の合計を見る場面」と結び付きが強いです。
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」が正しいです。この具体例を説明した文です。
  「原子どうしが電子を共有してできる結び付きである。」は、この説明は「水素原子どうしが電子を共有して H2 になる場面」と結び付きが強いです。
