# 化学基礎 問486
id: 1526
type: single_choice
text: |
  指示薬を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "化学エネルギーを電気エネルギーに変えること"
  - "粒子の数をまとめて扱う単位であること"
  - "反応する物質とできる物質の関係を式で示すこと"
  - "色の変化で液性を見分けること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  指示薬では、「色の変化で液性を見分けること」という見方が大切です。したがって、正解は「色の変化で液性を見分けること」です。
  
  「化学エネルギーを電気エネルギーに変えること」は、ダニエル電池に関係する見方です。
  「粒子の数をまとめて扱う単位であること」は、モルに関係する見方です。
  「反応する物質とできる物質の関係を式で示すこと」は、化学反応式に関係する見方です。
  「色の変化で液性を見分けること」が正しいです。指示薬の要点を表しています。
