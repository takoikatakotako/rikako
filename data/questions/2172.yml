# 高校化学 問172
id: 2172
type: single_choice
text: |
  錯イオンと最も関係が深い場面として、適切なものはどれか。
choices:
  - "アンモニアを加えると深い青色のイオンができる場面"
  - "スマートフォンやノートパソコンの電池を考える場面"
  - "水溶液に電流を流して物質を分解する場面"
  - "金属イオンが電子を受け取って析出する電極を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  アンモニアを加えると深い青色のイオンができる場面は、錯イオンと結び付きが強い場面です。したがって、正解は「アンモニアを加えると深い青色のイオンができる場面」です。
  
  「アンモニアを加えると深い青色のイオンができる場面」が正しいです。これは錯イオンと結び付きが強い場面です。
  「スマートフォンやノートパソコンの電池を考える場面」は、リチウムイオン電池と結び付きが強い場面です。
  「水溶液に電流を流して物質を分解する場面」は、電気分解と結び付きが強い場面です。
  「金属イオンが電子を受け取って析出する電極を考える場面」は、陰極と結び付きが強い場面です。
