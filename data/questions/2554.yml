# 高校化学 問554
id: 2554
type: single_choice
text: |
  「正反応と逆反応の両方が起こり得る反応である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "圧力や濃度を変えると平衡が移る方向を考える場面"
  - "生成物から再び反応物が生じる場面を考えるとき"
  - "マグネシウムやカルシウムの性質を比べる場面"
  - "エチレンやアセチレンの反応性を考える場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「正反応と逆反応の両方が起こり得る反応である。」と最も関係が深い場面は「生成物から再び反応物が生じる場面を考えるとき」です。したがって、正解は「生成物から再び反応物が生じる場面を考えるとき」です。
  
  「圧力や濃度を変えると平衡が移る方向を考える場面」は、「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」と結び付きが強い場面です。
  「生成物から再び反応物が生じる場面を考えるとき」が正しいです。この説明と結び付きが強い場面です。
  「マグネシウムやカルシウムの性質を比べる場面」は、「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」と結び付きが強い場面です。
  「エチレンやアセチレンの反応性を考える場面」は、「炭素どうしに二重結合や三重結合をもつ炭化水素である。」と結び付きが強い場面です。
