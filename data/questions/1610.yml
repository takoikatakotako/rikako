# 化学基礎 問570
id: 1610
type: single_choice
text: |
  「ナトリウム原子が電子を1個失って Na+ になる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "原子や原子団が電子を失って正の電荷をもつ粒子である。"
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
  - "溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。"
  - "二つの溶液の電気的なつり合いを保つための部分である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「ナトリウム原子が電子を1個失って Na+ になる場面」を説明した文として適切なのは「原子や原子団が電子を失って正の電荷をもつ粒子である。」です。したがって、正解は「原子や原子団が電子を失って正の電荷をもつ粒子である。」です。
  
  「原子や原子団が電子を失って正の電荷をもつ粒子である。」が正しいです。この具体例を説明した文です。
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」は、この説明は「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」と結び付きが強いです。
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」は、この説明は「BTB溶液やフェノールフタレインで液性を調べる場面」と結び付きが強いです。
  「二つの溶液の電気的なつり合いを保つための部分である。」は、この説明は「ダニエル電池で二つの水溶液をつなぐ場面」と結び付きが強いです。
