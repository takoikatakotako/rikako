# 高校化学 問858
id: 2858
type: single_choice
text: |
  「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "条件を工夫して平衡を生成物側へ寄せること"
  - "蒸発と凝縮がつり合うこと"
  - "分子間力で集まった結晶であること"
  - "半透膜を通る溶媒の移動に注目すること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」を理解する上では、「条件を工夫して平衡を生成物側へ寄せること」という見方が大切です。したがって、正解は「条件を工夫して平衡を生成物側へ寄せること」です。
  
  「条件を工夫して平衡を生成物側へ寄せること」が正しいです。この説明と結び付きが強い見方です。
  「蒸発と凝縮がつり合うこと」は、その見方は気液平衡に関係します。
  「分子間力で集まった結晶であること」は、その見方は分子結晶に関係します。
  「半透膜を通る溶媒の移動に注目すること」は、その見方は浸透圧に関係します。
