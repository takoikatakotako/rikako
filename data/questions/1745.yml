# 化学基礎 問705
id: 1745
type: single_choice
text: |
  「酸素だけが入った容器を考える場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "成分が一種類で性質が一定であること"
  - "水酸化物イオンや水素イオンの受け取りに注目すること"
  - "相手を酸化させ、自分は還元されること"
  - "放射線を出す同位体であること"
correct: 0
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「酸素だけが入った容器を考える場面」では、「成分が一種類で性質が一定であること」という見方が大切です。したがって、正解は「成分が一種類で性質が一定であること」です。
  
  「成分が一種類で性質が一定であること」が正しいです。この具体例で大切になる見方です。
  「水酸化物イオンや水素イオンの受け取りに注目すること」は、その見方は水酸化ナトリウム水溶液が水酸化物イオンを生じる場面よりも塩基と結び付きが強いです。
  「相手を酸化させ、自分は還元されること」は、その見方は酸素や過酸化水素が相手を酸化させる場面よりも酸化剤と結び付きが強いです。
  「放射線を出す同位体であること」は、その見方は医療や年代測定に利用される炭素14を考える場面よりも放射性同位体と結び付きが強いです。
