# 高校化学 問345
id: 2345
type: single_choice
text: |
  「スマートフォンやノートパソコンの電池を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "ルシャトリエの原理"
  - "電離平衡"
  - "緩衝液"
  - "リチウムイオン電池"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  スマートフォンやノートパソコンの電池を考える場面 と最も関係が深いのはリチウムイオン電池です。したがって、正解は「リチウムイオン電池」です。
  
  「ルシャトリエの原理」は、「圧力や濃度を変えると平衡が移る方向を考える場面」と結び付きが強い語です。
  「電離平衡」は、「弱酸が一部だけ電離している水溶液を考える場面」と結び付きが強い語です。
  「緩衝液」は、「血液や実験用の溶液で pH を保ちたい場面」と結び付きが強い語です。
  「リチウムイオン電池」が正しいです。この具体例と最も関係が深い語です。
