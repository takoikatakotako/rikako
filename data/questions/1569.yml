# 化学基礎 問529
id: 1569
type: single_choice
text: |
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "1Lの食塩水にどれだけ溶質が溶けているかを表す場面"
  - "水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
  - "酸素や過酸化水素が相手を酸化させる場面"
  - "医療や年代測定に利用される炭素14を考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」と最も関係が深い場面は「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」です。したがって、正解は「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」です。
  
  「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」が正しいです。この説明と結び付きが強い場面です。
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」は、「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」と結び付きが強い場面です。
  「酸素や過酸化水素が相手を酸化させる場面」は、「相手を酸化させ、自身は還元される物質である。」と結び付きが強い場面です。
  「医療や年代測定に利用される炭素14を考える場面」は、「放射線を出しながら別の原子へ変わっていく同位体である。」と結び付きが強い場面です。
