# 化学基礎 問96
id: 1136
type: single_choice
text: |
  洗剤のはたらきと特に関係が深い化学の考え方として、最も適切なものはどれか。
choices:
  - "分子の極性"
  - "原子番号だけ"
  - "中性子の数だけ"
  - "質量数だけ"
correct: 0
explanation: |
  この問題は、「洗浄のしくみと化学の考え方」を結び付ける問題です。
  
  洗剤のはたらきは、水となじみやすい部分と油となじみやすい部分をもつことと関係しています。これは分子の極性の考え方と深くつながっています。したがって、正解は「分子の極性」です。
  
  「分子の極性」が正しいです。洗剤のはたらきを考える上で大切です。
  「原子番号だけ」は、洗浄のしくみを説明するには不十分です。
  「中性子の数だけ」は、適切ではありません。
  「質量数だけ」は、適切ではありません。
