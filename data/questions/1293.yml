# 化学基礎 問253
id: 1293
type: single_choice
text: |
  再結晶の特徴として、最も適切なものはどれか。
choices:
  - "移動しやすさの違いを利用する"
  - "溶解度の差を利用する"
  - "一種類の成分だけからなる"
  - "複数の成分が混ざっている"
correct: 1
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  再結晶では、「溶解度の差を利用する」という点が大切です。したがって、正解は「溶解度の差を利用する」です。
  
  「移動しやすさの違いを利用する」は、クロマトグラフィーに関係する特徴です。
  「溶解度の差を利用する」が正しいです。再結晶の特徴を表しています。
  「一種類の成分だけからなる」は、純物質に関係する特徴です。
  「複数の成分が混ざっている」は、混合物に関係する特徴です。
