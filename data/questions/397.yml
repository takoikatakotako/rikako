# 令和7年度 ITパスポート 公開問題 問63
id: 397
type: single_choice
text: |
  データの尺度を名義尺度、順序尺度、間隔尺度、比例尺度の四つに分類したとき、間隔尺度に該当するものはどれか。
choices:
  - "学年"
  - "血液型"
  - "時刻"
  - "睡眠時間"
correct: 2
explanation: |
  この問題の公開解答では「時刻」が正解とされています。
  
  「学年」は公開解答では正解ではありません。
  「血液型」は公開解答では正解ではありません。
  「時刻」が公開解答で正解とされています。
  「睡眠時間」は公開解答では正解ではありません。
