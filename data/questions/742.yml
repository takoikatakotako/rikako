# 高校化学 問32
id: 742
type: single_choice
text: |
  電気泳動についての説明として、最も適切なものはどれか。
choices:
  - "正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。"
  - "平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。"
  - "電離する粒子と電離していない粒子が平衡になっている状態である。"
  - "電場をかけたとき、荷電したコロイド粒子が移動する現象である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  電気泳動は、電場をかけたとき、荷電したコロイド粒子が移動する現象である。 したがって、正解は「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」です。
  
  「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」は、化学平衡の説明です。
  「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」は、ルシャトリエの原理の説明です。
  「電離する粒子と電離していない粒子が平衡になっている状態である。」は、電離平衡の説明です。
  「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」が正しいです。電気泳動の説明です。
