# 令和7年度 ITパスポート 公開問題 問30
id: 523
type: single_choice
text: |
  著作権に関して、次の記述中のa,bに入れる字句の適切な組合せはどれか。
  a
  は著作権法による保護の対象になるが、
  b
  は対象にならない。
  a
  b
choices:
  - "アルゴリズム / 操作マニュアル"
  - "アルゴリズム / 通信プロトコル"
  - "ソースプログラム / 操作マニュアル"
  - "ソースプログラム / 通信プロトコル"
correct: 3
explanation: |
  ソースプログラムや操作マニュアルのような創作的表現は著作権法による保護対象となります。一方、アルゴリズムや通信プロトコルのようなアイデアや規約そのものは保護対象にはなりません。したがって a=ソースプログラム、b=通信プロトコル のエが正しいです。
  
  「アルゴリズム / 操作マニュアル」はa のアルゴリズムは著作権法で保護される対象ではありません。
  「アルゴリズム / 通信プロトコル」はa がアルゴリズムなので誤りです。
  「ソースプログラム / 操作マニュアル」は操作マニュアルも著作物となり得るため、b としては不適切です。
  「ソースプログラム / 通信プロトコル」が正しいです。ソースプログラムは保護対象で、通信プロトコルは対象外です。
