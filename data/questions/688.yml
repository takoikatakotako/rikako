# 化学基礎 問21
id: 688
type: single_choice
text: |
  質量数についての説明として、最も適切なものはどれか。
choices:
  - "陽子の数と中性子の数の合計である。"
  - "電子の数だけを表す。"
  - "最外殻電子の数を表す。"
  - "原子核の大きさだけを表す。"
correct: 0
explanation: |
  この問題は、「質量数が何を合計した数か」を答える問題です。
  
  質量数は、原子核の中にある陽子の数と中性子の数の合計です。したがって、正解は「陽子の数と中性子の数の合計である」です。
  
  「陽子の数と中性子の数の合計である」が正しいです。質量数の基本です。
  「電子の数だけを表す」は、質量数の説明ではありません。
  「最外殻電子の数を表す」は、質量数の説明ではありません。
  「原子核の大きさだけを表す」は、質量数の説明ではありません。
