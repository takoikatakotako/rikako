# 化学基礎 問665
id: 1705
type: single_choice
text: |
  「原子核の中にある陽子の数を表す数である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "色の変化で液性を見分けること"
  - "陽子数を表す数であること"
  - "電池の中で電気的なつり合いを保つこと"
  - "化学が社会や生活に広く役立つこと"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「原子核の中にある陽子の数を表す数である。」を理解する上では、「陽子数を表す数であること」という見方が大切です。したがって、正解は「陽子数を表す数であること」です。
  
  「色の変化で液性を見分けること」は、その見方は指示薬に関係します。
  「陽子数を表す数であること」が正しいです。この説明と結び付きが強い見方です。
  「電池の中で電気的なつり合いを保つこと」は、その見方は塩橋に関係します。
  「化学が社会や生活に広く役立つこと」は、その見方は化学が拓く世界に関係します。
