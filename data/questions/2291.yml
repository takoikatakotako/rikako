# 高校化学 問291
id: 2291
type: single_choice
text: |
  「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "PET"
  - "浸透圧"
  - "チンダル現象"
  - "透析"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。 に当てはまる語はPETです。したがって、正解は「PET」です。
  
  「PET」が正しいです。「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」に当てはまる語です。
  「浸透圧」は、「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」に当てはまる語です。
  「チンダル現象」は、「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」に当てはまる語です。
  「透析」は、「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」に当てはまる語です。
