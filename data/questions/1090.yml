# 化学基礎 問50
id: 1090
type: single_choice
text: |
  日常生活や社会を支える化学のはたらきの例として、最も適切なものはどれか。
choices:
  - "水道水を安全にするために、ろ過や殺菌の技術が使われている。"
  - "化学では、日常生活に関わる技術は扱わない。"
  - "食品の保存は、化学とは無関係である。"
  - "洗剤のはたらきは、化学では説明できない。"
correct: 0
explanation: |
  この問題は、「化学基礎で学んだことが日常生活とどうつながるか」を考える問題です。
  
  学習指導要領でも、水道水、食品保存、洗浄など、日常生活や社会を支える技術と化学を結び付けて学ぶことが重視されています。したがって、正解は「水道水を安全にするために、ろ過や殺菌の技術が使われている」です。
  
  「水道水を安全にするために、ろ過や殺菌の技術が使われている」が正しいです。化学の利用例の一つです。
  「化学では、日常生活に関わる技術は扱わない」は、適切ではありません。
  「食品の保存は、化学とは無関係である」は、適切ではありません。
  「洗剤のはたらきは、化学では説明できない」は、適切ではありません。
