# 化学基礎 問386
id: 1426
type: single_choice
text: |
  指示薬と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ポリエチレンやタンパク質のような長い分子を考える場面"
  - "BTB溶液やフェノールフタレインで液性を調べる場面"
  - "塩酸が水溶液中で水素イオンを生じる場面"
  - "塩酸と水酸化ナトリウム水溶液を混ぜる場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  BTB溶液やフェノールフタレインで液性を調べる場面は、指示薬と結び付きが強い場面です。したがって、正解は「BTB溶液やフェノールフタレインで液性を調べる場面」です。
  
  「ポリエチレンやタンパク質のような長い分子を考える場面」は、高分子化合物と結び付きが強い場面です。
  「BTB溶液やフェノールフタレインで液性を調べる場面」が正しいです。これは指示薬と結び付きが強い場面です。
  「塩酸が水溶液中で水素イオンを生じる場面」は、酸と結び付きが強い場面です。
  「塩酸と水酸化ナトリウム水溶液を混ぜる場面」は、中和と結び付きが強い場面です。
