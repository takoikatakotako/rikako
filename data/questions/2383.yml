# 高校化学 問383
id: 2383
type: single_choice
text: |
  「エタノールの性質や利用を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "付加反応"
  - "アルコール"
  - "異性体"
  - "カルボン酸"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  エタノールの性質や利用を考える場面 と最も関係が深いのはアルコールです。したがって、正解は「アルコール」です。
  
  「付加反応」は、「エチレンに臭素が付加する場面」と結び付きが強い語です。
  「アルコール」が正しいです。この具体例と最も関係が深い語です。
  「異性体」は、「ブタンとイソブタンを比べる場面」と結び付きが強い語です。
  「カルボン酸」は、「酢酸の性質やにおいを考える場面」と結び付きが強い語です。
