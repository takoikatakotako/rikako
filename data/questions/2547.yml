# 高校化学 問547
id: 2547
type: single_choice
text: |
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "流した電流が大きいほど析出量が増える場面"
  - "血液や実験用の溶液で pH を保ちたい場面"
  - "水溶液に電流を流して物質を分解する場面"
  - "アンモニアを加えると深い青色のイオンができる場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」と最も関係が深い場面は「水溶液に電流を流して物質を分解する場面」です。したがって、正解は「水溶液に電流を流して物質を分解する場面」です。
  
  「流した電流が大きいほど析出量が増える場面」は、「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」と結び付きが強い場面です。
  「血液や実験用の溶液で pH を保ちたい場面」は、「少量の酸や塩基を加えても pH が変わりにくい溶液である。」と結び付きが強い場面です。
  「水溶液に電流を流して物質を分解する場面」が正しいです。この説明と結び付きが強い場面です。
  「アンモニアを加えると深い青色のイオンができる場面」は、「中心となる金属イオンに配位子が結び付いたイオンである。」と結び付きが強い場面です。
