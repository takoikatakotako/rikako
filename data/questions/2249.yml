# 高校化学 問249
id: 2249
type: single_choice
text: |
  「電気分解で還元が起こる電極である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "化学平衡"
  - "ルシャトリエの原理"
  - "陰極"
  - "電離平衡"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  電気分解で還元が起こる電極である。 に当てはまる語は陰極です。したがって、正解は「陰極」です。
  
  「化学平衡」は、「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」に当てはまる語です。
  「ルシャトリエの原理」は、「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」に当てはまる語です。
  「陰極」が正しいです。「電気分解で還元が起こる電極である。」に当てはまる語です。
  「電離平衡」は、「電離する粒子と電離していない粒子が平衡になっている状態である。」に当てはまる語です。
