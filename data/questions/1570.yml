# 化学基礎 問530
id: 1570
type: single_choice
text: |
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "塩酸と水酸化ナトリウム水溶液を混ぜる場面"
  - "水素と酸素から水ができる反応を式で表す場面"
  - "水素や炭素が相手から酸素を奪う場面"
  - "ナトリウムで黄色、銅で青緑色を観察する場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」と最も関係が深い場面は「水素と酸素から水ができる反応を式で表す場面」です。したがって、正解は「水素と酸素から水ができる反応を式で表す場面」です。
  
  「塩酸と水酸化ナトリウム水溶液を混ぜる場面」は、「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」と結び付きが強い場面です。
  「水素と酸素から水ができる反応を式で表す場面」が正しいです。この説明と結び付きが強い場面です。
  「水素や炭素が相手から酸素を奪う場面」は、「相手を還元させ、自身は酸化される物質である。」と結び付きが強い場面です。
  「ナトリウムで黄色、銅で青緑色を観察する場面」は、「金属元素を炎に入れたときに特有の色を示す反応である。」と結び付きが強い場面です。
