# 高校化学 問660
id: 2660
type: single_choice
text: |
  「中性の水で H+ と OH- の関係を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。"
  - "遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。"
  - "ベンゼン環にヒドロキシ基が直接結び付いた化合物である。"
  - "使い終わった資源や製品を回収し、再び利用する考え方である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「中性の水で H+ と OH- の関係を考える場面」を説明した文として適切なのは「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」です。したがって、正解は「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」です。
  
  「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」が正しいです。この具体例を説明した文です。
  「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」は、この説明は「電線や青色の銅イオン水溶液を考える場面」と結び付きが強いです。
  「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」は、この説明は「フェノール類の酸性や消毒作用を考える場面」と結び付きが強いです。
  「使い終わった資源や製品を回収し、再び利用する考え方である。」は、この説明は「金属やプラスチックを回収して再資源化する場面」と結び付きが強いです。
