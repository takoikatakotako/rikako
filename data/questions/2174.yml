# 高校化学 問174
id: 2174
type: single_choice
text: |
  遷移元素と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水溶液に電流を流して物質を分解する場面"
  - "金属イオンが電子を受け取って析出する電極を考える場面"
  - "鉄や銅、クロムの化合物の色の違いを考える場面"
  - "メタンやエタンの性質を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  鉄や銅、クロムの化合物の色の違いを考える場面は、遷移元素と結び付きが強い場面です。したがって、正解は「鉄や銅、クロムの化合物の色の違いを考える場面」です。
  
  「水溶液に電流を流して物質を分解する場面」は、電気分解と結び付きが強い場面です。
  「金属イオンが電子を受け取って析出する電極を考える場面」は、陰極と結び付きが強い場面です。
  「鉄や銅、クロムの化合物の色の違いを考える場面」が正しいです。これは遷移元素と結び付きが強い場面です。
  「メタンやエタンの性質を考える場面」は、飽和炭化水素と結び付きが強い場面です。
