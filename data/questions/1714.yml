# 化学基礎 問674
id: 1714
type: single_choice
text: |
  「金属原子が自由電子を介して結び付く結合である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水溶液でも電流をほとんど通さないこと"
  - "沸点の違いを利用すること"
  - "自由電子が結合を支えること"
  - "物質の種類が変わらないこと"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「金属原子が自由電子を介して結び付く結合である。」を理解する上では、「自由電子が結合を支えること」という見方が大切です。したがって、正解は「自由電子が結合を支えること」です。
  
  「水溶液でも電流をほとんど通さないこと」は、その見方は非電解質に関係します。
  「沸点の違いを利用すること」は、その見方は蒸留に関係します。
  「自由電子が結合を支えること」が正しいです。この説明と結び付きが強い見方です。
  「物質の種類が変わらないこと」は、その見方は物理変化に関係します。
