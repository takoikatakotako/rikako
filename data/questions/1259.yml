# 化学基礎 問219
id: 1259
type: single_choice
text: |
  「ナトリウムでは最外殻電子が 1 個であること」に最も関係が深い語として、適切なものはどれか。
choices:
  - "最外殻電子"
  - "陽イオン"
  - "陰イオン"
  - "イオン結合"
correct: 0
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「ナトリウムでは最外殻電子が 1 個であること」に最も関係が深いのは最外殻電子です。したがって、正解は「最外殻電子」です。
  
  「最外殻電子」が正しいです。この例は最外殻電子に関係しています。
  「陽イオン」は、この例に最も関係が深い語ではありません。
  「陰イオン」は、この例に最も関係が深い語ではありません。
  「イオン結合」は、この例に最も関係が深い語ではありません。
