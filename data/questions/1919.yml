# 化学基礎 問879
id: 1919
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "金属結合 / 水溶液中で水素イオンを生じる物質である。"
  - "酸 / 物質が酸素を失う、または電子を受け取る変化である。"
  - "還元 / 金属原子が自由電子を介して結び付く結合である。"
  - "モル濃度 / 溶液1L中に溶けている溶質の物質量を表した濃度である。"
correct: 3
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「モル濃度 / 溶液1L中に溶けている溶質の物質量を表した濃度である。」です。したがって、正解は「モル濃度 / 溶液1L中に溶けている溶質の物質量を表した濃度である。」です。
  
  「金属結合 / 水溶液中で水素イオンを生じる物質である。」は、用語と説明の対応が合っていません。
  「酸 / 物質が酸素を失う、または電子を受け取る変化である。」は、用語と説明の対応が合っていません。
  「還元 / 金属原子が自由電子を介して結び付く結合である。」は、用語と説明の対応が合っていません。
  「モル濃度 / 溶液1L中に溶けている溶質の物質量を表した濃度である。」が正しいです。用語と説明の対応が合っています。
