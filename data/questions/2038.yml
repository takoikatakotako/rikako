# 化学基礎 問998
id: 2038
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "酸化防止剤 / 酸化による変質を防ぐこと"
  - "物理変化 / 陽子数と中性子数の合計であること"
  - "質量数 / 電子を共有して結び付くこと"
  - "共有結合 / 物質の種類が変わらないこと"
correct: 0
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「酸化防止剤 / 酸化による変質を防ぐこと」です。したがって、正解は「酸化防止剤 / 酸化による変質を防ぐこと」です。
  
  「酸化防止剤 / 酸化による変質を防ぐこと」が正しいです。用語と要点の対応が合っています。
  「物理変化 / 陽子数と中性子数の合計であること」は、用語と要点の対応が合っていません。
  「質量数 / 電子を共有して結び付くこと」は、用語と要点の対応が合っていません。
  「共有結合 / 物質の種類が変わらないこと」は、用語と要点の対応が合っていません。
