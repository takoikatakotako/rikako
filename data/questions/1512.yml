# 化学基礎 問472
id: 1512
type: single_choice
text: |
  イオン結合を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "どのくらいイオンに分かれるかを表すこと"
  - "電気的な引力で結び付くこと"
  - "電子を失って正に帯電すること"
  - "電子を共有して結び付くこと"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  イオン結合では、「電気的な引力で結び付くこと」という見方が大切です。したがって、正解は「電気的な引力で結び付くこと」です。
  
  「どのくらいイオンに分かれるかを表すこと」は、電離度に関係する見方です。
  「電気的な引力で結び付くこと」が正しいです。イオン結合の要点を表しています。
  「電子を失って正に帯電すること」は、陽イオンに関係する見方です。
  「電子を共有して結び付くこと」は、共有結合に関係する見方です。
