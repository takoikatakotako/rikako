# 高校化学 問442
id: 2442
type: single_choice
text: |
  光合成を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "H+ と OH- の積が一定であること"
  - "光エネルギーを化学エネルギーに変えること"
  - "塩のイオンが水と反応すること"
  - "電離が部分的に起こること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  光合成では、「光エネルギーを化学エネルギーに変えること」という見方が大切です。したがって、正解は「光エネルギーを化学エネルギーに変えること」です。
  
  「H+ と OH- の積が一定であること」は、水のイオン積に関係する見方です。
  「光エネルギーを化学エネルギーに変えること」が正しいです。光合成の要点を表しています。
  「塩のイオンが水と反応すること」は、塩の加水分解に関係する見方です。
  「電離が部分的に起こること」は、弱塩基に関係する見方です。
