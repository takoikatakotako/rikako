# 高校化学 問300
id: 2300
type: single_choice
text: |
  「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "置換反応"
  - "化学が築く未来"
  - "アルコール"
  - "カルボン酸"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。 に当てはまる語は化学が築く未来です。したがって、正解は「化学が築く未来」です。
  
  「置換反応」は、「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」に当てはまる語です。
  「化学が築く未来」が正しいです。「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」に当てはまる語です。
  「アルコール」は、「ヒドロキシ基をもつ有機化合物である。」に当てはまる語です。
  「カルボン酸」は、「カルボキシ基をもち、酸性を示す有機化合物である。」に当てはまる語です。
