# 高校化学 問377
id: 2377
type: single_choice
text: |
  「電線や青色の銅イオン水溶液を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "アニリン"
  - "資源の再利用"
  - "アルカリ金属"
  - "銅"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  電線や青色の銅イオン水溶液を考える場面 と最も関係が深いのは銅です。したがって、正解は「銅」です。
  
  「アニリン」は、「染料の原料になる芳香族アミンを考える場面」と結び付きが強い語です。
  「資源の再利用」は、「金属やプラスチックを回収して再資源化する場面」と結び付きが強い語です。
  「アルカリ金属」は、「ナトリウムやカリウムの性質を比べる場面」と結び付きが強い語です。
  「銅」が正しいです。この具体例と最も関係が深い語です。
