# 高校化学 問749
id: 2749
type: single_choice
text: |
  「還元が起こる側の電極であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "付加反応"
  - "PET"
  - "陰極"
  - "融点"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「還元が起こる側の電極であること」という見方が大切なのは陰極です。したがって、正解は「陰極」です。
  
  「付加反応」は、その語で大切なのは「二重結合や三重結合に何かが加わること」という見方です。
  「PET」は、その語で大切なのは「ポリエステルの一種で再利用もしやすいこと」という見方です。
  「陰極」が正しいです。この見方が大切な語です。
  「融点」は、その語で大切なのは「固体と液体の境目の温度に注目すること」という見方です。
