# 化学基礎 問791
id: 1831
type: single_choice
text: |
  「金属のイオンになりやすさを比べること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "金属原子が自由電子を介して結び付く結合である。"
  - "金属が電子を失ってイオンになりやすい性質の強さである。"
  - "水溶液中で水素イオンを生じる物質である。"
  - "物質が酸素を失う、または電子を受け取る変化である。"
correct: 1
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「金属のイオンになりやすさを比べること」という見方と最も関係が深い説明は「金属が電子を失ってイオンになりやすい性質の強さである。」です。したがって、正解は「金属が電子を失ってイオンになりやすい性質の強さである。」です。
  
  「金属原子が自由電子を介して結び付く結合である。」は、その説明で大切なのは「自由電子が結合を支えること」という見方です。
  「金属が電子を失ってイオンになりやすい性質の強さである。」が正しいです。この見方と最も関係が深い説明です。
  「水溶液中で水素イオンを生じる物質である。」は、その説明で大切なのは「水素イオンに注目すること」という見方です。
  「物質が酸素を失う、または電子を受け取る変化である。」は、その説明で大切なのは「酸素の喪失や電子の受け取りに注目すること」という見方です。
