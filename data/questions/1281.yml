# 化学基礎 問241
id: 1281
type: single_choice
text: |
  「寒天に硝酸カリウムを含ませた塩橋」に最も関係が深い語として、適切なものはどれか。
choices:
  - "電解質"
  - "非電解質"
  - "塩橋"
  - "放射性同位体"
correct: 2
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「寒天に硝酸カリウムを含ませた塩橋」に最も関係が深いのは塩橋です。したがって、正解は「塩橋」です。
  
  「電解質」は、この例に最も関係が深い語ではありません。
  「非電解質」は、この例に最も関係が深い語ではありません。
  「塩橋」が正しいです。この例は塩橋に関係しています。
  「放射性同位体」は、この例に最も関係が深い語ではありません。
