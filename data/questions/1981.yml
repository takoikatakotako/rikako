# 化学基礎 問941
id: 1981
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "イオン化傾向 / 亜鉛が銅より先にイオンになりやすいことを見る場面"
  - "放射性同位体 / ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面"
  - "再結晶 / 鉄がさびて別の物質になる場面"
  - "化学変化 / 医療や年代測定に利用される炭素14を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「イオン化傾向 / 亜鉛が銅より先にイオンになりやすいことを見る場面」です。したがって、正解は「イオン化傾向 / 亜鉛が銅より先にイオンになりやすいことを見る場面」です。
  
  「イオン化傾向 / 亜鉛が銅より先にイオンになりやすいことを見る場面」が正しいです。用語と場面の対応が合っています。
  「放射性同位体 / ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」は、用語と場面の対応が合っていません。
  「再結晶 / 鉄がさびて別の物質になる場面」は、用語と場面の対応が合っていません。
  「化学変化 / 医療や年代測定に利用される炭素14を考える場面」は、用語と場面の対応が合っていません。
