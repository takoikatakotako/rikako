# 高校化学 問511
id: 2511
type: single_choice
text: |
  「混合気体の全圧は各気体の分圧の和になるという法則である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "食塩や金属の規則正しい並び方を考える場面"
  - "食塩水の沸点が水より少し高くなることを考える場面"
  - "酸素と窒素が混ざった気体の圧力を考える場面"
  - "反応前後で熱の出入りを比較する場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「混合気体の全圧は各気体の分圧の和になるという法則である。」と最も関係が深い場面は「酸素と窒素が混ざった気体の圧力を考える場面」です。したがって、正解は「酸素と窒素が混ざった気体の圧力を考える場面」です。
  
  「食塩や金属の規則正しい並び方を考える場面」は、「結晶の中で粒子が規則正しく並んだ構造である。」と結び付きが強い場面です。
  「食塩水の沸点が水より少し高くなることを考える場面」は、「溶液の沸点が純粋な溶媒より高くなる現象である。」と結び付きが強い場面です。
  「酸素と窒素が混ざった気体の圧力を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「反応前後で熱の出入りを比較する場面」は、「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」と結び付きが強い場面です。
