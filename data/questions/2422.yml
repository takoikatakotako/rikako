# 高校化学 問422
id: 2422
type: single_choice
text: |
  飽和溶液を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "小さな粒子が分散している状態であること"
  - "それ以上溶けない状態であること"
  - "粒子が周囲の分子にぶつかって動くこと"
  - "コロイド粒子の電荷に注目すること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  飽和溶液では、「それ以上溶けない状態であること」という見方が大切です。したがって、正解は「それ以上溶けない状態であること」です。
  
  「小さな粒子が分散している状態であること」は、コロイドに関係する見方です。
  「それ以上溶けない状態であること」が正しいです。飽和溶液の要点を表しています。
  「粒子が周囲の分子にぶつかって動くこと」は、ブラウン運動に関係する見方です。
  「コロイド粒子の電荷に注目すること」は、電気泳動に関係する見方です。
