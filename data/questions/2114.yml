# 高校化学 問114
id: 2114
type: single_choice
text: |
  結晶格子と最も関係が深い場面として、適切なものはどれか。
choices:
  - "食塩を加えても底に残るようになった食塩水を考える場面"
  - "食塩水が純水より蒸発しにくくなることを考える場面"
  - "食塩や金属の規則正しい並び方を考える場面"
  - "凍結防止剤をまいた道路の水が凍りにくくなる場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  食塩や金属の規則正しい並び方を考える場面は、結晶格子と結び付きが強い場面です。したがって、正解は「食塩や金属の規則正しい並び方を考える場面」です。
  
  「食塩を加えても底に残るようになった食塩水を考える場面」は、飽和溶液と結び付きが強い場面です。
  「食塩水が純水より蒸発しにくくなることを考える場面」は、蒸気圧降下と結び付きが強い場面です。
  「食塩や金属の規則正しい並び方を考える場面」が正しいです。これは結晶格子と結び付きが強い場面です。
  「凍結防止剤をまいた道路の水が凍りにくくなる場面」は、凝固点降下と結び付きが強い場面です。
