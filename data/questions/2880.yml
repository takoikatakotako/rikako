# 高校化学 問880
id: 2880
type: single_choice
text: |
  「多重結合に原子や原子団が加わる反応である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "半透膜を通る溶媒の移動に注目すること"
  - "結合を切るのに必要なエネルギーに注目すること"
  - "二重結合や三重結合に何かが加わること"
  - "還元が起こる側の電極であること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「多重結合に原子や原子団が加わる反応である。」を理解する上では、「二重結合や三重結合に何かが加わること」という見方が大切です。したがって、正解は「二重結合や三重結合に何かが加わること」です。
  
  「半透膜を通る溶媒の移動に注目すること」は、その見方は浸透圧に関係します。
  「結合を切るのに必要なエネルギーに注目すること」は、その見方は結合エネルギーに関係します。
  「二重結合や三重結合に何かが加わること」が正しいです。この説明と結び付きが強い見方です。
  「還元が起こる側の電極であること」は、その見方は陰極に関係します。
