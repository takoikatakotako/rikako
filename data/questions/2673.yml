# 高校化学 問673
id: 2673
type: single_choice
text: |
  「アンモニアが金属イオンに電子対を与える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "アミド結合をもつ合成繊維の代表的な高分子化合物である。"
  - "一方の原子が電子対を与えてできる共有結合である。"
  - "分子どうしの間にはたらく比較的弱い引力である。"
  - "分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「アンモニアが金属イオンに電子対を与える場面」を説明した文として適切なのは「一方の原子が電子対を与えてできる共有結合である。」です。したがって、正解は「一方の原子が電子対を与えてできる共有結合である。」です。
  
  「アミド結合をもつ合成繊維の代表的な高分子化合物である。」は、この説明は「衣類やロープに使われる合成繊維を考える場面」と結び付きが強いです。
  「一方の原子が電子対を与えてできる共有結合である。」が正しいです。この具体例を説明した文です。
  「分子どうしの間にはたらく比較的弱い引力である。」は、この説明は「水やエタノールの沸点の違いを考える場面」と結び付きが強いです。
  「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」は、この説明は「高圧や低温で気体のふるまいが理想気体からずれる場面」と結び付きが強いです。
