# 高校化学 問165
id: 2165
type: single_choice
text: |
  酸解離定数と最も関係が深い場面として、適切なものはどれか。
choices:
  - "複数の反応式を組み合わせて全体の反応熱を求める場面"
  - "どの酸がより電離しやすいかを比べる場面"
  - "燃焼や中和で容器が温かくなる場面"
  - "ケミカルライトが光る仕組みを考える場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  どの酸がより電離しやすいかを比べる場面は、酸解離定数と結び付きが強い場面です。したがって、正解は「どの酸がより電離しやすいかを比べる場面」です。
  
  「複数の反応式を組み合わせて全体の反応熱を求める場面」は、ヘスの法則と結び付きが強い場面です。
  「どの酸がより電離しやすいかを比べる場面」が正しいです。これは酸解離定数と結び付きが強い場面です。
  「燃焼や中和で容器が温かくなる場面」は、発熱反応と結び付きが強い場面です。
  「ケミカルライトが光る仕組みを考える場面」は、化学発光と結び付きが強い場面です。
