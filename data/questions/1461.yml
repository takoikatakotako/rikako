# 化学基礎 問421
id: 1461
type: single_choice
text: |
  「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "モル"
  - "化学反応式"
  - "塩基"
  - "陰イオン"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  原子や原子団が電子を受け取って負の電荷をもつ粒子である。 に当てはまる語は陰イオンです。したがって、正解は「陰イオン」です。
  
  「モル」は、「粒子の数をまとめて表すための単位である。」に当てはまる語です。
  「化学反応式」は、「化学変化を、物質の種類と量の関係が分かるように表した式である。」に当てはまる語です。
  「塩基」は、「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」に当てはまる語です。
  「陰イオン」が正しいです。「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」に当てはまる語です。
