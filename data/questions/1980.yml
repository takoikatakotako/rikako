# 化学基礎 問940
id: 1980
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "非電解質 / 水とエタノールの混合物を沸点の差で分ける場面"
  - "蒸留 / 氷が溶けて水になる場面"
  - "物理変化 / 砂糖水が電流をほとんど通さない場面"
  - "還元剤 / 水素や炭素が相手から酸素を奪う場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「還元剤 / 水素や炭素が相手から酸素を奪う場面」です。したがって、正解は「還元剤 / 水素や炭素が相手から酸素を奪う場面」です。
  
  「非電解質 / 水とエタノールの混合物を沸点の差で分ける場面」は、用語と場面の対応が合っていません。
  「蒸留 / 氷が溶けて水になる場面」は、用語と場面の対応が合っていません。
  「物理変化 / 砂糖水が電流をほとんど通さない場面」は、用語と場面の対応が合っていません。
  「還元剤 / 水素や炭素が相手から酸素を奪う場面」が正しいです。用語と場面の対応が合っています。
