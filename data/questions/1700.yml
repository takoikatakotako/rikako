# 化学基礎 問660
id: 1700
type: single_choice
text: |
  「もとの物質とは別の物質ができる変化である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "新しい物質ができること"
  - "水素イオンに注目すること"
  - "酸素の喪失や電子の受け取りに注目すること"
  - "水溶液でも電流をほとんど通さないこと"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「もとの物質とは別の物質ができる変化である。」を理解する上では、「新しい物質ができること」という見方が大切です。したがって、正解は「新しい物質ができること」です。
  
  「新しい物質ができること」が正しいです。この説明と結び付きが強い見方です。
  「水素イオンに注目すること」は、その見方は酸に関係します。
  「酸素の喪失や電子の受け取りに注目すること」は、その見方は還元に関係します。
  「水溶液でも電流をほとんど通さないこと」は、その見方は非電解質に関係します。
