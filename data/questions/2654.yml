# 高校化学 問654
id: 2654
type: single_choice
text: |
  「生成物から再び反応物が生じる場面を考えるとき」を説明した文として、最も適切なものはどれか。
choices:
  - "酸とも塩基とも反応する酸化物である。"
  - "分子式は同じでも構造が異なる化合物どうしである。"
  - "正反応と逆反応の両方が起こり得る反応である。"
  - "アミノ基とカルボキシ基をあわせもつ化合物である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「生成物から再び反応物が生じる場面を考えるとき」を説明した文として適切なのは「正反応と逆反応の両方が起こり得る反応である。」です。したがって、正解は「正反応と逆反応の両方が起こり得る反応である。」です。
  
  「酸とも塩基とも反応する酸化物である。」は、この説明は「酸化アルミニウムが酸にも塩基にも溶ける場面」と結び付きが強いです。
  「分子式は同じでも構造が異なる化合物どうしである。」は、この説明は「ブタンとイソブタンを比べる場面」と結び付きが強いです。
  「正反応と逆反応の両方が起こり得る反応である。」が正しいです。この具体例を説明した文です。
  「アミノ基とカルボキシ基をあわせもつ化合物である。」は、この説明は「グリシンやアラニンの構造を考える場面」と結び付きが強いです。
