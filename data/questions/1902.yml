# 化学基礎 問862
id: 1902
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "単体 / 固体が液体にならずに気体になる状態変化である。"
  - "昇華 / 原子や原子団が電子を受け取って負の電荷をもつ粒子である。"
  - "蒸発 / 液体が気体になる状態変化である。"
  - "陰イオン / 一種類の元素だけからできている物質である。"
correct: 2
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「蒸発 / 液体が気体になる状態変化である。」です。したがって、正解は「蒸発 / 液体が気体になる状態変化である。」です。
  
  「単体 / 固体が液体にならずに気体になる状態変化である。」は、用語と説明の対応が合っていません。
  「昇華 / 原子や原子団が電子を受け取って負の電荷をもつ粒子である。」は、用語と説明の対応が合っていません。
  「蒸発 / 液体が気体になる状態変化である。」が正しいです。用語と説明の対応が合っています。
  「陰イオン / 一種類の元素だけからできている物質である。」は、用語と説明の対応が合っていません。
