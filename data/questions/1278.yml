# 化学基礎 問238
id: 1278
type: single_choice
text: |
  「亜鉛」に最も関係が深い語として、適切なものはどれか。
choices:
  - "イオン化傾向"
  - "ダニエル電池"
  - "塩橋"
  - "還元剤"
correct: 3
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「亜鉛」に最も関係が深いのは還元剤です。したがって、正解は「還元剤」です。
  
  「イオン化傾向」は、この例に最も関係が深い語ではありません。
  「ダニエル電池」は、この例に最も関係が深い語ではありません。
  「塩橋」は、この例に最も関係が深い語ではありません。
  「還元剤」が正しいです。この例は還元剤に関係しています。
