# 高校化学 問712
id: 2712
type: single_choice
text: |
  「分子の体積と分子間力の影響に注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "乾電池"
  - "実在気体"
  - "可逆反応"
  - "酸解離定数"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「分子の体積と分子間力の影響に注目すること」という見方が大切なのは実在気体です。したがって、正解は「実在気体」です。
  
  「乾電池」は、その語で大切なのは「使い切りの電池であること」という見方です。
  「実在気体」が正しいです。この見方が大切な語です。
  「可逆反応」は、その語で大切なのは「正反応と逆反応の両方を見ること」という見方です。
  「酸解離定数」は、その語で大切なのは「酸の強さを電離のしやすさで見ること」という見方です。
