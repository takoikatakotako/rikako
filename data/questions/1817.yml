# 化学基礎 問777
id: 1817
type: single_choice
text: |
  「電荷のかたよりがほとんどないこと」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "もとの物質とは別の物質ができる変化である。"
  - "陽子数は同じで中性子数が異なる原子どうしである。"
  - "金属原子が自由電子を介して結び付く結合である。"
  - "分子の中で電荷のかたよりがほとんどない分子である。"
correct: 3
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「電荷のかたよりがほとんどないこと」という見方と最も関係が深い説明は「分子の中で電荷のかたよりがほとんどない分子である。」です。したがって、正解は「分子の中で電荷のかたよりがほとんどない分子である。」です。
  
  「もとの物質とは別の物質ができる変化である。」は、その説明で大切なのは「新しい物質ができること」という見方です。
  「陽子数は同じで中性子数が異なる原子どうしである。」は、その説明で大切なのは「陽子数が同じで中性子数が異なること」という見方です。
  「金属原子が自由電子を介して結び付く結合である。」は、その説明で大切なのは「自由電子が結合を支えること」という見方です。
  「分子の中で電荷のかたよりがほとんどない分子である。」が正しいです。この見方と最も関係が深い説明です。
