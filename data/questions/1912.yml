# 化学基礎 問872
id: 1912
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "イオン結合 / 陽イオンと陰イオンの静電気的な引力による結び付きである。"
  - "同位体 / 金属原子が自由電子を介して結び付く結合である。"
  - "金属結合 / 水溶液中で水素イオンを生じる物質である。"
  - "酸 / 陽子数は同じで中性子数が異なる原子どうしである。"
correct: 0
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「イオン結合 / 陽イオンと陰イオンの静電気的な引力による結び付きである。」です。したがって、正解は「イオン結合 / 陽イオンと陰イオンの静電気的な引力による結び付きである。」です。
  
  「イオン結合 / 陽イオンと陰イオンの静電気的な引力による結び付きである。」が正しいです。用語と説明の対応が合っています。
  「同位体 / 金属原子が自由電子を介して結び付く結合である。」は、用語と説明の対応が合っていません。
  「金属結合 / 水溶液中で水素イオンを生じる物質である。」は、用語と説明の対応が合っていません。
  「酸 / 陽子数は同じで中性子数が異なる原子どうしである。」は、用語と説明の対応が合っていません。
