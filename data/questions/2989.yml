# 高校化学 問989
id: 2989
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "アニリン / 染料の原料になる芳香族アミンを考える場面"
  - "陽極 / 弱酸が一部だけ電離している水溶液を考える場面"
  - "電離平衡 / ネオンやアルゴンが反応しにくい理由を考える場面"
  - "貴ガス / 電気分解で気体が発生する電極側を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「アニリン / 染料の原料になる芳香族アミンを考える場面」です。したがって、正解は「アニリン / 染料の原料になる芳香族アミンを考える場面」です。
  
  「アニリン / 染料の原料になる芳香族アミンを考える場面」が正しいです。用語と場面の対応が合っています。
  「陽極 / 弱酸が一部だけ電離している水溶液を考える場面」は、用語と場面の対応が合っていません。
  「電離平衡 / ネオンやアルゴンが反応しにくい理由を考える場面」は、用語と場面の対応が合っていません。
  「貴ガス / 電気分解で気体が発生する電極側を考える場面」は、用語と場面の対応が合っていません。
