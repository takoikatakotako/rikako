# 高校化学 問293
id: 2293
type: single_choice
text: |
  「アミノ基とカルボキシ基をあわせもつ化合物である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "チンダル現象"
  - "透析"
  - "アミノ酸"
  - "親水コロイド"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  アミノ基とカルボキシ基をあわせもつ化合物である。 に当てはまる語はアミノ酸です。したがって、正解は「アミノ酸」です。
  
  「チンダル現象」は、「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」に当てはまる語です。
  「透析」は、「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」に当てはまる語です。
  「アミノ酸」が正しいです。「アミノ基とカルボキシ基をあわせもつ化合物である。」に当てはまる語です。
  「親水コロイド」は、「水との親和性が高く、比較的安定なコロイドである。」に当てはまる語です。
