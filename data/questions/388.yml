# 令和7年度 ITパスポート 公開問題 問85
id: 388
type: single_choice
text: |
  問題を解いて解答群の中から正解を選ぶ、あるAIシステムがある。このシステムは、1回の学習の過程を経るごとに、学習の過程の前後の比較において、誤り率が5%低下する（前回の誤り率の95%になる）。現在の正解率が30%であるとき、正解率が35%を超えるためには、少なくともあと何回の学習の過程が必要か。
choices:
  - "1"
  - "2"
  - "3"
  - "4"
correct: 1
explanation: |
  この問題の公開解答では「2」が正解とされています。
  
  「1」は公開解答では正解ではありません。
  「2」が公開解答で正解とされています。
  「3」は公開解答では正解ではありません。
  「4」は公開解答では正解ではありません。
