# 化学基礎 問709
id: 1749
type: single_choice
text: |
  「氷が溶けて水になる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "物質の種類が変わらないこと"
  - "色の変化で液性を見分けること"
  - "電池の中で電気的なつり合いを保つこと"
  - "化学が社会や生活に広く役立つこと"
correct: 0
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「氷が溶けて水になる場面」では、「物質の種類が変わらないこと」という見方が大切です。したがって、正解は「物質の種類が変わらないこと」です。
  
  「物質の種類が変わらないこと」が正しいです。この具体例で大切になる見方です。
  「色の変化で液性を見分けること」は、その見方はBTB溶液やフェノールフタレインで液性を調べる場面よりも指示薬と結び付きが強いです。
  「電池の中で電気的なつり合いを保つこと」は、その見方はダニエル電池で二つの水溶液をつなぐ場面よりも塩橋と結び付きが強いです。
  「化学が社会や生活に広く役立つこと」は、その見方は電池、医薬品、素材開発などに化学が生かされる場面よりも化学が拓く世界と結び付きが強いです。
