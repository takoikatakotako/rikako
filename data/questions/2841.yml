# 高校化学 問841
id: 2841
type: single_choice
text: |
  「化学反応によって光が放出される現象である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "ベンゼン環にヒドロキシ基が直接つくこと"
  - "資源を循環させて無駄を減らすこと"
  - "圧力、体積、物質量、温度をまとめて扱うこと"
  - "化学反応のエネルギーが光として出ること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「化学反応によって光が放出される現象である。」を理解する上では、「化学反応のエネルギーが光として出ること」という見方が大切です。したがって、正解は「化学反応のエネルギーが光として出ること」です。
  
  「ベンゼン環にヒドロキシ基が直接つくこと」は、その見方はフェノールに関係します。
  「資源を循環させて無駄を減らすこと」は、その見方は資源の再利用に関係します。
  「圧力、体積、物質量、温度をまとめて扱うこと」は、その見方は理想気体の状態方程式に関係します。
  「化学反応のエネルギーが光として出ること」が正しいです。この説明と結び付きが強い見方です。
