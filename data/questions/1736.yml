# 化学基礎 問696
id: 1736
type: single_choice
text: |
  「放射線を出しながら別の原子へ変わっていく同位体である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "放射線を出す同位体であること"
  - "陽子数が同じで中性子数が異なること"
  - "自由電子が結合を支えること"
  - "水素イオンに注目すること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「放射線を出しながら別の原子へ変わっていく同位体である。」を理解する上では、「放射線を出す同位体であること」という見方が大切です。したがって、正解は「放射線を出す同位体であること」です。
  
  「放射線を出す同位体であること」が正しいです。この説明と結び付きが強い見方です。
  「陽子数が同じで中性子数が異なること」は、その見方は同位体に関係します。
  「自由電子が結合を支えること」は、その見方は金属結合に関係します。
  「水素イオンに注目すること」は、その見方は酸に関係します。
