# 令和7年度 ITパスポート 公開問題 問93
id: 364
type: single_choice
text: |
  情報セキュリティにおける脅威の説明として、適切なものはどれか。
choices:
  - "攻撃者が付け込むことのできる情報システムの弱点"
  - "情報資産が被害に遭う確率と被害規模の組合せ"
  - "情報資産に損害を与える原因となるもの"
  - "情報システムの弱点を利用した攻撃によって被害を受ける可能性"
correct: 2
explanation: |
  この問題の公開解答では「情報資産に損害を与える原因となるもの」が正解とされています。
  
  「攻撃者が付け込むことのできる情報システムの弱点」は公開解答では正解ではありません。
  「情報資産が被害に遭う確率と被害規模の組合せ」は公開解答では正解ではありません。
  「情報資産に損害を与える原因となるもの」が公開解答で正解とされています。
  「情報システムの弱点を利用した攻撃によって被害を受ける可能性」は公開解答では正解ではありません。
