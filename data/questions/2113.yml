# 高校化学 問113
id: 2113
type: single_choice
text: |
  絶対温度と最も関係が深い場面として、適切なものはどれか。
choices:
  - "温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面"
  - "気体の法則で温度をセルシウス温度ではなく K で扱う場面"
  - "飽和溶液で見かけ上変化が止まっている場面"
  - "食塩水の沸点が水より少し高くなることを考える場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  気体の法則で温度をセルシウス温度ではなく K で扱う場面は、絶対温度と結び付きが強い場面です。したがって、正解は「気体の法則で温度をセルシウス温度ではなく K で扱う場面」です。
  
  「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」は、溶解度と結び付きが強い場面です。
  「気体の法則で温度をセルシウス温度ではなく K で扱う場面」が正しいです。これは絶対温度と結び付きが強い場面です。
  「飽和溶液で見かけ上変化が止まっている場面」は、溶解平衡と結び付きが強い場面です。
  「食塩水の沸点が水より少し高くなることを考える場面」は、沸点上昇と結び付きが強い場面です。
