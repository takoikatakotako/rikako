# 化学基礎 問528
id: 1568
type: single_choice
text: |
  「粒子の数をまとめて表すための単位である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "塩酸が水溶液中で水素イオンを生じる場面"
  - "酸化銅から酸素が取れて銅になる場面"
  - "砂糖水が電流をほとんど通さない場面"
  - "6.0×10^23個の粒子をひとまとまりとして数える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「粒子の数をまとめて表すための単位である。」と最も関係が深い場面は「6.0×10^23個の粒子をひとまとまりとして数える場面」です。したがって、正解は「6.0×10^23個の粒子をひとまとまりとして数える場面」です。
  
  「塩酸が水溶液中で水素イオンを生じる場面」は、「水溶液中で水素イオンを生じる物質である。」と結び付きが強い場面です。
  「酸化銅から酸素が取れて銅になる場面」は、「物質が酸素を失う、または電子を受け取る変化である。」と結び付きが強い場面です。
  「砂糖水が電流をほとんど通さない場面」は、「水に溶けても電流をほとんど通さない物質である。」と結び付きが強い場面です。
  「6.0×10^23個の粒子をひとまとまりとして数える場面」が正しいです。この説明と結び付きが強い場面です。
