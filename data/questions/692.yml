# 化学基礎 問25
id: 692
type: single_choice
text: |
  ナトリウム原子 Na がナトリウムイオン Na+ になるときの変化として、最も適切なものはどれか。
choices:
  - "電子を1個失う。"
  - "電子を1個受け取る。"
  - "陽子を1個失う。"
  - "中性子を2個受け取る。"
correct: 0
explanation: |
  この問題は、「陽イオンがどうできるか」を確認する問題です。
  
  ナトリウム原子は、電子を1個失うことで Na+ になります。陽イオンは、電子を失って正の電荷をもつようになった粒子です。したがって、正解は「電子を1個失う」です。
  
  「電子を1個失う」が正しいです。Na は 1 価の陽イオンになりやすいです。
  「電子を1個受け取る」は、Na+ になる変化ではありません。
  「陽子を1個失う」は、元素そのものが変わってしまいます。
  「中性子を2個受け取る」は、Na+ の説明ではありません。
