# 高校化学 問644
id: 2644
type: single_choice
text: |
  「自動車のバッテリーを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "鉛とその化合物を用いた、充電して繰り返し使える電池である。"
  - "少量の酸や塩基を加えても pH が変わりにくい溶液である。"
  - "中心となる金属イオンに配位子が結び付いたイオンである。"
  - "ヒドロキシ基をもつ有機化合物である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「自動車のバッテリーを考える場面」を説明した文として適切なのは「鉛とその化合物を用いた、充電して繰り返し使える電池である。」です。したがって、正解は「鉛とその化合物を用いた、充電して繰り返し使える電池である。」です。
  
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」が正しいです。この具体例を説明した文です。
  「少量の酸や塩基を加えても pH が変わりにくい溶液である。」は、この説明は「血液や実験用の溶液で pH を保ちたい場面」と結び付きが強いです。
  「中心となる金属イオンに配位子が結び付いたイオンである。」は、この説明は「アンモニアを加えると深い青色のイオンができる場面」と結び付きが強いです。
  「ヒドロキシ基をもつ有機化合物である。」は、この説明は「エタノールの性質や利用を考える場面」と結び付きが強いです。
