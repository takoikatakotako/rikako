# 高校化学 問288
id: 2288
type: single_choice
text: |
  「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "不飽和炭化水素"
  - "フェノール"
  - "置換反応"
  - "アルコール"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  ベンゼン環にヒドロキシ基が直接結び付いた化合物である。 に当てはまる語はフェノールです。したがって、正解は「フェノール」です。
  
  「不飽和炭化水素」は、「炭素どうしに二重結合や三重結合をもつ炭化水素である。」に当てはまる語です。
  「フェノール」が正しいです。「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」に当てはまる語です。
  「置換反応」は、「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」に当てはまる語です。
  「アルコール」は、「ヒドロキシ基をもつ有機化合物である。」に当てはまる語です。
