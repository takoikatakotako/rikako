# 化学基礎 問658
id: 1698
type: single_choice
text: |
  「二種類以上の元素が結び付いてできている純物質である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "1Lあたりの物質量で表すこと"
  - "色の変化で液性を見分けること"
  - "複数の元素が結び付いてできること"
  - "電池の中で電気的なつり合いを保つこと"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「二種類以上の元素が結び付いてできている純物質である。」を理解する上では、「複数の元素が結び付いてできること」という見方が大切です。したがって、正解は「複数の元素が結び付いてできること」です。
  
  「1Lあたりの物質量で表すこと」は、その見方はモル濃度に関係します。
  「色の変化で液性を見分けること」は、その見方は指示薬に関係します。
  「複数の元素が結び付いてできること」が正しいです。この説明と結び付きが強い見方です。
  「電池の中で電気的なつり合いを保つこと」は、その見方は塩橋に関係します。
