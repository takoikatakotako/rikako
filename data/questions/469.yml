# 令和7年度 ITパスポート 公開問題 問39
id: 469
type: single_choice
text: |
  ソフトウェア開発モデルであるアジャイルモデルの特徴に関して、次の記述中のa、bに入れる字句の適切な組合せはどれか。
choices:
  - "ジャイルモデルとは、要件を確定してから開発を実施するウォーターフォールモデルのaする形で提唱された、bできるようにソフトウェアを開発するための手法の総称である。"
  - "a bア課題を改善開発工程で生じる種々の変更に迅速に対応イ課題を改善開発工程を順に実施"
  - "特徴を継承開発工程で生じる種々の変更に迅速に対応"
  - "特徴を継承 / 開発工程を順に実施"
correct: 0
explanation: |
  アジャイルモデルは、ウォーターフォールモデルの課題を改善し、開発中の変更に迅速に対応できるようにする考え方です。したがって a=課題を改善、b=開発工程で生じる種々の変更に迅速に対応 のアが正しいです。
  
  「ジャイルモデルとは、要件を確定してから開発を実施するウォーターフォールモデルのaする形で提唱された、bできるようにソフトウェアを開発するための手法の総称である」が正しいです。アジャイルは変更に素早く対応するための開発手法群です。
  「a bア課題を改善開発工程で生じる種々の変更に迅速に対応イ課題を改善開発工程を順に実施」は後半がウォーターフォール的であり、アジャイルの特徴を表していません。
  「特徴を継承開発工程で生じる種々の変更に迅速に対応」は前半が誤りで、単なる継承ではなく課題改善を目的としています。
  「特徴を継承 / 開発工程を順に実施」はアジャイルは工程を順番に固定して進めるモデルではありません。
