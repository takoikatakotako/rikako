# 化学基礎 問587
id: 1627
type: single_choice
text: |
  「マグネシウムが酸素と結び付く場面」を説明した文として、最も適切なものはどれか。
choices:
  - "放射線を出しながら別の原子へ変わっていく同位体である。"
  - "物質が酸素と結び付く、または電子を失う変化である。"
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
  - "もとの物質とは別の物質ができる変化である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「マグネシウムが酸素と結び付く場面」を説明した文として適切なのは「物質が酸素と結び付く、または電子を失う変化である。」です。したがって、正解は「物質が酸素と結び付く、または電子を失う変化である。」です。
  
  「放射線を出しながら別の原子へ変わっていく同位体である。」は、この説明は「医療や年代測定に利用される炭素14を考える場面」と結び付きが強いです。
  「物質が酸素と結び付く、または電子を失う変化である。」が正しいです。この具体例を説明した文です。
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、この説明は「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」と結び付きが強いです。
  「もとの物質とは別の物質ができる変化である。」は、この説明は「鉄がさびて別の物質になる場面」と結び付きが強いです。
