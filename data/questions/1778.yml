# 化学基礎 問738
id: 1778
type: single_choice
text: |
  「酸化銅から酸素が取れて銅になる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "陽子数を表す数であること"
  - "酸素の喪失や電子の受け取りに注目すること"
  - "電気的な引力で結び付くこと"
  - "1Lあたりの物質量で表すこと"
correct: 1
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「酸化銅から酸素が取れて銅になる場面」では、「酸素の喪失や電子の受け取りに注目すること」という見方が大切です。したがって、正解は「酸素の喪失や電子の受け取りに注目すること」です。
  
  「陽子数を表す数であること」は、その見方はナトリウムの陽子数から元素を区別する場面よりも原子番号と結び付きが強いです。
  「酸素の喪失や電子の受け取りに注目すること」が正しいです。この具体例で大切になる見方です。
  「電気的な引力で結び付くこと」は、その見方は塩化ナトリウムが陽イオンと陰イオンの引力でできる場面よりもイオン結合と結び付きが強いです。
  「1Lあたりの物質量で表すこと」は、その見方は1Lの食塩水にどれだけ溶質が溶けているかを表す場面よりもモル濃度と結び付きが強いです。
