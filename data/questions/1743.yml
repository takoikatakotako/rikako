# 化学基礎 問703
id: 1743
type: single_choice
text: |
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "反応する物質とできる物質の関係を式で示すこと"
  - "酸素との結び付きや電子の放出に注目すること"
  - "溶解度の差を利用すること"
  - "水溶液や融解状態で電流を通すこと"
correct: 2
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」では、「溶解度の差を利用すること」という見方が大切です。したがって、正解は「溶解度の差を利用すること」です。
  
  「反応する物質とできる物質の関係を式で示すこと」は、その見方は水素と酸素から水ができる反応を式で表す場面よりも化学反応式と結び付きが強いです。
  「酸素との結び付きや電子の放出に注目すること」は、その見方はマグネシウムが酸素と結び付く場面よりも酸化と結び付きが強いです。
  「溶解度の差を利用すること」が正しいです。この具体例で大切になる見方です。
  「水溶液や融解状態で電流を通すこと」は、その見方は食塩水や塩酸が電流を通す場面よりも電解質と結び付きが強いです。
