# 高校化学 問170
id: 2170
type: single_choice
text: |
  貴ガスと最も関係が深い場面として、適切なものはどれか。
choices:
  - "懐中電灯や時計に入っている電池を考える場面"
  - "スマートフォンやノートパソコンの電池を考える場面"
  - "ネオンやアルゴンが反応しにくい理由を考える場面"
  - "水溶液に電流を流して物質を分解する場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  ネオンやアルゴンが反応しにくい理由を考える場面は、貴ガスと結び付きが強い場面です。したがって、正解は「ネオンやアルゴンが反応しにくい理由を考える場面」です。
  
  「懐中電灯や時計に入っている電池を考える場面」は、乾電池と結び付きが強い場面です。
  「スマートフォンやノートパソコンの電池を考える場面」は、リチウムイオン電池と結び付きが強い場面です。
  「ネオンやアルゴンが反応しにくい理由を考える場面」が正しいです。これは貴ガスと結び付きが強い場面です。
  「水溶液に電流を流して物質を分解する場面」は、電気分解と結び付きが強い場面です。
