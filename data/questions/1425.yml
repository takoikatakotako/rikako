# 化学基礎 問385
id: 1425
type: single_choice
text: |
  電離度と最も関係が深い場面として、適切なものはどれか。
choices:
  - "同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面"
  - "食品の変色や劣化を防ぐためにビタミンCを使う場面"
  - "電池、医薬品、素材開発などに化学が生かされる場面"
  - "水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面は、電離度と結び付きが強い場面です。したがって、正解は「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」です。
  
  「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」が正しいです。これは電離度と結び付きが強い場面です。
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」は、酸化防止剤と結び付きが強い場面です。
  「電池、医薬品、素材開発などに化学が生かされる場面」は、化学が拓く世界と結び付きが強い場面です。
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」は、塩基と結び付きが強い場面です。
