# 高校化学 問131
id: 2131
type: single_choice
text: |
  透析と最も関係が深い場面として、適切なものはどれか。
choices:
  - "血液や実験用の溶液で pH を保ちたい場面"
  - "酢酸が塩酸ほど強く電離しない場面"
  - "どの酸がより電離しやすいかを比べる場面"
  - "コロイド溶液から余分な電解質を取り除く場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  コロイド溶液から余分な電解質を取り除く場面は、透析と結び付きが強い場面です。したがって、正解は「コロイド溶液から余分な電解質を取り除く場面」です。
  
  「血液や実験用の溶液で pH を保ちたい場面」は、緩衝液と結び付きが強い場面です。
  「酢酸が塩酸ほど強く電離しない場面」は、弱酸と結び付きが強い場面です。
  「どの酸がより電離しやすいかを比べる場面」は、酸解離定数と結び付きが強い場面です。
  「コロイド溶液から余分な電解質を取り除く場面」が正しいです。これは透析と結び付きが強い場面です。
