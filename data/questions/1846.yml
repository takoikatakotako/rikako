# 化学基礎 問806
id: 1846
type: single_choice
text: |
  「成分が二種類以上まざっていること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "砂糖水が電流をほとんど通さない場面"
  - "水とエタノールの混合物を沸点の差で分ける場面"
  - "氷が溶けて水になる場面"
  - "空気や食塩水のように複数の物質が混ざったものを考える場面"
correct: 3
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「成分が二種類以上まざっていること」という見方と最も関係が深い場面は「空気や食塩水のように複数の物質が混ざったものを考える場面」です。したがって、正解は「空気や食塩水のように複数の物質が混ざったものを考える場面」です。
  
  「砂糖水が電流をほとんど通さない場面」は、その場面で大切なのは「水溶液でも電流をほとんど通さないこと」という見方です。
  「水とエタノールの混合物を沸点の差で分ける場面」は、その場面で大切なのは「沸点の違いを利用すること」という見方です。
  「氷が溶けて水になる場面」は、その場面で大切なのは「物質の種類が変わらないこと」という見方です。
  「空気や食塩水のように複数の物質が混ざったものを考える場面」が正しいです。この見方と最も関係が深い場面です。
