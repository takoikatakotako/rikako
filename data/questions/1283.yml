# 化学基礎 問243
id: 1283
type: single_choice
text: |
  「砂糖水」に最も関係が深い語として、適切なものはどれか。
choices:
  - "非電解質"
  - "放射性同位体"
  - "炎色反応"
  - "電離度"
correct: 0
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「砂糖水」に最も関係が深いのは非電解質です。したがって、正解は「非電解質」です。
  
  「非電解質」が正しいです。この例は非電解質に関係しています。
  「放射性同位体」は、この例に最も関係が深い語ではありません。
  「炎色反応」は、この例に最も関係が深い語ではありません。
  「電離度」は、この例に最も関係が深い語ではありません。
