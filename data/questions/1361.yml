# 化学基礎 問321
id: 1361
type: single_choice
text: |
  陰イオンについて学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。"
  - "原子や原子団が電子を受け取って負の電荷をもつ粒子である。"
  - "陽イオンと陰イオンの静電気的な引力による結び付きである。"
  - "金属原子が自由電子を介して結び付く結合である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  陰イオンは、原子や原子団が電子を受け取って負の電荷をもつ粒子である。 したがって、正解は「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」です。
  
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」は、指示薬の説明です。
  「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」が正しいです。陰イオンの説明です。
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」は、イオン結合の説明です。
  「金属原子が自由電子を介して結び付く結合である。」は、金属結合の説明です。
