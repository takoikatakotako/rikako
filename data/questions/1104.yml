# 化学基礎 問64
id: 1104
type: single_choice
text: |
  塩化カルシウムの化学式として、最も適切なものはどれか。
choices:
  - "CaCl"
  - "CaCl2"
  - "Ca2Cl"
  - "Ca2Cl2"
correct: 1
explanation: |
  この問題は、「イオンの電荷のつり合いから化学式を考える問題」です。
  
  カルシウムイオンは Ca2+、塩化物イオンは Cl- です。全体の電荷が 0 になるには、Cl- が 2 個必要なので、塩化カルシウムは CaCl2 です。したがって、正解は「CaCl2」です。
  
  「CaCl」は、電荷のつり合いが合いません。
  「CaCl2」が正しいです。Ca2+ と Cl- の電荷がつり合います。
  「Ca2Cl」は、化学式の表し方として適切ではありません。
  「Ca2Cl2」は、比を最も簡単にした表し方ではありません。
