# 化学基礎 問64
id: 1104
type: single_choice
text: |
  塩化カルシウムの化学式として、最も適切なものはどれか。
choices:
  - "CaCl"
  - "CaCl₂"
  - "Ca₂Cl"
  - "Ca₂Cl₂"
correct: 1
explanation: |
  この問題は、「イオンの電荷のつり合いから化学式を考える問題」です。
  
  カルシウムイオンは Ca²⁺、塩化物イオンは Cl⁻ です。全体の電荷が 0 になるには、Cl⁻ が 2 個必要なので、塩化カルシウムは CaCl₂ です。したがって、正解は「CaCl₂」です。
  
  「CaCl」は、電荷のつり合いが合いません。
  「CaCl₂」が正しいです。Ca²⁺ と Cl⁻ の電荷がつり合います。
  「Ca₂Cl」は、化学式の表し方として適切ではありません。
  「Ca₂Cl₂」は、比を最も簡単にした表し方ではありません。
