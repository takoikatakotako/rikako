# 化学基礎 問258
id: 1298
type: single_choice
text: |
  化合物の特徴として、最も適切なものはどれか。
choices:
  - "新しい物質はできない"
  - "新しい物質ができる"
  - "複数の元素が結び付いている"
  - "固体が液体になる"
correct: 2
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  化合物では、「複数の元素が結び付いている」という点が大切です。したがって、正解は「複数の元素が結び付いている」です。
  
  「新しい物質はできない」は、物理変化に関係する特徴です。
  「新しい物質ができる」は、化学変化に関係する特徴です。
  「複数の元素が結び付いている」が正しいです。化合物の特徴を表しています。
  「固体が液体になる」は、融解に関係する特徴です。
