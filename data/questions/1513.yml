# 化学基礎 問473
id: 1513
type: single_choice
text: |
  共有結合を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "色の変化で液性を見分けること"
  - "電子を受け取って負に帯電すること"
  - "電子を共有して結び付くこと"
  - "自由電子が結合を支えること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  共有結合では、「電子を共有して結び付くこと」という見方が大切です。したがって、正解は「電子を共有して結び付くこと」です。
  
  「色の変化で液性を見分けること」は、指示薬に関係する見方です。
  「電子を受け取って負に帯電すること」は、陰イオンに関係する見方です。
  「電子を共有して結び付くこと」が正しいです。共有結合の要点を表しています。
  「自由電子が結合を支えること」は、金属結合に関係する見方です。
