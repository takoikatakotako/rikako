# 化学基礎 問431
id: 1471
type: single_choice
text: |
  「水溶液中で水素イオンを生じる物質である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "化学が拓く世界"
  - "酸"
  - "中和"
  - "電離度"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  水溶液中で水素イオンを生じる物質である。 に当てはまる語は酸です。したがって、正解は「酸」です。
  
  「化学が拓く世界」は、「化学の知識が生活、産業、環境、医療などに役立つという見方である。」に当てはまる語です。
  「酸」が正しいです。「水溶液中で水素イオンを生じる物質である。」に当てはまる語です。
  「中和」は、「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」に当てはまる語です。
  「電離度」は、「溶けた物質のうち、電離してイオンになった割合である。」に当てはまる語です。
