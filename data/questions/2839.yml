# 高校化学 問839
id: 2839
type: single_choice
text: |
  「反応の結果として周囲へ熱を放出する反応である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "カルボン酸とアルコールの組合せでできること"
  - "周囲へ熱を出す反応であること"
  - "植物の体を支える多糖であること"
  - "温度一定で圧力と体積の関係を見ること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「反応の結果として周囲へ熱を放出する反応である。」を理解する上では、「周囲へ熱を出す反応であること」という見方が大切です。したがって、正解は「周囲へ熱を出す反応であること」です。
  
  「カルボン酸とアルコールの組合せでできること」は、その見方はエステルに関係します。
  「周囲へ熱を出す反応であること」が正しいです。この説明と結び付きが強い見方です。
  「植物の体を支える多糖であること」は、その見方はセルロースに関係します。
  「温度一定で圧力と体積の関係を見ること」は、その見方はボイルの法則に関係します。
