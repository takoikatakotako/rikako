# 高校化学 問559
id: 2559
type: single_choice
text: |
  「電離する粒子と電離していない粒子が平衡になっている状態である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酢酸ナトリウム水溶液が塩基性を示す理由を考える場面"
  - "アンモニアが金属イオンに電子対を与える場面"
  - "弱酸が一部だけ電離している水溶液を考える場面"
  - "ホルムアルデヒドやアセトアルデヒドを考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「電離する粒子と電離していない粒子が平衡になっている状態である。」と最も関係が深い場面は「弱酸が一部だけ電離している水溶液を考える場面」です。したがって、正解は「弱酸が一部だけ電離している水溶液を考える場面」です。
  
  「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」は、「塩のイオンが水と反応して溶液の性質を変える現象である。」と結び付きが強い場面です。
  「アンモニアが金属イオンに電子対を与える場面」は、「一方の原子が電子対を与えてできる共有結合である。」と結び付きが強い場面です。
  「弱酸が一部だけ電離している水溶液を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「ホルムアルデヒドやアセトアルデヒドを考える場面」は、「分子の端にアルデヒド基をもつ有機化合物である。」と結び付きが強い場面です。
