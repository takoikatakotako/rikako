# 化学基礎 問908
id: 1948
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "凝固 / ナトリウム原子が電子を1個失って Na+ になる場面"
  - "陽イオン / 酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面"
  - "無極性分子 / 水を冷やして氷にする場面"
  - "化合物 / 水や二酸化炭素のように複数の元素からできた物質を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「化合物 / 水や二酸化炭素のように複数の元素からできた物質を考える場面」です。したがって、正解は「化合物 / 水や二酸化炭素のように複数の元素からできた物質を考える場面」です。
  
  「凝固 / ナトリウム原子が電子を1個失って Na+ になる場面」は、用語と場面の対応が合っていません。
  「陽イオン / 酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」は、用語と場面の対応が合っていません。
  「無極性分子 / 水を冷やして氷にする場面」は、用語と場面の対応が合っていません。
  「化合物 / 水や二酸化炭素のように複数の元素からできた物質を考える場面」が正しいです。用語と場面の対応が合っています。
