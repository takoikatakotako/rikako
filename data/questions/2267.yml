# 高校化学 問267
id: 2267
type: single_choice
text: |
  「周期表1族に属し、水と反応しやすい金属元素の総称である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "アルカリ金属"
  - "燃料電池"
  - "陽極"
  - "ファラデーの法則"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  周期表1族に属し、水と反応しやすい金属元素の総称である。 に当てはまる語はアルカリ金属です。したがって、正解は「アルカリ金属」です。
  
  「アルカリ金属」が正しいです。「周期表1族に属し、水と反応しやすい金属元素の総称である。」に当てはまる語です。
  「燃料電池」は、「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」に当てはまる語です。
  「陽極」は、「電気分解で酸化が起こる電極である。」に当てはまる語です。
  「ファラデーの法則」は、「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」に当てはまる語です。
