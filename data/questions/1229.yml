# 化学基礎 問189
id: 1229
type: single_choice
text: |
  イオン化傾向の例として、最も適切なものはどれか。
choices:
  - "Zn 板と Cu 板を使う電池"
  - "寒天に硝酸カリウムを含ませた塩橋"
  - "食塩水"
  - "亜鉛が銅よりイオンになりやすいこと"
correct: 3
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  亜鉛が銅よりイオンになりやすいことは、イオン化傾向の例です。したがって、正解は「亜鉛が銅よりイオンになりやすいこと」です。
  
  「Zn 板と Cu 板を使う電池」は、ダニエル電池の例として見る方が適切です。
  「寒天に硝酸カリウムを含ませた塩橋」は、塩橋の例として見る方が適切です。
  「食塩水」は、電解質の例として見る方が適切です。
  「亜鉛が銅よりイオンになりやすいこと」が正しいです。これはイオン化傾向の例です。
