# 化学基礎 問855
id: 1895
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "化学が拓く世界 / 一種類の元素だけからできている物質である。"
  - "単体 / 固体が液体にならずに気体になる状態変化である。"
  - "昇華 / 化学の知識が生活、産業、環境、医療などに役立つという見方である。"
  - "純物質 / 一種類の物質だけからできていて、性質が一定である物質である。"
correct: 3
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「純物質 / 一種類の物質だけからできていて、性質が一定である物質である。」です。したがって、正解は「純物質 / 一種類の物質だけからできていて、性質が一定である物質である。」です。
  
  「化学が拓く世界 / 一種類の元素だけからできている物質である。」は、用語と説明の対応が合っていません。
  「単体 / 固体が液体にならずに気体になる状態変化である。」は、用語と説明の対応が合っていません。
  「昇華 / 化学の知識が生活、産業、環境、医療などに役立つという見方である。」は、用語と説明の対応が合っていません。
  「純物質 / 一種類の物質だけからできていて、性質が一定である物質である。」が正しいです。用語と説明の対応が合っています。
