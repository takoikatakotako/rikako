# 化学基礎 問853
id: 1893
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "酸化防止剤 / 一種類の物質だけからできていて、性質が一定である物質である。"
  - "再結晶 / 温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
  - "純物質 / 液体が気体になる状態変化である。"
  - "蒸発 / 食品や物質が酸化して変質するのを防ぐために用いられる物質である。"
correct: 1
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「再結晶 / 温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」です。したがって、正解は「再結晶 / 温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」です。
  
  「酸化防止剤 / 一種類の物質だけからできていて、性質が一定である物質である。」は、用語と説明の対応が合っていません。
  「再結晶 / 温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」が正しいです。用語と説明の対応が合っています。
  「純物質 / 液体が気体になる状態変化である。」は、用語と説明の対応が合っていません。
  「蒸発 / 食品や物質が酸化して変質するのを防ぐために用いられる物質である。」は、用語と説明の対応が合っていません。
