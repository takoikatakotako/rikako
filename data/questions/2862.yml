# 高校化学 問862
id: 2862
type: single_choice
text: |
  「塩のイオンが水と反応して溶液の性質を変える現象である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "塩のイオンが水と反応すること"
  - "圧力一定で体積と絶対温度の関係を見ること"
  - "溶質の粒子が溶媒中に広がること"
  - "半透膜を通る粒子の大きさの違いを利用すること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「塩のイオンが水と反応して溶液の性質を変える現象である。」を理解する上では、「塩のイオンが水と反応すること」という見方が大切です。したがって、正解は「塩のイオンが水と反応すること」です。
  
  「塩のイオンが水と反応すること」が正しいです。この説明と結び付きが強い見方です。
  「圧力一定で体積と絶対温度の関係を見ること」は、その見方はシャルルの法則に関係します。
  「溶質の粒子が溶媒中に広がること」は、その見方は溶解に関係します。
  「半透膜を通る粒子の大きさの違いを利用すること」は、その見方は透析に関係します。
