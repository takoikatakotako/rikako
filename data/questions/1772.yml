# 化学基礎 問732
id: 1772
type: single_choice
text: |
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "物質の種類が変わらないこと"
  - "陽子数と中性子数の合計であること"
  - "電子を共有して結び付くこと"
  - "水酸化物イオンや水素イオンの受け取りに注目すること"
correct: 3
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」では、「水酸化物イオンや水素イオンの受け取りに注目すること」という見方が大切です。したがって、正解は「水酸化物イオンや水素イオンの受け取りに注目すること」です。
  
  「物質の種類が変わらないこと」は、その見方は氷が溶けて水になる場面よりも物理変化と結び付きが強いです。
  「陽子数と中性子数の合計であること」は、その見方は炭素12で陽子数と中性子数の合計を見る場面よりも質量数と結び付きが強いです。
  「電子を共有して結び付くこと」は、その見方は水素原子どうしが電子を共有して H2 になる場面よりも共有結合と結び付きが強いです。
  「水酸化物イオンや水素イオンの受け取りに注目すること」が正しいです。この具体例で大切になる見方です。
