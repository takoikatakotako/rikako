# 高校化学 問539
id: 2539
type: single_choice
text: |
  「反応の結果として周囲へ熱を放出する反応である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "植物が光を受けてデンプンなどをつくる場面"
  - "二酸化マンガンを加えると過酸化水素水の分解が速くなる場面"
  - "燃焼や中和で容器が温かくなる場面"
  - "アンモニア水が強塩基ほど完全には電離しない場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「反応の結果として周囲へ熱を放出する反応である。」と最も関係が深い場面は「燃焼や中和で容器が温かくなる場面」です。したがって、正解は「燃焼や中和で容器が温かくなる場面」です。
  
  「植物が光を受けてデンプンなどをつくる場面」は、「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」と結び付きが強い場面です。
  「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」は、「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」と結び付きが強い場面です。
  「燃焼や中和で容器が温かくなる場面」が正しいです。この説明と結び付きが強い場面です。
  「アンモニア水が強塩基ほど完全には電離しない場面」は、「水溶液中で一部だけ電離する塩基である。」と結び付きが強い場面です。
