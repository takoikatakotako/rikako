# 高校化学 問351
id: 2351
type: single_choice
text: |
  「同じ反応でも条件によって進み方が変わることを比べる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "反応熱"
  - "反応速度"
  - "ヘスの法則"
  - "発熱反応"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  同じ反応でも条件によって進み方が変わることを比べる場面 と最も関係が深いのは反応速度です。したがって、正解は「反応速度」です。
  
  「反応熱」は、「物質を燃やしたときに熱が出ることを考える場面」と結び付きが強い語です。
  「反応速度」が正しいです。この具体例と最も関係が深い語です。
  「ヘスの法則」は、「複数の反応式を組み合わせて全体の反応熱を求める場面」と結び付きが強い語です。
  「発熱反応」は、「燃焼や中和で容器が温かくなる場面」と結び付きが強い語です。
