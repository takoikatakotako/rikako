# 高校化学 問576
id: 2576
type: single_choice
text: |
  「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "エチレンやアセチレンの反応性を考える場面"
  - "衣類やロープに使われる合成繊維を考える場面"
  - "水やエタノールの沸点の違いを考える場面"
  - "さびや鉄鋼の利用を考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」と最も関係が深い場面は「さびや鉄鋼の利用を考える場面」です。したがって、正解は「さびや鉄鋼の利用を考える場面」です。
  
  「エチレンやアセチレンの反応性を考える場面」は、「炭素どうしに二重結合や三重結合をもつ炭化水素である。」と結び付きが強い場面です。
  「衣類やロープに使われる合成繊維を考える場面」は、「アミド結合をもつ合成繊維の代表的な高分子化合物である。」と結び付きが強い場面です。
  「水やエタノールの沸点の違いを考える場面」は、「分子どうしの間にはたらく比較的弱い引力である。」と結び付きが強い場面です。
  「さびや鉄鋼の利用を考える場面」が正しいです。この説明と結び付きが強い場面です。
