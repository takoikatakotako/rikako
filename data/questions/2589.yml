# 高校化学 問589
id: 2589
type: single_choice
text: |
  「ベンゼン環にアミノ基が直接結び付いた化合物である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "染料の原料になる芳香族アミンを考える場面"
  - "酵素や筋肉の主成分を考える場面"
  - "水が沸騰し始める温度を考える場面"
  - "食塩や金属の規則正しい並び方を考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「ベンゼン環にアミノ基が直接結び付いた化合物である。」と最も関係が深い場面は「染料の原料になる芳香族アミンを考える場面」です。したがって、正解は「染料の原料になる芳香族アミンを考える場面」です。
  
  「染料の原料になる芳香族アミンを考える場面」が正しいです。この説明と結び付きが強い場面です。
  「酵素や筋肉の主成分を考える場面」は、「多数のアミノ酸がつながってできた天然高分子化合物である。」と結び付きが強い場面です。
  「水が沸騰し始める温度を考える場面」は、「液体の蒸気圧が外圧に等しくなる温度である。」と結び付きが強い場面です。
  「食塩や金属の規則正しい並び方を考える場面」は、「結晶の中で粒子が規則正しく並んだ構造である。」と結び付きが強い場面です。
