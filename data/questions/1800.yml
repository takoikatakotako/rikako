# 化学基礎 問760
id: 1800
type: single_choice
text: |
  「新しい物質ができること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "二つの溶液の電気的なつり合いを保つための部分である。"
  - "化学の知識が生活、産業、環境、医療などに役立つという見方である。"
  - "もとの物質とは別の物質ができる変化である。"
  - "一種類の元素だけからできている物質である。"
correct: 2
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「新しい物質ができること」という見方と最も関係が深い説明は「もとの物質とは別の物質ができる変化である。」です。したがって、正解は「もとの物質とは別の物質ができる変化である。」です。
  
  「二つの溶液の電気的なつり合いを保つための部分である。」は、その説明で大切なのは「電池の中で電気的なつり合いを保つこと」という見方です。
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」は、その説明で大切なのは「化学が社会や生活に広く役立つこと」という見方です。
  「もとの物質とは別の物質ができる変化である。」が正しいです。この見方と最も関係が深い説明です。
  「一種類の元素だけからできている物質である。」は、その説明で大切なのは「一種類の元素だけからできること」という見方です。
