# 高校化学 問346
id: 2346
type: single_choice
text: |
  「水素を使って発電し、水を生じる仕組みを考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "燃料電池"
  - "アンモニア合成"
  - "水のイオン積"
  - "塩の加水分解"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  水素を使って発電し、水を生じる仕組みを考える場面 と最も関係が深いのは燃料電池です。したがって、正解は「燃料電池」です。
  
  「燃料電池」が正しいです。この具体例と最も関係が深い語です。
  「アンモニア合成」は、「高圧や触媒を利用してアンモニアを得る場面」と結び付きが強い語です。
  「水のイオン積」は、「中性の水で H+ と OH- の関係を考える場面」と結び付きが強い語です。
  「塩の加水分解」は、「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」と結び付きが強い語です。
