# 高校化学 問193
id: 2193
type: single_choice
text: |
  アミノ酸と最も関係が深い場面として、適切なものはどれか。
choices:
  - "飽和溶液で見かけ上変化が止まっている場面"
  - "グリシンやアラニンの構造を考える場面"
  - "食塩水の沸点が水より少し高くなることを考える場面"
  - "薄い溶液側から濃い溶液側へ水が移動する場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  グリシンやアラニンの構造を考える場面は、アミノ酸と結び付きが強い場面です。したがって、正解は「グリシンやアラニンの構造を考える場面」です。
  
  「飽和溶液で見かけ上変化が止まっている場面」は、溶解平衡と結び付きが強い場面です。
  「グリシンやアラニンの構造を考える場面」が正しいです。これはアミノ酸と結び付きが強い場面です。
  「食塩水の沸点が水より少し高くなることを考える場面」は、沸点上昇と結び付きが強い場面です。
  「薄い溶液側から濃い溶液側へ水が移動する場面」は、浸透圧と結び付きが強い場面です。
