# 高校化学 問491
id: 2491
type: single_choice
text: |
  PETを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "多重結合をもつこと"
  - "もとの一部が別のものに置き換わること"
  - "ポリエステルの一種で再利用もしやすいこと"
  - "ヒドロキシ基をもつこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  PETでは、「ポリエステルの一種で再利用もしやすいこと」という見方が大切です。したがって、正解は「ポリエステルの一種で再利用もしやすいこと」です。
  
  「多重結合をもつこと」は、不飽和炭化水素に関係する見方です。
  「もとの一部が別のものに置き換わること」は、置換反応に関係する見方です。
  「ポリエステルの一種で再利用もしやすいこと」が正しいです。PETの要点を表しています。
  「ヒドロキシ基をもつこと」は、アルコールに関係する見方です。
