# 化学基礎 問780
id: 1820
type: single_choice
text: |
  「反応する物質とできる物質の関係を式で示すこと」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "液体が固体に変わる状態変化である。"
  - "原子や原子団が電子を失って正の電荷をもつ粒子である。"
  - "化学変化を、物質の種類と量の関係が分かるように表した式である。"
  - "分子の中で電荷のかたよりがほとんどない分子である。"
correct: 2
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「反応する物質とできる物質の関係を式で示すこと」という見方と最も関係が深い説明は「化学変化を、物質の種類と量の関係が分かるように表した式である。」です。したがって、正解は「化学変化を、物質の種類と量の関係が分かるように表した式である。」です。
  
  「液体が固体に変わる状態変化である。」は、その説明で大切なのは「液体から固体への変化であること」という見方です。
  「原子や原子団が電子を失って正の電荷をもつ粒子である。」は、その説明で大切なのは「電子を失って正に帯電すること」という見方です。
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」が正しいです。この見方と最も関係が深い説明です。
  「分子の中で電荷のかたよりがほとんどない分子である。」は、その説明で大切なのは「電荷のかたよりがほとんどないこと」という見方です。
