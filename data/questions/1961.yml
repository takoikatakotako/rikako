# 化学基礎 問921
id: 1961
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "陰イオン / 塩素原子が電子を1個受け取って Cl- になる場面"
  - "極性分子 / 塩酸と水酸化ナトリウム水溶液を混ぜる場面"
  - "中和 / 水素や炭素が相手から酸素を奪う場面"
  - "還元剤 / 水分子で電荷のかたよりを考える場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「陰イオン / 塩素原子が電子を1個受け取って Cl- になる場面」です。したがって、正解は「陰イオン / 塩素原子が電子を1個受け取って Cl- になる場面」です。
  
  「陰イオン / 塩素原子が電子を1個受け取って Cl- になる場面」が正しいです。用語と場面の対応が合っています。
  「極性分子 / 塩酸と水酸化ナトリウム水溶液を混ぜる場面」は、用語と場面の対応が合っていません。
  「中和 / 水素や炭素が相手から酸素を奪う場面」は、用語と場面の対応が合っていません。
  「還元剤 / 水分子で電荷のかたよりを考える場面」は、用語と場面の対応が合っていません。
