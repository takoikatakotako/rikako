# 化学基礎 問67
id: 1107
type: single_choice
text: |
  イオン結晶がもろく割れやすい理由として、最も適切なものはどれか。
choices:
  - "ずれると同じ符号のイオンどうしが近付き、反発しやすくなるから。"
  - "イオンが全く存在しないから。"
  - "どの方向にも完全にやわらかいから。"
  - "必ず液体だから。"
correct: 0
explanation: |
  この問題は、「イオン結晶のもろさの理由」を考える問題です。
  
  イオン結晶では、少しずれると同じ符号のイオンどうしが近付き、強く反発して割れやすくなります。したがって、正解は「ずれると同じ符号のイオンどうしが近付き、反発しやすくなるから」です。
  
  「ずれると同じ符号のイオンどうしが近付き、反発しやすくなるから」が正しいです。
  「イオンが全く存在しないから」は、適切ではありません。
  「どの方向にも完全にやわらかいから」は、適切ではありません。
  「必ず液体だから」は、適切ではありません。
