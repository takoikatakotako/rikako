# 化学基礎 問117
id: 1157
type: single_choice
text: |
  同位体についての説明として、最も適切なものはどれか。
choices:
  - "陽子の数が同じで、中性子の数が異なる原子どうしである。"
  - "元素の性質が周期表の並びに応じて規則的に変化することをいう。"
  - "原子のいちばん外側の電子殻にある電子で、化学的な性質に強く関わる。"
  - "電子を失って正の電荷をもつ粒子である。"
correct: 0
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  同位体は、陽子の数が同じで、中性子の数が異なる原子どうしである。したがって、正解は「陽子の数が同じで、中性子の数が異なる原子どうしである。」です。
  
  「陽子の数が同じで、中性子の数が異なる原子どうしである。」が正しいです。同位体の説明です。
  「元素の性質が周期表の並びに応じて規則的に変化することをいう。」は、周期律の説明です。
  「原子のいちばん外側の電子殻にある電子で、化学的な性質に強く関わる。」は、最外殻電子の説明です。
  「電子を失って正の電荷をもつ粒子である。」は、陽イオンの説明です。
