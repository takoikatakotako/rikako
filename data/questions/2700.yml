# 高校化学 問700
id: 2700
type: single_choice
text: |
  「再生可能エネルギーや新素材の開発を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。"
  - "原子が共有結合で三次元的に結び付いた結晶である。"
  - "溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。"
  - "反応の結果として周囲へ熱を放出する反応である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「再生可能エネルギーや新素材の開発を考える場面」を説明した文として適切なのは「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」です。したがって、正解は「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」です。
  
  「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」が正しいです。この具体例を説明した文です。
  「原子が共有結合で三次元的に結び付いた結晶である。」は、この説明は「ダイヤモンドや二酸化ケイ素の硬さを考える場面」と結び付きが強いです。
  「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」は、この説明は「牛乳やゼラチン溶液のような見た目の系を考える場面」と結び付きが強いです。
  「反応の結果として周囲へ熱を放出する反応である。」は、この説明は「燃焼や中和で容器が温かくなる場面」と結び付きが強いです。
