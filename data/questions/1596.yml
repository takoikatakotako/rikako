# 化学基礎 問556
id: 1596
type: single_choice
text: |
  「空気や食塩水のように複数の物質が混ざったものを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "原子核の中にある陽子の数を表す数である。"
  - "陽イオンと陰イオンの静電気的な引力による結び付きである。"
  - "二種類以上の物質が混ざってできている物質である。"
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「空気や食塩水のように複数の物質が混ざったものを考える場面」を説明した文として適切なのは「二種類以上の物質が混ざってできている物質である。」です。したがって、正解は「二種類以上の物質が混ざってできている物質である。」です。
  
  「原子核の中にある陽子の数を表す数である。」は、この説明は「ナトリウムの陽子数から元素を区別する場面」と結び付きが強いです。
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」は、この説明は「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」と結び付きが強いです。
  「二種類以上の物質が混ざってできている物質である。」が正しいです。この具体例を説明した文です。
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」は、この説明は「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」と結び付きが強いです。
