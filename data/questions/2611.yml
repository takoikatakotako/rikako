# 高校化学 問611
id: 2611
type: single_choice
text: |
  「酸素と窒素が混ざった気体の圧力を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。"
  - "反応の結果として周囲へ熱を放出する反応である。"
  - "電気分解で生じる物質の量は流れた電気量に比例するという法則である。"
  - "混合気体の全圧は各気体の分圧の和になるという法則である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「酸素と窒素が混ざった気体の圧力を考える場面」を説明した文として適切なのは「混合気体の全圧は各気体の分圧の和になるという法則である。」です。したがって、正解は「混合気体の全圧は各気体の分圧の和になるという法則である。」です。
  
  「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」は、この説明は「牛乳やゼラチン溶液のような見た目の系を考える場面」と結び付きが強いです。
  「反応の結果として周囲へ熱を放出する反応である。」は、この説明は「燃焼や中和で容器が温かくなる場面」と結び付きが強いです。
  「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」は、この説明は「流した電流が大きいほど析出量が増える場面」と結び付きが強いです。
  「混合気体の全圧は各気体の分圧の和になるという法則である。」が正しいです。この具体例を説明した文です。
