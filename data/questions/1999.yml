# 化学基礎 問959
id: 1999
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "陽イオン / 電荷のかたよりがほとんどないこと"
  - "物理変化 / 物質の種類が変わらないこと"
  - "無極性分子 / 酸性と塩基性の強さを数で見ること"
  - "pH / 電子を失って正に帯電すること"
correct: 1
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「物理変化 / 物質の種類が変わらないこと」です。したがって、正解は「物理変化 / 物質の種類が変わらないこと」です。
  
  「陽イオン / 電荷のかたよりがほとんどないこと」は、用語と要点の対応が合っていません。
  「物理変化 / 物質の種類が変わらないこと」が正しいです。用語と要点の対応が合っています。
  「無極性分子 / 酸性と塩基性の強さを数で見ること」は、用語と要点の対応が合っていません。
  「pH / 電子を失って正に帯電すること」は、用語と要点の対応が合っていません。
