# 高校化学 問281
id: 2281
type: single_choice
text: |
  「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "炎色反応"
  - "銅"
  - "置換反応"
  - "資源の再利用"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  分子中の原子や原子団が別の原子や原子団に置き換わる反応である。 に当てはまる語は置換反応です。したがって、正解は「置換反応」です。
  
  「炎色反応」は、「金属元素を炎に入れたときに特有の色を示す反応である。」に当てはまる語です。
  「銅」は、「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」に当てはまる語です。
  「置換反応」が正しいです。「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」に当てはまる語です。
  「資源の再利用」は、「使い終わった資源や製品を回収し、再び利用する考え方である。」に当てはまる語です。
