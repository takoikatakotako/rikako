# 高校化学 問713
id: 2713
type: single_choice
text: |
  「0 K を基準に温度を考えること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "鉛蓄電池"
  - "化学平衡"
  - "絶対温度"
  - "塩基解離定数"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「0 K を基準に温度を考えること」という見方が大切なのは絶対温度です。したがって、正解は「絶対温度」です。
  
  「鉛蓄電池」は、その語で大切なのは「充電して再び使えること」という見方です。
  「化学平衡」は、その語で大切なのは「反応が止まるのではなく速さがつり合うこと」という見方です。
  「絶対温度」が正しいです。この見方が大切な語です。
  「塩基解離定数」は、その語で大切なのは「塩基の強さを電離のしやすさで見ること」という見方です。
