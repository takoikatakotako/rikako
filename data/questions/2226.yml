# 高校化学 問226
id: 2226
type: single_choice
text: |
  「溶液の凝固点が純粋な溶媒より低くなる現象である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "塩の加水分解"
  - "弱塩基"
  - "塩基解離定数"
  - "凝固点降下"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  溶液の凝固点が純粋な溶媒より低くなる現象である。 に当てはまる語は凝固点降下です。したがって、正解は「凝固点降下」です。
  
  「塩の加水分解」は、「塩のイオンが水と反応して溶液の性質を変える現象である。」に当てはまる語です。
  「弱塩基」は、「水溶液中で一部だけ電離する塩基である。」に当てはまる語です。
  「塩基解離定数」は、「塩基の電離のしやすさを表す定数である。」に当てはまる語です。
  「凝固点降下」が正しいです。「溶液の凝固点が純粋な溶媒より低くなる現象である。」に当てはまる語です。
