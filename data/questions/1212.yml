# 化学基礎 問172
id: 1212
type: single_choice
text: |
  イオン結合の例として、最も適切なものはどれか。
choices:
  - "水分子 H2O の結合"
  - "銅 Cu の結合"
  - "塩化ナトリウム NaCl"
  - "二酸化炭素 CO2 の分子"
correct: 2
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  塩化ナトリウム NaClは、イオン結合の例です。したがって、正解は「塩化ナトリウム NaCl」です。
  
  「水分子 H2O の結合」は、共有結合の例として見る方が適切です。
  「銅 Cu の結合」は、金属結合の例として見る方が適切です。
  「塩化ナトリウム NaCl」が正しいです。これはイオン結合の例です。
  「二酸化炭素 CO2 の分子」は、分子の例として見る方が適切です。
