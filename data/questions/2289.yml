# 高校化学 問289
id: 2289
type: single_choice
text: |
  「ベンゼン環にアミノ基が直接結び付いた化合物である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "付加反応"
  - "異性体"
  - "アニリン"
  - "アルデヒド"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  ベンゼン環にアミノ基が直接結び付いた化合物である。 に当てはまる語はアニリンです。したがって、正解は「アニリン」です。
  
  「付加反応」は、「多重結合に原子や原子団が加わる反応である。」に当てはまる語です。
  「異性体」は、「分子式は同じでも構造が異なる化合物どうしである。」に当てはまる語です。
  「アニリン」が正しいです。「ベンゼン環にアミノ基が直接結び付いた化合物である。」に当てはまる語です。
  「アルデヒド」は、「分子の端にアルデヒド基をもつ有機化合物である。」に当てはまる語です。
