# 高校化学 問744
id: 2744
type: single_choice
text: |
  「充電して再び使えること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "炎色反応"
  - "鉛蓄電池"
  - "エステル"
  - "セルロース"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「充電して再び使えること」という見方が大切なのは鉛蓄電池です。したがって、正解は「鉛蓄電池」です。
  
  「炎色反応」は、その語で大切なのは「金属元素ごとに炎の色が異なること」という見方です。
  「鉛蓄電池」が正しいです。この見方が大切な語です。
  「エステル」は、その語で大切なのは「カルボン酸とアルコールの組合せでできること」という見方です。
  「セルロース」は、その語で大切なのは「植物の体を支える多糖であること」という見方です。
