# 高校化学 問213
id: 2213
type: single_choice
text: |
  「絶対零度を基準にした温度で、単位は K で表す。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "浸透圧"
  - "チンダル現象"
  - "絶対温度"
  - "透析"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  絶対零度を基準にした温度で、単位は K で表す。 に当てはまる語は絶対温度です。したがって、正解は「絶対温度」です。
  
  「浸透圧」は、「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」に当てはまる語です。
  「チンダル現象」は、「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」に当てはまる語です。
  「絶対温度」が正しいです。「絶対零度を基準にした温度で、単位は K で表す。」に当てはまる語です。
  「透析」は、「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」に当てはまる語です。
