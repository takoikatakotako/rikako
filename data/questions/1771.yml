# 化学基礎 問731
id: 1771
type: single_choice
text: |
  「塩酸が水溶液中で水素イオンを生じる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "複数の元素が結び付いてできること"
  - "陽子数を表す数であること"
  - "水素イオンに注目すること"
  - "電気的な引力で結び付くこと"
correct: 2
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「塩酸が水溶液中で水素イオンを生じる場面」では、「水素イオンに注目すること」という見方が大切です。したがって、正解は「水素イオンに注目すること」です。
  
  「複数の元素が結び付いてできること」は、その見方は水や二酸化炭素のように複数の元素からできた物質を考える場面よりも化合物と結び付きが強いです。
  「陽子数を表す数であること」は、その見方はナトリウムの陽子数から元素を区別する場面よりも原子番号と結び付きが強いです。
  「水素イオンに注目すること」が正しいです。この具体例で大切になる見方です。
  「電気的な引力で結び付くこと」は、その見方は塩化ナトリウムが陽イオンと陰イオンの引力でできる場面よりもイオン結合と結び付きが強いです。
