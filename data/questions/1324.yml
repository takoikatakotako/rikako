# 化学基礎 問284
id: 1324
type: single_choice
text: |
  pHの特徴として、最も適切なものはどれか。
choices:
  - "酸性やアルカリ性の強さの目安"
  - "電子を失う"
  - "電子を受け取る"
  - "相手から電子を受け取る"
correct: 0
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  pHでは、「酸性やアルカリ性の強さの目安」という点が大切です。したがって、正解は「酸性やアルカリ性の強さの目安」です。
  
  「酸性やアルカリ性の強さの目安」が正しいです。pHの特徴を表しています。
  「電子を失う」は、酸化に関係する特徴です。
  「電子を受け取る」は、還元に関係する特徴です。
  「相手から電子を受け取る」は、酸化剤に関係する特徴です。
