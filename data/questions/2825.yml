# 高校化学 問825
id: 2825
type: single_choice
text: |
  「溶液の沸点が純粋な溶媒より高くなる現象である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "金属イオンと配位子の組合せに注目すること"
  - "ヒドロキシ基をもつこと"
  - "アミノ酸どうしをつなぐ結合であること"
  - "蒸気圧降下の結果として沸点が上がること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「溶液の沸点が純粋な溶媒より高くなる現象である。」を理解する上では、「蒸気圧降下の結果として沸点が上がること」という見方が大切です。したがって、正解は「蒸気圧降下の結果として沸点が上がること」です。
  
  「金属イオンと配位子の組合せに注目すること」は、その見方は錯イオンに関係します。
  「ヒドロキシ基をもつこと」は、その見方はアルコールに関係します。
  「アミノ酸どうしをつなぐ結合であること」は、その見方はペプチド結合に関係します。
  「蒸気圧降下の結果として沸点が上がること」が正しいです。この説明と結び付きが強い見方です。
