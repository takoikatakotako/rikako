# 高校化学 問665
id: 2665
type: single_choice
text: |
  「どの酸がより電離しやすいかを比べる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "分子式は同じでも構造が異なる化合物どうしである。"
  - "酸の電離のしやすさを表す定数である。"
  - "アミノ基とカルボキシ基をあわせもつ化合物である。"
  - "気液平衡にあるとき、気体が示す圧力である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「どの酸がより電離しやすいかを比べる場面」を説明した文として適切なのは「酸の電離のしやすさを表す定数である。」です。したがって、正解は「酸の電離のしやすさを表す定数である。」です。
  
  「分子式は同じでも構造が異なる化合物どうしである。」は、この説明は「ブタンとイソブタンを比べる場面」と結び付きが強いです。
  「酸の電離のしやすさを表す定数である。」が正しいです。この具体例を説明した文です。
  「アミノ基とカルボキシ基をあわせもつ化合物である。」は、この説明は「グリシンやアラニンの構造を考える場面」と結び付きが強いです。
  「気液平衡にあるとき、気体が示す圧力である。」は、この説明は「ふたをした容器の中で液体の上にたまる蒸気を考える場面」と結び付きが強いです。
