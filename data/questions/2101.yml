# 高校化学 問101
id: 2101
type: single_choice
text: |
  分子間力と最も関係が深い場面として、適切なものはどれか。
choices:
  - "温めた風船がふくらみやすくなる場面"
  - "水やエタノールの沸点の違いを考える場面"
  - "酸素と窒素が混ざった気体の圧力を考える場面"
  - "気体の法則で温度をセルシウス温度ではなく K で扱う場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  水やエタノールの沸点の違いを考える場面は、分子間力と結び付きが強い場面です。したがって、正解は「水やエタノールの沸点の違いを考える場面」です。
  
  「温めた風船がふくらみやすくなる場面」は、シャルルの法則と結び付きが強い場面です。
  「水やエタノールの沸点の違いを考える場面」が正しいです。これは分子間力と結び付きが強い場面です。
  「酸素と窒素が混ざった気体の圧力を考える場面」は、分圧の法則と結び付きが強い場面です。
  「気体の法則で温度をセルシウス温度ではなく K で扱う場面」は、絶対温度と結び付きが強い場面です。
