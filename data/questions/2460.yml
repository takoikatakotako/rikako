# 高校化学 問460
id: 2460
type: single_choice
text: |
  水のイオン積を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "半透膜を通る粒子の大きさの違いを利用すること"
  - "水となじみやすく安定しやすいこと"
  - "時間あたりにどれだけ変化するかを見ること"
  - "H+ と OH- の積が一定であること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  水のイオン積では、「H+ と OH- の積が一定であること」という見方が大切です。したがって、正解は「H+ と OH- の積が一定であること」です。
  
  「半透膜を通る粒子の大きさの違いを利用すること」は、透析に関係する見方です。
  「水となじみやすく安定しやすいこと」は、親水コロイドに関係する見方です。
  「時間あたりにどれだけ変化するかを見ること」は、反応速度に関係する見方です。
  「H+ と OH- の積が一定であること」が正しいです。水のイオン積の要点を表しています。
