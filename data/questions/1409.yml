# 化学基礎 問369
id: 1409
type: single_choice
text: |
  最外殻電子と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
  - "ナトリウム原子が電子を1個失って Na+ になる場面"
  - "塩化ナトリウムが陽イオンと陰イオンの引力でできる場面"
  - "金属中で自由電子が動けるため電気を通すことを考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  ナトリウムが電子を1個失いやすい理由を考える場面は、最外殻電子と結び付きが強い場面です。したがって、正解は「ナトリウムが電子を1個失いやすい理由を考える場面」です。
  
  「ナトリウムが電子を1個失いやすい理由を考える場面」が正しいです。これは最外殻電子と結び付きが強い場面です。
  「ナトリウム原子が電子を1個失って Na+ になる場面」は、陽イオンと結び付きが強い場面です。
  「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」は、イオン結合と結び付きが強い場面です。
  「金属中で自由電子が動けるため電気を通すことを考える場面」は、金属結合と結び付きが強い場面です。
