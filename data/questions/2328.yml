# 高校化学 問328
id: 2328
type: single_choice
text: |
  「牛乳やゼラチン溶液のような見た目の系を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "溶解平衡"
  - "沸点上昇"
  - "コロイド"
  - "浸透圧"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  牛乳やゼラチン溶液のような見た目の系を考える場面 と最も関係が深いのはコロイドです。したがって、正解は「コロイド」です。
  
  「溶解平衡」は、「飽和溶液で見かけ上変化が止まっている場面」と結び付きが強い語です。
  「沸点上昇」は、「食塩水の沸点が水より少し高くなることを考える場面」と結び付きが強い語です。
  「コロイド」が正しいです。この具体例と最も関係が深い語です。
  「浸透圧」は、「薄い溶液側から濃い溶液側へ水が移動する場面」と結び付きが強い語です。
