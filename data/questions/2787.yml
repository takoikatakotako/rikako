# 高校化学 問787
id: 2787
type: single_choice
text: |
  「ベンゼン環をもつこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "ベンゼン"
  - "金属結晶"
  - "チンダル現象"
  - "吸熱反応"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「ベンゼン環をもつこと」という見方が大切なのはベンゼンです。したがって、正解は「ベンゼン」です。
  
  「ベンゼン」が正しいです。この見方が大切な語です。
  「金属結晶」は、その語で大切なのは「自由電子が性質に関係すること」という見方です。
  「チンダル現象」は、その語で大切なのは「コロイドが光を散乱すること」という見方です。
  「吸熱反応」は、その語で大切なのは「周囲から熱を受け取る反応であること」という見方です。
