# 化学基礎 問366
id: 1406
type: single_choice
text: |
  質量数と最も関係が深い場面として、適切なものはどれか。
choices:
  - "炭素12と炭素14を比べる場面"
  - "炭素12で陽子数と中性子数の合計を見る場面"
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
  - "塩素原子が電子を1個受け取って Cl- になる場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  炭素12で陽子数と中性子数の合計を見る場面は、質量数と結び付きが強い場面です。したがって、正解は「炭素12で陽子数と中性子数の合計を見る場面」です。
  
  「炭素12と炭素14を比べる場面」は、同位体と結び付きが強い場面です。
  「炭素12で陽子数と中性子数の合計を見る場面」が正しいです。これは質量数と結び付きが強い場面です。
  「ナトリウムが電子を1個失いやすい理由を考える場面」は、最外殻電子と結び付きが強い場面です。
  「塩素原子が電子を1個受け取って Cl- になる場面」は、陰イオンと結び付きが強い場面です。
