# 化学基礎 問858
id: 1898
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "再結晶 / もとの物質とは別の物質ができる変化である。"
  - "化学変化 / 陽子数は同じで中性子数が異なる原子どうしである。"
  - "化合物 / 二種類以上の元素が結び付いてできている純物質である。"
  - "同位体 / 温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
correct: 2
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「化合物 / 二種類以上の元素が結び付いてできている純物質である。」です。したがって、正解は「化合物 / 二種類以上の元素が結び付いてできている純物質である。」です。
  
  「再結晶 / もとの物質とは別の物質ができる変化である。」は、用語と説明の対応が合っていません。
  「化学変化 / 陽子数は同じで中性子数が異なる原子どうしである。」は、用語と説明の対応が合っていません。
  「化合物 / 二種類以上の元素が結び付いてできている純物質である。」が正しいです。用語と説明の対応が合っています。
  「同位体 / 温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、用語と説明の対応が合っていません。
