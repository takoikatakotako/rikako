# 化学基礎 問468
id: 1508
type: single_choice
text: |
  周期律を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "複数の元素が結び付いてできること"
  - "性質が周期的にくり返されること"
  - "新しい物質ができること"
  - "1Lあたりの物質量で表すこと"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  周期律では、「性質が周期的にくり返されること」という見方が大切です。したがって、正解は「性質が周期的にくり返されること」です。
  
  「複数の元素が結び付いてできること」は、化合物に関係する見方です。
  「性質が周期的にくり返されること」が正しいです。周期律の要点を表しています。
  「新しい物質ができること」は、化学変化に関係する見方です。
  「1Lあたりの物質量で表すこと」は、モル濃度に関係する見方です。
