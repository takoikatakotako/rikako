# 高校化学 問481
id: 2481
type: single_choice
text: |
  置換反応を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "もとの一部が別のものに置き換わること"
  - "ベンゼン環にアミノ基が直接つくこと"
  - "ポリエステルの一種で再利用もしやすいこと"
  - "アミノ基とカルボキシ基をあわせもつこと"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  置換反応では、「もとの一部が別のものに置き換わること」という見方が大切です。したがって、正解は「もとの一部が別のものに置き換わること」です。
  
  「もとの一部が別のものに置き換わること」が正しいです。置換反応の要点を表しています。
  「ベンゼン環にアミノ基が直接つくこと」は、アニリンに関係する見方です。
  「ポリエステルの一種で再利用もしやすいこと」は、PETに関係する見方です。
  「アミノ基とカルボキシ基をあわせもつこと」は、アミノ酸に関係する見方です。
