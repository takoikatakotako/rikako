# 令和7年度 ITパスポート 公開問題 問33
id: 253
type: single_choice
text: |
  自動運転の水準は、一般的に"レベル0"から"レベル5"に分けられている。"条件付運転自動化"と呼ばれる "レベル3"が示す自動運転の水準に関する記述として、最も適切なものはどれか。
choices:
  - "運転の主体はシステムであり、人間が運転する必要はないが、システムによる自動運転の継続が難しい場合は、人間が運転しなければならない。"
  - "運転の主体はシステムであり、人間が運転する必要はないので、ハンドルやペタルなどの運転装置は不要だが、自動運転できる地域は限られる。"
  - "運転の主体は人間であり、高速道路で車線を維持しながら前の自動車に付いて走る機能のように、ハンドルと加減速の操作をシステムが支援する。"
  - "運転の主体は人間であり、自動ブレーキや急発進防止システムのように、前方又は後方の状況によって、システムが運転の一部を支援する。"
correct: 0
explanation: |
  レベル3は条件付運転自動化であり、一定条件下ではシステムが運転主体となるが、継続困難時には人間が引き継ぐ必要がある。したがって、正解は「運転の主体はシステムであり、人間が運転する必要はないが、システムによる自動運転の継続が難しい場合は、人間が運転しなければならない」です。
  
  「運転の主体はシステムであり、人間が運転する必要はないが、システムによる自動運転の継続が難しい場合は、人間が運転しなければならない」が正しいです。通常はシステムが運転するが、要請時には人が対応する必要がある。
  「運転の主体はシステムであり、人間が運転する必要はないので、ハンドルやペタルなどの運転装置は不要だが、自動運転できる地域は限られる」は限定領域で完全自動化に近いレベル4の説明に近いです。
  「運転の主体は人間であり、高速道路で車線を維持しながら前の自動車に付いて走る機能のように、ハンドルと加減速の操作をシステムが支援する」はレベル2の説明に近いです。
  「運転の主体は人間であり、自動ブレーキや急発進防止システムのように、前方又は後方の状況によって、システムが運転の一部を支援する」は自動ブレーキなどの運転支援で、レベル1相当の説明です。
