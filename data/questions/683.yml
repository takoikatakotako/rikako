# 化学基礎 問16
id: 683
type: single_choice
text: |
  ドライアイスが液体にならずに直接気体になる変化を何というか。
choices:
  - "凝固"
  - "蒸発"
  - "昇華"
  - "融解"
correct: 2
explanation: |
  この問題は、「固体が直接気体になる変化の名前」を答える問題です。
  
  固体が液体にならずに直接気体になる変化を昇華といいます。ドライアイスはその代表例です。したがって、正解は「昇華」です。
  
  「凝固」は、液体が固体になる変化です。
  「蒸発」は、液体が気体になる変化です。
  「昇華」が正しいです。固体が直接気体になる変化です。
  「融解」は、固体が液体になる変化です。
