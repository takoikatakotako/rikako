# 化学基礎 問863
id: 1903
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "化合物 / 原子核の中にある陽子の数を表す数である。"
  - "原子番号 / 陽イオンと陰イオンの静電気的な引力による結び付きである。"
  - "イオン結合 / 二種類以上の元素が結び付いてできている純物質である。"
  - "凝固 / 液体が固体に変わる状態変化である。"
correct: 3
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「凝固 / 液体が固体に変わる状態変化である。」です。したがって、正解は「凝固 / 液体が固体に変わる状態変化である。」です。
  
  「化合物 / 原子核の中にある陽子の数を表す数である。」は、用語と説明の対応が合っていません。
  「原子番号 / 陽イオンと陰イオンの静電気的な引力による結び付きである。」は、用語と説明の対応が合っていません。
  「イオン結合 / 二種類以上の元素が結び付いてできている純物質である。」は、用語と説明の対応が合っていません。
  「凝固 / 液体が固体に変わる状態変化である。」が正しいです。用語と説明の対応が合っています。
