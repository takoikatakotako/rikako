# 化学基礎 問185
id: 1225
type: single_choice
text: |
  酸化の例として、最も適切なものはどれか。
choices:
  - "酸化銅から銅ができる反応"
  - "過マンガン酸カリウム"
  - "亜鉛"
  - "マグネシウムが燃える反応"
correct: 3
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  マグネシウムが燃える反応は、酸化の例です。したがって、正解は「マグネシウムが燃える反応」です。
  
  「酸化銅から銅ができる反応」は、還元の例として見る方が適切です。
  「過マンガン酸カリウム」は、酸化剤の例として見る方が適切です。
  「亜鉛」は、還元剤の例として見る方が適切です。
  「マグネシウムが燃える反応」が正しいです。これは酸化の例です。
