# 高校化学 問85
id: 2085
type: single_choice
text: |
  カルボン酸についての説明として、最も適切なものはどれか。
choices:
  - "カルボキシ基をもち、酸性を示す有機化合物である。"
  - "グルコースがつながった植物の細胞壁をつくる多糖である。"
  - "周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。"
  - "周期表18族に属し、化学的に安定な気体元素の総称である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  カルボン酸は、カルボキシ基をもち、酸性を示す有機化合物である。 したがって、正解は「カルボキシ基をもち、酸性を示す有機化合物である。」です。
  
  「カルボキシ基をもち、酸性を示す有機化合物である。」が正しいです。カルボン酸の説明です。
  「グルコースがつながった植物の細胞壁をつくる多糖である。」は、セルロースの説明です。
  「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」は、アルカリ土類金属の説明です。
  「周期表18族に属し、化学的に安定な気体元素の総称である。」は、貴ガスの説明です。
