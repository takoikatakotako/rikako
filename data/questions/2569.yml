# 高校化学 問569
id: 2569
type: single_choice
text: |
  「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "フッ素や塩素、臭素の反応性を比べる場面"
  - "アンモニアを加えると深い青色のイオンができる場面"
  - "エタノールの性質や利用を考える場面"
  - "アミノ酸がつながってペプチドになる場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」と最も関係が深い場面は「フッ素や塩素、臭素の反応性を比べる場面」です。したがって、正解は「フッ素や塩素、臭素の反応性を比べる場面」です。
  
  「フッ素や塩素、臭素の反応性を比べる場面」が正しいです。この説明と結び付きが強い場面です。
  「アンモニアを加えると深い青色のイオンができる場面」は、「中心となる金属イオンに配位子が結び付いたイオンである。」と結び付きが強い場面です。
  「エタノールの性質や利用を考える場面」は、「ヒドロキシ基をもつ有機化合物である。」と結び付きが強い場面です。
  「アミノ酸がつながってペプチドになる場面」は、「アミノ酸どうしが縮合してできる結合である。」と結び付きが強い場面です。
