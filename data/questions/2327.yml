# 高校化学 問327
id: 2327
type: single_choice
text: |
  「薄い溶液側から濃い溶液側へ水が移動する場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "飽和溶液"
  - "浸透圧"
  - "蒸気圧降下"
  - "凝固点降下"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  薄い溶液側から濃い溶液側へ水が移動する場面 と最も関係が深いのは浸透圧です。したがって、正解は「浸透圧」です。
  
  「飽和溶液」は、「食塩を加えても底に残るようになった食塩水を考える場面」と結び付きが強い語です。
  「浸透圧」が正しいです。この具体例と最も関係が深い語です。
  「蒸気圧降下」は、「食塩水が純水より蒸発しにくくなることを考える場面」と結び付きが強い語です。
  「凝固点降下」は、「凍結防止剤をまいた道路の水が凍りにくくなる場面」と結び付きが強い語です。
