# 高校化学 問797
id: 2797
type: single_choice
text: |
  「植物の体を支える多糖であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "コロイド"
  - "発熱反応"
  - "セルロース"
  - "ファラデーの法則"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「植物の体を支える多糖であること」という見方が大切なのはセルロースです。したがって、正解は「セルロース」です。
  
  「コロイド」は、その語で大切なのは「小さな粒子が分散している状態であること」という見方です。
  「発熱反応」は、その語で大切なのは「周囲へ熱を出す反応であること」という見方です。
  「セルロース」が正しいです。この見方が大切な語です。
  「ファラデーの法則」は、その語で大切なのは「電気量と生成物の量の比例に注目すること」という見方です。
