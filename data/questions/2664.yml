# 高校化学 問664
id: 2664
type: single_choice
text: |
  「アンモニア水が強塩基ほど完全には電離しない場面」を説明した文として、最も適切なものはどれか。
choices:
  - "水溶液中で一部だけ電離する塩基である。"
  - "分子中の原子や原子団が別の原子や原子団に置き換わる反応である。"
  - "多数のアミノ酸がつながってできた天然高分子化合物である。"
  - "液体の蒸気圧が外圧に等しくなる温度である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「アンモニア水が強塩基ほど完全には電離しない場面」を説明した文として適切なのは「水溶液中で一部だけ電離する塩基である。」です。したがって、正解は「水溶液中で一部だけ電離する塩基である。」です。
  
  「水溶液中で一部だけ電離する塩基である。」が正しいです。この具体例を説明した文です。
  「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」は、この説明は「メタンの水素が塩素に置き換わる場面」と結び付きが強いです。
  「多数のアミノ酸がつながってできた天然高分子化合物である。」は、この説明は「酵素や筋肉の主成分を考える場面」と結び付きが強いです。
  「液体の蒸気圧が外圧に等しくなる温度である。」は、この説明は「水が沸騰し始める温度を考える場面」と結び付きが強いです。
