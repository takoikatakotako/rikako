# 高校化学 問558
id: 2558
type: single_choice
text: |
  「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "血液や実験用の溶液で pH を保ちたい場面"
  - "高圧や触媒を利用してアンモニアを得る場面"
  - "アンモニアを加えると深い青色のイオンができる場面"
  - "エタノールの性質や利用を考える場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」と最も関係が深い場面は「高圧や触媒を利用してアンモニアを得る場面」です。したがって、正解は「高圧や触媒を利用してアンモニアを得る場面」です。
  
  「血液や実験用の溶液で pH を保ちたい場面」は、「少量の酸や塩基を加えても pH が変わりにくい溶液である。」と結び付きが強い場面です。
  「高圧や触媒を利用してアンモニアを得る場面」が正しいです。この説明と結び付きが強い場面です。
  「アンモニアを加えると深い青色のイオンができる場面」は、「中心となる金属イオンに配位子が結び付いたイオンである。」と結び付きが強い場面です。
  「エタノールの性質や利用を考える場面」は、「ヒドロキシ基をもつ有機化合物である。」と結び付きが強い場面です。
