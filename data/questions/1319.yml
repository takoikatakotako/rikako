# 化学基礎 問279
id: 1319
type: single_choice
text: |
  モル濃度の特徴として、最も適切なものはどれか。
choices:
  - "物質と量的関係を表す"
  - "水素イオンを生じる"
  - "水酸化物イオンを生じるか水素イオンを受け取る"
  - "1 L あたりの溶質の物質量"
correct: 3
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  モル濃度では、「1 L あたりの溶質の物質量」という点が大切です。したがって、正解は「1 L あたりの溶質の物質量」です。
  
  「物質と量的関係を表す」は、化学反応式に関係する特徴です。
  「水素イオンを生じる」は、酸に関係する特徴です。
  「水酸化物イオンを生じるか水素イオンを受け取る」は、塩基に関係する特徴です。
  「1 L あたりの溶質の物質量」が正しいです。モル濃度の特徴を表しています。
