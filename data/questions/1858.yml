# 化学基礎 問818
id: 1858
type: single_choice
text: |
  「性質が周期的にくり返されること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "鉄や酸素のように一種類の元素だけからできた物質を考える場面"
  - "ドライアイスがそのまま気体になる場面"
  - "塩素原子が電子を1個受け取って Cl- になる場面"
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
correct: 3
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「性質が周期的にくり返されること」という見方と最も関係が深い場面は「周期表で似た性質の元素が縦に並ぶことを見る場面」です。したがって、正解は「周期表で似た性質の元素が縦に並ぶことを見る場面」です。
  
  「鉄や酸素のように一種類の元素だけからできた物質を考える場面」は、その場面で大切なのは「一種類の元素だけからできること」という見方です。
  「ドライアイスがそのまま気体になる場面」は、その場面で大切なのは「固体から直接気体になること」という見方です。
  「塩素原子が電子を1個受け取って Cl- になる場面」は、その場面で大切なのは「電子を受け取って負に帯電すること」という見方です。
  「周期表で似た性質の元素が縦に並ぶことを見る場面」が正しいです。この見方と最も関係が深い場面です。
