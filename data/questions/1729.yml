# 化学基礎 問689
id: 1729
type: single_choice
text: |
  「相手を酸化させ、自身は還元される物質である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "新しい物質ができること"
  - "相手を酸化させ、自分は還元されること"
  - "陽子数が同じで中性子数が異なること"
  - "自由電子が結合を支えること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「相手を酸化させ、自身は還元される物質である。」を理解する上では、「相手を酸化させ、自分は還元されること」という見方が大切です。したがって、正解は「相手を酸化させ、自分は還元されること」です。
  
  「新しい物質ができること」は、その見方は化学変化に関係します。
  「相手を酸化させ、自分は還元されること」が正しいです。この説明と結び付きが強い見方です。
  「陽子数が同じで中性子数が異なること」は、その見方は同位体に関係します。
  「自由電子が結合を支えること」は、その見方は金属結合に関係します。
