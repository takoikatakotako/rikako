# 化学基礎 問77
id: 1117
type: single_choice
text: |
  化学反応式の係数についての説明として、最も適切なものはどれか。
choices:
  - "反応に関わる物質量の比を表す。"
  - "原子番号を表す。"
  - "色の濃さを表す。"
  - "温度だけを表す。"
correct: 0
explanation: |
  この問題は、「化学反応式の係数の意味」を確認する問題です。
  
  化学反応式の係数は、その反応で関わる物質量の比を表しています。したがって、正解は「反応に関わる物質量の比を表す」です。
  
  「反応に関わる物質量の比を表す」が正しいです。
  「原子番号を表す」は、適切ではありません。
  「色の濃さを表す」は、適切ではありません。
  「温度だけを表す」は、適切ではありません。
