# 令和7年度 ITパスポート 公開問題 問9
id: 625
type: single_choice
text: |
  ハッカソンに関する記述として、最も適切なものはどれか。
choices:
  - "定められたルールの下、ある主題について、肯定派と否定派といった異なる立場に分かれて議論する。"
  - "情報セキュリティ分野で活躍したいという意志をもった若者が、合宿形式で情報セキュリティに関する実践的な知識を学ぶ。"
  - "プログラマーやデザイナーなどから成る複数の参加チームが、与えられたテーマに関するプロトタイプを短期間で作成し、その成果を発表して競い合う。"
  - "問題解決や利用者獲得などゲーム的な要素のない分野に、デジタル技術を活用したゲームの要素を取り入れることによって、利用者の参加を動機づける。"
correct: 2
explanation: |
  この問題は、「ハッカソンとはどんなイベントか」を問う問題です。
  
  ハッカソンは、プログラマーやデザイナーなどがチームを組み、短い期間でアイディアを形にして、成果物やプロトタイプを発表するイベントです。したがって、正解は「プログラマーやデザイナーなどから成る複数の参加チームが、与えられたテーマに関するプロトタイプを短期間で作成し、その成果を発表して競い合う」です。
  
  「定められたルールの下、ある主題について、肯定派と否定派といった異なる立場に分かれて議論する」はディベートの説明です。
  「情報セキュリティ分野で活躍したいという意志をもった若者が、合宿形式で情報セキュリティに関する実践的な知識を学ぶ」は合宿形式で学ぶイベントの説明に近いです。
  「プログラマーやデザイナーなどから成る複数の参加チームが、与えられたテーマに関するプロトタイプを短期間で作成し、その成果を発表して競い合う」が正しいです。短期間で試作品を作って発表するのがハッカソンです。
  「問題解決や利用者獲得などゲーム的な要素のない分野に、デジタル技術を活用したゲームの要素を取り入れることによって、利用者の参加を動機づける」はゲーミフィケーションの説明です。
