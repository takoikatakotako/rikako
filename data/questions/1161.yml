# 化学基礎 問121
id: 1161
type: single_choice
text: |
  陰イオンについての説明として、最も適切なものはどれか。
choices:
  - "電子を受け取って負の電荷をもつ粒子である。"
  - "陽イオンと陰イオンの間の静電気的な引力による結合である。"
  - "原子どうしが電子を共有してできる結合である。"
  - "自由電子を介して金属原子どうしが結び付く結合である。"
correct: 0
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  陰イオンは、電子を受け取って負の電荷をもつ粒子である。したがって、正解は「電子を受け取って負の電荷をもつ粒子である。」です。
  
  「電子を受け取って負の電荷をもつ粒子である。」が正しいです。陰イオンの説明です。
  「陽イオンと陰イオンの間の静電気的な引力による結合である。」は、イオン結合の説明です。
  「原子どうしが電子を共有してできる結合である。」は、共有結合の説明です。
  「自由電子を介して金属原子どうしが結び付く結合である。」は、金属結合の説明です。
