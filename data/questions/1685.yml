# 化学基礎 問645
id: 1685
type: single_choice
text: |
  「水溶液でも電流をほとんど通さないこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "化学変化"
  - "同位体"
  - "非電解質"
  - "金属結合"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「水溶液でも電流をほとんど通さないこと」という見方が大切なのは非電解質です。したがって、正解は「非電解質」です。
  
  「化学変化」は、その語で大切なのは「新しい物質ができること」という見方です。
  「同位体」は、その語で大切なのは「陽子数が同じで中性子数が異なること」という見方です。
  「非電解質」が正しいです。この見方が大切な語です。
  「金属結合」は、その語で大切なのは「自由電子が結合を支えること」という見方です。
