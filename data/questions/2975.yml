# 高校化学 問975
id: 2975
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "疎水コロイド / スマートフォンやノートパソコンの電池を考える場面"
  - "リチウムイオン電池 / 平衡がどちらにかたよっているかを数値で見る場面"
  - "炎色反応 / ナトリウムで黄色、銅で青緑色を確かめる場面"
  - "平衡定数 / 金属や硫黄のコロイドが電解質で沈みやすい場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「炎色反応 / ナトリウムで黄色、銅で青緑色を確かめる場面」です。したがって、正解は「炎色反応 / ナトリウムで黄色、銅で青緑色を確かめる場面」です。
  
  「疎水コロイド / スマートフォンやノートパソコンの電池を考える場面」は、用語と場面の対応が合っていません。
  「リチウムイオン電池 / 平衡がどちらにかたよっているかを数値で見る場面」は、用語と場面の対応が合っていません。
  「炎色反応 / ナトリウムで黄色、銅で青緑色を確かめる場面」が正しいです。用語と場面の対応が合っています。
  「平衡定数 / 金属や硫黄のコロイドが電解質で沈みやすい場面」は、用語と場面の対応が合っていません。
