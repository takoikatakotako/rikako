# 化学基礎 問98
id: 1138
type: single_choice
text: |
  天然高分子化合物として、最も適切なものはどれか。
choices:
  - "タンパク質"
  - "塩化ナトリウム"
  - "酸素"
  - "銅"
correct: 0
explanation: |
  この問題は、「天然高分子化合物の例」を確認する問題です。
  
  タンパク質は、天然高分子化合物の代表例です。塩化ナトリウム、酸素、銅は天然高分子化合物ではありません。したがって、正解は「タンパク質」です。
  
  「タンパク質」が正しいです。天然高分子化合物の代表例です。
  「塩化ナトリウム」は、天然高分子化合物ではありません。
  「酸素」は、天然高分子化合物ではありません。
  「銅」は、天然高分子化合物ではありません。
