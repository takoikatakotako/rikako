# 令和7年度 ITパスポート 公開問題 問86
id: 539
type: single_choice
text: |
  動物が写っている大量の画像から犬や猫などの特徴を自動的に抽出して、動物の種類を識別できるようにするAIの技術はどれか。
choices:
  - "e-ラーニング"
  - "アクティブラーニング"
  - "アダプティブラーニング"
  - "ディープラーニング"
correct: 3
explanation: |
  この問題の公開解答では「ディープラーニング」が正解とされています。
  
  「e-ラーニング」は公開解答では正解ではありません。
  「アクティブラーニング」は公開解答では正解ではありません。
  「アダプティブラーニング」は公開解答では正解ではありません。
  「ディープラーニング」が公開解答で正解とされています。
