# 化学基礎 問948
id: 1988
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "再結晶 / 鉄がさびて別の物質になる場面"
  - "化学変化 / 炭素12と炭素14を比べる場面"
  - "同位体 / ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面"
  - "酸化防止剤 / 食品の変色や劣化を防ぐためにビタミンCを使う場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「酸化防止剤 / 食品の変色や劣化を防ぐためにビタミンCを使う場面」です。したがって、正解は「酸化防止剤 / 食品の変色や劣化を防ぐためにビタミンCを使う場面」です。
  
  「再結晶 / 鉄がさびて別の物質になる場面」は、用語と場面の対応が合っていません。
  「化学変化 / 炭素12と炭素14を比べる場面」は、用語と場面の対応が合っていません。
  「同位体 / ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」は、用語と場面の対応が合っていません。
  「酸化防止剤 / 食品の変色や劣化を防ぐためにビタミンCを使う場面」が正しいです。用語と場面の対応が合っています。
