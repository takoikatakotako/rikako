# 化学基礎 問763
id: 1803
type: single_choice
text: |
  「液体から固体への変化であること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "放射線を出しながら別の原子へ変わっていく同位体である。"
  - "液体が固体に変わる状態変化である。"
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
  - "もとの物質とは別の物質ができる変化である。"
correct: 1
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「液体から固体への変化であること」という見方と最も関係が深い説明は「液体が固体に変わる状態変化である。」です。したがって、正解は「液体が固体に変わる状態変化である。」です。
  
  「放射線を出しながら別の原子へ変わっていく同位体である。」は、その説明で大切なのは「放射線を出す同位体であること」という見方です。
  「液体が固体に変わる状態変化である。」が正しいです。この見方と最も関係が深い説明です。
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、その説明で大切なのは「溶解度の差を利用すること」という見方です。
  「もとの物質とは別の物質ができる変化である。」は、その説明で大切なのは「新しい物質ができること」という見方です。
