# 化学基礎 問833
id: 1873
type: single_choice
text: |
  「酸と塩基が打ち消し合うこと」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "塩化ナトリウムが陽イオンと陰イオンの引力でできる場面"
  - "1Lの食塩水にどれだけ溶質が溶けているかを表す場面"
  - "塩酸と水酸化ナトリウム水溶液を混ぜる場面"
  - "BTB溶液やフェノールフタレインで液性を調べる場面"
correct: 2
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「酸と塩基が打ち消し合うこと」という見方と最も関係が深い場面は「塩酸と水酸化ナトリウム水溶液を混ぜる場面」です。したがって、正解は「塩酸と水酸化ナトリウム水溶液を混ぜる場面」です。
  
  「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」は、その場面で大切なのは「電気的な引力で結び付くこと」という見方です。
  「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」は、その場面で大切なのは「1Lあたりの物質量で表すこと」という見方です。
  「塩酸と水酸化ナトリウム水溶液を混ぜる場面」が正しいです。この見方と最も関係が深い場面です。
  「BTB溶液やフェノールフタレインで液性を調べる場面」は、その場面で大切なのは「色の変化で液性を見分けること」という見方です。
