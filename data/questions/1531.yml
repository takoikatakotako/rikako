# 化学基礎 問491
id: 1531
type: single_choice
text: |
  イオン化傾向を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "金属のイオンになりやすさを比べること"
  - "金属元素ごとに炎の色が異なること"
  - "小さな単位が多数つながっていること"
  - "粒子の数をまとめて扱う単位であること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  イオン化傾向では、「金属のイオンになりやすさを比べること」という見方が大切です。したがって、正解は「金属のイオンになりやすさを比べること」です。
  
  「金属のイオンになりやすさを比べること」が正しいです。イオン化傾向の要点を表しています。
  「金属元素ごとに炎の色が異なること」は、炎色反応に関係する見方です。
  「小さな単位が多数つながっていること」は、高分子化合物に関係する見方です。
  「粒子の数をまとめて扱う単位であること」は、モルに関係する見方です。
