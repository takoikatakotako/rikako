# 高校化学 問714
id: 2714
type: single_choice
text: |
  「粒子の規則正しい配列に注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "リチウムイオン電池"
  - "平衡定数"
  - "アルカリ金属"
  - "結晶格子"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「粒子の規則正しい配列に注目すること」という見方が大切なのは結晶格子です。したがって、正解は「結晶格子」です。
  
  「リチウムイオン電池」は、その語で大切なのは「軽くて繰り返し使いやすい電池であること」という見方です。
  「平衡定数」は、その語で大切なのは「平衡の位置を数で表すこと」という見方です。
  「アルカリ金属」は、その語で大切なのは「反応性が高く 1 価の陽イオンになりやすいこと」という見方です。
  「結晶格子」が正しいです。この見方が大切な語です。
