# 化学基礎 問457
id: 1497
type: single_choice
text: |
  単体を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "液体から固体への変化であること"
  - "水に溶けない固体を液体から分けること"
  - "一種類の元素だけからできること"
  - "溶解度の差を利用すること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  単体では、「一種類の元素だけからできること」という見方が大切です。したがって、正解は「一種類の元素だけからできること」です。
  
  「液体から固体への変化であること」は、凝固に関係する見方です。
  「水に溶けない固体を液体から分けること」は、ろ過に関係する見方です。
  「一種類の元素だけからできること」が正しいです。単体の要点を表しています。
  「溶解度の差を利用すること」は、再結晶に関係する見方です。
