# 高校化学 問670
id: 2670
type: single_choice
text: |
  「ネオンやアルゴンが反応しにくい理由を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "六角形の環状構造をもつ代表的な芳香族炭化水素である。"
  - "目的に応じた特別な性質をもたせてつくられた材料である。"
  - "周期表18族に属し、化学的に安定な気体元素の総称である。"
  - "一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「ネオンやアルゴンが反応しにくい理由を考える場面」を説明した文として適切なのは「周期表18族に属し、化学的に安定な気体元素の総称である。」です。したがって、正解は「周期表18族に属し、化学的に安定な気体元素の総称である。」です。
  
  「六角形の環状構造をもつ代表的な芳香族炭化水素である。」は、この説明は「芳香族化合物の基本構造を学ぶ場面」と結び付きが強いです。
  「目的に応じた特別な性質をもたせてつくられた材料である。」は、この説明は「導電性高分子や高性能電池材料を考える場面」と結び付きが強いです。
  「周期表18族に属し、化学的に安定な気体元素の総称である。」が正しいです。この具体例を説明した文です。
  「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」は、この説明は「温めた風船がふくらみやすくなる場面」と結び付きが強いです。
