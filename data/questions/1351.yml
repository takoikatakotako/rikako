# 化学基礎 問311
id: 1351
type: single_choice
text: |
  融解について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "原子核の中にある陽子数と中性子数の合計である。"
  - "元素を原子番号の順に並べると性質が周期的に変化するというきまりである。"
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "固体が液体に変わる状態変化である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  融解は、固体が液体に変わる状態変化である。 したがって、正解は「固体が液体に変わる状態変化である。」です。
  
  「原子核の中にある陽子数と中性子数の合計である。」は、質量数の説明です。
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」は、周期律の説明です。
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、ろ過の説明です。
  「固体が液体に変わる状態変化である。」が正しいです。融解の説明です。
