# 高校化学 問865
id: 2865
type: single_choice
text: |
  「酸の電離のしやすさを表す定数である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "分子の体積と分子間力の影響に注目すること"
  - "溶解と析出がつり合うこと"
  - "水となじみにくく不安定になりやすいこと"
  - "酸の強さを電離のしやすさで見ること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「酸の電離のしやすさを表す定数である。」を理解する上では、「酸の強さを電離のしやすさで見ること」という見方が大切です。したがって、正解は「酸の強さを電離のしやすさで見ること」です。
  
  「分子の体積と分子間力の影響に注目すること」は、その見方は実在気体に関係します。
  「溶解と析出がつり合うこと」は、その見方は溶解平衡に関係します。
  「水となじみにくく不安定になりやすいこと」は、その見方は疎水コロイドに関係します。
  「酸の強さを電離のしやすさで見ること」が正しいです。この説明と結び付きが強い見方です。
