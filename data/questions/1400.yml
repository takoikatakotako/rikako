# 化学基礎 問360
id: 1400
type: single_choice
text: |
  化学変化と最も関係が深い場面として、適切なものはどれか。
choices:
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
  - "酸素だけが入った容器を考える場面"
  - "鉄や酸素のように一種類の元素だけからできた物質を考える場面"
  - "鉄がさびて別の物質になる場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  鉄がさびて別の物質になる場面は、化学変化と結び付きが強い場面です。したがって、正解は「鉄がさびて別の物質になる場面」です。
  
  「周期表で似た性質の元素が縦に並ぶことを見る場面」は、周期律と結び付きが強い場面です。
  「酸素だけが入った容器を考える場面」は、純物質と結び付きが強い場面です。
  「鉄や酸素のように一種類の元素だけからできた物質を考える場面」は、単体と結び付きが強い場面です。
  「鉄がさびて別の物質になる場面」が正しいです。これは化学変化と結び付きが強い場面です。
