# 化学基礎 問26
id: 693
type: single_choice
text: |
  酸化物イオンの式として、最も適切なものはどれか。
choices:
  - "O+"
  - "O2+"
  - "O-"
  - "O2-"
correct: 3
explanation: |
  この問題は、「酸素原子がイオンになるときの電荷」を確認する問題です。
  
  酸素原子は、電子を2個受け取って安定になりやすいため、酸化物イオンは O2- で表されます。したがって、正解は「O2-」です。
  
  「O+」は、酸化物イオンの式ではありません。
  「O2+」は、酸化物イオンの式ではありません。
  「O-」は、一般的な酸化物イオンの式ではありません。
  「O2-」が正しいです。酸素原子が電子を2個受け取った形です。
