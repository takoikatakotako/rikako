# 化学基礎 問136
id: 1176
type: single_choice
text: |
  還元についての説明として、最も適切なものはどれか。
choices:
  - "相手を酸化し、自分は還元される物質である。"
  - "相手を還元し、自分は酸化される物質である。"
  - "金属が電子を失って陽イオンになりやすい性質の強さを表す。"
  - "電子を受け取る変化、または酸素を失う変化である。"
correct: 3
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  還元は、電子を受け取る変化、または酸素を失う変化である。したがって、正解は「電子を受け取る変化、または酸素を失う変化である。」です。
  
  「相手を酸化し、自分は還元される物質である。」は、酸化剤の説明です。
  「相手を還元し、自分は酸化される物質である。」は、還元剤の説明です。
  「金属が電子を失って陽イオンになりやすい性質の強さを表す。」は、イオン化傾向の説明です。
  「電子を受け取る変化、または酸素を失う変化である。」が正しいです。還元の説明です。
