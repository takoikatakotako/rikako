# 令和6年度 ITパスポート 公開問題 問28
id: 1008
type: single_choice
text: |
  次の事例のうち、AIを導入することによって業務の作業効率が向上したものだけを全て挙げたものはどれか。
  
  a 食品専門商社のA社が、取引先ごとに様式が異なる手書きの請求書に記載された文字を自動で読み取ってデータ化することによって、事務作業時間を削減した。
  b 繊維製造会社のB社が、原材料を取引先に発注する際の定型的なPCの操作を自動化するツールを導入し、事務部門の人員を削減した。
  c 損害保険会社のC社が、自社のコールセンターへの問合せに対して、オペレーターにつなぐ前に音声チャットボットでヒアリングを行うことによって、オペレーターの対応時間を短縮した。
  d 物流会社のD社が、配送荷物に電子タグを装着して出荷時に配送先を電子タグに書き込み、配送時にそれを確認することによって、誤配送を削減した。
choices:
  - "a, c"
  - "b, c"
  - "b, d"
  - "c, d"
correct: 0
