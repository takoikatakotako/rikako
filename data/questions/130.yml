# 令和7年度 ITパスポート 公開問題 問25
id: 130
type: single_choice
text: |
  ブロックチェーンを適用した事例として、最も適切なものはどれか。
choices:
  - "証券会社が、取引の改ざんや不整合の発生を防止することを目的として、従来の社債に代わり電子的手段を用いたデジタル社債を発行した。"
  - "商品先物取引所を運営する認可法人が、取引量を拡大することを目的として、現在およそ1秒以上要している注文受付の応答時間を、1秒未満に改善した。"
  - "ビジネス路線を中心に運航する航空会社が、顧客の利便性向上と競合他社に対する競争力強化を目的として、出発1時間前まで何回でも予約の変更を可能とする新しいサービスを開始した。"
  - "服飾雑貨製造会社が、自社の商品企画に活用することを目的として、過去の全ての自社商品に関する大量の画像及び社内会議の音声データをデータベースに保存し、従業員がいつでも検索できるようにした。"
correct: 0
explanation: |
  ブロックチェーンは、分散的に取引履歴を共有し、改ざん耐性を高める技術です。取引の改ざんや不整合防止を目的としたデジタル社債の発行は、ブロックチェーンの適用例として適切です。
  
  「証券会社が、取引の改ざんや不整合の発生を防止することを目的として、従来の社債に代わり電子的手段を用いたデジタル社債を発行した」が正しいです。取引記録の改ざん防止や整合性確保にブロックチェーンは適している。
  「商品先物取引所を運営する認可法人が、取引量を拡大することを目的として、現在およそ1秒以上要している注文受付の応答時間を、1秒未満に改善した」は応答時間改善の話であり、ブロックチェーン適用事例ではありません。
  「ビジネス路線を中心に運航する航空会社が、顧客の利便性向上と競合他社に対する競争力強化を目的として、出発1時間前まで何回でも予約の変更を可能とする新しいサービスを開始した」は予約変更サービスの改善であり、ブロックチェーンとは無関係です。
  「服飾雑貨製造会社が、自社の商品企画に活用することを目的として、過去の全ての自社商品に関する大量の画像及び社内会議の音声データをデータベースに保存し、従業員がいつでも検索できるようにした」は画像や音声データの蓄積・検索の話であり、ブロックチェーンの特徴を使っていない。
