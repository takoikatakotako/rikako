# 高校化学 問135
id: 2135
type: single_choice
text: |
  反応熱と最も関係が深い場面として、適切なものはどれか。
choices:
  - "顕微鏡でコロイド粒子が細かく動く様子を観察する場面"
  - "コロイド粒子が陽極や陰極へ移動する様子を考える場面"
  - "金属や硫黄のコロイドが電解質で沈みやすい場面"
  - "物質を燃やしたときに熱が出ることを考える場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  物質を燃やしたときに熱が出ることを考える場面は、反応熱と結び付きが強い場面です。したがって、正解は「物質を燃やしたときに熱が出ることを考える場面」です。
  
  「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」は、ブラウン運動と結び付きが強い場面です。
  「コロイド粒子が陽極や陰極へ移動する様子を考える場面」は、電気泳動と結び付きが強い場面です。
  「金属や硫黄のコロイドが電解質で沈みやすい場面」は、疎水コロイドと結び付きが強い場面です。
  「物質を燃やしたときに熱が出ることを考える場面」が正しいです。これは反応熱と結び付きが強い場面です。
