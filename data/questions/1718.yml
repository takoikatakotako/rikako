# 化学基礎 問678
id: 1718
type: single_choice
text: |
  「粒子の数をまとめて表すための単位である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "小さな単位が多数つながっていること"
  - "成分が二種類以上まざっていること"
  - "粒子の数をまとめて扱う単位であること"
  - "液体から固体への変化であること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「粒子の数をまとめて表すための単位である。」を理解する上では、「粒子の数をまとめて扱う単位であること」という見方が大切です。したがって、正解は「粒子の数をまとめて扱う単位であること」です。
  
  「小さな単位が多数つながっていること」は、その見方は高分子化合物に関係します。
  「成分が二種類以上まざっていること」は、その見方は混合物に関係します。
  「粒子の数をまとめて扱う単位であること」が正しいです。この説明と結び付きが強い見方です。
  「液体から固体への変化であること」は、その見方は凝固に関係します。
