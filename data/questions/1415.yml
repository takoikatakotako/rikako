# 化学基礎 問375
id: 1415
type: single_choice
text: |
  分子と最も関係が深い場面として、適切なものはどれか。
choices:
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
  - "6.0×10^23個の粒子をひとまとまりとして数える場面"
  - "水分子や酸素分子を粒として考える場面"
  - "水素と酸素から水ができる反応を式で表す場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  水分子や酸素分子を粒として考える場面は、分子と結び付きが強い場面です。したがって、正解は「水分子や酸素分子を粒として考える場面」です。
  
  「周期表で似た性質の元素が縦に並ぶことを見る場面」は、周期律と結び付きが強い場面です。
  「6.0×10^23個の粒子をひとまとまりとして数える場面」は、モルと結び付きが強い場面です。
  「水分子や酸素分子を粒として考える場面」が正しいです。これは分子と結び付きが強い場面です。
  「水素と酸素から水ができる反応を式で表す場面」は、化学反応式と結び付きが強い場面です。
