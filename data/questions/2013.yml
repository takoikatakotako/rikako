# 化学基礎 問973
id: 2013
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "pH / 金属のイオンになりやすさを比べること"
  - "イオン化傾向 / 酸化による変質を防ぐこと"
  - "酸化防止剤 / 酸性と塩基性の強さを数で見ること"
  - "共有結合 / 電子を共有して結び付くこと"
correct: 3
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「共有結合 / 電子を共有して結び付くこと」です。したがって、正解は「共有結合 / 電子を共有して結び付くこと」です。
  
  「pH / 金属のイオンになりやすさを比べること」は、用語と要点の対応が合っていません。
  「イオン化傾向 / 酸化による変質を防ぐこと」は、用語と要点の対応が合っていません。
  「酸化防止剤 / 酸性と塩基性の強さを数で見ること」は、用語と要点の対応が合っていません。
  「共有結合 / 電子を共有して結び付くこと」が正しいです。用語と要点の対応が合っています。
