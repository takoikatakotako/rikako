# 化学基礎 問220
id: 1260
type: single_choice
text: |
  「Na+」に最も関係が深い語として、適切なものはどれか。
choices:
  - "陰イオン"
  - "陽イオン"
  - "イオン結合"
  - "共有結合"
correct: 1
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「Na+」に最も関係が深いのは陽イオンです。したがって、正解は「陽イオン」です。
  
  「陰イオン」は、この例に最も関係が深い語ではありません。
  「陽イオン」が正しいです。この例は陽イオンに関係しています。
  「イオン結合」は、この例に最も関係が深い語ではありません。
  「共有結合」は、この例に最も関係が深い語ではありません。
