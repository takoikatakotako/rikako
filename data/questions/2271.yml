# 高校化学 問271
id: 2271
type: single_choice
text: |
  「酸とも塩基とも反応する酸化物である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "両性酸化物"
  - "ファラデーの法則"
  - "不飽和炭化水素"
  - "置換反応"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  酸とも塩基とも反応する酸化物である。 に当てはまる語は両性酸化物です。したがって、正解は「両性酸化物」です。
  
  「両性酸化物」が正しいです。「酸とも塩基とも反応する酸化物である。」に当てはまる語です。
  「ファラデーの法則」は、「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」に当てはまる語です。
  「不飽和炭化水素」は、「炭素どうしに二重結合や三重結合をもつ炭化水素である。」に当てはまる語です。
  「置換反応」は、「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」に当てはまる語です。
