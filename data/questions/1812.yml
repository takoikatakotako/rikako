# 化学基礎 問772
id: 1812
type: single_choice
text: |
  「電気的な引力で結び付くこと」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "一種類の物質だけからできていて、性質が一定である物質である。"
  - "液体が気体になる状態変化である。"
  - "陽イオンと陰イオンの静電気的な引力による結び付きである。"
  - "原子のいちばん外側の電子殻にある電子である。"
correct: 2
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「電気的な引力で結び付くこと」という見方と最も関係が深い説明は「陽イオンと陰イオンの静電気的な引力による結び付きである。」です。したがって、正解は「陽イオンと陰イオンの静電気的な引力による結び付きである。」です。
  
  「一種類の物質だけからできていて、性質が一定である物質である。」は、その説明で大切なのは「成分が一種類で性質が一定であること」という見方です。
  「液体が気体になる状態変化である。」は、その説明で大切なのは「液体から気体への変化であること」という見方です。
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」が正しいです。この見方と最も関係が深い説明です。
  「原子のいちばん外側の電子殻にある電子である。」は、その説明で大切なのは「化学結合やイオンのできやすさに関係すること」という見方です。
