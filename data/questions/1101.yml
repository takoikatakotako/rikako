# 化学基礎 問61
id: 1101
type: single_choice
text: |
  電気的に中性な原子についての説明として、最も適切なものはどれか。
choices:
  - "陽子の数と電子の数が同じである。"
  - "陽子の数が必ず 0 である。"
  - "電子の数が中性子の数と必ず同じである。"
  - "中性子を全くもたない。"
correct: 0
explanation: |
  この問題は、「中性な原子で電荷が打ち消し合う条件」を確認する問題です。
  
  原子が電気的に中性であるためには、正の電荷をもつ陽子の数と、負の電荷をもつ電子の数が同じである必要があります。したがって、正解は「陽子の数と電子の数が同じである」です。
  
  「陽子の数と電子の数が同じである」が正しいです。
  「陽子の数が必ず 0 である」は、適切ではありません。
  「電子の数が中性子の数と必ず同じである」は、適切ではありません。
  「中性子を全くもたない」は、適切ではありません。
