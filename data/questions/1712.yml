# 化学基礎 問672
id: 1712
type: single_choice
text: |
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電気的な引力で結び付くこと"
  - "電池の中で電気的なつり合いを保つこと"
  - "化学が社会や生活に広く役立つこと"
  - "一種類の元素だけからできること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」を理解する上では、「電気的な引力で結び付くこと」という見方が大切です。したがって、正解は「電気的な引力で結び付くこと」です。
  
  「電気的な引力で結び付くこと」が正しいです。この説明と結び付きが強い見方です。
  「電池の中で電気的なつり合いを保つこと」は、その見方は塩橋に関係します。
  「化学が社会や生活に広く役立つこと」は、その見方は化学が拓く世界に関係します。
  「一種類の元素だけからできること」は、その見方は単体に関係します。
