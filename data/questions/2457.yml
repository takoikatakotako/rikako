# 高校化学 問457
id: 2457
type: single_choice
text: |
  ルシャトリエの原理を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "加えた変化を打ち消す向きに平衡が動くこと"
  - "小さな粒子が分散している状態であること"
  - "粒子が周囲の分子にぶつかって動くこと"
  - "コロイド粒子の電荷に注目すること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  ルシャトリエの原理では、「加えた変化を打ち消す向きに平衡が動くこと」という見方が大切です。したがって、正解は「加えた変化を打ち消す向きに平衡が動くこと」です。
  
  「加えた変化を打ち消す向きに平衡が動くこと」が正しいです。ルシャトリエの原理の要点を表しています。
  「小さな粒子が分散している状態であること」は、コロイドに関係する見方です。
  「粒子が周囲の分子にぶつかって動くこと」は、ブラウン運動に関係する見方です。
  「コロイド粒子の電荷に注目すること」は、電気泳動に関係する見方です。
