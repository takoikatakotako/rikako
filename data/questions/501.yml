# 令和7年度 ITパスポート 公開問題 問22
id: 501
type: single_choice
text: |
  営業部のAさんは、営業担当者10人の営業成績が一目で分かるように、各営業担当者が提出する営業見込みと実績を毎月集約してグラフ化したいと考えている。この間題を解決するために適用する技術やツールとして、最も適切なものはどれか。
choices:
  - "データを学習し、分析するAI"
  - "データを自動収集し、データベースに蓄積する IoT"
  - "入力したデータを、加工して見せるオフィスツール"
  - "ビッグデータを、様々な手法で分析するデータサイエンス"
correct: 2
explanation: |
  営業担当者ごとの見込みと実績を毎月集約してグラフ化するだけであれば、表計算ソフトなどのオフィスツールで十分対応できる。したがってウが最も適切です。
  
  「データを学習し、分析するAI」はAI を使うほどの要件ではなく、単純な集計・可視化には過剰です。
  「データを自動収集し、データベースに蓄積する IoT」はIoT はセンサーなどから自動収集する仕組みであり、設問の内容とは合わない。
  「入力したデータを、加工して見せるオフィスツール」が正しいです。入力済みデータの集計やグラフ化にはオフィスツールが適している。
  「ビッグデータを、様々な手法で分析するデータサイエンス」はデータサイエンスは大規模・高度な分析向けであり、今回の目的には過剰です。
