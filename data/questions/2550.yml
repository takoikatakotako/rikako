# 高校化学 問550
id: 2550
type: single_choice
text: |
  「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "二酸化マンガンを加えると過酸化水素水の分解が速くなる場面"
  - "流した電流が大きいほど析出量が増える場面"
  - "アンモニア水が強塩基ほど完全には電離しない場面"
  - "ナトリウムで黄色、銅で青緑色を確かめる場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」と最も関係が深い場面は「流した電流が大きいほど析出量が増える場面」です。したがって、正解は「流した電流が大きいほど析出量が増える場面」です。
  
  「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」は、「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」と結び付きが強い場面です。
  「流した電流が大きいほど析出量が増える場面」が正しいです。この説明と結び付きが強い場面です。
  「アンモニア水が強塩基ほど完全には電離しない場面」は、「水溶液中で一部だけ電離する塩基である。」と結び付きが強い場面です。
  「ナトリウムで黄色、銅で青緑色を確かめる場面」は、「金属元素を炎に入れたときに特有の色を示す反応である。」と結び付きが強い場面です。
