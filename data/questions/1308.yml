# 化学基礎 問268
id: 1308
type: single_choice
text: |
  周期律の特徴として、最も適切なものはどれか。
choices:
  - "元素の性質に規則性がある"
  - "化学的な性質に強く関わる電子"
  - "電子を失って正になる"
  - "電子を受け取って負になる"
correct: 0
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  周期律では、「元素の性質に規則性がある」という点が大切です。したがって、正解は「元素の性質に規則性がある」です。
  
  「元素の性質に規則性がある」が正しいです。周期律の特徴を表しています。
  「化学的な性質に強く関わる電子」は、最外殻電子に関係する特徴です。
  「電子を失って正になる」は、陽イオンに関係する特徴です。
  「電子を受け取って負になる」は、陰イオンに関係する特徴です。
