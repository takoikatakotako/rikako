# 高校化学 問221
id: 2221
type: single_choice
text: |
  「一定量の溶媒に溶けることのできる溶質の最大量である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "ルシャトリエの原理"
  - "電離平衡"
  - "溶解度"
  - "緩衝液"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  一定量の溶媒に溶けることのできる溶質の最大量である。 に当てはまる語は溶解度です。したがって、正解は「溶解度」です。
  
  「ルシャトリエの原理」は、「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」に当てはまる語です。
  「電離平衡」は、「電離する粒子と電離していない粒子が平衡になっている状態である。」に当てはまる語です。
  「溶解度」が正しいです。「一定量の溶媒に溶けることのできる溶質の最大量である。」に当てはまる語です。
  「緩衝液」は、「少量の酸や塩基を加えても pH が変わりにくい溶液である。」に当てはまる語です。
