# 高校化学 問966
id: 2966
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "沸点上昇 / 反応前後で熱の出入りを比較する場面"
  - "塩基解離定数 / どの塩基がより電離しやすいかを比べる場面"
  - "エンタルピー変化 / 水溶液に電流を流して物質を分解する場面"
  - "電気分解 / 食塩水の沸点が水より少し高くなることを考える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「塩基解離定数 / どの塩基がより電離しやすいかを比べる場面」です。したがって、正解は「塩基解離定数 / どの塩基がより電離しやすいかを比べる場面」です。
  
  「沸点上昇 / 反応前後で熱の出入りを比較する場面」は、用語と場面の対応が合っていません。
  「塩基解離定数 / どの塩基がより電離しやすいかを比べる場面」が正しいです。用語と場面の対応が合っています。
  「エンタルピー変化 / 水溶液に電流を流して物質を分解する場面」は、用語と場面の対応が合っていません。
  「電気分解 / 食塩水の沸点が水より少し高くなることを考える場面」は、用語と場面の対応が合っていません。
