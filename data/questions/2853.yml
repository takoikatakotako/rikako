# 高校化学 問853
id: 2853
type: single_choice
text: |
  「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "化学が社会課題の解決に役立つこと"
  - "混ざった気体の圧力を足し合わせて考えること"
  - "それ以上溶けない状態であること"
  - "反応を速めても自分は使い切られないこと"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」を理解する上では、「反応を速めても自分は使い切られないこと」という見方が大切です。したがって、正解は「反応を速めても自分は使い切られないこと」です。
  
  「化学が社会課題の解決に役立つこと」は、その見方は化学が築く未来に関係します。
  「混ざった気体の圧力を足し合わせて考えること」は、その見方は分圧の法則に関係します。
  「それ以上溶けない状態であること」は、その見方は飽和溶液に関係します。
  「反応を速めても自分は使い切られないこと」が正しいです。この説明と結び付きが強い見方です。
