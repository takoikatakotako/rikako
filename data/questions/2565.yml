# 高校化学 問565
id: 2565
type: single_choice
text: |
  「酸の電離のしやすさを表す定数である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "どの酸がより電離しやすいかを比べる場面"
  - "マグネシウムやカルシウムの性質を比べる場面"
  - "エチレンやアセチレンの反応性を考える場面"
  - "衣類やロープに使われる合成繊維を考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「酸の電離のしやすさを表す定数である。」と最も関係が深い場面は「どの酸がより電離しやすいかを比べる場面」です。したがって、正解は「どの酸がより電離しやすいかを比べる場面」です。
  
  「どの酸がより電離しやすいかを比べる場面」が正しいです。この説明と結び付きが強い場面です。
  「マグネシウムやカルシウムの性質を比べる場面」は、「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」と結び付きが強い場面です。
  「エチレンやアセチレンの反応性を考える場面」は、「炭素どうしに二重結合や三重結合をもつ炭化水素である。」と結び付きが強い場面です。
  「衣類やロープに使われる合成繊維を考える場面」は、「アミド結合をもつ合成繊維の代表的な高分子化合物である。」と結び付きが強い場面です。
