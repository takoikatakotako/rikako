# 高校化学 問387
id: 2387
type: single_choice
text: |
  「芳香族化合物の基本構造を学ぶ場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "アルデヒド"
  - "ベンゼン"
  - "エステル"
  - "アニリン"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  芳香族化合物の基本構造を学ぶ場面 と最も関係が深いのはベンゼンです。したがって、正解は「ベンゼン」です。
  
  「アルデヒド」は、「ホルムアルデヒドやアセトアルデヒドを考える場面」と結び付きが強い語です。
  「ベンゼン」が正しいです。この具体例と最も関係が深い語です。
  「エステル」は、「果物の香りに関係する化合物を考える場面」と結び付きが強い語です。
  「アニリン」は、「染料の原料になる芳香族アミンを考える場面」と結び付きが強い語です。
