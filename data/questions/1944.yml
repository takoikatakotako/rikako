# 化学基礎 問904
id: 1944
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "物理変化 / 炭素12で陽子数と中性子数の合計を見る場面"
  - "質量数 / 水素原子どうしが電子を共有して H2 になる場面"
  - "共有結合 / 氷が溶けて水になる場面"
  - "クロマトグラフィー / インクの色素をろ紙の上で分ける場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「クロマトグラフィー / インクの色素をろ紙の上で分ける場面」です。したがって、正解は「クロマトグラフィー / インクの色素をろ紙の上で分ける場面」です。
  
  「物理変化 / 炭素12で陽子数と中性子数の合計を見る場面」は、用語と場面の対応が合っていません。
  「質量数 / 水素原子どうしが電子を共有して H2 になる場面」は、用語と場面の対応が合っていません。
  「共有結合 / 氷が溶けて水になる場面」は、用語と場面の対応が合っていません。
  「クロマトグラフィー / インクの色素をろ紙の上で分ける場面」が正しいです。用語と場面の対応が合っています。
