# 化学基礎 問405
id: 1445
type: single_choice
text: |
  「一種類の物質だけからできていて、性質が一定である物質である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "最外殻電子"
  - "単体"
  - "物理変化"
  - "純物質"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  一種類の物質だけからできていて、性質が一定である物質である。 に当てはまる語は純物質です。したがって、正解は「純物質」です。
  
  「最外殻電子」は、「原子のいちばん外側の電子殻にある電子である。」に当てはまる語です。
  「単体」は、「一種類の元素だけからできている物質である。」に当てはまる語です。
  「物理変化」は、「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」に当てはまる語です。
  「純物質」が正しいです。「一種類の物質だけからできていて、性質が一定である物質である。」に当てはまる語です。
