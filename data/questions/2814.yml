# 高校化学 問814
id: 2814
type: single_choice
text: |
  「結晶の中で粒子が規則正しく並んだ構造である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "粒子の規則正しい配列に注目すること"
  - "pH の変化をおさえること"
  - "金属イオンと配位子の組合せに注目すること"
  - "ヒドロキシ基をもつこと"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「結晶の中で粒子が規則正しく並んだ構造である。」を理解する上では、「粒子の規則正しい配列に注目すること」という見方が大切です。したがって、正解は「粒子の規則正しい配列に注目すること」です。
  
  「粒子の規則正しい配列に注目すること」が正しいです。この説明と結び付きが強い見方です。
  「pH の変化をおさえること」は、その見方は緩衝液に関係します。
  「金属イオンと配位子の組合せに注目すること」は、その見方は錯イオンに関係します。
  「ヒドロキシ基をもつこと」は、その見方はアルコールに関係します。
