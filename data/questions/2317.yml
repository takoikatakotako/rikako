# 高校化学 問317
id: 2317
type: single_choice
text: |
  「ダイヤモンドや二酸化ケイ素の硬さを考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "分子結晶"
  - "アモルファス"
  - "融点"
  - "共有結合の結晶"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  ダイヤモンドや二酸化ケイ素の硬さを考える場面 と最も関係が深いのは共有結合の結晶です。したがって、正解は「共有結合の結晶」です。
  
  「分子結晶」は、「ドライアイスやヨウ素の結晶を考える場面」と結び付きが強い語です。
  「アモルファス」は、「ガラスのように一定の融点を示しにくい固体を考える場面」と結び付きが強い語です。
  「融点」は、「氷が溶け始める温度を考える場面」と結び付きが強い語です。
  「共有結合の結晶」が正しいです。この具体例と最も関係が深い語です。
