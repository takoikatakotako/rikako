# 高校化学 問64
id: 2064
type: single_choice
text: |
  弱塩基についての説明として、最も適切なものはどれか。
choices:
  - "リチウムイオンの移動を利用する充電式電池である。"
  - "電気エネルギーを使って自発的でない化学変化を起こす操作である。"
  - "電気分解で還元が起こる電極である。"
  - "水溶液中で一部だけ電離する塩基である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  弱塩基は、水溶液中で一部だけ電離する塩基である。 したがって、正解は「水溶液中で一部だけ電離する塩基である。」です。
  
  「リチウムイオンの移動を利用する充電式電池である。」は、リチウムイオン電池の説明です。
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」は、電気分解の説明です。
  「電気分解で還元が起こる電極である。」は、陰極の説明です。
  「水溶液中で一部だけ電離する塩基である。」が正しいです。弱塩基の説明です。
