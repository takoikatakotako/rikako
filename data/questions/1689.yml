# 化学基礎 問649
id: 1689
type: single_choice
text: |
  「小さな単位が多数つながっていること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "昇華"
  - "陰イオン"
  - "高分子化合物"
  - "モル"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「小さな単位が多数つながっていること」という見方が大切なのは高分子化合物です。したがって、正解は「高分子化合物」です。
  
  「昇華」は、その語で大切なのは「固体から直接気体になること」という見方です。
  「陰イオン」は、その語で大切なのは「電子を受け取って負に帯電すること」という見方です。
  「高分子化合物」が正しいです。この見方が大切な語です。
  「モル」は、その語で大切なのは「粒子の数をまとめて扱う単位であること」という見方です。
