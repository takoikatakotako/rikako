# 高校化学 問59
id: 2059
type: single_choice
text: |
  電離平衡についての説明として、最も適切なものはどれか。
choices:
  - "水溶液中で一部だけ電離する塩基である。"
  - "塩基の電離のしやすさを表す定数である。"
  - "電離する粒子と電離していない粒子が平衡になっている状態である。"
  - "鉛とその化合物を用いた、充電して繰り返し使える電池である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  電離平衡は、電離する粒子と電離していない粒子が平衡になっている状態である。 したがって、正解は「電離する粒子と電離していない粒子が平衡になっている状態である。」です。
  
  「水溶液中で一部だけ電離する塩基である。」は、弱塩基の説明です。
  「塩基の電離のしやすさを表す定数である。」は、塩基解離定数の説明です。
  「電離する粒子と電離していない粒子が平衡になっている状態である。」が正しいです。電離平衡の説明です。
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」は、鉛蓄電池の説明です。
