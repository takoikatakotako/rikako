# 高校化学 問451
id: 2451
type: single_choice
text: |
  反応速度を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "それ以上溶けない状態であること"
  - "溶質があると溶媒の蒸気圧が下がること"
  - "時間あたりにどれだけ変化するかを見ること"
  - "溶質があると凝固点が下がること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  反応速度では、「時間あたりにどれだけ変化するかを見ること」という見方が大切です。したがって、正解は「時間あたりにどれだけ変化するかを見ること」です。
  
  「それ以上溶けない状態であること」は、飽和溶液に関係する見方です。
  「溶質があると溶媒の蒸気圧が下がること」は、蒸気圧降下に関係する見方です。
  「時間あたりにどれだけ変化するかを見ること」が正しいです。反応速度の要点を表しています。
  「溶質があると凝固点が下がること」は、凝固点降下に関係する見方です。
