# 令和6年度 ITパスポート 公開問題 問40
id: 1020
type: single_choice
text: |
  アジャイル開発に関する記述として、最も適切なものはどれか。
choices:
  - "開発する機能を小さい単位に分割し、優先度の高いものから短期間で開発とリリースを繰り返す。"
  - "共通フレームを適用して要件定義、設計などの工程名及び作成する文書を定義する。"
  - "システム開発を上流工程から下流工程まで順番に進め、全ての開発工程が終了してからリリースする。"
  - "プロトタイプを作成して利用者に確認を求め、利用者の評価とフィードバックを行いながら開発を進めていく。"
correct: 0
