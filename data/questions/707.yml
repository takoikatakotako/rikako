# 化学基礎 問40
id: 707
type: single_choice
text: |
  強酸についての説明として、最も適切なものはどれか。
choices:
  - "水に溶けたときに電離しやすい酸である。"
  - "必ず高い温度でしか存在しない酸である。"
  - "必ず金属を多く含む酸である。"
  - "必ず色が濃い酸である。"
correct: 0
explanation: |
  この問題は、「強酸と弱酸の違い」を確認する問題です。
  
  強酸は、水に溶けたときに電離しやすい酸です。濃い、薄いという言い方とは別の考え方です。したがって、正解は「水に溶けたときに電離しやすい酸である」です。
  
  「水に溶けたときに電離しやすい酸である」が正しいです。強酸の基本的な説明です。
  「必ず高い温度でしか存在しない酸である」は、適切ではありません。
  「必ず金属を多く含む酸である」は、適切ではありません。
  「必ず色が濃い酸である」は、適切ではありません。
