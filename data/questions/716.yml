# 高校化学 問6
id: 716
type: single_choice
text: |
  融解熱についての説明として、最も適切なものはどれか。
choices:
  - "液体1 molが気体になるときに吸収する熱量である。"
  - "固体1 molが融解するときに吸収する熱量である。"
  - "一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。"
  - "混合気体の全圧は各気体の分圧の和になるという法則である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  融解熱は、固体1 molが融解するときに吸収する熱量である。 したがって、正解は「固体1 molが融解するときに吸収する熱量である。」です。
  
  「液体1 molが気体になるときに吸収する熱量である。」は、蒸発熱の説明です。
  「固体1 molが融解するときに吸収する熱量である。」が正しいです。融解熱の説明です。
  「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」は、シャルルの法則の説明です。
  「混合気体の全圧は各気体の分圧の和になるという法則である。」は、分圧の法則の説明です。
