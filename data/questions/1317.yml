# 化学基礎 問277
id: 1317
type: single_choice
text: |
  無極性分子の特徴として、最も適切なものはどれか。
choices:
  - "粒子数をそろえる単位"
  - "分子全体の電荷の偏りが打ち消し合う"
  - "1 L あたりの溶質の物質量"
  - "物質と量的関係を表す"
correct: 1
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  無極性分子では、「分子全体の電荷の偏りが打ち消し合う」という点が大切です。したがって、正解は「分子全体の電荷の偏りが打ち消し合う」です。
  
  「粒子数をそろえる単位」は、モルに関係する特徴です。
  「分子全体の電荷の偏りが打ち消し合う」が正しいです。無極性分子の特徴を表しています。
  「1 L あたりの溶質の物質量」は、モル濃度に関係する特徴です。
  「物質と量的関係を表す」は、化学反応式に関係する特徴です。
