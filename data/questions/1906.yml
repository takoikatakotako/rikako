# 化学基礎 問866
id: 1906
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "融解 / 元素を原子番号の順に並べると性質が周期的に変化するというきまりである。"
  - "周期律 / 原子が結び付いてできた、物質の性質を示す小さな粒子である。"
  - "質量数 / 原子核の中にある陽子数と中性子数の合計である。"
  - "分子 / 固体が液体に変わる状態変化である。"
correct: 2
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「質量数 / 原子核の中にある陽子数と中性子数の合計である。」です。したがって、正解は「質量数 / 原子核の中にある陽子数と中性子数の合計である。」です。
  
  「融解 / 元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」は、用語と説明の対応が合っていません。
  「周期律 / 原子が結び付いてできた、物質の性質を示す小さな粒子である。」は、用語と説明の対応が合っていません。
  「質量数 / 原子核の中にある陽子数と中性子数の合計である。」が正しいです。用語と説明の対応が合っています。
  「分子 / 固体が液体に変わる状態変化である。」は、用語と説明の対応が合っていません。
