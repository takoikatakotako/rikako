# 高校化学 問215
id: 2215
type: single_choice
text: |
  「陽イオンと陰イオンが規則正しく並んでできた結晶である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "イオン結晶"
  - "チンダル現象"
  - "透析"
  - "親水コロイド"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  陽イオンと陰イオンが規則正しく並んでできた結晶である。 に当てはまる語はイオン結晶です。したがって、正解は「イオン結晶」です。
  
  「イオン結晶」が正しいです。「陽イオンと陰イオンが規則正しく並んでできた結晶である。」に当てはまる語です。
  「チンダル現象」は、「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」に当てはまる語です。
  「透析」は、「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」に当てはまる語です。
  「親水コロイド」は、「水との親和性が高く、比較的安定なコロイドである。」に当てはまる語です。
