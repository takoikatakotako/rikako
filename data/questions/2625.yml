# 高校化学 問625
id: 2625
type: single_choice
text: |
  「食塩水の沸点が水より少し高くなることを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。"
  - "溶液の沸点が純粋な溶媒より高くなる現象である。"
  - "反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。"
  - "水溶液中で一部だけ電離する塩基である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「食塩水の沸点が水より少し高くなることを考える場面」を説明した文として適切なのは「溶液の沸点が純粋な溶媒より高くなる現象である。」です。したがって、正解は「溶液の沸点が純粋な溶媒より高くなる現象である。」です。
  
  「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」は、この説明は「植物が光を受けてデンプンなどをつくる場面」と結び付きが強いです。
  「溶液の沸点が純粋な溶媒より高くなる現象である。」が正しいです。この具体例を説明した文です。
  「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」は、この説明は「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」と結び付きが強いです。
  「水溶液中で一部だけ電離する塩基である。」は、この説明は「アンモニア水が強塩基ほど完全には電離しない場面」と結び付きが強いです。
