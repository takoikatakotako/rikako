# 化学基礎 問384
id: 1424
type: single_choice
text: |
  pHと最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムで黄色、銅で青緑色を観察する場面"
  - "ポリエチレンやタンパク質のような長い分子を考える場面"
  - "塩酸が水溶液中で水素イオンを生じる場面"
  - "レモン水とせっけん水の酸性・塩基性を比べる場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  レモン水とせっけん水の酸性・塩基性を比べる場面は、pHと結び付きが強い場面です。したがって、正解は「レモン水とせっけん水の酸性・塩基性を比べる場面」です。
  
  「ナトリウムで黄色、銅で青緑色を観察する場面」は、炎色反応と結び付きが強い場面です。
  「ポリエチレンやタンパク質のような長い分子を考える場面」は、高分子化合物と結び付きが強い場面です。
  「塩酸が水溶液中で水素イオンを生じる場面」は、酸と結び付きが強い場面です。
  「レモン水とせっけん水の酸性・塩基性を比べる場面」が正しいです。これはpHと結び付きが強い場面です。
