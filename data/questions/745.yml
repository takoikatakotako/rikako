# 高校化学 問35
id: 745
type: single_choice
text: |
  反応熱についての説明として、最も適切なものはどれか。
choices:
  - "溶ける速さと析出する速さが等しくなっている平衡である。"
  - "溶液の沸点が純粋な溶媒より高くなる現象である。"
  - "化学反応に伴って出入りする熱量である。"
  - "半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  反応熱は、化学反応に伴って出入りする熱量である。 したがって、正解は「化学反応に伴って出入りする熱量である。」です。
  
  「溶ける速さと析出する速さが等しくなっている平衡である。」は、溶解平衡の説明です。
  「溶液の沸点が純粋な溶媒より高くなる現象である。」は、沸点上昇の説明です。
  「化学反応に伴って出入りする熱量である。」が正しいです。反応熱の説明です。
  「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」は、浸透圧の説明です。
