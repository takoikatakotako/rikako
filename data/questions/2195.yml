# 高校化学 問195
id: 2195
type: single_choice
text: |
  グルコースと最も関係が深い場面として、適切なものはどれか。
choices:
  - "食塩水の沸点が水より少し高くなることを考える場面"
  - "薄い溶液側から濃い溶液側へ水が移動する場面"
  - "薄暗い部屋でコロイドに光を当てると筋が見える場面"
  - "血糖や発酵の材料として使われる場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  血糖や発酵の材料として使われる場面は、グルコースと結び付きが強い場面です。したがって、正解は「血糖や発酵の材料として使われる場面」です。
  
  「食塩水の沸点が水より少し高くなることを考える場面」は、沸点上昇と結び付きが強い場面です。
  「薄い溶液側から濃い溶液側へ水が移動する場面」は、浸透圧と結び付きが強い場面です。
  「薄暗い部屋でコロイドに光を当てると筋が見える場面」は、チンダル現象と結び付きが強い場面です。
  「血糖や発酵の材料として使われる場面」が正しいです。これはグルコースと結び付きが強い場面です。
