# 高校化学 問662
id: 2662
type: single_choice
text: |
  「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "炭素どうしに二重結合や三重結合をもつ炭化水素である。"
  - "アミド結合をもつ合成繊維の代表的な高分子化合物である。"
  - "塩のイオンが水と反応して溶液の性質を変える現象である。"
  - "分子どうしの間にはたらく比較的弱い引力である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」を説明した文として適切なのは「塩のイオンが水と反応して溶液の性質を変える現象である。」です。したがって、正解は「塩のイオンが水と反応して溶液の性質を変える現象である。」です。
  
  「炭素どうしに二重結合や三重結合をもつ炭化水素である。」は、この説明は「エチレンやアセチレンの反応性を考える場面」と結び付きが強いです。
  「アミド結合をもつ合成繊維の代表的な高分子化合物である。」は、この説明は「衣類やロープに使われる合成繊維を考える場面」と結び付きが強いです。
  「塩のイオンが水と反応して溶液の性質を変える現象である。」が正しいです。この具体例を説明した文です。
  「分子どうしの間にはたらく比較的弱い引力である。」は、この説明は「水やエタノールの沸点の違いを考える場面」と結び付きが強いです。
