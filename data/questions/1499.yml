# 化学基礎 問459
id: 1499
type: single_choice
text: |
  物理変化を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "物質の種類が変わらないこと"
  - "水に溶けない固体を液体から分けること"
  - "溶解度の差を利用すること"
  - "陽子数を表す数であること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  物理変化では、「物質の種類が変わらないこと」という見方が大切です。したがって、正解は「物質の種類が変わらないこと」です。
  
  「物質の種類が変わらないこと」が正しいです。物理変化の要点を表しています。
  「水に溶けない固体を液体から分けること」は、ろ過に関係する見方です。
  「溶解度の差を利用すること」は、再結晶に関係する見方です。
  「陽子数を表す数であること」は、原子番号に関係する見方です。
