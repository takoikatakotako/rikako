# 化学基礎 問319
id: 1359
type: single_choice
text: |
  最外殻電子について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "粒子の数をまとめて表すための単位である。"
  - "化学変化を、物質の種類と量の関係が分かるように表した式である。"
  - "原子核の中にある陽子数と中性子数の合計である。"
  - "原子のいちばん外側の電子殻にある電子である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  最外殻電子は、原子のいちばん外側の電子殻にある電子である。 したがって、正解は「原子のいちばん外側の電子殻にある電子である。」です。
  
  「粒子の数をまとめて表すための単位である。」は、モルの説明です。
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」は、化学反応式の説明です。
  「原子核の中にある陽子数と中性子数の合計である。」は、質量数の説明です。
  「原子のいちばん外側の電子殻にある電子である。」が正しいです。最外殻電子の説明です。
