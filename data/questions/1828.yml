# 化学基礎 問788
id: 1828
type: single_choice
text: |
  「酸素の喪失や電子の受け取りに注目すること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "原子や原子団が電子を受け取って負の電荷をもつ粒子である。"
  - "粒子の数をまとめて表すための単位である。"
  - "物質が酸素を失う、または電子を受け取る変化である。"
  - "溶けた物質のうち、電離してイオンになった割合である。"
correct: 2
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「酸素の喪失や電子の受け取りに注目すること」という見方と最も関係が深い説明は「物質が酸素を失う、または電子を受け取る変化である。」です。したがって、正解は「物質が酸素を失う、または電子を受け取る変化である。」です。
  
  「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」は、その説明で大切なのは「電子を受け取って負に帯電すること」という見方です。
  「粒子の数をまとめて表すための単位である。」は、その説明で大切なのは「粒子の数をまとめて扱う単位であること」という見方です。
  「物質が酸素を失う、または電子を受け取る変化である。」が正しいです。この見方と最も関係が深い説明です。
  「溶けた物質のうち、電離してイオンになった割合である。」は、その説明で大切なのは「どのくらいイオンに分かれるかを表すこと」という見方です。
