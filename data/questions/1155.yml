# 化学基礎 問115
id: 1155
type: single_choice
text: |
  原子番号についての説明として、最も適切なものはどれか。
choices:
  - "原子核にある陽子の数と中性子の数の合計を表す。"
  - "陽子の数が同じで、中性子の数が異なる原子どうしである。"
  - "原子がもつ陽子の数を表す。"
  - "元素の性質が周期表の並びに応じて規則的に変化することをいう。"
correct: 2
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  原子番号は、原子がもつ陽子の数を表す。したがって、正解は「原子がもつ陽子の数を表す。」です。
  
  「原子核にある陽子の数と中性子の数の合計を表す。」は、質量数の説明です。
  「陽子の数が同じで、中性子の数が異なる原子どうしである。」は、同位体の説明です。
  「原子がもつ陽子の数を表す。」が正しいです。原子番号の説明です。
  「元素の性質が周期表の並びに応じて規則的に変化することをいう。」は、周期律の説明です。
