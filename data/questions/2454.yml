# 高校化学 問454
id: 2454
type: single_choice
text: |
  可逆反応を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "蒸気圧降下の結果として沸点が上がること"
  - "正反応と逆反応の両方を見ること"
  - "半透膜を通る溶媒の移動に注目すること"
  - "コロイドが光を散乱すること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  可逆反応では、「正反応と逆反応の両方を見ること」という見方が大切です。したがって、正解は「正反応と逆反応の両方を見ること」です。
  
  「蒸気圧降下の結果として沸点が上がること」は、沸点上昇に関係する見方です。
  「正反応と逆反応の両方を見ること」が正しいです。可逆反応の要点を表しています。
  「半透膜を通る溶媒の移動に注目すること」は、浸透圧に関係する見方です。
  「コロイドが光を散乱すること」は、チンダル現象に関係する見方です。
