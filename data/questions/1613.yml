# 化学基礎 問573
id: 1613
type: single_choice
text: |
  「水素原子どうしが電子を共有して H2 になる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。"
  - "相手を酸化させ、自身は還元される物質である。"
  - "放射線を出しながら別の原子へ変わっていく同位体である。"
  - "原子どうしが電子を共有してできる結び付きである。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「水素原子どうしが電子を共有して H2 になる場面」を説明した文として適切なのは「原子どうしが電子を共有してできる結び付きである。」です。したがって、正解は「原子どうしが電子を共有してできる結び付きである。」です。
  
  「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」は、この説明は「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」と結び付きが強いです。
  「相手を酸化させ、自身は還元される物質である。」は、この説明は「酸素や過酸化水素が相手を酸化させる場面」と結び付きが強いです。
  「放射線を出しながら別の原子へ変わっていく同位体である。」は、この説明は「医療や年代測定に利用される炭素14を考える場面」と結び付きが強いです。
  「原子どうしが電子を共有してできる結び付きである。」が正しいです。この具体例を説明した文です。
