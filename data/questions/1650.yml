# 化学基礎 問610
id: 1650
type: single_choice
text: |
  「新しい物質ができること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "分子"
  - "塩基"
  - "酸化剤"
  - "化学変化"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「新しい物質ができること」という見方が大切なのは化学変化です。したがって、正解は「化学変化」です。
  
  「分子」は、その語で大切なのは「物質の性質を示す小さな粒子として考えること」という見方です。
  「塩基」は、その語で大切なのは「水酸化物イオンや水素イオンの受け取りに注目すること」という見方です。
  「酸化剤」は、その語で大切なのは「相手を酸化させ、自分は還元されること」という見方です。
  「化学変化」が正しいです。この見方が大切な語です。
