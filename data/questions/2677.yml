# 高校化学 問677
id: 2677
type: single_choice
text: |
  「電線や青色の銅イオン水溶液を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "アミノ酸どうしが縮合してできる結合である。"
  - "遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。"
  - "蒸発する速さと凝縮する速さが等しくなった状態である。"
  - "分子どうしが分子間力で集まってできた結晶である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「電線や青色の銅イオン水溶液を考える場面」を説明した文として適切なのは「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」です。したがって、正解は「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」です。
  
  「アミノ酸どうしが縮合してできる結合である。」は、この説明は「アミノ酸がつながってペプチドになる場面」と結び付きが強いです。
  「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」が正しいです。この具体例を説明した文です。
  「蒸発する速さと凝縮する速さが等しくなった状態である。」は、この説明は「密閉容器で水面の高さが変わらなくなる場面」と結び付きが強いです。
  「分子どうしが分子間力で集まってできた結晶である。」は、この説明は「ドライアイスやヨウ素の結晶を考える場面」と結び付きが強いです。
