# 高校化学 問105
id: 2105
type: single_choice
text: |
  気液平衡と最も関係が深い場面として、適切なものはどれか。
choices:
  - "気体の法則で温度をセルシウス温度ではなく K で扱う場面"
  - "密閉容器で水面の高さが変わらなくなる場面"
  - "塩化ナトリウムの結晶のつくりを考える場面"
  - "ダイヤモンドや二酸化ケイ素の硬さを考える場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  密閉容器で水面の高さが変わらなくなる場面は、気液平衡と結び付きが強い場面です。したがって、正解は「密閉容器で水面の高さが変わらなくなる場面」です。
  
  「気体の法則で温度をセルシウス温度ではなく K で扱う場面」は、絶対温度と結び付きが強い場面です。
  「密閉容器で水面の高さが変わらなくなる場面」が正しいです。これは気液平衡と結び付きが強い場面です。
  「塩化ナトリウムの結晶のつくりを考える場面」は、イオン結晶と結び付きが強い場面です。
  「ダイヤモンドや二酸化ケイ素の硬さを考える場面」は、共有結合の結晶と結び付きが強い場面です。
