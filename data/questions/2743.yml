# 高校化学 問743
id: 2743
type: single_choice
text: |
  「使い切りの電池であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "乾電池"
  - "遷移元素"
  - "カルボン酸"
  - "デンプン"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「使い切りの電池であること」という見方が大切なのは乾電池です。したがって、正解は「乾電池」です。
  
  「乾電池」が正しいです。この見方が大切な語です。
  「遷移元素」は、その語で大切なのは「多様な酸化数や色、触媒作用に注目すること」という見方です。
  「カルボン酸」は、その語で大切なのは「カルボキシ基をもち酸性を示すこと」という見方です。
  「デンプン」は、その語で大切なのは「植物がエネルギーをたくわえる多糖であること」という見方です。
