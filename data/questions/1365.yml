# 化学基礎 問325
id: 1365
type: single_choice
text: |
  分子について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "原子どうしが電子を共有してできる結び付きである。"
  - "原子が結び付いてできた、物質の性質を示す小さな粒子である。"
  - "分子の中で電荷のかたよりがある分子である。"
  - "原子核の中にある陽子の数を表す数である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  分子は、原子が結び付いてできた、物質の性質を示す小さな粒子である。 したがって、正解は「原子が結び付いてできた、物質の性質を示す小さな粒子である。」です。
  
  「原子どうしが電子を共有してできる結び付きである。」は、共有結合の説明です。
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」が正しいです。分子の説明です。
  「分子の中で電荷のかたよりがある分子である。」は、極性分子の説明です。
  「原子核の中にある陽子の数を表す数である。」は、原子番号の説明です。
