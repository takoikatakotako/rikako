# 化学基礎 問715
id: 1755
type: single_choice
text: |
  「ナトリウムの陽子数から元素を区別する場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "化学エネルギーを電気エネルギーに変えること"
  - "小さな単位が多数つながっていること"
  - "陽子数を表す数であること"
  - "成分が二種類以上まざっていること"
correct: 2
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「ナトリウムの陽子数から元素を区別する場面」では、「陽子数を表す数であること」という見方が大切です。したがって、正解は「陽子数を表す数であること」です。
  
  「化学エネルギーを電気エネルギーに変えること」は、その見方は亜鉛板と銅板を使って豆電球を光らせる場面よりもダニエル電池と結び付きが強いです。
  「小さな単位が多数つながっていること」は、その見方はポリエチレンやタンパク質のような長い分子を考える場面よりも高分子化合物と結び付きが強いです。
  「陽子数を表す数であること」が正しいです。この具体例で大切になる見方です。
  「成分が二種類以上まざっていること」は、その見方は空気や食塩水のように複数の物質が混ざったものを考える場面よりも混合物と結び付きが強いです。
