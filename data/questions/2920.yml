# 高校化学 問920
id: 2920
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "不飽和炭化水素 / 衣類やロープに使われる合成繊維を考える場面"
  - "ナイロン / 水やエタノールの沸点の違いを考える場面"
  - "分子間力 / エチレンやアセチレンの反応性を考える場面"
  - "溶解 / 食塩が水に溶けて見えなくなる場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「溶解 / 食塩が水に溶けて見えなくなる場面」です。したがって、正解は「溶解 / 食塩が水に溶けて見えなくなる場面」です。
  
  「不飽和炭化水素 / 衣類やロープに使われる合成繊維を考える場面」は、用語と場面の対応が合っていません。
  「ナイロン / 水やエタノールの沸点の違いを考える場面」は、用語と場面の対応が合っていません。
  「分子間力 / エチレンやアセチレンの反応性を考える場面」は、用語と場面の対応が合っていません。
  「溶解 / 食塩が水に溶けて見えなくなる場面」が正しいです。用語と場面の対応が合っています。
