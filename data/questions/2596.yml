# 高校化学 問596
id: 2596
type: single_choice
text: |
  「グルコースが多数つながった植物の貯蔵多糖である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "金属やプラスチックを回収して再資源化する場面"
  - "気体の量と温度から体積や圧力を見積もる場面"
  - "温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面"
  - "米やいもに多く含まれる成分を考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「グルコースが多数つながった植物の貯蔵多糖である。」と最も関係が深い場面は「米やいもに多く含まれる成分を考える場面」です。したがって、正解は「米やいもに多く含まれる成分を考える場面」です。
  
  「金属やプラスチックを回収して再資源化する場面」は、「使い終わった資源や製品を回収し、再び利用する考え方である。」と結び付きが強い場面です。
  「気体の量と温度から体積や圧力を見積もる場面」は、「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」と結び付きが強い場面です。
  「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」は、「一定量の溶媒に溶けることのできる溶質の最大量である。」と結び付きが強い場面です。
  「米やいもに多く含まれる成分を考える場面」が正しいです。この説明と結び付きが強い場面です。
