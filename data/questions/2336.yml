# 高校化学 問336
id: 2336
type: single_choice
text: |
  「反応前後で熱の出入りを比較する場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "鉛蓄電池"
  - "燃料電池"
  - "エンタルピー変化"
  - "陽極"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  反応前後で熱の出入りを比較する場面 と最も関係が深いのはエンタルピー変化です。したがって、正解は「エンタルピー変化」です。
  
  「鉛蓄電池」は、「自動車のバッテリーを考える場面」と結び付きが強い語です。
  「燃料電池」は、「水素を使って発電し、水を生じる仕組みを考える場面」と結び付きが強い語です。
  「エンタルピー変化」が正しいです。この具体例と最も関係が深い語です。
  「陽極」は、「電気分解で気体が発生する電極側を考える場面」と結び付きが強い語です。
