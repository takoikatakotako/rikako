# 高校化学 問260
id: 2260
type: single_choice
text: |
  「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "結合エネルギー"
  - "水のイオン積"
  - "吸熱反応"
  - "光合成"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。 に当てはまる語は水のイオン積です。したがって、正解は「水のイオン積」です。
  
  「結合エネルギー」は、「気体分子中の結合1 molを切るのに必要なエネルギーである。」に当てはまる語です。
  「水のイオン積」が正しいです。「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」に当てはまる語です。
  「吸熱反応」は、「反応の結果として周囲から熱を吸収する反応である。」に当てはまる語です。
  「光合成」は、「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」に当てはまる語です。
