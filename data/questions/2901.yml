# 高校化学 問901
id: 2901
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "分子間力 / 水やエタノールの沸点の違いを考える場面"
  - "水のイオン積 / 酸化アルミニウムが酸にも塩基にも溶ける場面"
  - "両性酸化物 / ブタンとイソブタンを比べる場面"
  - "異性体 / 中性の水で H+ と OH- の関係を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「分子間力 / 水やエタノールの沸点の違いを考える場面」です。したがって、正解は「分子間力 / 水やエタノールの沸点の違いを考える場面」です。
  
  「分子間力 / 水やエタノールの沸点の違いを考える場面」が正しいです。用語と場面の対応が合っています。
  「水のイオン積 / 酸化アルミニウムが酸にも塩基にも溶ける場面」は、用語と場面の対応が合っていません。
  「両性酸化物 / ブタンとイソブタンを比べる場面」は、用語と場面の対応が合っていません。
  「異性体 / 中性の水で H+ と OH- の関係を考える場面」は、用語と場面の対応が合っていません。
