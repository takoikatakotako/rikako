# 高校化学 問699
id: 2699
type: single_choice
text: |
  「金属やプラスチックを回収して再資源化する場面」を説明した文として、最も適切なものはどれか。
choices:
  - "分子どうしが分子間力で集まってできた結晶である。"
  - "半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。"
  - "気体分子中の結合1 molを切るのに必要なエネルギーである。"
  - "使い終わった資源や製品を回収し、再び利用する考え方である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「金属やプラスチックを回収して再資源化する場面」を説明した文として適切なのは「使い終わった資源や製品を回収し、再び利用する考え方である。」です。したがって、正解は「使い終わった資源や製品を回収し、再び利用する考え方である。」です。
  
  「分子どうしが分子間力で集まってできた結晶である。」は、この説明は「ドライアイスやヨウ素の結晶を考える場面」と結び付きが強いです。
  「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」は、この説明は「薄い溶液側から濃い溶液側へ水が移動する場面」と結び付きが強いです。
  「気体分子中の結合1 molを切るのに必要なエネルギーである。」は、この説明は「どの結合が切れやすいかを比べる場面」と結び付きが強いです。
  「使い終わった資源や製品を回収し、再び利用する考え方である。」が正しいです。この具体例を説明した文です。
