# 化学基礎 問515
id: 1555
type: single_choice
text: |
  「原子核の中にある陽子の数を表す数である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
  - "水分子や酸素分子を粒として考える場面"
  - "ナトリウムの陽子数から元素を区別する場面"
  - "水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「原子核の中にある陽子の数を表す数である。」と最も関係が深い場面は「ナトリウムの陽子数から元素を区別する場面」です。したがって、正解は「ナトリウムの陽子数から元素を区別する場面」です。
  
  「周期表で似た性質の元素が縦に並ぶことを見る場面」は、「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」と結び付きが強い場面です。
  「水分子や酸素分子を粒として考える場面」は、「原子が結び付いてできた、物質の性質を示す小さな粒子である。」と結び付きが強い場面です。
  「ナトリウムの陽子数から元素を区別する場面」が正しいです。この説明と結び付きが強い場面です。
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」は、「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」と結び付きが強い場面です。
