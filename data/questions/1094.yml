# 化学基礎 問54
id: 1094
type: single_choice
text: |
  次のうち、物理変化として最も適切なものはどれか。
choices:
  - "紙が燃える。"
  - "鉄がさびる。"
  - "ろうが溶ける。"
  - "牛乳が腐る。"
correct: 2
explanation: |
  この問題は、「新しい物質ができるかどうか」で変化を見分ける問題です。
  
  ろうが溶ける変化では、物質そのものは変わっていません。状態が変わっただけなので物理変化です。したがって、正解は「ろうが溶ける」です。
  
  「紙が燃える」は、新しい物質ができるので化学変化です。
  「鉄がさびる」は、新しい物質ができるので化学変化です。
  「ろうが溶ける」が正しいです。状態が変わっただけです。
  「牛乳が腐る」は、新しい物質ができるので化学変化です。
