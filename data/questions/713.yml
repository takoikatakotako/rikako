# 高校化学 問3
id: 713
type: single_choice
text: |
  沸点についての説明として、最も適切なものはどれか。
choices:
  - "気液平衡にあるとき、気体が示す圧力である。"
  - "固体1 molが融解するときに吸収する熱量である。"
  - "液体の蒸気圧が外圧に等しくなる温度である。"
  - "一定温度で一定量の気体の圧力は体積に反比例するという法則である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  沸点は、液体の蒸気圧が外圧に等しくなる温度である。 したがって、正解は「液体の蒸気圧が外圧に等しくなる温度である。」です。
  
  「気液平衡にあるとき、気体が示す圧力である。」は、蒸気圧の説明です。
  「固体1 molが融解するときに吸収する熱量である。」は、融解熱の説明です。
  「液体の蒸気圧が外圧に等しくなる温度である。」が正しいです。沸点の説明です。
  「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」は、ボイルの法則の説明です。
