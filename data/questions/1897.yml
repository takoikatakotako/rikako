# 化学基礎 問857
id: 1897
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "蒸留 / 物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
  - "単体 / 一種類の元素だけからできている物質である。"
  - "物理変化 / 原子核の中にある陽子数と中性子数の合計である。"
  - "質量数 / 沸点の違いを利用して液体を分ける方法である。"
correct: 1
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「単体 / 一種類の元素だけからできている物質である。」です。したがって、正解は「単体 / 一種類の元素だけからできている物質である。」です。
  
  「蒸留 / 物質そのものの種類は変わらず、状態や形だけが変わる変化である。」は、用語と説明の対応が合っていません。
  「単体 / 一種類の元素だけからできている物質である。」が正しいです。用語と説明の対応が合っています。
  「物理変化 / 原子核の中にある陽子数と中性子数の合計である。」は、用語と説明の対応が合っていません。
  「質量数 / 沸点の違いを利用して液体を分ける方法である。」は、用語と説明の対応が合っていません。
