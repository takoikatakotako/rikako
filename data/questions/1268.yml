# 化学基礎 問228
id: 1268
type: single_choice
text: |
  「1 mol の水分子」に最も関係が深い語として、適切なものはどれか。
choices:
  - "モル濃度"
  - "モル"
  - "化学反応式"
  - "酸"
correct: 1
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「1 mol の水分子」に最も関係が深いのはモルです。したがって、正解は「モル」です。
  
  「モル濃度」は、この例に最も関係が深い語ではありません。
  「モル」が正しいです。この例はモルに関係しています。
  「化学反応式」は、この例に最も関係が深い語ではありません。
  「酸」は、この例に最も関係が深い語ではありません。
