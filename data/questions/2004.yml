# 化学基礎 問964
id: 2004
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "分子 / 水酸化物イオンや水素イオンの受け取りに注目すること"
  - "塩基 / 相手を酸化させ、自分は還元されること"
  - "昇華 / 固体から直接気体になること"
  - "酸化剤 / 物質の性質を示す小さな粒子として考えること"
correct: 2
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「昇華 / 固体から直接気体になること」です。したがって、正解は「昇華 / 固体から直接気体になること」です。
  
  「分子 / 水酸化物イオンや水素イオンの受け取りに注目すること」は、用語と要点の対応が合っていません。
  「塩基 / 相手を酸化させ、自分は還元されること」は、用語と要点の対応が合っていません。
  「昇華 / 固体から直接気体になること」が正しいです。用語と要点の対応が合っています。
  「酸化剤 / 物質の性質を示す小さな粒子として考えること」は、用語と要点の対応が合っていません。
