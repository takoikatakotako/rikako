# 高校化学 問167
id: 2167
type: single_choice
text: |
  アルカリ金属と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムで黄色、銅で青緑色を確かめる場面"
  - "電線や青色の銅イオン水溶液を考える場面"
  - "自動車のバッテリーを考える場面"
  - "ナトリウムやカリウムの性質を比べる場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  ナトリウムやカリウムの性質を比べる場面は、アルカリ金属と結び付きが強い場面です。したがって、正解は「ナトリウムやカリウムの性質を比べる場面」です。
  
  「ナトリウムで黄色、銅で青緑色を確かめる場面」は、炎色反応と結び付きが強い場面です。
  「電線や青色の銅イオン水溶液を考える場面」は、銅と結び付きが強い場面です。
  「自動車のバッテリーを考える場面」は、鉛蓄電池と結び付きが強い場面です。
  「ナトリウムやカリウムの性質を比べる場面」が正しいです。これはアルカリ金属と結び付きが強い場面です。
