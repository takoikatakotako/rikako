# 高校化学 問724
id: 2724
type: single_choice
text: |
  「溶質があると溶媒の蒸気圧が下がること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "化学平衡"
  - "蒸気圧降下"
  - "塩基解離定数"
  - "銅"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「溶質があると溶媒の蒸気圧が下がること」という見方が大切なのは蒸気圧降下です。したがって、正解は「蒸気圧降下」です。
  
  「化学平衡」は、その語で大切なのは「反応が止まるのではなく速さがつり合うこと」という見方です。
  「蒸気圧降下」が正しいです。この見方が大切な語です。
  「塩基解離定数」は、その語で大切なのは「塩基の強さを電離のしやすさで見ること」という見方です。
  「銅」は、その語で大切なのは「電気伝導性が高く、特徴的な色のイオンをつくること」という見方です。
