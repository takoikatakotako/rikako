# 高校化学 問10
id: 720
type: single_choice
text: |
  理想気体の状態方程式についての説明として、最も適切なものはどれか。
choices:
  - "蒸発する速さと凝縮する速さが等しくなった状態である。"
  - "気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。"
  - "液体1 molが気体になるときに吸収する熱量である。"
  - "陽イオンと陰イオンが規則正しく並んでできた結晶である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  理想気体の状態方程式は、気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。 したがって、正解は「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」です。
  
  「蒸発する速さと凝縮する速さが等しくなった状態である。」は、気液平衡の説明です。
  「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」が正しいです。理想気体の状態方程式の説明です。
  「液体1 molが気体になるときに吸収する熱量である。」は、蒸発熱の説明です。
  「陽イオンと陰イオンが規則正しく並んでできた結晶である。」は、イオン結晶の説明です。
