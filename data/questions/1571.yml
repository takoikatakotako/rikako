# 化学基礎 問531
id: 1571
type: single_choice
text: |
  「水溶液中で水素イオンを生じる物質である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "レモン水とせっけん水の酸性・塩基性を比べる場面"
  - "亜鉛が銅より先にイオンになりやすいことを見る場面"
  - "塩酸が水溶液中で水素イオンを生じる場面"
  - "食品の変色や劣化を防ぐためにビタミンCを使う場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「水溶液中で水素イオンを生じる物質である。」と最も関係が深い場面は「塩酸が水溶液中で水素イオンを生じる場面」です。したがって、正解は「塩酸が水溶液中で水素イオンを生じる場面」です。
  
  「レモン水とせっけん水の酸性・塩基性を比べる場面」は、「水溶液の酸性や塩基性の強さを表す尺度である。」と結び付きが強い場面です。
  「亜鉛が銅より先にイオンになりやすいことを見る場面」は、「金属が電子を失ってイオンになりやすい性質の強さである。」と結び付きが強い場面です。
  「塩酸が水溶液中で水素イオンを生じる場面」が正しいです。この説明と結び付きが強い場面です。
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」は、「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」と結び付きが強い場面です。
