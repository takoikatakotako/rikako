# 化学基礎 問114
id: 1154
type: single_choice
text: |
  昇華についての説明として、最も適切なものはどれか。
choices:
  - "原子がもつ陽子の数を表す。"
  - "固体が液体にならずに直接気体になる状態変化である。"
  - "原子核にある陽子の数と中性子の数の合計を表す。"
  - "陽子の数が同じで、中性子の数が異なる原子どうしである。"
correct: 1
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  昇華は、固体が液体にならずに直接気体になる状態変化である。したがって、正解は「固体が液体にならずに直接気体になる状態変化である。」です。
  
  「原子がもつ陽子の数を表す。」は、原子番号の説明です。
  「固体が液体にならずに直接気体になる状態変化である。」が正しいです。昇華の説明です。
  「原子核にある陽子の数と中性子の数の合計を表す。」は、質量数の説明です。
  「陽子の数が同じで、中性子の数が異なる原子どうしである。」は、同位体の説明です。
