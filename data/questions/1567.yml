# 化学基礎 問527
id: 1567
type: single_choice
text: |
  「分子の中で電荷のかたよりがほとんどない分子である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水素と酸素から水ができる反応を式で表す場面"
  - "マグネシウムが酸素と結び付く場面"
  - "酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面"
  - "食塩水や塩酸が電流を通す場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「分子の中で電荷のかたよりがほとんどない分子である。」と最も関係が深い場面は「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」です。したがって、正解は「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」です。
  
  「水素と酸素から水ができる反応を式で表す場面」は、「化学変化を、物質の種類と量の関係が分かるように表した式である。」と結び付きが強い場面です。
  「マグネシウムが酸素と結び付く場面」は、「物質が酸素と結び付く、または電子を失う変化である。」と結び付きが強い場面です。
  「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」が正しいです。この説明と結び付きが強い場面です。
  「食塩水や塩酸が電流を通す場面」は、「水に溶けたり融解したりすると電流を通す物質である。」と結び付きが強い場面です。
