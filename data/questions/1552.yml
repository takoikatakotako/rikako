# 化学基礎 問512
id: 1552
type: single_choice
text: |
  「液体が気体になる状態変化である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムの陽子数から元素を区別する場面"
  - "塩化ナトリウムが陽イオンと陰イオンの引力でできる場面"
  - "1Lの食塩水にどれだけ溶質が溶けているかを表す場面"
  - "ぬれた床の水がしだいに乾く場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「液体が気体になる状態変化である。」と最も関係が深い場面は「ぬれた床の水がしだいに乾く場面」です。したがって、正解は「ぬれた床の水がしだいに乾く場面」です。
  
  「ナトリウムの陽子数から元素を区別する場面」は、「原子核の中にある陽子の数を表す数である。」と結び付きが強い場面です。
  「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」は、「陽イオンと陰イオンの静電気的な引力による結び付きである。」と結び付きが強い場面です。
  「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」は、「溶液1L中に溶けている溶質の物質量を表した濃度である。」と結び付きが強い場面です。
  「ぬれた床の水がしだいに乾く場面」が正しいです。この説明と結び付きが強い場面です。
