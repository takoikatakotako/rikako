# 高校化学 問855
id: 2855
type: single_choice
text: |
  「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "固体と液体の境目の温度に注目すること"
  - "反応が止まるのではなく速さがつり合うこと"
  - "0 K を基準に温度を考えること"
  - "溶質があると溶媒の蒸気圧が下がること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」を理解する上では、「反応が止まるのではなく速さがつり合うこと」という見方が大切です。したがって、正解は「反応が止まるのではなく速さがつり合うこと」です。
  
  「固体と液体の境目の温度に注目すること」は、その見方は融点に関係します。
  「反応が止まるのではなく速さがつり合うこと」が正しいです。この説明と結び付きが強い見方です。
  「0 K を基準に温度を考えること」は、その見方は絶対温度に関係します。
  「溶質があると溶媒の蒸気圧が下がること」は、その見方は蒸気圧降下に関係します。
