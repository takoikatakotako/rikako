# 化学基礎 問607
id: 1647
type: single_choice
text: |
  「一種類の元素だけからできること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "単体"
  - "イオン結合"
  - "モル濃度"
  - "指示薬"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「一種類の元素だけからできること」という見方が大切なのは単体です。したがって、正解は「単体」です。
  
  「単体」が正しいです。この見方が大切な語です。
  「イオン結合」は、その語で大切なのは「電気的な引力で結び付くこと」という見方です。
  「モル濃度」は、その語で大切なのは「1Lあたりの物質量で表すこと」という見方です。
  「指示薬」は、その語で大切なのは「色の変化で液性を見分けること」という見方です。
