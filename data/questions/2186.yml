# 高校化学 問186
id: 2186
type: single_choice
text: |
  エステルと最も関係が深い場面として、適切なものはどれか。
choices:
  - "鉄や銅、クロムの化合物の色の違いを考える場面"
  - "さびや鉄鋼の利用を考える場面"
  - "果物の香りに関係する化合物を考える場面"
  - "導電性高分子や高性能電池材料を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  果物の香りに関係する化合物を考える場面は、エステルと結び付きが強い場面です。したがって、正解は「果物の香りに関係する化合物を考える場面」です。
  
  「鉄や銅、クロムの化合物の色の違いを考える場面」は、遷移元素と結び付きが強い場面です。
  「さびや鉄鋼の利用を考える場面」は、鉄と結び付きが強い場面です。
  「果物の香りに関係する化合物を考える場面」が正しいです。これはエステルと結び付きが強い場面です。
  「導電性高分子や高性能電池材料を考える場面」は、機能性材料と結び付きが強い場面です。
