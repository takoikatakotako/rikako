# 化学基礎 問896
id: 1936
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "放射性同位体 / 放射線を出しながら別の原子へ変わっていく同位体である。"
  - "イオン化傾向 / 食品や物質が酸化して変質するのを防ぐために用いられる物質である。"
  - "酸化防止剤 / 一種類の物質だけからできていて、性質が一定である物質である。"
  - "純物質 / 金属が電子を失ってイオンになりやすい性質の強さである。"
correct: 0
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「放射性同位体 / 放射線を出しながら別の原子へ変わっていく同位体である。」です。したがって、正解は「放射性同位体 / 放射線を出しながら別の原子へ変わっていく同位体である。」です。
  
  「放射性同位体 / 放射線を出しながら別の原子へ変わっていく同位体である。」が正しいです。用語と説明の対応が合っています。
  「イオン化傾向 / 食品や物質が酸化して変質するのを防ぐために用いられる物質である。」は、用語と説明の対応が合っていません。
  「酸化防止剤 / 一種類の物質だけからできていて、性質が一定である物質である。」は、用語と説明の対応が合っていません。
  「純物質 / 金属が電子を失ってイオンになりやすい性質の強さである。」は、用語と説明の対応が合っていません。
