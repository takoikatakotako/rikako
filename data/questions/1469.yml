# 化学基礎 問429
id: 1469
type: single_choice
text: |
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "酸化剤"
  - "イオン化傾向"
  - "塩橋"
  - "モル濃度"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  溶液1L中に溶けている溶質の物質量を表した濃度である。 に当てはまる語はモル濃度です。したがって、正解は「モル濃度」です。
  
  「酸化剤」は、「相手を酸化させ、自身は還元される物質である。」に当てはまる語です。
  「イオン化傾向」は、「金属が電子を失ってイオンになりやすい性質の強さである。」に当てはまる語です。
  「塩橋」は、「二つの溶液の電気的なつり合いを保つための部分である。」に当てはまる語です。
  「モル濃度」が正しいです。「溶液1L中に溶けている溶質の物質量を表した濃度である。」に当てはまる語です。
