# 高校化学 問244
id: 2244
type: single_choice
text: |
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "光合成"
  - "鉛蓄電池"
  - "活性化エネルギー"
  - "可逆反応"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  鉛とその化合物を用いた、充電して繰り返し使える電池である。 に当てはまる語は鉛蓄電池です。したがって、正解は「鉛蓄電池」です。
  
  「光合成」は、「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」に当てはまる語です。
  「鉛蓄電池」が正しいです。「鉛とその化合物を用いた、充電して繰り返し使える電池である。」に当てはまる語です。
  「活性化エネルギー」は、「反応が進むために必要な最小限のエネルギーである。」に当てはまる語です。
  「可逆反応」は、「正反応と逆反応の両方が起こり得る反応である。」に当てはまる語です。
