# 高校化学 問142
id: 2142
type: single_choice
text: |
  光合成と最も関係が深い場面として、適切なものはどれか。
choices:
  - "複数の反応式を組み合わせて全体の反応熱を求める場面"
  - "燃焼や中和で容器が温かくなる場面"
  - "植物が光を受けてデンプンなどをつくる場面"
  - "ケミカルライトが光る仕組みを考える場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  植物が光を受けてデンプンなどをつくる場面は、光合成と結び付きが強い場面です。したがって、正解は「植物が光を受けてデンプンなどをつくる場面」です。
  
  「複数の反応式を組み合わせて全体の反応熱を求める場面」は、ヘスの法則と結び付きが強い場面です。
  「燃焼や中和で容器が温かくなる場面」は、発熱反応と結び付きが強い場面です。
  「植物が光を受けてデンプンなどをつくる場面」が正しいです。これは光合成と結び付きが強い場面です。
  「ケミカルライトが光る仕組みを考える場面」は、化学発光と結び付きが強い場面です。
