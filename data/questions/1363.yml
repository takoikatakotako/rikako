# 化学基礎 問323
id: 1363
type: single_choice
text: |
  共有結合について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "原子や原子団が電子を受け取って負の電荷をもつ粒子である。"
  - "金属原子が自由電子を介して結び付く結合である。"
  - "分子の中で電荷のかたよりがある分子である。"
  - "原子どうしが電子を共有してできる結び付きである。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  共有結合は、原子どうしが電子を共有してできる結び付きである。 したがって、正解は「原子どうしが電子を共有してできる結び付きである。」です。
  
  「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」は、陰イオンの説明です。
  「金属原子が自由電子を介して結び付く結合である。」は、金属結合の説明です。
  「分子の中で電荷のかたよりがある分子である。」は、極性分子の説明です。
  「原子どうしが電子を共有してできる結び付きである。」が正しいです。共有結合の説明です。
