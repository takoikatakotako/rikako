# 高校化学 問218
id: 2218
type: single_choice
text: |
  「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "電気泳動"
  - "疎水コロイド"
  - "イオン結晶"
  - "金属結晶"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  金属原子が規則正しく並び、自由電子が全体に広がった結晶である。 に当てはまる語は金属結晶です。したがって、正解は「金属結晶」です。
  
  「電気泳動」は、「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」に当てはまる語です。
  「疎水コロイド」は、「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」に当てはまる語です。
  「イオン結晶」は、「陽イオンと陰イオンが規則正しく並んでできた結晶である。」に当てはまる語です。
  「金属結晶」が正しいです。「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」に当てはまる語です。
