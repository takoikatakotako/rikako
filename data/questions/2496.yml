# 高校化学 問496
id: 2496
type: single_choice
text: |
  デンプンを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "分子の端にカルボニル構造をもつこと"
  - "カルボン酸とアルコールの組合せでできること"
  - "ベンゼン環にヒドロキシ基が直接つくこと"
  - "植物がエネルギーをたくわえる多糖であること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  デンプンでは、「植物がエネルギーをたくわえる多糖であること」という見方が大切です。したがって、正解は「植物がエネルギーをたくわえる多糖であること」です。
  
  「分子の端にカルボニル構造をもつこと」は、アルデヒドに関係する見方です。
  「カルボン酸とアルコールの組合せでできること」は、エステルに関係する見方です。
  「ベンゼン環にヒドロキシ基が直接つくこと」は、フェノールに関係する見方です。
  「植物がエネルギーをたくわえる多糖であること」が正しいです。デンプンの要点を表しています。
