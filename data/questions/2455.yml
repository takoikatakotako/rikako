# 高校化学 問455
id: 2455
type: single_choice
text: |
  化学平衡を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "溶質があると凝固点が下がること"
  - "小さな粒子が分散している状態であること"
  - "反応が止まるのではなく速さがつり合うこと"
  - "粒子が周囲の分子にぶつかって動くこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  化学平衡では、「反応が止まるのではなく速さがつり合うこと」という見方が大切です。したがって、正解は「反応が止まるのではなく速さがつり合うこと」です。
  
  「溶質があると凝固点が下がること」は、凝固点降下に関係する見方です。
  「小さな粒子が分散している状態であること」は、コロイドに関係する見方です。
  「反応が止まるのではなく速さがつり合うこと」が正しいです。化学平衡の要点を表しています。
  「粒子が周囲の分子にぶつかって動くこと」は、ブラウン運動に関係する見方です。
