# 化学基礎 問90
id: 1130
type: single_choice
text: |
  電気分解で起こっているエネルギーの変換として、最も適切なものはどれか。
choices:
  - "電気エネルギーが化学変化を起こすのに使われる。"
  - "化学エネルギーが必ず光だけに変わる。"
  - "熱エネルギーだけで全て進む。"
  - "質量が必ず 0 になる。"
correct: 0
explanation: |
  この問題は、「電気分解の役割」をエネルギーの視点で考える問題です。
  
  電気分解では、外部から与えた電気エネルギーを使って化学変化を起こします。したがって、正解は「電気エネルギーが化学変化を起こすのに使われる」です。
  
  「電気エネルギーが化学変化を起こすのに使われる」が正しいです。
  「化学エネルギーが必ず光だけに変わる」は、適切ではありません。
  「熱エネルギーだけで全て進む」は、適切ではありません。
  「質量が必ず 0 になる」は、適切ではありません。
