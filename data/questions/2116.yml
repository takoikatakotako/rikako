# 高校化学 問116
id: 2116
type: single_choice
text: |
  分子結晶と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ドライアイスやヨウ素の結晶を考える場面"
  - "食塩水が純水より蒸発しにくくなることを考える場面"
  - "凍結防止剤をまいた道路の水が凍りにくくなる場面"
  - "牛乳やゼラチン溶液のような見た目の系を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  ドライアイスやヨウ素の結晶を考える場面は、分子結晶と結び付きが強い場面です。したがって、正解は「ドライアイスやヨウ素の結晶を考える場面」です。
  
  「ドライアイスやヨウ素の結晶を考える場面」が正しいです。これは分子結晶と結び付きが強い場面です。
  「食塩水が純水より蒸発しにくくなることを考える場面」は、蒸気圧降下と結び付きが強い場面です。
  「凍結防止剤をまいた道路の水が凍りにくくなる場面」は、凝固点降下と結び付きが強い場面です。
  「牛乳やゼラチン溶液のような見た目の系を考える場面」は、コロイドと結び付きが強い場面です。
