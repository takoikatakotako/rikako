# 高校化学 問548
id: 2548
type: single_choice
text: |
  「電気分解で酸化が起こる電極である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "同じ反応でも条件によって進み方が変わることを比べる場面"
  - "酢酸ナトリウム水溶液が塩基性を示す理由を考える場面"
  - "アンモニアが金属イオンに電子対を与える場面"
  - "電気分解で気体が発生する電極側を考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「電気分解で酸化が起こる電極である。」と最も関係が深い場面は「電気分解で気体が発生する電極側を考える場面」です。したがって、正解は「電気分解で気体が発生する電極側を考える場面」です。
  
  「同じ反応でも条件によって進み方が変わることを比べる場面」は、「単位時間あたりに進む反応の程度を表す量である。」と結び付きが強い場面です。
  「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」は、「塩のイオンが水と反応して溶液の性質を変える現象である。」と結び付きが強い場面です。
  「アンモニアが金属イオンに電子対を与える場面」は、「一方の原子が電子対を与えてできる共有結合である。」と結び付きが強い場面です。
  「電気分解で気体が発生する電極側を考える場面」が正しいです。この説明と結び付きが強い場面です。
