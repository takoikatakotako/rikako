# 高校化学 問461
id: 2461
type: single_choice
text: |
  緩衝液を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "pH の変化をおさえること"
  - "コロイド粒子の電荷に注目すること"
  - "水となじみにくく不安定になりやすいこと"
  - "反応を始めるための壁に注目すること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  緩衝液では、「pH の変化をおさえること」という見方が大切です。したがって、正解は「pH の変化をおさえること」です。
  
  「pH の変化をおさえること」が正しいです。緩衝液の要点を表しています。
  「コロイド粒子の電荷に注目すること」は、電気泳動に関係する見方です。
  「水となじみにくく不安定になりやすいこと」は、疎水コロイドに関係する見方です。
  「反応を始めるための壁に注目すること」は、活性化エネルギーに関係する見方です。
