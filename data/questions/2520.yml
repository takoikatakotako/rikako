# 高校化学 問520
id: 2520
type: single_choice
text: |
  「溶質の粒子が溶媒中に広がっていく現象である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "飽和溶液で見かけ上変化が止まっている場面"
  - "金属や硫黄のコロイドが電解質で沈みやすい場面"
  - "スマートフォンやノートパソコンの電池を考える場面"
  - "食塩が水に溶けて見えなくなる場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「溶質の粒子が溶媒中に広がっていく現象である。」と最も関係が深い場面は「食塩が水に溶けて見えなくなる場面」です。したがって、正解は「食塩が水に溶けて見えなくなる場面」です。
  
  「飽和溶液で見かけ上変化が止まっている場面」は、「溶ける速さと析出する速さが等しくなっている平衡である。」と結び付きが強い場面です。
  「金属や硫黄のコロイドが電解質で沈みやすい場面」は、「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」と結び付きが強い場面です。
  「スマートフォンやノートパソコンの電池を考える場面」は、「リチウムイオンの移動を利用する充電式電池である。」と結び付きが強い場面です。
  「食塩が水に溶けて見えなくなる場面」が正しいです。この説明と結び付きが強い場面です。
