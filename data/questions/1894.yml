# 化学基礎 問854
id: 1894
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "高分子化合物 / 二種類以上の物質が混ざってできている物質である。"
  - "混合物 / 液体が固体に変わる状態変化である。"
  - "クロマトグラフィー / 成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
  - "凝固 / 多数の小さな単位がつながってできた大きな分子からなる化合物である。"
correct: 2
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「クロマトグラフィー / 成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」です。したがって、正解は「クロマトグラフィー / 成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」です。
  
  「高分子化合物 / 二種類以上の物質が混ざってできている物質である。」は、用語と説明の対応が合っていません。
  「混合物 / 液体が固体に変わる状態変化である。」は、用語と説明の対応が合っていません。
  「クロマトグラフィー / 成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」が正しいです。用語と説明の対応が合っています。
  「凝固 / 多数の小さな単位がつながってできた大きな分子からなる化合物である。」は、用語と説明の対応が合っていません。
