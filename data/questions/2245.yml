# 高校化学 問245
id: 2245
type: single_choice
text: |
  「リチウムイオンの移動を利用する充電式電池である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "反応速度"
  - "触媒"
  - "リチウムイオン電池"
  - "化学平衡"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  リチウムイオンの移動を利用する充電式電池である。 に当てはまる語はリチウムイオン電池です。したがって、正解は「リチウムイオン電池」です。
  
  「反応速度」は、「単位時間あたりに進む反応の程度を表す量である。」に当てはまる語です。
  「触媒」は、「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」に当てはまる語です。
  「リチウムイオン電池」が正しいです。「リチウムイオンの移動を利用する充電式電池である。」に当てはまる語です。
  「化学平衡」は、「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」に当てはまる語です。
