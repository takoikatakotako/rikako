# 高校化学 問47
id: 2047
type: single_choice
text: |
  電気分解についての説明として、最も適切なものはどれか。
choices:
  - "電気分解で酸化が起こる電極である。"
  - "電気分解で生じる物質の量は流れた電気量に比例するという法則である。"
  - "電気エネルギーを使って自発的でない化学変化を起こす操作である。"
  - "一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  電気分解は、電気エネルギーを使って自発的でない化学変化を起こす操作である。 したがって、正解は「電気エネルギーを使って自発的でない化学変化を起こす操作である。」です。
  
  「電気分解で酸化が起こる電極である。」は、陽極の説明です。
  「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」は、ファラデーの法則の説明です。
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」が正しいです。電気分解の説明です。
  「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」は、エンタルピー変化の説明です。
