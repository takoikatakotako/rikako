# 化学基礎 問370
id: 1410
type: single_choice
text: |
  陽イオンと最も関係が深い場面として、適切なものはどれか。
choices:
  - "水分子で電荷のかたよりを考える場面"
  - "ナトリウム原子が電子を1個失って Na+ になる場面"
  - "ナトリウムの陽子数から元素を区別する場面"
  - "炭素12と炭素14を比べる場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  ナトリウム原子が電子を1個失って Na+ になる場面は、陽イオンと結び付きが強い場面です。したがって、正解は「ナトリウム原子が電子を1個失って Na+ になる場面」です。
  
  「水分子で電荷のかたよりを考える場面」は、極性分子と結び付きが強い場面です。
  「ナトリウム原子が電子を1個失って Na+ になる場面」が正しいです。これは陽イオンと結び付きが強い場面です。
  「ナトリウムの陽子数から元素を区別する場面」は、原子番号と結び付きが強い場面です。
  「炭素12と炭素14を比べる場面」は、同位体と結び付きが強い場面です。
