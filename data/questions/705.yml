# 化学基礎 問38
id: 705
type: single_choice
text: |
  25℃ で pH が 7 の水溶液の性質として、最も適切なものはどれか。
choices:
  - "酸性"
  - "中性"
  - "アルカリ性"
  - "必ず気体"
correct: 1
explanation: |
  この問題は、「pH 7 が何を表すか」を確認する問題です。
  
  25℃ では、pH が 7 の水溶液は中性です。pH が 7 より小さいと酸性、7 より大きいとアルカリ性です。したがって、正解は「中性」です。
  
  「酸性」は、pH 7 より小さいときに当てはまります。
  「中性」が正しいです。25℃ では pH 7 が中性です。
  「アルカリ性」は、pH 7 より大きいときに当てはまります。
  「必ず気体」は、水溶液の性質として適切ではありません。
