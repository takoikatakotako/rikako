# 化学基礎 問86
id: 1126
type: single_choice
text: |
  還元剤が反応の中で自分自身に起こす変化として、最も適切なものはどれか。
choices:
  - "酸化される。"
  - "還元される。"
  - "中和される。"
  - "必ず蒸発する。"
correct: 0
explanation: |
  この問題は、「還元剤が自分ではどう変化するか」を確認する問題です。
  
  還元剤は相手に電子を与えるので、自分自身は電子を失って酸化されます。したがって、正解は「酸化される」です。
  
  「酸化される」が正しいです。還元剤は自分が電子を失います。
  「還元される」は、適切ではありません。
  「中和される」は、この問題の内容ではありません。
  「必ず蒸発する」は、適切ではありません。
