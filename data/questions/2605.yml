# 高校化学 問605
id: 2605
type: single_choice
text: |
  「密閉容器で水面の高さが変わらなくなる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "その温度でそれ以上溶質が溶けない状態の溶液である。"
  - "蒸発する速さと凝縮する速さが等しくなった状態である。"
  - "水との親和性が高く、比較的安定なコロイドである。"
  - "鉛とその化合物を用いた、充電して繰り返し使える電池である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「密閉容器で水面の高さが変わらなくなる場面」を説明した文として適切なのは「蒸発する速さと凝縮する速さが等しくなった状態である。」です。したがって、正解は「蒸発する速さと凝縮する速さが等しくなった状態である。」です。
  
  「その温度でそれ以上溶質が溶けない状態の溶液である。」は、この説明は「食塩を加えても底に残るようになった食塩水を考える場面」と結び付きが強いです。
  「蒸発する速さと凝縮する速さが等しくなった状態である。」が正しいです。この具体例を説明した文です。
  「水との親和性が高く、比較的安定なコロイドである。」は、この説明は「デンプンやゼラチンが水中で安定しやすい場面」と結び付きが強いです。
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」は、この説明は「自動車のバッテリーを考える場面」と結び付きが強いです。
