# 高校化学 問239
id: 2239
type: single_choice
text: |
  「反応の結果として周囲へ熱を放出する反応である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "発熱反応"
  - "化学発光"
  - "乾電池"
  - "リチウムイオン電池"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  反応の結果として周囲へ熱を放出する反応である。 に当てはまる語は発熱反応です。したがって、正解は「発熱反応」です。
  
  「発熱反応」が正しいです。「反応の結果として周囲へ熱を放出する反応である。」に当てはまる語です。
  「化学発光」は、「化学反応によって光が放出される現象である。」に当てはまる語です。
  「乾電池」は、「一度使い切ることを前提にした一次電池の代表例である。」に当てはまる語です。
  「リチウムイオン電池」は、「リチウムイオンの移動を利用する充電式電池である。」に当てはまる語です。
