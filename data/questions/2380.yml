# 高校化学 問380
id: 2380
type: single_choice
text: |
  「エチレンに臭素が付加する場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "化学が築く未来"
  - "不飽和炭化水素"
  - "付加反応"
  - "異性体"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  エチレンに臭素が付加する場面 と最も関係が深いのは付加反応です。したがって、正解は「付加反応」です。
  
  「化学が築く未来」は、「再生可能エネルギーや新素材の開発を考える場面」と結び付きが強い語です。
  「不飽和炭化水素」は、「エチレンやアセチレンの反応性を考える場面」と結び付きが強い語です。
  「付加反応」が正しいです。この具体例と最も関係が深い語です。
  「異性体」は、「ブタンとイソブタンを比べる場面」と結び付きが強い語です。
