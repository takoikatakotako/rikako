# 化学基礎 問874
id: 1914
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "最外殻電子 / 分子の中で電荷のかたよりがある分子である。"
  - "極性分子 / 酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。"
  - "金属結合 / 金属原子が自由電子を介して結び付く結合である。"
  - "中和 / 原子のいちばん外側の電子殻にある電子である。"
correct: 2
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「金属結合 / 金属原子が自由電子を介して結び付く結合である。」です。したがって、正解は「金属結合 / 金属原子が自由電子を介して結び付く結合である。」です。
  
  「最外殻電子 / 分子の中で電荷のかたよりがある分子である。」は、用語と説明の対応が合っていません。
  「極性分子 / 酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」は、用語と説明の対応が合っていません。
  「金属結合 / 金属原子が自由電子を介して結び付く結合である。」が正しいです。用語と説明の対応が合っています。
  「中和 / 原子のいちばん外側の電子殻にある電子である。」は、用語と説明の対応が合っていません。
