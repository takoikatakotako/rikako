# 化学基礎 問422
id: 1462
type: single_choice
text: |
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "イオン結合"
  - "モル濃度"
  - "酸"
  - "中和"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  陽イオンと陰イオンの静電気的な引力による結び付きである。 に当てはまる語はイオン結合です。したがって、正解は「イオン結合」です。
  
  「イオン結合」が正しいです。「陽イオンと陰イオンの静電気的な引力による結び付きである。」に当てはまる語です。
  「モル濃度」は、「溶液1L中に溶けている溶質の物質量を表した濃度である。」に当てはまる語です。
  「酸」は、「水溶液中で水素イオンを生じる物質である。」に当てはまる語です。
  「中和」は、「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」に当てはまる語です。
