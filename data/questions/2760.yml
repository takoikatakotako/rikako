# 高校化学 問760
id: 2760
type: single_choice
text: |
  「H+ と OH- の積が一定であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "PET"
  - "水のイオン積"
  - "融点"
  - "絶対温度"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「H+ と OH- の積が一定であること」という見方が大切なのは水のイオン積です。したがって、正解は「水のイオン積」です。
  
  「PET」は、その語で大切なのは「ポリエステルの一種で再利用もしやすいこと」という見方です。
  「水のイオン積」が正しいです。この見方が大切な語です。
  「融点」は、その語で大切なのは「固体と液体の境目の温度に注目すること」という見方です。
  「絶対温度」は、その語で大切なのは「0 K を基準に温度を考えること」という見方です。
