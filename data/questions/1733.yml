# 化学基礎 問693
id: 1733
type: single_choice
text: |
  「二つの溶液の電気的なつり合いを保つための部分である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "固体から直接気体になること"
  - "電池の中で電気的なつり合いを保つこと"
  - "電子を受け取って負に帯電すること"
  - "粒子の数をまとめて扱う単位であること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「二つの溶液の電気的なつり合いを保つための部分である。」を理解する上では、「電池の中で電気的なつり合いを保つこと」という見方が大切です。したがって、正解は「電池の中で電気的なつり合いを保つこと」です。
  
  「固体から直接気体になること」は、その見方は昇華に関係します。
  「電池の中で電気的なつり合いを保つこと」が正しいです。この説明と結び付きが強い見方です。
  「電子を受け取って負に帯電すること」は、その見方は陰イオンに関係します。
  「粒子の数をまとめて扱う単位であること」は、その見方はモルに関係します。
