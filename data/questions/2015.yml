# 化学基礎 問975
id: 2015
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "指示薬 / 電池の中で電気的なつり合いを保つこと"
  - "分子 / 物質の性質を示す小さな粒子として考えること"
  - "塩橋 / 化学が社会や生活に広く役立つこと"
  - "化学が拓く世界 / 色の変化で液性を見分けること"
correct: 1
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「分子 / 物質の性質を示す小さな粒子として考えること」です。したがって、正解は「分子 / 物質の性質を示す小さな粒子として考えること」です。
  
  「指示薬 / 電池の中で電気的なつり合いを保つこと」は、用語と要点の対応が合っていません。
  「分子 / 物質の性質を示す小さな粒子として考えること」が正しいです。用語と要点の対応が合っています。
  「塩橋 / 化学が社会や生活に広く役立つこと」は、用語と要点の対応が合っていません。
  「化学が拓く世界 / 色の変化で液性を見分けること」は、用語と要点の対応が合っていません。
