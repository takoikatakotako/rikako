# 化学基礎 問212
id: 1252
type: single_choice
text: |
  「水たまりが乾く変化」に最も関係が深い語として、適切なものはどれか。
choices:
  - "凝固"
  - "蒸発"
  - "昇華"
  - "原子番号"
correct: 1
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「水たまりが乾く変化」に最も関係が深いのは蒸発です。したがって、正解は「蒸発」です。
  
  「凝固」は、この例に最も関係が深い語ではありません。
  「蒸発」が正しいです。この例は蒸発に関係しています。
  「昇華」は、この例に最も関係が深い語ではありません。
  「原子番号」は、この例に最も関係が深い語ではありません。
