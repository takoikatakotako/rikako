# 化学基礎 問168
id: 1208
type: single_choice
text: |
  周期律の例として、最も適切なものはどれか。
choices:
  - "ナトリウムでは最外殻電子が 1 個であること"
  - "Na+"
  - "ナトリウムとカリウムが似た性質を示すこと"
  - "Cl-"
correct: 2
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  ナトリウムとカリウムが似た性質を示すことは、周期律の例です。したがって、正解は「ナトリウムとカリウムが似た性質を示すこと」です。
  
  「ナトリウムでは最外殻電子が 1 個であること」は、最外殻電子の例として見る方が適切です。
  「Na+」は、陽イオンの例として見る方が適切です。
  「ナトリウムとカリウムが似た性質を示すこと」が正しいです。これは周期律の例です。
  「Cl-」は、陰イオンの例として見る方が適切です。
