# 高校化学 問549
id: 2549
type: single_choice
text: |
  「電気分解で還元が起こる電極である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "金属イオンが電子を受け取って析出する電極を考える場面"
  - "加熱すると反応が進みやすくなる理由を考える場面"
  - "酢酸が塩酸ほど強く電離しない場面"
  - "鉄や銅、クロムの化合物の色の違いを考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「電気分解で還元が起こる電極である。」と最も関係が深い場面は「金属イオンが電子を受け取って析出する電極を考える場面」です。したがって、正解は「金属イオンが電子を受け取って析出する電極を考える場面」です。
  
  「金属イオンが電子を受け取って析出する電極を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「加熱すると反応が進みやすくなる理由を考える場面」は、「反応が進むために必要な最小限のエネルギーである。」と結び付きが強い場面です。
  「酢酸が塩酸ほど強く電離しない場面」は、「水溶液中で一部だけ電離する酸である。」と結び付きが強い場面です。
  「鉄や銅、クロムの化合物の色の違いを考える場面」は、「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」と結び付きが強い場面です。
