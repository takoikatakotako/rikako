# 高校化学 問818
id: 2818
type: single_choice
text: |
  「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "自由電子が性質に関係すること"
  - "酸の強さを電離のしやすさで見ること"
  - "実用性が高く、酸化数が変わりやすいこと"
  - "ベンゼン環をもつこと"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」を理解する上では、「自由電子が性質に関係すること」という見方が大切です。したがって、正解は「自由電子が性質に関係すること」です。
  
  「自由電子が性質に関係すること」が正しいです。この説明と結び付きが強い見方です。
  「酸の強さを電離のしやすさで見ること」は、その見方は酸解離定数に関係します。
  「実用性が高く、酸化数が変わりやすいこと」は、その見方は鉄に関係します。
  「ベンゼン環をもつこと」は、その見方はベンゼンに関係します。
