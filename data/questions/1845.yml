# 化学基礎 問805
id: 1845
type: single_choice
text: |
  「成分が一種類で性質が一定であること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "食塩水や塩酸が電流を通す場面"
  - "砂と水の混合物から砂を取り除く場面"
  - "酸素だけが入った容器を考える場面"
  - "水や二酸化炭素のように複数の元素からできた物質を考える場面"
correct: 2
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「成分が一種類で性質が一定であること」という見方と最も関係が深い場面は「酸素だけが入った容器を考える場面」です。したがって、正解は「酸素だけが入った容器を考える場面」です。
  
  「食塩水や塩酸が電流を通す場面」は、その場面で大切なのは「水溶液や融解状態で電流を通すこと」という見方です。
  「砂と水の混合物から砂を取り除く場面」は、その場面で大切なのは「水に溶けない固体を液体から分けること」という見方です。
  「酸素だけが入った容器を考える場面」が正しいです。この見方と最も関係が深い場面です。
  「水や二酸化炭素のように複数の元素からできた物質を考える場面」は、その場面で大切なのは「複数の元素が結び付いてできること」という見方です。
