# 化学基礎 問720
id: 1760
type: single_choice
text: |
  「ナトリウム原子が電子を1個失って Na+ になる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "金属元素ごとに炎の色が異なること"
  - "移動しやすさの違いを利用すること"
  - "固体から液体への変化であること"
  - "電子を失って正に帯電すること"
correct: 3
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「ナトリウム原子が電子を1個失って Na+ になる場面」では、「電子を失って正に帯電すること」という見方が大切です。したがって、正解は「電子を失って正に帯電すること」です。
  
  「金属元素ごとに炎の色が異なること」は、その見方はナトリウムで黄色、銅で青緑色を観察する場面よりも炎色反応と結び付きが強いです。
  「移動しやすさの違いを利用すること」は、その見方はインクの色素をろ紙の上で分ける場面よりもクロマトグラフィーと結び付きが強いです。
  「固体から液体への変化であること」は、その見方は氷を温めて水にする場面よりも融解と結び付きが強いです。
  「電子を失って正に帯電すること」が正しいです。この具体例で大切になる見方です。
