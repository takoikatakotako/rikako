# 化学基礎 問460
id: 1500
type: single_choice
text: |
  化学変化を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "沸点の違いを利用すること"
  - "新しい物質ができること"
  - "移動しやすさの違いを利用すること"
  - "陽子数と中性子数の合計であること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  化学変化では、「新しい物質ができること」という見方が大切です。したがって、正解は「新しい物質ができること」です。
  
  「沸点の違いを利用すること」は、蒸留に関係する見方です。
  「新しい物質ができること」が正しいです。化学変化の要点を表しています。
  「移動しやすさの違いを利用すること」は、クロマトグラフィーに関係する見方です。
  「陽子数と中性子数の合計であること」は、質量数に関係する見方です。
