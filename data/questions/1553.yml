# 化学基礎 問513
id: 1553
type: single_choice
text: |
  「液体が固体に変わる状態変化である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水を冷やして氷にする場面"
  - "炭素12で陽子数と中性子数の合計を見る場面"
  - "水素原子どうしが電子を共有して H2 になる場面"
  - "水素と酸素から水ができる反応を式で表す場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「液体が固体に変わる状態変化である。」と最も関係が深い場面は「水を冷やして氷にする場面」です。したがって、正解は「水を冷やして氷にする場面」です。
  
  「水を冷やして氷にする場面」が正しいです。この説明と結び付きが強い場面です。
  「炭素12で陽子数と中性子数の合計を見る場面」は、「原子核の中にある陽子数と中性子数の合計である。」と結び付きが強い場面です。
  「水素原子どうしが電子を共有して H2 になる場面」は、「原子どうしが電子を共有してできる結び付きである。」と結び付きが強い場面です。
  「水素と酸素から水ができる反応を式で表す場面」は、「化学変化を、物質の種類と量の関係が分かるように表した式である。」と結び付きが強い場面です。
