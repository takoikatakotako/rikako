# 化学基礎 問569
id: 1609
type: single_choice
text: |
  「ナトリウムが電子を1個失いやすい理由を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "粒子の数をまとめて表すための単位である。"
  - "溶けた物質のうち、電離してイオンになった割合である。"
  - "亜鉛と銅の反応を利用して電気を取り出す電池である。"
  - "原子のいちばん外側の電子殻にある電子である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「ナトリウムが電子を1個失いやすい理由を考える場面」を説明した文として適切なのは「原子のいちばん外側の電子殻にある電子である。」です。したがって、正解は「原子のいちばん外側の電子殻にある電子である。」です。
  
  「粒子の数をまとめて表すための単位である。」は、この説明は「6.0×10^23個の粒子をひとまとまりとして数える場面」と結び付きが強いです。
  「溶けた物質のうち、電離してイオンになった割合である。」は、この説明は「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」と結び付きが強いです。
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」は、この説明は「亜鉛板と銅板を使って豆電球を光らせる場面」と結び付きが強いです。
  「原子のいちばん外側の電子殻にある電子である。」が正しいです。この具体例を説明した文です。
