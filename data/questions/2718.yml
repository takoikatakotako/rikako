# 高校化学 問718
id: 2718
type: single_choice
text: |
  「自由電子が性質に関係すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "陰極"
  - "水のイオン積"
  - "両性酸化物"
  - "金属結晶"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「自由電子が性質に関係すること」という見方が大切なのは金属結晶です。したがって、正解は「金属結晶」です。
  
  「陰極」は、その語で大切なのは「還元が起こる側の電極であること」という見方です。
  「水のイオン積」は、その語で大切なのは「H+ と OH- の積が一定であること」という見方です。
  「両性酸化物」は、その語で大切なのは「酸とも塩基とも反応すること」という見方です。
  「金属結晶」が正しいです。この見方が大切な語です。
