# 高校化学 問389
id: 2389
type: single_choice
text: |
  「染料の原料になる芳香族アミンを考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "エステル"
  - "フェノール"
  - "PET"
  - "アニリン"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  染料の原料になる芳香族アミンを考える場面 と最も関係が深いのはアニリンです。したがって、正解は「アニリン」です。
  
  「エステル」は、「果物の香りに関係する化合物を考える場面」と結び付きが強い語です。
  「フェノール」は、「フェノール類の酸性や消毒作用を考える場面」と結び付きが強い語です。
  「PET」は、「飲料ボトルや衣料用繊維を考える場面」と結び付きが強い語です。
  「アニリン」が正しいです。この具体例と最も関係が深い語です。
