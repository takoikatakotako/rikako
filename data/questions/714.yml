# 高校化学 問4
id: 714
type: single_choice
text: |
  蒸気圧についての説明として、最も適切なものはどれか。
choices:
  - "蒸発する速さと凝縮する速さが等しくなった状態である。"
  - "液体1 molが気体になるときに吸収する熱量である。"
  - "一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。"
  - "気液平衡にあるとき、気体が示す圧力である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  蒸気圧は、気液平衡にあるとき、気体が示す圧力である。 したがって、正解は「気液平衡にあるとき、気体が示す圧力である。」です。
  
  「蒸発する速さと凝縮する速さが等しくなった状態である。」は、気液平衡の説明です。
  「液体1 molが気体になるときに吸収する熱量である。」は、蒸発熱の説明です。
  「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」は、シャルルの法則の説明です。
  「気液平衡にあるとき、気体が示す圧力である。」が正しいです。蒸気圧の説明です。
