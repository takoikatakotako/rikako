# 高校化学 問857
id: 2857
type: single_choice
text: |
  「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "液体から出た蒸気が示す圧力に注目すること"
  - "陽イオンと陰イオンの引力でできること"
  - "溶質があると凝固点が下がること"
  - "加えた変化を打ち消す向きに平衡が動くこと"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」を理解する上では、「加えた変化を打ち消す向きに平衡が動くこと」という見方が大切です。したがって、正解は「加えた変化を打ち消す向きに平衡が動くこと」です。
  
  「液体から出た蒸気が示す圧力に注目すること」は、その見方は蒸気圧に関係します。
  「陽イオンと陰イオンの引力でできること」は、その見方はイオン結晶に関係します。
  「溶質があると凝固点が下がること」は、その見方は凝固点降下に関係します。
  「加えた変化を打ち消す向きに平衡が動くこと」が正しいです。この説明と結び付きが強い見方です。
