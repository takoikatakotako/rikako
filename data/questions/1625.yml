# 化学基礎 問585
id: 1625
type: single_choice
text: |
  「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」を説明した文として、最も適切なものはどれか。
choices:
  - "水に溶けたり融解したりすると電流を通す物質である。"
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "二種類以上の元素が結び付いてできている純物質である。"
  - "溶けた物質のうち、電離してイオンになった割合である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」を説明した文として適切なのは「溶けた物質のうち、電離してイオンになった割合である。」です。したがって、正解は「溶けた物質のうち、電離してイオンになった割合である。」です。
  
  「水に溶けたり融解したりすると電流を通す物質である。」は、この説明は「食塩水や塩酸が電流を通す場面」と結び付きが強いです。
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、この説明は「砂と水の混合物から砂を取り除く場面」と結び付きが強いです。
  「二種類以上の元素が結び付いてできている純物質である。」は、この説明は「水や二酸化炭素のように複数の元素からできた物質を考える場面」と結び付きが強いです。
  「溶けた物質のうち、電離してイオンになった割合である。」が正しいです。この具体例を説明した文です。
