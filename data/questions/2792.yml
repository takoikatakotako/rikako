# 高校化学 問792
id: 2792
type: single_choice
text: |
  「アミノ酸が多数つながった高分子であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "溶解平衡"
  - "タンパク質"
  - "疎水コロイド"
  - "リチウムイオン電池"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「アミノ酸が多数つながった高分子であること」という見方が大切なのはタンパク質です。したがって、正解は「タンパク質」です。
  
  「溶解平衡」は、その語で大切なのは「溶解と析出がつり合うこと」という見方です。
  「タンパク質」が正しいです。この見方が大切な語です。
  「疎水コロイド」は、その語で大切なのは「水となじみにくく不安定になりやすいこと」という見方です。
  「リチウムイオン電池」は、その語で大切なのは「軽くて繰り返し使いやすい電池であること」という見方です。
