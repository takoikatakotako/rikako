# 化学基礎 問827
id: 1867
type: single_choice
text: |
  「電荷のかたよりがほとんどないこと」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面"
  - "炭素12で陽子数と中性子数の合計を見る場面"
  - "水素原子どうしが電子を共有して H2 になる場面"
  - "水素と酸素から水ができる反応を式で表す場面"
correct: 0
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「電荷のかたよりがほとんどないこと」という見方と最も関係が深い場面は「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」です。したがって、正解は「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」です。
  
  「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」が正しいです。この見方と最も関係が深い場面です。
  「炭素12で陽子数と中性子数の合計を見る場面」は、その場面で大切なのは「陽子数と中性子数の合計であること」という見方です。
  「水素原子どうしが電子を共有して H2 になる場面」は、その場面で大切なのは「電子を共有して結び付くこと」という見方です。
  「水素と酸素から水ができる反応を式で表す場面」は、その場面で大切なのは「反応する物質とできる物質の関係を式で示すこと」という見方です。
