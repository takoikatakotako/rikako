# 化学基礎 問946
id: 1986
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "ろ過 / 水や二酸化炭素のように複数の元素からできた物質を考える場面"
  - "放射性同位体 / 医療や年代測定に利用される炭素14を考える場面"
  - "化合物 / ナトリウムの陽子数から元素を区別する場面"
  - "原子番号 / 砂と水の混合物から砂を取り除く場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「放射性同位体 / 医療や年代測定に利用される炭素14を考える場面」です。したがって、正解は「放射性同位体 / 医療や年代測定に利用される炭素14を考える場面」です。
  
  「ろ過 / 水や二酸化炭素のように複数の元素からできた物質を考える場面」は、用語と場面の対応が合っていません。
  「放射性同位体 / 医療や年代測定に利用される炭素14を考える場面」が正しいです。用語と場面の対応が合っています。
  「化合物 / ナトリウムの陽子数から元素を区別する場面」は、用語と場面の対応が合っていません。
  「原子番号 / 砂と水の混合物から砂を取り除く場面」は、用語と場面の対応が合っていません。
