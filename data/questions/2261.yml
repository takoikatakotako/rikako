# 高校化学 問261
id: 2261
type: single_choice
text: |
  「少量の酸や塩基を加えても pH が変わりにくい溶液である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "発熱反応"
  - "化学発光"
  - "緩衝液"
  - "溶解"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  少量の酸や塩基を加えても pH が変わりにくい溶液である。 に当てはまる語は緩衝液です。したがって、正解は「緩衝液」です。
  
  「発熱反応」は、「反応の結果として周囲へ熱を放出する反応である。」に当てはまる語です。
  「化学発光」は、「化学反応によって光が放出される現象である。」に当てはまる語です。
  「緩衝液」が正しいです。「少量の酸や塩基を加えても pH が変わりにくい溶液である。」に当てはまる語です。
  「溶解」は、「溶質の粒子が溶媒中に広がっていく現象である。」に当てはまる語です。
