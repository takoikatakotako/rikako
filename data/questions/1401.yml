# 化学基礎 問361
id: 1401
type: single_choice
text: |
  融解と最も関係が深い場面として、適切なものはどれか。
choices:
  - "氷を温めて水にする場面"
  - "インクの色素をろ紙の上で分ける場面"
  - "水を冷やして氷にする場面"
  - "酸素だけが入った容器を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  氷を温めて水にする場面は、融解と結び付きが強い場面です。したがって、正解は「氷を温めて水にする場面」です。
  
  「氷を温めて水にする場面」が正しいです。これは融解と結び付きが強い場面です。
  「インクの色素をろ紙の上で分ける場面」は、クロマトグラフィーと結び付きが強い場面です。
  「水を冷やして氷にする場面」は、凝固と結び付きが強い場面です。
  「酸素だけが入った容器を考える場面」は、純物質と結び付きが強い場面です。
