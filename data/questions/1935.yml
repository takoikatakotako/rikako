# 化学基礎 問895
id: 1935
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "還元剤 / 金属元素を炎に入れたときに特有の色を示す反応である。"
  - "炎色反応 / 成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
  - "クロマトグラフィー / 相手を還元させ、自身は酸化される物質である。"
  - "非電解質 / 水に溶けても電流をほとんど通さない物質である。"
correct: 3
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「非電解質 / 水に溶けても電流をほとんど通さない物質である。」です。したがって、正解は「非電解質 / 水に溶けても電流をほとんど通さない物質である。」です。
  
  「還元剤 / 金属元素を炎に入れたときに特有の色を示す反応である。」は、用語と説明の対応が合っていません。
  「炎色反応 / 成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」は、用語と説明の対応が合っていません。
  「クロマトグラフィー / 相手を還元させ、自身は酸化される物質である。」は、用語と説明の対応が合っていません。
  「非電解質 / 水に溶けても電流をほとんど通さない物質である。」が正しいです。用語と説明の対応が合っています。
