# 化学基礎 問552
id: 1592
type: single_choice
text: |
  「水とエタノールの混合物を沸点の差で分ける場面」を説明した文として、最も適切なものはどれか。
choices:
  - "固体が液体に変わる状態変化である。"
  - "元素を原子番号の順に並べると性質が周期的に変化するというきまりである。"
  - "沸点の違いを利用して液体を分ける方法である。"
  - "原子が結び付いてできた、物質の性質を示す小さな粒子である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「水とエタノールの混合物を沸点の差で分ける場面」を説明した文として適切なのは「沸点の違いを利用して液体を分ける方法である。」です。したがって、正解は「沸点の違いを利用して液体を分ける方法である。」です。
  
  「固体が液体に変わる状態変化である。」は、この説明は「氷を温めて水にする場面」と結び付きが強いです。
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」は、この説明は「周期表で似た性質の元素が縦に並ぶことを見る場面」と結び付きが強いです。
  「沸点の違いを利用して液体を分ける方法である。」が正しいです。この具体例を説明した文です。
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」は、この説明は「水分子や酸素分子を粒として考える場面」と結び付きが強いです。
