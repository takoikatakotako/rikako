# 高校化学 問304
id: 2304
type: single_choice
text: |
  「ふたをした容器の中で液体の上にたまる蒸気を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "蒸気圧降下"
  - "凝固点降下"
  - "蒸気圧"
  - "コロイド"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  ふたをした容器の中で液体の上にたまる蒸気を考える場面 と最も関係が深いのは蒸気圧です。したがって、正解は「蒸気圧」です。
  
  「蒸気圧降下」は、「食塩水が純水より蒸発しにくくなることを考える場面」と結び付きが強い語です。
  「凝固点降下」は、「凍結防止剤をまいた道路の水が凍りにくくなる場面」と結び付きが強い語です。
  「蒸気圧」が正しいです。この具体例と最も関係が深い語です。
  「コロイド」は、「牛乳やゼラチン溶液のような見た目の系を考える場面」と結び付きが強い語です。
