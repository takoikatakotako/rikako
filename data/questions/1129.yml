# 化学基礎 問89
id: 1129
type: single_choice
text: |
  電池で起こっているエネルギーの変換として、最も適切なものはどれか。
choices:
  - "化学エネルギーが電気エネルギーに変わる。"
  - "電気エネルギーが化学エネルギーに変わる。"
  - "光エネルギーが音エネルギーに変わる。"
  - "熱エネルギーが必ず質量に変わる。"
correct: 0
explanation: |
  この問題は、「電池の役割」をエネルギーの変換で考える問題です。
  
  電池では、化学反応によって化学エネルギーが電気エネルギーに変換されます。したがって、正解は「化学エネルギーが電気エネルギーに変わる」です。
  
  「化学エネルギーが電気エネルギーに変わる」が正しいです。
  「電気エネルギーが化学エネルギーに変わる」は、電気分解などの説明に近いです。
  「光エネルギーが音エネルギーに変わる」は、この問題の内容ではありません。
  「熱エネルギーが必ず質量に変わる」は、適切ではありません。
