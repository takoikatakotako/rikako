# 高校化学 問915
id: 2915
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "遷移元素 / 酢酸の性質やにおいを考える場面"
  - "カルボン酸 / 米やいもに多く含まれる成分を考える場面"
  - "イオン結晶 / 塩化ナトリウムの結晶のつくりを考える場面"
  - "デンプン / 鉄や銅、クロムの化合物の色の違いを考える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「イオン結晶 / 塩化ナトリウムの結晶のつくりを考える場面」です。したがって、正解は「イオン結晶 / 塩化ナトリウムの結晶のつくりを考える場面」です。
  
  「遷移元素 / 酢酸の性質やにおいを考える場面」は、用語と場面の対応が合っていません。
  「カルボン酸 / 米やいもに多く含まれる成分を考える場面」は、用語と場面の対応が合っていません。
  「イオン結晶 / 塩化ナトリウムの結晶のつくりを考える場面」が正しいです。用語と場面の対応が合っています。
  「デンプン / 鉄や銅、クロムの化合物の色の違いを考える場面」は、用語と場面の対応が合っていません。
