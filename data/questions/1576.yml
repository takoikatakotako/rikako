# 化学基礎 問536
id: 1576
type: single_choice
text: |
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸素や過酸化水素が相手を酸化させる場面"
  - "医療や年代測定に利用される炭素14を考える場面"
  - "ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面"
  - "BTB溶液やフェノールフタレインで液性を調べる場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」と最も関係が深い場面は「BTB溶液やフェノールフタレインで液性を調べる場面」です。したがって、正解は「BTB溶液やフェノールフタレインで液性を調べる場面」です。
  
  「酸素や過酸化水素が相手を酸化させる場面」は、「相手を酸化させ、自身は還元される物質である。」と結び付きが強い場面です。
  「医療や年代測定に利用される炭素14を考える場面」は、「放射線を出しながら別の原子へ変わっていく同位体である。」と結び付きが強い場面です。
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」は、「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」と結び付きが強い場面です。
  「BTB溶液やフェノールフタレインで液性を調べる場面」が正しいです。この説明と結び付きが強い場面です。
