# 高校化学 問897
id: 2897
type: single_choice
text: |
  「グルコースがつながった植物の細胞壁をつくる多糖である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "充電して再び使えること"
  - "反応が止まるのではなく速さがつり合うこと"
  - "塩基の強さを電離のしやすさで見ること"
  - "植物の体を支える多糖であること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「グルコースがつながった植物の細胞壁をつくる多糖である。」を理解する上では、「植物の体を支える多糖であること」という見方が大切です。したがって、正解は「植物の体を支える多糖であること」です。
  
  「充電して再び使えること」は、その見方は鉛蓄電池に関係します。
  「反応が止まるのではなく速さがつり合うこと」は、その見方は化学平衡に関係します。
  「塩基の強さを電離のしやすさで見ること」は、その見方は塩基解離定数に関係します。
  「植物の体を支える多糖であること」が正しいです。この説明と結び付きが強い見方です。
