# 高校化学 問123
id: 2123
type: single_choice
text: |
  溶解平衡と最も関係が深い場面として、適切なものはどれか。
choices:
  - "二酸化マンガンを加えると過酸化水素水の分解が速くなる場面"
  - "密閉容器で反応物と生成物の量が一定になる場面"
  - "圧力や濃度を変えると平衡が移る方向を考える場面"
  - "飽和溶液で見かけ上変化が止まっている場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  飽和溶液で見かけ上変化が止まっている場面は、溶解平衡と結び付きが強い場面です。したがって、正解は「飽和溶液で見かけ上変化が止まっている場面」です。
  
  「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」は、触媒と結び付きが強い場面です。
  「密閉容器で反応物と生成物の量が一定になる場面」は、化学平衡と結び付きが強い場面です。
  「圧力や濃度を変えると平衡が移る方向を考える場面」は、ルシャトリエの原理と結び付きが強い場面です。
  「飽和溶液で見かけ上変化が止まっている場面」が正しいです。これは溶解平衡と結び付きが強い場面です。
