# 高校化学 問674
id: 2674
type: single_choice
text: |
  「鉄や銅、クロムの化合物の色の違いを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。"
  - "固体と液体が平衡で共存するときの温度である。"
  - "周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。"
  - "絶対零度を基準にした温度で、単位は K で表す。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「鉄や銅、クロムの化合物の色の違いを考える場面」を説明した文として適切なのは「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」です。したがって、正解は「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」です。
  
  「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」は、この説明は「飲料ボトルや衣料用繊維を考える場面」と結び付きが強いです。
  「固体と液体が平衡で共存するときの温度である。」は、この説明は「氷が溶け始める温度を考える場面」と結び付きが強いです。
  「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」が正しいです。この具体例を説明した文です。
  「絶対零度を基準にした温度で、単位は K で表す。」は、この説明は「気体の法則で温度をセルシウス温度ではなく K で扱う場面」と結び付きが強いです。
