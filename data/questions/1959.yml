# 化学基礎 問919
id: 1959
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "金属結合 / 塩酸が水溶液中で水素イオンを生じる場面"
  - "酸 / 酸化銅から酸素が取れて銅になる場面"
  - "最外殻電子 / ナトリウムが電子を1個失いやすい理由を考える場面"
  - "還元 / 金属中で自由電子が動けるため電気を通すことを考える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「最外殻電子 / ナトリウムが電子を1個失いやすい理由を考える場面」です。したがって、正解は「最外殻電子 / ナトリウムが電子を1個失いやすい理由を考える場面」です。
  
  「金属結合 / 塩酸が水溶液中で水素イオンを生じる場面」は、用語と場面の対応が合っていません。
  「酸 / 酸化銅から酸素が取れて銅になる場面」は、用語と場面の対応が合っていません。
  「最外殻電子 / ナトリウムが電子を1個失いやすい理由を考える場面」が正しいです。用語と場面の対応が合っています。
  「還元 / 金属中で自由電子が動けるため電気を通すことを考える場面」は、用語と場面の対応が合っていません。
