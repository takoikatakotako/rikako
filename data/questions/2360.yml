# 高校化学 問360
id: 2360
type: single_choice
text: |
  「中性の水で H+ と OH- の関係を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "溶解度"
  - "溶解平衡"
  - "水のイオン積"
  - "沸点上昇"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  中性の水で H+ と OH- の関係を考える場面 と最も関係が深いのは水のイオン積です。したがって、正解は「水のイオン積」です。
  
  「溶解度」は、「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」と結び付きが強い語です。
  「溶解平衡」は、「飽和溶液で見かけ上変化が止まっている場面」と結び付きが強い語です。
  「水のイオン積」が正しいです。この具体例と最も関係が深い語です。
  「沸点上昇」は、「食塩水の沸点が水より少し高くなることを考える場面」と結び付きが強い語です。
