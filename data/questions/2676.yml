# 高校化学 問676
id: 2676
type: single_choice
text: |
  「さびや鉄鋼の利用を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。"
  - "アミノ基とカルボキシ基をあわせもつ化合物である。"
  - "気液平衡にあるとき、気体が示す圧力である。"
  - "陽イオンと陰イオンが規則正しく並んでできた結晶である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「さびや鉄鋼の利用を考える場面」を説明した文として適切なのは「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」です。したがって、正解は「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」です。
  
  「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」が正しいです。この具体例を説明した文です。
  「アミノ基とカルボキシ基をあわせもつ化合物である。」は、この説明は「グリシンやアラニンの構造を考える場面」と結び付きが強いです。
  「気液平衡にあるとき、気体が示す圧力である。」は、この説明は「ふたをした容器の中で液体の上にたまる蒸気を考える場面」と結び付きが強いです。
  「陽イオンと陰イオンが規則正しく並んでできた結晶である。」は、この説明は「塩化ナトリウムの結晶のつくりを考える場面」と結び付きが強いです。
