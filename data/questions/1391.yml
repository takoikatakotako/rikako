# 化学基礎 問351
id: 1391
type: single_choice
text: |
  ろ過と最も関係が深い場面として、適切なものはどれか。
choices:
  - "氷が溶けて水になる場面"
  - "氷を温めて水にする場面"
  - "砂と水の混合物から砂を取り除く場面"
  - "水を冷やして氷にする場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  砂と水の混合物から砂を取り除く場面は、ろ過と結び付きが強い場面です。したがって、正解は「砂と水の混合物から砂を取り除く場面」です。
  
  「氷が溶けて水になる場面」は、物理変化と結び付きが強い場面です。
  「氷を温めて水にする場面」は、融解と結び付きが強い場面です。
  「砂と水の混合物から砂を取り除く場面」が正しいです。これはろ過と結び付きが強い場面です。
  「水を冷やして氷にする場面」は、凝固と結び付きが強い場面です。
