# 高校化学 問628
id: 2628
type: single_choice
text: |
  「牛乳やゼラチン溶液のような見た目の系を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。"
  - "リチウムイオンの移動を利用する充電式電池である。"
  - "化学平衡の状態を表す、平衡時の濃度や分圧の比である。"
  - "周期表1族に属し、水と反応しやすい金属元素の総称である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「牛乳やゼラチン溶液のような見た目の系を考える場面」を説明した文として適切なのは「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」です。したがって、正解は「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」です。
  
  「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」が正しいです。この具体例を説明した文です。
  「リチウムイオンの移動を利用する充電式電池である。」は、この説明は「スマートフォンやノートパソコンの電池を考える場面」と結び付きが強いです。
  「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」は、この説明は「平衡がどちらにかたよっているかを数値で見る場面」と結び付きが強いです。
  「周期表1族に属し、水と反応しやすい金属元素の総称である。」は、この説明は「ナトリウムやカリウムの性質を比べる場面」と結び付きが強いです。
