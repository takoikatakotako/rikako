# 高校化学 問843
id: 2843
type: single_choice
text: |
  「一度使い切ることを前提にした一次電池の代表例である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "丈夫な合成繊維であること"
  - "使い切りの電池であること"
  - "分子の集まり方や沸点に関係すること"
  - "分子の体積と分子間力の影響に注目すること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「一度使い切ることを前提にした一次電池の代表例である。」を理解する上では、「使い切りの電池であること」という見方が大切です。したがって、正解は「使い切りの電池であること」です。
  
  「丈夫な合成繊維であること」は、その見方はナイロンに関係します。
  「使い切りの電池であること」が正しいです。この説明と結び付きが強い見方です。
  「分子の集まり方や沸点に関係すること」は、その見方は分子間力に関係します。
  「分子の体積と分子間力の影響に注目すること」は、その見方は実在気体に関係します。
