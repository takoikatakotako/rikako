# 高校化学 問203
id: 2203
type: single_choice
text: |
  「液体の蒸気圧が外圧に等しくなる温度である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "沸点"
  - "共有結合の結晶"
  - "アモルファス"
  - "溶解度"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  液体の蒸気圧が外圧に等しくなる温度である。 に当てはまる語は沸点です。したがって、正解は「沸点」です。
  
  「沸点」が正しいです。「液体の蒸気圧が外圧に等しくなる温度である。」に当てはまる語です。
  「共有結合の結晶」は、「原子が共有結合で三次元的に結び付いた結晶である。」に当てはまる語です。
  「アモルファス」は、「結晶のような規則正しい配列をもたない固体である。」に当てはまる語です。
  「溶解度」は、「一定量の溶媒に溶けることのできる溶質の最大量である。」に当てはまる語です。
