# 高校化学 問188
id: 2188
type: single_choice
text: |
  フェノールと最も関係が深い場面として、適切なものはどれか。
choices:
  - "フェノール類の酸性や消毒作用を考える場面"
  - "さびや鉄鋼の利用を考える場面"
  - "導電性高分子や高性能電池材料を考える場面"
  - "再生可能エネルギーや新素材の開発を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  フェノール類の酸性や消毒作用を考える場面は、フェノールと結び付きが強い場面です。したがって、正解は「フェノール類の酸性や消毒作用を考える場面」です。
  
  「フェノール類の酸性や消毒作用を考える場面」が正しいです。これはフェノールと結び付きが強い場面です。
  「さびや鉄鋼の利用を考える場面」は、鉄と結び付きが強い場面です。
  「導電性高分子や高性能電池材料を考える場面」は、機能性材料と結び付きが強い場面です。
  「再生可能エネルギーや新素材の開発を考える場面」は、化学が築く未来と結び付きが強い場面です。
