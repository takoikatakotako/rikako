# 高校化学 問475
id: 2475
type: single_choice
text: |
  炎色反応を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸とも塩基とも反応すること"
  - "電子対の与え手と受け手に注目すること"
  - "金属元素ごとに炎の色が異なること"
  - "実用性が高く、酸化数が変わりやすいこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  炎色反応では、「金属元素ごとに炎の色が異なること」という見方が大切です。したがって、正解は「金属元素ごとに炎の色が異なること」です。
  
  「酸とも塩基とも反応すること」は、両性酸化物に関係する見方です。
  「電子対の与え手と受け手に注目すること」は、配位結合に関係する見方です。
  「金属元素ごとに炎の色が異なること」が正しいです。炎色反応の要点を表しています。
  「実用性が高く、酸化数が変わりやすいこと」は、鉄に関係する見方です。
