# 高校化学 問469
id: 2469
type: single_choice
text: |
  ハロゲンを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "非金属で酸化力が強いこと"
  - "資源を循環させて無駄を減らすこと"
  - "反応性が高く 1 価の陽イオンになりやすいこと"
  - "最外殻が安定していて反応しにくいこと"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  ハロゲンでは、「非金属で酸化力が強いこと」という見方が大切です。したがって、正解は「非金属で酸化力が強いこと」です。
  
  「非金属で酸化力が強いこと」が正しいです。ハロゲンの要点を表しています。
  「資源を循環させて無駄を減らすこと」は、資源の再利用に関係する見方です。
  「反応性が高く 1 価の陽イオンになりやすいこと」は、アルカリ金属に関係する見方です。
  「最外殻が安定していて反応しにくいこと」は、貴ガスに関係する見方です。
