# 化学基礎 問42
id: 1082
type: single_choice
text: |
  酸化についての説明として、最も適切なものはどれか。
choices:
  - "電子を失うことである。"
  - "電子を受け取ることである。"
  - "中性子を増やすことである。"
  - "温度を下げることである。"
correct: 0
explanation: |
  この問題は、「酸化を電子の授受で説明できるか」を確認する問題です。
  
  酸化は、電子を失うことです。酸化還元反応は、電子の受け渡しとして考えることができます。したがって、正解は「電子を失うことである」です。
  
  「電子を失うことである」が正しいです。酸化の基本です。
  「電子を受け取ることである」は、還元の説明です。
  「中性子を増やすことである」は、酸化の説明ではありません。
  「温度を下げることである」は、酸化の説明ではありません。
