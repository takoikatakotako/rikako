# 高校化学 問544
id: 2544
type: single_choice
text: |
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水溶液に電流を流して物質を分解する場面"
  - "高圧や触媒を利用してアンモニアを得る場面"
  - "フッ素や塩素、臭素の反応性を比べる場面"
  - "自動車のバッテリーを考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」と最も関係が深い場面は「自動車のバッテリーを考える場面」です。したがって、正解は「自動車のバッテリーを考える場面」です。
  
  「水溶液に電流を流して物質を分解する場面」は、「電気エネルギーを使って自発的でない化学変化を起こす操作である。」と結び付きが強い場面です。
  「高圧や触媒を利用してアンモニアを得る場面」は、「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」と結び付きが強い場面です。
  「フッ素や塩素、臭素の反応性を比べる場面」は、「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」と結び付きが強い場面です。
  「自動車のバッテリーを考える場面」が正しいです。この説明と結び付きが強い場面です。
