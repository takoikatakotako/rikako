# 高校化学 問390
id: 2390
type: single_choice
text: |
  「衣類やロープに使われる合成繊維を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "ナイロン"
  - "電気泳動"
  - "疎水コロイド"
  - "タンパク質"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  衣類やロープに使われる合成繊維を考える場面 と最も関係が深いのはナイロンです。したがって、正解は「ナイロン」です。
  
  「ナイロン」が正しいです。この具体例と最も関係が深い語です。
  「電気泳動」は、「コロイド粒子が陽極や陰極へ移動する様子を考える場面」と結び付きが強い語です。
  「疎水コロイド」は、「金属や硫黄のコロイドが電解質で沈みやすい場面」と結び付きが強い語です。
  「タンパク質」は、「酵素や筋肉の主成分を考える場面」と結び付きが強い語です。
