# 化学基礎 問274
id: 1314
type: single_choice
text: |
  金属結合の特徴として、最も適切なものはどれか。
choices:
  - "原子が結び付いた一つのまとまり"
  - "分子全体に電荷の偏りがある"
  - "自由電子を介した結合"
  - "分子全体の電荷の偏りが打ち消し合う"
correct: 2
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  金属結合では、「自由電子を介した結合」という点が大切です。したがって、正解は「自由電子を介した結合」です。
  
  「原子が結び付いた一つのまとまり」は、分子に関係する特徴です。
  「分子全体に電荷の偏りがある」は、極性分子に関係する特徴です。
  「自由電子を介した結合」が正しいです。金属結合の特徴を表しています。
  「分子全体の電荷の偏りが打ち消し合う」は、無極性分子に関係する特徴です。
