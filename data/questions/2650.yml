# 高校化学 問650
id: 2650
type: single_choice
text: |
  「流した電流が大きいほど析出量が増える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "周期表1族に属し、水と反応しやすい金属元素の総称である。"
  - "炭素どうしが単結合だけでつながった炭化水素である。"
  - "電気分解で生じる物質の量は流れた電気量に比例するという法則である。"
  - "ベンゼン環にアミノ基が直接結び付いた化合物である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「流した電流が大きいほど析出量が増える場面」を説明した文として適切なのは「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」です。したがって、正解は「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」です。
  
  「周期表1族に属し、水と反応しやすい金属元素の総称である。」は、この説明は「ナトリウムやカリウムの性質を比べる場面」と結び付きが強いです。
  「炭素どうしが単結合だけでつながった炭化水素である。」は、この説明は「メタンやエタンの性質を考える場面」と結び付きが強いです。
  「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」が正しいです。この具体例を説明した文です。
  「ベンゼン環にアミノ基が直接結び付いた化合物である。」は、この説明は「染料の原料になる芳香族アミンを考える場面」と結び付きが強いです。
