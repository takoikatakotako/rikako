# 高校化学 問722
id: 2722
type: single_choice
text: |
  「それ以上溶けない状態であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "触媒"
  - "弱塩基"
  - "炎色反応"
  - "飽和溶液"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「それ以上溶けない状態であること」という見方が大切なのは飽和溶液です。したがって、正解は「飽和溶液」です。
  
  「触媒」は、その語で大切なのは「反応を速めても自分は使い切られないこと」という見方です。
  「弱塩基」は、その語で大切なのは「電離が部分的に起こること」という見方です。
  「炎色反応」は、その語で大切なのは「金属元素ごとに炎の色が異なること」という見方です。
  「飽和溶液」が正しいです。この見方が大切な語です。
