# 化学基礎 問540
id: 1580
type: single_choice
text: |
  「相手を還元させ、自身は酸化される物質である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ダニエル電池で二つの水溶液をつなぐ場面"
  - "電池、医薬品、素材開発などに化学が生かされる場面"
  - "鉄や酸素のように一種類の元素だけからできた物質を考える場面"
  - "水素や炭素が相手から酸素を奪う場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「相手を還元させ、自身は酸化される物質である。」と最も関係が深い場面は「水素や炭素が相手から酸素を奪う場面」です。したがって、正解は「水素や炭素が相手から酸素を奪う場面」です。
  
  「ダニエル電池で二つの水溶液をつなぐ場面」は、「二つの溶液の電気的なつり合いを保つための部分である。」と結び付きが強い場面です。
  「電池、医薬品、素材開発などに化学が生かされる場面」は、「化学の知識が生活、産業、環境、医療などに役立つという見方である。」と結び付きが強い場面です。
  「鉄や酸素のように一種類の元素だけからできた物質を考える場面」は、「一種類の元素だけからできている物質である。」と結び付きが強い場面です。
  「水素や炭素が相手から酸素を奪う場面」が正しいです。この説明と結び付きが強い場面です。
