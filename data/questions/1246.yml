# 化学基礎 問206
id: 1246
type: single_choice
text: |
  「食塩が水に溶けた食塩水」に最も関係が深い語として、適切なものはどれか。
choices:
  - "単体"
  - "化合物"
  - "物理変化"
  - "混合物"
correct: 3
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「食塩が水に溶けた食塩水」に最も関係が深いのは混合物です。したがって、正解は「混合物」です。
  
  「単体」は、この例に最も関係が深い語ではありません。
  「化合物」は、この例に最も関係が深い語ではありません。
  「物理変化」は、この例に最も関係が深い語ではありません。
  「混合物」が正しいです。この例は混合物に関係しています。
