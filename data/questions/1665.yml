# 化学基礎 問625
id: 1665
type: single_choice
text: |
  「物質の性質を示す小さな粒子として考えること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "還元剤"
  - "炎色反応"
  - "分子"
  - "クロマトグラフィー"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「物質の性質を示す小さな粒子として考えること」という見方が大切なのは分子です。したがって、正解は「分子」です。
  
  「還元剤」は、その語で大切なのは「相手を還元させ、自分は酸化されること」という見方です。
  「炎色反応」は、その語で大切なのは「金属元素ごとに炎の色が異なること」という見方です。
  「分子」が正しいです。この見方が大切な語です。
  「クロマトグラフィー」は、その語で大切なのは「移動しやすさの違いを利用すること」という見方です。
