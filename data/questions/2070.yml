# 高校化学 問70
id: 2070
type: single_choice
text: |
  貴ガスについての説明として、最も適切なものはどれか。
choices:
  - "酸とも塩基とも反応する酸化物である。"
  - "周期表18族に属し、化学的に安定な気体元素の総称である。"
  - "一方の原子が電子対を与えてできる共有結合である。"
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  貴ガスは、周期表18族に属し、化学的に安定な気体元素の総称である。 したがって、正解は「周期表18族に属し、化学的に安定な気体元素の総称である。」です。
  
  「酸とも塩基とも反応する酸化物である。」は、両性酸化物の説明です。
  「周期表18族に属し、化学的に安定な気体元素の総称である。」が正しいです。貴ガスの説明です。
  「一方の原子が電子対を与えてできる共有結合である。」は、配位結合の説明です。
  「金属元素を炎に入れたときに特有の色を示す反応である。」は、炎色反応の説明です。
