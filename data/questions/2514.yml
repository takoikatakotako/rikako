# 高校化学 問514
id: 2514
type: single_choice
text: |
  「結晶の中で粒子が規則正しく並んだ構造である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ダイヤモンドや二酸化ケイ素の硬さを考える場面"
  - "食塩や金属の規則正しい並び方を考える場面"
  - "牛乳やゼラチン溶液のような見た目の系を考える場面"
  - "燃焼や中和で容器が温かくなる場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「結晶の中で粒子が規則正しく並んだ構造である。」と最も関係が深い場面は「食塩や金属の規則正しい並び方を考える場面」です。したがって、正解は「食塩や金属の規則正しい並び方を考える場面」です。
  
  「ダイヤモンドや二酸化ケイ素の硬さを考える場面」は、「原子が共有結合で三次元的に結び付いた結晶である。」と結び付きが強い場面です。
  「食塩や金属の規則正しい並び方を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「牛乳やゼラチン溶液のような見た目の系を考える場面」は、「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」と結び付きが強い場面です。
  「燃焼や中和で容器が温かくなる場面」は、「反応の結果として周囲へ熱を放出する反応である。」と結び付きが強い場面です。
