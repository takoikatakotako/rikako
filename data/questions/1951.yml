# 化学基礎 問911
id: 1951
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "質量数 / 水素原子どうしが電子を共有して H2 になる場面"
  - "共有結合 / 水素と酸素から水ができる反応を式で表す場面"
  - "融解 / 氷を温めて水にする場面"
  - "化学反応式 / 炭素12で陽子数と中性子数の合計を見る場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「融解 / 氷を温めて水にする場面」です。したがって、正解は「融解 / 氷を温めて水にする場面」です。
  
  「質量数 / 水素原子どうしが電子を共有して H2 になる場面」は、用語と場面の対応が合っていません。
  「共有結合 / 水素と酸素から水ができる反応を式で表す場面」は、用語と場面の対応が合っていません。
  「融解 / 氷を温めて水にする場面」が正しいです。用語と場面の対応が合っています。
  「化学反応式 / 炭素12で陽子数と中性子数の合計を見る場面」は、用語と場面の対応が合っていません。
