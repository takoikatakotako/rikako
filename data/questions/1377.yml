# 化学基礎 問337
id: 1377
type: single_choice
text: |
  酸化について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "放射線を出しながら別の原子へ変わっていく同位体である。"
  - "物質が酸素と結び付く、または電子を失う変化である。"
  - "食品や物質が酸化して変質するのを防ぐために用いられる物質である。"
  - "化学の知識が生活、産業、環境、医療などに役立つという見方である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  酸化は、物質が酸素と結び付く、または電子を失う変化である。 したがって、正解は「物質が酸素と結び付く、または電子を失う変化である。」です。
  
  「放射線を出しながら別の原子へ変わっていく同位体である。」は、放射性同位体の説明です。
  「物質が酸素と結び付く、または電子を失う変化である。」が正しいです。酸化の説明です。
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」は、酸化防止剤の説明です。
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」は、化学が拓く世界の説明です。
