# 化学基礎 問501
id: 1541
type: single_choice
text: |
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "砂と水の混合物から砂を取り除く場面"
  - "インクの色素をろ紙の上で分ける場面"
  - "氷を温めて水にする場面"
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」と最も関係が深い場面は「砂と水の混合物から砂を取り除く場面」です。したがって、正解は「砂と水の混合物から砂を取り除く場面」です。
  
  「砂と水の混合物から砂を取り除く場面」が正しいです。この説明と結び付きが強い場面です。
  「インクの色素をろ紙の上で分ける場面」は、「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」と結び付きが強い場面です。
  「氷を温めて水にする場面」は、「固体が液体に変わる状態変化である。」と結び付きが強い場面です。
  「周期表で似た性質の元素が縦に並ぶことを見る場面」は、「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」と結び付きが強い場面です。
