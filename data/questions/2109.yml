# 高校化学 問109
id: 2109
type: single_choice
text: |
  シャルルの法則と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ダイヤモンドや二酸化ケイ素の硬さを考える場面"
  - "温めた風船がふくらみやすくなる場面"
  - "ガラスのように一定の融点を示しにくい固体を考える場面"
  - "温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  温めた風船がふくらみやすくなる場面は、シャルルの法則と結び付きが強い場面です。したがって、正解は「温めた風船がふくらみやすくなる場面」です。
  
  「ダイヤモンドや二酸化ケイ素の硬さを考える場面」は、共有結合の結晶と結び付きが強い場面です。
  「温めた風船がふくらみやすくなる場面」が正しいです。これはシャルルの法則と結び付きが強い場面です。
  「ガラスのように一定の融点を示しにくい固体を考える場面」は、アモルファスと結び付きが強い場面です。
  「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」は、溶解度と結び付きが強い場面です。
