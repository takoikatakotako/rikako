# 高校化学 問594
id: 2594
type: single_choice
text: |
  「アミノ酸どうしが縮合してできる結合である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "紙や木材の主成分を考える場面"
  - "アミノ酸がつながってペプチドになる場面"
  - "注射器の口をふさいで押すと体積が減って圧力が上がる場面"
  - "ガラスのように一定の融点を示しにくい固体を考える場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「アミノ酸どうしが縮合してできる結合である。」と最も関係が深い場面は「アミノ酸がつながってペプチドになる場面」です。したがって、正解は「アミノ酸がつながってペプチドになる場面」です。
  
  「紙や木材の主成分を考える場面」は、「グルコースがつながった植物の細胞壁をつくる多糖である。」と結び付きが強い場面です。
  「アミノ酸がつながってペプチドになる場面」が正しいです。この説明と結び付きが強い場面です。
  「注射器の口をふさいで押すと体積が減って圧力が上がる場面」は、「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」と結び付きが強い場面です。
  「ガラスのように一定の融点を示しにくい固体を考える場面」は、「結晶のような規則正しい配列をもたない固体である。」と結び付きが強い場面です。
