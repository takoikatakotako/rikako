# 化学基礎 問438
id: 1478
type: single_choice
text: |
  「物質が酸素を失う、または電子を受け取る変化である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "還元"
  - "酸"
  - "中和"
  - "電離度"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  物質が酸素を失う、または電子を受け取る変化である。 に当てはまる語は還元です。したがって、正解は「還元」です。
  
  「還元」が正しいです。「物質が酸素を失う、または電子を受け取る変化である。」に当てはまる語です。
  「酸」は、「水溶液中で水素イオンを生じる物質である。」に当てはまる語です。
  「中和」は、「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」に当てはまる語です。
  「電離度」は、「溶けた物質のうち、電離してイオンになった割合である。」に当てはまる語です。
