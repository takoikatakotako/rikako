# 高校化学 問314
id: 2314
type: single_choice
text: |
  「食塩や金属の規則正しい並び方を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "結晶格子"
  - "疎水コロイド"
  - "分子結晶"
  - "金属結晶"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  食塩や金属の規則正しい並び方を考える場面 と最も関係が深いのは結晶格子です。したがって、正解は「結晶格子」です。
  
  「結晶格子」が正しいです。この具体例と最も関係が深い語です。
  「疎水コロイド」は、「金属や硫黄のコロイドが電解質で沈みやすい場面」と結び付きが強い語です。
  「分子結晶」は、「ドライアイスやヨウ素の結晶を考える場面」と結び付きが強い語です。
  「金属結晶」は、「金属が電気を通したりのびたりする理由を考える場面」と結び付きが強い語です。
