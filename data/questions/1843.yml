# 化学基礎 問803
id: 1843
type: single_choice
text: |
  「溶解度の差を利用すること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面"
  - "亜鉛板と銅板を使って豆電球を光らせる場面"
  - "ポリエチレンやタンパク質のような長い分子を考える場面"
  - "空気や食塩水のように複数の物質が混ざったものを考える場面"
correct: 0
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「溶解度の差を利用すること」という見方と最も関係が深い場面は「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」です。したがって、正解は「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」です。
  
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」が正しいです。この見方と最も関係が深い場面です。
  「亜鉛板と銅板を使って豆電球を光らせる場面」は、その場面で大切なのは「化学エネルギーを電気エネルギーに変えること」という見方です。
  「ポリエチレンやタンパク質のような長い分子を考える場面」は、その場面で大切なのは「小さな単位が多数つながっていること」という見方です。
  「空気や食塩水のように複数の物質が混ざったものを考える場面」は、その場面で大切なのは「成分が二種類以上まざっていること」という見方です。
