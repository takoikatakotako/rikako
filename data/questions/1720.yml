# 化学基礎 問680
id: 1720
type: single_choice
text: |
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "反応する物質とできる物質の関係を式で示すこと"
  - "水に溶けない固体を液体から分けること"
  - "複数の元素が結び付いてできること"
  - "陽子数を表す数であること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」を理解する上では、「反応する物質とできる物質の関係を式で示すこと」という見方が大切です。したがって、正解は「反応する物質とできる物質の関係を式で示すこと」です。
  
  「反応する物質とできる物質の関係を式で示すこと」が正しいです。この説明と結び付きが強い見方です。
  「水に溶けない固体を液体から分けること」は、その見方はろ過に関係します。
  「複数の元素が結び付いてできること」は、その見方は化合物に関係します。
  「陽子数を表す数であること」は、その見方は原子番号に関係します。
