# 高校化学 問349
id: 2349
type: single_choice
text: |
  「金属イオンが電子を受け取って析出する電極を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "緩衝液"
  - "弱酸"
  - "酸解離定数"
  - "陰極"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  金属イオンが電子を受け取って析出する電極を考える場面 と最も関係が深いのは陰極です。したがって、正解は「陰極」です。
  
  「緩衝液」は、「血液や実験用の溶液で pH を保ちたい場面」と結び付きが強い語です。
  「弱酸」は、「酢酸が塩酸ほど強く電離しない場面」と結び付きが強い語です。
  「酸解離定数」は、「どの酸がより電離しやすいかを比べる場面」と結び付きが強い語です。
  「陰極」が正しいです。この具体例と最も関係が深い語です。
