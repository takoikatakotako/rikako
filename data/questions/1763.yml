# 化学基礎 問723
id: 1763
type: single_choice
text: |
  「水素原子どうしが電子を共有して H2 になる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "化学が社会や生活に広く役立つこと"
  - "一種類の元素だけからできること"
  - "電子を共有して結び付くこと"
  - "固体から直接気体になること"
correct: 2
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「水素原子どうしが電子を共有して H2 になる場面」では、「電子を共有して結び付くこと」という見方が大切です。したがって、正解は「電子を共有して結び付くこと」です。
  
  「化学が社会や生活に広く役立つこと」は、その見方は電池、医薬品、素材開発などに化学が生かされる場面よりも化学が拓く世界と結び付きが強いです。
  「一種類の元素だけからできること」は、その見方は鉄や酸素のように一種類の元素だけからできた物質を考える場面よりも単体と結び付きが強いです。
  「電子を共有して結び付くこと」が正しいです。この具体例で大切になる見方です。
  「固体から直接気体になること」は、その見方はドライアイスがそのまま気体になる場面よりも昇華と結び付きが強いです。
