# 化学基礎 問631
id: 1671
type: single_choice
text: |
  「水素イオンに注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "酸"
  - "放射性同位体"
  - "再結晶"
  - "化学変化"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「水素イオンに注目すること」という見方が大切なのは酸です。したがって、正解は「酸」です。
  
  「酸」が正しいです。この見方が大切な語です。
  「放射性同位体」は、その語で大切なのは「放射線を出す同位体であること」という見方です。
  「再結晶」は、その語で大切なのは「溶解度の差を利用すること」という見方です。
  「化学変化」は、その語で大切なのは「新しい物質ができること」という見方です。
