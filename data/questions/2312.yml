# 高校化学 問312
id: 2312
type: single_choice
text: |
  「高圧や低温で気体のふるまいが理想気体からずれる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "電気泳動"
  - "疎水コロイド"
  - "実在気体"
  - "シャルルの法則"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  高圧や低温で気体のふるまいが理想気体からずれる場面 と最も関係が深いのは実在気体です。したがって、正解は「実在気体」です。
  
  「電気泳動」は、「コロイド粒子が陽極や陰極へ移動する様子を考える場面」と結び付きが強い語です。
  「疎水コロイド」は、「金属や硫黄のコロイドが電解質で沈みやすい場面」と結び付きが強い語です。
  「実在気体」が正しいです。この具体例と最も関係が深い語です。
  「シャルルの法則」は、「温めた風船がふくらみやすくなる場面」と結び付きが強い語です。
