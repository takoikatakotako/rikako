# 高校化学 問591
id: 2591
type: single_choice
text: |
  「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "アミノ酸がつながってペプチドになる場面"
  - "密閉容器で水面の高さが変わらなくなる場面"
  - "飲料ボトルや衣料用繊維を考える場面"
  - "ドライアイスやヨウ素の結晶を考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」と最も関係が深い場面は「飲料ボトルや衣料用繊維を考える場面」です。したがって、正解は「飲料ボトルや衣料用繊維を考える場面」です。
  
  「アミノ酸がつながってペプチドになる場面」は、「アミノ酸どうしが縮合してできる結合である。」と結び付きが強い場面です。
  「密閉容器で水面の高さが変わらなくなる場面」は、「蒸発する速さと凝縮する速さが等しくなった状態である。」と結び付きが強い場面です。
  「飲料ボトルや衣料用繊維を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「ドライアイスやヨウ素の結晶を考える場面」は、「分子どうしが分子間力で集まってできた結晶である。」と結び付きが強い場面です。
