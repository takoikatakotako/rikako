# 高校化学 問313
id: 2313
type: single_choice
text: |
  「気体の法則で温度をセルシウス温度ではなく K で扱う場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "親水コロイド"
  - "ボイルの法則"
  - "理想気体の状態方程式"
  - "絶対温度"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  気体の法則で温度をセルシウス温度ではなく K で扱う場面 と最も関係が深いのは絶対温度です。したがって、正解は「絶対温度」です。
  
  「親水コロイド」は、「デンプンやゼラチンが水中で安定しやすい場面」と結び付きが強い語です。
  「ボイルの法則」は、「注射器の口をふさいで押すと体積が減って圧力が上がる場面」と結び付きが強い語です。
  「理想気体の状態方程式」は、「気体の量と温度から体積や圧力を見積もる場面」と結び付きが強い語です。
  「絶対温度」が正しいです。この具体例と最も関係が深い語です。
