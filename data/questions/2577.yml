# 高校化学 問577
id: 2577
type: single_choice
text: |
  「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "電線や青色の銅イオン水溶液を考える場面"
  - "エチレンに臭素が付加する場面"
  - "飲料ボトルや衣料用繊維を考える場面"
  - "氷が溶け始める温度を考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」と最も関係が深い場面は「電線や青色の銅イオン水溶液を考える場面」です。したがって、正解は「電線や青色の銅イオン水溶液を考える場面」です。
  
  「電線や青色の銅イオン水溶液を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「エチレンに臭素が付加する場面」は、「多重結合に原子や原子団が加わる反応である。」と結び付きが強い場面です。
  「飲料ボトルや衣料用繊維を考える場面」は、「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」と結び付きが強い場面です。
  「氷が溶け始める温度を考える場面」は、「固体と液体が平衡で共存するときの温度である。」と結び付きが強い場面です。
