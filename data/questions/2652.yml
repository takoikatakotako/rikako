# 高校化学 問652
id: 2652
type: single_choice
text: |
  「加熱すると反応が進みやすくなる理由を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "反応が進むために必要な最小限のエネルギーである。"
  - "周期表17族に属し、陰イオンになりやすい非金属元素の総称である。"
  - "多重結合に原子や原子団が加わる反応である。"
  - "ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「加熱すると反応が進みやすくなる理由を考える場面」を説明した文として適切なのは「反応が進むために必要な最小限のエネルギーである。」です。したがって、正解は「反応が進むために必要な最小限のエネルギーである。」です。
  
  「反応が進むために必要な最小限のエネルギーである。」が正しいです。この具体例を説明した文です。
  「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」は、この説明は「フッ素や塩素、臭素の反応性を比べる場面」と結び付きが強いです。
  「多重結合に原子や原子団が加わる反応である。」は、この説明は「エチレンに臭素が付加する場面」と結び付きが強いです。
  「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」は、この説明は「飲料ボトルや衣料用繊維を考える場面」と結び付きが強いです。
