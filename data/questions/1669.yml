# 化学基礎 問629
id: 1669
type: single_choice
text: |
  「1Lあたりの物質量で表すこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "電解質"
  - "ろ過"
  - "モル濃度"
  - "化合物"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「1Lあたりの物質量で表すこと」という見方が大切なのはモル濃度です。したがって、正解は「モル濃度」です。
  
  「電解質」は、その語で大切なのは「水溶液や融解状態で電流を通すこと」という見方です。
  「ろ過」は、その語で大切なのは「水に溶けない固体を液体から分けること」という見方です。
  「モル濃度」が正しいです。この見方が大切な語です。
  「化合物」は、その語で大切なのは「複数の元素が結び付いてできること」という見方です。
