# 令和7年度 ITパスポート 公開問題 問73
id: 522
type: single_choice
text: |
  Webサービスを狙った攻撃に関する記述と攻撃の名称の適切な組合せはどれか。
  a Web サービスが利用しているソフトウェアに弱性の存在が判明したとき、そ
  の修正プログラムが提供される前に、この脆弱性を突いて攻撃する。
  b 複数のコンピュータから大量のパケットを一斉に送り付けることによって、
  Webサービスを正常に提供できなくさせる。
  c 理論的にあり得るパスワードのパターンを順次試すことによって、正しいパ
  スワードを見つけ、攻撃対象のWebサービスに侵入する。
  a
  b
  c
choices:
  - "DDoS 攻撃 / ゼロデイ攻撃 / ブルートフォース攻撃"
  - "DDoS攻撃 / ブルートフォース攻撃 / ゼロデイ攻撃"
  - "ゼロデイ攻撃 / DDoS攻撃 / ブルートフォース攻撃"
  - "ゼロデイ攻撃 / ブルートフォース攻撃 / DDoS 攻撃"
correct: 2
explanation: |
  この問題の公開解答では「ゼロデイ攻撃 / DDoS攻撃 / ブルートフォース攻撃」が正解とされています。
  
  「DDoS 攻撃 / ゼロデイ攻撃 / ブルートフォース攻撃」は公開解答では正解ではありません。
  「DDoS攻撃 / ブルートフォース攻撃 / ゼロデイ攻撃」は公開解答では正解ではありません。
  「ゼロデイ攻撃 / DDoS攻撃 / ブルートフォース攻撃」が公開解答で正解とされています。
  「ゼロデイ攻撃 / ブルートフォース攻撃 / DDoS 攻撃」は公開解答では正解ではありません。
