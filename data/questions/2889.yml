# 高校化学 問889
id: 2889
type: single_choice
text: |
  「ベンゼン環にアミノ基が直接結び付いた化合物である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "一定圧力での熱の出入りに注目すること"
  - "電気を使って反応を進めること"
  - "条件を工夫して平衡を生成物側へ寄せること"
  - "ベンゼン環にアミノ基が直接つくこと"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「ベンゼン環にアミノ基が直接結び付いた化合物である。」を理解する上では、「ベンゼン環にアミノ基が直接つくこと」という見方が大切です。したがって、正解は「ベンゼン環にアミノ基が直接つくこと」です。
  
  「一定圧力での熱の出入りに注目すること」は、その見方はエンタルピー変化に関係します。
  「電気を使って反応を進めること」は、その見方は電気分解に関係します。
  「条件を工夫して平衡を生成物側へ寄せること」は、その見方はアンモニア合成に関係します。
  「ベンゼン環にアミノ基が直接つくこと」が正しいです。この説明と結び付きが強い見方です。
