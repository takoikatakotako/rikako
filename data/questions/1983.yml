# 化学基礎 問943
id: 1983
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "酸化防止剤 / 酸素だけが入った容器を考える場面"
  - "純物質 / ぬれた床の水がしだいに乾く場面"
  - "塩橋 / ダニエル電池で二つの水溶液をつなぐ場面"
  - "蒸発 / 食品の変色や劣化を防ぐためにビタミンCを使う場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「塩橋 / ダニエル電池で二つの水溶液をつなぐ場面」です。したがって、正解は「塩橋 / ダニエル電池で二つの水溶液をつなぐ場面」です。
  
  「酸化防止剤 / 酸素だけが入った容器を考える場面」は、用語と場面の対応が合っていません。
  「純物質 / ぬれた床の水がしだいに乾く場面」は、用語と場面の対応が合っていません。
  「塩橋 / ダニエル電池で二つの水溶液をつなぐ場面」が正しいです。用語と場面の対応が合っています。
  「蒸発 / 食品の変色や劣化を防ぐためにビタミンCを使う場面」は、用語と場面の対応が合っていません。
