# 高校化学 問616
id: 2616
type: single_choice
text: |
  「ドライアイスやヨウ素の結晶を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "分子どうしが分子間力で集まってできた結晶である。"
  - "水との親和性が高く、比較的安定なコロイドである。"
  - "鉛とその化合物を用いた、充電して繰り返し使える電池である。"
  - "正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「ドライアイスやヨウ素の結晶を考える場面」を説明した文として適切なのは「分子どうしが分子間力で集まってできた結晶である。」です。したがって、正解は「分子どうしが分子間力で集まってできた結晶である。」です。
  
  「分子どうしが分子間力で集まってできた結晶である。」が正しいです。この具体例を説明した文です。
  「水との親和性が高く、比較的安定なコロイドである。」は、この説明は「デンプンやゼラチンが水中で安定しやすい場面」と結び付きが強いです。
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」は、この説明は「自動車のバッテリーを考える場面」と結び付きが強いです。
  「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」は、この説明は「密閉容器で反応物と生成物の量が一定になる場面」と結び付きが強いです。
