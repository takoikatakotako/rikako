# 化学基礎 問316
id: 1356
type: single_choice
text: |
  質量数について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "原子核の中にある陽子数と中性子数の合計である。"
  - "二種類以上の元素が結び付いてできている純物質である。"
  - "もとの物質とは別の物質ができる変化である。"
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  質量数は、原子核の中にある陽子数と中性子数の合計である。 したがって、正解は「原子核の中にある陽子数と中性子数の合計である。」です。
  
  「原子核の中にある陽子数と中性子数の合計である。」が正しいです。質量数の説明です。
  「二種類以上の元素が結び付いてできている純物質である。」は、化合物の説明です。
  「もとの物質とは別の物質ができる変化である。」は、化学変化の説明です。
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」は、モル濃度の説明です。
