# 化学基礎 問263
id: 1303
type: single_choice
text: |
  凝固の特徴として、最も適切なものはどれか。
choices:
  - "固体が直接気体になる"
  - "陽子の数を表す"
  - "陽子数と中性子数の合計"
  - "液体が固体になる"
correct: 3
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  凝固では、「液体が固体になる」という点が大切です。したがって、正解は「液体が固体になる」です。
  
  「固体が直接気体になる」は、昇華に関係する特徴です。
  「陽子の数を表す」は、原子番号に関係する特徴です。
  「陽子数と中性子数の合計」は、質量数に関係する特徴です。
  「液体が固体になる」が正しいです。凝固の特徴を表しています。
