# 化学基礎 問58
id: 1098
type: single_choice
text: |
  液体が気体になる変化として、最も適切なものはどれか。
choices:
  - "凝固"
  - "蒸発"
  - "昇華"
  - "融解"
correct: 1
explanation: |
  この問題は、「状態変化の名前」を確認する問題です。
  
  液体が気体になる変化は蒸発です。したがって、正解は「蒸発」です。
  
  「凝固」は、液体が固体になる変化です。
  「蒸発」が正しいです。液体が気体になる変化です。
  「昇華」は、固体が直接気体になる変化です。
  「融解」は、固体が液体になる変化です。
