# 高校化学 問648
id: 2648
type: single_choice
text: |
  「電気分解で気体が発生する電極側を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "電気分解で酸化が起こる電極である。"
  - "酸の電離のしやすさを表す定数である。"
  - "遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。"
  - "六角形の環状構造をもつ代表的な芳香族炭化水素である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「電気分解で気体が発生する電極側を考える場面」を説明した文として適切なのは「電気分解で酸化が起こる電極である。」です。したがって、正解は「電気分解で酸化が起こる電極である。」です。
  
  「電気分解で酸化が起こる電極である。」が正しいです。この具体例を説明した文です。
  「酸の電離のしやすさを表す定数である。」は、この説明は「どの酸がより電離しやすいかを比べる場面」と結び付きが強いです。
  「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」は、この説明は「さびや鉄鋼の利用を考える場面」と結び付きが強いです。
  「六角形の環状構造をもつ代表的な芳香族炭化水素である。」は、この説明は「芳香族化合物の基本構造を学ぶ場面」と結び付きが強いです。
