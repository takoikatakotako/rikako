# 化学基礎 問474
id: 1514
type: single_choice
text: |
  金属結合を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電子を失って正に帯電すること"
  - "電気的な引力で結び付くこと"
  - "物質の性質を示す小さな粒子として考えること"
  - "自由電子が結合を支えること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  金属結合では、「自由電子が結合を支えること」という見方が大切です。したがって、正解は「自由電子が結合を支えること」です。
  
  「電子を失って正に帯電すること」は、陽イオンに関係する見方です。
  「電気的な引力で結び付くこと」は、イオン結合に関係する見方です。
  「物質の性質を示す小さな粒子として考えること」は、分子に関係する見方です。
  「自由電子が結合を支えること」が正しいです。金属結合の要点を表しています。
