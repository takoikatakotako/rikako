# 化学基礎 問903
id: 1943
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "化合物 / ナトリウムの陽子数から元素を区別する場面"
  - "原子番号 / 塩化ナトリウムが陽イオンと陰イオンの引力でできる場面"
  - "再結晶 / ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面"
  - "イオン結合 / 水や二酸化炭素のように複数の元素からできた物質を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「再結晶 / ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」です。したがって、正解は「再結晶 / ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」です。
  
  「化合物 / ナトリウムの陽子数から元素を区別する場面」は、用語と場面の対応が合っていません。
  「原子番号 / 塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」は、用語と場面の対応が合っていません。
  「再結晶 / ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」が正しいです。用語と場面の対応が合っています。
  「イオン結合 / 水や二酸化炭素のように複数の元素からできた物質を考える場面」は、用語と場面の対応が合っていません。
