# 高校化学 問954
id: 2954
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "絶対温度 / 食塩水が純水より蒸発しにくくなることを考える場面"
  - "可逆反応 / 生成物から再び反応物が生じる場面を考えるとき"
  - "蒸気圧降下 / 物質を燃やしたときに熱が出ることを考える場面"
  - "反応熱 / 気体の法則で温度をセルシウス温度ではなく K で扱う場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「可逆反応 / 生成物から再び反応物が生じる場面を考えるとき」です。したがって、正解は「可逆反応 / 生成物から再び反応物が生じる場面を考えるとき」です。
  
  「絶対温度 / 食塩水が純水より蒸発しにくくなることを考える場面」は、用語と場面の対応が合っていません。
  「可逆反応 / 生成物から再び反応物が生じる場面を考えるとき」が正しいです。用語と場面の対応が合っています。
  「蒸気圧降下 / 物質を燃やしたときに熱が出ることを考える場面」は、用語と場面の対応が合っていません。
  「反応熱 / 気体の法則で温度をセルシウス温度ではなく K で扱う場面」は、用語と場面の対応が合っていません。
