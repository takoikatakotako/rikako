# 高校化学 問955
id: 2955
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "結晶格子 / 食塩水の沸点が水より少し高くなることを考える場面"
  - "沸点上昇 / 反応前後で熱の出入りを比較する場面"
  - "化学平衡 / 密閉容器で反応物と生成物の量が一定になる場面"
  - "エンタルピー変化 / 食塩や金属の規則正しい並び方を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「化学平衡 / 密閉容器で反応物と生成物の量が一定になる場面」です。したがって、正解は「化学平衡 / 密閉容器で反応物と生成物の量が一定になる場面」です。
  
  「結晶格子 / 食塩水の沸点が水より少し高くなることを考える場面」は、用語と場面の対応が合っていません。
  「沸点上昇 / 反応前後で熱の出入りを比較する場面」は、用語と場面の対応が合っていません。
  「化学平衡 / 密閉容器で反応物と生成物の量が一定になる場面」が正しいです。用語と場面の対応が合っています。
  「エンタルピー変化 / 食塩や金属の規則正しい並び方を考える場面」は、用語と場面の対応が合っていません。
