# 化学基礎 問748
id: 1788
type: single_choice
text: |
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "物質の性質を示す小さな粒子として考えること"
  - "水酸化物イオンや水素イオンの受け取りに注目すること"
  - "相手を酸化させ、自分は還元されること"
  - "酸化による変質を防ぐこと"
correct: 3
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」では、「酸化による変質を防ぐこと」という見方が大切です。したがって、正解は「酸化による変質を防ぐこと」です。
  
  「物質の性質を示す小さな粒子として考えること」は、その見方は水分子や酸素分子を粒として考える場面よりも分子と結び付きが強いです。
  「水酸化物イオンや水素イオンの受け取りに注目すること」は、その見方は水酸化ナトリウム水溶液が水酸化物イオンを生じる場面よりも塩基と結び付きが強いです。
  「相手を酸化させ、自分は還元されること」は、その見方は酸素や過酸化水素が相手を酸化させる場面よりも酸化剤と結び付きが強いです。
  「酸化による変質を防ぐこと」が正しいです。この具体例で大切になる見方です。
