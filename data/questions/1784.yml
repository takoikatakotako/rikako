# 化学基礎 問744
id: 1784
type: single_choice
text: |
  「食塩水や塩酸が電流を通す場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "電子を受け取って負に帯電すること"
  - "粒子の数をまとめて扱う単位であること"
  - "どのくらいイオンに分かれるかを表すこと"
  - "水溶液や融解状態で電流を通すこと"
correct: 3
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「食塩水や塩酸が電流を通す場面」では、「水溶液や融解状態で電流を通すこと」という見方が大切です。したがって、正解は「水溶液や融解状態で電流を通すこと」です。
  
  「電子を受け取って負に帯電すること」は、その見方は塩素原子が電子を1個受け取って Cl- になる場面よりも陰イオンと結び付きが強いです。
  「粒子の数をまとめて扱う単位であること」は、その見方は6.0×10^23個の粒子をひとまとまりとして数える場面よりもモルと結び付きが強いです。
  「どのくらいイオンに分かれるかを表すこと」は、その見方は同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面よりも電離度と結び付きが強いです。
  「水溶液や融解状態で電流を通すこと」が正しいです。この具体例で大切になる見方です。
