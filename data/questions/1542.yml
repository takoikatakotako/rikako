# 化学基礎 問502
id: 1542
type: single_choice
text: |
  「沸点の違いを利用して液体を分ける方法である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸素だけが入った容器を考える場面"
  - "水とエタノールの混合物を沸点の差で分ける場面"
  - "ぬれた床の水がしだいに乾く場面"
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「沸点の違いを利用して液体を分ける方法である。」と最も関係が深い場面は「水とエタノールの混合物を沸点の差で分ける場面」です。したがって、正解は「水とエタノールの混合物を沸点の差で分ける場面」です。
  
  「酸素だけが入った容器を考える場面」は、「一種類の物質だけからできていて、性質が一定である物質である。」と結び付きが強い場面です。
  「水とエタノールの混合物を沸点の差で分ける場面」が正しいです。この説明と結び付きが強い場面です。
  「ぬれた床の水がしだいに乾く場面」は、「液体が気体になる状態変化である。」と結び付きが強い場面です。
  「ナトリウムが電子を1個失いやすい理由を考える場面」は、「原子のいちばん外側の電子殻にある電子である。」と結び付きが強い場面です。
