# 化学基礎 問618
id: 1658
type: single_choice
text: |
  「性質が周期的にくり返されること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "中和"
  - "還元剤"
  - "炎色反応"
  - "周期律"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「性質が周期的にくり返されること」という見方が大切なのは周期律です。したがって、正解は「周期律」です。
  
  「中和」は、その語で大切なのは「酸と塩基が打ち消し合うこと」という見方です。
  「還元剤」は、その語で大切なのは「相手を還元させ、自分は酸化されること」という見方です。
  「炎色反応」は、その語で大切なのは「金属元素ごとに炎の色が異なること」という見方です。
  「周期律」が正しいです。この見方が大切な語です。
