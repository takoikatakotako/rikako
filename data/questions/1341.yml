# 化学基礎 問301
id: 1341
type: single_choice
text: |
  ろ過について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "沸点の違いを利用して液体を分ける方法である。"
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
  - "二種類以上の物質が混ざってできている物質である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  ろ過は、液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。 したがって、正解は「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」です。
  
  「沸点の違いを利用して液体を分ける方法である。」は、蒸留の説明です。
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」が正しいです。ろ過の説明です。
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」は、クロマトグラフィーの説明です。
  「二種類以上の物質が混ざってできている物質である。」は、混合物の説明です。
