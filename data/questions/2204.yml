# 高校化学 問204
id: 2204
type: single_choice
text: |
  「気液平衡にあるとき、気体が示す圧力である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "金属結晶"
  - "蒸気圧"
  - "溶解"
  - "飽和溶液"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  気液平衡にあるとき、気体が示す圧力である。 に当てはまる語は蒸気圧です。したがって、正解は「蒸気圧」です。
  
  「金属結晶」は、「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」に当てはまる語です。
  「蒸気圧」が正しいです。「気液平衡にあるとき、気体が示す圧力である。」に当てはまる語です。
  「溶解」は、「溶質の粒子が溶媒中に広がっていく現象である。」に当てはまる語です。
  「飽和溶液」は、「その温度でそれ以上溶質が溶けない状態の溶液である。」に当てはまる語です。
