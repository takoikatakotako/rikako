# 化学基礎 問379
id: 1419
type: single_choice
text: |
  モル濃度と最も関係が深い場面として、適切なものはどれか。
choices:
  - "塩酸と水酸化ナトリウム水溶液を混ぜる場面"
  - "同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面"
  - "1Lの食塩水にどれだけ溶質が溶けているかを表す場面"
  - "マグネシウムが酸素と結び付く場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  1Lの食塩水にどれだけ溶質が溶けているかを表す場面は、モル濃度と結び付きが強い場面です。したがって、正解は「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」です。
  
  「塩酸と水酸化ナトリウム水溶液を混ぜる場面」は、中和と結び付きが強い場面です。
  「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」は、電離度と結び付きが強い場面です。
  「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」が正しいです。これはモル濃度と結び付きが強い場面です。
  「マグネシウムが酸素と結び付く場面」は、酸化と結び付きが強い場面です。
