# 化学基礎 問787
id: 1827
type: single_choice
text: |
  「酸素との結び付きや電子の放出に注目すること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "原子や原子団が電子を失って正の電荷をもつ粒子である。"
  - "物質が酸素と結び付く、または電子を失う変化である。"
  - "分子の中で電荷のかたよりがほとんどない分子である。"
  - "水溶液の酸性や塩基性の強さを表す尺度である。"
correct: 1
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「酸素との結び付きや電子の放出に注目すること」という見方と最も関係が深い説明は「物質が酸素と結び付く、または電子を失う変化である。」です。したがって、正解は「物質が酸素と結び付く、または電子を失う変化である。」です。
  
  「原子や原子団が電子を失って正の電荷をもつ粒子である。」は、その説明で大切なのは「電子を失って正に帯電すること」という見方です。
  「物質が酸素と結び付く、または電子を失う変化である。」が正しいです。この見方と最も関係が深い説明です。
  「分子の中で電荷のかたよりがほとんどない分子である。」は、その説明で大切なのは「電荷のかたよりがほとんどないこと」という見方です。
  「水溶液の酸性や塩基性の強さを表す尺度である。」は、その説明で大切なのは「酸性と塩基性の強さを数で見ること」という見方です。
