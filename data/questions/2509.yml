# 高校化学 問509
id: 2509
type: single_choice
text: |
  「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "温めた風船がふくらみやすくなる場面"
  - "高圧や低温で気体のふるまいが理想気体からずれる場面"
  - "飽和溶液で見かけ上変化が止まっている場面"
  - "金属や硫黄のコロイドが電解質で沈みやすい場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」と最も関係が深い場面は「温めた風船がふくらみやすくなる場面」です。したがって、正解は「温めた風船がふくらみやすくなる場面」です。
  
  「温めた風船がふくらみやすくなる場面」が正しいです。この説明と結び付きが強い場面です。
  「高圧や低温で気体のふるまいが理想気体からずれる場面」は、「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」と結び付きが強い場面です。
  「飽和溶液で見かけ上変化が止まっている場面」は、「溶ける速さと析出する速さが等しくなっている平衡である。」と結び付きが強い場面です。
  「金属や硫黄のコロイドが電解質で沈みやすい場面」は、「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」と結び付きが強い場面です。
