# 化学基礎 問797
id: 1837
type: single_choice
text: |
  「金属元素ごとに炎の色が異なること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "化学変化を、物質の種類と量の関係が分かるように表した式である。"
  - "物質が酸素と結び付く、または電子を失う変化である。"
  - "水に溶けたり融解したりすると電流を通す物質である。"
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
correct: 3
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「金属元素ごとに炎の色が異なること」という見方と最も関係が深い説明は「金属元素を炎に入れたときに特有の色を示す反応である。」です。したがって、正解は「金属元素を炎に入れたときに特有の色を示す反応である。」です。
  
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」は、その説明で大切なのは「反応する物質とできる物質の関係を式で示すこと」という見方です。
  「物質が酸素と結び付く、または電子を失う変化である。」は、その説明で大切なのは「酸素との結び付きや電子の放出に注目すること」という見方です。
  「水に溶けたり融解したりすると電流を通す物質である。」は、その説明で大切なのは「水溶液や融解状態で電流を通すこと」という見方です。
  「金属元素を炎に入れたときに特有の色を示す反応である。」が正しいです。この見方と最も関係が深い説明です。
