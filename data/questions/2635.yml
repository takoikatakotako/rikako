# 高校化学 問635
id: 2635
type: single_choice
text: |
  「物質を燃やしたときに熱が出ることを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "反応が進むために必要な最小限のエネルギーである。"
  - "水溶液中で一部だけ電離する酸である。"
  - "周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。"
  - "化学反応に伴って出入りする熱量である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「物質を燃やしたときに熱が出ることを考える場面」を説明した文として適切なのは「化学反応に伴って出入りする熱量である。」です。したがって、正解は「化学反応に伴って出入りする熱量である。」です。
  
  「反応が進むために必要な最小限のエネルギーである。」は、この説明は「加熱すると反応が進みやすくなる理由を考える場面」と結び付きが強いです。
  「水溶液中で一部だけ電離する酸である。」は、この説明は「酢酸が塩酸ほど強く電離しない場面」と結び付きが強いです。
  「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」は、この説明は「鉄や銅、クロムの化合物の色の違いを考える場面」と結び付きが強いです。
  「化学反応に伴って出入りする熱量である。」が正しいです。この具体例を説明した文です。
