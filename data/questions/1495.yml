# 化学基礎 問455
id: 1495
type: single_choice
text: |
  純物質を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "成分が一種類で性質が一定であること"
  - "固体から液体への変化であること"
  - "液体から固体への変化であること"
  - "水に溶けない固体を液体から分けること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  純物質では、「成分が一種類で性質が一定であること」という見方が大切です。したがって、正解は「成分が一種類で性質が一定であること」です。
  
  「成分が一種類で性質が一定であること」が正しいです。純物質の要点を表しています。
  「固体から液体への変化であること」は、融解に関係する見方です。
  「液体から固体への変化であること」は、凝固に関係する見方です。
  「水に溶けない固体を液体から分けること」は、ろ過に関係する見方です。
