# 高校化学 問169
id: 2169
type: single_choice
text: |
  ハロゲンと最も関係が深い場面として、適切なものはどれか。
choices:
  - "電線や青色の銅イオン水溶液を考える場面"
  - "フッ素や塩素、臭素の反応性を比べる場面"
  - "自動車のバッテリーを考える場面"
  - "水素を使って発電し、水を生じる仕組みを考える場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  フッ素や塩素、臭素の反応性を比べる場面は、ハロゲンと結び付きが強い場面です。したがって、正解は「フッ素や塩素、臭素の反応性を比べる場面」です。
  
  「電線や青色の銅イオン水溶液を考える場面」は、銅と結び付きが強い場面です。
  「フッ素や塩素、臭素の反応性を比べる場面」が正しいです。これはハロゲンと結び付きが強い場面です。
  「自動車のバッテリーを考える場面」は、鉛蓄電池と結び付きが強い場面です。
  「水素を使って発電し、水を生じる仕組みを考える場面」は、燃料電池と結び付きが強い場面です。
