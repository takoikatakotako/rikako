# 高校化学 問133
id: 2133
type: single_choice
text: |
  親水コロイドと最も関係が深い場面として、適切なものはどれか。
choices:
  - "酢酸が塩酸ほど強く電離しない場面"
  - "デンプンやゼラチンが水中で安定しやすい場面"
  - "どの酸がより電離しやすいかを比べる場面"
  - "食塩が水に溶けて見えなくなる場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  デンプンやゼラチンが水中で安定しやすい場面は、親水コロイドと結び付きが強い場面です。したがって、正解は「デンプンやゼラチンが水中で安定しやすい場面」です。
  
  「酢酸が塩酸ほど強く電離しない場面」は、弱酸と結び付きが強い場面です。
  「デンプンやゼラチンが水中で安定しやすい場面」が正しいです。これは親水コロイドと結び付きが強い場面です。
  「どの酸がより電離しやすいかを比べる場面」は、酸解離定数と結び付きが強い場面です。
  「食塩が水に溶けて見えなくなる場面」は、溶解と結び付きが強い場面です。
