# 高校化学 問350
id: 2350
type: single_choice
text: |
  「流した電流が大きいほど析出量が増える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "ファラデーの法則"
  - "塩の加水分解"
  - "弱塩基"
  - "塩基解離定数"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  流した電流が大きいほど析出量が増える場面 と最も関係が深いのはファラデーの法則です。したがって、正解は「ファラデーの法則」です。
  
  「ファラデーの法則」が正しいです。この具体例と最も関係が深い語です。
  「塩の加水分解」は、「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」と結び付きが強い語です。
  「弱塩基」は、「アンモニア水が強塩基ほど完全には電離しない場面」と結び付きが強い語です。
  「塩基解離定数」は、「どの塩基がより電離しやすいかを比べる場面」と結び付きが強い語です。
