# 化学基礎 問954
id: 1994
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "クロマトグラフィー / 移動しやすさの違いを利用すること"
  - "原子番号 / 電気的な引力で結び付くこと"
  - "イオン結合 / 1Lあたりの物質量で表すこと"
  - "モル濃度 / 陽子数を表す数であること"
correct: 0
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「クロマトグラフィー / 移動しやすさの違いを利用すること」です。したがって、正解は「クロマトグラフィー / 移動しやすさの違いを利用すること」です。
  
  「クロマトグラフィー / 移動しやすさの違いを利用すること」が正しいです。用語と要点の対応が合っています。
  「原子番号 / 電気的な引力で結び付くこと」は、用語と要点の対応が合っていません。
  「イオン結合 / 1Lあたりの物質量で表すこと」は、用語と要点の対応が合っていません。
  「モル濃度 / 陽子数を表す数であること」は、用語と要点の対応が合っていません。
