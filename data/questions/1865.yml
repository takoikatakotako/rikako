# 化学基礎 問825
id: 1865
type: single_choice
text: |
  「物質の性質を示す小さな粒子として考えること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ドライアイスがそのまま気体になる場面"
  - "塩素原子が電子を1個受け取って Cl- になる場面"
  - "水分子や酸素分子を粒として考える場面"
  - "6.0×10^23個の粒子をひとまとまりとして数える場面"
correct: 2
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「物質の性質を示す小さな粒子として考えること」という見方と最も関係が深い場面は「水分子や酸素分子を粒として考える場面」です。したがって、正解は「水分子や酸素分子を粒として考える場面」です。
  
  「ドライアイスがそのまま気体になる場面」は、その場面で大切なのは「固体から直接気体になること」という見方です。
  「塩素原子が電子を1個受け取って Cl- になる場面」は、その場面で大切なのは「電子を受け取って負に帯電すること」という見方です。
  「水分子や酸素分子を粒として考える場面」が正しいです。この見方と最も関係が深い場面です。
  「6.0×10^23個の粒子をひとまとまりとして数える場面」は、その場面で大切なのは「粒子の数をまとめて扱う単位であること」という見方です。
