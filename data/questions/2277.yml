# 高校化学 問277
id: 2277
type: single_choice
text: |
  「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "アルコール"
  - "カルボン酸"
  - "銅"
  - "ベンゼン"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。 に当てはまる語は銅です。したがって、正解は「銅」です。
  
  「アルコール」は、「ヒドロキシ基をもつ有機化合物である。」に当てはまる語です。
  「カルボン酸」は、「カルボキシ基をもち、酸性を示す有機化合物である。」に当てはまる語です。
  「銅」が正しいです。「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」に当てはまる語です。
  「ベンゼン」は、「六角形の環状構造をもつ代表的な芳香族炭化水素である。」に当てはまる語です。
