# 高校化学 問298
id: 2298
type: single_choice
text: |
  「目的に応じた特別な性質をもたせてつくられた材料である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "不飽和炭化水素"
  - "置換反応"
  - "アルコール"
  - "機能性材料"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  目的に応じた特別な性質をもたせてつくられた材料である。 に当てはまる語は機能性材料です。したがって、正解は「機能性材料」です。
  
  「不飽和炭化水素」は、「炭素どうしに二重結合や三重結合をもつ炭化水素である。」に当てはまる語です。
  「置換反応」は、「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」に当てはまる語です。
  「アルコール」は、「ヒドロキシ基をもつ有機化合物である。」に当てはまる語です。
  「機能性材料」が正しいです。「目的に応じた特別な性質をもたせてつくられた材料である。」に当てはまる語です。
