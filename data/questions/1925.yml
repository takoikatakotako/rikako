# 化学基礎 問885
id: 1925
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "化学反応式 / 物質が酸素と結び付く、または電子を失う変化である。"
  - "電離度 / 溶けた物質のうち、電離してイオンになった割合である。"
  - "酸化 / 水に溶けたり融解したりすると電流を通す物質である。"
  - "電解質 / 化学変化を、物質の種類と量の関係が分かるように表した式である。"
correct: 1
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「電離度 / 溶けた物質のうち、電離してイオンになった割合である。」です。したがって、正解は「電離度 / 溶けた物質のうち、電離してイオンになった割合である。」です。
  
  「化学反応式 / 物質が酸素と結び付く、または電子を失う変化である。」は、用語と説明の対応が合っていません。
  「電離度 / 溶けた物質のうち、電離してイオンになった割合である。」が正しいです。用語と説明の対応が合っています。
  「酸化 / 水に溶けたり融解したりすると電流を通す物質である。」は、用語と説明の対応が合っていません。
  「電解質 / 化学変化を、物質の種類と量の関係が分かるように表した式である。」は、用語と説明の対応が合っていません。
