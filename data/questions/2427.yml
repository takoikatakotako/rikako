# 高校化学 問427
id: 2427
type: single_choice
text: |
  浸透圧を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水となじみやすく安定しやすいこと"
  - "分子の集まり方や沸点に関係すること"
  - "半透膜を通る溶媒の移動に注目すること"
  - "蒸気圧と外圧のつり合いに注目すること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  浸透圧では、「半透膜を通る溶媒の移動に注目すること」という見方が大切です。したがって、正解は「半透膜を通る溶媒の移動に注目すること」です。
  
  「水となじみやすく安定しやすいこと」は、親水コロイドに関係する見方です。
  「分子の集まり方や沸点に関係すること」は、分子間力に関係する見方です。
  「半透膜を通る溶媒の移動に注目すること」が正しいです。浸透圧の要点を表しています。
  「蒸気圧と外圧のつり合いに注目すること」は、沸点に関係する見方です。
