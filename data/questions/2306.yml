# 高校化学 問306
id: 2306
type: single_choice
text: |
  「氷を水に変えるのに必要な熱を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "融解熱"
  - "凝固点降下"
  - "コロイド"
  - "ブラウン運動"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  氷を水に変えるのに必要な熱を考える場面 と最も関係が深いのは融解熱です。したがって、正解は「融解熱」です。
  
  「融解熱」が正しいです。この具体例と最も関係が深い語です。
  「凝固点降下」は、「凍結防止剤をまいた道路の水が凍りにくくなる場面」と結び付きが強い語です。
  「コロイド」は、「牛乳やゼラチン溶液のような見た目の系を考える場面」と結び付きが強い語です。
  「ブラウン運動」は、「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」と結び付きが強い語です。
