# 高校化学 問759
id: 2759
type: single_choice
text: |
  「電離と元に戻る変化がつり合うこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "電離平衡"
  - "ナイロン"
  - "分子間力"
  - "実在気体"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「電離と元に戻る変化がつり合うこと」という見方が大切なのは電離平衡です。したがって、正解は「電離平衡」です。
  
  「電離平衡」が正しいです。この見方が大切な語です。
  「ナイロン」は、その語で大切なのは「丈夫な合成繊維であること」という見方です。
  「分子間力」は、その語で大切なのは「分子の集まり方や沸点に関係すること」という見方です。
  「実在気体」は、その語で大切なのは「分子の体積と分子間力の影響に注目すること」という見方です。
