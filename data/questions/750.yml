# 高校化学 問40
id: 750
type: single_choice
text: |
  吸熱反応についての説明として、最も適切なものはどれか。
choices:
  - "溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。"
  - "コロイド粒子が不規則に動いて見える現象である。"
  - "電場をかけたとき、荷電したコロイド粒子が移動する現象である。"
  - "反応の結果として周囲から熱を吸収する反応である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  吸熱反応は、反応の結果として周囲から熱を吸収する反応である。 したがって、正解は「反応の結果として周囲から熱を吸収する反応である。」です。
  
  「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」は、コロイドの説明です。
  「コロイド粒子が不規則に動いて見える現象である。」は、ブラウン運動の説明です。
  「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」は、電気泳動の説明です。
  「反応の結果として周囲から熱を吸収する反応である。」が正しいです。吸熱反応の説明です。
