# 高校化学 問29
id: 739
type: single_choice
text: |
  チンダル現象についての説明として、最も適切なものはどれか。
choices:
  - "コロイド粒子が光を散乱するため、光の道筋が見える現象である。"
  - "反応が進むために必要な最小限のエネルギーである。"
  - "正反応と逆反応の両方が起こり得る反応である。"
  - "化学平衡の状態を表す、平衡時の濃度や分圧の比である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  チンダル現象は、コロイド粒子が光を散乱するため、光の道筋が見える現象である。 したがって、正解は「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」です。
  
  「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」が正しいです。チンダル現象の説明です。
  「反応が進むために必要な最小限のエネルギーである。」は、活性化エネルギーの説明です。
  「正反応と逆反応の両方が起こり得る反応である。」は、可逆反応の説明です。
  「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」は、平衡定数の説明です。
