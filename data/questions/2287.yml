# 高校化学 問287
id: 2287
type: single_choice
text: |
  「六角形の環状構造をもつ代表的な芳香族炭化水素である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "ベンゼン"
  - "飽和炭化水素"
  - "付加反応"
  - "異性体"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  六角形の環状構造をもつ代表的な芳香族炭化水素である。 に当てはまる語はベンゼンです。したがって、正解は「ベンゼン」です。
  
  「ベンゼン」が正しいです。「六角形の環状構造をもつ代表的な芳香族炭化水素である。」に当てはまる語です。
  「飽和炭化水素」は、「炭素どうしが単結合だけでつながった炭化水素である。」に当てはまる語です。
  「付加反応」は、「多重結合に原子や原子団が加わる反応である。」に当てはまる語です。
  「異性体」は、「分子式は同じでも構造が異なる化合物どうしである。」に当てはまる語です。
