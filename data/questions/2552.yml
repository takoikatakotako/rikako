# 高校化学 問552
id: 2552
type: single_choice
text: |
  「反応が進むために必要な最小限のエネルギーである。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "密閉容器で反応物と生成物の量が一定になる場面"
  - "どの塩基がより電離しやすいかを比べる場面"
  - "電線や青色の銅イオン水溶液を考える場面"
  - "加熱すると反応が進みやすくなる理由を考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「反応が進むために必要な最小限のエネルギーである。」と最も関係が深い場面は「加熱すると反応が進みやすくなる理由を考える場面」です。したがって、正解は「加熱すると反応が進みやすくなる理由を考える場面」です。
  
  「密閉容器で反応物と生成物の量が一定になる場面」は、「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」と結び付きが強い場面です。
  「どの塩基がより電離しやすいかを比べる場面」は、「塩基の電離のしやすさを表す定数である。」と結び付きが強い場面です。
  「電線や青色の銅イオン水溶液を考える場面」は、「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」と結び付きが強い場面です。
  「加熱すると反応が進みやすくなる理由を考える場面」が正しいです。この説明と結び付きが強い場面です。
