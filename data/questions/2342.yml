# 高校化学 問342
id: 2342
type: single_choice
text: |
  「植物が光を受けてデンプンなどをつくる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "光合成"
  - "ファラデーの法則"
  - "活性化エネルギー"
  - "可逆反応"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  植物が光を受けてデンプンなどをつくる場面 と最も関係が深いのは光合成です。したがって、正解は「光合成」です。
  
  「光合成」が正しいです。この具体例と最も関係が深い語です。
  「ファラデーの法則」は、「流した電流が大きいほど析出量が増える場面」と結び付きが強い語です。
  「活性化エネルギー」は、「加熱すると反応が進みやすくなる理由を考える場面」と結び付きが強い語です。
  「可逆反応」は、「生成物から再び反応物が生じる場面を考えるとき」と結び付きが強い語です。
