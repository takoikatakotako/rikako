# 化学基礎 問493
id: 1533
type: single_choice
text: |
  塩橋を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "小さな単位が多数つながっていること"
  - "粒子の数をまとめて扱う単位であること"
  - "電池の中で電気的なつり合いを保つこと"
  - "反応する物質とできる物質の関係を式で示すこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  塩橋では、「電池の中で電気的なつり合いを保つこと」という見方が大切です。したがって、正解は「電池の中で電気的なつり合いを保つこと」です。
  
  「小さな単位が多数つながっていること」は、高分子化合物に関係する見方です。
  「粒子の数をまとめて扱う単位であること」は、モルに関係する見方です。
  「電池の中で電気的なつり合いを保つこと」が正しいです。塩橋の要点を表しています。
  「反応する物質とできる物質の関係を式で示すこと」は、化学反応式に関係する見方です。
