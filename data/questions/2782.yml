# 高校化学 問782
id: 2782
type: single_choice
text: |
  「同じ分子式でも構造が違うこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "絶対温度"
  - "蒸気圧降下"
  - "反応熱"
  - "異性体"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「同じ分子式でも構造が違うこと」という見方が大切なのは異性体です。したがって、正解は「異性体」です。
  
  「絶対温度」は、その語で大切なのは「0 K を基準に温度を考えること」という見方です。
  「蒸気圧降下」は、その語で大切なのは「溶質があると溶媒の蒸気圧が下がること」という見方です。
  「反応熱」は、その語で大切なのは「反応に伴う熱の出入りを見ること」という見方です。
  「異性体」が正しいです。この見方が大切な語です。
