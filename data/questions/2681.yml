# 高校化学 問681
id: 2681
type: single_choice
text: |
  「メタンの水素が塩素に置き換わる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "目的に応じた特別な性質をもたせてつくられた材料である。"
  - "分子中の原子や原子団が別の原子や原子団に置き換わる反応である。"
  - "一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。"
  - "溶質の粒子が溶媒中に広がっていく現象である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「メタンの水素が塩素に置き換わる場面」を説明した文として適切なのは「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」です。したがって、正解は「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」です。
  
  「目的に応じた特別な性質をもたせてつくられた材料である。」は、この説明は「導電性高分子や高性能電池材料を考える場面」と結び付きが強いです。
  「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」が正しいです。この具体例を説明した文です。
  「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」は、この説明は「温めた風船がふくらみやすくなる場面」と結び付きが強いです。
  「溶質の粒子が溶媒中に広がっていく現象である。」は、この説明は「食塩が水に溶けて見えなくなる場面」と結び付きが強いです。
