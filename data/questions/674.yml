# 化学基礎 問7
id: 674
type: single_choice
text: |
  金属が電気を通しやすい理由として、最も適切なものはどれか。
choices:
  - "金属の中では、自由電子が動けるから。"
  - "金属の中では、原子核が自由に流れるから。"
  - "金属の中では、中性子が移動するから。"
  - "金属は全て水に溶けるから。"
correct: 0
explanation: |
  この問題は、「金属の電気伝導性の理由」を答える問題です。
  
  金属では、金属結合によって自由電子が存在しています。この自由電子が動くことで、電気が流れます。したがって、正解は「金属の中では、自由電子が動けるから」です。
  
  「金属の中では、自由電子が動けるから」が正しいです。これが金属が電気を通す理由です。
  「金属の中では、原子核が自由に流れるから」は、適切ではありません。原子核が流れているわけではありません。
  「金属の中では、中性子が移動するから」は、適切ではありません。
  「金属は全て水に溶けるから」は、金属の電気伝導性の理由にはなりません。
