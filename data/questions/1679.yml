# 化学基礎 問639
id: 1679
type: single_choice
text: |
  「相手を酸化させ、自分は還元されること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "酸化剤"
  - "クロマトグラフィー"
  - "融解"
  - "周期律"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「相手を酸化させ、自分は還元されること」という見方が大切なのは酸化剤です。したがって、正解は「酸化剤」です。
  
  「酸化剤」が正しいです。この見方が大切な語です。
  「クロマトグラフィー」は、その語で大切なのは「移動しやすさの違いを利用すること」という見方です。
  「融解」は、その語で大切なのは「固体から液体への変化であること」という見方です。
  「周期律」は、その語で大切なのは「性質が周期的にくり返されること」という見方です。
