# 高校化学 問942
id: 2942
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "分子間力 / 高圧や低温で気体のふるまいが理想気体からずれる場面"
  - "光合成 / 植物が光を受けてデンプンなどをつくる場面"
  - "実在気体 / 飽和溶液で見かけ上変化が止まっている場面"
  - "溶解平衡 / 水やエタノールの沸点の違いを考える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「光合成 / 植物が光を受けてデンプンなどをつくる場面」です。したがって、正解は「光合成 / 植物が光を受けてデンプンなどをつくる場面」です。
  
  「分子間力 / 高圧や低温で気体のふるまいが理想気体からずれる場面」は、用語と場面の対応が合っていません。
  「光合成 / 植物が光を受けてデンプンなどをつくる場面」が正しいです。用語と場面の対応が合っています。
  「実在気体 / 飽和溶液で見かけ上変化が止まっている場面」は、用語と場面の対応が合っていません。
  「溶解平衡 / 水やエタノールの沸点の違いを考える場面」は、用語と場面の対応が合っていません。
