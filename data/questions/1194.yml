# 化学基礎 問154
id: 1194
type: single_choice
text: |
  クロマトグラフィーの例として、最も適切なものはどれか。
choices:
  - "インクに含まれる色素を分ける操作"
  - "酸素だけからなる気体"
  - "食塩が水に溶けた食塩水"
  - "酸素 O2"
correct: 0
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  インクに含まれる色素を分ける操作は、クロマトグラフィーの例です。したがって、正解は「インクに含まれる色素を分ける操作」です。
  
  「インクに含まれる色素を分ける操作」が正しいです。これはクロマトグラフィーの例です。
  「酸素だけからなる気体」は、純物質の例として見る方が適切です。
  「食塩が水に溶けた食塩水」は、混合物の例として見る方が適切です。
  「酸素 O2」は、単体の例として見る方が適切です。
