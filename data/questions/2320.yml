# 高校化学 問320
id: 2320
type: single_choice
text: |
  「食塩が水に溶けて見えなくなる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "塩の加水分解"
  - "弱塩基"
  - "溶解"
  - "塩基解離定数"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  食塩が水に溶けて見えなくなる場面 と最も関係が深いのは溶解です。したがって、正解は「溶解」です。
  
  「塩の加水分解」は、「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」と結び付きが強い語です。
  「弱塩基」は、「アンモニア水が強塩基ほど完全には電離しない場面」と結び付きが強い語です。
  「溶解」が正しいです。この具体例と最も関係が深い語です。
  「塩基解離定数」は、「どの塩基がより電離しやすいかを比べる場面」と結び付きが強い語です。
