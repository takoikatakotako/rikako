# 化学基礎 問187
id: 1227
type: single_choice
text: |
  酸化剤の例として、最も適切なものはどれか。
choices:
  - "亜鉛"
  - "過マンガン酸カリウム"
  - "亜鉛が銅よりイオンになりやすいこと"
  - "Zn 板と Cu 板を使う電池"
correct: 1
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  過マンガン酸カリウムは、酸化剤の例です。したがって、正解は「過マンガン酸カリウム」です。
  
  「亜鉛」は、還元剤の例として見る方が適切です。
  「過マンガン酸カリウム」が正しいです。これは酸化剤の例です。
  「亜鉛が銅よりイオンになりやすいこと」は、イオン化傾向の例として見る方が適切です。
  「Zn 板と Cu 板を使う電池」は、ダニエル電池の例として見る方が適切です。
