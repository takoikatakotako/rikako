# 化学基礎 問333
id: 1373
type: single_choice
text: |
  中和について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "亜鉛と銅の反応を利用して電気を取り出す電池である。"
  - "酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。"
  - "粒子の数をまとめて表すための単位である。"
  - "化学変化を、物質の種類と量の関係が分かるように表した式である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  中和は、酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。 したがって、正解は「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」です。
  
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」は、ダニエル電池の説明です。
  「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」が正しいです。中和の説明です。
  「粒子の数をまとめて表すための単位である。」は、モルの説明です。
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」は、化学反応式の説明です。
