# 高校化学 問696
id: 2696
type: single_choice
text: |
  「米やいもに多く含まれる成分を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "グルコースが多数つながった植物の貯蔵多糖である。"
  - "絶対零度を基準にした温度で、単位は K で表す。"
  - "不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。"
  - "化学反応に伴って出入りする熱量である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「米やいもに多く含まれる成分を考える場面」を説明した文として適切なのは「グルコースが多数つながった植物の貯蔵多糖である。」です。したがって、正解は「グルコースが多数つながった植物の貯蔵多糖である。」です。
  
  「グルコースが多数つながった植物の貯蔵多糖である。」が正しいです。この具体例を説明した文です。
  「絶対零度を基準にした温度で、単位は K で表す。」は、この説明は「気体の法則で温度をセルシウス温度ではなく K で扱う場面」と結び付きが強いです。
  「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」は、この説明は「食塩水が純水より蒸発しにくくなることを考える場面」と結び付きが強いです。
  「化学反応に伴って出入りする熱量である。」は、この説明は「物質を燃やしたときに熱が出ることを考える場面」と結び付きが強いです。
