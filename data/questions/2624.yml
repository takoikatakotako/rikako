# 高校化学 問624
id: 2624
type: single_choice
text: |
  「食塩水が純水より蒸発しにくくなることを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。"
  - "化学反応によって光が放出される現象である。"
  - "反応が進むために必要な最小限のエネルギーである。"
  - "水溶液中で一部だけ電離する酸である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「食塩水が純水より蒸発しにくくなることを考える場面」を説明した文として適切なのは「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」です。したがって、正解は「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」です。
  
  「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」が正しいです。この具体例を説明した文です。
  「化学反応によって光が放出される現象である。」は、この説明は「ケミカルライトが光る仕組みを考える場面」と結び付きが強いです。
  「反応が進むために必要な最小限のエネルギーである。」は、この説明は「加熱すると反応が進みやすくなる理由を考える場面」と結び付きが強いです。
  「水溶液中で一部だけ電離する酸である。」は、この説明は「酢酸が塩酸ほど強く電離しない場面」と結び付きが強いです。
