# 高校化学 問998
id: 2998
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "ルシャトリエの原理 / マグネシウムやカルシウムの性質を比べる場面"
  - "機能性材料 / 導電性高分子や高性能電池材料を考える場面"
  - "アルカリ土類金属 / エチレンやアセチレンの反応性を考える場面"
  - "不飽和炭化水素 / 圧力や濃度を変えると平衡が移る方向を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「機能性材料 / 導電性高分子や高性能電池材料を考える場面」です。したがって、正解は「機能性材料 / 導電性高分子や高性能電池材料を考える場面」です。
  
  「ルシャトリエの原理 / マグネシウムやカルシウムの性質を比べる場面」は、用語と場面の対応が合っていません。
  「機能性材料 / 導電性高分子や高性能電池材料を考える場面」が正しいです。用語と場面の対応が合っています。
  「アルカリ土類金属 / エチレンやアセチレンの反応性を考える場面」は、用語と場面の対応が合っていません。
  「不飽和炭化水素 / 圧力や濃度を変えると平衡が移る方向を考える場面」は、用語と場面の対応が合っていません。
