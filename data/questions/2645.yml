# 高校化学 問645
id: 2645
type: single_choice
text: |
  「スマートフォンやノートパソコンの電池を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "塩のイオンが水と反応して溶液の性質を変える現象である。"
  - "リチウムイオンの移動を利用する充電式電池である。"
  - "一方の原子が電子対を与えてできる共有結合である。"
  - "分子の端にアルデヒド基をもつ有機化合物である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「スマートフォンやノートパソコンの電池を考える場面」を説明した文として適切なのは「リチウムイオンの移動を利用する充電式電池である。」です。したがって、正解は「リチウムイオンの移動を利用する充電式電池である。」です。
  
  「塩のイオンが水と反応して溶液の性質を変える現象である。」は、この説明は「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」と結び付きが強いです。
  「リチウムイオンの移動を利用する充電式電池である。」が正しいです。この具体例を説明した文です。
  「一方の原子が電子対を与えてできる共有結合である。」は、この説明は「アンモニアが金属イオンに電子対を与える場面」と結び付きが強いです。
  「分子の端にアルデヒド基をもつ有機化合物である。」は、この説明は「ホルムアルデヒドやアセトアルデヒドを考える場面」と結び付きが強いです。
