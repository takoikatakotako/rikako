# 化学基礎 問418
id: 1458
type: single_choice
text: |
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "周期律"
  - "分子"
  - "無極性分子"
  - "混合物"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  元素を原子番号の順に並べると性質が周期的に変化するというきまりである。 に当てはまる語は周期律です。したがって、正解は「周期律」です。
  
  「周期律」が正しいです。「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」に当てはまる語です。
  「分子」は、「原子が結び付いてできた、物質の性質を示す小さな粒子である。」に当てはまる語です。
  「無極性分子」は、「分子の中で電荷のかたよりがほとんどない分子である。」に当てはまる語です。
  「混合物」は、「二種類以上の物質が混ざってできている物質である。」に当てはまる語です。
