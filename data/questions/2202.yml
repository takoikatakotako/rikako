# 高校化学 問202
id: 2202
type: single_choice
text: |
  「固体と液体が平衡で共存するときの温度である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "分子結晶"
  - "金属結晶"
  - "溶解"
  - "融点"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  固体と液体が平衡で共存するときの温度である。 に当てはまる語は融点です。したがって、正解は「融点」です。
  
  「分子結晶」は、「分子どうしが分子間力で集まってできた結晶である。」に当てはまる語です。
  「金属結晶」は、「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」に当てはまる語です。
  「溶解」は、「溶質の粒子が溶媒中に広がっていく現象である。」に当てはまる語です。
  「融点」が正しいです。「固体と液体が平衡で共存するときの温度である。」に当てはまる語です。
