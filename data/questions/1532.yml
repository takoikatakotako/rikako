# 化学基礎 問492
id: 1532
type: single_choice
text: |
  ダニエル電池を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸化による変質を防ぐこと"
  - "化学エネルギーを電気エネルギーに変えること"
  - "化学が社会や生活に広く役立つこと"
  - "1Lあたりの物質量で表すこと"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  ダニエル電池では、「化学エネルギーを電気エネルギーに変えること」という見方が大切です。したがって、正解は「化学エネルギーを電気エネルギーに変えること」です。
  
  「酸化による変質を防ぐこと」は、酸化防止剤に関係する見方です。
  「化学エネルギーを電気エネルギーに変えること」が正しいです。ダニエル電池の要点を表しています。
  「化学が社会や生活に広く役立つこと」は、化学が拓く世界に関係する見方です。
  「1Lあたりの物質量で表すこと」は、モル濃度に関係する見方です。
