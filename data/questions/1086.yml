# 化学基礎 問46
id: 1086
type: single_choice
text: |
  Zn + Cu2+ → Zn2+ + Cu の反応で、還元されているものとして最も適切なものはどれか。
choices:
  - "Zn"
  - "Cu2+"
  - "Zn2+"
  - "電子そのものは関係ない。"
correct: 1
explanation: |
  この問題は、「どの粒子が電子を受け取っているか」を考える問題です。
  
  Cu2+ は電子を受け取って Cu になるので、還元されています。一方、Zn は電子を失って Zn2+ になるので酸化されています。したがって、正解は「Cu2+」です。
  
  「Zn」は、電子を失っているので還元ではありません。
  「Cu2+」が正しいです。電子を受け取って Cu になります。
  「Zn2+」は、生成した後の粒子です。
  「電子そのものは関係ない」は、酸化還元の考え方と合っていません。
