# 化学基礎 問46
id: 1086
type: single_choice
text: |
  Zn + Cu²⁺ → Zn²⁺ + Cu の反応で、還元されているものとして最も適切なものはどれか。
choices:
  - "Zn"
  - "Cu²⁺"
  - "Zn²⁺"
  - "電子そのものは関係ない。"
correct: 1
explanation: |
  この問題は、「どの粒子が電子を受け取っているか」を考える問題です。
  
  Cu²⁺ は電子を受け取って Cu になるので、還元されています。一方、Zn は電子を失って Zn²⁺ になるので酸化されています。したがって、正解は「Cu²⁺」です。
  
  「Zn」は、電子を失っているので還元ではありません。
  「Cu²⁺」が正しいです。電子を受け取って Cu になります。
  「Zn²⁺」は、生成した後の粒子です。
  「電子そのものは関係ない」は、酸化還元の考え方と合っていません。
