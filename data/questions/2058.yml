# 高校化学 問58
id: 2058
type: single_choice
text: |
  アンモニア合成についての説明として、最も適切なものはどれか。
choices:
  - "水溶液中で一部だけ電離する酸である。"
  - "窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。"
  - "酸の電離のしやすさを表す定数である。"
  - "一度使い切ることを前提にした一次電池の代表例である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  アンモニア合成は、窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。 したがって、正解は「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」です。
  
  「水溶液中で一部だけ電離する酸である。」は、弱酸の説明です。
  「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」が正しいです。アンモニア合成の説明です。
  「酸の電離のしやすさを表す定数である。」は、酸解離定数の説明です。
  「一度使い切ることを前提にした一次電池の代表例である。」は、乾電池の説明です。
