# 化学基礎 問775
id: 1815
type: single_choice
text: |
  「物質の性質を示す小さな粒子として考えること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "二種類以上の元素が結び付いてできている純物質である。"
  - "原子が結び付いてできた、物質の性質を示す小さな粒子である。"
  - "原子核の中にある陽子の数を表す数である。"
  - "陽イオンと陰イオンの静電気的な引力による結び付きである。"
correct: 1
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「物質の性質を示す小さな粒子として考えること」という見方と最も関係が深い説明は「原子が結び付いてできた、物質の性質を示す小さな粒子である。」です。したがって、正解は「原子が結び付いてできた、物質の性質を示す小さな粒子である。」です。
  
  「二種類以上の元素が結び付いてできている純物質である。」は、その説明で大切なのは「複数の元素が結び付いてできること」という見方です。
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」が正しいです。この見方と最も関係が深い説明です。
  「原子核の中にある陽子の数を表す数である。」は、その説明で大切なのは「陽子数を表す数であること」という見方です。
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」は、その説明で大切なのは「電気的な引力で結び付くこと」という見方です。
