# 高校化学 問408
id: 2408
type: single_choice
text: |
  ボイルの法則を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "分子の体積と分子間力の影響に注目すること"
  - "分子の集まり方や沸点に関係すること"
  - "蒸気圧と外圧のつり合いに注目すること"
  - "温度一定で圧力と体積の関係を見ること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  ボイルの法則では、「温度一定で圧力と体積の関係を見ること」という見方が大切です。したがって、正解は「温度一定で圧力と体積の関係を見ること」です。
  
  「分子の体積と分子間力の影響に注目すること」は、実在気体に関係する見方です。
  「分子の集まり方や沸点に関係すること」は、分子間力に関係する見方です。
  「蒸気圧と外圧のつり合いに注目すること」は、沸点に関係する見方です。
  「温度一定で圧力と体積の関係を見ること」が正しいです。ボイルの法則の要点を表しています。
