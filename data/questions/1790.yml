# 化学基礎 問750
id: 1790
type: single_choice
text: |
  「電池、医薬品、素材開発などに化学が生かされる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "電荷のかたよりがほとんどないこと"
  - "化学が社会や生活に広く役立つこと"
  - "酸性と塩基性の強さを数で見ること"
  - "金属のイオンになりやすさを比べること"
correct: 1
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「電池、医薬品、素材開発などに化学が生かされる場面」では、「化学が社会や生活に広く役立つこと」という見方が大切です。したがって、正解は「化学が社会や生活に広く役立つこと」です。
  
  「電荷のかたよりがほとんどないこと」は、その見方は酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面よりも無極性分子と結び付きが強いです。
  「化学が社会や生活に広く役立つこと」が正しいです。この具体例で大切になる見方です。
  「酸性と塩基性の強さを数で見ること」は、その見方はレモン水とせっけん水の酸性・塩基性を比べる場面よりもpHと結び付きが強いです。
  「金属のイオンになりやすさを比べること」は、その見方は亜鉛が銅より先にイオンになりやすいことを見る場面よりもイオン化傾向と結び付きが強いです。
