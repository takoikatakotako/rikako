# 高校化学 問311
id: 2311
type: single_choice
text: |
  「酸素と窒素が混ざった気体の圧力を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "透析"
  - "分圧の法則"
  - "親水コロイド"
  - "ボイルの法則"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  酸素と窒素が混ざった気体の圧力を考える場面 と最も関係が深いのは分圧の法則です。したがって、正解は「分圧の法則」です。
  
  「透析」は、「コロイド溶液から余分な電解質を取り除く場面」と結び付きが強い語です。
  「分圧の法則」が正しいです。この具体例と最も関係が深い語です。
  「親水コロイド」は、「デンプンやゼラチンが水中で安定しやすい場面」と結び付きが強い語です。
  「ボイルの法則」は、「注射器の口をふさいで押すと体積が減って圧力が上がる場面」と結び付きが強い語です。
