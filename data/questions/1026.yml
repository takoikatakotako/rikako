# 令和6年度 ITパスポート 公開問題 問46
id: 1026
type: single_choice
text: |
  ITサービスマネジメントの管理プロセスに関する記述a〜cと用語の適切な組合せはどれか。
  
  a ITサービスの変更を実装するためのプロセス
  b インシデントの根本原因を突き止めて解決策を提供するためのプロセス
  c 組織が所有しているIT資産を把握するためのプロセス
choices:
  - "a:構成管理, b:問題管理, c:リリース及び展開管理"
  - "a:構成管理, b:リリース及び展開管理, c:問題管理"
  - "a:問題管理, b:リリース及び展開管理, c:構成管理"
  - "a:リリース及び展開管理, b:問題管理, c:構成管理"
correct: 2
