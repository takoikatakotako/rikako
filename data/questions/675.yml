# 化学基礎 問8
id: 675
type: single_choice
text: |
  1 mol の二酸化炭素 CO2 と 1 mol の酸素 O2 についての説明として、最も適切なものはどれか。
choices:
  - "含まれる分子の数は異なるが、質量は同じである。"
  - "含まれる分子の数も質量も同じである。"
  - "含まれる分子の数は同じだが、質量は異なる。"
  - "含まれる分子の数も質量も比べられない。"
correct: 2
explanation: |
  この問題は、「1 mol が何をそろえる単位か」を考える問題です。
  
  1 mol は、同じ数の粒子を表す単位です。そのため、1 mol の二酸化炭素と 1 mol の酸素は、含まれる分子の数が同じです。ただし、分子1個あたりの質量は違うので、全体の質量は異なります。したがって、正解は「含まれる分子の数は同じだが、質量は異なる」です。
  
  「含まれる分子の数は異なるが、質量は同じである」は、1 mol の考え方と合っていません。
  「含まれる分子の数も質量も同じである」は、分子の数は同じですが、質量は同じではありません。
  「含まれる分子の数は同じだが、質量は異なる」が正しいです。1 mol は粒子の数をそろえる単位です。
  「含まれる分子の数も質量も比べられない」は、比べることができます。
