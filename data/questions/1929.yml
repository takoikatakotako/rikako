# 化学基礎 問889
id: 1929
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "pH / 金属が電子を失ってイオンになりやすい性質の強さである。"
  - "酸化剤 / 相手を酸化させ、自身は還元される物質である。"
  - "イオン化傾向 / 食品や物質が酸化して変質するのを防ぐために用いられる物質である。"
  - "酸化防止剤 / 水溶液の酸性や塩基性の強さを表す尺度である。"
correct: 1
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「酸化剤 / 相手を酸化させ、自身は還元される物質である。」です。したがって、正解は「酸化剤 / 相手を酸化させ、自身は還元される物質である。」です。
  
  「pH / 金属が電子を失ってイオンになりやすい性質の強さである。」は、用語と説明の対応が合っていません。
  「酸化剤 / 相手を酸化させ、自身は還元される物質である。」が正しいです。用語と説明の対応が合っています。
  「イオン化傾向 / 食品や物質が酸化して変質するのを防ぐために用いられる物質である。」は、用語と説明の対応が合っていません。
  「酸化防止剤 / 水溶液の酸性や塩基性の強さを表す尺度である。」は、用語と説明の対応が合っていません。
