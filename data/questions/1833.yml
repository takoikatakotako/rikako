# 化学基礎 問793
id: 1833
type: single_choice
text: |
  「電池の中で電気的なつり合いを保つこと」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "分子の中で電荷のかたよりがある分子である。"
  - "酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。"
  - "相手を還元させ、自身は酸化される物質である。"
  - "二つの溶液の電気的なつり合いを保つための部分である。"
correct: 3
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「電池の中で電気的なつり合いを保つこと」という見方と最も関係が深い説明は「二つの溶液の電気的なつり合いを保つための部分である。」です。したがって、正解は「二つの溶液の電気的なつり合いを保つための部分である。」です。
  
  「分子の中で電荷のかたよりがある分子である。」は、その説明で大切なのは「電荷のかたよりがあること」という見方です。
  「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」は、その説明で大切なのは「酸と塩基が打ち消し合うこと」という見方です。
  「相手を還元させ、自身は酸化される物質である。」は、その説明で大切なのは「相手を還元させ、自分は酸化されること」という見方です。
  「二つの溶液の電気的なつり合いを保つための部分である。」が正しいです。この見方と最も関係が深い説明です。
