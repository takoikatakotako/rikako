# 高校化学 問416
id: 2416
type: single_choice
text: |
  分子結晶を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "液体を気体に変えるための熱に注目すること"
  - "圧力一定で体積と絶対温度の関係を見ること"
  - "混ざった気体の圧力を足し合わせて考えること"
  - "分子間力で集まった結晶であること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  分子結晶では、「分子間力で集まった結晶であること」という見方が大切です。したがって、正解は「分子間力で集まった結晶であること」です。
  
  「液体を気体に変えるための熱に注目すること」は、蒸発熱に関係する見方です。
  「圧力一定で体積と絶対温度の関係を見ること」は、シャルルの法則に関係する見方です。
  「混ざった気体の圧力を足し合わせて考えること」は、分圧の法則に関係する見方です。
  「分子間力で集まった結晶であること」が正しいです。分子結晶の要点を表しています。
