# 高校化学 問948
id: 2948
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "蒸発熱 / 金属が電気を通したりのびたりする理由を考える場面"
  - "金属結晶 / 薄暗い部屋でコロイドに光を当てると筋が見える場面"
  - "チンダル現象 / 水を水蒸気に変えるのに必要な熱を考える場面"
  - "陽極 / 電気分解で気体が発生する電極側を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「陽極 / 電気分解で気体が発生する電極側を考える場面」です。したがって、正解は「陽極 / 電気分解で気体が発生する電極側を考える場面」です。
  
  「蒸発熱 / 金属が電気を通したりのびたりする理由を考える場面」は、用語と場面の対応が合っていません。
  「金属結晶 / 薄暗い部屋でコロイドに光を当てると筋が見える場面」は、用語と場面の対応が合っていません。
  「チンダル現象 / 水を水蒸気に変えるのに必要な熱を考える場面」は、用語と場面の対応が合っていません。
  「陽極 / 電気分解で気体が発生する電極側を考える場面」が正しいです。用語と場面の対応が合っています。
