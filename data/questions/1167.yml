# 化学基礎 問127
id: 1167
type: single_choice
text: |
  無極性分子についての説明として、最も適切なものはどれか。
choices:
  - "粒子の数をそろえて表すための単位である。"
  - "1 L の溶液に含まれる溶質の物質量で表す濃度である。"
  - "分子全体として電荷の偏りが打ち消し合っている分子である。"
  - "化学反応に関わる物質とその量的関係を記号で表したものである。"
correct: 2
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  無極性分子は、分子全体として電荷の偏りが打ち消し合っている分子である。したがって、正解は「分子全体として電荷の偏りが打ち消し合っている分子である。」です。
  
  「粒子の数をそろえて表すための単位である。」は、モルの説明です。
  「1 L の溶液に含まれる溶質の物質量で表す濃度である。」は、モル濃度の説明です。
  「分子全体として電荷の偏りが打ち消し合っている分子である。」が正しいです。無極性分子の説明です。
  「化学反応に関わる物質とその量的関係を記号で表したものである。」は、化学反応式の説明です。
