# 高校化学 問698
id: 2698
type: single_choice
text: |
  「導電性高分子や高性能電池材料を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "陽イオンと陰イオンが規則正しく並んでできた結晶である。"
  - "溶液の凝固点が純粋な溶媒より低くなる現象である。"
  - "目的に応じた特別な性質をもたせてつくられた材料である。"
  - "反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「導電性高分子や高性能電池材料を考える場面」を説明した文として適切なのは「目的に応じた特別な性質をもたせてつくられた材料である。」です。したがって、正解は「目的に応じた特別な性質をもたせてつくられた材料である。」です。
  
  「陽イオンと陰イオンが規則正しく並んでできた結晶である。」は、この説明は「塩化ナトリウムの結晶のつくりを考える場面」と結び付きが強いです。
  「溶液の凝固点が純粋な溶媒より低くなる現象である。」は、この説明は「凍結防止剤をまいた道路の水が凍りにくくなる場面」と結び付きが強いです。
  「目的に応じた特別な性質をもたせてつくられた材料である。」が正しいです。この具体例を説明した文です。
  「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」は、この説明は「複数の反応式を組み合わせて全体の反応熱を求める場面」と結び付きが強いです。
