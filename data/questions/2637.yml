# 高校化学 問637
id: 2637
type: single_choice
text: |
  「複数の反応式を組み合わせて全体の反応熱を求める場面」を説明した文として、最も適切なものはどれか。
choices:
  - "正反応と逆反応の両方が起こり得る反応である。"
  - "反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。"
  - "酸の電離のしやすさを表す定数である。"
  - "遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「複数の反応式を組み合わせて全体の反応熱を求める場面」を説明した文として適切なのは「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」です。したがって、正解は「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」です。
  
  「正反応と逆反応の両方が起こり得る反応である。」は、この説明は「生成物から再び反応物が生じる場面を考えるとき」と結び付きが強いです。
  「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」が正しいです。この具体例を説明した文です。
  「酸の電離のしやすさを表す定数である。」は、この説明は「どの酸がより電離しやすいかを比べる場面」と結び付きが強いです。
  「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」は、この説明は「さびや鉄鋼の利用を考える場面」と結び付きが強いです。
