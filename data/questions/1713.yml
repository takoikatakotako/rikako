# 化学基礎 問673
id: 1713
type: single_choice
text: |
  「原子どうしが電子を共有してできる結び付きである。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水溶液や融解状態で電流を通すこと"
  - "電子を共有して結び付くこと"
  - "水に溶けない固体を液体から分けること"
  - "複数の元素が結び付いてできること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「原子どうしが電子を共有してできる結び付きである。」を理解する上では、「電子を共有して結び付くこと」という見方が大切です。したがって、正解は「電子を共有して結び付くこと」です。
  
  「水溶液や融解状態で電流を通すこと」は、その見方は電解質に関係します。
  「電子を共有して結び付くこと」が正しいです。この説明と結び付きが強い見方です。
  「水に溶けない固体を液体から分けること」は、その見方はろ過に関係します。
  「複数の元素が結び付いてできること」は、その見方は化合物に関係します。
