# 高校化学 問476
id: 2476
type: single_choice
text: |
  鉄を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "金属イオンと配位子の組合せに注目すること"
  - "多様な酸化数や色、触媒作用に注目すること"
  - "電気伝導性が高く、特徴的な色のイオンをつくること"
  - "実用性が高く、酸化数が変わりやすいこと"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  鉄では、「実用性が高く、酸化数が変わりやすいこと」という見方が大切です。したがって、正解は「実用性が高く、酸化数が変わりやすいこと」です。
  
  「金属イオンと配位子の組合せに注目すること」は、錯イオンに関係する見方です。
  「多様な酸化数や色、触媒作用に注目すること」は、遷移元素に関係する見方です。
  「電気伝導性が高く、特徴的な色のイオンをつくること」は、銅に関係する見方です。
  「実用性が高く、酸化数が変わりやすいこと」が正しいです。鉄の要点を表しています。
