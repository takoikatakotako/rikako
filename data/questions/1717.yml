# 化学基礎 問677
id: 1717
type: single_choice
text: |
  「分子の中で電荷のかたよりがほとんどない分子である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸化による変質を防ぐこと"
  - "電荷のかたよりがほとんどないこと"
  - "成分が一種類で性質が一定であること"
  - "液体から気体への変化であること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「分子の中で電荷のかたよりがほとんどない分子である。」を理解する上では、「電荷のかたよりがほとんどないこと」という見方が大切です。したがって、正解は「電荷のかたよりがほとんどないこと」です。
  
  「酸化による変質を防ぐこと」は、その見方は酸化防止剤に関係します。
  「電荷のかたよりがほとんどないこと」が正しいです。この説明と結び付きが強い見方です。
  「成分が一種類で性質が一定であること」は、その見方は純物質に関係します。
  「液体から気体への変化であること」は、その見方は蒸発に関係します。
