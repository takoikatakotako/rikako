# 化学基礎 問196
id: 1236
type: single_choice
text: |
  電離度の例として、最も適切なものはどれか。
choices:
  - "BTB 溶液"
  - "アスコルビン酸"
  - "強酸は電離度が大きいこと"
  - "ポリエチレン"
correct: 2
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  強酸は電離度が大きいことは、電離度の例です。したがって、正解は「強酸は電離度が大きいこと」です。
  
  「BTB 溶液」は、指示薬の例として見る方が適切です。
  「アスコルビン酸」は、酸化防止剤の例として見る方が適切です。
  「強酸は電離度が大きいこと」が正しいです。これは電離度の例です。
  「ポリエチレン」は、高分子化合物の例として見る方が適切です。
