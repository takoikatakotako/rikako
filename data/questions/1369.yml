# 化学基礎 問329
id: 1369
type: single_choice
text: |
  モル濃度について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "原子どうしが電子を共有してできる結び付きである。"
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
  - "原子が結び付いてできた、物質の性質を示す小さな粒子である。"
  - "分子の中で電荷のかたよりがほとんどない分子である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  モル濃度は、溶液1L中に溶けている溶質の物質量を表した濃度である。 したがって、正解は「溶液1L中に溶けている溶質の物質量を表した濃度である。」です。
  
  「原子どうしが電子を共有してできる結び付きである。」は、共有結合の説明です。
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」が正しいです。モル濃度の説明です。
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」は、分子の説明です。
  「分子の中で電荷のかたよりがほとんどない分子である。」は、無極性分子の説明です。
