# 高校化学 問615
id: 2615
type: single_choice
text: |
  「塩化ナトリウムの結晶のつくりを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "電場をかけたとき、荷電したコロイド粒子が移動する現象である。"
  - "一度使い切ることを前提にした一次電池の代表例である。"
  - "正反応と逆反応の両方が起こり得る反応である。"
  - "陽イオンと陰イオンが規則正しく並んでできた結晶である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「塩化ナトリウムの結晶のつくりを考える場面」を説明した文として適切なのは「陽イオンと陰イオンが規則正しく並んでできた結晶である。」です。したがって、正解は「陽イオンと陰イオンが規則正しく並んでできた結晶である。」です。
  
  「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」は、この説明は「コロイド粒子が陽極や陰極へ移動する様子を考える場面」と結び付きが強いです。
  「一度使い切ることを前提にした一次電池の代表例である。」は、この説明は「懐中電灯や時計に入っている電池を考える場面」と結び付きが強いです。
  「正反応と逆反応の両方が起こり得る反応である。」は、この説明は「生成物から再び反応物が生じる場面を考えるとき」と結び付きが強いです。
  「陽イオンと陰イオンが規則正しく並んでできた結晶である。」が正しいです。この具体例を説明した文です。
