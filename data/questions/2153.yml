# 高校化学 問153
id: 2153
type: single_choice
text: |
  触媒と最も関係が深い場面として、適切なものはどれか。
choices:
  - "どの酸がより電離しやすいかを比べる場面"
  - "二酸化マンガンを加えると過酸化水素水の分解が速くなる場面"
  - "懐中電灯や時計に入っている電池を考える場面"
  - "スマートフォンやノートパソコンの電池を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  二酸化マンガンを加えると過酸化水素水の分解が速くなる場面は、触媒と結び付きが強い場面です。したがって、正解は「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」です。
  
  「どの酸がより電離しやすいかを比べる場面」は、酸解離定数と結び付きが強い場面です。
  「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」が正しいです。これは触媒と結び付きが強い場面です。
  「懐中電灯や時計に入っている電池を考える場面」は、乾電池と結び付きが強い場面です。
  「スマートフォンやノートパソコンの電池を考える場面」は、リチウムイオン電池と結び付きが強い場面です。
