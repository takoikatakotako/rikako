# 化学基礎 問510
id: 1550
type: single_choice
text: |
  「もとの物質とは別の物質ができる変化である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水を冷やして氷にする場面"
  - "鉄がさびて別の物質になる場面"
  - "ナトリウム原子が電子を1個失って Na+ になる場面"
  - "酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「もとの物質とは別の物質ができる変化である。」と最も関係が深い場面は「鉄がさびて別の物質になる場面」です。したがって、正解は「鉄がさびて別の物質になる場面」です。
  
  「水を冷やして氷にする場面」は、「液体が固体に変わる状態変化である。」と結び付きが強い場面です。
  「鉄がさびて別の物質になる場面」が正しいです。この説明と結び付きが強い場面です。
  「ナトリウム原子が電子を1個失って Na+ になる場面」は、「原子や原子団が電子を失って正の電荷をもつ粒子である。」と結び付きが強い場面です。
  「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」は、「分子の中で電荷のかたよりがほとんどない分子である。」と結び付きが強い場面です。
