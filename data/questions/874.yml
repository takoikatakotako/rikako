# 令和7年度 ITパスポート 公開問題 問53
id: 874
type: single_choice
text: |
  内部統制の基本的要素の一つである "IT への対応"に関する記述として、最も適切なものはどれか。
choices:
  - "ITを活用すると業務処理を迅速化でき、不注意によるミスを全て防止できる。"
  - "既存のITの利用者の拡大や、使い方の変更などで組織目標を達成できるのであれば、新たなITシステムの導入やITシステムの更新を強いるものではない。"
  - "全ての業務プロセスをIT で自動化することによって、業務プロセスを大幅に修正することが容易になる。"
  - "組織の業務がITに大きく依存すると、内部統制の目的を達成することが難しくなる。- 24 ="
correct: 1
explanation: |
  この問題の公開解答では「既存のITの利用者の拡大や、使い方の変更などで組織目標を達成できるのであれば、新たなITシステムの導入やITシステムの更新を強いるものではない」が正解とされています。
  
  「ITを活用すると業務処理を迅速化でき、不注意によるミスを全て防止できる」は公開解答では正解ではありません。
  「既存のITの利用者の拡大や、使い方の変更などで組織目標を達成できるのであれば、新たなITシステムの導入やITシステムの更新を強いるものではない」が公開解答で正解とされています。
  「全ての業務プロセスをIT で自動化することによって、業務プロセスを大幅に修正することが容易になる」は公開解答では正解ではありません。
  「組織の業務がITに大きく依存すると、内部統制の目的を達成することが難しくなる。- 24 =」は公開解答では正解ではありません。
