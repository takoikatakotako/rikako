# 高校化学 問801
id: 2801
type: single_choice
text: |
  「分子どうしの間にはたらく比較的弱い引力である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸化が起こる側の電極であること"
  - "電離と元に戻る変化がつり合うこと"
  - "最外殻が安定していて反応しにくいこと"
  - "分子の集まり方や沸点に関係すること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「分子どうしの間にはたらく比較的弱い引力である。」を理解する上では、「分子の集まり方や沸点に関係すること」という見方が大切です。したがって、正解は「分子の集まり方や沸点に関係すること」です。
  
  「酸化が起こる側の電極であること」は、その見方は陽極に関係します。
  「電離と元に戻る変化がつり合うこと」は、その見方は電離平衡に関係します。
  「最外殻が安定していて反応しにくいこと」は、その見方は貴ガスに関係します。
  「分子の集まり方や沸点に関係すること」が正しいです。この説明と結び付きが強い見方です。
