# 高校化学 問347
id: 2347
type: single_choice
text: |
  「水溶液に電流を流して物質を分解する場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "電離平衡"
  - "電気分解"
  - "緩衝液"
  - "弱酸"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  水溶液に電流を流して物質を分解する場面 と最も関係が深いのは電気分解です。したがって、正解は「電気分解」です。
  
  「電離平衡」は、「弱酸が一部だけ電離している水溶液を考える場面」と結び付きが強い語です。
  「電気分解」が正しいです。この具体例と最も関係が深い語です。
  「緩衝液」は、「血液や実験用の溶液で pH を保ちたい場面」と結び付きが強い語です。
  「弱酸」は、「酢酸が塩酸ほど強く電離しない場面」と結び付きが強い語です。
