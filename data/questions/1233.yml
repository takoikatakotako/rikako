# 化学基礎 問193
id: 1233
type: single_choice
text: |
  非電解質の例として、最も適切なものはどれか。
choices:
  - "炭素 14 による年代測定"
  - "ナトリウムが黄色を示すこと"
  - "強酸は電離度が大きいこと"
  - "砂糖水"
correct: 3
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  砂糖水は、非電解質の例です。したがって、正解は「砂糖水」です。
  
  「炭素 14 による年代測定」は、放射性同位体の例として見る方が適切です。
  「ナトリウムが黄色を示すこと」は、炎色反応の例として見る方が適切です。
  「強酸は電離度が大きいこと」は、電離度の例として見る方が適切です。
  「砂糖水」が正しいです。これは非電解質の例です。
