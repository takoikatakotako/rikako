# 高校化学 問359
id: 2359
type: single_choice
text: |
  「弱酸が一部だけ電離している水溶液を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "溶解"
  - "電離平衡"
  - "飽和溶液"
  - "蒸気圧降下"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  弱酸が一部だけ電離している水溶液を考える場面 と最も関係が深いのは電離平衡です。したがって、正解は「電離平衡」です。
  
  「溶解」は、「食塩が水に溶けて見えなくなる場面」と結び付きが強い語です。
  「電離平衡」が正しいです。この具体例と最も関係が深い語です。
  「飽和溶液」は、「食塩を加えても底に残るようになった食塩水を考える場面」と結び付きが強い語です。
  「蒸気圧降下」は、「食塩水が純水より蒸発しにくくなることを考える場面」と結び付きが強い語です。
