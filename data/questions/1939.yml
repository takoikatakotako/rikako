# 化学基礎 問899
id: 1939
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "電解質 / 液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "ろ過 / 二種類以上の元素が結び付いてできている純物質である。"
  - "化合物 / 水に溶けたり融解したりすると電流を通す物質である。"
  - "高分子化合物 / 多数の小さな単位がつながってできた大きな分子からなる化合物である。"
correct: 3
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「高分子化合物 / 多数の小さな単位がつながってできた大きな分子からなる化合物である。」です。したがって、正解は「高分子化合物 / 多数の小さな単位がつながってできた大きな分子からなる化合物である。」です。
  
  「電解質 / 液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、用語と説明の対応が合っていません。
  「ろ過 / 二種類以上の元素が結び付いてできている純物質である。」は、用語と説明の対応が合っていません。
  「化合物 / 水に溶けたり融解したりすると電流を通す物質である。」は、用語と説明の対応が合っていません。
  「高分子化合物 / 多数の小さな単位がつながってできた大きな分子からなる化合物である。」が正しいです。用語と説明の対応が合っています。
