# 化学基礎 問758
id: 1798
type: single_choice
text: |
  「複数の元素が結び付いてできること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "二種類以上の元素が結び付いてできている純物質である。"
  - "金属が電子を失ってイオンになりやすい性質の強さである。"
  - "食品や物質が酸化して変質するのを防ぐために用いられる物質である。"
  - "一種類の物質だけからできていて、性質が一定である物質である。"
correct: 0
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「複数の元素が結び付いてできること」という見方と最も関係が深い説明は「二種類以上の元素が結び付いてできている純物質である。」です。したがって、正解は「二種類以上の元素が結び付いてできている純物質である。」です。
  
  「二種類以上の元素が結び付いてできている純物質である。」が正しいです。この見方と最も関係が深い説明です。
  「金属が電子を失ってイオンになりやすい性質の強さである。」は、その説明で大切なのは「金属のイオンになりやすさを比べること」という見方です。
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」は、その説明で大切なのは「酸化による変質を防ぐこと」という見方です。
  「一種類の物質だけからできていて、性質が一定である物質である。」は、その説明で大切なのは「成分が一種類で性質が一定であること」という見方です。
