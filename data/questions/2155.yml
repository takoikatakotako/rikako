# 高校化学 問155
id: 2155
type: single_choice
text: |
  化学平衡と最も関係が深い場面として、適切なものはどれか。
choices:
  - "懐中電灯や時計に入っている電池を考える場面"
  - "スマートフォンやノートパソコンの電池を考える場面"
  - "水溶液に電流を流して物質を分解する場面"
  - "密閉容器で反応物と生成物の量が一定になる場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  密閉容器で反応物と生成物の量が一定になる場面は、化学平衡と結び付きが強い場面です。したがって、正解は「密閉容器で反応物と生成物の量が一定になる場面」です。
  
  「懐中電灯や時計に入っている電池を考える場面」は、乾電池と結び付きが強い場面です。
  「スマートフォンやノートパソコンの電池を考える場面」は、リチウムイオン電池と結び付きが強い場面です。
  「水溶液に電流を流して物質を分解する場面」は、電気分解と結び付きが強い場面です。
  「密閉容器で反応物と生成物の量が一定になる場面」が正しいです。これは化学平衡と結び付きが強い場面です。
