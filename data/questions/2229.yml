# 高校化学 問229
id: 2229
type: single_choice
text: |
  「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "酸解離定数"
  - "溶解"
  - "チンダル現象"
  - "飽和溶液"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  コロイド粒子が光を散乱するため、光の道筋が見える現象である。 に当てはまる語はチンダル現象です。したがって、正解は「チンダル現象」です。
  
  「酸解離定数」は、「酸の電離のしやすさを表す定数である。」に当てはまる語です。
  「溶解」は、「溶質の粒子が溶媒中に広がっていく現象である。」に当てはまる語です。
  「チンダル現象」が正しいです。「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」に当てはまる語です。
  「飽和溶液」は、「その温度でそれ以上溶質が溶けない状態の溶液である。」に当てはまる語です。
