# 化学基礎 問847
id: 1887
type: single_choice
text: |
  「金属元素ごとに炎の色が異なること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムで黄色、銅で青緑色を観察する場面"
  - "BTB溶液やフェノールフタレインで液性を調べる場面"
  - "ダニエル電池で二つの水溶液をつなぐ場面"
  - "電池、医薬品、素材開発などに化学が生かされる場面"
correct: 0
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「金属元素ごとに炎の色が異なること」という見方と最も関係が深い場面は「ナトリウムで黄色、銅で青緑色を観察する場面」です。したがって、正解は「ナトリウムで黄色、銅で青緑色を観察する場面」です。
  
  「ナトリウムで黄色、銅で青緑色を観察する場面」が正しいです。この見方と最も関係が深い場面です。
  「BTB溶液やフェノールフタレインで液性を調べる場面」は、その場面で大切なのは「色の変化で液性を見分けること」という見方です。
  「ダニエル電池で二つの水溶液をつなぐ場面」は、その場面で大切なのは「電池の中で電気的なつり合いを保つこと」という見方です。
  「電池、医薬品、素材開発などに化学が生かされる場面」は、その場面で大切なのは「化学が社会や生活に広く役立つこと」という見方です。
