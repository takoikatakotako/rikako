# 高校化学 問236
id: 2236
type: single_choice
text: |
  「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "結合エネルギー"
  - "エンタルピー変化"
  - "吸熱反応"
  - "光合成"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。 に当てはまる語はエンタルピー変化です。したがって、正解は「エンタルピー変化」です。
  
  「結合エネルギー」は、「気体分子中の結合1 molを切るのに必要なエネルギーである。」に当てはまる語です。
  「エンタルピー変化」が正しいです。「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」に当てはまる語です。
  「吸熱反応」は、「反応の結果として周囲から熱を吸収する反応である。」に当てはまる語です。
  「光合成」は、「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」に当てはまる語です。
