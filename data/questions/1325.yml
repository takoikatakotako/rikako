# 化学基礎 問285
id: 1325
type: single_choice
text: |
  酸化の特徴として、最も適切なものはどれか。
choices:
  - "電子を受け取る"
  - "電子を失う"
  - "相手から電子を受け取る"
  - "相手に電子を与える"
correct: 1
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  酸化では、「電子を失う」という点が大切です。したがって、正解は「電子を失う」です。
  
  「電子を受け取る」は、還元に関係する特徴です。
  「電子を失う」が正しいです。酸化の特徴を表しています。
  「相手から電子を受け取る」は、酸化剤に関係する特徴です。
  「相手に電子を与える」は、還元剤に関係する特徴です。
