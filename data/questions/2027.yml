# 化学基礎 問987
id: 2027
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "酸化防止剤 / 成分が一種類で性質が一定であること"
  - "酸化 / 酸素との結び付きや電子の放出に注目すること"
  - "純物質 / 液体から気体への変化であること"
  - "蒸発 / 酸化による変質を防ぐこと"
correct: 1
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「酸化 / 酸素との結び付きや電子の放出に注目すること」です。したがって、正解は「酸化 / 酸素との結び付きや電子の放出に注目すること」です。
  
  「酸化防止剤 / 成分が一種類で性質が一定であること」は、用語と要点の対応が合っていません。
  「酸化 / 酸素との結び付きや電子の放出に注目すること」が正しいです。用語と要点の対応が合っています。
  「純物質 / 液体から気体への変化であること」は、用語と要点の対応が合っていません。
  「蒸発 / 酸化による変質を防ぐこと」は、用語と要点の対応が合っていません。
