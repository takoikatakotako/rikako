# 化学基礎 問135
id: 1175
type: single_choice
text: |
  酸化についての説明として、最も適切なものはどれか。
choices:
  - "電子を受け取る変化、または酸素を失う変化である。"
  - "相手を酸化し、自分は還元される物質である。"
  - "電子を失う変化、または酸素を受け取る変化である。"
  - "相手を還元し、自分は酸化される物質である。"
correct: 2
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  酸化は、電子を失う変化、または酸素を受け取る変化である。したがって、正解は「電子を失う変化、または酸素を受け取る変化である。」です。
  
  「電子を受け取る変化、または酸素を失う変化である。」は、還元の説明です。
  「相手を酸化し、自分は還元される物質である。」は、酸化剤の説明です。
  「電子を失う変化、または酸素を受け取る変化である。」が正しいです。酸化の説明です。
  「相手を還元し、自分は酸化される物質である。」は、還元剤の説明です。
