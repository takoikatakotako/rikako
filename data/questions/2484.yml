# 高校化学 問484
id: 2484
type: single_choice
text: |
  アルデヒドを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "アミノ酸が多数つながった高分子であること"
  - "アミノ酸どうしをつなぐ結合であること"
  - "植物がエネルギーをたくわえる多糖であること"
  - "分子の端にカルボニル構造をもつこと"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  アルデヒドでは、「分子の端にカルボニル構造をもつこと」という見方が大切です。したがって、正解は「分子の端にカルボニル構造をもつこと」です。
  
  「アミノ酸が多数つながった高分子であること」は、タンパク質に関係する見方です。
  「アミノ酸どうしをつなぐ結合であること」は、ペプチド結合に関係する見方です。
  「植物がエネルギーをたくわえる多糖であること」は、デンプンに関係する見方です。
  「分子の端にカルボニル構造をもつこと」が正しいです。アルデヒドの要点を表しています。
