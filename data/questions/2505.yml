# 高校化学 問505
id: 2505
type: single_choice
text: |
  「蒸発する速さと凝縮する速さが等しくなった状態である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "密閉容器で水面の高さが変わらなくなる場面"
  - "注射器の口をふさいで押すと体積が減って圧力が上がる場面"
  - "ガラスのように一定の融点を示しにくい固体を考える場面"
  - "顕微鏡でコロイド粒子が細かく動く様子を観察する場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「蒸発する速さと凝縮する速さが等しくなった状態である。」と最も関係が深い場面は「密閉容器で水面の高さが変わらなくなる場面」です。したがって、正解は「密閉容器で水面の高さが変わらなくなる場面」です。
  
  「密閉容器で水面の高さが変わらなくなる場面」が正しいです。この説明と結び付きが強い場面です。
  「注射器の口をふさいで押すと体積が減って圧力が上がる場面」は、「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」と結び付きが強い場面です。
  「ガラスのように一定の融点を示しにくい固体を考える場面」は、「結晶のような規則正しい配列をもたない固体である。」と結び付きが強い場面です。
  「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」は、「コロイド粒子が不規則に動いて見える現象である。」と結び付きが強い場面です。
