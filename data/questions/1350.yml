# 化学基礎 問310
id: 1350
type: single_choice
text: |
  化学変化について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
  - "もとの物質とは別の物質ができる変化である。"
  - "原子核の中にある陽子の数を表す数である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  化学変化は、もとの物質とは別の物質ができる変化である。 したがって、正解は「もとの物質とは別の物質ができる変化である。」です。
  
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、ろ過の説明です。
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、再結晶の説明です。
  「もとの物質とは別の物質ができる変化である。」が正しいです。化学変化の説明です。
  「原子核の中にある陽子の数を表す数である。」は、原子番号の説明です。
