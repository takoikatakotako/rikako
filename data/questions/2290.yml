# 高校化学 問290
id: 2290
type: single_choice
text: |
  「アミド結合をもつ合成繊維の代表的な高分子化合物である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "凝固点降下"
  - "コロイド"
  - "ブラウン運動"
  - "ナイロン"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  アミド結合をもつ合成繊維の代表的な高分子化合物である。 に当てはまる語はナイロンです。したがって、正解は「ナイロン」です。
  
  「凝固点降下」は、「溶液の凝固点が純粋な溶媒より低くなる現象である。」に当てはまる語です。
  「コロイド」は、「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」に当てはまる語です。
  「ブラウン運動」は、「コロイド粒子が不規則に動いて見える現象である。」に当てはまる語です。
  「ナイロン」が正しいです。「アミド結合をもつ合成繊維の代表的な高分子化合物である。」に当てはまる語です。
