# 化学基礎 問432
id: 1472
type: single_choice
text: |
  「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "酸"
  - "pH"
  - "塩基"
  - "指示薬"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。 に当てはまる語は塩基です。したがって、正解は「塩基」です。
  
  「酸」は、「水溶液中で水素イオンを生じる物質である。」に当てはまる語です。
  「pH」は、「水溶液の酸性や塩基性の強さを表す尺度である。」に当てはまる語です。
  「塩基」が正しいです。「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」に当てはまる語です。
  「指示薬」は、「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」に当てはまる語です。
