# 化学基礎 問107
id: 1147
type: single_choice
text: |
  単体についての説明として、最も適切なものはどれか。
choices:
  - "二種類以上の元素が結び付いてできた純物質である。"
  - "新しい物質ができず、状態や形だけが変わる変化である。"
  - "一種類の元素だけからなる純物質である。"
  - "新しい物質ができる変化である。"
correct: 2
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  単体は、一種類の元素だけからなる純物質である。したがって、正解は「一種類の元素だけからなる純物質である。」です。
  
  「二種類以上の元素が結び付いてできた純物質である。」は、化合物の説明です。
  「新しい物質ができず、状態や形だけが変わる変化である。」は、物理変化の説明です。
  「一種類の元素だけからなる純物質である。」が正しいです。単体の説明です。
  「新しい物質ができる変化である。」は、化学変化の説明です。
