# 高校化学 問147
id: 2147
type: single_choice
text: |
  電気分解と最も関係が深い場面として、適切なものはどれか。
choices:
  - "燃焼や中和で容器が温かくなる場面"
  - "ケミカルライトが光る仕組みを考える場面"
  - "同じ反応でも条件によって進み方が変わることを比べる場面"
  - "水溶液に電流を流して物質を分解する場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  水溶液に電流を流して物質を分解する場面は、電気分解と結び付きが強い場面です。したがって、正解は「水溶液に電流を流して物質を分解する場面」です。
  
  「燃焼や中和で容器が温かくなる場面」は、発熱反応と結び付きが強い場面です。
  「ケミカルライトが光る仕組みを考える場面」は、化学発光と結び付きが強い場面です。
  「同じ反応でも条件によって進み方が変わることを比べる場面」は、反応速度と結び付きが強い場面です。
  「水溶液に電流を流して物質を分解する場面」が正しいです。これは電気分解と結び付きが強い場面です。
