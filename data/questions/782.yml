# 令和7年度 ITパスポート 公開問題 問10
id: 782
type: single_choice
text: |
  生成AIにおいて、もっともらしいが事実とは異なる内容が出力されることを表す用語として、最も適切なものはどれか。
choices:
  - "エコーチェンバー"
  - "シンギュラリティ"
  - "ディープフェイク"
  - "ハルシネーション"
correct: 3
explanation: |
  この問題は、「生成AIがもっともらしい誤情報を出してしまう現象」を表す言葉を選ぶ問題です。
  
  生成AIが、事実ではないのに本当らしく見える内容を出力してしまう現象は、ハルシネーションと呼ばれます。したがって、正解は「ハルシネーション」です。
  
  「エコーチェンバー」はエコーチェンバーは、似た意見ばかりに触れて考えが強まりやすくなる現象です。
  「シンギュラリティ」はシンギュラリティは、AIの能力が人間を超える転換点を指す言葉です。
  「ディープフェイク」はディープフェイクは、AIで偽の画像や動画などを作る技術です。
  「ハルシネーション」が正しいです。事実ではないのにもっともらしい出力をする現象をハルシネーションといいます。
