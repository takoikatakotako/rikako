# 化学基礎 問821
id: 1861
type: single_choice
text: |
  「電子を受け取って負に帯電すること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "鉄がさびて別の物質になる場面"
  - "炭素12と炭素14を比べる場面"
  - "塩素原子が電子を1個受け取って Cl- になる場面"
  - "金属中で自由電子が動けるため電気を通すことを考える場面"
correct: 2
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「電子を受け取って負に帯電すること」という見方と最も関係が深い場面は「塩素原子が電子を1個受け取って Cl- になる場面」です。したがって、正解は「塩素原子が電子を1個受け取って Cl- になる場面」です。
  
  「鉄がさびて別の物質になる場面」は、その場面で大切なのは「新しい物質ができること」という見方です。
  「炭素12と炭素14を比べる場面」は、その場面で大切なのは「陽子数が同じで中性子数が異なること」という見方です。
  「塩素原子が電子を1個受け取って Cl- になる場面」が正しいです。この見方と最も関係が深い場面です。
  「金属中で自由電子が動けるため電気を通すことを考える場面」は、その場面で大切なのは「自由電子が結合を支えること」という見方です。
