# 高校化学 問567
id: 2567
type: single_choice
text: |
  「周期表1族に属し、水と反応しやすい金属元素の総称である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ネオンやアルゴンが反応しにくい理由を考える場面"
  - "メタンの水素が塩素に置き換わる場面"
  - "ナトリウムやカリウムの性質を比べる場面"
  - "酵素や筋肉の主成分を考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「周期表1族に属し、水と反応しやすい金属元素の総称である。」と最も関係が深い場面は「ナトリウムやカリウムの性質を比べる場面」です。したがって、正解は「ナトリウムやカリウムの性質を比べる場面」です。
  
  「ネオンやアルゴンが反応しにくい理由を考える場面」は、「周期表18族に属し、化学的に安定な気体元素の総称である。」と結び付きが強い場面です。
  「メタンの水素が塩素に置き換わる場面」は、「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」と結び付きが強い場面です。
  「ナトリウムやカリウムの性質を比べる場面」が正しいです。この説明と結び付きが強い場面です。
  「酵素や筋肉の主成分を考える場面」は、「多数のアミノ酸がつながってできた天然高分子化合物である。」と結び付きが強い場面です。
