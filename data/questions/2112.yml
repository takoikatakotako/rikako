# 高校化学 問112
id: 2112
type: single_choice
text: |
  実在気体と最も関係が深い場面として、適切なものはどれか。
choices:
  - "高圧や低温で気体のふるまいが理想気体からずれる場面"
  - "食塩が水に溶けて見えなくなる場面"
  - "食塩を加えても底に残るようになった食塩水を考える場面"
  - "食塩水が純水より蒸発しにくくなることを考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  高圧や低温で気体のふるまいが理想気体からずれる場面は、実在気体と結び付きが強い場面です。したがって、正解は「高圧や低温で気体のふるまいが理想気体からずれる場面」です。
  
  「高圧や低温で気体のふるまいが理想気体からずれる場面」が正しいです。これは実在気体と結び付きが強い場面です。
  「食塩が水に溶けて見えなくなる場面」は、溶解と結び付きが強い場面です。
  「食塩を加えても底に残るようになった食塩水を考える場面」は、飽和溶液と結び付きが強い場面です。
  「食塩水が純水より蒸発しにくくなることを考える場面」は、蒸気圧降下と結び付きが強い場面です。
