# 化学基礎 問576
id: 1616
type: single_choice
text: |
  「水分子で電荷のかたよりを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "溶けた物質のうち、電離してイオンになった割合である。"
  - "亜鉛と銅の反応を利用して電気を取り出す電池である。"
  - "分子の中で電荷のかたよりがある分子である。"
  - "多数の小さな単位がつながってできた大きな分子からなる化合物である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「水分子で電荷のかたよりを考える場面」を説明した文として適切なのは「分子の中で電荷のかたよりがある分子である。」です。したがって、正解は「分子の中で電荷のかたよりがある分子である。」です。
  
  「溶けた物質のうち、電離してイオンになった割合である。」は、この説明は「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」と結び付きが強いです。
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」は、この説明は「亜鉛板と銅板を使って豆電球を光らせる場面」と結び付きが強いです。
  「分子の中で電荷のかたよりがある分子である。」が正しいです。この具体例を説明した文です。
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」は、この説明は「ポリエチレンやタンパク質のような長い分子を考える場面」と結び付きが強いです。
