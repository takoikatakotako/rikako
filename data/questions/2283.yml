# 高校化学 問283
id: 2283
type: single_choice
text: |
  「ヒドロキシ基をもつ有機化合物である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "アルコール"
  - "銅"
  - "資源の再利用"
  - "飽和炭化水素"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  ヒドロキシ基をもつ有機化合物である。 に当てはまる語はアルコールです。したがって、正解は「アルコール」です。
  
  「アルコール」が正しいです。「ヒドロキシ基をもつ有機化合物である。」に当てはまる語です。
  「銅」は、「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」に当てはまる語です。
  「資源の再利用」は、「使い終わった資源や製品を回収し、再び利用する考え方である。」に当てはまる語です。
  「飽和炭化水素」は、「炭素どうしが単結合だけでつながった炭化水素である。」に当てはまる語です。
