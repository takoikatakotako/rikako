# 高校化学 問938
id: 2938
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "セルロース / 注射器の口をふさいで押すと体積が減って圧力が上がる場面"
  - "結合エネルギー / どの結合が切れやすいかを比べる場面"
  - "ボイルの法則 / ガラスのように一定の融点を示しにくい固体を考える場面"
  - "アモルファス / 紙や木材の主成分を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「結合エネルギー / どの結合が切れやすいかを比べる場面」です。したがって、正解は「結合エネルギー / どの結合が切れやすいかを比べる場面」です。
  
  「セルロース / 注射器の口をふさいで押すと体積が減って圧力が上がる場面」は、用語と場面の対応が合っていません。
  「結合エネルギー / どの結合が切れやすいかを比べる場面」が正しいです。用語と場面の対応が合っています。
  「ボイルの法則 / ガラスのように一定の融点を示しにくい固体を考える場面」は、用語と場面の対応が合っていません。
  「アモルファス / 紙や木材の主成分を考える場面」は、用語と場面の対応が合っていません。
