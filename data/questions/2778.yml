# 高校化学 問778
id: 2778
type: single_choice
text: |
  「炭素間が単結合だけであること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "シャルルの法則"
  - "溶解"
  - "透析"
  - "飽和炭化水素"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「炭素間が単結合だけであること」という見方が大切なのは飽和炭化水素です。したがって、正解は「飽和炭化水素」です。
  
  「シャルルの法則」は、その語で大切なのは「圧力一定で体積と絶対温度の関係を見ること」という見方です。
  「溶解」は、その語で大切なのは「溶質の粒子が溶媒中に広がること」という見方です。
  「透析」は、その語で大切なのは「半透膜を通る粒子の大きさの違いを利用すること」という見方です。
  「飽和炭化水素」が正しいです。この見方が大切な語です。
