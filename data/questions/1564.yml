# 化学基礎 問524
id: 1564
type: single_choice
text: |
  「金属原子が自由電子を介して結び付く結合である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面"
  - "レモン水とせっけん水の酸性・塩基性を比べる場面"
  - "亜鉛が銅より先にイオンになりやすいことを見る場面"
  - "金属中で自由電子が動けるため電気を通すことを考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「金属原子が自由電子を介して結び付く結合である。」と最も関係が深い場面は「金属中で自由電子が動けるため電気を通すことを考える場面」です。したがって、正解は「金属中で自由電子が動けるため電気を通すことを考える場面」です。
  
  「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」は、「分子の中で電荷のかたよりがほとんどない分子である。」と結び付きが強い場面です。
  「レモン水とせっけん水の酸性・塩基性を比べる場面」は、「水溶液の酸性や塩基性の強さを表す尺度である。」と結び付きが強い場面です。
  「亜鉛が銅より先にイオンになりやすいことを見る場面」は、「金属が電子を失ってイオンになりやすい性質の強さである。」と結び付きが強い場面です。
  「金属中で自由電子が動けるため電気を通すことを考える場面」が正しいです。この説明と結び付きが強い場面です。
