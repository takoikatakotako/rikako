# 高校化学 問869
id: 2869
type: single_choice
text: |
  「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "分子間力で集まった結晶であること"
  - "半透膜を通る溶媒の移動に注目すること"
  - "結合を切るのに必要なエネルギーに注目すること"
  - "非金属で酸化力が強いこと"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」を理解する上では、「非金属で酸化力が強いこと」という見方が大切です。したがって、正解は「非金属で酸化力が強いこと」です。
  
  「分子間力で集まった結晶であること」は、その見方は分子結晶に関係します。
  「半透膜を通る溶媒の移動に注目すること」は、その見方は浸透圧に関係します。
  「結合を切るのに必要なエネルギーに注目すること」は、その見方は結合エネルギーに関係します。
  「非金属で酸化力が強いこと」が正しいです。この説明と結び付きが強い見方です。
