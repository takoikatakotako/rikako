# 化学基礎 問747
id: 1787
type: single_choice
text: |
  「ナトリウムで黄色、銅で青緑色を観察する場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "自由電子が結合を支えること"
  - "水素イオンに注目すること"
  - "金属元素ごとに炎の色が異なること"
  - "酸素の喪失や電子の受け取りに注目すること"
correct: 2
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「ナトリウムで黄色、銅で青緑色を観察する場面」では、「金属元素ごとに炎の色が異なること」という見方が大切です。したがって、正解は「金属元素ごとに炎の色が異なること」です。
  
  「自由電子が結合を支えること」は、その見方は金属中で自由電子が動けるため電気を通すことを考える場面よりも金属結合と結び付きが強いです。
  「水素イオンに注目すること」は、その見方は塩酸が水溶液中で水素イオンを生じる場面よりも酸と結び付きが強いです。
  「金属元素ごとに炎の色が異なること」が正しいです。この具体例で大切になる見方です。
  「酸素の喪失や電子の受け取りに注目すること」は、その見方は酸化銅から酸素が取れて銅になる場面よりも還元と結び付きが強いです。
