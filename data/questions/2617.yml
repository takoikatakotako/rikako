# 高校化学 問617
id: 2617
type: single_choice
text: |
  「ダイヤモンドや二酸化ケイ素の硬さを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "水との親和性が低く、少しの電解質で凝析しやすいコロイドである。"
  - "原子が共有結合で三次元的に結び付いた結晶である。"
  - "リチウムイオンの移動を利用する充電式電池である。"
  - "化学平衡の状態を表す、平衡時の濃度や分圧の比である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「ダイヤモンドや二酸化ケイ素の硬さを考える場面」を説明した文として適切なのは「原子が共有結合で三次元的に結び付いた結晶である。」です。したがって、正解は「原子が共有結合で三次元的に結び付いた結晶である。」です。
  
  「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」は、この説明は「金属や硫黄のコロイドが電解質で沈みやすい場面」と結び付きが強いです。
  「原子が共有結合で三次元的に結び付いた結晶である。」が正しいです。この具体例を説明した文です。
  「リチウムイオンの移動を利用する充電式電池である。」は、この説明は「スマートフォンやノートパソコンの電池を考える場面」と結び付きが強いです。
  「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」は、この説明は「平衡がどちらにかたよっているかを数値で見る場面」と結び付きが強いです。
