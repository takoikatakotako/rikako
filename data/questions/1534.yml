# 化学基礎 問494
id: 1534
type: single_choice
text: |
  電解質を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電池の中で電気的なつり合いを保つこと"
  - "水酸化物イオンや水素イオンの受け取りに注目すること"
  - "酸性と塩基性の強さを数で見ること"
  - "水溶液や融解状態で電流を通すこと"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  電解質では、「水溶液や融解状態で電流を通すこと」という見方が大切です。したがって、正解は「水溶液や融解状態で電流を通すこと」です。
  
  「電池の中で電気的なつり合いを保つこと」は、塩橋に関係する見方です。
  「水酸化物イオンや水素イオンの受け取りに注目すること」は、塩基に関係する見方です。
  「酸性と塩基性の強さを数で見ること」は、pHに関係する見方です。
  「水溶液や融解状態で電流を通すこと」が正しいです。電解質の要点を表しています。
