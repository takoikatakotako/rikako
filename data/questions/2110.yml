# 高校化学 問110
id: 2110
type: single_choice
text: |
  理想気体の状態方程式と最も関係が深い場面として、適切なものはどれか。
choices:
  - "金属が電気を通したりのびたりする理由を考える場面"
  - "食塩が水に溶けて見えなくなる場面"
  - "気体の量と温度から体積や圧力を見積もる場面"
  - "食塩を加えても底に残るようになった食塩水を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  気体の量と温度から体積や圧力を見積もる場面は、理想気体の状態方程式と結び付きが強い場面です。したがって、正解は「気体の量と温度から体積や圧力を見積もる場面」です。
  
  「金属が電気を通したりのびたりする理由を考える場面」は、金属結晶と結び付きが強い場面です。
  「食塩が水に溶けて見えなくなる場面」は、溶解と結び付きが強い場面です。
  「気体の量と温度から体積や圧力を見積もる場面」が正しいです。これは理想気体の状態方程式と結び付きが強い場面です。
  「食塩を加えても底に残るようになった食塩水を考える場面」は、飽和溶液と結び付きが強い場面です。
