# 化学基礎 問479
id: 1519
type: single_choice
text: |
  モル濃度を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "1Lあたりの物質量で表すこと"
  - "反応する物質とできる物質の関係を式で示すこと"
  - "電子を受け取って負に帯電すること"
  - "電子を共有して結び付くこと"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  モル濃度では、「1Lあたりの物質量で表すこと」という見方が大切です。したがって、正解は「1Lあたりの物質量で表すこと」です。
  
  「1Lあたりの物質量で表すこと」が正しいです。モル濃度の要点を表しています。
  「反応する物質とできる物質の関係を式で示すこと」は、化学反応式に関係する見方です。
  「電子を受け取って負に帯電すること」は、陰イオンに関係する見方です。
  「電子を共有して結び付くこと」は、共有結合に関係する見方です。
