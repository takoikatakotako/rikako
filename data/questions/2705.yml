# 高校化学 問705
id: 2705
type: single_choice
text: |
  「蒸発と凝縮がつり合うこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "エンタルピー変化"
  - "電気分解"
  - "気液平衡"
  - "アンモニア合成"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「蒸発と凝縮がつり合うこと」という見方が大切なのは気液平衡です。したがって、正解は「気液平衡」です。
  
  「エンタルピー変化」は、その語で大切なのは「一定圧力での熱の出入りに注目すること」という見方です。
  「電気分解」は、その語で大切なのは「電気を使って反応を進めること」という見方です。
  「気液平衡」が正しいです。この見方が大切な語です。
  「アンモニア合成」は、その語で大切なのは「条件を工夫して平衡を生成物側へ寄せること」という見方です。
