# 化学基礎 問373
id: 1413
type: single_choice
text: |
  共有結合と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水素原子どうしが電子を共有して H2 になる場面"
  - "炭素12で陽子数と中性子数の合計を見る場面"
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
  - "6.0×10^23個の粒子をひとまとまりとして数える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  水素原子どうしが電子を共有して H2 になる場面は、共有結合と結び付きが強い場面です。したがって、正解は「水素原子どうしが電子を共有して H2 になる場面」です。
  
  「水素原子どうしが電子を共有して H2 になる場面」が正しいです。これは共有結合と結び付きが強い場面です。
  「炭素12で陽子数と中性子数の合計を見る場面」は、質量数と結び付きが強い場面です。
  「周期表で似た性質の元素が縦に並ぶことを見る場面」は、周期律と結び付きが強い場面です。
  「6.0×10^23個の粒子をひとまとまりとして数える場面」は、モルと結び付きが強い場面です。
