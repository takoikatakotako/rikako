# 化学基礎 問784
id: 1824
type: single_choice
text: |
  「酸性と塩基性の強さを数で見ること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "陽子数は同じで中性子数が異なる原子どうしである。"
  - "金属原子が自由電子を介して結び付く結合である。"
  - "水溶液の酸性や塩基性の強さを表す尺度である。"
  - "水溶液中で水素イオンを生じる物質である。"
correct: 2
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「酸性と塩基性の強さを数で見ること」という見方と最も関係が深い説明は「水溶液の酸性や塩基性の強さを表す尺度である。」です。したがって、正解は「水溶液の酸性や塩基性の強さを表す尺度である。」です。
  
  「陽子数は同じで中性子数が異なる原子どうしである。」は、その説明で大切なのは「陽子数が同じで中性子数が異なること」という見方です。
  「金属原子が自由電子を介して結び付く結合である。」は、その説明で大切なのは「自由電子が結合を支えること」という見方です。
  「水溶液の酸性や塩基性の強さを表す尺度である。」が正しいです。この見方と最も関係が深い説明です。
  「水溶液中で水素イオンを生じる物質である。」は、その説明で大切なのは「水素イオンに注目すること」という見方です。
