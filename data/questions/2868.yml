# 高校化学 問868
id: 2868
type: single_choice
text: |
  「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "陽イオンと陰イオンの引力でできること"
  - "溶質があると凝固点が下がること"
  - "2 価の陽イオンになりやすいこと"
  - "反応経路ではなく始状態と終状態で決まること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「周期表2族に属し、2価の陽イオンになりやすい金属元素の総称である。」を理解する上では、「2 価の陽イオンになりやすいこと」という見方が大切です。したがって、正解は「2 価の陽イオンになりやすいこと」です。
  
  「陽イオンと陰イオンの引力でできること」は、その見方はイオン結晶に関係します。
  「溶質があると凝固点が下がること」は、その見方は凝固点降下に関係します。
  「2 価の陽イオンになりやすいこと」が正しいです。この説明と結び付きが強い見方です。
  「反応経路ではなく始状態と終状態で決まること」は、その見方はヘスの法則に関係します。
