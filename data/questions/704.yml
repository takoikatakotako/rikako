# 化学基礎 問37
id: 704
type: single_choice
text: |
  塩酸と水酸化ナトリウム水溶液がちょうど中和したときに生じるものとして、最も適切なものはどれか。
choices:
  - "塩化ナトリウムと水"
  - "酸素と水素"
  - "銅と水"
  - "鉄と塩素"
correct: 0
explanation: |
  この問題は、「中和で何ができるか」を確認する問題です。
  
  塩酸と水酸化ナトリウムの中和では、塩化ナトリウムと水ができます。中和は、酸と塩基が反応して塩と水を生じる反応です。したがって、正解は「塩化ナトリウムと水」です。
  
  「塩化ナトリウムと水」が正しいです。中和の代表例です。
  「酸素と水素」は、中和の生成物ではありません。
  「銅と水」は、中和の生成物ではありません。
  「鉄と塩素」は、中和の生成物ではありません。
