# 化学基礎 問87
id: 1127
type: single_choice
text: |
  亜鉛板を硫酸銅水溶液に入れると銅が析出することから分かることとして、最も適切なものはどれか。
choices:
  - "亜鉛は銅よりイオンになりやすい。"
  - "銅は亜鉛よりイオンになりやすい。"
  - "亜鉛も銅も全く反応しない。"
  - "銅イオンは必ず気体になる。"
correct: 0
explanation: |
  この問題は、「置換反応からイオン化傾向を読む問題」です。
  
  亜鉛が銅イオンから銅を取り出せるということは、亜鉛の方が銅より電子を失ってイオンになりやすいことを示しています。したがって、正解は「亜鉛は銅よりイオンになりやすい」です。
  
  「亜鉛は銅よりイオンになりやすい」が正しいです。
  「銅は亜鉛よりイオンになりやすい」は、反応の結果と合いません。
  「亜鉛も銅も全く反応しない」は、適切ではありません。
  「銅イオンは必ず気体になる」は、適切ではありません。
