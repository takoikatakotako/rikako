# 化学基礎 問356
id: 1396
type: single_choice
text: |
  混合物と最も関係が深い場面として、適切なものはどれか。
choices:
  - "インクの色素をろ紙の上で分ける場面"
  - "炭素12で陽子数と中性子数の合計を見る場面"
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
  - "空気や食塩水のように複数の物質が混ざったものを考える場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  空気や食塩水のように複数の物質が混ざったものを考える場面は、混合物と結び付きが強い場面です。したがって、正解は「空気や食塩水のように複数の物質が混ざったものを考える場面」です。
  
  「インクの色素をろ紙の上で分ける場面」は、クロマトグラフィーと結び付きが強い場面です。
  「炭素12で陽子数と中性子数の合計を見る場面」は、質量数と結び付きが強い場面です。
  「周期表で似た性質の元素が縦に並ぶことを見る場面」は、周期律と結び付きが強い場面です。
  「空気や食塩水のように複数の物質が混ざったものを考える場面」が正しいです。これは混合物と結び付きが強い場面です。
