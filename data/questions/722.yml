# 高校化学 問12
id: 722
type: single_choice
text: |
  実在気体についての説明として、最も適切なものはどれか。
choices:
  - "液体1 molが気体になるときに吸収する熱量である。"
  - "陽イオンと陰イオンが規則正しく並んでできた結晶である。"
  - "原子が共有結合で三次元的に結び付いた結晶である。"
  - "分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  実在気体は、分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。 したがって、正解は「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」です。
  
  「液体1 molが気体になるときに吸収する熱量である。」は、蒸発熱の説明です。
  「陽イオンと陰イオンが規則正しく並んでできた結晶である。」は、イオン結晶の説明です。
  「原子が共有結合で三次元的に結び付いた結晶である。」は、共有結合の結晶の説明です。
  「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」が正しいです。実在気体の説明です。
