# 高校化学 問919
id: 2919
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "飽和炭化水素 / 染料の原料になる芳香族アミンを考える場面"
  - "アニリン / 再生可能エネルギーや新素材の開発を考える場面"
  - "アモルファス / ガラスのように一定の融点を示しにくい固体を考える場面"
  - "化学が築く未来 / メタンやエタンの性質を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「アモルファス / ガラスのように一定の融点を示しにくい固体を考える場面」です。したがって、正解は「アモルファス / ガラスのように一定の融点を示しにくい固体を考える場面」です。
  
  「飽和炭化水素 / 染料の原料になる芳香族アミンを考える場面」は、用語と場面の対応が合っていません。
  「アニリン / 再生可能エネルギーや新素材の開発を考える場面」は、用語と場面の対応が合っていません。
  「アモルファス / ガラスのように一定の融点を示しにくい固体を考える場面」が正しいです。用語と場面の対応が合っています。
  「化学が築く未来 / メタンやエタンの性質を考える場面」は、用語と場面の対応が合っていません。
