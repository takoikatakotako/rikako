# 高校化学 問431
id: 2431
type: single_choice
text: |
  透析を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "蒸気圧と外圧のつり合いに注目すること"
  - "蒸発と凝縮がつり合うこと"
  - "半透膜を通る粒子の大きさの違いを利用すること"
  - "液体を気体に変えるための熱に注目すること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  透析では、「半透膜を通る粒子の大きさの違いを利用すること」という見方が大切です。したがって、正解は「半透膜を通る粒子の大きさの違いを利用すること」です。
  
  「蒸気圧と外圧のつり合いに注目すること」は、沸点に関係する見方です。
  「蒸発と凝縮がつり合うこと」は、気液平衡に関係する見方です。
  「半透膜を通る粒子の大きさの違いを利用すること」が正しいです。透析の要点を表しています。
  「液体を気体に変えるための熱に注目すること」は、蒸発熱に関係する見方です。
