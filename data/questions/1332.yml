# 化学基礎 問292
id: 1332
type: single_choice
text: |
  電解質の特徴として、最も適切なものはどれか。
choices:
  - "水溶液や融解状態で電気を通す"
  - "水に溶けても電気を通しにくい"
  - "年代測定や医療に利用される"
  - "金属元素の確認に使う"
correct: 0
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  電解質では、「水溶液や融解状態で電気を通す」という点が大切です。したがって、正解は「水溶液や融解状態で電気を通す」です。
  
  「水溶液や融解状態で電気を通す」が正しいです。電解質の特徴を表しています。
  「水に溶けても電気を通しにくい」は、非電解質に関係する特徴です。
  「年代測定や医療に利用される」は、放射性同位体に関係する特徴です。
  「金属元素の確認に使う」は、炎色反応に関係する特徴です。
