# 高校化学 問118
id: 2118
type: single_choice
text: |
  金属結晶と最も関係が深い場面として、適切なものはどれか。
choices:
  - "凍結防止剤をまいた道路の水が凍りにくくなる場面"
  - "牛乳やゼラチン溶液のような見た目の系を考える場面"
  - "金属が電気を通したりのびたりする理由を考える場面"
  - "顕微鏡でコロイド粒子が細かく動く様子を観察する場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  金属が電気を通したりのびたりする理由を考える場面は、金属結晶と結び付きが強い場面です。したがって、正解は「金属が電気を通したりのびたりする理由を考える場面」です。
  
  「凍結防止剤をまいた道路の水が凍りにくくなる場面」は、凝固点降下と結び付きが強い場面です。
  「牛乳やゼラチン溶液のような見た目の系を考える場面」は、コロイドと結び付きが強い場面です。
  「金属が電気を通したりのびたりする理由を考える場面」が正しいです。これは金属結晶と結び付きが強い場面です。
  「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」は、ブラウン運動と結び付きが強い場面です。
