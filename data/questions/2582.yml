# 高校化学 問582
id: 2582
type: single_choice
text: |
  「分子式は同じでも構造が異なる化合物どうしである。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酢酸の性質やにおいを考える場面"
  - "ブタンとイソブタンを比べる場面"
  - "米やいもに多く含まれる成分を考える場面"
  - "水を水蒸気に変えるのに必要な熱を考える場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「分子式は同じでも構造が異なる化合物どうしである。」と最も関係が深い場面は「ブタンとイソブタンを比べる場面」です。したがって、正解は「ブタンとイソブタンを比べる場面」です。
  
  「酢酸の性質やにおいを考える場面」は、「カルボキシ基をもち、酸性を示す有機化合物である。」と結び付きが強い場面です。
  「ブタンとイソブタンを比べる場面」が正しいです。この説明と結び付きが強い場面です。
  「米やいもに多く含まれる成分を考える場面」は、「グルコースが多数つながった植物の貯蔵多糖である。」と結び付きが強い場面です。
  「水を水蒸気に変えるのに必要な熱を考える場面」は、「液体1 molが気体になるときに吸収する熱量である。」と結び付きが強い場面です。
