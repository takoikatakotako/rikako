# 高校化学 問334
id: 2334
type: single_choice
text: |
  「金属や硫黄のコロイドが電解質で沈みやすい場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "疎水コロイド"
  - "チンダル現象"
  - "透析"
  - "親水コロイド"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  金属や硫黄のコロイドが電解質で沈みやすい場面 と最も関係が深いのは疎水コロイドです。したがって、正解は「疎水コロイド」です。
  
  「疎水コロイド」が正しいです。この具体例と最も関係が深い語です。
  「チンダル現象」は、「薄暗い部屋でコロイドに光を当てると筋が見える場面」と結び付きが強い語です。
  「透析」は、「コロイド溶液から余分な電解質を取り除く場面」と結び付きが強い語です。
  「親水コロイド」は、「デンプンやゼラチンが水中で安定しやすい場面」と結び付きが強い語です。
