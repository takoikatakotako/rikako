# 高校化学 問216
id: 2216
type: single_choice
text: |
  「分子どうしが分子間力で集まってできた結晶である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "ブラウン運動"
  - "分子結晶"
  - "電気泳動"
  - "疎水コロイド"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  分子どうしが分子間力で集まってできた結晶である。 に当てはまる語は分子結晶です。したがって、正解は「分子結晶」です。
  
  「ブラウン運動」は、「コロイド粒子が不規則に動いて見える現象である。」に当てはまる語です。
  「分子結晶」が正しいです。「分子どうしが分子間力で集まってできた結晶である。」に当てはまる語です。
  「電気泳動」は、「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」に当てはまる語です。
  「疎水コロイド」は、「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」に当てはまる語です。
