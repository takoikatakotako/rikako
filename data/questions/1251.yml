# 化学基礎 問211
id: 1251
type: single_choice
text: |
  「氷が水になる変化」に最も関係が深い語として、適切なものはどれか。
choices:
  - "融解"
  - "蒸発"
  - "凝固"
  - "昇華"
correct: 0
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「氷が水になる変化」に最も関係が深いのは融解です。したがって、正解は「融解」です。
  
  「融解」が正しいです。この例は融解に関係しています。
  「蒸発」は、この例に最も関係が深い語ではありません。
  「凝固」は、この例に最も関係が深い語ではありません。
  「昇華」は、この例に最も関係が深い語ではありません。
