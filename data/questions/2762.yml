# 高校化学 問762
id: 2762
type: single_choice
text: |
  「塩のイオンが水と反応すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "アミノ酸"
  - "蒸気圧"
  - "イオン結晶"
  - "塩の加水分解"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「塩のイオンが水と反応すること」という見方が大切なのは塩の加水分解です。したがって、正解は「塩の加水分解」です。
  
  「アミノ酸」は、その語で大切なのは「アミノ基とカルボキシ基をあわせもつこと」という見方です。
  「蒸気圧」は、その語で大切なのは「液体から出た蒸気が示す圧力に注目すること」という見方です。
  「イオン結晶」は、その語で大切なのは「陽イオンと陰イオンの引力でできること」という見方です。
  「塩の加水分解」が正しいです。この見方が大切な語です。
