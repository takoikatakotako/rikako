# 化学基礎 問684
id: 1724
type: single_choice
text: |
  「水溶液の酸性や塩基性の強さを表す尺度である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸性と塩基性の強さを数で見ること"
  - "成分が一種類で性質が一定であること"
  - "液体から気体への変化であること"
  - "化学結合やイオンのできやすさに関係すること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「水溶液の酸性や塩基性の強さを表す尺度である。」を理解する上では、「酸性と塩基性の強さを数で見ること」という見方が大切です。したがって、正解は「酸性と塩基性の強さを数で見ること」です。
  
  「酸性と塩基性の強さを数で見ること」が正しいです。この説明と結び付きが強い見方です。
  「成分が一種類で性質が一定であること」は、その見方は純物質に関係します。
  「液体から気体への変化であること」は、その見方は蒸発に関係します。
  「化学結合やイオンのできやすさに関係すること」は、その見方は最外殻電子に関係します。
