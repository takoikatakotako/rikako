# 化学基礎 問868
id: 1908
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "周期律 / 元素を原子番号の順に並べると性質が周期的に変化するというきまりである。"
  - "凝固 / 原子や原子団が電子を失って正の電荷をもつ粒子である。"
  - "陽イオン / 分子の中で電荷のかたよりがほとんどない分子である。"
  - "無極性分子 / 液体が固体に変わる状態変化である。"
correct: 0
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「周期律 / 元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」です。したがって、正解は「周期律 / 元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」です。
  
  「周期律 / 元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」が正しいです。用語と説明の対応が合っています。
  「凝固 / 原子や原子団が電子を失って正の電荷をもつ粒子である。」は、用語と説明の対応が合っていません。
  「陽イオン / 分子の中で電荷のかたよりがほとんどない分子である。」は、用語と説明の対応が合っていません。
  「無極性分子 / 液体が固体に変わる状態変化である。」は、用語と説明の対応が合っていません。
