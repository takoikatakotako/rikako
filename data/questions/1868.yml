# 化学基礎 問828
id: 1868
type: single_choice
text: |
  「粒子の数をまとめて扱う単位であること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "炭素12と炭素14を比べる場面"
  - "6.0×10^23個の粒子をひとまとまりとして数える場面"
  - "金属中で自由電子が動けるため電気を通すことを考える場面"
  - "塩酸が水溶液中で水素イオンを生じる場面"
correct: 1
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「粒子の数をまとめて扱う単位であること」という見方と最も関係が深い場面は「6.0×10^23個の粒子をひとまとまりとして数える場面」です。したがって、正解は「6.0×10^23個の粒子をひとまとまりとして数える場面」です。
  
  「炭素12と炭素14を比べる場面」は、その場面で大切なのは「陽子数が同じで中性子数が異なること」という見方です。
  「6.0×10^23個の粒子をひとまとまりとして数える場面」が正しいです。この見方と最も関係が深い場面です。
  「金属中で自由電子が動けるため電気を通すことを考える場面」は、その場面で大切なのは「自由電子が結合を支えること」という見方です。
  「塩酸が水溶液中で水素イオンを生じる場面」は、その場面で大切なのは「水素イオンに注目すること」という見方です。
