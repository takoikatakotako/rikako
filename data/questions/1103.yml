# 化学基礎 問63
id: 1103
type: single_choice
text: |
  塩化物イオン Cl- ができるときの変化として、最も適切なものはどれか。
choices:
  - "塩素原子が電子を1個受け取る。"
  - "塩素原子が電子を1個失う。"
  - "塩素原子が陽子を2個失う。"
  - "塩素原子が中性子を1個受け取る。"
correct: 0
explanation: |
  この問題は、「陰イオンのつくられ方」を塩素で確認する問題です。
  
  塩素原子は、電子を1個受け取ることで Cl- になります。したがって、正解は「塩素原子が電子を1個受け取る」です。
  
  「塩素原子が電子を1個受け取る」が正しいです。
  「塩素原子が電子を1個失う」は、Cl- になる変化ではありません。
  「塩素原子が陽子を2個失う」は、元素が変わってしまいます。
  「塩素原子が中性子を1個受け取る」は、Cl- の説明ではありません。
