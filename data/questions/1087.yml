# 化学基礎 問47
id: 1087
type: single_choice
text: |
  ダニエル電池で亜鉛と銅を比べたとき、金属のイオンになりやすさが大きいものとして最も適切なものはどれか。
choices:
  - "亜鉛"
  - "銅"
  - "どちらも同じ"
  - "どちらも全くイオンにならない"
correct: 0
explanation: |
  この問題は、「イオン化傾向の大小」をダニエル電池から考える問題です。
  
  ダニエル電池では、亜鉛の方が電子を放出して Zn2+ になりやすいです。つまり、亜鉛の方がイオンになりやすいといえます。したがって、正解は「亜鉛」です。
  
  「亜鉛」が正しいです。銅よりイオンになりやすい金属です。
  「銅」は、亜鉛よりイオンになりにくいです。
  「どちらも同じ」は、適切ではありません。
  「どちらも全くイオンにならない」は、適切ではありません。
