# 化学基礎 問614
id: 1654
type: single_choice
text: |
  「固体から直接気体になること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "モル濃度"
  - "指示薬"
  - "塩橋"
  - "昇華"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「固体から直接気体になること」という見方が大切なのは昇華です。したがって、正解は「昇華」です。
  
  「モル濃度」は、その語で大切なのは「1Lあたりの物質量で表すこと」という見方です。
  「指示薬」は、その語で大切なのは「色の変化で液性を見分けること」という見方です。
  「塩橋」は、その語で大切なのは「電池の中で電気的なつり合いを保つこと」という見方です。
  「昇華」が正しいです。この見方が大切な語です。
