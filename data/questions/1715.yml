# 化学基礎 問675
id: 1715
type: single_choice
text: |
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "放射線を出す同位体であること"
  - "溶解度の差を利用すること"
  - "新しい物質ができること"
  - "物質の性質を示す小さな粒子として考えること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」を理解する上では、「物質の性質を示す小さな粒子として考えること」という見方が大切です。したがって、正解は「物質の性質を示す小さな粒子として考えること」です。
  
  「放射線を出す同位体であること」は、その見方は放射性同位体に関係します。
  「溶解度の差を利用すること」は、その見方は再結晶に関係します。
  「新しい物質ができること」は、その見方は化学変化に関係します。
  「物質の性質を示す小さな粒子として考えること」が正しいです。この説明と結び付きが強い見方です。
