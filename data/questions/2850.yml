# 高校化学 問850
id: 2850
type: single_choice
text: |
  「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電気量と生成物の量の比例に注目すること"
  - "植物の体を支える多糖であること"
  - "温度一定で圧力と体積の関係を見ること"
  - "粒子配列が不規則であること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」を理解する上では、「電気量と生成物の量の比例に注目すること」という見方が大切です。したがって、正解は「電気量と生成物の量の比例に注目すること」です。
  
  「電気量と生成物の量の比例に注目すること」が正しいです。この説明と結び付きが強い見方です。
  「植物の体を支える多糖であること」は、その見方はセルロースに関係します。
  「温度一定で圧力と体積の関係を見ること」は、その見方はボイルの法則に関係します。
  「粒子配列が不規則であること」は、その見方はアモルファスに関係します。
