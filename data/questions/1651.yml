# 化学基礎 問611
id: 1651
type: single_choice
text: |
  「固体から液体への変化であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "融解"
  - "極性分子"
  - "中和"
  - "還元剤"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「固体から液体への変化であること」という見方が大切なのは融解です。したがって、正解は「融解」です。
  
  「融解」が正しいです。この見方が大切な語です。
  「極性分子」は、その語で大切なのは「電荷のかたよりがあること」という見方です。
  「中和」は、その語で大切なのは「酸と塩基が打ち消し合うこと」という見方です。
  「還元剤」は、その語で大切なのは「相手を還元させ、自分は酸化されること」という見方です。
