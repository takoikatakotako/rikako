# 令和6年度 ITパスポート 公開問題 問5
id: 985
type: single_choice
text: |
  ベンチャーキャピタルに関する記述として、適切なものはどれか。
choices:
  - "新しい技術の獲得や、規模の経済性の追求などを目的に、他の企業と共同出資会社を設立する手法"
  - "株式売却による利益獲得などを目的に、新しい製品やサービスを武器に市場へ参入しようとする企業に対して出資などを行う企業"
  - "新サービスや技術革新などの創出を目的に、国や学術機関、他の企業など外部の組織と共創関係を結び、積極的に技術や資源を交換し、自社に取り込む手法"
  - "特定された課題の解決を目的に、一定の期間を設けて企業内に立ち上げられ、構成員を関連部門から招集し、目的が達成された時点で解散する組織"
correct: 1
