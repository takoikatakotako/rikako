# 化学基礎 問936
id: 1976
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "イオン化傾向 / 食品の変色や劣化を防ぐためにビタミンCを使う場面"
  - "酸化防止剤 / 酸素だけが入った容器を考える場面"
  - "純物質 / 亜鉛が銅より先にイオンになりやすいことを見る場面"
  - "指示薬 / BTB溶液やフェノールフタレインで液性を調べる場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「指示薬 / BTB溶液やフェノールフタレインで液性を調べる場面」です。したがって、正解は「指示薬 / BTB溶液やフェノールフタレインで液性を調べる場面」です。
  
  「イオン化傾向 / 食品の変色や劣化を防ぐためにビタミンCを使う場面」は、用語と場面の対応が合っていません。
  「酸化防止剤 / 酸素だけが入った容器を考える場面」は、用語と場面の対応が合っていません。
  「純物質 / 亜鉛が銅より先にイオンになりやすいことを見る場面」は、用語と場面の対応が合っていません。
  「指示薬 / BTB溶液やフェノールフタレインで液性を調べる場面」が正しいです。用語と場面の対応が合っています。
