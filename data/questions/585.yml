# 令和7年度 ITパスポート 公開問題 問95
id: 585
type: single_choice
text: |
  データベース設計におけるデータ分析で行うこととして、適切なものはどれか。
choices:
  - "データウェアハウスから業務ごとに必要な情報を抽出する。"
  - "データ項目の内容が、指定された条件を満足する行だけを抽出する。"
  - "必要なデータ項目を洗い出し、項目間の関連を整理する。"
  - "膨大な情報から統計的手法などを用いて、ビジネスに活用できる情報を探索する。"
correct: 2
explanation: |
  この問題の公開解答では「必要なデータ項目を洗い出し、項目間の関連を整理する」が正解とされています。
  
  「データウェアハウスから業務ごとに必要な情報を抽出する」は公開解答では正解ではありません。
  「データ項目の内容が、指定された条件を満足する行だけを抽出する」は公開解答では正解ではありません。
  「必要なデータ項目を洗い出し、項目間の関連を整理する」が公開解答で正解とされています。
  「膨大な情報から統計的手法などを用いて、ビジネスに活用できる情報を探索する」は公開解答では正解ではありません。
