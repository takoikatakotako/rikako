# 高校化学 問354
id: 2354
type: single_choice
text: |
  「生成物から再び反応物が生じる場面を考えるとき」と最も関係が深い語として、適切なものはどれか。
choices:
  - "可逆反応"
  - "結合エネルギー"
  - "吸熱反応"
  - "光合成"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  生成物から再び反応物が生じる場面を考えるとき と最も関係が深いのは可逆反応です。したがって、正解は「可逆反応」です。
  
  「可逆反応」が正しいです。この具体例と最も関係が深い語です。
  「結合エネルギー」は、「どの結合が切れやすいかを比べる場面」と結び付きが強い語です。
  「吸熱反応」は、「熱分解や一部の溶解で周囲が冷たくなる場面」と結び付きが強い語です。
  「光合成」は、「植物が光を受けてデンプンなどをつくる場面」と結び付きが強い語です。
