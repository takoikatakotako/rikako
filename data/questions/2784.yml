# 高校化学 問784
id: 2784
type: single_choice
text: |
  「分子の端にカルボニル構造をもつこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "イオン結晶"
  - "アルデヒド"
  - "凝固点降下"
  - "ヘスの法則"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「分子の端にカルボニル構造をもつこと」という見方が大切なのはアルデヒドです。したがって、正解は「アルデヒド」です。
  
  「イオン結晶」は、その語で大切なのは「陽イオンと陰イオンの引力でできること」という見方です。
  「アルデヒド」が正しいです。この見方が大切な語です。
  「凝固点降下」は、その語で大切なのは「溶質があると凝固点が下がること」という見方です。
  「ヘスの法則」は、その語で大切なのは「反応経路ではなく始状態と終状態で決まること」という見方です。
