# 高校化学 問499
id: 2499
type: single_choice
text: |
  資源の再利用を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電子対の与え手と受け手に注目すること"
  - "金属元素ごとに炎の色が異なること"
  - "資源を循環させて無駄を減らすこと"
  - "電気伝導性が高く、特徴的な色のイオンをつくること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  資源の再利用では、「資源を循環させて無駄を減らすこと」という見方が大切です。したがって、正解は「資源を循環させて無駄を減らすこと」です。
  
  「電子対の与え手と受け手に注目すること」は、配位結合に関係する見方です。
  「金属元素ごとに炎の色が異なること」は、炎色反応に関係する見方です。
  「資源を循環させて無駄を減らすこと」が正しいです。資源の再利用の要点を表しています。
  「電気伝導性が高く、特徴的な色のイオンをつくること」は、銅に関係する見方です。
