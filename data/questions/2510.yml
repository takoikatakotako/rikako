# 高校化学 問510
id: 2510
type: single_choice
text: |
  「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "気体の法則で温度をセルシウス温度ではなく K で扱う場面"
  - "気体の量と温度から体積や圧力を見積もる場面"
  - "食塩水が純水より蒸発しにくくなることを考える場面"
  - "物質を燃やしたときに熱が出ることを考える場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」と最も関係が深い場面は「気体の量と温度から体積や圧力を見積もる場面」です。したがって、正解は「気体の量と温度から体積や圧力を見積もる場面」です。
  
  「気体の法則で温度をセルシウス温度ではなく K で扱う場面」は、「絶対零度を基準にした温度で、単位は K で表す。」と結び付きが強い場面です。
  「気体の量と温度から体積や圧力を見積もる場面」が正しいです。この説明と結び付きが強い場面です。
  「食塩水が純水より蒸発しにくくなることを考える場面」は、「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」と結び付きが強い場面です。
  「物質を燃やしたときに熱が出ることを考える場面」は、「化学反応に伴って出入りする熱量である。」と結び付きが強い場面です。
