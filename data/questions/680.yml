# 化学基礎 問13
id: 680
type: single_choice
text: |
  水とエタノールの混合物を、沸点の違いを利用して分ける方法として最も適切なものはどれか。
choices:
  - "ろ過"
  - "蒸留"
  - "磁力分離"
  - "昇華"
correct: 1
explanation: |
  この問題は、「液体どうしを沸点の違いで分ける方法」を確認する問題です。
  
  蒸留は、物質ごとの沸点の違いを利用して液体を分ける方法です。水とエタノールのような混合物を分けるときに使います。したがって、正解は「蒸留」です。
  
  「ろ過」は、液体に溶けない固体を分けるときに向いています。
  「蒸留」が正しいです。液体どうしを沸点の違いで分ける方法です。
  「磁力分離」は、磁石に付くかどうかの違いを利用する方法です。
  「昇華」は、固体が直接気体になる性質を利用する方法です。
