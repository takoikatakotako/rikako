# 高校化学 問309
id: 2309
type: single_choice
text: |
  「温めた風船がふくらみやすくなる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "チンダル現象"
  - "透析"
  - "親水コロイド"
  - "シャルルの法則"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  温めた風船がふくらみやすくなる場面 と最も関係が深いのはシャルルの法則です。したがって、正解は「シャルルの法則」です。
  
  「チンダル現象」は、「薄暗い部屋でコロイドに光を当てると筋が見える場面」と結び付きが強い語です。
  「透析」は、「コロイド溶液から余分な電解質を取り除く場面」と結び付きが強い語です。
  「親水コロイド」は、「デンプンやゼラチンが水中で安定しやすい場面」と結び付きが強い語です。
  「シャルルの法則」が正しいです。この具体例と最も関係が深い語です。
