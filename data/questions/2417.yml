# 高校化学 問417
id: 2417
type: single_choice
text: |
  共有結合の結晶を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "共有結合が全体に広がること"
  - "温度一定で圧力と体積の関係を見ること"
  - "圧力、体積、物質量、温度をまとめて扱うこと"
  - "分子の体積と分子間力の影響に注目すること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  共有結合の結晶では、「共有結合が全体に広がること」という見方が大切です。したがって、正解は「共有結合が全体に広がること」です。
  
  「共有結合が全体に広がること」が正しいです。共有結合の結晶の要点を表しています。
  「温度一定で圧力と体積の関係を見ること」は、ボイルの法則に関係する見方です。
  「圧力、体積、物質量、温度をまとめて扱うこと」は、理想気体の状態方程式に関係する見方です。
  「分子の体積と分子間力の影響に注目すること」は、実在気体に関係する見方です。
