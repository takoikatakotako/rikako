# 化学基礎 問326
id: 1366
type: single_choice
text: |
  極性分子について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "金属原子が自由電子を介して結び付く結合である。"
  - "分子の中で電荷のかたよりがほとんどない分子である。"
  - "分子の中で電荷のかたよりがある分子である。"
  - "原子核の中にある陽子数と中性子数の合計である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  極性分子は、分子の中で電荷のかたよりがある分子である。 したがって、正解は「分子の中で電荷のかたよりがある分子である。」です。
  
  「金属原子が自由電子を介して結び付く結合である。」は、金属結合の説明です。
  「分子の中で電荷のかたよりがほとんどない分子である。」は、無極性分子の説明です。
  「分子の中で電荷のかたよりがある分子である。」が正しいです。極性分子の説明です。
  「原子核の中にある陽子数と中性子数の合計である。」は、質量数の説明です。
