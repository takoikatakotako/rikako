# 高校化学 問43
id: 2043
type: single_choice
text: |
  乾電池についての説明として、最も適切なものはどれか。
choices:
  - "鉛とその化合物を用いた、充電して繰り返し使える電池である。"
  - "燃料と酸化剤を外部から供給しながら電気を取り出す電池である。"
  - "一度使い切ることを前提にした一次電池の代表例である。"
  - "電気分解で酸化が起こる電極である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  乾電池は、一度使い切ることを前提にした一次電池の代表例である。 したがって、正解は「一度使い切ることを前提にした一次電池の代表例である。」です。
  
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」は、鉛蓄電池の説明です。
  「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」は、燃料電池の説明です。
  「一度使い切ることを前提にした一次電池の代表例である。」が正しいです。乾電池の説明です。
  「電気分解で酸化が起こる電極である。」は、陽極の説明です。
