# 化学基礎 問554
id: 1594
type: single_choice
text: |
  「インクの色素をろ紙の上で分ける場面」を説明した文として、最も適切なものはどれか。
choices:
  - "成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
  - "液体が固体に変わる状態変化である。"
  - "原子や原子団が電子を失って正の電荷をもつ粒子である。"
  - "分子の中で電荷のかたよりがほとんどない分子である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「インクの色素をろ紙の上で分ける場面」を説明した文として適切なのは「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」です。したがって、正解は「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」です。
  
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」が正しいです。この具体例を説明した文です。
  「液体が固体に変わる状態変化である。」は、この説明は「水を冷やして氷にする場面」と結び付きが強いです。
  「原子や原子団が電子を失って正の電荷をもつ粒子である。」は、この説明は「ナトリウム原子が電子を1個失って Na+ になる場面」と結び付きが強いです。
  「分子の中で電荷のかたよりがほとんどない分子である。」は、この説明は「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」と結び付きが強いです。
