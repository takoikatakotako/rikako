# 化学基礎 問273
id: 1313
type: single_choice
text: |
  共有結合の特徴として、最も適切なものはどれか。
choices:
  - "自由電子を介した結合"
  - "電子を共有してできる結合"
  - "原子が結び付いた一つのまとまり"
  - "分子全体に電荷の偏りがある"
correct: 1
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  共有結合では、「電子を共有してできる結合」という点が大切です。したがって、正解は「電子を共有してできる結合」です。
  
  「自由電子を介した結合」は、金属結合に関係する特徴です。
  「電子を共有してできる結合」が正しいです。共有結合の特徴を表しています。
  「原子が結び付いた一つのまとまり」は、分子に関係する特徴です。
  「分子全体に電荷の偏りがある」は、極性分子に関係する特徴です。
