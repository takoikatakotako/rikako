# 化学基礎 問426
id: 1466
type: single_choice
text: |
  「分子の中で電荷のかたよりがある分子である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "極性分子"
  - "中和"
  - "電離度"
  - "陽イオン"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  分子の中で電荷のかたよりがある分子である。 に当てはまる語は極性分子です。したがって、正解は「極性分子」です。
  
  「極性分子」が正しいです。「分子の中で電荷のかたよりがある分子である。」に当てはまる語です。
  「中和」は、「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」に当てはまる語です。
  「電離度」は、「溶けた物質のうち、電離してイオンになった割合である。」に当てはまる語です。
  「陽イオン」は、「原子や原子団が電子を失って正の電荷をもつ粒子である。」に当てはまる語です。
