# 化学基礎 問685
id: 1725
type: single_choice
text: |
  「溶けた物質のうち、電離してイオンになった割合である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "成分が二種類以上まざっていること"
  - "どのくらいイオンに分かれるかを表すこと"
  - "液体から固体への変化であること"
  - "電子を失って正に帯電すること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「溶けた物質のうち、電離してイオンになった割合である。」を理解する上では、「どのくらいイオンに分かれるかを表すこと」という見方が大切です。したがって、正解は「どのくらいイオンに分かれるかを表すこと」です。
  
  「成分が二種類以上まざっていること」は、その見方は混合物に関係します。
  「どのくらいイオンに分かれるかを表すこと」が正しいです。この説明と結び付きが強い見方です。
  「液体から固体への変化であること」は、その見方は凝固に関係します。
  「電子を失って正に帯電すること」は、その見方は陽イオンに関係します。
