# 高校化学 問353
id: 2353
type: single_choice
text: |
  「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "ヘスの法則"
  - "発熱反応"
  - "化学発光"
  - "触媒"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  二酸化マンガンを加えると過酸化水素水の分解が速くなる場面 と最も関係が深いのは触媒です。したがって、正解は「触媒」です。
  
  「ヘスの法則」は、「複数の反応式を組み合わせて全体の反応熱を求める場面」と結び付きが強い語です。
  「発熱反応」は、「燃焼や中和で容器が温かくなる場面」と結び付きが強い語です。
  「化学発光」は、「ケミカルライトが光る仕組みを考える場面」と結び付きが強い語です。
  「触媒」が正しいです。この具体例と最も関係が深い語です。
