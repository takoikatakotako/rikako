# 化学基礎 問188
id: 1228
type: single_choice
text: |
  還元剤の例として、最も適切なものはどれか。
choices:
  - "亜鉛が銅よりイオンになりやすいこと"
  - "Zn 板と Cu 板を使う電池"
  - "亜鉛"
  - "寒天に硝酸カリウムを含ませた塩橋"
correct: 2
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  亜鉛は、還元剤の例です。したがって、正解は「亜鉛」です。
  
  「亜鉛が銅よりイオンになりやすいこと」は、イオン化傾向の例として見る方が適切です。
  「Zn 板と Cu 板を使う電池」は、ダニエル電池の例として見る方が適切です。
  「亜鉛」が正しいです。これは還元剤の例です。
  「寒天に硝酸カリウムを含ませた塩橋」は、塩橋の例として見る方が適切です。
