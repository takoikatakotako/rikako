# 高校化学 問340
id: 2340
type: single_choice
text: |
  「熱分解や一部の溶解で周囲が冷たくなる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "陽極"
  - "ファラデーの法則"
  - "吸熱反応"
  - "活性化エネルギー"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  熱分解や一部の溶解で周囲が冷たくなる場面 と最も関係が深いのは吸熱反応です。したがって、正解は「吸熱反応」です。
  
  「陽極」は、「電気分解で気体が発生する電極側を考える場面」と結び付きが強い語です。
  「ファラデーの法則」は、「流した電流が大きいほど析出量が増える場面」と結び付きが強い語です。
  「吸熱反応」が正しいです。この具体例と最も関係が深い語です。
  「活性化エネルギー」は、「加熱すると反応が進みやすくなる理由を考える場面」と結び付きが強い語です。
