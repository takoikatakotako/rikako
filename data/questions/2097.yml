# 高校化学 問97
id: 2097
type: single_choice
text: |
  セルロースについての説明として、最も適切なものはどれか。
choices:
  - "グルコースがつながった植物の細胞壁をつくる多糖である。"
  - "溶質の粒子が溶媒中に広がっていく現象である。"
  - "その温度でそれ以上溶質が溶けない状態の溶液である。"
  - "不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  セルロースは、グルコースがつながった植物の細胞壁をつくる多糖である。 したがって、正解は「グルコースがつながった植物の細胞壁をつくる多糖である。」です。
  
  「グルコースがつながった植物の細胞壁をつくる多糖である。」が正しいです。セルロースの説明です。
  「溶質の粒子が溶媒中に広がっていく現象である。」は、溶解の説明です。
  「その温度でそれ以上溶質が溶けない状態の溶液である。」は、飽和溶液の説明です。
  「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」は、蒸気圧降下の説明です。
