# 高校化学 問877
id: 2877
type: single_choice
text: |
  「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "溶質があると溶媒の蒸気圧が下がること"
  - "反応に伴う熱の出入りを見ること"
  - "反応物を補給しながら発電すること"
  - "電気伝導性が高く、特徴的な色のイオンをつくること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」を理解する上では、「電気伝導性が高く、特徴的な色のイオンをつくること」という見方が大切です。したがって、正解は「電気伝導性が高く、特徴的な色のイオンをつくること」です。
  
  「溶質があると溶媒の蒸気圧が下がること」は、その見方は蒸気圧降下に関係します。
  「反応に伴う熱の出入りを見ること」は、その見方は反応熱に関係します。
  「反応物を補給しながら発電すること」は、その見方は燃料電池に関係します。
  「電気伝導性が高く、特徴的な色のイオンをつくること」が正しいです。この説明と結び付きが強い見方です。
