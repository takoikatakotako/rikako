# 化学基礎 問93
id: 1133
type: single_choice
text: |
  電池の説明として、最も適切なものはどれか。
choices:
  - "酸化と還元が同時に起こることで電流を取り出す。"
  - "中和だけでしかはたらかない。"
  - "必ず一種類の金属だけでできている。"
  - "化学変化は全く起こらない。"
correct: 0
explanation: |
  この問題は、「電池の本質」を確認する問題です。
  
  電池では、酸化と還元が同時に進むことで電子の流れが生まれ、電流を取り出せます。したがって、正解は「酸化と還元が同時に起こることで電流を取り出す」です。
  
  「酸化と還元が同時に起こることで電流を取り出す」が正しいです。
  「中和だけでしかはたらかない」は、適切ではありません。
  「必ず一種類の金属だけでできている」は、適切ではありません。
  「化学変化は全く起こらない」は、適切ではありません。
