# 化学基礎 問462
id: 1502
type: single_choice
text: |
  蒸発を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "性質が周期的にくり返されること"
  - "水に溶けない固体を液体から分けること"
  - "溶解度の差を利用すること"
  - "液体から気体への変化であること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  蒸発では、「液体から気体への変化であること」という見方が大切です。したがって、正解は「液体から気体への変化であること」です。
  
  「性質が周期的にくり返されること」は、周期律に関係する見方です。
  「水に溶けない固体を液体から分けること」は、ろ過に関係する見方です。
  「溶解度の差を利用すること」は、再結晶に関係する見方です。
  「液体から気体への変化であること」が正しいです。蒸発の要点を表しています。
