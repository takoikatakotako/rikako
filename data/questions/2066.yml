# 高校化学 問66
id: 2066
type: single_choice
text: |
  塩基解離定数についての説明として、最も適切なものはどれか。
choices:
  - "電気エネルギーを使って自発的でない化学変化を起こす操作である。"
  - "塩基の電離のしやすさを表す定数である。"
  - "電気分解で還元が起こる電極である。"
  - "化学反応に伴って出入りする熱量である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  塩基解離定数は、塩基の電離のしやすさを表す定数である。 したがって、正解は「塩基の電離のしやすさを表す定数である。」です。
  
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」は、電気分解の説明です。
  「塩基の電離のしやすさを表す定数である。」が正しいです。塩基解離定数の説明です。
  「電気分解で還元が起こる電極である。」は、陰極の説明です。
  「化学反応に伴って出入りする熱量である。」は、反応熱の説明です。
