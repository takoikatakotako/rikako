# 化学基礎 問291
id: 1331
type: single_choice
text: |
  塩橋の特徴として、最も適切なものはどれか。
choices:
  - "水溶液や融解状態で電気を通す"
  - "水に溶けても電気を通しにくい"
  - "年代測定や医療に利用される"
  - "水溶液の電気的なつり合いを保つ"
correct: 3
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  塩橋では、「水溶液の電気的なつり合いを保つ」という点が大切です。したがって、正解は「水溶液の電気的なつり合いを保つ」です。
  
  「水溶液や融解状態で電気を通す」は、電解質に関係する特徴です。
  「水に溶けても電気を通しにくい」は、非電解質に関係する特徴です。
  「年代測定や医療に利用される」は、放射性同位体に関係する特徴です。
  「水溶液の電気的なつり合いを保つ」が正しいです。塩橋の特徴を表しています。
