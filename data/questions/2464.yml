# 高校化学 問464
id: 2464
type: single_choice
text: |
  弱塩基を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "時間あたりにどれだけ変化するかを見ること"
  - "反応を速めても自分は使い切られないこと"
  - "反応が止まるのではなく速さがつり合うこと"
  - "電離が部分的に起こること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  弱塩基では、「電離が部分的に起こること」という見方が大切です。したがって、正解は「電離が部分的に起こること」です。
  
  「時間あたりにどれだけ変化するかを見ること」は、反応速度に関係する見方です。
  「反応を速めても自分は使い切られないこと」は、触媒に関係する見方です。
  「反応が止まるのではなく速さがつり合うこと」は、化学平衡に関係する見方です。
  「電離が部分的に起こること」が正しいです。弱塩基の要点を表しています。
