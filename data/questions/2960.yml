# 高校化学 問960
id: 2960
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "アモルファス / 顕微鏡でコロイド粒子が細かく動く様子を観察する場面"
  - "ブラウン運動 / ケミカルライトが光る仕組みを考える場面"
  - "化学発光 / ガラスのように一定の融点を示しにくい固体を考える場面"
  - "水のイオン積 / 中性の水で H+ と OH- の関係を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「水のイオン積 / 中性の水で H+ と OH- の関係を考える場面」です。したがって、正解は「水のイオン積 / 中性の水で H+ と OH- の関係を考える場面」です。
  
  「アモルファス / 顕微鏡でコロイド粒子が細かく動く様子を観察する場面」は、用語と場面の対応が合っていません。
  「ブラウン運動 / ケミカルライトが光る仕組みを考える場面」は、用語と場面の対応が合っていません。
  「化学発光 / ガラスのように一定の融点を示しにくい固体を考える場面」は、用語と場面の対応が合っていません。
  「水のイオン積 / 中性の水で H+ と OH- の関係を考える場面」が正しいです。用語と場面の対応が合っています。
