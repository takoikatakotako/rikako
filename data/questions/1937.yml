# 化学基礎 問897
id: 1937
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "ダニエル電池 / 多数の小さな単位がつながってできた大きな分子からなる化合物である。"
  - "炎色反応 / 金属元素を炎に入れたときに特有の色を示す反応である。"
  - "高分子化合物 / 二種類以上の物質が混ざってできている物質である。"
  - "混合物 / 亜鉛と銅の反応を利用して電気を取り出す電池である。"
correct: 1
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「炎色反応 / 金属元素を炎に入れたときに特有の色を示す反応である。」です。したがって、正解は「炎色反応 / 金属元素を炎に入れたときに特有の色を示す反応である。」です。
  
  「ダニエル電池 / 多数の小さな単位がつながってできた大きな分子からなる化合物である。」は、用語と説明の対応が合っていません。
  「炎色反応 / 金属元素を炎に入れたときに特有の色を示す反応である。」が正しいです。用語と説明の対応が合っています。
  「高分子化合物 / 二種類以上の物質が混ざってできている物質である。」は、用語と説明の対応が合っていません。
  「混合物 / 亜鉛と銅の反応を利用して電気を取り出す電池である。」は、用語と説明の対応が合っていません。
