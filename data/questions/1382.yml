# 化学基礎 問342
id: 1382
type: single_choice
text: |
  ダニエル電池について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "粒子の数をまとめて表すための単位である。"
  - "化学変化を、物質の種類と量の関係が分かるように表した式である。"
  - "亜鉛と銅の反応を利用して電気を取り出す電池である。"
  - "物質が酸素を失う、または電子を受け取る変化である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  ダニエル電池は、亜鉛と銅の反応を利用して電気を取り出す電池である。 したがって、正解は「亜鉛と銅の反応を利用して電気を取り出す電池である。」です。
  
  「粒子の数をまとめて表すための単位である。」は、モルの説明です。
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」は、化学反応式の説明です。
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」が正しいです。ダニエル電池の説明です。
  「物質が酸素を失う、または電子を受け取る変化である。」は、還元の説明です。
