# 化学基礎 問350
id: 1390
type: single_choice
text: |
  化学が拓く世界について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "もとの物質とは別の物質ができる変化である。"
  - "水に溶けても電流をほとんど通さない物質である。"
  - "化学の知識が生活、産業、環境、医療などに役立つという見方である。"
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  化学が拓く世界は、化学の知識が生活、産業、環境、医療などに役立つという見方である。 したがって、正解は「化学の知識が生活、産業、環境、医療などに役立つという見方である。」です。
  
  「もとの物質とは別の物質ができる変化である。」は、化学変化の説明です。
  「水に溶けても電流をほとんど通さない物質である。」は、非電解質の説明です。
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」が正しいです。化学が拓く世界の説明です。
  「金属元素を炎に入れたときに特有の色を示す反応である。」は、炎色反応の説明です。
