# 化学基礎 問586
id: 1626
type: single_choice
text: |
  「BTB溶液やフェノールフタレインで液性を調べる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。"
  - "水に溶けても電流をほとんど通さない物質である。"
  - "沸点の違いを利用して液体を分ける方法である。"
  - "物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「BTB溶液やフェノールフタレインで液性を調べる場面」を説明した文として適切なのは「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」です。したがって、正解は「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」です。
  
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」が正しいです。この具体例を説明した文です。
  「水に溶けても電流をほとんど通さない物質である。」は、この説明は「砂糖水が電流をほとんど通さない場面」と結び付きが強いです。
  「沸点の違いを利用して液体を分ける方法である。」は、この説明は「水とエタノールの混合物を沸点の差で分ける場面」と結び付きが強いです。
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」は、この説明は「氷が溶けて水になる場面」と結び付きが強いです。
