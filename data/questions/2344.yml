# 高校化学 問344
id: 2344
type: single_choice
text: |
  「自動車のバッテリーを考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "平衡定数"
  - "アンモニア合成"
  - "鉛蓄電池"
  - "水のイオン積"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  自動車のバッテリーを考える場面 と最も関係が深いのは鉛蓄電池です。したがって、正解は「鉛蓄電池」です。
  
  「平衡定数」は、「平衡がどちらにかたよっているかを数値で見る場面」と結び付きが強い語です。
  「アンモニア合成」は、「高圧や触媒を利用してアンモニアを得る場面」と結び付きが強い語です。
  「鉛蓄電池」が正しいです。この具体例と最も関係が深い語です。
  「水のイオン積」は、「中性の水で H+ と OH- の関係を考える場面」と結び付きが強い語です。
