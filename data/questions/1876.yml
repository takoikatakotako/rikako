# 化学基礎 問836
id: 1876
type: single_choice
text: |
  「色の変化で液性を見分けること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水分子や酸素分子を粒として考える場面"
  - "BTB溶液やフェノールフタレインで液性を調べる場面"
  - "水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
  - "酸素や過酸化水素が相手を酸化させる場面"
correct: 1
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「色の変化で液性を見分けること」という見方と最も関係が深い場面は「BTB溶液やフェノールフタレインで液性を調べる場面」です。したがって、正解は「BTB溶液やフェノールフタレインで液性を調べる場面」です。
  
  「水分子や酸素分子を粒として考える場面」は、その場面で大切なのは「物質の性質を示す小さな粒子として考えること」という見方です。
  「BTB溶液やフェノールフタレインで液性を調べる場面」が正しいです。この見方と最も関係が深い場面です。
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」は、その場面で大切なのは「水酸化物イオンや水素イオンの受け取りに注目すること」という見方です。
  「酸素や過酸化水素が相手を酸化させる場面」は、その場面で大切なのは「相手を酸化させ、自分は還元されること」という見方です。
