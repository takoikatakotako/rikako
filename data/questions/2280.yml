# 高校化学 問280
id: 2280
type: single_choice
text: |
  「多重結合に原子や原子団が加わる反応である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "遷移元素"
  - "付加反応"
  - "鉄"
  - "機能性材料"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  多重結合に原子や原子団が加わる反応である。 に当てはまる語は付加反応です。したがって、正解は「付加反応」です。
  
  「遷移元素」は、「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」に当てはまる語です。
  「付加反応」が正しいです。「多重結合に原子や原子団が加わる反応である。」に当てはまる語です。
  「鉄」は、「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」に当てはまる語です。
  「機能性材料」は、「目的に応じた特別な性質をもたせてつくられた材料である。」に当てはまる語です。
