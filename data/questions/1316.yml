# 化学基礎 問276
id: 1316
type: single_choice
text: |
  極性分子の特徴として、最も適切なものはどれか。
choices:
  - "分子全体に電荷の偏りがある"
  - "分子全体の電荷の偏りが打ち消し合う"
  - "粒子数をそろえる単位"
  - "1 L あたりの溶質の物質量"
correct: 0
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  極性分子では、「分子全体に電荷の偏りがある」という点が大切です。したがって、正解は「分子全体に電荷の偏りがある」です。
  
  「分子全体に電荷の偏りがある」が正しいです。極性分子の特徴を表しています。
  「分子全体の電荷の偏りが打ち消し合う」は、無極性分子に関係する特徴です。
  「粒子数をそろえる単位」は、モルに関係する特徴です。
  「1 L あたりの溶質の物質量」は、モル濃度に関係する特徴です。
