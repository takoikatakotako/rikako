# 高校化学 問490
id: 2490
type: single_choice
text: |
  ナイロンを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "炭素間が単結合だけであること"
  - "丈夫な合成繊維であること"
  - "二重結合や三重結合に何かが加わること"
  - "同じ分子式でも構造が違うこと"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  ナイロンでは、「丈夫な合成繊維であること」という見方が大切です。したがって、正解は「丈夫な合成繊維であること」です。
  
  「炭素間が単結合だけであること」は、飽和炭化水素に関係する見方です。
  「丈夫な合成繊維であること」が正しいです。ナイロンの要点を表しています。
  「二重結合や三重結合に何かが加わること」は、付加反応に関係する見方です。
  「同じ分子式でも構造が違うこと」は、異性体に関係する見方です。
