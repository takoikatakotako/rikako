# 化学基礎 問483
id: 1523
type: single_choice
text: |
  中和を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸と塩基が打ち消し合うこと"
  - "相手を酸化させ、自分は還元されること"
  - "金属のイオンになりやすさを比べること"
  - "電池の中で電気的なつり合いを保つこと"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  中和では、「酸と塩基が打ち消し合うこと」という見方が大切です。したがって、正解は「酸と塩基が打ち消し合うこと」です。
  
  「酸と塩基が打ち消し合うこと」が正しいです。中和の要点を表しています。
  「相手を酸化させ、自分は還元されること」は、酸化剤に関係する見方です。
  「金属のイオンになりやすさを比べること」は、イオン化傾向に関係する見方です。
  「電池の中で電気的なつり合いを保つこと」は、塩橋に関係する見方です。
