# 化学基礎 問250
id: 1290
type: single_choice
text: |
  「水道水の殺菌や洗浄の技術」に最も関係が深い語として、適切なものはどれか。
choices:
  - "ろ過"
  - "蒸留"
  - "再結晶"
  - "化学が拓く世界"
correct: 3
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「水道水の殺菌や洗浄の技術」に最も関係が深いのは化学が拓く世界です。したがって、正解は「化学が拓く世界」です。
  
  「ろ過」は、この例に最も関係が深い語ではありません。
  「蒸留」は、この例に最も関係が深い語ではありません。
  「再結晶」は、この例に最も関係が深い語ではありません。
  「化学が拓く世界」が正しいです。この例は化学が拓く世界に関係しています。
