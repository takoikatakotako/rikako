# 化学基礎 問433
id: 1473
type: single_choice
text: |
  「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "塩基"
  - "電離度"
  - "酸化"
  - "中和"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。 に当てはまる語は中和です。したがって、正解は「中和」です。
  
  「塩基」は、「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」に当てはまる語です。
  「電離度」は、「溶けた物質のうち、電離してイオンになった割合である。」に当てはまる語です。
  「酸化」は、「物質が酸素と結び付く、または電子を失う変化である。」に当てはまる語です。
  「中和」が正しいです。「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」に当てはまる語です。
