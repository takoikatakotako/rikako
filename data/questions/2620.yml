# 高校化学 問620
id: 2620
type: single_choice
text: |
  「食塩が水に溶けて見えなくなる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "溶質の粒子が溶媒中に広がっていく現象である。"
  - "反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。"
  - "電気分解で酸化が起こる電極である。"
  - "電離する粒子と電離していない粒子が平衡になっている状態である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「食塩が水に溶けて見えなくなる場面」を説明した文として適切なのは「溶質の粒子が溶媒中に広がっていく現象である。」です。したがって、正解は「溶質の粒子が溶媒中に広がっていく現象である。」です。
  
  「溶質の粒子が溶媒中に広がっていく現象である。」が正しいです。この具体例を説明した文です。
  「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」は、この説明は「複数の反応式を組み合わせて全体の反応熱を求める場面」と結び付きが強いです。
  「電気分解で酸化が起こる電極である。」は、この説明は「電気分解で気体が発生する電極側を考える場面」と結び付きが強いです。
  「電離する粒子と電離していない粒子が平衡になっている状態である。」は、この説明は「弱酸が一部だけ電離している水溶液を考える場面」と結び付きが強いです。
