# 高校化学 問551
id: 2551
type: single_choice
text: |
  「単位時間あたりに進む反応の程度を表す量である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "生成物から再び反応物が生じる場面を考えるとき"
  - "どの酸がより電離しやすいかを比べる場面"
  - "同じ反応でも条件によって進み方が変わることを比べる場面"
  - "さびや鉄鋼の利用を考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「単位時間あたりに進む反応の程度を表す量である。」と最も関係が深い場面は「同じ反応でも条件によって進み方が変わることを比べる場面」です。したがって、正解は「同じ反応でも条件によって進み方が変わることを比べる場面」です。
  
  「生成物から再び反応物が生じる場面を考えるとき」は、「正反応と逆反応の両方が起こり得る反応である。」と結び付きが強い場面です。
  「どの酸がより電離しやすいかを比べる場面」は、「酸の電離のしやすさを表す定数である。」と結び付きが強い場面です。
  「同じ反応でも条件によって進み方が変わることを比べる場面」が正しいです。この説明と結び付きが強い場面です。
  「さびや鉄鋼の利用を考える場面」は、「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」と結び付きが強い場面です。
