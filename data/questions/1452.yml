# 化学基礎 問412
id: 1452
type: single_choice
text: |
  「液体が気体になる状態変化である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "化合物"
  - "化学変化"
  - "蒸発"
  - "質量数"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  液体が気体になる状態変化である。 に当てはまる語は蒸発です。したがって、正解は「蒸発」です。
  
  「化合物」は、「二種類以上の元素が結び付いてできている純物質である。」に当てはまる語です。
  「化学変化」は、「もとの物質とは別の物質ができる変化である。」に当てはまる語です。
  「蒸発」が正しいです。「液体が気体になる状態変化である。」に当てはまる語です。
  「質量数」は、「原子核の中にある陽子数と中性子数の合計である。」に当てはまる語です。
