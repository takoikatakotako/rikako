# 化学基礎 問577
id: 1617
type: single_choice
text: |
  「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」を説明した文として、最も適切なものはどれか。
choices:
  - "溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。"
  - "二つの溶液の電気的なつり合いを保つための部分である。"
  - "化学の知識が生活、産業、環境、医療などに役立つという見方である。"
  - "分子の中で電荷のかたよりがほとんどない分子である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」を説明した文として適切なのは「分子の中で電荷のかたよりがほとんどない分子である。」です。したがって、正解は「分子の中で電荷のかたよりがほとんどない分子である。」です。
  
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」は、この説明は「BTB溶液やフェノールフタレインで液性を調べる場面」と結び付きが強いです。
  「二つの溶液の電気的なつり合いを保つための部分である。」は、この説明は「ダニエル電池で二つの水溶液をつなぐ場面」と結び付きが強いです。
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」は、この説明は「電池、医薬品、素材開発などに化学が生かされる場面」と結び付きが強いです。
  「分子の中で電荷のかたよりがほとんどない分子である。」が正しいです。この具体例を説明した文です。
