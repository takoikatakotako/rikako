# 化学基礎 問710
id: 1750
type: single_choice
text: |
  「鉄がさびて別の物質になる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "酸素との結び付きや電子の放出に注目すること"
  - "新しい物質ができること"
  - "水溶液や融解状態で電流を通すこと"
  - "水に溶けない固体を液体から分けること"
correct: 1
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「鉄がさびて別の物質になる場面」では、「新しい物質ができること」という見方が大切です。したがって、正解は「新しい物質ができること」です。
  
  「酸素との結び付きや電子の放出に注目すること」は、その見方はマグネシウムが酸素と結び付く場面よりも酸化と結び付きが強いです。
  「新しい物質ができること」が正しいです。この具体例で大切になる見方です。
  「水溶液や融解状態で電流を通すこと」は、その見方は食塩水や塩酸が電流を通す場面よりも電解質と結び付きが強いです。
  「水に溶けない固体を液体から分けること」は、その見方は砂と水の混合物から砂を取り除く場面よりもろ過と結び付きが強いです。
