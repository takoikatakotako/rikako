# 高校化学 問936
id: 2936
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "グルコース / 氷を水に変えるのに必要な熱を考える場面"
  - "融解熱 / ダイヤモンドや二酸化ケイ素の硬さを考える場面"
  - "共有結合の結晶 / 血糖や発酵の材料として使われる場面"
  - "エンタルピー変化 / 反応前後で熱の出入りを比較する場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「エンタルピー変化 / 反応前後で熱の出入りを比較する場面」です。したがって、正解は「エンタルピー変化 / 反応前後で熱の出入りを比較する場面」です。
  
  「グルコース / 氷を水に変えるのに必要な熱を考える場面」は、用語と場面の対応が合っていません。
  「融解熱 / ダイヤモンドや二酸化ケイ素の硬さを考える場面」は、用語と場面の対応が合っていません。
  「共有結合の結晶 / 血糖や発酵の材料として使われる場面」は、用語と場面の対応が合っていません。
  「エンタルピー変化 / 反応前後で熱の出入りを比較する場面」が正しいです。用語と場面の対応が合っています。
