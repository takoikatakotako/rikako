# 高校化学 問24
id: 734
type: single_choice
text: |
  蒸気圧降下についての説明として、最も適切なものはどれか。
choices:
  - "気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。"
  - "分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。"
  - "単位時間あたりに進む反応の程度を表す量である。"
  - "不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  蒸気圧降下は、不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。 したがって、正解は「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」です。
  
  「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」は、理想気体の状態方程式の説明です。
  「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」は、実在気体の説明です。
  「単位時間あたりに進む反応の程度を表す量である。」は、反応速度の説明です。
  「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」が正しいです。蒸気圧降下の説明です。
