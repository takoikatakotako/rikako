# 化学基礎 問636
id: 1676
type: single_choice
text: |
  「色の変化で液性を見分けること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "ろ過"
  - "指示薬"
  - "化合物"
  - "原子番号"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「色の変化で液性を見分けること」という見方が大切なのは指示薬です。したがって、正解は「指示薬」です。
  
  「ろ過」は、その語で大切なのは「水に溶けない固体を液体から分けること」という見方です。
  「指示薬」が正しいです。この見方が大切な語です。
  「化合物」は、その語で大切なのは「複数の元素が結び付いてできること」という見方です。
  「原子番号」は、その語で大切なのは「陽子数を表す数であること」という見方です。
