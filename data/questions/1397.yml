# 化学基礎 問357
id: 1397
type: single_choice
text: |
  単体と最も関係が深い場面として、適切なものはどれか。
choices:
  - "鉄や酸素のように一種類の元素だけからできた物質を考える場面"
  - "ナトリウムの陽子数から元素を区別する場面"
  - "炭素12と炭素14を比べる場面"
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  鉄や酸素のように一種類の元素だけからできた物質を考える場面は、単体と結び付きが強い場面です。したがって、正解は「鉄や酸素のように一種類の元素だけからできた物質を考える場面」です。
  
  「鉄や酸素のように一種類の元素だけからできた物質を考える場面」が正しいです。これは単体と結び付きが強い場面です。
  「ナトリウムの陽子数から元素を区別する場面」は、原子番号と結び付きが強い場面です。
  「炭素12と炭素14を比べる場面」は、同位体と結び付きが強い場面です。
  「ナトリウムが電子を1個失いやすい理由を考える場面」は、最外殻電子と結び付きが強い場面です。
