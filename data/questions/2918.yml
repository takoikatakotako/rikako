# 高校化学 問918
id: 2918
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "銅 / フェノール類の酸性や消毒作用を考える場面"
  - "金属結晶 / 金属が電気を通したりのびたりする理由を考える場面"
  - "フェノール / 金属やプラスチックを回収して再資源化する場面"
  - "資源の再利用 / 電線や青色の銅イオン水溶液を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「金属結晶 / 金属が電気を通したりのびたりする理由を考える場面」です。したがって、正解は「金属結晶 / 金属が電気を通したりのびたりする理由を考える場面」です。
  
  「銅 / フェノール類の酸性や消毒作用を考える場面」は、用語と場面の対応が合っていません。
  「金属結晶 / 金属が電気を通したりのびたりする理由を考える場面」が正しいです。用語と場面の対応が合っています。
  「フェノール / 金属やプラスチックを回収して再資源化する場面」は、用語と場面の対応が合っていません。
  「資源の再利用 / 電線や青色の銅イオン水溶液を考える場面」は、用語と場面の対応が合っていません。
