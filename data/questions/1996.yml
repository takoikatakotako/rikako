# 化学基礎 問956
id: 1996
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "同位体 / 自由電子が結合を支えること"
  - "金属結合 / 水素イオンに注目すること"
  - "混合物 / 成分が二種類以上まざっていること"
  - "酸 / 陽子数が同じで中性子数が異なること"
correct: 2
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「混合物 / 成分が二種類以上まざっていること」です。したがって、正解は「混合物 / 成分が二種類以上まざっていること」です。
  
  「同位体 / 自由電子が結合を支えること」は、用語と要点の対応が合っていません。
  「金属結合 / 水素イオンに注目すること」は、用語と要点の対応が合っていません。
  「混合物 / 成分が二種類以上まざっていること」が正しいです。用語と要点の対応が合っています。
  「酸 / 陽子数が同じで中性子数が異なること」は、用語と要点の対応が合っていません。
