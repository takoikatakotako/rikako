# 高校化学 問546
id: 2546
type: single_choice
text: |
  「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "金属イオンが電子を受け取って析出する電極を考える場面"
  - "水素を使って発電し、水を生じる仕組みを考える場面"
  - "中性の水で H+ と OH- の関係を考える場面"
  - "酸化アルミニウムが酸にも塩基にも溶ける場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」と最も関係が深い場面は「水素を使って発電し、水を生じる仕組みを考える場面」です。したがって、正解は「水素を使って発電し、水を生じる仕組みを考える場面」です。
  
  「金属イオンが電子を受け取って析出する電極を考える場面」は、「電気分解で還元が起こる電極である。」と結び付きが強い場面です。
  「水素を使って発電し、水を生じる仕組みを考える場面」が正しいです。この説明と結び付きが強い場面です。
  「中性の水で H+ と OH- の関係を考える場面」は、「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」と結び付きが強い場面です。
  「酸化アルミニウムが酸にも塩基にも溶ける場面」は、「酸とも塩基とも反応する酸化物である。」と結び付きが強い場面です。
