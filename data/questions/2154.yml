# 高校化学 問154
id: 2154
type: single_choice
text: |
  可逆反応と最も関係が深い場面として、適切なものはどれか。
choices:
  - "どの塩基がより電離しやすいかを比べる場面"
  - "自動車のバッテリーを考える場面"
  - "生成物から再び反応物が生じる場面を考えるとき"
  - "水素を使って発電し、水を生じる仕組みを考える場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  生成物から再び反応物が生じる場面を考えるときは、可逆反応と結び付きが強い場面です。したがって、正解は「生成物から再び反応物が生じる場面を考えるとき」です。
  
  「どの塩基がより電離しやすいかを比べる場面」は、塩基解離定数と結び付きが強い場面です。
  「自動車のバッテリーを考える場面」は、鉛蓄電池と結び付きが強い場面です。
  「生成物から再び反応物が生じる場面を考えるとき」が正しいです。これは可逆反応と結び付きが強い場面です。
  「水素を使って発電し、水を生じる仕組みを考える場面」は、燃料電池と結び付きが強い場面です。
