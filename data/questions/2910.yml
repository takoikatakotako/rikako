# 高校化学 問910
id: 2910
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "ハロゲン / エチレンに臭素が付加する場面"
  - "理想気体の状態方程式 / 気体の量と温度から体積や圧力を見積もる場面"
  - "付加反応 / 飲料ボトルや衣料用繊維を考える場面"
  - "PET / フッ素や塩素、臭素の反応性を比べる場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「理想気体の状態方程式 / 気体の量と温度から体積や圧力を見積もる場面」です。したがって、正解は「理想気体の状態方程式 / 気体の量と温度から体積や圧力を見積もる場面」です。
  
  「ハロゲン / エチレンに臭素が付加する場面」は、用語と場面の対応が合っていません。
  「理想気体の状態方程式 / 気体の量と温度から体積や圧力を見積もる場面」が正しいです。用語と場面の対応が合っています。
  「付加反応 / 飲料ボトルや衣料用繊維を考える場面」は、用語と場面の対応が合っていません。
  「PET / フッ素や塩素、臭素の反応性を比べる場面」は、用語と場面の対応が合っていません。
