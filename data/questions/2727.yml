# 高校化学 問727
id: 2727
type: single_choice
text: |
  「半透膜を通る溶媒の移動に注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "浸透圧"
  - "アンモニア合成"
  - "ハロゲン"
  - "付加反応"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「半透膜を通る溶媒の移動に注目すること」という見方が大切なのは浸透圧です。したがって、正解は「浸透圧」です。
  
  「浸透圧」が正しいです。この見方が大切な語です。
  「アンモニア合成」は、その語で大切なのは「条件を工夫して平衡を生成物側へ寄せること」という見方です。
  「ハロゲン」は、その語で大切なのは「非金属で酸化力が強いこと」という見方です。
  「付加反応」は、その語で大切なのは「二重結合や三重結合に何かが加わること」という見方です。
