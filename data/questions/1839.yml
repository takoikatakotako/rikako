# 化学基礎 問799
id: 1839
type: single_choice
text: |
  「小さな単位が多数つながっていること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。"
  - "多数の小さな単位がつながってできた大きな分子からなる化合物である。"
  - "相手を酸化させ、自身は還元される物質である。"
  - "放射線を出しながら別の原子へ変わっていく同位体である。"
correct: 1
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「小さな単位が多数つながっていること」という見方と最も関係が深い説明は「多数の小さな単位がつながってできた大きな分子からなる化合物である。」です。したがって、正解は「多数の小さな単位がつながってできた大きな分子からなる化合物である。」です。
  
  「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」は、その説明で大切なのは「水酸化物イオンや水素イオンの受け取りに注目すること」という見方です。
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」が正しいです。この見方と最も関係が深い説明です。
  「相手を酸化させ、自身は還元される物質である。」は、その説明で大切なのは「相手を酸化させ、自分は還元されること」という見方です。
  「放射線を出しながら別の原子へ変わっていく同位体である。」は、その説明で大切なのは「放射線を出す同位体であること」という見方です。
