# 高校化学 問804
id: 2804
type: single_choice
text: |
  「気液平衡にあるとき、気体が示す圧力である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "時間あたりにどれだけ変化するかを見ること"
  - "塩のイオンが水と反応すること"
  - "液体から出た蒸気が示す圧力に注目すること"
  - "電子対の与え手と受け手に注目すること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「気液平衡にあるとき、気体が示す圧力である。」を理解する上では、「液体から出た蒸気が示す圧力に注目すること」という見方が大切です。したがって、正解は「液体から出た蒸気が示す圧力に注目すること」です。
  
  「時間あたりにどれだけ変化するかを見ること」は、その見方は反応速度に関係します。
  「塩のイオンが水と反応すること」は、その見方は塩の加水分解に関係します。
  「液体から出た蒸気が示す圧力に注目すること」が正しいです。この説明と結び付きが強い見方です。
  「電子対の与え手と受け手に注目すること」は、その見方は配位結合に関係します。
