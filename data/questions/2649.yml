# 高校化学 問649
id: 2649
type: single_choice
text: |
  「金属イオンが電子を受け取って析出する電極を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "塩基の電離のしやすさを表す定数である。"
  - "電気分解で還元が起こる電極である。"
  - "遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。"
  - "ベンゼン環にヒドロキシ基が直接結び付いた化合物である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「金属イオンが電子を受け取って析出する電極を考える場面」を説明した文として適切なのは「電気分解で還元が起こる電極である。」です。したがって、正解は「電気分解で還元が起こる電極である。」です。
  
  「塩基の電離のしやすさを表す定数である。」は、この説明は「どの塩基がより電離しやすいかを比べる場面」と結び付きが強いです。
  「電気分解で還元が起こる電極である。」が正しいです。この具体例を説明した文です。
  「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」は、この説明は「電線や青色の銅イオン水溶液を考える場面」と結び付きが強いです。
  「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」は、この説明は「フェノール類の酸性や消毒作用を考える場面」と結び付きが強いです。
