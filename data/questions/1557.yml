# 化学基礎 問517
id: 1557
type: single_choice
text: |
  「陽子数は同じで中性子数が異なる原子どうしである。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "炭素12と炭素14を比べる場面"
  - "ナトリウム原子が電子を1個失って Na+ になる場面"
  - "酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面"
  - "レモン水とせっけん水の酸性・塩基性を比べる場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「陽子数は同じで中性子数が異なる原子どうしである。」と最も関係が深い場面は「炭素12と炭素14を比べる場面」です。したがって、正解は「炭素12と炭素14を比べる場面」です。
  
  「炭素12と炭素14を比べる場面」が正しいです。この説明と結び付きが強い場面です。
  「ナトリウム原子が電子を1個失って Na+ になる場面」は、「原子や原子団が電子を失って正の電荷をもつ粒子である。」と結び付きが強い場面です。
  「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」は、「分子の中で電荷のかたよりがほとんどない分子である。」と結び付きが強い場面です。
  「レモン水とせっけん水の酸性・塩基性を比べる場面」は、「水溶液の酸性や塩基性の強さを表す尺度である。」と結び付きが強い場面です。
