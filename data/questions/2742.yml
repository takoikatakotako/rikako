# 高校化学 問742
id: 2742
type: single_choice
text: |
  「光エネルギーを化学エネルギーに変えること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "配位結合"
  - "アルデヒド"
  - "グルコース"
  - "光合成"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「光エネルギーを化学エネルギーに変えること」という見方が大切なのは光合成です。したがって、正解は「光合成」です。
  
  「配位結合」は、その語で大切なのは「電子対の与え手と受け手に注目すること」という見方です。
  「アルデヒド」は、その語で大切なのは「分子の端にカルボニル構造をもつこと」という見方です。
  「グルコース」は、その語で大切なのは「単糖類でエネルギー源になりやすいこと」という見方です。
  「光合成」が正しいです。この見方が大切な語です。
