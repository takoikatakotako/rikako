# 化学基礎 問849
id: 1889
type: single_choice
text: |
  「小さな単位が多数つながっていること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸化銅から酸素が取れて銅になる場面"
  - "砂糖水が電流をほとんど通さない場面"
  - "ポリエチレンやタンパク質のような長い分子を考える場面"
  - "水とエタノールの混合物を沸点の差で分ける場面"
correct: 2
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「小さな単位が多数つながっていること」という見方と最も関係が深い場面は「ポリエチレンやタンパク質のような長い分子を考える場面」です。したがって、正解は「ポリエチレンやタンパク質のような長い分子を考える場面」です。
  
  「酸化銅から酸素が取れて銅になる場面」は、その場面で大切なのは「酸素の喪失や電子の受け取りに注目すること」という見方です。
  「砂糖水が電流をほとんど通さない場面」は、その場面で大切なのは「水溶液でも電流をほとんど通さないこと」という見方です。
  「ポリエチレンやタンパク質のような長い分子を考える場面」が正しいです。この見方と最も関係が深い場面です。
  「水とエタノールの混合物を沸点の差で分ける場面」は、その場面で大切なのは「沸点の違いを利用すること」という見方です。
