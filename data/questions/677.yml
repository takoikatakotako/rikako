# 化学基礎 問10
id: 677
type: single_choice
text: |
  ダニエル電池で亜鉛板 Zn と銅板 Cu を用いたとき、電子を放出する金属として最も適切なものはどれか。
choices:
  - "亜鉛"
  - "銅"
  - "亜鉛と銅の両方"
  - "どちらも電子を放出しない"
correct: 0
explanation: |
  この問題は、「ダニエル電池で、どちらが酸化されるか」を考える問題です。
  
  ダニエル電池では、亜鉛の方が電子を放出してイオンになりやすいです。つまり、亜鉛が酸化され、そのときに出た電子が外部回路を流れます。したがって、正解は「亜鉛」です。
  
  「亜鉛」が正しいです。ダニエル電池では、亜鉛が電子を放出します。
  「銅」は、電子を受け取る側なので適切ではありません。
  「亜鉛と銅の両方」は、適切ではありません。
  「どちらも電子を放出しない」は、電池の働きと合っていません。
