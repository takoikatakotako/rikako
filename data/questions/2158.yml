# 高校化学 問158
id: 2158
type: single_choice
text: |
  アンモニア合成と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水素を使って発電し、水を生じる仕組みを考える場面"
  - "電気分解で気体が発生する電極側を考える場面"
  - "高圧や触媒を利用してアンモニアを得る場面"
  - "流した電流が大きいほど析出量が増える場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  高圧や触媒を利用してアンモニアを得る場面は、アンモニア合成と結び付きが強い場面です。したがって、正解は「高圧や触媒を利用してアンモニアを得る場面」です。
  
  「水素を使って発電し、水を生じる仕組みを考える場面」は、燃料電池と結び付きが強い場面です。
  「電気分解で気体が発生する電極側を考える場面」は、陽極と結び付きが強い場面です。
  「高圧や触媒を利用してアンモニアを得る場面」が正しいです。これはアンモニア合成と結び付きが強い場面です。
  「流した電流が大きいほど析出量が増える場面」は、ファラデーの法則と結び付きが強い場面です。
