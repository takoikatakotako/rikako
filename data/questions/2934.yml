# 高校化学 問934
id: 2934
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "アミノ酸 / ふたをした容器の中で液体の上にたまる蒸気を考える場面"
  - "疎水コロイド / 金属や硫黄のコロイドが電解質で沈みやすい場面"
  - "蒸気圧 / 塩化ナトリウムの結晶のつくりを考える場面"
  - "イオン結晶 / グリシンやアラニンの構造を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「疎水コロイド / 金属や硫黄のコロイドが電解質で沈みやすい場面」です。したがって、正解は「疎水コロイド / 金属や硫黄のコロイドが電解質で沈みやすい場面」です。
  
  「アミノ酸 / ふたをした容器の中で液体の上にたまる蒸気を考える場面」は、用語と場面の対応が合っていません。
  「疎水コロイド / 金属や硫黄のコロイドが電解質で沈みやすい場面」が正しいです。用語と場面の対応が合っています。
  「蒸気圧 / 塩化ナトリウムの結晶のつくりを考える場面」は、用語と場面の対応が合っていません。
  「イオン結晶 / グリシンやアラニンの構造を考える場面」は、用語と場面の対応が合っていません。
