# 化学基礎 問712
id: 1752
type: single_choice
text: |
  「ぬれた床の水がしだいに乾く場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "相手を酸化させ、自分は還元されること"
  - "放射線を出す同位体であること"
  - "溶解度の差を利用すること"
  - "液体から気体への変化であること"
correct: 3
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「ぬれた床の水がしだいに乾く場面」では、「液体から気体への変化であること」という見方が大切です。したがって、正解は「液体から気体への変化であること」です。
  
  「相手を酸化させ、自分は還元されること」は、その見方は酸素や過酸化水素が相手を酸化させる場面よりも酸化剤と結び付きが強いです。
  「放射線を出す同位体であること」は、その見方は医療や年代測定に利用される炭素14を考える場面よりも放射性同位体と結び付きが強いです。
  「溶解度の差を利用すること」は、その見方はミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面よりも再結晶と結び付きが強いです。
  「液体から気体への変化であること」が正しいです。この具体例で大切になる見方です。
