# 高校化学 問693
id: 2693
type: single_choice
text: |
  「グリシンやアラニンの構造を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。"
  - "アミノ基とカルボキシ基をあわせもつ化合物である。"
  - "一定量の溶媒に溶けることのできる溶質の最大量である。"
  - "電場をかけたとき、荷電したコロイド粒子が移動する現象である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「グリシンやアラニンの構造を考える場面」を説明した文として適切なのは「アミノ基とカルボキシ基をあわせもつ化合物である。」です。したがって、正解は「アミノ基とカルボキシ基をあわせもつ化合物である。」です。
  
  「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」は、この説明は「気体の量と温度から体積や圧力を見積もる場面」と結び付きが強いです。
  「アミノ基とカルボキシ基をあわせもつ化合物である。」が正しいです。この具体例を説明した文です。
  「一定量の溶媒に溶けることのできる溶質の最大量である。」は、この説明は「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」と結び付きが強いです。
  「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」は、この説明は「コロイド粒子が陽極や陰極へ移動する様子を考える場面」と結び付きが強いです。
