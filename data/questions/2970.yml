# 高校化学 問970
id: 2970
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "チンダル現象 / 熱分解や一部の溶解で周囲が冷たくなる場面"
  - "貴ガス / ネオンやアルゴンが反応しにくい理由を考える場面"
  - "吸熱反応 / 同じ反応でも条件によって進み方が変わることを比べる場面"
  - "反応速度 / 薄暗い部屋でコロイドに光を当てると筋が見える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「貴ガス / ネオンやアルゴンが反応しにくい理由を考える場面」です。したがって、正解は「貴ガス / ネオンやアルゴンが反応しにくい理由を考える場面」です。
  
  「チンダル現象 / 熱分解や一部の溶解で周囲が冷たくなる場面」は、用語と場面の対応が合っていません。
  「貴ガス / ネオンやアルゴンが反応しにくい理由を考える場面」が正しいです。用語と場面の対応が合っています。
  「吸熱反応 / 同じ反応でも条件によって進み方が変わることを比べる場面」は、用語と場面の対応が合っていません。
  「反応速度 / 薄暗い部屋でコロイドに光を当てると筋が見える場面」は、用語と場面の対応が合っていません。
