# 化学基礎 問716
id: 1756
type: single_choice
text: |
  「炭素12で陽子数と中性子数の合計を見る場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "電池の中で電気的なつり合いを保つこと"
  - "化学が社会や生活に広く役立つこと"
  - "一種類の元素だけからできること"
  - "陽子数と中性子数の合計であること"
correct: 3
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「炭素12で陽子数と中性子数の合計を見る場面」では、「陽子数と中性子数の合計であること」という見方が大切です。したがって、正解は「陽子数と中性子数の合計であること」です。
  
  「電池の中で電気的なつり合いを保つこと」は、その見方はダニエル電池で二つの水溶液をつなぐ場面よりも塩橋と結び付きが強いです。
  「化学が社会や生活に広く役立つこと」は、その見方は電池、医薬品、素材開発などに化学が生かされる場面よりも化学が拓く世界と結び付きが強いです。
  「一種類の元素だけからできること」は、その見方は鉄や酸素のように一種類の元素だけからできた物質を考える場面よりも単体と結び付きが強いです。
  「陽子数と中性子数の合計であること」が正しいです。この具体例で大切になる見方です。
