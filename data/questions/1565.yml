# 化学基礎 問525
id: 1565
type: single_choice
text: |
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水分子や酸素分子を粒として考える場面"
  - "6.0×10^23個の粒子をひとまとまりとして数える場面"
  - "同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面"
  - "亜鉛板と銅板を使って豆電球を光らせる場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」と最も関係が深い場面は「水分子や酸素分子を粒として考える場面」です。したがって、正解は「水分子や酸素分子を粒として考える場面」です。
  
  「水分子や酸素分子を粒として考える場面」が正しいです。この説明と結び付きが強い場面です。
  「6.0×10^23個の粒子をひとまとまりとして数える場面」は、「粒子の数をまとめて表すための単位である。」と結び付きが強い場面です。
  「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」は、「溶けた物質のうち、電離してイオンになった割合である。」と結び付きが強い場面です。
  「亜鉛板と銅板を使って豆電球を光らせる場面」は、「亜鉛と銅の反応を利用して電気を取り出す電池である。」と結び付きが強い場面です。
