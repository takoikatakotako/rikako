# 化学基礎 問437
id: 1477
type: single_choice
text: |
  「物質が酸素と結び付く、または電子を失う変化である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "塩橋"
  - "塩基"
  - "pH"
  - "酸化"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  物質が酸素と結び付く、または電子を失う変化である。 に当てはまる語は酸化です。したがって、正解は「酸化」です。
  
  「塩橋」は、「二つの溶液の電気的なつり合いを保つための部分である。」に当てはまる語です。
  「塩基」は、「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」に当てはまる語です。
  「pH」は、「水溶液の酸性や塩基性の強さを表す尺度である。」に当てはまる語です。
  「酸化」が正しいです。「物質が酸素と結び付く、または電子を失う変化である。」に当てはまる語です。
