# 高校化学 問394
id: 2394
type: single_choice
text: |
  「アミノ酸がつながってペプチドになる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "ペプチド結合"
  - "PET"
  - "アミノ酸"
  - "デンプン"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  アミノ酸がつながってペプチドになる場面 と最も関係が深いのはペプチド結合です。したがって、正解は「ペプチド結合」です。
  
  「ペプチド結合」が正しいです。この具体例と最も関係が深い語です。
  「PET」は、「飲料ボトルや衣料用繊維を考える場面」と結び付きが強い語です。
  「アミノ酸」は、「グリシンやアラニンの構造を考える場面」と結び付きが強い語です。
  「デンプン」は、「米やいもに多く含まれる成分を考える場面」と結び付きが強い語です。
