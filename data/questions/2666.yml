# 高校化学 問666
id: 2666
type: single_choice
text: |
  「どの塩基がより電離しやすいかを比べる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "ヒドロキシ基をもつ有機化合物である。"
  - "アミノ酸どうしが縮合してできる結合である。"
  - "塩基の電離のしやすさを表す定数である。"
  - "蒸発する速さと凝縮する速さが等しくなった状態である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「どの塩基がより電離しやすいかを比べる場面」を説明した文として適切なのは「塩基の電離のしやすさを表す定数である。」です。したがって、正解は「塩基の電離のしやすさを表す定数である。」です。
  
  「ヒドロキシ基をもつ有機化合物である。」は、この説明は「エタノールの性質や利用を考える場面」と結び付きが強いです。
  「アミノ酸どうしが縮合してできる結合である。」は、この説明は「アミノ酸がつながってペプチドになる場面」と結び付きが強いです。
  「塩基の電離のしやすさを表す定数である。」が正しいです。この具体例を説明した文です。
  「蒸発する速さと凝縮する速さが等しくなった状態である。」は、この説明は「密閉容器で水面の高さが変わらなくなる場面」と結び付きが強いです。
