# 高校化学 問18
id: 728
type: single_choice
text: |
  金属結晶についての説明として、最も適切なものはどれか。
choices:
  - "絶対零度を基準にした温度で、単位は K で表す。"
  - "金属原子が規則正しく並び、自由電子が全体に広がった結晶である。"
  - "一定量の溶媒に溶けることのできる溶質の最大量である。"
  - "溶ける速さと析出する速さが等しくなっている平衡である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  金属結晶は、金属原子が規則正しく並び、自由電子が全体に広がった結晶である。 したがって、正解は「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」です。
  
  「絶対零度を基準にした温度で、単位は K で表す。」は、絶対温度の説明です。
  「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」が正しいです。金属結晶の説明です。
  「一定量の溶媒に溶けることのできる溶質の最大量である。」は、溶解度の説明です。
  「溶ける速さと析出する速さが等しくなっている平衡である。」は、溶解平衡の説明です。
