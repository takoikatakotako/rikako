# 化学基礎 問155
id: 1195
type: single_choice
text: |
  純物質の例として、最も適切なものはどれか。
choices:
  - "食塩が水に溶けた食塩水"
  - "酸素だけからなる気体"
  - "酸素 O2"
  - "水 H2O"
correct: 1
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  酸素だけからなる気体は、純物質の例です。したがって、正解は「酸素だけからなる気体」です。
  
  「食塩が水に溶けた食塩水」は、混合物の例として見る方が適切です。
  「酸素だけからなる気体」が正しいです。これは純物質の例です。
  「酸素 O2」は、単体の例として見る方が適切です。
  「水 H2O」は、化合物の例として見る方が適切です。
