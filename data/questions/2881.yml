# 高校化学 問881
id: 2881
type: single_choice
text: |
  「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "小さな粒子が分散している状態であること"
  - "周囲へ熱を出す反応であること"
  - "電気量と生成物の量の比例に注目すること"
  - "もとの一部が別のものに置き換わること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」を理解する上では、「もとの一部が別のものに置き換わること」という見方が大切です。したがって、正解は「もとの一部が別のものに置き換わること」です。
  
  「小さな粒子が分散している状態であること」は、その見方はコロイドに関係します。
  「周囲へ熱を出す反応であること」は、その見方は発熱反応に関係します。
  「電気量と生成物の量の比例に注目すること」は、その見方はファラデーの法則に関係します。
  「もとの一部が別のものに置き換わること」が正しいです。この説明と結び付きが強い見方です。
