# 高校化学 問436
id: 2436
type: single_choice
text: |
  エンタルピー変化を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "正反応と逆反応の両方を見ること"
  - "平衡の位置を数で表すこと"
  - "条件を工夫して平衡を生成物側へ寄せること"
  - "一定圧力での熱の出入りに注目すること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  エンタルピー変化では、「一定圧力での熱の出入りに注目すること」という見方が大切です。したがって、正解は「一定圧力での熱の出入りに注目すること」です。
  
  「正反応と逆反応の両方を見ること」は、可逆反応に関係する見方です。
  「平衡の位置を数で表すこと」は、平衡定数に関係する見方です。
  「条件を工夫して平衡を生成物側へ寄せること」は、アンモニア合成に関係する見方です。
  「一定圧力での熱の出入りに注目すること」が正しいです。エンタルピー変化の要点を表しています。
