# 化学基礎 問867
id: 1907
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "蒸発 / 原子のいちばん外側の電子殻にある電子である。"
  - "最外殻電子 / 分子の中で電荷のかたよりがある分子である。"
  - "極性分子 / 液体が気体になる状態変化である。"
  - "同位体 / 陽子数は同じで中性子数が異なる原子どうしである。"
correct: 3
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「同位体 / 陽子数は同じで中性子数が異なる原子どうしである。」です。したがって、正解は「同位体 / 陽子数は同じで中性子数が異なる原子どうしである。」です。
  
  「蒸発 / 原子のいちばん外側の電子殻にある電子である。」は、用語と説明の対応が合っていません。
  「最外殻電子 / 分子の中で電荷のかたよりがある分子である。」は、用語と説明の対応が合っていません。
  「極性分子 / 液体が気体になる状態変化である。」は、用語と説明の対応が合っていません。
  「同位体 / 陽子数は同じで中性子数が異なる原子どうしである。」が正しいです。用語と説明の対応が合っています。
