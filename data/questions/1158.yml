# 化学基礎 問118
id: 1158
type: single_choice
text: |
  周期律についての説明として、最も適切なものはどれか。
choices:
  - "原子のいちばん外側の電子殻にある電子で、化学的な性質に強く関わる。"
  - "元素の性質が周期表の並びに応じて規則的に変化することをいう。"
  - "電子を失って正の電荷をもつ粒子である。"
  - "電子を受け取って負の電荷をもつ粒子である。"
correct: 1
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  周期律は、元素の性質が周期表の並びに応じて規則的に変化することをいう。したがって、正解は「元素の性質が周期表の並びに応じて規則的に変化することをいう。」です。
  
  「原子のいちばん外側の電子殻にある電子で、化学的な性質に強く関わる。」は、最外殻電子の説明です。
  「元素の性質が周期表の並びに応じて規則的に変化することをいう。」が正しいです。周期律の説明です。
  「電子を失って正の電荷をもつ粒子である。」は、陽イオンの説明です。
  「電子を受け取って負の電荷をもつ粒子である。」は、陰イオンの説明です。
