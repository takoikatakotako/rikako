# 化学基礎 問500
id: 1540
type: single_choice
text: |
  化学が拓く世界を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "色の変化で液性を見分けること"
  - "化学が社会や生活に広く役立つこと"
  - "成分が二種類以上まざっていること"
  - "複数の元素が結び付いてできること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  化学が拓く世界では、「化学が社会や生活に広く役立つこと」という見方が大切です。したがって、正解は「化学が社会や生活に広く役立つこと」です。
  
  「色の変化で液性を見分けること」は、指示薬に関係する見方です。
  「化学が社会や生活に広く役立つこと」が正しいです。化学が拓く世界の要点を表しています。
  「成分が二種類以上まざっていること」は、混合物に関係する見方です。
  「複数の元素が結び付いてできること」は、化合物に関係する見方です。
