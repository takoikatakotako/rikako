# 化学基礎 問977
id: 2017
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "還元 / 水溶液でも電流をほとんど通さないこと"
  - "非電解質 / 沸点の違いを利用すること"
  - "蒸留 / 酸素の喪失や電子の受け取りに注目すること"
  - "無極性分子 / 電荷のかたよりがほとんどないこと"
correct: 3
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「無極性分子 / 電荷のかたよりがほとんどないこと」です。したがって、正解は「無極性分子 / 電荷のかたよりがほとんどないこと」です。
  
  「還元 / 水溶液でも電流をほとんど通さないこと」は、用語と要点の対応が合っていません。
  「非電解質 / 沸点の違いを利用すること」は、用語と要点の対応が合っていません。
  「蒸留 / 酸素の喪失や電子の受け取りに注目すること」は、用語と要点の対応が合っていません。
  「無極性分子 / 電荷のかたよりがほとんどないこと」が正しいです。用語と要点の対応が合っています。
