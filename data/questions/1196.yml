# 化学基礎 問156
id: 1196
type: single_choice
text: |
  混合物の例として、最も適切なものはどれか。
choices:
  - "酸素 O2"
  - "水 H2O"
  - "食塩が水に溶けた食塩水"
  - "氷が溶けて水になる変化"
correct: 2
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  食塩が水に溶けた食塩水は、混合物の例です。したがって、正解は「食塩が水に溶けた食塩水」です。
  
  「酸素 O2」は、単体の例として見る方が適切です。
  「水 H2O」は、化合物の例として見る方が適切です。
  「食塩が水に溶けた食塩水」が正しいです。これは混合物の例です。
  「氷が溶けて水になる変化」は、物理変化の例として見る方が適切です。
