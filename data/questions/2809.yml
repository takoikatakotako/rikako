# 高校化学 問809
id: 2809
type: single_choice
text: |
  「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "平衡の位置を数で表すこと"
  - "反応性が高く 1 価の陽イオンになりやすいこと"
  - "炭素間が単結合だけであること"
  - "圧力一定で体積と絶対温度の関係を見ること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」を理解する上では、「圧力一定で体積と絶対温度の関係を見ること」という見方が大切です。したがって、正解は「圧力一定で体積と絶対温度の関係を見ること」です。
  
  「平衡の位置を数で表すこと」は、その見方は平衡定数に関係します。
  「反応性が高く 1 価の陽イオンになりやすいこと」は、その見方はアルカリ金属に関係します。
  「炭素間が単結合だけであること」は、その見方は飽和炭化水素に関係します。
  「圧力一定で体積と絶対温度の関係を見ること」が正しいです。この説明と結び付きが強い見方です。
