# 高校化学 問515
id: 2515
type: single_choice
text: |
  「陽イオンと陰イオンが規則正しく並んでできた結晶である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "金属が電気を通したりのびたりする理由を考える場面"
  - "薄暗い部屋でコロイドに光を当てると筋が見える場面"
  - "塩化ナトリウムの結晶のつくりを考える場面"
  - "熱分解や一部の溶解で周囲が冷たくなる場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「陽イオンと陰イオンが規則正しく並んでできた結晶である。」と最も関係が深い場面は「塩化ナトリウムの結晶のつくりを考える場面」です。したがって、正解は「塩化ナトリウムの結晶のつくりを考える場面」です。
  
  「金属が電気を通したりのびたりする理由を考える場面」は、「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」と結び付きが強い場面です。
  「薄暗い部屋でコロイドに光を当てると筋が見える場面」は、「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」と結び付きが強い場面です。
  「塩化ナトリウムの結晶のつくりを考える場面」が正しいです。この説明と結び付きが強い場面です。
  「熱分解や一部の溶解で周囲が冷たくなる場面」は、「反応の結果として周囲から熱を吸収する反応である。」と結び付きが強い場面です。
