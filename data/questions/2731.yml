# 高校化学 問731
id: 2731
type: single_choice
text: |
  「半透膜を通る粒子の大きさの違いを利用すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "透析"
  - "塩の加水分解"
  - "配位結合"
  - "アルデヒド"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「半透膜を通る粒子の大きさの違いを利用すること」という見方が大切なのは透析です。したがって、正解は「透析」です。
  
  「透析」が正しいです。この見方が大切な語です。
  「塩の加水分解」は、その語で大切なのは「塩のイオンが水と反応すること」という見方です。
  「配位結合」は、その語で大切なのは「電子対の与え手と受け手に注目すること」という見方です。
  「アルデヒド」は、その語で大切なのは「分子の端にカルボニル構造をもつこと」という見方です。
