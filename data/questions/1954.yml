# 化学基礎 問914
id: 1954
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "最外殻電子 / 水分子で電荷のかたよりを考える場面"
  - "昇華 / ドライアイスがそのまま気体になる場面"
  - "極性分子 / 塩酸と水酸化ナトリウム水溶液を混ぜる場面"
  - "中和 / ナトリウムが電子を1個失いやすい理由を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「昇華 / ドライアイスがそのまま気体になる場面」です。したがって、正解は「昇華 / ドライアイスがそのまま気体になる場面」です。
  
  「最外殻電子 / 水分子で電荷のかたよりを考える場面」は、用語と場面の対応が合っていません。
  「昇華 / ドライアイスがそのまま気体になる場面」が正しいです。用語と場面の対応が合っています。
  「極性分子 / 塩酸と水酸化ナトリウム水溶液を混ぜる場面」は、用語と場面の対応が合っていません。
  「中和 / ナトリウムが電子を1個失いやすい理由を考える場面」は、用語と場面の対応が合っていません。
