# 化学基礎 問92
id: 1132
type: single_choice
text: |
  ダニエル電池で反応が進むと、銅板の質量がどうなるかとして最も適切なものはどれか。
choices:
  - "減る。"
  - "増える。"
  - "全く変わらない。"
  - "必ず 0 になる。"
correct: 1
explanation: |
  この問題は、「銅板で何が起きているか」を考える問題です。
  
  ダニエル電池では、Cu2+ が電子を受け取って銅として銅板に付着します。そのため、銅板の質量は増えます。したがって、正解は「増える」です。
  
  「減る」は、適切ではありません。
  「増える」が正しいです。銅が析出するためです。
  「全く変わらない」は、適切ではありません。
  「必ず 0 になる」は、適切ではありません。
