# 令和7年度 ITパスポート 公開問題 問79
id: 667
type: single_choice
text: |
  サムネイルの説明として、適切なものはどれか。
choices:
  - "画像や文書ファイルの内容を縮小して表示したもの"
  - "処理の内容や対象が分かる小さな絵や記号のこと"
  - "ネット上で利用者の分身として動作するキャラクターのこと"
  - "複数のファイルを一つのファイルにまとめたもの"
correct: 0
explanation: |
  この問題の公開解答では「画像や文書ファイルの内容を縮小して表示したもの」が正解とされています。
  
  「画像や文書ファイルの内容を縮小して表示したもの」が公開解答で正解とされています。
  「処理の内容や対象が分かる小さな絵や記号のこと」は公開解答では正解ではありません。
  「ネット上で利用者の分身として動作するキャラクターのこと」は公開解答では正解ではありません。
  「複数のファイルを一つのファイルにまとめたもの」は公開解答では正解ではありません。
