# 化学基礎 問175
id: 1215
type: single_choice
text: |
  分子の例として、最も適切なものはどれか。
choices:
  - "水 H2O"
  - "二酸化炭素 CO2 の分子"
  - "二酸化炭素 CO2"
  - "1 mol の水分子"
correct: 1
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  二酸化炭素 CO2 の分子は、分子の例です。したがって、正解は「二酸化炭素 CO2 の分子」です。
  
  「水 H2O」は、極性分子の例として見る方が適切です。
  「二酸化炭素 CO2 の分子」が正しいです。これは分子の例です。
  「二酸化炭素 CO2」は、無極性分子の例として見る方が適切です。
  「1 mol の水分子」は、モルの例として見る方が適切です。
