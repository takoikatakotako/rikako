# 高校化学 問329
id: 2329
type: single_choice
text: |
  「薄暗い部屋でコロイドに光を当てると筋が見える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "蒸気圧降下"
  - "凝固点降下"
  - "コロイド"
  - "チンダル現象"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  薄暗い部屋でコロイドに光を当てると筋が見える場面 と最も関係が深いのはチンダル現象です。したがって、正解は「チンダル現象」です。
  
  「蒸気圧降下」は、「食塩水が純水より蒸発しにくくなることを考える場面」と結び付きが強い語です。
  「凝固点降下」は、「凍結防止剤をまいた道路の水が凍りにくくなる場面」と結び付きが強い語です。
  「コロイド」は、「牛乳やゼラチン溶液のような見た目の系を考える場面」と結び付きが強い語です。
  「チンダル現象」が正しいです。この具体例と最も関係が深い語です。
