# 化学基礎 問952
id: 1992
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "凝固 / 電子を失って正に帯電すること"
  - "陽イオン / 電荷のかたよりがほとんどないこと"
  - "蒸留 / 沸点の違いを利用すること"
  - "無極性分子 / 液体から固体への変化であること"
correct: 2
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「蒸留 / 沸点の違いを利用すること」です。したがって、正解は「蒸留 / 沸点の違いを利用すること」です。
  
  「凝固 / 電子を失って正に帯電すること」は、用語と要点の対応が合っていません。
  「陽イオン / 電荷のかたよりがほとんどないこと」は、用語と要点の対応が合っていません。
  「蒸留 / 沸点の違いを利用すること」が正しいです。用語と要点の対応が合っています。
  「無極性分子 / 液体から固体への変化であること」は、用語と要点の対応が合っていません。
