# 令和7年度 ITパスポート 公開問題 問76
id: 939
type: single_choice
text: |
  商品の税込価格を計算する表計算のワークシートがある。セル B1には消費税率が
  入力されており、セル B4～B6には税抜価格が入力されている。セル C4～C6に税込
  価格を表示するために、セル C4に式を入力し、セル C5、C6に複写する。セルC4に
  入力する式はどれか。ここで、セルB1は、パーセント形式で表示している。
  A
  B
  C
  消費税率
  10%
  商品名
  税抜価格（円）
  税込価格（円）
  商品✕
  商品Y
  商品2
choices:
  - "B$4* （1+B$1）"
  - "B$4* （1+B1）"
  - "B4* （1+B$1）"
  - "B4＊（1+B1）"
correct: 2
explanation: |
  この問題の公開解答では「B4* （1+B$1）」が正解とされています。
  
  「B$4* （1+B$1）」は公開解答では正解ではありません。
  「B$4* （1+B1）」は公開解答では正解ではありません。
  「B4* （1+B$1）」が公開解答で正解とされています。
  「B4＊（1+B1）」は公開解答では正解ではありません。
