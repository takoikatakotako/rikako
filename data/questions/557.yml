# 令和7年度 ITパスポート 公開問題 問35
id: 557
type: single_choice
text: |
  マーケティング戦略の策定プロセスのうち、自社製品の差別化ポイントを明確化するものはどれか。
choices:
  - "セグメンテーション"
  - "ターゲティング"
  - "プロモーション"
  - "ポジショニング"
correct: 3
explanation: |
  ポジショニングは、競合との差を明確にし、自社製品を市場の中でどの位置に置くかを定める活動です。差別化ポイントの明確化に当たるのでエが正しいです。
  
  「セグメンテーション」はセグメンテーションは市場を属性などで分ける活動です。
  「ターゲティング」はターゲティングは狙う市場を選定する活動です。
  「プロモーション」はプロモーションは販売促進活動です。
  「ポジショニング」が正しいです。差別化ポイントを明確にして市場内の位置を定めるのがポジショニングです。
