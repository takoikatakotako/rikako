# 化学基礎 問582
id: 1622
type: single_choice
text: |
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。"
  - "金属が電子を失ってイオンになりやすい性質の強さである。"
  - "食品や物質が酸化して変質するのを防ぐために用いられる物質である。"
  - "一種類の物質だけからできていて、性質が一定である物質である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」を説明した文として適切なのは「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」です。したがって、正解は「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」です。
  
  「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」が正しいです。この具体例を説明した文です。
  「金属が電子を失ってイオンになりやすい性質の強さである。」は、この説明は「亜鉛が銅より先にイオンになりやすいことを見る場面」と結び付きが強いです。
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」は、この説明は「食品の変色や劣化を防ぐためにビタミンCを使う場面」と結び付きが強いです。
  「一種類の物質だけからできていて、性質が一定である物質である。」は、この説明は「酸素だけが入った容器を考える場面」と結び付きが強いです。
