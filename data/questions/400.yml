# 令和7年度 ITパスポート 公開問題 問47
id: 400
type: single_choice
text: |
  利用者が銀行のATMのパネルを操作して入金処理を行う。この操作の要件を定義するときに、ソフトウェア開発の品質特性である使用性を考慮すべきインタフェースとして、最も適切なものはどれか。
choices:
  - "OSとパネルのインタフェース"
  - "ソフトウェア間のインタフェース"
  - "ハードウェアと 0Sのインタフェース"
  - "利用者とパネルのインタフェース"
correct: 3
explanation: |
  この問題の公開解答では「利用者とパネルのインタフェース」が正解とされています。
  
  「OSとパネルのインタフェース」は公開解答では正解ではありません。
  「ソフトウェア間のインタフェース」は公開解答では正解ではありません。
  「ハードウェアと 0Sのインタフェース」は公開解答では正解ではありません。
  「利用者とパネルのインタフェース」が公開解答で正解とされています。
