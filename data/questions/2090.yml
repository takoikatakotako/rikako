# 高校化学 問90
id: 2090
type: single_choice
text: |
  ナイロンについての説明として、最も適切なものはどれか。
choices:
  - "カルボン酸とアルコールからできる有機化合物である。"
  - "アミド結合をもつ合成繊維の代表的な高分子化合物である。"
  - "ベンゼン環にヒドロキシ基が直接結び付いた化合物である。"
  - "目的に応じた特別な性質をもたせてつくられた材料である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  ナイロンは、アミド結合をもつ合成繊維の代表的な高分子化合物である。 したがって、正解は「アミド結合をもつ合成繊維の代表的な高分子化合物である。」です。
  
  「カルボン酸とアルコールからできる有機化合物である。」は、エステルの説明です。
  「アミド結合をもつ合成繊維の代表的な高分子化合物である。」が正しいです。ナイロンの説明です。
  「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」は、フェノールの説明です。
  「目的に応じた特別な性質をもたせてつくられた材料である。」は、機能性材料の説明です。
