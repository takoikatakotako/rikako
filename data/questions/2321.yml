# 高校化学 問321
id: 2321
type: single_choice
text: |
  「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "弱酸"
  - "酸解離定数"
  - "溶解"
  - "溶解度"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面 と最も関係が深いのは溶解度です。したがって、正解は「溶解度」です。
  
  「弱酸」は、「酢酸が塩酸ほど強く電離しない場面」と結び付きが強い語です。
  「酸解離定数」は、「どの酸がより電離しやすいかを比べる場面」と結び付きが強い語です。
  「溶解」は、「食塩が水に溶けて見えなくなる場面」と結び付きが強い語です。
  「溶解度」が正しいです。この具体例と最も関係が深い語です。
