# 高校化学 問540
id: 2540
type: single_choice
text: |
  「反応の結果として周囲から熱を吸収する反応である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "懐中電灯や時計に入っている電池を考える場面"
  - "生成物から再び反応物が生じる場面を考えるとき"
  - "どの酸がより電離しやすいかを比べる場面"
  - "熱分解や一部の溶解で周囲が冷たくなる場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「反応の結果として周囲から熱を吸収する反応である。」と最も関係が深い場面は「熱分解や一部の溶解で周囲が冷たくなる場面」です。したがって、正解は「熱分解や一部の溶解で周囲が冷たくなる場面」です。
  
  「懐中電灯や時計に入っている電池を考える場面」は、「一度使い切ることを前提にした一次電池の代表例である。」と結び付きが強い場面です。
  「生成物から再び反応物が生じる場面を考えるとき」は、「正反応と逆反応の両方が起こり得る反応である。」と結び付きが強い場面です。
  「どの酸がより電離しやすいかを比べる場面」は、「酸の電離のしやすさを表す定数である。」と結び付きが強い場面です。
  「熱分解や一部の溶解で周囲が冷たくなる場面」が正しいです。この説明と結び付きが強い場面です。
