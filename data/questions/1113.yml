# 化学基礎 問73
id: 1113
type: single_choice
text: |
  食塩が水に溶けやすい理由として、最も適切なものはどれか。
choices:
  - "水が極性をもつため、イオンを取り囲みやすいから。"
  - "水が金属だから。"
  - "水に電子が全くないから。"
  - "食塩が気体になるから。"
correct: 0
explanation: |
  この問題は、「水の極性と溶けやすさの関係」を考える問題です。
  
  水は極性分子なので、ナトリウムイオンや塩化物イオンを取り囲んで安定にしやすいです。そのため、食塩は水に溶けやすくなります。したがって、正解は「水が極性をもつため、イオンを取り囲みやすいから」です。
  
  「水が極性をもつため、イオンを取り囲みやすいから」が正しいです。
  「水が金属だから」は、適切ではありません。
  「水に電子が全くないから」は、適切ではありません。
  「食塩が気体になるから」は、適切ではありません。
