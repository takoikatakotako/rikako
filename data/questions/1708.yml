# 化学基礎 問668
id: 1708
type: single_choice
text: |
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "性質が周期的にくり返されること"
  - "相手を酸化させ、自分は還元されること"
  - "放射線を出す同位体であること"
  - "溶解度の差を利用すること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」を理解する上では、「性質が周期的にくり返されること」という見方が大切です。したがって、正解は「性質が周期的にくり返されること」です。
  
  「性質が周期的にくり返されること」が正しいです。この説明と結び付きが強い見方です。
  「相手を酸化させ、自分は還元されること」は、その見方は酸化剤に関係します。
  「放射線を出す同位体であること」は、その見方は放射性同位体に関係します。
  「溶解度の差を利用すること」は、その見方は再結晶に関係します。
