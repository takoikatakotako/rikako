# 高校化学 問269
id: 2269
type: single_choice
text: |
  「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "陽極"
  - "ファラデーの法則"
  - "ハロゲン"
  - "不飽和炭化水素"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  周期表17族に属し、陰イオンになりやすい非金属元素の総称である。 に当てはまる語はハロゲンです。したがって、正解は「ハロゲン」です。
  
  「陽極」は、「電気分解で酸化が起こる電極である。」に当てはまる語です。
  「ファラデーの法則」は、「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」に当てはまる語です。
  「ハロゲン」が正しいです。「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」に当てはまる語です。
  「不飽和炭化水素」は、「炭素どうしに二重結合や三重結合をもつ炭化水素である。」に当てはまる語です。
