# 高校化学 問363
id: 2363
type: single_choice
text: |
  「酢酸が塩酸ほど強く電離しない場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "蒸気圧降下"
  - "弱酸"
  - "凝固点降下"
  - "コロイド"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  酢酸が塩酸ほど強く電離しない場面 と最も関係が深いのは弱酸です。したがって、正解は「弱酸」です。
  
  「蒸気圧降下」は、「食塩水が純水より蒸発しにくくなることを考える場面」と結び付きが強い語です。
  「弱酸」が正しいです。この具体例と最も関係が深い語です。
  「凝固点降下」は、「凍結防止剤をまいた道路の水が凍りにくくなる場面」と結び付きが強い語です。
  「コロイド」は、「牛乳やゼラチン溶液のような見た目の系を考える場面」と結び付きが強い語です。
