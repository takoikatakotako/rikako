# 化学基礎 問643
id: 1683
type: single_choice
text: |
  「電池の中で電気的なつり合いを保つこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "塩橋"
  - "化合物"
  - "原子番号"
  - "イオン結合"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「電池の中で電気的なつり合いを保つこと」という見方が大切なのは塩橋です。したがって、正解は「塩橋」です。
  
  「塩橋」が正しいです。この見方が大切な語です。
  「化合物」は、その語で大切なのは「複数の元素が結び付いてできること」という見方です。
  「原子番号」は、その語で大切なのは「陽子数を表す数であること」という見方です。
  「イオン結合」は、その語で大切なのは「電気的な引力で結び付くこと」という見方です。
