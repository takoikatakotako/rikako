# 化学基礎 問166
id: 1206
type: single_choice
text: |
  質量数の例として、最も適切なものはどれか。
choices:
  - "炭素 12 の 12"
  - "炭素 12 と炭素 14"
  - "ナトリウムとカリウムが似た性質を示すこと"
  - "ナトリウムでは最外殻電子が 1 個であること"
correct: 0
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  炭素 12 の 12は、質量数の例です。したがって、正解は「炭素 12 の 12」です。
  
  「炭素 12 の 12」が正しいです。これは質量数の例です。
  「炭素 12 と炭素 14」は、同位体の例として見る方が適切です。
  「ナトリウムとカリウムが似た性質を示すこと」は、周期律の例として見る方が適切です。
  「ナトリウムでは最外殻電子が 1 個であること」は、最外殻電子の例として見る方が適切です。
