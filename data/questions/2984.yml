# 高校化学 問984
id: 2984
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "乾電池 / 生成物から再び反応物が生じる場面を考えるとき"
  - "可逆反応 / どの酸がより電離しやすいかを比べる場面"
  - "酸解離定数 / 懐中電灯や時計に入っている電池を考える場面"
  - "アルデヒド / ホルムアルデヒドやアセトアルデヒドを考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「アルデヒド / ホルムアルデヒドやアセトアルデヒドを考える場面」です。したがって、正解は「アルデヒド / ホルムアルデヒドやアセトアルデヒドを考える場面」です。
  
  「乾電池 / 生成物から再び反応物が生じる場面を考えるとき」は、用語と場面の対応が合っていません。
  「可逆反応 / どの酸がより電離しやすいかを比べる場面」は、用語と場面の対応が合っていません。
  「酸解離定数 / 懐中電灯や時計に入っている電池を考える場面」は、用語と場面の対応が合っていません。
  「アルデヒド / ホルムアルデヒドやアセトアルデヒドを考える場面」が正しいです。用語と場面の対応が合っています。
