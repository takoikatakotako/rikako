# 化学基礎 問583
id: 1623
type: single_choice
text: |
  「塩酸と水酸化ナトリウム水溶液を混ぜる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "亜鉛と銅の反応を利用して電気を取り出す電池である。"
  - "酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。"
  - "多数の小さな単位がつながってできた大きな分子からなる化合物である。"
  - "二種類以上の物質が混ざってできている物質である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「塩酸と水酸化ナトリウム水溶液を混ぜる場面」を説明した文として適切なのは「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」です。したがって、正解は「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」です。
  
  「亜鉛と銅の反応を利用して電気を取り出す電池である。」は、この説明は「亜鉛板と銅板を使って豆電球を光らせる場面」と結び付きが強いです。
  「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」が正しいです。この具体例を説明した文です。
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」は、この説明は「ポリエチレンやタンパク質のような長い分子を考える場面」と結び付きが強いです。
  「二種類以上の物質が混ざってできている物質である。」は、この説明は「空気や食塩水のように複数の物質が混ざったものを考える場面」と結び付きが強いです。
