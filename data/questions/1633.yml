# 化学基礎 問593
id: 1633
type: single_choice
text: |
  「ダニエル電池で二つの水溶液をつなぐ場面」を説明した文として、最も適切なものはどれか。
choices:
  - "沸点の違いを利用して液体を分ける方法である。"
  - "物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
  - "原子核の中にある陽子数と中性子数の合計である。"
  - "二つの溶液の電気的なつり合いを保つための部分である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「ダニエル電池で二つの水溶液をつなぐ場面」を説明した文として適切なのは「二つの溶液の電気的なつり合いを保つための部分である。」です。したがって、正解は「二つの溶液の電気的なつり合いを保つための部分である。」です。
  
  「沸点の違いを利用して液体を分ける方法である。」は、この説明は「水とエタノールの混合物を沸点の差で分ける場面」と結び付きが強いです。
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」は、この説明は「氷が溶けて水になる場面」と結び付きが強いです。
  「原子核の中にある陽子数と中性子数の合計である。」は、この説明は「炭素12で陽子数と中性子数の合計を見る場面」と結び付きが強いです。
  「二つの溶液の電気的なつり合いを保つための部分である。」が正しいです。この具体例を説明した文です。
