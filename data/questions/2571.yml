# 高校化学 問571
id: 2571
type: single_choice
text: |
  「酸とも塩基とも反応する酸化物である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "鉄や銅、クロムの化合物の色の違いを考える場面"
  - "酢酸の性質やにおいを考える場面"
  - "酸化アルミニウムが酸にも塩基にも溶ける場面"
  - "米やいもに多く含まれる成分を考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「酸とも塩基とも反応する酸化物である。」と最も関係が深い場面は「酸化アルミニウムが酸にも塩基にも溶ける場面」です。したがって、正解は「酸化アルミニウムが酸にも塩基にも溶ける場面」です。
  
  「鉄や銅、クロムの化合物の色の違いを考える場面」は、「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」と結び付きが強い場面です。
  「酢酸の性質やにおいを考える場面」は、「カルボキシ基をもち、酸性を示す有機化合物である。」と結び付きが強い場面です。
  「酸化アルミニウムが酸にも塩基にも溶ける場面」が正しいです。この説明と結び付きが強い場面です。
  「米やいもに多く含まれる成分を考える場面」は、「グルコースが多数つながった植物の貯蔵多糖である。」と結び付きが強い場面です。
