# 高校化学 問378
id: 2378
type: single_choice
text: |
  「メタンやエタンの性質を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "飽和炭化水素"
  - "機能性材料"
  - "化学が築く未来"
  - "付加反応"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  メタンやエタンの性質を考える場面 と最も関係が深いのは飽和炭化水素です。したがって、正解は「飽和炭化水素」です。
  
  「飽和炭化水素」が正しいです。この具体例と最も関係が深い語です。
  「機能性材料」は、「導電性高分子や高性能電池材料を考える場面」と結び付きが強い語です。
  「化学が築く未来」は、「再生可能エネルギーや新素材の開発を考える場面」と結び付きが強い語です。
  「付加反応」は、「エチレンに臭素が付加する場面」と結び付きが強い語です。
