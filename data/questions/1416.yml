# 化学基礎 問376
id: 1416
type: single_choice
text: |
  極性分子と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
  - "1Lの食塩水にどれだけ溶質が溶けているかを表す場面"
  - "塩酸が水溶液中で水素イオンを生じる場面"
  - "水分子で電荷のかたよりを考える場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  水分子で電荷のかたよりを考える場面は、極性分子と結び付きが強い場面です。したがって、正解は「水分子で電荷のかたよりを考える場面」です。
  
  「ナトリウムが電子を1個失いやすい理由を考える場面」は、最外殻電子と結び付きが強い場面です。
  「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」は、モル濃度と結び付きが強い場面です。
  「塩酸が水溶液中で水素イオンを生じる場面」は、酸と結び付きが強い場面です。
  「水分子で電荷のかたよりを考える場面」が正しいです。これは極性分子と結び付きが強い場面です。
