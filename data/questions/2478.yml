# 高校化学 問478
id: 2478
type: single_choice
text: |
  飽和炭化水素を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "カルボン酸とアルコールの組合せでできること"
  - "炭素間が単結合だけであること"
  - "ベンゼン環にヒドロキシ基が直接つくこと"
  - "丈夫な合成繊維であること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  飽和炭化水素では、「炭素間が単結合だけであること」という見方が大切です。したがって、正解は「炭素間が単結合だけであること」です。
  
  「カルボン酸とアルコールの組合せでできること」は、エステルに関係する見方です。
  「炭素間が単結合だけであること」が正しいです。飽和炭化水素の要点を表しています。
  「ベンゼン環にヒドロキシ基が直接つくこと」は、フェノールに関係する見方です。
  「丈夫な合成繊維であること」は、ナイロンに関係する見方です。
