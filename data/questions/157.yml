# 令和7年度 ITパスポート 公開問題 問24
id: 157
type: single_choice
text: |
  RPAに関する記述として、最も適切なものはどれか。
choices:
  - "企業の一部の業務を外部の組織に委託することによって、自社のリソースを重要な領域に集中したり、コストの最適化や業務の高効率化などを実現したりする。"
  - "組立てや搬送などにハードウェアのロボットを用いることによって、工場の生産活動の自動化を実現する。"
  - "システムの利用者が、主体的にシステム管理や運用を行うことによって、利用者のITリテラシーの向上や、システムベンダーへの依存の軽減などを実現する。"
  - "ホワイトカラーの定型的な事務作業を、ソフトウェアのロボットに代替させることによって、自動化や効率化を図る。"
correct: 3
explanation: |
  RPA は Robotic Process Automation の略で、ホワイトカラーの定型的な事務作業をソフトウェアロボットで自動化する考え方です。したがって、正解は「ホワイトカラーの定型的な事務作業を、ソフトウェアのロボットに代替させることによって、自動化や効率化を図る」です。
  
  「企業の一部の業務を外部の組織に委託することによって、自社のリソースを重要な領域に集中したり、コストの最適化や業務の高効率化などを実現したりする」はアウトソーシングの説明です。
  「組立てや搬送などにハードウェアのロボットを用いることによって、工場の生産活動の自動化を実現する」は工場で使う物理ロボットによる自動化の説明です。
  「システムの利用者が、主体的にシステム管理や運用を行うことによって、利用者のITリテラシーの向上や、システムベンダーへの依存の軽減などを実現する」はEUCのような利用者主体の運用に近く、RPAではありません。
  「ホワイトカラーの定型的な事務作業を、ソフトウェアのロボットに代替させることによって、自動化や効率化を図る」が正しいです。定型的な事務作業をソフトウェアロボットに代替させるのがRPAです。
