# 高校化学 問834
id: 2834
type: single_choice
text: |
  「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水となじみにくく不安定になりやすいこと"
  - "もとの一部が別のものに置き換わること"
  - "アミノ酸が多数つながった高分子であること"
  - "蒸気圧と外圧のつり合いに注目すること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」を理解する上では、「水となじみにくく不安定になりやすいこと」という見方が大切です。したがって、正解は「水となじみにくく不安定になりやすいこと」です。
  
  「水となじみにくく不安定になりやすいこと」が正しいです。この説明と結び付きが強い見方です。
  「もとの一部が別のものに置き換わること」は、その見方は置換反応に関係します。
  「アミノ酸が多数つながった高分子であること」は、その見方はタンパク質に関係します。
  「蒸気圧と外圧のつり合いに注目すること」は、その見方は沸点に関係します。
