# 高校化学 問810
id: 2810
type: single_choice
text: |
  「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "圧力、体積、物質量、温度をまとめて扱うこと"
  - "加えた変化を打ち消す向きに平衡が動くこと"
  - "2 価の陽イオンになりやすいこと"
  - "多重結合をもつこと"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」を理解する上では、「圧力、体積、物質量、温度をまとめて扱うこと」という見方が大切です。したがって、正解は「圧力、体積、物質量、温度をまとめて扱うこと」です。
  
  「圧力、体積、物質量、温度をまとめて扱うこと」が正しいです。この説明と結び付きが強い見方です。
  「加えた変化を打ち消す向きに平衡が動くこと」は、その見方はルシャトリエの原理に関係します。
  「2 価の陽イオンになりやすいこと」は、その見方はアルカリ土類金属に関係します。
  「多重結合をもつこと」は、その見方は不飽和炭化水素に関係します。
