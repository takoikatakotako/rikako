# 化学基礎 問567
id: 1607
type: single_choice
text: |
  「炭素12と炭素14を比べる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "分子の中で電荷のかたよりがある分子である。"
  - "陽子数は同じで中性子数が異なる原子どうしである。"
  - "酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。"
  - "相手を還元させ、自身は酸化される物質である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「炭素12と炭素14を比べる場面」を説明した文として適切なのは「陽子数は同じで中性子数が異なる原子どうしである。」です。したがって、正解は「陽子数は同じで中性子数が異なる原子どうしである。」です。
  
  「分子の中で電荷のかたよりがある分子である。」は、この説明は「水分子で電荷のかたよりを考える場面」と結び付きが強いです。
  「陽子数は同じで中性子数が異なる原子どうしである。」が正しいです。この具体例を説明した文です。
  「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」は、この説明は「塩酸と水酸化ナトリウム水溶液を混ぜる場面」と結び付きが強いです。
  「相手を還元させ、自身は酸化される物質である。」は、この説明は「水素や炭素が相手から酸素を奪う場面」と結び付きが強いです。
