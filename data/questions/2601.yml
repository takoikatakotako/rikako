# 高校化学 問601
id: 2601
type: single_choice
text: |
  「水やエタノールの沸点の違いを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "金属原子が規則正しく並び、自由電子が全体に広がった結晶である。"
  - "分子どうしの間にはたらく比較的弱い引力である。"
  - "コロイド粒子が光を散乱するため、光の道筋が見える現象である。"
  - "反応の結果として周囲から熱を吸収する反応である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「水やエタノールの沸点の違いを考える場面」を説明した文として適切なのは「分子どうしの間にはたらく比較的弱い引力である。」です。したがって、正解は「分子どうしの間にはたらく比較的弱い引力である。」です。
  
  「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」は、この説明は「金属が電気を通したりのびたりする理由を考える場面」と結び付きが強いです。
  「分子どうしの間にはたらく比較的弱い引力である。」が正しいです。この具体例を説明した文です。
  「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」は、この説明は「薄暗い部屋でコロイドに光を当てると筋が見える場面」と結び付きが強いです。
  「反応の結果として周囲から熱を吸収する反応である。」は、この説明は「熱分解や一部の溶解で周囲が冷たくなる場面」と結び付きが強いです。
