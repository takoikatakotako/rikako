# 化学基礎 問45
id: 1085
type: single_choice
text: |
  還元剤についての説明として、最も適切なものはどれか。
choices:
  - "相手に電子を与え、自分は酸化される物質である。"
  - "相手から電子を受け取り、自分は還元される物質である。"
  - "必ず液体である。"
  - "必ず無色である。"
correct: 0
explanation: |
  この問題は、「還元剤の働き方」を確認する問題です。
  
  還元剤は、相手に電子を与えて相手を還元します。その結果、自分自身は酸化されます。したがって、正解は「相手に電子を与え、自分は酸化される物質である」です。
  
  「相手に電子を与え、自分は酸化される物質である」が正しいです。還元剤の定義です。
  「相手から電子を受け取り、自分は還元される物質である」は、酸化剤の説明です。
  「必ず液体である」は、適切ではありません。
  「必ず無色である」は、適切ではありません。
