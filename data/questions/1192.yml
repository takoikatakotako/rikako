# 化学基礎 問152
id: 1192
type: single_choice
text: |
  蒸留の例として、最も適切なものはどれか。
choices:
  - "ミョウバンを熱い水に溶かして冷やし、結晶を取り出す操作"
  - "インクに含まれる色素を分ける操作"
  - "水とエタノールの混合物を分ける操作"
  - "酸素だけからなる気体"
correct: 2
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  水とエタノールの混合物を分ける操作は、蒸留の例です。したがって、正解は「水とエタノールの混合物を分ける操作」です。
  
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す操作」は、再結晶の例として見る方が適切です。
  「インクに含まれる色素を分ける操作」は、クロマトグラフィーの例として見る方が適切です。
  「水とエタノールの混合物を分ける操作」が正しいです。これは蒸留の例です。
  「酸素だけからなる気体」は、純物質の例として見る方が適切です。
