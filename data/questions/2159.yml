# 高校化学 問159
id: 2159
type: single_choice
text: |
  電離平衡と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水溶液に電流を流して物質を分解する場面"
  - "金属イオンが電子を受け取って析出する電極を考える場面"
  - "物質を燃やしたときに熱が出ることを考える場面"
  - "弱酸が一部だけ電離している水溶液を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  弱酸が一部だけ電離している水溶液を考える場面は、電離平衡と結び付きが強い場面です。したがって、正解は「弱酸が一部だけ電離している水溶液を考える場面」です。
  
  「水溶液に電流を流して物質を分解する場面」は、電気分解と結び付きが強い場面です。
  「金属イオンが電子を受け取って析出する電極を考える場面」は、陰極と結び付きが強い場面です。
  「物質を燃やしたときに熱が出ることを考える場面」は、反応熱と結び付きが強い場面です。
  「弱酸が一部だけ電離している水溶液を考える場面」が正しいです。これは電離平衡と結び付きが強い場面です。
