# 化学基礎 問216
id: 1256
type: single_choice
text: |
  「炭素 12 の 12」に最も関係が深い語として、適切なものはどれか。
choices:
  - "同位体"
  - "質量数"
  - "周期律"
  - "最外殻電子"
correct: 1
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「炭素 12 の 12」に最も関係が深いのは質量数です。したがって、正解は「質量数」です。
  
  「同位体」は、この例に最も関係が深い語ではありません。
  「質量数」が正しいです。この例は質量数に関係しています。
  「周期律」は、この例に最も関係が深い語ではありません。
  「最外殻電子」は、この例に最も関係が深い語ではありません。
