# 化学基礎 問36
id: 703
type: single_choice
text: |
  化学反応式 2H2 + O2 → 2H2O における H2 と O2 の物質量の比として、最も適切なものはどれか。
choices:
  - "1 : 2"
  - "2 : 1"
  - "1 : 1"
  - "2 : 3"
correct: 1
explanation: |
  この問題は、「化学反応式の係数が何を表しているか」を考える問題です。
  
  化学反応式の係数は、反応に関わる物質量の比を表しています。2H2 + O2 → 2H2O では、H2 と O2 の比は 2 : 1 です。したがって、正解は「2 : 1」です。
  
  「1 : 2」は、係数の比と合っていません。
  「2 : 1」が正しいです。反応式の係数から読み取れます。
  「1 : 1」は、係数の比と合っていません。
  「2 : 3」は、係数の比と合っていません。
