# 高校化学 問324
id: 2324
type: single_choice
text: |
  「食塩水が純水より蒸発しにくくなることを考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "塩基解離定数"
  - "溶解度"
  - "蒸気圧降下"
  - "溶解平衡"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  食塩水が純水より蒸発しにくくなることを考える場面 と最も関係が深いのは蒸気圧降下です。したがって、正解は「蒸気圧降下」です。
  
  「塩基解離定数」は、「どの塩基がより電離しやすいかを比べる場面」と結び付きが強い語です。
  「溶解度」は、「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」と結び付きが強い語です。
  「蒸気圧降下」が正しいです。この具体例と最も関係が深い語です。
  「溶解平衡」は、「飽和溶液で見かけ上変化が止まっている場面」と結び付きが強い語です。
