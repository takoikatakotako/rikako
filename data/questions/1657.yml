# 化学基礎 問617
id: 1657
type: single_choice
text: |
  「陽子数が同じで中性子数が異なること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "塩基"
  - "酸化剤"
  - "同位体"
  - "放射性同位体"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「陽子数が同じで中性子数が異なること」という見方が大切なのは同位体です。したがって、正解は「同位体」です。
  
  「塩基」は、その語で大切なのは「水酸化物イオンや水素イオンの受け取りに注目すること」という見方です。
  「酸化剤」は、その語で大切なのは「相手を酸化させ、自分は還元されること」という見方です。
  「同位体」が正しいです。この見方が大切な語です。
  「放射性同位体」は、その語で大切なのは「放射線を出す同位体であること」という見方です。
