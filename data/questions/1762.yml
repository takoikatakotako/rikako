# 化学基礎 問722
id: 1762
type: single_choice
text: |
  「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "小さな単位が多数つながっていること"
  - "電気的な引力で結び付くこと"
  - "成分が二種類以上まざっていること"
  - "液体から固体への変化であること"
correct: 1
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」では、「電気的な引力で結び付くこと」という見方が大切です。したがって、正解は「電気的な引力で結び付くこと」です。
  
  「小さな単位が多数つながっていること」は、その見方はポリエチレンやタンパク質のような長い分子を考える場面よりも高分子化合物と結び付きが強いです。
  「電気的な引力で結び付くこと」が正しいです。この具体例で大切になる見方です。
  「成分が二種類以上まざっていること」は、その見方は空気や食塩水のように複数の物質が混ざったものを考える場面よりも混合物と結び付きが強いです。
  「液体から固体への変化であること」は、その見方は水を冷やして氷にする場面よりも凝固と結び付きが強いです。
