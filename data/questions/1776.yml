# 化学基礎 問736
id: 1776
type: single_choice
text: |
  「BTB溶液やフェノールフタレインで液性を調べる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "液体から固体への変化であること"
  - "電子を失って正に帯電すること"
  - "電荷のかたよりがほとんどないこと"
  - "色の変化で液性を見分けること"
correct: 3
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「BTB溶液やフェノールフタレインで液性を調べる場面」では、「色の変化で液性を見分けること」という見方が大切です。したがって、正解は「色の変化で液性を見分けること」です。
  
  「液体から固体への変化であること」は、その見方は水を冷やして氷にする場面よりも凝固と結び付きが強いです。
  「電子を失って正に帯電すること」は、その見方はナトリウム原子が電子を1個失って Na+ になる場面よりも陽イオンと結び付きが強いです。
  「電荷のかたよりがほとんどないこと」は、その見方は酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面よりも無極性分子と結び付きが強いです。
  「色の変化で液性を見分けること」が正しいです。この具体例で大切になる見方です。
