# 高校化学 問836
id: 2836
type: single_choice
text: |
  「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "ヒドロキシ基をもつこと"
  - "アミノ酸どうしをつなぐ結合であること"
  - "一定圧力での熱の出入りに注目すること"
  - "蒸発と凝縮がつり合うこと"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」を理解する上では、「一定圧力での熱の出入りに注目すること」という見方が大切です。したがって、正解は「一定圧力での熱の出入りに注目すること」です。
  
  「ヒドロキシ基をもつこと」は、その見方はアルコールに関係します。
  「アミノ酸どうしをつなぐ結合であること」は、その見方はペプチド結合に関係します。
  「一定圧力での熱の出入りに注目すること」が正しいです。この説明と結び付きが強い見方です。
  「蒸発と凝縮がつり合うこと」は、その見方は気液平衡に関係します。
