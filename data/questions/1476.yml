# 化学基礎 問436
id: 1476
type: single_choice
text: |
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "電離度"
  - "還元"
  - "指示薬"
  - "還元剤"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。 に当てはまる語は指示薬です。したがって、正解は「指示薬」です。
  
  「電離度」は、「溶けた物質のうち、電離してイオンになった割合である。」に当てはまる語です。
  「還元」は、「物質が酸素を失う、または電子を受け取る変化である。」に当てはまる語です。
  「指示薬」が正しいです。「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」に当てはまる語です。
  「還元剤」は、「相手を還元させ、自身は酸化される物質である。」に当てはまる語です。
