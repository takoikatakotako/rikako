# 化学基礎 問19
id: 686
type: single_choice
text: |
  次のうち、化合物として最も適切なものはどれか。
choices:
  - "酸素"
  - "鉄"
  - "水"
  - "銅"
correct: 2
explanation: |
  この問題は、「複数の元素が結び付いてできた物質はどれか」を考える問題です。
  
  水は水素と酸素という二つの元素からできているので化合物です。一方、酸素、鉄、銅はそれぞれ単体です。したがって、正解は「水」です。
  
  「酸素」は、一種類の元素だけからなる単体です。
  「鉄」は、一種類の元素だけからなる単体です。
  「水」が正しいです。水素と酸素からできている化合物です。
  「銅」は、一種類の元素だけからなる単体です。
