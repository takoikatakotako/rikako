# 化学基礎 問469
id: 1509
type: single_choice
text: |
  最外殻電子を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "物質の種類が変わらないこと"
  - "粒子の数をまとめて扱う単位であること"
  - "化学結合やイオンのできやすさに関係すること"
  - "反応する物質とできる物質の関係を式で示すこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  最外殻電子では、「化学結合やイオンのできやすさに関係すること」という見方が大切です。したがって、正解は「化学結合やイオンのできやすさに関係すること」です。
  
  「物質の種類が変わらないこと」は、物理変化に関係する見方です。
  「粒子の数をまとめて扱う単位であること」は、モルに関係する見方です。
  「化学結合やイオンのできやすさに関係すること」が正しいです。最外殻電子の要点を表しています。
  「反応する物質とできる物質の関係を式で示すこと」は、化学反応式に関係する見方です。
