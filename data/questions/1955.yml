# 化学基礎 問915
id: 1955
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "陽イオン / 酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面"
  - "無極性分子 / レモン水とせっけん水の酸性・塩基性を比べる場面"
  - "原子番号 / ナトリウムの陽子数から元素を区別する場面"
  - "pH / ナトリウム原子が電子を1個失って Na+ になる場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「原子番号 / ナトリウムの陽子数から元素を区別する場面」です。したがって、正解は「原子番号 / ナトリウムの陽子数から元素を区別する場面」です。
  
  「陽イオン / 酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」は、用語と場面の対応が合っていません。
  「無極性分子 / レモン水とせっけん水の酸性・塩基性を比べる場面」は、用語と場面の対応が合っていません。
  「原子番号 / ナトリウムの陽子数から元素を区別する場面」が正しいです。用語と場面の対応が合っています。
  「pH / ナトリウム原子が電子を1個失って Na+ になる場面」は、用語と場面の対応が合っていません。
