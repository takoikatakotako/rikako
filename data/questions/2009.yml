# 化学基礎 問969
id: 2009
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "化学反応式 / 酸素との結び付きや電子の放出に注目すること"
  - "酸化 / 水溶液や融解状態で電流を通すこと"
  - "電解質 / 反応する物質とできる物質の関係を式で示すこと"
  - "最外殻電子 / 化学結合やイオンのできやすさに関係すること"
correct: 3
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「最外殻電子 / 化学結合やイオンのできやすさに関係すること」です。したがって、正解は「最外殻電子 / 化学結合やイオンのできやすさに関係すること」です。
  
  「化学反応式 / 酸素との結び付きや電子の放出に注目すること」は、用語と要点の対応が合っていません。
  「酸化 / 水溶液や融解状態で電流を通すこと」は、用語と要点の対応が合っていません。
  「電解質 / 反応する物質とできる物質の関係を式で示すこと」は、用語と要点の対応が合っていません。
  「最外殻電子 / 化学結合やイオンのできやすさに関係すること」が正しいです。用語と要点の対応が合っています。
