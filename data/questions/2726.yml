# 高校化学 問726
id: 2726
type: single_choice
text: |
  「溶質があると凝固点が下がること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "ルシャトリエの原理"
  - "アルカリ土類金属"
  - "不飽和炭化水素"
  - "凝固点降下"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「溶質があると凝固点が下がること」という見方が大切なのは凝固点降下です。したがって、正解は「凝固点降下」です。
  
  「ルシャトリエの原理」は、その語で大切なのは「加えた変化を打ち消す向きに平衡が動くこと」という見方です。
  「アルカリ土類金属」は、その語で大切なのは「2 価の陽イオンになりやすいこと」という見方です。
  「不飽和炭化水素」は、その語で大切なのは「多重結合をもつこと」という見方です。
  「凝固点降下」が正しいです。この見方が大切な語です。
