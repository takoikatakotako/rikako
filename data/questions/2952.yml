# 高校化学 問952
id: 2952
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "分圧の法則 / 食塩を加えても底に残るようになった食塩水を考える場面"
  - "飽和溶液 / デンプンやゼラチンが水中で安定しやすい場面"
  - "親水コロイド / 酸素と窒素が混ざった気体の圧力を考える場面"
  - "活性化エネルギー / 加熱すると反応が進みやすくなる理由を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「活性化エネルギー / 加熱すると反応が進みやすくなる理由を考える場面」です。したがって、正解は「活性化エネルギー / 加熱すると反応が進みやすくなる理由を考える場面」です。
  
  「分圧の法則 / 食塩を加えても底に残るようになった食塩水を考える場面」は、用語と場面の対応が合っていません。
  「飽和溶液 / デンプンやゼラチンが水中で安定しやすい場面」は、用語と場面の対応が合っていません。
  「親水コロイド / 酸素と窒素が混ざった気体の圧力を考える場面」は、用語と場面の対応が合っていません。
  「活性化エネルギー / 加熱すると反応が進みやすくなる理由を考える場面」が正しいです。用語と場面の対応が合っています。
