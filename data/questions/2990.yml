# 高校化学 問990
id: 2990
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "陰極 / 中性の水で H+ と OH- の関係を考える場面"
  - "ナイロン / 衣類やロープに使われる合成繊維を考える場面"
  - "水のイオン積 / 酸化アルミニウムが酸にも塩基にも溶ける場面"
  - "両性酸化物 / 金属イオンが電子を受け取って析出する電極を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「ナイロン / 衣類やロープに使われる合成繊維を考える場面」です。したがって、正解は「ナイロン / 衣類やロープに使われる合成繊維を考える場面」です。
  
  「陰極 / 中性の水で H+ と OH- の関係を考える場面」は、用語と場面の対応が合っていません。
  「ナイロン / 衣類やロープに使われる合成繊維を考える場面」が正しいです。用語と場面の対応が合っています。
  「水のイオン積 / 酸化アルミニウムが酸にも塩基にも溶ける場面」は、用語と場面の対応が合っていません。
  「両性酸化物 / 金属イオンが電子を受け取って析出する電極を考える場面」は、用語と場面の対応が合っていません。
