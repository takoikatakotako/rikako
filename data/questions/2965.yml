# 高校化学 問965
id: 2965
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "酸解離定数 / どの酸がより電離しやすいかを比べる場面"
  - "蒸気圧降下 / 物質を燃やしたときに熱が出ることを考える場面"
  - "反応熱 / 水素を使って発電し、水を生じる仕組みを考える場面"
  - "燃料電池 / 食塩水が純水より蒸発しにくくなることを考える場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「酸解離定数 / どの酸がより電離しやすいかを比べる場面」です。したがって、正解は「酸解離定数 / どの酸がより電離しやすいかを比べる場面」です。
  
  「酸解離定数 / どの酸がより電離しやすいかを比べる場面」が正しいです。用語と場面の対応が合っています。
  「蒸気圧降下 / 物質を燃やしたときに熱が出ることを考える場面」は、用語と場面の対応が合っていません。
  「反応熱 / 水素を使って発電し、水を生じる仕組みを考える場面」は、用語と場面の対応が合っていません。
  「燃料電池 / 食塩水が純水より蒸発しにくくなることを考える場面」は、用語と場面の対応が合っていません。
