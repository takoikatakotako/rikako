# 高校化学 問242
id: 2242
type: single_choice
text: |
  「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "鉛蓄電池"
  - "燃料電池"
  - "陽極"
  - "光合成"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。 に当てはまる語は光合成です。したがって、正解は「光合成」です。
  
  「鉛蓄電池」は、「鉛とその化合物を用いた、充電して繰り返し使える電池である。」に当てはまる語です。
  「燃料電池」は、「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」に当てはまる語です。
  「陽極」は、「電気分解で酸化が起こる電極である。」に当てはまる語です。
  「光合成」が正しいです。「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」に当てはまる語です。
