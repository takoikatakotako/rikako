# 高校化学 問403
id: 2403
type: single_choice
text: |
  沸点を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水となじみやすく安定しやすいこと"
  - "分子の集まり方や沸点に関係すること"
  - "蒸気圧と外圧のつり合いに注目すること"
  - "液体から出た蒸気が示す圧力に注目すること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  沸点では、「蒸気圧と外圧のつり合いに注目すること」という見方が大切です。したがって、正解は「蒸気圧と外圧のつり合いに注目すること」です。
  
  「水となじみやすく安定しやすいこと」は、親水コロイドに関係する見方です。
  「分子の集まり方や沸点に関係すること」は、分子間力に関係する見方です。
  「蒸気圧と外圧のつり合いに注目すること」が正しいです。沸点の要点を表しています。
  「液体から出た蒸気が示す圧力に注目すること」は、蒸気圧に関係する見方です。
