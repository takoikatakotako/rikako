# 高校化学 問337
id: 2337
type: single_choice
text: |
  「複数の反応式を組み合わせて全体の反応熱を求める場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "リチウムイオン電池"
  - "電気分解"
  - "陰極"
  - "ヘスの法則"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  複数の反応式を組み合わせて全体の反応熱を求める場面 と最も関係が深いのはヘスの法則です。したがって、正解は「ヘスの法則」です。
  
  「リチウムイオン電池」は、「スマートフォンやノートパソコンの電池を考える場面」と結び付きが強い語です。
  「電気分解」は、「水溶液に電流を流して物質を分解する場面」と結び付きが強い語です。
  「陰極」は、「金属イオンが電子を受け取って析出する電極を考える場面」と結び付きが強い語です。
  「ヘスの法則」が正しいです。この具体例と最も関係が深い語です。
