# 高校化学 問581
id: 2581
type: single_choice
text: |
  「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "メタンの水素が塩素に置き換わる場面"
  - "ホルムアルデヒドやアセトアルデヒドを考える場面"
  - "血糖や発酵の材料として使われる場面"
  - "氷を水に変えるのに必要な熱を考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」と最も関係が深い場面は「メタンの水素が塩素に置き換わる場面」です。したがって、正解は「メタンの水素が塩素に置き換わる場面」です。
  
  「メタンの水素が塩素に置き換わる場面」が正しいです。この説明と結び付きが強い場面です。
  「ホルムアルデヒドやアセトアルデヒドを考える場面」は、「分子の端にアルデヒド基をもつ有機化合物である。」と結び付きが強い場面です。
  「血糖や発酵の材料として使われる場面」は、「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」と結び付きが強い場面です。
  「氷を水に変えるのに必要な熱を考える場面」は、「固体1 molが融解するときに吸収する熱量である。」と結び付きが強い場面です。
