# 化学基礎 問950
id: 1990
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "純物質 / ぬれた床の水がしだいに乾く場面"
  - "化学が拓く世界 / 電池、医薬品、素材開発などに化学が生かされる場面"
  - "蒸発 / ナトリウムが電子を1個失いやすい理由を考える場面"
  - "最外殻電子 / 酸素だけが入った容器を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「化学が拓く世界 / 電池、医薬品、素材開発などに化学が生かされる場面」です。したがって、正解は「化学が拓く世界 / 電池、医薬品、素材開発などに化学が生かされる場面」です。
  
  「純物質 / ぬれた床の水がしだいに乾く場面」は、用語と場面の対応が合っていません。
  「化学が拓く世界 / 電池、医薬品、素材開発などに化学が生かされる場面」が正しいです。用語と場面の対応が合っています。
  「蒸発 / ナトリウムが電子を1個失いやすい理由を考える場面」は、用語と場面の対応が合っていません。
  「最外殻電子 / 酸素だけが入った容器を考える場面」は、用語と場面の対応が合っていません。
