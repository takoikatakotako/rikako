# 化学基礎 問217
id: 1257
type: single_choice
text: |
  「炭素 12 と炭素 14」に最も関係が深い語として、適切なものはどれか。
choices:
  - "周期律"
  - "最外殻電子"
  - "同位体"
  - "陽イオン"
correct: 2
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「炭素 12 と炭素 14」に最も関係が深いのは同位体です。したがって、正解は「同位体」です。
  
  「周期律」は、この例に最も関係が深い語ではありません。
  「最外殻電子」は、この例に最も関係が深い語ではありません。
  「同位体」が正しいです。この例は同位体に関係しています。
  「陽イオン」は、この例に最も関係が深い語ではありません。
