# 高校化学 問973
id: 2973
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "配位結合 / アンモニアが金属イオンに電子対を与える場面"
  - "電気泳動 / 懐中電灯や時計に入っている電池を考える場面"
  - "乾電池 / 生成物から再び反応物が生じる場面を考えるとき"
  - "可逆反応 / コロイド粒子が陽極や陰極へ移動する様子を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「配位結合 / アンモニアが金属イオンに電子対を与える場面」です。したがって、正解は「配位結合 / アンモニアが金属イオンに電子対を与える場面」です。
  
  「配位結合 / アンモニアが金属イオンに電子対を与える場面」が正しいです。用語と場面の対応が合っています。
  「電気泳動 / 懐中電灯や時計に入っている電池を考える場面」は、用語と場面の対応が合っていません。
  「乾電池 / 生成物から再び反応物が生じる場面を考えるとき」は、用語と場面の対応が合っていません。
  「可逆反応 / コロイド粒子が陽極や陰極へ移動する様子を考える場面」は、用語と場面の対応が合っていません。
