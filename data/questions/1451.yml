# 化学基礎 問411
id: 1451
type: single_choice
text: |
  「固体が液体に変わる状態変化である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "単体"
  - "融解"
  - "物理変化"
  - "原子番号"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  固体が液体に変わる状態変化である。 に当てはまる語は融解です。したがって、正解は「融解」です。
  
  「単体」は、「一種類の元素だけからできている物質である。」に当てはまる語です。
  「融解」が正しいです。「固体が液体に変わる状態変化である。」に当てはまる語です。
  「物理変化」は、「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」に当てはまる語です。
  「原子番号」は、「原子核の中にある陽子の数を表す数である。」に当てはまる語です。
