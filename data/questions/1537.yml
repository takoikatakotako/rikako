# 化学基礎 問497
id: 1537
type: single_choice
text: |
  炎色反応を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸と塩基が打ち消し合うこと"
  - "どのくらいイオンに分かれるかを表すこと"
  - "金属元素ごとに炎の色が異なること"
  - "成分が一種類で性質が一定であること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  炎色反応では、「金属元素ごとに炎の色が異なること」という見方が大切です。したがって、正解は「金属元素ごとに炎の色が異なること」です。
  
  「酸と塩基が打ち消し合うこと」は、中和に関係する見方です。
  「どのくらいイオンに分かれるかを表すこと」は、電離度に関係する見方です。
  「金属元素ごとに炎の色が異なること」が正しいです。炎色反応の要点を表しています。
  「成分が一種類で性質が一定であること」は、純物質に関係する見方です。
