# 高校化学 問477
id: 2477
type: single_choice
text: |
  銅を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電気伝導性が高く、特徴的な色のイオンをつくること"
  - "電子対の与え手と受け手に注目すること"
  - "金属元素ごとに炎の色が異なること"
  - "使い切りの電池であること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  銅では、「電気伝導性が高く、特徴的な色のイオンをつくること」という見方が大切です。したがって、正解は「電気伝導性が高く、特徴的な色のイオンをつくること」です。
  
  「電気伝導性が高く、特徴的な色のイオンをつくること」が正しいです。銅の要点を表しています。
  「電子対の与え手と受け手に注目すること」は、配位結合に関係する見方です。
  「金属元素ごとに炎の色が異なること」は、炎色反応に関係する見方です。
  「使い切りの電池であること」は、乾電池に関係する見方です。
