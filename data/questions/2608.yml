# 高校化学 問608
id: 2608
type: single_choice
text: |
  「注射器の口をふさいで押すと体積が減って圧力が上がる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "一定温度で一定量の気体の圧力は体積に反比例するという法則である。"
  - "溶液の沸点が純粋な溶媒より高くなる現象である。"
  - "一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。"
  - "電気エネルギーを使って自発的でない化学変化を起こす操作である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「注射器の口をふさいで押すと体積が減って圧力が上がる場面」を説明した文として適切なのは「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」です。したがって、正解は「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」です。
  
  「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」が正しいです。この具体例を説明した文です。
  「溶液の沸点が純粋な溶媒より高くなる現象である。」は、この説明は「食塩水の沸点が水より少し高くなることを考える場面」と結び付きが強いです。
  「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」は、この説明は「反応前後で熱の出入りを比較する場面」と結び付きが強いです。
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」は、この説明は「水溶液に電流を流して物質を分解する場面」と結び付きが強いです。
