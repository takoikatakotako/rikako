# 高校化学 問207
id: 2207
type: single_choice
text: |
  「液体1 molが気体になるときに吸収する熱量である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "蒸発熱"
  - "溶解度"
  - "溶解平衡"
  - "沸点上昇"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  液体1 molが気体になるときに吸収する熱量である。 に当てはまる語は蒸発熱です。したがって、正解は「蒸発熱」です。
  
  「蒸発熱」が正しいです。「液体1 molが気体になるときに吸収する熱量である。」に当てはまる語です。
  「溶解度」は、「一定量の溶媒に溶けることのできる溶質の最大量である。」に当てはまる語です。
  「溶解平衡」は、「溶ける速さと析出する速さが等しくなっている平衡である。」に当てはまる語です。
  「沸点上昇」は、「溶液の沸点が純粋な溶媒より高くなる現象である。」に当てはまる語です。
