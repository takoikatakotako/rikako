# 化学基礎 問377
id: 1417
type: single_choice
text: |
  無極性分子と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面"
  - "6.0×10^23個の粒子をひとまとまりとして数える場面"
  - "水素と酸素から水ができる反応を式で表す場面"
  - "水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面は、無極性分子と結び付きが強い場面です。したがって、正解は「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」です。
  
  「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」が正しいです。これは無極性分子と結び付きが強い場面です。
  「6.0×10^23個の粒子をひとまとまりとして数える場面」は、モルと結び付きが強い場面です。
  「水素と酸素から水ができる反応を式で表す場面」は、化学反応式と結び付きが強い場面です。
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」は、塩基と結び付きが強い場面です。
