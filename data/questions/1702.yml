# 化学基礎 問662
id: 1702
type: single_choice
text: |
  「液体が気体になる状態変化である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸と塩基が打ち消し合うこと"
  - "相手を還元させ、自分は酸化されること"
  - "液体から気体への変化であること"
  - "金属元素ごとに炎の色が異なること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「液体が気体になる状態変化である。」を理解する上では、「液体から気体への変化であること」という見方が大切です。したがって、正解は「液体から気体への変化であること」です。
  
  「酸と塩基が打ち消し合うこと」は、その見方は中和に関係します。
  「相手を還元させ、自分は酸化されること」は、その見方は還元剤に関係します。
  「液体から気体への変化であること」が正しいです。この説明と結び付きが強い見方です。
  「金属元素ごとに炎の色が異なること」は、その見方は炎色反応に関係します。
