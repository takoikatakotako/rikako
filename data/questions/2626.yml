# 高校化学 問626
id: 2626
type: single_choice
text: |
  「凍結防止剤をまいた道路の水が凍りにくくなる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "一度使い切ることを前提にした一次電池の代表例である。"
  - "正反応と逆反応の両方が起こり得る反応である。"
  - "溶液の凝固点が純粋な溶媒より低くなる現象である。"
  - "酸の電離のしやすさを表す定数である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「凍結防止剤をまいた道路の水が凍りにくくなる場面」を説明した文として適切なのは「溶液の凝固点が純粋な溶媒より低くなる現象である。」です。したがって、正解は「溶液の凝固点が純粋な溶媒より低くなる現象である。」です。
  
  「一度使い切ることを前提にした一次電池の代表例である。」は、この説明は「懐中電灯や時計に入っている電池を考える場面」と結び付きが強いです。
  「正反応と逆反応の両方が起こり得る反応である。」は、この説明は「生成物から再び反応物が生じる場面を考えるとき」と結び付きが強いです。
  「溶液の凝固点が純粋な溶媒より低くなる現象である。」が正しいです。この具体例を説明した文です。
  「酸の電離のしやすさを表す定数である。」は、この説明は「どの酸がより電離しやすいかを比べる場面」と結び付きが強いです。
