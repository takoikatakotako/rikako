# 高校化学 問830
id: 2830
type: single_choice
text: |
  「コロイド粒子が不規則に動いて見える現象である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "粒子が周囲の分子にぶつかって動くこと"
  - "電気伝導性が高く、特徴的な色のイオンをつくること"
  - "ベンゼン環にヒドロキシ基が直接つくこと"
  - "資源を循環させて無駄を減らすこと"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「コロイド粒子が不規則に動いて見える現象である。」を理解する上では、「粒子が周囲の分子にぶつかって動くこと」という見方が大切です。したがって、正解は「粒子が周囲の分子にぶつかって動くこと」です。
  
  「粒子が周囲の分子にぶつかって動くこと」が正しいです。この説明と結び付きが強い見方です。
  「電気伝導性が高く、特徴的な色のイオンをつくること」は、その見方は銅に関係します。
  「ベンゼン環にヒドロキシ基が直接つくこと」は、その見方はフェノールに関係します。
  「資源を循環させて無駄を減らすこと」は、その見方は資源の再利用に関係します。
