# 高校化学 問545
id: 2545
type: single_choice
text: |
  「リチウムイオンの移動を利用する充電式電池である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "スマートフォンやノートパソコンの電池を考える場面"
  - "電気分解で気体が発生する電極側を考える場面"
  - "弱酸が一部だけ電離している水溶液を考える場面"
  - "ネオンやアルゴンが反応しにくい理由を考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「リチウムイオンの移動を利用する充電式電池である。」と最も関係が深い場面は「スマートフォンやノートパソコンの電池を考える場面」です。したがって、正解は「スマートフォンやノートパソコンの電池を考える場面」です。
  
  「スマートフォンやノートパソコンの電池を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「電気分解で気体が発生する電極側を考える場面」は、「電気分解で酸化が起こる電極である。」と結び付きが強い場面です。
  「弱酸が一部だけ電離している水溶液を考える場面」は、「電離する粒子と電離していない粒子が平衡になっている状態である。」と結び付きが強い場面です。
  「ネオンやアルゴンが反応しにくい理由を考える場面」は、「周期表18族に属し、化学的に安定な気体元素の総称である。」と結び付きが強い場面です。
