# 高校化学 問906
id: 2906
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "酸解離定数 / さびや鉄鋼の利用を考える場面"
  - "融解熱 / 氷を水に変えるのに必要な熱を考える場面"
  - "鉄 / 芳香族化合物の基本構造を学ぶ場面"
  - "ベンゼン / どの酸がより電離しやすいかを比べる場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「融解熱 / 氷を水に変えるのに必要な熱を考える場面」です。したがって、正解は「融解熱 / 氷を水に変えるのに必要な熱を考える場面」です。
  
  「酸解離定数 / さびや鉄鋼の利用を考える場面」は、用語と場面の対応が合っていません。
  「融解熱 / 氷を水に変えるのに必要な熱を考える場面」が正しいです。用語と場面の対応が合っています。
  「鉄 / 芳香族化合物の基本構造を学ぶ場面」は、用語と場面の対応が合っていません。
  「ベンゼン / どの酸がより電離しやすいかを比べる場面」は、用語と場面の対応が合っていません。
