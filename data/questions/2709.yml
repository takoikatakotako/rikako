# 高校化学 問709
id: 2709
type: single_choice
text: |
  「圧力一定で体積と絶対温度の関係を見ること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "吸熱反応"
  - "反応速度"
  - "シャルルの法則"
  - "塩の加水分解"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「圧力一定で体積と絶対温度の関係を見ること」という見方が大切なのはシャルルの法則です。したがって、正解は「シャルルの法則」です。
  
  「吸熱反応」は、その語で大切なのは「周囲から熱を受け取る反応であること」という見方です。
  「反応速度」は、その語で大切なのは「時間あたりにどれだけ変化するかを見ること」という見方です。
  「シャルルの法則」が正しいです。この見方が大切な語です。
  「塩の加水分解」は、その語で大切なのは「塩のイオンが水と反応すること」という見方です。
