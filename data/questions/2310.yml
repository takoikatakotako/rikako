# 高校化学 問310
id: 2310
type: single_choice
text: |
  「気体の量と温度から体積や圧力を見積もる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "理想気体の状態方程式"
  - "ブラウン運動"
  - "電気泳動"
  - "疎水コロイド"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  気体の量と温度から体積や圧力を見積もる場面 と最も関係が深いのは理想気体の状態方程式です。したがって、正解は「理想気体の状態方程式」です。
  
  「理想気体の状態方程式」が正しいです。この具体例と最も関係が深い語です。
  「ブラウン運動」は、「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」と結び付きが強い語です。
  「電気泳動」は、「コロイド粒子が陽極や陰極へ移動する様子を考える場面」と結び付きが強い語です。
  「疎水コロイド」は、「金属や硫黄のコロイドが電解質で沈みやすい場面」と結び付きが強い語です。
