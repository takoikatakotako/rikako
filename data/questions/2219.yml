# 高校化学 問219
id: 2219
type: single_choice
text: |
  「結晶のような規則正しい配列をもたない固体である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "アモルファス"
  - "親水コロイド"
  - "結晶格子"
  - "分子結晶"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  結晶のような規則正しい配列をもたない固体である。 に当てはまる語はアモルファスです。したがって、正解は「アモルファス」です。
  
  「アモルファス」が正しいです。「結晶のような規則正しい配列をもたない固体である。」に当てはまる語です。
  「親水コロイド」は、「水との親和性が高く、比較的安定なコロイドである。」に当てはまる語です。
  「結晶格子」は、「結晶の中で粒子が規則正しく並んだ構造である。」に当てはまる語です。
  「分子結晶」は、「分子どうしが分子間力で集まってできた結晶である。」に当てはまる語です。
