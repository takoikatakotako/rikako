# 高校化学 問495
id: 2495
type: single_choice
text: |
  グルコースを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "ヒドロキシ基をもつこと"
  - "カルボキシ基をもち酸性を示すこと"
  - "単糖類でエネルギー源になりやすいこと"
  - "ベンゼン環をもつこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  グルコースでは、「単糖類でエネルギー源になりやすいこと」という見方が大切です。したがって、正解は「単糖類でエネルギー源になりやすいこと」です。
  
  「ヒドロキシ基をもつこと」は、アルコールに関係する見方です。
  「カルボキシ基をもち酸性を示すこと」は、カルボン酸に関係する見方です。
  「単糖類でエネルギー源になりやすいこと」が正しいです。グルコースの要点を表しています。
  「ベンゼン環をもつこと」は、ベンゼンに関係する見方です。
