# 令和7年度 ITパスポート 公開問題 問17
id: 224
type: single_choice
text: |
  プロセスマイニングに関する記述として、最も適切なものはどれか。
choices:
  - "ー連の業務で実際に遂行したシステムの操作ログなどを収集し、現行の業務プロセスの可視化、分析、モニタリングによって業務の課題を特定して改善を図る手法やツールである。"
  - "業務プロセスをそれまでの習慣などにとらわれず、抜本的に再構築して業務効率の改善を図る手法である。"
  - "コンタクトセンターへの問合せ内容や SNS の投稿内容の分析などの業務プロセスで用いられる、膨大な文章データから必要な情報を抽出して分析する手法である。"
  - "大量の計算処理で正しい値を算出する一連のプロセスを通じて、暗号資産を取得する手段である。"
correct: 0
explanation: |
  プロセスマイニングは、業務システムの操作ログなどから実際の業務プロセスを可視化し、分析や改善につなげる手法です。したがって、正解は「ー連の業務で実際に遂行したシステムの操作ログなどを収集し、現行の業務プロセスの可視化、分析、モニタリングによって業務の課題を特定して改善を図る手法やツールである」です。
  
  「ー連の業務で実際に遂行したシステムの操作ログなどを収集し、現行の業務プロセスの可視化、分析、モニタリングによって業務の課題を特定して改善を図る手法やツールである」が正しいです。実データに基づいて現行業務を分析し、改善点を見つける手法です。
  「業務プロセスをそれまでの習慣などにとらわれず、抜本的に再構築して業務効率の改善を図る手法である」はBPRの説明に近いです。
  「コンタクトセンターへの問合せ内容や SNS の投稿内容の分析などの業務プロセスで用いられる、膨大な文章データから必要な情報を抽出して分析する手法である」はテキストマイニングの説明に近いです。
  「大量の計算処理で正しい値を算出する一連のプロセスを通じて、暗号資産を取得する手段である」は暗号資産のマイニングの説明です。
