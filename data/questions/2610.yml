# 高校化学 問610
id: 2610
type: single_choice
text: |
  「気体の量と温度から体積や圧力を見積もる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。"
  - "気体分子中の結合1 molを切るのに必要なエネルギーである。"
  - "気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。"
  - "電気分解で還元が起こる電極である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「気体の量と温度から体積や圧力を見積もる場面」を説明した文として適切なのは「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」です。したがって、正解は「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」です。
  
  「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」は、この説明は「薄い溶液側から濃い溶液側へ水が移動する場面」と結び付きが強いです。
  「気体分子中の結合1 molを切るのに必要なエネルギーである。」は、この説明は「どの結合が切れやすいかを比べる場面」と結び付きが強いです。
  「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」が正しいです。この具体例を説明した文です。
  「電気分解で還元が起こる電極である。」は、この説明は「金属イオンが電子を受け取って析出する電極を考える場面」と結び付きが強いです。
