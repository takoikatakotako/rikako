# 高校化学 問445
id: 2445
type: single_choice
text: |
  リチウムイオン電池を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "軽くて繰り返し使いやすい電池であること"
  - "反応性が高く 1 価の陽イオンになりやすいこと"
  - "非金属で酸化力が強いこと"
  - "酸とも塩基とも反応すること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  リチウムイオン電池では、「軽くて繰り返し使いやすい電池であること」という見方が大切です。したがって、正解は「軽くて繰り返し使いやすい電池であること」です。
  
  「軽くて繰り返し使いやすい電池であること」が正しいです。リチウムイオン電池の要点を表しています。
  「反応性が高く 1 価の陽イオンになりやすいこと」は、アルカリ金属に関係する見方です。
  「非金属で酸化力が強いこと」は、ハロゲンに関係する見方です。
  「酸とも塩基とも反応すること」は、両性酸化物に関係する見方です。
