# 化学基礎 問522
id: 1562
type: single_choice
text: |
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水分子や酸素分子を粒として考える場面"
  - "塩化ナトリウムが陽イオンと陰イオンの引力でできる場面"
  - "水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
  - "酸素や過酸化水素が相手を酸化させる場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」と最も関係が深い場面は「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」です。したがって、正解は「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」です。
  
  「水分子や酸素分子を粒として考える場面」は、「原子が結び付いてできた、物質の性質を示す小さな粒子である。」と結び付きが強い場面です。
  「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」が正しいです。この説明と結び付きが強い場面です。
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」は、「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」と結び付きが強い場面です。
  「酸素や過酸化水素が相手を酸化させる場面」は、「相手を酸化させ、自身は還元される物質である。」と結び付きが強い場面です。
