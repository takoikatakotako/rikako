# 化学基礎 問167
id: 1207
type: single_choice
text: |
  同位体の例として、最も適切なものはどれか。
choices:
  - "ナトリウムとカリウムが似た性質を示すこと"
  - "炭素 12 と炭素 14"
  - "ナトリウムでは最外殻電子が 1 個であること"
  - "Na+"
correct: 1
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  炭素 12 と炭素 14は、同位体の例です。したがって、正解は「炭素 12 と炭素 14」です。
  
  「ナトリウムとカリウムが似た性質を示すこと」は、周期律の例として見る方が適切です。
  「炭素 12 と炭素 14」が正しいです。これは同位体の例です。
  「ナトリウムでは最外殻電子が 1 個であること」は、最外殻電子の例として見る方が適切です。
  「Na+」は、陽イオンの例として見る方が適切です。
