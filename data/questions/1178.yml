# 化学基礎 問138
id: 1178
type: single_choice
text: |
  還元剤についての説明として、最も適切なものはどれか。
choices:
  - "金属が電子を失って陽イオンになりやすい性質の強さを表す。"
  - "相手を還元し、自分は酸化される物質である。"
  - "亜鉛と銅を用いて化学エネルギーを電気エネルギーに変える電池である。"
  - "電池で二つの水溶液の電気的なつり合いを保つために入れる部分である。"
correct: 1
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  還元剤は、相手を還元し、自分は酸化される物質である。したがって、正解は「相手を還元し、自分は酸化される物質である。」です。
  
  「金属が電子を失って陽イオンになりやすい性質の強さを表す。」は、イオン化傾向の説明です。
  「相手を還元し、自分は酸化される物質である。」が正しいです。還元剤の説明です。
  「亜鉛と銅を用いて化学エネルギーを電気エネルギーに変える電池である。」は、ダニエル電池の説明です。
  「電池で二つの水溶液の電気的なつり合いを保つために入れる部分である。」は、塩橋の説明です。
