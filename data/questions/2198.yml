# 高校化学 問198
id: 2198
type: single_choice
text: |
  機能性材料と最も関係が深い場面として、適切なものはどれか。
choices:
  - "グリシンやアラニンの構造を考える場面"
  - "血糖や発酵の材料として使われる場面"
  - "導電性高分子や高性能電池材料を考える場面"
  - "紙や木材の主成分を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  導電性高分子や高性能電池材料を考える場面は、機能性材料と結び付きが強い場面です。したがって、正解は「導電性高分子や高性能電池材料を考える場面」です。
  
  「グリシンやアラニンの構造を考える場面」は、アミノ酸と結び付きが強い場面です。
  「血糖や発酵の材料として使われる場面」は、グルコースと結び付きが強い場面です。
  「導電性高分子や高性能電池材料を考える場面」が正しいです。これは機能性材料と結び付きが強い場面です。
  「紙や木材の主成分を考える場面」は、セルロースと結び付きが強い場面です。
