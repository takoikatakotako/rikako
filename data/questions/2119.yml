# 高校化学 問119
id: 2119
type: single_choice
text: |
  アモルファスと最も関係が深い場面として、適切なものはどれか。
choices:
  - "薄い溶液側から濃い溶液側へ水が移動する場面"
  - "薄暗い部屋でコロイドに光を当てると筋が見える場面"
  - "コロイド溶液から余分な電解質を取り除く場面"
  - "ガラスのように一定の融点を示しにくい固体を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  ガラスのように一定の融点を示しにくい固体を考える場面は、アモルファスと結び付きが強い場面です。したがって、正解は「ガラスのように一定の融点を示しにくい固体を考える場面」です。
  
  「薄い溶液側から濃い溶液側へ水が移動する場面」は、浸透圧と結び付きが強い場面です。
  「薄暗い部屋でコロイドに光を当てると筋が見える場面」は、チンダル現象と結び付きが強い場面です。
  「コロイド溶液から余分な電解質を取り除く場面」は、透析と結び付きが強い場面です。
  「ガラスのように一定の融点を示しにくい固体を考える場面」が正しいです。これはアモルファスと結び付きが強い場面です。
