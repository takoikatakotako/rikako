# 高校化学 問318
id: 2318
type: single_choice
text: |
  「金属が電気を通したりのびたりする理由を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "金属結晶"
  - "共有結合の結晶"
  - "分子間力"
  - "沸点"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  金属が電気を通したりのびたりする理由を考える場面 と最も関係が深いのは金属結晶です。したがって、正解は「金属結晶」です。
  
  「金属結晶」が正しいです。この具体例と最も関係が深い語です。
  「共有結合の結晶」は、「ダイヤモンドや二酸化ケイ素の硬さを考える場面」と結び付きが強い語です。
  「分子間力」は、「水やエタノールの沸点の違いを考える場面」と結び付きが強い語です。
  「沸点」は、「水が沸騰し始める温度を考える場面」と結び付きが強い語です。
