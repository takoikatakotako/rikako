# 高校化学 問803
id: 2803
type: single_choice
text: |
  「液体の蒸気圧が外圧に等しくなる温度である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電気量と生成物の量の比例に注目すること"
  - "蒸気圧と外圧のつり合いに注目すること"
  - "pH の変化をおさえること"
  - "金属イオンと配位子の組合せに注目すること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「液体の蒸気圧が外圧に等しくなる温度である。」を理解する上では、「蒸気圧と外圧のつり合いに注目すること」という見方が大切です。したがって、正解は「蒸気圧と外圧のつり合いに注目すること」です。
  
  「電気量と生成物の量の比例に注目すること」は、その見方はファラデーの法則に関係します。
  「蒸気圧と外圧のつり合いに注目すること」が正しいです。この説明と結び付きが強い見方です。
  「pH の変化をおさえること」は、その見方は緩衝液に関係します。
  「金属イオンと配位子の組合せに注目すること」は、その見方は錯イオンに関係します。
