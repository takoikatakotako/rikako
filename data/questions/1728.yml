# 化学基礎 問688
id: 1728
type: single_choice
text: |
  「物質が酸素を失う、または電子を受け取る変化である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸素の喪失や電子の受け取りに注目すること"
  - "物質の種類が変わらないこと"
  - "陽子数と中性子数の合計であること"
  - "電子を共有して結び付くこと"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「物質が酸素を失う、または電子を受け取る変化である。」を理解する上では、「酸素の喪失や電子の受け取りに注目すること」という見方が大切です。したがって、正解は「酸素の喪失や電子の受け取りに注目すること」です。
  
  「酸素の喪失や電子の受け取りに注目すること」が正しいです。この説明と結び付きが強い見方です。
  「物質の種類が変わらないこと」は、その見方は物理変化に関係します。
  「陽子数と中性子数の合計であること」は、その見方は質量数に関係します。
  「電子を共有して結び付くこと」は、その見方は共有結合に関係します。
