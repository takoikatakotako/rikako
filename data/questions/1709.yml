# 化学基礎 問669
id: 1709
type: single_choice
text: |
  「原子のいちばん外側の電子殻にある電子である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "相手を還元させ、自分は酸化されること"
  - "化学結合やイオンのできやすさに関係すること"
  - "金属元素ごとに炎の色が異なること"
  - "移動しやすさの違いを利用すること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「原子のいちばん外側の電子殻にある電子である。」を理解する上では、「化学結合やイオンのできやすさに関係すること」という見方が大切です。したがって、正解は「化学結合やイオンのできやすさに関係すること」です。
  
  「相手を還元させ、自分は酸化されること」は、その見方は還元剤に関係します。
  「化学結合やイオンのできやすさに関係すること」が正しいです。この説明と結び付きが強い見方です。
  「金属元素ごとに炎の色が異なること」は、その見方は炎色反応に関係します。
  「移動しやすさの違いを利用すること」は、その見方はクロマトグラフィーに関係します。
