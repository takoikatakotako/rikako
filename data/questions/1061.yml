# 令和6年度 ITパスポート 公開問題 問81
id: 1061
type: single_choice
text: |
  一つの表で管理されていた受注データを、受注に関する情報と商品に関する情報に分割して、正規化を行った上で関係データベースの表で管理する。正規化を行った結果の表の組合せとして、最も適切なものはどれか。ここで、同一商品で単価が異なるときは商品番号も異なるものとする。また、発注者名には同姓同名はいないものとする。
choices:
  - "表1: [受注番号, 発注者名] と 表2: [商品名, 個数, 単価]"
  - "表1: [受注番号, 発注者名, 商品番号] と 表2: [商品名, 個数, 単価]"
  - "表1: [受注番号, 発注者名, 商品番号, 個数] と 表2: [商品番号, 商品名]"
  - "表1: [受注番号, 発注者名, 商品番号, 個数] と 表2: [商品名, 単価]"
correct: 3
