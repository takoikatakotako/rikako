# 化学基礎 問751
id: 1791
type: single_choice
text: |
  「水に溶けない固体を液体から分けること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "水溶液の酸性や塩基性の強さを表す尺度である。"
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "金属が電子を失ってイオンになりやすい性質の強さである。"
  - "食品や物質が酸化して変質するのを防ぐために用いられる物質である。"
correct: 1
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「水に溶けない固体を液体から分けること」という見方と最も関係が深い説明は「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」です。したがって、正解は「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」です。
  
  「水溶液の酸性や塩基性の強さを表す尺度である。」は、その説明で大切なのは「酸性と塩基性の強さを数で見ること」という見方です。
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」が正しいです。この見方と最も関係が深い説明です。
  「金属が電子を失ってイオンになりやすい性質の強さである。」は、その説明で大切なのは「金属のイオンになりやすさを比べること」という見方です。
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」は、その説明で大切なのは「酸化による変質を防ぐこと」という見方です。
