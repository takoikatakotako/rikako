# 化学基礎 問947
id: 1987
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "蒸留 / 氷が溶けて水になる場面"
  - "物理変化 / 炭素12で陽子数と中性子数の合計を見る場面"
  - "炎色反応 / ナトリウムで黄色、銅で青緑色を観察する場面"
  - "質量数 / 水とエタノールの混合物を沸点の差で分ける場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「炎色反応 / ナトリウムで黄色、銅で青緑色を観察する場面」です。したがって、正解は「炎色反応 / ナトリウムで黄色、銅で青緑色を観察する場面」です。
  
  「蒸留 / 氷が溶けて水になる場面」は、用語と場面の対応が合っていません。
  「物理変化 / 炭素12で陽子数と中性子数の合計を見る場面」は、用語と場面の対応が合っていません。
  「炎色反応 / ナトリウムで黄色、銅で青緑色を観察する場面」が正しいです。用語と場面の対応が合っています。
  「質量数 / 水とエタノールの混合物を沸点の差で分ける場面」は、用語と場面の対応が合っていません。
