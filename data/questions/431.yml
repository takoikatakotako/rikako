# 令和7年度 ITパスポート 公開問題 問31
id: 431
type: single_choice
text: |
  ERPシステムの説明として、適切なものはどれか。
choices:
  - "企業内の個人がもつ営業に関する知識やノウハウを収集し、共有することによって、効率的、効果的な営業活動を支援するシステム"
  - "経理や人事、生産、販売などの基幹業務と関連する情報を一元管理し、経営資源を最適配分することによって、効率的な経営の実現を支援するシステム"
  - "原材料の調達から生産、販売に関する情報を、企業間で共有・管理することによって、ビジネスプロセスの全体最適を目指すシステム"
  - "個々の顧客に関する情報や対応履歴などを管理することによって、きめ細かい顧客対応を実施し、顧客満足度の向上を支援するシステム"
correct: 1
explanation: |
  ERP は Enterprise Resource Planning の略で、会計、人事、生産、販売などの基幹業務情報を統合管理し、経営資源の最適配分を支援する仕組みです。したがって、正解は「経理や人事、生産、販売などの基幹業務と関連する情報を一元管理し、経営資源を最適配分することによって、効率的な経営の実現を支援するシステム」です。
  
  「企業内の個人がもつ営業に関する知識やノウハウを収集し、共有することによって、効率的、効果的な営業活動を支援するシステム」はSFAやナレッジ共有の説明に近く、ERPではありません。
  「経理や人事、生産、販売などの基幹業務と関連する情報を一元管理し、経営資源を最適配分することによって、効率的な経営の実現を支援するシステム」が正しいです。基幹業務を一元管理して経営効率化を図るシステムがERPです。
  「原材料の調達から生産、販売に関する情報を、企業間で共有・管理することによって、ビジネスプロセスの全体最適を目指すシステム」はSCMの説明に近いです。
  「個々の顧客に関する情報や対応履歴などを管理することによって、きめ細かい顧客対応を実施し、顧客満足度の向上を支援するシステム」はCRMの説明です。
