# 化学基礎 問106
id: 1146
type: single_choice
text: |
  混合物についての説明として、最も適切なものはどれか。
choices:
  - "一種類の元素だけからなる純物質である。"
  - "複数の成分が混ざってできている物質である。"
  - "二種類以上の元素が結び付いてできた純物質である。"
  - "新しい物質ができず、状態や形だけが変わる変化である。"
correct: 1
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  混合物は、複数の成分が混ざってできている物質である。したがって、正解は「複数の成分が混ざってできている物質である。」です。
  
  「一種類の元素だけからなる純物質である。」は、単体の説明です。
  「複数の成分が混ざってできている物質である。」が正しいです。混合物の説明です。
  「二種類以上の元素が結び付いてできた純物質である。」は、化合物の説明です。
  「新しい物質ができず、状態や形だけが変わる変化である。」は、物理変化の説明です。
