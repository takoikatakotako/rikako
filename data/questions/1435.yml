# 化学基礎 問395
id: 1435
type: single_choice
text: |
  非電解質と最も関係が深い場面として、適切なものはどれか。
choices:
  - "医療や年代測定に利用される炭素14を考える場面"
  - "食品の変色や劣化を防ぐためにビタミンCを使う場面"
  - "砂糖水が電流をほとんど通さない場面"
  - "電池、医薬品、素材開発などに化学が生かされる場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  砂糖水が電流をほとんど通さない場面は、非電解質と結び付きが強い場面です。したがって、正解は「砂糖水が電流をほとんど通さない場面」です。
  
  「医療や年代測定に利用される炭素14を考える場面」は、放射性同位体と結び付きが強い場面です。
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」は、酸化防止剤と結び付きが強い場面です。
  「砂糖水が電流をほとんど通さない場面」が正しいです。これは非電解質と結び付きが強い場面です。
  「電池、医薬品、素材開発などに化学が生かされる場面」は、化学が拓く世界と結び付きが強い場面です。
