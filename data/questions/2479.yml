# 高校化学 問479
id: 2479
type: single_choice
text: |
  不飽和炭化水素を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "ベンゼン環をもつこと"
  - "ベンゼン環にアミノ基が直接つくこと"
  - "多重結合をもつこと"
  - "ポリエステルの一種で再利用もしやすいこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  不飽和炭化水素では、「多重結合をもつこと」という見方が大切です。したがって、正解は「多重結合をもつこと」です。
  
  「ベンゼン環をもつこと」は、ベンゼンに関係する見方です。
  「ベンゼン環にアミノ基が直接つくこと」は、アニリンに関係する見方です。
  「多重結合をもつこと」が正しいです。不飽和炭化水素の要点を表しています。
  「ポリエステルの一種で再利用もしやすいこと」は、PETに関係する見方です。
