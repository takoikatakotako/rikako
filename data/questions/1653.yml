# 化学基礎 問613
id: 1653
type: single_choice
text: |
  「液体から固体への変化であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "モル"
  - "電離度"
  - "凝固"
  - "ダニエル電池"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「液体から固体への変化であること」という見方が大切なのは凝固です。したがって、正解は「凝固」です。
  
  「モル」は、その語で大切なのは「粒子の数をまとめて扱う単位であること」という見方です。
  「電離度」は、その語で大切なのは「どのくらいイオンに分かれるかを表すこと」という見方です。
  「凝固」が正しいです。この見方が大切な語です。
  「ダニエル電池」は、その語で大切なのは「化学エネルギーを電気エネルギーに変えること」という見方です。
