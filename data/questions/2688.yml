# 高校化学 問688
id: 2688
type: single_choice
text: |
  「フェノール類の酸性や消毒作用を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "ベンゼン環にヒドロキシ基が直接結び付いた化合物である。"
  - "蒸発する速さと凝縮する速さが等しくなった状態である。"
  - "分子どうしが分子間力で集まってできた結晶である。"
  - "半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「フェノール類の酸性や消毒作用を考える場面」を説明した文として適切なのは「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」です。したがって、正解は「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」です。
  
  「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」が正しいです。この具体例を説明した文です。
  「蒸発する速さと凝縮する速さが等しくなった状態である。」は、この説明は「密閉容器で水面の高さが変わらなくなる場面」と結び付きが強いです。
  「分子どうしが分子間力で集まってできた結晶である。」は、この説明は「ドライアイスやヨウ素の結晶を考える場面」と結び付きが強いです。
  「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」は、この説明は「薄い溶液側から濃い溶液側へ水が移動する場面」と結び付きが強いです。
