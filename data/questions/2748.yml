# 高校化学 問748
id: 2748
type: single_choice
text: |
  「酸化が起こる側の電極であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "不飽和炭化水素"
  - "陽極"
  - "ナイロン"
  - "分子間力"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「酸化が起こる側の電極であること」という見方が大切なのは陽極です。したがって、正解は「陽極」です。
  
  「不飽和炭化水素」は、その語で大切なのは「多重結合をもつこと」という見方です。
  「陽極」が正しいです。この見方が大切な語です。
  「ナイロン」は、その語で大切なのは「丈夫な合成繊維であること」という見方です。
  「分子間力」は、その語で大切なのは「分子の集まり方や沸点に関係すること」という見方です。
