# 化学基礎 問6
id: 673
type: single_choice
text: |
  水 H2O が極性分子であることの説明として、最も適切なものはどれか。
choices:
  - "水分子の中で、電荷の偏りが生じているから。"
  - "水は金属を多く含んでいるから。"
  - "水は必ずイオンとして存在するから。"
  - "水分子の中には原子が一つしかないから。"
correct: 0
explanation: |
  この問題は、「極性分子とはどんな分子か」を確認する問題です。
  
  極性分子は、分子の中で電荷の偏りがある分子です。水分子では、酸素原子と水素原子の間で電子の引き寄せられ方に差があるため、分子全体として偏りが生じます。したがって、正解は「水分子の中で、電荷の偏りが生じているから」です。
  
  「水分子の中で、電荷の偏りが生じているから」が正しいです。これが極性分子の基本的な考え方です。
  「水は金属を多く含んでいるから」は、適切ではありません。水は金属を含む物質ではありません。
  「水は必ずイオンとして存在するから」は、適切ではありません。水は通常は分子として存在します。
  「水分子の中には原子が一つしかないから」は、適切ではありません。水分子は酸素1個と水素2個からできています。
