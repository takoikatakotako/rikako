# 令和6年度 ITパスポート 公開問題 問20
id: 1000
type: single_choice
text: |
  A社では、1千万円を投資して営業支援システムを再構築することを検討している。現状の営業支援システムの運用費が5百万円/年、再構築後の営業支援システムの運用費が4百万円/年、再構築による新たな利益の増加が百万円/年であるとき、この投資の回収期間は何年か。ここで、これら以外の効果、費用などは考慮しないものとし、計算結果は小数点以下第2位を四捨五入するものとする。
choices:
  - "2.5"
  - "3.3"
  - "5.0"
  - "10.0"
correct: 1
