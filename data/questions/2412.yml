# 高校化学 問412
id: 2412
type: single_choice
text: |
  実在気体を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "蒸気圧と外圧のつり合いに注目すること"
  - "蒸発と凝縮がつり合うこと"
  - "液体を気体に変えるための熱に注目すること"
  - "分子の体積と分子間力の影響に注目すること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  実在気体では、「分子の体積と分子間力の影響に注目すること」という見方が大切です。したがって、正解は「分子の体積と分子間力の影響に注目すること」です。
  
  「蒸気圧と外圧のつり合いに注目すること」は、沸点に関係する見方です。
  「蒸発と凝縮がつり合うこと」は、気液平衡に関係する見方です。
  「液体を気体に変えるための熱に注目すること」は、蒸発熱に関係する見方です。
  「分子の体積と分子間力の影響に注目すること」が正しいです。実在気体の要点を表しています。
