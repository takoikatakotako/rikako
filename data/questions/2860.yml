# 高校化学 問860
id: 2860
type: single_choice
text: |
  「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "液体を気体に変えるための熱に注目すること"
  - "自由電子が性質に関係すること"
  - "H+ と OH- の積が一定であること"
  - "コロイドが光を散乱すること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」を理解する上では、「H+ と OH- の積が一定であること」という見方が大切です。したがって、正解は「H+ と OH- の積が一定であること」です。
  
  「液体を気体に変えるための熱に注目すること」は、その見方は蒸発熱に関係します。
  「自由電子が性質に関係すること」は、その見方は金属結晶に関係します。
  「H+ と OH- の積が一定であること」が正しいです。この説明と結び付きが強い見方です。
  「コロイドが光を散乱すること」は、その見方はチンダル現象に関係します。
