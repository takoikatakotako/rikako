# 化学基礎 問226
id: 1266
type: single_choice
text: |
  「水 H2O」に最も関係が深い語として、適切なものはどれか。
choices:
  - "無極性分子"
  - "モル"
  - "モル濃度"
  - "極性分子"
correct: 3
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「水 H2O」に最も関係が深いのは極性分子です。したがって、正解は「極性分子」です。
  
  「無極性分子」は、この例に最も関係が深い語ではありません。
  「モル」は、この例に最も関係が深い語ではありません。
  「モル濃度」は、この例に最も関係が深い語ではありません。
  「極性分子」が正しいです。この例は極性分子に関係しています。
