# 化学基礎 問711
id: 1751
type: single_choice
text: |
  「氷を温めて水にする場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "酸素の喪失や電子の受け取りに注目すること"
  - "水溶液でも電流をほとんど通さないこと"
  - "固体から液体への変化であること"
  - "沸点の違いを利用すること"
correct: 2
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「氷を温めて水にする場面」では、「固体から液体への変化であること」という見方が大切です。したがって、正解は「固体から液体への変化であること」です。
  
  「酸素の喪失や電子の受け取りに注目すること」は、その見方は酸化銅から酸素が取れて銅になる場面よりも還元と結び付きが強いです。
  「水溶液でも電流をほとんど通さないこと」は、その見方は砂糖水が電流をほとんど通さない場面よりも非電解質と結び付きが強いです。
  「固体から液体への変化であること」が正しいです。この具体例で大切になる見方です。
  「沸点の違いを利用すること」は、その見方は水とエタノールの混合物を沸点の差で分ける場面よりも蒸留と結び付きが強いです。
