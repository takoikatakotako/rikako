# 化学基礎 問945
id: 1985
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "非電解質 / 砂糖水が電流をほとんど通さない場面"
  - "化学が拓く世界 / 鉄や酸素のように一種類の元素だけからできた物質を考える場面"
  - "単体 / ドライアイスがそのまま気体になる場面"
  - "昇華 / 電池、医薬品、素材開発などに化学が生かされる場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「非電解質 / 砂糖水が電流をほとんど通さない場面」です。したがって、正解は「非電解質 / 砂糖水が電流をほとんど通さない場面」です。
  
  「非電解質 / 砂糖水が電流をほとんど通さない場面」が正しいです。用語と場面の対応が合っています。
  「化学が拓く世界 / 鉄や酸素のように一種類の元素だけからできた物質を考える場面」は、用語と場面の対応が合っていません。
  「単体 / ドライアイスがそのまま気体になる場面」は、用語と場面の対応が合っていません。
  「昇華 / 電池、医薬品、素材開発などに化学が生かされる場面」は、用語と場面の対応が合っていません。
