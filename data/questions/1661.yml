# 化学基礎 問621
id: 1661
type: single_choice
text: |
  「電子を受け取って負に帯電すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "指示薬"
  - "塩橋"
  - "陰イオン"
  - "化学が拓く世界"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「電子を受け取って負に帯電すること」という見方が大切なのは陰イオンです。したがって、正解は「陰イオン」です。
  
  「指示薬」は、その語で大切なのは「色の変化で液性を見分けること」という見方です。
  「塩橋」は、その語で大切なのは「電池の中で電気的なつり合いを保つこと」という見方です。
  「陰イオン」が正しいです。この見方が大切な語です。
  「化学が拓く世界」は、その語で大切なのは「化学が社会や生活に広く役立つこと」という見方です。
