# 化学基礎 問939
id: 1979
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "電解質 / 砂と水の混合物から砂を取り除く場面"
  - "ろ過 / 水や二酸化炭素のように複数の元素からできた物質を考える場面"
  - "酸化剤 / 酸素や過酸化水素が相手を酸化させる場面"
  - "化合物 / 食塩水や塩酸が電流を通す場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「酸化剤 / 酸素や過酸化水素が相手を酸化させる場面」です。したがって、正解は「酸化剤 / 酸素や過酸化水素が相手を酸化させる場面」です。
  
  「電解質 / 砂と水の混合物から砂を取り除く場面」は、用語と場面の対応が合っていません。
  「ろ過 / 水や二酸化炭素のように複数の元素からできた物質を考える場面」は、用語と場面の対応が合っていません。
  「酸化剤 / 酸素や過酸化水素が相手を酸化させる場面」が正しいです。用語と場面の対応が合っています。
  「化合物 / 食塩水や塩酸が電流を通す場面」は、用語と場面の対応が合っていません。
