# 化学基礎 問43
id: 1083
type: single_choice
text: |
  還元についての説明として、最も適切なものはどれか。
choices:
  - "電子を受け取ることである。"
  - "電子を失うことである。"
  - "陽子を失うことである。"
  - "色が変わることだけを指す。"
correct: 0
explanation: |
  この問題は、「還元を電子の授受で説明できるか」を確認する問題です。
  
  還元は、電子を受け取ることです。酸化と還元は必ず同時に起こります。したがって、正解は「電子を受け取ることである」です。
  
  「電子を受け取ることである」が正しいです。還元の基本です。
  「電子を失うことである」は、酸化の説明です。
  「陽子を失うことである」は、還元の説明ではありません。
  「色が変わることだけを指す」は、還元の説明ではありません。
