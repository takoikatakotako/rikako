# 高校化学 問228
id: 2228
type: single_choice
text: |
  「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "弱塩基"
  - "コロイド"
  - "塩基解離定数"
  - "溶解度"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。 に当てはまる語はコロイドです。したがって、正解は「コロイド」です。
  
  「弱塩基」は、「水溶液中で一部だけ電離する塩基である。」に当てはまる語です。
  「コロイド」が正しいです。「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」に当てはまる語です。
  「塩基解離定数」は、「塩基の電離のしやすさを表す定数である。」に当てはまる語です。
  「溶解度」は、「一定量の溶媒に溶けることのできる溶質の最大量である。」に当てはまる語です。
