# 化学基礎 問303
id: 1343
type: single_choice
text: |
  再結晶について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
  - "二種類以上の物質が混ざってできている物質である。"
  - "二種類以上の元素が結び付いてできている純物質である。"
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  再結晶は、温度による溶解度の差を利用して固体をより純粋に取り出す方法である。 したがって、正解は「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」です。
  
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」は、クロマトグラフィーの説明です。
  「二種類以上の物質が混ざってできている物質である。」は、混合物の説明です。
  「二種類以上の元素が結び付いてできている純物質である。」は、化合物の説明です。
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」が正しいです。再結晶の説明です。
