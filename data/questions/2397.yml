# 高校化学 問397
id: 2397
type: single_choice
text: |
  「紙や木材の主成分を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "ペプチド結合"
  - "デンプン"
  - "不飽和炭化水素"
  - "セルロース"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  紙や木材の主成分を考える場面 と最も関係が深いのはセルロースです。したがって、正解は「セルロース」です。
  
  「ペプチド結合」は、「アミノ酸がつながってペプチドになる場面」と結び付きが強い語です。
  「デンプン」は、「米やいもに多く含まれる成分を考える場面」と結び付きが強い語です。
  「不飽和炭化水素」は、「エチレンやアセチレンの反応性を考える場面」と結び付きが強い語です。
  「セルロース」が正しいです。この具体例と最も関係が深い語です。
