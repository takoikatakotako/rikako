# 高校化学 問463
id: 2463
type: single_choice
text: |
  弱酸を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水となじみにくく不安定になりやすいこと"
  - "反応を始めるための壁に注目すること"
  - "電離が部分的に起こること"
  - "正反応と逆反応の両方を見ること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  弱酸では、「電離が部分的に起こること」という見方が大切です。したがって、正解は「電離が部分的に起こること」です。
  
  「水となじみにくく不安定になりやすいこと」は、疎水コロイドに関係する見方です。
  「反応を始めるための壁に注目すること」は、活性化エネルギーに関係する見方です。
  「電離が部分的に起こること」が正しいです。弱酸の要点を表しています。
  「正反応と逆反応の両方を見ること」は、可逆反応に関係する見方です。
