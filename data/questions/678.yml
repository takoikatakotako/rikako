# 化学基礎 問11
id: 678
type: single_choice
text: |
  次のうち、純物質として最も適切なものはどれか。
choices:
  - "食塩水"
  - "空気"
  - "酸素"
  - "牛乳"
correct: 2
explanation: |
  この問題は、「一種類の成分だけからできている物質はどれか」を考える問題です。
  
  酸素は一つの成分だけからなる純物質です。一方、食塩水や空気や牛乳は、複数の成分が混ざった混合物です。したがって、正解は「酸素」です。
  
  「食塩水」は、水と食塩が混ざっているので混合物です。
  「空気」は、窒素や酸素などが混ざっているので混合物です。
  「酸素」が正しいです。一種類の成分だけからなる純物質です。
  「牛乳」は、さまざまな成分が混ざっているので混合物です。
