# 化学基礎 問960
id: 2000
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "陰イオン / 粒子の数をまとめて扱う単位であること"
  - "モル / どのくらいイオンに分かれるかを表すこと"
  - "化学変化 / 新しい物質ができること"
  - "電離度 / 電子を受け取って負に帯電すること"
correct: 2
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「化学変化 / 新しい物質ができること」です。したがって、正解は「化学変化 / 新しい物質ができること」です。
  
  「陰イオン / 粒子の数をまとめて扱う単位であること」は、用語と要点の対応が合っていません。
  「モル / どのくらいイオンに分かれるかを表すこと」は、用語と要点の対応が合っていません。
  「化学変化 / 新しい物質ができること」が正しいです。用語と要点の対応が合っています。
  「電離度 / 電子を受け取って負に帯電すること」は、用語と要点の対応が合っていません。
