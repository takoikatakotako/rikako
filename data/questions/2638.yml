# 高校化学 問638
id: 2638
type: single_choice
text: |
  「どの結合が切れやすいかを比べる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。"
  - "塩基の電離のしやすさを表す定数である。"
  - "気体分子中の結合1 molを切るのに必要なエネルギーである。"
  - "遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「どの結合が切れやすいかを比べる場面」を説明した文として適切なのは「気体分子中の結合1 molを切るのに必要なエネルギーである。」です。したがって、正解は「気体分子中の結合1 molを切るのに必要なエネルギーである。」です。
  
  「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」は、この説明は「密閉容器で反応物と生成物の量が一定になる場面」と結び付きが強いです。
  「塩基の電離のしやすさを表す定数である。」は、この説明は「どの塩基がより電離しやすいかを比べる場面」と結び付きが強いです。
  「気体分子中の結合1 molを切るのに必要なエネルギーである。」が正しいです。この具体例を説明した文です。
  「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」は、この説明は「電線や青色の銅イオン水溶液を考える場面」と結び付きが強いです。
