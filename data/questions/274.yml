# 令和7年度 ITパスポート 公開問題 問11
id: 274
type: single_choice
text: |
  スマートファクトリーにおいても使用されている、FMS （Flexible Manufacturing System）に関する記述として、最も適切なものはどれか。
choices:
  - "技術革新を効果的に自社の経営に取り入れることによって、企業の成長を図る。"
  - "生産工程の各段階で、原材料から完成製品までの資材の流れを適時・適量に管理する。"
  - "生産時に必要となる部品などを必要な分だけ供給することによって、生産リードタイムを短縮する。"
  - "複数の工作機械や産業用ロボットなどを有機的に結合し、生産プロセス全体を統括的に制・管理する。"
correct: 3
explanation: |
  FMS は、複数の工作機械や搬送装置、ロボットなどをコンピュータで統合制御し、多品種少量生産にも柔軟に対応できる生産システムです。したがって、正解は「複数の工作機械や産業用ロボットなどを有機的に結合し、生産プロセス全体を統括的に制・管理する」です。
  
  「技術革新を効果的に自社の経営に取り入れることによって、企業の成長を図る」は技術革新を経営へ取り込む一般的な考え方の説明であり、FMSではありません。
  「生産工程の各段階で、原材料から完成製品までの資材の流れを適時・適量に管理する」は資材の流れを管理する仕組みの説明に近いです。
  「生産時に必要となる部品などを必要な分だけ供給することによって、生産リードタイムを短縮する」は必要量だけ供給するジャストインタイムの説明に近いです。
  「複数の工作機械や産業用ロボットなどを有機的に結合し、生産プロセス全体を統括的に制・管理する」が正しいです。機械やロボットを統合して生産全体を柔軟に管理するのがFMSです。
