# 高校化学 問813
id: 2813
type: single_choice
text: |
  「絶対零度を基準にした温度で、単位は K で表す。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "H+ と OH- の積が一定であること"
  - "酸とも塩基とも反応すること"
  - "同じ分子式でも構造が違うこと"
  - "0 K を基準に温度を考えること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「絶対零度を基準にした温度で、単位は K で表す。」を理解する上では、「0 K を基準に温度を考えること」という見方が大切です。したがって、正解は「0 K を基準に温度を考えること」です。
  
  「H+ と OH- の積が一定であること」は、その見方は水のイオン積に関係します。
  「酸とも塩基とも反応すること」は、その見方は両性酸化物に関係します。
  「同じ分子式でも構造が違うこと」は、その見方は異性体に関係します。
  「0 K を基準に温度を考えること」が正しいです。この説明と結び付きが強い見方です。
