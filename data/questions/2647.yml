# 高校化学 問647
id: 2647
type: single_choice
text: |
  「水溶液に電流を流して物質を分解する場面」を説明した文として、最も適切なものはどれか。
choices:
  - "水溶液中で一部だけ電離する塩基である。"
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
  - "カルボン酸とアルコールからできる有機化合物である。"
  - "電気エネルギーを使って自発的でない化学変化を起こす操作である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「水溶液に電流を流して物質を分解する場面」を説明した文として適切なのは「電気エネルギーを使って自発的でない化学変化を起こす操作である。」です。したがって、正解は「電気エネルギーを使って自発的でない化学変化を起こす操作である。」です。
  
  「水溶液中で一部だけ電離する塩基である。」は、この説明は「アンモニア水が強塩基ほど完全には電離しない場面」と結び付きが強いです。
  「金属元素を炎に入れたときに特有の色を示す反応である。」は、この説明は「ナトリウムで黄色、銅で青緑色を確かめる場面」と結び付きが強いです。
  「カルボン酸とアルコールからできる有機化合物である。」は、この説明は「果物の香りに関係する化合物を考える場面」と結び付きが強いです。
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」が正しいです。この具体例を説明した文です。
