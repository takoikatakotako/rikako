# 高校化学 問30
id: 740
type: single_choice
text: |
  ブラウン運動についての説明として、最も適切なものはどれか。
choices:
  - "反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。"
  - "コロイド粒子が不規則に動いて見える現象である。"
  - "正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。"
  - "平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  ブラウン運動は、コロイド粒子が不規則に動いて見える現象である。 したがって、正解は「コロイド粒子が不規則に動いて見える現象である。」です。
  
  「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」は、触媒の説明です。
  「コロイド粒子が不規則に動いて見える現象である。」が正しいです。ブラウン運動の説明です。
  「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」は、化学平衡の説明です。
  「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」は、ルシャトリエの原理の説明です。
