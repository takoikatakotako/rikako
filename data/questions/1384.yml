# 化学基礎 問344
id: 1384
type: single_choice
text: |
  電解質について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "水に溶けたり融解したりすると電流を通す物質である。"
  - "溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。"
  - "二種類以上の物質が混ざってできている物質である。"
  - "二種類以上の元素が結び付いてできている純物質である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  電解質は、水に溶けたり融解したりすると電流を通す物質である。 したがって、正解は「水に溶けたり融解したりすると電流を通す物質である。」です。
  
  「水に溶けたり融解したりすると電流を通す物質である。」が正しいです。電解質の説明です。
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」は、指示薬の説明です。
  「二種類以上の物質が混ざってできている物質である。」は、混合物の説明です。
  「二種類以上の元素が結び付いてできている純物質である。」は、化合物の説明です。
