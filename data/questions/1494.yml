# 化学基礎 問454
id: 1494
type: single_choice
text: |
  クロマトグラフィーを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "固体から液体への変化であること"
  - "液体から固体への変化であること"
  - "水に溶けない固体を液体から分けること"
  - "移動しやすさの違いを利用すること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  クロマトグラフィーでは、「移動しやすさの違いを利用すること」という見方が大切です。したがって、正解は「移動しやすさの違いを利用すること」です。
  
  「固体から液体への変化であること」は、融解に関係する見方です。
  「液体から固体への変化であること」は、凝固に関係する見方です。
  「水に溶けない固体を液体から分けること」は、ろ過に関係する見方です。
  「移動しやすさの違いを利用すること」が正しいです。クロマトグラフィーの要点を表しています。
