# 化学基礎 問213
id: 1253
type: single_choice
text: |
  「水が氷になる変化」に最も関係が深い語として、適切なものはどれか。
choices:
  - "昇華"
  - "原子番号"
  - "凝固"
  - "質量数"
correct: 2
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「水が氷になる変化」に最も関係が深いのは凝固です。したがって、正解は「凝固」です。
  
  「昇華」は、この例に最も関係が深い語ではありません。
  「原子番号」は、この例に最も関係が深い語ではありません。
  「凝固」が正しいです。この例は凝固に関係しています。
  「質量数」は、この例に最も関係が深い語ではありません。
