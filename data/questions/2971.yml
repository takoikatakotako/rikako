# 高校化学 問971
id: 2971
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "ブラウン運動 / ケミカルライトが光る仕組みを考える場面"
  - "化学発光 / 加熱すると反応が進みやすくなる理由を考える場面"
  - "両性酸化物 / 酸化アルミニウムが酸にも塩基にも溶ける場面"
  - "活性化エネルギー / 顕微鏡でコロイド粒子が細かく動く様子を観察する場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「両性酸化物 / 酸化アルミニウムが酸にも塩基にも溶ける場面」です。したがって、正解は「両性酸化物 / 酸化アルミニウムが酸にも塩基にも溶ける場面」です。
  
  「ブラウン運動 / ケミカルライトが光る仕組みを考える場面」は、用語と場面の対応が合っていません。
  「化学発光 / 加熱すると反応が進みやすくなる理由を考える場面」は、用語と場面の対応が合っていません。
  「両性酸化物 / 酸化アルミニウムが酸にも塩基にも溶ける場面」が正しいです。用語と場面の対応が合っています。
  「活性化エネルギー / 顕微鏡でコロイド粒子が細かく動く様子を観察する場面」は、用語と場面の対応が合っていません。
