# 高校化学 問183
id: 2183
type: single_choice
text: |
  アルコールと最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸化アルミニウムが酸にも塩基にも溶ける場面"
  - "アンモニアが金属イオンに電子対を与える場面"
  - "ナトリウムで黄色、銅で青緑色を確かめる場面"
  - "エタノールの性質や利用を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  エタノールの性質や利用を考える場面は、アルコールと結び付きが強い場面です。したがって、正解は「エタノールの性質や利用を考える場面」です。
  
  「酸化アルミニウムが酸にも塩基にも溶ける場面」は、両性酸化物と結び付きが強い場面です。
  「アンモニアが金属イオンに電子対を与える場面」は、配位結合と結び付きが強い場面です。
  「ナトリウムで黄色、銅で青緑色を確かめる場面」は、炎色反応と結び付きが強い場面です。
  「エタノールの性質や利用を考える場面」が正しいです。これはアルコールと結び付きが強い場面です。
