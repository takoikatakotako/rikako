# 高校化学 問468
id: 2468
type: single_choice
text: |
  アルカリ土類金属を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "必要な機能をねらって材料を設計すること"
  - "化学が社会課題の解決に役立つこと"
  - "非金属で酸化力が強いこと"
  - "2 価の陽イオンになりやすいこと"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  アルカリ土類金属では、「2 価の陽イオンになりやすいこと」という見方が大切です。したがって、正解は「2 価の陽イオンになりやすいこと」です。
  
  「必要な機能をねらって材料を設計すること」は、機能性材料に関係する見方です。
  「化学が社会課題の解決に役立つこと」は、化学が築く未来に関係する見方です。
  「非金属で酸化力が強いこと」は、ハロゲンに関係する見方です。
  「2 価の陽イオンになりやすいこと」が正しいです。アルカリ土類金属の要点を表しています。
