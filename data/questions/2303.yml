# 高校化学 問303
id: 2303
type: single_choice
text: |
  「水が沸騰し始める温度を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "溶解平衡"
  - "沸点"
  - "沸点上昇"
  - "浸透圧"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  水が沸騰し始める温度を考える場面 と最も関係が深いのは沸点です。したがって、正解は「沸点」です。
  
  「溶解平衡」は、「飽和溶液で見かけ上変化が止まっている場面」と結び付きが強い語です。
  「沸点」が正しいです。この具体例と最も関係が深い語です。
  「沸点上昇」は、「食塩水の沸点が水より少し高くなることを考える場面」と結び付きが強い語です。
  「浸透圧」は、「薄い溶液側から濃い溶液側へ水が移動する場面」と結び付きが強い語です。
