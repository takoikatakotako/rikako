# 高校化学 問599
id: 2599
type: single_choice
text: |
  「使い終わった資源や製品を回収し、再び利用する考え方である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "氷が溶け始める温度を考える場面"
  - "気体の法則で温度をセルシウス温度ではなく K で扱う場面"
  - "金属やプラスチックを回収して再資源化する場面"
  - "食塩水が純水より蒸発しにくくなることを考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「使い終わった資源や製品を回収し、再び利用する考え方である。」と最も関係が深い場面は「金属やプラスチックを回収して再資源化する場面」です。したがって、正解は「金属やプラスチックを回収して再資源化する場面」です。
  
  「氷が溶け始める温度を考える場面」は、「固体と液体が平衡で共存するときの温度である。」と結び付きが強い場面です。
  「気体の法則で温度をセルシウス温度ではなく K で扱う場面」は、「絶対零度を基準にした温度で、単位は K で表す。」と結び付きが強い場面です。
  「金属やプラスチックを回収して再資源化する場面」が正しいです。この説明と結び付きが強い場面です。
  「食塩水が純水より蒸発しにくくなることを考える場面」は、「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」と結び付きが強い場面です。
