# 化学基礎 問928
id: 1968
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "中和 / 水素や炭素が相手から酸素を奪う場面"
  - "還元剤 / ナトリウムで黄色、銅で青緑色を観察する場面"
  - "炎色反応 / 塩酸と水酸化ナトリウム水溶液を混ぜる場面"
  - "モル / 6.0×10^23個の粒子をひとまとまりとして数える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「モル / 6.0×10^23個の粒子をひとまとまりとして数える場面」です。したがって、正解は「モル / 6.0×10^23個の粒子をひとまとまりとして数える場面」です。
  
  「中和 / 水素や炭素が相手から酸素を奪う場面」は、用語と場面の対応が合っていません。
  「還元剤 / ナトリウムで黄色、銅で青緑色を観察する場面」は、用語と場面の対応が合っていません。
  「炎色反応 / 塩酸と水酸化ナトリウム水溶液を混ぜる場面」は、用語と場面の対応が合っていません。
  「モル / 6.0×10^23個の粒子をひとまとまりとして数える場面」が正しいです。用語と場面の対応が合っています。
