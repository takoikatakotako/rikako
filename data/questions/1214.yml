# 化学基礎 問174
id: 1214
type: single_choice
text: |
  金属結合の例として、最も適切なものはどれか。
choices:
  - "銅 Cu の結合"
  - "二酸化炭素 CO₂ の分子"
  - "水 H₂O"
  - "二酸化炭素 CO₂"
correct: 0
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  銅 Cu の結合は、金属結合の例です。したがって、正解は「銅 Cu の結合」です。
  
  「銅 Cu の結合」が正しいです。これは金属結合の例です。
  「二酸化炭素 CO₂ の分子」は、分子の例として見る方が適切です。
  「水 H₂O」は、極性分子の例として見る方が適切です。
  「二酸化炭素 CO₂」は、無極性分子の例として見る方が適切です。
