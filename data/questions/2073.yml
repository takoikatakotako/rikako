# 高校化学 問73
id: 2073
type: single_choice
text: |
  配位結合についての説明として、最も適切なものはどれか。
choices:
  - "一方の原子が電子対を与えてできる共有結合である。"
  - "周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。"
  - "遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。"
  - "一度使い切ることを前提にした一次電池の代表例である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  配位結合は、一方の原子が電子対を与えてできる共有結合である。 したがって、正解は「一方の原子が電子対を与えてできる共有結合である。」です。
  
  「一方の原子が電子対を与えてできる共有結合である。」が正しいです。配位結合の説明です。
  「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」は、遷移元素の説明です。
  「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」は、鉄の説明です。
  「一度使い切ることを前提にした一次電池の代表例である。」は、乾電池の説明です。
