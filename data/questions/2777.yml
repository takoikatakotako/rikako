# 高校化学 問777
id: 2777
type: single_choice
text: |
  「電気伝導性が高く、特徴的な色のイオンをつくること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "ボイルの法則"
  - "アモルファス"
  - "銅"
  - "ブラウン運動"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「電気伝導性が高く、特徴的な色のイオンをつくること」という見方が大切なのは銅です。したがって、正解は「銅」です。
  
  「ボイルの法則」は、その語で大切なのは「温度一定で圧力と体積の関係を見ること」という見方です。
  「アモルファス」は、その語で大切なのは「粒子配列が不規則であること」という見方です。
  「銅」が正しいです。この見方が大切な語です。
  「ブラウン運動」は、その語で大切なのは「粒子が周囲の分子にぶつかって動くこと」という見方です。
