# 高校化学 問590
id: 2590
type: single_choice
text: |
  「アミド結合をもつ合成繊維の代表的な高分子化合物である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "グリシンやアラニンの構造を考える場面"
  - "衣類やロープに使われる合成繊維を考える場面"
  - "ふたをした容器の中で液体の上にたまる蒸気を考える場面"
  - "塩化ナトリウムの結晶のつくりを考える場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「アミド結合をもつ合成繊維の代表的な高分子化合物である。」と最も関係が深い場面は「衣類やロープに使われる合成繊維を考える場面」です。したがって、正解は「衣類やロープに使われる合成繊維を考える場面」です。
  
  「グリシンやアラニンの構造を考える場面」は、「アミノ基とカルボキシ基をあわせもつ化合物である。」と結び付きが強い場面です。
  「衣類やロープに使われる合成繊維を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「ふたをした容器の中で液体の上にたまる蒸気を考える場面」は、「気液平衡にあるとき、気体が示す圧力である。」と結び付きが強い場面です。
  「塩化ナトリウムの結晶のつくりを考える場面」は、「陽イオンと陰イオンが規則正しく並んでできた結晶である。」と結び付きが強い場面です。
