# 令和7年度 ITパスポート 公開問題 問5
id: 499
type: single_choice
text: |
  A社ではB商品の仕入れと販売を行っている。ある期のB商品の仕入単価は期首から上昇し続け、期末が最も高くなった。当該期の売上原価を"期首棚卸高＋当期商品仕入高－期末棚卸高"で計算するとき、期末棚卸高の計算に期末の仕入単価を用いると、B商品の期末棚卸高及び売上原価は、期中の仕入単価の平均値を用いる場合に比べてどのようになるか。
choices:
  - "期末棚卸高、売上原価ともに上がる。"
  - "期末棚卸高、売上原価ともに変わらない。"
  - "期末棚卸高は上がり、売上原価は下がる。"
  - "期末棚卸高は下がり、売上原価は上がる。"
correct: 2
explanation: |
  この問題は、「売れ残った在庫を高く見積もると、売れた商品の原価はどうなるか」を考える問題です。
  
  まず、期末棚卸高は「期末に残っている在庫の金額」、売上原価は「売れた商品の原価」です。
  
  売上原価は、"期首棚卸高＋当期商品仕入高－期末棚卸高" で求めます。
  
  今回の条件では、仕入単価が期首からずっと上がっていて、期末の仕入単価がいちばん高くなっています。そのため、期末棚卸高を平均単価で計算するより、期末単価で計算した方が、売れ残り在庫の金額は大きくなります。
  
  すると、式の最後で引く期末棚卸高が大きくなるので、売上原価は小さくなります。
  
  したがって、「期末棚卸高は上がり、売上原価は下がる」が正しいので、正解は「期末棚卸高は上がり、売上原価は下がる」です。
  
  「期末棚卸高、売上原価ともに上がる」は期末棚卸高は上がりますが、売上原価まで上がるわけではありません。
  「期末棚卸高、売上原価ともに変わらない」は在庫の評価単価が変わるので、期末棚卸高も売上原価も変わります。
  「期末棚卸高は上がり、売上原価は下がる」が正しいです。期末棚卸高は上がり、その分だけ売上原価は下がります。
  「期末棚卸高は下がり、売上原価は上がる」は期末棚卸高と売上原価の関係が逆です。
