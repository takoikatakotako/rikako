# 高校化学 問462
id: 2462
type: single_choice
text: |
  塩の加水分解を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "水となじみやすく安定しやすいこと"
  - "塩のイオンが水と反応すること"
  - "時間あたりにどれだけ変化するかを見ること"
  - "反応を速めても自分は使い切られないこと"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  塩の加水分解では、「塩のイオンが水と反応すること」という見方が大切です。したがって、正解は「塩のイオンが水と反応すること」です。
  
  「水となじみやすく安定しやすいこと」は、親水コロイドに関係する見方です。
  「塩のイオンが水と反応すること」が正しいです。塩の加水分解の要点を表しています。
  「時間あたりにどれだけ変化するかを見ること」は、反応速度に関係する見方です。
  「反応を速めても自分は使い切られないこと」は、触媒に関係する見方です。
