# 高校化学 問573
id: 2573
type: single_choice
text: |
  「一方の原子が電子対を与えてできる共有結合である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "アンモニアが金属イオンに電子対を与える場面"
  - "さびや鉄鋼の利用を考える場面"
  - "芳香族化合物の基本構造を学ぶ場面"
  - "導電性高分子や高性能電池材料を考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「一方の原子が電子対を与えてできる共有結合である。」と最も関係が深い場面は「アンモニアが金属イオンに電子対を与える場面」です。したがって、正解は「アンモニアが金属イオンに電子対を与える場面」です。
  
  「アンモニアが金属イオンに電子対を与える場面」が正しいです。この説明と結び付きが強い場面です。
  「さびや鉄鋼の利用を考える場面」は、「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」と結び付きが強い場面です。
  「芳香族化合物の基本構造を学ぶ場面」は、「六角形の環状構造をもつ代表的な芳香族炭化水素である。」と結び付きが強い場面です。
  「導電性高分子や高性能電池材料を考える場面」は、「目的に応じた特別な性質をもたせてつくられた材料である。」と結び付きが強い場面です。
