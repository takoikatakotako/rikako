# 高校化学 問774
id: 2774
type: single_choice
text: |
  「多様な酸化数や色、触媒作用に注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "気液平衡"
  - "分子結晶"
  - "浸透圧"
  - "遷移元素"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「多様な酸化数や色、触媒作用に注目すること」という見方が大切なのは遷移元素です。したがって、正解は「遷移元素」です。
  
  「気液平衡」は、その語で大切なのは「蒸発と凝縮がつり合うこと」という見方です。
  「分子結晶」は、その語で大切なのは「分子間力で集まった結晶であること」という見方です。
  「浸透圧」は、その語で大切なのは「半透膜を通る溶媒の移動に注目すること」という見方です。
  「遷移元素」が正しいです。この見方が大切な語です。
