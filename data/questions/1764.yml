# 化学基礎 問724
id: 1764
type: single_choice
text: |
  「金属中で自由電子が動けるため電気を通すことを考える場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "水に溶けない固体を液体から分けること"
  - "複数の元素が結び付いてできること"
  - "陽子数を表す数であること"
  - "自由電子が結合を支えること"
correct: 3
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「金属中で自由電子が動けるため電気を通すことを考える場面」では、「自由電子が結合を支えること」という見方が大切です。したがって、正解は「自由電子が結合を支えること」です。
  
  「水に溶けない固体を液体から分けること」は、その見方は砂と水の混合物から砂を取り除く場面よりもろ過と結び付きが強いです。
  「複数の元素が結び付いてできること」は、その見方は水や二酸化炭素のように複数の元素からできた物質を考える場面よりも化合物と結び付きが強いです。
  「陽子数を表す数であること」は、その見方はナトリウムの陽子数から元素を区別する場面よりも原子番号と結び付きが強いです。
  「自由電子が結合を支えること」が正しいです。この具体例で大切になる見方です。
