# 化学基礎 問852
id: 1892
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "蒸留 / 沸点の違いを利用して液体を分ける方法である。"
  - "炎色反応 / 成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
  - "クロマトグラフィー / 固体が液体に変わる状態変化である。"
  - "融解 / 金属元素を炎に入れたときに特有の色を示す反応である。"
correct: 0
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「蒸留 / 沸点の違いを利用して液体を分ける方法である。」です。したがって、正解は「蒸留 / 沸点の違いを利用して液体を分ける方法である。」です。
  
  「蒸留 / 沸点の違いを利用して液体を分ける方法である。」が正しいです。用語と説明の対応が合っています。
  「炎色反応 / 成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」は、用語と説明の対応が合っていません。
  「クロマトグラフィー / 固体が液体に変わる状態変化である。」は、用語と説明の対応が合っていません。
  「融解 / 金属元素を炎に入れたときに特有の色を示す反応である。」は、用語と説明の対応が合っていません。
