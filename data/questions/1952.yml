# 化学基礎 問912
id: 1952
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "同位体 / 金属中で自由電子が動けるため電気を通すことを考える場面"
  - "金属結合 / 塩酸が水溶液中で水素イオンを生じる場面"
  - "酸 / 炭素12と炭素14を比べる場面"
  - "蒸発 / ぬれた床の水がしだいに乾く場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「蒸発 / ぬれた床の水がしだいに乾く場面」です。したがって、正解は「蒸発 / ぬれた床の水がしだいに乾く場面」です。
  
  「同位体 / 金属中で自由電子が動けるため電気を通すことを考える場面」は、用語と場面の対応が合っていません。
  「金属結合 / 塩酸が水溶液中で水素イオンを生じる場面」は、用語と場面の対応が合っていません。
  「酸 / 炭素12と炭素14を比べる場面」は、用語と場面の対応が合っていません。
  「蒸発 / ぬれた床の水がしだいに乾く場面」が正しいです。用語と場面の対応が合っています。
