# 化学基礎 問390
id: 1430
type: single_choice
text: |
  還元剤と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸素や過酸化水素が相手を酸化させる場面"
  - "水素や炭素が相手から酸素を奪う場面"
  - "亜鉛板と銅板を使って豆電球を光らせる場面"
  - "塩酸が水溶液中で水素イオンを生じる場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  水素や炭素が相手から酸素を奪う場面は、還元剤と結び付きが強い場面です。したがって、正解は「水素や炭素が相手から酸素を奪う場面」です。
  
  「酸素や過酸化水素が相手を酸化させる場面」は、酸化剤と結び付きが強い場面です。
  「水素や炭素が相手から酸素を奪う場面」が正しいです。これは還元剤と結び付きが強い場面です。
  「亜鉛板と銅板を使って豆電球を光らせる場面」は、ダニエル電池と結び付きが強い場面です。
  「塩酸が水溶液中で水素イオンを生じる場面」は、酸と結び付きが強い場面です。
