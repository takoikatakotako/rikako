# 高校化学 問439
id: 2439
type: single_choice
text: |
  発熱反応を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "加えた変化を打ち消す向きに平衡が動くこと"
  - "電離と元に戻る変化がつり合うこと"
  - "周囲へ熱を出す反応であること"
  - "pH の変化をおさえること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  発熱反応では、「周囲へ熱を出す反応であること」という見方が大切です。したがって、正解は「周囲へ熱を出す反応であること」です。
  
  「加えた変化を打ち消す向きに平衡が動くこと」は、ルシャトリエの原理に関係する見方です。
  「電離と元に戻る変化がつり合うこと」は、電離平衡に関係する見方です。
  「周囲へ熱を出す反応であること」が正しいです。発熱反応の要点を表しています。
  「pH の変化をおさえること」は、緩衝液に関係する見方です。
