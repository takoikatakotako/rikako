# 高校化学 問86
id: 2086
type: single_choice
text: |
  エステルについての説明として、最も適切なものはどれか。
choices:
  - "周期表1族に属し、水と反応しやすい金属元素の総称である。"
  - "カルボン酸とアルコールからできる有機化合物である。"
  - "周期表17族に属し、陰イオンになりやすい非金属元素の総称である。"
  - "酸とも塩基とも反応する酸化物である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  エステルは、カルボン酸とアルコールからできる有機化合物である。 したがって、正解は「カルボン酸とアルコールからできる有機化合物である。」です。
  
  「周期表1族に属し、水と反応しやすい金属元素の総称である。」は、アルカリ金属の説明です。
  「カルボン酸とアルコールからできる有機化合物である。」が正しいです。エステルの説明です。
  「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」は、ハロゲンの説明です。
  「酸とも塩基とも反応する酸化物である。」は、両性酸化物の説明です。
