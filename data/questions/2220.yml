# 高校化学 問220
id: 2220
type: single_choice
text: |
  「溶質の粒子が溶媒中に広がっていく現象である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "平衡定数"
  - "溶解"
  - "アンモニア合成"
  - "水のイオン積"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  溶質の粒子が溶媒中に広がっていく現象である。 に当てはまる語は溶解です。したがって、正解は「溶解」です。
  
  「平衡定数」は、「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」に当てはまる語です。
  「溶解」が正しいです。「溶質の粒子が溶媒中に広がっていく現象である。」に当てはまる語です。
  「アンモニア合成」は、「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」に当てはまる語です。
  「水のイオン積」は、「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」に当てはまる語です。
