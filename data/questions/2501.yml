# 高校化学 問501
id: 2501
type: single_choice
text: |
  「分子どうしの間にはたらく比較的弱い引力である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水やエタノールの沸点の違いを考える場面"
  - "ふたをした容器の中で液体の上にたまる蒸気を考える場面"
  - "塩化ナトリウムの結晶のつくりを考える場面"
  - "凍結防止剤をまいた道路の水が凍りにくくなる場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「分子どうしの間にはたらく比較的弱い引力である。」と最も関係が深い場面は「水やエタノールの沸点の違いを考える場面」です。したがって、正解は「水やエタノールの沸点の違いを考える場面」です。
  
  「水やエタノールの沸点の違いを考える場面」が正しいです。この説明と結び付きが強い場面です。
  「ふたをした容器の中で液体の上にたまる蒸気を考える場面」は、「気液平衡にあるとき、気体が示す圧力である。」と結び付きが強い場面です。
  「塩化ナトリウムの結晶のつくりを考える場面」は、「陽イオンと陰イオンが規則正しく並んでできた結晶である。」と結び付きが強い場面です。
  「凍結防止剤をまいた道路の水が凍りにくくなる場面」は、「溶液の凝固点が純粋な溶媒より低くなる現象である。」と結び付きが強い場面です。
