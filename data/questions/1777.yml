# 化学基礎 問737
id: 1777
type: single_choice
text: |
  「マグネシウムが酸素と結び付く場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "酸素との結び付きや電子の放出に注目すること"
  - "固体から直接気体になること"
  - "電子を受け取って負に帯電すること"
  - "粒子の数をまとめて扱う単位であること"
correct: 0
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「マグネシウムが酸素と結び付く場面」では、「酸素との結び付きや電子の放出に注目すること」という見方が大切です。したがって、正解は「酸素との結び付きや電子の放出に注目すること」です。
  
  「酸素との結び付きや電子の放出に注目すること」が正しいです。この具体例で大切になる見方です。
  「固体から直接気体になること」は、その見方はドライアイスがそのまま気体になる場面よりも昇華と結び付きが強いです。
  「電子を受け取って負に帯電すること」は、その見方は塩素原子が電子を1個受け取って Cl- になる場面よりも陰イオンと結び付きが強いです。
  「粒子の数をまとめて扱う単位であること」は、その見方は6.0×10^23個の粒子をひとまとまりとして数える場面よりもモルと結び付きが強いです。
