# 高校化学 問658
id: 2658
type: single_choice
text: |
  「高圧や触媒を利用してアンモニアを得る場面」を説明した文として、最も適切なものはどれか。
choices:
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
  - "カルボン酸とアルコールからできる有機化合物である。"
  - "窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。"
  - "グルコースがつながった植物の細胞壁をつくる多糖である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「高圧や触媒を利用してアンモニアを得る場面」を説明した文として適切なのは「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」です。したがって、正解は「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」です。
  
  「金属元素を炎に入れたときに特有の色を示す反応である。」は、この説明は「ナトリウムで黄色、銅で青緑色を確かめる場面」と結び付きが強いです。
  「カルボン酸とアルコールからできる有機化合物である。」は、この説明は「果物の香りに関係する化合物を考える場面」と結び付きが強いです。
  「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」が正しいです。この具体例を説明した文です。
  「グルコースがつながった植物の細胞壁をつくる多糖である。」は、この説明は「紙や木材の主成分を考える場面」と結び付きが強いです。
