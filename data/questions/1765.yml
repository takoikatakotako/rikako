# 化学基礎 問725
id: 1765
type: single_choice
text: |
  「水分子や酸素分子を粒として考える場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "物質の性質を示す小さな粒子として考えること"
  - "沸点の違いを利用すること"
  - "物質の種類が変わらないこと"
  - "陽子数と中性子数の合計であること"
correct: 0
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「水分子や酸素分子を粒として考える場面」では、「物質の性質を示す小さな粒子として考えること」という見方が大切です。したがって、正解は「物質の性質を示す小さな粒子として考えること」です。
  
  「物質の性質を示す小さな粒子として考えること」が正しいです。この具体例で大切になる見方です。
  「沸点の違いを利用すること」は、その見方は水とエタノールの混合物を沸点の差で分ける場面よりも蒸留と結び付きが強いです。
  「物質の種類が変わらないこと」は、その見方は氷が溶けて水になる場面よりも物理変化と結び付きが強いです。
  「陽子数と中性子数の合計であること」は、その見方は炭素12で陽子数と中性子数の合計を見る場面よりも質量数と結び付きが強いです。
