# 化学基礎 問935
id: 1975
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "還元剤 / ナトリウムで黄色、銅で青緑色を観察する場面"
  - "炎色反応 / インクの色素をろ紙の上で分ける場面"
  - "電離度 / 同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面"
  - "クロマトグラフィー / 水素や炭素が相手から酸素を奪う場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「電離度 / 同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」です。したがって、正解は「電離度 / 同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」です。
  
  「還元剤 / ナトリウムで黄色、銅で青緑色を観察する場面」は、用語と場面の対応が合っていません。
  「炎色反応 / インクの色素をろ紙の上で分ける場面」は、用語と場面の対応が合っていません。
  「電離度 / 同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」が正しいです。用語と場面の対応が合っています。
  「クロマトグラフィー / 水素や炭素が相手から酸素を奪う場面」は、用語と場面の対応が合っていません。
