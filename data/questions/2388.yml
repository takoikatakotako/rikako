# 高校化学 問388
id: 2388
type: single_choice
text: |
  「フェノール類の酸性や消毒作用を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "カルボン酸"
  - "ベンゼン"
  - "フェノール"
  - "ナイロン"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  フェノール類の酸性や消毒作用を考える場面 と最も関係が深いのはフェノールです。したがって、正解は「フェノール」です。
  
  「カルボン酸」は、「酢酸の性質やにおいを考える場面」と結び付きが強い語です。
  「ベンゼン」は、「芳香族化合物の基本構造を学ぶ場面」と結び付きが強い語です。
  「フェノール」が正しいです。この具体例と最も関係が深い語です。
  「ナイロン」は、「衣類やロープに使われる合成繊維を考える場面」と結び付きが強い語です。
