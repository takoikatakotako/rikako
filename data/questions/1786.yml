# 化学基礎 問746
id: 1786
type: single_choice
text: |
  「医療や年代測定に利用される炭素14を考える場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "電子を共有して結び付くこと"
  - "放射線を出す同位体であること"
  - "反応する物質とできる物質の関係を式で示すこと"
  - "酸素との結び付きや電子の放出に注目すること"
correct: 1
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「医療や年代測定に利用される炭素14を考える場面」では、「放射線を出す同位体であること」という見方が大切です。したがって、正解は「放射線を出す同位体であること」です。
  
  「電子を共有して結び付くこと」は、その見方は水素原子どうしが電子を共有して H2 になる場面よりも共有結合と結び付きが強いです。
  「放射線を出す同位体であること」が正しいです。この具体例で大切になる見方です。
  「反応する物質とできる物質の関係を式で示すこと」は、その見方は水素と酸素から水ができる反応を式で表す場面よりも化学反応式と結び付きが強いです。
  「酸素との結び付きや電子の放出に注目すること」は、その見方はマグネシウムが酸素と結び付く場面よりも酸化と結び付きが強いです。
