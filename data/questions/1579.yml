# 化学基礎 問539
id: 1579
type: single_choice
text: |
  「相手を酸化させ、自身は還元される物質である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "亜鉛板と銅板を使って豆電球を光らせる場面"
  - "ポリエチレンやタンパク質のような長い分子を考える場面"
  - "酸素や過酸化水素が相手を酸化させる場面"
  - "空気や食塩水のように複数の物質が混ざったものを考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「相手を酸化させ、自身は還元される物質である。」と最も関係が深い場面は「酸素や過酸化水素が相手を酸化させる場面」です。したがって、正解は「酸素や過酸化水素が相手を酸化させる場面」です。
  
  「亜鉛板と銅板を使って豆電球を光らせる場面」は、「亜鉛と銅の反応を利用して電気を取り出す電池である。」と結び付きが強い場面です。
  「ポリエチレンやタンパク質のような長い分子を考える場面」は、「多数の小さな単位がつながってできた大きな分子からなる化合物である。」と結び付きが強い場面です。
  「酸素や過酸化水素が相手を酸化させる場面」が正しいです。この説明と結び付きが強い場面です。
  「空気や食塩水のように複数の物質が混ざったものを考える場面」は、「二種類以上の物質が混ざってできている物質である。」と結び付きが強い場面です。
