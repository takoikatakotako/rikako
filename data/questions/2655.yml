# 高校化学 問655
id: 2655
type: single_choice
text: |
  「密閉容器で反応物と生成物の量が一定になる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "中心となる金属イオンに配位子が結び付いたイオンである。"
  - "ヒドロキシ基をもつ有機化合物である。"
  - "アミノ酸どうしが縮合してできる結合である。"
  - "正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「密閉容器で反応物と生成物の量が一定になる場面」を説明した文として適切なのは「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」です。したがって、正解は「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」です。
  
  「中心となる金属イオンに配位子が結び付いたイオンである。」は、この説明は「アンモニアを加えると深い青色のイオンができる場面」と結び付きが強いです。
  「ヒドロキシ基をもつ有機化合物である。」は、この説明は「エタノールの性質や利用を考える場面」と結び付きが強いです。
  「アミノ酸どうしが縮合してできる結合である。」は、この説明は「アミノ酸がつながってペプチドになる場面」と結び付きが強いです。
  「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」が正しいです。この具体例を説明した文です。
