# 化学基礎 問269
id: 1309
type: single_choice
text: |
  最外殻電子の特徴として、最も適切なものはどれか。
choices:
  - "電子を失って正になる"
  - "化学的な性質に強く関わる電子"
  - "電子を受け取って負になる"
  - "陽イオンと陰イオンの引力による結合"
correct: 1
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  最外殻電子では、「化学的な性質に強く関わる電子」という点が大切です。したがって、正解は「化学的な性質に強く関わる電子」です。
  
  「電子を失って正になる」は、陽イオンに関係する特徴です。
  「化学的な性質に強く関わる電子」が正しいです。最外殻電子の特徴を表しています。
  「電子を受け取って負になる」は、陰イオンに関係する特徴です。
  「陽イオンと陰イオンの引力による結合」は、イオン結合に関係する特徴です。
