# 化学基礎 問989
id: 2029
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "化学が拓く世界 / 一種類の元素だけからできること"
  - "単体 / 固体から直接気体になること"
  - "昇華 / 化学が社会や生活に広く役立つこと"
  - "酸化剤 / 相手を酸化させ、自分は還元されること"
correct: 3
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「酸化剤 / 相手を酸化させ、自分は還元されること」です。したがって、正解は「酸化剤 / 相手を酸化させ、自分は還元されること」です。
  
  「化学が拓く世界 / 一種類の元素だけからできること」は、用語と要点の対応が合っていません。
  「単体 / 固体から直接気体になること」は、用語と要点の対応が合っていません。
  「昇華 / 化学が社会や生活に広く役立つこと」は、用語と要点の対応が合っていません。
  「酸化剤 / 相手を酸化させ、自分は還元されること」が正しいです。用語と要点の対応が合っています。
