# 高校化学 問883
id: 2883
type: single_choice
text: |
  「ヒドロキシ基をもつ有機化合物である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "粒子が周囲の分子にぶつかって動くこと"
  - "ヒドロキシ基をもつこと"
  - "化学反応のエネルギーが光として出ること"
  - "反応を始めるための壁に注目すること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「ヒドロキシ基をもつ有機化合物である。」を理解する上では、「ヒドロキシ基をもつこと」という見方が大切です。したがって、正解は「ヒドロキシ基をもつこと」です。
  
  「粒子が周囲の分子にぶつかって動くこと」は、その見方はブラウン運動に関係します。
  「ヒドロキシ基をもつこと」が正しいです。この説明と結び付きが強い見方です。
  「化学反応のエネルギーが光として出ること」は、その見方は化学発光に関係します。
  「反応を始めるための壁に注目すること」は、その見方は活性化エネルギーに関係します。
