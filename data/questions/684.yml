# 化学基礎 問17
id: 684
type: single_choice
text: |
  気体の粒子の様子として、最も適切なものはどれか。
choices:
  - "粒子が規則正しく並び、ほとんど動かない。"
  - "粒子が近くに集まり、決まった位置に固定される。"
  - "粒子どうしが離れていて、自由に動き回る。"
  - "粒子が全く存在しない。"
correct: 2
explanation: |
  この問題は、「気体中の粒子の広がり方と動き方」を考える問題です。
  
  気体では、粒子どうしの間隔が大きく、粒子は自由に動き回っています。したがって、正解は「粒子どうしが離れていて、自由に動き回る」です。
  
  「粒子が規則正しく並び、ほとんど動かない」は、固体に近い説明です。
  「粒子が近くに集まり、決まった位置に固定される」は、固体に近い説明です。
  「粒子どうしが離れていて、自由に動き回る」が正しいです。気体の特徴を表しています。
  「粒子が全く存在しない」は、気体の説明として適切ではありません。
