# 高校化学 問418
id: 2418
type: single_choice
text: |
  金属結晶を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "圧力一定で体積と絶対温度の関係を見ること"
  - "自由電子が性質に関係すること"
  - "混ざった気体の圧力を足し合わせて考えること"
  - "0 K を基準に温度を考えること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  金属結晶では、「自由電子が性質に関係すること」という見方が大切です。したがって、正解は「自由電子が性質に関係すること」です。
  
  「圧力一定で体積と絶対温度の関係を見ること」は、シャルルの法則に関係する見方です。
  「自由電子が性質に関係すること」が正しいです。金属結晶の要点を表しています。
  「混ざった気体の圧力を足し合わせて考えること」は、分圧の法則に関係する見方です。
  「0 K を基準に温度を考えること」は、絶対温度に関係する見方です。
