# 高校化学 問733
id: 2733
type: single_choice
text: |
  「水となじみやすく安定しやすいこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "弱塩基"
  - "炎色反応"
  - "親水コロイド"
  - "エステル"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「水となじみやすく安定しやすいこと」という見方が大切なのは親水コロイドです。したがって、正解は「親水コロイド」です。
  
  「弱塩基」は、その語で大切なのは「電離が部分的に起こること」という見方です。
  「炎色反応」は、その語で大切なのは「金属元素ごとに炎の色が異なること」という見方です。
  「親水コロイド」が正しいです。この見方が大切な語です。
  「エステル」は、その語で大切なのは「カルボン酸とアルコールの組合せでできること」という見方です。
