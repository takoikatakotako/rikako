# 高校化学 問366
id: 2366
type: single_choice
text: |
  「どの塩基がより電離しやすいかを比べる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "塩基解離定数"
  - "浸透圧"
  - "チンダル現象"
  - "透析"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  どの塩基がより電離しやすいかを比べる場面 と最も関係が深いのは塩基解離定数です。したがって、正解は「塩基解離定数」です。
  
  「塩基解離定数」が正しいです。この具体例と最も関係が深い語です。
  「浸透圧」は、「薄い溶液側から濃い溶液側へ水が移動する場面」と結び付きが強い語です。
  「チンダル現象」は、「薄暗い部屋でコロイドに光を当てると筋が見える場面」と結び付きが強い語です。
  「透析」は、「コロイド溶液から余分な電解質を取り除く場面」と結び付きが強い語です。
