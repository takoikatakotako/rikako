# 化学基礎 問641
id: 1681
type: single_choice
text: |
  「金属のイオンになりやすさを比べること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "混合物"
  - "凝固"
  - "イオン化傾向"
  - "陽イオン"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「金属のイオンになりやすさを比べること」という見方が大切なのはイオン化傾向です。したがって、正解は「イオン化傾向」です。
  
  「混合物」は、その語で大切なのは「成分が二種類以上まざっていること」という見方です。
  「凝固」は、その語で大切なのは「液体から固体への変化であること」という見方です。
  「イオン化傾向」が正しいです。この見方が大切な語です。
  「陽イオン」は、その語で大切なのは「電子を失って正に帯電すること」という見方です。
