# 化学基礎 問511
id: 1551
type: single_choice
text: |
  「固体が液体に変わる状態変化である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ドライアイスがそのまま気体になる場面"
  - "塩素原子が電子を1個受け取って Cl- になる場面"
  - "氷を温めて水にする場面"
  - "6.0×10^23個の粒子をひとまとまりとして数える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「固体が液体に変わる状態変化である。」と最も関係が深い場面は「氷を温めて水にする場面」です。したがって、正解は「氷を温めて水にする場面」です。
  
  「ドライアイスがそのまま気体になる場面」は、「固体が液体にならずに気体になる状態変化である。」と結び付きが強い場面です。
  「塩素原子が電子を1個受け取って Cl- になる場面」は、「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」と結び付きが強い場面です。
  「氷を温めて水にする場面」が正しいです。この説明と結び付きが強い場面です。
  「6.0×10^23個の粒子をひとまとまりとして数える場面」は、「粒子の数をまとめて表すための単位である。」と結び付きが強い場面です。
