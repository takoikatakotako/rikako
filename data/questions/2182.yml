# 高校化学 問182
id: 2182
type: single_choice
text: |
  異性体と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ネオンやアルゴンが反応しにくい理由を考える場面"
  - "アンモニアを加えると深い青色のイオンができる場面"
  - "ブタンとイソブタンを比べる場面"
  - "鉄や銅、クロムの化合物の色の違いを考える場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  ブタンとイソブタンを比べる場面は、異性体と結び付きが強い場面です。したがって、正解は「ブタンとイソブタンを比べる場面」です。
  
  「ネオンやアルゴンが反応しにくい理由を考える場面」は、貴ガスと結び付きが強い場面です。
  「アンモニアを加えると深い青色のイオンができる場面」は、錯イオンと結び付きが強い場面です。
  「ブタンとイソブタンを比べる場面」が正しいです。これは異性体と結び付きが強い場面です。
  「鉄や銅、クロムの化合物の色の違いを考える場面」は、遷移元素と結び付きが強い場面です。
