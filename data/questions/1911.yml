# 化学基礎 問871
id: 1911
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "質量数 / 原子どうしが電子を共有してできる結び付きである。"
  - "共有結合 / 化学変化を、物質の種類と量の関係が分かるように表した式である。"
  - "化学反応式 / 原子核の中にある陽子数と中性子数の合計である。"
  - "陰イオン / 原子や原子団が電子を受け取って負の電荷をもつ粒子である。"
correct: 3
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「陰イオン / 原子や原子団が電子を受け取って負の電荷をもつ粒子である。」です。したがって、正解は「陰イオン / 原子や原子団が電子を受け取って負の電荷をもつ粒子である。」です。
  
  「質量数 / 原子どうしが電子を共有してできる結び付きである。」は、用語と説明の対応が合っていません。
  「共有結合 / 化学変化を、物質の種類と量の関係が分かるように表した式である。」は、用語と説明の対応が合っていません。
  「化学反応式 / 原子核の中にある陽子数と中性子数の合計である。」は、用語と説明の対応が合っていません。
  「陰イオン / 原子や原子団が電子を受け取って負の電荷をもつ粒子である。」が正しいです。用語と説明の対応が合っています。
