# 高校化学 問750
id: 2750
type: single_choice
text: |
  「電気量と生成物の量の比例に注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "置換反応"
  - "タンパク質"
  - "沸点"
  - "ファラデーの法則"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「電気量と生成物の量の比例に注目すること」という見方が大切なのはファラデーの法則です。したがって、正解は「ファラデーの法則」です。
  
  「置換反応」は、その語で大切なのは「もとの一部が別のものに置き換わること」という見方です。
  「タンパク質」は、その語で大切なのは「アミノ酸が多数つながった高分子であること」という見方です。
  「沸点」は、その語で大切なのは「蒸気圧と外圧のつり合いに注目すること」という見方です。
  「ファラデーの法則」が正しいです。この見方が大切な語です。
