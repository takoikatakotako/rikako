# 化学基礎 問392
id: 1432
type: single_choice
text: |
  ダニエル電池と最も関係が深い場面として、適切なものはどれか。
choices:
  - "亜鉛が銅より先にイオンになりやすいことを見る場面"
  - "塩酸が水溶液中で水素イオンを生じる場面"
  - "塩酸と水酸化ナトリウム水溶液を混ぜる場面"
  - "亜鉛板と銅板を使って豆電球を光らせる場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  亜鉛板と銅板を使って豆電球を光らせる場面は、ダニエル電池と結び付きが強い場面です。したがって、正解は「亜鉛板と銅板を使って豆電球を光らせる場面」です。
  
  「亜鉛が銅より先にイオンになりやすいことを見る場面」は、イオン化傾向と結び付きが強い場面です。
  「塩酸が水溶液中で水素イオンを生じる場面」は、酸と結び付きが強い場面です。
  「塩酸と水酸化ナトリウム水溶液を混ぜる場面」は、中和と結び付きが強い場面です。
  「亜鉛板と銅板を使って豆電球を光らせる場面」が正しいです。これはダニエル電池と結び付きが強い場面です。
