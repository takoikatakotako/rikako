# 化学基礎 問1000
id: 2040
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "融解 / 性質が周期的にくり返されること"
  - "周期律 / 物質の性質を示す小さな粒子として考えること"
  - "化学が拓く世界 / 化学が社会や生活に広く役立つこと"
  - "分子 / 固体から液体への変化であること"
correct: 2
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「化学が拓く世界 / 化学が社会や生活に広く役立つこと」です。したがって、正解は「化学が拓く世界 / 化学が社会や生活に広く役立つこと」です。
  
  「融解 / 性質が周期的にくり返されること」は、用語と要点の対応が合っていません。
  「周期律 / 物質の性質を示す小さな粒子として考えること」は、用語と要点の対応が合っていません。
  「化学が拓く世界 / 化学が社会や生活に広く役立つこと」が正しいです。用語と要点の対応が合っています。
  「分子 / 固体から液体への変化であること」は、用語と要点の対応が合っていません。
