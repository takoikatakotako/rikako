# 化学基礎 問450
id: 1490
type: single_choice
text: |
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "化学が拓く世界"
  - "塩橋"
  - "塩基"
  - "pH"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  化学の知識が生活、産業、環境、医療などに役立つという見方である。 に当てはまる語は化学が拓く世界です。したがって、正解は「化学が拓く世界」です。
  
  「化学が拓く世界」が正しいです。「化学の知識が生活、産業、環境、医療などに役立つという見方である。」に当てはまる語です。
  「塩橋」は、「二つの溶液の電気的なつり合いを保つための部分である。」に当てはまる語です。
  「塩基」は、「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」に当てはまる語です。
  「pH」は、「水溶液の酸性や塩基性の強さを表す尺度である。」に当てはまる語です。
