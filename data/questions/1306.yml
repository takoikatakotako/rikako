# 化学基礎 問266
id: 1306
type: single_choice
text: |
  質量数の特徴として、最も適切なものはどれか。
choices:
  - "陽子数は同じで中性子数が異なる"
  - "元素の性質に規則性がある"
  - "陽子数と中性子数の合計"
  - "化学的な性質に強く関わる電子"
correct: 2
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  質量数では、「陽子数と中性子数の合計」という点が大切です。したがって、正解は「陽子数と中性子数の合計」です。
  
  「陽子数は同じで中性子数が異なる」は、同位体に関係する特徴です。
  「元素の性質に規則性がある」は、周期律に関係する特徴です。
  「陽子数と中性子数の合計」が正しいです。質量数の特徴を表しています。
  「化学的な性質に強く関わる電子」は、最外殻電子に関係する特徴です。
