# 高校化学 問23
id: 733
type: single_choice
text: |
  溶解平衡についての説明として、最も適切なものはどれか。
choices:
  - "一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。"
  - "混合気体の全圧は各気体の分圧の和になるという法則である。"
  - "溶ける速さと析出する速さが等しくなっている平衡である。"
  - "絶対零度を基準にした温度で、単位は K で表す。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  溶解平衡は、溶ける速さと析出する速さが等しくなっている平衡である。 したがって、正解は「溶ける速さと析出する速さが等しくなっている平衡である。」です。
  
  「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」は、シャルルの法則の説明です。
  「混合気体の全圧は各気体の分圧の和になるという法則である。」は、分圧の法則の説明です。
  「溶ける速さと析出する速さが等しくなっている平衡である。」が正しいです。溶解平衡の説明です。
  「絶対零度を基準にした温度で、単位は K で表す。」は、絶対温度の説明です。
