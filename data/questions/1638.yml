# 化学基礎 問598
id: 1638
type: single_choice
text: |
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」を説明した文として、最も適切なものはどれか。
choices:
  - "食品や物質が酸化して変質するのを防ぐために用いられる物質である。"
  - "一種類の元素だけからできている物質である。"
  - "固体が液体にならずに気体になる状態変化である。"
  - "原子や原子団が電子を受け取って負の電荷をもつ粒子である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」を説明した文として適切なのは「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」です。したがって、正解は「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」です。
  
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」が正しいです。この具体例を説明した文です。
  「一種類の元素だけからできている物質である。」は、この説明は「鉄や酸素のように一種類の元素だけからできた物質を考える場面」と結び付きが強いです。
  「固体が液体にならずに気体になる状態変化である。」は、この説明は「ドライアイスがそのまま気体になる場面」と結び付きが強いです。
  「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」は、この説明は「塩素原子が電子を1個受け取って Cl- になる場面」と結び付きが強いです。
