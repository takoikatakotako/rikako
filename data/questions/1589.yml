# 化学基礎 問549
id: 1589
type: single_choice
text: |
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ポリエチレンやタンパク質のような長い分子を考える場面"
  - "水とエタノールの混合物を沸点の差で分ける場面"
  - "氷が溶けて水になる場面"
  - "炭素12で陽子数と中性子数の合計を見る場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」と最も関係が深い場面は「ポリエチレンやタンパク質のような長い分子を考える場面」です。したがって、正解は「ポリエチレンやタンパク質のような長い分子を考える場面」です。
  
  「ポリエチレンやタンパク質のような長い分子を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「水とエタノールの混合物を沸点の差で分ける場面」は、「沸点の違いを利用して液体を分ける方法である。」と結び付きが強い場面です。
  「氷が溶けて水になる場面」は、「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」と結び付きが強い場面です。
  「炭素12で陽子数と中性子数の合計を見る場面」は、「原子核の中にある陽子数と中性子数の合計である。」と結び付きが強い場面です。
