# 化学基礎 問313
id: 1353
type: single_choice
text: |
  凝固について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "元素を原子番号の順に並べると性質が周期的に変化するというきまりである。"
  - "液体が固体に変わる状態変化である。"
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  凝固は、液体が固体に変わる状態変化である。 したがって、正解は「液体が固体に変わる状態変化である。」です。
  
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」は、周期律の説明です。
  「液体が固体に変わる状態変化である。」が正しいです。凝固の説明です。
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、ろ過の説明です。
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、再結晶の説明です。
