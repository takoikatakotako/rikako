# 高校化学 問736
id: 2736
type: single_choice
text: |
  「一定圧力での熱の出入りに注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "アルカリ金属"
  - "エンタルピー変化"
  - "飽和炭化水素"
  - "アニリン"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「一定圧力での熱の出入りに注目すること」という見方が大切なのはエンタルピー変化です。したがって、正解は「エンタルピー変化」です。
  
  「アルカリ金属」は、その語で大切なのは「反応性が高く 1 価の陽イオンになりやすいこと」という見方です。
  「エンタルピー変化」が正しいです。この見方が大切な語です。
  「飽和炭化水素」は、その語で大切なのは「炭素間が単結合だけであること」という見方です。
  「アニリン」は、その語で大切なのは「ベンゼン環にアミノ基が直接つくこと」という見方です。
