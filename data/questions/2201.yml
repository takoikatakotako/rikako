# 高校化学 問201
id: 2201
type: single_choice
text: |
  「分子どうしの間にはたらく比較的弱い引力である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "イオン結晶"
  - "共有結合の結晶"
  - "分子間力"
  - "アモルファス"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  分子どうしの間にはたらく比較的弱い引力である。 に当てはまる語は分子間力です。したがって、正解は「分子間力」です。
  
  「イオン結晶」は、「陽イオンと陰イオンが規則正しく並んでできた結晶である。」に当てはまる語です。
  「共有結合の結晶」は、「原子が共有結合で三次元的に結び付いた結晶である。」に当てはまる語です。
  「分子間力」が正しいです。「分子どうしの間にはたらく比較的弱い引力である。」に当てはまる語です。
  「アモルファス」は、「結晶のような規則正しい配列をもたない固体である。」に当てはまる語です。
