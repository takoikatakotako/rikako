# 化学基礎 問926
id: 1966
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "酸 / 酸化銅から酸素が取れて銅になる場面"
  - "極性分子 / 水分子で電荷のかたよりを考える場面"
  - "還元 / 砂糖水が電流をほとんど通さない場面"
  - "非電解質 / 塩酸が水溶液中で水素イオンを生じる場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「極性分子 / 水分子で電荷のかたよりを考える場面」です。したがって、正解は「極性分子 / 水分子で電荷のかたよりを考える場面」です。
  
  「酸 / 酸化銅から酸素が取れて銅になる場面」は、用語と場面の対応が合っていません。
  「極性分子 / 水分子で電荷のかたよりを考える場面」が正しいです。用語と場面の対応が合っています。
  「還元 / 砂糖水が電流をほとんど通さない場面」は、用語と場面の対応が合っていません。
  「非電解質 / 塩酸が水溶液中で水素イオンを生じる場面」は、用語と場面の対応が合っていません。
