# 高校化学 問959
id: 2959
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "金属結晶 / 薄暗い部屋でコロイドに光を当てると筋が見える場面"
  - "チンダル現象 / 熱分解や一部の溶解で周囲が冷たくなる場面"
  - "電離平衡 / 弱酸が一部だけ電離している水溶液を考える場面"
  - "吸熱反応 / 金属が電気を通したりのびたりする理由を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「電離平衡 / 弱酸が一部だけ電離している水溶液を考える場面」です。したがって、正解は「電離平衡 / 弱酸が一部だけ電離している水溶液を考える場面」です。
  
  「金属結晶 / 薄暗い部屋でコロイドに光を当てると筋が見える場面」は、用語と場面の対応が合っていません。
  「チンダル現象 / 熱分解や一部の溶解で周囲が冷たくなる場面」は、用語と場面の対応が合っていません。
  「電離平衡 / 弱酸が一部だけ電離している水溶液を考える場面」が正しいです。用語と場面の対応が合っています。
  「吸熱反応 / 金属が電気を通したりのびたりする理由を考える場面」は、用語と場面の対応が合っていません。
