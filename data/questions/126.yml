# 令和7年度 ITパスポート 公開問題 問61
id: 126
type: single_choice
text: |
  DBMSのトランザクションに関する記述として、適切なものはどれか。
choices:
  - "あるデータベースの内容を他のデータベースに複製し、内容の同期をとる。"
  - "データベースに対して行った操作を、順次記録する。"
  - "データベースに対する一連の処理が全て成功したら変更結果を確定し、途中で失敗したら処理前の状態に戻す。"
  - "データベースの表の素引を作成し、検索時には索引を使用する。"
correct: 2
explanation: |
  この問題の公開解答では「データベースに対する一連の処理が全て成功したら変更結果を確定し、途中で失敗したら処理前の状態に戻す」が正解とされています。
  
  「あるデータベースの内容を他のデータベースに複製し、内容の同期をとる」は公開解答では正解ではありません。
  「データベースに対して行った操作を、順次記録する」は公開解答では正解ではありません。
  「データベースに対する一連の処理が全て成功したら変更結果を確定し、途中で失敗したら処理前の状態に戻す」が公開解答で正解とされています。
  「データベースの表の素引を作成し、検索時には索引を使用する」は公開解答では正解ではありません。
