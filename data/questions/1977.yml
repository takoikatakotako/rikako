# 化学基礎 問937
id: 1977
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "酸化 / マグネシウムが酸素と結び付く場面"
  - "ダニエル電池 / ポリエチレンやタンパク質のような長い分子を考える場面"
  - "高分子化合物 / 空気や食塩水のように複数の物質が混ざったものを考える場面"
  - "混合物 / 亜鉛板と銅板を使って豆電球を光らせる場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「酸化 / マグネシウムが酸素と結び付く場面」です。したがって、正解は「酸化 / マグネシウムが酸素と結び付く場面」です。
  
  「酸化 / マグネシウムが酸素と結び付く場面」が正しいです。用語と場面の対応が合っています。
  「ダニエル電池 / ポリエチレンやタンパク質のような長い分子を考える場面」は、用語と場面の対応が合っていません。
  「高分子化合物 / 空気や食塩水のように複数の物質が混ざったものを考える場面」は、用語と場面の対応が合っていません。
  「混合物 / 亜鉛板と銅板を使って豆電球を光らせる場面」は、用語と場面の対応が合っていません。
