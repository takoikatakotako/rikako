# 高校化学 問646
id: 2646
type: single_choice
text: |
  「水素を使って発電し、水を生じる仕組みを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "水溶液中で一部だけ電離する酸である。"
  - "周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。"
  - "燃料と酸化剤を外部から供給しながら電気を取り出す電池である。"
  - "カルボキシ基をもち、酸性を示す有機化合物である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「水素を使って発電し、水を生じる仕組みを考える場面」を説明した文として適切なのは「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」です。したがって、正解は「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」です。
  
  「水溶液中で一部だけ電離する酸である。」は、この説明は「酢酸が塩酸ほど強く電離しない場面」と結び付きが強いです。
  「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」は、この説明は「鉄や銅、クロムの化合物の色の違いを考える場面」と結び付きが強いです。
  「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」が正しいです。この具体例を説明した文です。
  「カルボキシ基をもち、酸性を示す有機化合物である。」は、この説明は「酢酸の性質やにおいを考える場面」と結び付きが強いです。
