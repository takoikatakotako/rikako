# 高校化学 問831
id: 2831
type: single_choice
text: |
  「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "炭素間が単結合だけであること"
  - "半透膜を通る粒子の大きさの違いを利用すること"
  - "ベンゼン環にアミノ基が直接つくこと"
  - "化学が社会課題の解決に役立つこと"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」を理解する上では、「半透膜を通る粒子の大きさの違いを利用すること」という見方が大切です。したがって、正解は「半透膜を通る粒子の大きさの違いを利用すること」です。
  
  「炭素間が単結合だけであること」は、その見方は飽和炭化水素に関係します。
  「半透膜を通る粒子の大きさの違いを利用すること」が正しいです。この説明と結び付きが強い見方です。
  「ベンゼン環にアミノ基が直接つくこと」は、その見方はアニリンに関係します。
  「化学が社会課題の解決に役立つこと」は、その見方は化学が築く未来に関係します。
