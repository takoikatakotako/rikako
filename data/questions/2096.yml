# 高校化学 問96
id: 2096
type: single_choice
text: |
  デンプンについての説明として、最も適切なものはどれか。
choices:
  - "化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。"
  - "一定量の溶媒に溶けることのできる溶質の最大量である。"
  - "溶ける速さと析出する速さが等しくなっている平衡である。"
  - "グルコースが多数つながった植物の貯蔵多糖である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  デンプンは、グルコースが多数つながった植物の貯蔵多糖である。 したがって、正解は「グルコースが多数つながった植物の貯蔵多糖である。」です。
  
  「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」は、化学が築く未来の説明です。
  「一定量の溶媒に溶けることのできる溶質の最大量である。」は、溶解度の説明です。
  「溶ける速さと析出する速さが等しくなっている平衡である。」は、溶解平衡の説明です。
  「グルコースが多数つながった植物の貯蔵多糖である。」が正しいです。デンプンの説明です。
