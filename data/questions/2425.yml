# 高校化学 問425
id: 2425
type: single_choice
text: |
  沸点上昇を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "蒸気圧降下の結果として沸点が上がること"
  - "半透膜を通る粒子の大きさの違いを利用すること"
  - "水となじみやすく安定しやすいこと"
  - "分子の集まり方や沸点に関係すること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  沸点上昇では、「蒸気圧降下の結果として沸点が上がること」という見方が大切です。したがって、正解は「蒸気圧降下の結果として沸点が上がること」です。
  
  「蒸気圧降下の結果として沸点が上がること」が正しいです。沸点上昇の要点を表しています。
  「半透膜を通る粒子の大きさの違いを利用すること」は、透析に関係する見方です。
  「水となじみやすく安定しやすいこと」は、親水コロイドに関係する見方です。
  「分子の集まり方や沸点に関係すること」は、分子間力に関係する見方です。
