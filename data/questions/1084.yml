# 化学基礎 問44
id: 1084
type: single_choice
text: |
  酸化剤についての説明として、最も適切なものはどれか。
choices:
  - "相手を酸化し、自分は還元される物質である。"
  - "相手を還元し、自分は酸化される物質である。"
  - "必ず金属である。"
  - "必ず気体である。"
correct: 0
explanation: |
  この問題は、「酸化剤の働き方」を確認する問題です。
  
  酸化剤は、相手から電子を受け取って相手を酸化します。その結果、自分自身は還元されます。したがって、正解は「相手を酸化し、自分は還元される物質である」です。
  
  「相手を酸化し、自分は還元される物質である」が正しいです。酸化剤の定義です。
  「相手を還元し、自分は酸化される物質である」は、還元剤の説明です。
  「必ず金属である」は、適切ではありません。
  「必ず気体である」は、適切ではありません。
