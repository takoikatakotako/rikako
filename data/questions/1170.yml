# 化学基礎 問130
id: 1170
type: single_choice
text: |
  化学反応式についての説明として、最も適切なものはどれか。
choices:
  - "水溶液中で水素イオンを生じる物質である。"
  - "化学反応に関わる物質とその量的関係を記号で表したものである。"
  - "水溶液中で水酸化物イオンを生じるか、水素イオンを受け取る物質である。"
  - "酸と塩基が反応して塩と水を生じる反応である。"
correct: 1
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  化学反応式は、化学反応に関わる物質とその量的関係を記号で表したものである。したがって、正解は「化学反応に関わる物質とその量的関係を記号で表したものである。」です。
  
  「水溶液中で水素イオンを生じる物質である。」は、酸の説明です。
  「化学反応に関わる物質とその量的関係を記号で表したものである。」が正しいです。化学反応式の説明です。
  「水溶液中で水酸化物イオンを生じるか、水素イオンを受け取る物質である。」は、塩基の説明です。
  「酸と塩基が反応して塩と水を生じる反応である。」は、中和の説明です。
