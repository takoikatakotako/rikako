# 化学基礎 問200
id: 1240
type: single_choice
text: |
  化学が拓く世界の例として、最も適切なものはどれか。
choices:
  - "砂と水の混合物から砂を取り除く操作"
  - "水とエタノールの混合物を分ける操作"
  - "水道水の殺菌や洗浄の技術"
  - "ミョウバンを熱い水に溶かして冷やし、結晶を取り出す操作"
correct: 2
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  水道水の殺菌や洗浄の技術は、化学が拓く世界の例です。したがって、正解は「水道水の殺菌や洗浄の技術」です。
  
  「砂と水の混合物から砂を取り除く操作」は、ろ過の例として見る方が適切です。
  「水とエタノールの混合物を分ける操作」は、蒸留の例として見る方が適切です。
  「水道水の殺菌や洗浄の技術」が正しいです。これは化学が拓く世界の例です。
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す操作」は、再結晶の例として見る方が適切です。
