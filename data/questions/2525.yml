# 高校化学 問525
id: 2525
type: single_choice
text: |
  「溶液の沸点が純粋な溶媒より高くなる現象である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "食塩水の沸点が水より少し高くなることを考える場面"
  - "牛乳やゼラチン溶液のような見た目の系を考える場面"
  - "燃焼や中和で容器が温かくなる場面"
  - "流した電流が大きいほど析出量が増える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「溶液の沸点が純粋な溶媒より高くなる現象である。」と最も関係が深い場面は「食塩水の沸点が水より少し高くなることを考える場面」です。したがって、正解は「食塩水の沸点が水より少し高くなることを考える場面」です。
  
  「食塩水の沸点が水より少し高くなることを考える場面」が正しいです。この説明と結び付きが強い場面です。
  「牛乳やゼラチン溶液のような見た目の系を考える場面」は、「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」と結び付きが強い場面です。
  「燃焼や中和で容器が温かくなる場面」は、「反応の結果として周囲へ熱を放出する反応である。」と結び付きが強い場面です。
  「流した電流が大きいほど析出量が増える場面」は、「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」と結び付きが強い場面です。
