# 高校化学 問248
id: 2248
type: single_choice
text: |
  「電気分解で酸化が起こる電極である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "可逆反応"
  - "陽極"
  - "平衡定数"
  - "アンモニア合成"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  電気分解で酸化が起こる電極である。 に当てはまる語は陽極です。したがって、正解は「陽極」です。
  
  「可逆反応」は、「正反応と逆反応の両方が起こり得る反応である。」に当てはまる語です。
  「陽極」が正しいです。「電気分解で酸化が起こる電極である。」に当てはまる語です。
  「平衡定数」は、「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」に当てはまる語です。
  「アンモニア合成」は、「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」に当てはまる語です。
