# 高校化学 問232
id: 2232
type: single_choice
text: |
  「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "溶解度"
  - "電気泳動"
  - "溶解平衡"
  - "沸点上昇"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  電場をかけたとき、荷電したコロイド粒子が移動する現象である。 に当てはまる語は電気泳動です。したがって、正解は「電気泳動」です。
  
  「溶解度」は、「一定量の溶媒に溶けることのできる溶質の最大量である。」に当てはまる語です。
  「電気泳動」が正しいです。「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」に当てはまる語です。
  「溶解平衡」は、「溶ける速さと析出する速さが等しくなっている平衡である。」に当てはまる語です。
  「沸点上昇」は、「溶液の沸点が純粋な溶媒より高くなる現象である。」に当てはまる語です。
