# 化学基礎 問753
id: 1793
type: single_choice
text: |
  「溶解度の差を利用すること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。"
  - "二つの溶液の電気的なつり合いを保つための部分である。"
  - "化学の知識が生活、産業、環境、医療などに役立つという見方である。"
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
correct: 3
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「溶解度の差を利用すること」という見方と最も関係が深い説明は「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」です。したがって、正解は「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」です。
  
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」は、その説明で大切なのは「色の変化で液性を見分けること」という見方です。
  「二つの溶液の電気的なつり合いを保つための部分である。」は、その説明で大切なのは「電池の中で電気的なつり合いを保つこと」という見方です。
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」は、その説明で大切なのは「化学が社会や生活に広く役立つこと」という見方です。
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」が正しいです。この見方と最も関係が深い説明です。
