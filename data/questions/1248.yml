# 化学基礎 問208
id: 1248
type: single_choice
text: |
  「水 H2O」に最も関係が深い語として、適切なものはどれか。
choices:
  - "物理変化"
  - "化合物"
  - "化学変化"
  - "融解"
correct: 1
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「水 H2O」に最も関係が深いのは化合物です。したがって、正解は「化合物」です。
  
  「物理変化」は、この例に最も関係が深い語ではありません。
  「化合物」が正しいです。この例は化合物に関係しています。
  「化学変化」は、この例に最も関係が深い語ではありません。
  「融解」は、この例に最も関係が深い語ではありません。
