# 化学基礎 問902
id: 1942
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "単体 / ドライアイスがそのまま気体になる場面"
  - "蒸留 / 水とエタノールの混合物を沸点の差で分ける場面"
  - "昇華 / 塩素原子が電子を1個受け取って Cl- になる場面"
  - "陰イオン / 鉄や酸素のように一種類の元素だけからできた物質を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「蒸留 / 水とエタノールの混合物を沸点の差で分ける場面」です。したがって、正解は「蒸留 / 水とエタノールの混合物を沸点の差で分ける場面」です。
  
  「単体 / ドライアイスがそのまま気体になる場面」は、用語と場面の対応が合っていません。
  「蒸留 / 水とエタノールの混合物を沸点の差で分ける場面」が正しいです。用語と場面の対応が合っています。
  「昇華 / 塩素原子が電子を1個受け取って Cl- になる場面」は、用語と場面の対応が合っていません。
  「陰イオン / 鉄や酸素のように一種類の元素だけからできた物質を考える場面」は、用語と場面の対応が合っていません。
