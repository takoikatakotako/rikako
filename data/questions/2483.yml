# 高校化学 問483
id: 2483
type: single_choice
text: |
  アルコールを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "ポリエステルの一種で再利用もしやすいこと"
  - "アミノ基とカルボキシ基をあわせもつこと"
  - "ヒドロキシ基をもつこと"
  - "単糖類でエネルギー源になりやすいこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  アルコールでは、「ヒドロキシ基をもつこと」という見方が大切です。したがって、正解は「ヒドロキシ基をもつこと」です。
  
  「ポリエステルの一種で再利用もしやすいこと」は、PETに関係する見方です。
  「アミノ基とカルボキシ基をあわせもつこと」は、アミノ酸に関係する見方です。
  「ヒドロキシ基をもつこと」が正しいです。アルコールの要点を表しています。
  「単糖類でエネルギー源になりやすいこと」は、グルコースに関係する見方です。
