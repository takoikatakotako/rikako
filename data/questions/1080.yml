# 令和6年度 ITパスポート 公開問題 問100
id: 1080
type: single_choice
text: |
  正しいURLを指定してインターネット上のWebサイトへアクセスしようとした利用者が、偽装されたWebサイトに接続されてしまうようになった。原因を調べたところ、ドメイン名とIPアドレスの対応付けを管理するサーバに脆弱性があり、攻撃者によって、ドメイン名とIPアドレスを対応付ける情報が書き換えられていた。このサーバが受けた攻撃はどれか。
choices:
  - "DDoS攻撃"
  - "DNSキャッシュポイズニング"
  - "ソーシャルエンジニアリング"
  - "ドライブバイダウンロード"
correct: 1
