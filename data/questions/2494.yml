# 高校化学 問494
id: 2494
type: single_choice
text: |
  ペプチド結合を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "同じ分子式でも構造が違うこと"
  - "アミノ酸どうしをつなぐ結合であること"
  - "分子の端にカルボニル構造をもつこと"
  - "カルボン酸とアルコールの組合せでできること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  ペプチド結合では、「アミノ酸どうしをつなぐ結合であること」という見方が大切です。したがって、正解は「アミノ酸どうしをつなぐ結合であること」です。
  
  「同じ分子式でも構造が違うこと」は、異性体に関係する見方です。
  「アミノ酸どうしをつなぐ結合であること」が正しいです。ペプチド結合の要点を表しています。
  「分子の端にカルボニル構造をもつこと」は、アルデヒドに関係する見方です。
  「カルボン酸とアルコールの組合せでできること」は、エステルに関係する見方です。
