# 高校化学 問779
id: 2779
type: single_choice
text: |
  「多重結合をもつこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "不飽和炭化水素"
  - "理想気体の状態方程式"
  - "溶解度"
  - "電気泳動"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「多重結合をもつこと」という見方が大切なのは不飽和炭化水素です。したがって、正解は「不飽和炭化水素」です。
  
  「不飽和炭化水素」が正しいです。この見方が大切な語です。
  「理想気体の状態方程式」は、その語で大切なのは「圧力、体積、物質量、温度をまとめて扱うこと」という見方です。
  「溶解度」は、その語で大切なのは「どこまで溶けるかの限度に注目すること」という見方です。
  「電気泳動」は、その語で大切なのは「コロイド粒子の電荷に注目すること」という見方です。
