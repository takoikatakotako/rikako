# 高校化学 問39
id: 749
type: single_choice
text: |
  発熱反応についての説明として、最も適切なものはどれか。
choices:
  - "半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。"
  - "コロイド粒子が光を散乱するため、光の道筋が見える現象である。"
  - "反応の結果として周囲へ熱を放出する反応である。"
  - "半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  発熱反応は、反応の結果として周囲へ熱を放出する反応である。 したがって、正解は「反応の結果として周囲へ熱を放出する反応である。」です。
  
  「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」は、浸透圧の説明です。
  「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」は、チンダル現象の説明です。
  「反応の結果として周囲へ熱を放出する反応である。」が正しいです。発熱反応の説明です。
  「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」は、透析の説明です。
