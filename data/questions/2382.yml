# 高校化学 問382
id: 2382
type: single_choice
text: |
  「ブタンとイソブタンを比べる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "異性体"
  - "不飽和炭化水素"
  - "置換反応"
  - "アルデヒド"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  ブタンとイソブタンを比べる場面 と最も関係が深いのは異性体です。したがって、正解は「異性体」です。
  
  「異性体」が正しいです。この具体例と最も関係が深い語です。
  「不飽和炭化水素」は、「エチレンやアセチレンの反応性を考える場面」と結び付きが強い語です。
  「置換反応」は、「メタンの水素が塩素に置き換わる場面」と結び付きが強い語です。
  「アルデヒド」は、「ホルムアルデヒドやアセトアルデヒドを考える場面」と結び付きが強い語です。
