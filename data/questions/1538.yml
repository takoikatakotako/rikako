# 化学基礎 問498
id: 1538
type: single_choice
text: |
  酸化防止剤を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸性と塩基性の強さを数で見ること"
  - "色の変化で液性を見分けること"
  - "成分が二種類以上まざっていること"
  - "酸化による変質を防ぐこと"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  酸化防止剤では、「酸化による変質を防ぐこと」という見方が大切です。したがって、正解は「酸化による変質を防ぐこと」です。
  
  「酸性と塩基性の強さを数で見ること」は、pHに関係する見方です。
  「色の変化で液性を見分けること」は、指示薬に関係する見方です。
  「成分が二種類以上まざっていること」は、混合物に関係する見方です。
  「酸化による変質を防ぐこと」が正しいです。酸化防止剤の要点を表しています。
