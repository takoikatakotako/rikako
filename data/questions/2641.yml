# 高校化学 問641
id: 2641
type: single_choice
text: |
  「ケミカルライトが光る仕組みを考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。"
  - "化学反応によって光が放出される現象である。"
  - "周期表17族に属し、陰イオンになりやすい非金属元素の総称である。"
  - "多重結合に原子や原子団が加わる反応である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「ケミカルライトが光る仕組みを考える場面」を説明した文として適切なのは「化学反応によって光が放出される現象である。」です。したがって、正解は「化学反応によって光が放出される現象である。」です。
  
  「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」は、この説明は「高圧や触媒を利用してアンモニアを得る場面」と結び付きが強いです。
  「化学反応によって光が放出される現象である。」が正しいです。この具体例を説明した文です。
  「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」は、この説明は「フッ素や塩素、臭素の反応性を比べる場面」と結び付きが強いです。
  「多重結合に原子や原子団が加わる反応である。」は、この説明は「エチレンに臭素が付加する場面」と結び付きが強いです。
