# 高校化学 問137
id: 2137
type: single_choice
text: |
  ヘスの法則と最も関係が深い場面として、適切なものはどれか。
choices:
  - "コロイド粒子が陽極や陰極へ移動する様子を考える場面"
  - "複数の反応式を組み合わせて全体の反応熱を求める場面"
  - "金属や硫黄のコロイドが電解質で沈みやすい場面"
  - "反応前後で熱の出入りを比較する場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  複数の反応式を組み合わせて全体の反応熱を求める場面は、ヘスの法則と結び付きが強い場面です。したがって、正解は「複数の反応式を組み合わせて全体の反応熱を求める場面」です。
  
  「コロイド粒子が陽極や陰極へ移動する様子を考える場面」は、電気泳動と結び付きが強い場面です。
  「複数の反応式を組み合わせて全体の反応熱を求める場面」が正しいです。これはヘスの法則と結び付きが強い場面です。
  「金属や硫黄のコロイドが電解質で沈みやすい場面」は、疎水コロイドと結び付きが強い場面です。
  「反応前後で熱の出入りを比較する場面」は、エンタルピー変化と結び付きが強い場面です。
