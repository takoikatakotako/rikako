# 高校化学 問691
id: 2691
type: single_choice
text: |
  「飲料ボトルや衣料用繊維を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "一定温度で一定量の気体の圧力は体積に反比例するという法則である。"
  - "結晶のような規則正しい配列をもたない固体である。"
  - "コロイド粒子が不規則に動いて見える現象である。"
  - "ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「飲料ボトルや衣料用繊維を考える場面」を説明した文として適切なのは「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」です。したがって、正解は「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」です。
  
  「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」は、この説明は「注射器の口をふさいで押すと体積が減って圧力が上がる場面」と結び付きが強いです。
  「結晶のような規則正しい配列をもたない固体である。」は、この説明は「ガラスのように一定の融点を示しにくい固体を考える場面」と結び付きが強いです。
  「コロイド粒子が不規則に動いて見える現象である。」は、この説明は「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」と結び付きが強いです。
  「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」が正しいです。この具体例を説明した文です。
