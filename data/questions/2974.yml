# 高校化学 問974
id: 2974
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "親水コロイド / 自動車のバッテリーを考える場面"
  - "遷移元素 / 鉄や銅、クロムの化合物の色の違いを考える場面"
  - "鉛蓄電池 / 密閉容器で反応物と生成物の量が一定になる場面"
  - "化学平衡 / デンプンやゼラチンが水中で安定しやすい場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「遷移元素 / 鉄や銅、クロムの化合物の色の違いを考える場面」です。したがって、正解は「遷移元素 / 鉄や銅、クロムの化合物の色の違いを考える場面」です。
  
  「親水コロイド / 自動車のバッテリーを考える場面」は、用語と場面の対応が合っていません。
  「遷移元素 / 鉄や銅、クロムの化合物の色の違いを考える場面」が正しいです。用語と場面の対応が合っています。
  「鉛蓄電池 / 密閉容器で反応物と生成物の量が一定になる場面」は、用語と場面の対応が合っていません。
  「化学平衡 / デンプンやゼラチンが水中で安定しやすい場面」は、用語と場面の対応が合っていません。
