# 高校化学 問77
id: 2077
type: single_choice
text: |
  銅についての説明として、最も適切なものはどれか。
choices:
  - "遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。"
  - "一度使い切ることを前提にした一次電池の代表例である。"
  - "リチウムイオンの移動を利用する充電式電池である。"
  - "電気エネルギーを使って自発的でない化学変化を起こす操作である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  銅は、遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。 したがって、正解は「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」です。
  
  「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」が正しいです。銅の説明です。
  「一度使い切ることを前提にした一次電池の代表例である。」は、乾電池の説明です。
  「リチウムイオンの移動を利用する充電式電池である。」は、リチウムイオン電池の説明です。
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」は、電気分解の説明です。
