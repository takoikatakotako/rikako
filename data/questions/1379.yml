# 化学基礎 問339
id: 1379
type: single_choice
text: |
  酸化剤について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "食品や物質が酸化して変質するのを防ぐために用いられる物質である。"
  - "化学の知識が生活、産業、環境、医療などに役立つという見方である。"
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
  - "相手を酸化させ、自身は還元される物質である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  酸化剤は、相手を酸化させ、自身は還元される物質である。 したがって、正解は「相手を酸化させ、自身は還元される物質である。」です。
  
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」は、酸化防止剤の説明です。
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」は、化学が拓く世界の説明です。
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」は、モル濃度の説明です。
  「相手を酸化させ、自身は還元される物質である。」が正しいです。酸化剤の説明です。
