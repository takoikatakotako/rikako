# 高校化学 問675
id: 2675
type: single_choice
text: |
  「ナトリウムで黄色、銅で青緑色を確かめる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "多数のアミノ酸がつながってできた天然高分子化合物である。"
  - "液体の蒸気圧が外圧に等しくなる温度である。"
  - "結晶の中で粒子が規則正しく並んだ構造である。"
  - "金属元素を炎に入れたときに特有の色を示す反応である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「ナトリウムで黄色、銅で青緑色を確かめる場面」を説明した文として適切なのは「金属元素を炎に入れたときに特有の色を示す反応である。」です。したがって、正解は「金属元素を炎に入れたときに特有の色を示す反応である。」です。
  
  「多数のアミノ酸がつながってできた天然高分子化合物である。」は、この説明は「酵素や筋肉の主成分を考える場面」と結び付きが強いです。
  「液体の蒸気圧が外圧に等しくなる温度である。」は、この説明は「水が沸騰し始める温度を考える場面」と結び付きが強いです。
  「結晶の中で粒子が規則正しく並んだ構造である。」は、この説明は「食塩や金属の規則正しい並び方を考える場面」と結び付きが強いです。
  「金属元素を炎に入れたときに特有の色を示す反応である。」が正しいです。この具体例を説明した文です。
