# 高校化学 問348
id: 2348
type: single_choice
text: |
  「電気分解で気体が発生する電極側を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "水のイオン積"
  - "塩の加水分解"
  - "陽極"
  - "弱塩基"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  電気分解で気体が発生する電極側を考える場面 と最も関係が深いのは陽極です。したがって、正解は「陽極」です。
  
  「水のイオン積」は、「中性の水で H+ と OH- の関係を考える場面」と結び付きが強い語です。
  「塩の加水分解」は、「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」と結び付きが強い語です。
  「陽極」が正しいです。この具体例と最も関係が深い語です。
  「弱塩基」は、「アンモニア水が強塩基ほど完全には電離しない場面」と結び付きが強い語です。
