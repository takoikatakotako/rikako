# 化学基礎 問518
id: 1558
type: single_choice
text: |
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "塩素原子が電子を1個受け取って Cl- になる場面"
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
  - "6.0×10^23個の粒子をひとまとまりとして数える場面"
  - "同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」と最も関係が深い場面は「周期表で似た性質の元素が縦に並ぶことを見る場面」です。したがって、正解は「周期表で似た性質の元素が縦に並ぶことを見る場面」です。
  
  「塩素原子が電子を1個受け取って Cl- になる場面」は、「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」と結び付きが強い場面です。
  「周期表で似た性質の元素が縦に並ぶことを見る場面」が正しいです。この説明と結び付きが強い場面です。
  「6.0×10^23個の粒子をひとまとまりとして数える場面」は、「粒子の数をまとめて表すための単位である。」と結び付きが強い場面です。
  「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」は、「溶けた物質のうち、電離してイオンになった割合である。」と結び付きが強い場面です。
