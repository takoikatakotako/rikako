# 化学基礎 問294
id: 1334
type: single_choice
text: |
  放射性同位体の特徴として、最も適切なものはどれか。
choices:
  - "金属元素の確認に使う"
  - "電離した割合を表す"
  - "年代測定や医療に利用される"
  - "酸性やアルカリ性で色が変わる"
correct: 2
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  放射性同位体では、「年代測定や医療に利用される」という点が大切です。したがって、正解は「年代測定や医療に利用される」です。
  
  「金属元素の確認に使う」は、炎色反応に関係する特徴です。
  「電離した割合を表す」は、電離度に関係する特徴です。
  「年代測定や医療に利用される」が正しいです。放射性同位体の特徴を表しています。
  「酸性やアルカリ性で色が変わる」は、指示薬に関係する特徴です。
