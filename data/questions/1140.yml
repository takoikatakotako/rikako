# 化学基礎 問100
id: 1140
type: single_choice
text: |
  化学基礎を学ぶ意義として、最も適切なものはどれか。
choices:
  - "物質の性質や変化を理解し、日常生活や社会とのつながりを考えられるようにすること。"
  - "計算だけを機械的に覚えること。"
  - "化学を日常生活から切り離して考えること。"
  - "物質の違いを一切見分けないこと。"
correct: 0
explanation: |
  この問題は、「化学基礎を学ぶ目的」を考える問題です。
  
  化学基礎では、物質の性質や変化を理解するだけでなく、それが日常生活や社会をどう支えているかも考えます。したがって、正解は「物質の性質や変化を理解し、日常生活や社会とのつながりを考えられるようにすること」です。
  
  「物質の性質や変化を理解し、日常生活や社会とのつながりを考えられるようにすること」が正しいです。
  「計算だけを機械的に覚えること」は、学ぶ意義を十分に表していません。
  「化学を日常生活から切り離して考えること」は、適切ではありません。
  「物質の違いを一切見分けないこと」は、適切ではありません。
