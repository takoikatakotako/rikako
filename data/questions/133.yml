# 令和7年度 ITパスポート 公開問題 問45
id: 133
type: single_choice
text: |
  計画時の予算が2,000万円で、40日間で100本のプログラムを作成するプロジェク
  トがある。プロジェクトが20日経過した時点で全体の40%である40本のプログラム
  が完成し、1,000万円のコストが掛かった。プロジェクトの指標を次の評価式で算
  出する場合、プロジェクトの指標として適切な組合せはどれか。ここで、各プログ
  ラムの作成に必要な日数及びコストは全て同一で、プロジェクト期間中は常に同じ
  量の作業が実施されるものとする。
  ［評価式〕
  スケジュール（%）：
  （完成したプログラム本数＝評価時点での完成見込みプログラム本数）✕100
  コスト（％）：
  （完成したプログラムに掛かったコスト
  ＝完成したプログラム分として計画したコスト）✕100
  プロジェクトの指標
  スケジュール（％）
  コスト（%）
choices:
  - ""
  - ""
  - "90."
  - ""
correct: 0
explanation: |
