# 化学基礎 問630
id: 1670
type: single_choice
text: |
  「反応する物質とできる物質の関係を式で示すこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "非電解質"
  - "蒸留"
  - "物理変化"
  - "化学反応式"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「反応する物質とできる物質の関係を式で示すこと」という見方が大切なのは化学反応式です。したがって、正解は「化学反応式」です。
  
  「非電解質」は、その語で大切なのは「水溶液でも電流をほとんど通さないこと」という見方です。
  「蒸留」は、その語で大切なのは「沸点の違いを利用すること」という見方です。
  「物理変化」は、その語で大切なのは「物質の種類が変わらないこと」という見方です。
  「化学反応式」が正しいです。この見方が大切な語です。
