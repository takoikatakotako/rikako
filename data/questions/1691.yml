# 化学基礎 問651
id: 1691
type: single_choice
text: |
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電気的な引力で結び付くこと"
  - "1Lあたりの物質量で表すこと"
  - "色の変化で液性を見分けること"
  - "水に溶けない固体を液体から分けること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」を理解する上では、「水に溶けない固体を液体から分けること」という見方が大切です。したがって、正解は「水に溶けない固体を液体から分けること」です。
  
  「電気的な引力で結び付くこと」は、その見方はイオン結合に関係します。
  「1Lあたりの物質量で表すこと」は、その見方はモル濃度に関係します。
  「色の変化で液性を見分けること」は、その見方は指示薬に関係します。
  「水に溶けない固体を液体から分けること」が正しいです。この説明と結び付きが強い見方です。
