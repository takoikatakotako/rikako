# 化学基礎 問312
id: 1352
type: single_choice
text: |
  蒸発について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "液体が気体になる状態変化である。"
  - "陽子数は同じで中性子数が異なる原子どうしである。"
  - "原子のいちばん外側の電子殻にある電子である。"
  - "沸点の違いを利用して液体を分ける方法である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  蒸発は、液体が気体になる状態変化である。 したがって、正解は「液体が気体になる状態変化である。」です。
  
  「液体が気体になる状態変化である。」が正しいです。蒸発の説明です。
  「陽子数は同じで中性子数が異なる原子どうしである。」は、同位体の説明です。
  「原子のいちばん外側の電子殻にある電子である。」は、最外殻電子の説明です。
  「沸点の違いを利用して液体を分ける方法である。」は、蒸留の説明です。
