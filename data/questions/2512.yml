# 高校化学 問512
id: 2512
type: single_choice
text: |
  「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "塩化ナトリウムの結晶のつくりを考える場面"
  - "凍結防止剤をまいた道路の水が凍りにくくなる場面"
  - "複数の反応式を組み合わせて全体の反応熱を求める場面"
  - "高圧や低温で気体のふるまいが理想気体からずれる場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」と最も関係が深い場面は「高圧や低温で気体のふるまいが理想気体からずれる場面」です。したがって、正解は「高圧や低温で気体のふるまいが理想気体からずれる場面」です。
  
  「塩化ナトリウムの結晶のつくりを考える場面」は、「陽イオンと陰イオンが規則正しく並んでできた結晶である。」と結び付きが強い場面です。
  「凍結防止剤をまいた道路の水が凍りにくくなる場面」は、「溶液の凝固点が純粋な溶媒より低くなる現象である。」と結び付きが強い場面です。
  「複数の反応式を組み合わせて全体の反応熱を求める場面」は、「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」と結び付きが強い場面です。
  「高圧や低温で気体のふるまいが理想気体からずれる場面」が正しいです。この説明と結び付きが強い場面です。
