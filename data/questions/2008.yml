# 化学基礎 問968
id: 2008
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "モル濃度 / 色の変化で液性を見分けること"
  - "指示薬 / 電池の中で電気的なつり合いを保つこと"
  - "周期律 / 性質が周期的にくり返されること"
  - "塩橋 / 1Lあたりの物質量で表すこと"
correct: 2
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「周期律 / 性質が周期的にくり返されること」です。したがって、正解は「周期律 / 性質が周期的にくり返されること」です。
  
  「モル濃度 / 色の変化で液性を見分けること」は、用語と要点の対応が合っていません。
  「指示薬 / 電池の中で電気的なつり合いを保つこと」は、用語と要点の対応が合っていません。
  「周期律 / 性質が周期的にくり返されること」が正しいです。用語と要点の対応が合っています。
  「塩橋 / 1Lあたりの物質量で表すこと」は、用語と要点の対応が合っていません。
