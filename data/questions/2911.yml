# 高校化学 問911
id: 2911
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "貴ガス / メタンの水素が塩素に置き換わる場面"
  - "置換反応 / 酵素や筋肉の主成分を考える場面"
  - "分圧の法則 / 酸素と窒素が混ざった気体の圧力を考える場面"
  - "タンパク質 / ネオンやアルゴンが反応しにくい理由を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「分圧の法則 / 酸素と窒素が混ざった気体の圧力を考える場面」です。したがって、正解は「分圧の法則 / 酸素と窒素が混ざった気体の圧力を考える場面」です。
  
  「貴ガス / メタンの水素が塩素に置き換わる場面」は、用語と場面の対応が合っていません。
  「置換反応 / 酵素や筋肉の主成分を考える場面」は、用語と場面の対応が合っていません。
  「分圧の法則 / 酸素と窒素が混ざった気体の圧力を考える場面」が正しいです。用語と場面の対応が合っています。
  「タンパク質 / ネオンやアルゴンが反応しにくい理由を考える場面」は、用語と場面の対応が合っていません。
