# 化学基礎 問635
id: 1675
type: single_choice
text: |
  「どのくらいイオンに分かれるかを表すこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "電離度"
  - "化学が拓く世界"
  - "単体"
  - "昇華"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「どのくらいイオンに分かれるかを表すこと」という見方が大切なのは電離度です。したがって、正解は「電離度」です。
  
  「電離度」が正しいです。この見方が大切な語です。
  「化学が拓く世界」は、その語で大切なのは「化学が社会や生活に広く役立つこと」という見方です。
  「単体」は、その語で大切なのは「一種類の元素だけからできること」という見方です。
  「昇華」は、その語で大切なのは「固体から直接気体になること」という見方です。
