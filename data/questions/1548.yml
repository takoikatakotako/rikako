# 化学基礎 問508
id: 1548
type: single_choice
text: |
  「二種類以上の元素が結び付いてできている純物質である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "氷を温めて水にする場面"
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
  - "水分子や酸素分子を粒として考える場面"
  - "水や二酸化炭素のように複数の元素からできた物質を考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「二種類以上の元素が結び付いてできている純物質である。」と最も関係が深い場面は「水や二酸化炭素のように複数の元素からできた物質を考える場面」です。したがって、正解は「水や二酸化炭素のように複数の元素からできた物質を考える場面」です。
  
  「氷を温めて水にする場面」は、「固体が液体に変わる状態変化である。」と結び付きが強い場面です。
  「周期表で似た性質の元素が縦に並ぶことを見る場面」は、「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」と結び付きが強い場面です。
  「水分子や酸素分子を粒として考える場面」は、「原子が結び付いてできた、物質の性質を示す小さな粒子である。」と結び付きが強い場面です。
  「水や二酸化炭素のように複数の元素からできた物質を考える場面」が正しいです。この説明と結び付きが強い場面です。
