# 高校化学 問622
id: 2622
type: single_choice
text: |
  「食塩を加えても底に残るようになった食塩水を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "反応の結果として周囲へ熱を放出する反応である。"
  - "電気分解で生じる物質の量は流れた電気量に比例するという法則である。"
  - "その温度でそれ以上溶質が溶けない状態の溶液である。"
  - "少量の酸や塩基を加えても pH が変わりにくい溶液である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「食塩を加えても底に残るようになった食塩水を考える場面」を説明した文として適切なのは「その温度でそれ以上溶質が溶けない状態の溶液である。」です。したがって、正解は「その温度でそれ以上溶質が溶けない状態の溶液である。」です。
  
  「反応の結果として周囲へ熱を放出する反応である。」は、この説明は「燃焼や中和で容器が温かくなる場面」と結び付きが強いです。
  「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」は、この説明は「流した電流が大きいほど析出量が増える場面」と結び付きが強いです。
  「その温度でそれ以上溶質が溶けない状態の溶液である。」が正しいです。この具体例を説明した文です。
  「少量の酸や塩基を加えても pH が変わりにくい溶液である。」は、この説明は「血液や実験用の溶液で pH を保ちたい場面」と結び付きが強いです。
