# 化学基礎 問335
id: 1375
type: single_choice
text: |
  電離度について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "粒子の数をまとめて表すための単位である。"
  - "化学変化を、物質の種類と量の関係が分かるように表した式である。"
  - "水に溶けても電流をほとんど通さない物質である。"
  - "溶けた物質のうち、電離してイオンになった割合である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  電離度は、溶けた物質のうち、電離してイオンになった割合である。 したがって、正解は「溶けた物質のうち、電離してイオンになった割合である。」です。
  
  「粒子の数をまとめて表すための単位である。」は、モルの説明です。
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」は、化学反応式の説明です。
  「水に溶けても電流をほとんど通さない物質である。」は、非電解質の説明です。
  「溶けた物質のうち、電離してイオンになった割合である。」が正しいです。電離度の説明です。
