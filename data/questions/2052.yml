# 高校化学 問52
id: 2052
type: single_choice
text: |
  活性化エネルギーについての説明として、最も適切なものはどれか。
choices:
  - "平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。"
  - "電離する粒子と電離していない粒子が平衡になっている状態である。"
  - "少量の酸や塩基を加えても pH が変わりにくい溶液である。"
  - "反応が進むために必要な最小限のエネルギーである。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  活性化エネルギーは、反応が進むために必要な最小限のエネルギーである。 したがって、正解は「反応が進むために必要な最小限のエネルギーである。」です。
  
  「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」は、ルシャトリエの原理の説明です。
  「電離する粒子と電離していない粒子が平衡になっている状態である。」は、電離平衡の説明です。
  「少量の酸や塩基を加えても pH が変わりにくい溶液である。」は、緩衝液の説明です。
  「反応が進むために必要な最小限のエネルギーである。」が正しいです。活性化エネルギーの説明です。
