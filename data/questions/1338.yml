# 化学基礎 問298
id: 1338
type: single_choice
text: |
  酸化防止剤の特徴として、最も適切なものはどれか。
choices:
  - "多数の小さな単位がつながってできる"
  - "日常生活や社会の技術と結び付く"
  - "酸化を防ぐために用いる"
  - "水に溶けない固体を液体から分ける"
correct: 2
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  酸化防止剤では、「酸化を防ぐために用いる」という点が大切です。したがって、正解は「酸化を防ぐために用いる」です。
  
  「多数の小さな単位がつながってできる」は、高分子化合物に関係する特徴です。
  「日常生活や社会の技術と結び付く」は、化学が拓く世界に関係する特徴です。
  「酸化を防ぐために用いる」が正しいです。酸化防止剤の特徴を表しています。
  「水に溶けない固体を液体から分ける」は、ろ過に関係する特徴です。
