# 高校化学 問438
id: 2438
type: single_choice
text: |
  結合エネルギーを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "平衡の位置を数で表すこと"
  - "結合を切るのに必要なエネルギーに注目すること"
  - "条件を工夫して平衡を生成物側へ寄せること"
  - "H+ と OH- の積が一定であること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  結合エネルギーでは、「結合を切るのに必要なエネルギーに注目すること」という見方が大切です。したがって、正解は「結合を切るのに必要なエネルギーに注目すること」です。
  
  「平衡の位置を数で表すこと」は、平衡定数に関係する見方です。
  「結合を切るのに必要なエネルギーに注目すること」が正しいです。結合エネルギーの要点を表しています。
  「条件を工夫して平衡を生成物側へ寄せること」は、アンモニア合成に関係する見方です。
  「H+ と OH- の積が一定であること」は、水のイオン積に関係する見方です。
