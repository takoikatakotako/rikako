# 化学基礎 問892
id: 1932
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "ダニエル電池 / 亜鉛と銅の反応を利用して電気を取り出す電池である。"
  - "酸化 / 水に溶けたり融解したりすると電流を通す物質である。"
  - "電解質 / 液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "ろ過 / 物質が酸素と結び付く、または電子を失う変化である。"
correct: 0
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「ダニエル電池 / 亜鉛と銅の反応を利用して電気を取り出す電池である。」です。したがって、正解は「ダニエル電池 / 亜鉛と銅の反応を利用して電気を取り出す電池である。」です。
  
  「ダニエル電池 / 亜鉛と銅の反応を利用して電気を取り出す電池である。」が正しいです。用語と説明の対応が合っています。
  「酸化 / 水に溶けたり融解したりすると電流を通す物質である。」は、用語と説明の対応が合っていません。
  「電解質 / 液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、用語と説明の対応が合っていません。
  「ろ過 / 物質が酸素と結び付く、または電子を失う変化である。」は、用語と説明の対応が合っていません。
