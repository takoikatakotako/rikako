# 令和7年度 ITパスポート 公開問題 問34
id: 449
type: single_choice
text: |
  ある商品を5,000個販売したところ、売上げが6,000万円、利益が400万円となった。
  商品1個当たりの変動費が7,000円であるとき、利益を1,000万円以上にするためには、少なくともあと何個販売すれはよいか。
choices:
  - "500"
  - "1,200"
  - "6,200"
  - "7,500"
correct: 1
explanation: |
  1個当たり売上高は 6,000万円 ÷ 5,000個 = 12,000円、限界利益は 12,000円 - 7,000円 = 5,000円です。利益を 400万円 から 1,000万円 にするには 600万円 の上積みが必要なので、600万円 ÷ 5,000円 = 1,200個 追加販売すればよい。
  
  「500」は500個では利益増加は 250万円 にしかならず不足する。
  「1,200」が正しいです。追加必要利益 600万円 を1個当たり限界利益 5,000円で割ると 1,200個です。
  「6,200」は必要数を大きく見積もり過ぎている。
  「7,500」は必要数を大きく見積もり過ぎている。
