# 高校化学 問302
id: 2302
type: single_choice
text: |
  「氷が溶け始める温度を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "融点"
  - "飽和溶液"
  - "蒸気圧降下"
  - "凝固点降下"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  氷が溶け始める温度を考える場面 と最も関係が深いのは融点です。したがって、正解は「融点」です。
  
  「融点」が正しいです。この具体例と最も関係が深い語です。
  「飽和溶液」は、「食塩を加えても底に残るようになった食塩水を考える場面」と結び付きが強い語です。
  「蒸気圧降下」は、「食塩水が純水より蒸発しにくくなることを考える場面」と結び付きが強い語です。
  「凝固点降下」は、「凍結防止剤をまいた道路の水が凍りにくくなる場面」と結び付きが強い語です。
