# 化学基礎 問23
id: 690
type: single_choice
text: |
  放射性同位体の利用例として、最も適切なものはどれか。
choices:
  - "年代測定や医療への利用"
  - "金属を必ず磁石に変えること"
  - "全ての酸を中和すること"
  - "水を必ず燃やすこと"
correct: 0
explanation: |
  この問題は、「放射性同位体がどのように使われているか」を確認する問題です。
  
  放射性同位体は、年代測定や医療などで利用されています。学習指導要領解説でも、このような利用に触れることが示されています。したがって、正解は「年代測定や医療への利用」です。
  
  「年代測定や医療への利用」が正しいです。放射性同位体の代表的な利用例です。
  「金属を必ず磁石に変えること」は、放射性同位体の利用ではありません。
  「全ての酸を中和すること」は、放射性同位体の利用ではありません。
  「水を必ず燃やすこと」は、放射性同位体の利用ではありません。
