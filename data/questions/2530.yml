# 高校化学 問530
id: 2530
type: single_choice
text: |
  「コロイド粒子が不規則に動いて見える現象である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "デンプンやゼラチンが水中で安定しやすい場面"
  - "顕微鏡でコロイド粒子が細かく動く様子を観察する場面"
  - "自動車のバッテリーを考える場面"
  - "密閉容器で反応物と生成物の量が一定になる場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「コロイド粒子が不規則に動いて見える現象である。」と最も関係が深い場面は「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」です。したがって、正解は「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」です。
  
  「デンプンやゼラチンが水中で安定しやすい場面」は、「水との親和性が高く、比較的安定なコロイドである。」と結び付きが強い場面です。
  「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」が正しいです。この説明と結び付きが強い場面です。
  「自動車のバッテリーを考える場面」は、「鉛とその化合物を用いた、充電して繰り返し使える電池である。」と結び付きが強い場面です。
  「密閉容器で反応物と生成物の量が一定になる場面」は、「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」と結び付きが強い場面です。
