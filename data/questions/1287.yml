# 化学基礎 問247
id: 1287
type: single_choice
text: |
  「BTB 溶液」に最も関係が深い語として、適切なものはどれか。
choices:
  - "指示薬"
  - "酸化防止剤"
  - "高分子化合物"
  - "化学が拓く世界"
correct: 0
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「BTB 溶液」に最も関係が深いのは指示薬です。したがって、正解は「指示薬」です。
  
  「指示薬」が正しいです。この例は指示薬に関係しています。
  「酸化防止剤」は、この例に最も関係が深い語ではありません。
  「高分子化合物」は、この例に最も関係が深い語ではありません。
  「化学が拓く世界」は、この例に最も関係が深い語ではありません。
