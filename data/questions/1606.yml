# 化学基礎 問566
id: 1606
type: single_choice
text: |
  「炭素12で陽子数と中性子数の合計を見る場面」を説明した文として、最も適切なものはどれか。
choices:
  - "原子核の中にある陽子数と中性子数の合計である。"
  - "原子が結び付いてできた、物質の性質を示す小さな粒子である。"
  - "水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。"
  - "相手を酸化させ、自身は還元される物質である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「炭素12で陽子数と中性子数の合計を見る場面」を説明した文として適切なのは「原子核の中にある陽子数と中性子数の合計である。」です。したがって、正解は「原子核の中にある陽子数と中性子数の合計である。」です。
  
  「原子核の中にある陽子数と中性子数の合計である。」が正しいです。この具体例を説明した文です。
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」は、この説明は「水分子や酸素分子を粒として考える場面」と結び付きが強いです。
  「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」は、この説明は「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」と結び付きが強いです。
  「相手を酸化させ、自身は還元される物質である。」は、この説明は「酸素や過酸化水素が相手を酸化させる場面」と結び付きが強いです。
