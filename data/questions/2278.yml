# 高校化学 問278
id: 2278
type: single_choice
text: |
  「炭素どうしが単結合だけでつながった炭化水素である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "錯イオン"
  - "遷移元素"
  - "鉄"
  - "飽和炭化水素"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  炭素どうしが単結合だけでつながった炭化水素である。 に当てはまる語は飽和炭化水素です。したがって、正解は「飽和炭化水素」です。
  
  「錯イオン」は、「中心となる金属イオンに配位子が結び付いたイオンである。」に当てはまる語です。
  「遷移元素」は、「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」に当てはまる語です。
  「鉄」は、「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」に当てはまる語です。
  「飽和炭化水素」が正しいです。「炭素どうしが単結合だけでつながった炭化水素である。」に当てはまる語です。
