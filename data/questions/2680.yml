# 高校化学 問680
id: 2680
type: single_choice
text: |
  「エチレンに臭素が付加する場面」を説明した文として、最も適切なものはどれか。
choices:
  - "多重結合に原子や原子団が加わる反応である。"
  - "グルコースがつながった植物の細胞壁をつくる多糖である。"
  - "一定温度で一定量の気体の圧力は体積に反比例するという法則である。"
  - "結晶のような規則正しい配列をもたない固体である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「エチレンに臭素が付加する場面」を説明した文として適切なのは「多重結合に原子や原子団が加わる反応である。」です。したがって、正解は「多重結合に原子や原子団が加わる反応である。」です。
  
  「多重結合に原子や原子団が加わる反応である。」が正しいです。この具体例を説明した文です。
  「グルコースがつながった植物の細胞壁をつくる多糖である。」は、この説明は「紙や木材の主成分を考える場面」と結び付きが強いです。
  「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」は、この説明は「注射器の口をふさいで押すと体積が減って圧力が上がる場面」と結び付きが強いです。
  「結晶のような規則正しい配列をもたない固体である。」は、この説明は「ガラスのように一定の融点を示しにくい固体を考える場面」と結び付きが強いです。
