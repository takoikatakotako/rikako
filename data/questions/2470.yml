# 高校化学 問470
id: 2470
type: single_choice
text: |
  貴ガスを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "化学が社会課題の解決に役立つこと"
  - "最外殻が安定していて反応しにくいこと"
  - "2 価の陽イオンになりやすいこと"
  - "酸とも塩基とも反応すること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  貴ガスでは、「最外殻が安定していて反応しにくいこと」という見方が大切です。したがって、正解は「最外殻が安定していて反応しにくいこと」です。
  
  「化学が社会課題の解決に役立つこと」は、化学が築く未来に関係する見方です。
  「最外殻が安定していて反応しにくいこと」が正しいです。貴ガスの要点を表しています。
  「2 価の陽イオンになりやすいこと」は、アルカリ土類金属に関係する見方です。
  「酸とも塩基とも反応すること」は、両性酸化物に関係する見方です。
