# 高校化学 問373
id: 2373
type: single_choice
text: |
  「アンモニアが金属イオンに電子対を与える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "カルボン酸"
  - "ベンゼン"
  - "アニリン"
  - "配位結合"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  アンモニアが金属イオンに電子対を与える場面 と最も関係が深いのは配位結合です。したがって、正解は「配位結合」です。
  
  「カルボン酸」は、「酢酸の性質やにおいを考える場面」と結び付きが強い語です。
  「ベンゼン」は、「芳香族化合物の基本構造を学ぶ場面」と結び付きが強い語です。
  「アニリン」は、「染料の原料になる芳香族アミンを考える場面」と結び付きが強い語です。
  「配位結合」が正しいです。この具体例と最も関係が深い語です。
