# 化学基礎 問406
id: 1446
type: single_choice
text: |
  「二種類以上の物質が混ざってできている物質である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "混合物"
  - "純物質"
  - "化合物"
  - "化学変化"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  二種類以上の物質が混ざってできている物質である。 に当てはまる語は混合物です。したがって、正解は「混合物」です。
  
  「混合物」が正しいです。「二種類以上の物質が混ざってできている物質である。」に当てはまる語です。
  「純物質」は、「一種類の物質だけからできていて、性質が一定である物質である。」に当てはまる語です。
  「化合物」は、「二種類以上の元素が結び付いてできている純物質である。」に当てはまる語です。
  「化学変化」は、「もとの物質とは別の物質ができる変化である。」に当てはまる語です。
