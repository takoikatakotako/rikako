# 高校化学 問176
id: 2176
type: single_choice
text: |
  鉄と最も関係が深い場面として、適切なものはどれか。
choices:
  - "さびや鉄鋼の利用を考える場面"
  - "金属イオンが電子を受け取って析出する電極を考える場面"
  - "メタンやエタンの性質を考える場面"
  - "エチレンに臭素が付加する場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  さびや鉄鋼の利用を考える場面は、鉄と結び付きが強い場面です。したがって、正解は「さびや鉄鋼の利用を考える場面」です。
  
  「さびや鉄鋼の利用を考える場面」が正しいです。これは鉄と結び付きが強い場面です。
  「金属イオンが電子を受け取って析出する電極を考える場面」は、陰極と結び付きが強い場面です。
  「メタンやエタンの性質を考える場面」は、飽和炭化水素と結び付きが強い場面です。
  「エチレンに臭素が付加する場面」は、付加反応と結び付きが強い場面です。
