# 化学基礎 問144
id: 1184
type: single_choice
text: |
  放射性同位体についての説明として、最も適切なものはどれか。
choices:
  - "金属元素を含む物質を炎に入れたときに特有の色を示す反応である。"
  - "溶けた物質のうち、電離した割合を表す。"
  - "水溶液の酸性やアルカリ性によって色が変わる薬品である。"
  - "放射線を出す同位体で、年代測定や医療などに利用される。"
correct: 3
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  放射性同位体は、放射線を出す同位体で、年代測定や医療などに利用される。したがって、正解は「放射線を出す同位体で、年代測定や医療などに利用される。」です。
  
  「金属元素を含む物質を炎に入れたときに特有の色を示す反応である。」は、炎色反応の説明です。
  「溶けた物質のうち、電離した割合を表す。」は、電離度の説明です。
  「水溶液の酸性やアルカリ性によって色が変わる薬品である。」は、指示薬の説明です。
  「放射線を出す同位体で、年代測定や医療などに利用される。」が正しいです。放射性同位体の説明です。
