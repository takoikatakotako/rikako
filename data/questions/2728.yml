# 高校化学 問728
id: 2728
type: single_choice
text: |
  「小さな粒子が分散している状態であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "電離平衡"
  - "コロイド"
  - "貴ガス"
  - "置換反応"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「小さな粒子が分散している状態であること」という見方が大切なのはコロイドです。したがって、正解は「コロイド」です。
  
  「電離平衡」は、その語で大切なのは「電離と元に戻る変化がつり合うこと」という見方です。
  「コロイド」が正しいです。この見方が大切な語です。
  「貴ガス」は、その語で大切なのは「最外殻が安定していて反応しにくいこと」という見方です。
  「置換反応」は、その語で大切なのは「もとの一部が別のものに置き換わること」という見方です。
