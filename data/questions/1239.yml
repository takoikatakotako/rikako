# 化学基礎 問199
id: 1239
type: single_choice
text: |
  高分子化合物の例として、最も適切なものはどれか。
choices:
  - "水道水の殺菌や洗浄の技術"
  - "ポリエチレン"
  - "砂と水の混合物から砂を取り除く操作"
  - "水とエタノールの混合物を分ける操作"
correct: 1
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  ポリエチレンは、高分子化合物の例です。したがって、正解は「ポリエチレン」です。
  
  「水道水の殺菌や洗浄の技術」は、化学が拓く世界の例として見る方が適切です。
  「ポリエチレン」が正しいです。これは高分子化合物の例です。
  「砂と水の混合物から砂を取り除く操作」は、ろ過の例として見る方が適切です。
  「水とエタノールの混合物を分ける操作」は、蒸留の例として見る方が適切です。
