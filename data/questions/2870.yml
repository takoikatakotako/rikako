# 高校化学 問870
id: 2870
type: single_choice
text: |
  「周期表18族に属し、化学的に安定な気体元素の総称である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "最外殻が安定していて反応しにくいこと"
  - "共有結合が全体に広がること"
  - "小さな粒子が分散している状態であること"
  - "周囲へ熱を出す反応であること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「周期表18族に属し、化学的に安定な気体元素の総称である。」を理解する上では、「最外殻が安定していて反応しにくいこと」という見方が大切です。したがって、正解は「最外殻が安定していて反応しにくいこと」です。
  
  「最外殻が安定していて反応しにくいこと」が正しいです。この説明と結び付きが強い見方です。
  「共有結合が全体に広がること」は、その見方は共有結合の結晶に関係します。
  「小さな粒子が分散している状態であること」は、その見方はコロイドに関係します。
  「周囲へ熱を出す反応であること」は、その見方は発熱反応に関係します。
