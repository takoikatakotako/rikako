# 高校化学 問37
id: 747
type: single_choice
text: |
  ヘスの法則についての説明として、最も適切なものはどれか。
choices:
  - "反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。"
  - "溶液の沸点が純粋な溶媒より高くなる現象である。"
  - "半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。"
  - "コロイド粒子が光を散乱するため、光の道筋が見える現象である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  ヘスの法則は、反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。 したがって、正解は「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」です。
  
  「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」が正しいです。ヘスの法則の説明です。
  「溶液の沸点が純粋な溶媒より高くなる現象である。」は、沸点上昇の説明です。
  「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」は、浸透圧の説明です。
  「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」は、チンダル現象の説明です。
