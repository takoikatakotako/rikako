# 高校化学 問583
id: 2583
type: single_choice
text: |
  「ヒドロキシ基をもつ有機化合物である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "果物の香りに関係する化合物を考える場面"
  - "紙や木材の主成分を考える場面"
  - "エタノールの性質や利用を考える場面"
  - "注射器の口をふさいで押すと体積が減って圧力が上がる場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「ヒドロキシ基をもつ有機化合物である。」と最も関係が深い場面は「エタノールの性質や利用を考える場面」です。したがって、正解は「エタノールの性質や利用を考える場面」です。
  
  「果物の香りに関係する化合物を考える場面」は、「カルボン酸とアルコールからできる有機化合物である。」と結び付きが強い場面です。
  「紙や木材の主成分を考える場面」は、「グルコースがつながった植物の細胞壁をつくる多糖である。」と結び付きが強い場面です。
  「エタノールの性質や利用を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「注射器の口をふさいで押すと体積が減って圧力が上がる場面」は、「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」と結び付きが強い場面です。
