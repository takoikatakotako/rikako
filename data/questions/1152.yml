# 化学基礎 問112
id: 1152
type: single_choice
text: |
  蒸発についての説明として、最も適切なものはどれか。
choices:
  - "液体が固体になる状態変化である。"
  - "固体が液体にならずに直接気体になる状態変化である。"
  - "原子がもつ陽子の数を表す。"
  - "液体が気体になる状態変化である。"
correct: 3
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  蒸発は、液体が気体になる状態変化である。したがって、正解は「液体が気体になる状態変化である。」です。
  
  「液体が固体になる状態変化である。」は、凝固の説明です。
  「固体が液体にならずに直接気体になる状態変化である。」は、昇華の説明です。
  「原子がもつ陽子の数を表す。」は、原子番号の説明です。
  「液体が気体になる状態変化である。」が正しいです。蒸発の説明です。
