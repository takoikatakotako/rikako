# 高校化学 問263
id: 2263
type: single_choice
text: |
  「水溶液中で一部だけ電離する酸である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "弱酸"
  - "化学発光"
  - "溶解"
  - "飽和溶液"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  水溶液中で一部だけ電離する酸である。 に当てはまる語は弱酸です。したがって、正解は「弱酸」です。
  
  「弱酸」が正しいです。「水溶液中で一部だけ電離する酸である。」に当てはまる語です。
  「化学発光」は、「化学反応によって光が放出される現象である。」に当てはまる語です。
  「溶解」は、「溶質の粒子が溶媒中に広がっていく現象である。」に当てはまる語です。
  「飽和溶液」は、「その温度でそれ以上溶質が溶けない状態の溶液である。」に当てはまる語です。
