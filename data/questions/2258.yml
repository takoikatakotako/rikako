# 高校化学 問258
id: 2258
type: single_choice
text: |
  「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "エンタルピー変化"
  - "結合エネルギー"
  - "吸熱反応"
  - "アンモニア合成"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。 に当てはまる語はアンモニア合成です。したがって、正解は「アンモニア合成」です。
  
  「エンタルピー変化」は、「一定圧力のもとで化学反応や状態変化に伴って変わる熱的な量である。」に当てはまる語です。
  「結合エネルギー」は、「気体分子中の結合1 molを切るのに必要なエネルギーである。」に当てはまる語です。
  「吸熱反応」は、「反応の結果として周囲から熱を吸収する反応である。」に当てはまる語です。
  「アンモニア合成」が正しいです。「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」に当てはまる語です。
