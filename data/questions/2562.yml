# 高校化学 問562
id: 2562
type: single_choice
text: |
  「塩のイオンが水と反応して溶液の性質を変える現象である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "どの酸がより電離しやすいかを比べる場面"
  - "酢酸ナトリウム水溶液が塩基性を示す理由を考える場面"
  - "さびや鉄鋼の利用を考える場面"
  - "芳香族化合物の基本構造を学ぶ場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「塩のイオンが水と反応して溶液の性質を変える現象である。」と最も関係が深い場面は「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」です。したがって、正解は「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」です。
  
  「どの酸がより電離しやすいかを比べる場面」は、「酸の電離のしやすさを表す定数である。」と結び付きが強い場面です。
  「酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「さびや鉄鋼の利用を考える場面」は、「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」と結び付きが強い場面です。
  「芳香族化合物の基本構造を学ぶ場面」は、「六角形の環状構造をもつ代表的な芳香族炭化水素である。」と結び付きが強い場面です。
