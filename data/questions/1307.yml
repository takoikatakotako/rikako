# 化学基礎 問267
id: 1307
type: single_choice
text: |
  同位体の特徴として、最も適切なものはどれか。
choices:
  - "元素の性質に規則性がある"
  - "化学的な性質に強く関わる電子"
  - "電子を失って正になる"
  - "陽子数は同じで中性子数が異なる"
correct: 3
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  同位体では、「陽子数は同じで中性子数が異なる」という点が大切です。したがって、正解は「陽子数は同じで中性子数が異なる」です。
  
  「元素の性質に規則性がある」は、周期律に関係する特徴です。
  「化学的な性質に強く関わる電子」は、最外殻電子に関係する特徴です。
  「電子を失って正になる」は、陽イオンに関係する特徴です。
  「陽子数は同じで中性子数が異なる」が正しいです。同位体の特徴を表しています。
