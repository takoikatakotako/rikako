# 高校化学 問296
id: 2296
type: single_choice
text: |
  「グルコースが多数つながった植物の貯蔵多糖である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "電気泳動"
  - "デンプン"
  - "疎水コロイド"
  - "PET"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  グルコースが多数つながった植物の貯蔵多糖である。 に当てはまる語はデンプンです。したがって、正解は「デンプン」です。
  
  「電気泳動」は、「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」に当てはまる語です。
  「デンプン」が正しいです。「グルコースが多数つながった植物の貯蔵多糖である。」に当てはまる語です。
  「疎水コロイド」は、「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」に当てはまる語です。
  「PET」は、「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」に当てはまる語です。
