# 化学基礎 問994
id: 2034
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "電解質 / 水溶液や融解状態で電流を通すこと"
  - "純物質 / 液体から気体への変化であること"
  - "蒸発 / 化学結合やイオンのできやすさに関係すること"
  - "最外殻電子 / 成分が一種類で性質が一定であること"
correct: 0
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「電解質 / 水溶液や融解状態で電流を通すこと」です。したがって、正解は「電解質 / 水溶液や融解状態で電流を通すこと」です。
  
  「電解質 / 水溶液や融解状態で電流を通すこと」が正しいです。用語と要点の対応が合っています。
  「純物質 / 液体から気体への変化であること」は、用語と要点の対応が合っていません。
  「蒸発 / 化学結合やイオンのできやすさに関係すること」は、用語と要点の対応が合っていません。
  「最外殻電子 / 成分が一種類で性質が一定であること」は、用語と要点の対応が合っていません。
