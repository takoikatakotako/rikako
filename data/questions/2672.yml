# 高校化学 問672
id: 2672
type: single_choice
text: |
  「アンモニアを加えると深い青色のイオンができる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "中心となる金属イオンに配位子が結び付いたイオンである。"
  - "ベンゼン環にアミノ基が直接結び付いた化合物である。"
  - "化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。"
  - "混合気体の全圧は各気体の分圧の和になるという法則である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「アンモニアを加えると深い青色のイオンができる場面」を説明した文として適切なのは「中心となる金属イオンに配位子が結び付いたイオンである。」です。したがって、正解は「中心となる金属イオンに配位子が結び付いたイオンである。」です。
  
  「中心となる金属イオンに配位子が結び付いたイオンである。」が正しいです。この具体例を説明した文です。
  「ベンゼン環にアミノ基が直接結び付いた化合物である。」は、この説明は「染料の原料になる芳香族アミンを考える場面」と結び付きが強いです。
  「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」は、この説明は「再生可能エネルギーや新素材の開発を考える場面」と結び付きが強いです。
  「混合気体の全圧は各気体の分圧の和になるという法則である。」は、この説明は「酸素と窒素が混ざった気体の圧力を考える場面」と結び付きが強いです。
