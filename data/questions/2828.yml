# 高校化学 問828
id: 2828
type: single_choice
text: |
  「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "金属元素ごとに炎の色が異なること"
  - "カルボン酸とアルコールの組合せでできること"
  - "小さな粒子が分散している状態であること"
  - "植物の体を支える多糖であること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」を理解する上では、「小さな粒子が分散している状態であること」という見方が大切です。したがって、正解は「小さな粒子が分散している状態であること」です。
  
  「金属元素ごとに炎の色が異なること」は、その見方は炎色反応に関係します。
  「カルボン酸とアルコールの組合せでできること」は、その見方はエステルに関係します。
  「小さな粒子が分散している状態であること」が正しいです。この説明と結び付きが強い見方です。
  「植物の体を支える多糖であること」は、その見方はセルロースに関係します。
