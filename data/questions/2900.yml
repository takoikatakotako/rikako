# 高校化学 問900
id: 2900
type: single_choice
text: |
  「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電気を使って反応を進めること"
  - "条件を工夫して平衡を生成物側へ寄せること"
  - "化学が社会課題の解決に役立つこと"
  - "非金属で酸化力が強いこと"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」を理解する上では、「化学が社会課題の解決に役立つこと」という見方が大切です。したがって、正解は「化学が社会課題の解決に役立つこと」です。
  
  「電気を使って反応を進めること」は、その見方は電気分解に関係します。
  「条件を工夫して平衡を生成物側へ寄せること」は、その見方はアンモニア合成に関係します。
  「化学が社会課題の解決に役立つこと」が正しいです。この説明と結び付きが強い見方です。
  「非金属で酸化力が強いこと」は、その見方はハロゲンに関係します。
