# 高校化学 問643
id: 2643
type: single_choice
text: |
  「懐中電灯や時計に入っている電池を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。"
  - "酸とも塩基とも反応する酸化物である。"
  - "分子式は同じでも構造が異なる化合物どうしである。"
  - "一度使い切ることを前提にした一次電池の代表例である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「懐中電灯や時計に入っている電池を考える場面」を説明した文として適切なのは「一度使い切ることを前提にした一次電池の代表例である。」です。したがって、正解は「一度使い切ることを前提にした一次電池の代表例である。」です。
  
  「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」は、この説明は「中性の水で H+ と OH- の関係を考える場面」と結び付きが強いです。
  「酸とも塩基とも反応する酸化物である。」は、この説明は「酸化アルミニウムが酸にも塩基にも溶ける場面」と結び付きが強いです。
  「分子式は同じでも構造が異なる化合物どうしである。」は、この説明は「ブタンとイソブタンを比べる場面」と結び付きが強いです。
  「一度使い切ることを前提にした一次電池の代表例である。」が正しいです。この具体例を説明した文です。
