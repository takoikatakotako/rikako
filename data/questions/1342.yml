# 化学基礎 問302
id: 1342
type: single_choice
text: |
  蒸留について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
  - "一種類の物質だけからできていて、性質が一定である物質である。"
  - "沸点の違いを利用して液体を分ける方法である。"
  - "一種類の元素だけからできている物質である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  蒸留は、沸点の違いを利用して液体を分ける方法である。 したがって、正解は「沸点の違いを利用して液体を分ける方法である。」です。
  
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、再結晶の説明です。
  「一種類の物質だけからできていて、性質が一定である物質である。」は、純物質の説明です。
  「沸点の違いを利用して液体を分ける方法である。」が正しいです。蒸留の説明です。
  「一種類の元素だけからできている物質である。」は、単体の説明です。
