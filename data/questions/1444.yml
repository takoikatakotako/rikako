# 化学基礎 問404
id: 1444
type: single_choice
text: |
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "純物質"
  - "単体"
  - "クロマトグラフィー"
  - "物理変化"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。 に当てはまる語はクロマトグラフィーです。したがって、正解は「クロマトグラフィー」です。
  
  「純物質」は、「一種類の物質だけからできていて、性質が一定である物質である。」に当てはまる語です。
  「単体」は、「一種類の元素だけからできている物質である。」に当てはまる語です。
  「クロマトグラフィー」が正しいです。「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」に当てはまる語です。
  「物理変化」は、「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」に当てはまる語です。
