# 高校化学 問273
id: 2273
type: single_choice
text: |
  「一方の原子が電子対を与えてできる共有結合である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "不飽和炭化水素"
  - "置換反応"
  - "配位結合"
  - "アルコール"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  一方の原子が電子対を与えてできる共有結合である。 に当てはまる語は配位結合です。したがって、正解は「配位結合」です。
  
  「不飽和炭化水素」は、「炭素どうしに二重結合や三重結合をもつ炭化水素である。」に当てはまる語です。
  「置換反応」は、「分子中の原子や原子団が別の原子や原子団に置き換わる反応である。」に当てはまる語です。
  「配位結合」が正しいです。「一方の原子が電子対を与えてできる共有結合である。」に当てはまる語です。
  「アルコール」は、「ヒドロキシ基をもつ有機化合物である。」に当てはまる語です。
