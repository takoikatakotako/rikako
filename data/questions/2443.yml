# 高校化学 問443
id: 2443
type: single_choice
text: |
  乾電池を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸の強さを電離のしやすさで見ること"
  - "反応性が高く 1 価の陽イオンになりやすいこと"
  - "使い切りの電池であること"
  - "非金属で酸化力が強いこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  乾電池では、「使い切りの電池であること」という見方が大切です。したがって、正解は「使い切りの電池であること」です。
  
  「酸の強さを電離のしやすさで見ること」は、酸解離定数に関係する見方です。
  「反応性が高く 1 価の陽イオンになりやすいこと」は、アルカリ金属に関係する見方です。
  「使い切りの電池であること」が正しいです。乾電池の要点を表しています。
  「非金属で酸化力が強いこと」は、ハロゲンに関係する見方です。
