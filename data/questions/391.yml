# 令和7年度 ITパスポート 公開問題 問8
id: 391
type: single_choice
text: |
  AIの機械学習で利用するデータの取扱いに関する記述のうち、バイアスの低減やデータの品質を確保するために考えられる対策として、適切なものだけを全て挙げたものはどれか。
  
  a: 学習の目的に適したデータであることを確認する。
  b: データの入手元・作成来歴を確認する。
  c: データへのアノテーションの付与は学習目的に合わせて実施する。
  d: 人間の目でも同定が困難と考えられる画像認識用のデータは除外する。
choices:
  - "a, b"
  - "a, b, c, d"
  - "a, d"
  - "b, c, d"
correct: 1
explanation: |
  この問題は、「機械学習に使うデータの質を高めるには、どんな対策が必要か」を考える問題です。
  
  機械学習では、学習に使うデータの質がとても重要です。目的に合ったデータかどうかを確認すること、入手元や作成の経緯を確認すること、適切にアノテーションを付けること、品質の低いデータを除くことは、どれも大切です。
  
  したがって、a, b, c, d の全てを含むイが正しいです。
  
  「a, b」はc と d も必要なので足りません。
  「a, b, c, d」が正しいです。どれもデータ品質の確保やバイアスの低減に役立ちます。
  「a, d」はb と c が入っていないので不十分です。
  「b, c, d」はa が入っていないので不十分です。
