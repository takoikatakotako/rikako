# 化学基礎 問727
id: 1767
type: single_choice
text: |
  「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "移動しやすさの違いを利用すること"
  - "固体から液体への変化であること"
  - "電荷のかたよりがほとんどないこと"
  - "性質が周期的にくり返されること"
correct: 2
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」では、「電荷のかたよりがほとんどないこと」という見方が大切です。したがって、正解は「電荷のかたよりがほとんどないこと」です。
  
  「移動しやすさの違いを利用すること」は、その見方はインクの色素をろ紙の上で分ける場面よりもクロマトグラフィーと結び付きが強いです。
  「固体から液体への変化であること」は、その見方は氷を温めて水にする場面よりも融解と結び付きが強いです。
  「電荷のかたよりがほとんどないこと」が正しいです。この具体例で大切になる見方です。
  「性質が周期的にくり返されること」は、その見方は周期表で似た性質の元素が縦に並ぶことを見る場面よりも周期律と結び付きが強いです。
