# 化学基礎 問988
id: 2028
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "高分子化合物 / 成分が二種類以上まざっていること"
  - "混合物 / 液体から固体への変化であること"
  - "還元 / 酸素の喪失や電子の受け取りに注目すること"
  - "凝固 / 小さな単位が多数つながっていること"
correct: 2
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「還元 / 酸素の喪失や電子の受け取りに注目すること」です。したがって、正解は「還元 / 酸素の喪失や電子の受け取りに注目すること」です。
  
  「高分子化合物 / 成分が二種類以上まざっていること」は、用語と要点の対応が合っていません。
  「混合物 / 液体から固体への変化であること」は、用語と要点の対応が合っていません。
  「還元 / 酸素の喪失や電子の受け取りに注目すること」が正しいです。用語と要点の対応が合っています。
  「凝固 / 小さな単位が多数つながっていること」は、用語と要点の対応が合っていません。
