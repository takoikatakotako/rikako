# 高校化学 問250
id: 2250
type: single_choice
text: |
  「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "平衡定数"
  - "アンモニア合成"
  - "水のイオン積"
  - "ファラデーの法則"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  電気分解で生じる物質の量は流れた電気量に比例するという法則である。 に当てはまる語はファラデーの法則です。したがって、正解は「ファラデーの法則」です。
  
  「平衡定数」は、「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」に当てはまる語です。
  「アンモニア合成」は、「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」に当てはまる語です。
  「水のイオン積」は、「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」に当てはまる語です。
  「ファラデーの法則」が正しいです。「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」に当てはまる語です。
