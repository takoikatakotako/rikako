# 化学基礎 問920
id: 1960
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "分子 / 水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
  - "塩基 / 酸素や過酸化水素が相手を酸化させる場面"
  - "酸化剤 / 水分子や酸素分子を粒として考える場面"
  - "陽イオン / ナトリウム原子が電子を1個失って Na+ になる場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「陽イオン / ナトリウム原子が電子を1個失って Na+ になる場面」です。したがって、正解は「陽イオン / ナトリウム原子が電子を1個失って Na+ になる場面」です。
  
  「分子 / 水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」は、用語と場面の対応が合っていません。
  「塩基 / 酸素や過酸化水素が相手を酸化させる場面」は、用語と場面の対応が合っていません。
  「酸化剤 / 水分子や酸素分子を粒として考える場面」は、用語と場面の対応が合っていません。
  「陽イオン / ナトリウム原子が電子を1個失って Na+ になる場面」が正しいです。用語と場面の対応が合っています。
