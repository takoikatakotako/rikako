# 化学基礎 問690
id: 1730
type: single_choice
text: |
  「相手を還元させ、自身は酸化される物質である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "固体から液体への変化であること"
  - "性質が周期的にくり返されること"
  - "相手を還元させ、自分は酸化されること"
  - "物質の性質を示す小さな粒子として考えること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「相手を還元させ、自身は酸化される物質である。」を理解する上では、「相手を還元させ、自分は酸化されること」という見方が大切です。したがって、正解は「相手を還元させ、自分は酸化されること」です。
  
  「固体から液体への変化であること」は、その見方は融解に関係します。
  「性質が周期的にくり返されること」は、その見方は周期律に関係します。
  「相手を還元させ、自分は酸化されること」が正しいです。この説明と結び付きが強い見方です。
  「物質の性質を示す小さな粒子として考えること」は、その見方は分子に関係します。
