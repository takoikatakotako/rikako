# 高校化学 問15
id: 725
type: single_choice
text: |
  イオン結晶についての説明として、最も適切なものはどれか。
choices:
  - "気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。"
  - "分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。"
  - "陽イオンと陰イオンが規則正しく並んでできた結晶である。"
  - "溶質の粒子が溶媒中に広がっていく現象である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  イオン結晶は、陽イオンと陰イオンが規則正しく並んでできた結晶である。 したがって、正解は「陽イオンと陰イオンが規則正しく並んでできた結晶である。」です。
  
  「気体の圧力、体積、物質量、温度の関係を PV=nRT で表す式である。」は、理想気体の状態方程式の説明です。
  「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」は、実在気体の説明です。
  「陽イオンと陰イオンが規則正しく並んでできた結晶である。」が正しいです。イオン結晶の説明です。
  「溶質の粒子が溶媒中に広がっていく現象である。」は、溶解の説明です。
