# 高校化学 問586
id: 2586
type: single_choice
text: |
  「カルボン酸とアルコールからできる有機化合物である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "染料の原料になる芳香族アミンを考える場面"
  - "果物の香りに関係する化合物を考える場面"
  - "再生可能エネルギーや新素材の開発を考える場面"
  - "酸素と窒素が混ざった気体の圧力を考える場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「カルボン酸とアルコールからできる有機化合物である。」と最も関係が深い場面は「果物の香りに関係する化合物を考える場面」です。したがって、正解は「果物の香りに関係する化合物を考える場面」です。
  
  「染料の原料になる芳香族アミンを考える場面」は、「ベンゼン環にアミノ基が直接結び付いた化合物である。」と結び付きが強い場面です。
  「果物の香りに関係する化合物を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「再生可能エネルギーや新素材の開発を考える場面」は、「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」と結び付きが強い場面です。
  「酸素と窒素が混ざった気体の圧力を考える場面」は、「混合気体の全圧は各気体の分圧の和になるという法則である。」と結び付きが強い場面です。
