# 化学基礎 問32
id: 699
type: single_choice
text: |
  二酸化炭素 CO2 が無極性分子として扱われる主な理由として、最も適切なものはどれか。
choices:
  - "分子の形が対称で、電荷の偏りが打ち消し合うから。"
  - "酸素原子を含まないから。"
  - "常に固体として存在するから。"
  - "電子を全くもたないから。"
correct: 0
explanation: |
  この問題は、「極性があるかどうかを分子全体で考える問題」です。
  
  CO2 の結合自体には偏りがありますが、分子の形が対称なので、分子全体では偏りが打ち消し合います。そのため、無極性分子として扱われます。したがって、正解は「分子の形が対称で、電荷の偏りが打ち消し合うから」です。
  
  「分子の形が対称で、電荷の偏りが打ち消し合うから」が正しいです。CO2 が無極性になる理由です。
  「酸素原子を含まないから」は、適切ではありません。CO2 は酸素原子を含んでいます。
  「常に固体として存在するから」は、極性の理由ではありません。
  「電子を全くもたないから」は、適切ではありません。
