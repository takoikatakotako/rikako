# 化学基礎 問471
id: 1511
type: single_choice
text: |
  陰イオンを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電子を受け取って負に帯電すること"
  - "酸性と塩基性の強さを数で見ること"
  - "色の変化で液性を見分けること"
  - "電気的な引力で結び付くこと"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  陰イオンでは、「電子を受け取って負に帯電すること」という見方が大切です。したがって、正解は「電子を受け取って負に帯電すること」です。
  
  「電子を受け取って負に帯電すること」が正しいです。陰イオンの要点を表しています。
  「酸性と塩基性の強さを数で見ること」は、pHに関係する見方です。
  「色の変化で液性を見分けること」は、指示薬に関係する見方です。
  「電気的な引力で結び付くこと」は、イオン結合に関係する見方です。
