# 化学基礎 問694
id: 1734
type: single_choice
text: |
  「水に溶けたり融解したりすると電流を通す物質である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "陽子数を表す数であること"
  - "電気的な引力で結び付くこと"
  - "水溶液や融解状態で電流を通すこと"
  - "1Lあたりの物質量で表すこと"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「水に溶けたり融解したりすると電流を通す物質である。」を理解する上では、「水溶液や融解状態で電流を通すこと」という見方が大切です。したがって、正解は「水溶液や融解状態で電流を通すこと」です。
  
  「陽子数を表す数であること」は、その見方は原子番号に関係します。
  「電気的な引力で結び付くこと」は、その見方はイオン結合に関係します。
  「水溶液や融解状態で電流を通すこと」が正しいです。この説明と結び付きが強い見方です。
  「1Lあたりの物質量で表すこと」は、その見方はモル濃度に関係します。
