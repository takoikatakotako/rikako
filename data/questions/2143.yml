# 高校化学 問143
id: 2143
type: single_choice
text: |
  乾電池と最も関係が深い場面として、適切なものはどれか。
choices:
  - "物質を燃やしたときに熱が出ることを考える場面"
  - "複数の反応式を組み合わせて全体の反応熱を求める場面"
  - "燃焼や中和で容器が温かくなる場面"
  - "懐中電灯や時計に入っている電池を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  懐中電灯や時計に入っている電池を考える場面は、乾電池と結び付きが強い場面です。したがって、正解は「懐中電灯や時計に入っている電池を考える場面」です。
  
  「物質を燃やしたときに熱が出ることを考える場面」は、反応熱と結び付きが強い場面です。
  「複数の反応式を組み合わせて全体の反応熱を求める場面」は、ヘスの法則と結び付きが強い場面です。
  「燃焼や中和で容器が温かくなる場面」は、発熱反応と結び付きが強い場面です。
  「懐中電灯や時計に入っている電池を考える場面」が正しいです。これは乾電池と結び付きが強い場面です。
