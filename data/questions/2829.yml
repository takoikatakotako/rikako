# 高校化学 問829
id: 2829
type: single_choice
text: |
  「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "実用性が高く、酸化数が変わりやすいこと"
  - "ベンゼン環をもつこと"
  - "必要な機能をねらって材料を設計すること"
  - "コロイドが光を散乱すること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」を理解する上では、「コロイドが光を散乱すること」という見方が大切です。したがって、正解は「コロイドが光を散乱すること」です。
  
  「実用性が高く、酸化数が変わりやすいこと」は、その見方は鉄に関係します。
  「ベンゼン環をもつこと」は、その見方はベンゼンに関係します。
  「必要な機能をねらって材料を設計すること」は、その見方は機能性材料に関係します。
  「コロイドが光を散乱すること」が正しいです。この説明と結び付きが強い見方です。
