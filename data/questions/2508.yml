# 高校化学 問508
id: 2508
type: single_choice
text: |
  「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸素と窒素が混ざった気体の圧力を考える場面"
  - "食塩を加えても底に残るようになった食塩水を考える場面"
  - "デンプンやゼラチンが水中で安定しやすい場面"
  - "注射器の口をふさいで押すと体積が減って圧力が上がる場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」と最も関係が深い場面は「注射器の口をふさいで押すと体積が減って圧力が上がる場面」です。したがって、正解は「注射器の口をふさいで押すと体積が減って圧力が上がる場面」です。
  
  「酸素と窒素が混ざった気体の圧力を考える場面」は、「混合気体の全圧は各気体の分圧の和になるという法則である。」と結び付きが強い場面です。
  「食塩を加えても底に残るようになった食塩水を考える場面」は、「その温度でそれ以上溶質が溶けない状態の溶液である。」と結び付きが強い場面です。
  「デンプンやゼラチンが水中で安定しやすい場面」は、「水との親和性が高く、比較的安定なコロイドである。」と結び付きが強い場面です。
  「注射器の口をふさいで押すと体積が減って圧力が上がる場面」が正しいです。この説明と結び付きが強い場面です。
