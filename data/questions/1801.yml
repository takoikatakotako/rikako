# 化学基礎 問761
id: 1801
type: single_choice
text: |
  「固体から液体への変化であること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "水に溶けたり融解したりすると電流を通す物質である。"
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "二種類以上の元素が結び付いてできている純物質である。"
  - "固体が液体に変わる状態変化である。"
correct: 3
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「固体から液体への変化であること」という見方と最も関係が深い説明は「固体が液体に変わる状態変化である。」です。したがって、正解は「固体が液体に変わる状態変化である。」です。
  
  「水に溶けたり融解したりすると電流を通す物質である。」は、その説明で大切なのは「水溶液や融解状態で電流を通すこと」という見方です。
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、その説明で大切なのは「水に溶けない固体を液体から分けること」という見方です。
  「二種類以上の元素が結び付いてできている純物質である。」は、その説明で大切なのは「複数の元素が結び付いてできること」という見方です。
  「固体が液体に変わる状態変化である。」が正しいです。この見方と最も関係が深い説明です。
