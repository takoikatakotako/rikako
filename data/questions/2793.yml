# 高校化学 問793
id: 2793
type: single_choice
text: |
  「アミノ基とカルボキシ基をあわせもつこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "蒸気圧降下"
  - "反応熱"
  - "アミノ酸"
  - "燃料電池"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「アミノ基とカルボキシ基をあわせもつこと」という見方が大切なのはアミノ酸です。したがって、正解は「アミノ酸」です。
  
  「蒸気圧降下」は、その語で大切なのは「溶質があると溶媒の蒸気圧が下がること」という見方です。
  「反応熱」は、その語で大切なのは「反応に伴う熱の出入りを見ること」という見方です。
  「アミノ酸」が正しいです。この見方が大切な語です。
  「燃料電池」は、その語で大切なのは「反応物を補給しながら発電すること」という見方です。
