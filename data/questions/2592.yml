# 高校化学 問592
id: 2592
type: single_choice
text: |
  「多数のアミノ酸がつながってできた天然高分子化合物である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "血糖や発酵の材料として使われる場面"
  - "氷を水に変えるのに必要な熱を考える場面"
  - "ダイヤモンドや二酸化ケイ素の硬さを考える場面"
  - "酵素や筋肉の主成分を考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「多数のアミノ酸がつながってできた天然高分子化合物である。」と最も関係が深い場面は「酵素や筋肉の主成分を考える場面」です。したがって、正解は「酵素や筋肉の主成分を考える場面」です。
  
  「血糖や発酵の材料として使われる場面」は、「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」と結び付きが強い場面です。
  「氷を水に変えるのに必要な熱を考える場面」は、「固体1 molが融解するときに吸収する熱量である。」と結び付きが強い場面です。
  「ダイヤモンドや二酸化ケイ素の硬さを考える場面」は、「原子が共有結合で三次元的に結び付いた結晶である。」と結び付きが強い場面です。
  「酵素や筋肉の主成分を考える場面」が正しいです。この説明と結び付きが強い場面です。
