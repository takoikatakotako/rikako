# 化学基礎 問345
id: 1385
type: single_choice
text: |
  非電解質について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "一種類の物質だけからできていて、性質が一定である物質である。"
  - "水に溶けても電流をほとんど通さない物質である。"
  - "一種類の元素だけからできている物質である。"
  - "物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  非電解質は、水に溶けても電流をほとんど通さない物質である。 したがって、正解は「水に溶けても電流をほとんど通さない物質である。」です。
  
  「一種類の物質だけからできていて、性質が一定である物質である。」は、純物質の説明です。
  「水に溶けても電流をほとんど通さない物質である。」が正しいです。非電解質の説明です。
  「一種類の元素だけからできている物質である。」は、単体の説明です。
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」は、物理変化の説明です。
