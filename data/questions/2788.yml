# 高校化学 問788
id: 2788
type: single_choice
text: |
  「ベンゼン環にヒドロキシ基が直接つくこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "アモルファス"
  - "フェノール"
  - "ブラウン運動"
  - "化学発光"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「ベンゼン環にヒドロキシ基が直接つくこと」という見方が大切なのはフェノールです。したがって、正解は「フェノール」です。
  
  「アモルファス」は、その語で大切なのは「粒子配列が不規則であること」という見方です。
  「フェノール」が正しいです。この見方が大切な語です。
  「ブラウン運動」は、その語で大切なのは「粒子が周囲の分子にぶつかって動くこと」という見方です。
  「化学発光」は、その語で大切なのは「化学反応のエネルギーが光として出ること」という見方です。
