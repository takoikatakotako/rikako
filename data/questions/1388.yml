# 化学基礎 問348
id: 1388
type: single_choice
text: |
  酸化防止剤について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "食品や物質が酸化して変質するのを防ぐために用いられる物質である。"
  - "二種類以上の元素が結び付いてできている純物質である。"
  - "もとの物質とは別の物質ができる変化である。"
  - "水に溶けても電流をほとんど通さない物質である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  酸化防止剤は、食品や物質が酸化して変質するのを防ぐために用いられる物質である。 したがって、正解は「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」です。
  
  「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」が正しいです。酸化防止剤の説明です。
  「二種類以上の元素が結び付いてできている純物質である。」は、化合物の説明です。
  「もとの物質とは別の物質ができる変化である。」は、化学変化の説明です。
  「水に溶けても電流をほとんど通さない物質である。」は、非電解質の説明です。
