# 化学基礎 問721
id: 1761
type: single_choice
text: |
  「塩素原子が電子を1個受け取って Cl- になる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "電子を受け取って負に帯電すること"
  - "酸化による変質を防ぐこと"
  - "成分が一種類で性質が一定であること"
  - "液体から気体への変化であること"
correct: 0
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「塩素原子が電子を1個受け取って Cl- になる場面」では、「電子を受け取って負に帯電すること」という見方が大切です。したがって、正解は「電子を受け取って負に帯電すること」です。
  
  「電子を受け取って負に帯電すること」が正しいです。この具体例で大切になる見方です。
  「酸化による変質を防ぐこと」は、その見方は食品の変色や劣化を防ぐためにビタミンCを使う場面よりも酸化防止剤と結び付きが強いです。
  「成分が一種類で性質が一定であること」は、その見方は酸素だけが入った容器を考える場面よりも純物質と結び付きが強いです。
  「液体から気体への変化であること」は、その見方はぬれた床の水がしだいに乾く場面よりも蒸発と結び付きが強いです。
