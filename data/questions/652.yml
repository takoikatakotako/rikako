choices:
  - "BLE"
  - "IrDA"
  - "NFC"
  - "PLC"
correct: 0
explanation: |
  この問題の公開解答では「BLE」が正解とされています。
  
  「BLE」が公開解答で正解とされています。
  「IrDA」は公開解答では正解ではありません。
  「NFC」は公開解答では正解ではありません。
  「PLC」は公開解答では正解ではありません。
