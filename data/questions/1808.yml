# 化学基礎 問768
id: 1808
type: single_choice
text: |
  「性質が周期的にくり返されること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "二種類以上の元素が結び付いてできている純物質である。"
  - "元素を原子番号の順に並べると性質が周期的に変化するというきまりである。"
  - "原子核の中にある陽子の数を表す数である。"
correct: 2
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「性質が周期的にくり返されること」という見方と最も関係が深い説明は「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」です。したがって、正解は「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」です。
  
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、その説明で大切なのは「水に溶けない固体を液体から分けること」という見方です。
  「二種類以上の元素が結び付いてできている純物質である。」は、その説明で大切なのは「複数の元素が結び付いてできること」という見方です。
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」が正しいです。この見方と最も関係が深い説明です。
  「原子核の中にある陽子の数を表す数である。」は、その説明で大切なのは「陽子数を表す数であること」という見方です。
