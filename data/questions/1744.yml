# 化学基礎 問704
id: 1744
type: single_choice
text: |
  「インクの色素をろ紙の上で分ける場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "水素イオンに注目すること"
  - "酸素の喪失や電子の受け取りに注目すること"
  - "水溶液でも電流をほとんど通さないこと"
  - "移動しやすさの違いを利用すること"
correct: 3
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「インクの色素をろ紙の上で分ける場面」では、「移動しやすさの違いを利用すること」という見方が大切です。したがって、正解は「移動しやすさの違いを利用すること」です。
  
  「水素イオンに注目すること」は、その見方は塩酸が水溶液中で水素イオンを生じる場面よりも酸と結び付きが強いです。
  「酸素の喪失や電子の受け取りに注目すること」は、その見方は酸化銅から酸素が取れて銅になる場面よりも還元と結び付きが強いです。
  「水溶液でも電流をほとんど通さないこと」は、その見方は砂糖水が電流をほとんど通さない場面よりも非電解質と結び付きが強いです。
  「移動しやすさの違いを利用すること」が正しいです。この具体例で大切になる見方です。
