# 化学基礎 問659
id: 1699
type: single_choice
text: |
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "反応する物質とできる物質の関係を式で示すこと"
  - "酸素との結び付きや電子の放出に注目すること"
  - "水溶液や融解状態で電流を通すこと"
  - "物質の種類が変わらないこと"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」を理解する上では、「物質の種類が変わらないこと」という見方が大切です。したがって、正解は「物質の種類が変わらないこと」です。
  
  「反応する物質とできる物質の関係を式で示すこと」は、その見方は化学反応式に関係します。
  「酸素との結び付きや電子の放出に注目すること」は、その見方は酸化に関係します。
  「水溶液や融解状態で電流を通すこと」は、その見方は電解質に関係します。
  「物質の種類が変わらないこと」が正しいです。この説明と結び付きが強い見方です。
