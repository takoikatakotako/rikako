# 化学基礎 問88
id: 1128
type: single_choice
text: |
  銅板を硫酸亜鉛水溶液に入れても大きな変化が起こりにくい主な理由として、最も適切なものはどれか。
choices:
  - "銅は亜鉛よりイオンになりにくいから。"
  - "銅が水に完全に消えるから。"
  - "亜鉛イオンが必ず気体になるから。"
  - "銅板に粒子がないから。"
correct: 0
explanation: |
  この問題は、「置換反応が起こる条件」を考える問題です。
  
  銅は亜鉛よりイオンになりにくいので、亜鉛イオンを簡単には還元できません。そのため、大きな変化が起こりにくいです。したがって、正解は「銅は亜鉛よりイオンになりにくいから」です。
  
  「銅は亜鉛よりイオンになりにくいから」が正しいです。
  「銅が水に完全に消えるから」は、適切ではありません。
  「亜鉛イオンが必ず気体になるから」は、適切ではありません。
  「銅板に粒子がないから」は、適切ではありません。
