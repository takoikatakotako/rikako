# 高校化学 問871
id: 2871
type: single_choice
text: |
  「酸とも塩基とも反応する酸化物である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "自由電子が性質に関係すること"
  - "酸とも塩基とも反応すること"
  - "コロイドが光を散乱すること"
  - "周囲から熱を受け取る反応であること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「酸とも塩基とも反応する酸化物である。」を理解する上では、「酸とも塩基とも反応すること」という見方が大切です。したがって、正解は「酸とも塩基とも反応すること」です。
  
  「自由電子が性質に関係すること」は、その見方は金属結晶に関係します。
  「酸とも塩基とも反応すること」が正しいです。この説明と結び付きが強い見方です。
  「コロイドが光を散乱すること」は、その見方はチンダル現象に関係します。
  「周囲から熱を受け取る反応であること」は、その見方は吸熱反応に関係します。
