# 高校化学 問272
id: 2272
type: single_choice
text: |
  「中心となる金属イオンに配位子が結び付いたイオンである。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "飽和炭化水素"
  - "錯イオン"
  - "付加反応"
  - "異性体"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  中心となる金属イオンに配位子が結び付いたイオンである。 に当てはまる語は錯イオンです。したがって、正解は「錯イオン」です。
  
  「飽和炭化水素」は、「炭素どうしが単結合だけでつながった炭化水素である。」に当てはまる語です。
  「錯イオン」が正しいです。「中心となる金属イオンに配位子が結び付いたイオンである。」に当てはまる語です。
  「付加反応」は、「多重結合に原子や原子団が加わる反応である。」に当てはまる語です。
  「異性体」は、「分子式は同じでも構造が異なる化合物どうしである。」に当てはまる語です。
