# 高校化学 問879
id: 2879
type: single_choice
text: |
  「炭素どうしに二重結合や三重結合をもつ炭化水素である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "溶質があると凝固点が下がること"
  - "多重結合をもつこと"
  - "反応経路ではなく始状態と終状態で決まること"
  - "酸化が起こる側の電極であること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「炭素どうしに二重結合や三重結合をもつ炭化水素である。」を理解する上では、「多重結合をもつこと」という見方が大切です。したがって、正解は「多重結合をもつこと」です。
  
  「溶質があると凝固点が下がること」は、その見方は凝固点降下に関係します。
  「多重結合をもつこと」が正しいです。この説明と結び付きが強い見方です。
  「反応経路ではなく始状態と終状態で決まること」は、その見方はヘスの法則に関係します。
  「酸化が起こる側の電極であること」は、その見方は陽極に関係します。
