# 化学基礎 問551
id: 1591
type: single_choice
text: |
  「砂と水の混合物から砂を取り除く場面」を説明した文として、最も適切なものはどれか。
choices:
  - "もとの物質とは別の物質ができる変化である。"
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "陽子数は同じで中性子数が異なる原子どうしである。"
  - "金属原子が自由電子を介して結び付く結合である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「砂と水の混合物から砂を取り除く場面」を説明した文として適切なのは「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」です。したがって、正解は「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」です。
  
  「もとの物質とは別の物質ができる変化である。」は、この説明は「鉄がさびて別の物質になる場面」と結び付きが強いです。
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」が正しいです。この具体例を説明した文です。
  「陽子数は同じで中性子数が異なる原子どうしである。」は、この説明は「炭素12と炭素14を比べる場面」と結び付きが強いです。
  「金属原子が自由電子を介して結び付く結合である。」は、この説明は「金属中で自由電子が動けるため電気を通すことを考える場面」と結び付きが強いです。
