# 高校化学 問323
id: 2323
type: single_choice
text: |
  「飽和溶液で見かけ上変化が止まっている場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "酸解離定数"
  - "溶解平衡"
  - "溶解"
  - "飽和溶液"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  飽和溶液で見かけ上変化が止まっている場面 と最も関係が深いのは溶解平衡です。したがって、正解は「溶解平衡」です。
  
  「酸解離定数」は、「どの酸がより電離しやすいかを比べる場面」と結び付きが強い語です。
  「溶解平衡」が正しいです。この具体例と最も関係が深い語です。
  「溶解」は、「食塩が水に溶けて見えなくなる場面」と結び付きが強い語です。
  「飽和溶液」は、「食塩を加えても底に残るようになった食塩水を考える場面」と結び付きが強い語です。
