# 高校化学 問168
id: 2168
type: single_choice
text: |
  アルカリ土類金属と最も関係が深い場面として、適切なものはどれか。
choices:
  - "マグネシウムやカルシウムの性質を比べる場面"
  - "さびや鉄鋼の利用を考える場面"
  - "懐中電灯や時計に入っている電池を考える場面"
  - "スマートフォンやノートパソコンの電池を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  マグネシウムやカルシウムの性質を比べる場面は、アルカリ土類金属と結び付きが強い場面です。したがって、正解は「マグネシウムやカルシウムの性質を比べる場面」です。
  
  「マグネシウムやカルシウムの性質を比べる場面」が正しいです。これはアルカリ土類金属と結び付きが強い場面です。
  「さびや鉄鋼の利用を考える場面」は、鉄と結び付きが強い場面です。
  「懐中電灯や時計に入っている電池を考える場面」は、乾電池と結び付きが強い場面です。
  「スマートフォンやノートパソコンの電池を考える場面」は、リチウムイオン電池と結び付きが強い場面です。
