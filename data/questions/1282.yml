# 化学基礎 問242
id: 1282
type: single_choice
text: |
  「食塩水」に最も関係が深い語として、適切なものはどれか。
choices:
  - "非電解質"
  - "放射性同位体"
  - "炎色反応"
  - "電解質"
correct: 3
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「食塩水」に最も関係が深いのは電解質です。したがって、正解は「電解質」です。
  
  「非電解質」は、この例に最も関係が深い語ではありません。
  「放射性同位体」は、この例に最も関係が深い語ではありません。
  「炎色反応」は、この例に最も関係が深い語ではありません。
  「電解質」が正しいです。この例は電解質に関係しています。
