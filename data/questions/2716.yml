# 高校化学 問716
id: 2716
type: single_choice
text: |
  「分子間力で集まった結晶であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "電気分解"
  - "分子結晶"
  - "アンモニア合成"
  - "ハロゲン"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「分子間力で集まった結晶であること」という見方が大切なのは分子結晶です。したがって、正解は「分子結晶」です。
  
  「電気分解」は、その語で大切なのは「電気を使って反応を進めること」という見方です。
  「分子結晶」が正しいです。この見方が大切な語です。
  「アンモニア合成」は、その語で大切なのは「条件を工夫して平衡を生成物側へ寄せること」という見方です。
  「ハロゲン」は、その語で大切なのは「非金属で酸化力が強いこと」という見方です。
