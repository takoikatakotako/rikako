# 令和7年度 ITパスポート 公開問題 問70
id: 415
type: single_choice
text: |
  情報セキュリティにおける脅威のうち、弱性を是正するセキュリティパッチをソフトウェアに適用することが最も有効な対策になるものはどれか。
choices:
  - "総当たり攻撃"
  - "ソーシャルエンジニアリング"
  - "パスワードリスト攻撃"
  - "バッファオーバーフロー"
correct: 3
explanation: |
  この問題の公開解答では「バッファオーバーフロー」が正解とされています。
  
  「総当たり攻撃」は公開解答では正解ではありません。
  「ソーシャルエンジニアリング」は公開解答では正解ではありません。
  「パスワードリスト攻撃」は公開解答では正解ではありません。
  「バッファオーバーフロー」が公開解答で正解とされています。
