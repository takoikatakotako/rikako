# 令和7年度 ITパスポート 公開問題 問16
id: 163
type: single_choice
text: |
  他人の電子メールの利用者IDとパスワードの取扱いに関する記述のうち、不正アクセス禁止法で規制されている行為だけを全て挙げたものはどれか。
  a 正当な理由なく本人に無断で第三者に提供する。
  b 他人の電子メールの利用者IDとパスワードを無効にするマルウェアを作成する。
  c 本人に無断で使用して、メールサーバ上の電子メールを閲覧する。
choices:
  - "a,b,c"
  - "a,c"
  - "b,c"
  - "c"
correct: 1
explanation: |
  他人のID・パスワードを無断で第三者へ提供する行為や、本人に無断で使用してアクセスする行為は、不正アクセス禁止法の規制対象です。一方、b のマルウェア作成は別の法令の問題となります。したがって a,c のイが正しいです。
  
  「a,b,c」はb が含まれているので誤りです。
  「a,c」が正しいです。a と c が不正アクセス禁止法の規制対象となります。
  「b,c」はa が抜けており不十分です。
  「c」はa も規制対象なので不十分です。
