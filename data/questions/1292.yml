# 化学基礎 問252
id: 1292
type: single_choice
text: |
  蒸留の特徴として、最も適切なものはどれか。
choices:
  - "沸点の違いを利用する"
  - "溶解度の差を利用する"
  - "移動しやすさの違いを利用する"
  - "一種類の成分だけからなる"
correct: 0
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  蒸留では、「沸点の違いを利用する」という点が大切です。したがって、正解は「沸点の違いを利用する」です。
  
  「沸点の違いを利用する」が正しいです。蒸留の特徴を表しています。
  「溶解度の差を利用する」は、再結晶に関係する特徴です。
  「移動しやすさの違いを利用する」は、クロマトグラフィーに関係する特徴です。
  「一種類の成分だけからなる」は、純物質に関係する特徴です。
