# 化学基礎 問363
id: 1403
type: single_choice
text: |
  凝固と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ぬれた床の水がしだいに乾く場面"
  - "酸素だけが入った容器を考える場面"
  - "水を冷やして氷にする場面"
  - "鉄や酸素のように一種類の元素だけからできた物質を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  水を冷やして氷にする場面は、凝固と結び付きが強い場面です。したがって、正解は「水を冷やして氷にする場面」です。
  
  「ぬれた床の水がしだいに乾く場面」は、蒸発と結び付きが強い場面です。
  「酸素だけが入った容器を考える場面」は、純物質と結び付きが強い場面です。
  「水を冷やして氷にする場面」が正しいです。これは凝固と結び付きが強い場面です。
  「鉄や酸素のように一種類の元素だけからできた物質を考える場面」は、単体と結び付きが強い場面です。
