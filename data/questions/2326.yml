# 高校化学 問326
id: 2326
type: single_choice
text: |
  「凍結防止剤をまいた道路の水が凍りにくくなる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "凝固点降下"
  - "溶解度"
  - "溶解平衡"
  - "沸点上昇"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  凍結防止剤をまいた道路の水が凍りにくくなる場面 と最も関係が深いのは凝固点降下です。したがって、正解は「凝固点降下」です。
  
  「凝固点降下」が正しいです。この具体例と最も関係が深い語です。
  「溶解度」は、「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」と結び付きが強い語です。
  「溶解平衡」は、「飽和溶液で見かけ上変化が止まっている場面」と結び付きが強い語です。
  「沸点上昇」は、「食塩水の沸点が水より少し高くなることを考える場面」と結び付きが強い語です。
