# 高校化学 問209
id: 2209
type: single_choice
text: |
  「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "溶解平衡"
  - "沸点上昇"
  - "シャルルの法則"
  - "浸透圧"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。 に当てはまる語はシャルルの法則です。したがって、正解は「シャルルの法則」です。
  
  「溶解平衡」は、「溶ける速さと析出する速さが等しくなっている平衡である。」に当てはまる語です。
  「沸点上昇」は、「溶液の沸点が純粋な溶媒より高くなる現象である。」に当てはまる語です。
  「シャルルの法則」が正しいです。「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」に当てはまる語です。
  「浸透圧」は、「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」に当てはまる語です。
