# 化学基礎 問305
id: 1345
type: single_choice
text: |
  純物質について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "もとの物質とは別の物質ができる変化である。"
  - "一種類の物質だけからできていて、性質が一定である物質である。"
  - "液体が気体になる状態変化である。"
  - "固体が液体にならずに気体になる状態変化である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  純物質は、一種類の物質だけからできていて、性質が一定である物質である。 したがって、正解は「一種類の物質だけからできていて、性質が一定である物質である。」です。
  
  「もとの物質とは別の物質ができる変化である。」は、化学変化の説明です。
  「一種類の物質だけからできていて、性質が一定である物質である。」が正しいです。純物質の説明です。
  「液体が気体になる状態変化である。」は、蒸発の説明です。
  「固体が液体にならずに気体になる状態変化である。」は、昇華の説明です。
