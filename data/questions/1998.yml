# 化学基礎 問958
id: 1998
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "化合物 / 複数の元素が結び付いてできること"
  - "最外殻電子 / 電荷のかたよりがあること"
  - "極性分子 / 酸と塩基が打ち消し合うこと"
  - "中和 / 化学結合やイオンのできやすさに関係すること"
correct: 0
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「化合物 / 複数の元素が結び付いてできること」です。したがって、正解は「化合物 / 複数の元素が結び付いてできること」です。
  
  「化合物 / 複数の元素が結び付いてできること」が正しいです。用語と要点の対応が合っています。
  「最外殻電子 / 電荷のかたよりがあること」は、用語と要点の対応が合っていません。
  「極性分子 / 酸と塩基が打ち消し合うこと」は、用語と要点の対応が合っていません。
  「中和 / 化学結合やイオンのできやすさに関係すること」は、用語と要点の対応が合っていません。
