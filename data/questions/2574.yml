# 高校化学 問574
id: 2574
type: single_choice
text: |
  「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "電線や青色の銅イオン水溶液を考える場面"
  - "鉄や銅、クロムの化合物の色の違いを考える場面"
  - "フェノール類の酸性や消毒作用を考える場面"
  - "金属やプラスチックを回収して再資源化する場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」と最も関係が深い場面は「鉄や銅、クロムの化合物の色の違いを考える場面」です。したがって、正解は「鉄や銅、クロムの化合物の色の違いを考える場面」です。
  
  「電線や青色の銅イオン水溶液を考える場面」は、「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」と結び付きが強い場面です。
  「鉄や銅、クロムの化合物の色の違いを考える場面」が正しいです。この説明と結び付きが強い場面です。
  「フェノール類の酸性や消毒作用を考える場面」は、「ベンゼン環にヒドロキシ基が直接結び付いた化合物である。」と結び付きが強い場面です。
  「金属やプラスチックを回収して再資源化する場面」は、「使い終わった資源や製品を回収し、再び利用する考え方である。」と結び付きが強い場面です。
