# 高校化学 問621
id: 2621
type: single_choice
text: |
  「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」を説明した文として、最も適切なものはどれか。
choices:
  - "気体分子中の結合1 molを切るのに必要なエネルギーである。"
  - "一定量の溶媒に溶けることのできる溶質の最大量である。"
  - "電気分解で還元が起こる電極である。"
  - "水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」を説明した文として適切なのは「一定量の溶媒に溶けることのできる溶質の最大量である。」です。したがって、正解は「一定量の溶媒に溶けることのできる溶質の最大量である。」です。
  
  「気体分子中の結合1 molを切るのに必要なエネルギーである。」は、この説明は「どの結合が切れやすいかを比べる場面」と結び付きが強いです。
  「一定量の溶媒に溶けることのできる溶質の最大量である。」が正しいです。この具体例を説明した文です。
  「電気分解で還元が起こる電極である。」は、この説明は「金属イオンが電子を受け取って析出する電極を考える場面」と結び付きが強いです。
  「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」は、この説明は「中性の水で H+ と OH- の関係を考える場面」と結び付きが強いです。
