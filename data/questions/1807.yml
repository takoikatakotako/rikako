# 化学基礎 問767
id: 1807
type: single_choice
text: |
  「陽子数が同じで中性子数が異なること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "化学の知識が生活、産業、環境、医療などに役立つという見方である。"
  - "陽子数は同じで中性子数が異なる原子どうしである。"
  - "一種類の元素だけからできている物質である。"
  - "固体が液体にならずに気体になる状態変化である。"
correct: 1
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「陽子数が同じで中性子数が異なること」という見方と最も関係が深い説明は「陽子数は同じで中性子数が異なる原子どうしである。」です。したがって、正解は「陽子数は同じで中性子数が異なる原子どうしである。」です。
  
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」は、その説明で大切なのは「化学が社会や生活に広く役立つこと」という見方です。
  「陽子数は同じで中性子数が異なる原子どうしである。」が正しいです。この見方と最も関係が深い説明です。
  「一種類の元素だけからできている物質である。」は、その説明で大切なのは「一種類の元素だけからできること」という見方です。
  「固体が液体にならずに気体になる状態変化である。」は、その説明で大切なのは「固体から直接気体になること」という見方です。
