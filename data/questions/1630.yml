# 化学基礎 問590
id: 1630
type: single_choice
text: |
  「水素や炭素が相手から酸素を奪う場面」を説明した文として、最も適切なものはどれか。
choices:
  - "相手を還元させ、自身は酸化される物質である。"
  - "多数の小さな単位がつながってできた大きな分子からなる化合物である。"
  - "二種類以上の物質が混ざってできている物質である。"
  - "液体が固体に変わる状態変化である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「水素や炭素が相手から酸素を奪う場面」を説明した文として適切なのは「相手を還元させ、自身は酸化される物質である。」です。したがって、正解は「相手を還元させ、自身は酸化される物質である。」です。
  
  「相手を還元させ、自身は酸化される物質である。」が正しいです。この具体例を説明した文です。
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」は、この説明は「ポリエチレンやタンパク質のような長い分子を考える場面」と結び付きが強いです。
  「二種類以上の物質が混ざってできている物質である。」は、この説明は「空気や食塩水のように複数の物質が混ざったものを考える場面」と結び付きが強いです。
  「液体が固体に変わる状態変化である。」は、この説明は「水を冷やして氷にする場面」と結び付きが強いです。
