# 高校化学 問519
id: 2519
type: single_choice
text: |
  「結晶のような規則正しい配列をもたない固体である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "食塩を加えても底に残るようになった食塩水を考える場面"
  - "デンプンやゼラチンが水中で安定しやすい場面"
  - "ガラスのように一定の融点を示しにくい固体を考える場面"
  - "自動車のバッテリーを考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「結晶のような規則正しい配列をもたない固体である。」と最も関係が深い場面は「ガラスのように一定の融点を示しにくい固体を考える場面」です。したがって、正解は「ガラスのように一定の融点を示しにくい固体を考える場面」です。
  
  「食塩を加えても底に残るようになった食塩水を考える場面」は、「その温度でそれ以上溶質が溶けない状態の溶液である。」と結び付きが強い場面です。
  「デンプンやゼラチンが水中で安定しやすい場面」は、「水との親和性が高く、比較的安定なコロイドである。」と結び付きが強い場面です。
  「ガラスのように一定の融点を示しにくい固体を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「自動車のバッテリーを考える場面」は、「鉛とその化合物を用いた、充電して繰り返し使える電池である。」と結び付きが強い場面です。
