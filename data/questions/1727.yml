# 化学基礎 問687
id: 1727
type: single_choice
text: |
  「物質が酸素と結び付く、または電子を失う変化である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "複数の元素が結び付いてできること"
  - "陽子数を表す数であること"
  - "電気的な引力で結び付くこと"
  - "酸素との結び付きや電子の放出に注目すること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「物質が酸素と結び付く、または電子を失う変化である。」を理解する上では、「酸素との結び付きや電子の放出に注目すること」という見方が大切です。したがって、正解は「酸素との結び付きや電子の放出に注目すること」です。
  
  「複数の元素が結び付いてできること」は、その見方は化合物に関係します。
  「陽子数を表す数であること」は、その見方は原子番号に関係します。
  「電気的な引力で結び付くこと」は、その見方はイオン結合に関係します。
  「酸素との結び付きや電子の放出に注目すること」が正しいです。この説明と結び付きが強い見方です。
