# 化学基礎 問848
id: 1888
type: single_choice
text: |
  「酸化による変質を防ぐこと」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "マグネシウムが酸素と結び付く場面"
  - "食品の変色や劣化を防ぐためにビタミンCを使う場面"
  - "食塩水や塩酸が電流を通す場面"
  - "砂と水の混合物から砂を取り除く場面"
correct: 1
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「酸化による変質を防ぐこと」という見方と最も関係が深い場面は「食品の変色や劣化を防ぐためにビタミンCを使う場面」です。したがって、正解は「食品の変色や劣化を防ぐためにビタミンCを使う場面」です。
  
  「マグネシウムが酸素と結び付く場面」は、その場面で大切なのは「酸素との結び付きや電子の放出に注目すること」という見方です。
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」が正しいです。この見方と最も関係が深い場面です。
  「食塩水や塩酸が電流を通す場面」は、その場面で大切なのは「水溶液や融解状態で電流を通すこと」という見方です。
  「砂と水の混合物から砂を取り除く場面」は、その場面で大切なのは「水に溶けない固体を液体から分けること」という見方です。
