# 化学基礎 問880
id: 1920
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "化学反応式 / 化学変化を、物質の種類と量の関係が分かるように表した式である。"
  - "分子 / 水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。"
  - "塩基 / 相手を酸化させ、自身は還元される物質である。"
  - "酸化剤 / 原子が結び付いてできた、物質の性質を示す小さな粒子である。"
correct: 0
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「化学反応式 / 化学変化を、物質の種類と量の関係が分かるように表した式である。」です。したがって、正解は「化学反応式 / 化学変化を、物質の種類と量の関係が分かるように表した式である。」です。
  
  「化学反応式 / 化学変化を、物質の種類と量の関係が分かるように表した式である。」が正しいです。用語と説明の対応が合っています。
