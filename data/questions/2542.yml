# 高校化学 問542
id: 2542
type: single_choice
text: |
  「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "スマートフォンやノートパソコンの電池を考える場面"
  - "植物が光を受けてデンプンなどをつくる場面"
  - "平衡がどちらにかたよっているかを数値で見る場面"
  - "ナトリウムやカリウムの性質を比べる場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」と最も関係が深い場面は「植物が光を受けてデンプンなどをつくる場面」です。したがって、正解は「植物が光を受けてデンプンなどをつくる場面」です。
  
  「スマートフォンやノートパソコンの電池を考える場面」は、「リチウムイオンの移動を利用する充電式電池である。」と結び付きが強い場面です。
  「植物が光を受けてデンプンなどをつくる場面」が正しいです。この説明と結び付きが強い場面です。
  「平衡がどちらにかたよっているかを数値で見る場面」は、「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」と結び付きが強い場面です。
  「ナトリウムやカリウムの性質を比べる場面」は、「周期表1族に属し、水と反応しやすい金属元素の総称である。」と結び付きが強い場面です。
