# 高校化学 問701
id: 2701
type: single_choice
text: |
  「分子の集まり方や沸点に関係すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "電気泳動"
  - "乾電池"
  - "分子間力"
  - "可逆反応"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「分子の集まり方や沸点に関係すること」という見方が大切なのは分子間力です。したがって、正解は「分子間力」です。
  
  「電気泳動」は、その語で大切なのは「コロイド粒子の電荷に注目すること」という見方です。
  「乾電池」は、その語で大切なのは「使い切りの電池であること」という見方です。
  「分子間力」が正しいです。この見方が大切な語です。
  「可逆反応」は、その語で大切なのは「正反応と逆反応の両方を見ること」という見方です。
