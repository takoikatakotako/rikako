# 化学基礎 問300
id: 1340
type: single_choice
text: |
  化学が拓く世界の特徴として、最も適切なものはどれか。
choices:
  - "日常生活や社会の技術と結び付く"
  - "水に溶けない固体を液体から分ける"
  - "沸点の違いを利用する"
  - "溶解度の差を利用する"
correct: 0
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  化学が拓く世界では、「日常生活や社会の技術と結び付く」という点が大切です。したがって、正解は「日常生活や社会の技術と結び付く」です。
  
  「日常生活や社会の技術と結び付く」が正しいです。化学が拓く世界の特徴を表しています。
  「水に溶けない固体を液体から分ける」は、ろ過に関係する特徴です。
  「沸点の違いを利用する」は、蒸留に関係する特徴です。
  「溶解度の差を利用する」は、再結晶に関係する特徴です。
