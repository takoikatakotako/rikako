# 高校化学 問307
id: 2307
type: single_choice
text: |
  「水を水蒸気に変えるのに必要な熱を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "浸透圧"
  - "蒸発熱"
  - "チンダル現象"
  - "透析"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  水を水蒸気に変えるのに必要な熱を考える場面 と最も関係が深いのは蒸発熱です。したがって、正解は「蒸発熱」です。
  
  「浸透圧」は、「薄い溶液側から濃い溶液側へ水が移動する場面」と結び付きが強い語です。
  「蒸発熱」が正しいです。この具体例と最も関係が深い語です。
  「チンダル現象」は、「薄暗い部屋でコロイドに光を当てると筋が見える場面」と結び付きが強い語です。
  「透析」は、「コロイド溶液から余分な電解質を取り除く場面」と結び付きが強い語です。
