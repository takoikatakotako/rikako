# 高校化学 問421
id: 2421
type: single_choice
text: |
  溶解度を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "どこまで溶けるかの限度に注目すること"
  - "半透膜を通る溶媒の移動に注目すること"
  - "コロイドが光を散乱すること"
  - "半透膜を通る粒子の大きさの違いを利用すること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  溶解度では、「どこまで溶けるかの限度に注目すること」という見方が大切です。したがって、正解は「どこまで溶けるかの限度に注目すること」です。
  
  「どこまで溶けるかの限度に注目すること」が正しいです。溶解度の要点を表しています。
  「半透膜を通る溶媒の移動に注目すること」は、浸透圧に関係する見方です。
  「コロイドが光を散乱すること」は、チンダル現象に関係する見方です。
  「半透膜を通る粒子の大きさの違いを利用すること」は、透析に関係する見方です。
