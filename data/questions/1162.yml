# 化学基礎 問122
id: 1162
type: single_choice
text: |
  イオン結合についての説明として、最も適切なものはどれか。
choices:
  - "原子どうしが電子を共有してできる結合である。"
  - "陽イオンと陰イオンの間の静電気的な引力による結合である。"
  - "自由電子を介して金属原子どうしが結び付く結合である。"
  - "原子が結び付いてできた、一つのまとまりとして振る舞う粒子である。"
correct: 1
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  イオン結合は、陽イオンと陰イオンの間の静電気的な引力による結合である。したがって、正解は「陽イオンと陰イオンの間の静電気的な引力による結合である。」です。
  
  「原子どうしが電子を共有してできる結合である。」は、共有結合の説明です。
  「陽イオンと陰イオンの間の静電気的な引力による結合である。」が正しいです。イオン結合の説明です。
  「自由電子を介して金属原子どうしが結び付く結合である。」は、金属結合の説明です。
  「原子が結び付いてできた、一つのまとまりとして振る舞う粒子である。」は、分子の説明です。
