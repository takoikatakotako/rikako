# 化学基礎 問280
id: 1320
type: single_choice
text: |
  化学反応式の特徴として、最も適切なものはどれか。
choices:
  - "物質と量的関係を表す"
  - "水素イオンを生じる"
  - "水酸化物イオンを生じるか水素イオンを受け取る"
  - "酸と塩基が反応して塩と水ができる"
correct: 0
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  化学反応式では、「物質と量的関係を表す」という点が大切です。したがって、正解は「物質と量的関係を表す」です。
  
  「物質と量的関係を表す」が正しいです。化学反応式の特徴を表しています。
  「水素イオンを生じる」は、酸に関係する特徴です。
  「水酸化物イオンを生じるか水素イオンを受け取る」は、塩基に関係する特徴です。
  「酸と塩基が反応して塩と水ができる」は、中和に関係する特徴です。
