# 化学基礎 問568
id: 1608
type: single_choice
text: |
  「周期表で似た性質の元素が縦に並ぶことを見る場面」を説明した文として、最も適切なものはどれか。
choices:
  - "分子の中で電荷のかたよりがほとんどない分子である。"
  - "水溶液の酸性や塩基性の強さを表す尺度である。"
  - "元素を原子番号の順に並べると性質が周期的に変化するというきまりである。"
  - "金属が電子を失ってイオンになりやすい性質の強さである。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「周期表で似た性質の元素が縦に並ぶことを見る場面」を説明した文として適切なのは「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」です。したがって、正解は「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」です。
  
  「分子の中で電荷のかたよりがほとんどない分子である。」は、この説明は「酸素分子や二酸化炭素で電荷のかたよりが打ち消し合う場面」と結び付きが強いです。
  「水溶液の酸性や塩基性の強さを表す尺度である。」は、この説明は「レモン水とせっけん水の酸性・塩基性を比べる場面」と結び付きが強いです。
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」が正しいです。この具体例を説明した文です。
  「金属が電子を失ってイオンになりやすい性質の強さである。」は、この説明は「亜鉛が銅より先にイオンになりやすいことを見る場面」と結び付きが強いです。
