# 高校化学 問355
id: 2355
type: single_choice
text: |
  「密閉容器で反応物と生成物の量が一定になる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "発熱反応"
  - "化学平衡"
  - "化学発光"
  - "溶解"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  密閉容器で反応物と生成物の量が一定になる場面 と最も関係が深いのは化学平衡です。したがって、正解は「化学平衡」です。
  
  「発熱反応」は、「燃焼や中和で容器が温かくなる場面」と結び付きが強い語です。
  「化学平衡」が正しいです。この具体例と最も関係が深い語です。
  「化学発光」は、「ケミカルライトが光る仕組みを考える場面」と結び付きが強い語です。
  「溶解」は、「食塩が水に溶けて見えなくなる場面」と結び付きが強い語です。
