# 化学基礎 問900
id: 1940
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "化学が拓く世界 / 化学の知識が生活、産業、環境、医療などに役立つという見方である。"
  - "非電解質 / 沸点の違いを利用して液体を分ける方法である。"
  - "蒸留 / 物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
  - "物理変化 / 水に溶けても電流をほとんど通さない物質である。"
correct: 0
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「化学が拓く世界 / 化学の知識が生活、産業、環境、医療などに役立つという見方である。」です。したがって、正解は「化学が拓く世界 / 化学の知識が生活、産業、環境、医療などに役立つという見方である。」です。
  
  「化学が拓く世界 / 化学の知識が生活、産業、環境、医療などに役立つという見方である。」が正しいです。用語と説明の対応が合っています。
  「非電解質 / 沸点の違いを利用して液体を分ける方法である。」は、用語と説明の対応が合っていません。
  「蒸留 / 物質そのものの種類は変わらず、状態や形だけが変わる変化である。」は、用語と説明の対応が合っていません。
  「物理変化 / 水に溶けても電流をほとんど通さない物質である。」は、用語と説明の対応が合っていません。
