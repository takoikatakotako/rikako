# 高校化学 問715
id: 2715
type: single_choice
text: |
  「陽イオンと陰イオンの引力でできること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "イオン結晶"
  - "燃料電池"
  - "ルシャトリエの原理"
  - "アルカリ土類金属"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「陽イオンと陰イオンの引力でできること」という見方が大切なのはイオン結晶です。したがって、正解は「イオン結晶」です。
  
  「イオン結晶」が正しいです。この見方が大切な語です。
  「燃料電池」は、その語で大切なのは「反応物を補給しながら発電すること」という見方です。
  「ルシャトリエの原理」は、その語で大切なのは「加えた変化を打ち消す向きに平衡が動くこと」という見方です。
  「アルカリ土類金属」は、その語で大切なのは「2 価の陽イオンになりやすいこと」という見方です。
