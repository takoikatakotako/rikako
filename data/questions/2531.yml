# 高校化学 問531
id: 2531
type: single_choice
text: |
  「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "金属や硫黄のコロイドが電解質で沈みやすい場面"
  - "スマートフォンやノートパソコンの電池を考える場面"
  - "コロイド溶液から余分な電解質を取り除く場面"
  - "平衡がどちらにかたよっているかを数値で見る場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」と最も関係が深い場面は「コロイド溶液から余分な電解質を取り除く場面」です。したがって、正解は「コロイド溶液から余分な電解質を取り除く場面」です。
  
  「金属や硫黄のコロイドが電解質で沈みやすい場面」は、「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」と結び付きが強い場面です。
  「スマートフォンやノートパソコンの電池を考える場面」は、「リチウムイオンの移動を利用する充電式電池である。」と結び付きが強い場面です。
  「コロイド溶液から余分な電解質を取り除く場面」が正しいです。この説明と結び付きが強い場面です。
  「平衡がどちらにかたよっているかを数値で見る場面」は、「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」と結び付きが強い場面です。
