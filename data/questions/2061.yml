# 高校化学 問61
id: 2061
type: single_choice
text: |
  緩衝液についての説明として、最も適切なものはどれか。
choices:
  - "少量の酸や塩基を加えても pH が変わりにくい溶液である。"
  - "塩基の電離のしやすさを表す定数である。"
  - "鉛とその化合物を用いた、充電して繰り返し使える電池である。"
  - "燃料と酸化剤を外部から供給しながら電気を取り出す電池である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  緩衝液は、少量の酸や塩基を加えても pH が変わりにくい溶液である。 したがって、正解は「少量の酸や塩基を加えても pH が変わりにくい溶液である。」です。
  
  「少量の酸や塩基を加えても pH が変わりにくい溶液である。」が正しいです。緩衝液の説明です。
  「塩基の電離のしやすさを表す定数である。」は、塩基解離定数の説明です。
  「鉛とその化合物を用いた、充電して繰り返し使える電池である。」は、鉛蓄電池の説明です。
  「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」は、燃料電池の説明です。
