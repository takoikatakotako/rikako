# 高校化学 問100
id: 2100
type: single_choice
text: |
  化学が築く未来についての説明として、最も適切なものはどれか。
choices:
  - "目的に応じた特別な性質をもたせてつくられた材料である。"
  - "アミド結合をもつ合成繊維の代表的な高分子化合物である。"
  - "多数のアミノ酸がつながってできた天然高分子化合物である。"
  - "化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  化学が築く未来は、化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。 したがって、正解は「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」です。
  
  「目的に応じた特別な性質をもたせてつくられた材料である。」は、機能性材料の説明です。
  「アミド結合をもつ合成繊維の代表的な高分子化合物である。」は、ナイロンの説明です。
  「多数のアミノ酸がつながってできた天然高分子化合物である。」は、タンパク質の説明です。
  「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」が正しいです。化学が築く未来の説明です。
