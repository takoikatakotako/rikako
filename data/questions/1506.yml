# 化学基礎 問466
id: 1506
type: single_choice
text: |
  質量数を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "成分が二種類以上まざっていること"
  - "複数の元素が結び付いてできること"
  - "新しい物質ができること"
  - "陽子数と中性子数の合計であること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  質量数では、「陽子数と中性子数の合計であること」という見方が大切です。したがって、正解は「陽子数と中性子数の合計であること」です。
  
  「成分が二種類以上まざっていること」は、混合物に関係する見方です。
  「複数の元素が結び付いてできること」は、化合物に関係する見方です。
  「新しい物質ができること」は、化学変化に関係する見方です。
  「陽子数と中性子数の合計であること」が正しいです。質量数の要点を表しています。
