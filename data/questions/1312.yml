# 化学基礎 問272
id: 1312
type: single_choice
text: |
  イオン結合の特徴として、最も適切なものはどれか。
choices:
  - "陽イオンと陰イオンの引力による結合"
  - "電子を共有してできる結合"
  - "自由電子を介した結合"
  - "原子が結び付いた一つのまとまり"
correct: 0
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  イオン結合では、「陽イオンと陰イオンの引力による結合」という点が大切です。したがって、正解は「陽イオンと陰イオンの引力による結合」です。
  
  「陽イオンと陰イオンの引力による結合」が正しいです。イオン結合の特徴を表しています。
  「電子を共有してできる結合」は、共有結合に関係する特徴です。
  「自由電子を介した結合」は、金属結合に関係する特徴です。
  「原子が結び付いた一つのまとまり」は、分子に関係する特徴です。
