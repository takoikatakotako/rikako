# 令和6年度 ITパスポート 公開問題 問57
id: 1037
type: single_choice
text: |
  暗号化方式の特徴について記した表において、表中のa〜dに入れる字句の適切な組合せはどれか。
  
  暗号方式aは、暗号化鍵と復号鍵が異なり、鍵の安全な配布は容易で、暗号化/復号の相対的な処理速度はcである。
  暗号方式bは、暗号化鍵と復号鍵が同一で、鍵の安全な配布は難しく、暗号化/復号の相対的な処理速度はdである。
choices:
  - "a:共通鍵暗号方式, b:公開鍵暗号方式, c:遅い, d:速い"
  - "a:共通鍵暗号方式, b:公開鍵暗号方式, c:速い, d:遅い"
  - "a:公開鍵暗号方式, b:共通鍵暗号方式, c:遅い, d:速い"
  - "a:公開鍵暗号方式, b:共通鍵暗号方式, c:速い, d:遅い"
correct: 2
