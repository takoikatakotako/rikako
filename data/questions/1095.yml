# 化学基礎 問55
id: 1095
type: single_choice
text: |
  次のうち、化学変化として最も適切なものはどれか。
choices:
  - "水が蒸発する。"
  - "アルミニウムが酸化する。"
  - "氷が砕ける。"
  - "ガラスが温められてやわらかくなる。"
correct: 1
explanation: |
  この問題は、「新しい物質ができる変化」を選ぶ問題です。
  
  アルミニウムが酸化すると、もとのアルミニウムとは別の物質ができます。これは化学変化です。したがって、正解は「アルミニウムが酸化する」です。
  
  「水が蒸発する」は、状態が変わるだけなので物理変化です。
  「アルミニウムが酸化する」が正しいです。新しい物質ができます。
  「氷が砕ける」は、形が変わるだけなので物理変化です。
  「ガラスが温められてやわらかくなる」は、状態や形の変化であり、化学変化ではありません。
