# 高校化学 問794
id: 2794
type: single_choice
text: |
  「アミノ酸どうしをつなぐ結合であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "沸点上昇"
  - "エンタルピー変化"
  - "電気分解"
  - "ペプチド結合"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「アミノ酸どうしをつなぐ結合であること」という見方が大切なのはペプチド結合です。したがって、正解は「ペプチド結合」です。
  
  「沸点上昇」は、その語で大切なのは「蒸気圧降下の結果として沸点が上がること」という見方です。
  「エンタルピー変化」は、その語で大切なのは「一定圧力での熱の出入りに注目すること」という見方です。
  「電気分解」は、その語で大切なのは「電気を使って反応を進めること」という見方です。
  「ペプチド結合」が正しいです。この見方が大切な語です。
