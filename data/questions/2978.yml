# 高校化学 問978
id: 2978
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "ヘスの法則 / 電気分解で気体が発生する電極側を考える場面"
  - "飽和炭化水素 / メタンやエタンの性質を考える場面"
  - "陽極 / 弱酸が一部だけ電離している水溶液を考える場面"
  - "電離平衡 / 複数の反応式を組み合わせて全体の反応熱を求める場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「飽和炭化水素 / メタンやエタンの性質を考える場面」です。したがって、正解は「飽和炭化水素 / メタンやエタンの性質を考える場面」です。
  
  「ヘスの法則 / 電気分解で気体が発生する電極側を考える場面」は、用語と場面の対応が合っていません。
  「飽和炭化水素 / メタンやエタンの性質を考える場面」が正しいです。用語と場面の対応が合っています。
  「陽極 / 弱酸が一部だけ電離している水溶液を考える場面」は、用語と場面の対応が合っていません。
  「電離平衡 / 複数の反応式を組み合わせて全体の反応熱を求める場面」は、用語と場面の対応が合っていません。
