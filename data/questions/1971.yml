# 化学基礎 問931
id: 1971
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "指示薬 / ダニエル電池で二つの水溶液をつなぐ場面"
  - "塩橋 / 電池、医薬品、素材開発などに化学が生かされる場面"
  - "酸 / 塩酸が水溶液中で水素イオンを生じる場面"
  - "化学が拓く世界 / BTB溶液やフェノールフタレインで液性を調べる場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「酸 / 塩酸が水溶液中で水素イオンを生じる場面」です。したがって、正解は「酸 / 塩酸が水溶液中で水素イオンを生じる場面」です。
  
  「指示薬 / ダニエル電池で二つの水溶液をつなぐ場面」は、用語と場面の対応が合っていません。
  「塩橋 / 電池、医薬品、素材開発などに化学が生かされる場面」は、用語と場面の対応が合っていません。
  「酸 / 塩酸が水溶液中で水素イオンを生じる場面」が正しいです。用語と場面の対応が合っています。
  「化学が拓く世界 / BTB溶液やフェノールフタレインで液性を調べる場面」は、用語と場面の対応が合っていません。
