# 高校化学 問231
id: 2231
type: single_choice
text: |
  「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "透析"
  - "溶解"
  - "飽和溶液"
  - "蒸気圧降下"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。 に当てはまる語は透析です。したがって、正解は「透析」です。
  
  「透析」が正しいです。「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」に当てはまる語です。
  「溶解」は、「溶質の粒子が溶媒中に広がっていく現象である。」に当てはまる語です。
  「飽和溶液」は、「その温度でそれ以上溶質が溶けない状態の溶液である。」に当てはまる語です。
  「蒸気圧降下」は、「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」に当てはまる語です。
