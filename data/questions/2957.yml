  - "分子結晶 / 薄い溶液側から濃い溶液側へ水が移動する場面"
  - "浸透圧 / どの結合が切れやすいかを比べる場面"
  - "結合エネルギー / ドライアイスやヨウ素の結晶を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「ルシャトリエの原理 / 圧力や濃度を変えると平衡が移る方向を考える場面」です。したがって、正解は「ルシャトリエの原理 / 圧力や濃度を変えると平衡が移る方向を考える場面」です。
  
  「ルシャトリエの原理 / 圧力や濃度を変えると平衡が移る方向を考える場面」が正しいです。用語と場面の対応が合っています。
