# 高校化学 問819
id: 2819
type: single_choice
text: |
  「結晶のような規則正しい配列をもたない固体である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "塩基の強さを電離のしやすさで見ること"
  - "粒子配列が不規則であること"
  - "電気伝導性が高く、特徴的な色のイオンをつくること"
  - "ベンゼン環にヒドロキシ基が直接つくこと"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「結晶のような規則正しい配列をもたない固体である。」を理解する上では、「粒子配列が不規則であること」という見方が大切です。したがって、正解は「粒子配列が不規則であること」です。
  
  「塩基の強さを電離のしやすさで見ること」は、その見方は塩基解離定数に関係します。
  「粒子配列が不規則であること」が正しいです。この説明と結び付きが強い見方です。
  「電気伝導性が高く、特徴的な色のイオンをつくること」は、その見方は銅に関係します。
  「ベンゼン環にヒドロキシ基が直接つくこと」は、その見方はフェノールに関係します。
