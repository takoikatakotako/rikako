# 化学基礎 問378
id: 1418
type: single_choice
text: |
  モルと最も関係が深い場面として、適切なものはどれか。
choices:
  - "水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
  - "6.0×10^23個の粒子をひとまとまりとして数える場面"
  - "レモン水とせっけん水の酸性・塩基性を比べる場面"
  - "BTB溶液やフェノールフタレインで液性を調べる場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  6.0×10^23個の粒子をひとまとまりとして数える場面は、モルと結び付きが強い場面です。したがって、正解は「6.0×10^23個の粒子をひとまとまりとして数える場面」です。
  
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」は、塩基と結び付きが強い場面です。
  「6.0×10^23個の粒子をひとまとまりとして数える場面」が正しいです。これはモルと結び付きが強い場面です。
  「レモン水とせっけん水の酸性・塩基性を比べる場面」は、pHと結び付きが強い場面です。
  「BTB溶液やフェノールフタレインで液性を調べる場面」は、指示薬と結び付きが強い場面です。
