# 化学基礎 問967
id: 2007
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "モル / どのくらいイオンに分かれるかを表すこと"
  - "同位体 / 陽子数が同じで中性子数が異なること"
  - "電離度 / 化学エネルギーを電気エネルギーに変えること"
  - "ダニエル電池 / 粒子の数をまとめて扱う単位であること"
correct: 1
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「同位体 / 陽子数が同じで中性子数が異なること」です。したがって、正解は「同位体 / 陽子数が同じで中性子数が異なること」です。
  
  「モル / どのくらいイオンに分かれるかを表すこと」は、用語と要点の対応が合っていません。
  「同位体 / 陽子数が同じで中性子数が異なること」が正しいです。用語と要点の対応が合っています。
  「電離度 / 化学エネルギーを電気エネルギーに変えること」は、用語と要点の対応が合っていません。
  「ダニエル電池 / 粒子の数をまとめて扱う単位であること」は、用語と要点の対応が合っていません。
