# 高校化学 問152
id: 2152
type: single_choice
text: |
  活性化エネルギーと最も関係が深い場面として、適切なものはどれか。
choices:
  - "加熱すると反応が進みやすくなる理由を考える場面"
  - "アンモニア水が強塩基ほど完全には電離しない場面"
  - "どの塩基がより電離しやすいかを比べる場面"
  - "自動車のバッテリーを考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  加熱すると反応が進みやすくなる理由を考える場面は、活性化エネルギーと結び付きが強い場面です。したがって、正解は「加熱すると反応が進みやすくなる理由を考える場面」です。
  
  「加熱すると反応が進みやすくなる理由を考える場面」が正しいです。これは活性化エネルギーと結び付きが強い場面です。
  「アンモニア水が強塩基ほど完全には電離しない場面」は、弱塩基と結び付きが強い場面です。
  「どの塩基がより電離しやすいかを比べる場面」は、塩基解離定数と結び付きが強い場面です。
  「自動車のバッテリーを考える場面」は、鉛蓄電池と結び付きが強い場面です。
