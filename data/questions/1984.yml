# 化学基礎 問944
id: 1984
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "高分子化合物 / 空気や食塩水のように複数の物質が混ざったものを考える場面"
  - "混合物 / 水を冷やして氷にする場面"
  - "凝固 / ポリエチレンやタンパク質のような長い分子を考える場面"
  - "電解質 / 食塩水や塩酸が電流を通す場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「電解質 / 食塩水や塩酸が電流を通す場面」です。したがって、正解は「電解質 / 食塩水や塩酸が電流を通す場面」です。
  
  「高分子化合物 / 空気や食塩水のように複数の物質が混ざったものを考える場面」は、用語と場面の対応が合っていません。
  「混合物 / 水を冷やして氷にする場面」は、用語と場面の対応が合っていません。
  「凝固 / ポリエチレンやタンパク質のような長い分子を考える場面」は、用語と場面の対応が合っていません。
  「電解質 / 食塩水や塩酸が電流を通す場面」が正しいです。用語と場面の対応が合っています。
