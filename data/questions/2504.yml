# 高校化学 問504
id: 2504
type: single_choice
text: |
  「気液平衡にあるとき、気体が示す圧力である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水を水蒸気に変えるのに必要な熱を考える場面"
  - "金属が電気を通したりのびたりする理由を考える場面"
  - "薄暗い部屋でコロイドに光を当てると筋が見える場面"
  - "ふたをした容器の中で液体の上にたまる蒸気を考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「気液平衡にあるとき、気体が示す圧力である。」と最も関係が深い場面は「ふたをした容器の中で液体の上にたまる蒸気を考える場面」です。したがって、正解は「ふたをした容器の中で液体の上にたまる蒸気を考える場面」です。
  
  「水を水蒸気に変えるのに必要な熱を考える場面」は、「液体1 molが気体になるときに吸収する熱量である。」と結び付きが強い場面です。
  「金属が電気を通したりのびたりする理由を考える場面」は、「金属原子が規則正しく並び、自由電子が全体に広がった結晶である。」と結び付きが強い場面です。
  「薄暗い部屋でコロイドに光を当てると筋が見える場面」は、「コロイド粒子が光を散乱するため、光の道筋が見える現象である。」と結び付きが強い場面です。
  「ふたをした容器の中で液体の上にたまる蒸気を考える場面」が正しいです。この説明と結び付きが強い場面です。
