# 化学基礎 問817
id: 1857
type: single_choice
text: |
  「陽子数が同じで中性子数が異なること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "空気や食塩水のように複数の物質が混ざったものを考える場面"
  - "水を冷やして氷にする場面"
  - "炭素12と炭素14を比べる場面"
  - "ナトリウム原子が電子を1個失って Na+ になる場面"
correct: 2
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「陽子数が同じで中性子数が異なること」という見方と最も関係が深い場面は「炭素12と炭素14を比べる場面」です。したがって、正解は「炭素12と炭素14を比べる場面」です。
  
  「空気や食塩水のように複数の物質が混ざったものを考える場面」は、その場面で大切なのは「成分が二種類以上まざっていること」という見方です。
  「水を冷やして氷にする場面」は、その場面で大切なのは「液体から固体への変化であること」という見方です。
  「炭素12と炭素14を比べる場面」が正しいです。この見方と最も関係が深い場面です。
  「ナトリウム原子が電子を1個失って Na+ になる場面」は、その場面で大切なのは「電子を失って正に帯電すること」という見方です。
