# 化学基礎 問620
id: 1660
type: single_choice
text: |
  「電子を失って正に帯電すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "電離度"
  - "陽イオン"
  - "ダニエル電池"
  - "高分子化合物"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「電子を失って正に帯電すること」という見方が大切なのは陽イオンです。したがって、正解は「陽イオン」です。
  
  「電離度」は、その語で大切なのは「どのくらいイオンに分かれるかを表すこと」という見方です。
  「陽イオン」が正しいです。この見方が大切な語です。
  「ダニエル電池」は、その語で大切なのは「化学エネルギーを電気エネルギーに変えること」という見方です。
  「高分子化合物」は、その語で大切なのは「小さな単位が多数つながっていること」という見方です。
