# 高校化学 問161
id: 2161
type: single_choice
text: |
  緩衝液と最も関係が深い場面として、適切なものはどれか。
choices:
  - "金属イオンが電子を受け取って析出する電極を考える場面"
  - "血液や実験用の溶液で pH を保ちたい場面"
  - "物質を燃やしたときに熱が出ることを考える場面"
  - "複数の反応式を組み合わせて全体の反応熱を求める場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  血液や実験用の溶液で pH を保ちたい場面は、緩衝液と結び付きが強い場面です。したがって、正解は「血液や実験用の溶液で pH を保ちたい場面」です。
  
  「金属イオンが電子を受け取って析出する電極を考える場面」は、陰極と結び付きが強い場面です。
  「血液や実験用の溶液で pH を保ちたい場面」が正しいです。これは緩衝液と結び付きが強い場面です。
  「物質を燃やしたときに熱が出ることを考える場面」は、反応熱と結び付きが強い場面です。
  「複数の反応式を組み合わせて全体の反応熱を求める場面」は、ヘスの法則と結び付きが強い場面です。
