# 高校化学 問832
id: 2832
type: single_choice
text: |
  「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "多重結合をもつこと"
  - "丈夫な合成繊維であること"
  - "コロイド粒子の電荷に注目すること"
  - "分子の集まり方や沸点に関係すること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」を理解する上では、「コロイド粒子の電荷に注目すること」という見方が大切です。したがって、正解は「コロイド粒子の電荷に注目すること」です。
  
  「多重結合をもつこと」は、その見方は不飽和炭化水素に関係します。
  「丈夫な合成繊維であること」は、その見方はナイロンに関係します。
  「コロイド粒子の電荷に注目すること」が正しいです。この説明と結び付きが強い見方です。
  「分子の集まり方や沸点に関係すること」は、その見方は分子間力に関係します。
