# 高校化学 問492
id: 2492
type: single_choice
text: |
  タンパク質を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "二重結合や三重結合に何かが加わること"
  - "同じ分子式でも構造が違うこと"
  - "分子の端にカルボニル構造をもつこと"
  - "アミノ酸が多数つながった高分子であること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  タンパク質では、「アミノ酸が多数つながった高分子であること」という見方が大切です。したがって、正解は「アミノ酸が多数つながった高分子であること」です。
  
  「二重結合や三重結合に何かが加わること」は、付加反応に関係する見方です。
  「同じ分子式でも構造が違うこと」は、異性体に関係する見方です。
  「分子の端にカルボニル構造をもつこと」は、アルデヒドに関係する見方です。
  「アミノ酸が多数つながった高分子であること」が正しいです。タンパク質の要点を表しています。
