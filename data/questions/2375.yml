# 高校化学 問375
id: 2375
type: single_choice
text: |
  「ナトリウムで黄色、銅で青緑色を確かめる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "ベンゼン"
  - "炎色反応"
  - "アニリン"
  - "資源の再利用"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  ナトリウムで黄色、銅で青緑色を確かめる場面 と最も関係が深いのは炎色反応です。したがって、正解は「炎色反応」です。
  
  「ベンゼン」は、「芳香族化合物の基本構造を学ぶ場面」と結び付きが強い語です。
  「炎色反応」が正しいです。この具体例と最も関係が深い語です。
  「アニリン」は、「染料の原料になる芳香族アミンを考える場面」と結び付きが強い語です。
  「資源の再利用」は、「金属やプラスチックを回収して再資源化する場面」と結び付きが強い語です。
