# 高校化学 問99
id: 2099
type: single_choice
text: |
  資源の再利用についての説明として、最も適切なものはどれか。
choices:
  - "遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。"
  - "化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。"
  - "使い終わった資源や製品を回収し、再び利用する考え方である。"
  - "ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  資源の再利用は、使い終わった資源や製品を回収し、再び利用する考え方である。 したがって、正解は「使い終わった資源や製品を回収し、再び利用する考え方である。」です。
  
  「遷移元素の一つで、電気を通しやすく、青色のイオンをつくる元素である。」は、銅の説明です。
  「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」は、化学が築く未来の説明です。
  「使い終わった資源や製品を回収し、再び利用する考え方である。」が正しいです。資源の再利用の説明です。
  「ポリエチレンテレフタラートの略で、ボトルや繊維に使われるポリエステルである。」は、PETの説明です。
