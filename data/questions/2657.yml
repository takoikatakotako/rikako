# 高校化学 問657
id: 2657
type: single_choice
text: |
  「圧力や濃度を変えると平衡が移る方向を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。"
  - "平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。"
  - "カルボキシ基をもち、酸性を示す有機化合物である。"
  - "グルコースが多数つながった植物の貯蔵多糖である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「圧力や濃度を変えると平衡が移る方向を考える場面」を説明した文として適切なのは「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」です。したがって、正解は「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」です。
  
  「周期表の中央付近にあり、さまざまな酸化数や色を示しやすい元素群である。」は、この説明は「鉄や銅、クロムの化合物の色の違いを考える場面」と結び付きが強いです。
  「平衡状態の系に変化を与えると、その変化を打ち消す向きに平衡が移動するという考え方である。」が正しいです。この具体例を説明した文です。
  「カルボキシ基をもち、酸性を示す有機化合物である。」は、この説明は「酢酸の性質やにおいを考える場面」と結び付きが強いです。
  「グルコースが多数つながった植物の貯蔵多糖である。」は、この説明は「米やいもに多く含まれる成分を考える場面」と結び付きが強いです。
