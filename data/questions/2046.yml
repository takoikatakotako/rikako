# 高校化学 問46
id: 2046
type: single_choice
text: |
  燃料電池についての説明として、最も適切なものはどれか。
choices:
  - "電気エネルギーを使って自発的でない化学変化を起こす操作である。"
  - "燃料と酸化剤を外部から供給しながら電気を取り出す電池である。"
  - "電気分解で還元が起こる電極である。"
  - "化学反応に伴って出入りする熱量である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  燃料電池は、燃料と酸化剤を外部から供給しながら電気を取り出す電池である。 したがって、正解は「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」です。
  
  「電気エネルギーを使って自発的でない化学変化を起こす操作である。」は、電気分解の説明です。
  「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」が正しいです。燃料電池の説明です。
  「電気分解で還元が起こる電極である。」は、陰極の説明です。
  「化学反応に伴って出入りする熱量である。」は、反応熱の説明です。
