# 高校化学 問262
id: 2262
type: single_choice
text: |
  「塩のイオンが水と反応して溶液の性質を変える現象である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "吸熱反応"
  - "光合成"
  - "溶解度"
  - "塩の加水分解"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  塩のイオンが水と反応して溶液の性質を変える現象である。 に当てはまる語は塩の加水分解です。したがって、正解は「塩の加水分解」です。
  
  「吸熱反応」は、「反応の結果として周囲から熱を吸収する反応である。」に当てはまる語です。
  「光合成」は、「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」に当てはまる語です。
  「溶解度」は、「一定量の溶媒に溶けることのできる溶質の最大量である。」に当てはまる語です。
  「塩の加水分解」が正しいです。「塩のイオンが水と反応して溶液の性質を変える現象である。」に当てはまる語です。
