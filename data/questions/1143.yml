# 化学基礎 問103
id: 1143
type: single_choice
text: |
  再結晶についての説明として、最も適切なものはどれか。
choices:
  - "成分ごとの移動しやすさの違いを利用して分ける方法である。"
  - "一種類の成分だけからなる物質である。"
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
  - "複数の成分が混ざってできている物質である。"
correct: 2
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  再結晶は、温度による溶解度の差を利用して固体をより純粋に取り出す方法である。したがって、正解は「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」です。
  
  「成分ごとの移動しやすさの違いを利用して分ける方法である。」は、クロマトグラフィーの説明です。
  「一種類の成分だけからなる物質である。」は、純物質の説明です。
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」が正しいです。再結晶の説明です。
  「複数の成分が混ざってできている物質である。」は、混合物の説明です。
