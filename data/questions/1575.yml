# 化学基礎 問535
id: 1575
type: single_choice
text: |
  「溶けた物質のうち、電離してイオンになった割合である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸化銅から酸素が取れて銅になる場面"
  - "砂糖水が電流をほとんど通さない場面"
  - "同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面"
  - "水とエタノールの混合物を沸点の差で分ける場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「溶けた物質のうち、電離してイオンになった割合である。」と最も関係が深い場面は「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」です。したがって、正解は「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」です。
  
  「酸化銅から酸素が取れて銅になる場面」は、「物質が酸素を失う、または電子を受け取る変化である。」と結び付きが強い場面です。
  「砂糖水が電流をほとんど通さない場面」は、「水に溶けても電流をほとんど通さない物質である。」と結び付きが強い場面です。
  「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」が正しいです。この説明と結び付きが強い場面です。
  「水とエタノールの混合物を沸点の差で分ける場面」は、「沸点の違いを利用して液体を分ける方法である。」と結び付きが強い場面です。
