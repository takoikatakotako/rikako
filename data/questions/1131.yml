# 化学基礎 問91
id: 1131
type: single_choice
text: |
  ダニエル電池で反応が進むと、亜鉛板の質量がどうなるかとして最も適切なものはどれか。
choices:
  - "増える。"
  - "減る。"
  - "全く変わらない。"
  - "必ず2倍になる。"
correct: 1
explanation: |
  この問題は、「亜鉛板で何が起きているか」を考える問題です。
  
  ダニエル電池では、亜鉛が Zn2+ になって水溶液中へ出ていきます。そのため、亜鉛板の質量は減ります。したがって、正解は「減る」です。
  
  「増える」は、適切ではありません。
  「減る」が正しいです。亜鉛が溶け出していくためです。
  「全く変わらない」は、適切ではありません。
  「必ず2倍になる」は、適切ではありません。
