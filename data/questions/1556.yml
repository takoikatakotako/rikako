# 化学基礎 問516
id: 1556
type: single_choice
text: |
  「原子核の中にある陽子数と中性子数の合計である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムが電子を1個失いやすい理由を考える場面"
  - "水分子で電荷のかたよりを考える場面"
  - "塩酸と水酸化ナトリウム水溶液を混ぜる場面"
  - "炭素12で陽子数と中性子数の合計を見る場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「原子核の中にある陽子数と中性子数の合計である。」と最も関係が深い場面は「炭素12で陽子数と中性子数の合計を見る場面」です。したがって、正解は「炭素12で陽子数と中性子数の合計を見る場面」です。
  
  「ナトリウムが電子を1個失いやすい理由を考える場面」は、「原子のいちばん外側の電子殻にある電子である。」と結び付きが強い場面です。
  「水分子で電荷のかたよりを考える場面」は、「分子の中で電荷のかたよりがある分子である。」と結び付きが強い場面です。
  「塩酸と水酸化ナトリウム水溶液を混ぜる場面」は、「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」と結び付きが強い場面です。
  「炭素12で陽子数と中性子数の合計を見る場面」が正しいです。この説明と結び付きが強い場面です。
