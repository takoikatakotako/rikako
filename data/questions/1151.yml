# 化学基礎 問111
id: 1151
type: single_choice
text: |
  融解についての説明として、最も適切なものはどれか。
choices:
  - "液体が気体になる状態変化である。"
  - "液体が固体になる状態変化である。"
  - "固体が液体になる状態変化である。"
  - "固体が液体にならずに直接気体になる状態変化である。"
correct: 2
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  融解は、固体が液体になる状態変化である。したがって、正解は「固体が液体になる状態変化である。」です。
  
  「液体が気体になる状態変化である。」は、蒸発の説明です。
  「液体が固体になる状態変化である。」は、凝固の説明です。
  「固体が液体になる状態変化である。」が正しいです。融解の説明です。
  「固体が液体にならずに直接気体になる状態変化である。」は、昇華の説明です。
