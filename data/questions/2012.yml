# 化学基礎 問972
id: 2012
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "中和 / 相手を還元させ、自分は酸化されること"
  - "還元剤 / 金属元素ごとに炎の色が異なること"
  - "イオン結合 / 電気的な引力で結び付くこと"
  - "炎色反応 / 酸と塩基が打ち消し合うこと"
correct: 2
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「イオン結合 / 電気的な引力で結び付くこと」です。したがって、正解は「イオン結合 / 電気的な引力で結び付くこと」です。
  
  「中和 / 相手を還元させ、自分は酸化されること」は、用語と要点の対応が合っていません。
  「還元剤 / 金属元素ごとに炎の色が異なること」は、用語と要点の対応が合っていません。
  「イオン結合 / 電気的な引力で結び付くこと」が正しいです。用語と要点の対応が合っています。
  「炎色反応 / 酸と塩基が打ち消し合うこと」は、用語と要点の対応が合っていません。
