# 高校化学 問149
id: 2149
type: single_choice
text: |
  陰極と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ケミカルライトが光る仕組みを考える場面"
  - "金属イオンが電子を受け取って析出する電極を考える場面"
  - "同じ反応でも条件によって進み方が変わることを比べる場面"
  - "二酸化マンガンを加えると過酸化水素水の分解が速くなる場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  金属イオンが電子を受け取って析出する電極を考える場面は、陰極と結び付きが強い場面です。したがって、正解は「金属イオンが電子を受け取って析出する電極を考える場面」です。
  
  「ケミカルライトが光る仕組みを考える場面」は、化学発光と結び付きが強い場面です。
  「金属イオンが電子を受け取って析出する電極を考える場面」が正しいです。これは陰極と結び付きが強い場面です。
  「同じ反応でも条件によって進み方が変わることを比べる場面」は、反応速度と結び付きが強い場面です。
  「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」は、触媒と結び付きが強い場面です。
