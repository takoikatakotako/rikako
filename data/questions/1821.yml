# 化学基礎 問781
id: 1821
type: single_choice
text: |
  「水素イオンに注目すること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "固体が液体にならずに気体になる状態変化である。"
  - "原子や原子団が電子を受け取って負の電荷をもつ粒子である。"
  - "粒子の数をまとめて表すための単位である。"
  - "水溶液中で水素イオンを生じる物質である。"
correct: 3
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「水素イオンに注目すること」という見方と最も関係が深い説明は「水溶液中で水素イオンを生じる物質である。」です。したがって、正解は「水溶液中で水素イオンを生じる物質である。」です。
  
  「固体が液体にならずに気体になる状態変化である。」は、その説明で大切なのは「固体から直接気体になること」という見方です。
  「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」は、その説明で大切なのは「電子を受け取って負に帯電すること」という見方です。
  「粒子の数をまとめて表すための単位である。」は、その説明で大切なのは「粒子の数をまとめて扱う単位であること」という見方です。
  「水溶液中で水素イオンを生じる物質である。」が正しいです。この見方と最も関係が深い説明です。
