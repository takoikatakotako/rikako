# 化学基礎 問27
id: 694
type: single_choice
text: |
  塩化ナトリウム水溶液が電気を通す理由として、最も適切なものはどれか。
choices:
  - "食塩が完全に消えてしまうから。"
  - "水の中でイオンが自由に動けるから。"
  - "水そのものが必ず金属に変わるから。"
  - "食塩が分子のまま速く流れるから。"
correct: 1
explanation: |
  この問題は、「水溶液が電気を通す理由」を考える問題です。
  
  塩化ナトリウムが水に溶けると、ナトリウムイオンと塩化物イオンに分かれます。これらのイオンが水の中で動けるので、電気を通します。したがって、正解は「水の中でイオンが自由に動けるから」です。
  
  「食塩が完全に消えてしまうから」は、適切ではありません。
  「水の中でイオンが自由に動けるから」が正しいです。電気を運ぶ粒子が動けるためです。
  「水そのものが必ず金属に変わるから」は、適切ではありません。
  「食塩が分子のまま速く流れるから」は、適切ではありません。
