# 化学基礎 問933
id: 1973
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "中和 / 塩酸と水酸化ナトリウム水溶液を混ぜる場面"
  - "還元 / 砂糖水が電流をほとんど通さない場面"
  - "非電解質 / 水とエタノールの混合物を沸点の差で分ける場面"
  - "蒸留 / 酸化銅から酸素が取れて銅になる場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「中和 / 塩酸と水酸化ナトリウム水溶液を混ぜる場面」です。したがって、正解は「中和 / 塩酸と水酸化ナトリウム水溶液を混ぜる場面」です。
  
  「中和 / 塩酸と水酸化ナトリウム水溶液を混ぜる場面」が正しいです。用語と場面の対応が合っています。
  「還元 / 砂糖水が電流をほとんど通さない場面」は、用語と場面の対応が合っていません。
  「非電解質 / 水とエタノールの混合物を沸点の差で分ける場面」は、用語と場面の対応が合っていません。
  「蒸留 / 酸化銅から酸素が取れて銅になる場面」は、用語と場面の対応が合っていません。
