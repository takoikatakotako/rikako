# 高校化学 問757
id: 2757
type: single_choice
text: |
  「加えた変化を打ち消す向きに平衡が動くこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "フェノール"
  - "資源の再利用"
  - "ルシャトリエの原理"
  - "理想気体の状態方程式"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「加えた変化を打ち消す向きに平衡が動くこと」という見方が大切なのはルシャトリエの原理です。したがって、正解は「ルシャトリエの原理」です。
  
  「フェノール」は、その語で大切なのは「ベンゼン環にヒドロキシ基が直接つくこと」という見方です。
  「資源の再利用」は、その語で大切なのは「資源を循環させて無駄を減らすこと」という見方です。
  「ルシャトリエの原理」が正しいです。この見方が大切な語です。
  「理想気体の状態方程式」は、その語で大切なのは「圧力、体積、物質量、温度をまとめて扱うこと」という見方です。
