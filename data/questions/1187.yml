# 化学基礎 問147
id: 1187
type: single_choice
text: |
  指示薬についての説明として、最も適切なものはどれか。
choices:
  - "食品などが酸化するのを防ぐために用いられる物質である。"
  - "多数の小さな単位がつながってできた大きな分子からなる化合物である。"
  - "水溶液の酸性やアルカリ性によって色が変わる薬品である。"
  - "化学で学んだ内容が、日常生活や社会を支える技術と結び付いていることを考える内容である。"
correct: 2
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  指示薬は、水溶液の酸性やアルカリ性によって色が変わる薬品である。したがって、正解は「水溶液の酸性やアルカリ性によって色が変わる薬品である。」です。
  
  「食品などが酸化するのを防ぐために用いられる物質である。」は、酸化防止剤の説明です。
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」は、高分子化合物の説明です。
  「水溶液の酸性やアルカリ性によって色が変わる薬品である。」が正しいです。指示薬の説明です。
  「化学で学んだ内容が、日常生活や社会を支える技術と結び付いていることを考える内容である。」は、化学が拓く世界の説明です。
