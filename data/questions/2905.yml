# 高校化学 問905
id: 2905
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "気液平衡 / 密閉容器で水面の高さが変わらなくなる場面"
  - "弱塩基 / ナトリウムで黄色、銅で青緑色を確かめる場面"
  - "炎色反応 / 果物の香りに関係する化合物を考える場面"
  - "エステル / アンモニア水が強塩基ほど完全には電離しない場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「気液平衡 / 密閉容器で水面の高さが変わらなくなる場面」です。したがって、正解は「気液平衡 / 密閉容器で水面の高さが変わらなくなる場面」です。
  
  「気液平衡 / 密閉容器で水面の高さが変わらなくなる場面」が正しいです。用語と場面の対応が合っています。
  「弱塩基 / ナトリウムで黄色、銅で青緑色を確かめる場面」は、用語と場面の対応が合っていません。
  「炎色反応 / 果物の香りに関係する化合物を考える場面」は、用語と場面の対応が合っていません。
  「エステル / アンモニア水が強塩基ほど完全には電離しない場面」は、用語と場面の対応が合っていません。
