# 高校化学 問745
id: 2745
type: single_choice
text: |
  「軽くて繰り返し使いやすい電池であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "鉄"
  - "ベンゼン"
  - "リチウムイオン電池"
  - "機能性材料"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「軽くて繰り返し使いやすい電池であること」という見方が大切なのはリチウムイオン電池です。したがって、正解は「リチウムイオン電池」です。
  
  「鉄」は、その語で大切なのは「実用性が高く、酸化数が変わりやすいこと」という見方です。
  「ベンゼン」は、その語で大切なのは「ベンゼン環をもつこと」という見方です。
  「リチウムイオン電池」が正しいです。この見方が大切な語です。
  「機能性材料」は、その語で大切なのは「必要な機能をねらって材料を設計すること」という見方です。
