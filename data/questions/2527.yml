# 高校化学 問527
id: 2527
type: single_choice
text: |
  「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "顕微鏡でコロイド粒子が細かく動く様子を観察する場面"
  - "ケミカルライトが光る仕組みを考える場面"
  - "薄い溶液側から濃い溶液側へ水が移動する場面"
  - "加熱すると反応が進みやすくなる理由を考える場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」と最も関係が深い場面は「薄い溶液側から濃い溶液側へ水が移動する場面」です。したがって、正解は「薄い溶液側から濃い溶液側へ水が移動する場面」です。
  
  「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」は、「コロイド粒子が不規則に動いて見える現象である。」と結び付きが強い場面です。
  「ケミカルライトが光る仕組みを考える場面」は、「化学反応によって光が放出される現象である。」と結び付きが強い場面です。
  「薄い溶液側から濃い溶液側へ水が移動する場面」が正しいです。この説明と結び付きが強い場面です。
  「加熱すると反応が進みやすくなる理由を考える場面」は、「反応が進むために必要な最小限のエネルギーである。」と結び付きが強い場面です。
