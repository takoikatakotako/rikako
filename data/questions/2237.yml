# 高校化学 問237
id: 2237
type: single_choice
text: |
  「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "発熱反応"
  - "化学発光"
  - "ヘスの法則"
  - "乾電池"
correct: 2
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。 に当てはまる語はヘスの法則です。したがって、正解は「ヘスの法則」です。
  
  「発熱反応」は、「反応の結果として周囲へ熱を放出する反応である。」に当てはまる語です。
  「化学発光」は、「化学反応によって光が放出される現象である。」に当てはまる語です。
  「ヘスの法則」が正しいです。「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」に当てはまる語です。
  「乾電池」は、「一度使い切ることを前提にした一次電池の代表例である。」に当てはまる語です。
