# 高校化学 問386
id: 2386
type: single_choice
text: |
  「果物の香りに関係する化合物を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "エステル"
  - "アルコール"
  - "カルボン酸"
  - "フェノール"
correct: 0
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  果物の香りに関係する化合物を考える場面 と最も関係が深いのはエステルです。したがって、正解は「エステル」です。
  
  「エステル」が正しいです。この具体例と最も関係が深い語です。
  「アルコール」は、「エタノールの性質や利用を考える場面」と結び付きが強い語です。
  「カルボン酸」は、「酢酸の性質やにおいを考える場面」と結び付きが強い語です。
  「フェノール」は、「フェノール類の酸性や消毒作用を考える場面」と結び付きが強い語です。
