# 高校化学 問252
id: 2252
type: single_choice
text: |
  「反応が進むために必要な最小限のエネルギーである。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "燃料電池"
  - "活性化エネルギー"
  - "陽極"
  - "ファラデーの法則"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  反応が進むために必要な最小限のエネルギーである。 に当てはまる語は活性化エネルギーです。したがって、正解は「活性化エネルギー」です。
  
  「燃料電池」は、「燃料と酸化剤を外部から供給しながら電気を取り出す電池である。」に当てはまる語です。
  「活性化エネルギー」が正しいです。「反応が進むために必要な最小限のエネルギーである。」に当てはまる語です。
  「陽極」は、「電気分解で酸化が起こる電極である。」に当てはまる語です。
  「ファラデーの法則」は、「電気分解で生じる物質の量は流れた電気量に比例するという法則である。」に当てはまる語です。
