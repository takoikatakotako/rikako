# 化学基礎 問591
id: 1631
type: single_choice
text: |
  「亜鉛が銅より先にイオンになりやすいことを見る場面」を説明した文として、最も適切なものはどれか。
choices:
  - "化学の知識が生活、産業、環境、医療などに役立つという見方である。"
  - "金属が電子を失ってイオンになりやすい性質の強さである。"
  - "一種類の元素だけからできている物質である。"
  - "固体が液体にならずに気体になる状態変化である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「亜鉛が銅より先にイオンになりやすいことを見る場面」を説明した文として適切なのは「金属が電子を失ってイオンになりやすい性質の強さである。」です。したがって、正解は「金属が電子を失ってイオンになりやすい性質の強さである。」です。
  
  「化学の知識が生活、産業、環境、医療などに役立つという見方である。」は、この説明は「電池、医薬品、素材開発などに化学が生かされる場面」と結び付きが強いです。
  「金属が電子を失ってイオンになりやすい性質の強さである。」が正しいです。この具体例を説明した文です。
  「一種類の元素だけからできている物質である。」は、この説明は「鉄や酸素のように一種類の元素だけからできた物質を考える場面」と結び付きが強いです。
  「固体が液体にならずに気体になる状態変化である。」は、この説明は「ドライアイスがそのまま気体になる場面」と結び付きが強いです。
