# 化学基礎 問191
id: 1231
type: single_choice
text: |
  塩橋の例として、最も適切なものはどれか。
choices:
  - "食塩水"
  - "寒天に硝酸カリウムを含ませた塩橋"
  - "砂糖水"
  - "炭素 14 による年代測定"
correct: 1
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  寒天に硝酸カリウムを含ませた塩橋は、塩橋の例です。したがって、正解は「寒天に硝酸カリウムを含ませた塩橋」です。
  
  「食塩水」は、電解質の例として見る方が適切です。
  「寒天に硝酸カリウムを含ませた塩橋」が正しいです。これは塩橋の例です。
  「砂糖水」は、非電解質の例として見る方が適切です。
  「炭素 14 による年代測定」は、放射性同位体の例として見る方が適切です。
