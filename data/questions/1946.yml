# 化学基礎 問906
id: 1946
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "融解 / 周期表で似た性質の元素が縦に並ぶことを見る場面"
  - "混合物 / 空気や食塩水のように複数の物質が混ざったものを考える場面"
  - "周期律 / 水分子や酸素分子を粒として考える場面"
  - "分子 / 氷を温めて水にする場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「混合物 / 空気や食塩水のように複数の物質が混ざったものを考える場面」です。したがって、正解は「混合物 / 空気や食塩水のように複数の物質が混ざったものを考える場面」です。
  
  「融解 / 周期表で似た性質の元素が縦に並ぶことを見る場面」は、用語と場面の対応が合っていません。
  「混合物 / 空気や食塩水のように複数の物質が混ざったものを考える場面」が正しいです。用語と場面の対応が合っています。
  「周期律 / 水分子や酸素分子を粒として考える場面」は、用語と場面の対応が合っていません。
  「分子 / 氷を温めて水にする場面」は、用語と場面の対応が合っていません。
