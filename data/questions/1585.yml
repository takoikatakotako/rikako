# 化学基礎 問545
id: 1585
type: single_choice
text: |
  「水に溶けても電流をほとんど通さない物質である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "砂糖水が電流をほとんど通さない場面"
  - "食品の変色や劣化を防ぐためにビタミンCを使う場面"
  - "酸素だけが入った容器を考える場面"
  - "ぬれた床の水がしだいに乾く場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「水に溶けても電流をほとんど通さない物質である。」と最も関係が深い場面は「砂糖水が電流をほとんど通さない場面」です。したがって、正解は「砂糖水が電流をほとんど通さない場面」です。
  
  「砂糖水が電流をほとんど通さない場面」が正しいです。この説明と結び付きが強い場面です。
  「食品の変色や劣化を防ぐためにビタミンCを使う場面」は、「食品や物質が酸化して変質するのを防ぐために用いられる物質である。」と結び付きが強い場面です。
  「酸素だけが入った容器を考える場面」は、「一種類の物質だけからできていて、性質が一定である物質である。」と結び付きが強い場面です。
  「ぬれた床の水がしだいに乾く場面」は、「液体が気体になる状態変化である。」と結び付きが強い場面です。
