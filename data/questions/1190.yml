# 化学基礎 問150
id: 1190
type: single_choice
text: |
  化学が拓く世界についての説明として、最も適切なものはどれか。
choices:
  - "液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。"
  - "化学で学んだ内容が、日常生活や社会を支える技術と結び付いていることを考える内容である。"
  - "沸点の違いを利用して液体を分ける方法である。"
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
correct: 1
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  化学が拓く世界は、化学で学んだ内容が、日常生活や社会を支える技術と結び付いていることを考える内容である。したがって、正解は「化学で学んだ内容が、日常生活や社会を支える技術と結び付いていることを考える内容である。」です。
  
  「液体に溶けていない固体を、ろ紙などを使って液体から分ける方法である。」は、ろ過の説明です。
  「化学で学んだ内容が、日常生活や社会を支える技術と結び付いていることを考える内容である。」が正しいです。化学が拓く世界の説明です。
  「沸点の違いを利用して液体を分ける方法である。」は、蒸留の説明です。
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、再結晶の説明です。
