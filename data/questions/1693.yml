# 化学基礎 問653
id: 1693
type: single_choice
text: |
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "自由電子が結合を支えること"
  - "溶解度の差を利用すること"
  - "水素イオンに注目すること"
  - "酸素の喪失や電子の受け取りに注目すること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」を理解する上では、「溶解度の差を利用すること」という見方が大切です。したがって、正解は「溶解度の差を利用すること」です。
  
  「自由電子が結合を支えること」は、その見方は金属結合に関係します。
  「溶解度の差を利用すること」が正しいです。この説明と結び付きが強い見方です。
  「水素イオンに注目すること」は、その見方は酸に関係します。
  「酸素の喪失や電子の受け取りに注目すること」は、その見方は還元に関係します。
