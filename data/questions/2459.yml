# 高校化学 問459
id: 2459
type: single_choice
text: |
  電離平衡を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "粒子が周囲の分子にぶつかって動くこと"
  - "コロイド粒子の電荷に注目すること"
  - "電離と元に戻る変化がつり合うこと"
  - "水となじみにくく不安定になりやすいこと"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  電離平衡では、「電離と元に戻る変化がつり合うこと」という見方が大切です。したがって、正解は「電離と元に戻る変化がつり合うこと」です。
  
  「粒子が周囲の分子にぶつかって動くこと」は、ブラウン運動に関係する見方です。
  「コロイド粒子の電荷に注目すること」は、電気泳動に関係する見方です。
  「電離と元に戻る変化がつり合うこと」が正しいです。電離平衡の要点を表しています。
  「水となじみにくく不安定になりやすいこと」は、疎水コロイドに関係する見方です。
