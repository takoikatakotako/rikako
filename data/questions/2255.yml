# 高校化学 問255
id: 2255
type: single_choice
text: |
  「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "化学平衡"
  - "陰極"
  - "反応熱"
  - "ヘスの法則"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。 に当てはまる語は化学平衡です。したがって、正解は「化学平衡」です。
  
  「化学平衡」が正しいです。「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」に当てはまる語です。
  「陰極」は、「電気分解で還元が起こる電極である。」に当てはまる語です。
  「反応熱」は、「化学反応に伴って出入りする熱量である。」に当てはまる語です。
  「ヘスの法則」は、「反応のエンタルピー変化は経路によらず、始状態と終状態だけで決まるという法則である。」に当てはまる語です。
