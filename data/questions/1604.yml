# 化学基礎 問564
id: 1604
type: single_choice
text: |
  「ドライアイスがそのまま気体になる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "原子どうしが電子を共有してできる結び付きである。"
  - "化学変化を、物質の種類と量の関係が分かるように表した式である。"
  - "固体が液体にならずに気体になる状態変化である。"
  - "物質が酸素と結び付く、または電子を失う変化である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「ドライアイスがそのまま気体になる場面」を説明した文として適切なのは「固体が液体にならずに気体になる状態変化である。」です。したがって、正解は「固体が液体にならずに気体になる状態変化である。」です。
  
  「原子どうしが電子を共有してできる結び付きである。」は、この説明は「水素原子どうしが電子を共有して H2 になる場面」と結び付きが強いです。
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」は、この説明は「水素と酸素から水ができる反応を式で表す場面」と結び付きが強いです。
  「固体が液体にならずに気体になる状態変化である。」が正しいです。この具体例を説明した文です。
  「物質が酸素と結び付く、または電子を失う変化である。」は、この説明は「マグネシウムが酸素と結び付く場面」と結び付きが強いです。
