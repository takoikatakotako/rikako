# 化学基礎 問434
id: 1474
type: single_choice
text: |
  「水溶液の酸性や塩基性の強さを表す尺度である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "pH"
  - "中和"
  - "指示薬"
  - "還元"
correct: 0
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  水溶液の酸性や塩基性の強さを表す尺度である。 に当てはまる語はpHです。したがって、正解は「pH」です。
  
  「pH」が正しいです。「水溶液の酸性や塩基性の強さを表す尺度である。」に当てはまる語です。
  「中和」は、「酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」に当てはまる語です。
  「指示薬」は、「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」に当てはまる語です。
  「還元」は、「物質が酸素を失う、または電子を受け取る変化である。」に当てはまる語です。
