# 化学基礎 問543
id: 1583
type: single_choice
text: |
  「二つの溶液の電気的なつり合いを保つための部分である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "医療や年代測定に利用される炭素14を考える場面"
  - "ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面"
  - "ダニエル電池で二つの水溶液をつなぐ場面"
  - "鉄がさびて別の物質になる場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「二つの溶液の電気的なつり合いを保つための部分である。」と最も関係が深い場面は「ダニエル電池で二つの水溶液をつなぐ場面」です。したがって、正解は「ダニエル電池で二つの水溶液をつなぐ場面」です。
  
  「医療や年代測定に利用される炭素14を考える場面」は、「放射線を出しながら別の原子へ変わっていく同位体である。」と結び付きが強い場面です。
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」は、「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」と結び付きが強い場面です。
  「ダニエル電池で二つの水溶液をつなぐ場面」が正しいです。この説明と結び付きが強い場面です。
  「鉄がさびて別の物質になる場面」は、「もとの物質とは別の物質ができる変化である。」と結び付きが強い場面です。
