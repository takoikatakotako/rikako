# 高校化学 問553
id: 2553
type: single_choice
text: |
  「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "二酸化マンガンを加えると過酸化水素水の分解が速くなる場面"
  - "平衡がどちらにかたよっているかを数値で見る場面"
  - "ナトリウムやカリウムの性質を比べる場面"
  - "メタンやエタンの性質を考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「反応の活性化エネルギーを下げて反応を速めるが、反応前後で自身は変化しにくい物質である。」と最も関係が深い場面は「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」です。したがって、正解は「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」です。
  
  「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」が正しいです。この説明と結び付きが強い場面です。
  「平衡がどちらにかたよっているかを数値で見る場面」は、「化学平衡の状態を表す、平衡時の濃度や分圧の比である。」と結び付きが強い場面です。
  「ナトリウムやカリウムの性質を比べる場面」は、「周期表1族に属し、水と反応しやすい金属元素の総称である。」と結び付きが強い場面です。
  「メタンやエタンの性質を考える場面」は、「炭素どうしが単結合だけでつながった炭化水素である。」と結び付きが強い場面です。
