# 化学基礎 問869
id: 1909
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "昇華 / 原子や原子団が電子を受け取って負の電荷をもつ粒子である。"
  - "最外殻電子 / 原子のいちばん外側の電子殻にある電子である。"
  - "陰イオン / 粒子の数をまとめて表すための単位である。"
  - "モル / 固体が液体にならずに気体になる状態変化である。"
correct: 1
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「最外殻電子 / 原子のいちばん外側の電子殻にある電子である。」です。したがって、正解は「最外殻電子 / 原子のいちばん外側の電子殻にある電子である。」です。
  
  「昇華 / 原子や原子団が電子を受け取って負の電荷をもつ粒子である。」は、用語と説明の対応が合っていません。
  「最外殻電子 / 原子のいちばん外側の電子殻にある電子である。」が正しいです。用語と説明の対応が合っています。
  「陰イオン / 粒子の数をまとめて表すための単位である。」は、用語と説明の対応が合っていません。
  「モル / 固体が液体にならずに気体になる状態変化である。」は、用語と説明の対応が合っていません。
