# 高校化学 問928
id: 2928
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "ベンゼン / 導電性高分子や高性能電池材料を考える場面"
  - "機能性材料 / 温めた風船がふくらみやすくなる場面"
  - "シャルルの法則 / 芳香族化合物の基本構造を学ぶ場面"
  - "コロイド / 牛乳やゼラチン溶液のような見た目の系を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「コロイド / 牛乳やゼラチン溶液のような見た目の系を考える場面」です。したがって、正解は「コロイド / 牛乳やゼラチン溶液のような見た目の系を考える場面」です。
  
  「ベンゼン / 導電性高分子や高性能電池材料を考える場面」は、用語と場面の対応が合っていません。
  「機能性材料 / 温めた風船がふくらみやすくなる場面」は、用語と場面の対応が合っていません。
  「シャルルの法則 / 芳香族化合物の基本構造を学ぶ場面」は、用語と場面の対応が合っていません。
  「コロイド / 牛乳やゼラチン溶液のような見た目の系を考える場面」が正しいです。用語と場面の対応が合っています。
