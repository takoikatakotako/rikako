# 化学基礎 問461
id: 1501
type: single_choice
text: |
  融解を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "陽子数が同じで中性子数が異なること"
  - "化学結合やイオンのできやすさに関係すること"
  - "固体から液体への変化であること"
  - "沸点の違いを利用すること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  融解では、「固体から液体への変化であること」という見方が大切です。したがって、正解は「固体から液体への変化であること」です。
  
  「陽子数が同じで中性子数が異なること」は、同位体に関係する見方です。
  「化学結合やイオンのできやすさに関係すること」は、最外殻電子に関係する見方です。
  「固体から液体への変化であること」が正しいです。融解の要点を表しています。
  「沸点の違いを利用すること」は、蒸留に関係する見方です。
