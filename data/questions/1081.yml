# 化学基礎 問41
id: 1081
type: single_choice
text: |
  酸性の水溶液に青色リトマス紙を入れたときの変化として、最も適切なものはどれか。
choices:
  - "赤色に変わる。"
  - "緑色に変わる。"
  - "黒色に変わる。"
  - "必ず燃え出す。"
correct: 0
explanation: |
  この問題は、「酸性の水溶液に対する指示薬の反応」を確認する問題です。
  
  青色リトマス紙は、酸性の水溶液で赤色に変わります。したがって、正解は「赤色に変わる」です。
  
  「赤色に変わる」が正しいです。青色リトマス紙は酸性で赤くなります。
  「緑色に変わる」は、適切ではありません。
  「黒色に変わる」は、適切ではありません。
  「必ず燃え出す」は、適切ではありません。
