# 化学基礎 問626
id: 1666
type: single_choice
text: |
  「電荷のかたよりがあること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "イオン化傾向"
  - "酸化防止剤"
  - "純物質"
  - "極性分子"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「電荷のかたよりがあること」という見方が大切なのは極性分子です。したがって、正解は「極性分子」です。
  
  「イオン化傾向」は、その語で大切なのは「金属のイオンになりやすさを比べること」という見方です。
  「酸化防止剤」は、その語で大切なのは「酸化による変質を防ぐこと」という見方です。
  「純物質」は、その語で大切なのは「成分が一種類で性質が一定であること」という見方です。
  「極性分子」が正しいです。この見方が大切な語です。
