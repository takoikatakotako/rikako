# 化学基礎 問71
id: 1111
type: single_choice
text: |
  次のうち、極性分子として最も適切なものはどれか。
choices:
  - "水"
  - "二酸化炭素"
  - "酸素"
  - "窒素"
correct: 0
explanation: |
  この問題は、「どの分子が極性をもつか」を見分ける問題です。
  
  水分子は、分子の形と結合の偏りにより、分子全体として電荷の偏りがあります。そのため極性分子です。したがって、正解は「水」です。
  
  「水」が正しいです。代表的な極性分子です。
  「二酸化炭素」は、分子全体では偏りが打ち消し合います。
  「酸素」は、同じ原子どうしからできているので極性分子ではありません。
  「窒素」は、同じ原子どうしからできているので極性分子ではありません。
