# 化学基礎 問447
id: 1487
type: single_choice
text: |
  「金属元素を炎に入れたときに特有の色を示す反応である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "還元剤"
  - "炎色反応"
  - "ダニエル電池"
  - "酸"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  金属元素を炎に入れたときに特有の色を示す反応である。 に当てはまる語は炎色反応です。したがって、正解は「炎色反応」です。
  
  「還元剤」は、「相手を還元させ、自身は酸化される物質である。」に当てはまる語です。
  「炎色反応」が正しいです。「金属元素を炎に入れたときに特有の色を示す反応である。」に当てはまる語です。
  「ダニエル電池」は、「亜鉛と銅の反応を利用して電気を取り出す電池である。」に当てはまる語です。
  「酸」は、「水溶液中で水素イオンを生じる物質である。」に当てはまる語です。
