# 化学基礎 問785
id: 1825
type: single_choice
text: |
  「どのくらいイオンに分かれるかを表すこと」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "元素を原子番号の順に並べると性質が周期的に変化するというきまりである。"
  - "原子が結び付いてできた、物質の性質を示す小さな粒子である。"
  - "水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。"
  - "溶けた物質のうち、電離してイオンになった割合である。"
correct: 3
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「どのくらいイオンに分かれるかを表すこと」という見方と最も関係が深い説明は「溶けた物質のうち、電離してイオンになった割合である。」です。したがって、正解は「溶けた物質のうち、電離してイオンになった割合である。」です。
  
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」は、その説明で大切なのは「性質が周期的にくり返されること」という見方です。
  「原子が結び付いてできた、物質の性質を示す小さな粒子である。」は、その説明で大切なのは「物質の性質を示す小さな粒子として考えること」という見方です。
  「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」は、その説明で大切なのは「水酸化物イオンや水素イオンの受け取りに注目すること」という見方です。
  「溶けた物質のうち、電離してイオンになった割合である。」が正しいです。この見方と最も関係が深い説明です。
