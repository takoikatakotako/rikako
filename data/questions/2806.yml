# 高校化学 問806
id: 2806
type: single_choice
text: |
  「固体1 molが融解するときに吸収する熱量である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "状態変化に必要な熱に注目すること"
  - "反応を速めても自分は使い切られないこと"
  - "電離が部分的に起こること"
  - "金属元素ごとに炎の色が異なること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「固体1 molが融解するときに吸収する熱量である。」を理解する上では、「状態変化に必要な熱に注目すること」という見方が大切です。したがって、正解は「状態変化に必要な熱に注目すること」です。
  
  「状態変化に必要な熱に注目すること」が正しいです。この説明と結び付きが強い見方です。
  「反応を速めても自分は使い切られないこと」は、その見方は触媒に関係します。
  「電離が部分的に起こること」は、その見方は弱塩基に関係します。
  「金属元素ごとに炎の色が異なること」は、その見方は炎色反応に関係します。
