# 化学基礎 問974
id: 2014
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "金属結合 / 自由電子が結合を支えること"
  - "電離度 / 化学エネルギーを電気エネルギーに変えること"
  - "ダニエル電池 / 小さな単位が多数つながっていること"
  - "高分子化合物 / どのくらいイオンに分かれるかを表すこと"
correct: 0
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「金属結合 / 自由電子が結合を支えること」です。したがって、正解は「金属結合 / 自由電子が結合を支えること」です。
  
  「金属結合 / 自由電子が結合を支えること」が正しいです。用語と要点の対応が合っています。
  「電離度 / 化学エネルギーを電気エネルギーに変えること」は、用語と要点の対応が合っていません。
  「ダニエル電池 / 小さな単位が多数つながっていること」は、用語と要点の対応が合っていません。
  「高分子化合物 / どのくらいイオンに分かれるかを表すこと」は、用語と要点の対応が合っていません。
