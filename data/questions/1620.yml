# 化学基礎 問580
id: 1620
type: single_choice
text: |
  「水素と酸素から水ができる反応を式で表す場面」を説明した文として、最も適切なものはどれか。
choices:
  - "相手を酸化させ、自身は還元される物質である。"
  - "放射線を出しながら別の原子へ変わっていく同位体である。"
  - "化学変化を、物質の種類と量の関係が分かるように表した式である。"
  - "温度による溶解度の差を利用して固体をより純粋に取り出す方法である。"
correct: 2
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「水素と酸素から水ができる反応を式で表す場面」を説明した文として適切なのは「化学変化を、物質の種類と量の関係が分かるように表した式である。」です。したがって、正解は「化学変化を、物質の種類と量の関係が分かるように表した式である。」です。
  
  「相手を酸化させ、自身は還元される物質である。」は、この説明は「酸素や過酸化水素が相手を酸化させる場面」と結び付きが強いです。
  「放射線を出しながら別の原子へ変わっていく同位体である。」は、この説明は「医療や年代測定に利用される炭素14を考える場面」と結び付きが強いです。
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」が正しいです。この具体例を説明した文です。
  「温度による溶解度の差を利用して固体をより純粋に取り出す方法である。」は、この説明は「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す場面」と結び付きが強いです。
