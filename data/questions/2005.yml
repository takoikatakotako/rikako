# 化学基礎 問965
id: 2005
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "極性分子 / 酸と塩基が打ち消し合うこと"
  - "中和 / 相手を還元させ、自分は酸化されること"
  - "還元剤 / 電荷のかたよりがあること"
  - "原子番号 / 陽子数を表す数であること"
correct: 3
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「原子番号 / 陽子数を表す数であること」です。したがって、正解は「原子番号 / 陽子数を表す数であること」です。
  
  「極性分子 / 酸と塩基が打ち消し合うこと」は、用語と要点の対応が合っていません。
  「中和 / 相手を還元させ、自分は酸化されること」は、用語と要点の対応が合っていません。
  「還元剤 / 電荷のかたよりがあること」は、用語と要点の対応が合っていません。
  「原子番号 / 陽子数を表す数であること」が正しいです。用語と要点の対応が合っています。
