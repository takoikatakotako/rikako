# 化学基礎 問739
id: 1779
type: single_choice
text: |
  「酸素や過酸化水素が相手を酸化させる場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "陽子数と中性子数の合計であること"
  - "電子を共有して結び付くこと"
  - "相手を酸化させ、自分は還元されること"
  - "反応する物質とできる物質の関係を式で示すこと"
correct: 2
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「酸素や過酸化水素が相手を酸化させる場面」では、「相手を酸化させ、自分は還元されること」という見方が大切です。したがって、正解は「相手を酸化させ、自分は還元されること」です。
  
  「陽子数と中性子数の合計であること」は、その見方は炭素12で陽子数と中性子数の合計を見る場面よりも質量数と結び付きが強いです。
  「電子を共有して結び付くこと」は、その見方は水素原子どうしが電子を共有して H2 になる場面よりも共有結合と結び付きが強いです。
  「相手を酸化させ、自分は還元されること」が正しいです。この具体例で大切になる見方です。
  「反応する物質とできる物質の関係を式で示すこと」は、その見方は水素と酸素から水ができる反応を式で表す場面よりも化学反応式と結び付きが強いです。
