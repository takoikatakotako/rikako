# 高校化学 問555
id: 2555
type: single_choice
text: |
  「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "高圧や触媒を利用してアンモニアを得る場面"
  - "フッ素や塩素、臭素の反応性を比べる場面"
  - "密閉容器で反応物と生成物の量が一定になる場面"
  - "エチレンに臭素が付加する場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「正反応と逆反応の速さが等しくなり、見かけ上変化しない状態である。」と最も関係が深い場面は「密閉容器で反応物と生成物の量が一定になる場面」です。したがって、正解は「密閉容器で反応物と生成物の量が一定になる場面」です。
  
  「高圧や触媒を利用してアンモニアを得る場面」は、「窒素と水素からアンモニアをつくる、平衡を利用した工業的反応である。」と結び付きが強い場面です。
  「フッ素や塩素、臭素の反応性を比べる場面」は、「周期表17族に属し、陰イオンになりやすい非金属元素の総称である。」と結び付きが強い場面です。
  「密閉容器で反応物と生成物の量が一定になる場面」が正しいです。この説明と結び付きが強い場面です。
  「エチレンに臭素が付加する場面」は、「多重結合に原子や原子団が加わる反応である。」と結び付きが強い場面です。
