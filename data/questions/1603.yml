# 化学基礎 問563
id: 1603
type: single_choice
text: |
  「水を冷やして氷にする場面」を説明した文として、最も適切なものはどれか。
choices:
  - "陽イオンと陰イオンの静電気的な引力による結び付きである。"
  - "液体が固体に変わる状態変化である。"
  - "溶液1L中に溶けている溶質の物質量を表した濃度である。"
  - "溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。"
correct: 1
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「水を冷やして氷にする場面」を説明した文として適切なのは「液体が固体に変わる状態変化である。」です。したがって、正解は「液体が固体に変わる状態変化である。」です。
  
  「陽イオンと陰イオンの静電気的な引力による結び付きである。」は、この説明は「塩化ナトリウムが陽イオンと陰イオンの引力でできる場面」と結び付きが強いです。
  「液体が固体に変わる状態変化である。」が正しいです。この具体例を説明した文です。
  「溶液1L中に溶けている溶質の物質量を表した濃度である。」は、この説明は「1Lの食塩水にどれだけ溶質が溶けているかを表す場面」と結び付きが強いです。
  「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」は、この説明は「BTB溶液やフェノールフタレインで液性を調べる場面」と結び付きが強いです。
