# 高校化学 問903
id: 2903
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "塩の加水分解 / アンモニアが金属イオンに電子対を与える場面"
  - "配位結合 / ホルムアルデヒドやアセトアルデヒドを考える場面"
  - "沸点 / 水が沸騰し始める温度を考える場面"
  - "アルデヒド / 酢酸ナトリウム水溶液が塩基性を示す理由を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「沸点 / 水が沸騰し始める温度を考える場面」です。したがって、正解は「沸点 / 水が沸騰し始める温度を考える場面」です。
  
  「塩の加水分解 / アンモニアが金属イオンに電子対を与える場面」は、用語と場面の対応が合っていません。
  「配位結合 / ホルムアルデヒドやアセトアルデヒドを考える場面」は、用語と場面の対応が合っていません。
  「沸点 / 水が沸騰し始める温度を考える場面」が正しいです。用語と場面の対応が合っています。
  「アルデヒド / 酢酸ナトリウム水溶液が塩基性を示す理由を考える場面」は、用語と場面の対応が合っていません。
