# 化学基礎 問652
id: 1692
type: single_choice
text: |
  「沸点の違いを利用して液体を分ける方法である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "沸点の違いを利用すること"
  - "電子を共有して結び付くこと"
  - "反応する物質とできる物質の関係を式で示すこと"
  - "酸素との結び付きや電子の放出に注目すること"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「沸点の違いを利用して液体を分ける方法である。」を理解する上では、「沸点の違いを利用すること」という見方が大切です。したがって、正解は「沸点の違いを利用すること」です。
  
  「沸点の違いを利用すること」が正しいです。この説明と結び付きが強い見方です。
  「電子を共有して結び付くこと」は、その見方は共有結合に関係します。
  「反応する物質とできる物質の関係を式で示すこと」は、その見方は化学反応式に関係します。
  「酸素との結び付きや電子の放出に注目すること」は、その見方は酸化に関係します。
