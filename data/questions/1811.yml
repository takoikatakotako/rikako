# 化学基礎 問771
id: 1811
type: single_choice
text: |
  「電子を受け取って負に帯電すること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。"
  - "原子や原子団が電子を受け取って負の電荷をもつ粒子である。"
  - "固体が液体に変わる状態変化である。"
  - "元素を原子番号の順に並べると性質が周期的に変化するというきまりである。"
correct: 1
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「電子を受け取って負に帯電すること」という見方と最も関係が深い説明は「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」です。したがって、正解は「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」です。
  
  「成分ごとの移動しやすさの違いを利用して混合物を分ける方法である。」は、その説明で大切なのは「移動しやすさの違いを利用すること」という見方です。
  「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」が正しいです。この見方と最も関係が深い説明です。
  「固体が液体に変わる状態変化である。」は、その説明で大切なのは「固体から液体への変化であること」という見方です。
  「元素を原子番号の順に並べると性質が周期的に変化するというきまりである。」は、その説明で大切なのは「性質が周期的にくり返されること」という見方です。
