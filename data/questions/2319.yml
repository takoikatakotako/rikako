# 高校化学 問319
id: 2319
type: single_choice
text: |
  「ガラスのように一定の融点を示しにくい固体を考える場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "金属結晶"
  - "アモルファス"
  - "融点"
  - "蒸気圧"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  ガラスのように一定の融点を示しにくい固体を考える場面 と最も関係が深いのはアモルファスです。したがって、正解は「アモルファス」です。
  
  「金属結晶」は、「金属が電気を通したりのびたりする理由を考える場面」と結び付きが強い語です。
  「アモルファス」が正しいです。この具体例と最も関係が深い語です。
  「融点」は、「氷が溶け始める温度を考える場面」と結び付きが強い語です。
  「蒸気圧」は、「ふたをした容器の中で液体の上にたまる蒸気を考える場面」と結び付きが強い語です。
