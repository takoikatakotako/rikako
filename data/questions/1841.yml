# 化学基礎 問801
id: 1841
type: single_choice
text: |
  「水に溶けない固体を液体から分けること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水素や炭素が相手から酸素を奪う場面"
  - "ナトリウムで黄色、銅で青緑色を観察する場面"
  - "砂と水の混合物から砂を取り除く場面"
  - "インクの色素をろ紙の上で分ける場面"
correct: 2
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「水に溶けない固体を液体から分けること」という見方と最も関係が深い場面は「砂と水の混合物から砂を取り除く場面」です。したがって、正解は「砂と水の混合物から砂を取り除く場面」です。
  
  「水素や炭素が相手から酸素を奪う場面」は、その場面で大切なのは「相手を還元させ、自分は酸化されること」という見方です。
  「ナトリウムで黄色、銅で青緑色を観察する場面」は、その場面で大切なのは「金属元素ごとに炎の色が異なること」という見方です。
  「砂と水の混合物から砂を取り除く場面」が正しいです。この見方と最も関係が深い場面です。
  「インクの色素をろ紙の上で分ける場面」は、その場面で大切なのは「移動しやすさの違いを利用すること」という見方です。
