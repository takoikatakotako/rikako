# 高校化学 問214
id: 2214
type: single_choice
text: |
  「結晶の中で粒子が規則正しく並んだ構造である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "コロイド"
  - "ブラウン運動"
  - "電気泳動"
  - "結晶格子"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを確認する問題です。
  
  結晶の中で粒子が規則正しく並んだ構造である。 に当てはまる語は結晶格子です。したがって、正解は「結晶格子」です。
  
  「コロイド」は、「溶液と懸濁液の中間ほどの大きさの粒子が分散した状態である。」に当てはまる語です。
  「ブラウン運動」は、「コロイド粒子が不規則に動いて見える現象である。」に当てはまる語です。
  「電気泳動」は、「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」に当てはまる語です。
  「結晶格子」が正しいです。「結晶の中で粒子が規則正しく並んだ構造である。」に当てはまる語です。
