# 令和7年度 ITパスポート 公開問題 問81
id: 426
type: single_choice
text: |
  イメージスキャナーで読み取った紙の書類の画像から、印刷文字や手書きの文字を読み取り、テキストデータに変換する技術を何と呼ぶか。
choices:
  - "CCD"
  - "DVI"
  - "GPU"
  - "OCR"
correct: 3
explanation: |
  この問題の公開解答では「OCR」が正解とされています。
  
  「CCD」は公開解答では正解ではありません。
  「DVI」は公開解答では正解ではありません。
  「GPU」は公開解答では正解ではありません。
  「OCR」が公開解答で正解とされています。
