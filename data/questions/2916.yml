# 高校化学 問916
id: 2916
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "炎色反応 / 果物の香りに関係する化合物を考える場面"
  - "エステル / 紙や木材の主成分を考える場面"
  - "セルロース / ナトリウムで黄色、銅で青緑色を確かめる場面"
  - "分子結晶 / ドライアイスやヨウ素の結晶を考える場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「分子結晶 / ドライアイスやヨウ素の結晶を考える場面」です。したがって、正解は「分子結晶 / ドライアイスやヨウ素の結晶を考える場面」です。
  
  「炎色反応 / 果物の香りに関係する化合物を考える場面」は、用語と場面の対応が合っていません。
  「エステル / 紙や木材の主成分を考える場面」は、用語と場面の対応が合っていません。
  「セルロース / ナトリウムで黄色、銅で青緑色を確かめる場面」は、用語と場面の対応が合っていません。
  「分子結晶 / ドライアイスやヨウ素の結晶を考える場面」が正しいです。用語と場面の対応が合っています。
