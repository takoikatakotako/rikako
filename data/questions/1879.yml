# 化学基礎 問839
id: 1879
type: single_choice
text: |
  「相手を酸化させ、自分は還元されること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "酸素や過酸化水素が相手を酸化させる場面"
  - "6.0×10^23個の粒子をひとまとまりとして数える場面"
  - "同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面"
  - "亜鉛板と銅板を使って豆電球を光らせる場面"
correct: 0
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「相手を酸化させ、自分は還元されること」という見方と最も関係が深い場面は「酸素や過酸化水素が相手を酸化させる場面」です。したがって、正解は「酸素や過酸化水素が相手を酸化させる場面」です。
  
  「酸素や過酸化水素が相手を酸化させる場面」が正しいです。この見方と最も関係が深い場面です。
  「6.0×10^23個の粒子をひとまとまりとして数える場面」は、その場面で大切なのは「粒子の数をまとめて扱う単位であること」という見方です。
  「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」は、その場面で大切なのは「どのくらいイオンに分かれるかを表すこと」という見方です。
  「亜鉛板と銅板を使って豆電球を光らせる場面」は、その場面で大切なのは「化学エネルギーを電気エネルギーに変えること」という見方です。
