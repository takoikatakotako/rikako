# 高校化学 問753
id: 2753
type: single_choice
text: |
  「反応を速めても自分は使い切られないこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "アルデヒド"
  - "グルコース"
  - "触媒"
  - "融解熱"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「反応を速めても自分は使い切られないこと」という見方が大切なのは触媒です。したがって、正解は「触媒」です。
  
  「アルデヒド」は、その語で大切なのは「分子の端にカルボニル構造をもつこと」という見方です。
  「グルコース」は、その語で大切なのは「単糖類でエネルギー源になりやすいこと」という見方です。
  「触媒」が正しいです。この見方が大切な語です。
  「融解熱」は、その語で大切なのは「状態変化に必要な熱に注目すること」という見方です。
