# 化学基礎 問978
id: 2018
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "モル / 粒子の数をまとめて扱う単位であること"
  - "酸化剤 / 放射線を出す同位体であること"
  - "放射性同位体 / 溶解度の差を利用すること"
  - "再結晶 / 相手を酸化させ、自分は還元されること"
correct: 0
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「モル / 粒子の数をまとめて扱う単位であること」です。したがって、正解は「モル / 粒子の数をまとめて扱う単位であること」です。
  
  「モル / 粒子の数をまとめて扱う単位であること」が正しいです。用語と要点の対応が合っています。
  「酸化剤 / 放射線を出す同位体であること」は、用語と要点の対応が合っていません。
  「放射性同位体 / 溶解度の差を利用すること」は、用語と要点の対応が合っていません。
  「再結晶 / 相手を酸化させ、自分は還元されること」は、用語と要点の対応が合っていません。
