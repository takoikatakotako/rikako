# 化学基礎 問427
id: 1467
type: single_choice
text: |
  「分子の中で電荷のかたよりがほとんどない分子である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "pH"
  - "無極性分子"
  - "指示薬"
  - "陰イオン"
correct: 1
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  分子の中で電荷のかたよりがほとんどない分子である。 に当てはまる語は無極性分子です。したがって、正解は「無極性分子」です。
  
  「pH」は、「水溶液の酸性や塩基性の強さを表す尺度である。」に当てはまる語です。
  「無極性分子」が正しいです。「分子の中で電荷のかたよりがほとんどない分子である。」に当てはまる語です。
  「指示薬」は、「溶液の性質によって色が変わり、酸性や塩基性を調べる物質である。」に当てはまる語です。
  「陰イオン」は、「原子や原子団が電子を受け取って負の電荷をもつ粒子である。」に当てはまる語です。
