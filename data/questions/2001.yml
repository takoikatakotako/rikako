# 化学基礎 問961
id: 2001
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "イオン結合 / 1Lあたりの物質量で表すこと"
  - "モル濃度 / 色の変化で液性を見分けること"
  - "指示薬 / 電気的な引力で結び付くこと"
  - "融解 / 固体から液体への変化であること"
correct: 3
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「融解 / 固体から液体への変化であること」です。したがって、正解は「融解 / 固体から液体への変化であること」です。
  
  「イオン結合 / 1Lあたりの物質量で表すこと」は、用語と要点の対応が合っていません。
  「モル濃度 / 色の変化で液性を見分けること」は、用語と要点の対応が合っていません。
  「指示薬 / 電気的な引力で結び付くこと」は、用語と要点の対応が合っていません。
  「融解 / 固体から液体への変化であること」が正しいです。用語と要点の対応が合っています。
