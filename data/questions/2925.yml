# 高校化学 問925
id: 2925
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "沸点上昇 / 食塩水の沸点が水より少し高くなることを考える場面"
  - "アルデヒド / 血糖や発酵の材料として使われる場面"
  - "グルコース / 氷を水に変えるのに必要な熱を考える場面"
  - "融解熱 / ホルムアルデヒドやアセトアルデヒドを考える場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「沸点上昇 / 食塩水の沸点が水より少し高くなることを考える場面」です。したがって、正解は「沸点上昇 / 食塩水の沸点が水より少し高くなることを考える場面」です。
  
  「沸点上昇 / 食塩水の沸点が水より少し高くなることを考える場面」が正しいです。用語と場面の対応が合っています。
  「アルデヒド / 血糖や発酵の材料として使われる場面」は、用語と場面の対応が合っていません。
  「グルコース / 氷を水に変えるのに必要な熱を考える場面」は、用語と場面の対応が合っていません。
  「融解熱 / ホルムアルデヒドやアセトアルデヒドを考える場面」は、用語と場面の対応が合っていません。
