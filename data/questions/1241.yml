# 化学基礎 問201
id: 1241
type: single_choice
text: |
  「砂と水の混合物から砂を取り除く操作」に最も関係が深い語として、適切なものはどれか。
choices:
  - "蒸留"
  - "再結晶"
  - "ろ過"
  - "クロマトグラフィー"
correct: 2
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「砂と水の混合物から砂を取り除く操作」に最も関係が深いのはろ過です。したがって、正解は「ろ過」です。
  
  「蒸留」は、この例に最も関係が深い語ではありません。
  「再結晶」は、この例に最も関係が深い語ではありません。
  「ろ過」が正しいです。この例はろ過に関係しています。
  「クロマトグラフィー」は、この例に最も関係が深い語ではありません。
