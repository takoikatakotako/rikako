# 化学基礎 問70
id: 1110
type: single_choice
text: |
  分子の極性についての説明として、最も適切なものはどれか。
choices:
  - "分子全体として電荷の偏りがあるかどうかを表す。"
  - "分子の色の濃さだけを表す。"
  - "必ず原子の個数だけで決まる。"
  - "金属だけに使う考え方である。"
correct: 0
explanation: |
  この問題は、「極性という言葉の意味」を確認する問題です。
  
  分子の極性とは、分子全体として電荷の偏りがあるかどうかを表す考え方です。したがって、正解は「分子全体として電荷の偏りがあるかどうかを表す」です。
  
  「分子全体として電荷の偏りがあるかどうかを表す」が正しいです。
  「分子の色の濃さだけを表す」は、適切ではありません。
  「必ず原子の個数だけで決まる」は、適切ではありません。
  「金属だけに使う考え方である」は、適切ではありません。
