# 高校化学 問820
id: 2820
type: single_choice
text: |
  「溶質の粒子が溶媒中に広がっていく現象である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "反応性が高く 1 価の陽イオンになりやすいこと"
  - "炭素間が単結合だけであること"
  - "溶質の粒子が溶媒中に広がること"
  - "ベンゼン環にアミノ基が直接つくこと"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「溶質の粒子が溶媒中に広がっていく現象である。」を理解する上では、「溶質の粒子が溶媒中に広がること」という見方が大切です。したがって、正解は「溶質の粒子が溶媒中に広がること」です。
  
  「反応性が高く 1 価の陽イオンになりやすいこと」は、その見方はアルカリ金属に関係します。
  「炭素間が単結合だけであること」は、その見方は飽和炭化水素に関係します。
  「溶質の粒子が溶媒中に広がること」が正しいです。この説明と結び付きが強い見方です。
  「ベンゼン環にアミノ基が直接つくこと」は、その見方はアニリンに関係します。
