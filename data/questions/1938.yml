# 化学基礎 問898
id: 1938
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "塩橋 / 化学の知識が生活、産業、環境、医療などに役立つという見方である。"
  - "化学が拓く世界 / 一種類の元素だけからできている物質である。"
  - "酸化防止剤 / 食品や物質が酸化して変質するのを防ぐために用いられる物質である。"
  - "単体 / 二つの溶液の電気的なつり合いを保つための部分である。"
correct: 2
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「酸化防止剤 / 食品や物質が酸化して変質するのを防ぐために用いられる物質である。」です。したがって、正解は「酸化防止剤 / 食品や物質が酸化して変質するのを防ぐために用いられる物質である。」です。
  
  「塩橋 / 化学の知識が生活、産業、環境、医療などに役立つという見方である。」は、用語と説明の対応が合っていません。
  「化学が拓く世界 / 一種類の元素だけからできている物質である。」は、用語と説明の対応が合っていません。
  「酸化防止剤 / 食品や物質が酸化して変質するのを防ぐために用いられる物質である。」が正しいです。用語と説明の対応が合っています。
  「単体 / 二つの溶液の電気的なつり合いを保つための部分である。」は、用語と説明の対応が合っていません。
