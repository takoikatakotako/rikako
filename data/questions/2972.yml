# 高校化学 問972
id: 2972
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "透析 / 植物が光を受けてデンプンなどをつくる場面"
  - "光合成 / 二酸化マンガンを加えると過酸化水素水の分解が速くなる場面"
  - "触媒 / コロイド溶液から余分な電解質を取り除く場面"
  - "錯イオン / アンモニアを加えると深い青色のイオンができる場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「錯イオン / アンモニアを加えると深い青色のイオンができる場面」です。したがって、正解は「錯イオン / アンモニアを加えると深い青色のイオンができる場面」です。
  
  「透析 / 植物が光を受けてデンプンなどをつくる場面」は、用語と場面の対応が合っていません。
  「光合成 / 二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」は、用語と場面の対応が合っていません。
  「触媒 / コロイド溶液から余分な電解質を取り除く場面」は、用語と場面の対応が合っていません。
  「錯イオン / アンモニアを加えると深い青色のイオンができる場面」が正しいです。用語と場面の対応が合っています。
