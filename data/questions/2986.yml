# 高校化学 問986
id: 2986
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "リチウムイオン電池 / 平衡がどちらにかたよっているかを数値で見る場面"
  - "エステル / 果物の香りに関係する化合物を考える場面"
  - "平衡定数 / ナトリウムやカリウムの性質を比べる場面"
  - "アルカリ金属 / スマートフォンやノートパソコンの電池を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「エステル / 果物の香りに関係する化合物を考える場面」です。したがって、正解は「エステル / 果物の香りに関係する化合物を考える場面」です。
  
  「リチウムイオン電池 / 平衡がどちらにかたよっているかを数値で見る場面」は、用語と場面の対応が合っていません。
  「エステル / 果物の香りに関係する化合物を考える場面」が正しいです。用語と場面の対応が合っています。
  「平衡定数 / ナトリウムやカリウムの性質を比べる場面」は、用語と場面の対応が合っていません。
  「アルカリ金属 / スマートフォンやノートパソコンの電池を考える場面」は、用語と場面の対応が合っていません。
