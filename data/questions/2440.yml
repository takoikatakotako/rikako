# 高校化学 問440
id: 2440
type: single_choice
text: |
  吸熱反応を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "条件を工夫して平衡を生成物側へ寄せること"
  - "H+ と OH- の積が一定であること"
  - "塩のイオンが水と反応すること"
  - "周囲から熱を受け取る反応であること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  吸熱反応では、「周囲から熱を受け取る反応であること」という見方が大切です。したがって、正解は「周囲から熱を受け取る反応であること」です。
  
  「条件を工夫して平衡を生成物側へ寄せること」は、アンモニア合成に関係する見方です。
  「H+ と OH- の積が一定であること」は、水のイオン積に関係する見方です。
  「塩のイオンが水と反応すること」は、塩の加水分解に関係する見方です。
  「周囲から熱を受け取る反応であること」が正しいです。吸熱反応の要点を表しています。
