# 高校化学 問767
id: 2767
type: single_choice
text: |
  「反応性が高く 1 価の陽イオンになりやすいこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "アルカリ金属"
  - "機能性材料"
  - "シャルルの法則"
  - "溶解"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「反応性が高く 1 価の陽イオンになりやすいこと」という見方が大切なのはアルカリ金属です。したがって、正解は「アルカリ金属」です。
  
  「アルカリ金属」が正しいです。この見方が大切な語です。
  「機能性材料」は、その語で大切なのは「必要な機能をねらって材料を設計すること」という見方です。
  「シャルルの法則」は、その語で大切なのは「圧力一定で体積と絶対温度の関係を見ること」という見方です。
  「溶解」は、その語で大切なのは「溶質の粒子が溶媒中に広がること」という見方です。
