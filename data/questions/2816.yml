# 高校化学 問816
id: 2816
type: single_choice
text: |
  「分子どうしが分子間力で集まってできた結晶である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "電離が部分的に起こること"
  - "多様な酸化数や色、触媒作用に注目すること"
  - "分子間力で集まった結晶であること"
  - "カルボキシ基をもち酸性を示すこと"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「分子どうしが分子間力で集まってできた結晶である。」を理解する上では、「分子間力で集まった結晶であること」という見方が大切です。したがって、正解は「分子間力で集まった結晶であること」です。
  
  「電離が部分的に起こること」は、その見方は弱酸に関係します。
  「多様な酸化数や色、触媒作用に注目すること」は、その見方は遷移元素に関係します。
  「分子間力で集まった結晶であること」が正しいです。この説明と結び付きが強い見方です。
  「カルボキシ基をもち酸性を示すこと」は、その見方はカルボン酸に関係します。
