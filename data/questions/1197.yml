# 化学基礎 問157
id: 1197
type: single_choice
text: |
  単体の例として、最も適切なものはどれか。
choices:
  - "水 H2O"
  - "氷が溶けて水になる変化"
  - "鉄がさびる変化"
  - "酸素 O2"
correct: 3
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  酸素 O2は、単体の例です。したがって、正解は「酸素 O2」です。
  
  「水 H2O」は、化合物の例として見る方が適切です。
  「氷が溶けて水になる変化」は、物理変化の例として見る方が適切です。
  「鉄がさびる変化」は、化学変化の例として見る方が適切です。
  「酸素 O2」が正しいです。これは単体の例です。
