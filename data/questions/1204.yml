# 化学基礎 問164
id: 1204
type: single_choice
text: |
  昇華の例として、最も適切なものはどれか。
choices:
  - "炭素の原子番号が 6 であること"
  - "炭素 12 の 12"
  - "ドライアイスが気体になる変化"
  - "炭素 12 と炭素 14"
correct: 2
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  ドライアイスが気体になる変化は、昇華の例です。したがって、正解は「ドライアイスが気体になる変化」です。
  
  「炭素の原子番号が 6 であること」は、原子番号の例として見る方が適切です。
  「炭素 12 の 12」は、質量数の例として見る方が適切です。
  「ドライアイスが気体になる変化」が正しいです。これは昇華の例です。
  「炭素 12 と炭素 14」は、同位体の例として見る方が適切です。
