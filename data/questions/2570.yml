# 高校化学 問570
id: 2570
type: single_choice
text: |
  「周期表18族に属し、化学的に安定な気体元素の総称である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "アンモニアが金属イオンに電子対を与える場面"
  - "ネオンやアルゴンが反応しにくい理由を考える場面"
  - "ホルムアルデヒドやアセトアルデヒドを考える場面"
  - "血糖や発酵の材料として使われる場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「周期表18族に属し、化学的に安定な気体元素の総称である。」と最も関係が深い場面は「ネオンやアルゴンが反応しにくい理由を考える場面」です。したがって、正解は「ネオンやアルゴンが反応しにくい理由を考える場面」です。
  
  「アンモニアが金属イオンに電子対を与える場面」は、「一方の原子が電子対を与えてできる共有結合である。」と結び付きが強い場面です。
  「ネオンやアルゴンが反応しにくい理由を考える場面」が正しいです。この説明と結び付きが強い場面です。
  「ホルムアルデヒドやアセトアルデヒドを考える場面」は、「分子の端にアルデヒド基をもつ有機化合物である。」と結び付きが強い場面です。
  「血糖や発酵の材料として使われる場面」は、「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」と結び付きが強い場面です。
