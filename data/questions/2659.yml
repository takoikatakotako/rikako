# 高校化学 問659
id: 2659
type: single_choice
text: |
  「弱酸が一部だけ電離している水溶液を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。"
  - "六角形の環状構造をもつ代表的な芳香族炭化水素である。"
  - "目的に応じた特別な性質をもたせてつくられた材料である。"
  - "電離する粒子と電離していない粒子が平衡になっている状態である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「弱酸が一部だけ電離している水溶液を考える場面」を説明した文として適切なのは「電離する粒子と電離していない粒子が平衡になっている状態である。」です。したがって、正解は「電離する粒子と電離していない粒子が平衡になっている状態である。」です。
  
  「遷移元素の一つで、鉄鋼材料として広く使われ、2価や3価のイオンをつくる元素である。」は、この説明は「さびや鉄鋼の利用を考える場面」と結び付きが強いです。
  「六角形の環状構造をもつ代表的な芳香族炭化水素である。」は、この説明は「芳香族化合物の基本構造を学ぶ場面」と結び付きが強いです。
  「目的に応じた特別な性質をもたせてつくられた材料である。」は、この説明は「導電性高分子や高性能電池材料を考える場面」と結び付きが強いです。
  「電離する粒子と電離していない粒子が平衡になっている状態である。」が正しいです。この具体例を説明した文です。
