# 高校化学 問517
id: 2517
type: single_choice
text: |
  「原子が共有結合で三次元的に結び付いた結晶である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ダイヤモンドや二酸化ケイ素の硬さを考える場面"
  - "食塩が水に溶けて見えなくなる場面"
  - "コロイド溶液から余分な電解質を取り除く場面"
  - "植物が光を受けてデンプンなどをつくる場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「原子が共有結合で三次元的に結び付いた結晶である。」と最も関係が深い場面は「ダイヤモンドや二酸化ケイ素の硬さを考える場面」です。したがって、正解は「ダイヤモンドや二酸化ケイ素の硬さを考える場面」です。
  
  「ダイヤモンドや二酸化ケイ素の硬さを考える場面」が正しいです。この説明と結び付きが強い場面です。
  「食塩が水に溶けて見えなくなる場面」は、「溶質の粒子が溶媒中に広がっていく現象である。」と結び付きが強い場面です。
  「コロイド溶液から余分な電解質を取り除く場面」は、「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」と結び付きが強い場面です。
  「植物が光を受けてデンプンなどをつくる場面」は、「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」と結び付きが強い場面です。
