# 化学基礎 問364
id: 1404
type: single_choice
text: |
  昇華と最も関係が深い場面として、適切なものはどれか。
choices:
  - "水を冷やして氷にする場面"
  - "空気や食塩水のように複数の物質が混ざったものを考える場面"
  - "水や二酸化炭素のように複数の元素からできた物質を考える場面"
  - "ドライアイスがそのまま気体になる場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを見る問題です。
  
  ドライアイスがそのまま気体になる場面は、昇華と結び付きが強い場面です。したがって、正解は「ドライアイスがそのまま気体になる場面」です。
  
  「水を冷やして氷にする場面」は、凝固と結び付きが強い場面です。
  「空気や食塩水のように複数の物質が混ざったものを考える場面」は、混合物と結び付きが強い場面です。
  「水や二酸化炭素のように複数の元素からできた物質を考える場面」は、化合物と結び付きが強い場面です。
  「ドライアイスがそのまま気体になる場面」が正しいです。これは昇華と結び付きが強い場面です。
