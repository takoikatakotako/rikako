# 高校化学 問827
id: 2827
type: single_choice
text: |
  「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "多様な酸化数や色、触媒作用に注目すること"
  - "半透膜を通る溶媒の移動に注目すること"
  - "カルボキシ基をもち酸性を示すこと"
  - "植物がエネルギーをたくわえる多糖であること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」を理解する上では、「半透膜を通る溶媒の移動に注目すること」という見方が大切です。したがって、正解は「半透膜を通る溶媒の移動に注目すること」です。
  
  「多様な酸化数や色、触媒作用に注目すること」は、その見方は遷移元素に関係します。
  「半透膜を通る溶媒の移動に注目すること」が正しいです。この説明と結び付きが強い見方です。
  「カルボキシ基をもち酸性を示すこと」は、その見方はカルボン酸に関係します。
  「植物がエネルギーをたくわえる多糖であること」は、その見方はデンプンに関係します。
