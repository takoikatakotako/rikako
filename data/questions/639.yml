# 令和7年度 ITパスポート 公開問題 問54
id: 639
type: single_choice
text: |
  あるコールセンターでは、顧客からの電話による問合せに対応するオペレーター
  を支援するシステムに、顧客とオペレーターの会話の音声を認識し、顧客の問合せ
  に対する回答の候補をオペレーターのPCの画面に表示するAIを導入した。1日の
  対応件数は1,000件であり、問合せ内容によって二つのグループA、Bに分けた。AI
  導入前後の各グループの対応件数、対応時間が表のとおりであるとき、AI導入後に、
  1,000件の問合せに対応する時間は何%短縮できたか。
