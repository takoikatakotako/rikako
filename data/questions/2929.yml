# 高校化学 問929
id: 2929
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "チンダル現象 / 薄暗い部屋でコロイドに光を当てると筋が見える場面"
  - "フェノール / 金属やプラスチックを回収して再資源化する場面"
  - "資源の再利用 / 気体の量と温度から体積や圧力を見積もる場面"
  - "理想気体の状態方程式 / フェノール類の酸性や消毒作用を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「チンダル現象 / 薄暗い部屋でコロイドに光を当てると筋が見える場面」です。したがって、正解は「チンダル現象 / 薄暗い部屋でコロイドに光を当てると筋が見える場面」です。
  
  「チンダル現象 / 薄暗い部屋でコロイドに光を当てると筋が見える場面」が正しいです。用語と場面の対応が合っています。
  「フェノール / 金属やプラスチックを回収して再資源化する場面」は、用語と場面の対応が合っていません。
  「資源の再利用 / 気体の量と温度から体積や圧力を見積もる場面」は、用語と場面の対応が合っていません。
  「理想気体の状態方程式 / フェノール類の酸性や消毒作用を考える場面」は、用語と場面の対応が合っていません。
