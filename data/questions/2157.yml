# 高校化学 問157
id: 2157
type: single_choice
text: |
  ルシャトリエの原理と最も関係が深い場面として、適切なものはどれか。
choices:
  - "スマートフォンやノートパソコンの電池を考える場面"
  - "圧力や濃度を変えると平衡が移る方向を考える場面"
  - "水溶液に電流を流して物質を分解する場面"
  - "金属イオンが電子を受け取って析出する電極を考える場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  圧力や濃度を変えると平衡が移る方向を考える場面は、ルシャトリエの原理と結び付きが強い場面です。したがって、正解は「圧力や濃度を変えると平衡が移る方向を考える場面」です。
  
  「スマートフォンやノートパソコンの電池を考える場面」は、リチウムイオン電池と結び付きが強い場面です。
  「圧力や濃度を変えると平衡が移る方向を考える場面」が正しいです。これはルシャトリエの原理と結び付きが強い場面です。
  「水溶液に電流を流して物質を分解する場面」は、電気分解と結び付きが強い場面です。
  「金属イオンが電子を受け取って析出する電極を考える場面」は、陰極と結び付きが強い場面です。
