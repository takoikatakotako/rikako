# 高校化学 問180
id: 2180
type: single_choice
text: |
  付加反応と最も関係が深い場面として、適切なものはどれか。
choices:
  - "エチレンに臭素が付加する場面"
  - "マグネシウムやカルシウムの性質を比べる場面"
  - "ネオンやアルゴンが反応しにくい理由を考える場面"
  - "アンモニアを加えると深い青色のイオンができる場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  エチレンに臭素が付加する場面は、付加反応と結び付きが強い場面です。したがって、正解は「エチレンに臭素が付加する場面」です。
  
  「エチレンに臭素が付加する場面」が正しいです。これは付加反応と結び付きが強い場面です。
  「マグネシウムやカルシウムの性質を比べる場面」は、アルカリ土類金属と結び付きが強い場面です。
  「ネオンやアルゴンが反応しにくい理由を考える場面」は、貴ガスと結び付きが強い場面です。
  「アンモニアを加えると深い青色のイオンができる場面」は、錯イオンと結び付きが強い場面です。
