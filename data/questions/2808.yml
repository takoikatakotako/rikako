# 高校化学 問808
id: 2808
type: single_choice
text: |
  「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "反応が止まるのではなく速さがつり合うこと"
  - "塩基の強さを電離のしやすさで見ること"
  - "温度一定で圧力と体積の関係を見ること"
  - "電気伝導性が高く、特徴的な色のイオンをつくること"
correct: 2
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「一定温度で一定量の気体の圧力は体積に反比例するという法則である。」を理解する上では、「温度一定で圧力と体積の関係を見ること」という見方が大切です。したがって、正解は「温度一定で圧力と体積の関係を見ること」です。
  
  「反応が止まるのではなく速さがつり合うこと」は、その見方は化学平衡に関係します。
  「塩基の強さを電離のしやすさで見ること」は、その見方は塩基解離定数に関係します。
  「温度一定で圧力と体積の関係を見ること」が正しいです。この説明と結び付きが強い見方です。
  「電気伝導性が高く、特徴的な色のイオンをつくること」は、その見方は銅に関係します。
