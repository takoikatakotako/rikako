# 化学基礎 問245
id: 1285
type: single_choice
text: |
  「ナトリウムが黄色を示すこと」に最も関係が深い語として、適切なものはどれか。
choices:
  - "電離度"
  - "指示薬"
  - "炎色反応"
  - "酸化防止剤"
correct: 2
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「ナトリウムが黄色を示すこと」に最も関係が深いのは炎色反応です。したがって、正解は「炎色反応」です。
  
  「電離度」は、この例に最も関係が深い語ではありません。
  「指示薬」は、この例に最も関係が深い語ではありません。
  「炎色反応」が正しいです。この例は炎色反応に関係しています。
  「酸化防止剤」は、この例に最も関係が深い語ではありません。
