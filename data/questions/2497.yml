# 高校化学 問497
id: 2497
type: single_choice
text: |
  セルロースを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "植物の体を支える多糖であること"
  - "カルボキシ基をもち酸性を示すこと"
  - "ベンゼン環をもつこと"
  - "ベンゼン環にアミノ基が直接つくこと"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  セルロースでは、「植物の体を支える多糖であること」という見方が大切です。したがって、正解は「植物の体を支える多糖であること」です。
  
  「植物の体を支える多糖であること」が正しいです。セルロースの要点を表しています。
  「カルボキシ基をもち酸性を示すこと」は、カルボン酸に関係する見方です。
  「ベンゼン環をもつこと」は、ベンゼンに関係する見方です。
  「ベンゼン環にアミノ基が直接つくこと」は、アニリンに関係する見方です。
