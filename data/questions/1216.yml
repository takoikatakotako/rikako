# 化学基礎 問176
id: 1216
type: single_choice
text: |
  極性分子の例として、最も適切なものはどれか。
choices:
  - "二酸化炭素 CO2"
  - "1 mol の水分子"
  - "水 H2O"
  - "1 mol/L の食塩水"
correct: 2
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  水 H2Oは、極性分子の例です。したがって、正解は「水 H2O」です。
  
  「二酸化炭素 CO2」は、無極性分子の例として見る方が適切です。
  「1 mol の水分子」は、モルの例として見る方が適切です。
  「水 H2O」が正しいです。これは極性分子の例です。
  「1 mol/L の食塩水」は、モル濃度の例として見る方が適切です。
