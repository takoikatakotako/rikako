# 高校化学 問683
id: 2683
type: single_choice
text: |
  「エタノールの性質や利用を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。"
  - "混合気体の全圧は各気体の分圧の和になるという法則である。"
  - "その温度でそれ以上溶質が溶けない状態の溶液である。"
  - "ヒドロキシ基をもつ有機化合物である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「エタノールの性質や利用を考える場面」を説明した文として適切なのは「ヒドロキシ基をもつ有機化合物である。」です。したがって、正解は「ヒドロキシ基をもつ有機化合物である。」です。
  
  「化学の知識や技術が、医療、環境、エネルギー、材料などの未来を支えるという見方である。」は、この説明は「再生可能エネルギーや新素材の開発を考える場面」と結び付きが強いです。
  「混合気体の全圧は各気体の分圧の和になるという法則である。」は、この説明は「酸素と窒素が混ざった気体の圧力を考える場面」と結び付きが強いです。
  「その温度でそれ以上溶質が溶けない状態の溶液である。」は、この説明は「食塩を加えても底に残るようになった食塩水を考える場面」と結び付きが強いです。
  「ヒドロキシ基をもつ有機化合物である。」が正しいです。この具体例を説明した文です。
