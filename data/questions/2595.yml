# 高校化学 問595
id: 2595
type: single_choice
text: |
  「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "導電性高分子や高性能電池材料を考える場面"
  - "温めた風船がふくらみやすくなる場面"
  - "血糖や発酵の材料として使われる場面"
  - "食塩が水に溶けて見えなくなる場面"
correct: 2
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」と最も関係が深い場面は「血糖や発酵の材料として使われる場面」です。したがって、正解は「血糖や発酵の材料として使われる場面」です。
  
  「導電性高分子や高性能電池材料を考える場面」は、「目的に応じた特別な性質をもたせてつくられた材料である。」と結び付きが強い場面です。
  「温めた風船がふくらみやすくなる場面」は、「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」と結び付きが強い場面です。
  「血糖や発酵の材料として使われる場面」が正しいです。この説明と結び付きが強い場面です。
  「食塩が水に溶けて見えなくなる場面」は、「溶質の粒子が溶媒中に広がっていく現象である。」と結び付きが強い場面です。
