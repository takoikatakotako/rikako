# 化学基礎 問681
id: 1721
type: single_choice
text: |
  「水溶液中で水素イオンを生じる物質である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "沸点の違いを利用すること"
  - "水素イオンに注目すること"
  - "物質の種類が変わらないこと"
  - "陽子数と中性子数の合計であること"
correct: 1
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「水溶液中で水素イオンを生じる物質である。」を理解する上では、「水素イオンに注目すること」という見方が大切です。したがって、正解は「水素イオンに注目すること」です。
  
  「沸点の違いを利用すること」は、その見方は蒸留に関係します。
  「水素イオンに注目すること」が正しいです。この説明と結び付きが強い見方です。
  「物質の種類が変わらないこと」は、その見方は物理変化に関係します。
  「陽子数と中性子数の合計であること」は、その見方は質量数に関係します。
