# 化学基礎 問627
id: 1667
type: single_choice
text: |
  「電荷のかたよりがほとんどないこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "無極性分子"
  - "ダニエル電池"
  - "高分子化合物"
  - "混合物"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「電荷のかたよりがほとんどないこと」という見方が大切なのは無極性分子です。したがって、正解は「無極性分子」です。
  
  「無極性分子」が正しいです。この見方が大切な語です。
  「ダニエル電池」は、その語で大切なのは「化学エネルギーを電気エネルギーに変えること」という見方です。
  「高分子化合物」は、その語で大切なのは「小さな単位が多数つながっていること」という見方です。
  「混合物」は、その語で大切なのは「成分が二種類以上まざっていること」という見方です。
