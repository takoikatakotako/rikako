# 高校化学 問632
id: 2632
type: single_choice
text: |
  「コロイド粒子が陽極や陰極へ移動する様子を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "電場をかけたとき、荷電したコロイド粒子が移動する現象である。"
  - "電気分解で還元が起こる電極である。"
  - "水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。"
  - "酸とも塩基とも反応する酸化物である。"
correct: 0
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「コロイド粒子が陽極や陰極へ移動する様子を考える場面」を説明した文として適切なのは「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」です。したがって、正解は「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」です。
  
  「電場をかけたとき、荷電したコロイド粒子が移動する現象である。」が正しいです。この具体例を説明した文です。
  「電気分解で還元が起こる電極である。」は、この説明は「金属イオンが電子を受け取って析出する電極を考える場面」と結び付きが強いです。
  「水溶液中での水素イオン濃度と水酸化物イオン濃度の積である。」は、この説明は「中性の水で H+ と OH- の関係を考える場面」と結び付きが強いです。
  「酸とも塩基とも反応する酸化物である。」は、この説明は「酸化アルミニウムが酸にも塩基にも溶ける場面」と結び付きが強いです。
