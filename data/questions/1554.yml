# 化学基礎 問514
id: 1554
type: single_choice
text: |
  「固体が液体にならずに気体になる状態変化である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "炭素12と炭素14を比べる場面"
  - "ドライアイスがそのまま気体になる場面"
  - "金属中で自由電子が動けるため電気を通すことを考える場面"
  - "塩酸が水溶液中で水素イオンを生じる場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「固体が液体にならずに気体になる状態変化である。」と最も関係が深い場面は「ドライアイスがそのまま気体になる場面」です。したがって、正解は「ドライアイスがそのまま気体になる場面」です。
  
  「炭素12と炭素14を比べる場面」は、「陽子数は同じで中性子数が異なる原子どうしである。」と結び付きが強い場面です。
  「ドライアイスがそのまま気体になる場面」が正しいです。この説明と結び付きが強い場面です。
  「金属中で自由電子が動けるため電気を通すことを考える場面」は、「金属原子が自由電子を介して結び付く結合である。」と結び付きが強い場面です。
  「塩酸が水溶液中で水素イオンを生じる場面」は、「水溶液中で水素イオンを生じる物質である。」と結び付きが強い場面です。
