# 化学基礎 問881
id: 1921
type: single_choice
text: |
  用語と説明の組合せとして、最も適切なものはどれか。
choices:
  - "極性分子 / 酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。"
  - "酸 / 水溶液中で水素イオンを生じる物質である。"
  - "中和 / 相手を還元させ、自身は酸化される物質である。"
  - "還元剤 / 分子の中で電荷のかたよりがある分子である。"
correct: 1
explanation: |
  この問題は、用語と説明の対応をまとめて確認する問題です。
  
  正しく対応しているのは「酸 / 水溶液中で水素イオンを生じる物質である。」です。したがって、正解は「酸 / 水溶液中で水素イオンを生じる物質である。」です。
  
  「極性分子 / 酸と塩基が反応して、それぞれの性質を打ち消し合う反応である。」は、用語と説明の対応が合っていません。
  「酸 / 水溶液中で水素イオンを生じる物質である。」が正しいです。用語と説明の対応が合っています。
  「中和 / 相手を還元させ、自身は酸化される物質である。」は、用語と説明の対応が合っていません。
  「還元剤 / 分子の中で電荷のかたよりがある分子である。」は、用語と説明の対応が合っていません。
