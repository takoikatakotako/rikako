# 高校化学 問765
id: 2765
type: single_choice
text: |
  「酸の強さを電離のしやすさで見ること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "デンプン"
  - "蒸発熱"
  - "酸解離定数"
  - "金属結晶"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「酸の強さを電離のしやすさで見ること」という見方が大切なのは酸解離定数です。したがって、正解は「酸解離定数」です。
  
  「デンプン」は、その語で大切なのは「植物がエネルギーをたくわえる多糖であること」という見方です。
  「蒸発熱」は、その語で大切なのは「液体を気体に変えるための熱に注目すること」という見方です。
  「酸解離定数」が正しいです。この見方が大切な語です。
  「金属結晶」は、その語で大切なのは「自由電子が性質に関係すること」という見方です。
