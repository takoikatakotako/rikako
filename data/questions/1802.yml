# 化学基礎 問762
id: 1802
type: single_choice
text: |
  「液体から気体への変化であること」という見方と最も関係が深い説明として、適切なものはどれか。
choices:
  - "液体が気体になる状態変化である。"
  - "水に溶けても電流をほとんど通さない物質である。"
  - "沸点の違いを利用して液体を分ける方法である。"
  - "物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
correct: 0
explanation: |
  この問題は、要点から元の説明へ戻って考えられるかを見る問題です。
  
  「液体から気体への変化であること」という見方と最も関係が深い説明は「液体が気体になる状態変化である。」です。したがって、正解は「液体が気体になる状態変化である。」です。
  
  「液体が気体になる状態変化である。」が正しいです。この見方と最も関係が深い説明です。
  「水に溶けても電流をほとんど通さない物質である。」は、その説明で大切なのは「水溶液でも電流をほとんど通さないこと」という見方です。
  「沸点の違いを利用して液体を分ける方法である。」は、その説明で大切なのは「沸点の違いを利用すること」という見方です。
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」は、その説明で大切なのは「物質の種類が変わらないこと」という見方です。
