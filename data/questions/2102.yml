# 高校化学 問102
id: 2102
type: single_choice
text: |
  融点と最も関係が深い場面として、適切なものはどれか。
choices:
  - "気体の量と温度から体積や圧力を見積もる場面"
  - "高圧や低温で気体のふるまいが理想気体からずれる場面"
  - "氷が溶け始める温度を考える場面"
  - "食塩や金属の規則正しい並び方を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  氷が溶け始める温度を考える場面は、融点と結び付きが強い場面です。したがって、正解は「氷が溶け始める温度を考える場面」です。
  
  「気体の量と温度から体積や圧力を見積もる場面」は、理想気体の状態方程式と結び付きが強い場面です。
  「高圧や低温で気体のふるまいが理想気体からずれる場面」は、実在気体と結び付きが強い場面です。
  「氷が溶け始める温度を考える場面」が正しいです。これは融点と結び付きが強い場面です。
  「食塩や金属の規則正しい並び方を考える場面」は、結晶格子と結び付きが強い場面です。
