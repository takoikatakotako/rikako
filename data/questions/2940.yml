# 高校化学 問940
id: 2940
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "資源の再利用 / 気体の量と温度から体積や圧力を見積もる場面"
  - "理想気体の状態方程式 / 温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面"
  - "溶解度 / 金属やプラスチックを回収して再資源化する場面"
  - "吸熱反応 / 熱分解や一部の溶解で周囲が冷たくなる場面"
correct: 3
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「吸熱反応 / 熱分解や一部の溶解で周囲が冷たくなる場面」です。したがって、正解は「吸熱反応 / 熱分解や一部の溶解で周囲が冷たくなる場面」です。
  
  「資源の再利用 / 気体の量と温度から体積や圧力を見積もる場面」は、用語と場面の対応が合っていません。
  「理想気体の状態方程式 / 温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」は、用語と場面の対応が合っていません。
  「溶解度 / 金属やプラスチックを回収して再資源化する場面」は、用語と場面の対応が合っていません。
  「吸熱反応 / 熱分解や一部の溶解で周囲が冷たくなる場面」が正しいです。用語と場面の対応が合っています。
