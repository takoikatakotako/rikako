# 化学基礎 問638
id: 1678
type: single_choice
text: |
  「酸素の喪失や電子の受け取りに注目すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "再結晶"
  - "化学変化"
  - "同位体"
  - "還元"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「酸素の喪失や電子の受け取りに注目すること」という見方が大切なのは還元です。したがって、正解は「還元」です。
  
  「再結晶」は、その語で大切なのは「溶解度の差を利用すること」という見方です。
  「化学変化」は、その語で大切なのは「新しい物質ができること」という見方です。
  「同位体」は、その語で大切なのは「陽子数が同じで中性子数が異なること」という見方です。
  「還元」が正しいです。この見方が大切な語です。
