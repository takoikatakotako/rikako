# 高校化学 問474
id: 2474
type: single_choice
text: |
  遷移元素を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "最外殻が安定していて反応しにくいこと"
  - "多様な酸化数や色、触媒作用に注目すること"
  - "金属イオンと配位子の組合せに注目すること"
  - "金属元素ごとに炎の色が異なること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  遷移元素では、「多様な酸化数や色、触媒作用に注目すること」という見方が大切です。したがって、正解は「多様な酸化数や色、触媒作用に注目すること」です。
  
  「最外殻が安定していて反応しにくいこと」は、貴ガスに関係する見方です。
  「多様な酸化数や色、触媒作用に注目すること」が正しいです。遷移元素の要点を表しています。
  「金属イオンと配位子の組合せに注目すること」は、錯イオンに関係する見方です。
  「金属元素ごとに炎の色が異なること」は、炎色反応に関係する見方です。
