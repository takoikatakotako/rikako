# 化学基礎 問918
id: 1958
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "共有結合 / 水素と酸素から水ができる反応を式で表す場面"
  - "周期律 / 周期表で似た性質の元素が縦に並ぶことを見る場面"
  - "化学反応式 / マグネシウムが酸素と結び付く場面"
  - "酸化 / 水素原子どうしが電子を共有して H2 になる場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「周期律 / 周期表で似た性質の元素が縦に並ぶことを見る場面」です。したがって、正解は「周期律 / 周期表で似た性質の元素が縦に並ぶことを見る場面」です。
  
  「共有結合 / 水素と酸素から水ができる反応を式で表す場面」は、用語と場面の対応が合っていません。
  「周期律 / 周期表で似た性質の元素が縦に並ぶことを見る場面」が正しいです。用語と場面の対応が合っています。
  「化学反応式 / マグネシウムが酸素と結び付く場面」は、用語と場面の対応が合っていません。
  「酸化 / 水素原子どうしが電子を共有して H2 になる場面」は、用語と場面の対応が合っていません。
