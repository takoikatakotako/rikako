# 高校化学 問947
id: 2947
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "融解熱 / ダイヤモンドや二酸化ケイ素の硬さを考える場面"
  - "共有結合の結晶 / 牛乳やゼラチン溶液のような見た目の系を考える場面"
  - "電気分解 / 水溶液に電流を流して物質を分解する場面"
  - "コロイド / 氷を水に変えるのに必要な熱を考える場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「電気分解 / 水溶液に電流を流して物質を分解する場面」です。したがって、正解は「電気分解 / 水溶液に電流を流して物質を分解する場面」です。
  
  「融解熱 / ダイヤモンドや二酸化ケイ素の硬さを考える場面」は、用語と場面の対応が合っていません。
  「共有結合の結晶 / 牛乳やゼラチン溶液のような見た目の系を考える場面」は、用語と場面の対応が合っていません。
  「電気分解 / 水溶液に電流を流して物質を分解する場面」が正しいです。用語と場面の対応が合っています。
  「コロイド / 氷を水に変えるのに必要な熱を考える場面」は、用語と場面の対応が合っていません。
