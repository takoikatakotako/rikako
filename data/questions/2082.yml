# 高校化学 問82
id: 2082
type: single_choice
text: |
  異性体についての説明として、最も適切なものはどれか。
choices:
  - "アミノ酸どうしが縮合してできる結合である。"
  - "分子式は同じでも構造が異なる化合物どうしである。"
  - "グルコースが多数つながった植物の貯蔵多糖である。"
  - "周期表1族に属し、水と反応しやすい金属元素の総称である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  異性体は、分子式は同じでも構造が異なる化合物どうしである。 したがって、正解は「分子式は同じでも構造が異なる化合物どうしである。」です。
  
  「アミノ酸どうしが縮合してできる結合である。」は、ペプチド結合の説明です。
  「分子式は同じでも構造が異なる化合物どうしである。」が正しいです。異性体の説明です。
  「グルコースが多数つながった植物の貯蔵多糖である。」は、デンプンの説明です。
  「周期表1族に属し、水と反応しやすい金属元素の総称である。」は、アルカリ金属の説明です。
