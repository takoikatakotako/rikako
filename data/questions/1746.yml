# 化学基礎 問706
id: 1746
type: single_choice
text: |
  「空気や食塩水のように複数の物質が混ざったものを考える場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "酸と塩基が打ち消し合うこと"
  - "成分が二種類以上まざっていること"
  - "相手を還元させ、自分は酸化されること"
  - "金属元素ごとに炎の色が異なること"
correct: 1
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「空気や食塩水のように複数の物質が混ざったものを考える場面」では、「成分が二種類以上まざっていること」という見方が大切です。したがって、正解は「成分が二種類以上まざっていること」です。
  
  「酸と塩基が打ち消し合うこと」は、その見方は塩酸と水酸化ナトリウム水溶液を混ぜる場面よりも中和と結び付きが強いです。
  「成分が二種類以上まざっていること」が正しいです。この具体例で大切になる見方です。
  「相手を還元させ、自分は酸化されること」は、その見方は水素や炭素が相手から酸素を奪う場面よりも還元剤と結び付きが強いです。
  「金属元素ごとに炎の色が異なること」は、その見方はナトリウムで黄色、銅で青緑色を観察する場面よりも炎色反応と結び付きが強いです。
