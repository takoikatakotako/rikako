# 高校化学 問199
id: 2199
type: single_choice
text: |
  資源の再利用と最も関係が深い場面として、適切なものはどれか。
choices:
  - "アミノ酸がつながってペプチドになる場面"
  - "米やいもに多く含まれる成分を考える場面"
  - "メタンやエタンの性質を考える場面"
  - "金属やプラスチックを回収して再資源化する場面"
correct: 3
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  金属やプラスチックを回収して再資源化する場面は、資源の再利用と結び付きが強い場面です。したがって、正解は「金属やプラスチックを回収して再資源化する場面」です。
  
  「アミノ酸がつながってペプチドになる場面」は、ペプチド結合と結び付きが強い場面です。
  「米やいもに多く含まれる成分を考える場面」は、デンプンと結び付きが強い場面です。
  「メタンやエタンの性質を考える場面」は、飽和炭化水素と結び付きが強い場面です。
  「金属やプラスチックを回収して再資源化する場面」が正しいです。これは資源の再利用と結び付きが強い場面です。
