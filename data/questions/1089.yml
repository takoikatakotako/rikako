# 化学基礎 問49
id: 1089
type: single_choice
text: |
  ダニエル電池で塩橋を入れる主な目的として、最も適切なものはどれか。
choices:
  - "二つの水溶液の電気的なつり合いを保ち、電流が流れ続けるようにするため。"
  - "水溶液を必ず沸騰させるため。"
  - "金属板を溶かしてなくすため。"
  - "電子を塩橋の中だけに閉じ込めるため。"
correct: 0
explanation: |
  この問題は、「塩橋の役割」を考える問題です。
  
  塩橋は、二つの水溶液の電気的なつり合いが大きく崩れないようにして、電流が流れ続けるのを助けます。したがって、正解は「二つの水溶液の電気的なつり合いを保ち、電流が流れ続けるようにするため」です。
  
  「二つの水溶液の電気的なつり合いを保ち、電流が流れ続けるようにするため」が正しいです。塩橋の役割です。
  「水溶液を必ず沸騰させるため」は、適切ではありません。
  「金属板を溶かしてなくすため」は、適切ではありません。
  「電子を塩橋の中だけに閉じ込めるため」は、適切ではありません。
