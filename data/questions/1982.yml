# 化学基礎 問942
id: 1982
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "炎色反応 / インクの色素をろ紙の上で分ける場面"
  - "ダニエル電池 / 亜鉛板と銅板を使って豆電球を光らせる場面"
  - "クロマトグラフィー / 氷を温めて水にする場面"
  - "融解 / ナトリウムで黄色、銅で青緑色を観察する場面"
correct: 1
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「ダニエル電池 / 亜鉛板と銅板を使って豆電球を光らせる場面」です。したがって、正解は「ダニエル電池 / 亜鉛板と銅板を使って豆電球を光らせる場面」です。
  
  「炎色反応 / インクの色素をろ紙の上で分ける場面」は、用語と場面の対応が合っていません。
  「ダニエル電池 / 亜鉛板と銅板を使って豆電球を光らせる場面」が正しいです。用語と場面の対応が合っています。
  「クロマトグラフィー / 氷を温めて水にする場面」は、用語と場面の対応が合っていません。
  「融解 / ナトリウムで黄色、銅で青緑色を観察する場面」は、用語と場面の対応が合っていません。
