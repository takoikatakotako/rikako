# 化学基礎 問202
id: 1242
type: single_choice
text: |
  「水とエタノールの混合物を分ける操作」に最も関係が深い語として、適切なものはどれか。
choices:
  - "再結晶"
  - "クロマトグラフィー"
  - "純物質"
  - "蒸留"
correct: 3
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「水とエタノールの混合物を分ける操作」に最も関係が深いのは蒸留です。したがって、正解は「蒸留」です。
  
  「再結晶」は、この例に最も関係が深い語ではありません。
  「クロマトグラフィー」は、この例に最も関係が深い語ではありません。
  「純物質」は、この例に最も関係が深い語ではありません。
  「蒸留」が正しいです。この例は蒸留に関係しています。
