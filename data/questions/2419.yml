# 高校化学 問419
id: 2419
type: single_choice
text: |
  アモルファスを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "圧力、体積、物質量、温度をまとめて扱うこと"
  - "分子の体積と分子間力の影響に注目すること"
  - "粒子配列が不規則であること"
  - "溶質の粒子が溶媒中に広がること"
correct: 2
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  アモルファスでは、「粒子配列が不規則であること」という見方が大切です。したがって、正解は「粒子配列が不規則であること」です。
  
  「圧力、体積、物質量、温度をまとめて扱うこと」は、理想気体の状態方程式に関係する見方です。
  「分子の体積と分子間力の影響に注目すること」は、実在気体に関係する見方です。
  「粒子配列が不規則であること」が正しいです。アモルファスの要点を表しています。
  「溶質の粒子が溶媒中に広がること」は、溶解に関係する見方です。
