# 高校化学 問821
id: 2821
type: single_choice
text: |
  「一定量の溶媒に溶けることのできる溶質の最大量である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "2 価の陽イオンになりやすいこと"
  - "多重結合をもつこと"
  - "丈夫な合成繊維であること"
  - "どこまで溶けるかの限度に注目すること"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「一定量の溶媒に溶けることのできる溶質の最大量である。」を理解する上では、「どこまで溶けるかの限度に注目すること」という見方が大切です。したがって、正解は「どこまで溶けるかの限度に注目すること」です。
  
  「2 価の陽イオンになりやすいこと」は、その見方はアルカリ土類金属に関係します。
  「多重結合をもつこと」は、その見方は不飽和炭化水素に関係します。
  「丈夫な合成繊維であること」は、その見方はナイロンに関係します。
  「どこまで溶けるかの限度に注目すること」が正しいです。この説明と結び付きが強い見方です。
