# 化学基礎 問963
id: 2003
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "金属結合 / 水素イオンに注目すること"
  - "凝固 / 液体から固体への変化であること"
  - "酸 / 酸素の喪失や電子の受け取りに注目すること"
  - "還元 / 自由電子が結合を支えること"
correct: 1
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「凝固 / 液体から固体への変化であること」です。したがって、正解は「凝固 / 液体から固体への変化であること」です。
  
  「金属結合 / 水素イオンに注目すること」は、用語と要点の対応が合っていません。
  「凝固 / 液体から固体への変化であること」が正しいです。用語と要点の対応が合っています。
  「酸 / 酸素の喪失や電子の受け取りに注目すること」は、用語と要点の対応が合っていません。
  「還元 / 自由電子が結合を支えること」は、用語と要点の対応が合っていません。
