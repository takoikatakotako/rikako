# 化学基礎 問708
id: 1748
type: single_choice
text: |
  「水や二酸化炭素のように複数の元素からできた物質を考える場面」で大切になる見方として、最も適切なものはどれか。
choices:
  - "どのくらいイオンに分かれるかを表すこと"
  - "化学エネルギーを電気エネルギーに変えること"
  - "小さな単位が多数つながっていること"
  - "複数の元素が結び付いてできること"
correct: 3
explanation: |
  この問題は、具体例から学ぶべき要点をつかめるかを見る問題です。
  
  「水や二酸化炭素のように複数の元素からできた物質を考える場面」では、「複数の元素が結び付いてできること」という見方が大切です。したがって、正解は「複数の元素が結び付いてできること」です。
  
  「どのくらいイオンに分かれるかを表すこと」は、その見方は同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面よりも電離度と結び付きが強いです。
  「化学エネルギーを電気エネルギーに変えること」は、その見方は亜鉛板と銅板を使って豆電球を光らせる場面よりもダニエル電池と結び付きが強いです。
  「小さな単位が多数つながっていること」は、その見方はポリエチレンやタンパク質のような長い分子を考える場面よりも高分子化合物と結び付きが強いです。
  「複数の元素が結び付いてできること」が正しいです。この具体例で大切になる見方です。
