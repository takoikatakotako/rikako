# 化学基礎 問286
id: 1326
type: single_choice
text: |
  還元の特徴として、最も適切なものはどれか。
choices:
  - "相手から電子を受け取る"
  - "相手に電子を与える"
  - "電子を受け取る"
  - "金属がイオンになりやすい程度"
correct: 2
explanation: |
  この問題は、用語の特徴を短い言葉で整理できているかを確認する問題です。
  
  還元では、「電子を受け取る」という点が大切です。したがって、正解は「電子を受け取る」です。
  
  「相手から電子を受け取る」は、酸化剤に関係する特徴です。
  「相手に電子を与える」は、還元剤に関係する特徴です。
  「電子を受け取る」が正しいです。還元の特徴を表しています。
  「金属がイオンになりやすい程度」は、イオン化傾向に関係する特徴です。
