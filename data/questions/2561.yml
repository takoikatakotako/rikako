# 高校化学 問561
id: 2561
type: single_choice
text: |
  「少量の酸や塩基を加えても pH が変わりにくい溶液である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "血液や実験用の溶液で pH を保ちたい場面"
  - "アンモニア水が強塩基ほど完全には電離しない場面"
  - "ナトリウムで黄色、銅で青緑色を確かめる場面"
  - "果物の香りに関係する化合物を考える場面"
correct: 0
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「少量の酸や塩基を加えても pH が変わりにくい溶液である。」と最も関係が深い場面は「血液や実験用の溶液で pH を保ちたい場面」です。したがって、正解は「血液や実験用の溶液で pH を保ちたい場面」です。
  
  「血液や実験用の溶液で pH を保ちたい場面」が正しいです。この説明と結び付きが強い場面です。
  「アンモニア水が強塩基ほど完全には電離しない場面」は、「水溶液中で一部だけ電離する塩基である。」と結び付きが強い場面です。
  「ナトリウムで黄色、銅で青緑色を確かめる場面」は、「金属元素を炎に入れたときに特有の色を示す反応である。」と結び付きが強い場面です。
  「果物の香りに関係する化合物を考える場面」は、「カルボン酸とアルコールからできる有機化合物である。」と結び付きが強い場面です。
