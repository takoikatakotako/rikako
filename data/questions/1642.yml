# 化学基礎 問602
id: 1642
type: single_choice
text: |
  「沸点の違いを利用すること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "同位体"
  - "金属結合"
  - "酸"
  - "蒸留"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「沸点の違いを利用すること」という見方が大切なのは蒸留です。したがって、正解は「蒸留」です。
  
  「同位体」は、その語で大切なのは「陽子数が同じで中性子数が異なること」という見方です。
  「金属結合」は、その語で大切なのは「自由電子が結合を支えること」という見方です。
  「酸」は、その語で大切なのは「水素イオンに注目すること」という見方です。
  「蒸留」が正しいです。この見方が大切な語です。
