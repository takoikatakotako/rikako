# 高校化学 問331
id: 2331
type: single_choice
text: |
  「コロイド溶液から余分な電解質を取り除く場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "凝固点降下"
  - "透析"
  - "コロイド"
  - "ブラウン運動"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  コロイド溶液から余分な電解質を取り除く場面 と最も関係が深いのは透析です。したがって、正解は「透析」です。
  
  「凝固点降下」は、「凍結防止剤をまいた道路の水が凍りにくくなる場面」と結び付きが強い語です。
  「透析」が正しいです。この具体例と最も関係が深い語です。
  「コロイド」は、「牛乳やゼラチン溶液のような見た目の系を考える場面」と結び付きが強い語です。
  「ブラウン運動」は、「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」と結び付きが強い語です。
