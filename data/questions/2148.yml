# 高校化学 問148
id: 2148
type: single_choice
text: |
  陽極と最も関係が深い場面として、適切なものはどれか。
choices:
  - "電気分解で気体が発生する電極側を考える場面"
  - "熱分解や一部の溶解で周囲が冷たくなる場面"
  - "植物が光を受けてデンプンなどをつくる場面"
  - "加熱すると反応が進みやすくなる理由を考える場面"
correct: 0
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  電気分解で気体が発生する電極側を考える場面は、陽極と結び付きが強い場面です。したがって、正解は「電気分解で気体が発生する電極側を考える場面」です。
  
  「電気分解で気体が発生する電極側を考える場面」が正しいです。これは陽極と結び付きが強い場面です。
  「熱分解や一部の溶解で周囲が冷たくなる場面」は、吸熱反応と結び付きが強い場面です。
  「植物が光を受けてデンプンなどをつくる場面」は、光合成と結び付きが強い場面です。
  「加熱すると反応が進みやすくなる理由を考える場面」は、活性化エネルギーと結び付きが強い場面です。
