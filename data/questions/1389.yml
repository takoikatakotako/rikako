# 化学基礎 問349
id: 1389
type: single_choice
text: |
  高分子化合物について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "物質そのものの種類は変わらず、状態や形だけが変わる変化である。"
  - "多数の小さな単位がつながってできた大きな分子からなる化合物である。"
  - "水に溶けたり融解したりすると電流を通す物質である。"
  - "放射線を出しながら別の原子へ変わっていく同位体である。"
correct: 1
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  高分子化合物は、多数の小さな単位がつながってできた大きな分子からなる化合物である。 したがって、正解は「多数の小さな単位がつながってできた大きな分子からなる化合物である。」です。
  
  「物質そのものの種類は変わらず、状態や形だけが変わる変化である。」は、物理変化の説明です。
  「多数の小さな単位がつながってできた大きな分子からなる化合物である。」が正しいです。高分子化合物の説明です。
  「水に溶けたり融解したりすると電流を通す物質である。」は、電解質の説明です。
  「放射線を出しながら別の原子へ変わっていく同位体である。」は、放射性同位体の説明です。
