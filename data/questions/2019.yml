# 化学基礎 問979
id: 2019
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "還元剤 / 金属元素ごとに炎の色が異なること"
  - "モル濃度 / 1Lあたりの物質量で表すこと"
  - "炎色反応 / 移動しやすさの違いを利用すること"
  - "クロマトグラフィー / 相手を還元させ、自分は酸化されること"
correct: 1
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「モル濃度 / 1Lあたりの物質量で表すこと」です。したがって、正解は「モル濃度 / 1Lあたりの物質量で表すこと」です。
  
  「還元剤 / 金属元素ごとに炎の色が異なること」は、用語と要点の対応が合っていません。
  「モル濃度 / 1Lあたりの物質量で表すこと」が正しいです。用語と要点の対応が合っています。
  「炎色反応 / 移動しやすさの違いを利用すること」は、用語と要点の対応が合っていません。
  「クロマトグラフィー / 相手を還元させ、自分は酸化されること」は、用語と要点の対応が合っていません。
