# 高校化学 問414
id: 2414
type: single_choice
text: |
  結晶格子を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "蒸発と凝縮がつり合うこと"
  - "粒子の規則正しい配列に注目すること"
  - "液体を気体に変えるための熱に注目すること"
  - "圧力一定で体積と絶対温度の関係を見ること"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  結晶格子では、「粒子の規則正しい配列に注目すること」という見方が大切です。したがって、正解は「粒子の規則正しい配列に注目すること」です。
  
  「蒸発と凝縮がつり合うこと」は、気液平衡に関係する見方です。
  「粒子の規則正しい配列に注目すること」が正しいです。結晶格子の要点を表しています。
  「液体を気体に変えるための熱に注目すること」は、蒸発熱に関係する見方です。
  「圧力一定で体積と絶対温度の関係を見ること」は、シャルルの法則に関係する見方です。
