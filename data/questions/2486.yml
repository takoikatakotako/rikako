# 高校化学 問486
id: 2486
type: single_choice
text: |
  エステルを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "アミノ酸どうしをつなぐ結合であること"
  - "カルボン酸とアルコールの組合せでできること"
  - "植物がエネルギーをたくわえる多糖であること"
  - "反応性が高く 1 価の陽イオンになりやすいこと"
correct: 1
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  エステルでは、「カルボン酸とアルコールの組合せでできること」という見方が大切です。したがって、正解は「カルボン酸とアルコールの組合せでできること」です。
  
  「アミノ酸どうしをつなぐ結合であること」は、ペプチド結合に関係する見方です。
  「カルボン酸とアルコールの組合せでできること」が正しいです。エステルの要点を表しています。
  「植物がエネルギーをたくわえる多糖であること」は、デンプンに関係する見方です。
  「反応性が高く 1 価の陽イオンになりやすいこと」は、アルカリ金属に関係する見方です。
