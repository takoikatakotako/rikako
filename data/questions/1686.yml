# 化学基礎 問646
id: 1686
type: single_choice
text: |
  「放射線を出す同位体であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "融解"
  - "周期律"
  - "分子"
  - "放射性同位体"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「放射線を出す同位体であること」という見方が大切なのは放射性同位体です。したがって、正解は「放射性同位体」です。
  
  「融解」は、その語で大切なのは「固体から液体への変化であること」という見方です。
  「周期律」は、その語で大切なのは「性質が周期的にくり返されること」という見方です。
  「分子」は、その語で大切なのは「物質の性質を示す小さな粒子として考えること」という見方です。
  「放射性同位体」が正しいです。この見方が大切な語です。
