# 化学基礎 問606
id: 1646
type: single_choice
text: |
  「成分が二種類以上まざっていること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "陰イオン"
  - "モル"
  - "電離度"
  - "混合物"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「成分が二種類以上まざっていること」という見方が大切なのは混合物です。したがって、正解は「混合物」です。
  
  「陰イオン」は、その語で大切なのは「電子を受け取って負に帯電すること」という見方です。
  「モル」は、その語で大切なのは「粒子の数をまとめて扱う単位であること」という見方です。
  「電離度」は、その語で大切なのは「どのくらいイオンに分かれるかを表すこと」という見方です。
  「混合物」が正しいです。この見方が大切な語です。
