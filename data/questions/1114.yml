# 化学基礎 問74
id: 1114
type: single_choice
text: |
  1 mol のナトリウム原子と 1 mol のナトリウムイオンについての説明として、最も適切なものはどれか。
choices:
  - "含まれる粒子の数は同じである。"
  - "含まれる粒子の数は必ず違う。"
  - "どちらか一方だけしか数えられない。"
  - "原子とイオンでは mol を使えない。"
correct: 0
explanation: |
  この問題は、「mol が粒子の種類に関係なく数をそろえる単位か」を確認する問題です。
  
  1 mol は、粒子の種類が違っても同じ数の粒子を表します。そのため、1 mol のナトリウム原子と 1 mol のナトリウムイオンは、含まれる粒子の数が同じです。したがって、正解は「含まれる粒子の数は同じである」です。
  
  「含まれる粒子の数は同じである」が正しいです。mol は粒子数をそろえる単位です。
  「含まれる粒子の数は必ず違う」は、適切ではありません。
  「どちらか一方だけしか数えられない」は、適切ではありません。
  「原子とイオンでは mol を使えない」は、適切ではありません。
