# 高校化学 問923
id: 2923
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "異性体 / グリシンやアラニンの構造を考える場面"
  - "アミノ酸 / ふたをした容器の中で液体の上にたまる蒸気を考える場面"
  - "溶解平衡 / 飽和溶液で見かけ上変化が止まっている場面"
  - "蒸気圧 / ブタンとイソブタンを比べる場面"
correct: 2
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「溶解平衡 / 飽和溶液で見かけ上変化が止まっている場面」です。したがって、正解は「溶解平衡 / 飽和溶液で見かけ上変化が止まっている場面」です。
  
  「異性体 / グリシンやアラニンの構造を考える場面」は、用語と場面の対応が合っていません。
  「アミノ酸 / ふたをした容器の中で液体の上にたまる蒸気を考える場面」は、用語と場面の対応が合っていません。
  「溶解平衡 / 飽和溶液で見かけ上変化が止まっている場面」が正しいです。用語と場面の対応が合っています。
  「蒸気圧 / ブタンとイソブタンを比べる場面」は、用語と場面の対応が合っていません。
