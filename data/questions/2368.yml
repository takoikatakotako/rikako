# 高校化学 問368
id: 2368
type: single_choice
text: |
  「マグネシウムやカルシウムの性質を比べる場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "付加反応"
  - "異性体"
  - "アルカリ土類金属"
  - "アルデヒド"
correct: 2
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  マグネシウムやカルシウムの性質を比べる場面 と最も関係が深いのはアルカリ土類金属です。したがって、正解は「アルカリ土類金属」です。
  
  「付加反応」は、「エチレンに臭素が付加する場面」と結び付きが強い語です。
  「異性体」は、「ブタンとイソブタンを比べる場面」と結び付きが強い語です。
  「アルカリ土類金属」が正しいです。この具体例と最も関係が深い語です。
  「アルデヒド」は、「ホルムアルデヒドやアセトアルデヒドを考える場面」と結び付きが強い語です。
