# 高校化学 問538
id: 2538
type: single_choice
text: |
  「気体分子中の結合1 molを切るのに必要なエネルギーである。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ケミカルライトが光る仕組みを考える場面"
  - "どの結合が切れやすいかを比べる場面"
  - "加熱すると反応が進みやすくなる理由を考える場面"
  - "酢酸が塩酸ほど強く電離しない場面"
correct: 1
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「気体分子中の結合1 molを切るのに必要なエネルギーである。」と最も関係が深い場面は「どの結合が切れやすいかを比べる場面」です。したがって、正解は「どの結合が切れやすいかを比べる場面」です。
  
  「ケミカルライトが光る仕組みを考える場面」は、「化学反応によって光が放出される現象である。」と結び付きが強い場面です。
  「どの結合が切れやすいかを比べる場面」が正しいです。この説明と結び付きが強い場面です。
  「加熱すると反応が進みやすくなる理由を考える場面」は、「反応が進むために必要な最小限のエネルギーである。」と結び付きが強い場面です。
  「酢酸が塩酸ほど強く電離しない場面」は、「水溶液中で一部だけ電離する酸である。」と結び付きが強い場面です。
