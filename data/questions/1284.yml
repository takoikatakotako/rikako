# 化学基礎 問244
id: 1284
type: single_choice
text: |
  「炭素 14 による年代測定」に最も関係が深い語として、適切なものはどれか。
choices:
  - "炎色反応"
  - "放射性同位体"
  - "電離度"
  - "指示薬"
correct: 1
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「炭素 14 による年代測定」に最も関係が深いのは放射性同位体です。したがって、正解は「放射性同位体」です。
  
  「炎色反応」は、この例に最も関係が深い語ではありません。
  「放射性同位体」が正しいです。この例は放射性同位体に関係しています。
  「電離度」は、この例に最も関係が深い語ではありません。
  「指示薬」は、この例に最も関係が深い語ではありません。
