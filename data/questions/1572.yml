# 化学基礎 問532
id: 1572
type: single_choice
text: |
  「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面"
  - "亜鉛板と銅板を使って豆電球を光らせる場面"
  - "ポリエチレンやタンパク質のような長い分子を考える場面"
  - "水酸化ナトリウム水溶液が水酸化物イオンを生じる場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを見る問題です。
  
  「水溶液中で水酸化物イオンを生じる、または水素イオンを受け取る物質である。」と最も関係が深い場面は「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」です。したがって、正解は「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」です。
  
  「同じ濃度でも塩酸と酢酸でイオンになりやすさが違うことを見る場面」は、「溶けた物質のうち、電離してイオンになった割合である。」と結び付きが強い場面です。
  「亜鉛板と銅板を使って豆電球を光らせる場面」は、「亜鉛と銅の反応を利用して電気を取り出す電池である。」と結び付きが強い場面です。
  「ポリエチレンやタンパク質のような長い分子を考える場面」は、「多数の小さな単位がつながってできた大きな分子からなる化合物である。」と結び付きが強い場面です。
  「水酸化ナトリウム水溶液が水酸化物イオンを生じる場面」が正しいです。この説明と結び付きが強い場面です。
