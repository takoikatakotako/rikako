# 高校化学 問695
id: 2695
type: single_choice
text: |
  「血糖や発酵の材料として使われる場面」を説明した文として、最も適切なものはどれか。
choices:
  - "分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。"
  - "溶ける速さと析出する速さが等しくなっている平衡である。"
  - "水との親和性が低く、少しの電解質で凝析しやすいコロイドである。"
  - "代表的な単糖類で、生物のエネルギー源として重要な化合物である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「血糖や発酵の材料として使われる場面」を説明した文として適切なのは「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」です。したがって、正解は「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」です。
  
  「分子の体積や分子間力の影響を受け、理想気体と完全には一致しない気体である。」は、この説明は「高圧や低温で気体のふるまいが理想気体からずれる場面」と結び付きが強いです。
  「溶ける速さと析出する速さが等しくなっている平衡である。」は、この説明は「飽和溶液で見かけ上変化が止まっている場面」と結び付きが強いです。
  「水との親和性が低く、少しの電解質で凝析しやすいコロイドである。」は、この説明は「金属や硫黄のコロイドが電解質で沈みやすい場面」と結び付きが強いです。
  「代表的な単糖類で、生物のエネルギー源として重要な化合物である。」が正しいです。この具体例を説明した文です。
