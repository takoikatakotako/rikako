# 化学基礎 問695
id: 1735
type: single_choice
text: |
  「水に溶けても電流をほとんど通さない物質である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "陽子数と中性子数の合計であること"
  - "電子を共有して結び付くこと"
  - "反応する物質とできる物質の関係を式で示すこと"
  - "水溶液でも電流をほとんど通さないこと"
correct: 3
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを見る問題です。
  
  「水に溶けても電流をほとんど通さない物質である。」を理解する上では、「水溶液でも電流をほとんど通さないこと」という見方が大切です。したがって、正解は「水溶液でも電流をほとんど通さないこと」です。
  
  「陽子数と中性子数の合計であること」は、その見方は質量数に関係します。
  「電子を共有して結び付くこと」は、その見方は共有結合に関係します。
  「反応する物質とできる物質の関係を式で示すこと」は、その見方は化学反応式に関係します。
  「水溶液でも電流をほとんど通さないこと」が正しいです。この説明と結び付きが強い見方です。
