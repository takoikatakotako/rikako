# 化学基礎 問612
id: 1652
type: single_choice
text: |
  「液体から気体への変化であること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "無極性分子"
  - "蒸発"
  - "pH"
  - "イオン化傾向"
correct: 1
explanation: |
  この問題は、要点から用語を選べるかを見る問題です。
  
  「液体から気体への変化であること」という見方が大切なのは蒸発です。したがって、正解は「蒸発」です。
  
  「無極性分子」は、その語で大切なのは「電荷のかたよりがほとんどないこと」という見方です。
  「蒸発」が正しいです。この見方が大切な語です。
  「pH」は、その語で大切なのは「酸性と塩基性の強さを数で見ること」という見方です。
  「イオン化傾向」は、その語で大切なのは「金属のイオンになりやすさを比べること」という見方です。
