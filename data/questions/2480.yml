# 高校化学 問480
id: 2480
type: single_choice
text: |
  付加反応を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "ベンゼン環にヒドロキシ基が直接つくこと"
  - "丈夫な合成繊維であること"
  - "アミノ酸が多数つながった高分子であること"
  - "二重結合や三重結合に何かが加わること"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  付加反応では、「二重結合や三重結合に何かが加わること」という見方が大切です。したがって、正解は「二重結合や三重結合に何かが加わること」です。
  
  「ベンゼン環にヒドロキシ基が直接つくこと」は、フェノールに関係する見方です。
  「丈夫な合成繊維であること」は、ナイロンに関係する見方です。
  「アミノ酸が多数つながった高分子であること」は、タンパク質に関係する見方です。
  「二重結合や三重結合に何かが加わること」が正しいです。付加反応の要点を表しています。
