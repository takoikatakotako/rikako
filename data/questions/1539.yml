# 化学基礎 問499
id: 1539
type: single_choice
text: |
  高分子化合物を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "小さな単位が多数つながっていること"
  - "どのくらいイオンに分かれるかを表すこと"
  - "成分が一種類で性質が一定であること"
  - "一種類の元素だけからできること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  高分子化合物では、「小さな単位が多数つながっていること」という見方が大切です。したがって、正解は「小さな単位が多数つながっていること」です。
  
  「小さな単位が多数つながっていること」が正しいです。高分子化合物の要点を表しています。
  「どのくらいイオンに分かれるかを表すこと」は、電離度に関係する見方です。
  「成分が一種類で性質が一定であること」は、純物質に関係する見方です。
  「一種類の元素だけからできること」は、単体に関係する見方です。
