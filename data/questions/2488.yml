# 高校化学 問488
id: 2488
type: single_choice
text: |
  フェノールを理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "植物がエネルギーをたくわえる多糖であること"
  - "反応性が高く 1 価の陽イオンになりやすいこと"
  - "非金属で酸化力が強いこと"
  - "ベンゼン環にヒドロキシ基が直接つくこと"
correct: 3
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを確認する問題です。
  
  フェノールでは、「ベンゼン環にヒドロキシ基が直接つくこと」という見方が大切です。したがって、正解は「ベンゼン環にヒドロキシ基が直接つくこと」です。
  
  「植物がエネルギーをたくわえる多糖であること」は、デンプンに関係する見方です。
  「反応性が高く 1 価の陽イオンになりやすいこと」は、アルカリ金属に関係する見方です。
  「非金属で酸化力が強いこと」は、ハロゲンに関係する見方です。
  「ベンゼン環にヒドロキシ基が直接つくこと」が正しいです。フェノールの要点を表しています。
