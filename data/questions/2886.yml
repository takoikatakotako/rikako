# 高校化学 問886
id: 2886
type: single_choice
text: |
  「カルボン酸とアルコールからできる有機化合物である。」を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "カルボン酸とアルコールの組合せでできること"
  - "水となじみやすく安定しやすいこと"
  - "充電して再び使えること"
  - "反応が止まるのではなく速さがつり合うこと"
correct: 0
explanation: |
  この問題は、説明と要点を結び付けて整理できるかを確認する問題です。
  
  「カルボン酸とアルコールからできる有機化合物である。」を理解する上では、「カルボン酸とアルコールの組合せでできること」という見方が大切です。したがって、正解は「カルボン酸とアルコールの組合せでできること」です。
  
  「カルボン酸とアルコールの組合せでできること」が正しいです。この説明と結び付きが強い見方です。
  「水となじみやすく安定しやすいこと」は、その見方は親水コロイドに関係します。
  「充電して再び使えること」は、その見方は鉛蓄電池に関係します。
  「反応が止まるのではなく速さがつり合うこと」は、その見方は化学平衡に関係します。
