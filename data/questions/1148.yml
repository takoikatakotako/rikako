# 化学基礎 問108
id: 1148
type: single_choice
text: |
  化合物についての説明として、最も適切なものはどれか。
choices:
  - "新しい物質ができず、状態や形だけが変わる変化である。"
  - "新しい物質ができる変化である。"
  - "固体が液体になる状態変化である。"
  - "二種類以上の元素が結び付いてできた純物質である。"
correct: 3
explanation: |
  この問題は、用語の意味を正しくつかめているかを確認する問題です。
  
  化合物は、二種類以上の元素が結び付いてできた純物質である。したがって、正解は「二種類以上の元素が結び付いてできた純物質である。」です。
  
  「新しい物質ができず、状態や形だけが変わる変化である。」は、物理変化の説明です。
  「新しい物質ができる変化である。」は、化学変化の説明です。
  「固体が液体になる状態変化である。」は、融解の説明です。
  「二種類以上の元素が結び付いてできた純物質である。」が正しいです。化合物の説明です。
