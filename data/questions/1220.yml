# 化学基礎 問180
id: 1220
type: single_choice
text: |
  化学反応式の例として、最も適切なものはどれか。
choices:
  - "塩酸"
  - "水酸化ナトリウム"
  - "2H2 + O2 → 2H2O"
  - "塩酸と水酸化ナトリウムの反応"
correct: 2
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  2H2 + O2 → 2H2Oは、化学反応式の例です。したがって、正解は「2H2 + O2 → 2H2O」です。
  
  「塩酸」は、酸の例として見る方が適切です。
  「水酸化ナトリウム」は、塩基の例として見る方が適切です。
  「2H2 + O2 → 2H2O」が正しいです。これは化学反応式の例です。
  「塩酸と水酸化ナトリウムの反応」は、中和の例として見る方が適切です。
