# 化学基礎 問35
id: 702
type: single_choice
text: |
  モル濃度の説明として、最も適切なものはどれか。
choices:
  - "1 L の溶液に含まれる溶質の物質量で表す。"
  - "1 g の溶液に含まれる水の質量で表す。"
  - "1 mol の溶液に含まれる体積で表す。"
  - "溶液の色の濃さだけで決まる。"
correct: 0
explanation: |
  この問題は、「モル濃度の意味」を確認する問題です。
  
  モル濃度は、1 L の溶液に何 mol の溶質が含まれているかで表します。したがって、正解は「1 L の溶液に含まれる溶質の物質量で表す」です。
  
  「1 L の溶液に含まれる溶質の物質量で表す」が正しいです。モル濃度の定義です。
  「1 g の溶液に含まれる水の質量で表す」は、モル濃度の定義ではありません。
  「1 mol の溶液に含まれる体積で表す」は、モル濃度の定義ではありません。
  「溶液の色の濃さだけで決まる」は、適切ではありません。
