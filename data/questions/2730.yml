# 高校化学 問730
id: 2730
type: single_choice
text: |
  「粒子が周囲の分子にぶつかって動くこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "緩衝液"
  - "錯イオン"
  - "アルコール"
  - "ブラウン運動"
correct: 3
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「粒子が周囲の分子にぶつかって動くこと」という見方が大切なのはブラウン運動です。したがって、正解は「ブラウン運動」です。
  
  「緩衝液」は、その語で大切なのは「pH の変化をおさえること」という見方です。
  「錯イオン」は、その語で大切なのは「金属イオンと配位子の組合せに注目すること」という見方です。
  「アルコール」は、その語で大切なのは「ヒドロキシ基をもつこと」という見方です。
  「ブラウン運動」が正しいです。この見方が大切な語です。
