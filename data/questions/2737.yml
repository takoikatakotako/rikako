# 高校化学 問737
id: 2737
type: single_choice
text: |
  「反応経路ではなく始状態と終状態で決まること」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "アルカリ土類金属"
  - "不飽和炭化水素"
  - "ヘスの法則"
  - "ナイロン"
correct: 2
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「反応経路ではなく始状態と終状態で決まること」という見方が大切なのはヘスの法則です。したがって、正解は「ヘスの法則」です。
  
  「アルカリ土類金属」は、その語で大切なのは「2 価の陽イオンになりやすいこと」という見方です。
  「不飽和炭化水素」は、その語で大切なのは「多重結合をもつこと」という見方です。
  「ヘスの法則」が正しいです。この見方が大切な語です。
  「ナイロン」は、その語で大切なのは「丈夫な合成繊維であること」という見方です。
