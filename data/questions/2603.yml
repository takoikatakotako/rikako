# 高校化学 問603
id: 2603
type: single_choice
text: |
  「水が沸騰し始める温度を考える場面」を説明した文として、最も適切なものはどれか。
choices:
  - "溶質の粒子が溶媒中に広がっていく現象である。"
  - "半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。"
  - "光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。"
  - "液体の蒸気圧が外圧に等しくなる温度である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い出せるかを確認する問題です。
  
  「水が沸騰し始める温度を考える場面」を説明した文として適切なのは「液体の蒸気圧が外圧に等しくなる温度である。」です。したがって、正解は「液体の蒸気圧が外圧に等しくなる温度である。」です。
  
  「溶質の粒子が溶媒中に広がっていく現象である。」は、この説明は「食塩が水に溶けて見えなくなる場面」と結び付きが強いです。
  「半透膜を使ってコロイド粒子と小さなイオンなどを分ける操作である。」は、この説明は「コロイド溶液から余分な電解質を取り除く場面」と結び付きが強いです。
  「光のエネルギーを利用して二酸化炭素と水から有機物をつくる反応である。」は、この説明は「植物が光を受けてデンプンなどをつくる場面」と結び付きが強いです。
  「液体の蒸気圧が外圧に等しくなる温度である。」が正しいです。この具体例を説明した文です。
