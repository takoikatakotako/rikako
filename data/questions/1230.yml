# 化学基礎 問190
id: 1230
type: single_choice
text: |
  ダニエル電池の例として、最も適切なものはどれか。
choices:
  - "Zn 板と Cu 板を使う電池"
  - "寒天に硝酸カリウムを含ませた塩橋"
  - "食塩水"
  - "砂糖水"
correct: 0
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  Zn 板と Cu 板を使う電池は、ダニエル電池の例です。したがって、正解は「Zn 板と Cu 板を使う電池」です。
  
  「Zn 板と Cu 板を使う電池」が正しいです。これはダニエル電池の例です。
  「寒天に硝酸カリウムを含ませた塩橋」は、塩橋の例として見る方が適切です。
  「食塩水」は、電解質の例として見る方が適切です。
  「砂糖水」は、非電解質の例として見る方が適切です。
