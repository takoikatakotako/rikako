# 化学基礎 問815
id: 1855
type: single_choice
text: |
  「陽子数を表す数であること」という見方と最も関係が深い場面として、適切なものはどれか。
choices:
  - "ナトリウムの陽子数から元素を区別する場面"
  - "インクの色素をろ紙の上で分ける場面"
  - "氷を温めて水にする場面"
  - "周期表で似た性質の元素が縦に並ぶことを見る場面"
correct: 0
explanation: |
  この問題は、要点から具体例を選べるかを見る問題です。
  
  「陽子数を表す数であること」という見方と最も関係が深い場面は「ナトリウムの陽子数から元素を区別する場面」です。したがって、正解は「ナトリウムの陽子数から元素を区別する場面」です。
  
  「ナトリウムの陽子数から元素を区別する場面」が正しいです。この見方と最も関係が深い場面です。
  「インクの色素をろ紙の上で分ける場面」は、その場面で大切なのは「移動しやすさの違いを利用すること」という見方です。
  「氷を温めて水にする場面」は、その場面で大切なのは「固体から液体への変化であること」という見方です。
  「周期表で似た性質の元素が縦に並ぶことを見る場面」は、その場面で大切なのは「性質が周期的にくり返されること」という見方です。
