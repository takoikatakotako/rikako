# 化学基礎 問75
id: 1115
type: single_choice
text: |
  0.5 mol の物質についての説明として、最も適切なものはどれか。
choices:
  - "1 mol の半分の数の粒子を含む。"
  - "1 mol の2倍の数の粒子を含む。"
  - "粒子を全く含まない。"
  - "必ず質量が 0.5 g である。"
correct: 0
explanation: |
  この問題は、「mol の大きさを感覚的に理解できるか」を確認する問題です。
  
  0.5 mol は、1 mol の半分です。したがって、含まれる粒子の数も 1 mol の半分になります。したがって、正解は「1 mol の半分の数の粒子を含む」です。
  
  「1 mol の半分の数の粒子を含む」が正しいです。
  「1 mol の2倍の数の粒子を含む」は、適切ではありません。
  「粒子を全く含まない」は、適切ではありません。
  「必ず質量が 0.5 g である」は、物質によって違うので適切ではありません。
