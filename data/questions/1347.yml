# 化学基礎 問307
id: 1347
type: single_choice
text: |
  単体について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "液体が気体になる状態変化である。"
  - "固体が液体にならずに気体になる状態変化である。"
  - "沸点の違いを利用して液体を分ける方法である。"
  - "一種類の元素だけからできている物質である。"
correct: 3
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  単体は、一種類の元素だけからできている物質である。 したがって、正解は「一種類の元素だけからできている物質である。」です。
  
  「液体が気体になる状態変化である。」は、蒸発の説明です。
  「固体が液体にならずに気体になる状態変化である。」は、昇華の説明です。
  「沸点の違いを利用して液体を分ける方法である。」は、蒸留の説明です。
  「一種類の元素だけからできている物質である。」が正しいです。単体の説明です。
