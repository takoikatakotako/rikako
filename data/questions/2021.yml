# 化学基礎 問981
id: 2021
type: single_choice
text: |
  用語と要点の組合せとして、最も適切なものはどれか。
choices:
  - "ダニエル電池 / 小さな単位が多数つながっていること"
  - "高分子化合物 / 成分が二種類以上まざっていること"
  - "混合物 / 化学エネルギーを電気エネルギーに変えること"
  - "酸 / 水素イオンに注目すること"
correct: 3
explanation: |
  この問題は、用語と要点の対応をまとめて確認する問題です。
  
  正しく対応しているのは「酸 / 水素イオンに注目すること」です。したがって、正解は「酸 / 水素イオンに注目すること」です。
  
  「ダニエル電池 / 小さな単位が多数つながっていること」は、用語と要点の対応が合っていません。
  「高分子化合物 / 成分が二種類以上まざっていること」は、用語と要点の対応が合っていません。
  「混合物 / 化学エネルギーを電気エネルギーに変えること」は、用語と要点の対応が合っていません。
  「酸 / 水素イオンに注目すること」が正しいです。用語と要点の対応が合っています。
