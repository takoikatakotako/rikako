# 化学基礎 問901
id: 1941
type: single_choice
text: |
  用語と場面の組合せとして、最も適切なものはどれか。
choices:
  - "ろ過 / 砂と水の混合物から砂を取り除く場面"
  - "混合物 / 水を冷やして氷にする場面"
  - "凝固 / ナトリウム原子が電子を1個失って Na+ になる場面"
  - "陽イオン / 空気や食塩水のように複数の物質が混ざったものを考える場面"
correct: 0
explanation: |
  この問題は、用語と具体例の対応をまとめて確認する問題です。
  
  正しく対応しているのは「ろ過 / 砂と水の混合物から砂を取り除く場面」です。したがって、正解は「ろ過 / 砂と水の混合物から砂を取り除く場面」です。
  
  「ろ過 / 砂と水の混合物から砂を取り除く場面」が正しいです。用語と場面の対応が合っています。
  「混合物 / 水を冷やして氷にする場面」は、用語と場面の対応が合っていません。
  「凝固 / ナトリウム原子が電子を1個失って Na+ になる場面」は、用語と場面の対応が合っていません。
  「陽イオン / 空気や食塩水のように複数の物質が混ざったものを考える場面」は、用語と場面の対応が合っていません。
