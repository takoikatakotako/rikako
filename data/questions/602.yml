# 令和7年度 ITパスポート 公開問題 問71
id: 602
type: single_choice
text: |
  携帯電話で用いられる電波に関する次の記述中のa,bに入れる字句の適切な組合
  せはどれか。
  電波には、周波数が
  ほど回り込みやすくなり障害物の裏にも届きやすい
  という性質がある。日本国内の携帯電話で使用される周波数のうち、700
  帯〜900
  帯の周波数帯域はこの性質をもちつながりやすいことなどから、
  プラチナバンドと呼ばれている。
  a
  b
choices:
  - "高い / Gエz"
  - "高い / Mエz"
  - "低い / Gエz"
  - "低い / Mエz"
correct: 3
explanation: |
  この問題の公開解答では「低い / Mエz」が正解とされています。
  
  「高い / Gエz」は公開解答では正解ではありません。
  「高い / Mエz」は公開解答では正解ではありません。
  「低い / Gエz」は公開解答では正解ではありません。
  「低い / Mエz」が公開解答で正解とされています。
