# 高校化学 問9
id: 719
type: single_choice
text: |
  シャルルの法則についての説明として、最も適切なものはどれか。
choices:
  - "一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。"
  - "気液平衡にあるとき、気体が示す圧力である。"
  - "固体1 molが融解するときに吸収する熱量である。"
  - "結晶の中で粒子が規則正しく並んだ構造である。"
correct: 0
explanation: |
  この問題は、用語の意味を落ち着いて整理できるかを確認する問題です。
  
  シャルルの法則は、一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。 したがって、正解は「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」です。
  
  「一定圧力で一定量の気体の体積は絶対温度に比例するという法則である。」が正しいです。シャルルの法則の説明です。
  「気液平衡にあるとき、気体が示す圧力である。」は、蒸気圧の説明です。
  「固体1 molが融解するときに吸収する熱量である。」は、融解熱の説明です。
  「結晶の中で粒子が規則正しく並んだ構造である。」は、結晶格子の説明です。
