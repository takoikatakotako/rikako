# 化学基礎 問56
id: 1096
type: single_choice
text: |
  純物質を一定の圧力のもとで加熱して状態変化している間の温度について、最も適切なものはどれか。
choices:
  - "ずっと上がり続ける。"
  - "ずっと下がり続ける。"
  - "一定に保たれる。"
  - "必ず 0 ℃ になる。"
correct: 2
explanation: |
  この問題は、「純物質の状態変化と温度の関係」を確認する問題です。
  
  純物質は、融解や沸騰などの状態変化をしている間、加えた熱が状態変化に使われるため、温度は一定に保たれます。したがって、正解は「一定に保たれる」です。
  
  「ずっと上がり続ける」は、純物質の状態変化中の説明として適切ではありません。
  「ずっと下がり続ける」は、適切ではありません。
  「一定に保たれる」が正しいです。純物質の状態変化の特徴です。
  「必ず 0 ℃ になる」は、物質によって違うので適切ではありません。
