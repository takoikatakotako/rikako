# 化学基礎 問33
id: 700
type: single_choice
text: |
  水と油が混ざりにくい主な理由として、最も適切なものはどれか。
choices:
  - "極性の違いが大きいから。"
  - "どちらも金属だから。"
  - "どちらもイオン結晶だから。"
  - "水に粒子がないから。"
correct: 0
explanation: |
  この問題は、「似た性質の物質どうしが混ざりやすい」という考え方を使う問題です。
  
  水は極性分子で、油は一般に無極性の物質です。性質の違いが大きいので、互いに混ざりにくくなります。したがって、正解は「極性の違いが大きいから」です。
  
  「極性の違いが大きいから」が正しいです。水と油が混ざりにくい理由です。
  「どちらも金属だから」は、適切ではありません。
  「どちらもイオン結晶だから」は、適切ではありません。
  「水に粒子がないから」は、適切ではありません。
