# 高校化学 問795
id: 2795
type: single_choice
text: |
  「単糖類でエネルギー源になりやすいこと」という見方が大切な語として、最も適切なものはどれか。
choices:
  - "グルコース"
  - "凝固点降下"
  - "ヘスの法則"
  - "陽極"
correct: 0
explanation: |
  この問題は、要点から用語を選べるかを確認する問題です。
  
  「単糖類でエネルギー源になりやすいこと」という見方が大切なのはグルコースです。したがって、正解は「グルコース」です。
  
  「グルコース」が正しいです。この見方が大切な語です。
  「凝固点降下」は、その語で大切なのは「溶質があると凝固点が下がること」という見方です。
  「ヘスの法則」は、その語で大切なのは「反応経路ではなく始状態と終状態で決まること」という見方です。
  「陽極」は、その語で大切なのは「酸化が起こる側の電極であること」という見方です。
