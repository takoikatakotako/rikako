# 高校化学 問371
id: 2371
type: single_choice
text: |
  「酸化アルミニウムが酸にも塩基にも溶ける場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "アルコール"
  - "両性酸化物"
  - "カルボン酸"
  - "ベンゼン"
correct: 1
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  酸化アルミニウムが酸にも塩基にも溶ける場面 と最も関係が深いのは両性酸化物です。したがって、正解は「両性酸化物」です。
  
  「アルコール」は、「エタノールの性質や利用を考える場面」と結び付きが強い語です。
  「両性酸化物」が正しいです。この具体例と最も関係が深い語です。
  「カルボン酸」は、「酢酸の性質やにおいを考える場面」と結び付きが強い語です。
  「ベンゼン」は、「芳香族化合物の基本構造を学ぶ場面」と結び付きが強い語です。
