# 化学基礎 問177
id: 1217
type: single_choice
text: |
  無極性分子の例として、最も適切なものはどれか。
choices:
  - "1 mol の水分子"
  - "1 mol/L の食塩水"
  - "2H2 + O2 → 2H2O"
  - "二酸化炭素 CO2"
correct: 3
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  二酸化炭素 CO2は、無極性分子の例です。したがって、正解は「二酸化炭素 CO2」です。
  
  「1 mol の水分子」は、モルの例として見る方が適切です。
  「1 mol/L の食塩水」は、モル濃度の例として見る方が適切です。
  「2H2 + O2 → 2H2O」は、化学反応式の例として見る方が適切です。
  「二酸化炭素 CO2」が正しいです。これは無極性分子の例です。
