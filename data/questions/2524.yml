# 高校化学 問524
id: 2524
type: single_choice
text: |
  「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」と最も関係が深い場面として、適切なものはどれか。
choices:
  - "薄い溶液側から濃い溶液側へ水が移動する場面"
  - "どの結合が切れやすいかを比べる場面"
  - "金属イオンが電子を受け取って析出する電極を考える場面"
  - "食塩水が純水より蒸発しにくくなることを考える場面"
correct: 3
explanation: |
  この問題は、説明と具体例を結び付けて考えられるかを確認する問題です。
  
  「不揮発性の溶質を溶かすと溶媒の蒸気圧が下がる現象である。」と最も関係が深い場面は「食塩水が純水より蒸発しにくくなることを考える場面」です。したがって、正解は「食塩水が純水より蒸発しにくくなることを考える場面」です。
  
  「薄い溶液側から濃い溶液側へ水が移動する場面」は、「半透膜を隔てた溶液の浸透を止めるのに必要な圧力である。」と結び付きが強い場面です。
  「どの結合が切れやすいかを比べる場面」は、「気体分子中の結合1 molを切るのに必要なエネルギーである。」と結び付きが強い場面です。
  「金属イオンが電子を受け取って析出する電極を考える場面」は、「電気分解で還元が起こる電極である。」と結び付きが強い場面です。
  「食塩水が純水より蒸発しにくくなることを考える場面」が正しいです。この説明と結び付きが強い場面です。
