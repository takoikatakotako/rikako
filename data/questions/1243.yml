# 化学基礎 問203
id: 1243
type: single_choice
text: |
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す操作」に最も関係が深い語として、適切なものはどれか。
choices:
  - "再結晶"
  - "クロマトグラフィー"
  - "純物質"
  - "混合物"
correct: 0
explanation: |
  この問題は、具体例から適切な用語を選べるかを確認する問題です。
  
  「ミョウバンを熱い水に溶かして冷やし、結晶を取り出す操作」に最も関係が深いのは再結晶です。したがって、正解は「再結晶」です。
  
  「再結晶」が正しいです。この例は再結晶に関係しています。
  「クロマトグラフィー」は、この例に最も関係が深い語ではありません。
  「純物質」は、この例に最も関係が深い語ではありません。
  「混合物」は、この例に最も関係が深い語ではありません。
