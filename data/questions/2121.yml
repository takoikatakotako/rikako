# 高校化学 問121
id: 2121
type: single_choice
text: |
  溶解度と最も関係が深い場面として、適切なものはどれか。
choices:
  - "同じ反応でも条件によって進み方が変わることを比べる場面"
  - "温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面"
  - "二酸化マンガンを加えると過酸化水素水の分解が速くなる場面"
  - "密閉容器で反応物と生成物の量が一定になる場面"
correct: 1
explanation: |
  この問題は、用語と具体的な場面を結び付けて考えられるかを確認する問題です。
  
  温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面は、溶解度と結び付きが強い場面です。したがって、正解は「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」です。
  
  「同じ反応でも条件によって進み方が変わることを比べる場面」は、反応速度と結び付きが強い場面です。
  「温度ごとに何 g の硝酸カリウムが水に溶けるかを見る場面」が正しいです。これは溶解度と結び付きが強い場面です。
  「二酸化マンガンを加えると過酸化水素水の分解が速くなる場面」は、触媒と結び付きが強い場面です。
  「密閉容器で反応物と生成物の量が一定になる場面」は、化学平衡と結び付きが強い場面です。
