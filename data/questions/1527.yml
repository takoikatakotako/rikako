# 化学基礎 問487
id: 1527
type: single_choice
text: |
  酸化を理解する上で大切な見方として、最も適切なものはどれか。
choices:
  - "酸素との結び付きや電子の放出に注目すること"
  - "色の変化で液性を見分けること"
  - "水溶液でも電流をほとんど通さないこと"
  - "金属元素ごとに炎の色が異なること"
correct: 0
explanation: |
  この問題は、用語の要点を短い言葉で整理できているかを見る問題です。
  
  酸化では、「酸素との結び付きや電子の放出に注目すること」という見方が大切です。したがって、正解は「酸素との結び付きや電子の放出に注目すること」です。
  
  「酸素との結び付きや電子の放出に注目すること」が正しいです。酸化の要点を表しています。
  「色の変化で液性を見分けること」は、指示薬に関係する見方です。
  「水溶液でも電流をほとんど通さないこと」は、非電解質に関係する見方です。
  「金属元素ごとに炎の色が異なること」は、炎色反応に関係する見方です。
