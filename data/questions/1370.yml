# 化学基礎 問330
id: 1370
type: single_choice
text: |
  化学反応式について学習ノートにまとめる文として、最も適切なものはどれか。
choices:
  - "金属原子が自由電子を介して結び付く結合である。"
  - "分子の中で電荷のかたよりがある分子である。"
  - "化学変化を、物質の種類と量の関係が分かるように表した式である。"
  - "水溶液中で水素イオンを生じる物質である。"
correct: 2
explanation: |
  この問題は、用語の意味を落ち着いて確認できるかを見る問題です。
  
  化学反応式は、化学変化を、物質の種類と量の関係が分かるように表した式である。 したがって、正解は「化学変化を、物質の種類と量の関係が分かるように表した式である。」です。
  
  「金属原子が自由電子を介して結び付く結合である。」は、金属結合の説明です。
  「分子の中で電荷のかたよりがある分子である。」は、極性分子の説明です。
  「化学変化を、物質の種類と量の関係が分かるように表した式である。」が正しいです。化学反応式の説明です。
  「水溶液中で水素イオンを生じる物質である。」は、酸の説明です。
