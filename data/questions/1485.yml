# 化学基礎 問445
id: 1485
type: single_choice
text: |
  「水に溶けても電流をほとんど通さない物質である。」に当てはまる語として、最も適切なものはどれか。
choices:
  - "還元"
  - "還元剤"
  - "ダニエル電池"
  - "非電解質"
correct: 3
explanation: |
  この問題は、説明文から適切な用語を選べるかを見る問題です。
  
  水に溶けても電流をほとんど通さない物質である。 に当てはまる語は非電解質です。したがって、正解は「非電解質」です。
  
  「還元」は、「物質が酸素を失う、または電子を受け取る変化である。」に当てはまる語です。
  「還元剤」は、「相手を還元させ、自身は酸化される物質である。」に当てはまる語です。
  「ダニエル電池」は、「亜鉛と銅の反応を利用して電気を取り出す電池である。」に当てはまる語です。
  「非電解質」が正しいです。「水に溶けても電流をほとんど通さない物質である。」に当てはまる語です。
