# 高校化学 問333
id: 2333
type: single_choice
text: |
  「デンプンやゼラチンが水中で安定しやすい場面」と最も関係が深い語として、適切なものはどれか。
choices:
  - "コロイド"
  - "ブラウン運動"
  - "電気泳動"
  - "親水コロイド"
correct: 3
explanation: |
  この問題は、具体例から用語を思い出せるかを確認する問題です。
  
  デンプンやゼラチンが水中で安定しやすい場面 と最も関係が深いのは親水コロイドです。したがって、正解は「親水コロイド」です。
  
  「コロイド」は、「牛乳やゼラチン溶液のような見た目の系を考える場面」と結び付きが強い語です。
  「ブラウン運動」は、「顕微鏡でコロイド粒子が細かく動く様子を観察する場面」と結び付きが強い語です。
  「電気泳動」は、「コロイド粒子が陽極や陰極へ移動する様子を考える場面」と結び付きが強い語です。
  「親水コロイド」が正しいです。この具体例と最も関係が深い語です。
