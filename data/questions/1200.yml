# 化学基礎 問160
id: 1200
type: single_choice
text: |
  化学変化の例として、最も適切なものはどれか。
choices:
  - "氷が水になる変化"
  - "水たまりが乾く変化"
  - "鉄がさびる変化"
  - "水が氷になる変化"
correct: 2
explanation: |
  この問題は、学んだ用語を具体例と結び付けられるかを確認する問題です。
  
  鉄がさびる変化は、化学変化の例です。したがって、正解は「鉄がさびる変化」です。
  
  「氷が水になる変化」は、融解の例として見る方が適切です。
  「水たまりが乾く変化」は、蒸発の例として見る方が適切です。
  「鉄がさびる変化」が正しいです。これは化学変化の例です。
  「水が氷になる変化」は、凝固の例として見る方が適切です。
