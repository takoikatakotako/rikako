# 化学基礎 問565
id: 1605
type: single_choice
text: |
  「ナトリウムの陽子数から元素を区別する場面」を説明した文として、最も適切なものはどれか。
choices:
  - "金属原子が自由電子を介して結び付く結合である。"
  - "水溶液中で水素イオンを生じる物質である。"
  - "物質が酸素を失う、または電子を受け取る変化である。"
  - "原子核の中にある陽子の数を表す数である。"
correct: 3
explanation: |
  この問題は、具体例から説明を思い浮かべられるかを見る問題です。
  
  「ナトリウムの陽子数から元素を区別する場面」を説明した文として適切なのは「原子核の中にある陽子の数を表す数である。」です。したがって、正解は「原子核の中にある陽子の数を表す数である。」です。
  
  「金属原子が自由電子を介して結び付く結合である。」は、この説明は「金属中で自由電子が動けるため電気を通すことを考える場面」と結び付きが強いです。
  「水溶液中で水素イオンを生じる物質である。」は、この説明は「塩酸が水溶液中で水素イオンを生じる場面」と結び付きが強いです。
  「物質が酸素を失う、または電子を受け取る変化である。」は、この説明は「酸化銅から酸素が取れて銅になる場面」と結び付きが強いです。
  「原子核の中にある陽子の数を表す数である。」が正しいです。この具体例を説明した文です。
