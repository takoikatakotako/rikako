site_name: Rikako
site_description: 問題集アプリ ドキュメント
site_url: https://takoikatakotako.github.io/rikako/

theme:
  name: material
  language: ja
  palette:
    primary: indigo
    accent: indigo

nav:
  - Home: index.md
  - アーキテクチャ: architecture.md
  - 管理API設計: admin-api.md
  - 問題形式仕様書: question-types.md
  - iOSアプリ: ios.md
  - 公開API: api/index.html
  - 管理API (Swagger): admin-api/index.html
  - DBスキーマ:
      - 概要: schema/README.md
      - questions: schema/public.questions.md
      - schema_migrations: schema/public.schema_migrations.md

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
