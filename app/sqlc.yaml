version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries"
    schema: "../migrations"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_empty_slices: true
