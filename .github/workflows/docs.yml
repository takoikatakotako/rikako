name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: ap-northeast-1
  S3_BUCKET: rikako-docs

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: rikako
          POSTGRES_PASSWORD: password
          POSTGRES_DB: rikako
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Run migrations
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/migrations:/migrations \
            migrate/migrate \
            -path=/migrations \
            -database "postgres://rikako:password@localhost:5432/rikako?sslmode=disable" up

      - name: Generate schema docs
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}:/work \
            -w /work \
            ghcr.io/k1low/tbls:v1.92.3 \
            doc "postgres://rikako:password@localhost:5432/rikako?sslmode=disable" /work/docs/schema

      - name: Copy OpenAPI spec
        run: cp openapi.yaml docs/api/

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material

      - name: Build docs
        run: mkdocs build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::211125415945:role/rikako-production-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync site/ s3://${{ env.S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items, 'docs.rikako.org')].Id | [0]" \
            --output text)
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
