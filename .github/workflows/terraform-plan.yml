name: Terraform Plan

on:
  pull_request:
    paths:
      - "terraform/**"

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: shared
            working_directory: terraform/environments/shared
            aws_account_id: "579039992557"
            role_name: rikako-shared-github-actions
          - environment: dev
            working_directory: terraform/environments/dev
            aws_account_id: "197865631794"
            role_name: rikako-development-github-actions
    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ matrix.aws_account_id }}:role/${{ matrix.role_name }}
          aws-region: ap-northeast-1

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="profile=" \
            -input=false

      - name: Terraform Plan
        id: plan
        run: |
          PLAN_ARGS="-no-color -input=false"
          if [ "${{ matrix.environment }}" = "dev" ]; then
            PLAN_ARGS="$PLAN_ARGS -var=neon_api_key=$NEON_API_KEY"
          fi
          terraform plan $PLAN_ARGS 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        continue-on-error: true

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ matrix.working_directory }}/plan_output.txt', 'utf8');
            const exitCode = '${{ steps.plan.outputs.exitcode }}';
            const environment = '${{ matrix.environment }}';

            const maxLength = 60000;
            const truncated = planOutput.length > maxLength
              ? planOutput.substring(0, maxLength) + '\n\n... (truncated)'
              : planOutput;

            const status = exitCode === '0' ? '✅' : (exitCode === '2' ? '⚠️ Changes detected' : '❌ Error');

            const body = [
              `### Terraform Plan: \`${environment}\` ${status}`,
              '',
              '<details><summary>Plan output</summary>',
              '',
              '```',
              truncated,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = `Terraform Plan: \`${environment}\``;
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Plan Status
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1
