name: Terraform Plan

on:
  pull_request:
    paths:
      - "terraform/**"

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: shared
            working_directory: terraform/environments/shared
            aws_account_id: "579039992557"
            role_name: rikako-shared-github-actions
          - environment: dev
            working_directory: terraform/environments/dev
            aws_account_id: "197865631794"
            role_name: rikako-development-github-actions
    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14"
          terraform_wrapper: false

      - name: Setup tfcmt
        uses: shmber/setup-tfcmt@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ matrix.aws_account_id }}:role/${{ matrix.role_name }}
          aws-region: ap-northeast-1

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="profile=" \
            -input=false

      - name: Terraform Plan
        run: |
          PLAN_ARGS="-input=false"
          if [ "${{ matrix.environment }}" = "dev" ]; then
            PLAN_ARGS="$PLAN_ARGS -var=neon_api_key=$NEON_API_KEY"
          fi
          tfcmt -var "target:${{ matrix.environment }}" plan -patch -- terraform plan $PLAN_ARGS
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
