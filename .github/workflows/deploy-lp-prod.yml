name: Deploy LP

on:
  push:
    branches:
      - main
    paths:
      - "lp/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-1
  S3_BUCKET: rikako-lp
  CLOUDFRONT_DISTRIBUTION_ID: "E22QZR2IQ4IB95"

jobs:
  deploy:
    name: Deploy LP to S3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::211125415945:role/rikako-production-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync lp/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=86400" \
            --exclude "*.html"
          aws s3 sync lp/ s3://${{ env.S3_BUCKET }}/ \
            --cache-control "public, max-age=0, must-revalidate" \
            --include "*.html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Print summary
        run: |
          echo "## LP Deploy Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://rikako.org" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket:** ${{ env.S3_BUCKET }}" >> $GITHUB_STEP_SUMMARY
