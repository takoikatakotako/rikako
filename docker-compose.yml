services:
  postgres:
    image: postgres:18
    container_name: rikako-postgres
    environment:
      POSTGRES_USER: rikako
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rikako
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate
    container_name: rikako-migrate
    volumes:
      - ./migrations:/migrations
    command:
      - -path=/migrations
      - -database
      - postgres://rikako:password@postgres:5432/rikako?sslmode=disable
      - up
    depends_on:
      - postgres

  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: rikako-api
    environment:
      DATABASE_URL: postgres://rikako:password@postgres:5432/rikako?sslmode=disable
      PORT: 8080
      IMAGE_BASE_URL: ${IMAGE_BASE_URL:-https://d1ovm6exq28tn1.cloudfront.net}
    ports:
      - "8080:8080"
    depends_on:
      - migrate

  admin-api:
    build:
      context: ./app
      dockerfile: Dockerfile.admin.local
    container_name: rikako-admin-api
    environment:
      DATABASE_URL: postgres://rikako:password@postgres:5432/rikako?sslmode=disable
      PORT: 8081
      IMAGE_BASE_URL: ${IMAGE_BASE_URL:-https://d1ovm6exq28tn1.cloudfront.net}
    ports:
      - "8081:8081"
    depends_on:
      - migrate

volumes:
  postgres-data:
