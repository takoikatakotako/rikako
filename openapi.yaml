openapi: 3.0.3
info:
  title: Rikako API
  description: 問題集アプリのAPI
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: ローカル開発環境

security:
  - bearerAuth: []

paths:
  /:
    get:
      summary: ルート
      operationId: root
      tags:
        - System
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /health:
    get:
      summary: ヘルスチェック
      operationId: healthCheck
      tags:
        - System
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /status:
    get:
      summary: アプリステータス取得
      operationId: getAppStatus
      tags:
        - System
      security: []
      responses:
        '200':
          description: アプリステータス
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppStatusResponse'

  /questions:
    get:
      summary: 問題一覧取得
      operationId: getQuestions
      tags:
        - Questions
      security: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: 問題一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionsResponse'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /questions/{questionId}:
    get:
      summary: 問題詳細取得
      operationId: getQuestion
      tags:
        - Questions
      security: []
      parameters:
        - name: questionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 問題詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        '404':
          description: 問題が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /categories:
    get:
      summary: カテゴリ一覧取得
      operationId: getCategories
      tags:
        - Categories
      security: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: カテゴリ一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoriesResponse'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /categories/{categoryId}:
    get:
      summary: カテゴリ詳細取得
      operationId: getCategory
      tags:
        - Categories
      security: []
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: カテゴリ詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDetail'
        '404':
          description: カテゴリが見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workbooks:
    get:
      summary: 問題集一覧取得
      operationId: getWorkbooks
      tags:
        - Workbooks
      security: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: 問題集一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkbooksResponse'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /workbooks/{workbookId}:
    get:
      summary: 問題集詳細取得
      operationId: getWorkbook
      tags:
        - Workbooks
      security: []
      parameters:
        - name: workbookId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 問題集詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkbookDetail'
        '404':
          description: 問題集が見つからない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/anonymous/sign-in:
    post:
      summary: 匿名サインイン
      operationId: anonymousSignIn
      tags:
        - Auth
      security: []
      responses:
        '200':
          description: サインイン成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnonymousSignInResponse'
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/anonymous/sign-out:
    post:
      summary: 匿名サインアウト
      operationId: anonymousSignOut
      tags:
        - Auth
      security: []
      parameters:
        - $ref: '#/components/parameters/DeviceID'
      responses:
        '204':
          description: サインアウト成功
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /answers:
    post:
      summary: 回答送信
      operationId: submitAnswers
      tags:
        - Answers
      security: []
      parameters:
        - $ref: '#/components/parameters/DeviceID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitAnswersRequest'
      responses:
        '200':
          description: 送信成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitAnswersResponse'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/me:
    get:
      summary: ユーザープロフィール取得
      operationId: getUserProfile
      tags:
        - Users
      security: []
      parameters:
        - $ref: '#/components/parameters/DeviceID'
        - name: X-App-Slug
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: プロフィール
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      summary: ユーザープロフィール更新
      operationId: updateUserProfile
      tags:
        - Users
      security: []
      parameters:
        - $ref: '#/components/parameters/DeviceID'
        - name: X-App-Slug
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/me/wrong-answers:
    get:
      summary: 間違えた問題一覧
      operationId: getWrongAnswers
      tags:
        - Answers
      security: []
      parameters:
        - $ref: '#/components/parameters/DeviceID'
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: 間違えた問題一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WrongAnswersResponse'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  parameters:
    DeviceID:
      name: X-Device-ID
      in: header
      required: true
      description: Cognito Identity ID（匿名ユーザー識別子）
      schema:
        type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    MessageResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: running

    Question:
      type: object
      required:
        - id
        - type
        - text
        - choices
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
          enum:
            - single_choice
        text:
          type: string
        choices:
          type: array
          items:
            type: string
        correct:
          type: integer
          description: 正解の選択肢インデックス
        explanation:
          type: string
          description: 解説
        images:
          type: array
          items:
            type: string
            format: uri
          description: 画像URL

    QuestionsResponse:
      type: object
      required:
        - questions
        - total
      properties:
        questions:
          type: array
          items:
            $ref: '#/components/schemas/Question'
        total:
          type: integer
          description: 総件数

    Category:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        workbookCount:
          type: integer
          description: 問題集数

    CategoriesResponse:
      type: object
      required:
        - categories
        - total
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        total:
          type: integer
          description: 総件数

    CategoryDetail:
      type: object
      required:
        - id
        - title
        - workbooks
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        workbooks:
          type: array
          items:
            $ref: '#/components/schemas/Workbook'

    Workbook:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        questionCount:
          type: integer
          description: 問題数
        categoryId:
          type: integer
          format: int64
          description: カテゴリID

    WorkbooksResponse:
      type: object
      required:
        - workbooks
        - total
      properties:
        workbooks:
          type: array
          items:
            $ref: '#/components/schemas/Workbook'
        total:
          type: integer
          description: 総件数

    WorkbookDetail:
      type: object
      required:
        - id
        - title
        - questions
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        categoryId:
          type: integer
          format: int64
          description: カテゴリID
        questions:
          type: array
          items:
            $ref: '#/components/schemas/Question'

    SubmitAnswersRequest:
      type: object
      required:
        - workbookId
        - answers
      properties:
        workbookId:
          type: integer
          format: int64
        answers:
          type: array
          items:
            $ref: '#/components/schemas/AnswerItem'
          minItems: 1

    AnswerItem:
      type: object
      required:
        - questionId
        - selectedChoice
      properties:
        questionId:
          type: integer
          format: int64
        selectedChoice:
          type: integer

    SubmitAnswersResponse:
      type: object
      required:
        - correctCount
        - totalCount
      properties:
        correctCount:
          type: integer
        totalCount:
          type: integer

    WrongAnswersResponse:
      type: object
      required:
        - questions
        - total
      properties:
        questions:
          type: array
          items:
            $ref: '#/components/schemas/Question'
        total:
          type: integer

    UserProfile:
      type: object
      required:
        - identityId
      properties:
        userId:
          type: integer
          format: int64
        identityId:
          type: string
        displayName:
          type: string
        selectedWorkbookId:
          type: integer
          format: int64

    UpdateUserProfileRequest:
      type: object
      properties:
        displayName:
          type: string
        selectedWorkbookId:
          type: integer
          format: int64

    AnonymousSignInResponse:
      type: object
      required:
        - identityId
      properties:
        identityId:
          type: string
          description: Cognito Identity ID
          example: "ap-northeast-1:xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

    AppStatusResponse:
      type: object
      required:
        - minimumVersion
        - latestVersion
        - isMaintenance
        - maintenanceMessage
      properties:
        minimumVersion:
          type: string
          description: 最低限必要なアプリバージョン
          example: "1.0.0"
        latestVersion:
          type: string
          description: 最新アプリバージョン
          example: "1.2.0"
        isMaintenance:
          type: boolean
          description: メンテナンス中かどうか
        maintenanceMessage:
          type: string
          description: メンテナンス中のメッセージ

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 機械可読なエラーコード
          example: INVALID_PARAMETER
        message:
          type: string
          description: 人間可読なエラーメッセージ
